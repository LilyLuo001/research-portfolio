ows of\n   the Target/Acquiring fund table, a 4-fund filing yields 4 objects}, ... ]}\n  or the no_event object above.\nEach event object:\n  fund_name        target mutual fund's full name (from excerpt)\n  family           fund family/trust (from excerpt)\n  mutual_fund_ticker / etf_ticker\n                   a single 2-6 char UPPERCASE symbol from the excerpt, else \"NA\".\n                   NEVER a fund name. Multiple class tickers → \"NA\" and list them in evidence.\n  announce_date    YYYY-MM-DD only. Board-approval date if stated; else the document's own\n                   date; else the filed date. Vague (\"May 2020\",\"Q4 2026\") → \"NA\".\n  date_basis       \"board\" | \"document\" | \"filed\" | \"NA\"\n  effective_date   YYYY-MM-DD only; the stated closing/completion date. Vague → \"NA\".\n  asset_class      equity_US / equity_intl / fixed_income / other — ONLY if locatable in the\n                   excerpt (bond/muni/high-yield/MBS→fixed_income; International/EM/Asia→\n                   equity_intl; explicit US equity→equity_US; managed-futures/multi-asset/\n                   long-short→other). Name alone insufficient → \"NA\".\n  AUM_at_conversion_USD  number from excerpt or \"NA\"\n  source_accession copy from the 文件 line\n  confidence       H = fund identity + (announce or effective) with explicit basis;\n                   M = identity clear, dates partly missing/document-dated;\n                   L = identity inferred from title only\n  evidence         ≤25-word quote fragment supporting the verdict (for events: the words\n                   showing the acquirer is an ETF; for no_event: the words showing why not)\nNEED_HUMAN only when TWO date statements INSIDE THIS ONE EXCERPT contradict for the same\nfund: {\"NEED_HUMAN\": true, \"quotes\": [\"...\", \"...\"]}. Different filings never contradict.\nNever fill any field from memory — excerpt-locatable or \"NA\".\n\nSELF-CHECK before emitting (do this, don't print it): every input item id appears exactly\nonce in your answer map (count them); every event object quotes ETF-acquirer evidence;\nevery date matches ^\\d{4}-\\d{2}-\\d{2}$ or is \"NA\"; no ticker field contains a space.】\n文件: 0001829126-22-020510 (form 497, filed 2022-12-23, EA Series Trust  (CIK 0001592900))\nsource_url: https://www.sec.gov/Archives/edgar/data/1592900/000182912622020510/easeries-bsvo_497.htm\n节选:\n497 1 easeries-bsvo_497.htm 497 OMNI TAX-MANAGED SMALL-CAP VALUE FUND (a series of Bridgeway Funds, Inc.) IMPORTANT SHAREHOLDER INFORMATION These materials are for a special meeting (the “Meeting”) of shareholders of the Omni Tax-Managed Small-Cap Value Fund (the “Fund”), a series of Bridgeway Funds, Inc. (“Bridgeway Funds”), which will be held on February 15, 2023, at 1:00 p.m., Central time, at 20 Greenway Plaza, Suite 450, Houston, Texas 77046. These materials discuss a proposal to be voted on at the Meeting and contain a Notice of Special Meeting of Shareholders, a Proxy Statement/Prospectus (the “Proxy Statement/Prospectus”), and proxy card. A proxy card is, in essence, a ballot. When you complete a proxy card, it tells us how you wish the individuals named on your proxy card to vote on important issues relating to the Fund. If you complete, sign and return a proxy card, we’ll vote your proxy exactly as you tell us. If you simply sign and return a proxy card without indicating how your shares are to be voted, we’ll vote your proxy FOR the proposal(s) which is in accordance with the Bridgeway Funds’ Board of Director’s recommendation on page 18 of the Proxy Statement/Prospectus […] he Acquiring Fund. If the Target Fund’s shareholders vote to approve the Plan, on the closing date of the reorganization, shareholders of the Target Fund will receive shares of the Acquiring Fund of equivalent aggregate net asset value (“NAV”) to their investment in the Target Fund immediately prior to the reorganization. The Target Fund will then be liquidated and dissolved. The Target Fund and the Acquiring Fund (each, a “Fund” and, collectively, the “Funds”) have identical investment objectives and substantially similar principal investment strategies. The Funds also have substantially the same principal investment risks, except that the Acquiring Fund will also be subject to certain principal investment risks due to its structure as an exchange-traded fund (“ETF”). Each Fund’s investment objective is to provide long-term total return on capital, primarily through capital appreciation. This Proxy Statement/Prospectus includes information about the Plan and the Acquiring Fund that you should know before voting on the Plan, which if approved, would result in your owning shares of the Acquiring Fund after the reorganization. You should retain this Proxy Statement/Prospectus for future reference. Additional information about the Target Fund, the Acquiring Fund and the proposed reorganization has been filed with the U.S. Securities and Exchange Commission (“SEC”) and can be found in the following documents: ● The Prospectus of the Omni Tax-Managed Small-Cap Value Fund dated October 31, 2022 , as supplemented , (the “Target Fund Prospectus”), which is incorporated by reference into and considered a part of this Proxy Statement/Prospectus. ● The Prospectus of the EA Bridgeway Omni Small-Cap Value ETF dated December 21, 2022 , (the “Acquiring Fund Prospectus”), accompanies this Proxy Statement/Prospectus and is also incorporated by reference into and considered a part of this Proxy Statement/Prospectus. ● A Statement of Additional Information (“SAI”) dated December 21, 2022, relating to this Proxy Statement/Prospectus, which has been filed with the SEC, is incorporated by reference into and considered a part of this Proxy Statement/Prospectus. i You may request a free copy of the Target Fund’s Prospectus and SAI dat […]  in the rest of this Proxy Statement/Prospectus, including the Plan (attached as Exhibit A) and the Acquiring Fund Prospectus (enclosed). What am I being asked to vote upon? Shareholders of the Target Fund are being asked to approve the Plan between Bridgeway Funds, on behalf of the Target Fund, and the ETF Trust, on behalf of the Acquiring Fund, that provides for: (1) the acquisition of the assets and the assumption of the liabilities of the Target Fund by the Acquiring Fund in exchange solely for shares of the Acquiring Fund, (2) the distribution of such shares to the shareholders of the Target Fund, and (3) the complete liquidation and dissolution of the Target Fund. The Target Fund, which is currently operated as a mutual fund, will be converted into an ETF through its reorganization (the “Reorganization”) into the newly-created Acquiring Fund, which is an ETF, that has the same investment objective and substantially similar principal investment strategies as the Target Fund. As an ETF, the Acquiring Fund’s shares will be traded on The NASDAQ Stock Market LLC (the “Nasdaq”). The Reorganization will be accomplished in accordance with the Plan. What will happen if shareholders approve the Plan? If the Target Fund’s shareholders vote to approve the Plan and all other closing conditions of the Reorganization under the Plan are satisfied or waived, then shareholders of the Target Fund will become shareholders of the Acquiring Fund on or about March 10, 2023, and will no longer be shareholders of the Target Fund. Shareholders of the Target Fund will be able to redeem their Target Fund shares prior to the closing of the Reorganization, which is expected to occur on or about March 10, 2023. Shareholders of the Target Fund will receive Acquiring Fund Shares with an equivalent aggregate NAV equal to the aggregate NAV of the shares of the Target Fund owned by such shareholders immediately prior to the Reorganization. If the Reorganization is approved and Target Fund shareholders receive Acquiring Fund shares, such shares will only be traded on the Nasdaq. In particular, the Plan provides that (1) the assets of the Target Fund will be acquired by the Acquiring Fund and the liabilities of the Target Fund will be assumed […] first $1 billion 0.42% on the next $1 billion 0.40% on assets above $2 billion For a more detailed comparison of the Funds’ fees and expenses, see the sections below titled “COMPARISONS OF SOME IMPORTANT FEATURES OF THE FUNDS ‒ What are the Funds’ investment management fee rates? ” and “ What are the fees and expenses of each Fund and what might they be after the Reorganization? ” Who will pay the costs in connection with the Reorganization? The estimated cost of the Reorganization is expected to be approximately $200,000. The cost of the Reorganization, including any costs directly associated with preparing, filing, printing and distributing to the shareholders of the Target Fund all materials relating to the Reorganization as well as the conversion costs associated with the Reorganization (but excluding brokerage costs, which are expected to be minimal, if any), will be borne by Bridgeway, the investment adviser for the Target Fund and sub-adviser for the Acquiring Fund, and EA Advisers, the investment adviser for the Acquiring Fund. Bridgeway and EA Advisers will share the costs of the Reorganization if the Reorganization is not consummated. 4 How do ETFs differ from mutual funds? The following are the material features of ETFs as compared to mutual funds: Transparency . The Acquiring Fund will be a transparent ETF that operates with full transparency to its portfolio holdings. Following the Reorganization, the Acquiring Fund, like other fully transparent ETFs, will make its portfolio holdings public each day. This holdings information, along with other information about the Acquiring Fund, will be available on the Acquiring Fund’s website at www.bridgewayetfs.com . A description of the Bridgeway Funds policies and procedures with respect to the disclosure of the Target Fund’s portfolio holdings is available in the Target Fund’s SAI, which is incorporated into this Proxy Statement/Prospectus by reference. Such disclosure is generally provided by the Target Fund quarterly, on a lag. The daily availability of the Acquiring Fund’s portfolio holdings information provides greater transparency to Acquiring Fund shareholders, including with respect to the Acquiring Fund’s NAV. Tax Efficiency . In a mutual fund, whe […] ial advisor or other financial intermediary for further information. What will happen if I don’t have a Brokerage Account that can accept ETF shares at the time of the Reorganization? If your shares are held in an account that cannot accept ETF shares you will need to contact your financial intermediary to set up a brokerage account that permits investments in ETF shares. If the Target Fund shares are not transferred into a brokerage account that can accept the Acquiring Fund Shares prior to the Reorganization, you will not receive the Acquiring Fund Shares as part of the Reorganization. Consequently, your investment will be liquidated and you will receive cash equal in value to the NAV of your Target Fund shares, which may be taxable. The conversion of Acquiring Fund Shares to cash may be subject to fees and expenses and will likely be a taxable event for shareholders who hold their shares in a taxable account. Shareholders should consult their tax advisors to determine the effect of such conversion. What if the Reorganization is approved by shareholders and I don’t want to hold ETF shares? If the Reorganization is approved and you do not want to receive ETF shares in connection with the Reorganization, you may redeem or exchange your Target Fund shares into another series of the Bridgeway Funds prior to the Reorganization. If a Target Fund shareholder redeems his or her shares or exchanges his or her shares into another series of the Bridgeway Funds and such shares are held in a taxable account, the shareholder will generally recognize a taxable gain or loss based on the difference between the Target Fund shareholder’s tax basis in the shares and the amount that the redeeming shareholder receives for them. 7 How will shareholder voting be handled? Shareholders who own shares of the Target Fund at the close of business on December 9, 2022 (the “Record Date”), will be entitled to vote at the Meeting, and each share (or fractional share) of the Target Fund outstanding as of the Record Date is entitled to a number of votes equal to the net asset value of that share (or fractional share) in U.S. dollars as of the Record Date. This method of voting is referred to as “dollar-weighted” voting. Approval of the Reorgan\n"

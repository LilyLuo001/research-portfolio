ows of\n   the Target/Acquiring fund table, a 4-fund filing yields 4 objects}, ... ]}\n  or the no_event object above.\nEach event object:\n  fund_name        target mutual fund's full name (from excerpt)\n  family           fund family/trust (from excerpt)\n  mutual_fund_ticker / etf_ticker\n                   a single 2-6 char UPPERCASE symbol from the excerpt, else \"NA\".\n                   NEVER a fund name. Multiple class tickers → \"NA\" and list them in evidence.\n  announce_date    YYYY-MM-DD only. Board-approval date if stated; else the document's own\n                   date; else the filed date. Vague (\"May 2020\",\"Q4 2026\") → \"NA\".\n  date_basis       \"board\" | \"document\" | \"filed\" | \"NA\"\n  effective_date   YYYY-MM-DD only; the stated closing/completion date. Vague → \"NA\".\n  asset_class      equity_US / equity_intl / fixed_income / other — ONLY if locatable in the\n                   excerpt (bond/muni/high-yield/MBS→fixed_income; International/EM/Asia→\n                   equity_intl; explicit US equity→equity_US; managed-futures/multi-asset/\n                   long-short→other). Name alone insufficient → \"NA\".\n  AUM_at_conversion_USD  number from excerpt or \"NA\"\n  source_accession copy from the 文件 line\n  confidence       H = fund identity + (announce or effective) with explicit basis;\n                   M = identity clear, dates partly missing/document-dated;\n                   L = identity inferred from title only\n  evidence         ≤25-word quote fragment supporting the verdict (for events: the words\n                   showing the acquirer is an ETF; for no_event: the words showing why not)\nNEED_HUMAN only when TWO date statements INSIDE THIS ONE EXCERPT contradict for the same\nfund: {\"NEED_HUMAN\": true, \"quotes\": [\"...\", \"...\"]}. Different filings never contradict.\nNever fill any field from memory — excerpt-locatable or \"NA\".\n\nSELF-CHECK before emitting (do this, don't print it): every input item id appears exactly\nonce in your answer map (count them); every event object quotes ETF-acquirer evidence;\nevery date matches ^\\d{4}-\\d{2}-\\d{2}$ or is \"NA\"; no ticker field contains a space.】\n文件: 0001379491-21-000368 (form 497, filed 2021-01-29, FIDELITY HASTINGS STREET TRUST  (CIK 0000035348))\nsource_url: https://www.sec.gov/Archives/edgar/data/35348/000137949121000368/filing906.htm\n节选:\n497 1 filing906.htm PRIMARY DOCUMENT Supplement to the Fidelity® Mega Cap Stock Fund Class A, Class M, Class C, Class I and Class Z August 29, 2020 Pros pectus The following information replaces similar information in the “Shareholder Information” section, under the heading “Converting Shares”. Conversion Feature. Effective June 21, 2021, after a maximum of eight years from the initial date of purchase, Class C shares convert automatically to Class A shares of a fund. Prior to June 21, 2021, after a maximum of 10 years from the initial date of purchase, Class C shares convert automatically to Class A shares of a fund. Conversion to Class A shares will be made at NAV. At the time of conversion, a portion of the Class C shares bought through the reinvestment of dividends or capital gains (Dividend Shares) will also convert to Class A shares. The portion of Dividend Shares that will convert is determined by the ratio of your converting Class C non-Dividend Shares to your total Class C non-Dividend Shares. A fund may convert shares sooner in certain circumstances. A shorter holding period may also apply depending on your intermediary. Please see \"Sales Charge Waiver Policies Applied by […] es purchased from the proceeds of redemptions within the same fund family, provided (1) the repurchase occurs within ninety (90) days following the redemption, (2) the redemption and purchase occur in the same account, and (3) redeemed shares were subject to a front-end or deferred sales load (i.e., right of reinstatement). • Employer-sponsored retirement plans (e.g., 401(k) plans, 457 plans, employer-sponsored 403(b) plans, profit sharing and money purchase pension plans and defined benefit plans). For purposes of this provision, employer-sponsored retirement plans do not include SEP IRAs, Simple IRAs, SAR-SEPs or Keogh plans. • Shares acquired through a right of reinstatement. • Class C shares that are no longer subject to a CDSC and are converted to Class A shares of the same fund pursuant to Janney’s policies and procedures. CDSC waivers on Class A and C shares available at Janney: • Shares sold upon the death or disability of the shareholder. • Shares sold as part of a systematic withdrawal plan as described in the fund's prospectus. • Shares sold in connection with a return of excess contributions from an IRA account. • Shares sold as part of a required minimum distribution for IRA and retirement accounts if the redemption is taken in or after the year the shareholder reaches qualified age based on applicable IRS regulations. • Shares sold to pay Janney fees but only if the transaction is initiated by Janney. • Shares acquired through a right of reinstatement. • Shares exchanged into the same share class of a different fund. Front-end sales charge* discounts available at Janney: breakpoints, rights of accumulation, and/or letters of intent: • Breakpoints as described in the fund's prospectus. • Rights of accumulation (ROA), which entitle shareholders to breakpoint discounts, will be automatically calculated based on the aggregated holding of fund family assets held by accounts within the purchaser’s household at Janney. Eligible fund family assets not held at Janney may be included in the ROA calculation only if the shareholder notifies his or her financial advisor about such assets. • Letters of intent which allow for breakpoint discounts based on anticipated purchases within a fund family, over a 13-mon […] ley Wealth Management: • Employer-sponsored retirement plans (e.g., 401(k) plans, 457 plans, employer-sponsored 403(b) plans, profit sharing and money purchase pension plans and defined benefit plans). For purposes of this provision, employer-sponsored retirement plans do not include SEP IRAs, Simple IRAs, SAR-SEPs or Keogh plans • Morgan Stanley employee and employee-related accounts according to Morgan Stanley's account linking rules • Shares purchased through reinvestment of dividends and capital gains distributions when purchasing shares of the same fund • Shares purchased through a Morgan Stanley self-directed brokerage account • Class C (i.e., level-load) shares that are no longer subject to a contingent deferred sales charge and are converted to Class A shares of the same fund pursuant to Morgan Stanley Wealth Management's share class conversion program • Shares purchased from the proceeds of redemptions within the same fund family, provided (1) the repurchase occurs within 90 days following the redemption, (2) the redemption and purchase occur in the same account, and (3) redeemed shares were subject to a front-end or deferred sales charge • Your financial intermediary, on your behalf, can also convert Class M shares to Class A shares of the same fund, without a sales charge and on a tax free basis, if they are held in a brokerage account. Oppenheimer & Co. (OPCO) Shareholders purchasing fund shares through an OPCO platform or account are eligible only for the following load waivers (front-end sales charge waivers and CDSC waivers) and discounts, which may differ from those disclosed elsewhere in a fund's prospectus or SAI. Front-end Sales Load Waivers on Class A Shares available at OPCO: • Employer-sponsored retirement, deferred compensation and employee benefit plans (including health savings accounts) and trusts used to fund those plans, provided that the shares are not held in a commission-based brokerage account and shares are held for the benefit of the plan • Shares purchased by or through a 529 Plan • Shares purchased through an OPCO affiliated investment advisory program • Shares purchased 
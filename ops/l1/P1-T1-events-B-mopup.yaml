he same portfolio of investments. Each class of shares has equal rights as to voting, redemption, dividends and liquidation, except that each bears different class expenses, including different distribution and service fees, and each has exclusive voting rights with respect to any distribution or service plan applicable to its shares. There are no conversion, preemptive or other subscription rights. In addition to the specific voting rights described above, shareholders of the Acquiring Fund are entitled, under current law, to vote with respect to certain other matters, including changes in fundamental investment policies and restrictions. Moreover, shareholders owning at least 10% of the outstanding shares entitled to vote may request that the Acquiring Fund Board call a special shareholders’ meeting to remove Trustees or for any other purpose. The Acquiring Fund Board has the right to establish additional series and classes of shares in the future, to change in any manner those series or classes and to determine the preferences, voting powers, rights and privileges thereof. Under Massachusetts law applicable to Massachusetts business trusts, shareholders of such a trust may, under certain circumstances, be held personally liable as partners for its obligations. However, the declaration of trust of NMT contains an express disclaimer of shareholder liability for acts or obligations of NMT and requires that notice of this disclaimer be given in each agreement, obligation or instrument entered into or executed by NMT or the trustees. NMT’s declaration of trust further provides for indemnification out of the assets and property of NMT for all losses and expenses of any shareholder held personally liable for the obligations of NMT. Thus, the risk of a shareholder incurring financial loss on account of shareholder liability […] of shareholders for the purpose of electing Trustees unless and until such time as required by law. Trustees are then elected by a plurality vote of the shareholders. A Trustee may be removed only 33 for cause and only by written instrument signed by at least two-thirds of the remaining Trustees, or by action of at least two-thirds of the outstanding shares. Issuance of Shares. Under each Trust’s Declaration of Trust, the Trustees are permitted to issue an unlimited number of shares for such consideration and on such terms as the Trustees may determine. Shareholders are not entitled to any preemptive rights or other rights to subscribe to additional shares, except as the Trustees may determine. Shares are subject to such other preferences, conversion, exchange or similar rights, as the trustees may determine. Series and Classes. Each Trust’s Declaration of Trust gives broad authority to the Trustees to establish series and classes in addition to those currently established and to determine the rights and preferences, conversion rights, voting powers, restrictions, limitations, qualifications or terms or conditions of redemptions of the shares of the series and classes. The Trustees are also authorized to terminate a series or a class without a vote of shareholders under certain circumstances. Amendments to Declarations of Trust. Amendments to each Trust’s Declaration of Trust generally require the consent of shareholders owning more than 50% of shares entitled to vote, voting in the aggregate and not by series or class, unless the amendment affects the holders of one or more series or classes of shares but not the holders of all outstanding series or classes of shares, in which case the holders of the affected series or classes of shares shall vote separately. Certain amendments may be made by the Trustees without a shareholder vote. Any amendment to the provisions relating to the qualification and number, term and election, resignation and removal, or certain other provisions regarding the Trustees contained in the applicable Trust’s Declaration of Trust requires the approval of two-thirds of the outstanding shares, voting in the aggregate and not by series or class, except to the extent that applicable law or the Declaration of Trust may require voting by series or class. Shareholder, Trustee and Officer Liability. Each Trust’s Declaration of Trust provides that shareholders have no personal liability for any debt or obligation of the Trust and require the Trust to indemnify a sharehold […] of the issued and outstanding shares of the Target Fund are, and as of the Closing will be, duly and validly issued, fully paid and non-assessable by the Target Fund (recognizing that under the laws of the Commonwealth of Massachusetts, Target Fund shareholders, under certain circumstances, could be held personally liable for the obligations of the Target Fund). All of the issued and outstanding shares of the Target Fund will, at the time of the Closing, be held by the persons and in A-6 the amounts set forth in the records of the Target Fund’s transfer agent as provided in Section 3.3. The Target Fund has no outstanding options, warrants, or other rights to subscribe for or purchase shares of the Target Fund, and no outstanding securities convertible into shares of the Target Fund. (l) At the Closing, the Target Fund will have good and marketable title to the Target Fund’s assets to be transferred to the Acquiring Fund pursuant to Section 1.2, and full right, power, and authority to sell, assign, transfer, and deliver such assets, and the Acquiring Fund will acquire good and marketable title thereto, subject to no restrictions on the full transfer thereof, including such restrictions as might arise under the Securities Act of 1933, as amended (the “1933 Act”), except those restrictions as to which the Acquiring Fund has received notice and necessary documentation at or prior to the Closing. (m) The execution, delivery and performance of this Agreement have been duly authorized by all necessary action on the part of the Target Fund, including the determinations of the Target Trust Board required by Rule 17a-8(a) under the 1940 Act. This Agreement constitutes a valid and binding obligation of the Target Fund, enforceable in accordance with its terms, subject as to enforcement, to bankruptcy, insolvency, reorganization, moratorium, and other laws relating to or affecting creditors’ rights and to general equity principles. (n) The information to be furnished by the Target Fund for use in any “no-action” letters, applications for orders, registration statements, proxy materials, and other documents that may be necessary in connection with the transactions contemplated herein shall be accurate and complete in all ma […] edge, no tax authority is currently auditing or preparing to audit the Acquiring Fund, and no assessment for taxes, interest, additions to tax or penalties has been asserted against the Acquiring Fund. (i) All of the issued and outstanding shares of the Acquiring Fund are, and, as of the Closing will be, duly and validly issued, fully paid and non-assessable by the Acquiring Fund (recognizing that under the laws of the Commonwealth of Massachusetts, Acquiring Fund shareholders, under certain circumstances, could be held personally liable for the obligations of the Acquiring Fund). The Acquiring Fund has no outstanding options, warrants, or other rights to subscribe for or purchase shares of the Acquiring Fund, and no outstanding securities convertible into shares of the Acquiring Fund. (j) The execution, delivery and performance of this Agreement have been duly authorized by all necessary action on the part of the Acquiring Fund, including the determinations of the Acquiring Trust Board required pursuant to Rule 17a-8(a) under the 1940 Act. This Agreement constitutes a valid and binding obligation of the Acquiring Fund, enforceable in accordance with its terms, subject as to enforcement, to bankruptcy, insolvency, reorganization, moratorium, and other laws relating to or affecting creditors’ rights and to general equity principles. (k) The Acquiring Fund Shares to be issued and delivered to the Target Fund for the account of Target Fund Shareholders pursuant to the terms of this Agreement will, at the Closing, have been duly authorized. When so issued and delivered, such Acquiring Fund Shares will be duly and validly issued shares of the Acquiring Fund and will be fully paid and non-assessable by the Acquiring Fund (recognizing that under the laws of the Commonwealth of Massachusetts, Acquiring Fund shareholders, under certain circumstances, could be held personally liable for the obligations of the Acquiring Fund). (l) The information to be furnished by the Acquiring Fund for use in any “no-action” letters, applications for orders, registration statements, proxy materials, and other documents that may be necessary in connection with the transactions contemplated herein shall be accurate and complete in all mat\n"

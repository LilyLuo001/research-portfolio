USTEE SHARE OWNERSHIP 60 2024 COMPENSATION TABLE 61 PRINCIPAL SHAREHOLDERS 62 POTENTIAL CONFLICTS OF INTEREST 78 PROXY VOTING POLICIES AND PROCEDURES 79 CODE OF ETHICS 79 PURCHASE OF SHARES (All Funds except Onchain Economy ETF) 79 AVAILABILITY OF DISCOUNTS (All Funds except Onchain Economy ETF) 79 VALUATION OF SHARES 80 EXCHANGE PRIVILEGE 83 CLASS CONVERSIONS ( All Funds except Onchain Economy ETF) 83 INVESTMENT PROGRAMS ( All Funds except Onchain Economy ETF) 83 TAXES 85 TAXATION OF THE FUNDS IN GENERAL 85 TAXATION OF THE FUNDS' INVESTMENTS 86 TAXATION OF U.S. INVESTORS 89 TAXATION OF NON-U.S. INVESTORS 91 FOREIGN ACCOUNT TAX COMPLIANCE ACT 91 ADDITIONAL PURCHASE AND REDEMPTION INFORMATION (All Funds except Onchain Economy ETF) 92 DESCRIPTION OF THE TRUST 92 ADDITIONAL INFORMATION 93 FINANCIAL STATEMENTS 93 i LICENSING AGREEMENTS AND DISCLAIMERS 93 APPENDIX A: VEAC AND VEARA PROXY VOTING POLICIES A- 1 ii STATEMENT OF ADDITIONAL INFORMATION MAY 1, 2025, as revised on MAY 13, 2025 GENERAL INFORMATION The Trust is an open-end management investment company organized as a business trust under the laws of the Commonwealth of Massachusetts on April 3, 1985. On May 1, 2016, Van Eck Funds changed its name to VanEck Funds. The Trust’s series which are currently being offered are the following: Emerging Markets Fund, which offers Class A, Class I, Class Y and Class Z shares; International Investors Gold Fund, which offers Class A, Class C, Class I and Class Y shares; CM Commodity Index Fund, Global Resources Fund (formerly, Global Hard Assets Fund prior to May 1, 2021), and Emerging Markets Bond Fund, each of which offers Class A, Class I and Class Y shares; and VanEck Morningstar Wide Moat Fund which offers Class I and Class Z shares. Additionally, Onchain Economy ETF, a series of the Trust, commenced operations on or about the […] will remain subject to certain CFTC-mandated disclosure, reporting and recordkeeping regulations with respect to the Onchain Economy ETF and the Onchain Subsidiary. Compliance with the CFTC regulations could increase the Onchain Economy ETF’s expenses, adversely affecting the Onchain Economy ETF’s total return. CONCENTRATION To the extent that the Wide Moat Index is concentrated in a particular sector or sectors or industry or group of industries, VanEck Morningstar Wide Moat Fund will be subject to the risk that economic, political or other conditions that have a negative effect on that sector or industry may negatively impact the Fund to a greater extent than if the Fund’s assets were invested in a wider variety of sectors or industries. CONVERTIBLE SECURITIES The Funds may invest in securities that are convertible into common stock or other securities of the same or a different issuer or into cash within a particular period of time at a specified price or formula. Convertible securities are generally fixed income securities (but may include preferred stock) and generally rank senior to common stocks in a corporation’s capital structure and, therefore, entail less risk than the corporation’s common stock. The value of a convertible security is a function of its “investment value” (its value as if it did not have a conversion privilege), and its “conversion value” (the security’s worth if it were to be exchanged for the underlying security, at market value, pursuant to its conversion privilege). To the extent that a convertible security’s investment value is greater than its conversion value, its price will generally be primarily a reflection of such investment value and its price will be likely to increase when interest rates fall and decrease when interest rates rise, as with a fixed-income security (the credit standing of the issuer and other factors may also have an effect on the convertible security’s value). If the conversion value exceeds the investment value, the price of the convertible security will generally rise above its investment value and, in addition, will generally sell at some premium over its conversion value. (This premium represents the price investors are willing to pay for the privilege of purchasing a fixed-income security with a possibility of capital appreciation due to the conversion privilege.) At such times, the price of the convertible security will tend to fluctuate directly with the price of the underlying equity security. Convertible securities may be purchased by the Funds at varying price levels above their investment values and/or their conversion values in keeping with the Funds’ objectives. 4 CREDIT Credit risk is the risk that the issuer or guarantor of a debt security or the counterparty to an over-the-counter (“OTC”) contract (including many derivatives) will be unable or unwilling to make timely principal, interest or settlement payments or otherwise honor its obligations. The Funds invest in debt securities that are subject to varying degrees of risk that the issuers of the securities will have their credit ratings downgraded or will default, potentially reducing the value of the securities. A Fund may enter into financial transactions that involve a limited number of counterparties, which may increase the Fund’s exposure to credit risk. The Fund does not specifically limit its credit risk with respect to any single counterparty. Further, there is a risk that no suitable counterparties will be willing to enter into, or continue to enter into, transactions with the Fund and, as a result, the Fund may not be able to achieve its investment objective. CURRENCY FORWARDS A currency forward transaction is a contract to buy or sell a specified quantity of currency at a specified date in the future at a specified price which may be any fixed number of days from the date of the contract agreed upon by the parties. Currency forward contracts may be used to increase or reduce exposure to currency price movements. The use of currency forward transactions involves certain risks. For example, if the counterparty und […] ore strongly than its bonds, other debt and preferred stock to actual or perceived changes in the company’s financial condition or prospects. Stocks of smaller companies may be more vulnerable to adverse developments than those of larger companies. Stocks of companies that the portfolio manager believes are fast-growing may trade at a higher multiple of current earnings than other stocks. The value of such stocks may be more sensitive to changes in current or expected earnings than the values of other stocks. Different types of equity securities provide different voting and dividend rights and priority in the event of the bankruptcy and/or insolvency of the issuer. In addition to common stock, equity securities may include preferred stock, convertible securities and warrants, which are discussed elsewhere in the Prospectus and this Statement of Additional Information. Equity securities other than common stock are subject to many of the same risks as common stock, although possibly to different degrees. Environmental, social and governance (“ESG”) considerations, may be utilized as a component of a Fund’s investment process to implement its investment strategy in pursuit of its investment objective. ESG factors may be incorporated to evaluate an issuer, as part of risk analysis, opportunity analysis, or in other manners. ESG factors may vary across types of investments and issuers, and not every ESG factor may be identified or evaluated. The incorporation of ESG factors may affect a Fund’s exposure to certain issuers or industries and may not work as intended. A Fund may underperform other funds that do not assess an issuer’s ESG factors as part of the investment process or that use a different methodology to identify and/or incorporate ESG factors. Because ESG considerations may be used as one part of an overall investment process, a Fund may still invest in securities of issuers that are not considered ESG-focused or that may be viewed as having a high ESG risk profile. As investors can differ in their views regarding ESG factors, a Fund may invest in issuers that do not reflect the views with respect to ESG of any particular investor. Information used by a Fund to evaluate such factors, including information  […]  FOREIGN SECURITIES Foreign securities include securities issued by a foreign government, quasi-government or corporate entity, traded in foreign currencies or issued by companies with most of their business interests in foreign countries. Investors should recognize that investing in foreign securities involves certain special considerations that are not typically associated with investing in United States securities. Since investments in foreign companies frequently involve currencies of foreign countries, and since the Funds may hold securities and funds in foreign currencies, the Funds may be affected favorably or unfavorably by changes in currency rates and in exchange control regulations, if any, and may incur costs in connection with conversions between various currencies. Most foreign stock markets, while growing in volume of trading activity, have less volume than the New York Stock Exchange (“NYSE”), and securities of some foreign companies may be less liquid and more volatile than securities of comparable domestic companies. Similarly, volume and liquidity in most foreign bond markets may be less than in the United States, and at times volatility of price can be greater than in the United States. Fixed commissions on foreign securities exchanges are generally higher than negotiated commissions on United States exchanges. There is generally less government supervision and regulation of securities exchanges, brokers and listed companies in foreign countries than in the United States. In addition, with respect to certain foreign countries, there is the possibility of exchange control restrictions, expropriation or confiscatory taxation, political, economic or social instability, which could affect investments in those countrie
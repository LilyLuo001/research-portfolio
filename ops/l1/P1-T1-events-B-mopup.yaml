Core Fund) 100 Independence, 610 Market Street Philadelphia, Pennsylvania 19106-2354 800 523-1918 IMPORTANT SHAREHOLDER INFORMATION This Information Statement/Prospectus is being provided to inform you that each of Nomura Strategic Income Fund and Nomura Smid Cap Core Fund (each, an Acquired Fund” and together, the “Acquired Funds”) will be converted into a corresponding exchange-traded fund (“ETF”) through the reorganization of each Acquired Fund into a newly created ETF (each, an “Acquiring Fund” and together, the “Acquiring Funds”) as follows (each, a “Reorganization” and together, the “Reorganizations”): Acquired Funds Acquiring Funds Nomura Strategic Income Fund, a series of Delaware Group Government Fund Nomura Strategic Income ETF, a series of Nomura ETF Trust II (formerly, Voyageur Insured Funds) Nomura Smid Cap Core Fund, a series of Ivy Funds Nomura Small and Mid Cap ETF, a series of Nomura ETF Trust II Delaware Group Government Fund, Ivy Funds, and Nomura ETF Trust II are hereinafter referred to each as a “Trust,” and collectively, the “Trusts”. Following the Reorganizations, each Acquired Fund will continue to be managed by Delaware Management Company (“DMC” or the “Manager”) and for Nomura Strategic Income ETF, Nomura Corporate Research and Asset Management (“Sub-Advisor”) will continue to serve as a sub-advisor. The Information Statement/Prospectus discusses the Reorganizations and provides you with information that you should consider. The Board of Trustees of each Trust (each, a “Board” and together, the “Boards”) approved each Reorganization and concluded that each Reorganization is in the best interests of the Acquired Fund, the corresponding Acquiring Fund, and their shareholders. Please review the information in the Information Statement/Prospectus. No shareholder vote is required to complete the Reorganizations. We are not asking you for a proxy and you are not requested to send us a proxy. Pursuant to an Agreement and Plan of Reorganization (“Plan”), a form of which is attached as Appendix A thereto, each Acquired Fund will be converted into the corresponding Acquiring Fund, which is a newly created series of Nomura ETF Trust II and that has the same respective investment objective(s) and investment strategies as its corresponding Acquired Fund. The Reorganizations will take place on or about November 6, 2026 (“Reorganization Date”). On the Reorganization Date, shareholders who hold their shares of an Acquired Fund through a brokerage account that can accept shares of an ETF will receive ETF shares of the corresponding Acquiring Fund equal in value to your shares of the Acquired Fund(s) at net asset value and cash in lieu of fractional shares, if any. Any cash payment may be taxable. Interests of shareholders will not be diluted as a result of the Reorganizations. We believe the Reorganizations will result in multiple benefits for investors. The Board of each Trust, each of which is comprised of the same members, has approved the applicable Reorganization based on its determination that it is in the best interest of the shareholders of the respective Acquired Fund. Expected benefits include: 1) Lower Expenses : Upon the closing of each Reorganization, total annual fund operating expenses of each Acquiring Fund are expected to be lower than the total annual fund operating expenses of each share class of its corresponding Acquired Fund, after taking into consideration any fees waived and/or expenses reimbursed pursuant to expense limitation agreements agreed to by DMC. 2) Increased Transparency : As  […]  Acquiring Fund shareholders a greater ability to adjust their investment allocations based on developments that may occur throughout a trading day. 4) Enhanced Tax Efficiency : Reorganizing Nomura Smid Cap Core Fund into Nomura Small and Mid Cap ETF, which generally expects to effect its creations and redemptions in-kind, has the potential to reduce capital gains distributions and improve tax efficiency. Because Nomura Strategic Income ETF generally expects to effect its creations and redemptions fully or partially in cash, it will not benefit from the enhanced tax efficiency of the ETF structure to the same extent as Nomura Small and Mid Cap ETF. 5) Tax-Free Reorganization : Shareholders will not recognize a taxable gain (or loss) on the conversion of mutual fund to ETF shares for U.S. tax purposes. An exception, albeit small, regarding fractional mutual fund shares is explained in later sections of this document. The Reorganizations will subject investors to certain ETF-specific risks, including: the risk that shares of an Acquiring Fund will trade at market prices that may be above (premium) or below (discount) the Acquiring Fund’s NAV; the risk that an Acquiring Fund’s creation and redemption transactions may be concentrated in a small number of financial institutions known as “authorized participants”; and the risk that such authorized participants may not engage in creation or redemption transactions, which could cause the Acquiring Fund’s shares to trade at a discount to NAV and possibly face trading halts and/or delisting, or that a secondary trading market may not develop. These risks are described more fully in the Information Statement/Prospectus. Following the Reorganizations, shareholders may bear certain costs with respect to maintaining brokerage accounts and buying and selling Acquiring Fund shares in the secondary market; shareholders currently do not bear such costs as shareholders of the Acquired Funds. Shareholders will need brokerage accounts with the ability to transact in ETF shares in connection with the Reorganization. The IMPORTANT NOTICE ABOUT YOUR ACQUIRING FUND(S) ACCOUNT that follows includes a description of required actions for shareholders who hold shares of the Acquired Funds  […] omplete the Reorganizations. You are encouraged to carefully review the additional information provided in this Information Statement/Prospectus. If you have any questions, please call 800-523-1918. ii COMMON QUESTIONS AND ANSWERS ABOUT THE PROPOSED REORGANIZATIONS We recommend that you read the complete Information Statement/Prospectus. This section contains a brief Q&A which will help explain each Reorganization, including the reasons for each Reorganization. Following this section is a more detailed discussion. Q. What is happening to the Nomura Strategic Income Fund and Nomura Smid Cap Core Fund? Why am I receiving an Information Statement/Prospectus? A. The Acquired Funds, both of which currently operate as a mutual fund, will each be converted into an ETF through the reorganization of each Acquired Fund into a newly-created series of Nomura ETF Trust II (“ETF Trust”). Nomura Strategic Income Fund and Nomura Strategic Income Fund will be reorganized into Nomura Strategic Income ETF and Nomura Small and Mid Cap ETF, respectively. Each Acquiring Fund has the same investment objective and investment strategies as the corresponding Acquired Fund. As ETFs, the Acquiring Funds’ shares will be traded on NYSE Arca, Inc. (“NYSE Arca”) following the Reorganizations. Each Reorganization will be accomplished in accordance with the Plan. Under the Plan, all of the assets and liabilities of each Acquired Fund will be transferred to its corresponding newly-created Acquiring Fund, in exchange for ETF shares of the Acquiring Fund of equivalent aggregate NAV (including, in the case of fractional shares, cash). Because shares of each Acquiring Fund are not issued in fractional shares, cash will be paid to some shareholders in lieu of fractional shares of the Acquiring Fund, for which cash payment may be taxable. The amount of cash received for the fractional shares combined with the Acquiring Fund ETF shares you receive will have the same value as your shares of an Acquired Fund on the Reorganization Date. Shares of an applicable Acquiring Fund will be transferred to each applicable shareholder’s brokerage account. If a shareholder does not hold shares of an Acquired Fund through a brokerage account that can accept shares of the corresponding Acquiring Fund on the Reorganization Date, the shares will be held by a stock transfer agent until a brokerage account is identified or the account is converted to cash (subject to applicable federal or state laws concerning unclaimed property). The IMPORTANT NOTICE ABOUT YOUR ACQUIRING FUND(S) ACCOUNT, beginning on page [vii], provides important information about actions to take with respect to your account in order to ensure the seamless transition from holding shares of an Acquired Fund to holding ETF shares of the corresponding Acquiring Fund. Q. Has the Board of each Acquired Fund approved the Reorganization? A. Yes, the Board of the Delaware Group Government Fund, which oversees the Nomura Strategic Income Fund, and the Board of Ivy Funds (together with Delaware Group Government Fund, the “Acquired Trusts”), which oversees the Nomura Smid Cap Core Fund, approved each corresponding Reorganization. The Boards of the Acquired Trusts, including all of the Trustees who are not “interested persons” of the respective Acquired Fund (as defined in the Investment Company Act of 1940, as amended (the “1940 Act”)) (the “Independent Trustees”), determined that the applicable Reorganization is in the best interests of the corresponding Acquired Fund and its shareholders and that the applicable Acquired Fund’s shareholders’ interests will not be diluted as a result of the corresponding Reorganization. Q. What information did each Acquired Fund’s Board consider when evaluating the Reorganization? A. Each Acquired Fund Board considered the Reorganization proposed by Management and approved the Plan with respect to each Acquired Fund.  […] letion of the Reorganizations, you will own shares of the Acquiring Fund(s) offered as an ETF having an aggregate NAV equal to the aggregate NAV of the shares of the Acquired Fund(s) you owned when the Reorganizations happened, less any cash received in lieu of fractional shares. Shares of the Acquiring Funds are not issued in fractional shares. As a result, shareholders who hold fractional shares of the Acquired Funds may have such fractional shares redeemed at NAV on the Reorganization Date resulting in a small cash payment, which would be taxable. If you do not have a brokerage account that can accept shares of the Acquiring Fund, the shares will be held by a stock transfer agent until a brokerage account is identified or the account is converted to cash (subject to applicable federal or state laws concerning unclaimed property). After the Reorganizations, individual shares of the Acquiring Funds may only be purchased and sold on NYSE Arca, other national securities exchanges, electronic crossing networks and other alternative trading systems. Should you decide to purchase or sell shares in the Acquiring Funds after the Reorganizations, you will need to place a trade through a broker who will execute your trade on an exchange at prevailing market prices. Because Acquiring Fund shares trade at market prices rather than at NAV, Acquiring Fund shares may trade at a price less than (a discount) or greater than (a premium) the Fund’s NAV. As with all ETFs, your broker may charge a commission for purchase and sales transactions, although ETFs trade with no transaction fees (“NTF”) on many platforms. Q. Am I being asked to vote on the Reorganizations? A. No. Shareholders of the Acquired Funds are not required to approve their respective Reorganization(s) under state or federal law, the 1940 Act, or the organizational documents governing the corresponding Acquired Fund(s). We are not asking you for a proxy and you are requested not to send us a proxy. Q. Will the Reorganizations affect the way my investments are managed? A. No. DMC is the investment adviser to each of the Acquired Funds and will continue to serve as the investment adviser to each of the Acquiring Funds. The Sub-Advisor is the sub-advisor to Nomura S\n"

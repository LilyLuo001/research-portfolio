astructure Fund’s net assets, plus borrowings for investment purposes, may include infrastructure-related debt securities of U.S. and non-U.S. issuers (including municipal, corporate debt obligations and asset-backed securities), energy-related infrastructure companies organized as master limited partnerships (“MLPs”), common stock and convertible securities. The Fund’s common stock investments may consist of exchange-listed equities from companies across various industries, sectors and market capitalizations. Under normal market conditions, the Fund will invest at least 40% of its net assets, plus the amount of any borrowings for investment purposes, in securities of companies organized or located in at least three non-U.S. countries. Although the Fund may invest in emerging market securities without limit, under normal market conditions, the non-U.S. companies in which the Fund currently intends to invest will be organized or located primarily in developed market countries, such as Japan, Spain, Canada, and the United Kingdom. The Fund may also engage in transactions in foreign currencies. The Fund’s investments in securities of foreign issuers may include sponsored or unsponsored depositary receipts for such securities, such as American Depositary Receipts (“ADRs”) and Global Depositary Receipts (“GDRs”). The Fund intends to generally maintain a fully-invested posture, and, as such, cash will typically be held to a minimum. However, significant client inflows may temporarily increase cash positions. The Fund may engage in frequent or active trading of its portfolio securities depending on market conditions, which may potentially result in a higher portfolio turnover rate and cause the Fund to incur related increased transaction costs, including brokerage commissions. In selecting investments for the Fund […]  facility, such as local business or economic conditions, could have a significant effect on the project’s ability to make payments of principal and interest on these securities. From time to time Congress has enacted legislation for the purpose of restricting or eliminating the federal income tax exemption for interest on Municipal Obligations. Liquidity Risk . Liquidity risk occurs when an investment becomes difficult to purchase or sell. Some assets held by the Fund may be impossible or difficult to sell, particularly during times of market turmoil. The Fund may also face liquidity risk as a result of, among other factors, low trading volumes, legal or contractual restrictions on resale, and substantial redemptions of the Fund’s shares. Convertible Securities Risk . The market value of a convertible security performs like that of a regular debt security; that is, if market interest rates rise, the value of a convertible security usually falls. In addition, convertible securities are subject to the risk that the issuer will not be able to pay interest or dividends when due, and their market value may change based on changes in the issuer’s credit rating or the market’s perception of the issuer’s creditworthiness. Since it derives a portion of its value from the common stock into which it may be converted, a convertible security is also subject to the same types of market and issuer risks that apply to the underlying common stock. MLP Investment Risk . An MLP that invests in a particular industry ( e.g ., oil, gas and consumable fuels) may be adversely affected by detrimental economic events within that industry. As a partnership, an MLP may be subject to less regulation (and less protection for investors) under state laws than corporations. In addition, MLPs may be subject to state taxation in certain jurisdictions, which may reduce the amount of income an MLP pays to its investors, such as the Fund. Investment Adviser Risk. Centre’s implementation of the Fund’s strategy may fail to produce the intended results. Centre’s ability to choose suitable investments has a significant impact on the ability of the Fund to achieve its investment objectives. Portfolio Turnover Risk . Centre sells portfolio securities when it believes that it is in the interests of the Fund and its shareholders to do so. Tax consequences are considered; however, the decision to sell a security is first and foremost an investment-driven one. As portfolio turnover may involve paying brokerage commissions and other transaction costs, there could be additional expenses for the Fund. High rates of portfolio turnover may also result in 13 the realization of short-term capital gains and losses. Any distributions resulting from such gains will be considered ordinary income for federal income tax purposes. Political […] s, the condition that all of the representations and warranties are true and correct in all material respects and certain opinions of legal counsel have been received. Termination . The Plan may be terminated and the Reorganization may be abandoned at any time prior to the Closing, (i) by a Fund if any conditions precedent to the obligations of the Fund have not been satisfied; or (ii) by the mutual consent of the parties. B. Description of Infrastructure Fund Shares Each Infrastructure Fund share issued to shareholders of the Dividend Value Fund in connection with the Reorganization will be duly authorized, validly issued, fully paid and nonassessable when issued, and will be transferable without restriction and will have no preemptive or conversion rights. The Infrastructure Fund shares will be sold and redeemed based upon the net asset value of the Fund next determined after receipt of the purchase or redemption request. C. Reasons for the Reorganization Considered by the Board As noted above, at a meeting of the Board held on April 5, 2019, the Adviser recommended, and the Board considered, the proposed Reorganization. The Adviser’s reasons for proposing the Reorganization, and the Board’s consideration of the Reorganization, are described below. · The Dividend Value Fund has not achieved economies of scale, and a decrease in asset growth in recent years makes achieving economies of scale in the future unlikely; and · The Adviser’s strategic business decision to terminate that portion of its business relating to the management of the Dividend Value Fund. In determining to recommend that the shareholders of the Dividend Value Fund approve the Reorganization, the Board considered, among others, the factors described below: · the Adviser’s reasons for proposing the Plan (and the Reorganization provided for therein), including the Adviser’s strategic business decision to exit the mutual fund space and to focus its resources on its other lines of business; · the terms and conditions of the Plan and the Reorganization, which the Board determined to be not disadvantageous to the Dividend Value Fund and its shareholders; 19 · that the Adviser and Centre will pay all costs and expenses related to the Reorganization, […]  established by, and under the direction of, the Trustees. In valuing the Fund’s total assets, portfolio securities are generally valued at their market value. Securities and assets for which representative market quotations are not readily available are valued at fair value as determined in good faith under policies approved by the Trustees. 24 F. Share Classes; Minimum Investment Amounts; Purchase and Redemption Procedures; Exchange Privileges; and Frequent Trading Dividend Value Fund For a discussion of the Dividend Value Fund’s shares, including how the shares may be purchased and redeemed, please see the Dividend Value Fund’s prospectus dated September 1, 2018, as amended or supplemented. Infrastructure Fund 1. Share Classes and Class Conversion Features Share Classes. The Fund offers two classes of shares: Investor Class shares and Institutional Class shares. Each share class represents an ownership interest in the same investment portfolio as the other class of shares of the Fund. Each class has its own expense structure. Investor Class shares of the Fund are subject to the Rule 12b-1 Plan, pursuant to which the Fund pays distribution and/or shareholder servicing fees of up to 0.25% per year to those intermediaries offering Investor Class shares and providing other services to Investor Class shareholders. Institutional Class shares are available without a Rule 12b-1 fee to those investors eligible to purchase such shares. Centre Funds has also adopted a shareholder services plan for certain non-distribution shareholder services provided by financial intermediaries. The shareholder services plan authorizes annual payment of up to 0.15% of the average daily net assets attributable to Investor Class shares of the Fund, and up to 0.10% of the average daily net assets attributable to Institutional Class shares of the Fund. Neither class of shares is subject to a sales charge. When choosing a class of shares of the Fund, investors should consider the size of their investment and how long they plan to hold the shares. An investor’s financial consultant or other financial intermediary can help the investor determine which share class is best suited to the investor’s personal financial goals. Investors who qualif\n"

 minimum or maximum allocation of the Fund’s portfolio assets to each sub-advisor. Under normal market conditions, the Equity Fund invests at least 80% of its net assets, plus the amount of any borrowings for investment purposes, in equity securities. Equity securities in which the Equity Fund may invest include common stocks, preferred stocks and convertible debt securities, which may be converted on specified terms into stock of the issuer. Concentration of investments in certain sectors – including, but not limited to, the communications services, consumer discretionary, financial, healthcare and technology sectors – may occur from time to time as a result of the implementation of the Equity Fund’s investment strategy by the sub-advisors. The Fund invests primarily in the securities of large-, mid- and small-sized U.S. companies, as measured by market capitalization at the time of acquisition, although the managers also have flexibility to invest in the securities of foreign companies. Up to 50% of the Equity Fund’s net assets may be invested in foreign equity securities, which may include emerging markets. iM Global defines an emerging market country as any country that is included in the MSCI Emerging Markets Index. Each sub-advisor uses its own discretion to invest in any sized company it deems appropriate. By executing its investment strategy, the Equity Fund seeks to: • combine the efforts of several experienced, high quality managers; • access the favorite stock-picking ideas of each manager at any point in time; • deliver a portfolio that is prudently diversified in terms of stocks (typically 60 to 100) and industries while allowing each manager to run a portion of the portfolio focused on only its favorite stocks; and • further diversify across different-sized companies and stock-picking styles by incorporating managers with a variety of stock-picki […] me or all of these risks may adversely affect the Equity Fund’s net asset value per share, total return and/or ability to meet its objective. • Equity Securities Risk . This is the risk that the value of equity securities may fluctuate, sometimes rapidly and unpredictably, due to factors affecting the general market, an entire industry or sector, or particular companies. These factors include, without limitation, adverse changes in economic conditions, the general outlook for corporate earnings, interest rates or investor sentiment; increases in production costs; and significant management decisions. This risk is greater for small- and medium-sized companies, which tend to be more vulnerable to adverse developments than larger companies. • Convertible Securities Risk . This is the risk that the market value of convertible securities may fluctuate due to changes in, among other things, interest rates; other general economic conditions; industry fundamentals; market sentiment; the issuer’s operating results, financial statements, and credit ratings; and the market value of the underlying common or preferred stock. • Market Risk. As with all mutual funds that invest in common stocks, the value of an individual’s investment will fluctuate daily in response to the performance of the individual stocks held in the Equity Fund. The stock market has been subject to significant volatility recently, which has increased the risks associated with an investment in the Equity Fund. • Public Health Emergency Risk . This is the risk that pandemics and other public health emergencies, including outbreaks of infectious diseases such as the current outbreak of the novel coronavirus (“COVID-19”), can result, and in the case of COVID-19 has resulted and may continue to result, in market volatility and disruption, and materially and adversely impact economic conditions in ways that cannot be predicted, all of which could result in substantial investment losses. The ultimate impact of COVID-19, including new variants of the underlying virus, or other health emergencies on global economic conditions and businesses is impossible to predict accurately. Ongoing and potential additional material adverse economic effects of indeterminate duration and severity are possible. The resulting adverse impact on the va […] ty strategy that allows tactical investments throughout the capital structure (stocks and bonds), asset classes, market capitalization, industries and geographies, (4) a long/short credit strategy, and (5) a strategic alpha strategy that focuses on the tactical allocation of long and short global fixed income opportunities and currencies. iM Global may hire sub-advisors that focus on other strategies in the future, and not all strategies that may be appropriate will be represented in the Alternative Strategies Fund’s portfolio at all times. The sub-advisor that manages the arbitrage strategy seeks to generate long-term returns of at least mid-single-digits with low correlation to the equity and bond markets and may follow merger arbitrage, convertible arbitrage and capital structure arbitrage strategies. This objective is pursued by investing in equity and debt securities of U.S. and non-U.S. companies that are impacted by corporate events such as mergers, acquisitions, restructurings, refinancings, recapitalizations, reorganizations or other special situations. The sub-advisor that manages the opportunistic income strategy allocates investments to fixed income instruments and other investments with no limit on the duration of the portfolio. The sub-advisor may invest in, without limitation, asset-backed securities; domestic and foreign corporate bonds, including high-yield bonds; municipal bonds; bonds or other obligations issued by domestic or foreign governments, including emerging markets countries; real estate investment trust (“REIT”) debt securities; and mortgage related securities. iM Global defines an emerging market country as any country that is included in the MSCI Emerging Markets Index. When investing in mortgage-related securities, the sub-advisor may invest in obligations issued or guaranteed by agencies or instrumentalities of the U.S. Government; collateralized mortgage obligations (“CMOs”) issued by domestic or foreign private issuers that represent an interest in or are collateralized by mortgage related securities issued by agencies or instrumentalities of the U.S. Government; commercial mortgage backed securities (“CMBS”); obligations issued by private issuers that represent an interest in […] te duration and credit beta exposure. Correlations to systematic market risks including high yield and equity market returns are expected to be minimal, and strategy returns are not expected to be correlated to the returns of other active strategies. The portfolio is managed with the intention that the sensitivity of the long portfolio to market-wide credit spread movements will be offset in part by the sensitivities of the short portfolio to such market-wide movements. The sub-advisor may invest in corporate bonds issued by domestic and non-U.S. based companies, U.S. Treasury securities and long (sold protection) single name credit default swaps (CDS), interest rate futures and swaps and foreign exchange forwards (for hedging and currency conversion purposes). The short portfolio may be invested in short (bought protection) single name Credit Default Swap (CDS), short positions in Credit Default Indices (CDX Indices), and short positions in Total Return Swaps (TRS). The sub-advisor that manages the strategic alpha strategy seeks to achieve positive total returns over a full market cycle with relatively low volatility. The sub-advisor intends to pursue its objective by utilizing a flexible investment approach that allocates investments across a global range of investment opportunities related to credit, currencies and interest rates, while employing risk management strategies designed to mitigate downside risk. Under normal market conditions, the sub-advisor may invest (1) up to 75% of the total assets allocated to it in below investment-grade fixed income securities and related derivatives; (2) up to 75% of the total assets allocated to it in investments denominated in non-U.S. currencies and related derivatives, including up to 50% in investments denominated in emerging market currencies and related derivatives; and (3) up to 20% of the total assets allocated to it in equity related securities and derivatives as measured at time of allocation. A “related derivative” of a financial instrument means any derivative whose value is based upon or derived from that financial instrument or a related derivative of that financial instrument. The sub-advisor incorporates systematic and quantitative models into its inves\n"

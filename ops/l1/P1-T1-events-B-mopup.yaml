ows of\n   the Target/Acquiring fund table, a 4-fund filing yields 4 objects}, ... ]}\n  or the no_event object above.\nEach event object:\n  fund_name        target mutual fund's full name (from excerpt)\n  family           fund family/trust (from excerpt)\n  mutual_fund_ticker / etf_ticker\n                   a single 2-6 char UPPERCASE symbol from the excerpt, else \"NA\".\n                   NEVER a fund name. Multiple class tickers → \"NA\" and list them in evidence.\n  announce_date    YYYY-MM-DD only. Board-approval date if stated; else the document's own\n                   date; else the filed date. Vague (\"May 2020\",\"Q4 2026\") → \"NA\".\n  date_basis       \"board\" | \"document\" | \"filed\" | \"NA\"\n  effective_date   YYYY-MM-DD only; the stated closing/completion date. Vague → \"NA\".\n  asset_class      equity_US / equity_intl / fixed_income / other — ONLY if locatable in the\n                   excerpt (bond/muni/high-yield/MBS→fixed_income; International/EM/Asia→\n                   equity_intl; explicit US equity→equity_US; managed-futures/multi-asset/\n                   long-short→other). Name alone insufficient → \"NA\".\n  AUM_at_conversion_USD  number from excerpt or \"NA\"\n  source_accession copy from the 文件 line\n  confidence       H = fund identity + (announce or effective) with explicit basis;\n                   M = identity clear, dates partly missing/document-dated;\n                   L = identity inferred from title only\n  evidence         ≤25-word quote fragment supporting the verdict (for events: the words\n                   showing the acquirer is an ETF; for no_event: the words showing why not)\nNEED_HUMAN only when TWO date statements INSIDE THIS ONE EXCERPT contradict for the same\nfund: {\"NEED_HUMAN\": true, \"quotes\": [\"...\", \"...\"]}. Different filings never contradict.\nNever fill any field from memory — excerpt-locatable or \"NA\".\n\nSELF-CHECK before emitting (do this, don't print it): every input item id appears exactly\nonce in your answer map (count them); every event object quotes ETF-acquirer evidence;\nevery date matches ^\\d{4}-\\d{2}-\\d{2}$ or is \"NA\"; no ticker field contains a space.】\n文件: 0001144204-19-019077 (form 497, filed 2019-04-10, MAINSTAY FUNDS TRUST  (CIK 0001469192))\nsource_url: https://www.sec.gov/Archives/edgar/data/1469192/000114420419019077/tv518548_497.htm\n节选:\n497 1 tv518548_497.htm 497 MAINSTAY FUNDS TRUST MAINSTAY RETIREMENT 2010 FUND MAINSTAY RETIREMENT 2020 FUND MAINSTAY RETIREMENT 2030 FUND MAINSTAY RETIREMENT 2040 FUND MAINSTAY RETIREMENT 2050 FUND MAINSTAY RETIREMENT 2060 FUND 51 MADISON AVE NEW YORK, NEW YORK 10010 April 10, 2019 Dear Shareholder: The Board of Trustees of MainStay Funds Trust (the “Board”) has approved an Agreement and Plan of Reorganization for each of the mutual funds listed above (each, an “Acquired Fund,” and, collectively, the “Acquired Funds”), each a series of MainStay Funds Trust, providing for the acquisition of the assets and the assumption of the liabilities of each Acquired Fund by its corresponding Acquiring Fund, as shown below, each a series of MainStay Funds Trust, in exchange for shares of the corresponding Acquiring Fund, followed by the complete liquidation of the Acquired Fund (each, a “Reorganization,” and, collectively, the “Reorganizations”). Acquired Fund Acquiring Fund MainStay Retirement 2010 Fund MainStay Conservative Allocation Fund MainStay Retirement 2020 Fund MainStay Retirement 2030 Fund MainStay Moderate Allocation Fund MainStay Retirement 2040 Fund MainStay Moderate Growth Alloca […] e expected to close on June 14, 2019. Upon the closing of the Reorganizations, the assets and liabilities of each Acquired Fund will be transferred to its corresponding Acquiring Fund and you will become a shareholder of the Acquiring Fund. You will receive shares of the Acquiring Fund of the same share class, and equal in value to your shares of, the Acquired Fund. Q. What are the key similarities between each Acquired Fund and its corresponding Acquiring Fund? A. The investment manager for each Fund is New York Life Investment Management LLC (“New York Life Investments”), and the Funds are managed by the same portfolio managers. The Acquired Funds and Acquiring Funds are similar in that they allocate assets to underlying mutual funds and exchange-traded funds (“Underlying Funds”) and their strategies leverage the portfolio managers’ asset allocation expertise to deliver solution-oriented funds diversified across a range of asset classes. The Funds also have the same fundamental investment restrictions. Q. What are the key differences between each Acquired Fund and its corresponding Acquiring Fund? A. A key difference between the Acquired Funds and Acquiring Funds is that the Acquired Funds are structured with a glide path that gradually changes each Acquired Fund’s target asset allocation mix as the Acquired Fund approaches a planned retirement date, but the Acquiring Funds have target benchmark allocations to equity and fixed income that do not change automatically over time. The Reorganizations are designed to align each Acquired Fund with the corresponding Acquiring Fund that has a similar allocation to equities and fixed income at the present time. Unlike the Acquiring Funds, the Acquired Funds may invest in Underlying Funds managed by an advisor not affiliated with New York Life Investments if an affiliated Underlying Fund in a particular asset class (or sub-asset class) is deemed by the Acquired Funds’ portfolio managers to be unavailable. Please see the “Comparison of the Funds” starting on p. 8, which outlines these and other key comparison items. Q. What are the potential benefits from the Reorganizations? A. The Acquired Funds have not been able to achieve a viable size, and New York Life Investment […] ts beyond their expiration date. Please see the “Comparison of Fees and Expenses” starting on p. 23 for more specific information about fees and expenses by Fund and class. Q. Who will bear the expenses of the Reorganizations and related costs? A. The cost of the Reorganizations will be borne by the Acquired Funds. These direct costs are estimated to be between $50,000 and $60,000. To better align the portfolio holdings of each Acquired Fund with its corresponding Acquiring Fund, it is anticipated that up to 15% of the securities held by each Acquired Fund will be sold before the Reorganization and reinvested in accordance with the investment strategies of the corresponding Acquiring Fund. Because the Funds invest in other mutual funds and exchange-traded funds rather than individual portfolio securities, it is not anticipated that significant transaction costs will be incurred in connection with this realignment process. However, any such fees or other costs would be borne by each Fund that conducts such transactions. Large shareholders of each Acquired Fund may choose to redeem their holdings in an Acquired Fund which, in turn, may cause the Acquired Fund to sell portfolio holdings (possibly at a disadvantageous price or time) to be able to redeem such shareholders in cash. Q. Will the Reorganizations create a taxable event? A. It is anticipated that the Reorganizations will qualify for federal income tax purposes as tax-free reorganizations under Section 368 of the Internal Revenue Code of 1986, as amended. Accordingly, pursuant to this treatment, the Acquired Funds, the Acquiring Funds, and their respective shareholders are not expected to recognize any gain or loss for federal income tax purposes from the transactions contemplated by the Reorganizations. However, securities transactions conducted in advance of the Reorganizations to align the portfolio holdings of the Acquired Funds with those of the Acquiring Funds may generate capital gains for the Acquired Funds, based on market prices as of the date of the Information Statement/Prospectus. It is anticipated that up to 15% of the securities held by each Acquired Fund will be sold before the Reorganization and reinvested in accordance with the investment […]  Total return is defined as a combination of long-term growth of capital and current income. \"2010\" in the Fund's name refers to the approximate year an investor in the Fund had planned to retire and likely would have stopped making new investments in the Fund. The Fund is designed for an investor who has retired between the years 2010 and 2015, and who plans to withdraw the value of the investor's account in the Fund gradually after retirement. MainStay Conservative Allocation Fund Investment Objective The Fund seeks current income and, secondarily, long-term growth of capital. Principal Investment Strategies The Fund is a \"fund of funds,\" meaning that it seeks to achieve its investment objective by investing primarily in mutual funds and exchange-traded funds (\"ETFs\") managed by New York Life Investments or its affiliates (\"affiliated Underlying Funds\"), and, if an affiliated Underlying Fund in a particular asset class (or sub-asset class) is deemed by the portfolio managers to be unavailable, mutual funds or ETFs managed by an advisor not affiliated with New York Life Investments (\"unaffiliated Underlying Funds\") (and collectively with the affiliated Underlying Funds, \"Underlying Funds\"). The Fund seeks to achieve its investment objective by normally investing approximately 69% (within a range of 59% to 79%) of its assets in Underlying Fixed-Income Funds and approximately 31% (within a range of 21% to 41%) of its assets in Underlying Equity Funds. The Fund may invest approximately 4% (within a range of 0% to 14%) of its assets in international equity Underlying Funds. The asset mix will progressively reduce equity exposure and become more conservative during the ten years after the target retirement date, when it will allocate approximately 30% of its assets to equity Underlying Funds (within a range of 20% to 40%) and 70% to fixed income Underlying Funds (within a range of 60% to 80%). New York Life Investments may change the asset class allocations within the range stated above, the Underlying Funds in which the Fund invests, or the target weighting without prior approval from shareholders. With respect to investments in equity Underlying Funds that invest significantly in both U.S. and non-U.S. securities […] ates the Fund's target allocation among the asset classes as of January 1, 2019, and how the target allocation is anticipated to change over time as the Fund continues past its target retirement date of 2010, until it reaches its final allocation. The Fund’s target allocation will continue to change, becoming more conservative over a period of time after retirement (approximately ten years). Target allocations and/or actual holdings will vary from time to time as a result of the tactical allocation process, although these variations will remain within the ranges described above. Principal Investment Strategies The Fund is a \"fund of funds,\" meaning that it seeks to achieve its investment objective by investing primarily in mutual funds and exchange-traded funds managed by New York Life Investment Management LLC (“New York Life Investments”) or its affiliates (the \"Underlying Funds\"). The Underlying Funds are described and offered for direct investment in separate prospectuses. The Fund is designed for investors with a particular risk profile as represented by the asset class allocations described below, and invests in a distinct mix of Underlying Funds. The Fund seeks to achieve its investment objective by normally investing approximately 60% (within a range of 50% to 70%) of its assets in Underlying Fixed-Income Funds and approximately 40% (within a range of 30% to 50%) of its assets in Underlying Equity Funds. The Fund may invest approximately 10% (within a range of 0% to 20%) of its assets in international equity funds. New York Life Investments may change the asset class allocations, the Underlying Funds in which the Fund invests, or the target weighting without prior approval from shareholders. With respect to investments in Underlying Funds that invest significantly in both U.S. and non-U.S. equity securities, New York Life Investments will generally allocate such investments equally between U.S. equity funds and international equity funds. New York Life Investments will determine each Underlying Fund’s asset class, and for Underlying Funds that may potentially fall into multiple asset classes, New York Life Investments will classify them based on certain factors, including, but not limited to, the Underl\n"

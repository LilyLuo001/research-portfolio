ows of\n   the Target/Acquiring fund table, a 4-fund filing yields 4 objects}, ... ]}\n  or the no_event object above.\nEach event object:\n  fund_name        target mutual fund's full name (from excerpt)\n  family           fund family/trust (from excerpt)\n  mutual_fund_ticker / etf_ticker\n                   a single 2-6 char UPPERCASE symbol from the excerpt, else \"NA\".\n                   NEVER a fund name. Multiple class tickers → \"NA\" and list them in evidence.\n  announce_date    YYYY-MM-DD only. Board-approval date if stated; else the document's own\n                   date; else the filed date. Vague (\"May 2020\",\"Q4 2026\") → \"NA\".\n  date_basis       \"board\" | \"document\" | \"filed\" | \"NA\"\n  effective_date   YYYY-MM-DD only; the stated closing/completion date. Vague → \"NA\".\n  asset_class      equity_US / equity_intl / fixed_income / other — ONLY if locatable in the\n                   excerpt (bond/muni/high-yield/MBS→fixed_income; International/EM/Asia→\n                   equity_intl; explicit US equity→equity_US; managed-futures/multi-asset/\n                   long-short→other). Name alone insufficient → \"NA\".\n  AUM_at_conversion_USD  number from excerpt or \"NA\"\n  source_accession copy from the 文件 line\n  confidence       H = fund identity + (announce or effective) with explicit basis;\n                   M = identity clear, dates partly missing/document-dated;\n                   L = identity inferred from title only\n  evidence         ≤25-word quote fragment supporting the verdict (for events: the words\n                   showing the acquirer is an ETF; for no_event: the words showing why not)\nNEED_HUMAN only when TWO date statements INSIDE THIS ONE EXCERPT contradict for the same\nfund: {\"NEED_HUMAN\": true, \"quotes\": [\"...\", \"...\"]}. Different filings never contradict.\nNever fill any field from memory — excerpt-locatable or \"NA\".\n\nSELF-CHECK before emitting (do this, don't print it): every input item id appears exactly\nonce in your answer map (count them); every event object quotes ETF-acquirer evidence;\nevery date matches ^\\d{4}-\\d{2}-\\d{2}$ or is \"NA\"; no ticker field contains a space.】\n文件: 0001680359-19-000403 (form N-14, filed 2019-08-05, NATIONWIDE MUTUAL FUNDS  (CIK 0001048702))\nsource_url: https://www.sec.gov/Archives/edgar/data/1048702/000168035919000403/nmfdiscipvaln14082019.htm\n节选:\nN-14 1 nmfdiscipvaln14082019.htm As filed with the Securities and Exchange Commission on August 5, 2019 File No. 333-_____ UNITED STATES SECURITIES AND EXCHANGE COMMISSION WASHINGTON, D.C. 20549 FORM N-14 REGISTRATION STATEMENT UNDER THE SECURITIES ACT OF 1933 Pre-Effective Amendment No. ____ [ ] Post-Effective Amendment No. ____ [ ] (Check appropriate box or boxes) NATIONWIDE MUTUAL FUNDS (Exact Name of Registrant as Specified in Charter) ONE NATIONWIDE PLAZA, MAIL CODE 05-02-210, COLUMBUS, OHIO 43215 (Address of Principal Executive Offices) (Number, Street, City, State, Zip Code) (614) 435-5787 (Registrant's Area Code and Telephone Number) Send Copies of Communications to: ALLAN J. OSTER, ESQ. PRUFESH R. MODHERA, ESQ. 10 WEST NATIONWIDE BOULEVARD STRADLEY, RONON, STEVENS, & YOUNG LLP COLUMBUS, OHIO 43215 1250 CONNECTICUT AVENUE, N.W., SUITE 500 (NAME AND ADDRESS OF AGENT FOR SERVICE) WASHINGTON, D.C. 20036 Approximate Date of Public Offering: As soon as practicable after this Registration Statement becomes effective under the Securities Act of 1933, as amended. Title of securities being registered: Class K shares of beneficial interest, without par value, of the Nationwide Mellon […] undamental investment policies, see the section below entitled “Comparison of Fundamental and Non-Fundamental Investment Policies.” Do the principal risks associated with investments in the Target Fund differ from the principal risks associated with investments in the Acquiring Fund? Although the Acquiring Fund and the Target Fund have certain similar principal risks, there are also significant differences in the investment risks of the two Funds. Specifically, the Target Fund and Acquiring Fund share the following risks: equity securities risk, market and selection risks, and value style risk. However, the Target Fund also includes large-cap stock risk, management risk, and growth style risk. Additionally, the Acquiring Fund also includes convertible securities risk, derivatives risk, dividend-paying stock risk, foreign securities risk, initial public offering risk, 7 new fund risk, preferred stock risk, quantitative analysis strategy risk, and sector risk. For a detailed comparison of each Fund’s principal risks, see the section below entitled “Comparison of Investment Objectives, Strategies and Risks.” How many votes am I entitled to cast? As a shareholder of the Target Fund, you are entitled to one vote for each whole share, and a proportionate fractional vote for each fractional share, that you own of the Target Fund on the record date of [date], 2019 (the “Record Date”). Completion of the Reorganization is conditioned on the approval of the Reorganization by the Target Fund Shareholders. How do I vote my shares? You can vote your shares in person at the Meeting or by completing and signing the enclosed Proxy Card and mailing it in the enclosed postage-paid envelope. You may also vote by touch-tone telephone by calling the toll-free number printed on your Proxy Card and following the recorded instructions or by Internet by going to the website printed on your Proxy Card and following the instructions. If you need any assistance, or have any questions regarding the proposed Reorganization or how to vote your shares, please call 1-800-373-9387. What are the quorum and approval requirements for the Reorganization? Holders of at least one-third of the shares of the Target Fund that are outstanding as of the Re […]  days’ prior written notice to the respective Fund's shareholders. 10 Investment Strategies The principal investment strategies of the Target Fund and the Acquiring Fund are similar in some ways and differ in others. The Target Fund normally invests at least 80% of its net assets, plus any borrowings for investment purposes, in stocks, and the Acquiring Fund invests, under normal circumstances, at least 80% of its net assets in equity securities, primarily common stocks. The Target Fund focuses on stocks of large-cap companies, which are generally established companies that are considered \"known quantities,\" with market capitalizations of $5 billion or more at the time of purchase. The Acquiring Fund may also invest in preferred stocks and convertible securities, and it may invest up to 30% of its net assets in securities of foreign companies, which are companies organized under the laws of countries other than the United States. Although the Acquiring Fund typically invests in seasoned issuers, it may purchase securities of companies in initial public offerings (“IPOs”) or shortly thereafter. The Target Fund invests in growth and value stocks, which are chosen through a disciplined investment process that combines computer modeling techniques, fundamental analysis, and risk management. The Target Fund’s investment process is designed to provide investors with investment exposure to sector weightings and risk characteristics generally similar to those of the S&P 500® Index. The S&P 500 Index is an unmanaged index of 500 common stocks chosen to reflect the industries of the U.S. economy. The S&P 500 Index is often considered a proxy for the stock market in general. Companies included in the S&P 500 Index generally have market capitalizations in excess of $6.1 billion, to the extent consistent with market conditions. In selecting securities, the Target Fund’s portfolio managers use a computer model to identify and rank stocks within an industry or sector, based on several characteristics, including: · Value , or how a stock is priced relative to its perceived intrinsic worth; · Growth , in this case the sustainability or growth or earnings; and · Financial profile , which measures the financial health of the comp […] initial public offering risk, and derivatives risk. Finally, as a new series of the NMF Trust, the Acquiring Fund has identified new fund risk as a principal risk. Below is a description of the risks of investing in the Target Fund and Acquiring Fund. Neither the Target Fund nor the Acquiring Fund can guarantee that it will achieve its investment objective. An investment in the Acquiring Fund, as well as in the Target Fund, is not a bank deposit. It is not insured or guaranteed by the Federal Deposit Insurance Corporation or any other government agency. It is not a complete investment program. The value of your investment in the Acquiring Fund, as in the Target Fund, will fluctuate, sometimes dramatically, which means you could lose money. Convertible securities risk – (Acquiring Fund) The value of convertible securities may fall when interest rates rise and increase when interest rates fall. The prices of convertible securities with longer maturities tend to be more volatile than those with shorter maturities. Value also tends to change whenever the market value of the underlying common or preferred stock fluctuates. The Acquiring Fund could lose money if the issuer of a convertible security is unable to meet its financial obligations. Equity securities risk – (Acquiring Fund and Target Fund) Stock markets are volatile. The price of an equity security fluctuates based on changes in a company’s financial condition and overall market and economic conditions. Derivatives risk – (Acquiring Fund) Derivatives may be volatile and may involve significant risks. The underlying security, measure or other instrument on which a derivative is based, or the derivative itself, may not perform as expected. Futures contracts and options on futures contracts may involve leverage, which means that their use can significantly magnify the effect of price movements of the underlying securities or reference measures, disproportionately increasing the Acquiring Fund’s losses and reducing the Acquiring Fund’s opportunities for gains. Some of these derivatives have the potential for unlimited loss, including a loss that may be greater than the amount invested. Certain futures contracts and related options may be illiquid, making it difficult to close out an unfavorable position. Options – purchasing and selling options are highly specialized activities and entail greater-than-ordinary investment risks. The ability to close out positions in exchange-traded options depends on the existence of a liquid market. Options that expire unexercised have no value. Dividend-paying stock risk – (Acquiring Fund) There is no guarantee that the issuers of the stocks held by the Acquiring Fund will declare dividends in the future or that, if dividends are declared, they will remain at their current levels or increase over time. The Acquiring Fund’s emphasis on dividend-paying stocks could cause the Acquiring Fund to underperform similar funds that invest without consideration of a company’s track record of paying dividends or ability to pay dividends in the future. Dividend-paying stocks may not participate in a broad market advance to the same degree as other stocks, and a sharp rise in interest rates or economic downturn could cause a company to unexpectedly reduce or eliminate its dividend. Foreign securities risk – (Acquiring Fund) Foreign securities may be more volatile, harder to price and less liquid than U.S. securities. The prices of foreign securities may be further affected by other factors, such as changes in the exchange rates between the U.S. dollar and the currencies in which the securities are traded. Growth stock risk – (Target Fund) Investors often expect growth companies to increase their earnings at a certain rate. If these expectations are not met, investors can punish the stocks inordinately, even if earnings do increase. In addition, growth stocks may lack the dividend yield that may cushion stock prices  […] 1940 Act or the requirements of any securities exchange on which shares are listed for trading, by approval of such 22 amendment by the shareholders in accordance with Article III, Section 6 and Article V of the NMF Declaration; provided, however, that no restatement or amendment may be made to the Declaration of the NMF Trust or the Bylaws that would change any rights with respect to any shares by reducing the amount payable thereon upon the liquidation of the NMF Trust or by diminishing or eliminating any voting rights pertaining to reducing the amount payable thereon upon liquidation of the NMF Trust, except with the vote or consent of the holders of two-thirds of the shares outstanding and entitled to vote. Mergers, Reorganizations and Conversions. For the Target Fund, under Maryland law, to approve a consolidation, merger, share exchange, or transfer of assets, the board of directors of a corporation must: (i) adopt a resolution which declares that the proposed transaction is advisable on substantially the terms and conditions set forth or referred to in the resolution; and (ii) direct that the proposed transaction be submitted for consideration at either an annual or a special meeting of the shareholders. The proposed consolidation, merger, share exchange, or transfer shall then be approved by the shareholders of the corporation by the affirmative vote of a majority of all the votes entitled to be cast on the matter. For the Acquiring Fund, the vote of a majority of the NMF Trustees may cause the Acquiring Fund to (i) merge or consolidate with or into one or more statutory trusts or “other business entities” (as defined in Section 3801 of the Delaware Act) formed or organized or existing under the laws of the State of Delaware or any other state of the United States or any foreign country or other foreign jurisdiction; (ii) convert to an “other business entity” (as defined in Section 3801 of the Delaware Act) formed or organized under the laws of the State of Delaware as permitted pursuant to Section 3821 of the Delaware Act; (iii) the shares of the Acquiring Fund to be converted into beneficial interests in another statutory or business trust (or series thereof) created pursuant to the NMF Trust’s govern\n"

cquired Fund approve the Reorganization, each owner of Class A, Class C, Class I, and Class R6 shares would become a shareholder of the corresponding share class of the Acquiring Fund. Class R and Class W shareholders of the Acquired Fund will become Class R3 and Class I shareholders, respectively, of the Acquiring Fund. Class O shares will be converted to Class A shares in advance of the Closing Date. The Reorganization is expected to be effective on the Closing Date. Each shareholder of the Acquired Fund will hold, immediately after the close of the Reorganization, shares of the Acquiring Fund having an aggregate value equal to the aggregate value of shares of the Acquired Fund as of the close of business on the Closing Date. In considering whether to approve the Reorganization, you should note that: · The Acquired Fund and the Acquiring Fund are each open-end, management investment companies registered with the SEC. The Acquiring Fund is a series of MainStay Funds Trust, which is organized as a statutory trust under the laws of the State of Delaware. The Acquired Fund is a series of Voya Mutual Funds, which is also organized as a statutory trust under the laws of the State of Delaware. · New York Life Investment Management LLC (“New York Life Investments”) serves as the investment manager of the Acquiring Fund. CBRE Clarion Securities LLC (“CBRE Clarion”) serves as the subadvisor of the Acquiring Fund. · Voya Investments, LLC (“Voya Investments”) serves as the investment adviser of the Acquired Fund. CBRE Clarion also serves as the subadvisor of the Acquired Fund. · The Acquiring Fund and Acquired Fund have similar investment objectives: the Acquiring Fund seeks total return; the Acquired Fund seeks high total return consisting of capital appreciation and current income. · The Acquiring Fund and Acquired Fund ha […] -adviser (“Sub-Adviser”) defines a real estate company as a company that: (i) derives at least 50% of its total revenue or earnings from owning, operating, developing, constructing, financing, managing, and/or selling commercial, industrial, or residential real estate; or (ii) has at least 50% of its assets invested in real estate. The Fund will have investments located in a number of different countries, including the United States. As a general matter, the Fund expects these investments to be in common stocks of companies of any market capitalization, including real estate investment trusts. The Fund may invest in companies located in countries with emerging securities markets. The Fund may invest in other investment companies, including exchange-traded funds, to the extent permitted under the Investment Company Act of 1940, as amended, and the rules, regulations, and applicable exemptive orders thereunder (“1940 Act”). The Fund may invest in convertible securities, initial public offerings, and Rule 144A securities. The Sub-Adviser uses a multi-step investment process for constructing the Fund’s investment portfolio that combines top-down region and sector allocation with bottom-up individual stock selection. First, the Sub-Adviser selects sectors and geographic regions in which to invest, and determines the degree of representation of such sectors and regions through a systematic evaluation of public and private property market trends and conditions. Second, the Sub-Adviser uses proprietary analytical techniques to conduct fundamental company analysis, which provides a framework for security selection. This approach incorporates several quantitative and qualitative factors that aid in evaluating performance characteristics of individual securities independently and relative to each other. The Sub-Adviser will also typically employ third-party portfolio optimization tools to help in its evaluation of the Fund’s current portfolio and its identification of potential investments for the Fund. The Sub-Adviser may sell securities for a variety of reasons, such as to secure gains, limit losses, or redeploy assets into opportunities believed to be more promising, among others. The Fund may lend portfolio securities on a short-term or long-term basis, up to 33 1 ⁄3% of its total assets. Under normal circumstances, the Fund invests at least 80% of its assets (net assets plus borrowings for investment purposes) in common a […] ly engaged in the real estate industry may include REITs, real estate owners, real estate managers, real estate brokers, real estate dealers, and companies with substantial real estate holdings. The Fund is non-diversified, which means it may invest a greater percentage of its assets in a smaller number of issuers than a diversified fund. The Fund will invest at least 25% of its total assets (concentrate its investments) in securities issued by companies principally engaged in the real estate business. The Subadvisor may invest in companies with any market capitalization. However, the Subadvisor will generally not invest in companies with a market capitalization of less than $100 million at the time of purchase. The Fund may also invest in convertible securities, initial public offerings, and Rule 144A securities. The Fund may invest in other investment companies, including exchange-traded funds. Investment Process: The Subadvisor focuses on investments that generally provide income and also have the potential for long-term capital appreciation. The Subadvisor uses systematic, top-down research to evaluate property market conditions and trends to judge which market sectors offer potentially attractive returns. The Subadvisor uses proprietary analytical techniques to conduct fundamental company analysis, which provides a framework for security selection. This approach incorporates several quantitative and qualitative factors that aid in evaluating performance characteristics of individual securities independently and relative to each other. The Subadvisor will also typically employ portfolio optimization tools to help in its evaluation of the Fund’s current portfolio and its identification of potential investments for the Fund. The Subadvisor's investment approach, with its emphasis on investments in companies primarily engaged in the real estate industry, is expected to produce a total return that is closely tied to the performance of the market for publicly traded real estate companies, including real estate investment trusts, which is a narrow segment of the overall U.S. stock market. The Subadvisor may sell securities for a variety of reasons, such as to secure gains, limit losses, or redeploy assets into opportunities believed to be more promising, among others. 8 Comparison of Fees and Expenses Fees and Expenses of the Funds Below is a comp […]  2019, show estimated expenses of the Acquiring Fund after giving effect to both the Reorganization and the Real Estate Reorganization. It is important to note that following the Reorganization, shareholders of the Acquired Fund will be subject to the actual fee and expense structures of the Acquiring Fund, which may not be the same as the pro forma combined fees and expenses. Future fees and expenses may be greater or lesser than those indicated below. You may qualify for sales charge discounts if you and your family invest, or agree to invest in the future, at least $50,000 in the MainStay Funds. The Acquired Fund offers Class A, Class C, Class I, Class O, Class R, Class R6, and Class W shares. Class O shares of the Acquired Fund will be converted to Class A shares of the Acquired Fund in advance of the closing of the Reorganization. If shareholders approve the Reorganization and shareholders of the Voya Real Estate Fund approve the Real Estate Reorganization, shareholders of the Acquired Fund would receive shares of the Acquiring Fund as set forth in the table below: Acquired Fund Shares Acquiring Fund Shares Class A Class A Class C Class C Class I Class I Class O Class A Class W Class I Class R Class R3 Class R6 Class R6 9 Voya Global Real Estate Fund Class A Voya Glob
    mutual funds often involve minimum annual fees as well as variable fees based on the size of the fund
    and sometimes, specific expenses incurred to service the fund. By comparison, for ETFs, the transfer
    agency fees are fixed and the fixed rate for ETFs is often less than the minimum for traditional mutual
    funds. ETFs generally don’t have shareholder servicing fees. In many states, mutual funds are required
    to pay state registration fees. These fees often involve a minimum fee plus a variable amount based

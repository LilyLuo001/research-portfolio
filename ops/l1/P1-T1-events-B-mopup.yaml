  prompt: "【规则 v2 (manual §T1 + QC修订). Follow the STEPS in order for THIS filing's excerpt.\n\nSTEP 1 — Identify every reorganization/conversion described. For each one name:\n  TARGET = the entity whose shareholders receive new shares (acquired/converted fund)\n  ACQUIRER = the entity that survives (acquiring/successor fund)\nSTEP 2 — Classify both, quoting the excerpt:\n  TARGET must be an OPEN-END MUTUAL FUND (multi-class shares, bought/redeemed at NAV).\n  ACQUIRER must be an ETF (exchange-traded fund / \"will operate as an exchange-traded\n  fund\" / listed on an exchange).\nSTEP 3 — Verdict:\n  EVENT only if TARGET=open-end mutual fund AND ACQUIRER=ETF. This includes:\n   (a) shell-ETF conversions and cross-trust reorganizations into a new ETF;\n   (b) acquisition of a mutual fund by an EXISTING ETF;\n   (c) RETROSPECTIVE statements of completed conversions (\"the ETF is the successor\n       to the X Fund as a result of a reorganization on <date>\") — record the event\n       with effective_date = the stated completion date.\n  NOT events — output {\"no_event\": true, \"reason\": \"<code>\"} with code:\n   MF_TO_MF   mutual fund merged into another MUTUAL FUND (acquirer not an ETF)\n   ETF_TO_ETF target is itself an ETF (trust adoption/re-domiciliation/rebrand)\n   CEF        target is a closed-end fund (incl. CEF→ETF: code CEF, add \"flag\":\"CEF_to_ETF\")\n   INTERVAL   acquirer is an interval fund or other non-ETF structure\n   SHARECLASS share-class conversion/aging (e.g. Class C→A), fund rename, no reorganization\n   MENTION    ETFs appear only as portfolio holdings/risk language/ordinary prospectus text\n  If the excerpt truly shows no reorganization at all, use code MENTION.\n\nOUTPUT — one JSON value per item id. Copy the item id EXACTLY as printed after 文件:\n(character-for-character; never re-type digits). Value is a PLAIN JSON object (never a\nquoted/escaped string):\n  {\"events\": [ {one object PER TARGET FUND named in the filing — enumerate ALL rows of\n   the Target/Acquiring fund table, a 4-fund filing yields 4 objects}, ... ]}\n  or the no_event object above.\nEach event object:\n  fund_name        target mutual fund's full name (from excerpt)\n  family           fund family/trust (from excerpt)\n  mutual_fund_ticker / etf_ticker\n                   a single 2-6 char UPPERCASE symbol from the excerpt, else \"NA\".\n                   NEVER a fund name. Multiple class tickers → \"NA\" and list them in evidence.\n  announce_date    YYYY-MM-DD only. Board-approval date if stated; else the document's own\n                   date; else the filed date. Vague (\"May 2020\",\"Q4 2026\") → \"NA\".\n  date_basis       \"board\" | \"document\" | \"filed\" | \"NA\"\n  effective_date   YYYY-MM-DD only; the stated closing/completion date. Vague → \"NA\".\n  asset_class      equity_US / equity_intl / fixed_income / other — ONLY if locatable in the\n                   excerpt (bond/muni/high-yield/MBS→fixed_income; International/EM/Asia→\n                   equity_intl; explicit US equity→equity_US; managed-futures/multi-asset/\n                   long-short→other). Name alone insufficient → \"NA\".\n  AUM_at_conversion_USD  number from excerpt or \"NA\"\n  source_accession copy from the 文件 line\n  confidence       H = fund identity + (announce or effective) with explicit basis;\n                   M = identity clear, dates partly missing/document-dated;\n                   L = identity inferred from title only\n  evidence         ≤25-word quote fragment supporting the verdict (for events: the words\n                   showing the acquirer is an ETF; for no_event: the words showing why not)\nNEED_HUMAN only when TWO date statements INSIDE THIS ONE EXCERPT contradict for the same\nfund: {\"NEED_HUMAN\": true, \"quotes\": [\"...\", \"...\"]}. Different filings never contradict.\nNever fill any field from memory — excerpt-locatable or \"NA\".\n\nSELF-CHECK before emitting (do this, don't print it): every input item id appears exactly\nonce in your answer map (count them); every event object quotes ETF-acquirer evidence;\nevery date matches ^\\d{4}-\\d{2}-\\d{2}$ or is \"NA\"; no ticker field contains a space.】\n文件: 0001104659-22-114935 (form N-1A/A, filed 2022-11-04, Calamos Antetokounmpo Sustainable Equities Trust  (CIK 0001943291))\nsource_url: https://www.sec.gov/Archives/edgar/data/1943291/000110465922114935/tm2223398d3_n1aa.htm\n节选:\nN-1A/A 1 tm2223398d3_n1aa.htm N-1A/A As filed with the U.S. Securities and Exchange Commission on November 4, 2022 Securities Act File No. 333-267049 Investment Company Act File No. 811-23822 UNITED STATES SECURITIES AND EXCHANGE COMMISSION Washington, D.C. 20549 FORM N-1A REGISTRATION STATEMENT UNDER THE SECURITIES ACT OF 1933 ¨ Pre-Effective Amendment No. 1 x Post-Effective Amendment No. ¨ and/or REGISTRATION STATEMENT UNDER THE INVESTMENT COMPANY ACT OF 1940 ¨ Amendment No. 1 x (Check appropriate box or boxes) Calamos Antetokounmpo Sustainable Equities Trust (Exact Name of Registrant as Specified in Charter) 2020 Calamos Court Naperville, Illinois (Address of Principal Executive Offices) 60563 (Zip Code) Registrant's Telephone Number, including Area Code: (630) 245-7200 J. Christopher Jackson 2020 Calamos Court Naperville, Illinois 60563 (Name and Address of Agent for Service) With Copies to: Paulita A. Pike Ropes & Gray LLP 191 North Wacker Drive, 32nd Floor Chicago, Illinois 60606 Rita Rubin Ropes & Gray LLP 191 North Wacker Drive, 32nd Floor Chicago, Illinois 60606 Approximate Date of Proposed Public Offering: As soon as practicable following the effectiveness of the Registra […] ligibility, including, where applicable, records for accounts opened with a different financial advisor and records of accounts established by members of your immediate family. If you own shares exclusively through an account maintained with the Fund's transfer agent, you will need to provide the foregoing information to us at the time you purchase shares. Additional information regarding sales loads and discounts applicable to us may be found in the Fund's statement of additional information, which can be obtained on Calamos Advisors’ website at www.calamos.com. If purchasing shares through a financial intermediary, please also see the \"Reduced sales charges available through certain financial intermediaries\" section for more information. Conversion to Class I Shares Certain holders of Class A shares issued by the Fund in the CALAMOS FAMILY OF FUNDS may convert their Class A shares for Class I shares of the same Fund provided that they: (1) hold their shares through an institution that has a valid Class I sales agreement with CFS authorizing such a conversion; and (2) are otherwise eligible to invest in Class I shares through their financial intermediary in accordance with the criteria set forth in \"Fund Facts — What classes of shares does the Fund offer? — Class I\". Any such conversion is subject to the Fund's discretion to accept or reject. Shares still subject to a contingent deferred sales charge are not eligible for such conversions — this includes Class A shares originally purchased at net asset value pursuant to the $1,000,000 purchase order privilege. Share class conversions are not eligible for contingent deferred sales charge waivers. For federal income tax purposes, a same-Fund conversion generally will not result in the recognition by the investor of a capital gain or loss. However, investors should consult their own tax or legal adviser to discuss their particular circumstances. Class A shareholders should contact their financial intermediary for information on the availability of Class I shares, and should read and consider the information set forth in \"Fund Facts — What classes of shares does the Fund offer? — Class I\" before any such conversion. Class C Shares The offering price for Class C shares is the NAV per share with no initial sales charge. However, the Fund pays an aggregate distribution and service fee at the annual rate of 1.00% of average net assets. As a result, the annual expenses for Class C shares are somewhat higher compared to Class A shares, which pay an aggregate 0.25% distribution fee. Class C shares have a contingent deferred sales charge of 1.00% for any shares redeemed within one year of purchase, measured from the first day of the month in which the shares were purchased. No order for Class C shares of the Fund may exceed $1,000,000. Automatic Conversion to Class A Shares Class C shares of the Calamos Funds are eligible for conversion to Class A shares of the same Fund approximately eight years after the date of each original purchase. It is the financial intermediary's responsibility to ensure that the shareholder is credited with the proper holding period. To determine eligibility for conversions in these circumstances, it is the responsibility of the shareholder and/or their financial advisor to notify the Fund, or the financial intermediary through which the shares are held, that the shareholder is eligible for the conversion of Class C shares to Class A shares, and the shareholder or their financial intermediary may be required to provide records that substantiate the holding period of Class C shares. It is the financial intermediary's (and not the Fund's) responsibility to keep records of transactions made in accounts it holds and to ensure that the shareholder is credited with the proper holding period based on such records or those provided to the financial intermediary by the shareholder. Please consult with your financial intermediary for the applicability of this conversion feature to your shares. The conversion of Class C shares to Class A shares will be on the basis of the NAV per share, without the imposition of the Class A share sales load or any additional sales loads, fees, or other charges. Class C shares of a Fund acquired through the reinvestment of dividends and/or capital gains distributions will convert to Class A shares of the same Fund on a pro rata basis once automatic conversions commence. For federal income tax purposes, a same-Fund conversion generally will not result in the recognition by the investor of a capital gain or loss. However, investors should consult their own tax or legal adviser to discuss their particular circumstances. Class C shareholders should contact their financial intermediary for information on the availability of Class A shares, and should read and consider the information set forth in \"Fund Facts — What classes of shares does the Fund offer? — Class A\". 17 Additionally, certain financial intermediaries may implement a conversion holding period of less than eight years, or have additional or differing eligibility requirements than those described in the prospectus. Any such conversion policy is solely the responsibility of the respective financial intermediary to administer and support. Please consult with the financial intermediary through which you hold Fund shares for further information about any such conversion option. However, shareholders must have held the Class C shares being converted for a minimum of one year from the date of purchase of those shares. Shares still subject to a contingent deferred sales charge are not eligible for such conversions. Share class conversions are not eligible for contingent deferred sales charge waivers. Conversion to Class A Shares Certain holders of Class C shares issued by the Fund may be eligible to convert their Class C shares for Class A shares of the same Fund provided that they: (1) hold their shares through an institution that has a valid Class A sales agreement with CFS authorizing such a conversion; and (2) are otherwise eligible to invest in Class A shares through their financial intermediary in accordance with the criteria set forth in \"Fund Facts — What classes of shares does the Fund offer? — Class A\". Any such conversion is subject to the Fund's discretion to accept or reject. In addition, shareholders must have held the Class C shares being converted for a minimum of one year from the date of purchase of those shares. Shares still subject to a contingent deferred sales charge are not eligible for such conversions. Share class conversions are not eligible for contingent deferred sales charge waivers. For federal income tax purposes, a same-Fund conversion generally will not result in the recognition by the investor of a capital gain or loss. However, investors should consult their own tax or legal adviser to discuss their particular circumstances. Class C shareholders should contact their financial intermediary for information on the availability of Class A shares, and should read and consider the information set forth in \"Fund Facts — What classes of shares does the Fund offer? — Class A\" before any such conversion. Conversion to Class I Shares Certain holders of Class C shares issued by the Fund may be eligible to convert their Class C shares for Class I shares of the same Fund provided that they: (1) hold their shares through an institution that has a valid Class I sales agreement with CFS authorizing such a conversion; and (2) are otherwise eligible to invest in Class I shares through their financial intermediary in accordance with the criteria set forth in \"Fund Facts — What classes of shares does the Fund offer? — Class I\". Any such conversion is subject to the Fund's discretion to accept or reject. In addition, shareholders must have held the Class C shares being converted for a minimum of one year from the date of purchase of those shares. Shares still subject to a contingent deferred sales charge are not eligible for such conversions. Share class conversions are not eligible for contingent deferred sales charge waivers. For federal income tax purposes, a same-Fund conversion generally will not result in the recognition by the investor of a capital gain or loss. However, investors should consult their own tax or legal adviser to discuss their particular circumstances. Class C shareholders should contact their financial intermediary for information on the availability of Class I shares, and should read and consider the information set forth in \"Fund Facts — What classes of shares does the Fund offer? — Class I\" before any such conversion. Class I Shares The offering price for Class I shares is the NAV per share with no initial sales charge. There is no contingent deferred sales charge nor distribution or service fees with respect to Class I shares. Class I shares are offered primarily for direct investment by investors through certain tax-advantaged retirement plans (including 401(k) plans, 457 plans, employer-sponsored 403(b) plans, profit sharing and money purchase pension plans, defined benefit plans, non-qualified deferred compensation plans and health care benefit funding plans) and by institutional clients, provided such plans or clients have assets of at least $1 million. Class I shares may also be offered to certain other entities or programs, including, but not limited to, investment companies, fee-based advisory relationships, and brokerage platforms of firms that have agreements with Calamos Advisors or its affiliates to offer such shares when acting solely on an agency basis for the purchase or sale of such shares, under certain circumstances. If you transact in Class I shares through a brokerage platform, you may be required to pay a commission and/or other forms of compensation to the broker. Shares of the Fund are available in other share classes that have different fees and expenses. The minimum initial investment required to purchase the Fund's Class I shares is $1 million. There is no minimum subsequent investment requirement. The Fund may reduce or waive the minimum initial inves […] h case including in-law and adoptive relationships. It is also waived for clients of Calamos Advisors or an affiliate thereof who acquire shares of a Fund made available through a mutual fund asset allocation program offered by Calamos Advisors or an affiliate thereof. Also, the minimum initial investment for Class I shares may be waived or reduced at the discretion of CFS, the Fund's distributor, including waivers or reductions for purchases made through certain registered investment advisers, fee-based advisory relationships, qualified third party platforms, certain tax-advantaged retirement plans (as further defined above), and brokerage platforms (as described above). Certain holders of Class A and Class C shares issued by the Fund may convert their shares for Class I shares of the Fund provided that they meet certain conditions set forth in this prospectus. 18 As a result of the relatively lower expenses for Class I shares, the level of income dividends per share (as a percentage of NAV) and, therefore, the overall investment return, will typically be higher for Class I shares than for Class A and Class C shares. Advisory Programs Eligible for Class I Shares Class I shares purchased by accounts participating in certain programs sponsored by and/or controlled by financial intermediaries (\"Advisory Programs\") may be exchanged by the financial intermediary on behalf of the shareholder for Class A shares of the same Fund under certain circumstances. If a shareholder that holds Class I shares of a Fund no longer participates in an Advisory Program, the Class I shares held by the shareholder may be exchanged by the financial intermediary on behalf of the shareholder for Class A shares of the same Fund under certain circumstances. In this case, the shareholder would be subject to ongoing Class A shares' Rule 12b-1 fees to which it was not previously subject. All such exchanges are initiated by the financial intermediary and not the Fund, and the Fund does not have information or oversight with respect to such exchanges. Such exchanges will be on the basis of each Class' NAV per share, without the imposition of any sales charge, fee or other charge. Class R6 Shares The offering price for Class R6 shares is the NAV […] not benefit from certain policies and procedures of the Fund as your eligibility to purchase shares may be dependent upon the policies and procedures of your financial intermediary, including those regarding reductions or waivers of sales charges and other features of the share class. In all instances, it is your responsibility to notify your financial intermediary of any relationship or other facts that may qualify your investment for sales charge reductions or waivers and other features of the class. Different financial intermediaries may impose different sales charges. Please refer to the Appendix for the sales charge or contingent deferred sales charge waivers or discounts that are applicable to each financial intermediary. Share Class Conversions As deemed appropriate and if found to be in the best interest of the shareholders affected, the Fund may make available other share class conversion options, other than those specifically disclosed in this prospectus, at their sole discretion. Holders of a certain share class issued by the Fund may be eligible to convert their shares for another share class of the same Fund provided that they: (1) hold their shares through an institution that has a valid sales agreement, for the share classes involved, with CFS authorizing such a conversion; and (2) are otherwise eligible to invest in the share classes involved through their financial intermediary in accordance with the criteria set forth in this prospectus. Shares still subject to a contingent deferred sales charge are not eligible for such conversions. Share class conversions are not eligible for contingent deferred sales charge waivers. For federal income tax purposes, a same-Fund conversion generally will not result in the recognition by the investor of a capital gain or loss. However, investors should consult their own tax or legal adviser to discuss their particular circumstances. Shareholders should contact their financial intermediary for information on share class availability, and should read and consider the corresponding prospectus before any such conversion. Money market fund If you wish to exchange your Fund shares for shares of a money market fund, you may exchange them for shares of the Fidelity Investments Money Market Treasury Portfolio (\"Fidelity Treasury Shares\"). Class A, Class C and Class I shares of the Fund may be exchanged for Class III, Class IV and Class I Fidelity Treasury Shares, respectively. Class R6 shares cannot be exchanged for Fidelity Treasury Shares nor can Fidelity Treasury Shares be exchanged for Class R6 shares. 19 Fidelity Treasury Shares are offered by a separate prospectus and are not offered by the Fund. You may at any time exchange your Fidelity Treasury Shares back into shares of the equivalent class of the CALAMOS FAMILY OF FUNDS. However, should you redeem (and not exchange) your Fidelity Treasury Shares, you would pay any applicable contingent deferred sales charge. For a prospectus and more complete information on Fidelity Treasury Shares, including management fees and expenses, please call 800.582.6959. Please read the prospectus relating to Fidelity Treasury Shares carefully. Not all financial intermediaries make Fidelity Treasury Shares available to their customers who hold shares of the Fund. Please contact your financial intermediary about the availability of Fidelity Treasury Shares. Closed Fund Policies The Fund reserves the right to modify the extent to which sales of shares are limited and may, in its sole discretion, permit purchases of shares where, in the judgment of ma […] ect the interests of remaining shareholders, or to accommodate a request by a particular shareholder that does not adversely affect the interest of the remaining shareholders, by delivery of securities selected from its assets at its discretion. However, the Fund is required to redeem shares solely for cash up to the lesser of $250,000 or 1% of the net assets of the Fund during any 90-day period for any one shareholder. Should redemptions by any shareholder exceed such limitation, the Fund will have the option of redeeming the excess in cash or in-kind. In-kind payment means payment will be made in liquid portfolio securities rather than cash. If that occurs, the redeeming shareholder might incur brokerage and/or other transaction costs to convert the securities to cash. Processing time The Fund will send your redemption proceeds to you by check to the address of record or by wire to a predetermined bank or brokerage account. Redemption proceeds paid by wire will normally be sent on the next business day after receipt of the redemption request. The cost of the wire (currently $15) will be deducted from the redemption proceeds if you are redeeming all of your shares or only a specific number of shares. If you are redeeming a specific dollar amount, the wire fee will be deducted from the remaining balance in the account. You may also have proceeds sent directly to a predetermined bank or brokerage account via electronic funds transfer through the ACH Network if your bank or brokerage firm is an ACH member. There is no charge for an electronic funds transfer through the ACH Network and your proceeds will be credited to your account within two to three business days. Proceeds from the sale of Fund shares will not be sent to you until the check or ACH purchase used to purchase the shares has cleared, which can take up to 15 calendar days after purchase. You may avoid this delay by buying shares with a wire transfer. The Fund may suspend the right of redemption under certain extraordinary circumstances in accordance with the rules of the Securities and Exchange Commission. Emergency Circumstances The Fund may postpone the payment of redemption proceeds for up to seven calendar days from the date of redemption. In add\n"

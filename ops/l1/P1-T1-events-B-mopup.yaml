ars exactly\nonce in your answer map (count them); every event object quotes ETF-acquirer evidence;\nevery date matches ^\\d{4}-\\d{2}-\\d{2}$ or is \"NA\"; no ticker field contains a space.】\n文件: 0000930413-25-002048 (form N-14, filed 2025-06-24, Lazard Active ETF Trust  (CIK 0002051630))\nsource_url: https://www.sec.gov/Archives/edgar/data/2051630/000093041325002048/c113060_n-14.htm\n节选:\nN-14 1 c113060_n-14.htm Securities Act File No. [__] As filed with the Securities and Exchange Commission on June 24, 2025 SECURITIES AND EXCHANGE COMMISSION Washington, D.C. 20549 FORM N-14 REGISTRATION STATEMENT UNDER THE SECURITIES ACT OF 1933 Pre-Effective Amendment No. Post-Effective Amendment No. (Check appropriate box or boxes) LAZARD ACTIVE ETF TRUST (Exact Name of Registrant as Specified in Charter) (212) 632-6000 (Registrant’s Telephone Number, including Area Code) 30 Rockefeller Plaza, New York, New York 10112 (Address of Principal Executive: Number, Street, City, State, Zip Code) Mark R. Anderson, Esq. 30 Rockefeller Plaza New York, New York 10112 (Name and Address of Agent for Services) Copy to: Allison Fumai, Esq. Dechert LLP 1095 Avenue of the Americas New York, New York 10036 Approximate Date of Proposed Public Offering: As soon as practicable after the effective date of this Registration Statement. Title of Securities Being Registered: Shares of Lazard Emerging Markets Opportunities ETF, a series of the Registrant. The Registrant has heretofore declared its intention to register an indefinite amount of securities pursuant to Rule 24f-2 under the Investment Company  […] ly for more complete information. What is involved in the Reorganization? All of the assets and liabilities of the Acquired Portfolio will be transferred to the Acquiring Portfolio in exchange for shares of the Acquiring Portfolio equal to the Acquired Portfolio’s net asset value (“NAV”). The Acquired Portfolio will distribute to its shareholders the portion of shares of the Acquiring Portfolio to which the shareholder is entitled (and shareholders may receive cash in lieu of fractional shares). Shares of the Acquiring Portfolio will be transferred to each shareholder’s brokerage account that can accept shares of the Acquiring Portfolio. If a shareholder does not have a brokerage account, such shareholder’s Acquired Portfolio shares may be converted to cash, less any fees and expenses your intermediary may charge (subject to applicable federal or state laws concerning unclaimed property). For more information, please refer to the “Dividends and Distributions – Inactive Accounts and Potential Risk of Escheatment” section of the Acquiring Portfolio’s Statement of Additional Information, which is incorporated herein by reference. After shares of the Acquiring Portfolio are distributed to the Acquired Portfolio’s shareholders, the Acquired Portfolio will be completely liquidated and dissolved. As a result of the Reorganization, you will cease to be a shareholder of the Acquired Portfolio and will become a shareholder of the Acquiring Portfolio. The Reorganization is currently scheduled to take place as of the close of business of the NYSE on October 24, 2025, or such other time and date as the parties may agree. For more information, please refer to the section entitled “The Transaction – Agreement and Plan of Reorganization.” What are the differences between an ETF and a mutual fund? ETFs are structurally different from mutual funds in several important aspects: ETF Mutual Fund Does not issue multiple classes of shares May offer multiple share classes with different expenses and/or minimum investments Individual investors buy or sell shares of an ETF on the secondary market through an exchange Investors or their intermediaries buy or sell shares directly from the mutual fund Buy and sell orders are processed throu […] curities are sold and the Acquired Portfolio’s tax basis in such securities. The Investment Manager currently estimates that the Acquired Portfolio would be able to utilize capital loss carryovers to fully offset any gains resulting from the sale of such portfolio securities before consummation of the Reorganization. For more information, please refer to the section entitled “The Transaction – Federal Income Tax Considerations.” 5 What types of shareholder accounts can receive shares of an ETF as part of the Reorganization? If you hold your Acquired Portfolio shares in an account that permits you to purchase securities traded on U.S. stock exchanges, such as ETFs or other types of stocks, you are eligible to receive shares of an ETF in the conversion. No further action is needed by you. What types of shareholder accounts cannot receive shares of an ETF as part of the Reorganization? If you hold your Acquired Portfolio shares in an account with a broker or financial intermediary that only allows you to hold shares of mutual funds in the account, like many individual retirement accounts or group retirement plans, you will need to contact your broker or financial intermediary to transfer your shares to an existing or new brokerage account that permits investment in ETF shares prior to the Reorganization. If this is the case and you do nothing, you will not receive shares of the Acquiring Portfolio. Your position will instead be liquidated at the time of the Reorganization and you will receive a cash distribution equal in value to the NAV of your Acquired Portfolio shares less any fees and expenses your intermediary may charge. This event may be taxable. To prevent a taxable event, please contact your broker or financial intermediary to transfer your shares to an existing or new brokerage account that will accept ETF shares. Alternatively, your broker or financial intermediary may transfer your investment in the Acquired Portfolio to a different investment option prior to or at the time of the Reorganization. If you are unsure about the ability of your account to accept shares of an ETF, please contact your broker or financial intermediary. How do I transfer my Acquired Portfolio shares to a brokerage account that  […] anuary 31, 2025 includes: Brazil, Chile, China, Colombia, Czech Republic, Egypt, Greece, Hungary, India, Indonesia, Korea, Kuwait, Malaysia, Mexico, Peru, Philippines, Poland, Qatar, Saudi Arabia, South Africa, Taiwan, Thailand, Turkey and United Arab Emirates. Companies that have 50% or more of their assets in or revenue or net income from one or more emerging market country are considered to have their principal activities in emerging markets countries. Under normal circumstances, the Portfolio invests at least 80% of its net assets (plus any borrowings for investment purposes) in equity securities of companies whose principal business activities are located in emerging market countries. In addition to common stocks, preferred stocks and convertible securities, such equity securities also may include American Depositary Receipts (“ADRs”), Global Depositary Receipts and European Depositary Receipts. While the Portfolio’s investment strategy is not designed to focus investment in any particular market sector or sectors, implementation of the Portfolio’s investment strategy may, from time to time, result in the investment of a significant portion of the Portfolio’s assets in different market sectors. How do the Portfolios’ management and distribution arrangements compare? The following summarizes the management and distribution arrangements of the Acquired Portfolio and the Acquiring Portfolio: Management of the Portfolios Lazard Asset Management LLC, 30 Rockefeller Plaza, New York, New York 10112-6300, serves as the Investment Manager of the Portfolios. The Investment Manager provides day-to-day management portfolio investments and assists in the overall 7 management of Portfolio affairs. The Investment Manager and its global affiliates provide investment management services to client discretionary and non-discretionary accounts with assets totaling approximately $227 billion as of March 31, 2025. The Acquired Portfolio is managed by a portfolio management team comprised of Rohit Chopra and Thomas Boyle. The Acquiring Portfolio is managed by a portfolio management team comprised of Rohit Chopra, James Donald and Thomas Boyle. · Thomas Boyle, a Director of the Investment Manager, is a portfolio manager/analyst o\n"

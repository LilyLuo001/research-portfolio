ars exactly\nonce in your answer map (count them); every event object quotes ETF-acquirer evidence;\nevery date matches ^\\d{4}-\\d{2}-\\d{2}$ or is \"NA\"; no ticker field contains a space.】\n文件: 0001193125-20-069925 (form 497, filed 2020-03-11, CALAMOS GLOBAL TOTAL RETURN FUND  (CGO)  (CIK 0001285650))\nsource_url: https://www.sec.gov/Archives/edgar/data/1285650/000119312520069925/d844332d497.htm\n节选:\n497 1 d844332d497.htm CALAMOS GLOBAL TOTAL RETURN FUND CALAMOS GLOBAL TOTAL RETURN FUND Table of Contents Prospectus Supplement (To Prospectus dated February 28, 2020) Calamos Global Total Return Fund Up to 6,000,000 Common Shares Calamos Global Total Return Fund (the “Fund,” “we,” “us,” or “our”) has entered into a distribution agreement dated March 8, 2019 (the “Distribution Agreement”) with Foreside Fund Services LLC (the “Distributor”), relating to the Fund’s common shares of beneficial interest (“common shares”) offered by this prospectus supplement and the accompanying prospectus. The Distributor has entered into a sub-placement agent agreement dated March 8, 2019 (the “Sub-Placement Agent Agreement”) with UBS Securities LLC (the “Sub-Placement Agent”), relating to the Fund’s common shares offered by this prospectus supplement and the accompanying prospectus. In accordance with the terms of the Sub-Placement Agent Agreement, we may offer and sell up to 6,000,000 of our common shares, no par value per share, from time to time through the Sub-Placement Agent, as the sub-placement agent for the offer and sale of the common shares. As of January 31, 2019, the Fund had offered and […] ommissions on the shares sold. See “Dividends and Distributions on Common Shares; Automatic Dividend Reinvestment Plan” on page 73 of the accompanying prospectus. (4) The Fund pays Calamos an annual management fee, payable monthly in arrears, for its investment management services in an amount equal to 1.00% of the Fund’s average weekly managed assets. In accordance with the requirements of the Commission, the table above shows the Fund’s management fee as a percentage of average net assets attributable to common shareholders. By showing the management fee as a percentage of net assets, the management fee is not expressed as a percentage of all of the assets the Fund intends to invest. For purposes of the table, the management fee has been converted to 1.48% of the Fund’s average weekly net assets as of January 31, 2020 by dividing the total dollar amount of the management fee by the Fund’s average weekly net assets (managed assets less outstanding leverage). (5) Reflects interest expense paid on $21.8 million in average borrowings under the Fund’s Amended and Restated Liquidity Agreement with State Street Bank and Trust Company, plus $16.5 million in additional average structural leverage related to certain securities lending programs, as described in the accompanying prospectus under “Leverage.” SUP-5 Table of Contents (6) Reflects estimated dividend expense on $12 million aggregate liquidation preference of mandatory redeemable preferred shares (“MRP Shares” or “MRPS”) outstanding. See “Prospectus Summary — Use of Leverage by the Fund” and “Leverage” in the accompanying prospectus for additional information. (7) “Other Expenses” are based on estimated amounts for the Fund’s current fiscal year. (8) “Acquired Fund Fees and Expenses” are the indirect costs of investing in other investment companies such as money market funds and ETFs. (9) The example includes sales load and estimated offering costs. The purpose of the table and the example above is to help investors understand the fees and expenses that they, as common shareholders, would bear directly or indirectly. For additional information with respect to our expenses, see “Management of the Fund” on page 59 of the accompanying prospectus. MARKET AND NET A […] ble or elects otherwise, all dividends and capital gain distributions on common shares are automatically reinvested in additional common shares of the Fund. However, an investor can choose to receive dividends and distributions in cash. Since investors can participate in the automatic dividend reinvestment plan only if their broker or nominee participates in our plan, you should contact your broker or nominee to confirm that you are eligible to participate in the plan. See “Dividends and Distributions on Common Shares; Automatic Dividend Reinvestment Plan — Automatic Dividend Reinvestment Plan.” Investment Policies Primary Investments. Under normal circumstances, the Fund will invest primarily in a portfolio of common and preferred stocks, convertible securities and income producing securities such as investment grade and below investment grade (high yield/high risk) debt securities. The Fund, under normal circumstances, will invest at least 50% of its managed assets in equity securities (including securities that are convertible into equity securities). The Fund may invest up to 100% of its managed assets in securities of foreign issuers, including debt and equity securities of corporate issuers and debt securities of government issuers, in developed and emerging markets. Under normal circumstances, the Fund will invest at least 40% of its managed assets in securities of foreign issuers. The Fund will invest in the securities of issuers of several different countries throughout the world, in addition to the United States. 3 Table of Contents Calamos will dynamically allocate the Fund’s investments among multiple asset classes (rather than maintaining a fixed or static allocation), seeking to obtain an appropriate balance of risk and reward through all market cycles using multiple strategies and combining them to seek to achieve favorable risk adjusted returns. The Fund will attempt to keep a consistent balance between risk and reward over the course of different market cycles, through various combinations of stocks, bonds, and/or convertible securities, to achieve what Calamos believes to be an appropriate blend for the then current market. As the market environment changes, portfolio securities may change in an attempt to achieve a relatively consistent risk level over time. At some points in a market cycle, one type of security may make up a substantial portion of the Fund’s portfolio, while at other times certain securities may have minimal or no representation, depending on market conditions. The Fund may also seek to generate income from option premiums by writing (selling) options (with an aggregate notional value of up to 33% of the value of the Fund’s managed assets). The Fund will opportunistically employ a strategy of writing options. The extent of option writing activity will depend upon market conditions and Calamos’ ongoing assessment of the attractiveness of writing options on the Fund’s equity holdings. The Fund’s derivative activities are principally focused on the following derivatives: interest rate swaps, convertible securities, synthetic convertible instruments, options on individual securities, index options and forward currency exchange contracts (“forward contracts”). However, the Fund reserves the right to invest in other derivative instruments to the extent it is consistent with the Fund’s investment objective and restrictions. See “Investment Objective and Principal Investment Strategies — Principal Investment Strategies.” Equity Securities. Equity securities include common and preferred stocks, warrants, rights, and depository receipts. Under normal circumstances, the Fund will invest at least 50% of its managed assets in equity securities (including securities that are convertible into equity securities). See “— Convertible Securities” below. The Fund may invest in preferred stocks and convertible securities of any rating, including below investment grade. See “— High Yield Securities” below. Equity securities, such as common stock, generally represent an ownership interest in a company. Therefore, the Fund participates in the financial success or failure of any company in which it has an equity interest. Although equity securities have historically generated higher average returns than fixed income securities, equity securities have also experienced significantly more volatility in those returns. An adverse event, such as an unfavorable earnings report, may depress the value of a particular equity security held by the Fund. Also, the price of equity securities, particularly common stocks, are sensitive to general movements in the stock market. A drop in the stock market may depress the price of equity securities held by the Fund. Debt Securities. The Fund may invest in debt securities, including debt securities of U.S. and foreign corporate issuers (also known as corporate bonds). Holders of corporate bonds, as creditors, have a prior legal claim over common and preferred stockholders as to both income and assets of the issuer for the principal and interest due them and may have a prior claim over other creditors if liens or mortgages are involved. Interest on corporate bonds may be fixed or floating, or the securities may be zero coupon fixed income securities which pay no interest. Corporate bonds contain elements of both interest rate risk and credit ri […] versely with changes in interest rates and may also be affected by the credit rating of the issuer, the issuer’s performance and perceptions of the issuer in the marketplace. High Yield Securities. The Fund may invest in high yield securities for either current income or capital appreciation or both. These securities are rated below investment grade — i.e., rated “Ba” or lower by Moody’s Investors Service, Inc. (“Moody’s”) or “BB” or lower by Standard & Poor’s Financial Services, LLC, a subsidiary of The McGraw-Hill Companies, Inc. (“Standard & Poor’s”), or are unrated securities of comparable quality as determined by Calamos, the Fund’s investment adviser. The Fund may invest in high yield securities 4 Table of Contents of any rating. Non-convertible debt securities rated below investment grade are commonly referred to as “junk bonds” and are considered speculative with respect to the issuer’s capacity to pay interest and repay principal. Below investment-grade securities involve greater risk of loss, are subject to greater price volatility and are less liquid, especially during periods of economic uncertainty or change, than higher rated securities. Foreign Securities. The Fund may invest up to 100% of its managed assets in securities of foreign issuers in developed and emerging markets, including debt and equity securities of corporate issuers and debt securities of government issuers. Under normal circumstances, the Fund will invest at least 40% of its managed assets in securities of foreign issuers. The Fund will invest in the securities of issuers of several different countries throughout the world, in addition to the United States. A foreign issuer is a foreign government or a company organized under the laws of a foreign country. See “Investment Objective and Principal Investment Strategies — Principal Investment Strategies — Foreign Securities.” Convertible Securities. The Fund may invest in convertible securities. A convertible security is a debt security, debenture, note or preferred stock that is exchangeable for an equity security (typically of the same issuer) at a predetermined price (the “conversion price”). Depending upon the relationship of the conversion price to the market value of the underlying security, a convertible security may trade more like an equity security than a debt instrument. The Fund may invest in convertible securities of any rating. Securities that are convertible into equity securities are considered equity securities for purposes of the Fund’s policy to invest at least 50% of its managed assets in equity securities. Synthetic Convertible Instruments. The Fund may invest in “synthetic” convertible instruments. A synthetic convertible instrument is a financial instrument (or two or more securities held in tandem) that is designed to simulate the economic characteristics of another instrument (i.e., a convertible security) through the combined economic features of a collection of other securities or assets. Calamos may create a synthetic convertible instrument by combining separate securities that possess the two principal characteristics of a true convertible security, i.e., a fixed-income security (“fixed-income component”, which may be a convertible or non-convertible security) and the right to acquire an equity security (“convertible component”). The fixed-income component is achieved by investing in fixed-income securities such as bonds, preferred stocks and money market instruments. The convertible component is achieved by investing in warrants or options to buy common stock at a certain exercise price, or options on a stock index. The Fund may also invest in synthetic convertible instruments created by third parties, typically investment banks. Synthetic convertible instruments created by such parties may be designed to simulate the characteristics of traditional convertible securities or may be designed to alter or emphasize a particular feature. Traditional convertible securities typically offer the opportunity for stable cash flows with the ability to participate in capital appreciation of the underlying common stock. Traditional convertible securities are exercisable at the option of the holder. Synthetic convertible instruments may alter these characteristics by offering enhanced yields in exchange for reduced capital appreciation, additional risk of loss, or any combination of these features. Synthetic convertible instruments may include structured notes, equity-linked notes, mandatory convertibles and combinations of securities and instruments, such as a debt instrument combined with a forward contract. The Fund’s holdings of synthetic convertible instruments are considered equity securities for purposes of the Fund’s policy to invest at least 50% of its managed assets in equity securities. If the Fund purchases a synthetic convertible instrument, a component of which is an option, such option will not be considered an option for the purpose of the Fund’s limitations on options described below. See “Investment Objective and Principal Investment Strategies — Principal Investment Strategies — Synthetic Convertible Instruments.” Options Writing. The Fund may seek to generate income from option premiums by writing (selling) options (with an aggregate notional value of up to 33% of the value of the Fund’s managed assets). The Fund may write (sell) call options (i) on a portion of the equity securities (including equity securities obtainable by the Fund 5 Table of Contents through the exercise of its rights with respect to convertible securities it owns) in the Fund’s portfolio and (ii) on broad-based securities indices (such as the Standard and Poor’s 500 ® Index (“S&P 500”) or the MSCI EAFE ® Index (“MSCI EAFE”), which is an index of international equity stocks) or certain ETFs (exchange-traded funds) that trade like common stocks but seek to replicate such market indices. See “Investment Objective and Principal Investment Strategies — Principal Investment Strategies — Options Writing” and “Investment Objective and Principal Investment Strategies — Principal Investment Strategies — Options in General.” Rule 144A Securities. The Fund may invest without limit in certain securities (“Rule 144A Securities”), such as convertible and debt securities, that are typically purchased in transactions exempt from the registration requirements of the 1933 Act pursuant to Rule 144A under that Act. Rule 144A Securities may only be sold to qualified institutional buyers, such as the Fund. Any resale of these securities must generally be effected through a sale that is registered under the 1933 Act or otherwise exempted or excepted from such registration requirements. Under the supervision and oversight of the Fund’s Board of Trustees, Calamos will determine whether Rule 144A Securities are liquid. Typically, the Fund purchases Rule 144A Securities only if Calamos has determined them to be liquid. If any Rule 144A Security held by the Fund should become illiquid, the value of the security may be reduced and a sale of the security may be more difficult. See “Investment Objective and Principal Investment Strategies — Principal Investment Strategies — Rule 144A Securities.” Zero Coupon Securities. The securities in which the Fund invests may include zero coupon securities, which are debt obligations that are issued or purchased at a significant discount from face value. The discount approximates the total amount of interest the security will accrue and compound over the period until maturity or the particular interest payment date at a rate of interest reflecting the market rate of the security at the time of issuance. Zero coupon securities do not require the periodic payment of interest. These investme […]  is considered a “principal risk” of investing in the Fund, regardless of the order in which it appears. Antitakeover Provisions. The Fund’s Agreement and Declaration of Trust and By-Laws include provisions that could limit the ability of other entities or persons to acquire control of the Fund or to change the composition of its Board of Trustees. Such provisions could limit the ability of shareholders to sell their shares at a premium over prevailing market prices by discouraging a third party from seeking to obtain control of the Fund. These provisions include staggered terms of office for the Trustees, advance notice requirements for shareholder proposals, and super-majority voting requirements for certain transactions with affiliates, converting the Fund to an open-end investment company or a merger, asset sale or similar transaction. Holders of preferred shares have voting rights in addition to and separate from the voting rights of common shareholders with respect to certain of these matters. Holders of any preferred shares, voting separately as a single class, have the right to elect at least two Trustees at all times. See “Description of Securities — Preferred Shares” and “Certain Provisions of the Agreement and Declaration of Trust and By-Laws, Including Antitakeover Provisions.” The holders of preferred shares or debt, if any, on the one hand, and the holders of the common shares, on the other, may have interests that conflict with each other in certain situations, including conflicts that relate to the fees and expenses of the Fund. For more information on potential conflicts of interest between holders of common shares and holders of preferred shares, see “Fund Risks — Leverage Risk.” See also “Risk Factors — Fund Risks — Antitakeover Provisions.” Convertible Securities Risk. The value of a convertible security is influenced by both the yield of non- convertible securities of comparable issuers and by the value of the underlying common stock. The value of a convertible security viewed without regard to its conversion feature (i.e., strictly on the basis of its yield) is sometimes referred to as its “investment value.” A convertible security’s investment value tends to decline as prevailing interest\n"

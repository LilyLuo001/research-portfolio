ons, the Fund will invest in companies with a minimum market capitalization of $500 million. The Fund will invest in companies economically tied to U.S. and to foreign countries, including, potentially, companies domiciled or traded in emerging markets. The Fund’s currency is US Dollars, while some of its investments are denominated in foreign currencies. The Fund expects that normally, at least 40% of the Fund’s assets will be invested in global securities. For this purpose, “global securities” means securities issued by companies with significant business activities outside the U.S. Additional information on P\n"

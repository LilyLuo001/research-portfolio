ows of\n   the Target/Acquiring fund table, a 4-fund filing yields 4 objects}, ... ]}\n  or the no_event object above.\nEach event object:\n  fund_name        target mutual fund's full name (from excerpt)\n  family           fund family/trust (from excerpt)\n  mutual_fund_ticker / etf_ticker\n                   a single 2-6 char UPPERCASE symbol from the excerpt, else \"NA\".\n                   NEVER a fund name. Multiple class tickers → \"NA\" and list them in evidence.\n  announce_date    YYYY-MM-DD only. Board-approval date if stated; else the document's own\n                   date; else the filed date. Vague (\"May 2020\",\"Q4 2026\") → \"NA\".\n  date_basis       \"board\" | \"document\" | \"filed\" | \"NA\"\n  effective_date   YYYY-MM-DD only; the stated closing/completion date. Vague → \"NA\".\n  asset_class      equity_US / equity_intl / fixed_income / other — ONLY if locatable in the\n                   excerpt (bond/muni/high-yield/MBS→fixed_income; International/EM/Asia→\n                   equity_intl; explicit US equity→equity_US; managed-futures/multi-asset/\n                   long-short→other). Name alone insufficient → \"NA\".\n  AUM_at_conversion_USD  number from excerpt or \"NA\"\n  source_accession copy from the 文件 line\n  confidence       H = fund identity + (announce or effective) with explicit basis;\n                   M = identity clear, dates partly missing/document-dated;\n                   L = identity inferred from title only\n  evidence         ≤25-word quote fragment supporting the verdict (for events: the words\n                   showing the acquirer is an ETF; for no_event: the words showing why not)\nNEED_HUMAN only when TWO date statements INSIDE THIS ONE EXCERPT contradict for the same\nfund: {\"NEED_HUMAN\": true, \"quotes\": [\"...\", \"...\"]}. Different filings never contradict.\nNever fill any field from memory — excerpt-locatable or \"NA\".\n\nSELF-CHECK before emitting (do this, don't print it): every input item id appears exactly\nonce in your answer map (count them); every event object quotes ETF-acquirer evidence;\nevery date matches ^\\d{4}-\\d{2}-\\d{2}$ or is \"NA\"; no ticker field contains a space.】\n文件: 0000894189-22-007112 (form N-14/A, filed 2022-09-26, FundX Investment Trust  (CIK 0001602508))\nsource_url: https://www.sec.gov/Archives/edgar/data/1602508/000089418922007112/n-14a.htm\n节选:\nN-14/A 1 n-14a.htm N-14/A N-14/A Filed with the U.S. Securities and Exchange Commission on September 26, 2022 Registration No. 333-267121 UNITED STATES SECURITIES AND EXCHANGE COMMISSION Washington, D.C. 20549 FORM N-14 Pre-Effective Amendment No. 1 [ ] Post-Effective Amendment No. __ [ ] (Check appropriate box or boxes) (Check appropriate box or boxes.) FUNDX INVESTMENT TRUST (Exact Name of Registrant as Specified in Charter) 2020 East Financial Way, Suite 100 Glendora, CA 91741 (Address of Principal Executive Offices, including Zip Code) Registrant’s Telephone Number, including Area Code: (626) 914-7363 Jeff Smith FundX Investment Group 101 Montgomery Street, Suite 2400 San Francisco, CA 94104 (Name and Address of Agent for Service) Copy to: Steven G. Cravath, Esq. Cravath & Associates, LLC 19809 Shady Brook Way Gaithersburg, MD 20879 Approximate Date of Proposed Public Offering: As soon as practicable after this Registration Statement becomes effective under the Securities Act of 1933, as amended. The Registrant hereby amends the Registration Statement to delay its effective date until the Registrant shall file a further amendment that specifically states that the Registration S […] d Services P.O. Box 701 Milwaukee, WI 53201‑0701 1-866-455‑FUND [3863] IMPORTANT NOTICE OF INTERNET AVAILABILITY OF INFORMATION STATEMENT PROSPECTUS This Information Statement/Prospectus is available at www.fundxfunds.com . WE ARE NOT ASKING YOU FOR A PROXY AND YOU ARE REQUESTED NOT TO SEND US A PROXY. [ ], 2022 Dear Shareholder, We are sending this information to you because you are a shareholder of the FundX Upgrader Fund (the “Upgrader Fund”) or the FundX Aggressive Upgrader Fund (the “Aggressive Upgrader Fund” (each, a “Fund,” and together, the “Funds”), each a series of FundX Investment Trust (the “Trust”). After careful consideration, One Capital Management, LLC (“OCM” or the “Advisor”), the Fund’s investment advisor, has recommended converting each Fund into an Exchange Traded Fund, commonly referred to as an “ETF”, that is also a series of the Trust. These transactions will each be referred to as the “Conversion” or “Reorganization,” or together as the “Conversions” or the “Reorganizations.” OCM believes that each Fund’s shareholders will benefit from the Conversion. The Board of Trustees of the Trust (the “Board”) has also determined that the Conversions are in the best interests of each Fund and its shareholders, and that the interests of the Funds’ shareholders will not be diluted as a result of the Conversions. Each Fund will be converted into an ETF through a reorganization of the Fund into a newly-created ETF, which will also be a series of the Trust. The name of the ETFs will be the FundX ETF and the FundX Aggressive ETF, respectively (each, a “FundX ETF,” and together, the “FundX ETFs”). Following the Conversions, the advisory agreements and fundamental policies of the FundX ETFs will not be materially different from those of the Funds. Furthermore, as series of the Trust, the FundX ETFs will be overseen by the same independent Board members as the Funds, who were elected by shareholders. In addition, like the Funds, the FundX ETFs do not have a plan pursuant to Rule 12b-1 and are not subject to Rule 12b-1 distributions fees. As a result, we are not seeking shareholder approval for the Conversions and are therefore not seeking a proxy for your vote. Once the Conversions occur, the FundX ETFs will be managed by OCM and will have the same management style, investment restrictions and portfolio managers responsible for day-to-day management as were in place for the Funds. The enclosed Information Statement/Prospectus contains information about the Reorganizations. As a result of a Fund’s Reorganization, shareholders will receive shares (except for the value of any fractional shares which will be distributed in cash to Fund Shareholders upon the closing of the Reorganization) of the corresponding FundX ETF with the same aggregate net asset value (“NAV”) as the shares of the Fund you owned immediately prior to the Reorganization. The Board has determined that the ETF structure will provide certain benefits to shareholders, which are described more fully below. Some of these benefits include: 1. each FundX ETF will have a lower total expense ratio than the corresponding Fund. 2. shareholders will own their shares through brokerage accounts and will be able to trade their shares throughout the trading day at the then-prevailing market price on the stock exchange on which it is listed, which may be higher or lower than the NAV of your shares. 3. The Reorganizations are structured to qualify as tax-free for U.S. federal income tax purposes. Note: that shareholders receiving cash in exchange for fractional shares, will likely experience a taxable event on the cash received. 4. The ETF structure will enable the FundX ETFs to provide certain tax efficiencies which will be passed along to shareholders. After the Conversions, former Fund shareholders will still be invested in a diversified, open-end fund that pursue the identical investment objectives and uses the same principal investment strategies, but they will hold shares of the corresponding FundX ETF. As further explained in the enclosed Information Statement/Prospectus, direct shareholders must transfer their shares to the broker dealer of their choice. Fractional shares of a Fund will be exchanged for cash at the time of the Conversion. This exchange is expected to be tax-free for shareholders, except with respect to fractional shares exchanged for cash, which would result in a taxable event. Shareholders will be able to redeem shares of the Funds in the ordinary course until October 10, a week before the closing of the Reorganizations. After the Conversion, the FundX ETFs will remain registered investment companies, but they will be exchange traded, and you will own shares as you did before the Conversion, but in the shares of the corresponding FundX ETF instead of the Fund. You will no longer redeem individual shares directly from a Fund; should you decide to purchase or sell shares in a FundX ETF after the Conversion, you will need to place a trade through a broker-dealer who will execute your trade on the NYSE or other nationally recognized exchange at prevailing market prices, which may be higher or lower than the NAV of your shares. As with all ETFs, your broker may charge a commission for purchase and sales transactions, although many brokers do not charge commissions for transactions in ETFs. The FundX ETFs will be fully transparent, actively-managed ETFs, which means that portfolio holdings will be available on the FundX website every day. The FundX website will also contain other information about the FundX ETFs, such as the NAV, market price, premiums and discounts, and bid-ask spreads, as required by rules that govern ETFs. Shareholder Letter 2 For the reasons above, OCM and the Board believe your interests will be better served as a result of the Reorganizations. On the next business day after the Reorganization, you will own shares of equal value in the FundX ETF as you owned in the corresponding Fund immediately prior to the Reorganization. DIRECT SHAREHOLDERS MUST TAKE ACTION BEFORE RECEIVING THEIR FUNDX ETF SHARES. What is a direct shareholder? If you hold your shares directly with the FundX Upgrader Fund or the FundX Aggressive Upgrader Fund, you are a direct shareholder. If you hold your shares through a brokerage account, you are NOT a direct shareholder. More information, including how to determine if you are a direct shareholder, is contained in the box below. Direct shareholders must do one of the following: 1. Transfer your shares to the broker dealer of your choice. We urge you to begin this process immediately if this is your preferred option. This is the option that we recommend. 2. Redeem your shares in the Fund X Upgrader Fund or the FundX Aggress ive Upgrader Fund by 10/07/2022 (one week prior to the conversion). You can do this by calling 1-866-455‑FUND [3863]. We recommend you consult with your tax advisor as selling your shares may have tax consequences. If you are a direct shareholder and you fail to take any action, your shares will be converted into shares of the applicable corresponding FundX ETF and held by the stock transfer agent, U.S. Bank Global Fund Services, waiting for your instructions. We encourage you to carefully review the enclosed materials, which explain the Reorganizations in more detail. If you have any questions or need additional information, please contact the Funds at 1-866-455‑FUND [3863]. Shareholder Letter 3 Important Information for Direct Shareholders Are You a Direct Shareholder? If you are a Direct Shareholder, that means that your shares are held by the Funds’ Transfer Agent. How do you know if you hold your shares directly? If your shares in the Fund are listed as a position on a statement from your brokerage firm, then you already hold your shares in a brokerage account. If you are uncertain, please call 1-866-455‑FUND [3863] and ask if you’re a direct shareholder. Additionally, if you hold your shares directly you will receive separate communications from us including email, regular mail, express delivery and via telephone. Transferring Your Direct Shares to a Brokerage Account Transferring your shares from the Transfer Agent to a brokerage account should be a simple and seamless process, and it should not cost you anything. If you have a brokerage account or a relationship with a brokerage firm, please talk to your advisor/broker and inform them that you would like to transfer a mutual fund position that you hold directly with the fund into your brokerage account. If you don’t have a brokerage account or a relationship with a brokerage firm, you will need to open an account. We suggest you provide your broker with a copy of your Fund statement. Your broker will require your Fund account number, which can be found on your statement. Your broker will help you complete a form to initiate the transfer. Once you sign this form, your broker will submit the form to the Transfer Agent directly and the shares will be transferred into your brokerage account. The sooner you initiate the transfer, the better . Redeem your shares in the Fund X Upgrader Fund or the FundX Aggress ive Upgrader Fund by 10/07/2022 (one week prior to the conversion). If you have any questions about this process or need assistance, call us at 1-866-455‑FUND [3863]. This step is only required by shareholders that hold their shares directly with the Funds. If you already hold your shares in a brokerage account, you can ignore this section. Sincerely, [signature image] Janet Brown, President, FundX Investment Trust Shareholder Letter 4 QUESTIONS AND ANSWERS Q. What is this document and why did you send it to me? A. This document is an information statement/prospectus (the “Information Statement”). It contains information to inform shareholders of an Agreement and Plan of Reorganization At a meeting held on August 25, 2022, the Board of Trustees (the “Board”) of the FundX Investment Trust (the “Trust”), including a majority of the Trustees who are not “interested persons” (“Independent Trustees”), as defined in the Investment Company Act of 1940, as amended (“1940 Act”), approved the proposed reorganization of the FundX Upgrader Fund (“FUNDX” and the FundX Aggressive Upgrader Fund (“HOTFX”) (each, a “Fund,” and together, the “Funds” ) into the FundX ETF and the FundX Aggressive ETF, respectively (each, a “FundX ETF,” and together, the “FundX ETFs”). The reorganization will be accomplished by converting each Fund, which currently operates as a traditional open-end mutual fund, into the corresponding FundX ETF, which operates as an exchange-traded fund, commonly referred to as an “ETF.” These transactions will each be referred to as the “Conversion” or “Reorganization,” or together as the “Conversions” or the “Reorganizations.” Q. Do Shareholders need to vote on this matter? A. No. The Trust is a Delaware statutory trust. Section 4 of Article VIII of the Trust’s Declaration of Trust permits the Trust, unless otherwise required by law, to cause any one or more series of the Trust to be merged or consolidated with or into any one or more series of the Trust without shareholder approval. The Funds and the FundX ETFs are all series of the Trust and are considered to be affiliated companies under the 1940 Act, and the Reorganizations are considered to be mergers of affiliated companies for purposes of Rule 17a-8 under the 1940 Act. Rule 17a-8(3) permits the merger of affiliated companies without obtaining shareholder approval if: (i) no fundamental policy of the merging company is materially different from the fundamental policies of the surviving company; (ii) no advisory contract between the merging company is materially different from an advisory contract of the surviving company; (iii) trustees of the merging company who are not interested persons of the merging company and who were elected by its shareholders will comprise a majority of the trustees of the surviving company who are not interested persons of the surviving company; and (iv) any distribution fees authorized to be paid by the surviving company pursuant to Rule 12b-1 are no greater than the distribution fees of the merging company. As discussed in detail in the Combined Information Statement and Prospectus, the Reorganizations meet the criteria set forth in Rule 17a-8(3). Furthermore, the Board, including a majority of the Independent Trustees, has determined that the Conversions are in the best interests of the Funds, and that the interests of the Funds’ shareholders will not be diluted as a result of the Conversions. Q. What is the process for converting the funds into ETFs? What should I expect as a shareholder? A. Your current shares in FUNDX or HOTFX will be exchanged for the same number of shares (less any fractional shares) and value in the corresponding FundX ETF. Shares of the ETFs are not issued in fractional shares, so if you own fractional shares, these will be redeemed at NAV immediately prior to the reorganization, and this will result in a small cash payment, which will be taxable if you hold the shares in a taxable account. Once the conversion has occurred, you will no longer be a shareholder of the FUNDX or HOTFX; you will be a shareholder of the corresponding FundX ETF. Q. Is there anything I need to do as a shareholder of FUNDX or HOTFX? A. If you own FUNDX or HOTFX in a brokerage account that permits you to purchase securities traded in the stock market, such as ETFs, then there’s nothing you need to do. On October 17, 2022, your shares will be exchanged for shares of the ETF, and you’ll be able to purchase or trade these shares. If you own FUNDX or HOTFX directly with our shareholder services, you will need to set up a brokerage account prior to the reorganization and then transfer your shares into the brokerage account. If you have an existing brokerage account for other assets, you’ll need to transfer your shares to your brokerage account in order to be able to purchase or trade shares of the ETF. In connection with the Reorganizations, direct shareholders of the Funds should transfer their Fund shares to the broker dealer of their choice. On the day of the Conversions, your brokerage account shares of a FundX ETF will have the same value as the value of your shares in the corresponding Fund on the business day preceding the day of the Reorganizations (except for the value of any fractional shares which will be distributed in cash to Fund shareholders upon the closing of the Conversions). Transferring your shares to a brokerage account should be a simple process. Reach out to the brokerage firm and tell them that you would like to transfer a mutual fund position that you hold directly into your brokerage account and that your brokerage account will need to be set up to accept ETF shares We suggest you provide your broker with a copy of your quarterly statement for your direct account with the FundX funds. Your broker will require your account number, which can be found on your statement. Your broker will help you complete a form to initiate the transfer. Once you sign that form, your broker will submit the form to our shareholder services at the Funds’ transfer agent and your shares will be transferred into your brokerage account. If you participate in an automatic investment or withdrawal plan , you should be aware that these plans will no longer be available. These plans will be turned off after 10/10/2022 and will not restart in the ETF. Q. Is additional information about the Funds available? A. Yes, additional information about the Funds is available in the Funds’: • Prospectus dated January 30, 202 2, as suppleme nted May 26, 2022 ; • Statement of Additional Information dated January 30 , as supplemented May 26, 20 2 2 ; • Annual Report for the fiscal year ended September 30, 2021 ; and • Semi-Annual Report for the six-month period ended March 31, 2 022 . These documents are on file with the U.S. Securities and Exchange Commission (the “SEC”). Questions & Answers 2 Copies of all of these documents are available to be sent to you by first-class mail upon request without charge by writing to or calling: Fund X Funds c/o U.S. Bank Global Fund Services P.O. Box 701, Milwaukee, WI 53201-0701 1-866-455-FUND [3863] You also may view or obtain these documents from the SEC: • By Email: publicinfo@sec.gov (duplicating fee required) • By Internet: www.sec.gov Whom do I call if I have questions? We will be happy to answer your questions about this Information Statement/Prospectus. Please call the Funds at 1-866-455-FUND [3863] between 9:00 a.m. and 7:00 p.m., Central Time, Monday through Friday. Q. What will change when the Funds are converted to ETFs? A. As a result of the Conversions, FUNDX and HOTFX will each become an exchange-traded investment fund, known as an ETF. After the Conversion of a Fund, you will continue to be invested in a registered investment company, but it will be exchange-traded, and you will own shares as you did before the Conversion, but in the corresponding FundX ETF instead of the Fund. You will no longer redeem individual shares directly from the Fund; should you decide to purchase or sell shares in a FundX ETF after the Conversion, you will need to place a trade through a broker-dealer who will execute your trade on the NYSE or other nationally recognized exchange at prevailing market prices, which may be higher or lower than the net asset value (“NAV”) of your shares. As with all ETFs, your broker may charge a commission for purchase and sales transactions, although many brokers do not charge commissions for transactions in ETFs. The FundX ETFs will be fully transparent, actively-managed ETFs, which means that portfolio holdings will be available on the FundX website every day. The FundX website will also contain other information about the FundX ETFs, such as the NAV, market price, premiums and discounts, and bid-ask spreads, as required by rules that govern ETFs. Q. What other changes are anticipated as part of the implementation of the Conversion? A. Each Acquiring ETF will have a lower total operating expense ratio than the corresponding Target Fund. The Target Funds currently pay the Funds’ investment advisor, One Capital Management, LLC (“OCM” or the “Advisor”) at the following annual rates: Questions & Answers 3 Annual Advisory Fee FundX Upgrader Fund 1.00% on assets up to $500 million, 0.90% on assets between $500 million and $750 million, 0.80% on assets between $750 million and $1 billion, and 0.70% on assets over $1 billion. FundX Aggressive Upgrader Fund 1.00% on assets up to $500 million, 0.90% on assets between $500 million and $750 million, 0.80% on assets between $750 million and $1 billion, and 0.70% on assets over $1 billion. Furthermore, each Target Fund has an total operating expense cap of 1.35% of average daily net assets of the Fund, excluding interest charges on any borrowings and dividends and other expenses on securities sold short, taxes, brokerage commissions and other expenses incurred in placing orders for the purchase and sale of securities and other investment instruments, expenses associated with the purchase, sale, or ownership of securities, acquired fund fees and expenses, accrued deferred tax liability, extraordinary expenses, and distribution (12b-1) fees and expenses. The Acquiring ETFs pay the Advisor a unitary management fee at the following annual rates, which are identical to the annual rates of the management fee paid by the Target Funds to the Advisor: Annual Adviso […] sets between $750 million and $1 billion, and 0.70% on assets over $1 billion. FundX Aggressive Upgrader ETF 1.00% on assets up to $500 million, 0.90% on assets between $500 million and $750 million, 0.80% on assets between $750 million and $1 billion, and 0.70% on assets over $1 billion. From the unitary management fees, the Advisor pays most of the expenses of each Acquiring ETF, including the cost of transfer agency, custody, fund administration, legal, audit and other services, but excluding interest expenses, brokerage commissions and other trading expenses, taxes, and other extraordinary costs such as litigation and other expenses not incurred in the ordinary course of business, and distribution (12b-1) fees and expenses. Q. Will the Conversion affect the way the Funds are invested? A. No. OCM will serve as advisor to the FundX ETFs, and the investment style, restrictions, philosophy, parameters and methodology will all remain the same as was in place for the Funds. The FundX ETFs will be actively managed and the portfolio managers responsible for day-to-day management will remain the same as managed the Funds. Q. What other ways will the Conversion help in lowering operating expenses for the Funds? A. Simply put, it is far more efficient to operate an ETF than a traditional open-end mutual fund. There are a number of areas where the operational costs are lower, most notably transfer agency fees and shareholder servicing fees. In addition, because of how the creation unit process works, an ETF will receive incoming transfers of shares, so that the ETF does not incur traditional custody and brokerage costs when new ETF shares are created. Similarly, when a block of shares is redeemed from an ETF, the redemption is paid out by delivering shares of the underlying portfolio, which means that the ETF generally does not sell portfolio holdings to pay redemptions, and therefore, the ETF generally does not have to realize capital gains and losses to be distributed to all shareholders. Questions & Answers 4 In addition, traditional mutual funds must pay state registration fees in some jurisdictions, which are not required for ETFs. There are other activity-based fees (custodial-based fees, and brokerage fees and expenses) that are incurred when traditional mutual fund shares are purchased or redeemed, which are part of the mutual fund’s operating costs and are shared by all of the shareholders of a traditional mutual fund. In the case of an ETF, as described above, these purchase- and redemption-related expenses are generally incurred and borne by the Authorized Participant and not by the shareholders of the fund. There are some expenses that are unique to ETFs, such as exchange listing fees, but these costs are insignificant compared to the cost savings. Currently, the Advisor has agreed to an expense cap of 1.35% of average daily net assets for each of the Funds. After the Conversion, each Fund will have a unitary fee struc ture, which will effectively cap each Fund’s expenses at 1.00% (based on each Fund’s current asset levels). Summary of Changes Current Fund Name Fund Name After Conversion Current Symbol Symbol After Conversion Current Net Expense Ratio after Waiver/Reimbursement Post-Conversion Estimated Net Expense Ratio (1) FundX Upgrader Fund FundX ETF FUNDX XCOR 1.35% 1.00% FundX Aggressive Upgrader Fund FundX Aggressive ETF HOTFX XNAV 1.35% 1.00% (1) The Management Fee for each of the Acquiring ETFs is subject to breakpoints at different asset levels, at the following rates: 1.00% on assets up to $500 million, 0.90% on assets between $500 million and $750 million, 0.80% on assets between $750 million and $1 billion, and 0.70% on assets over $1 billion. In the event an Acquiring ETF reaches a breakpoint asset level, its net expense ratio would be lower. Q. Are there other benefits or disadvantages to ETFs? A. Yes, there are a number of additional benefits and some disadvantages to the ETF structure. Flexibility to Exit. ETFs offer significantly more flexibility for investors because investors can purchase and sell shares intra-day at a market-determined price, instead of being forced to wait for a redemption at the next calculated NAV per share at the end of the trading day. This means that when a shareholder decides to purchase, or sell, shares of the ETF they can act on that decision immediately by calling their broker or placing an order. The price realized may be higher or lower than the ETF’s NAV per share and might not be the same at the ETF’s next calculated NAV at the close of the trading day. You should understand, however, that unlike a mutual fund shareholder, an ETF shareholder generally cannot redeem their shares directly from a Fund at t […] ribution of capital gains, but ETFs generally have been able to avoid large annual distributions of capital gains, because ETFs generally do not sell positions to fund redemptions of creation units; instead, they transfer the securities – and their associated tax items – to the redeeming Authorized Participant. ETF shareholders should recognize that their individual purchase and sale activity in the ETF shares could create individual tax obligations, and this is likely to happen if shares are held in a taxable account. Brokerage Interaction for Sales – ETFs are bought and sold differently than mutual funds. While ETFs enjoy a cost advantage over traditional open-end mutual funds, investors that wish to purchase or sell ETF shares after the Conversions will need to have a broker-dealer execute their transaction. Unlike a mutual fund, FundX ETF shares cannot be purchased or redeemed directly, except if you are an Authorized Participant. This could mean that as a disadvantage, shareholders may pay a brokerage commission to sell, or buy, FundX ETF shares (although some brokerage firms no longer charge brokerage commissions for transactions in ETFs). Paying a brokerage commission may or may not be significant depending on the type of brokerage firm used, the commission structure (which could be a flat fee or a per share charge) and the services provided by the broker-dealer. By contrast, under the mutual fund model, shares in the Funds are currently available for purchase directly from the Funds without any charge and are also available from a variety of broker-dealers; currently, when shares in the Funds are traded through these broker-dealers, sometimes there is a transaction charge and sometimes there is no transaction charge, depending on the individual shareholder’s relationship with the broker-dealer; and some shareholders who buy shares through a broker dealer are participating in an investment arrangement that includes other charges, such as an account fee. In addition, another disadvantage could be that ETF shares have a bid-ask spread and this spread may be considered a form of transaction charge. A bid-ask spread is the difference between the highest price a buyer is willing to pay for ETF shares on the E […] es trade, and thus align the market price more closely with the NAV. Similarly, when an ETF’s shares trade at market prices above the NAV (at a “premium”), Authorized Participants would likely make new creation units of ETF shares, which they will then sell into the market, profiting from the difference, and this selling pressure also may have the effect of driving market price of the ETF shares closer to NAV. The activity described here should work to keep the NAV and the market price generally in line with one another. There are times when the markets are extremely volatile that this mechanism breaks down, and there have been instances where some exchange traded funds trade at prices significantly different from the NAV. Q. When will the Conversion occur? A. The Advisor is anticipating a Conversion date of around October 17, 2022. This date could be delayed, because some administrative conditions must be satisfied to implement the Funds’ conversion. The Funds will publicly disclose updates on material developments throughout the process. Additionally, updates on the Conversion process will be available at www.fundxfunds.com . Q. Are the other FundX Funds turning into ETFs? A. There are no current plans to convert the FundX Conservative Upgrader Fund (RELAX), Sustainable Impact Fund (SRIFX), and Flexible Income Fund (INCMX). However, if you currently own Questions & Answers 7 these funds directly with our shareholder services at U.S. Bank Global Fund Services (“Global Fund Services”), you may consider transferring these shares to a brokerage account in order to keep your investments all in one place. Q. Who will pay for the Conversion? A. The costs of the Reorganization will be borne by the Advisor. The costs associated with the Reorganization will not have an effect on the net asset value per share of the Fund. The costs associated with the Reorganization are expected to be approximately $66,500. Q. Will shareholders have to pay any sales load, commission, or other similar fee in connection with the Reorganization? A. No. The Advisor will pay all expenses incurred in connection with the reorganizations. Shareholders will not pay any sales load, commission, or other similar fee in connection with the Reorganiz\n"

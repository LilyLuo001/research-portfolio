 Reorganization will be measured from the earlier of the time (i) you purchased your Target Fund shares or (ii) you purchased your shares of any other fund advised by BFA and subsequently exchanged them for shares of the Target Fund. Q: Do I need to take any action in connection with the Reorganization? A: No. Your shares will automatically be converted into shares of the Acquiring Fund on the date of the completion of the Reorganization. You will receive written confirmation that this change has taken place. No certificates for shares will be issued in connection with the Reorganization. The aggregate net asset value of the Acquiring Fund Shares you receive in the Reorganization will be equal to the aggregate net asset value of the shares you own in the Target Fund immediately prior to the Reorganization. Q: Will the Reorganization create a taxable event for me? A: The Reorganization is expected to qualify as a tax-free “reorganization” under Section 368(a) of the Internal Revenue Code of 1986, as amended (the “Code”). In general, if the Reorganization so qualifies, the Target Fund and the Acquiring Fund will not recognize any gain or loss for U.S. federal income tax purposes from the transactions contemplated by the Reorganization (except for any gain or loss that may be required to be recognized solely as a result of the close of the Target Fund’s taxable year due to the Reorganization or as a result of the transfer of certain assets). At any time before the Reorganization takes place, a shareholder may redeem shares of the Target Fund. Generally, such redemptions would be taxable transactions. It is anticipated that the Target Fund will dispose of certain of its holdings prior to the Reorganization in connection with realigning the Target Fund’s portfolio (“Realignment Sales”); however, it is expected that the  […] ndustry or commodity, such as drought, floods, weather, embargoes, tariffs and international economic, political and regulatory developments. • Concentration Risk — To the extent that the Combined Fund or an Underlying Fund is concentrated in the securities of companies, a particular market, industry, group of industries, sector or asset class, country, region or group of countries, the Combined Fund or that Underlying Fund may be adversely affected by the performance of those securities, may be subject to increased price volatility and may be more susceptible to adverse economic, market, political or regulatory occurrences affecting that market, industry, group of industries, sector or asset class, country, region or group of countries. • Convertible Securities Risk — The market value of a convertible security performs like that of a regular debt security; that is, if market interest rates rise, the value of a convertible security usually falls. In addition, convertible securities are subject to the risk that the issuer will not be able to pay interest, principal or dividends when due, and their market value may change based on changes in the issuer’s credit rating or the market’s perception of the issuer’s creditworthiness. Since it derives a portion of its value from the common stock into which it may be converted, a convertible security is also subject to the same types of market and issuer risks that apply to the underlying common stock, including the potential for increased volatility in the price of the convertible security. • Corporate Loans Risk — Commercial banks and other financial institutions or institutional investors make corporate loans to companies that need capital to grow or restructure. Borrowers generally pay interest on corporate loans at rates that change in response to changes in market interest rates such as the Secured Overnight Financing Rate (“SOFR”) or the prime rates of U.S. banks. As a result, the value of corporate loan investments is generally less exposed to the adverse effects of shifts in market interest rates than investments that pay a fixed rate of interest. The market for corporate loans may be subject to irregular trading activity and wide bid/ask spreads. In addition, transactions in corporate loans may settle on a delayed basis. As a result, the proceeds from the sale of corporate loans may not be readily available to make additional investments or to meet the Combined Fund’s redemption obligations. To the extent the extended settlement process gives rise to short-term liquidity needs, the Combined Fund may hold additional cash, sell investments or temporarily borrow from banks and other lenders. • Counterparty Risk — The counterparty to an over-the-counter derivatives contract or a borrower of the Combined Fund’s securities may be unable or unwilling to make timely principal, interest or settlement payments, or otherwise to honor its obligations. Any such failure to honor its obligations may cause significant losses to the Combined Fund. • Depositary Receipts Risk — Depositary receipts are generally subject to the same risks as the foreign securities that they evidence or into which they may be converted. In addition to investment risks 16 Table of Contents associated with the underlying issuer, depositary receipts expose the Combined Fund to additional risks associated with the non-uniform terms that apply to depositary receipt programs, credit exposure to the depository bank and to the sponsors and other parties with whom the depository bank establishes the programs, currency risk and the risk of an illiquid market for depositary receipts. The issuers of unsponsored depositary receipts are not obligated to disclose information that is, in the United States, considered material. Therefore, there may be less information available regarding these issuers and there may not be a correlation between such information and the market value of the depositary receipts. While depositary receipts provide an alternative to directly purchasing underlying foreign securities in their respective markets and currencies, they continue to be subject to many of the risks associated with investing directly in foreign securities, including political, economic, and currency risk. • Distressed Securities Risk — Distressed securities are speculative and involve substantial risks in addition to the risks of investing in junk bonds. The Combined Fund will generally not receive interest payments on the distressed securities and may incur costs to protect its investment. In addition, distressed securities involve the substantial risk that principal will not be repaid. These securities may prese […] nized under the laws of the State of Delaware. Under the Trust’s organizational documents, each Fund is authorized to issue an unlimited number of shares of beneficial interest, with no par value. With respect to each Fund, shares of the same class within such Fund have equal dividend, distribution, liquidation, and voting rights, and fractional shares have those rights proportionately. With respect to each Fund, each class of shares within such Fund bears its own expenses related to its distribution of shares (and other expenses such as shareholder or administrative services), and has exclusive voting rights with respect to matters relating to the class’ account maintenance and/or distribution expenditures. The shares of each Fund have no conversion or exchange rights except as the Board may grant in its discretion. There are no preemptive or appraisal rights in connection with the shares of either the Target Fund or the Acquiring Fund. When issued in accordance with the provisions of their respective prospectuses (and, in the case of shares of the Acquiring Fund, issued in connection with the Reorganization), all shares are fully paid and non-assessable. 48 Table of Contents APPENDIX I FUNDAMENTAL AND NON-FUNDAMENTAL INVESTMENT RESTRICTIONS Fundamental Investment Restrictions: Each Fund may not: 1. Purchase the securities of issuers conducting their principal business activity in the same industry if, immediately after the
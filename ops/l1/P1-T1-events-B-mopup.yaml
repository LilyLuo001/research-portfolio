ows of\n   the Target/Acquiring fund table, a 4-fund filing yields 4 objects}, ... ]}\n  or the no_event object above.\nEach event object:\n  fund_name        target mutual fund's full name (from excerpt)\n  family           fund family/trust (from excerpt)\n  mutual_fund_ticker / etf_ticker\n                   a single 2-6 char UPPERCASE symbol from the excerpt, else \"NA\".\n                   NEVER a fund name. Multiple class tickers → \"NA\" and list them in evidence.\n  announce_date    YYYY-MM-DD only. Board-approval date if stated; else the document's own\n                   date; else the filed date. Vague (\"May 2020\",\"Q4 2026\") → \"NA\".\n  date_basis       \"board\" | \"document\" | \"filed\" | \"NA\"\n  effective_date   YYYY-MM-DD only; the stated closing/completion date. Vague → \"NA\".\n  asset_class      equity_US / equity_intl / fixed_income / other — ONLY if locatable in the\n                   excerpt (bond/muni/high-yield/MBS→fixed_income; International/EM/Asia→\n                   equity_intl; explicit US equity→equity_US; managed-futures/multi-asset/\n                   long-short→other). Name alone insufficient → \"NA\".\n  AUM_at_conversion_USD  number from excerpt or \"NA\"\n  source_accession copy from the 文件 line\n  confidence       H = fund identity + (announce or effective) with explicit basis;\n                   M = identity clear, dates partly missing/document-dated;\n                   L = identity inferred from title only\n  evidence         ≤25-word quote fragment supporting the verdict (for events: the words\n                   showing the acquirer is an ETF; for no_event: the words showing why not)\nNEED_HUMAN only when TWO date statements INSIDE THIS ONE EXCERPT contradict for the same\nfund: {\"NEED_HUMAN\": true, \"quotes\": [\"...\", \"...\"]}. Different filings never contradict.\nNever fill any field from memory — excerpt-locatable or \"NA\".\n\nSELF-CHECK before emitting (do this, don't print it): every input item id appears exactly\nonce in your answer map (count them); every event object quotes ETF-acquirer evidence;\nevery date matches ^\\d{4}-\\d{2}-\\d{2}$ or is \"NA\"; no ticker field contains a space.】\n文件: 0001615774-19-009307 (form 497, filed 2019-06-12, Amplify ETF Trust  (CIK 0001633061))\nsource_url: https://www.sec.gov/Archives/edgar/data/1633061/000161577419009307/s118905_497.htm\n节选:\n497 1 s118905_497.htm 497 EXCHANGE TRADED CONCEPTS TRUST YieldShares High Income ETF NYSE Arca Ticker: YYY 10900 Hefner Pointe Drive, Suite 207 Oklahoma City, Oklahoma 73120 www.yieldshares.com 855-796-3863 June 10, 2019 Dear Shareholder: A Special Meeting of Shareholders of the YieldShares High Income ETF, a series of Exchange Traded Concepts Trust (“ETC Trust”), has been scheduled for August 1, 2019. The Special Meeting has been called to vote on a proposal to reorganize the YieldShares High Income ETF (the “Target Fund”) into the Amplify High Income ETF (the “Acquiring Fund”), which is a newly created series of Amplify ETF Trust (“Amplify Trust”) designed to be substantially similar to the Target Fund from an investment perspective (the “Reorganization”). Exchange Traded Concepts, LLC (“ETC”), an Oklahoma limited liability company, is the investment adviser and Vident Investment Advisory, LLC (“Vident”) and Amplify Investments LLC (“Amplify”) are the sub-advisers for the Target Fund. Amplify is the investment adviser and Penserra Capital Management (“Penserra”) is the sub-adviser for the Acquiring Fund. The investment objective and strategies of the Target Fund and Acquiring Fun […] information above and other information summarized in the Proxy Statement/Prospectus, ETC concluded that reorganizing the Target Fund into the Acquiring Fund would be in the best interest of the Target Fund and its shareholders. Therefore, upon the recommendation of ETC, the Board of Trustees of ETC Trust (the “Board”) approved the reorganization of the Target Fund into a new series of Amplify Trust. In order to reconstitute the Target Fund under the Amplify Trust, a corresponding fund, the Acquiring Fund, has been created as a new series of Amplify Trust. If shareholders of the Target Fund approve the Reorganization, then all of the assets of the Target Fund will be acquired by the Acquiring Fund and your shares of the Target Fund will be converted into shares of the Acquiring Fund. Question : How will the Reorganization work? Answer : Subject to the approval of the shareholders of the Target Fund, pursuant to the Plan, the Target Fund will transfer all of its assets to the Acquiring Fund in return for shares of the Acquiring Fund and the Acquiring Fund’s assumption of the Target Fund’s liabilities. The Target Fund will then liquidate and distribute the shares it receives from the Acquiring Fund to the shareholders of the Target Fund. Shareholders of the Target Fund will become shareholders of the Acquiring Fund and, immediately after the Reorganization, each shareholder will hold a number of shares of the Acquiring Fund equal in aggregate value at the time of the exchange to the aggregate value of such shareholder’s shares of the Target Fund immediately prior to the Reorganization. If the Plan is carried out as proposed with respect to the Target Fund, we generally do not expect the Reorganization to result in the recognition of gain or loss by either the Target Fund or its shareholders for federal income tax purposes. A detailed explanation of the proposal is contained in this Proxy Statement. If the Plan is approved by shareholders of the Target Fund at the Special Meeting, the Reorganization presently is expected to be effective after the close of business on or about August 15, 2019. Question : How will this affect my investment? Answer : Following the Reorganization, you will be a shareholder of the Acqu […]  separate series of ETC Trust. ETC currently is the investment adviser to the Target Fund and Vident Investment Advisory, LLC (“Vident”) and Amplify Investments LLC (“Amplify”) are currently the sub-advisers, providing day-to-day portfolio management services to the Target Fund. ETC has recommended that the Target Fund be reconstituted as a series of Amplify Trust. In order to reconstitute the Target Fund under the Amplify ETF Trust (“Amplify Trust”), a corresponding fund, referred to as the “Acquiring Fund,” has been created as a new series of Amplify Trust. If shareholders approve the Reorganization, then all of the assets and liabilities of the Target Fund will be acquired by the Acquiring Fund and your shares of the Target Fund will be converted into shares of the Acquiring Fund. The investment objective, strategies and fundamental policies of the Target Fund and the Acquiring Fund are the same. After the Reorganization of the Target Fund, ETC will no longer serve as investment adviser to the Target Fund and Amplify will serve as the Acquiring Fund’s investment adviser. Penserra Capital Management (“Penserra”)will become the Acquiring Fund’s sub-adviser. ETC Trust is a series trust that offers a number of portfolios managed by ETC and, if applicable a sub-adviser. As of December 31, 2018, ETC Trust consisted of 11 portfolios representing approximately $1.79 billion in assets. Amplify Trust offers 8 portfolios managed by Amplify and a sub-adviser. As of December 31, 2018, Amplify Trust represented approximately $475.9 million in assets. ETC Trust is not affiliated with Amplify Trust or Amplify. ETC Trust and Amplify Trust have different Boards of Trustees. Custody, administration, accounting, transfer agency, and distribution services (“Third Party Service Arrangements”) are provided to ETC Trust by Brown Brothers Harriman & Co. (custody and transfer agent), SEI Investments Global Funds Services (administration and fund accounting) and SEI Investments Distribution Co. (distribution). Third Party Service Arrangements are provided to Amplify Trust by U.S. Bank, N.A. (custody), U.S. Bancorp Fund Services, LLC (custody, administration, fund accounting, and transfer agency) and Foreside Fund Services, LLC (distri […]  as detailed in the Methodology. The Index is unmanaged and cannot be invested in directly. Same. The universe of Underlying Funds eligible for inclusion in the Index is not restricted by the types of securities or other instruments in which they may invest or the types of investment strategies they may employ. Thus, the Underlying Funds may invest in a variety of securities including, but not limited to, equity securities (both dividend and non-dividend paying), foreign securities (including depositary receipts), taxable investment grade fixed income securities, investment grade municipal securities, taxable high yield fixed income securities and high yield municipal securities (commonly referred to as “junk bonds”), preferred securities, convertible securities, commodities, real-estate related securities, including real estate investment trusts (“REITs”), and derivatives. The Underlying Funds may employ different investment strategies including, but not limited to, dividend strategies, global and international strategies, covered call option strategies, balanced strategies, limited duration strategies, tax and risk-managed strategies, sector strategies, real estate, energy, utility, commodity, natural resources and other equity or income oriented strategies. Same. 6 Target Fund Acquiring Fund The Fund employs a “passive management” investment strategy in seeking to achieve its investment objective. The Fund generally will use a replication methodology, meaning it will invest in all of the Underlying Funds comprising the Index in proportion to the weightings in the Index. However, the Fund may utilize a sampling methodology under various circumstances where it may not be possible or practicable to purchase all of the Underlying Funds in the Index. Exchange Traded Concepts, LLC (the “Adviser”) expects that over time, if the Fund has sufficient assets, the correlation between the Fund’s performance, before fees and expenses, and that of the Index will be 95% or better. A figure of 100% would indicate perfect correlation. Same. The Fund will concentrate its investments (i.e., invest more than 25% of its total assets) in a particular industry or group of industries to approximately the same extent that the Index c […] isted closed-end funds, as selected and ranked according to factors employed by the Methodology that are designed to result in a portfolio that produces high current income. The Index universe is not limited by the types of securities or other instruments in which an Underlying Fund may invest, nor the investment strategy an Underlying Fund may employ. Thus, the Underlying Funds may invest in a variety of securities including, but not limited to, equity securities (both dividend and non-dividend paying), foreign securities (including depositary receipts), taxable investment grade fixed income securities, taxable high yield fixed income securities, investment grade municipal securities, high yield municipal securities, preferred securities, convertible securities, commodities, real-estate related securities, including REITs, and derivatives. The Underlying Funds may employ different investment strategies including, but not limited to, dividend strategies, global and international strategies, covered call option strategies, balanced strategies, limited duration strategies, tax and risk-managed strategies, sector strategies, real estate, energy, utility, commodity, natural resources and other equity or income-oriented strategies. The Index universe is not limited by the types of securities or other instruments in which an Underlying Fund may invest, nor the investment strategy an Underlying Fund may employ. The only type of security issued by an Underlying Fund that will be considered for inclusion in the Index is common stock (or its equivalent). Eligible constituents must have a market capitalization of at least $500 million and a six month daily average value traded of at least $1 million to be included in the Index. Each eligible Index constituent is then ranked and ordered according to the following factors: in descending order by fund yield, which takes into account all distributions made by a closed-end fund, including return of capital; in ascending order by fund share price premium/discount to NAV on the Index rebalancing date; and in descending order by fund average daily value of shares traded over the six month period prior to the Index rebalancing date. An overall rank for each eligible Index constitu\n"

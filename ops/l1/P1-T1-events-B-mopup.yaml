], 2023 Dear Shareholder: We have important information concerning your investment in the Touchstone Dynamic Allocation Fund (the \"Target Fund\"), a mutual fund series of Touchstone Strategic Trust (the \"Target Trust\"). As a shareholder of the Target Fund, we wish to inform you that the Board of Trustees of the Target Trust has approved the conversion of the Target Fund to an exchange-traded fund (an \"ETF\") through the reorganization of the Target Fund into the Touchstone Dynamic International ETF (the \"Acquiring ETF\"), a newly created ETF series of the Touchstone ETF Trust (the \"Acquiring Trust\") (the \"Reorganization\"). The Target Fund and the Acquiring ETF are referred to herein as the \"Funds.\" The Reorganization requires shareholder approval. Following the Reorganization, you will hold shares of the Acquiring ETF instead of the Target Fund. The Reorganization is taking place because the Board of Trustees of the Target Trust believes that it is in the best interests of the Target Fund and its shareholders to reorganize the Target Fund into the Acquiring ETF. We believe that the Target Fund and its shareholders will benefit from the Reorganization as the Acquiring ETF will have a lower total annual operating expense ratio than each class of the Target Fund and you will be able to buy and sell shares of the Acquiring ETF throughout the trading day. In addition, the Acquiring ETF will be managed by the same investment adviser, Touchstone Advisors, Inc. (\"Touchstone Advisors\" or the \"Adviser\"), as the Target Fund. The Target Fund is sub-advised by Wilshire Advisors, LLC (\"Wilshire\"), and the Acquiring ETF will be sub-advised by Los Angeles Capital Management, LLC (\"Los Angeles Capital\"). The Funds have the same investment goal and similar principal investment strategies, subject to certain differences described in the enclosed Proxy Statement/Prospe […]  will transfer all of its assets and liabilities to the Acquiring ETF. As a result of the Reorganization, you will receive shares of the Acquiring ETF that will have a total value as of the close of business on the closing date of the Reorganization equal to the total value of your shares in the Target Fund as of such time. The Target Fund will then cease operations and terminate. The Reorganization is expected to be completed on or about October 20, 2023. In the Reorganization, you will receive shares of the Acquiring ETF with the same aggregate net asset value as your shares of the Target Fund immediately prior to the Reorganization, except you will receive cash equal to the net asset value of any fractional shares held at such time. The conversion of fractional Acquiring ETF shares to cash may be subject to fees and expenses and will be a taxable event. In addition, if your Target Fund shares are held outside of a brokerage account or are held in an account that cannot accept Acquiring ETF shares at the time of the Reorganization, Acquiring ETF shares received in the Reorganization will be held by a stock transfer agent, BNY Mellon Investment Servicing (US) Inc. (\"BNYM\"), until a brokerage account is identified into which BNYM can transfer the shares. However, if you hold your Target Fund shares through a direct individual retirement account (\"IRA\") or a Coverdell Education Savings account (\"CESA\") held with the Target Fund at the time of the Reorganization, your Target Fund shares will exchanged for an equivalent share class of the Touchstone Ultra Short Duration Fixed Income Fund and such exchange will not be a tax-reportable event. Finally, if you hold your shares of the Target Fund through an account with a financial intermediary that is not able to hold shares of the Acquiring ETF, like many group retirement plans, your financial intermediary may transfer your investment in the Target Fund to a different investment option prior to the Reorganization. Please consult with your financial intermediary for more information on the impact that the Reorganization will have on you and your investments. The Board of Trustees of the Target Trust recommends that you vote FOR the Reorganization proposal. Please note […] Target Fund shares to the broker-dealer of your choice . We urge you to begin this process immediately if this is your preferred option. This is the option that we recommend. Look at the box at the end of this letter for more information. 2. Exchange your Target Fund shares for shares of another Touchstone mutual fund. You can do this by calling us at (800) 543-0407. You may also exchange your shares online via the Touchstone Funds' website TouchstoneInvestments.com. 3. Redeem your shares in the Target Fund . You can do this by calling us at (800) 543-0407. You may also redeem your shares online via the Touchstone Funds' website: TouchstoneInvestments.com. If you are a Direct Shareholder and you fail to take any action, your shares will be converted into shares of the Acquiring ETF and held by a stock transfer agent, BNYM, waiting for your instructions. 1 Additionally, if you are a Direct Shareholder who holds Target Fund shares through a direct IRA or CESA held with the Target Fund and do not take action prior to the Reorganization, your Target Fund shares will be exchanged for an equivalent share class of the Touchstone Ultra Short Duration Fixed Income Fund. We will continue to contact you to assist you in transferring your shares into a brokerage account. We have enclosed a Proxy Statement/Prospectus that describes the Reorganization proposal in greater detail, as well as important information about the Acquiring ETF. Your vote is extremely important, so please read the entire Proxy Statement/Prospectus. Please contact Shareholder Services at (800) 543-0407 or Morrow Sodali Fund Solutions, the proxy solicitor, at (888) 575-2251, with any questions. Sincerely, E. Blake Moore, Jr. President Touchstone Strategic Trust 1 Shares held by this stock transfer agent are held subject to applicable state and federal law concerning unclaimed property. IMPORTANT INFORMATION FOR DIRECT SHAREHOLDERS Am I a Direct Shareholder? You are a \"Direct Shareholder\" if your shares are held directly by the Target Fund at its transfer agent (\"Transfer Agent\"). How do you know if you hold your shares directly? If you receive quarterly statements from Touchstone Funds, then you hold your shares directly. If your shares in the Target Fu […] edemption order and your shares are redeemed at the next calculated NAV, which does not happen until the end of each trading day. o This means you will no longer purchase or redeem your shares for cash at the next determined NAV, but rather at the prevailing market price, which may be higher or lower, than the NAV. o Buying or selling shares of the Acquiring ETF may involve paying a brokerage commission. Additionally, because prices on the exchange may be higher or lower than the Acquiring ETF's NAV, you may pay more than NAV when buying Acquiring ETF shares and receive less than NAV when selling Acquiring ETF shares. • Other Benefits : In addition, Touchstone Advisors believes, and the Board agreed, that operating the Acquiring ETF in the exchange-traded fund structure offers other potential benefits, such as reduced operational costs, increased tax efficiency associated with the ETF structure, and greater holdings transparency and liquidity. After the Reorganization, you will still be invested in an open-end fund with the same investment goal, similar investment strategies and investment restrictions, operated by the same investment adviser, but at a lower overall cost. The Fund's investment strategies, sub-adviser, and portfolio management team will change immediately following the Reorganization, as described herein. The Reorganization is designed to be a non-taxable event for you. However, if you hold fractional Target Fund shares as of the date of the Reorganization, you will receive cash equal to the net asset value (\"NAV\") of such fractional shares in the Reorganization, which will cause you to recognize gain or loss for income tax purposes. For example, if you hold 125.555 shares of the Target Fund at the time of the Closing, you will receive a cash distribution equal to the NAV of the 0.555 fractional share amount and the 125 shares will be reorganized into the Acquiring ETF. In addition, if you hold Target Fund shares through a direct individual retirement account (\"IRA\") or a Coverdell Education Savings account (\"CESA\") held with Touchstone and you do not convert your IRA or CESA to a brokerage account, your Target Fund shares will be exchanged for an equivalent share class of the Touchstone Ultra S\n"

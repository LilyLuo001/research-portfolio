res could lead to greater market execution risk, valuation risks, liquidity risks, and costs for the Fund. Internal social unrest or confrontations with other neighboring countries, including military conflicts in response to such events, may also disrupt economic development in China and result in a greater risk of currency fluctuations, currency non-convertibility, interest rate fluctuations and higher rates of inflation. China has experienced security concerns, such as terrorism and strained international relations. Incidents involving China’s or the region’s security may cause uncertainty in the Chinese markets and may adversely affect the Chinese economy and the Fund’s investments. Reduction in spending on Chinese products and services, institution of tariffs or other trade barriers or a downturn in any of the economies of China’s key trading partners may have an adverse impact on the Chinese economy. These actions may trigger a significant reduction in international trade, the oversupply of certain manufactured goods, substantial price reductions of goods and possible failure of individual companies and/or large segments of China’s export industry, which could have a negative impact on the Fund’s performance. Recent developments in relations between the United States and China have heightened concerns of increased tariffs and restrictions on trade between the two countries. It is unclear whether further tariffs may be imposed or other escalating actions may be taken in the future, which could negatively impact the Fund. From time to time and as recently as February 2020, China has experienced outbreaks of infectious illnesses, and the country may be subject to other public health threats, infectious illnesses, diseases or similar issues in the future. Any spread of an infectious illness, public health threat or simil […] ce of equity or equity related securities may decline due to changes in a company’s financial condition and overall market and economic conditions. Mid Cap and Small Cap Securities Risk – Investments in mid- and small-capitalization companies involve greater risks than investments in larger, more established companies. Many of these companies are young and have limited operating or business history. These securities may be subject to more abrupt or erratic price movements and may lack sufficient market liquidity, and these issuers often face greater business risks, including the risk of bankruptcy. Depositary Receipts Risk – The Fund may invest in securities of foreign issuers in the form of depositary receipts or other securities that are convertible into securities of foreign issuers, including depositary receipts that are not sponsored by a financial institution (“Unsponsored Depositary Receipts”). Depositary receipts are generally subject to the same risks as the foreign securities that they evidence or into which they may be converted. Unsponsored Depositary Receipts are also subject to the risk that there may be less information available regarding their issuers and there may not be a correlation between such information and the market value of the depositary receipts. Generally, CDRs, in registered from, are designed for use in the Chinese securities markets. CDRs may involve certain risks not applicable to investing in U.S. issuers, including changes in currency rates, application of local tax laws, changes in governmental administration or economic or monetary policy or changed circumstances in dealings between nations. Volatility Risk – The Fund’s investments may fluctuate in value over a short period of time. This may cause the Fund’s net asset value per share to experience significant changes in value over short periods of time. Derivatives Risk – Derivatives are instruments whose value depends on, or is derived from, the value of an underlying asset, reference rate or index. Derivatives may be riskier than other types of investments because they may be more sensitive to changes in economic or market conditions than other types of investments and could result 6 ​ in losses that significantly exceed the Fund’s original investment. Successful use of derivative instruments by the Fund depends on the Sub-Advisers’ judgment with respect to a number of factors and the Fund’s performance could be worse and/or more volatile than if it had not used these instruments. In addition, the fluctuations i […] ts (net assets plus the amount of any borrowings for investment purposes) in investments of the type suggested by its name, as set forth in the Fund’s Principal Investment Strategy section (“80% Policy”). This requirement is applied at the time the Fund invests its assets. If, subsequent to an investment by the Fund, this requirement is no longer met, the Fund’s future investments will be made in a manner that will bring the Fund into compliance with this requirement. In addition, in appropriate circumstances, synthetic investments may count toward the 80% minimum if they have economic characteristics similar to the other investments included in the basket. For the purposes of the Fund’s 80% Policy, the Fund may also include investments in exchange-traded funds (“ETFs”) toward the 80% minimum so long as each such ETF has policies to invest 80% or more of their assets in China A shares. The Fund’s 80% Policy is not a “fundamental” one, which means that it may be changed without the vote of a majority of the Fund’s outstanding shares as defined in the 1940 Act. The name of the Fund may be changed at any time by a vote of the Fund’s Board of Directors. Shareholders will be given written notice at least 60 days prior to any change by the Fund of its 80% Policy covered by Rule 35d-1. ADDITIONAL INVESTMENT STRATEGIES AND RISKS The Fund may invest in various securities and engage in various investment techniques that are not the principal focus of the Fund and, therefore, are not described in this prospectus. These securities and techniques, together with their risks, ar
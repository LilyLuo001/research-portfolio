ars exactly\nonce in your answer map (count them); every event object quotes ETF-acquirer evidence;\nevery date matches ^\\d{4}-\\d{2}-\\d{2}$ or is \"NA\"; no ticker field contains a space.】\n文件: 0001193125-24-067151 (form N-14, filed 2024-03-14, MAINSTAY FUNDS TRUST  (CIK 0001469192))\nsource_url: https://www.sec.gov/Archives/edgar/data/1469192/000119312524067151/d808365dn14.htm\n节选:\nN-14 1 d808365dn14.htm MAINSTAY FUNDS TRUST MAINSTAY FUNDS TRUST Table of Contents As filed with the Securities and Exchange Commission on March 14, 2024 Securities Act File No. [ ] UNITED STATES SECURITIES AND EXCHANGE COMMISSION Washington, D.C. 20549 FORM N-14 REGISTRATION STATEMENT UNDER THE SECURITIES ACT OF 1933 ☑ Pre-Effective Amendment No. [ ] Post-Effective Amendment No. [ ] MAINSTAY FUNDS TRUST (Exact Name of Registrant as Specified in Charter) 51 Madison Avenue, New York, New York 10010 (Address of Principal Executive Offices) (Zip Code) (800) 624-6782 (Registrant’s Area Code and Telephone Number) J. Kevin Gao, Esq. MainStay Funds Trust 30 Hudson Street Jersey City, New Jersey 07302 (Name and Address of Agent for Service) With copies to: Thomas C. Bogle, Esq. Corey F. Rose, Esq. Dechert LLP 1900 K Street, NW Washington, DC 20006 Approximate Date of Proposed Public Offering: As soon as practicable after this Registration Statement becomes effective. It is proposed that this filing will become effective on April 13, 2024, pursuant to Rule 488 under the Securities Act of 1933, as amended. No filing fee is required because an indefinite number of shares have previously been  […] 1.10%; and Class I, 0.55%. This agreement will remain in 23 Table of Contents effect until February 28, 2027, and thereafter shall renew automatically for one-year terms unless New York Life Investments provides written notice of termination prior to the start of the next term or upon approval of the Board of Trustees of the Acquiring Fund. Example The Example is intended to help you compare the cost of investing in each Fund with the cost of investing in other mutual funds. The Example assumes that you invest $10,000 in each Fund for the time periods indicated and then redeem or hold all of your shares, as indicated below, at the end of those periods (except as indicated with respect to Class C shares). The Example reflects Class C shares converting into Class A shares in years 7-10 for the Acquired Fund and years 9-10 for the Acquiring Fund, respectively. The Example also assumes that your investment has a 5% return each year, and that each Fund’s operating expenses remain the same. The example reflects the contractual fee waiver and/or expense reimbursement arrangement, if applicable, for the current duration of the arrangement only. Although your actual costs may be higher or lower, based on these assumptions your costs would be: Aquila Tax-Free Fund For Utah Expenses After Class A Class C Class F Class Y 1 Year $ 388 $ 272 $ 67 $ 70 3 Years $ 579 $ 537 $ 216 $ 225 5 Years $ 787 $ 926 $ 377 $ 393 10 Years $ 1,384 $ 1,610 $ 845 $ 881 You would pay the following expenses if you did not redeem your Class C Shares: Expenses After Class C 1 Year $ 172 3 Years $ 537 5 Years $ 926 10 Years $ 1,610 MainStay MacKay Utah Muni Fund Pro Forma Combined Expenses After Class Z Class C Class I 1 Year $ 377 $ 212 $ 56 3 Years $ 542 $ 353 $ 180 5 Years $ 720 $ 616 $ 318 10 Years $ 1,237 $ 1,285 $ 720 You would pay the following expenses if you did not redeem your Class C Shares: Expenses After Class C 1 Year $ 112 3 Years $ 353 5 Years $ 616 10 Years $ 1,285 Comparison of Portfolio Turnover Each Fund pays transaction costs, such as commissions, when it buys and sells securities (or “turns over” its portfolio). A higher portfolio turnover rate may indicate higher transaction costs and may result in higher taxes when Fund shar […] d with respect to such returns. (m) All Acquired Fund Shares are, and on the Closing Date will be, duly and validly issued and outstanding, fully paid and non-assessable by AMT and have been offered and sold in compliance with applicable registration requirements of the 1933 Act and state securities laws of each state in which they have been offered and sold. All Acquired Fund Shares will, at the Effective Time, be held by the persons and in the amounts set forth in the records of the Transfer Agent, on behalf of the Acquired Fund, as provided in paragraph 3.3. The Acquired Fund does not have outstanding any options, warrants or other rights to subscribe for or purchase any of the Acquired Fund Shares, nor is there outstanding any security convertible into any Acquired Fund Shares. (n) The execution, delivery and performance of this Agreement will have been duly authorized prior to the Effective Time by all necessary action, if any, on the part of the Board of Trustees of AMT, on behalf of the Acquired Fund, and, subject to the approval of the shareholders of the Acquired Fund, this Agreement will constitute a valid and binding obligation of AMT, on behalf of the Acquired Fund, enforceable in accordance with its terms, subject, as to enforcement, to bankruptcy, insolvency, reorganization, moratorium and other laws relating to or affecting creditors’ rights and to general equity principles. (o) The information to be furnished by the Acquired Fund for use in registration statements, proxy materials and other documents filed or to be filed with any federal, state or local regulatory authority (including the Financial Industry Regulatory Authority, Inc. (“FINRA”)) that may be necessary in connection with the transactions contemplated hereby, is or will be accurate and complete in all material respects and is or will comply in all material respects with federal securities and other laws and regulations applicable thereto. (p) The Proxy Statement (as defined in paragraph 5.6), insofar as it relates to the Acquired Fund, from the date of the Proxy Statement through the date of the meeting of the shareholders of the Acquired Fund contemplated therein and at the Effective Time (i) does not contain any untrue statement o […]  Service or by any state or local tax authority for taxes in excess of those already paid. The authorized capital of MainStay Funds consists of an unlimited number of shares of beneficial interest, no par value, of such number of different series as the Board of Trustees of MainStay Funds may authorize from time to time. As of the date of this Agreement, the Acquiring Fund has no outstanding shares of any class. As of the Closing Date, the authorized and offered shares of beneficial interest of the Acquiring Fund will include, among other classes, Class C, Class I and Class Z shares, each having the characteristics described in the Acquiring Fund’s prospectus. No options, warrants or other rights to subscribe for or purchase, or securities convertible into, any Acquiring Fund Shares are outstanding. (k) The execution, delivery and performance of this Agreement will have been duly authorized prior to the Effective Time by all necessary action, if any, on the part of the Board of Trustees of MainStay Funds, on behalf of the Acquiring Fund, and, subject to the approval of the shareholders of the Acquired Fund, this Agreement will constitute a valid and binding obligation of MainStay Funds, on behalf of the Acquiring Fund, enforceable in accordance with its terms, subject, as to enforcement, to bankruptcy, insolvency, reorganization, moratorium and other laws relating to or affecting creditors’ rights and to general equity principles. A-6 Table of Contents (l) The Acquiring Fund’s authorized capitalization will be as set forth in its prospectus and statement of additional information at the Effective Time and the Acquiring Fund Shares shall conform in all material respects to the description thereof contained in such prospectus and statement of additional information. The Acquiring Fund Shares to be issued and delivered to the Acquired Fund, for the account of the Acquired Fund Shareholders, pursuant to the terms of this Agreement, will at the Effective Time have been duly authorized and, when so issued and delivered, will be duly and validly issued Acquiring Fund Shares, will be fully paid and non-assessable by MainStay Funds, and will have been issued in every jurisdiction in compliance in all material respects with applicable registration requirements and applicable securities laws. The Acquiring Fund does not have outstanding any options, warrants or other rights to subscribe for or purchase any of the Acquiring Fund Shares, nor is there outstanding any security convertible into any of the Acquiring Fund’s shares. (m) The information to be furnished by the Acquiring Fund for use in registration statements, proxy materials and other documents filed or to be filed with any federal, state or local regulatory authority (including FINRA) that may be necessary in connection with the transactions contemplated hereby shall be accurate and complete in all material respects and shall comply in all material respects with federal securities and other laws and regulations applicable thereto. (n) The Proxy Statement (as defined in paragraph 5.6), insofar as it relates to the Acquiring Fund and the Acquiring Fund Shares, from the date of the Proxy Statement through the date of the meeting of the shareholders of the Acquired Fund contemplated therein and at the Effective Time (i) does not contain any untrue statement of a material fact or omit to state a material fact required to be stated therein or necessary to make the statements therein, in light of the circumstances under which such statements were made, not materially misleading, and (ii) complies in all material respects with the provisions of the 1933 Act, if applicable, the 1934 Act, and the 1940 Act and the rules and regulations thereunder; provided, however, that the representations and warranties of this subparagraph (n) shall not apply to statements in or omissions from the Proxy Statement made in reliance upon and in conformity with information that was furnished by the Acquired Fund o […] on Fund, MainStay Growth ETF Allocation Fund and MainStay Moderate ETF Allocation Fund. • “MainStay Funds” collectively refers to each mutual fund managed by New York Life Investment Management LLC. • “MainStay International/Global Equity Funds” collectively refers to the MainStay Candriam Emerging Markets Equity Fund, MainStay CBRE Global Infrastructure Fund, MainStay Epoch Capital Growth Fund, MainStay Epoch Global Equity Yield Fund, MainStay Epoch International Choice Fund, MainStay PineStone Global Equity Fund, MainStay PineStone International Equity Fund and MainStay WMC International Research Equity Fund. • “MainStay Mixed Asset Funds” collectively refers to the MainStay Balanced Fund, MainStay Income Builder Fund and MainStay MacKay Convertible Fund. • “MainStay Tax-Exempt Funds” collectively refers to the MainStay MacKay Arizona Muni Fund, MainStay MacKay California Tax Free Opportunities Fund, MainStay MacKay Colorado Muni Fund, MainStay MacKay High Yield Municipal Bond Fund, MainStay MacKay New York Tax Free Opportunities Fund, MainStay MacKay Oregon Muni Fund, MainStay MacKay Short Term Municipal Fund, MainStay MacKay Strategic Municipal Allocation Fund, MainStay MacKay Tax Free Bond Fund and MainStay MacKay Utah Muni Fund. • “MainStay Taxable Bond Funds” collectively refers to the MainStay Candriam Emerging Markets Debt Fund, MainStay Floating Rate Fund, MainStay MacKay High Yield Corporate Bond Fund, MainStay MacKay Short Duration High Income Fund, MainStay MacKay Strategic Bond Fund, MainStay MacKay Total Return Bond Fund, MainStay MacKay U.S. Infrastructure Bond Fund, MainStay Money Market Fund and MainStay Short Term Bond Fund. • “MainStay U.S. Equity Funds” collectively refers to the MainStay CBRE Real Estate Fund, MainStay Epoch U.S. Equity Yield Fund, MainStay Fiera SMID Growth Fund, MainStay S&P 500 Index Fund, MainStay PineStone U.S. Equity Fund, MainStay Winslow Large Cap Growth Fund, MainStay WMC Enduring Capital C-1 Table of Contents Fund, MainStay WMC Growth Fund, MainStay WMC Small Companies Fund and MainStay WMC Value Fund. • The Board of Trustees of MainStay Funds Trust and the Board of Trustees of The MainStay Funds are collectively referred to as the “Board.” • The Investment Compa\n"

Target Fund’s and Survivor Fund’s investment objective is high total return with reasonable risk. Both Funds are managed by Pinnacle Family Advisors LLC (“Pinnacle” or the “Adviser”). While the Funds use slightly different investment techniques and allocations at times, both Funds satisfy their respective investment objectives by investing primarily in exchange-traded funds that the Adviser believes have the potential for high total return. We anticipate that the Reorganization will result in benefits to the shareholders of the Target Fund as discussed more fully described in the Combined Prospectus/Information Statement. As a general matter, we believe that after the Reorganization, the Combined Fund will provide shareholders of the Target Fund with a similar investment objective with greater long-term viability and the potential to attract additional assets. After considering the performance of each Fund and the expenses associated with the investment structure of the Target Fund, the Adviser recommended to the Board that the Target Fund be reorganized into the Survivor Fund. The Board has concluded that the Reorganization is in the best interest of each Fund and its respective shareholders. In approving the Reorganization, the Board considered, among other things, the similarities between the Funds’ investment objectives and strategies, the fact that the management fee for the Target Fund and the Combined Fund is the same, the differences in historical performance between the Target Fund and the Survivor Fund, and the terms and conditions of the Agreement and Plan of Reorganization and Termination (the “Plan of Reorganization”). The Board also considered that it is not anticipated that the Reorganization should have any tax consequences for shareholders. The Plan of Reorganization provides that the Target Fund will trans […]  the securities. In addition, the ETFs in which the Fund invests will incur expenses not incurred by their applicable indices. Certain securities comprising the indices tracked by the ETFs, from time to time, temporarily be unavailable, which may further impede the ability to track the applicable indices. Fixed Income Risk : When the Fund invests in fixed income securities, the value of your investment in the Fund will fluctuate with changes in interest rates. Typically, a rise in interest rates causes a decline in the value of fixed income securities owned by the Fund. In general, the market price of debt securities with longer maturities will increase or decrease more in response to changes in interest rates than shorter-term securities. Convertible securities are hybrid securities that have characteristics of both fixed income securities and common stocks and are subject to risks associated with both debt securities and equity securities. Other risk factors include credit risk (the debtor may default) and prepayment risk (the debtor may pay its obligation early, reducing the amount of interest payments; or the debtor may pay its obligation later than expected, reducing the returns earned by an investment). These risks could affect the value of a particular investment by the Fund possibly causing the Fund’s share price and returns to be reduced and fluctuate more than other types of investments. 19 Foreign Currency Risk: Currency trading involves significant risks, including market risk, interest rate risk, country risk, counterparty credit risk and short sale risk. Market risk results from the price movement of foreign currency values in response to shifting market supply and demand. Since exchange rate changes can readily move in one direction, a currency position carried overnight or over a number of days may involve greater risk than one carried a few minutes or hours. Interest rate risk arises whenever a country changes its stated interest rate target associated with its currency. Country risk arises because virtually every country has interfered with international transactions in its currency. Interference has taken the form of regulation of the local exchange market, restrictions on foreign investment  […] WASHINGTON BLVD JERSEY CITY, NJ 07310 150,326.2070 12.78% A shareholder who owns of record or beneficially more than 25% of the outstanding shares of a Fund or who is otherwise deemed to “control” a Fund may be able to determine or significantly influence the outcome of matters submitted to a vote of the Fund’s shareholders. Shareholder Rights and Obligations Both the Target Fund and Survivor Fund are series of the Trust, a business trust organized under the laws of the state of Delaware. Under the Trust’s declaration of trust, the Trust is authorized to issue an unlimited number of shares of beneficial interest, without par value, from an unlimited number of series of shares. The shares of each series of the Trust have no preference as to conversion, exchange, dividends, retirement or other features, and have no preemptive rights. With respect to each Fund, shares have equal dividend, distribution, liquidation, and voting rights, and fractional shares have those rights proportionately. When issued in accordance with the provisions of their respective prospectuses (and, in the case of shares of the Survivor Fund, issued in the connection with the Reorganization), all shares are fully paid and non-assessable. Shareholder Proposals The Funds do not hold regular annual meetings of shareholders. As a general matter, the Survivor Fund does not intend to hold future regular annual or special meetings of its shareholders unless the election of trustees is required by the 1940 Act. Any shareholder who wishes to submit a proposal for consideration at a meeting of shareholders of either Fund should send such proposal to 225 Pictoria Drive, Suite 450, Cincinnati, OH 45246. To be considered for presentation at a shareholders’ meeting, rules promulgated by the SEC require that, among other 32 things, a shareholder’s proposal must be received at the offices of a Fund
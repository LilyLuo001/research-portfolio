ows of\n   the Target/Acquiring fund table, a 4-fund filing yields 4 objects}, ... ]}\n  or the no_event object above.\nEach event object:\n  fund_name        target mutual fund's full name (from excerpt)\n  family           fund family/trust (from excerpt)\n  mutual_fund_ticker / etf_ticker\n                   a single 2-6 char UPPERCASE symbol from the excerpt, else \"NA\".\n                   NEVER a fund name. Multiple class tickers → \"NA\" and list them in evidence.\n  announce_date    YYYY-MM-DD only. Board-approval date if stated; else the document's own\n                   date; else the filed date. Vague (\"May 2020\",\"Q4 2026\") → \"NA\".\n  date_basis       \"board\" | \"document\" | \"filed\" | \"NA\"\n  effective_date   YYYY-MM-DD only; the stated closing/completion date. Vague → \"NA\".\n  asset_class      equity_US / equity_intl / fixed_income / other — ONLY if locatable in the\n                   excerpt (bond/muni/high-yield/MBS→fixed_income; International/EM/Asia→\n                   equity_intl; explicit US equity→equity_US; managed-futures/multi-asset/\n                   long-short→other). Name alone insufficient → \"NA\".\n  AUM_at_conversion_USD  number from excerpt or \"NA\"\n  source_accession copy from the 文件 line\n  confidence       H = fund identity + (announce or effective) with explicit basis;\n                   M = identity clear, dates partly missing/document-dated;\n                   L = identity inferred from title only\n  evidence         ≤25-word quote fragment supporting the verdict (for events: the words\n                   showing the acquirer is an ETF; for no_event: the words showing why not)\nNEED_HUMAN only when TWO date statements INSIDE THIS ONE EXCERPT contradict for the same\nfund: {\"NEED_HUMAN\": true, \"quotes\": [\"...\", \"...\"]}. Different filings never contradict.\nNever fill any field from memory — excerpt-locatable or \"NA\".\n\nSELF-CHECK before emitting (do this, don't print it): every input item id appears exactly\nonce in your answer map (count them); every event object quotes ETF-acquirer evidence;\nevery date matches ^\\d{4}-\\d{2}-\\d{2}$ or is \"NA\"; no ticker field contains a space.】\n文件: 0000898432-19-000410 (form 497, filed 2019-03-20, AMERICAN BEACON FUNDS  (CIK 0000809593))\nsource_url: https://www.sec.gov/Archives/edgar/data/809593/000089843219000410/a497.htm\n节选:\n497 1 a497.htm INVESTMENT MANAGERS SERIES TRUST Palmer Square SSI Alternative Income Fund 235 W. Galena Street Milwaukee, Wisconsin 53212 March 20, 2019 Your action is required. Please vote today. Dear shareholders: A Special Meeting of Shareholders (the “Special Meeting”) of the Palmer Square SSI Alternative Income Fund (the “Target Fund”), a series of Investment Managers Series Trust (the “IMST Trust”), a Delaware statutory trust, will be held at 2:00 p.m. Central Time on April 29, 2019, at the office of Palmer Square Capital Management LLC (“Palmer Square”), 1900 Shawnee Mission Parkway, Suite 315, Mission Woods, Kansas 66205. At the Special Meeting, shareholders of the Target Fund will be asked to approve a proposed Agreement and Plan of Reorganization and Termination (the “Plan”), which provides for the reorganization of the Target Fund into the American Beacon SSI Alternative Income Fund (the “Acquiring Fund”), a newly created series of American Beacon Funds, a Massachusetts business trust (the “Acquiring Trust”) (the “Reorganization”), as further described below. If the Reorganization is approved it would, in effect, move the Target Fund to the American Beacon funds complex. […]  be transferred to and held by the Acquiring Fund. Target Fund Acquiring Fund Investment Objectives The primary investment objective of the Fund is income. As a secondary investment objective, the Fund seeks absolute returns. The Fund’s investment objectives are not fundamental and may be changed by the Board of Trustees without shareholder approval upon at least 60 days’ prior written notice to shareholders. The Fund’s investment objectives are to seek income, and, secondarily, absolute returns. The Fund’s investment objectives are “non-fundamental,” which means that they may be changed by the Fund’s Board of Trustees (“Board”) without the approval of Fund shareholders. Principal Investment Strategies The Fund seeks primarily to invest in convertible securities and to establish short positions in the common stock of the issuers of those convertible securities. These short positions are intended to provide the Fund’s holdings of convertible securities with some protection from decreases in the price of the related common stock. The Fund seeks to hedge its long positions in this way on a security-by-security basis. The term “convertible security” refers to a bond or a preferred stock that can be converted into shares of a company’s common stock. The Fund’s strategy in this regard is managed on a day-to-day basis by the Sub-Advisor, subject to overall monitoring by the Advisor. The Fund seeks primarily to invest in convertible securities and to establish short positions in the common stock of the issuers of the convertible securities. The short positions are intended to reduce the Fund’s exposure to decreases in the price of the related common stock. The Fund seeks to hedge its long positions in this way on a security-by-security basis. The term “convertible security” refers to a bond or a preferred stock (including a trust preferred security) that can be converted into shares of a company’s common stock. The Fund’s strategy in this regard is managed on a day-to-day basis by SSI Investment Management, Inc., the sub-advisor to the Fund. Pursuant to its strategy, the Fund seeks returns that exceed prevailing short-term interest rates (e.g., the return on 90-day U.S. Treasury bills). Pursuant to its strategy, the Fund seeks returns that exceed prevailing short-term interest rates, such as the return on 90-day U.S. Treasury bills, from four primary sources: 1) net dividend income on equity and convertible securities positions; 2) interest income on 7 Target Fund Acquiring Fund In pursuing its strategy, the Fund seeks returns from four primary sources: 1) Net dividend income on equity and convertible securities positions; 2) Interest income on convertible securities positions; 3) Interest rebates on short positions; and 4) Net capital gains from trading profits. convertible securities positions; 3) interest rebates on short positions; and 4) net capital gains from trading profits. In combining long positions in convertible securities with short positions in common stock of the issuers of those securities, the Fund seeks to maintain a “hedged convertible” investment portfolio with returns that the Advisor and Sub-Advisor expect will generally be less volatile than and have low correlation with the broader capital markets, prevailing short-term interest rates, and capital markets indices. In addition, the Advisor and the Sub-Advisor anticipate that this strategy will generally lead to lower correlation between the returns experienced by the Fund’s investment portfolio and the performance of those markets, rates, and indices. There can be no assurance that this strategy will reduce the volatility and correlation of the Fund’s investment portfolio in the manner intended. In combining long positions in convertible securities with short positions in common stock of the issuers of those securities, the Fund seeks to maintain a “hedged convertible” investment portfolio with income and returns which are generally less volatile than and have low correlation with the broader capital markets, short-term interest rates and capital markets indices (absolute returns). The Fund will generally invest in convertible securities that are part of an issuance that is at least $40 million in size. The Fund will generally, but not exclusively, seek to invest in the convertible securities of companies with market capitalizations between $500 million and $10 billion. Convertible securities held by the Fund may be issued by U.S. or non-U.S. companies. The Fund may hold investment-grade and below investment-grade (i.e., “junk”) convertible securities. The Fund generally invests in convertible securities that are part of an issuance of at least $40 million in size and are issued by companies with market capitalizations between $500 million and $10 billion. The convertible securities are typically callable by the issuer and are not limited as to duration or maturity. The issuers of the convertible securities in which the Fund will invest may include U.S. or non-U.S. companies, real estate investment trusts (“REITS”), and emerging-market companies. The instruments may be denominated in foreign, or non-U.S., currencies; however, such exposures are typically hedged back to the U.S. dollar. The Fund may hold investment-grade, below investment-grade (i.e., “high yield” or “junk” bonds) and unrated securities that are deemed by the sub-advisor to be of equivalent quality. No corresponding principal investment strategy. The Fund’s holdings may include variable-rate coupon, zero-coupon and pay-in-kind (“PIK”) instruments and restricted securities, such as those issued under Rule 144A of the Securities Act of 1933. To a lesser extent, the Fund may utilize securities issued by business development companies and may invest long or short in exchange-traded funds (“ETFs”) to adjust or hedge exposures. 8 Target Fund Acquiring Fund No corresponding principal investment strategy. The Fund may also invest in long or short positions in derivative instruments, such as futures, forwards, swaps, options and warrants, to hedge exposures in the Fund. Futures contracts generally include those based on U.S. treasuries, forward contracts are generally forward currency contracts (including non-deliverable forwards), swaps generally include interest rate and credit default swaps, options generally include call and put options, and warrants are generally similar to long-dated call options. On a short-term basis, the Fund may invest cash balances in other investment companies, including money market funds that are advised by the Manager. In pursuing the Fund’s investment strategy, the Sub-Advisor seeks to identify convertible securities that it believes are undervalued. The Sub-Advisor generally assesses the income characteristics, liquidity, and “equity sensitivity” (described below) of a convertible security in determining whether it is likely undervalued and, therefore, a candidate for investment by the Fund. The Sub-Advisor actively monitors the convertible securities market for investment opportunities for the Fund. The Sub-Advisor seeks to identify investment opportunities by focusing on a variety of factors, including: relative valuation, premium trends, and prospective new issuances of convertible securities and their structures. In addition, the Sub-Advisor considers market dynamics like liquidity, credit spreads, interest rates, volatility, availability of common stock to borrow for corresponding short sales, and short interest rebate rates. (The term “short interest” refers to the interest earned on the cash generated from a short sale of common stock; the rebate of short interest is the amount returned to the person that established the short position, i.e., the Fund.) The sub-advisor seeks to identify convertible securities that it believes are undervalued by assessing, among other attributes, the quality, income, liquidity and “equity sensitivity” of the security (i.e., the sensitivity of a convertible security’s price to changes in the price of the issuer’s common stock). The sub-advisor also considers the availability of the common stock that it intends to short. After acquiring a convertible security, the Fund will establish a short position in the common stock of the same issuer. The Sub-Advisor bases the size of each short position on the sensitivity of the related convertible security to changes in the price of the issuer’s common stock. In other words, the Fund will establish short positions based largely on the extent to which the Sub-Advisor believes movements in the price of an issuer’s common stock are likely to affect the price of the issuer’s convertible securities. If a convertible security has a low premium over conversion value but a high premium over investment value, the convertible security will be expected to be very equity sensitive and to have a high correlation to movement in the related common stock. After acquiring a convertible security, the Fund establishes a short position in the common stock, American Depositary Receipt (“ADR”), call option or other equity-related instrument of the same issuer. The size of each short position is based on the sensitivity of the convertible security’s price to changes in the price of the issuer’s common stock. 9 Target Fund Acquiring Fund Such a convertible security will generally be relatively insensitive to changes in interest rates. If the convertible security has a low premium over investment value but a high premium over conversion value, however, the convertible security will be expected to exhibit high sensitivity to interest rates and low sensitivity to changes in the price of the underlying common stock. The Advisor and the Sub-Advisor believe that convertible securities typically exhibit less equity sensitivity than the common stock of an issuer. Accordingly, the Fund’s short positions will generally be smaller on a dollar value basis than its long positions in convertible securities. As a result, the Fund’s short positions will generally be smaller on a dollar value basis than its long positions since a convertible security’s price is typically less sensitive than that of the common stock. The Sub-Advisor considers selling a convertible security and closing the related short position in common stock (i.e., a hedged convertible position), among other reasons, when it believes the convertible security has ceased to be undervalued relative to the Sub-Advisor’s expectations, when it identifies a potentially unfavorable change in the structure of a convertible security or the underlying company, when it determines that convertible securities, as an asset class, are likely to diverge from the Sub-Advisor’s expectations regarding their value or when the Fund requires cash to meet redemption requests. The sub-advisor considers selling a convertible security and closing the related short position when it determines the convertible security is no longer undervalued, when it determines that convertible securities overall are no longer undervalued, when it anticipates a potentially unfavorable change in the structure of a convertible security or the underlying company or to satisfy shareholder redemptions, among other reasons. The Advisor and the Sub-Advisor expect that the number of convertible securities and short positions in the Fund’s portfolio will change over time, depending upon the Sub-Advisor’s assessment of market conditions and other factors. However, the Advisor and the Sub-Advisor anticipate that the Fund typically will have at least 50 long positions in convertible securities and therefore at least 50 corresponding short positions in the related common stock. No corresponding principal investment strategy. Cash Management Investments See “Temporary Defensive Strategy” below. The Fund may invest cash balances in money market funds that are registered as investment companies under the Investment Company Act of 1940, as amended (“Investment Company Act”), including money market funds that are advised by the Manager or the sub-advisor. If the Fund invests in money market funds, the Fund becomes a shareholder of that investment company. As a result, Fund shareholders will bear their proportionate share of the expenses, including, for example, advisory and administrative fees, of the money market funds in which the Fund invests, such as advisory fees charged by the Manager to any applicable 10 Target Fund Acquiring Fund money market funds advised by the Manager, in addition to the fees and expenses Fund shareholders directly bear in connection with the Fund’s own operations. Shareholders also would be exposed to the risks associated with money market funds and the portfolio investments of such money market funds, including the risk that a money market fund’s yield will be lower than the return that the Fund would have derived from other investments that provide liquidity. Temporary Defensive Strategy If the Sub-Advisor determines that convertible securities should be disfavored as an asset class for the Fund, it may determine to invest up to 100% of the Fund’s total assets in temporary defensive positions as described below. For temporary defensive purposes, the Sub-Advisor may invest up to 100% of the Fund’s total assets in investment grade corporate debt securities, high-quality, short-term debt securities and money market instruments. Short-term debt securities and money market instruments include cash, shares of other mutual funds, commercial paper, certificates of deposit, bankers’ acceptances, U.S. government securities and repurchase agreements. Furthermore, to the extent that the Fund invests in money market mutual funds for its cash position, there will be some duplication of expenses because the Fund will bear its pro rata portion of such money market funds’ management fees and operational expenses. The Fund may also hold investment grade corporate debt securities, short-term debt securities and money market instruments to retain flexibility in meeting redemptions and paying expenses. Although the Fund would do this for temporary defensive purposes, it could reduce any benefit from any upswing in the general market. Taking a temporary defensive position may result in the Fund not achieving its investment objectives. The Fund may depart from its principal investment strategy by taking temporary defensive positions in response to adverse market, economic, political or other conditions. During these […] ence in quantitative equity research and portfolio management. Prior to joining the Sub-Advisor, Mr. Douglas was Director of Quantitative Equity Investments and Portfolio Manager for CS First Boston Asset Management from 1992 to 1994. From 1990 to 1992, Mr. Douglas was Chief Investment Officer for Structured Asset Management, and from 1990 to 1990, Mr. Douglas was Senior Vice President and Director of Research for Drexel Burnham Lambert. Mr. Douglas received an M.B.A., Finance in 1978, an M.S., Statistics in 1977 and a B.S., Mathematics in 1976 from the University of Wisconsin-Madison. Alexander W. Volz . Mr. Volz has been a Portfolio Manager for the Target Fund since its inception on May 25, 2012. Mr. Volz has been a Portfolio Manager and Convertible Trader of the Sub-Advisor since 2006 and was a Vice President and Convertible Trader for the Sub-Advisor from 2002 to 2006. Mr. Volz has 23 years of experience in portfolio management and/or convertible securities trading. Prior to joining the Sub-Advisor, Mr. Volz was a Convertible Trader for Southern Trading Partners and Wachovia Securities from 1997 to 2002. Mr. Volz received a B.A., Economics from Vanderbilt University in 1996. Dagney M. Hollander . Ms. Hollander has been a Portfolio Manager for the Target Fund since August 1, 2013. Ms. Hollander has been a Portfolio Manager of the Hedged Convertible Opportunity Strategy for the Sub-Advisor since 2012 and a Portfolio Manager of the Convertible Income Strategy for the Sub-Advisor since 2013. Ms. Hollander has 18 years of experience in portfolio management industry. Ms. Hollander has been a Senior Research Analyst since 2007, and was a Research Analyst from 2006 to 2007 for the Sub-Advisor. From 2002 to 2006, Ms. Hollander was a Convertible Trading Assistant for the Sub-Advisor. Ms. Hollander graduated with a BS in Finance, summa cum laude, from California State University, Northridge in 2001. Same. 12 Comparison of Principal Risks There is no assurance that the Funds will achieve their respective investment objectives and you could lose part or all of your investment in a Fund. Investors should carefully consider their own investment goals and risk tolerance before investing in the Funds. Although the Funds describe and organize them differently, the principal risks associated with investments in the Target Fund and the Acquiring Fund are generally similar because the Funds have identical investment objectives and substantially similar principal investment strategies. Because the Acquiring Fund includes additional investments in which the Acquiring Fund may invest as part of its principal investment strategies, the Acquiring Fund includes risks associated with those additional investments, although most of those investments are also part of the non-principal investment strategies of the Target Fund. The additional risks included in the Acquiring Fund prospectus include Allocation Risk, Callable Securities Risk, Counterparty Risk, Cybersecurity and Operational Risk, Derivatives Risk, Emerging Markets Risk, Hedging Risk, Issuer Risk, Large Capitalization Companies Risk, Market Timing Risk, Other Investment Companies Risk, Pay-In-Kind Securities Risk, Real Estate Investment Trusts Risk, Redemption Risk […] s with call features. A call feature allows the issuer of the security to redeem or call the security prior to its stated maturity date. In periods of falling interest rates, issuers may be more likely to call in securities that are paying higher coupon rates than prevailing interest rates. In the event of a call, the Fund would lose the income that would have been earned to maturity on that security, and the proceeds received by the Fund may be invested in securities paying lower coupon rates. Thus, the Fund’s income could be reduced as a result of a call. In addition, the market value of a callable security may decrease if it is perceived by the market as likely to be called, which could have a negative impact on the Fund’s total return. Convertible Securities Risk. The value of a convertible security typically increases or decreases with the price of the underlying common stock. In general, a convertible security is subject to the risks of stocks, and its price may be as volatile as that of the underlying stock, when the underlying stock’s price is high relative to the conversion price and a convertible security is subject to the risks of debt securities, and is particularly sensitive to changes in interest rates, when the underlying stock’s price is low relative to the conversion price. Convertible securities generally have less potential for gain or loss than common stocks. Securities that are convertible other than at the option of the holder generally do not limit the potential for loss to the same extent as securities that are convertible at the option of the holder. Many convertible securities have credit ratings that are below investment grade and are subject to the same risks as an investment in lower-rated debt securities. The credit rating of a company’s convertible securities is generally lower than that of its non-convertible debt securities. Convertible securities are normally considered “junior” securities — that is, the company usually must pay interest on its non-convertible debt securities before it can make payments on its convertible securities. If the issuer stops paying interest or principal, convertible securities may become worthless and the Fund could lose its entire investment. In addition, because companies that issue convertible securities may be small- or mid-cap companies, to the extent the Fund invests in convertible securities issued by small- or mid-cap companies, it will be subject to the risks of investing in such companies. 13 Counterparty Risk . The Fund is subject to the risk that a party or participant to a transaction, such as a broker or derivative counterparty, will be unwilling or unable to satisfy its obligation to make timely principal, interest or settlement payments or to otherwise honor its obligations to the Fund. As a result, the Fund may obtain no recovery of its investment or may only obtain a limited recovery, and any recovery may be delayed. Not all derivative transactions require a counterparty to post collateral, which may expose the Fund to greater losses in the event of a default by a counterparty. Credit Risk. The Fund is subject to the risk that the issuer or guarantor of a debt security or a counterparty to a transaction, including a derivatives contract or a loan, will fail to make timely payment of interest or principal or otherwise honor its obligations or default completely. The strategies utilized by the sub-advisor require accurate and detailed credit analysis of issuers and there can be no assurance that its analysis will be accurate or complete. The Fund may be subject to substantial losses in the event of credit deterioration or bankruptcy of one or more issuers in its portfolio. Financial strength and solvency of an issuer are the primary factors influencing credit risk. In addition, inadequacy of collateral or credit enhancement for a d […] nts may be more speculative than certain other types of investments because warrants do not carry with them dividend or voting rights with respect to the underlying securities, or any rights in the assets of the issuer. In addition, the value of a warrant does not necessarily change with the value of the underlying securities, and a warrant ceases to have value if it is not exercised prior to its expiration date. Detached warrants may be traded on a stock exchange; however, non-detached warrants can only be exercised by the bondholder. Equity Investments Risk. Equity securities are subject to investment risk and market risk. The Fund’s investments in U.S. and foreign equity securities may include common stocks, preferred stocks, securities convertible into or exchangeable for common stocks, REITs, depositary receipts and U.S. dollar-denominated foreign stocks traded on U.S. exchanges. Such investments may expose the Fund to additional risks. · Common Stocks . The value of a company’s common stock may fall as a result of factors directly relating to that company, such as decisions made by its management or decreased demand for the company’s products or services. A stock’s value may also decline because of factors affecting not just the company, but also companies in the same industry or sector. The price of a company’s stock may also be affected by changes in financial markets that are relatively unrelated to the company, such as changes in interest rates, exchange rates or industry regulation. Companies that pay dividends on their common stock generally only do so after they invest in their own business and make required payments to bondholders and on other debt and preferred stock. Therefore, the value of a company’s common stock will usually be more volatile than its bonds, other debt and preferred stock. · Convertible Securities . The value of a convertible security is influenced by both the yield of non-convertible securities of comparable issuers and by the value of the underlying common stock. The investment value of a convertible is based on its yield and tends to decline as interest rates increase. The conversion value of a convertible is the market value that would be received if the convertible were c\n"

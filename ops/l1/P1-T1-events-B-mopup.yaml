ars exactly\nonce in your answer map (count them); every event object quotes ETF-acquirer evidence;\nevery date matches ^\\d{4}-\\d{2}-\\d{2}$ or is \"NA\"; no ticker field contains a space.】\n文件: 0001193125-20-014316 (form N-14, filed 2020-01-24, AIM INVESTMENT FUNDS (INVESCO INVESTMENT FUNDS)  (CIK 0000826644))\nsource_url: https://www.sec.gov/Archives/edgar/data/826644/000119312520014316/d125178dn14.htm\n节选:\nN-14 1 d125178dn14.htm N-14 N-14 As filed with the Securities and Exchange Commission on January 24, 2020. File No. 333- UNITED STATES SECURITIES AND EXCHANGE COMMISSION WASHINGTON, D.C. 20549 FORM N-14 REGISTRATION STATEMENT UNDER THE SECURITIES ACT OF 1933 Pre-Effective Amendment No. ☐ Post-Effective Amendment No. ☐ (Check appropriate box or boxes) AIM Investment Funds (Invesco Investment Funds) (Exact Name of Registrant as Specified in Charter) 11 Greenway Plaza, Suite 1000, Houston, TX 77046 (Address of Principal Executive Offices) (Number, Street, City, State, Zip Code) (713) 626-1919 (Registrant’s Area Code and Telephone Number) Jeffrey H. Kupor, Esquire 11 Greenway Plaza, Suite 1000, Houston, TX 77046 (Name and address of Agent for Service) Copy to: Joseph C. Benedetti, Esquire Matthew R. DiClemente, Esquire Invesco Advisers, Inc. Stradley Ronon Stevens & Young, LLP 11 Greenway Plaza, Suite 1000 2005 Market Street, Suite 2600 Houston, TX 77046-1173 Philadelphia, PA 19103-7018 Approximate Date of Public Offering: As soon as practicable after this Registration Statement becomes effective under the Securities Act of 1933, as amended. Title of securities being registered: The ti […] nvesco’s most compelling investment processes and strategies; • Reduce overlap in product lineup; • Create scale in the resulting funds; and • Build a solid foundation for further growth to meet client and shareholder needs. In addition, many Funds will continue to be managed by their existing investment management teams post-reorganization and many shareholders will experience a reduction in the total expense ratio, decreasing the cost of their investment. The Boards of your Fund(s), including its independent trustees, believe that each reorganization in this information statement/prospectus is in the best interest of your Fund(s). You do not need to take any action regarding your account. Your shares of your Fund(s) will automatically be converted, at net asset value, into shares of equal net asset value of the corresponding Acquiring Fund in the second quarter of 2020, as discussed in more detail below. Please note that each reorganization is not a taxable event but redeeming or exchanging your shares prior to a reorganization may be a taxable event depending on your individual tax situation. If you have any questions regarding the enclosed Joint Information Statement/Prospectus, please call 1-800-959-4246 or your financial advisor. Sincerely, Jeffrey H. Kupor Senior Vice President, Chief Legal Officer and Secretary INVESCO FUNDS 11 Greenway Plaza, Suite 1000 Houston, Texas 77046-1173 1-800-959-4246 JOINT INFORMATION STATEMENT/PROSPECTUS February , 2020 Introduction This Joint Information Statement/Prospectus contains information that shareholders of each Target Fund listed in the table below (each, a “Target Fund” and collectively, the “Target Funds”), which is a series of the corresponding Target Trust listed in the table below (each, a “Target Trust” and collectively, the “Target Trusts”), should know about the Agreement and Plan of Reorganization (the “Agreement”) relating to the reorganizations (each, a “Reorganization” and collectively, the “Reorganizations”) by and between each Target Trust, on behalf of the corresponding Target Fund and each Acquiring Trust listed in the table below (each, an “Acquiring Trust” and collectively, the “Acquiring Trusts”), on behalf of the corresponding Acquiring Fund li […] urities Risk Sector Focus Risk Mid-Capitalization Companies Risk Small-Capitalization Companies Risk 67 Invesco International Allocation Fund (“Target Fund”) into Invesco Oppenheimer International Diversified Fund (“Acquiring Fund”) Investment Objectives Target Fund’s Investment Objective Acquiring Fund’s Investment Objective long term growth of capital to seek capital appreciation. Principal Strategies and Principal Investments Both the Target Fund and Acquiring Fund are fund of funds that invest primarily in other funds, however the Acquiring Fund currently invests in a smaller universe of underlying funds than the Target Fund. The Target Fund invests its assets in a number of other affiliated and/or unaffiliated underlying mutual funds, exchange-traded funds (ETFs) and other pooled investment vehicles. The Acquiring Fund currently allocates its assets among the following four affiliated mutual funds: Invesco Oppenheimer Developing Markets Fund, Invesco Oppenheimer International Growth Fund, Invesco Oppenheimer International Small-Mid Company Fund and Invesco Oppenheimer International Equity Fund, and will typically invest in at least three of these underlying funds. Both Funds invest in underlying funds that invest primarily in foreign equity securities, including securities of emerging market issuers. The Target Fund and Acquiring Fund use different processes to allocate assets among their underlying funds. The Target Fund uses a more static allocation among underlying funds as compared to the Acquiring Fund. The investment adviser uses a three-step process for the Target Fund that includes: (1) a strategic asset allocation among broad asset classes; (2) the actual selection by the investment adviser of underlying funds to represent the broad asset classes and the determination by the investment adviser of target weightings in these underlying funds; and (3) the ongoing monitoring of the Target Fund’s asset class allocations, underlying funds and target weightings in the underlying funds. The Target Fund’s investments in the underlying funds are rebalanced on at least an annual basis to keep them at their target weightings. The investment adviser for the Acquiring Fund in determining how much of the Acquiri […] rlying funds: Principal Risks Common to Both the Target and Acquiring Funds Principal Risks Disclosed By the Acquiring Fund but not the Target Fund Principal Risks Disclosed By the Target Fund but not the Acquiring Fund Fund of Funds Risk/Investment Companies Risk/Affiliated Portfolio Risk Allocation Risk Risks of Investing in Stocks/Market Risk Risks of Small- and Mid-Cap Companies Risks of Growth Investing Foreign Securities Risk Emerging Markets Securities Risk Eurozone Investment Risks Management Risk* Preferred Securities Risk Sector Focus Risk Includes the following risk of its underlying funds: Value Investing Risk Includes the following risks related specifically to its investments in ETFs: Authorized Participant Concentration Risk Exchange-Traded Fund Industry Concentration Risk Exchange-Traded Funds Risk Market Trading Risk Valuation Time Risk Includes the following risks of its other underlying funds: Cash/Cash Equivalents Risk Depositary Receipts Risk Derivatives Risk Financial Services Sector Risk Geographic Focus Risk 68 Principal Risks Common to Both the Target and Acquiring Funds Principal Risks Disclosed By the Acquiring Fund but not the Target Fund Principal Risks Disclosed By the Target Fund but not the Acquiring Fund Indexing Risk Non-Correlation Risk Non-Diversification Risk REIT Risk/Real Estate Risk Valuation Risk * Although not disclosed as a principal risk for the Acquiring Fund, the Acquiring Fund, as an actively managed fund, also is subject to management risk. 69 Invesco Mid Cap Core Equity Fund (“Target Fund”) into Invesco Oppenheimer Main Street Mid Cap Fund (“Acquiring Fund”) Investment Objectives Target Fund’s Investment Objective Acquiring Fund’s Investment Objective long-term growth of capital to seek capital appreciation Principal Strategies and Principal Investments Both the Target Fund and Acquiring Fund invest 80% of their assets in equity securities of mid cap companies and define mid cap companies according to the market capitalization range of the Russell Mid Cap Index. Both Funds primarily invest in U.S. securities but also may invest in foreign issuers. The Target Fund has a stated limit providing that only 25% of its net assets may be invested in foreign securities. The Acquiring Fund does not have any stated limit  […] k* Cyclical Opportunities Emerging Markets Risk * Although not disclosed as a principal risk for the Acquiring Fund, the Acquiring Fund, as an actively managed fund, also is subject to management risk. 71 Invesco Moderate Allocation Fund (“Target Fund”) into Invesco Oppenheimer Portfolio Series: Moderate Investor Fund (to be renamed Invesco Select Risk: Moderate Investor Fund) (“Acquiring Fund”) Investment Objectives Target Fund’s Investment Objective Acquiring Fund’s Investment Objective total return consistent with a moderate level of risk relative to the broad stock market to seek total return Principal Strategies and Principal Investments Both the Target Fund and Acquiring Fund are fund of funds that invest primarily in open-end funds, exchange-traded funds and other pooled investment vehicles managed by Invesco and/or its affiliates in order to obtain exposure to various assets classes, investment strategies and types of securities. In addition, the Target Fund, but not the Acquiring Fund, as a principal investment, may invest in unaffiliated funds, while the Acquiring Fund, but not the Target Fund, identifies closed-end funds as potential principal investments. Both Funds allocate their investments among underlying funds that invest primarily in equity securities (equity funds), primarily in fixed income securities (fixed income funds) and primarily in alternative investment classes (alternative funds), but differ in how their assets are allocated among such funds. The Target Fund and Acquiring Fund each generally allocates 50-70% of its assets to equity funds. The Target Fund generally allocates 30%-50% of its assets to fixed income funds and 5%-20% to alternative funds. In contrast, the Acquiring Fund invests the remainder of its assets not invested in equity funds in a flexible combination of fixed income funds and alternative funds without specific percentage allocations between the two. Both the Target Fund and Acquiring Fund may invest in funds that invest primarily in foreign securities, including emerging market securities. The Target Fund invests approximately 15%-30% of its assets in underlying funds that invest primarily in foreign securities; while the Acquiring Fund does not limit its investm\n"

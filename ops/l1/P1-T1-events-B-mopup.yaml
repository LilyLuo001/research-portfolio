ows of\n   the Target/Acquiring fund table, a 4-fund filing yields 4 objects}, ... ]}\n  or the no_event object above.\nEach event object:\n  fund_name        target mutual fund's full name (from excerpt)\n  family           fund family/trust (from excerpt)\n  mutual_fund_ticker / etf_ticker\n                   a single 2-6 char UPPERCASE symbol from the excerpt, else \"NA\".\n                   NEVER a fund name. Multiple class tickers → \"NA\" and list them in evidence.\n  announce_date    YYYY-MM-DD only. Board-approval date if stated; else the document's own\n                   date; else the filed date. Vague (\"May 2020\",\"Q4 2026\") → \"NA\".\n  date_basis       \"board\" | \"document\" | \"filed\" | \"NA\"\n  effective_date   YYYY-MM-DD only; the stated closing/completion date. Vague → \"NA\".\n  asset_class      equity_US / equity_intl / fixed_income / other — ONLY if locatable in the\n                   excerpt (bond/muni/high-yield/MBS→fixed_income; International/EM/Asia→\n                   equity_intl; explicit US equity→equity_US; managed-futures/multi-asset/\n                   long-short→other). Name alone insufficient → \"NA\".\n  AUM_at_conversion_USD  number from excerpt or \"NA\"\n  source_accession copy from the 文件 line\n  confidence       H = fund identity + (announce or effective) with explicit basis;\n                   M = identity clear, dates partly missing/document-dated;\n                   L = identity inferred from title only\n  evidence         ≤25-word quote fragment supporting the verdict (for events: the words\n                   showing the acquirer is an ETF; for no_event: the words showing why not)\nNEED_HUMAN only when TWO date statements INSIDE THIS ONE EXCERPT contradict for the same\nfund: {\"NEED_HUMAN\": true, \"quotes\": [\"...\", \"...\"]}. Different filings never contradict.\nNever fill any field from memory — excerpt-locatable or \"NA\".\n\nSELF-CHECK before emitting (do this, don't print it): every input item id appears exactly\nonce in your answer map (count them); every event object quotes ETF-acquirer evidence;\nevery date matches ^\\d{4}-\\d{2}-\\d{2}$ or is \"NA\"; no ticker field contains a space.】\n文件: 0000711080-19-000028 (form N-14, filed 2019-03-22, TOUCHSTONE STRATEGIC TRUST  (CIK 0000711080))\nsource_url: https://www.sec.gov/Archives/edgar/data/711080/000071108019000028/n14tstcgwiddi32019combodoc.htm\n节选:\nN-14 1 n14tstcgwiddi32019combodoc.htm N-14 N-14 - TST CGwI DDI - 2019 As filed with the Securities and Exchange Commission on March 22, 2019 1933 Act File No. [ ] UNITED STATES SECURITIES AND EXCHANGE COMMISSION Washington, D.C. 20549 FORM N-14 REGISTRATION STATEMENT UNDER THE SECURITIES ACT OF 1933 o Pre-Effective Amendment No. o Post-Effective Amendment No. (Check appropriate box or boxes) Touchstone Strategic Trust (Exact Name of Registrant as Specified in Charter) 1-800-543-0407 (Area Code and Telephone Number) 303 Broadway, Suite 1100, Cincinnati, Ohio 45202 (Address of Principal Executive Offices: Number, Street, City, State, Zip Code) Jill T. McGruder 303 Broadway, Suite 1100 Cincinnati, Ohio 45202 (Name and Address of Agent for Service) Copies to: Deborah Bielicke Eades, Esq. Vedder Price P.C. 222 North LaSalle Street Chicago, Illinois 60601 (312) 609-7661 Renee M. Hardt, Esq. Vedder Price P.C. 222 North LaSalle Street Chicago, Illinois 60601 (312) 609-7616 Approximate Date of Proposed Public Offering: As soon as practicable after this Registration Statement becomes effective under the Securities Act of 1933, as amended. Title of Securities Being Registered: Class A, Class  […] umptions regarding the underlying funds may be incorrect in view of actual market conditions. The principal risks of investing in the Funds are similar, as their investment goals are similar and their principal investment strategies are similar. The principal risks of the Funds are set forth below, and such risks apply to both Funds unless otherwise noted. The Target Fund is subject to the following principal risks, which the Acquiring Fund is not: call options risk, covered call options risk and merger arbitrage risk . The Acquiring Fund is subject to the following principal risks, which the Target Fund is not: emerging markets risk, prepayment risk and real estate industry risk. 10 Call Options Risk (Target Fund Only) : Writing index and exchange-traded fund call options is intended to reduce an underlying fund’s volatility and provide income, although it may also reduce an underlying fund’s ability to profit from increases in the value of its equity portfolio. Collateralized Loan Obligations Risk : Typically, collateralized loan obligations (“CLOs”) are privately offered and sold, and thus are not registered under the securities laws. As a result, an underlying fund may in certain circumstances characterize its investments in CLOs as illiquid. In assessing liquidity, an underlying fund will consider various factors including whether the CLO may be purchased and sold in Rule 144A transactions and whether an active dealer market exists. CLOs are subject to the typical risks associated with debt instruments (i.e., interest rate risk and credit risk). Additional risks of CLOs include the possibility that distributions from collateral securities will be insufficient to make interest or other payments, the potential for a decline in the quality of the collateral, and the possibility that an underlying fund may invest in a subordinate tranche of a CLO. Convertible Securities Risk : Convertible securities are subject to the risks of both debt securities and equity securities. The values of convertible securities tend to decline as interest rates rise and, due to the conversion feature, tend to vary with fluctuations in the market value of the underlying security. Counterparty Risk : A counterparty (the other party to a transaction or an agreement or the party with whom an underlying fund executes transactions) to a transaction with an underlying fund may be unable or unwilling to make timely principal, interest or settlement payments, or otherwise honor its obligations. Covered Call Options Risk (Target Fund Only) : Investments in covered calls involve certain risks. These risks include: • Limited Gains . When an underlying fund writes a covered call option, the underlying fund makes an obligation to deliver a security it already owns at an agreed-upon strike price on or before a predetermined date in the future in return for a premium. By selling a covered call option, an underlying fund may forego the opportunity to benefit from an increase in the price of the underlying stock above the exercise price, but continues to bear the risk of a decline in the value of the underlying stock. • Lack of Liquidity . If an underlying fund is not able to close out an option transaction, the underlying fund will not be able to sell the underlying security until the option expires or is exercised. Because an underlying fund will generally hold the stocks underlying the call option, an underlying fund may be less likely to sell the stocks in its portfolio to take advantage of new investment opportunities. Derivatives Risk : The use of derivatives may e […] nating party has not been met and it reasonably appears that it will not or cannot be met. Whether or not the Reorganization is consummated, Touchstone Advisors will pay the expenses incurred by the Funds in connection with the Reorganization, other than repositioning costs. Description of the Securities to be Issued Shareholders of the Target Fund as of the closing will receive full and fractional shares of the Acquiring Fund in accordance with the terms of the Plan. The shares of the Acquiring Fund to be issued in connection with the Reorganization will be duly and validly issued and outstanding, fully paid and non-assessable by the Acquiring Fund. Shares of the Acquiring Fund to be issued in the Reorganization will have no preemptive or conversion rights and no share certificates will be issued. Material Federal Income Tax Consequences The following discussion summarizes the material U.S. federal income tax consequences of the Reorganization that are applicable to you as a Target Fund shareholder. It is based on the Code, applicable U.S. Treasury regulations, judicial authority, and administrative rulings and practice, all as of the date of this Prospectus/Information Statement 16 and all of which are subject to change, including changes with retroactive effect. The discussion below does not address any state, local, or foreign tax consequences of the Reorganization. Your tax treatment may vary depending upon your particular situation. You also may be subject to special rules not discussed below if you are a certain kind of Target Fund shareholder, including, but not limited to: an insurance company; a tax-exempt organization; a financial institution or broker-dealer; a person who is neither a citizen nor resident of the United States or an entity that is not organized under the laws of the United States or a political subdivision thereof; a holder of Target Fund shares as part of a hedge, straddle, conversion or other integrated transaction; a person with “applicable financial statements” within the meaning of Section 451(b) of the Code; a person who does not hold Target Fund shares as a capital asset at the time of the Reorganization; or an entity taxable as a partnership for U.S. federal income tax purposes. The Reorganization is intended to qualify for federal income tax purposes as a tax-free reorganization under Section 368(a) of the Code. As a condition to the closing of the Reorganization, the Target Fund and the Acquiring Fund will receive an opinion from the law firm of Vedder Price P.C. substantially to the effect that, on the basis of the existing provisions of the Code, U.S. Treasury regulations issued thereunder, current administrative rules, pronouncements and court decisions, and certain representations, qualifications, and assumptions with respect to the Reorganization, for federal income tax purposes: (i) The transfer by the Target Fund of all its assets to the Acquiring Fund solely in exchange for Acquiring Fund shares and the assumption by the Acquiring Fund of all the liabilities of the Target Fund, immediately followed by the pro rata, by class, distribution of all the Acquiring Fund shares so received by the Target Fund to the Target Fund’s shareholders of record in complete liquidation of the Target Fund and the termination of the Target Fund promptly thereafter, will constitute a “reorganization” within the meaning of Section 368(a)(1) of the Cod […]  least one year. Any CDSC applicable to your shares of the Target Fund will not be incurred as a result of your shares being exchanged for shares of the Acquiring Fund pursuant to the Reorganization, and the holding period applicable to your Target Fund shares for purposes of the CDSC will carry over to the shares of the Acquiring Fund that you receive in the Reorganization. Class C shares are subject to an annual Rule 12b-1 fee of up to 1.00% of a Fund’s average daily net assets allocable to Class C shares. Touchstone Securities intends to pay a commission of 1.00% of the purchase amount to your broker at the time you purchase Class C shares. Effective January 1, 2019, (the “Effective Date”), Class C shares of the Funds will automatically convert to Class A shares of the same Fund after they have been held for 10 years. The conversion will not be considered a taxable event for federal income tax purposes. These automatic conversions will be executed without any sales charge (including CDSCs), redemption or transaction fee, or other charge. After such a conversion takes place, the shares will be subject to all features, rights and expenses of Class A shares. If you hold Class C shares through certain financial intermediaries, such as an omnibus account or group retirement recordkeeping platform, your intermediary may not be able to track the amount of time you held your Class C shares purchased before January 1, 2019. In that 23 case, Class C shares held prior to January 1, 2019 would convert to Class A shares 10 years after the Effective Date of this policy. The holding period applicable to your Target Fund shares will carry over to the shares of the Acquiring Fund that you receive in the Reorganization. Class Y Shares Class Y shares of the Funds are sold at NAV without an initial sales charge so that the full amount of your purchase payment may be immediately invested in the Funds. Class Y shares are not subject to a Rule 12b-1 fee or CDSC. In addition, Class Y shares may be purchased through certain mutual fund programs sponsored by qualified intermediaries, such as broker-dealers and investment advisors. In each case, the intermediary has entered into an agreement with Touchstone Securities to include the Funds in their program where the intermediary provides investors participating in their program with additional services, including advisory, asset allocation, recordkeeping or other services. You should ask your financial institution if it offers and you are eligible to participate in such a mutual fund program and whether participation in the program is consistent with your investment goals. The intermediaries sponsoring or participating in these mutual fund programs may also offer their clients other classes of shares of the funds and investors may receive different levels of services or pay different fees depending upon the class of shares included in the program. Investors should carefully consider any separate transaction fee or other fees charg […] e on or prior to the Closing Date. (k) The Target Fund is not under the jurisdiction of a court in a “Title 11 or similar case” within the meaning of Section 368(a)(3)(A) of the Code. (l) All issued and outstanding shares of the Target Fund are, and at the Closing will be, duly and validly issued and outstanding, fully paid and non‑assessable by the Target Fund. All of the issued and outstanding shares of the Target Fund will, at the time of the Closing, be held by the persons and in the amounts set forth in the records of the transfer agent as provided in paragraph 3.4. The Target Fund does not have outstanding any options, warrants, or other rights to subscribe for or purchase any Target Fund shares, nor is there outstanding any security convertible into any Target Fund shares. (m) At the Closing, the Target Fund will have good and marketable title to the Target Fund’s assets to be transferred to the Acquiring Fund pursuant to paragraph 1.2 and full right, power, and authority to sell, assign, transfer, and deliver such assets hereunder, and, upon delivery and payment for such assets, the Acquiring Fund will acquire good and marketable title, subject to no restrictions on the full transfer, including such restrictions as might arise under the 1933 Act, other than as disclosed to the Acquiring Fund and accepted by the Acquiring Fund. A- 5 (n) The execution, delivery, and performance of this Agreement have been duly authorized by the Trust’s Board of Trustees on behalf of the Target Fund, and upon execution shall constitute all necessary action on the part of the Trust’s Board of Trustees and shall constitute a valid and legally binding obligation of the Target Fund, enforceable in accordance with its terms, subject as to enforcement, to bankruptcy, insolvency, reorganization, moratorium, and other laws relating to or affecting creditors’ rights and to general equity principles. (o) The information furnished by the Target Fund for use in no‑action letters, applications for orders, registration statements, proxy materials, and other documents that may be necessary in connection with the Reorganization is accurate and complete in all material respects and complies in all material respects with applicable federal \n"

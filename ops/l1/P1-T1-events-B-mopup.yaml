ows of\n   the Target/Acquiring fund table, a 4-fund filing yields 4 objects}, ... ]}\n  or the no_event object above.\nEach event object:\n  fund_name        target mutual fund's full name (from excerpt)\n  family           fund family/trust (from excerpt)\n  mutual_fund_ticker / etf_ticker\n                   a single 2-6 char UPPERCASE symbol from the excerpt, else \"NA\".\n                   NEVER a fund name. Multiple class tickers → \"NA\" and list them in evidence.\n  announce_date    YYYY-MM-DD only. Board-approval date if stated; else the document's own\n                   date; else the filed date. Vague (\"May 2020\",\"Q4 2026\") → \"NA\".\n  date_basis       \"board\" | \"document\" | \"filed\" | \"NA\"\n  effective_date   YYYY-MM-DD only; the stated closing/completion date. Vague → \"NA\".\n  asset_class      equity_US / equity_intl / fixed_income / other — ONLY if locatable in the\n                   excerpt (bond/muni/high-yield/MBS→fixed_income; International/EM/Asia→\n                   equity_intl; explicit US equity→equity_US; managed-futures/multi-asset/\n                   long-short→other). Name alone insufficient → \"NA\".\n  AUM_at_conversion_USD  number from excerpt or \"NA\"\n  source_accession copy from the 文件 line\n  confidence       H = fund identity + (announce or effective) with explicit basis;\n                   M = identity clear, dates partly missing/document-dated;\n                   L = identity inferred from title only\n  evidence         ≤25-word quote fragment supporting the verdict (for events: the words\n                   showing the acquirer is an ETF; for no_event: the words showing why not)\nNEED_HUMAN only when TWO date statements INSIDE THIS ONE EXCERPT contradict for the same\nfund: {\"NEED_HUMAN\": true, \"quotes\": [\"...\", \"...\"]}. Different filings never contradict.\nNever fill any field from memory — excerpt-locatable or \"NA\".\n\nSELF-CHECK before emitting (do this, don't print it): every input item id appears exactly\nonce in your answer map (count them); every event object quotes ETF-acquirer evidence;\nevery date matches ^\\d{4}-\\d{2}-\\d{2}$ or is \"NA\"; no ticker field contains a space.】\n文件: 0001133228-25-009844 (form N-14, filed 2025-09-19, AMERICAN BEACON SELECT FUNDS  (CIK 0001096012))\nsource_url: https://www.sec.gov/Archives/edgar/data/1096012/000113322825009844/abnoife-efp17770_n14.htm\n节选:\nN-14 1 abnoife-efp17770_n14.htm AMERICAN BEACON NINETY ONE INTERNATIONAL FRANCHISE ETF - N-14 As filed with the Securities and Exchange Commission on September 19, 2025 1933 Act Registration File No. 333- UNITED STATES SECURITIES AND EXCHANGE COMMISSION Washington, D.C. 20549 FORM N-14 REGISTRATION STATEMENT UNDER THE SECURITIES ACT OF 1933 ☐ Pre-Effective Amendment No. ______ ☐ Post-Effective Amendment No. ______ (Check appropriate box or boxes.) AMERICAN BEACON SELECT FUNDS (Exact Name of Registrant as Specified in Charter) 220 East Las Colinas Boulevard, Suite 1200 Irving, Texas 75039 (Address of Principal Executive Offices) (Number, Street, City, State, Zip Code) Registrant’s Area Code and Telephone Number: (817) 391-6100 Gregory J. Stumm, President 220 East Las Colinas Boulevard Suite 1200 Irving, Texas 75039 (Name and Address of Agent for Service) (Number and Street, City, State, Zip Code) Copy to: Stacy L. Fuller, Esq. Kathy K. Ingber, Esq. K&L Gates LLP 1601 K Street, NW Washington, D.C. 20006-1600 Approximate Date of Proposed Public Offering: As soon as practicable after this Registration Statement becomes effective under the Securities Act of 1933, as amended. It is propo […] cquiring ETF, recommended the proposed reorganization to the Board of Trustees (the “Board”) of the Target Trust since it believes the proposed reorganization is in the best interests of shareholders and provides better potential prospects for growth. In addition, the Acquiring ETF has a lower management fee and total annual operating expenses than each class of the Target Fund. The Acquiring ETF and the Target Fund also will have the same investment adviser, sub-advisor, investment objective, fundamental investment policies, and substantially similar investment strategy and principal investment risks. In addition, shareholders will be able to buy and sell shares of the Acquiring ETF throughout the trading day since the Acquiring ETF is an exchange-traded fund, commonly referred to as an “ETF.” However, there are various differences between the Target Fund and Acquiring ETF. While the Target Fund and Acquiring ETF have the same investment adviser and sub-advisor, the structure of their advisory agreements differs since the Acquiring ETF will have a unitary fee structure, which will require the Manager to pay the Acquiring ETF’s ordinary operating expenses with limited exceptions as described more fully in the accompanying Combined Proxy Statement/Prospectus. In addition, the Acquiring ETF has adopted a Distribution Plan adopted pursuant to Rule 12b-1 under the Investment Company Act (a “12b-1 plan”), but pursuant to which no such fee will be paid by the Acquiring ETF unless and until the Board approves the commencement of any such payments, while each class of the Target Fund does not have a 12b-1 plan. These and any other differences are described more fully in the accompanying Combined Proxy Statement/Prospectus. If shareholders approve the Reorganization Agreement, the Target Fund would reorganize into the Acquiring ETF and Target Fund shareholders would become shareholders of the Acquiring ETF, shares of which will be listed for trading on NYSE Arca, Inc., a U.S. stock exchange. You will no longer purchase or redeem individual shares directly from the Target Fund and instead, you will be able to purchase and sell throughout the trading day at the then prevailing market price in the secondary market. This is […] rice is likely to be. Your Target Fund shares, like shares of all mutual funds, are purchased and redeemed at NAV per share, so you did not experience such pricing variances when buying and selling Target Fund shares. More information about this and the Acquiring ETF is in the accompanying Combined Proxy Statement/ Prospectus. If the Reorganization Agreement is approved, the closing date is anticipated to be on or about January 9, 2026. If the Reorganization Agreement is approved, you will receive shares of the Acquiring ETF with the same aggregate NAV as your shares of the Target Fund immediately prior to the closing date of the reorganization, except you will receive cash equal to the NAV of any fraction of a share held at such time. The conversion of any fraction of a share to cash may be subject to fees and expenses and will be a taxable event. Finally, if you hold your shares of the Target Fund through an account with a financial intermediary that is not able to hold shares of the Acquiring ETF, like many group retirement plans, your financial intermediary may transfer your investment in the Target Fund to a different investment option prior to the closing date of the reorganization. Please consult with your financial intermediary for more information on the impact that the reorganization may have on you and your investments. The Board unanimously recommends that you vote “FOR” the proposed Reorganization Agreement as described in the Combined Proxy Statement/Prospectus. Your vote is important no matter how many shares you own. Voting your shares now will allow you as a Fund shareholder to avoid the inconvenience of any follow-up mail or telephone solicitation for your vote. The attached Combined Proxy Statement/Prospectus describes the matter to be considered at the Meeting. Please read the enclosed materials carefully and cast your vote. Remember, your vote is extremely important, no matter how large or small your holdings. If you have any questions about these materials, please call us at 1-866-989-9911. Whether or not you plan to attend the Meeting, you may vote by proxy in any of the following ways: 1. Internet — Instructions for casting your vote via the Internet can be found in the enclosed proxy vo […] all of its assets to the Acquiring ETF in exchange for Acquiring ETF shares and the assumption by the Acquiring ETF of the liabilities of the Target Fund. Following this transfer, shares of the Acquiring ETF will be distributed to shareholders of the Target Fund in proportion to their shares of ownership interest in the shares of the Target Fund (except shareholders will receive cash equal to the net asset value (“NAV”) of any fraction of a share held) on the closing date, which is expected to be on or about January 9, 2026 (the “Closing Date”), if the Reorganization Agreement is approved by shareholders. The Target Fund will then be terminated. These events, collectively, are referred to in this Combined Proxy Statement/Prospectus as the “Conversion.” The Acquiring ETF is an exchange-traded fund, commonly referred to as an “ETF.” The Acquiring ETF will be listed for trading on NYSE Arca, Inc., a U.S. stock exchange, and shares of the Acquiring ETF will be bought and sold in the secondary market at a market price. As a Target Fund shareholder, you are being asked to approve the Reorganization Agreement. By approving the Reorganization Agreement, you will also be approving changing your investment from a mutual fund to an ETF. If shareholders do not approve the Reorganization Agreement, you will remain shareholders of the Target Fund and the Target Trust’s Board may consider possible alternatives determined to be in the best interests of the Target Fund and its shareholders. Q3. How does the Board recommend that I vote? A. The Board of Trustees of the Target Trust recommends that you vote “ FOR ” the proposed Conversion of the Target Fund into the Acquiring ETF. Q4. Why does the Board recommend I vote “FOR” the reorganization? A. American Beacon Advisors, Inc. (the “Manager”) recommended to the Board that the Target Fund be reorganized into the Acquiring ETF. In determining whether to approve the Conversion, the Board, including the Independent Trustees, with the advice and assistance of independent legal counsel, inquired into and considered a number of matters, including: (1) the terms and conditions of the Reorganization Agreement; (2) the compatibility of the investment programs of the Target Fund and the Acquiring ETF, including that the Acquiring ETF has a substantially similar investment strategy as the Target Fund; (3) the expense ratios of each Fund on a comparative basis, including that the Acquiring ETF has a lower management fee and has a lower total net annual operating expense ratio than each class of the Target Fund; (4) the historical performance record of the Target Fund; (5) the asset levels of the Target Fund; (6) the prospects for future growth of the Acquiring ETF; (7) the continuity of advisory, sub-advisory and other services provided in connection with the Conversion; (8) that Ninety One North America, Inc. (“Sub-Advisor”), the sub-advisor to each Fund, will bear the costs of the Conversion (excluding any brokerage costs incurred to transition the Target Fund’s portfolio); (9) the potential benefits of the ETF structure for Target Fund shareholders; and (10) the Conversion is designed to be treated as a tax-free reorganization for federal income tax purposes. The Board did not assign specific weights to any or all of these factors, but it did consider them in determining, in its business judgment, to approve the Conversion. Q5. What are the differences between the Target Fund and Acquiring ETF? A. The Acquiring ETF and the Target Fund will have the same investment adviser, sub-advisor, investment objective, fundamental investment policies, and substantially similar investment strategy and principal investment risks. However, there are various differences between the Target Fund and Acquiring ETF. While the Target Fund and the Acquiring ETF have the same investment adviser and sub-advisor, the structure of their advisory agreements differs since the Acquiring ETF will have a unitary fee structure, which will require the Manager to pay the Acquiring ETF’s ordinary operating expenses with limited exceptions as described more fully in the accompanying Combined Proxy Statement/Prospectus. In addition, the Acquiring ETF has adopted a Distribution Plan adopted pursuant to Rule 12b-1 under the Investment Company Act (a “12b-1 plan”), but pursuant to which no such fee will be paid by the Acquiring ETF unless and until the Board approves the commencement of any such payments, while each class of the Target Fund does not have a 12b-1 plan. Additionally, the Acquiring ETF is an ETF, which will be listed for trading on NYSE Arca, Inc., a U.S. stock exchange and you will be able to purchase and sell shares of the Acquiring ETF throughout the trading day at the then-prevailing market price in the secondary market. You will be subject to some additional risks related to the Acquiring ETF being an ETF. In addition, you will no longer purchase or redeem individual shares directly from the Target Fund. More information is contained in this Combined Proxy Statement/Prospectus. Q6. Will the Conversion cause the Target Fund’s portfolio to be repositioned? A. The Acquiring ETF and the Target Fund will have the same investment adviser, sub-advisor, investment objective, fundamental investment policies, and substantially similar investment strategy and principal investment risks. As a result, there are no changes required in the Target Fund’s portfolio to “align” the portfolio with the Acquiring ETF. However, one security that is currently held by the Target Fund that cannot be transferred in-kind to the Acquiring ETF will need to be sold prior to the Conversion. Q7. What does the change to the ETF structure mean for me? A. The Acquiring ETF is an ETF. If the Conversion is approved, you will remain invested in a registered investment company, but it will be exchange-traded, and you will own shares as you did before the Conversion, but in the Acquiring ETF instead of the Target Fund. The Acquiring ETF’s shares will be listed for trading on NYSE Arca, Inc. You will no longer purchase or redeem individual shares directly from the Acquiring ETF and instead, you will be able to purchase and sell throughout the trading day at the then prevailing market price in the secondary market. This is because the mechanism that underpins the creation and redemption of ETF shares is designed to align the market price of the ETF’s shares with its NAV. Only certain financial institutions are permitted to purchase and redeem Acquiring ETF shares at NAV per share. These institutions are referred to as “Authorized Participants,” and they are permitted to purchase and redeem ETF shares at NAV per share with the Acquiring ETF because they have entered into an agreement with the Acquiring Trust. As a result, should you decide to purchase or sell shares of the Acquiring ETF after the Conversion, you will place a trade through a broker-dealer who will execute your trade in the secondary market at the then-prevailing market price for the Acquiring ETF shares. As with all ETFs, your broker may charge a commission for such purchase and sale transactions. In addition, you will no longer be able to exchange shares of the Target Fund for the same class of shares of another series of the Target Trust because the Acquiring ETF shares have no exchange rights. If the Conversion is approved, we believe that change to an ETF structure will offer a number of advantages, including intraday trading and the flexibility to exit the Acquiring ETF intraday and enhanced tax efficiency. However, there are also some other differences that the change to an ETF structure will introduce, including the following: • Brokerage Interaction for Sales -- ETFs are bought and sold differently than mutual funds . Investors who wish to purchase or sell Acquiring ETF shares after the Conversion will need to have a broker-dealer execute their transaction. Unlike a mutual fund, ETF shares cannot be purchased or redeemed directly from the ETF (except by an Authorized Participant). This could mean you may pay a brokerage commission to sell, or buy, Acquiring ETF shares (although some brokerage firms no longer charge brokerage commissions for transactions in ETFs). Paying a brokerage commission may or may not be significant depending on the type of brokerage firm used, the commission structure (which could be a flat fee or a per share charge) and the services provided by the broker-dealer. By contrast, under the mutual fund model, shares in the Target Fund are currently available for purchase directly from the Target Fund without any charge and are also available through broker-dealers. Currently, when shares in the Target Fund are traded through these broker-dealers, there may be a transaction charge, depending on your relationship, including whether you are participating in an investment arrangement that includes other charges, such as an account-level fee or service fees collected by the Target Fund and paid to the broker-dealer. • ETF Share Prices and NAV . One of the features of an ETF is that the mechanism that underpins the creation and redemption of ETF shares is designed to align the market price of the ETF’s shares with its NAV per share. Only Authorized Participants are able to deal directly with the ETF itself, meaning only the Authorized Participa […] mechanism may become strained, and there have been instances where some ETFs trade at market prices significantly different from the NAV per share. Trading in ETF shares on an exchange may be halted for a variety of reasons, and this could be an individual trading halt (i.e., a halt of Acquiring ETF shares’ trading) or a market-wide trading halt (i.e., a halt of all securities’ trading). ETF shares may also be delisted. Both trading halts and delistings happen for a variety of reasons. All ETFs face these risks. As a result, because ETF shares trade on an exchange at market prices rather than at the NAV per share, ETF shares may trade at a price greater than NAV per share (premium) or less than NAV per share (discount). In addition, if the Conversion is approved and you become an Acquiring ETF shareholder, you could incur costs attributable to the difference between the highest price a buyer is willing to pay to purchase ETF shares (bid) and the lowest price a seller is willing to accept for ETF shares (ask) when buying or selling shares in the secondary market (the “bid-ask spread”). Information about the Acquiring ETF’s portfolio holdings, end-of-day NAV per share, market price, premiums and discounts, and bid-ask spreads is available on the Acquiring ETF’s website at https://www.americanbeaconfunds.com/products/exchange-traded-funds/ . Q8. How will this Conversion affect me as a shareholder? A. If approved, all assets and liabilities of the Target Fund will be transferred to the Acquiring ETF. You, as a shareholder of the Target Fund, will receive shares of the Acquiring ETF having an aggregate NAV equal to the aggregate NAV of the shares of the Target Fund that you owned at the time of the Conversion, minus any fraction of a share for which you will receive, or will have received, cash. The redemption of your fraction of a share will likely be a taxable event. Thus, you are encouraged to consult your tax advisor to determine the effect of any such redemption. If approved, the Conversion will involve several steps, which will affect you as a shareholder, including share class conversions. All of the dates associated with these steps are subject to change and assume the Conversion is approved by shareholders \n"

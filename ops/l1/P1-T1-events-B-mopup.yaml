 Touche LLP, independent registered public accounting firm, contained in the fund’s Form N-CSR, which is incorporated by reference into the Statement of Additional Information relating to this Proxy Statement. 25 TABLE OF CONTENTS VOTING INFORMATION Solicitation of Proxies; Expenses This Proxy Statement is furnished in connection with a solicitation of proxies made by, and on behalf of, the trusts’ Board of Trustees to be used at the Meeting. The purpose of the Meeting is set forth in the accompanying Notice. The solicitation is being made primarily by the mailing of this Proxy Statement and the accompanying proxy card on or about March 16, 2026. Supplementary solicitations may be made by mail, telephone, facsimile or electronic means, or by personal interview by representatives of the Trust. In addition, Broadridge Financial Solutions, Inc (Broadridge) may be paid on a per-call basis to solicit shareholders by telephone on behalf of the Target Fund at an anticipated cost of approximately $309,512. The Target Fund may also arrange to have votes recorded by telephone. Broadridge may be paid on a per-call basis for vote-by-phone solicitations on behalf of the Target Fund at an anticipated cost of approximately $77,378. If the fund records votes by telephone or […] engaged in specified activities. The fund also has a policy of normally investing at least 80% of its assets in securities of companies principally engaged in specified activities. These policies can be changed without a vote only upon 60 days’ prior notice to shareholders of the fund. Description of Principal Security Types In addition to the security types discussed above, the following describes the types of securities in which the fund invests or may invest principally: Equity securities represent an ownership interest, or the right to acquire an ownership interest, in an issuer. Equity securities include common stocks (including depositary receipts evidencing ownership of common stock), preferred stocks and other preferred securities, convertible securities, rights and warrants, and other securities, such as hybrid securities and trust preferred securities, believed to have equity-like characteristics. 29 TABLE OF CONTENTS Principal Investment Risks Many factors affect the fund’s performance. Developments that disrupt global economies and financial markets, such as public health emergencies, military conflicts, terrorism, government restrictions, political changes, and environmental disasters, may significantly affect a fund’s investment performance. The fund’s NAV changes daily based on changes in market conditions and interest rates and in response to other economic, political, or financial developments. The fund’s reaction to these developments will be affected by the types of securities in which the fund invests, the financial condition, industry and economic sector, and geographic location of an issuer, and the fund’s level of investment in the securities of that issuer. When your shares are sold they may be worth more or less than what you paid for them, which means that you could lose money by investing in the fund. In addition, because the fund may invest a significant percentage of assets in a single issuer, the fund’s performance could be closely tied to that one issuer and could be more volatile than the performance of more diversified funds. The following factors can significantly affect the fund’s performance: Stock Market Volatility . The value of equity securities fluctuates in response to i […] regular basis, a fund may also satisfy redemption requests by utilizing one or more of the following sources, if permitted: borrowing from another Fidelity ® fund; drawing on an available line or lines of credit from a bank or banks; or using reverse repurchase agreements. These methods may be used during both normal and stressed market conditions. In addition to paying redemption proceeds in cash, a fund reserves the right to pay part or all of your redemption proceeds in readily marketable securities instead of cash (redemption in-kind). Redemption in-kind proceeds will typically be made by delivering the selected securities to the redeeming shareholder within seven days after the receipt of the redemption order in proper form by a fund. Converting Shares The fund will automatically convert your class of shares of the fund to Class Z shares, if Class Z of the fund is available under your plan. The fund may convert your Class Z shares to another class of shares of the fund, including classes of shares not offered in this prospectus that are available under your plan, if your plan is no longer eligible to offer Class Z. Information on the other classes of shares of the fund can be found in that class’s prospectus. Investors will be notified in writing before any such conversion to another class. A conversion will be based on the respective NAVs of the two classes, without the imposition of any fees, on the trade date of the conversion. Conversion Feature. After a maximum of eight years from the initial date of purchase, Class C shares convert automatically to Class A shares of a fund. Conversion to Class A shares will be made at NAV. At the time of conversion, a portion of the Class C shares bought through the reinvestment of dividends or capital gains (Dividend Shares) will also convert to Class A shares. The portion of Dividend Shares that will convert is determined by the ratio of your converting Class C non-Dividend Shares to your total Class C non-Dividend Shares. A fund may convert shares sooner in certain circumstances. A shorter holding period may also apply depending on your intermediary. A conversion between share classes of the same fund is a non-taxable event. 36 TABLE OF CONTENTS Exchanging Shares An exchange involves the redemption of all or a portion of the shares of one fund and the purchase of shares of another fund. As a Class A shareholder, you have the privilege of exchanging Class A shares for the same class of shares of other Fidelity ® funds that offer Advisor classes of shares at NAV or for Daily Money Class shares of Fidelity ® funds that offer Daily Money Class shares. As a Class M shareholder, you have the privilege of exchanging Class M shares for the same class of shares of other Fidelity ® funds that offer Advisor classes of shares at NAV or for Advisor M Class shares of Fidelity ® Government Money Market Fund. If you purchased your Class M shares through certain investment professionals that have signed an agreement with FDC, you also have the privilege of exchanging your Class M shares for shares of Fidelity ® Capital Appreciation Fund. As a Class C shareholder, you have the privilege of exchanging Class C shares for the same class of shares of other Fidelity ® funds that offer Advisor classes of shares or for Advisor C Class shares of Fidelity ® Treasury Money Market Fund. As a Class I shareholder, you have the privilege of exchanging Class I shares for the same class of shares of other Fidelity ® funds that offer Advisor classes of shares or for shares of Fidelity ® funds. As a Class Z shareholder, you have the privilege of exchanging Cl […] will be automatically invested in the same class of shares of another identically registered Fidelity ® fund. Any capital gain distributions will be automatically invested in the same class of shares of another identically registered Fidelity ® fund, automatically reinvested in additional shares of the fund, or paid in cash. Not all distribution options may be available for every account and certain restrictions may apply. If the option you prefer is not listed on your account application, or if you want to change your current option, contact Fidelity or your investment professional directly. If you elect to receive distributions paid in cash by check and the U.S. Postal Service does not deliver your checks, your distribution option may be converted to the Reinvestment Option. You will not receive interest on
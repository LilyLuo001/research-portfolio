ows of\n   the Target/Acquiring fund table, a 4-fund filing yields 4 objects}, ... ]}\n  or the no_event object above.\nEach event object:\n  fund_name        target mutual fund's full name (from excerpt)\n  family           fund family/trust (from excerpt)\n  mutual_fund_ticker / etf_ticker\n                   a single 2-6 char UPPERCASE symbol from the excerpt, else \"NA\".\n                   NEVER a fund name. Multiple class tickers → \"NA\" and list them in evidence.\n  announce_date    YYYY-MM-DD only. Board-approval date if stated; else the document's own\n                   date; else the filed date. Vague (\"May 2020\",\"Q4 2026\") → \"NA\".\n  date_basis       \"board\" | \"document\" | \"filed\" | \"NA\"\n  effective_date   YYYY-MM-DD only; the stated closing/completion date. Vague → \"NA\".\n  asset_class      equity_US / equity_intl / fixed_income / other — ONLY if locatable in the\n                   excerpt (bond/muni/high-yield/MBS→fixed_income; International/EM/Asia→\n                   equity_intl; explicit US equity→equity_US; managed-futures/multi-asset/\n                   long-short→other). Name alone insufficient → \"NA\".\n  AUM_at_conversion_USD  number from excerpt or \"NA\"\n  source_accession copy from the 文件 line\n  confidence       H = fund identity + (announce or effective) with explicit basis;\n                   M = identity clear, dates partly missing/document-dated;\n                   L = identity inferred from title only\n  evidence         ≤25-word quote fragment supporting the verdict (for events: the words\n                   showing the acquirer is an ETF; for no_event: the words showing why not)\nNEED_HUMAN only when TWO date statements INSIDE THIS ONE EXCERPT contradict for the same\nfund: {\"NEED_HUMAN\": true, \"quotes\": [\"...\", \"...\"]}. Different filings never contradict.\nNever fill any field from memory — excerpt-locatable or \"NA\".\n\nSELF-CHECK before emitting (do this, don't print it): every input item id appears exactly\nonce in your answer map (count them); every event object quotes ETF-acquirer evidence;\nevery date matches ^\\d{4}-\\d{2}-\\d{2}$ or is \"NA\"; no ticker field contains a space.】\n文件: 0001213900-25-053772 (form 497, filed 2025-06-12, Bitwise Funds Trust  (CIK 0001928561))\nsource_url: https://www.sec.gov/Archives/edgar/data/1928561/000121390025053772/ea0245486-01_497.htm\n节选:\n497 1 ea0245486-01_497.htm 497 EXCHANGE TRADED CONCEPTS TRUST Bitwise Crypto Industry Innovators ETF NYSE Arca Ticker: BITQ 10900 Hefner Pointe Drive, Suite 400 Oklahoma City, Oklahoma 73120 www.BITQETF.com (405) 778-8377 June 12, 2025 Dear Shareholder: We are sending this material to you because you are a shareholder of Bitwise Crypto Industry Innovators ETF (the “Target Fund”), a series of the Exchange Traded Concepts Trust (the “ETC Trust”). After careful consideration, Exchange Traded Concepts, LLC (“ETC”), the investment adviser to the Target Fund, has recommended, and the Board of Trustees of the ETC Trust (the “ETC Board”) has approved and recommends that shareholders approve an Agreement and Plan of Reorganization (the “Plan”) that provides for the reorganization of the Target Fund with and into a newly created series of the Bitwise Funds Trust (the “Bitwise Trust”) also called the Bitwise Crypto Industry Innovators ETF (the “Acquiring Fund”), which is designed to be substantially similar to the Target Fund from an investment perspective (the “Reorganization”). The Acquiring Fund is managed by Bitwise Investment Manager, LLC (“BIM”), an affiliate of Bitwise Index Services,  […] er institution on how to vote your shares. If you hold your shares in the name of a brokerage firm, bank, nominee or other institution, you must provide a legal proxy from that institution in order to vote your shares in person at the Special Meeting. The Target Fund is a series of ETC Trust, a Delaware statutory trust. The Acquiring Fund is a newly created series of Bitwise Trust, a Delaware statutory trust. The Acquiring Fund will commence operations upon consummation of the Reorganization. The Acquiring Fund is expected to principally trades its shares on NYSE Arca, Inc. (“NYSE Arca” or the “Exchange”). Both Funds are non-diversified open-end investment company registered with the Securities and Exchange Commission (“SEC”) structured as exchange-traded funds under Rule 6c-11 of the Investment Company Act of 1940, as amended (the “1940 Act”). The following documents of the Target Fund have been filed with the SEC and are incorporated by reference into this Proxy Statement (which means these documents are considered legally to be part of this Proxy Statement): · Prospectus and Statement of Additional Information of the Target Fund dated July 29, 2024 as supplemented to date (Accession No. 0001013762-24-001469) ; · Preliminary Prospectus and Statement of Additional Information of the Acquiring Fund filed April 25, 2025 (Accession No. 0001213900-25-035344) ; · the audited financial statements and financial highlights contained in the Target Fund’s annual report, only insofar as they relate to the Target Fund, for the fiscal year ended March 31, 2025 (Accession No. 0001213900-25-048748) ; and · the Statement of Additional Information (“SAI”) relating to the Reorganization, dated June 12, 2025. The Target Fund’s Prospectus dated July 29, 2024 and the Target Fund’s Annual Report to Shareholders have been previously sent to shareholders. Copies of these documents are available upon request and without charge by writing to ETC Trust at 10900 Hefner Pointe Drive, Suite 400, Oklahoma City, Oklahoma 73120 or by calling (855) 796-3863 or at the Target Fund’s website https://bitqetf.com. The Acquiring Fund’s prospectus and statement of additional information are available upon request and without charge by writing to Bitw […]  name from the way participants verify and store transaction data in “blocks,” each of which is cryptographically linked to the prior block as a time-stamped chain. 5 In addition to its principal investment strategies, the Fund may also invest in money market instruments, including short-term debt instruments and repurchase agreements or other funds that invest exclusively in money market instruments (subject to applicable limitations under the 1940 Act or exemptions therefrom), rather than Index components, when it would be more efficient or less expensive for the Fund to do so, for liquidity purposes, or to earn interest. In addition to investing directly in the Index components, the Fund may invest in Index components indirectly through exchange-traded products. Swaps may be used by the Fund to seek performance that tracks the Index and to manage cash flows. The Fund’s adviser anticipates that it may take approximately two business days (i.e., each day the New York Stock Exchange is open for trading) for additions and deletions to the Index to be reflected in the portfolio composition of the Fund. Information Regarding the Index The Index for each Fund is the same. The Index was designed by Bitwise Index Services, an affiliate of BIM, to measure the performance of companies involved in servicing the cryptocurrency markets, including crypto mining firms, crypto mining equipment suppliers, crypto financial services companies, or other financial institutions servicing primarily crypto- related clientele ( i.e. , the crypto ecosystem). There will be no changes to the Index construction or methodology in connection with the reorganization. With respect to the Acquiring Fund, the following applies: Bitwise Index Services and BIM have established policies, procedures, systems and infrastructure to address any potential conflicts of interest that may arise because Bitwise Index Services, an affiliate of BIM, serves as index provider for the Acquiring Fund. These policies and procedures are addressed in further detail in the Acquiring Fund’s statement of additional information. Comparison of Fundamental Policies The fundamental policies of the Target Fund and the Acquiring Fund are the substantially similar and are s […] , which indicated that those ratios are projected to be the same. The Board noted that the management fees for the Target Fund and the Acquiring Fund are the same and each Fund has a unitary fee structure pursuant to which the Fund each pays only an advisory fee and the investment adviser (ETC in the case of the Target Fund and BIM in the case of the Acquiring Fund) pays all other expenses incurred by the Fund, except for customarily excluded expenses such as brokerage and other transaction-related costs, taxes, extraordinary expenses, and acquired fund fees and expenses. Management of the Acquiring Fund . The Board considered information provided by BIM regarding its capabilities and experience serving as an investment adviser for similar exchange-traded funds, including its experience overseeing subadvisers. The Board also considered that ETC will serve as subadviser to the Acquiring Fund and continue to have responsibility for trading portfolio securities for the Acquiring Fund, including continuing its role of selecting broker-dealers to execute purchase and sale transactions or in connection with any rebalancing, subject to the supervision of BIM. The Board also noted that the Acquiring Fund would continue to be managed by the same portfolio management team as the Target Fund with the addition of two portfolio managers from BIM. Consequently, the Board was familiar with ETC’s investment processes, procedures and personnel and noted the benefits of ETC providing portfolio management continuity to the Fund’s shareholders. Service Providers. The Board noted the quality and experience of the Acquiring Fund’s service providers. Acquiring Fund Board. After reviewing information about the Bitwise Trust, the Board noted the experience and background of its officers and independent trustees; Expenses Relating to Reorganization . The Board considered that the Target Fund’s shareholders will not incur any expenses in connection with the Reorganization. The Board considered that BIM will bear all expenses relating to the Reorganization, including expenses related to the Special Meeting and solicitation of proxies, preparing and filing the registration statement that includes this Proxy Statement, and the cost of copyi […]  $40,377,486 $103,972,160 Capitalization The following table shows, as of June 6, 2025, the capitalization of the Target Fund and the pro forma combined capitalization of the Acquiring Fund, giving effect to the Reorganization as of that date: Fund Net Assets Net Asset Value Per Share Shares Outstanding Target Fund $214,140,816.97 $18.00 $11,900,000 Acquiring Fund (pro forma) $214,140,816.97 $18.00 $11,900,000 Description of the Acquiring Fund’s Shares Shares of each Acquiring Fund issued to the shareholders of the corresponding Target Fund pursuant to the Reorganizations will be validly issued, fully paid, and non-assessable when issued in accordance with the Plan and will be transferable without restriction and will have no preemptive or conversion rights. Comparison of Forms of Organization and Shareholder Rights Form of Organization. Both ETC Trust and Bitwise Trust are Delaware statutory trusts governed by Delaware and federal law and their respective Declaration of Trust, By-Laws and Board of Trustees. The Agreement and Declaration of Trust of ETC Trust and the Amended and Restated Agreement and Declaration of Trust of Bitwise Trust are each referred to herein as a trust instrument. Shares. ETC Trust is authorized to issue an unlimited number of shares of beneficial interest of the Target Fund. Shareholders have no preemptive rights. The beneficial interest in the Bitwise Trust will be divided into shares, each share without a par value. The Bitwise Trust is authorized to issue an unlimited number of shares. Bitwise Trust shareholders shall have no preemptive or other right to subscribe for new or additional authorized, but unissued shares or other securities issued by the Trust or any series thereof. Voting Rights. On each matter submitted to a vote of shareholders of the Target Fund, each shareholder is entitled to one vote per whole share (and a fractional vote for each fractional share) held by such shareholder on the record date, without differentiation between separate series or classes of shares. However, if a matter to be voted on affects only the interests of a certain series (or class), then only the shareholder of such affected series (or class) shall be entitled to vote on the matter. 15 Share\n"

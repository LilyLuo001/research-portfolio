ows of\n   the Target/Acquiring fund table, a 4-fund filing yields 4 objects}, ... ]}\n  or the no_event object above.\nEach event object:\n  fund_name        target mutual fund's full name (from excerpt)\n  family           fund family/trust (from excerpt)\n  mutual_fund_ticker / etf_ticker\n                   a single 2-6 char UPPERCASE symbol from the excerpt, else \"NA\".\n                   NEVER a fund name. Multiple class tickers → \"NA\" and list them in evidence.\n  announce_date    YYYY-MM-DD only. Board-approval date if stated; else the document's own\n                   date; else the filed date. Vague (\"May 2020\",\"Q4 2026\") → \"NA\".\n  date_basis       \"board\" | \"document\" | \"filed\" | \"NA\"\n  effective_date   YYYY-MM-DD only; the stated closing/completion date. Vague → \"NA\".\n  asset_class      equity_US / equity_intl / fixed_income / other — ONLY if locatable in the\n                   excerpt (bond/muni/high-yield/MBS→fixed_income; International/EM/Asia→\n                   equity_intl; explicit US equity→equity_US; managed-futures/multi-asset/\n                   long-short→other). Name alone insufficient → \"NA\".\n  AUM_at_conversion_USD  number from excerpt or \"NA\"\n  source_accession copy from the 文件 line\n  confidence       H = fund identity + (announce or effective) with explicit basis;\n                   M = identity clear, dates partly missing/document-dated;\n                   L = identity inferred from title only\n  evidence         ≤25-word quote fragment supporting the verdict (for events: the words\n                   showing the acquirer is an ETF; for no_event: the words showing why not)\nNEED_HUMAN only when TWO date statements INSIDE THIS ONE EXCERPT contradict for the same\nfund: {\"NEED_HUMAN\": true, \"quotes\": [\"...\", \"...\"]}. Different filings never contradict.\nNever fill any field from memory — excerpt-locatable or \"NA\".\n\nSELF-CHECK before emitting (do this, don't print it): every input item id appears exactly\nonce in your answer map (count them); every event object quotes ETF-acquirer evidence;\nevery date matches ^\\d{4}-\\d{2}-\\d{2}$ or is \"NA\"; no ticker field contains a space.】\n文件: 0001193125-19-059708 (form 497, filed 2019-03-01, CALAMOS INVESTMENT TRUST/IL  (CIK 0000826732))\nsource_url: https://www.sec.gov/Archives/edgar/data/826732/000119312519059708/d625635d497.htm\n节选:\n497 1 d625635d497.htm CALAMOS INVESTMENT TRUST CALAMOS INVESTMENT TRUST Table of Contents Table of Contents Table of Contents The Funds Alternative Calamos Market Neutral Income Fund 1 Calamos Hedged Equity Fund (formerly, Calamos Hedged Equity Income Fund) 7 Calamos Phineus Long/Short Fund 14 Convertible Calamos Convertible Fund 21 Calamos Global Convertible Fund 27 U.S. Equity Calamos Growth Fund 34 Calamos Growth and Income Fund 39 Calamos Dividend Growth Fund 45 Calamos Opportunistic Value Fund 51 Global Equity Calamos International Growth Fund 56 Calamos Evolving World Growth Fund 61 Calamos Emerging Market Equity Fund 66 Calamos Global Equity Fund 71 Calamos Global Growth and Income Fund 76 Fixed Income Calamos Total Return Bond Fund 82 Calamos High Income Opportunities Fund 89 Calamos Short-Term Bond Fund 96 Other Important Information Regarding Fund Shares 102 Additional Information About Investment Strategies and Related Risks 103 Fund Facts 115 Who manages the Funds? 115 What classes of shares do the Funds offer? 123 How can I buy shares? 130 How can I sell (redeem) shares? 134 Transaction information 139 Distributions and taxes 143 Other Information 145 Financial Highlig […] ns, when it buys and sells securities (or “turns over” its portfolio). A higher portfolio turnover rate may indicate higher transaction costs and may result in higher taxes when Fund shares are held in a taxable account. These costs, which are not reflected in the annual fund operating expenses or in the example, affect the Fund’s performance. During the most recent fiscal year, the Fund’s portfolio turnover rate was 66.8% of the average value of its portfolio. Principal Investment Strategies The Fund’s investment strategy can be characterized as “market neutral” because it seeks to achieve maximum current income while maintaining a low correlation to the fluctuations of the U.S. equity market as a whole. The Fund invests (i) equities (ii) convertible securities (including synthetic convertible securities) of U.S. companies without regard to market capitalization and (iii) employs short selling and enters into total return swaps to enhance income and hedge against market risk. The convertible securities in which the Fund invests may be either debt securities or preferred stocks that can be exchanged for common stock. The average term to maturity of the convertible securities purchased by the Fund will typically range from two to ten years. A synthetic convertible instrument is a financial instrument (or two or more securities held in tandem) that is designed to simulate the economic characteristics of a convertible security through the combined features of a debt instrument and a security providing an option on an equity security. The Fund may establish a synthetic convertible instrument by combining fixed-income securities (which may be either convertible or non-convertible) with the right to acquire equity securities. In establishing a synthetic instrument, the Fund may combine a basket of fixed-income securities with a basket of warrants or options that together produce economic characteristics similar to a convertible security. Within each basket of fixed-income securities and warrants or options, different companies may issue the fixed-income and convertible components, which may be purchased separately and at different times. The Fund may seek to generate income from option premiums by writing (selling) options. This would include the use of both call and put options. The Fund may write call options (i) on a portion of the equity securities (including securities that are convertible into equity securities) in the Fund’s portfolio and (ii) on broad-based securities indexes (such as the S&P 500 or MSCI EAFE) or ETFs (exchange traded funds). In addition, to seek to offset some of the risk of a potential decline in value of certain long positions, the Fund may also purchase put options on individual securities, broad-based securities indexes (such as the S&P 500), or ETFs. The Fund may invest without limit in high yield fixed-income securities (often referred to as “junk bonds”). In addition, the Fund may engage in active and frequent trading of portfolio securities. The Fund may also invest in ETFs. The Fund’s investment adviser seeks to lower the risks of investing in stocks by using a “top-down approach” of diversification by company, industry, sector, country and currency and focusing on macro-level investment themes. Principal Risks An investment in the Fund is subject to risks, and you could lose money on your investment in the Fund. There can be no assurance that the Fund will achieve its investment objective. The risks associated with an investment in the Fund can increase during times of significant market volatility. Your investment in the Fund is not a deposit in a bank and is not insured or guaranteed by the Federal Deposit Insurance Corporation or any other government agency. The principal risks of investing in the Fund include: • Convertible Hedging Risk — If the market price of the underlying common stock increases above the conversion price on a convertible security, the price of the convertible security will increase. The Fund’s increased liability on any outstanding short position would, in whole or in part, reduce this gain. • Convertible Securities Risk — The value of a convertible security is influenced by changes in interest rates, with investment value declining as interest rates increase and increasing as interest rates decline. The credit standing of the issuer and other factors also may have an effect on the convertible security’s investment value. • Covered Call Writing Risk — As the writer of a covered call option on a security, the Fund foregoes, during the option’s life, the opportunity to profit from increases in the market value of the security, covering the call option above the sum of the premium and the exercise price of the call. 2 CALAMOS FAMILY OF FUNDS Table of Contents Calamos Market Neutral Income Fund • Debt Securities Risk — Debt securities are subject to various risks, including interest rate risk, credit risk and default risk. • Interest Rate Risk — The value of debt securities generally decreases in periods when interest rates are rising. In addition, interest rate changes typically have a greater effect on prices of longer-term debt securities than shorter term debt securities. Recent fixed-income market events, including increases in volatility and interest rates, may expose the Fund to heightened interest rate risk and volatility. • Credit Risk — A debt security could deteriorate in quality to such an extent that its rating is downgraded or its market value declines relative to comparable securities. If the Fund holds securities that have been downgraded, or that default on payment, the Fund’s performance could be negatively affected. • Default Risk — A company that issues a debt security may be unable to fulfill its obligation to repay principal and interest. The lower a bond is rated, the greater its default risk. To the extent the Fund holds securities t […] und may also experience losses as a result of a diminution in value of its cash collateral investments. • Short Sale Risk — The Fund may incur a loss (without limit) as a result of a short sale if the market value of the borrowed security (i.e., the Fund’s short position) increases between the date of the short sale and the date the Fund replaces the security. The Fund may be unable to repurchase the borrowed security at a particular time or at an acceptable price. • Small and Mid-Sized Company Risk — Small and mid-sized company stocks have historically been subject to greater investment risk than large company stocks. The prices of small and mid-sized company stocks tend to be more volatile than prices of large company stocks. • Synthetic Convertible Instruments Risk — The value of a synthetic convertible instrument will respond differently to market fluctuations than a convertible security because a synthetic convertible instrument is composed of two or more 4 CALAMOS FAMILY OF FUNDS Table of Contents Calamos Market Neutral Income Fund separate securities, each with its own market value. In addition, if the value of the underlying common stock or the level of the index involved in the convertible component falls below the exercise price of the warrant or option, the warrant or option may lose all value. • Tax Risk — The federal income tax treatment of convertible securities or other securities in which the Fund may invest may not be clear or may be subject to recharacterization by the Internal Revenue Service. It could be more difficult to comply with the tax requirements applicable to regulated investment companies if the tax characterization of investments or the tax treatment of the income from such investments were successfully challenged by the Internal Revenue Service. Any such failure to comply with the rules applicable to regulated investment companies could cause the Fund to fail to qualify as such. • Total Return Swap Risk — A total return swap is a contract in which one party agrees to make periodic payments to another party based on the change in market value of the assets underlying the contract, which may include a specified security, basket of securities, or securities indices during the specified period, in return for periodic payments based on a fixed or variable interest rate or the total return from other underlying assets. Total return swap agreements may be used to obtain exposure to a security or market without owning or taking physical custody of such security or investing directly in such market. Total return swap agreements may effectively add leverage to a fund’s portfolio because, in addition to its total net assets, the fund would be subject to investment exposure on the notional amount of the swap. The primary risks associated with total return swaps are credit risk (if the counterparty fails t […] eposit Insurance Corporation or any other government agency. The principal risks of investing in the Fund include: • American Depositary Receipts Risk — The stocks of most foreign companies that trade in the U.S. markets are traded as American Depositary Receipts (ADRs). U.S. depositary banks issue these stocks. Each ADR represents one or more shares of foreign stock or a fraction of a share. The price of an ADR corresponds to the price of the foreign stock in its home market, adjusted to the ratio of the ADRs to foreign company shares. Therefore while purchasing a security on a U.S. exchange, the risks inherently associated with foreign investing still apply to ADRs. 8 CALAMOS FAMILY OF FUNDS Table of Contents Calamos Hedged Equity Fund • Convertible Securities Risk — The value of a convertible security is influenced by changes in interest rates, with investment value declining as interest rates increase and increasing as interest rates decline. The credit standing of the issuer and other factors also may have an effect on the convertible security’s investment value. • Correlation Risk — The effectiveness of the Fund’s index option-based risk management strategy may be reduced if the performance of the Fund’s equity portfolio does not correlate to that of the indices underlying its option positions. • Covered Call Writing Risk — As the writer of a covered call option on a security, the Fund foregoes, during the option’s life, the opportunity to profit from increases in the market value of the security, covering the call option above the sum of the premium and the exercise price of the call. • Currency Risk — To the extent that the Fund invests in securities or other instruments denominated in or indexed to foreign currencies, changes in currency exchange rates bring an added dimension of risk. Currency fluctuations could negatively impact investment gains or add to investment losses. Although the Fund may attempt to hedge against currency risk, the hedging instruments may not always perform as the Fund expects and could produce losses. Suitable hedging instruments may not be available for currencies of emerging market countries. The Fund’s investment adviser may determine not to hedge currency risks, even if s\n"

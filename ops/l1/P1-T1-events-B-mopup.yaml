ars exactly\nonce in your answer map (count them); every event object quotes ETF-acquirer evidence;\nevery date matches ^\\d{4}-\\d{2}-\\d{2}$ or is \"NA\"; no ticker field contains a space.】\n文件: 0000949377-22-000113 (form 497, filed 2022-09-29, ROYCE FUND  (CIK 0000709364))\nsource_url: https://www.sec.gov/Archives/edgar/data/709364/000094937722000113/e87058-sai.htm\n节选:\n497 1 e87058-sai.htm TRF-SAI-0522 THE ROYCE FUND STATEMENT OF ADDITIONAL INFORMATION THE ROYCE FUND (the “Trust”), a Delaware statutory trust, is an open-end management investment company registered under the Investment Company Act of 1940 (the “1940 Act”). The Trust offers investors the opportunity to invest in eleven separate portfolios or series. Each of those series is classified as a “diversified” fund within the meaning of 1940 Act. The eleven series of the Trust (each, a “Fund” and collectively, the “Funds”), the share classes offered hereunder (each, a “Share Class” and collectively, the “Share Classes”), and their related ticker symbols are: Royce Pennsylvania Mutual Fund —Investment (PENNX), Service (RYPFX), Institutional (RPMIX), Consultant (RYPCX), and R (RPMRX) Royce Micro-Cap Fund —Investment (RYOTX), Service (RMCFX) and Consultant (RYMCX) Royce Premier Fund —Investment (RYPRX), Service (RPFFX), Institutional (RPFIX), Consultant (RPRCX), and R (RPRRX) Royce Small-Cap Total Return Fund —Investment (RYTRX), Service (RYTFX), Institutional (RTRIX), Consultant (RYTCX), and R (RTRRX) Royce Small-Cap Opportunity Fund —Investment (RYPNX), Service (RYOFX), Institutional (ROFIX […]  PROCEDURES 39 PORTFOLIO HOLDINGS DISCLOSURE POLICY 40 PRICING OF SHARES BEING OFFERED 42 REDEMPTIONS IN KIND 42 APPLICATION OF FREQUENT TRADING POLICY TO CERTAIN INVESTORS 42 TAXATION 43 DESCRIPTION OF THE TRUST 48 APPENDIX A – Information Regarding Record and/or Beneficial Owners of 5% or More of Any Fund Share Class as April 1, 2022 A-1 2 OTHER INVESTMENT STRATEGIES In addition to the principal investment strategies described in their respective Prospectuses, each Fund may invest the balance of its assets as described below. ROYCE PENNSYLVANIA MUTUAL FUND – in securities of companies with stock market capitalizations greater than that of the largest company in the Russell 2000® Index at the time of its most recent reconstitution and non-convertible preferred stocks and debt securities. This Fund’s investments do not focus on companies that do business in the Commonwealth of Pennsylvania. Additionally, investors who are residents of the Commonwealth of Pennsylvania do not receive additional tax benefits related to their investments in this Fund. ROYCE MICRO-CAP FUND – in securities of companies with stock market capitalizations greater than that of the largest company in the Russell Microcap® Index at the time of its most recent reconstitution and non-convertible preferred stocks and debt securities. ROYCE PREMIER FUND – in securities of companies with stock market capitalizations greater than that of the largest company in the Russell 2000® Index at the time of its most recent reconstitution, non-convertible preferred stocks and debt securities. ROYCE SMALL-CAP TOTAL RETURN FUND (formerly Royce Total Return Fund) – in securities with stock market capitalizations greater than that of the largest company in the Russell 2000® Index at the time of its most recent reconstitution, non-dividend-paying common stocks and non-convertible securities. ROYCE SMALL-CAP OPPORTUNITY FUND – (formerly Royce Opportunity Fund) in securities of companies with stock market capitalizations greater than that of the largest company in the Russell 2000® Index at the time of its most recent reconstitution and non-convertible preferred stocks and debt securities. ROYCE SMALL-CAP SPECIAL EQUITY FUND – (formerly Royce Special Equity Fund) in common stocks and convertible securities of companies with market capitalizations greater than that of the largest company in the Russell 2000® Index at the time of its most recent reconstitution and non-convertible preferred stocks and debt securities. ROYCE SMALL-CAP VALUE FUND – in securities of companies with stock market capitalizations greater than that of the largest company in the Russell 2000® Index at the time of its most recent reconstitution and non-convertible preferred stocks and debt securities. ROYCE SMALLER-COMPANIES GROWTH FUND – in securities of companies with stock market capitalizations above $7.5 billion and non-convertible preferred stocks and debt securities. ROYCE GLOBAL FINANCIAL SERVICES FUND – in securities of non-financial services companies, securities of financial services companies with stock market capitalizations above $5 billion and non-convertible preferred stocks and debt securities. ROYCE DIVIDEND VALUE FUND – in securities with stock market capitalizations above $15 billion, non-dividend paying common stocks and non-convertible securities. ROYCE INTERNATIONAL PREMIER FUND – in securities of companies with stock market capitalizations below $1 billion and above $5 billion, U.S. equity securities, and non-convertible preferred stocks and debt securities. 3 INVESTMENT POLICIES AND LIMITATIONS The Funds’ investment objectives are set forth in the Prospectuses. The Funds’ fundamental investment policies, limitations and operating policies are listed below. A Fund’s fundamental investment policies cannot be changed without the approval of a “majority of the outstanding voting securities” (as defined in the 1940 Act) of that Fund. The remaining investment policies and limitations described in this SAI and the Funds’ investment objectives described in the Prospectuses are operating policies and may be changed by a majority vote of the Board of Trustees of the Trust (the “Board”) and without shareholder approval. However, shareholders will be notified prior to any material change to the operating policies of any Fund in which they beneficially own shares. Unless otherwise expressly noted, compliance with each Fund’s investment policies and limitations will be determined immediately after or at the time of that Fund’s acquisition of the security or relevant asset except for Fundamental Policy No. 4, which the Funds must comply with on a continuous basis. Accordingly, any subsequent change in values, net assets or other circumstances will not be considered in determining whether an investment complies with a Fund’s investment policies and limitations, except as it relates to Fundamental Policy No. 4. In the event the percentage of a Fund’s assets invested in securities for which market […] gement; 16. Purchase portfolio securities from or sell such securities directly to any of the Trust’s Trustees, officers, employees or investment adviser, as principal for their own accounts; or 17. Invest more than 5% of its total assets in warrants, rights and options. Certain operating policies of the Funds are set forth below. Such operating policies may be changed by a majority vote of the Board and without shareholder approval. Notwithstanding any Fundamental Policy set forth herein, no Fund may, as a matter of operating policy, enter into any “derivatives transaction” within the meaning of Rule 18f-4 under the 1940 Act. No Fund may, as a matter of operating policy, invest more than 5% of its net assets in lower-rated (high-risk) non-convertible debt securities. Royce Small-Cap Opportunity Fund may not, as a matter of operating policy, invest more than 10% of its assets in the securities of foreign issuers. Royce Small-Cap Special Equity Fund may not, as a matter of operating policy: 1. Invest more than 10% of its assets in the securities of foreign issuers; 2. Invest more than 5% of its assets in securities for which market quotations are not readily available (i.e., illiquid securities); or 3. Invest more than 5% of its assets in the securities of other investment companies. Royce Pennsylvania Mutual Fund, Royce Micro-Cap Fund, Royce Premier Fund, Royce Small-Cap Total Return Fund, Royce Small-Cap Value Fund, Royce Smaller-Companies Growth Fund, and Royce Dividend Value Fund may not, as a matter of operating policy, invest more than 25% of their net assets in the securities of foreign issuers. Royce International Premier Fund may not, as a matter of operating policy, invest more than 35% of its net assets in the securities of companies headquartered in developing countries. Royce Pennsylvania Mutual Fund, Royce Micro-Cap Fund, Royce Premier Fund, Royce Small-Cap Total Return Fund, Royce Small-Cap Value Fund, Royce Smaller-Companies Growth Fund, and Royce Dividend Value Fund may not, as a matter of operating policy, invest more than 5% of their net assets in the securities of companies that are headquartered in developing countries. Royce Global Financial Services Fund may not, as a matter of operating p […] e following statutory exceptions to such limits: (i) where the acquiring company and the acquired company are part of the same group of investment companies; and (ii) where the acquiring company and its affiliated persons acquire up to 3% of the outstanding stock of an investment company and such acquiring company has not offered or sold and is not proposing to offer or sell any security which includes a sales load of more than 1.5%. 6 RISK FACTORS AND SPECIAL CONSIDERATIONS Equity Securities Each Fund invests in equity securities to the extent set forth in its Prospectus. For these purposes, “equity security” has the meaning set forth in the Securities Exchange Act of 1934, as amended (the “Exchange Act”). Common stocks, preferred stocks, convertible securities, warrants, rights, and options are some examples of equity securities in which the Funds may invest. Generally, preferred stock has a specified dividend and ranks after bonds and before common stocks in its claim on the company’s income for purposes of receiving dividend payments and on the company’s assets in the event of liquidation. Convertible securities have characteristics of both debt securities (which is generally the form in which they are first issued) and equity securities (which is what they can be converted into). Funds’ Rights as Stockholders No Fund may invest in a company for the purpose of exercising control of management. However, a Fund may exercise its rights as a stockholder and communicate its views on important matters of policy to the company’s management or its board of directors and/or other stockholders if Royce or the Board determines that such matters could have a significant effect on the value of the Fund’s investment in the company. The activities that a Fund may engage in, either individually or in conjunction with others, include, among others, supporting or opposing proposed changes in a company’s corporate structure or business activities; seeking changes in a company’s board of directors or management; seeking changes in a company’s direction or policies; seeking the sale or reorganization of a company or a portion of its assets; or supporting or opposing third party takeover attempts. This area of corporate activity is increasingly prone to litigation, and it is possible that a Fund could be involved in lawsuits related to such activities. Royce will monitor such activities with a view to mitigating, to the extent possible, the risk of litigation against the Funds and the risk of actual liability if a Fund is involved in litigation. However, no guarantee can be made that litigation against a Fund will not be undertaken or expenses or liabilities incurred, which could have a negative impact on that Fund’s performance. A Fund may, at its expense  […] ove the value of the collateral; (iii) after giving notice, the Fund must be able to terminate the loan at any time; (iv) the Fund must receive reasonable interest on the loan or a flat fee from the borrower, as well as amounts equivalent to any dividends, interest or other distributions on the securities loaned and to any increase in market value; (v) the Fund may pay only reasonable custodian fees in connection with the loan; and (vi) the Fund must be able to vote proxies on the securities loaned, either by terminating the loan or by entering into an alternative arrangement with the borrower. 7 Lower-Rated (High-Risk) and Below Investment Grade Debt Securities Each Fund may invest up to 5% of its net assets in lower-rated (high-risk) non-convertible debt securities. These speculative securities are commonly referred to as “below investment grade” securities or “junk” bonds. They may be rated from Ba to Ca by Moody’s Investors Service, Inc., from BB to D by Standard & Poor’s, or may be unrated. These securities have poor protection with respect to the payment of interest and repayment of principal and may be in default or about to be in default as to the repayment of principal or the payment of interest. These securities are often considered to be speculative and involve greater risk of loss or price changes due to changes in the issuer’s capacity or perceived capacity to make timely payment of principal and interest. The market prices of lower-rated (high-risk) debt securities may fluctuate more than those of higher-rated debt securities and may decline significantly in periods of general economic difficulty, which may follow periods of rising interest rates. The market for lower-rated (high-risk) debt securities may be thinner and less active than that for higher-rated debt securities, which can adversely affect the prices at which the former are sold. If market quotations cease to be readily available for a debt security rated “below investment grade” in which a Fund has invested, the security will then be valued in accordance with procedures established by the Board and described in the applicable Fund’s Prospectus. Judgment and other subjective factors play a greater role in the valuation of lower-rated (\n"

nt in securities backed by, or in such entities that invest in, physical commodities, other than shares of a wholly owned Subsidiary (as defined below), would produce non-qualifying income, although investments in certain “commodity-linked notes” and/or in stock of a “controlled foreign corporation” that invests in physical commodities and annually distributes its net income and gains generally should not produce such income. To remain within the 10% limitation, the Fund may need to hold such an investment or sell it at a loss, or sell other investments, when for investment reasons it would not otherwise do so. The a\n"

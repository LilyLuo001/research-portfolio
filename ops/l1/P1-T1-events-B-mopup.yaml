ows of\n   the Target/Acquiring fund table, a 4-fund filing yields 4 objects}, ... ]}\n  or the no_event object above.\nEach event object:\n  fund_name        target mutual fund's full name (from excerpt)\n  family           fund family/trust (from excerpt)\n  mutual_fund_ticker / etf_ticker\n                   a single 2-6 char UPPERCASE symbol from the excerpt, else \"NA\".\n                   NEVER a fund name. Multiple class tickers → \"NA\" and list them in evidence.\n  announce_date    YYYY-MM-DD only. Board-approval date if stated; else the document's own\n                   date; else the filed date. Vague (\"May 2020\",\"Q4 2026\") → \"NA\".\n  date_basis       \"board\" | \"document\" | \"filed\" | \"NA\"\n  effective_date   YYYY-MM-DD only; the stated closing/completion date. Vague → \"NA\".\n  asset_class      equity_US / equity_intl / fixed_income / other — ONLY if locatable in the\n                   excerpt (bond/muni/high-yield/MBS→fixed_income; International/EM/Asia→\n                   equity_intl; explicit US equity→equity_US; managed-futures/multi-asset/\n                   long-short→other). Name alone insufficient → \"NA\".\n  AUM_at_conversion_USD  number from excerpt or \"NA\"\n  source_accession copy from the 文件 line\n  confidence       H = fund identity + (announce or effective) with explicit basis;\n                   M = identity clear, dates partly missing/document-dated;\n                   L = identity inferred from title only\n  evidence         ≤25-word quote fragment supporting the verdict (for events: the words\n                   showing the acquirer is an ETF; for no_event: the words showing why not)\nNEED_HUMAN only when TWO date statements INSIDE THIS ONE EXCERPT contradict for the same\nfund: {\"NEED_HUMAN\": true, \"quotes\": [\"...\", \"...\"]}. Different filings never contradict.\nNever fill any field from memory — excerpt-locatable or \"NA\".\n\nSELF-CHECK before emitting (do this, don't print it): every input item id appears exactly\nonce in your answer map (count them); every event object quotes ETF-acquirer evidence;\nevery date matches ^\\d{4}-\\d{2}-\\d{2}$ or is \"NA\"; no ticker field contains a space.】\n文件: 0001680359-22-000039 (form N-14, filed 2022-03-16, FRANKLIN TEMPLETON VARIABLE INSURANCE PRODUCTS TRUST  (CIK 0000837274))\nsource_url: https://www.sec.gov/Archives/edgar/data/837274/000168035922000039/ftviptvolsmrtallcn1403162022.htm\n节选:\nN-14 1 ftviptvolsmrtallcn1403162022.htm As filed with the Securities and Exchange Commission on March 16, 2022 File No. _________ UNITED STATES SECURITIES AND EXCHANGE COMMISSION WASHINGTON, D.C. 20549 FORM N-14 REGISTRATION STATEMENT UNDER THE SECURITIES ACT OF 1933 Pre-Effective Amendment No. ____ [ ] Post-Effective Amendment No. ____ [ ] (Check appropriate box or boxes) FRANKLIN TEMPLETON VARIABLE INSURANCE PRODUCTS TRUST (Exact Name of Registrant as Specified in Charter) Registrant’s Area Code and Telephone Number: (650) 312-2000 ONE FRANKLIN PARKWAY, SAN MATEO, CA 94403-1906 (Address of Principal Executive Offices) (Number, Street, City, State, Zip Code) CRAIG S. TYLE, ONE FRANKLIN PARKWAY, SAN MATEO, CA 94403-1906 (Name and Address of Agent for Service) (Number and Street) (City) (State) (Zip Code) Copies to: Bruce G. Leto, Esquire Stradley Ronon Stevens & Young, LLP 2005 Market Street, Suite 2600 Philadelphia, PA 19103-7018 Approximate Date of Proposed Public Offering: As soon as practicable after this Registration Statement becomes effective under the Securities Act of 1933, as amended. Title of the securities being registered: Class 1 and Class 2 shares of beneficial inter […] ve positions, by selling shares of unaffiliated ETFs and other liquid securities or engaging in short sale transactions involving index options and index futures contracts, or by entering into options, futures, swaps or other instruments. The Acquiring Fund manages volatility by writing (selling) one or more equity index futures contracts with the goal of decreasing its core portfolio’s exposure to U.S. equity securities so that the expected annual volatility of the Acquiring Fund is at or below the target of 10%. 8 The main difference between the investment strategies of the Target Fund and the Acquiring Fund is that the Target Fund is structured as a fund-of funds that pursues its investment goal by investing primarily in other funds and exchange-traded funds (“ETFs”), whereas the Acquiring Fund is structured as a limited fund-of-funds that pursues its investment goal by investing partially in other funds and ETFs, and also obtains exposure to certain strategies and investments by directly investing in the securities and instruments in that strategy. The Acquiring Fund may not invest more than 25% of its assets in any one underlying fund, whereas the Target Fund is not subject to a similar limitation. In addition, the Acquiring Fund generally has less exposure to foreign equities, foreign bonds and small-cap securities, and more exposure to large-cap domestic equity securities than the Target Fund. Because the Funds have substantially similar investment goals and similar principal investment strategies, the Target Fund and the Acquiring Fund are subject to similar principal investment risks. For example, because the Funds allocate their assets primarily to equity and fixed income asset classes, gain exposure to strategic asset classes (either primarily or partially) by investing in underlying funds and ETFs, and use derivative instruments to manage volatility and invest in underlying funds and ETFs that use derivative instruments, both Funds are subject to the following same or similar principal investment risks (although the Funds’ prospectuses take different approaches to identifying which risks are principal risks, and to describing and labeling those risks): allocation/management; volatility management st […] tion shall be accomplished by the establishment of accounts on the share records of the Acquiring Fund of the type and in the amounts due such shareholders based on their respective holdings in the Target Fund as of the Valuation Time on the Closing Date. Fractional Acquiring Fund Shares shall be carried to the third decimal place. As promptly as practicable after the Closing, each holder of any outstanding certificate or certificates representing Target Fund Shares shall be entitled to surrender the same to the transfer agent for the Acquiring Fund in exchange for the number of Acquiring Fund Shares of the same class into which the Target Fund Shares theretofore represented by the certificate or certificates so surrendered shall have been converted. Until so surrendered, each outstanding certificate, if any, which, prior to the Closing, represented Target Fund Shares shall be deemed for all Acquiring Fund purposes to evidence ownership of the number of Acquiring Fund Shares into which the Target Fund Shares (which prior to the Closing were represented thereby) have been converted. Certificates for the Acquiring Fund Shares shall not be issued. After the distribution, the Target Fund shall be dissolved. (d) At the Closing, each shareholder of record of the Target Fund as of the record date (the “Distribution Record Date”) with respect to any unpaid dividends and other distributions that were declared prior to the Closing, including any dividend or distribution declared pursuant to Section 6(d) hereof, shall have the right to receive such unpaid dividends and other distributions with respect to the shares of the Target Fund that such person had on such Distribution Record Date. (e) All books and records relating to the Target Fund, including all books and records required to be maintained under the Investment Company Act of 1940 (the “1940 Act”), and the rules and A-2 regulations thereunder, shall be available to the Acquiring Fund from and after the date of the Plan, and shall be turned over to the Acquiring Fund on or prior to the Closing. 2. Valuation . (a) The net asset value per share of the Acquiring Fund Shares and the Target Fund Shares and the value of the Target Fund’s Net Assets to be acquired by the Acquiring Fund hereunder shall in each case be computed as of the Valuation Time on the Closing Date, unless on such date: (i) the New York Stock Exchange (“NYSE”) is not open for unrestricted trading; or (ii) the reporting of trading on the NYSE or other relevant market is disrupted; or (iii) any other extraordinary financial event or  […] tion without the vote of shareholders, but no amendment may be made that impairs the exemption from personal liability granted in the MD Declaration to persons who are or have been shareholders, trustees, officers or employees of the trust, or that limits the rights to indemnification, advancement of expenses or insurance provided in the MD Declaration with respect to actions or omissions of persons entitled to indemnification, advancement of expenses or insurance under the MD Declaration prior to the amendment. Issuance of Shares Both Declarations provide that the Funds may issue an unlimited number of shares for such consideration and on such terms as the Trustees may determine. Shareholders are not entitled to any appraisal, preemptive, conversion, exchange or similar rights, except as the Trustees may determine. Each Fund may involuntarily redeem a shareholder’s shares upon certain conditions as may be determined by the Trustees, including, for example, if the shareholder fails to provide the Fund with identification required by law, or for the failure of a shareholder to pay when due for the purchase of those shares. Additionally, shares may be redeemed in connection with the closing of small accounts. Series and Classes Both Declarations provide that the Trustees may establish series and classes in addition to those currently established and to determine the rights and preferences, limitations and restrictions, including qualifications for ownership, conversion and exchange features, minimum purchase and account size, expenses and charges, and other features of the series and classes. The Trustees may change any of those features, terminate any series or class, combine series with other series in the Trust, combine one or more classes of a series with another class in that series or convert the shares of one class into another class. Each share of the Fund, as a series of the Trust, represents an interest in the Fund only and not in the assets of any other series of the Trust. C-3 Shareholder Liability Consistent with the Delaware Act, the DE Declaration provides that no Acquiring Fund shareholder, as such, shall be subject to any personal liability whatsoever to any person in connection with the property, acts, obligations or affairs of FTVIPT or any series. Consistent with Maryland law, the MD Declaration provides that shareholders are not personally liable for the obligations of the Target Fund and requires the Target Fund to indemnify a shareholder against any loss or expense arising from any such liability, should it arise. The Target Fund will assume the defense of any claim against a shareholder for personal liability at the request of the shareholder. Liability of Trustees and Officers; Indemnification The DE Declaration provides that any person who is or was a Trustee or officer shall be liable to FTVIPT and to any shareholder for any act or omission that constitutes a bad faith violation of the implied contractual covenant of good faith and fair dealing, for his or her own willful misfeasance, bad faith, gross negligence or reckless disregard of the duties involved in the conduct of such office and for nothing else. A Trustee or officer of FTVIPT, when acting in such capacity, shall not be personally liable to any person other than FTVIPT or a \n"

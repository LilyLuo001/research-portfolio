    Fund (“Altegris”) provides investment advisory and management services, including the selection and
    monitoring of the sub-adviser to the Target Fund. Altegris has selected American Assets Capital Advisers,
    LLC (“AACA”) to sub-advise the Target Fund and manage the Target Fund’s real estate long short investment
    portfolio. In managing the Target Fund’s portfolio, AACA, as the sub-adviser, will seek to produce
    above average, risk-adjusted total returns, including capital appreciation, dividend and interest
    income and option premiums, through investments both long and short in real estate related securities,
    including publicly traded securities, REITs, other equities and equity-related derivatives and may
    also invest in debt and convertible debt and preferred securities. To the extent allowable under applicable
    regulations, the Target Fund will use leverage to obtain greater exposure to markets in its investment
    portfolio. The Target Fund will not purchase real estate directly or acquire other forms of direct
    ownership in real estate. The Target Fund may invest in equity and equity derivative securities of
    both U.S. and non-U.S. real estate companies, as well as companies located in emerging markets and
    issuers of any capitalization and in any style (from growth to value). The Target Fund considers emerging
    market issuers to be those located in the countries that are represented in the MSCI Emerging Markets
    Index. The Target Fund may invest in convertible debt securities of any maturity or credit quality,
    including those rated below investment grade (“high yield securities” or “junk bonds”). Below investment
    grade debt securities are those rated below Baa3 by Moody’s Investors Service or equivalently by another
    nationally recognized statistical rating organization (“NRSRO”). The Target Fund may invest a portion
    of its assets in private placement offerings of real estate companies which may be illiquid. The Target
    Fund may also invest in preferred stock, options (both covered and uncovered or “naked”), convertible
    securities, or rights or warrants to buy stocks, and may create long or short positions in exchange
    traded funds (“ETFs”), other investment companies, or American Depositary Receipts (“ADRs”). The Target
    Fund’s investments in ETFs may be made (i) as part of the management of portfolio investments, (ii)
    to hedge various investments for risk management (see below) and/or (iii) for income enhancement,
    which is also known as speculation. The Target Fund concentrates investments in the real estate industry,
    meaning that under normal circumstances, it invests over 25% of its assets in real estate industry
    securities. The Acquiring Fund’s investment objective is pursued through a “Value, Yield-Advantage”
    strategy (as described in more detail below) through investment in public real estate securities,
    which may include equity real estate investment trusts (a “REIT” or “REITs”), mortgage REITs, REIT
    preferreds, and other publicly traded companies whose primary business is in the real estate industry.
    This strategy often leads to investment in smaller capitalization companies (under $1B). The composition
    of the portfolio does not seek to mimic equity REIT indices. The Value, Yield-Advantage strategy seeks
    to invest in companies that in LDR’s view have (i) underlying real estate assets that are trading
    at a discount to the private market value of such assets and (ii) have an above-average dividend yield
    or strong free cash flow. LDR screens its universe of real estate securi […] ership, construction,
    development, financing, leasing, management and/or sale of commercial, industrial or residential real
    estate, companies that have a significant portion of their assets invested these types of real estate
    related companies, including, for example, real estate investment trusts (“REITs”), or companies that
    may not participate directly in real estate, but which may present an attractive investment opportunity
    based on the inherent value of their real estate holdings or exposure, or provide sales, leasing or
    other strategic services to real estate companies. Equity securities of real estate companies will
    include (1) common stocks, (2) preferred stocks, (3) stock warrants, (4) stock rights and (5) debt
    securities that are convertible into stock. Under normal conditions, the Acquiring Fund invests at
    least 80% of its net assets, plus the amount of any borrowings for investment purposes, in equity
    securities of companies principally engaged in the real estate industry and other real estate related
    investments. Equity securities can consist of shares of REITs, and securities issued by other companies
    principally engaged in the real estate industry. Equity securities can also include securities convertible
    into common stocks where the conversion feature represents, in LDR’s view, a significant element of
    a security’s value, and preferred stocks. The Acquiring Fund considers a company to be principally
    engaged in the real estate industry if it either (i) derives at least 50% of its revenues from the
    ownership, construction, financing, management or sale of commercial or residential real estate or
    (ii) has at least 50% of its assets in real estate or such real estate businesses. These include securities
    issued by REITs and real estate operating companies. The Acquiring Fund does not invest in real estate
    directly. The remainder of the Acquiring Fund''s assets will be invested in cash or short-term investments
    or securities of real estate operating companies that may pay little or no dividends. In addition,
    the Target Fund may engage in transactions for the purpose of hedging against changes in the price
    of other Target Fund portfolio securities, such as purchasing put options, selling securities short
    or writing covered call options. Such defensive or hedged positions may also include investments in
    equity securities of real estate as well as non-real estate companies. Additionally, the Target Fund
    may employ leverage by borrowing from banks in an amount of up to 33% of the Target Fund’s assets
    (defined as net assets plus borrowing for investment purposes). The Acquiring Fund may take short
    positions totaling up to 30% of the Acquiring Fund’s total assets. LDR is most likely to use shorting

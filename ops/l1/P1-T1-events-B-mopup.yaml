ows of\n   the Target/Acquiring fund table, a 4-fund filing yields 4 objects}, ... ]}\n  or the no_event object above.\nEach event object:\n  fund_name        target mutual fund's full name (from excerpt)\n  family           fund family/trust (from excerpt)\n  mutual_fund_ticker / etf_ticker\n                   a single 2-6 char UPPERCASE symbol from the excerpt, else \"NA\".\n                   NEVER a fund name. Multiple class tickers → \"NA\" and list them in evidence.\n  announce_date    YYYY-MM-DD only. Board-approval date if stated; else the document's own\n                   date; else the filed date. Vague (\"May 2020\",\"Q4 2026\") → \"NA\".\n  date_basis       \"board\" | \"document\" | \"filed\" | \"NA\"\n  effective_date   YYYY-MM-DD only; the stated closing/completion date. Vague → \"NA\".\n  asset_class      equity_US / equity_intl / fixed_income / other — ONLY if locatable in the\n                   excerpt (bond/muni/high-yield/MBS→fixed_income; International/EM/Asia→\n                   equity_intl; explicit US equity→equity_US; managed-futures/multi-asset/\n                   long-short→other). Name alone insufficient → \"NA\".\n  AUM_at_conversion_USD  number from excerpt or \"NA\"\n  source_accession copy from the 文件 line\n  confidence       H = fund identity + (announce or effective) with explicit basis;\n                   M = identity clear, dates partly missing/document-dated;\n                   L = identity inferred from title only\n  evidence         ≤25-word quote fragment supporting the verdict (for events: the words\n                   showing the acquirer is an ETF; for no_event: the words showing why not)\nNEED_HUMAN only when TWO date statements INSIDE THIS ONE EXCERPT contradict for the same\nfund: {\"NEED_HUMAN\": true, \"quotes\": [\"...\", \"...\"]}. Different filings never contradict.\nNever fill any field from memory — excerpt-locatable or \"NA\".\n\nSELF-CHECK before emitting (do this, don't print it): every input item id appears exactly\nonce in your answer map (count them); every event object quotes ETF-acquirer evidence;\nevery date matches ^\\d{4}-\\d{2}-\\d{2}$ or is \"NA\"; no ticker field contains a space.】\n文件: 0001432353-22-000524 (form N-14, filed 2022-12-15, Global X Funds  (CIK 0001432353))\nsource_url: https://www.sec.gov/Archives/edgar/data/1432353/000143235322000524/formn-14xmiraeglobalxconve.htm\n节选:\nN-14 1 formn-14xmiraeglobalxconve.htm N-14 Document As filed with the U.S. Securities and Exchange Commission on December 15, 2022 1933 Act File No. 333- [________] U.S. SECURITIES AND EXCHANGE COMMISSION Washington, D.C. 20549 FORM N-14 REGISTRATION STATEMENT UNDER THE SECURITIES ACT OF 1933 [X] Pre-Effective Amendment No. ___ [ ] Post-Effective Amendment No. ___ [ ] GLOBAL X FUNDS (Exact Name of Registrant as Specified In Its Charter) 605 3rd Avenue, 43 rd Floor New York, NY 10158 (Address of Principal Executive Office) (Zip Code) Registrant’s Telephone Number, including Area Code: (212) 644-6440 Send Copies of Communications to: Luis Berruga Eric S. Purple, Esquire 605 3rd Avenue, 43rd Floor Stradley Ronon Stevens & Young, LLP New York, New York 10158 2000 K Street, N.W., Suite 700 (NAME AND ADDRESS OF AGENT FOR SERVICE) Washington, D.C. 20006 Title of Securities being Registered: Global X Emerging Markets ETF and Global X Emerging Markets Great Consumer ETF Approximate Date of Proposed Public Offering: As soon as practicable after the Registration Statement becomes effective under the Securities Act of 1933, as amended. No filing fee is required under the Securities Act of 1933 […] t Company LLC, which as of November 30, 2022 provides investment advisory services for assets of approximately $39 billion. 4) Expenses Relating to the Reorganization: The Target Funds will not incur any direct expenses in connection with the Reorganization. 5) Lower Management Fees and Total Expense Ratios: Each Acquiring Fund will pay a lower management fee and is anticipated to pay lower total expenses than the corresponding Target Fund. 6) Federal Income Tax Consequences: The Reorganization is expected to qualify as a tax-free reorganization for U.S. federal income tax purposes, and the Target Fund shareholders are not expected to recognize any gain or loss upon receipt of Acquiring Fund shares in the Reorganization. 7) Benefits of the Exchange-Traded Fund Structure: The Acquiring Funds will be organized as ETFs. ETFs, in general, may benefit from intra-day trading, increased tax efficiency, greater transparency into portfolio holdings, lower portfolio transaction costs, and less cash drag on performance. The attached combined Proxy Statement/Prospectus asks for your approval of the proposed Reorganization(s) for your Target Fund(s) and contains detailed information about each of the proposals. In addition, the following “COMMON QUESTIONS ABOUT THE PROPOSED REORGANIZATIONS ” includes a description of required actions for shareholders who hold shares of the Target Funds in accounts that cannot hold ETF shares and should be read carefully. For shareholders holding Target Fund shares in accounts that can hold shares of ETFs, assuming shareholder approval of the proposed Reorganizations, no additional action will need to be taken prior to the Reorganizations for the account to receive ETF shares. The Mirae Asset Board recommends that you vote “ FOR ” the proposed Reorganization(s) of your Target Fund(s). Before you vote, please read the combined Proxy Statement/Prospectus for an explanation of the proposals. If you complete, sign, and return a proxy card, your proxy will be voted exactly as specified. If you simply sign and return a proxy card without indicating how your shares are to be voted, we’ll vote your proxy “ FOR” the Reorganization(s) which is in accordance with the Mirae Asset Board’s recommendation  […] ommonly asked questions that are intended to help you understand the proposals on which shareholders of each of the Emerging Markets Fund and the Emerging Markets Great Consumer Fund (each, a “Target Fund” and collectively, the “Target Funds”) are being asked to vote. These proposals are described in more detail in the enclosed combined Proxy Statement/Prospectus, which you should read carefully. COMMON QUESTIONS ABOUT THE PROPOSED REORGANIZATIONS Q. WHAT IS BEING PROPOSED? A. Each Target Fund currently operates as an open-end mutual fund. If the Agreement and Plan of Reorganization (the “Reorganization Agreement”) for your Target Fund is approved by shareholders, each Target Fund (each, a series of the Mirae Asset Discovery Funds) will be converted into an exchange-traded fund (“ETF”) through the reorganization of the Target Fund into the corresponding Acquiring Fund listed below (each, a “Reorganization” and collectively, the “Reorganizations”). Each Acquiring Fund is a newly created series of Global X Funds (the \"Global X Trust\") established solely for the purpose of acquiring the assets and assuming the liabilities of its corresponding Target Fund and is advised by Global X Management Company LLC (“GXMC”), an affiliate of Mirae Asset Global Investments (USA) LLC (“Mirae Asset USA”), the investment adviser to your Target Fund(s). Target Funds (series of Mirae Asset Discovery Funds) Acquiring Funds (series of Global X Funds) Emerging Markets Fund Global X Emerging Markets ETF Emerging Markets Great Consumer Fund Global X Emerging Markets Great Consumer ETF Q. WHY ARE YOU SENDING ME THIS INFORMATION? A. You are receiving the combined Proxy Statement/Prospectus because you owned shares of one or more Target Funds as of January 6, 2023 (the “Record Date”) and as a shareholder of a Target Fund you have a right to vote on the Reorganization involving such Target Fund. Q. WHAT WILL HAPPEN IF SHAREHOLDERS APPROVE THE REORGANIZATION AGREEMENT? A: If the Reorganization Agreement for your Target Fund is approved and all other closing conditions of the corresponding Reorganization under the Reorganization Agreement are satisfied or waived, on the expected closing date (on or about April 15, 2023, or as soon as reasonably practicable afte […] r of the corresponding Acquiring Fund. vi Specifically, for each Target Fund and its corresponding Acquiring Fund, (1) the assets of the Target Fund will be acquired by the Acquiring Fund and the liabilities of the Target Fund will be assumed by the Acquiring Fund in exchange for Acquiring Fund shares; and (2) the Acquiring Fund shares received by the Target Fund in the exchange will then be distributed to shareholders of the Target Fund. After the Acquiring Fund shares are distributed to the Target Fund’s shareholders, the Target Fund will be liquidated and dissolved. In addition, if the Reorganization Agreement is approved by each Target Fund’s shareholders, each class of shares of the Target Fund, other than Class I shares, will then be converted into Class I shares (without a contingent deferred sales charge or other charge) immediately prior to the Reorganizations. The closing of each Target Fund’s Reorganization, which is expected to occur on the Closing Date, is contingent upon shareholder approval of the Reorganization Agreement with respect to such Target Fund and further conditioned upon certain other closing conditions, including, receipt of an opinion of counsel to the Acquiring Funds that each Reorganization qualifies as a tax-free reorganization for federal income tax purposes. Q. HOW WILL I BE AFFECTED BY THE REORGANIZATIONS? A. Following the Reorganizations, you will become a shareholder of the respective Acquiring Fund, which will be a series of the Global X Trust, rather than a series of Mirae Asset Discovery Funds (the “Mirae Asset Trust”). Additionally, upon completion of the Reorganizations, you will own shares of the respective Acquiring Fund offered as an ETF having an aggregate NAV equal to the aggregate NAV of the shares of the respective Target Fund you owned when the Reorganization happened. Shares of the Acquiring Fund are not issued in fractional shares. As a result, shareholders who hold fractional shares of a Target Fund will have such fractional shares redeemed at NAV immediately prior to the Reorganization resulting in a small cash payment, which will likely be taxable to some extent for shareholders who hold fractional shares in a taxable account. Shareholders should consult th\n"

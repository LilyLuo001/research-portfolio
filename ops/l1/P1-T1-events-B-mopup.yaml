ows of\n   the Target/Acquiring fund table, a 4-fund filing yields 4 objects}, ... ]}\n  or the no_event object above.\nEach event object:\n  fund_name        target mutual fund's full name (from excerpt)\n  family           fund family/trust (from excerpt)\n  mutual_fund_ticker / etf_ticker\n                   a single 2-6 char UPPERCASE symbol from the excerpt, else \"NA\".\n                   NEVER a fund name. Multiple class tickers → \"NA\" and list them in evidence.\n  announce_date    YYYY-MM-DD only. Board-approval date if stated; else the document's own\n                   date; else the filed date. Vague (\"May 2020\",\"Q4 2026\") → \"NA\".\n  date_basis       \"board\" | \"document\" | \"filed\" | \"NA\"\n  effective_date   YYYY-MM-DD only; the stated closing/completion date. Vague → \"NA\".\n  asset_class      equity_US / equity_intl / fixed_income / other — ONLY if locatable in the\n                   excerpt (bond/muni/high-yield/MBS→fixed_income; International/EM/Asia→\n                   equity_intl; explicit US equity→equity_US; managed-futures/multi-asset/\n                   long-short→other). Name alone insufficient → \"NA\".\n  AUM_at_conversion_USD  number from excerpt or \"NA\"\n  source_accession copy from the 文件 line\n  confidence       H = fund identity + (announce or effective) with explicit basis;\n                   M = identity clear, dates partly missing/document-dated;\n                   L = identity inferred from title only\n  evidence         ≤25-word quote fragment supporting the verdict (for events: the words\n                   showing the acquirer is an ETF; for no_event: the words showing why not)\nNEED_HUMAN only when TWO date statements INSIDE THIS ONE EXCERPT contradict for the same\nfund: {\"NEED_HUMAN\": true, \"quotes\": [\"...\", \"...\"]}. Different filings never contradict.\nNever fill any field from memory — excerpt-locatable or \"NA\".\n\nSELF-CHECK before emitting (do this, don't print it): every input item id appears exactly\nonce in your answer map (count them); every event object quotes ETF-acquirer evidence;\nevery date matches ^\\d{4}-\\d{2}-\\d{2}$ or is \"NA\"; no ticker field contains a space.】\n文件: 0001104659-20-076390 (form N-14, filed 2020-06-24, HEARTLAND GROUP INC  (CIK 0000809586))\nsource_url: https://www.sec.gov/Archives/edgar/data/809586/000110465920076390/tm2021961d1_n14.htm\n节选:\nN-14 1 tm2021961d1_n14.htm N-14 As filed with the Securities and Exchange Commission on June 24, 2020 Registration No. 333-[ ] U.S. SECURITIES AND EXCHANGE COMMISSION Washington, D.C. 20549 FORM N-14 REGISTRATION STATEMENT UNDER THE SECURITIES ACT OF 1933 PRE-EFFECTIVE AMENDMENT NO. ____ POST-EFFECTIVE AMENDMENT NO.____ (Check appropriate box or boxes) HEARTLAND GROUP, INC. (Exact Name of Registrant as Specified in Charter) 790 NORTH WATER STREET, SUITE 1200 MILWAUKEE, WISCONSIN 53202 (Address of Principal Executive Offices) (Zip Code) Registrant’s Telephone Number, including Area Code: (414) 347-7777 VINITA K. PAUL Heartland Group, Inc. 790 North Water Street, Suite 1200 Milwaukee, Wisconsin 53202 (Name and Address of Agent for Service) Copies to: ELLEN R. DROUGHT, ESQ. Godfrey & Kahn, S.C. 833 East Michigan Street Suite 1800 Milwaukee, Wisconsin 53202 PETER D. FETZER, ESQ. Foley & Lardner LLP 777 East Wisconsin Avenue Milwaukee, Wisconsin 53202 Approximate Date of Proposed Public Offering: As soon as practicable after the Registration Statement becomes effective under the Securities Act of 1933, as amended. It is proposed that this filing will become effective on July 24, 2020 pu […] f the Acquiring Fund, 75,000,000 of which shares are designated as Investor Class shares of the Target Fund and 75,000,000 of which shares are designated as Institutional Class shares of the Target Fund. HGI’s Board is authorized to classify HGI’s shares into separate series. Currently, HGI offers four series to the public, including the Acquiring Fund and the Target Fund. The Board is also authorized to further classify the shares of HGI series into classes, and has authorized two different share classes. The Acquiring Fund is offering shares of the Investor Class and Institutional Class to shareholders of the Target Fund in connection with the Reorganization. Shares of series of HGI have no preemptive, cumulative voting, subscription, or conversion rights and are freely transferable. 34 · Voting Rights . On each matter submitted to a vote of shareholders of each Fund, each shareholder is entitled to one vote for each whole share validly issued and outstanding, with a fractional vote for each fractional share, on matters presented at a shareholders’ meeting. Except as otherwise specifically provided in the Governing Instruments of the Funds, all matters shall be decided by a vote of the majority of the total number of shares entitled to vote. · Shareholder Meetings . HGI is not required to (nor does it) hold annual shareholder meetings; however, special meetings may be called by HGI’s Secretary: (i) for the purpose of considering the removal of a director from office upon written request of shareholders entitled to vote not less than 10% of all votes entitled to be cast at such meeting, and (ii) for any other purpose upon the written request of shareholders entitled to vote not less than 25% of all of the votes entitled to be cast at such meeting. · Shareholder Liability . Maryland law provides that shareholders of a Maryland corporation, such as HGI, are not generally subject to liability for the debts or obligations of the corporation. · Director and Officer Liability. HGI indemnifies each of its officers, directors, employees and agents who was or is threatened to be made a party to a proceeding by reason of being an officer, director, employee or agent of HGI, except that HGI does not provide indemnificati […] rements of the 1933 Act and state securities laws; (b) all issued and outstanding shares of the Target Fund are, and on the Closing Date will be, duly authorized and, when sold as contemplated in its prospectus and statement of additional information, validly issued, and, upon receipt by HGI of the consideration therefor, will be fully paid and non-assessable under Maryland law; and (c) will be held of record at the time of the Closing by the persons and in the amounts set forth in the records of ALPS, the Target Fund’s transfer agent, as provided in paragraph 3.4. The Target Fund does not have outstanding any options, warrants or other rights to subscribe for or purchase any of the Target Fund Shares, nor is there outstanding any security convertible into any of the Target Fund Shares. A- 7 4.15 On the Closing Date, the Target Fund will have good and marketable title to the Target Fund Assets to be transferred to the Acquiring Fund pursuant to paragraph 1.2 and full right, power and authority to sell, assign, transfer and deliver such Target Fund Assets hereunder, and upon delivery and payment for such Target Fund Assets, the Acquiring Fund will acquire good and marketable title thereto. 4.16 The execution, delivery and performance of this Agreement have been duly authorized by all necessary action on the part of the Board of Directors of HGI and, subject to the approval of the Target Fund Shareholders, this Agreement will constitute a valid and binding obligation of HGI, on behalf of the Target Fund, enforceable in accordance with its terms, subject as to enforcement, to bankruptcy, insolvency, fraudulent transfer, reorganization, moratorium and other laws relating to or affecting creditors’ rights and to general equity principles. 4.17 The current prospectus and statement of additional information of the Target Fund conform in all material respects to the applicable requirements of the 1933 Act and the 1940 Act and the rules and regulations of the Commission thereunder and do not include any untrue statement of a material fact or omit to state any material fact required to be stated therein or necessary to make the statements therein, in light of the circumstances under which they were made, not materially m […]  Fund. 4.19 No governmental consents, approvals, authorizations or filings are required under the 1933 Act, the 1934 Act, the 1940 Act or Maryland law for the execution of this Agreement by the Target Fund, except for the effectiveness of the N-14 Registration Statement, and the filing of any articles amendments, articles supplementary, certificates or other documents that may be required under Maryland law and the approval of the Target Fund Shareholders, and except for such other consents, approvals, authorizations and filings as have been made or received, and such consents, approvals, authorizations and filings as may be required subsequent to the Closing Date. A- 8 4.20 The Target Fund does not own any property that was received in a “conversion transaction” (as that term is defined in Treasury Regulation Section 1.337(d)-7(a)(2)) that is or will be subject to the rules of Section 1374 of the Code (without regard to any election pursuant to Treasury Regulation Section 1.337(d)-7(c)(5)) as a consequence of the application of Section 337(d)(1) of the Code and Treasury Regulations thereunder. 4.22 Except as otherwise disclosed in writing to the Acquiring Fund, the Target Fund (i) is in compliance in all material respects with the Code and applicable regulations promulgated under the Code pertaining to the reporting and designation of dividends (and the character thereof) and other distributions on and redemptions of its shares, and (ii) has withheld in respect of all dividends, other distributions and redemption proceeds, all material taxes required to be withheld and has paid such withheld amount to the proper taxing authority (except where such payments are not yet due), and is not liable for any material penalties with respect to such reporting and withholding requirements, and (iii) has collected and maintained all IRS Forms W-9 and/or Forms W-8, as applicable. 5. REPRESENTATIONS AND WARRANTIES OF THE ACQUIRING FUND Except as has been fully disclosed to the Target Fund in a written instrument executed by an officer of HGI, the Acquiring Fund represents and warrants to the Target Fund as follows: 5.1 The Acquiring Fund is a duly established series of HGI, which is a corporation duly organized, validly exis […] nto this Agreement or to consummate the transactions herein contemplated. 5.6 The Acquiring Fund Shares to be issued and delivered to the Target Fund for the account of the Target Fund Shareholders pursuant to the terms of this Agreement will, at the Closing Date, have been duly authorized and, when so issued and delivered, assuming effectiveness of the N-14 Registration Statement, will be duly and validly issued and outstanding Acquiring Fund Shares, and, upon receipt by HGI of the Target Fund Assets, will be fully paid and non-assessable under Maryland law. The Acquiring Fund does not have outstanding any options, warrants or other rights to subscribe for or purchase any of the Acquiring Fund Shares, nor is there outstanding any security convertible into any of the Acquiring Fund Shares. 5.7 The execution, delivery and performance of this Agreement have been duly authorized by all necessary action on the part of the Board of Directors of HGI and, subject to the approval of Target Fund Shareholders, this Agreement will constitute a valid and binding obligation of HGI, on behalf of the Acquiring Fund, enforceable in accordance with its terms, subject as to enforcement, to bankruptcy, insolvency, fraudulent transfer, reorganization, moratorium and other laws relating to or affecting creditors’ rights and to general equity principles. 5.8 The N-14 Registration Statement and the Proxy Statement to be included in the N-14 Registration Statement, other than as it relates to the Target Fund, on the effective date of the N-14 Registration Statement and on the Closing Date: (a) will comply in all material respects with the provisions and regulations of the 1933 Act, the 1934 Act and the 1940 Act, as applicable; and (b) will not contain any untrue statement of a material fact or omit to state a material fact required to be stated therein or necessary to make the statements therein, in light of the circumstances under which such statements are made, not materially misleading. 5.9 No governmental consents, approvals, authorizations or filings are required under the 1933 Act, the 1934 Act, the 1940 Act or Maryland law for the execution of this Agreement by HGI, for itself and on behalf of the Acquiring Fund, or the perform\n"

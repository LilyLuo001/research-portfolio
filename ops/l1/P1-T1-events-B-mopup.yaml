anization will be measured from the earlier of the time (i) you purchased your Target Fund shares or (ii) you purchased your shares of any other fund advised by BlackRock and subsequently exchanged them for shares of the Target Fund. Q: Do I need to take any action in connection with the Reorganization? A: No. Your shares will automatically be converted into shares of the Acquiring Fund on the date of the completion of the Reorganization. You will receive written confirmation that this change has taken place. No certificates for shares will be issued in connection with the Reorganization. The aggregate NAV of the Acquiring Fund Shares you receive in the Reorganization will be equal to the aggregate NAV of the shares you own in the Target Fund immediately prior to the Reorganization. Q: Will the Reorganization create a taxable event for me? A: The Reorganization is expected to qualify as a tax-free “reorganization” under Section 368(a) of the Internal Revenue Code of 1986, as amended (the “Code”). In general, if the Reorganization so qualifies, the Target Fund and the Acquiring Fund will not recognize any gain or loss for U.S. federal income tax purposes from the transactions contemplated by the Reorganization (except for any gain or loss that may be required to be recognized solely as a result of the close of the Target Fund’s taxable year due to the Reorganization or as a result of the transfer of certain assets). At any time before the Reorganization takes place, a shareholder may redeem shares of the Target Fund. Generally, such redemptions would be taxable transactions. The portfolio managers of the Acquiring Master Portfolio (who manage the Acquiring Fund’s assets indirectly) have reviewed the portfolio holdings of the Target Fund and, as of December 31, 2018, all the securities held by the Target Fund comply  […] der. • The Acquiring Fund is a “feeder fund” that invests all of its assets in the Acquiring Master Portfolio, which has an investment objective, strategies and policies substantially identical to those of the Acquiring Fund. All investments are made at the Acquiring Master Portfolio level. This structure is sometimes called a “master/feeder” structure. The Target Fund is not part of a master/feeder arrangement. 7 Table of Contents Other Strategies . The Target Fund and the Acquiring Fund employ similar other strategies in seeking to achieve their respective objectives, although there are certain differences. The similarities and differences of the other strategies of the Funds are described in the chart below. Target Fund Acquiring Fund • Convertible Securities — The Fund may invest in convertible securities. Convertible securities generally are debt securities or preferred stock that may be converted into common stock. Convertible securities typically pay current income as either interest (debt security convertibles) or dividends (preferred stock). A convertible security’s value usually reflects both the stream of current income payments and the market value of the underlying common stock. • Convertible Securities — The Fund may invest in convertible securities. Convertible securities generally are debt securities or preferred stock that may be converted into common stock. Convertible securities typically pay current income as either interest (debt security convertibles) or dividends (preferred stock). A convertible security’s value usually reflects both the stream of current income payments and the market value of the underlying common stock. • Equity Securities — The Fund can invest in all types of equity securities, including common stock, preferred stock, warrants and stock purchase rights of companies of any market capitalization. • Equity Securities — The Fund can invest in all types of equity securities, including common stock, preferred stock, warrants and stock purchase rights of companies of any market capitalization. • Illiquid/Restricted Securities — The Fund may invest up to 15% of its net assets in illiquid securities that it cannot sell within seven days at approximately current value. The Fund may also invest in restricted securities, which are securities that cannot be offered for public resale unless registered under the applicable securities laws or that have a contractual restriction that prohibits or limits their resale (i.e., Rule 144A securities). They may include private placement securities that have not been registered under the applicable securities laws. Restricted securities may not be listed on an exchange and may have no active trading market and therefore may be considered to be illiquid. Rule 144A securities are restricted securities that can be resold to qualified institutional buyers but not to the general public and may be considered to be liquid securities. • Illiquid Investments — The Fund may invest up to an aggregate amount of 15% of it […] n seven calendar days or less without the sale or disposition significantly changing the market value of the investment. • Restricted Securities — Restricted securities are securities that cannot be offered for public resale unless registered under the applicable securities laws or that have a contractual restriction that prohibits or limits their resale. They may include Rule 144A securities, which are privately placed securities that can be resold to qualified institutional buyers but not to the general public, and securities of U.S. and non-U.S. issuers that are offered pursuant to Regulation S under the Securities Act of 1933, as amended. • Investment Companies — The Fund has the ability to invest in other investment companies, such as exchange-traded funds, unit investment trusts, and open-end and closed-end funds. The Fund may invest in affiliated investment companies including affiliated money market funds and affiliated exchange-traded funds. • Investment Companies — The Fund has the ability to invest in other investment companies, such as exchange-traded funds, unit investment trusts, and open-end and closed-end funds. The Fund may invest in affiliated investment companies including affiliated money market funds and affiliated exchange-traded funds. • Repurchase Agreements — The Fund may enter into certain types of repurchase agreements. Under a repurchase agreement, the seller agrees to repurchase a security at a mutually agreed-upon time and price • Repurchase Agreements — The Fund may enter into certain types of repurchase agreements. Under a repurchase agreement, the seller agrees to repurchase a security at a mutually agreed-upon time and price. 8 Table of Contents Target Fund Acquiring Fund • Securities Lending — The Fund may lend securities with a value up to 33 1 / 3 % of its total assets to financial institutions that provide cash or securities issued or guaranteed by the U.S. Government as collateral. • Securities Lending — The Fund may lend securities with a value up to 33 1 / 3 % of its total assets to financial institutions that provide cash or securities issued or guaranteed by the U.S. Government as collateral. • Short-Term Securities or Instruments — The Fund can invest in high quality short-term U.S. dollar or non-U.S. dollar denominated fixed-income securities or other instruments, such as U.S. or foreign government securities, commercial paper and money market instruments issued by U.S. or foreign commercial banks or depository institutions. • Short-Term Securities or Instruments — The Fund can invest in high quality short-term U.S. dollar or non-U.S. dollar denominated fixed-income securities or other instruments, such as U.S. or foreign government securities, commercial paper a […] here is no CDSC on Investor C Shares after one year. 3 A contingent deferred sales charge (“CDSC”) of 0.75% is assessed on certain redemptions of Investor A Shares made within 18 months after purchase where no initial sales charge was paid at time of purchase as part of an investment of $1,000,000 or more 4 BlackRock has contractually agreed to waiv
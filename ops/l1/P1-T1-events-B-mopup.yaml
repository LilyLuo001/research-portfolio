ows of\n   the Target/Acquiring fund table, a 4-fund filing yields 4 objects}, ... ]}\n  or the no_event object above.\nEach event object:\n  fund_name        target mutual fund's full name (from excerpt)\n  family           fund family/trust (from excerpt)\n  mutual_fund_ticker / etf_ticker\n                   a single 2-6 char UPPERCASE symbol from the excerpt, else \"NA\".\n                   NEVER a fund name. Multiple class tickers → \"NA\" and list them in evidence.\n  announce_date    YYYY-MM-DD only. Board-approval date if stated; else the document's own\n                   date; else the filed date. Vague (\"May 2020\",\"Q4 2026\") → \"NA\".\n  date_basis       \"board\" | \"document\" | \"filed\" | \"NA\"\n  effective_date   YYYY-MM-DD only; the stated closing/completion date. Vague → \"NA\".\n  asset_class      equity_US / equity_intl / fixed_income / other — ONLY if locatable in the\n                   excerpt (bond/muni/high-yield/MBS→fixed_income; International/EM/Asia→\n                   equity_intl; explicit US equity→equity_US; managed-futures/multi-asset/\n                   long-short→other). Name alone insufficient → \"NA\".\n  AUM_at_conversion_USD  number from excerpt or \"NA\"\n  source_accession copy from the 文件 line\n  confidence       H = fund identity + (announce or effective) with explicit basis;\n                   M = identity clear, dates partly missing/document-dated;\n                   L = identity inferred from title only\n  evidence         ≤25-word quote fragment supporting the verdict (for events: the words\n                   showing the acquirer is an ETF; for no_event: the words showing why not)\nNEED_HUMAN only when TWO date statements INSIDE THIS ONE EXCERPT contradict for the same\nfund: {\"NEED_HUMAN\": true, \"quotes\": [\"...\", \"...\"]}. Different filings never contradict.\nNever fill any field from memory — excerpt-locatable or \"NA\".\n\nSELF-CHECK before emitting (do this, don't print it): every input item id appears exactly\nonce in your answer map (count them); every event object quotes ETF-acquirer evidence;\nevery date matches ^\\d{4}-\\d{2}-\\d{2}$ or is \"NA\"; no ticker field contains a space.】\n文件: 0000898432-22-000522 (form 497, filed 2022-08-16, AMERICAN BEACON FUNDS  (CIK 0000809593))\nsource_url: https://www.sec.gov/Archives/edgar/data/809593/000089843222000522/form497.htm\n节选:\n497 1 form497.htm AMERICAN BEACON FUNDS American Beacon Mid-Cap Value Fund 220 East Las Colinas Boulevard Suite 1200 Irving, Texas 75039 August 16, 2022 Your action is required. Please vote today. Dear Valued Shareholder: A Special Meeting of Shareholders (the “Special Meeting”) of the American Beacon Mid-Cap Value Fund (the “Target Fund”), a series of American Beacon Funds (the “Trust”), will be held at 2:00 p.m. Central Time on October 12, 2022, at the offices of American Beacon Advisors, Inc. (the “Manager”), located at 220 East Las Colinas Blvd., Suite 1200, Irving, Texas 75039. At the Special Meeting, shareholders of the Target Fund will be asked to approve a proposed Plan of Reorganization and Termination (the “Reorganization Plan”), which provides for the reorganization of the Target Fund into the American Beacon Shapiro SMID Cap Equity Fund (the “Acquiring Fund”), also a series of the Trust (the “Reorganization”), as further described below. The Target Fund and Acquiring Fund are each referred to herein as a “Fund” and together as the “Funds.” The Acquiring Fund and Target Fund have identical investment objectives and similar principal investment strategies. The Target Fund […] on Advisors, Inc. (“Manager”), the Board of Trustees (“Board”) of the American Beacon Funds (“Trust”) has approved a Plan of Reorganization and Termination (the “Reorganization Plan”), which provides for the reorganization (the “Reorganization”) of the American Beacon Mid-Cap Value Fund (the “Target Fund”) into the American Beacon Shapiro SMID Cap Equity Fund (the “Acquiring Fund”), each a series of the Trust. The Target Fund and Acquiring Fund are each referred to herein as a “Fund” and together as the “Funds.” You are receiving this document because, as of July 25, 2022, you were a shareholder of the Target Fund. Pursuant to the Reorganization Plan, upon the closing of the Reorganization, your shares of the Target Fund will automatically convert to shares of the Acquiring Fund with an aggregate value equal to the aggregate value of your Target Fund shares as of the close of business on the day the Reorganization is closed, which is currently scheduled to take place on or about October 28, 2022 (“Closing Date”). The Reorganization Plan requires approval by shareholders of the Target Fund, and if the Reorganization Plan is approved, the Reorganization is expected to close on or about the Closing Date, or such other date as the Board may determine. The accompanying document is a Proxy Statement for the Target Fund and Prospectus for the Acquiring Fund (“Proxy Statement”). The purposes of the Proxy Statement are to: (1) solicit votes from shareholders of the Target Fund to approve the Reorganization Plan, which is attached to the Proxy Statement as Appendix A, and (2) provide information to Target Fund shareholders regarding the various classes of shares of the Acquiring Fund. This Proxy Statement contains information the shareholders of the Target Fund should know prior to the Reorganization. You should retain this document for future reference. Q. What is the purpose of the Reorganization? A. The Manager has proposed reorganizing the Target Fund into the Acquiring Fund because the Reorganization will consolidate funds of the Trust that are similar investment products and could increase the Trust’s operational efficiency. The Board of the Trust has determined that the Reorganization is in the best interests of t […] nvestment objective by implementing an intensive fundamental research process to select a focused portfolio of approximately 20‑35 stocks, the sub-advisors of the Target Fund do not seek to select a focused portfolio of investments. While the Acquiring Fund invests primarily in common stocks, the Target Fund’s investments may include common stocks, real estate investment trusts, master limited partnerships, American depositary receipts and U.S. dollar-denominated foreign stocks traded on U.S. exchanges. Additionally, the Target Fund may purchase and sell equity index futures contracts to gain market exposure on cash balances or reduce market exposure in anticipation of liquidity needs, whereas the Acquiring Fund may invest cash balances in exchange-traded funds (“ETFs”). Both Funds invest in issuers considered “value” stocks, although they may utilize different definitions and criteria for determining whether an issuer is a value stock, and the Target Fund may have significant exposure to the Financials sector, whereas the Acquiring Fund does not invest a significant portion of its assets in any particular sector. 7 Additionally, the Target Fund’s sub-advisors’ investment processes incorporate environmental, social, and/or governance (“ESG”) analysis as a consideration in the assessment of potential portfolio investments, whereas the Acquiring Fund’s sub-advisor does not. The differences in the Funds’ investment strategies may result in slightly different principal risks for the Funds, with the Acquiring Fund having exposure to the risks associated with a focused portfolio, micro- and large-capitalization companies, liquidity of investments and ETFs, and the Target Fund having exposure to the risks associated with multiple sub-advisors, ESG considerations, and investments in dividend producing securities, depositary receipts, U.S. dollar-denominated foreign stocks traded on U.S. exchanges, master limited partnerships, real estate investment trusts, futures contracts and the Financials sector. Please refer to the Proxy Statement for additional explanation regarding these differences. Q. Will the service providers to the Target Fund change following the Reorganization? A. The Manager is each Fund’s investment man […] s shareholders by the Closing Date of all undistributed net income and net capital gains, including net capital gains realized by the Target Fund in connection with certain changes made to align its portfolio with that of the Acquiring Fund prior to the Reorganization. It is also expected that the Acquiring Fund will distribute its recognized gains to its shareholders prior to the Reorganization so that the Target Fund’s shareholders will not receive distributions of such gains after the Reorganization. Please see the Proxy Statement for more information. Q. Will I need to open an account in the Acquiring Fund prior to the Reorganization? A. No. An account will be set up in your name and your shares of the Target Fund automatically will be converted to the corresponding class of shares of the Acquiring Fund. You will receive confirmation of this transaction following the Reorganization. Q. What if I already own shares of the Acquiring Fund? A. If you already own shares of both the Target Fund and the Acquiring Fund, the Acquiring Fund shares you receive in the Reorganization will be added to your existing account so long as your account in each Fund has the same account number. Q. Can I still purchase and redeem shares of the Target Fund until the Reorganization? A. You may continue to purchase shares of the Target Fund only through October 24, 2022. Effective October 25, 2022, the Target Fund will no longer accept purchases or exchanges of shares. You may continue to redeem shares of the Target Fund until the day prior to the Closing Date of the Reorganization. Redemption requests received by the transfer agent on or after the Closing Date will be treated as requests received for the redemption of shares of the Acquiring Fund received by the shareholder in connection with the Reorganization. Q. What if I want to exchange my shares into another fund in the American Beacon Funds prior to the Reorganization? A. You may exchange your shares into another fund in the American Beacon Funds before the Closing Date of the Reorganization in accordance with your existing exchange privileges. If you choose to exchange your shares of the Target Fund for another fund in the American Beacon Funds, including the Acquiring Fun […] U.S. dollar-denominated foreign stocks traded on U.S. 2 exchanges, whereas the Acquiring Fund invests primarily in common stocks. Both Funds invest in issuers considered “value” stocks, although they may utilize different definitions and criteria for determining whether an issuer is a value stock. The Target Fund may have significant exposure to the Financials sector, whereas the Acquiring Fund does not invest a significant portion of its assets in any particular sector. The Target Fund may purchase and sell equity index futures contracts to gain market exposure on cash balances or reduce market exposure in anticipation of liquidity needs, which the Acquiring Fund does not utilize. Conversely, the Acquiring Fund may invest cash balances in exchange-traded funds, which the Target Fund does not. ● The Target Fund sub-advisors’ investment processes incorporate the sub-advisors’ environmental, social, and/or governance (“ESG”) analysis as a consideration in the assessment of all potential portfolio investments, whereas the Acquiring Fund sub-advisor’s investment process does not incorporate such analysis. ● The principal risks associated with investments in the Target Fund and the Acquiring Fund are described in the table below. The differences in the Funds’ investment strategies may result in slightly different principal risks for the Funds, with the Acquiring Fund having exposure to the risks associated with a focused portfolio, micro- and large-capitalization companies, liquidity of investments and ETFs, and the Target Fund having exposure to the risks associated with multiple sub-advisors, ESG considerations, and investments in dividend producing securities, depositary receipts, U.S. dollar-denominated foreign stocks traded on U.S. exchanges, master limited partnerships, real estate investment trusts, futures contracts and the Financials sector. ● The fundamental and non-fundamental investment restrictions for the Funds are substantially identical. Although the limitation is materially the same, the Funds have a slightly different fundamental investment restriction on concentration. Investment Adviser, Sub-Advisor and Other Service Providers ● The Manager is each Fund’s investment manager and administrator. Bar\n"

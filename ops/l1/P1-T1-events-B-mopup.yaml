s the types of securities in which a fund invests or may invest principally: Equity securities represent an ownership interest, or the right to acquire an ownership interest, in an issuer. Equity securities include common stocks (including depositary receipts evidencing ownership of common stock), preferred stocks and other preferred securities, convertible securities, rights and warrants, and other securities, such as hybrid securities and trust preferred securities, believed to have equity-like characteristics. Sustainable Investing Exclusions As part of its investment approach, a fund also applies broad criteria (\"exclusion criteria\") that seek to exclude issuers that are directly engaged in, and/or derive significant revenue from, certain industries or product lines. At present, these include: civilian semi-automatic firearms; tobacco production, or bonds issued against the proceeds of tobacco settlements; for-profit prisons; controversial weapons (e.g., cluster munitions, land mines, biological/chemical weapons, blinding lasers, and incendiary weapons); and thermal coal production and/or mining. In determining whether an issuer is directly engaged in, and/or derives significant revenue from a particular industry or product line, a fund may use revenue thresholds (e.g., issuers that derive more than 5% of revenue from thermal coal production and/or mining) and/or categorical exclusions (e.g., issuers that derive any revenue from the operation of private prisons), depending on the industry or product line. The exclusion criteria are based in whole or in part on data provided by one or more third-party vendor(s) and are, therefore, subject to each vendor's industry and product line definitions (which may vary from those of the Adviser) and data limitations. The Adviser, in its sole discretion, retains the right not […] ons from net investment income (.22) - Total distributions (.22) - Net asset value, end of period $ 11.63 $ 9.62 Total Return D,E 23.47 % (3.80)%
ows of\n   the Target/Acquiring fund table, a 4-fund filing yields 4 objects}, ... ]}\n  or the no_event object above.\nEach event object:\n  fund_name        target mutual fund's full name (from excerpt)\n  family           fund family/trust (from excerpt)\n  mutual_fund_ticker / etf_ticker\n                   a single 2-6 char UPPERCASE symbol from the excerpt, else \"NA\".\n                   NEVER a fund name. Multiple class tickers → \"NA\" and list them in evidence.\n  announce_date    YYYY-MM-DD only. Board-approval date if stated; else the document's own\n                   date; else the filed date. Vague (\"May 2020\",\"Q4 2026\") → \"NA\".\n  date_basis       \"board\" | \"document\" | \"filed\" | \"NA\"\n  effective_date   YYYY-MM-DD only; the stated closing/completion date. Vague → \"NA\".\n  asset_class      equity_US / equity_intl / fixed_income / other — ONLY if locatable in the\n                   excerpt (bond/muni/high-yield/MBS→fixed_income; International/EM/Asia→\n                   equity_intl; explicit US equity→equity_US; managed-futures/multi-asset/\n                   long-short→other). Name alone insufficient → \"NA\".\n  AUM_at_conversion_USD  number from excerpt or \"NA\"\n  source_accession copy from the 文件 line\n  confidence       H = fund identity + (announce or effective) with explicit basis;\n                   M = identity clear, dates partly missing/document-dated;\n                   L = identity inferred from title only\n  evidence         ≤25-word quote fragment supporting the verdict (for events: the words\n                   showing the acquirer is an ETF; for no_event: the words showing why not)\nNEED_HUMAN only when TWO date statements INSIDE THIS ONE EXCERPT contradict for the same\nfund: {\"NEED_HUMAN\": true, \"quotes\": [\"...\", \"...\"]}. Different filings never contradict.\nNever fill any field from memory — excerpt-locatable or \"NA\".\n\nSELF-CHECK before emitting (do this, don't print it): every input item id appears exactly\nonce in your answer map (count them); every event object quotes ETF-acquirer evidence;\nevery date matches ^\\d{4}-\\d{2}-\\d{2}$ or is \"NA\"; no ticker field contains a space.】\n文件: 0001580642-22-005548 (form N-14/A, filed 2022-11-03, VALUED ADVISERS TRUST  (CIK 0001437249))\nsource_url: https://www.sec.gov/Archives/edgar/data/1437249/000158064222005548/marathon_n14a.htm\n节选:\nN-14/A 1 marathon_n14a.htm N-14/A As filed with the Securities and Exchange Commission on November 3, 2022 Securities Act File No. 333-267037 United States SECURITIES AND EXCHANGE COMMISSION Washington, D.C. 20549. FORM N-14 REGISTRATION STATEMENT UNDER THE SECURITIES ACT OF 1933 Pre-Effective Amendment No. 2 ý Post-Effective Amendment No. o Valued Advisers Trust (Exact Name of Registrant as Specified in Charter) 225 Pictoria Drive, Suite 450 Cincinnati, Ohio 45246 (Address of Registrant’s Principal Executive Offices) (513) 587-3400 (Registrant’s Telephone Number, including Area Code) Capitol Services, Inc. 108 Lakeland Ave. Dover, DE 19901 (Name and Address of Agent for Service) With copies to: John M. Ford Troutman Pepper Hamilton Sanders LLP 3000 Two Logan Square Philadelphia, PA 19103 Title of Securities Being Registered: Shares of a series of the Registrant – Kovitz Core Equity ETF. No filing fee is required because the Registrant is relying on Section 24(f) of the Investment Company Act of 1940, as amended, pursuant to which it has previously registered an indefinite number of shares. Approximate date of proposed public offering : As soon as practicable after this Registratio […] es by touch-tone telephone. Simply call the toll-free number on your proxy card, enter the control number found on the card, and follow the recorded instructions. You may also vote your shares by Internet. Simply go to the website indicated on your proxy card, enter the control number found on the front of your proxy card, and follow the instructions to cast your vote. You may receive a call from our proxy solicitor, AST Fund Solutions, reminding you to vote. If you have any questions before you vote, please call our proxy solicitor at (800) 591-6313. Thank you for your participation in this important initiative. Sincerely, \\ Marathon Value Portfolio Eric Kane, President 1 QUESTIONS AND ANSWERS This section contains a brief overview of the conversion of the Marathon Value Portfolio (the “Target Fund”), a series of Northern Lights Fund Trust III to an exchange traded fund (“ETF”) through the reorganization of the Target Fund into Kovitz Core Equity ETF (the “Acquiring Fund”), a newly formed series of Valued Advisers Trust managed by Kovitz Investment Group Partners, LLC (the “Adviser”). We encourage you to read the complete Combined Proxy Statement/Prospectus to obtain more detailed information. Q. What is happening to the Marathon Value Portfolio? Why am I receiving a Combined Proxy Statement/Prospectus? A. You are receiving the Combined Proxy Statement/Prospectus as a holder of common shares of the Target Fund in connection with the solicitation of proxies by the Board of Trustees of the Target Fund (the “Board”) for use at the special meeting of shareholders of the Target Fund (the “Meeting”). At the Meeting, common shareholders of the Target Fund will be asked to vote on an Agreement and Plan of Reorganization (the “Plan”) under which the Target Fund will transfer substantially all of its assets and all its liabilities to the Acquiring Fund in exchange for newly issued common shares of the Acquiring Fund (the “Reorganization”). The Target Fund is currently operated as a mutual fund and will be converted into an ETF through the Reorganization. As an ETF, the Acquiring Fund’s shares will be traded on NYSE Arca, Inc. Your shares of the Target Fund will be exchanged for shares of equivalent aggregate net asset value (“NAV”) of the Acquiring Fund, with cash being received in lieu of fractional shares. Shares of the Acquiring Fund will be transferred to each shareholder’s brokerage account, or if a shareholder does not have a brokerage account, the shares will be held by a stock transfer agent, on behalf of such shareholder, until a brokerage account is identified or, if the Acquiring Fund shares are not transferred into a brokerage account within one year from the date of the Reorganization, the account is converted to cash (subject to applicable federal or state laws concerning unclaimed property). Any Acquiring Fund shares held by the stock transfer agent on behalf of a shareholder will be treated as being held by such shareholder for all U.S. federal income tax purposes. If a shareholder holds shares through a fund direct individual retirement account (“IRA”) and does not take action to transfer its Target Fund shares to a brokerage account prior to the Reorganization, the shareholder’s Target Fund shares will be liquidated at the effective time of the Reorganization and the shareholder will receive cash equal in value to the NAV of the shareholder’s Target Fund shares. Such liquidation will result in a taxable distribution from the IRA to the IRA account holder (unless the distribution is a qualified distribution from a Roth IRA or qualifies as an eligible rollover distribution) and in a loss of the tax-advantaged treatment of the account. In some cases, the IRA distribution may also be subject to a 10% early distribution tax. Shareholders who hold Target Fund shares through a fund direct IRA are urged to consult their own tax advisors as to the specific consequences to them of the Reorganization. The IMPORTANT NOTICE ABOUT YOUR TARGET FUND ACCOUNT—QUESTIONS AND ANSWERS, beginning on page i, provides important information about required action for shareholders who hold shares of the converting mutual fund in accounts that cannot hold ETF shares and should be read carefully. The Board unanimously recommends that you vote FOR the Reorganization. Q. Is my vote important? A. Yes. While the Board has approved the Reorganization with respect to the Target Fund and recommends that you approve it, the Reorganization cannot go forward without the approval of the shareholders of the Target Fund. The Target Fund will continue to contact shareholders asking them to vote until it is sure that a quorum will be reached, and may continue to contact shareholders thereafter. Q. Why has the Board approved the Reorganization? A. The Reorganization has been recommended by the Adviser and has been carefully reviewed and approved by the Board. Based on its review, the Board believes that the Reorganization will result in multiple benefits for investors, including, among others: · Improved tax efficiency due to the mechanics of the creation and redemption process for ETFs, which generally allows an ETF to minimize the realization of capital gains through the in-kind acquisition and redemption of securities; · The management fee of the Acquiring Fund that will apply to the Target Fund following the Reorganization is the same as the Target Fund’s current management fee; and · Additional trading flexibility due to the listing of Acquiring Fund shares on an exchange, which would enable investors to purchase or sell shares of the Fund throughout the trading day based on market price […] roxy Statement/Prospectus. Q. How will the Reorganization affect me as a shareholder? A. If the Reorganization is consummated, you will cease to be a shareholder of the Target Fund and will become a shareholder of the Acquiring Fund. Upon completion of the Reorganization, you will own shares of the Acquiring Fund having an aggregate NAV equal to the aggregate NAV of the shares of the Target Fund you owned immediately prior to the Reorganization, with cash being received in lieu of fractional shares. Shares of the Acquiring Fund will be transferred to your brokerage account, or, if you do not have a brokerage account, the shares will be held by a stock transfer agent, on your behalf, until a brokerage account is identified or the account is converted to cash (subject to applicable federal or state laws concerning unclaimed property). If you hold shares through a fund direct IRA and do not take action to transfer your Target Fund shares to a brokerage account prior to the Reorganization, your Target Fund shares will be liquidated at the effective time of the Reorganization and you will receive cash equal in value to the NAV of your Target Fund shares. Such liquidation will result in a taxable distribution from the IRA to the IRA account holder (unless the distribution is a qualified distribution from a Roth IRA or qualifies as an eligible rollover distribution) and in a loss of the tax-advantaged treatment of the account. In some cases, the IRA distribution may also be subject to a 10% early distribution tax. Shareholders who hold Target Fund shares through a fund direct IRA are urged to consult their own tax advisors as to the specific consequences to them of the Reorganization. Shares of the Acquiring Fund are not issued in fractional shares. As a result, shareholders will receive cash in lieu of fractional shares of the Acquiring Fund, resulting in a cash payment that may be taxable to you for U.S. federal income tax purposes. After the Reorganization, individual shares of the Acquiring Fund may only be purchased and sold on NYSE Arca, Inc., other national securities exchanges, electronic crossing networks and other alternative trading systems. Should you decide to purchase or sell shares in the Acquiring Fund […] e information about changing your type of account if necessary. If shares are held in an account that cannot accept ETF shares at the time of the Reorganization of the Target Fund, Acquiring Fund shares received in the Reorganization will be held by a stock transfer agent, American Stock Transfer (“AST”), on behalf of the accountholder, until a brokerage account is identified into which AST can transfer the shares. Any Acquiring Fund shares held by the stock transfer agent on behalf of a shareholder will be treated as being held by such shareholder for all U.S. federal income tax purposes. If Acquiring Fund shares are not transferred into a brokerage account within a year of the date of the Reorganization, the Acquiring Fund shares will be converted to cash and the cash proceeds sent to the accountholder of record (subject to applicable federal or state laws concerning unclaimed property). The conversion of Acquiring Fund shares to cash may be subject to fees and expenses and will be a taxable event for U.S. federal income tax purposes. If a shareholder holds shares through a fund direct IRA and does not take action to transfer its Target Fund shares to a brokerage account prior to the Reorganization, the shareholder’s Target Fund shares will be liquidated at the effective time of the Reorganization and the shareholder will receive cash equal in value to the NAV of the shareholder’s Target Fund shares. Such liquidation will result in a taxable distribution from the IRA to the IRA account holder (unless the distribution is a qualified distribution from a Roth IRA or qualifies as an eligible rollover distribution) and in a loss of the tax-advantaged treatment of the account. In some cases, the IRA distribution may also be subject to a 10% early distribution tax. Shareholders who hold Target Fund shares through a fund direct IRA are urged to consult their own tax advisors as to the specific consequences to them of the Reorganization. Q. How can I vote? A. You can vote in one of four ways: · By telephone (call the toll-free number listed on your proxy card) · By Internet (log on to the website listed on your proxy card) · By mail (using the enclosed postage pre-paid envelope) · In person at the shareholder meeting \n"

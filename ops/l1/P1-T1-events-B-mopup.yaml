ars exactly\nonce in your answer map (count them); every event object quotes ETF-acquirer evidence;\nevery date matches ^\\d{4}-\\d{2}-\\d{2}$ or is \"NA\"; no ticker field contains a space.】\n文件: 0001193125-23-023867 (form N-14, filed 2023-02-03, WANGER ADVISORS TRUST  (CIK 0000929521))\nsource_url: https://www.sec.gov/Archives/edgar/data/929521/000119312523023867/d413905dn14.htm\n节选:\nN-14 1 d413905dn14.htm WANGER ADVISORS TRUST WANGER ADVISORS TRUST Table of Contents As filed with the Securities and Exchange Commission on February 3, 2023 Securities Act File No. [ ] UNITED STATES SECURITIES AND EXCHANGE COMMISSION Washington, DC 20549 FORM N-14 REGISTRATION STATEMENT UNDER THE SECURITIES ACT OF 1933 ☒ Pre-Effective Amendment No. ☐ Post-Effective Amendment No. ☐ WANGER ADVISORS TRUST (Exact Name of Registrant as Specified in Charter) 71 S. Wacker, Suite 2500 Chicago, Illinois 60606 Telephone number: 312.634.9200 Ryan C. Larrenaga, Esq. c/o Columbia Management Investment Advisers, LLC 290 Congress Street Boston, Massachusetts 02210 Stephen Kusmierczak Daniel J. Beckman Columbia Acorn Trust 71 S. Wacker, Suite 2500 Chicago, Illinois 60606 Mary C. Moynihan Perkins Coie LLP 700 13th Street, N.W., Suite 800 Washington, D.C. 20005 (Name and Address of Agents for Service) TITLE OF SECURITIES BEING REGISTERED: Shares of Wanger Acorn, a series of the Registrant. Approximate Date of Proposed Public Offering: As soon as practicable after the effective date of this Registration Statement. No filing fee is required because an indefinite number of shares have previously been  […]  information that you should review and keep for future reference, it is not a solicitation of a proxy from you. Q: What is a fund reorganization? A fund reorganization involves one fund transferring all of its assets and liabilities to another fund in exchange for shares of such fund. Once completed, shareholders of the fund being reorganized will hold shares of the acquiring fund. Q: Do I need to take any action in connection with the Reorganization? No. In accordance with the Fund’s Agreement and Declaration of Trust and applicable state and U.S. federal law (including Rule 17a-8 under the Investment Company Act of 1940), the Reorganization may be effected without the approval of shareholders of a Fund. Your shares will automatically be converted into shares of the Acquiring Fund on the date of the completion of the Reorganization of the Fund. You will receive written confirmation that this change has taken place. No certificates for shares will be issued in connection with the Reorganization. The aggregate net asset value (the “NAV”) of the Acquiring Fund shares you receive in the Reorganization will be equal to the aggregate NAV of the shares you own in the Target Fund immediately prior to the Reorganization. If you sell your shares or are otherwise no longer a shareholder of the Target Fund as of the closing, this transaction will not impact you. Q: Which fund is being reorganized? The Information Statement/Prospectus provides information about the Reorganization of the Target Fund into the Acquiring Fund, as noted in the table below: Target Fund Acquiring Fund Wanger Select g Wanger Acorn Table of Contents Q: Why did the Investment Managers propose the Reorganization? The Investment Managers proposed the Reorganization as anticipated in connection with the changes made effective May 1, 2022, to align the Target Fund’s principal investment strategies, portfolio management and advisory fees with those of the Acquiring Fund. This included a significant increase in the normal number of portfolio holdings of the Target Fund, as the Target Fund discontinued its prior practice of investing in a limited number of companies (generally 20-40). Further, the Reorganization of the Target Fund into the Acquiring Fund  […]  Reorganization: Target Fund Acquiring Fund Wanger Select g Wanger Acorn The Investment Managers proposed the Reorganization as anticipated in connection with the changes made effective May 1, 2022, to align the principal investment strategies, primary performance benchmarks, portfolio management and advisory fees of Columbia Wanger’s domestic mutual fund strategies, as approved by the Board (the “Domestic Repositioning”). The Reorganization of the Target Fund into the Acquiring Fund will enable shareholders of the Target Fund to invest in a larger, potentially more efficient portfolio while continuing to pursue the same investment objective. NO ACTION ON YOUR PART IS REQUIRED TO EFFECT THE REORGANIZATION. Your shares will automatically be converted into shares of the Acquiring Fund on the date of the completion of the Reorganization for the Target Fund. We are not asking you for a proxy and you are requested not to send us a proxy. Please carefully read the enclosed Information Statement/Prospectus, as it discusses the Reorganization in more detail. Information about your ability to transfer your investment is included in the section of the Information Statement/Prospectus entitled “Section A—Information About the Reorganization—Summary—How the Reorganization Will Work.” If you transfer your investment or sell your shares of the Target Fund as of the closing date, this transaction will not impact you. If you have questions, please call Computershare Fund Services, toll free at (866) 963-6125. Sincerely, Stephen Kusmierczak, Co-President, Wanger Advisors Trust Daniel J. Beckman, Co-President, Wanger Advisors Trust Table of Contents Wanger Advisors Trust Wanger Select (the “Target Fund”) INFORMATION STATEMENT/PROSPECTUS Dated February 10, 2023 This document is an information statement for the Target Fund and a prospectus for the Acquiring Fund (as defined below). The mailing address and telephone number of the Target Fund and the Acquiring Fund (each, a “Fund” and collectively, the “Funds”) is c/o Columbia Management Investment Services Corp., P.O. Box 219104, Kansas City MO 64121-9104 and 800-345-6611. The principal offices of the Funds are located at 71 S. Wacker, Suite 2500 Chicago, Illinois 60606. This Infor […] f participating insurance companies as underlying investments for variable annuity contracts and/or variable life insurance policies (collectively, Contracts), as well as to qualified retirement or other plans (collectively, Qualified Plans) and other qualified institutional investors authorized by the Distributor. Shares of the Fund may not be purchased or sold directly by individual Contract Owners or Qualified Plan participants. If you are the owner of a Contract or a participant in a Qualified Plan, please refer to the prospectus that describes your Contract or Qualified Plan for information about minimum investment requirements and how to purchase and redeem shares of the Fund. Financial Intermediary Compensation No investment limits, conversion features, sales charges, or Rule 12b-1 distribution and/or service fees apply to the Funds’ shares. -32- Table of Contents The term “financial intermediary” refers to the insurance company that issued your Contract or your Qualified Plan sponsor. Financial intermediaries also include broker-dealers and financial advisors as well as firms that employ broker-dealers and financial advisors, including, for example, brokerage firms, banks, investment advisers, third party administrators and other firms in the financial services industry, including Ameriprise Financial and its affiliates. The Distributor, the Investment Manager and their affiliates make payments, from their own resources, to financial intermediaries, primarily to affiliated and unaffiliated insurance companies, for marketing/sales support services relating to the Fund (Marketing Support Payments). Such payments are generally based upon one or more of the following factors: average net assets of the Columbia Funds sold by the Distributor attributable to that financial intermediary; gross sales of the Columbia Funds distributed by the Distributor attributable to that financial intermediary; or a negotiated lump sum payment. While the financial arrangements may vary for each financial intermediary, the Marketing Support Payments to any one financial intermediary are generally between 0.05% and 0.40% on an annual basis for payments based on average net assets of the Fund attributable to the financial interme […] ease see About Fund Investments – Fundamental and Non-Fundamental Investment Policies in the SAI for more information about borrowing. In addition, the Fund reserves the right to honor redemption orders in whole or in part with in-kind distributions of Fund portfolio securities instead of cash if the Investment Manager, in its sole discretion, determines it to be in the best interest of the remaining shareholders. Such in-kind distributions typically represent a pro-rata portion of Fund portfolio assets subject to adjustments (e.g., for non-transferable securities, round lots and derivatives, if any). In the event the Fund distributes portfolio securities in kind, shareholders may incur brokerage and other transaction costs associated with converting the portfolio securities into cash. Also, the portfolio securities may increase or decrease in value after they are distributed but before they are converted into cash. For U.S. federal income tax purposes, redemptions paid in securities are generally treated the same as redemptions paid in cash. The Trust has elected to be governed by Rule 18f-1 under the 1940 Act, which means that for each redeeming shareholder, the first $250,000, or 1% of the Fund’s net asset value, whichever is less, will be paid in cash or cash equivalents and the remainder may be paid in kind. Although shares of the Fund may not be purchased or sold by individual owners of Contracts or Qualified Plans, this policy applies indirectly to Contract and Qualified Plan owners. Potential Conflicts of Interest – Mixed and Shared Funding Plans and other qualified institutional investors authorized by the Distributor. Due to differences in tax treatment and other considerations, the interests of various Contract owners, and the interests of Qualified Plan -37- Table of Contents participants, if any, may conflict. The Fund does not foresee any disadvantages to investors arising from these potential conflicts of interest at this time. Nevertheless, the Board of the Fund intends to monitor events to identify any material irreconcilable conflicts which may arise, and to determine what action, if any, should be taken in response to any conflicts. If such a conflict were to arise, one or more separate accou\n"

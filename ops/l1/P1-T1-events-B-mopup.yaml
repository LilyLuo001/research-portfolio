h the requirements of the Commission, the table above shows the Fund’s management fee as a percentage of average net assets attributable to common shareholders. By showing the management fee as a percentage of net assets, the management fee is not expressed as a percentage of all of the assets the Fund intends to invest. For purposes of the table, the management fee has been converted to 1.23% of the Fund’s average weekly net assets as of January 31, 2019 by dividing the total dollar amount of the management fee by the Fund’s average weekly net assets (managed assets less outstanding leverage). (5) Reflects interest expense paid on $24.1 million in average borrowings under the Fund’s Amended and Restated Liquidity Agreement with State Street Bank and Trust Company, plus $260.2 million in additional average structural leverage related to certain securities lending programs, as described in the accompanying prospectus under “Leverage.” (6) Reflects estimated dividend expense on $100 million aggregate liquidation preference of mandatory redeemable preferred shares (“MRP Shares” or “MRPS”) outstanding. See “Prospectus Summary — Use of Leverage by the Fund” and “Leverage” in the accompanying prospectus for additional information. (7) “Other Expenses” are based on estimated amounts for the Fund’s current fiscal year. (8) The example includes sales load and estimated offering costs. The purpose of the table and the example above is to help investors understand the fees and expenses that they, as common shareholders, would bear directly or indirectly. For additional information with respect to our expenses, see “Management of the Fund” on page 49 of the accompanying prospectus. MARKET AND NET ASSET VALUE INFORMATION Our common shares are listed on the Nasdaq Global Select Market (“Nasdaq”) under the symbol “CHI.” Our common shares commenced trading on th […] ontract or other document are not necessarily complete and in each instance reference is made to the copy of the contract or other document filed as an exhibit to the registration statement, each such statement being qualified in all respects by this reference. Additional information about us can be found in our registration statement (including amendments, exhibits, and schedules) on Form N-2 filed with the Commission. The Commission maintains a web site (http://www.sec.gov) that contains our registration statement, other documents incorporated by reference, and other information we have filed electronically with the Commission, including proxy statements and reports filed under the Exchange Act. SUP-8 Base Prospectus $100,000,000 Calamos Convertible Opportunities and Income Fund Common Shares Preferred Shares Debt Securities Calamos Convertible Opportunities and Income Fund (the “Fund,” “we,” “us,” or “our”) is a diversified, closed-end management investment company that commenced investment operations in June 2002. Our investment objective is to provide total return through a combination of capital appreciation and current income. We may offer, on an immediate, continuous or delayed basis, up to $100,000,000 aggregate initial offering price of our common shares (no par value per share), preferred shares (no par value per share) or debt securities, which we refer to in this prospectus collectively as our securities, in one or more offerings. We may offer our common shares, preferred shares and debt securities separately or together, in amounts, at prices and on terms set forth in a prospectus supplement to this prospectus. You should read this prospectus and the related prospectus supplement carefully before you decide to invest in any of our securities. We may offer our securities directly to one or more purchasers, through agents that we or they designate from time to time, or to or through underwriters or dealers. The prospectus supplement relating to the particular offering will identify any agents or underwriters involved in the sale of our securities, and will set forth any applicable purchase price, fee, commission or discount arrangement between us and such agents or underwriters or among the underwriters and the basis upon which such amount may be calculated. For more information about the manne […] or elects otherwise, all dividends and capital gain distributions on common shares are automatically reinvested in additional common shares of the Fund. However, an investor can choose to receive dividends and distributions in cash. Since investors can participate in the automatic dividend reinvestment plan only if their broker or nominee participates in our plan, you should contact your broker or nominee to confirm that you are eligible to participate in the plan. See “Dividends and Distributions on Common Shares; Automatic Dividend Reinvestment Plan — Automatic Dividend Reinvestment Plan.” Investment Policies Primary Investments. Under normal circumstances, the Fund invests at least 80% of its managed assets in a diversified portfolio of convertible securities and non-convertible income securities. The portion of the Fund’s assets invested in convertible securities and non-convertible income securities will vary from time to time consistent with the Fund’s investment objective, changes in equity prices and changes in interest rates and other economic and market factors, although, under normal circumstances, the Fund will invest at least 35% of its managed assets in convertible securities. The Fund invests in securities with a broad range of maturities. The average term to maturity of the Fund’s securities typically will range from five to ten years. See “Investment Objective and Principal Investment Strategies — Principal Investment Strategies.” Convertible Securities. The Fund is not limited in the percentage of its assets invested in convertible securities and investment in convertible securities forms an important part of the Fund’s investment strategies. 3 Under normal circumstances, the Fund will invest at least 35% of its managed assets in convertible securities. A convertible security is a debt security, debenture, note or preferred stock that may be converted into an equity security (typically of the same issuer) at a predetermined price (the “conversion price”). Depending upon the relationship of the conversion price to the market value of the underlying security, a convertible security may trade more like an equity security than a debt instrument. The Fund may invest in convertible securities of any\n"

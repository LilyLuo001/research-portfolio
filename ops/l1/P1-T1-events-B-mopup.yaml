ows of\n   the Target/Acquiring fund table, a 4-fund filing yields 4 objects}, ... ]}\n  or the no_event object above.\nEach event object:\n  fund_name        target mutual fund's full name (from excerpt)\n  family           fund family/trust (from excerpt)\n  mutual_fund_ticker / etf_ticker\n                   a single 2-6 char UPPERCASE symbol from the excerpt, else \"NA\".\n                   NEVER a fund name. Multiple class tickers → \"NA\" and list them in evidence.\n  announce_date    YYYY-MM-DD only. Board-approval date if stated; else the document's own\n                   date; else the filed date. Vague (\"May 2020\",\"Q4 2026\") → \"NA\".\n  date_basis       \"board\" | \"document\" | \"filed\" | \"NA\"\n  effective_date   YYYY-MM-DD only; the stated closing/completion date. Vague → \"NA\".\n  asset_class      equity_US / equity_intl / fixed_income / other — ONLY if locatable in the\n                   excerpt (bond/muni/high-yield/MBS→fixed_income; International/EM/Asia→\n                   equity_intl; explicit US equity→equity_US; managed-futures/multi-asset/\n                   long-short→other). Name alone insufficient → \"NA\".\n  AUM_at_conversion_USD  number from excerpt or \"NA\"\n  source_accession copy from the 文件 line\n  confidence       H = fund identity + (announce or effective) with explicit basis;\n                   M = identity clear, dates partly missing/document-dated;\n                   L = identity inferred from title only\n  evidence         ≤25-word quote fragment supporting the verdict (for events: the words\n                   showing the acquirer is an ETF; for no_event: the words showing why not)\nNEED_HUMAN only when TWO date statements INSIDE THIS ONE EXCERPT contradict for the same\nfund: {\"NEED_HUMAN\": true, \"quotes\": [\"...\", \"...\"]}. Different filings never contradict.\nNever fill any field from memory — excerpt-locatable or \"NA\".\n\nSELF-CHECK before emitting (do this, don't print it): every input item id appears exactly\nonce in your answer map (count them); every event object quotes ETF-acquirer evidence;\nevery date matches ^\\d{4}-\\d{2}-\\d{2}$ or is \"NA\"; no ticker field contains a space.】\n文件: 0001193125-25-115775 (form N-14, filed 2025-05-08, J.P. Morgan Exchange-Traded Fund Trust  (CIK 0001485894))\nsource_url: https://www.sec.gov/Archives/edgar/data/1485894/000119312525115775/d890548dn14.htm\n节选:\nN-14 1 d890548dn14.htm J.P. MORGAN EXCHANGE-TRADED FUND TRUST J.P. Morgan Exchange-Traded Fund Trust Table of Contents As filed with the U.S. Securities and Exchange Commission on May 8, 2025 File No. 333- SECURITIES AND EXCHANGE COMMISSION WASHINGTON, D.C. 20549 FORM N-14 REGISTRATION STATEMENT UNDER THE SECURITIES ACT OF 1933 Pre-Effective Amendment No. ☐ Post-Effective Amendment No. ☐ (Check appropriate box or boxes.) J.P. Morgan Exchange-Traded Fund Trust (Exact Name of Registrant as Specified in Charter) 277 Park Avenue, New York, New York 10172 (Address of Principal Executive Office) (Zip Code) Registrant’s Telephone Number, including Area Code (800) 480-4111 Gregory S. Samuels, Esq. J.P. Morgan Investment Management Inc., 277 Park Avenue, New York, New York 10172 (Name and Address of Agent for Service) Please send copies of all communications to: Elizabeth A. Davin, Esq. JPMorgan Chase & Co. 1111 Polaris Parkway Columbus, OH 43240 Anthony Zacharski, Esq. Allison M. Fumai, Esq. Dechert LLP 1095 Avenue of the Americas New York, NY 10036 Approximate Date of Proposed Public Offering: As soon as practicable after this Registration Statement becomes effective under the Securities  […] te each account by using one of the methods described on the proxy cards or by signing and dating each card and enclosing them in the postage-paid envelope provided for each card. The accompanying Proxy Statement/Prospectus provides more information about the Reorganization. Please carefully review the additional information provided in this document. If you have any questions after reviewing the proxy materials, please call the proxy solicitor, Morrow Sodali Fund Solutions LLC, at 1-833-876-7363, Monday through Friday from 10:00 a.m. to 11:00 p.m., Eastern Time. Sincerely, Brian S. Shlissel President JPMorgan Trust I June 7, 2025 iii Table of Contents JPMORGAN TRUST I JPMorgan National Municipal Income Fund (the “Target Fund”) J.P. MORGAN EXCHANGE-TRADED FUND TRUST JPMorgan Municipal ETF (the “Acquiring Fund”) 277 Park Avenue New York, NY 10172 NOTICE OF SPECIAL MEETING OF SHAREHOLDERS To Be Held on July 30, 2025 To the shareholders of the Target Fund: NOTICE IS HEREBY GIVEN that a Special Meeting of shareholders of the Target Fund will be held at 277 Park Avenue, New York, NY 10172, at 11 a.m., Eastern Time (the “Meeting”), for the following purposes: 1. To approve an Agreement and Plan of Reorganization for the Target Fund, pursuant to which the Target Fund will transfer all of its assets and liabilities to the Acquiring Fund in exchange for the shares of the Acquiring Fund. Target Fund Acquiring Fund JPMorgan National Municipal Income Fund JPMorgan Municipal ETF 2. To transact such other business as may properly come before the Meeting and any adjournments or postponements thereof. Whether or not you plan to attend the Meeting in person, please vote. In addition to voting by mail, you may also vote either by telephone or via the Internet, as follows: To vote by Telephone: To vote by Internet: (1) Read the Proxy Statement/Prospectus and have your proxy card at hand. (1) Read the Proxy Statement/Prospectus and have your proxy card at hand. (2) Call the toll-free number shown on your proxy card. (2) Go to the website shown on your proxy card. (3) Enter the control number shown on your proxy card and follow the simple instructions. (3) Enter the control number shown on your proxy card and follow the simple inst […] ng the reasons for the Reorganization. The Reorganization is subject to approval by the shareholders of the Target Fund (as defined below). A more detailed discussion of the Reorganization follows this section. Q. What is happening to my investment? Why am I receiving a Proxy Statement/Prospectus? A. You are receiving this Proxy Statement/Prospectus because you own shares in JPMorgan National Municipal Income Fund (the “Target Fund”). The Target Fund currently operates as an open-end mutual fund. It is proposed that, subject to shareholder approval, the Target Fund be reorganized into the JPMorgan Municipal ETF (the “Acquiring Fund” and together with the Target Fund, the “Funds”), an existing ETF. Although the Acquiring Fund operates as an exchange-traded fund (“ETF”), the Funds have similar investment objectives, investment policies, and investment strategies. Following the reorganization, the Target Fund will be liquidated (the “Reorganization”). Subject to shareholder approval, the Reorganization will be accomplished in accordance with an agreement and plan of reorganization and liquidation (the “Plan”). The Plan provides for the transfer of all of the assets and liabilities of the Target Fund to the Acquiring Fund in exchange for shares of the Acquiring Fund having an aggregate net asset value (“NAV”) equal to the aggregate NAV of the Target Fund followed immediately by the distribution by the Target Fund to its shareholders of the portion of shares of the Acquiring Fund to which the shareholder is entitled (including cash in lieu of fractional shares of the Acquiring Fund) in complete liquidation of the Target Fund, except as noted below. If the Reorganization is approved by shareholders and you remain a shareholder of the Target Fund on the Closing Date (as defined below), you will receive shares of the Acquiring Fund and, in some cases, cash that combined with the shares have the same value as your shares of the Target Fund on that date. Shares of the Acquiring Fund are not issued in fractional shares, so cash will be paid to some shareholders in lieu of fractional shares of the Acquiring Fund. Any such cash payment may be taxable. vi Table of Contents If you hold your shares of the Target Fund through a […] ain or loss based on the difference between your tax basis in the shares and the amount you receive for them. Q. Whom do I contact for further information? A. If you have any questions after reviewing the proxy materials, please call the proxy solicitor, Morrow Sodali Fund Solutions LLC, at 1-833-876-7363, Monday through Friday from 10:00 a.m. to 11:00 p.m., Eastern Time. Important additional information about the Reorganization is set forth in the accompanying Proxy Statement/Prospectus. Please read it carefully. xvii Table of Contents PROXY STATEMENT/PROSPECTUS Dated June 7, 2025 PROXY STATEMENT FOR: JPMORGAN TRUST I JPMorgan National Municipal Income Fund (the “Target Fund”) 277 Park Avenue New York, NY 10172 PROSPECTUS FOR: J.P. MORGAN EXCHANGE-TRADED FUND TRUST JPMorgan Municipal ETF (the “Acquiring Fund”) 277 Park Avenue New York, NY 10172 This Proxy Statement/Prospectus is being furnished in connection with the solicitation of proxy cards by the Board of Trustees (the “Board”) of JPMorgan Trust I (“Target Trust”) for a Special Meeting of shareholders of the Target Fund listed above (the “Meeting”). The Meeting will be held on July 30, 2025 at 11 a.m., Eastern Time, at 277 Park Avenue, New York, NY 10172. At the Meeting, shareholders will be asked to consider and act upon the following proposals: 1. To approve an Agreement and Plan of Reorganization for the Target Fund, pursuant to which the Target Fund will transfer all of its assets and liabilities to the Acquiring Fund in exchange for the shares of the Acquiring Fund. Target Fund Acquiring Fund JPMorgan National Municipal Income Fund JPMorgan Municipal ETF 2. To transact such other business as may properly come before the Meeting and any adjournments or postponements thereof. 1 Table of Contents The Board of Trustees of the Target Fund unanimously recommends that you vote “FOR” the proposal. The Reorganization will be accomplished in accordance with an agreement and plan of reorganization and liquidation (the “Plan”). The Plan provides for the transfer of all of the assets and liabilities of the Target Fund to the Acquiring Fund in exchange for shares of the Acquiring Fund having an aggregate net asset value (“NAV”) equal to the aggregate NAV of the Ta\n"

.33 % CBOE S&P 500 Buy Write Index (BXM) (reflects no deduction for fees, expenses, or taxes) - 11.37 % 2.73 % 4.33 […]  procedures, subject to oversight by the Board. Valuing securities at fair value is intended to ensure that the Fund is accurately priced and involves reliance on judgment. The Adviser will regularly evaluate whether the Fund’s fair valuation pricing procedures continue to be appropriate in light of the specific circumstances of the Fund and the quality of prices obtained through the application of such procedures. There can be no assurance that the Fund will obtain the fair value assigned to a security if it were to sell the security at approximately the time at which the Fund determines its NAV per share. Frequent Purchases and Redemptions of Fund Shares Unlike frequent trading of shares of a traditional open-end mutual fund’s (i.e., not exchange-traded) shares, frequent trading of shares of the Fund on the secondary market does not disrupt portfolio management, increase the Fund’s trading costs, lead to realization of capitalization gains, or otherwise harm the Fund’s shareholders because these trades do not involve the Fund directly. Certain institutional investors are authorized to purchase and redeem the Fund’s shares directly with the Fund. Because these trades are effected in-kind (i.e., for securities, and not for cash), they do not cause any of the harmful effects noted above that may result from frequent cash trades. Moreover, the Fund imposes transaction fees on in-kind purchases and redemptions of Creation Units to cover the custodial and other costs incurred by the Fund in effecting in-kind trades. These fees increase if an investor substitutes cash in part or in whole for Creation Units, reflecting the fact that the Fund’s trading costs increase in those circumstances. For these reasons, the Board has determined that it is not necessary to adopt policies and procedures to detect and deter frequent trading and market-timing in shares 
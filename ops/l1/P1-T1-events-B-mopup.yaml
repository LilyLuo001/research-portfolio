y’s securities are included in the MSCI World Ex-US Index. In addition, the Fund considers countries represented in the MSCI Emerging Markets Index to be emerging market countries. From time to time, the Fund may focus its investments in certain countries or geographic areas, including Europe. Equity securities include common stock, preferred stock, convertible securities and depositary receipts. PineStone Asset Management Inc., the Fund’s subadvisor (the “Subadvisor”), seeks to achieve the Fund’s investment objective by investing in a portfolio of international equities. The Fund may invest in issuers with market capitalizations of any size, though it generally expects to focus on issuers with market capitalization in excess of $1 billion. Under normal circumstances, the Fund invests at least 80% of its assets (net assets plus any borrowings for investment purposes) in equity securities. The Fund will normally invest in equity securities of foreign companies operating in at least three countries other than the United States, including emerging market countries. An issuer of a security is considered to be a U.S. or foreign issuer based on the issuer’s “country of risk” (or similar designation) as determined by a third party such as Bloomberg. In addition, the Fund considers countries represented in the MSCI Emerging Markets Index to be emerging market countries. From time to time, the Fund may focus its investments in certain countries or geographic areas, including Europe. Equity securities include common stock, preferred stock, convertible securities and depositary receipts. 17 The Fund may from time to time emphasize one or more sectors in selecting its investments, including the consumer non-cyclical and industrials sectors. In addition, the Fund may enter into forward currency contracts to hedge the currency exposure associated with some or all of the Fund’s securities, to shift investment exposure from one currency to another, to shift U.S. dollar exposure to achieve a representative weighted mix of major currencies in its benchmark, or to adjust an underweight country exposure in its portfolio. The Fund may also invest in securities issued by other investment companies. In pursuing the Fund’s investment objective, the Sub-Adviser employs a bottom-up stock selection approach which results in a portfolio generally ranging from 25 to 45 companies. A bottom-up stock selection approach focuses on the analysis of individual stocks (microeconomic factors) as opposed to the significance of economic cycles and market cycles (macroeconomic factors). The Sub-Adviser looks for companies that have growth potential that are believed to be trading at attractive valuations. In doing so, the Sub-Adviser focuses on companies believed by the portfolio management team to have the following characteristics, among others: · Sustainable competitive advantage in an industry with high barriers to entry; · Attractive industry with pricing power, organic growth and limited cyclicality; · Strong management teams with soun […] al systems, including structures governing private or foreign investment or allowing for judicial redress (such as limits on rights and remedies available) for investment losses and injury to private property; (iv) loss resulting from problems in share registration and custody; (v) sensitivity to adverse political or social events affecting the region where an emerging market is located; (vi) particular sensitivity to economic and political disruptions, including adverse effects stemming from wars, sanctions, trade restrictions, recessions, depressions or other economic crises, or reliance on international or other forms of aid, including trade, taxation and development policies; and (vii) the nationalization of foreign deposits or assets. Convertible Securities Risk: Convertible securities are typically subordinate to an issuer’s other debt obligations. In part, the total return for a convertible security depends upon the performance of the underlying stock into which it can be converted. Also, issuers of convertible securities are often not as strong financially as those issuing securities with higher credit ratings, are more likely to encounter financial difficulties and typically are more vulnerable to changes in the economy, such as a recession or a sustained period of rising interest rates, which could affect their ability to make interest and principal payments. If an issuer stops making interest and/or principal payments, the Fund could lose its entire investment. Depositary Receipts Risk: Investments in depositary receipts may entail the special risks of investing in foreign securities, including currency exchange fluctuations, government regulations, and the potential for political and economic instability. Derivatives Risk: Derivatives are investments whose value depends on (or is derived from) the value of an underlying instrument, such as a security, asset, reference rate or index. Derivative strategies may be riskier than investing directly in the underlying instrument and often involve leverage, which may exaggerate a loss, potentially causing the Fund to lose more money than it originally invested and would have lost had it invested directly in the underlying instrument. Derivatives may be difficult to sell, unwind and/or value. Derivatives may also be subject to counterparty risk, which is the risk that the counterparty (the party on the other side of the transaction) on a derivative transaction will be unable or unwilling to honor its contractual obligations t […] rket developments affecting a single issuer than a fund that is invested more broadly. Investments in Other Investment Companies Risk: The Fund’s investment in another investment company may subject the Fund indirectly to the risks of that investment company. The Fund also will bear its share of the underlying investment company’s fees and expenses, which are in addition to the Fund’s own fees and expenses. Preferred Stock Risk: Preferred stock is subject to many of the risks associated with debt securities, including interest rate risk. In addition, preferred stocks may not pay dividends, an issuer may suspend payment of dividends on preferred stock at any time, and in certain situations an issuer may call or redeem its preferred stock or convert it to common stock. To the extent that the Fund invests a substantial portion of its assets in convertible preferred stocks, declining common stock values may also cause the value of the Fund’s investments to decline. 20 Liquidity and Valuation Risk: The Fund’s investments may be illiquid at the time of purchase or liquid at the time of purchase and subsequently become illiquid due to, among other things, events relating to the issuer of the securities, market events, operational issues, economic conditions, investor perceptions or lack of market participants. The lack of an active trading market may make it difficult to sell or obtain an accurate price for a security. If market conditions or issuer specific developments make it difficult to value securities, the Fund may value these securities using more subjective methods, such as fair value pricing. In such cases, the value determined for a security could be different than the value realized upon such security's sale. As a result, an investor could pay more than the market value when buying shares or receive less than the market value when selling shares. This could affect the proceeds of any redemption or the number of shares an investor receives upon purchase. The Fund is subject to the risk that it could not meet redemption requests within the allowable time period without significant dilution of remaining investors' interests in the Fund. To meet redemption requests or to raise cash to pursue other investment opportunities, the Fund may be forced to sell securities at an unfavorable time and/or under unfavorable […] lection of Trustees A plurality of the shares voted shall elect a Trustee. A plurality of the shares voted shall elect a Trustee. 28 Removal of Trustees Any Trustee may be removed at any meeting of shareholders by a vote of two-thirds of the outstanding shares of the Fiera Capital Series Trust. Any Trustee may be removed with or without cause at any meeting of shareholders by a vote of two-thirds (2/3) of the outstanding shares of the MainStay Funds Trust. Approval of a Consolidation or Merger Trustees may cause (i) Fiera Capital Series Trust or one or more of its series to the extent consistent with applicable law to be merged into or consolidated with another trust or company, (ii) shares of Fiera Capital Series Trust or any series to be converted into beneficial interests in another statutory trust (or series thereof) created pursuant to the Declaration of Trust, (iii) the sale of substantially all of the assets of Fiera Capital Series Trust or one or more of its series to another trust or company in exchange for the assumption of the liabilities of the Trust or the series and the issuance of beneficial interests in such trust or company, or (iv) shares to be exchanged under or pursuant to any state or federal statute to the extent permitted by law. Such merger or consolidation, share conversion, sale of assets or share exchange must be authorized by vote of the holders of a majority of the outstanding shares (or, if applicable, a majority of the outstanding shares of the affected series); provided that in all respects not governed by applicable law, Trustees shall have the power to prescribe the procedures necessary or appropriate to accomplish the transaction including the power to create one or more separate statutory trusts to which all or any part of the assets, liabilities, profits or losses of Fiera Capital Series Trust may be transferred and to provide for the conversion of shares of Fiera Capital Series Trust or any series into beneficial interests in such separate statutory trust or trusts (or series thereof). Trustees may also cause substantially all of the assets of any series (the “Acquired Series”) to be sold to another series if authorized by vote of the holders of a majority of the outstandin\n"

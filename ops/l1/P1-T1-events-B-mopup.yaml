ars exactly\nonce in your answer map (count them); every event object quotes ETF-acquirer evidence;\nevery date matches ^\\d{4}-\\d{2}-\\d{2}$ or is \"NA\"; no ticker field contains a space.】\n文件: 0000898432-25-000382 (form N-14, filed 2025-05-20, Neuberger Berman ETF Trust  (CIK 0001506001))\nsource_url: https://www.sec.gov/Archives/edgar/data/1506001/000089843225000382/formn-14.htm\n节选:\nN-14 1 formn-14.htm FORM N-14 As filed with the Securities and Exchange Commission on May 20, 2025 1933 Act Registration No. [ ] UNITED STATES SECURITIES AND EXCHANGE COMMISSION Washington, D.C. 20549 FORM N-14 REGISTRATION STATEMENT UNDER THE SECURITIES ACT OF 1933 Pre-Effective Amendment No. [ ] Post-Effective Amendment No. [ ] (Check appropriate box or boxes) NEUBERGER BERMAN ETF TRUST (Exact Name of Registrant as Specified in Charter) c/o Neuberger Berman Investment Advisers LLC 1290 Avenue of the Americas New York, New York 10104-0002 (Address of Principal Executive Offices) Registrant’s Telephone Number, including Area Code: (212) 476-8800 Joseph V. Amato Chief Executive Officer and President Neuberger Berman ETF Trust c/o Neuberger Berman Investment Advisers LLC 1290 Avenue of the Americas New York, New York 10104-0002 (Name and Address of Agent for Service) With copies to: Stacy L. Fuller, Esq. Lori L. Schneider, Esq. K&L Gates LLP 1601 K Street, N.W. Washington, D.C. 20006-1600 (Names and Addresses of Agents for Service of Process) Approximate Date of Proposed Public Offering: As soon as practicable after this registration statement goes effective under the Securities Act  […] iling will become effective on June 19, 2025 pursuant to Rule 488. NEUBERGER BERMAN ETF TRUST FORM N-14 CONTENTS OF REGISTRATION STATEMENT ON FORM N-14 This Registration Statement consists of the following papers and documents: Cover Sheet Contents of Registration Statement on Form N-14 Letter to Shareholders Part A – Information Statement and Prospectus Part B – Statement of Additional Information Part C – Other Information Signature Page Exhibits NEUBERGER BERMAN INVESTMENT ADVISERS LLC 1290 Avenue of the Americas New York, NY 10104 [ ], 2025 Dear Shareholder: I am writing to inform you about a transaction that will affect your investment in the Neuberger Berman Emerging Markets Debt Fund (the “Fund” or “Target Fund”). We are planning to convert your Fund into an exchange-traded fund, commonly referred to as an “ETF.” The Fund will be converted by merging it into a newly created ETF, Neuberger Berman Emerging Markets Debt Hard Currency ETF (the “New ETF”), which will be a series of Neuberger Berman ETF Trust. We refer to this as the “Conversion.” After the Conversion, you will hold shares of the New ETF instead of the Fund. The New ETF will be listed for trading on NYSE Arca, Inc., a U.S. stock exchange, and shares of the New ETF will be bought and sold in the secondary market at a market price. We believe that the Fund and its shareholders will benefit from the Conversion into an ETF since the New ETF will have a lower total annual operating expense ratio than each class of the Fund. You also will be able to buy and sell shares of the New ETF throughout the trading day. The New ETF will be managed by the same investment adviser, Neuberger Berman Investment Advisers LLC (the “Adviser”), and utilize the same sub-adviser, Neuberger Berman Europe Limited, as the Fund. In addition, the New ETF will have the same investment objective and fundamental investment policies and some of the same key portfolio managers as the Fund. While the New ETF will invest in emerging markets debt securities like the Fund, the New ETF will have a slightly different principal investment strategy than the Fund since it will invest primarily in emerging markets debt securities denominated in hard currencies (i.e., globally traded currencies of industrialized countries, including the U.S. dollar, euro or any currency of a nation in the G-7 (U.S., Japan, Germany, Italy, the United Kingdom, France and Canada)). Once you own shares of the New ETF, you will be able to purchase and sell New ETF shares throughout the trading day at the then-prevailing market price in the secondary market. You will no longer purchase or redeem individual shares directly from the Fund. This is because the mechanism that underpins the creation and redemption of ETF shares is designed to align the market price of the ETF’s share with its net asset value. However, you may pay a brokerage  […] to sell, or buy, New ETF shares. In addition, the New ETF shares will have a bid-ask spread, which is the difference between the highest price a buyer is willing to pay for ETF shares on the stock exchange, and the lowest price that a seller is willing to accept for ETF shares on the stock exchange. The bid-ask spread affects the price at which you are likely to be able to buy and sell ETF shares in the secondary market. More specifically, the larger (or wider) the bid-ask spread, the farther away from net asset value the current market price is likely to be. Your Fund shares, like all mutual fund shares, are purchased and redeemed at net asset value, so you did not experience such pricing variances when buying and selling Fund shares. The Conversion is taking place because the Board of Trustees (the “Board”) of the Neuberger Berman Income Funds believes that it is in the best interests of the Fund and its shareholders to merge into the New ETF. The Board believes that you will benefit from the Conversion for several reasons, including: (i) the New ETF will operate at an overall cost that is lower than each class of the Fund. The advisory fee for the New ETF will be lower than the advisory fee for the Fund and the administration fee for the New ETF will be lower than the administration fee for each class of the Fund. In addition, the Adviser has entered into a contractual expense limitation agreement (which will run through October 31, 2028) so that after the Conversion, the total annual operating expenses of the New ETF will be lower than each class of the Fund. (ii) shares of the New ETF can be purchased and sold throughout the trading day at the then-prevailing market price in the secondary market. However, you will not be able to redeem New ETF shares for cash from the New ETF at net asset value. (iii) the Conversion is structured to qualify as tax-free for U.S. federal income tax purposes. As a result, Fund shareholders will generally exchange their Fund shares for New ETF shares on a tax-free basis. However, if you hold any fraction of a share as of the date of the Conversion, you will receive cash equal to the net asset value of such fraction of a share in the Conversion, which will cause you to recognize gain or loss for income tax purposes. Further, Fund shares that are held outside of a brokerage account as of August 6, 2025, will be converted into New ETF shares and held by Equiniti Trust Company, LLC (“Equiniti”) for one year until a brokerage account is identified. Additionally, Fund shares held through a direct individual retirement account (“IRA”) held with the Fund will be exchanged on the date of the Conversion for shares of the State Street Institutional U.S. Government Money Market Fund with the same aggregate net asset value as your shares of the Fund. (iv) after the Conversion, as a shareholder of the New ETF, you will gain the benefit of full daily transparency into the underlying portfolio holdings of the New ETF. The Fund does not provide full daily transparency into its underlying portfolio holdings. In the Conversion, you will receive shares of the New ETF with the same aggregate net asset value as your shares of the Fund immediately prior to the Conversion, except you will receive cash equal to the net asset value of any fraction of a share held at such time. The conversion of any fraction of a share to cash may be subject to fees and expenses and will be a taxable event. In addition, if your Fund shares are held outside of a brokerage account or are held in an account that cannot accept New ETF shares at the time of the Conversion, New ETF shares received in the Conversion will be held by a stock transfer agent, Equiniti, until a brokerage account is identified into which Equiniti can transfer the shares. However, if you hold your Fund shares through an IRA held directly with the Fund and you do not take action by August 6, 2025, your Fund shares will be exchanged on the Conversion date (i.e., August 8, 2025) for shares of the State Street Institutional U.S. Government Money Market Fund with the same aggregate net asset value as your shares of the Fund. Finally, if you hold your shares of the Fund through an account with a financial intermediary that is not able to hold shares of the New ETF, like many group retirement plans, your financial intermediary may transfer your investment in the Fund to a different investment option prior to the Conversion. Please consult with your financial intermediary for more information on the impact that the Conversion will have on you and your investment. This is a brief overview of the Conversion of your Fund. We encourage you to read the full text of the enclosed Combined Information Statement/Prospectus to obtain detailed information regarding the Conversion. NO SHAREHOLDER APPROVAL IS REQUIRED FOR THE CONVERSION. WE ARE NOT ASKING YOU FOR A PROXY AND YOU ARE REQUESTED NOT TO SEND US A PROXY. If you hold Fund shares directly with the Fund (“Direct Shareholder”) or do not hold Fund shares in a brokerage account, you may need to take action prior to the Conversion. Please see the discussion below. What action must I take as a Fund shareholder? You have the following three options, unless you are a Direct Shareholder. 1. Accept the Conversion. When the Conversion happens, your ETF shares will be deposited into your account. 2. Exchange your Fund shares for shares of another series of the Neuberger Berman fund family. If this is an option, you can do this by calling your broker. Contingent deferred sales charges (“CDSC”) will not be imposed on shares of the Target Fund exchanged for shares of another series of the Neuberger Berman fund family. In addition, no front-end sales charges will be imposed on shares of the Target Fund exchanged for shares of the New ETF in connection with the Conversion. - 2 - 3. Redeem your shares in the Fund. You can do this by calling your broker. If you do not wish for your shares to be converted to the New ETF, you will need to redeem your shares or exchange your shares for other funds in the Neuberger Berman fund family. What action must I take as a Direct Shareholder? If you hold your shares directly with the Fund, you are a “Direct Shareholder.” If you hold your shares through a brokerage account, you are NOT a Direct Shareholder. We provide more information, including how to determine if you’re a Direct Shareholder in the box below. If you are a Direct Shareholder, you must take one of the following actions: 1. Transfer the custody of your Fund shares to the broker-dealer of your choice . We urge you to begin this process immediately if this is your preferred option. This is the option that we recommend. Look at the box at the end of this letter for more information. 2. Exchange your Fund shares for shares of another series of the Neuberger Berman fund family. You can do this by calling us at 800-877-9700. CDSC will not be imposed on shares of the Target Fund exchanged for shares of another series of the Neuberger Berman fund family. In addition, no front-end sales charges will be imposed on shares of the Target Fund exchanged for shares of the New ETF in connection with the Conversion. 3. Redeem your shares in the Fund . You can do this by calling us at 800-877-9700. If you are a Direct Shareholder and you fail to take any action, your shares will be converted into shares of the New ETF and held by a stock transfer agent, Equiniti, waiting for your instructions. 1 Additionally, if you are a Direct Shareholder who holds Fund shares through an IRA held directly with the Fund and do not take action by August 6, 2025, your Fund shares will be exchanged for shares of the State Street Institutional U.S. Government Money Market Fund with the same aggregate net asset value as your shares of the Fund. This document is provided for information only, because shareholder approval is not required to effectuate the Conversion . The Conversion may take effect no earlier than 20 days following the date of the enclosed Combined Information Statement/Prospectus. The Conversion is currently expected to occur on or about August 8, 2025. In preparation for the Conversion, below are some key dates to keep in mind: • Purchases and Exchanges: August 5, 2025 will be the last day to purchase or exchange shares of the Fund and the Fund will be closed to new purchases as of August 6, 2025. • Redemptions: August 6, 2025 will be the last day to redeem Fund shares and redemption orders for Fund shares must be placed by that date. The Conversion may be delayed. The Fund will publicly disclose any changes to the Conversion date. 1 Shares held by this stock transfer agent are held subject to applicable state and federal law concerning unclaimed property. - 3 - I encourage you to carefully review the enclosed materials at your earliest convenience, which explain the Conversion in more detail. If you have any questions or need additional information, please contact Neuberger Berman Investment Advisers LLC at 800-877-9700. Sincerely, Joseph V. Amato President and CEO Neuberger Berman Income Funds and Neuberger Berman ETF Trust 1290 Avenue of the Americas New York, NY 10104 - 4 - IMPORTANT INFORMATION FOR DIRECT SHAREHOLDERS Am I a Direct Shareholder? You are a “Direct Shareholder” if your shares are held directly by the Fund at its transfer agent, SS&C GIDS, Inc. (“Transfer Agent”). How do you know if you hold your shares directly? If you receive quarterly statements from Neuberger Berman Income Funds, then you hold your shares directly. If your shares in the Fund are listed as a position on a statement from your brokerage firm, then you already hold your shares in a brokerage account. If you are uncertain, please call 800-877-9700 and ask if you’re a Direct Shareholder. Additionally, if you hold your shares directly you may receive separate communications from us including email, regular mail, express delivery and via telephone. As mentioned above, you have the same options to redeem or exchange your shares if you do not wish to hold ETF shares. To exchange or redeem, please call Neuberger Berman Income Funds at 800-877-9700. How do I transfer my Fund shares to be held through a brokerage account? This step is only required by Direct Shareholders who hold their shares directly with the Transfer Agent. If you already hold your shares in a  […] ing a brokerage account will involve a fee, but most major brokerage firms do not charge a fee to open or maintain an account. We suggest you provide your broker with a copy of your statement from the Fund. Your broker will require the Fund’s account number, which can be found on your statement. Your broker will help you complete a form to initiate the transfer. Once you sign this form, your broker will submit the form to the Transfer Agent directly and the shares will be transferred into your brokerage account. The sooner you initiate the transfer , the better . If you have any questions about this process or need assistance, call us at 800-877-9700. - 5 - QUESTIONS AND ANSWERS This section contains a brief Q&A which will help explain the Conversion, including the reasons for the Conversion. Following this section is a more detailed discussion. We recommend that you read the complete Combined Information Statement/Prospectus. Q1. What is happening? A. We are planning to convert Neuberger Berman Emerging Markets Debt Fund (the “Fund” or “Target Fund”), a series of Neuberger Berman Income Funds (the “Target Trust”) into an exchange-traded fund, commonly referred to as an “ETF.” The Fund will be converted by merging it into a newly created ETF, Neuberger Berman Emerging Markets Debt Hard Currency ETF (the “New ETF”) that will be a series of Neuberger Berman ETF Trust (the “ETF Trust”) (together with the Target Trust, the “Trusts”). We refer to this as the “Conversion.” After the Conversion, you will hold shares of the New ETF instead of the Fund. The New ETF will be listed for trading on NYSE Arca, Inc., a U.S. stock exchange, and shares of the New ETF will be bought and sold in the secondary market at a market price. Q2. What is this document and why did we send it to you? A. This is a Combined Information Statement/Prospectus that provides you with information about the Conversion. You are receiving this document because, as of [ ], 2025, you were a shareholder in the Fund. The Conversion does not require your approval, and you are not being asked to vote. Q3. Has the Board of Trustees of the Target Trust approved the Conversion? A. Yes, the Board approved the Conversion at a meeting of the Board held on March 27, 2025, and, after careful consideration, determined that the Conversion is in the best interests of the Fund and its shareholders and that the Fund’s existing shareholders’ interests will not be diluted as a result of the Conversion. The New ETF does not have existing shareholders. Q4. What will change when the Fund is converted to an ETF? A. The New ETF is an exchange-traded investment company, known as an ETF. After the Conversion, you will remain in a registered investment company, but it will be exchange traded, and you will own shares as you did before the Conversion, but in the New ETF instead of the Fund. You will no longer purchase or redeem individual shares directly from the Fund. This is because the mechanism that underpins the creation and redemption of ETF shares is designed to align the market price of the ETF’s shares with its net asset value (“NAV”). As a result, should you decide to purchase or sell shares of the New ETF after the Conversion, you will place a trade through a broker-dealer who will execute your trade in the secondary market at the then-prevailing market price for the New ETF shares. As with all ETFs, your broker may charge a commission for such purchase and sale transactions. In addition, you will no longer be able to exchange shares of the Target Fund into another fund in the Neuberger Berman fund family because the New ETF shares have no exchange rights. For more information about certain structural differences of your investment following the Conversion, see “Summary - Distribution, Purchase Procedures, Exchange Rights and Redemption Procedures” later in this Combined Information Statement/Prospectus. The New ETF will be a fully transparent, actively managed ETF, which means that its portfolio holdings will be available on its website every trading day. The New ETF’s website will also contain other information about the New ETF, including the most recent end-of-day NAV and market price, premium or discount (i.e., difference between the most recent end-of-day NAV and market price) and historical bid-ask spread information. Only certain financial institutions are permitted to purchase and redeem New ETF shares at - 6 - NAV. These institutions are referred to as “Authorized Participants,” and they are permitted to purchase and redeem ETF shares at NAV with the New ETF because they have entered into an agreement with the ETF Trust. Q5. Why is the Conversion occurring? A. The Fund’s investment adviser, Neuberger Berman Investment Advisers LLC (the “Adviser”) and the Board believe that operating the Fund as an ETF is in the best interests of the Fund and its shareholders. Among other reasons, we believe that operating the Fund as an ETF will offer you a number of advantages that will benefit you following the Conversion, including: • Lower Expenses: After the Conversion, the New ETF will operate with a lower total expense ratio and lower net expense ratio than each class of the Fund. The combined advisory fee and the administration fee for the New ETF will be lower than the combined advisory fee and the administration fee for each class of the Fund. In addition, to ensure that you benefit from a lower overall fee structure, the Adviser has agreed to a lower contractual expense limitation agreement for the New ETF to ensure that the net total annual operating expenses of the New ETF is lower than the net total annual operating expenses of each class of the Fund. This lower contractual expense limitation agreement for the New ETF will remain in place through at least October 31, 2028. • Intraday Trading: The New ETF shares can be purchased and sold throughout the trading day at market value on the exchange. This means that if you decide to purchase or sell shares of the New ETF, you can do so right away at the then-prevailing market price; by contrast, in the Fund, you place your purchase or redemption order and your shares are redeemed at the next calculated NAV, which does not happen until the end of each trading day. o This means you will no longer purchase or redeem your shares for cash at the next determined NAV, but rather at the prevailing market price, which may be higher or lower, than the NAV. o Buying or selling shares of the New ETF may involve paying a brokerage commission. Additionally, because prices on the exchange may be higher or lower than the New ETF’s NAV, you may pay more than NAV when buying New ETF shares and receive less than NAV when selling New ETF shares. In addition, the Adviser believes, and the Board agreed, that operating the Fund in the exchange traded fund structure offers other potential benefits, such as reduced operational costs, and greater holdings transparency. After the Conversion, you will still be invested in an open-end fund that will continue to invest in emerging markets debt securities utilizing a slightly different principal investment strategy than the Fund since it will invest primarily in emerging markets debt securities denominated in “hard currencies” (i.e., globally traded currencies of industrialized countries, including the U.S. dollar, euro or any currency of a nation in the G-7 (U.S., Japan, Germany, Italy, the United Kingdom, France and Canada)). However, the New ETF will continue to be managed by the same investment adviser and sub-adviser as the Fund along with some of the same key portfolio managers as the Fund, but at a lower overall cost. We discuss this more fully in the Information Statement/Prospectus. The Conversion is designed to be a non-taxable event for you, except that any cash that you receive equal to the NAV of any fraction of a share you hold at the time of the Conversion, may be subject to fees and expenses and will be a taxable event. In addition, if you hold Fund shares through an individual retirement account (“IRA”) held directly with the Fund, and you do not take action by August 6, 2025, your Fund shares will be exchanged for shares of the State Street Institutional U.S. Government Money Market Fund with the same aggregate net asset value as your shares of the Fund. Q6. How will this Conversion affect me as a shareholder? - 7 - A. The New ETF will have the same investment adviser, sub-adviser, investment objective and fundamental investment policies and some of the same key portfolio managers as the Fund. The New ETF will continue to invest in emerging markets debt securities utilizing a slightly different principal investment strategy than the Fund since it will invest primarily in hard currency emerging markets debt securities. We discuss this more fully in the Information Statement/Prospectus. In the Conversion, all assets and liabilities of the Fund will be transferred to the newly created New ETF other than securities that currently are fair valued as having a de minimis value and cannot be legally transferred as described in the Information Statement/Prospectus and Reorganization Agreement. You, as a shareholder of the Fund, will receive shares of the New ETF having an aggregate NAV equal to the aggregate NAV of the shares of the Fund that you owned at the time of the Conversion, minus any fraction of a share for which you will receive, or will have received, cash. The Conversion will involve several steps, however, which will affect you as a shareholder. First, on or about July 17, 2025, each class of shares of the Fund will be consolidated into the Institutional Class (without a contingent deferred sales charge or other charge, if applicable). Accordingly, after that date, all Fund shareholders will own Institutional Class shares. Second, on or about July 25, 2025, the Fund will conduct a reverse stock split to increase the NAV per share of Institutional Class shares while decreasing the total number of the issued and outstanding Institutional Class shares. A shareholder’s total investment value, however, will not be affected by the reverse split – meaning, the value of your investment in the Fund will be the same before and after the reverse split. The reverse stock split will not be a taxable event, nor does it have an impact on the Fund’s holdings or its performance. Third, on August 8, 2025, any fraction of a share of the Fund held by shareholders will be redeemed, and the Fund will distribute such redemption proceeds to those shareholders. The redemption of your fraction of a share will likely be a taxable event. Thus, you are encouraged to consult your tax advisor to determine the effect of any such redemption. Finally, on August 8, 2025, the Conversion will occur. In the Conversion, each whole share of the Fund held by shareholders will be replaced with a share of the New ETF and shares of the New ETF will be transferred to your brokerage account or if you are a Direct Shareholder, held by a transfer agent until the brokerage account is identified (subject to applicable federal or state laws concerning unclaimed property). Direct Shareholders who hold Fund shares through an IRA held directly with the Fund and do not take action by August 6, 2025, will have their Fund shares exchanged for shares of the State Street Institutional U.S. Government Money Market Fund with the same aggregate net asset value as their shares of the Fund. After the Conversion, you will hold the same percentage of ownership in the New ETF as you did in the Fund prior to the Conversion (adjusted for cash distributions, if any, for any fraction of a share). You will not receive a physical share certificate. Q7. Why is no shareholder approval being requested? A. Your vote is not required to approve the Conversion under Delaware law, under the Target Trust’s Declaration of Trust or the Investment Company Act of 1940. Q8. Will the Conversion affect the way the Fund is invested? A. Neuberger Berman Investment Advisers LLC and Neuberger Berman Europe Limited will remain as the investment adviser and sub-adviser, respectively, to the New ETF and the New ETF will have the same investment objective and fundamental investment policies currently used by the Fund. The New ETF will continue to invest in emerging markets debt securities utilizing a slightly different principal investment strategy than the Fund since it will invest primarily in hard currency emerging markets debt securities. The New ETF will continue to be actively managed and some of the same key portfolio managers will remain the same. We discuss the Conversion more fully in the Information Statement/Prospectus. - 8 - Q9. Are there any risks to owning ETFs that are different than the risks of owning mutual funds? A. Yes, there are some differences in risks, and all of these differences relate to the structure of ETFs. We discuss these risks fully in the Combined Information Statement/Prospectus, but in summary: • The New ETF’s shares will be listed for trading on NYSE Arca, Inc., a U.S. stock exchange, and shares will be bought and sold in the secondary market at a market price. Although it is expected that the market price of an ETF share will approximate its NAV, there could be times when the market price and the NAV differ significantly. If that happens, you could pay more than NAV when buying New ETF shares, and receive less than NAV when selling New ETF shares on the exchange. All ETFs face this risk. • The New ETF’s shares will be listed for trading, but it is possible that an active trading market might not be maintained. All new ETFs face this risk. • Trading in ETF shares on an exchange may be halted for a variety of reasons, and this could be an individual trading halt (i.e., a halt of New ETF shares’ trading) or a market-wide trading halt (i.e., a halt of all securities’ trading). ETF shares may also be delisted. Both trading halts and delistings happen for a variety of reasons. All ETFs face these risks. • Only certain financial institutions are permitted to purchase and redeem New ETF shares at NAV. These ins […] r that the Fund does not have? A. Yes. The New ETF requires some services, and incurs some expenses, that traditional mutual funds like the Fund do not incur. The New ETF will pay exchange registration and listing fees, to have its ETF shares listed on an exchange. The New ETF will also pay fees for services provided by the custodian and distributor for basket transaction services and the order entry process unique to ETFs. All of these fees are largely fixed, and these expenses are included in the “other expenses” component of the New ETF’s expenses as shown in the fee table of the New ETF. We discuss these specific expenses later in the accompanying Combined Information Statement/Prospectus in the section titled “Reasons for the Proposed Conversion”. Q13. Are there other benefits to the New ETF? A. Yes, there are a number of additional benefits to the ETF structure that the New ETF will receive. We identify these below, and we mention the risks associated with those benefits as well. • Flexibility to Exit . ETFs like the New ETF offer significantly more flexibility for investors because investors can purchase and sell shares intra-day at a market-determined price, instead of being forced to wait to purchase or redeem at the next calculated NAV at the end of the trading day. This means that when you decide to purchase or sell shares of the New ETF, you can act on that decision immediately by calling your broker or placing an order in your on-line brokerage account. The price realized may be higher or lower than the New ETF’s NAV and might not be the same as the New ETF’s next calculated NAV at the close of the trading day. You should understand, however, that unlike a mutual fund shareholder, after the Conversion, you generally cannot redeem your shares directly from the fund at the next-calculated NAV, unless you are an Authorized Participant redeeming a Creation Unit. • Transparency . ETFs like the New ETF will operate with full transparency. What this means in practice is that the New ETF’s holdings, which will inform the computation of NAV, will be made public each day on the New ETF’s website prior to the opening of trading in the New ETF’s shares on its listing exchange. Some investors may find this adva\n"

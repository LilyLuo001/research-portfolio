ows of\n   the Target/Acquiring fund table, a 4-fund filing yields 4 objects}, ... ]}\n  or the no_event object above.\nEach event object:\n  fund_name        target mutual fund's full name (from excerpt)\n  family           fund family/trust (from excerpt)\n  mutual_fund_ticker / etf_ticker\n                   a single 2-6 char UPPERCASE symbol from the excerpt, else \"NA\".\n                   NEVER a fund name. Multiple class tickers → \"NA\" and list them in evidence.\n  announce_date    YYYY-MM-DD only. Board-approval date if stated; else the document's own\n                   date; else the filed date. Vague (\"May 2020\",\"Q4 2026\") → \"NA\".\n  date_basis       \"board\" | \"document\" | \"filed\" | \"NA\"\n  effective_date   YYYY-MM-DD only; the stated closing/completion date. Vague → \"NA\".\n  asset_class      equity_US / equity_intl / fixed_income / other — ONLY if locatable in the\n                   excerpt (bond/muni/high-yield/MBS→fixed_income; International/EM/Asia→\n                   equity_intl; explicit US equity→equity_US; managed-futures/multi-asset/\n                   long-short→other). Name alone insufficient → \"NA\".\n  AUM_at_conversion_USD  number from excerpt or \"NA\"\n  source_accession copy from the 文件 line\n  confidence       H = fund identity + (announce or effective) with explicit basis;\n                   M = identity clear, dates partly missing/document-dated;\n                   L = identity inferred from title only\n  evidence         ≤25-word quote fragment supporting the verdict (for events: the words\n                   showing the acquirer is an ETF; for no_event: the words showing why not)\nNEED_HUMAN only when TWO date statements INSIDE THIS ONE EXCERPT contradict for the same\nfund: {\"NEED_HUMAN\": true, \"quotes\": [\"...\", \"...\"]}. Different filings never contradict.\nNever fill any field from memory — excerpt-locatable or \"NA\".\n\nSELF-CHECK before emitting (do this, don't print it): every input item id appears exactly\nonce in your answer map (count them); every event object quotes ETF-acquirer evidence;\nevery date matches ^\\d{4}-\\d{2}-\\d{2}$ or is \"NA\"; no ticker field contains a space.】\n文件: 0001193125-21-217182 (form N-14, filed 2021-07-16, LITMAN GREGORY FUNDS TRUST  (CIK 0001020425))\nsource_url: https://www.sec.gov/Archives/edgar/data/1020425/000119312521217182/d179034dn14.htm\n节选:\nN-14 1 d179034dn14.htm FORM N-14 Form N-14 Table of Contents As filed with the Securities and Exchange Commission on July 16, 2021 File No. [___]-[ ] SECURITIES AND EXCHANGE COMMISSION Washington, D.C. 20549 FORM N-14 REGISTRATION STATEMENT UNDER THE SECURITIES ACT OF 1933 Pre-Effective Amendment No. ____ Post-Effective Amendment No. ____ LITMAN GREGORY FUNDS TRUST (Exact Name of Registrant as Specified in Charter) 1676 N. California Blvd., Suite 500, Walnut Creek, California 94596 (Address of Principal Executive Office) (Zip Code) Registrant’s Telephone Number, including Area Code: (925) 254-8999 Jeremy L. DeGroot 1676 N. California Blvd., Suite 500 Walnut Creek, California 94596 (Name and address of agent for service) Copies of Communications to: David A. Hearth, Esq. Paul Hastings LLP 101 California Street, 48th Floor San Francisco, California 94111 Approximate Date of Proposed Public Offering: As soon as practicable after the Registration Statement becomes effective under the Securities Act of 1933, as amended. Title of Securities Being Offered: Institutional Class Shares and Investor Class Shares of iM Dolan McEniry Corporate Bond Fund Shares of iM DBi Managed Futures Strategy […] , see the “How to Buy and Sell Shares” section in the Target Managed Futures Strategy ETF and the Target Hedge Strategy ETF prospectus. For more information about how to purchase and redeem shares of each Acquiring Fund, see the section entitled “Purchasing, Selling and Exchanging Fund Shares” in Exhibit A to this Proxy Statement/Prospectus. How do the Funds’ share classes compare? Institutional Shares and Advisor Shares of the Target Corporate Bond Fund have similar features and similar investment minimums as Institutional Class shares and Investor Class shares, respectively, as the corresponding Acquiring Corporate Bond Fund. The Target Managed Futures Strategy ETF and Target Hedge Strategy ETF and their corresponding Acquiring Funds are exchange-traded funds and offer a single class of shares. Shares of each of the Target Managed Futures Strategy ETF and Target Hedge Strategy ETF have similar features as shares of the Acquiring Managed Futures Strategy ETF and Acquiring Hedge Strategy ETF, respectively. For more information, please see the section below entitled “Additional Information About The Funds – Comparison of Distribution, Shareholder Servicing, Purchase and Redemption of Shares, and Pricing.” Will there be any tax consequences resulting from the Reorganizations? Each Reorganization is designed to qualify as a tax-free reorganization for federal income tax purposes, and the Target Funds anticipate receiving a legal opinion to that effect, although there can be no assurance that the Internal Revenue Service (“IRS”) will adopt a similar position. This means that the shareholders of each Target Fund will recognize no gain or loss for federal income tax purposes upon the exchange of all of their shares in the Target Fund for shares in the corresponding Acquiring Fund. Shareholders should consult their tax adviser about state and local tax consequences of the Reorganizations, if any, because the information about tax consequences in this Proxy Statement/Prospectus relates only to the federal income tax consequences of the Reorganizations. For more detailed information about the federal income tax consequences of the Reorganizations, please refer to the section titled “The Proposed Reorganizations – Federa […] zed capital gains, if any, as follows: Target Fund Dividends Capital Gains iM Dolan McEniry Corporate Bond Fund Monthly Annually iM DBi Managed Futures Strategy ETF Quarterly Annually iM DBi Hedge Strategy ETF Quarterly Annually Acquiring Fund Dividends Capital Gains iM Dolan McEniry Corporate Bond Fund Monthly Annually iM DBi Managed Futures Strategy ETF Quarterly Annually iM DBi Hedge Strategy ETF Quarterly Annually 4 Table of Contents Who will pay the costs of the Reorganizations? iM Global will pay all of the costs of each Reorganization, including costs associated with the preparation, printing and distribution of this Proxy Statement/Prospectus, legal fees, accounting fees and proxy solicitation expenses, transfer agent and custodian conversion costs. These expenses are expected to be approximately $70,000. When are the Reorganizations expected to occur? If shareholders of each Target Fund approve the Reorganizations, it is anticipated that the Reorganizations will occur on or around September 17, 2021. How do I attend the virtual Meeting? There is no physical location for the Meeting. For each Target Fund, the Meeting will be conducted exclusively online via live webcast. Shareholders may request the Meeting credentials by emailing attendameeting@astfinancial.com. Please use the email subject line “IMGPUS Special Meeting” and include your full name, address and the control number found on your enclosed proxy card. The Meeting will begin promptly at 10:00 a.m. Central time on Wednesday, September 15, 2021. We encourage you to request the Meeting credentials before the date of the Meeting and to access the Meeting a few minutes prior to the start time leaving ample time for the check in. Only shareholders of the Target Funds will be able to participate in the Meeting. You may vote during the Meeting by following the instructions available on the Meeting website. For questions relating to participation at the Meeting by remote communication, please call 1-866-356-6140. • Access to the Webcast of the Meeting . The live webcast of the Meeting will begin promptly at 10:00 a.m. Central time on September 15, 2021. We encourage shareholders to access the Meeting prior to the start time. • Beneficial Owners . If y […] and fixed assets, debt levels and cash balances, and other items. Dolan McEniry’s investment process is designed to identify undervalued corporate bonds—those that trade at wide spreads to U.S. Treasury securities yet are issued by companies that, in Dolan McEniry’s assessment, generate sufficient cash flow to meet their debt obligations. Dolan 9 Table of Contents McEniry ranks securities with equal weighting given to risk (cash flow coverage of debt obligations) and return (spread to U.S. Treasuries). The process identifies what Dolan McEniry deems to be the most undervalued bonds. Target Managed Futures Strategy ETF and Acquiring Managed Futures Strategy ETF Principal Investment Strategies Each Fund is a non-diversified, actively-managed exchange-traded fund (“ETF”) that seeks to achieve its objective by: (i) investing its assets pursuant to a managed futures strategy (described below); (ii) allocating up to 20% of its total assets in its wholly-owned subsidiary (the “Subsidiary”), which is organized under the laws of the Cayman Islands, is advised by Dynamic Beta investments LLC (“DBi”), and will comply with each Fund’s investment objective and investment policies; and (iii) investing directly in select debt instruments for cash management and other purposes. Each Fund’s managed futures strategy employs long and short positions in derivatives, primarily futures contracts and forward contracts, across the broad asset classes of equities, fixed income, currencies and, through the Subsidiary, commodities. Fund positions in those contracts are determined based on a proprietary, quantitative model – the Dynamic Beta Engine – that seeks to identify the main drivers of performance by approximating the current asset allocation of a selected pool of the largest commodity trading advisor (“CTA”) hedge funds, which are hedge funds that use futures or forward contracts to achieve their investment objectives. The Dynamic Beta Engine analyzes recent historical performance in order to estimate the current asset allocation of a selected pool of the largest CTAs. DBi relies exclusively on the model and does not have discretion to override the model-determined asset allocation or portfolio weights. DBi will periodically revie […] ve investments, for liquidity purposes, or to enhance yield, to invest a large portion of the portfolio in debt securities. Each Fund may hold fixed income instruments of varying maturities, but that have an average duration of less than one year. In particular, the Funds may hold government money market instruments, such as U.S. Treasury securities and U.S. government agency discount notes and bonds with maturities of two years or less. Since each Fund is non-diversified, it may invest a greater percentage of its assets in a particular investment or issuer than a diversified fund. 10 Table of Contents Target Hedge Strategy ETF and Acquiring Hedge Strategy ETF Principal Investment Strategies Each Fund is a non-diversified, actively-managed exchange-traded fund (“ETF”) that seeks to achieve its objective by: (i) investing its assets pursuant to an equity hedge strategy (described below); and (ii) allocating the remainder of its assets directly in a portfolio of investment grade debt securities to collateralize its derivatives investments, for liquidity purposes, or to enhance yield. Each Fund seeks to model its investments after long/short equity hedge fund strategies and does not invest in hedge funds. Because each Fund is not a hedge fund, each Fund will be limited in its ability to fully replicate hedge fund strategies due to regulatory requirements, including limitations on leverage and liquidity of the Fund’s investments. Each Fund invests in long and short positions in exchange-traded futures contracts across the broad asset classes of equities, fixed income, and currencies. The long and short positions in the futures contracts are determined by each Fund’s sub-adviser, DBi, using a proprietary, quantitative model – the Dynamic Beta Engine. The Dynamic Beta Engine is designed to identify the main drivers of performance of a diversified portfolio of the largest long/short equity hedge funds, which are hedge funds that employ fundamental analysis to buy or sell short individual equity securities to achieve their respective investment objectives (“Equity Hedge funds”). Equity Hedge funds typically diversify their risks by limiting the hedge fund’s net exposure to certain industries, regions, or market capital\n"

investment when purchasing shares of the same fund (but not any other fund within the same fund family). • Shares exchanged from Class C shares of the same fund in the month of or following the 7-year anniversary of the purchase date. To the extent that this prospectus elsewhere provides for a waiver with respect to exchanges of Class C shares or conversion of Class C shares following a shorter holding period, that waiver will apply. • Employees and registered representatives of Ameriprise Financial or its affiliates and their immediate family members. • Shares purchased by or through qualified accounts (including IRAs, Coverdell Education Savings Accounts, 401(k)s, 403(b) TSCAs subject to ERISA and defined benefit plans) that are held by a covered family member, defined as an Ameriprise financial advisor and/or the advisor’s spouse, advisor’s lineal ascendant (mother, father, grandmother, grandfather, great grandmother, great grandfather), advisor’s lineal descendant (son, step-son, daughter, step-daughter, grandson, granddaughter, great grandson, great granddaughter) or any spouse of a covered family member who is a lineal descendant. • Shares purchased from the proceeds of redemptions within the same fund family, provided (1) the repurchase occurs within 90 days following the redemption, (2) the redemption and purchase occur in the same account, and (3) redeemed shares were subject to a front-end or deferred sales load (i.e. Rights of Reinstatement). Edward D. Jones & Co., L.P. (\"Edward Jones\") Policies Regarding Transactions Through Edward Jones The following information has been provided by Edward Jones: Effective on or after February 1, 2021, the following information supersedes prior information with respect to transactions and positions held in fund shares through an Edward Jones system. Clients of Edward Jone […] es purchased from the proceeds of redemptions within the same fund family, provided (1) the repurchase occurs within ninety (90) days following the redemption, (2) the redemption and purchase occur in the same account, and (3) redeemed shares were subject to a front-end or deferred sales load (i.e., right of reinstatement). • Employer-sponsored retirement plans (e.g., 401(k) plans, 457 plans, employer-sponsored 403(b) plans, profit sharing and money purchase pension plans and defined benefit plans). For purposes of this provision, employer-sponsored retirement plans do not include SEP IRAs, Simple IRAs, SAR-SEPs or Keogh plans. • Shares acquired through a right of reinstatement. • Class C shares that are no longer subject to a CDSC and are converted to Class A shares of the same fund pursuant to Janney’s policies and procedures. CDSC waivers on Class A and C shares available at Janney: • Shares sold upon the death or disability of the shareholder. • Shares sold as part of a systematic withdrawal plan as described in the fund's prospectus. • Shares sold in connection with a return of excess contributions from an IRA account. • Shares sold as part of a required minimum distribution for IRA and retirement accounts if the redemption is taken in or after the year the shareholder reaches qualified age based on applicable IRS regulations. • Shares sold to pay Janney fees but only if the transaction is initiated by Janney. • Shares acquired through a right of reinstatement. • Shares exchanged into the same share class of a different fund. Front-end sales charge* discounts available at Janney: breakpoints, rights of accumulation, and/or letters of intent: • Breakpoints as described in the fund's prospectus. • Rights of accumulation (ROA), which entitle shareholders to breakpoint discounts, will be automatically calculated based on the aggregated holding of fund family assets held by accounts within the purchaser’s household at Janney. Eligible fund family assets not held at Janney may be included in the ROA calculation only if the shareholder notifies his or her financial advisor about such assets. • Letters of intent which allow for breakpoint discounts based on anticipated purchases within a fund family, over a 13-mon […] ley Wealth Management: • Employer-sponsored retirement plans (e.g., 401(k) plans, 457 plans, employer-sponsored 403(b) plans, profit sharing and money purchase pension plans and defined benefit plans). For purposes of this provision, employer-sponsored retirement plans do not include SEP IRAs, Simple IRAs, SAR-SEPs or Keogh plans • Morgan Stanley employee and employee-related accounts according to Morgan Stanley's account linking rules • Shares purchased through reinvestment of dividends and capital gains distributions when purchasing shares of the same fund • Shares purchased through a Morgan Stanley self-directed brokerage account • Class C (i.e., level-load) shares that are no longer subject to a contingent deferred sales charge and are converted to Class A shares of the same fund pursuant to Morgan Stanley Wealth Management's share class conversion program • Shares purchased from the proceeds of redemptions within the same fund family, provided (1) the repurchase occurs within 90 days following the redemption, (2) the redemption and purchase occur in the same account, and (3) redeemed shares were subject to a front-end or deferred sales charge • Your financial intermediary, on your behalf, can also convert Class M shares to Class A shares of the same fund, without a sales charge and on a tax free basis, if they are held in a brokerage account. Oppenheimer & Co. (OPCO) Shareholders purchasing fund shares through an OPCO platform or account are eligible only for the following load waivers (front-end sales charge waivers and CDSC waivers) and discounts, which may differ from those disclosed elsewhere in a fund's prospectus or SAI. Front-end Sales Load Waivers on Class A Shares available at OPCO: • Employer-sponsored retirement, deferred compensation and employee benefit plans (including health savings accounts) and trusts used to fund those plans, provided
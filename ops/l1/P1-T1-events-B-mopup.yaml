ows of\n   the Target/Acquiring fund table, a 4-fund filing yields 4 objects}, ... ]}\n  or the no_event object above.\nEach event object:\n  fund_name        target mutual fund's full name (from excerpt)\n  family           fund family/trust (from excerpt)\n  mutual_fund_ticker / etf_ticker\n                   a single 2-6 char UPPERCASE symbol from the excerpt, else \"NA\".\n                   NEVER a fund name. Multiple class tickers → \"NA\" and list them in evidence.\n  announce_date    YYYY-MM-DD only. Board-approval date if stated; else the document's own\n                   date; else the filed date. Vague (\"May 2020\",\"Q4 2026\") → \"NA\".\n  date_basis       \"board\" | \"document\" | \"filed\" | \"NA\"\n  effective_date   YYYY-MM-DD only; the stated closing/completion date. Vague → \"NA\".\n  asset_class      equity_US / equity_intl / fixed_income / other — ONLY if locatable in the\n                   excerpt (bond/muni/high-yield/MBS→fixed_income; International/EM/Asia→\n                   equity_intl; explicit US equity→equity_US; managed-futures/multi-asset/\n                   long-short→other). Name alone insufficient → \"NA\".\n  AUM_at_conversion_USD  number from excerpt or \"NA\"\n  source_accession copy from the 文件 line\n  confidence       H = fund identity + (announce or effective) with explicit basis;\n                   M = identity clear, dates partly missing/document-dated;\n                   L = identity inferred from title only\n  evidence         ≤25-word quote fragment supporting the verdict (for events: the words\n                   showing the acquirer is an ETF; for no_event: the words showing why not)\nNEED_HUMAN only when TWO date statements INSIDE THIS ONE EXCERPT contradict for the same\nfund: {\"NEED_HUMAN\": true, \"quotes\": [\"...\", \"...\"]}. Different filings never contradict.\nNever fill any field from memory — excerpt-locatable or \"NA\".\n\nSELF-CHECK before emitting (do this, don't print it): every input item id appears exactly\nonce in your answer map (count them); every event object quotes ETF-acquirer evidence;\nevery date matches ^\\d{4}-\\d{2}-\\d{2}$ or is \"NA\"; no ticker field contains a space.】\n文件: 0001398344-25-022636 (form 497, filed 2025-12-18, IMPAX FUNDS SERIES TRUST I  (CIK 0000076721))\nsource_url: https://www.sec.gov/Archives/edgar/data/76721/000139834425022636/fp0096465-4_497.htm\n节选:\n497 1 fp0096465-4_497.htm IMPAX FUNDS SERIES TRUST I Impax Global Sustainable Infrastructure Fund 30 Penhallow Street, Suite 100 Portsmouth, New Hampshire 03801 Dear Shareholder: We are writing to inform you about a transaction that will affect your investment in Impax Global Sustainable Infrastructure Fund (the “Target Fund”). You are receiving this combined Prospectus and Information Statement (the “Prospectus/Information Statement”) because you own shares in the Target Fund, a series of Impax Funds Series Trust I, a Massachusetts business trust (the “Trust”), which is managed by Impax Asset Management LLC (the “Adviser”). We are pleased to inform you of the planned reorganization of the Target Fund, a mutual fund, with and into an exchange-traded fund (“ETF”), which will be managed by the Adviser. Pursuant to an Agreement and Plan of Reorganization (the “Plan”), and as indicated below, the Target Fund will be reorganized with and into Impax Global Infrastructure ETF (the “Acquiring Fund”), a newly created series of the Trust, that has the same investment objective, investment policies, portfolio management teams, and substantially the same investment strategies as the Target Fun […]  Hampshire 03801. The telephone number for each of the Target Fund and the Acquiring Fund is (603) 431-8022. This Prospectus/Information Statement was first mailed to shareholders of the Target Fund beginning on or about December 15, 2025 This Prospectus/Information Statement explains what you should know about the reorganization of the Target Fund with and into the Acquiring Fund (the “Reorganization”) and investing in the Acquiring Fund. You should read this document carefully and retain it for future reference. THIS COMBINED PROSPECTUS/INFORMATION STATEMENT IS FOR INFORMATION PURPOSES ONLY, AND YOU DO NOT NEED TO DO ANYTHING IN RESPONSE TO RECEIVING IT EXCEPT TO CHECK FOR WHETHER YOU HAVE A BROKERAGE ACCOUNT THAT CAN ACCEPT SHARES OF AN EXCHANGE-TRADED FUND (“ETF”). WE ARE NOT ASKING YOU FOR A PROXY AND YOU ARE REQUESTED NOT TO SEND US A PROXY. The terms and conditions of the Reorganization are further described in this Prospectus/Information Statement and are set forth in the form of Agreement and Plan of Reorganization (the “Plan”). With respect to the Target Fund, the Board of Trustees of the Trust (the “Board”) unanimously approved the proposed Reorganization and the Plan and determined that participation in the Reorganization is in the best interests of the Target Fund and that the interests of existing Target Fund shareholders will not be diluted as a result of the Reorganization. Each of the Target Fund and the Acquiring Fund are series of Impax Funds Series Trust I (the “Trust”), a registered, open-end management investment company, although the Target Fund is a mutual fund while the Acquiring Fund will operate as an ETF. The Acquiring Fund is a newly organized series of the Trust and currently has no assets or liabilities. The Acquiring Fund was created specifically in connection with the Reorganization for the purpose of acquiring the assets and assuming the liabilities of the Target Fund and will not commence operations until the closing date of the Reorganization. The Target Fund will be the accounting and performance survivor in the Reorganization, and the Acquiring Fund, as the corporate survivor in the Reorganization, will adopt the accounting and performance history of the Target Fund. In ord […]  HIGHLIGHTS 30 EXHIBIT D PRINCIPAL HOLDERS OF SECURITIES 31 vi SUMMARY This is only a summary of certain information contained in this Prospectus/Information Statement. You should read the more complete information in the rest of this Prospectus/Information Statement, including the Acquiring Fund’s Prospectus (enclosed) and the Plan (which has been filed as an exhibit to the Acquiring Fund’s Registration Statement on Form N-14 of which this Prospectus/Information Statement is a part). Why am I receiving a combined Prospectus/Information Statement? You are receiving a combined Prospectus/Information Statement because you own shares of the Target Fund. It is proposed that the Target Fund, which is currently operated as a mutual fund, will be converted into an ETF through a Reorganization with and into the Acquiring Fund. The Acquiring Fund is a newly organized series of the Trust and currently has no assets or liabilities. The Acquiring Fund was created specifically in connection with the Reorganization for the purpose of acquiring the assets and assuming the liabilities of the Target Fund and will not commence operations until the closing date of the Reorganization. The Reorganization will be accomplished in accordance with the Plan between the Trust, on behalf of the Target Fund, and the Trust, on behalf of the Acquiring Fund, and, solely with respect to Section 9.2 of the Plan, Impax Asset Management LLC (the “Adviser”). Among other things, the Plan provides for: (1) the acquisition of the assets and the assumption of the liabilities of the Target Fund by the Acquiring Fund in exchange for shares of the Acquiring Fund of equal value to the net assets of the Target Fund being acquired (“Acquiring Fund Shares”); (2) the pro rata distribution of the Acquiring Fund Shares to the shareholders of the Target Fund, and (3) the complete liquidation of the Target Fund, all upon the terms and conditions set forth in the Plan. In accordance with the Trust’s organizational documents and applicable Massachusetts state and U.S. federal law (including Rule 17a-8 under the Investment Company Act of 1940, as amended (the “1940 Act”), the Reorganization can be effected without the approval of shareholders of the Target Fund. The […] f the Target Fund will receive shares of the Acquiring Fund with an equivalent aggregate NAV of the Acquiring Fund. In particular, the Plan provides that (1) the assets of the Target Fund will be acquired by the Acquiring Fund and the liabilities of the Target Fund will be assumed by the Acquiring Fund in exchange for Acquiring Fund Shares of equal value to the net assets of the Target Fund; and (2) the Acquiring Fund Shares received by the Target Fund in the exchange will then be distributed pro rata to shareholders of the Target Fund. After the Acquiring Fund Shares are distributed to the Target Fund’s shareholders, the Target Fund will be completely liquidated. The Plan also provides that Investor Class shares of the Target Fund will be converted into Institutional Class shares with the same aggregate NAV (without a contingent deferred sales charge or other charge) prior to the Reorganization. Following such conversion but prior to the closing of the Reorganization, the Target Fund shall redeem all fractional shares of the Target Fund outstanding on the records of the Target Fund’s transfer agent. How will the Reorganization affect me as a shareholder? If the Reorganization is completed, you will cease to be a shareholder of the Target Fund. In order to receive shares of the Acquiring Fund as part of the Reorganization, you must hold your shares of the Target Fund through a brokerage account that can accept shares of an ETF (the Acquiring Fund) on the closing date of the Reorganization. If you hold your shares of the Target Fund through a brokerage account that can accept shares of an ETF on the closing date of the Reorganization, you will automatically become a shareholder of the Acquiring Fund. If you do not hold your shares of the Target Fund through a brokerage account that can accept shares of the Acquiring Fund on the closing date of the Reorganization, you will not receive shares of the Acquiring Fund as part of the Reorganization. Instead, your investment will be liquidated, and you will receive cash equal in value to the NAV of your Target Fund shares. Such liquidation generally will be a taxable event for shareholders who hold Target Fund shares in a taxable account. For more information about the \n"

    Preferred securities are also subject to duration risk as they are long-duration instruments, typically
    callable only at the option of the issuer. They are also subject to the risk that if the company is
    taken over by another company with higher leverage than the current issuer, coverages and other credit
    metrics could decline making the preferred security less valuable. 23 Convertible Securities Risk.
    The market values of convertible securities are affected by market interest rates, the risk of issuer
    default on interest or principal payments and the value of the underlying common stock into which

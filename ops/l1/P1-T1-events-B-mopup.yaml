ars exactly\nonce in your answer map (count them); every event object quotes ETF-acquirer evidence;\nevery date matches ^\\d{4}-\\d{2}-\\d{2}$ or is \"NA\"; no ticker field contains a space.】\n文件: 0001104659-21-095467 (form N-14, filed 2021-07-23, Aberdeen Funds  (CIK 0001413594))\nsource_url: https://www.sec.gov/Archives/edgar/data/1413594/000110465921095467/tm2121638d3_n14.htm\n节选:\nN-14 1 tm2121638d3_n14.htm N-14 As filed with the Securities and Exchange Commission on July 23, 2021 1933 Act File No. [ ] U.S. SECURITIES AND EXCHANGE COMMISSION Washington, D.C. 20549 FORM N-14 REGISTRATION STATEMENT UNDER THE SECURITIES ACT OF 1933 Pre-Effective Amendment No. o Post-Effective Amendment No. ¨ (Check appropriate box or boxes) ABERDEEN FUNDS (Exact Name of Registrant as Specified in Charter) 1900 Market Street, Suite 200 Philadelphia, Pennsylvania 19103 (Address of Principal Executive Offices) (Zip Code) (Registrant’s Telephone Number, including Area Code): (866) 667-9231 Lucia Sitar, Esq. c/o Aberdeen Standard Investments Inc. 1900 Market Street, Suite 200 Philadelphia, PA 19103 (Name and Address of Agent for Service of Process) Copy to: Thomas C. Bogle, Esq. Dechert LLP 1900 K Street, NW Washington, DC 20006-1110 Approximate Date of Proposed Public Offering: As soon as practicable after this Registration Statement becomes effective under the Securities Act of 1933. Title of Securities Being Registered: Shares of Beneficial Interest, no par value. It is proposed that this filing will become effective on August 22, 2021, pursuant to Rule 488 under the Securities A […] turings or other corporate reorganizations. In addition, the Fund may invest in U.S. and non-U.S. Dollar denominated securities issued by foreign public or private sector entities, including those based in the emerging markets. The Fund may invest in debt securities of U.S. or foreign corporate issuers, the U.S. Government, foreign governments, municipalities, domestic or foreign governmental entities or supranational organizations, such as the International Bank for Reconstruction and Development (the World Bank). The Fund may purchase both sovereign debt that trades within the country in which it is issued and sovereign debt that is tradable outside of the country of issuance. The Fund invests in fixed income securities, debt instruments convertible into common stock, preferred stock and swaps. The Fund invests in financial instruments issued by corporations, banks, governments, government entities and supranational organizations. The Fund ordinarily invests in no fewer than three different countries outside the U.S. Under normal market conditions, the Fund will invest at least 40% of its net assets, plus any borrowings for investment purposes, in securities of non-U.S. issuers. However, the Fund may invest a lesser amount of its assets in securities of non-U.S. issuers when market conditions are not deemed favorable, in which case the Fund would invest at least 30% of its net assets plus any borrowings for investment purposes, in securities of non-U.S. issuers. An issuer is considered a non-U.S. issuer if Fund management determines that the company meets one or more of the following criteria: ● the company is organized under the laws of, or has its principal office in, a country outside the U.S.; ● the company has its principal securities trading market in a country outside the U.S.; and/or 16 ● the company derives the majority of its annual revenue or earnings or assets from goods produced, sales made or services performed in a country outside the U.S. The Fund may invest in debt securities of any maturity. The Fund may invest in restricted securities and private placements including securities issued under Rule 144A and/or Regulation S (“Regulation S Securities”). The Fund may invest in debt-like instruments (for example, structured notes and equity baskets) that provide exposure to equity markets or indices. The Fund may invest in preferred stocks, asset-backed securities, debt instruments convertible into common stock, income trusts, and swaps. The Fund may invest in bank loans, which include floating and fixed-rate debt securities generally acquired as a participation interest in, or assignment of, a loan originated by a lender or financial institution. The Fund may invest in, enter into, or acquire participation in, delayed funding loans and revolving credit facilities. The Fund may invest up to 20% of its net assets in global equity securities. The Fund may invest in equity warrants, index warrants, covered warrants, interest rate warrants and long term options of, or relating to, international issuers that trade on an exchange or over-the-counter (“OTC”). To achieve its investment goal, the Fund uses derivatives under certain market conditions. The Fund may use derivatives as a substitute for taking a position or reducing exposure to underlying assets. The Fund expects that derivative instruments will include the purchase and sale of futures contracts, forward contracts, non-deliverable forwards, swaps (including credit default swaps), options (including options on futures and options on swaps), warrants, and structured notes. In complying with the minimum and maximum investment limitations set forth above, each Fund may include investments in derivatives with an underlying asset with economic characteristics similar to the investments included in such limitation. Investment Restrictions The Funds have certain similar investment restrictions; however, the  […] proved and you do not wish to have your Target Fund shares exchanged for shares of the Acquiring Fund, you should redeem your shares prior to the completion of the Reorganization. If you redeem your shares, you will recognize a taxable gain or loss based on the difference between your tax basis in the shares and the amount you receive for them. What should I know about shares of each Acquiring Fund? If a Reorganization is approved by the Target Fund’s shareholders, full and fractional shares of the corresponding Acquiring Fund will be distributed to shareholders of the Target Fund in accordance with the procedures described above. When issued, each share will be validly issued, fully paid, and non-assessable and will have no pre-emptive or conversion rights. The shares of the Acquiring Fund will be recorded electronically in each shareholder’s account. The Acquiring Fund will then send a confirmation to each shareholder. As of the Closing Date, outstanding certificates, if any, representing shares of the Target Fund will be canceled. What are the capitalizations of the Funds and what might the capitalizations be after each Reorganization? The capitalization table below this paragraph sets out, as of June 30, 2021, the capitalizations of the Target Fund and the Acquiring Fund, and the estimated capitalization of the Acquiring Fund as adjusted to give effect to the Reorganization. The following are examples of the number of shares of the Acquiring Fund that would be exchanged for the shares of the Target Fund if the Reorganization were consummated on June 30, 2021, and do not reflect the number of shares or value of shares that would actually be received if the Reorganization occurs. Each shareholder of the Target Fund will receive the number of full and fractional shares of the Acquiring Fund equal in value to the value (as of the last Business Day prior to the Closing Date) of the shares of the Target Fund. International Sustainable Leaders Fund (Target) (unaudited) International Sustainable Leaders Fund (Acquiring) (unaudited) Pro forma Adjustments to Capitalization (unaudited) International Sustainable Leaders Fund after Reorganization (Combined Fund) (estimated) Net Assets Class A $ 118,560,527 $ 118,560,527 […] proceedings and is not a party to or subject to the provisions of any order, decree or judgment of any court or governmental body which materially and adversely affects its business or its ability to consummate the transactions contemplated herein; (d) To the knowledge of the AF Trust, the Acquiring Fund will meet the requirements of Subchapter M of the Code for qualification as a regulated investment company from and including the taxable year that includes the Closing Date and will be eligible to, and will, compute its federal income tax under Section 852 of the Code; (e) The Acquiring Fund does not have outstanding any options, warrants or other rights to subscribe for or purchase any of its shares, nor is there outstanding any security convertible into any of its shares; (f) The information to be furnished by the Acquiring Fund for use in applications for orders, registration statements or proxy materials or for use in any other document filed or to be filed with any federal, state or local regulatory authority (including the Financial Industry Regulatory Authority), which may be necessary in connection with the transactions contemplated hereby, shall be accurate and complete in all material respects and shall comply in all material respects with federal securities and other laws and regulations applicable thereto; (g) The current prospectus and statement of additional information of the Acquiring Fund on Form N-1A conform in all material respects to the applicable requirements of the 1933 Act and the 1940 Act and the rules and regulations of the Commission thereunder and do not include any untrue statement of a material fact or omit to state any material fact required to be stated therein or necessary to make the statements therein, in light of the circumstances under which they were made, not materially misleading; and (h) The Acquiring Fund agrees to use all reasonable efforts to obtain the approvals and authorizations required by the 1933 Act, the 1940 Act and such of the state blue sky or securities laws as it may deem appropriate in order to continue its operations after the Closing Date. 4.2. The AIF Trust, on behalf of the Acquired Fund, represents and warrants that: (a) The Acquired Fund is not, an […] as a regulated investment company and has elected to be treated as such and has been eligible to and has computed its federal income tax under Section 852 of the Code; and (ii) the Acquired Fund will have distributed all of its investment company taxable income and net capital gain (as defined in the Code) that has accrued through the Closing Date; (i) All of the issued and outstanding shares of common stock of the Acquired Fund will, at the time of Closing, be held by the persons and in the amounts set forth in the records of the transfer agent as provided in paragraph 3.4. The Acquired Fund does not have outstanding any options, warrants or other rights to subscribe for or purchase any of its shares, nor is there outstanding any security convertible into any of its shares; (j) At the Closing Date, the Acquired Fund will have good and marketable title to the Acquired Fund’s assets to be transferred to the Acquiring Fund pursuant to paragraph 1.2 and full right, power and authority to sell, assign, transfer and deliver such assets hereunder. Upon delivery and payment for such assets, the Acquiring Fund will acquire good and marketable title thereto, subject to no restrictions on the full transfer thereof, except such restrictions as might arise under the Securities Act of 1933, as amended (the “1933 Act”), and the 1940 Act with respect to privately placed or otherwise restricted securities that the Acquired Fund may have acquired in the ordinary course of business and of which the Acquiring Fund has received notice and necessary documentation at or prior to the Closing; (k) The information to be furnished by the Acquired Fund for use in applications for orders, registration statements or proxy materials or for use in any other document filed or to be filed with any federal, state or local regulatory authority (including the Financial Industry Regulatory Authority), which may be necessary in connection with the transactions contemplated hereby, shall be accurate and complete in all material respects and shall comply in all material respects with federal securities and other laws and regulations applicable thereto; A- 4 (l) The current prospectus and statement of additional information of AIF Trust with respect t\n"

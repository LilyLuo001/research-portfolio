    fees and fees paid to the transfer agent, custodian and distributor for the Acquiring ETFs for services
    unique to Acquiring ETFs. These are largely fixed expenses which do not increase as the ETFs grow
    or based on individual shareholder activity. To offset the likelihood that these expenses will exceed

” or “junk” securities). Subsequent to the Reorganization, the Acquiring Fund may also invest in fixed income securities without regard to quality, maturity, or rating, including up to 10% of its total assets 7 Table of Contents in high- yield-high risk securities, and up to 20% of its total assets in common stocks of small size U.S. companies, convertible securities, and foreign securities. The Target Fund and Acquiring Fund have similar Principal Investment Risks. A comparison of the Investment Objectives, Principal Investment Strategies and Principal Investment Risks of the Target Fund and Acquiring Fund are set forth below under “Comparison of the Funds.” Advisory Fees The Target Fund currently pays GWCM an investment advisory fee equal to 0.47% of the Target Fund’s average daily net assets, while the Acquiring Fund currently pays GWCM an investment advisory fee equal to 0.74% of its average daily net assets on assets up to $1 billion, 0.69% of the average daily net on assets over $1 billion, and 0.64% of the average daily net assets on assets over $2 billion. Effective at the Closing Date, the Acquiring Fund will pay GWCM a reduced investment advisory fee equal to 0.61% of its average daily net assets on assets up to $1 billion, 0.56% of the average daily net on assets over $1 billion, and 0.51% of the average daily net assets on assets over $2 billion of the Acquiring Fund. Institutional Class Shares of the Acquiring Fund Following the Reorganization, shareholders of the Institutional Class shares of the Target Fund will become shareholders of the Institutional Class shares of the Acquiring Fund. Because the Acquiring Fund’s advisory fee is higher than the advisory fee of the Target Fund, the Reorganization is expected to result in a higher total expense ratio for shareholders of the Target Fund’s Institutiona […] n stocks of midsize and large U.S. companies, with a focus on value stocks that offer the potential for capital growth, current income, or both. The Target Fund may invest up to 25% of its total assets in foreign securities, and may also invest in fixed income securities without regard to quality, maturity or rating, including up to 10% of its total assets in below investment grade fixed income securities (“high yield-high risk” or “junk” securities). The Acquiring Fund may also invest in fixed income securities without regard to quality, maturity, or rating, including up to 10% of its total assets in high- yield-high risk securities. The Acquiring Fund may invest up to 20% of its total assets in common stocks of small size U.S. companies, convertible securities, and foreign securities. The Target Fund and Acquiring Fund also have similar Principal Investment Risks. A comparison of the Investment Objectives, Principal Investment Strategies and Principal Investment Risks of the Target Fund and Acquiring Fund are set forth below. 12 Table of Contents Investment Objectives The Funds have substantially similar investment objectives. Each Fund’s investment objective may be changed without shareholder approval upon providing notice to shareholders at least 60 days in advance. Investment Objective – Target Fund Investment Objective – Acquiring Fund The Target Fund seeks substantial dividend income and long-term capital appreciation. The Acquiring Fund seeks capital growth and current income. Fees and Expenses The following tables allow you to compare the various fees and expenses that you may pay for buying and holding shares of each Fund. Pro forma fees and expenses project anticipated expenses of the Acquiring Fund assuming the estimated fees and expenses for the Acquiring Fund as of the Closing Date with the new advisory fee, Acquiring Fund Expense Limit, and Expense Cap are in place (collectively, the “New Expense Structure”). The table below does not describe the fees and expenses of any Permitted Accounts. If the fees and expenses of any Permitted Account were reflected, the fees and expenses shown would be higher. Annual Fund Operating Expenses (expenses that you pay each year as a percentage of the value of yo […] t the portfolio managers believe are currently undervalued by the market and other measures. If the portfolio managers are correct and other investors recognize the value of the company, the price of its stock may rise. The Fund will invest in companies which have one or more of the following characteristics: established operating histories; above-average current dividend yields relative to the Russell 1000 ® Value Index; sound balance sheets and other positive financial characteristics; low price/earnings ratio relative to the Russell 1000 Value Index; and low stock price relative to a company’s underlying value as measured by assets, cash flow or business franchises. The Fund may also invest in common stocks of small size U.S. companies, convertible securities, and companies from outside the United States, as well as fixed income securities without regard to quality, maturity, or rating, including up to 10% of its total assets in below investment grade fixed income securities (“high yield-high risk” or “junk” securities). The Fund may at times focus its investments in certain sectors, such as the financial sector. 17 Table of Contents Principal Investment Strategies - Target Fund Principal Investment Strategies - Acquiring Fund as of Closing Date The Fund generally seeks investments in large-capitalization companies. The Sub-Adviser seeks a yield, which reflects the level of dividends paid by the Fund that exceeds the yield of the Russell 1000 Value Index. In pursuing the Fund’s investment objective, the Sub-Adviser has the discretion to purchase some securities that do not meet its normal investment criteria. These situations might arise when the Sub-Adviser believes a security could increase in value for a variety of reasons, including a change in management, an extraordinary corporate event, a new product introduction or innovation, or a favorable competitive development. The Fund’s investment portfolio is managed by two Sub-Advisers: Putnam and T. Rowe Price. Putnam seeks to invest mainly in common stocks of midsize and large U.S. companies, with a focus on value stocks that offer the potential for capital growth, current income, or both. T. Rowe Price seeks to invest in large-capitalization stocks that h […] ing markets issuers often are subject to rapid and large changes in price. 19 Table of Contents Currency Risk - Adverse fluctuations in exchange rates between the U.S. Dollar and other currencies may cause the Fund to lose money on investments denominated in foreign currencies. Fixed Income Securities Risk - Investments in fixed income securities will be subject to risk associated with changes in interest rates generally and the credit quality of the individual fixed income securities held. Management Risk - A strategy used by the portfolio managers may fail to produce the intended results. While the above principal risks of each Fund are identical, the Acquiring Fund as of the Closing Date is also subject to the following principal risks: Convertible Securities Risk - Convertible securities, particularly securities that are convertible into securities of an issuer other than the issuer of the convertible securities, may be illiquid. Multi-Manager Risk - Each Sub-Adviser makes investment decisions independently. It is possible that the security selection process of the Sub-Advisers may not complement one another and the Fund may have buy and sell transactions in the same security on the same day. The Sub-Advisers selected may underperform the market generally or other sub-advisers that could have been selected. Fundamental Investment Restrictions The Funds have identical fundamental investment restrictions that cannot be changed without shareholder approval. In addition, each Fund is a diversified fund. As a diversified fund, each Fund, with respect to 75% of its assets, may not invest more than 5% of its total assets in the securities of any one issuer (other than securities issued by other investment companies or by the U.S. government, its agencies, instrumentalities or authorities) and may not purchase more than 10% of the outstanding voting securities of any one issuer. Performance Information The bar charts and tables below provide an indication of the risk of investment in the Funds by showing the performance of the Funds’ Investor Class shares in each full calendar year since inception and by comparing the Target Fund’s Institutional Class, Investor Class, and Class L and the Acquiring Fund’s Institutio\n"

ted tax-free treatment of the Reorganization. In order to accomplish the Reorganization, the Board approved an Agreement for the Mutual Fund. Pursuant to the Agreement, the Mutual Fund will transfer its assets to the ETF in exchange for ETF shares and the assumption by the ETF of the Mutual Fund’s liabilities. As a result of the Reorganization, the Mutual Fund will be converted into an ETF. 1 If the Reorganization satisfies those certain closing conditions set forth in the Agreement, the Reorganization is currently expected to be completed on or about February 9, 2026. Upon completion of the Reorganization, shareholders who hold their Mutual Fund shares in a brokerage account eligible to hold ETF shares (a “Qualifying Brokerage Account,” as further explained in the Q&A) will receive ETF shares having an aggregate net asset value equal to the aggregate net asset value of their Mutual Fund shares held immediately prior to the Reorganization, plus any cash in lieu of fractional shares, if applicable. As a result, such shareholders will become shareholders of the ETF and will no longer be shareholders of the Mutual Fund. The Mutual Fund will then be dissolved. The proposed Reorganization is expected to qualify as a tax-free transaction for federal income tax purposes. However, because ETF shares are not issued in fractional shares, shareholders who hold fractional shares of the Mutual Fund may have such fractional shares redeemed at net asset value immediately prior to the Reorganization. Any such cash payment may be treated as a taxable transaction for federal income tax purposes. Following the Reorganization, Pabrai, the Mutual Fund’s investment adviser, will continue to serve as the ETF’s investment adviser and make the day-to-day investment portfolio decisions for the ETF. The Mutual Fund’s current portfolio manager will continue to serve  […] der holding Retail Class Shares of the Mutual Fund will receive Institutional Class Shares of the Mutual Fund having an aggregate net asset value equal to the aggregate net asset value of the shareholder’s Retail Class Shares. Institutional Class Shares . Following the Share Class Consolidation, the Mutual Fund will have a single class of Institutional Shares. Effective on or about January 23, 2026, the Adviser has agreed to waive its fees and/or pay the Mutual Fund’s expenses such that the total expense ratio of the Institutional Class Shares will not exceed 0.90% of the average daily net assets of the Institutional Class Shares. Upon the closing of the Reorganization expected on or about February 9, 2026, the Institutional Shares will be converted into ETF shares pursuant to the Agreement and Plan of Reorganization. Moving Your Mutual Fund Shares to a Brokerage Account In order to receive shares of the ETF as part of the Reorganization, shareholders must hold their shares of the Mutual Fund through a Qualifying Brokerage Account. If shareholders already hold their shares in a brokerage account that can hold ETF shares, no action is necessary. Please see the Q&A that follows for additional information on different types of accounts that may not be able to hold ETF shares, as well as instructions describing how to transfer mutual fund shares to a Qualifying Brokerage Account that can receive ETF shares as part of the Reorganization. Suspension of Purchases and Redemptions In anticipation of the closing of the Reorganization, the final date to purchase or redeem Mutual Fund shares will be on or about February 2, 2026. The Mutual Fund will no longer be able to open shareholder accounts 2 directly through the Mutual Fund’s transfer agent, U.S. Bank Global Fund Services. Shareholders must open a brokerage account through a financial intermediary. More Information about Trading an ETF There are some differences between a traditional mutual fund and an ETF. After the Reorganization, ETF shares may only be traded through a brokerage account, and transactions will be executed on an exchange at prevailing market prices. Because ETF shares will trade at market prices rather than at NAV, ETF shares may trade at a price le\n"

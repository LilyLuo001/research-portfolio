ars exactly\nonce in your answer map (count them); every event object quotes ETF-acquirer evidence;\nevery date matches ^\\d{4}-\\d{2}-\\d{2}$ or is \"NA\"; no ticker field contains a space.】\n文件: 0001193125-21-150257 (form 497, filed 2021-05-04, WILLIAM BLAIR FUNDS  (CIK 0000822632))\nsource_url: https://www.sec.gov/Archives/edgar/data/822632/000119312521150257/d281394d497.htm\n节选:\n497 1 d281394d497.htm WILLIAM BLAIR FUNDS William Blair Funds WILLIAM BLAIR FUNDS 150 NORTH RIVERSIDE PLAZA CHICAGO, ILLINOIS 60606 (312) 364-8000 1-800-635-2886 (In Massachusetts 1-800-635-2840) STATEMENT OF ADDITIONAL INFORMATION Growth Fund Class (Ticker): N (WBGSX) I (BGFIX) R6 (BGFRX) Large Cap Growth Fund Class (Ticker): N (LCGNX) I (LCGFX) R6 (LCGJX) Mid Cap Growth Fund Class (Ticker): N (WCGNX) I (WCGIX) R6 (WCGJX) Small-Mid Cap Core Fund Class (Ticker): I (WBCIX) R6 (WBCRX) Small-Mid Cap Growth Fund Class (Ticker): N (WSMNX) I (WSMDX) R6 (WSMRX) Small Cap Growth Fund Class (Ticker): N (WBSNX) I (WBSIX) R6 (WBSRX) Small Cap Value Fund Class (Ticker): N (WBVDX) I (BVDIX) R6 (BVDRX) Global Leaders Fund Class (Ticker): N (WGGNX) I (WGFIX) R6 (BGGIX) International Leaders Fund Class (Ticker): N (WILNX) I (WILIX) R6 (WILJX) International Growth Fund Class (Ticker): N (WBIGX) I (BIGIX) R6 (WBIRX) Institutional International Growth Fund Ticker: (WBIIX) International Small Cap Growth Fund Class (Ticker): N (WISNX) I (WISIX) R6 (WIISX) Emerging Markets Leaders Fund Class (Ticker): N (WELNX) I (WBELX) R6 (WELIX) Emerging Markets Growth Fund Class (Ticker): N (WBENX) I (WBEIX) R6 (BIE […]  and on the Funds’ website (https://www.williamblairfunds.com/investor_services/prospectus_reports_forms.fs). TABLE OF CONTENTS Page MANAGEMENT OF THE TRUST 1 Investment Adviser 1 Distributor 11 Other Payments to Third Parties and Affiliates 13 Code of Ethics 15 Proxy Voting Policy 15 Trustees and Officers 16 Board of Trustees 21 Trustee Qualifications 23 Trustee Compensation 24 Trustees’ and Officers’ Holdings of Fund Shares 25 Trustees’ Holdings in Certain Affiliates of the Adviser 26 Principal Shareholders 26 Brokerage and Fund Transactions 46 Disclosure of Portfolio Holdings 50 INVESTMENT POLICIES AND RESTRICTIONS 51 INVESTMENT PRACTICES AND RISKS 55 Borrowings 55 Business Development Companies (“BDCs”) 55 Collateralized Obligations 55 Convertible Securities 61 Derivative Instruments 61 Equity Securities 73 Exchange-Traded Notes 73 Fixed Income Securities 74 Foreign Securities 74 Forward Foreign Currency Transactions 80 Foreign Currency Futures 81 High-Yield/High-Risk Securities 81 Hybrid Bonds 82 Illiquid Securities 82 Investment Companies (each Fund except the Macro Allocation Fund) 82 Investment Companies (Macro Allocation Fund) 83 Large Redemptions 85 Large Trade Notifications 85 Lending 86 Limited Liability Companies (“LLCs”) 86 Market Conditions and Events 86 New Companies 87 Non-Diversification Risk 87 Publicly Traded Partnerships 87 Real Estate Investment Trusts (“REITs”) 88 Repurchase Agreements 88 Restricted Securities 88 Reverse Repurchase Agreements 88 Royalty Income Trusts 89 Section 4(a)(2) Paper 89 Short Sales 89 i Page Short-Term Trading 90 Small Companies 90 Special Purpose Acquisition Companies 90 Temporary Defensive Position 90 U.S. Government Securities 91 Variable Rate Securities 91 Warrants 92 When-Issued or Delayed Delivery Transactions 92 ADDITIONAL INFORMATION ABOUT THE FUNDS 92 General 92 Summary of Fees Paid to William Blair for Class N Shares 93 Summary of Fees Paid to William Blair for Class I Shares 94 Summary of Fees Paid to William Blair for Class R6 Shares and Institutional Funds 94 Share Certificates 94 Suspension of Redemption or Delay in Payment 94 Special Redemptions 94 Exchange Privileges 94 Conversion Privilege 95 GENERAL TRUST INFORMATION 95 Determination of Net Asset Value 95 Federal Income Tax Matters 96 Independent Registered Public Accounting Firm 104 Custodian 104 Transfer Agent Services 104 Reports to Shareholders 104 SHAREHOLDER RIGHTS 105 Derivative Claims of Shareholders 105 Forum for Adjudication of Disputes 106 TRUST HISTORY 106 FINANCIAL INFORMATION OF THE TRUST 106 APPENDIX A - RATINGS OF DEBT OBLIGATIONS A-1 ii MANAGEMENT OF THE TRUST Investment Adviser. As stated in the Prospectus, William Blair Investment Management, LLC (“Adviser” or “WBIM”) is the investment adviser and manager for each Fund. Pursuant to a management agreement (the “Management Agreement”), the Adviser acts as each Fund’s adviser, manages its investments, administers its business affairs, furnishes office facilities and equipment, provides clerical, bookkeeping and administrative services, provides shareholder and information services and permits any of its partners or employees to serve without compensation as trustees or officers of the Fund if elected to such positions. In addition to the management fee, each Fund pays the expenses of its operations, including a portion of the Trust’s general administrative expenses, allocated on the basis of the Fund’s net assets. Expenses that will be borne directly by each Fund include, but are not limited to, the following: the fees and expenses of independent auditors, counsel, custodian and transfer agent, costs of reports and notices  […]  least 80% of its net assets (plus the amount of any borrowings for investment purposes) in stocks of small and mid cap companies. Under normal market conditions, the Small Cap Growth Fund invests at least 80% of its net assets (plus the amount of any borrowings for investment purposes) in stocks of small cap companies. Under normal market conditions, the Small Cap Value Fund invests at least 80% of its net assets (plus the amount of any borrowings for investment purposes) in equity securities of small cap companies. 53 Under normal market conditions, the Global Leaders Fund invests at least 80% of its total assets in a diversified portfolio of equity securities, including common stock and other forms of equity investment (e.g., securities convertible into common stocks), issued by companies of all sizes worldwide that the Adviser believes have above-average growth, profitability and quality characteristics. Under normal market conditions, the International Growth Fund and Institutional International Growth Fund each invest at least 80% of its total assets in a diversified portfolio of equity securities, including common stock and other forms of equity investment (e.g., securities convertible into common stocks), issued by companies of all sizes domiciled outside the U.S. that the Adviser believes have above-average growth, profitability and quality characteristics. Under normal market conditions, the International Small Cap Growth Fund invests at least 80% of its net assets (plus the amount of any borrowings for investment purposes) in stocks of small cap companies. Under normal market conditions, the Emerging Markets Leaders Fund invests at least 80% of its net assets (plus the amount of any borrowings for investment purposes) in emerging markets securities. Under normal market conditions, the Emerging Markets Growth Fund invests at least 80% of its net assets (plus the amount of any borrowings for investment purposes) in emerging markets securities. Under normal market conditions, the Emerging Markets Small Cap Growth Fund invests at least 80% of its net assets (plus the amount of any borrowings for investment purposes) in equity securities of emerging market small cap companies. Under normal market conditions, the Bond Fund invests at least 80% of its net assets (plus the amount of any borrowings for investment purposes) in bonds. Each Fund will provide shareholders with at least 60 days’ prior notice of any change in its 80% investment policy. With respect to the Growth Fund, the Large Cap Growth Fund, the Mid Cap Growth Fund, the Small-Mid Cap Core Fund, the Small-Mid Cap Growth Fund, the Small Cap Growth Fund and the Small Cap Value Fund: each F […] xceed its stated final maturity. The coupon of an inverse floating rate note moves inversely to the movement of interest rates. In addition, mortgage-backed inverse floaters will experience approximately the same changes in average lives and durations that other comparable fixed-rate mortgage-backed bonds do when prepayments rise and fall with declines and increases in interest rates. In a rising interest rate environment, the declining coupon coupled with the increase in the average life can magnify the price decline relative to a fixed-rate obligation. Conversely, rate declines increase coupon income and gradually shorten the average life, which tends to amplify the price increase. Inverse floaters are typically priced based on a matrix. Convertible Securities. Convertible securities are bonds, notes, debentures, preferred stocks and other securities that are convertible into common stock. Investments in convertible securities can provide an opportunity for capital appreciation and/or income through interest and dividend payments by virtue of their conversion or exchange features. The convertible securities in which the Funds may invest are either fixed income or zero coupon debt securities that may be converted or exchanged at a stated or determinable exchange ratio into underlying shares of common stock. The exchange ratio for any particular convertible security may be adjusted from time to time due to stock splits, dividends, spin-offs, other corporate distributions or scheduled changes in the exchange ratio. Convertible debt securities and convertible preferred stocks, until converted, have general characteristics similar to both debt and equity securities. Although to a lesser extent than with debt securities generally, the market value of convertible securities tends to decline as interest rates increase and, conversely, tends to increase as interest rates decline. In addition, because of the conversion or exchange feature, the market value of convertible securities typically changes as the market value of the underlying common stock changes, and, therefore, also tends to follow movements in the general market for equity securities. A unique feature of convertible securities is that as the market price of the underlying common stock declines, convertible securities tend to trade increasingly on a yield basis, and so may not experience market value declines to the same extent as the underlying common stock. When the market price of the underlying common stock increases, the prices of the convertible securities tend to rise as a reflection of the value of the underlying common stock, although typically not as much as the underlying common stock. While no securities investments are without risk, investments in convertible securities generally entail less risk than investments in common stock of the same issuer. The Bond Fund will not convert or exchange convertible securities it owns into the underlying shares of common stock. As debt securities, convertible securities are investments that provide for a stream of income (or in the case of zero coupon securities, accretion of income) with generally higher yields than common stocks. Convertible securities generally offer lower yields than non-convertible securities of similar quality because of their conversion or exchange features. Of course, like all debt securities, there can be no assurance of income or principal payments because the issuers of the convertible securities may default on their obligations. Convertible securities generally are subordinated to other similar but non-convertible securities of the same issuer, although convertible bonds, as corporate debt obligations, enjoy seniority in right of payment to all equity securities, and convertible preferred stock is senior to common stock, of the same issuer. However, because of the subordination feature, convertible bonds and convertible preferred stock typically have lower ratings than similar non-convertible securities. Convertible securities may be issued as fixed income obligations that pay current income or as zero coupon notes and bonds. Derivative Instruments. In General . The Growth Fund, Large Cap Growth Fund, Mid Cap Growth Fund, Small-Mid Cap Core Fund, Small-Mid Cap Growth Fund, Small Cap Growth Fund, Small Cap Value Fund, 61 Global Leaders Fund, International Leaders Fund, International Growth Fund, Institutional International Growth Fund, International Small Cap Growth Fund, Emerging Markets Leaders Fund, Emerging Markets Growth Fund, Emerging Markets Small Cap Growth Fund, Bond Fund, Income Fund and Low Duration Fund may use derivative instruments for the purpose of bona fide hedging or risk management as well as to equitize cash in situations involving large cash inflows or anticipated large redemptions. The Macro Allocation Fund uses derivatives as part of its principal investment strategies. Derivative instruments are commonly defined to include securities or contracts whose values depend on (or “derive” from) the value of one or more other assets, such as securities, currencies or commodities. These “other assets” are commonly referred to as “underlying assets.” A derivative instrument generally consists of, is based upon or exhibits characteristics similar to options or forward contracts. Options and forward contracts are considered to be the basic “building blocks” of derivatives. For example, forward-based derivatives include forward contracts, swap contracts, as well as exchange-traded futures. Option-based derivatives include privately negotiated, over-the-counter (“OTC”) options (including caps, floors, collars and options on forward and swap contracts) and exchange-traded options on futures. Diverse types of derivatives may be created by combining options or forward contracts in different ways, and by applying these structures to a wide range of underlying assets. An option is a contract in which the “holder” (the buyer) pays a certain amount (“premium”) to the “writer” (the seller) to obtain the right, but not the obligation, to buy from the writer (in a “call”) or sell to the writer (in a “put”) a specific asset at an agreed upon price at or before a certain time. The holder pays the premium at inception and has no further financial obligation. The holder of an option-based derivative generally will benefit from favorable movements in the price of the underlying asset but is not exposed to corresponding losses due to adverse movements in the value of the underlying asset. The writer of an option-based derivative generally will receive fees or premiums but generally is exposed to losses due to changes in the value of the underlying asset. A forward is a sales contract between a buyer (holding the “long” position) and a seller (holding the “short” position) for an asset with delivery deferred until a future date. The buyer agrees to pay a fixed price at the agreed future date and the seller agrees to deliver the asset. The seller hopes that the market price on the delivery date is less than the agreed upon price, while the buyer hopes for the contrary. The change in value of a forward-based derivative generally is roughly propo […] . Managing Risk . The Funds may also use derivative instruments to manage the risks of its portfolio. Risk management strategies include, but are not limited to, facilitating the sale of portfolio securities, managing the 62 effective maturity or duration of debt obligations in its portfolio, establishing a position in the derivatives markets as a substitute for buying or selling certain securities, or creating or altering exposure to certain asset classes, such as equity, debt or foreign securities. The use of derivative instruments may provide a less expensive, more expedient or more specifically focused way to invest than “traditional” securities (i.e., stocks or bonds) would. Exchange and OTC Derivatives . Derivative instruments may be exchange-traded or traded in OTC transactions between private parties. Exchange-traded derivatives are standardized derivatives contracts traded on a regulated exchange. Exchange contracts are generally very liquid. The exchange clearinghouse is the counterparty of every contract. Thus, each holder of an exchange contract bears the credit risk of the clearinghouse (and has the benefit of its financial strength) rather than that of a particular counterparty. OTC transactions are subject to additional risks, such as the credit risk of the counterparty to the instrument, and are less liquid than exchange-traded derivatives since they often can only be closed out with the other party to the transaction. Risks and Special Considerations . The use of derivative instruments involves risks and special considerations as described below. Risks pertaining to particular derivative instruments are described in the sections that follow. (1) Market Risk. The primary risk of derivatives is the same as the risk of the underlying assets, namely that the value of the underlying asset may go up or down. Adverse movements in the value of an underlying asset can expose the Funds to losses. Derivative instruments may include elements of leverage and, accordingly, the fluctuation of the value of the derivative instrument in relation to the underlying asset may be magnified. The successful use of derivative instruments depends upon a variety of factors, particularly the ability to predict movements o\n"

rrowings. Certain trading practices and investments, such as reverse repurchase agreements, may be considered to be borrowings and thus subject to the 1940 Act restrictions. Each Fund also has obtained exemptive relief from the SEC to permit it to borrow money from other funds for temporary purposes. For purposes of the fundamental policy relating to commodities set forth in (2) above, a Fund does not consider foreign currencies or forward contracts to be physical commodities. This limitation does not prohibit a Fund from purchasing securities backed by physical commodities, including interests in exchange-traded investment trusts and other similar entities, or derivative instruments. In addition, this limitation does not prohibit any Fund from purchasing physical commodities. None of the foregoing fundamental policies shall be construed to prevent a Fund from purchasing, holding or selling all or a portion of any issuance of sukuk or similarly structured investments. The more narrowly industries are defined, the more likely it is that multiple industries will be affected in a similar fashion by a single economic or regulatory development. With respect to the fundamental policy relating to industry concentration set forth in (4) above, the 1940 Act does not define what constitutes “concentration” in an industry. The SEC staff has taken the position that investment of 25% or more of a fund’s total assets in one or more issuers conducting their principal activities in the same industry or group of industries constitutes concentration. It is possible that interpretations of concentration could change in the future. The policy in (4) above will be interpreted to refer to concentration as that term may be interpreted from time to time by the SEC, SEC staff or other relevant authority. The policy also will be interpreted to permit investment without limit in the following: securities of the U.S. government and its agencies or instrumentalities; securities of state, territory, possession or municipal governments and their authorities, agencies, instrumentalities or political  […] d other investments that provide investment exposure to such debt instruments. Although this is a non-fundamental policy, the Fund Trustees will not change this policy without at least 60 days’ notice to shareholders. 7. Investment by a Fund of Funds . If shares of a Fund are purchased by another fund in reliance on Section 12(d)(1)(G) of the 1940 Act, for so long as shares of the Fund are held by such fund, the Fund will not purchase securities of registered open-end investment companies or registered unit investment trusts in reliance on Section 12(d)(1)(F) or Section 12(d)(1)(G) of the 1940 Act. For purposes of a Fund’s non-fundamental policy to invest at least 80% of its net assets in debt securities or debt instruments, as applicable, convertible debt securities are considered to be debt. A Fund currently considers preferred securities and contingent convertible securities to be either debt or equity based on the recommendation of an independent third party. Senior Securities . Section 18(f)(1) of the 1940 Act prohibits an open-end investment company from issuing any class of senior security, or selling any class of senior security of which it is the issuer, except that the investment company may borrow from a bank provided that immediately after any such borrowing there is asset coverage of at least 300% for all of its borrowings. Rule 18f-4, permits funds to engage in “derivatives transactions” as defined by that rule that would otherwise be subject to the restrictions of Section 18 of the 1940 Act on their issuance of “senior securities.” For information on Rule 18f-4, see “Additional Investment Information -- Futures Contracts, Options on Futures Contracts, Options on Securities and Indices, Forward Currency Contracts, Options on Foreign Currencies, and Swap Agreements” below. Cash Management and Temporary Defensive Positions For temporary defensive purposes, or to manage cash pending investment or payout, each of Neuberger Berman Core Bond Fund, Neuberger Berman Floating Rate Income Fund, Neuberger Berman High Income Bond Fund, Neuberger Berman Municipal High Income Fund, Neuberger Berman Municipal Impact Fund, Neuberger Berman Municipal Intermediate Bond Fund, and Neuberger Berman Strategic Income Fund may invest up to 100% of its total assets in cash or cash equivalents, U.S. Government and Agency Securities, comme […]  sales charge or service fee. Additional Investment Information Unless otherwise indicated, the Funds may buy the types of securities and use the investment techniques described below, subject to any applicable investment policies and limitations. However, the Funds may not buy all of the types of securities or use all of the investment techniques described below. In addition, certain securities and investment techniques may produce taxable income for the Funds. Each Fund’s principal investment strategies and the principal risks of each Fund’s principal investment strategies are discussed in the Prospectuses. Pursuant to Rule 12d1-4 under the 1940 Act, each Fund may invest in both affiliated and unaffiliated investment companies, including exchange-traded funds (“ETFs”), (“underlying funds”) in excess of the limits in Section 12 of the 1940 Act and the rules and regulations thereunder. When a Fund invests in underlying funds, it is indirectly exposed to the investment practices of the underlying funds and, therefore, is subject to all the risks associated with the practices of the underlying funds. This SAI is not an offer to sell shares of any underlying fund. Shares of an underlying fund are sold only through the currently effective prospectus for that underlying fund. Unless otherwise noted herein, the investment practices and associated risks detailed below also include those to which a Fund indirectly may be exposed through its investment in an underlying fund. Unless otherwise noted herein, any references to investments made by a Fund include those that may be made both directly by the Fund and indirectly by the Fund through its investments in underlying funds. Asset-Backed Securities . Asset-backed securities represent direct or indirect participations in, or are secured by and payable from, pools of assets such as, among other things, motor vehicle installment sales contracts, installment loan contracts, leases of various types of real and personal property, and receivables from revolving credit (credit card) agreements, or a combination of the foregoing. These assets are securitized through the use of trusts and special purpose corporations. Credit enhancements, such as various forms of cash collateral\n"

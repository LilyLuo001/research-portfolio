    Asia Pacific Dividend Builder ETF and the Guinness Atkinson Dividend Builder Fund into SmartETFs Dividend
    Builder ETF, each a series of Guinness Atkinson Funds 4. Part C Information 5. Exhibits: A. Plan &
    Agreement of Reorganization B. Financial Highlights - 3 - December 31, 2020 Dear Shareholder: I am
    writing to inform you about a transaction that will affect your investment in: ● Guinness Atkinson
    Asia Pacific Dividend Builder Fund, or ● Guinness Atkinson Dividend Builder Fund. We are planning
    on converting these two Funds into Exchange Traded Funds, commonly referred to as ETFs. Each Fund
    will be converted into an ETF by merging it into a newly-created ETF. We refer to this as a “Conversion”.
    Throughout this document you’ll see the phrase Target Fund or Target Funds. The Target Funds are simply
    the two existing mutual funds. You’ll also see references to the phrase Acquiring Fund or Acquiring
    Funds. These are simply the newly-formed ETFs. We are excited about the Conversions and believe that
    each Target Fund and its shareholders will benefit from their Fund’s Conversion. This documents explains
    the details and the reasons for the Conversions. The information presented in this document is important
    and we encourage you to read it. There is an informative Q&A section below which should answer many
    of your questions. As we explain below, you may need to take action. Once converted, the two ETFs
    will still be managed by Guinness Atkinson Asset Management and there will be no changes to the management
    style, investment restrictions or portfolio managers as a result of the Conversion. The Board of Trustees
    of the Trust (the “Board”) believes that the Conversion is in the best interests of each Target Fund
    and its shareholders, and that the interests of each Fund’s shareholders will not be diluted as a
    result of the Conversion. Here are the technical details and reasons behind the Conversion. Each of
    these Target Funds are a series of the Guinness Atkinson Funds (the “Trust”), a Delaware statutory
    trust. As provided in an Agreement and Plan of Reorganization (the “Reorganization Agreement”), each
    Target Fund will be merged into a new series of the Trust (each, a “Acquiring ETF”), which will be
    advised by Guinness Atkinson Asset Management, Inc., (“GAAM” or the “Adviser”), the investment adviser
    to the Target Funds. For each Fund, we are calling this transaction the “Conversion”. The Conversions
    will transform each Target Fund from an open-ended mutual fund into an open ended exchange traded
    fund (or ETF). The Target Funds and the Acquiring ETFs are each referred to as a “Fund” and collectively
    referred to as the “Funds.” The enclosed Information Statement/Prospectus contains information about
    the Conversions. As a result of each Target Fund’s Conversion, you will receive shares of the corresponding
    Acquiring ETF with the same aggregate net asset value as the shares of the Target Fund you own immediately
    prior to the Conversion. Some brokerage firms may not accept fractional shares; if that is the case,
    the Target Fund will redeem your fractional share at net asset value immediately before effectuating
    the Conversion, and distribute the cash value of the fractional share to you. - 4 - Each Conversion
    is taking place because the Board believes that it is in the best interests of the Target Fund and
    its shareholders to merge into its respective Acquiring ETF, each of which is managed similarly to
    the Target Fund but is offered as an exchange-traded fund, or ETF, which will permit each Fund to
    operate at lower overall costs and achieve further reduced operating costs through the benefits of
    economies of scale as the Funds increase in size. The Board believes that shareholders of each Target
    Fund will benefit from the following: (i) the Acquiring ETFs will operate at lower overall cost than
    the Target Funds. For both Conversions, the Adviser has entered into an expense limitation agreement
    with each Acquiring ETF so that after the Conversions, each Acquiring ETF will operate with a lower
    total expense ratio than its respective Target Fund. We provide more details on the cost savings later
    in this document. (ii) shares of the Acquiring ETFs can be purchased and sold throughout the trading
    day at the then-prevailing market price on the exchange. Buying or selling shares of the Acquiring
    ETFs may involve paying a brokerage commission. Additionally, prices on the exchange may be higher
    or lower than the Acquiring ETF’s net asset value. Shareholders will no longer redeem their shares
    for cash at a value determined at the close of the market. (iii) each Conversion is structured to
    qualify as tax-free for U.S. federal income tax purposes. For some shareholders, there could be a
    small cash payment for fractional shares, and that could be taxable. After the Conversion, former
    Target Fund shareholders will still be invested in a diversified, open-end fund that pursues the identical
    investment objective, applies the same investment policies and uses the same principal investment
    strategies, but they will hold shares of their Acquiring ETF, which will be an exchange traded fund.
    NO SHAREHOLDER APPROVAL IS REQUIRED FOR THE CONVERSIONS What are your options as a shareholder? 1.

ows of\n   the Target/Acquiring fund table, a 4-fund filing yields 4 objects}, ... ]}\n  or the no_event object above.\nEach event object:\n  fund_name        target mutual fund's full name (from excerpt)\n  family           fund family/trust (from excerpt)\n  mutual_fund_ticker / etf_ticker\n                   a single 2-6 char UPPERCASE symbol from the excerpt, else \"NA\".\n                   NEVER a fund name. Multiple class tickers → \"NA\" and list them in evidence.\n  announce_date    YYYY-MM-DD only. Board-approval date if stated; else the document's own\n                   date; else the filed date. Vague (\"May 2020\",\"Q4 2026\") → \"NA\".\n  date_basis       \"board\" | \"document\" | \"filed\" | \"NA\"\n  effective_date   YYYY-MM-DD only; the stated closing/completion date. Vague → \"NA\".\n  asset_class      equity_US / equity_intl / fixed_income / other — ONLY if locatable in the\n                   excerpt (bond/muni/high-yield/MBS→fixed_income; International/EM/Asia→\n                   equity_intl; explicit US equity→equity_US; managed-futures/multi-asset/\n                   long-short→other). Name alone insufficient → \"NA\".\n  AUM_at_conversion_USD  number from excerpt or \"NA\"\n  source_accession copy from the 文件 line\n  confidence       H = fund identity + (announce or effective) with explicit basis;\n                   M = identity clear, dates partly missing/document-dated;\n                   L = identity inferred from title only\n  evidence         ≤25-word quote fragment supporting the verdict (for events: the words\n                   showing the acquirer is an ETF; for no_event: the words showing why not)\nNEED_HUMAN only when TWO date statements INSIDE THIS ONE EXCERPT contradict for the same\nfund: {\"NEED_HUMAN\": true, \"quotes\": [\"...\", \"...\"]}. Different filings never contradict.\nNever fill any field from memory — excerpt-locatable or \"NA\".\n\nSELF-CHECK before emitting (do this, don't print it): every input item id appears exactly\nonce in your answer map (count them); every event object quotes ETF-acquirer evidence;\nevery date matches ^\\d{4}-\\d{2}-\\d{2}$ or is \"NA\"; no ticker field contains a space.】\n文件: 0000914243-19-000107 (form 497, filed 2019-08-06, TOUCHSTONE FUNDS GROUP TRUST  (CIK 0000914243))\nsource_url: https://www.sec.gov/Archives/edgar/data/914243/000091424319000107/tstcreditoppsproxy497combo.htm\n节选:\n497 1 tstcreditoppsproxy497combo.htm 497 497 TST Credit Opps - Proxy-Prospectus-SAI FINAL Combined Document Filed pursuant to Rule 497(b) File No. 333-232307 TOUCHSTONE CREDIT OPPORTUNITIES FUND a series of TOUCHSTONE STRATEGIC TRUST 303 Broadway, Suite 1100 Cincinnati, Ohio 45202 (800) 543-0407 August 6, 2019 Dear Shareholder: We have important information concerning your investment in the Touchstone Credit Opportunities Fund (the “Target Fund”), a series of Touchstone Strategic Trust (the “Target Trust”). As a shareholder of the Target Fund, we wish to inform you that the Board of Trustees of the Target Trust has approved the reorganization, subject to shareholder approval, of the Target Fund into the Touchstone Credit Opportunities II Fund (the “Acquiring Fund,” and together with the Target Fund, the “Funds”), a series of Touchstone Funds Group Trust (the “Acquiring Trust”) (the “Reorganization”). The investment advisor to both Funds is Touchstone Advisors, Inc. (“Touchstone Advisors”). The Funds have the same investment goals and principal investment strategies and are both sub-advised by Ares Capital Management II LLC (“Ares”). The Reorganization is intended to eliminate the o […] gle security short selling, pairs trades, futures contracts, total return and interest rate swaps, and certain options transactions. Rule 144A Securities The Fund may also invest in securities that may be offered and sold to only qualified institutional buyers under Rule 144A of the 1933 Act. The Fund may also invest in securities that may be offered and sold to only qualified institutional buyers under Rule 144A of the 1933 Act. Distressed Securities In addition, the Fund may make opportunistic investments from time to time in stressed and distressed securities, including debtor-in-possession loans (sometimes referred to as “DIP” loans), exit financings, rescue financings, and post-bankruptcy equity securities, as well as preferred stock, convertible debt, and other securitized vehicles. In addition, the Fund may make opportunistic investments from time to time in stressed and distressed securities, including debtor-in-possession loans (sometimes referred to as “DIP” loans), exit financings, rescue financings, and post-bankruptcy equity securities, as well as preferred stock, convertible debt, and other securitized vehicles. DIP loans are a special kind of financing meant for companies that are financially distressed and in bankruptcy. Such loans typically have priority over existing debt, equity and other claims. Corporate Loans The corporate loans (commonly referred to as “bank loans”) in which the Fund invests are typically senior in payment priority and secured by a lien on the borrower’s assets. These corporate loans may include second lien loans, mezzanine loans and, to a limited extent, DIP loans. The capacity of a company to borrow and the quality of the credit underlying a corporate loan are typically determined based upon one or more of the projected cash flows of the borrower, the enterprise value of the borrower or the asset value of the collateral supporting any liens. The corporate loans (commonly referred to as “bank loans”) in which the Fund invests are typically senior in payment priority and secured by a lien on the borrower’s assets. These corporate loans may include second lien loans, mezzanine loans and, to a limited extent, DIP loans. The capacity of a company to borrow and the quality of the credit underlying a corporate loan are typically determined based upon one or more of the projected cash flows of the borrower, the enterprise value of the borrower or the asset value of the collateral supporting any liens. 12 Corporate Debt Securities The corporate debt securities, including high yield bonds, and other similar debt inst […] : Typically, collateralized loan obligations are privately offered and sold, and thus are not registered under the securities laws. As a result, the Fund may in certain circumstances characterize its investments in collateralized loan obligations as illiquid. Collateralized loan obligations are subject to the typical risks associated with debt instruments (i.e., interest rate risk and credit risk). Additional risks of collateralized loan obligations include the possibility that distributions from collateral securities will be insufficient to make interest or other payments, the potential for a decline in the quality of the collateral, and the possibility that the Fund may invest in a subordinate tranche of a collateralized loan obligation. Convertible Securities Risk : Convertible securities are subject to the risks of both debt securities and equity securities. The values of convertible securities tend to decline as interest rates rise and, due to the conversion feature, tend to vary with fluctuations in the market value of the underlying security. Counterparty Risk : A counterparty (the other party to a transaction or an agreement) to a transaction with the Fund may be unable or unwilling to make timely principal, interest or settlement payments, or otherwise honor its obligations. Derivatives Risk : The use of derivatives may expose the Fund to additional risks that it would not be subject to if it invested directly in the securities underlying those derivatives. Risks associated with derivatives may include the risk that the derivative does not correlate well with the security, index, or currency to which it relates, the risk that the Fund will be unable to sell or close out the derivative due to an illiquid market, the risk that the counterparty may be unwilling or unable to meet its obligations, and the risk that the derivative could expose the Fund to the risk of magnified losses resulting from leverage. These additional risks could cause the Fund to experience losses to which it would otherwise not be subject. • Leverage Risk : Leverage occurs when the Fund uses borrowings, derivatives (such as futures or options), or similar instruments or techniques to gain exposure to investments in an amount that exceeds the Fund's initial investment. The use of leverage magnifies changes in the Fund's net asset value and thus may result in increased portfolio volatility and increased risk of loss. Leverage can create an interes […]  to the obligations of the terminating party has not been met and it reasonably appears that it will not or cannot be met. Whether or not the Reorganization is consummated, Touchstone Advisors will pay the expenses incurred by the Funds in connection with the Reorganization. Description of the Securities to be Issued Shareholders of the Target Fund as of the closing will receive full and fractional shares of the Acquiring Fund in accordance with the terms of the Plan. The shares of the Acquiring Fund to be issued in connection with the Reorganization will be duly and validly issued and outstanding, fully paid and non-assessable by the Acquiring Fund. Shares of the Acquiring Fund to be issued in the Reorganization will have no preemptive or conversion rights and no share certificates will be issued. Material Federal Income Tax Consequences The following discussion summarizes the material U.S. federal income tax consequences of the Reorganization that are applicable to you as a Target Fund shareholder. It is based on the Code, applicable U.S. Treasury regulations, judicial authority, and administrative rulings and practice, all as of the date of this Proxy Statement/Prospectus and all of which are subject to change, including changes with retroactive effect. The discussion below does not address any state, local, or foreign tax consequences of the Reorganization. Your tax treatment may vary depending upon your particular situation. You also may be subject to special rules not discussed below if you are a certain kind of Target Fund shareholder, including, but not limited to: an insurance company; a tax-exempt organization; a financial institution or broker-dealer; a person who is neither a citizen nor resident of the United States or an entity that is not organized under the laws of the United States or a political subdivision thereof; a holder of Target Fund shares as part of a hedge, straddle, conversion or other integrated transaction; a person with “applicable financial statements” within the meaning of Section 451(b) of the Code; a person who does not hold Target Fund shares as a capital asset at the time of the Reorganization; or an entity taxable as a partnership for U.S. federal income tax purposes. The Reorganization is intended to qualify for federal income tax purposes as a tax-free reorganization under Section 368(a) of the Code. As a non-waivable condition to the closing of the Reorganization, the Target Fund and the Acquiring Fund will receive an opinion from the law firm of Vedder Price P.C. substantially to the effect that, on the basis of the existing provisions of the Code, U.S. Treasury regulations issued thereunder, current administrative rules, pronouncements and court decisions, and certain representations, qualifications, and assumptions with respect to the Reorganization, for federal income tax purposes: (i) The transfer by the Target Fund of all its assets to the Acquiring Fund solely in exchange for Acquiring Fund shares and the assumption by the Acquiring Fund of all the liabilities of the Target Fund, immediately followed by the pro rata, by class, distribution of all the Acquiring Fund shares so received by the Target Fund to the Target Fund’s shareholders of record in complete liquidation of the Target Fund and the termination of the Target Fund promptly thereafter, will constitute a “reorganization” within the meaning of Section 368(a)( […] r at least one year. Any CDSC applicable to your shares of the Target Fund will not be incurred as a result of your shares being exchanged for shares of the Acquiring Fund pursuant to the Reorganization, and the holding period applicable to your Target Fund shares for purposes of the CDSC will carry over to the shares of the Acquiring Fund that you receive in the Reorganization. Class C shares are subject to an annual Rule 12b-1 fee of up to 1.00% of a Fund’s average daily net assets allocable to Class C shares. Touchstone Securities intends to pay a commission of 1.00% of the purchase amount to your broker at the time you purchase Class C shares. Effective January 1, 2019 (the “Effective Date”), Class C shares of a Fund will automatically convert into Class A shares of the same Fund after they have been held for 10 years. The conversion will not be considered a taxable event for federal income tax purposes. These automatic conversions will be executed without any sales charge (including CDSCs), redemption or transaction fee, or other charge. After such a conversion takes place, the shares will be subject to all features, rights and expenses of Class A shares. If you hold Class C shares through certain financial intermediaries, such as an omnibus account or group retirement recordkeeping platform, your intermediary may not be able to track the amount of time you held your Class C shares purchased before January 1, 2019. In that case, Class C shares held prior to January 1, 2019 would convert to Class A shares 10 years after the Effective Date of this policy. Class Y Shares Class Y shares of the Funds are sold at NAV without an initial sales charge so that the full amount of your purchase payment may be immediately invested in the Funds. Class Y shares are not subject to a Rule 12b-1 fee or CDSC. In addition, Class Y shares may be purchased through certain mutual fund programs sponsored by qualified intermediaries, such as broker-dealers and investment advisors. In each case, the intermediary has entered into an agreement with Touchstone Securities to include the Funds in their program where the intermediary provides investors participating in their program with additional services, including advisory, asset all\n"

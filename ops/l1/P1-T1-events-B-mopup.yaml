ows of\n   the Target/Acquiring fund table, a 4-fund filing yields 4 objects}, ... ]}\n  or the no_event object above.\nEach event object:\n  fund_name        target mutual fund's full name (from excerpt)\n  family           fund family/trust (from excerpt)\n  mutual_fund_ticker / etf_ticker\n                   a single 2-6 char UPPERCASE symbol from the excerpt, else \"NA\".\n                   NEVER a fund name. Multiple class tickers → \"NA\" and list them in evidence.\n  announce_date    YYYY-MM-DD only. Board-approval date if stated; else the document's own\n                   date; else the filed date. Vague (\"May 2020\",\"Q4 2026\") → \"NA\".\n  date_basis       \"board\" | \"document\" | \"filed\" | \"NA\"\n  effective_date   YYYY-MM-DD only; the stated closing/completion date. Vague → \"NA\".\n  asset_class      equity_US / equity_intl / fixed_income / other — ONLY if locatable in the\n                   excerpt (bond/muni/high-yield/MBS→fixed_income; International/EM/Asia→\n                   equity_intl; explicit US equity→equity_US; managed-futures/multi-asset/\n                   long-short→other). Name alone insufficient → \"NA\".\n  AUM_at_conversion_USD  number from excerpt or \"NA\"\n  source_accession copy from the 文件 line\n  confidence       H = fund identity + (announce or effective) with explicit basis;\n                   M = identity clear, dates partly missing/document-dated;\n                   L = identity inferred from title only\n  evidence         ≤25-word quote fragment supporting the verdict (for events: the words\n                   showing the acquirer is an ETF; for no_event: the words showing why not)\nNEED_HUMAN only when TWO date statements INSIDE THIS ONE EXCERPT contradict for the same\nfund: {\"NEED_HUMAN\": true, \"quotes\": [\"...\", \"...\"]}. Different filings never contradict.\nNever fill any field from memory — excerpt-locatable or \"NA\".\n\nSELF-CHECK before emitting (do this, don't print it): every input item id appears exactly\nonce in your answer map (count them); every event object quotes ETF-acquirer evidence;\nevery date matches ^\\d{4}-\\d{2}-\\d{2}$ or is \"NA\"; no ticker field contains a space.】\n文件: 0001193125-21-282499 (form N-14, filed 2021-09-24, JOHCM Funds Trust  (CIK 0001830437))\nsource_url: https://www.sec.gov/Archives/edgar/data/1830437/000119312521282499/d219581dn14.htm\n节选:\nN-14 1 d219581dn14.htm N-14 N-14 Securities Act Registration No. As filed with the Securities and Exchange Commission On September 24, 2021 UNITED STATES SECURITIES AND EXCHANGE COMMISSION Washington, D.C. 20549 FORM N-14 REGISTRATION STATEMENT UNDER THE SECURITIES ACT OF 1933 ☒ Pre-Effective Amendment No. ☐ Post-Effective Amendment No. ☐ JOHCM FUNDS TRUST (Exact Name of Registrant as Specified in Charter) 53 State Street, 13 th Floor Boston, Massachusetts 02109 (Address of Principal Executive Offices) Registrant’s Telephone Number, including Area Code: (617) 933-0712 Mary Lomasney 53 State Street, 13 th Floor Boston, Massachusetts 02109 (Name and Address of Agent for Service) With copy to: George Raine, Esq. Ropes & Gray LLP Prudential Tower 800 Boylston Street Boston, MA 02199-3600 Title of Securities Being Registered: Institutional Shares of TSW Large Cap Value Fund, a series of the Registrant. Approximate date of Proposed Offering: As soon as practicable after this Registration Statement becomes effective. It is proposed that this filing will become effective on October 25, 2021 pursuant to Rule 488 under the Securities Act of 1933, as amended. An indefinite amount of the Regis […] s upon shareholders of the Acquiring Trust, or (iii) limit the rights to indemnification under the JOHCM Declaration. An amendment which in the determination of the Acquiring Trustees shall affect the holders of one or more series but not the holders of all outstanding series, or shall affect the holders of one or more classes of a series but not the holders of all outstanding shares of all classes, shall be authorized as to any such series or class by the affirmative vote of the holders of at least a majority of the shares of such affected series or class outstanding and entitled to vote, and no vote of shareholders of a series or class not determined by the Acquiring Trustees to be affected shall be required. Mergers, Reorganizations and Conversions. The governing instruments of the Target Trust provide that any series of the Target Trust, created on or after November 11, 1996, may, either as the successor, survivor or non-survivor, (1) consolidate or merge with any other trusts, partnerships, associations or corporations, including any series or class thereof, organized under the laws of the Commonwealth of Massachusetts or any other state of the United States; or (2) transfer a substantial portion of its assets to one or more other trusts, partnerships, associations or corporations, including any series or class thereof, organized under the laws of the Commonwealth of Massachusetts or any other state of the United States, to be approved upon such terms and conditions as specified in an agreement and plan of reorganization authorized and approved by the AIC Trustees and entered into by the relevant series in connection therewith. Any such consolidation, merger or transfer may be authorized by a vote of a majority of AIC Trustees then in office, without the approval of the shareholders of any series. The governing instruments of the Acquiring Trust provide that Acquiring Trustees may cause an Acquiring Fund to (i) merge, consolidate or reorganize with any other entity (including another series or class of the Acquiring Trust) or (ii) sell or exchange all or substantially all of the assets of the Acquiring Trust or of any series or class. Unless otherwise required by applicable law, any such consolidation, mer […] of the Acquiring Fund in accordance with the procedures provided for in the Plan. The number of Acquiring Fund Shares that the Target Fund Shareholders will receive will be based on the NAVs of the Target Fund and the Acquiring Fund as of the regular close of business of the NYSE on the Valuation Date. Because the Plan contemplates that the NAV per share of the Target Fund and the Acquiring Fund will be the same as of the Valuation Date, it is expected that Target Fund Shareholders will receive the same number of shares of the Acquiring Fund as they currently hold of the Target Fund. The Acquiring Fund Shares to be issued in connection with the Reorganization will be fully paid and non-assessable when issued and will have no pre-emptive or conversion rights. Each share of an Acquiring Fund represents an equal proportionate interest with each other share of the Acquiring Fund. 33 CERTAIN U.S. FEDERAL INCOME TAX CONSEQUENCES OF THE REORGANIZATION The following is a general summary of the certain U.S. federal income tax consequences of the Reorganization and is based upon the current provisions of the Code, the existing U.S. Treasury Regulations thereunder, current administrative rulings of the IRS and published judicial decisions, all of which are subject to change, possibly with retroactive effect. These considerations are general in nature and individual shareholders should consult their own tax advisers as to the federal, state, local, and foreign tax considerations applicable to them and their individual circumstances. These same considerations generally do not apply to shareholders who hold their shares in a tax-advantaged account. The Target Fund has elected and qualified since its inception to be treated as a “regulated investment company” under Subchapter M of the Code and the Acquiring Fund intends to elect and qualify as a “regulated investment company” under Subchapter M of the Code for its taxable year that includes the Closing Date. The Reorganization is intended to qualify as a tax-free “reorganization” for federal income tax purposes under Section 368(a)(1) of the Code. Accordingly, it is expected that no gain or loss will be recognized by the Target Fund or Target Fund Shareholders as a direct res […]  jurisdiction. As used in this Agreement, “Tax” or “Taxes” means all federal, state, local and foreign (whether imposed by a country or political subdivision or authority thereunder) income, gross receipts, excise, sales, use, value added, employment, franchise, profits, property, ad valorem or other taxes, stamp taxes and duties, fees, assessments or charges, whether payable directly or by withholding, together with any interest and any penalties, additions to tax or additional amounts imposed by any taxing authority (foreign or domestic) with respect thereto. There are no levies, liens or encumbrances relating to Taxes existing, threatened or pending with respect to the Assets of the Target Fund. A-6 (r) The Target Fund does not own any “converted property” (as that term is defined in Section 1.337(d)-7(a)(2)(vii) of the regulations issued by the United States Treasury (“Treasury Regulations”)) that is subject to the rules of Section 1374 of the Code as a consequence of the application of Section 337(d)(1) of the Code and the Treasury Regulations thereunder. (s) The Target Fund is in compliance in all material respects with applicable regulations of the Internal Revenue Service pertaining to the reporting of dividends and other distributions on and redemptions of its shares of beneficial interest, including but not limited to those related to shareholder cost basis reporting pursuant to Sections 1012, 6045, 6045A and 6045B of the Code and related Treasury Regulations, and has withheld in respect of dividends and other distributions and paid to the proper taxing authorities all Taxes required to be withheld, and is not liable for any penalties which could be imposed thereunder. (t) The Target Fund has not been granted any waiver, extension, or comparable consent regarding the application of the statute of limitations with respect to any Taxes or tax return that is outstanding, nor has any request for such waiver or consent been made with respect to any such Taxes or tax return. (u) The Target Fund has not received written notification from any tax authority that asserts a position contrary to any of the above representations set forth in paragraphs (n) through (t) of this Section 4. (v) All information provide […] oses. The Credit Agreement is expected to permit the Fund to borrow up to an aggregate commitment amount of $100 million ($50 million of which is committed and $50 million of which is uncommitted), at any time outstanding, subject to asset coverage and other limitations as specified in the Credit Agreement. Borrowing results in interest expense and other fees and expenses that may impact the Fund’s expenses, including any net expense ratios. The costs of borrowing may reduce the total returns for the Fund. The Credit Agreement is also expected to impose an ongoing commitment fee on undrawn amounts under the credit facility, which will be allocated to each share class within the Fund, pro rata, based on the Fund’s average net asset value. 2 Convertible Securities A convertible security is a security (a bond or preferred stock) that may be exchanged or converted at a stated price within a specified period into a specified number of shares of common stock of the same or a different issuer. Convertible securities may take the form of convertible preferred stock, convertible bonds or debentures, units consisting of “usable” bonds and warrants or a combination of the features of several of these securities. Convertible securities are senior to common stocks in an issuer’s capital structure, but are usually subordinated to similar non-convertible securities. While providing a fixed-income stream (generally higher in yield than the income derivable from common stock but lower than that afforded by a similar nonconvertible security), a convertible security also gives an investor the opportunity, through its conversion feature, to participate in the capital appreciation of the issuing company depending upon a market price advance in the convertible security’s underlying common stock. A convertible security may be subject to redemption at the option of the issuer at a price established in the convertible security’s governing instrument. If a convertible security held by the Fund is called for redemption, the Fund will be required to permit the issuer to redeem the security, convert it into the underlying common stock or sell it to a third party. A contingent convertible security is a hybrid debt security typically issued \n"

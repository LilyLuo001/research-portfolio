ars exactly\nonce in your answer map (count them); every event object quotes ETF-acquirer evidence;\nevery date matches ^\\d{4}-\\d{2}-\\d{2}$ or is \"NA\"; no ticker field contains a space.】\n文件: 0001829126-25-002325 (form N-14, filed 2025-04-02, TCW ETF Trust  (CIK 0001831313))\nsource_url: https://www.sec.gov/Archives/edgar/data/1831313/000182912625002325/tcwetftrust_n14.htm\n节选:\nN-14 1 tcwetftrust_n14.htm N-14 As filed with the Securities and Exchange Commission on April 2, 2025 Securities Act File No. 333-[ ] U.S. SECURITIES AND EXCHANGE COMMISSION WASHINGTON, D.C. 20549 FORM N-14 REGISTRATION STATEMENT UNDER THE SECURITIES ACT OF 1933 Pre-Effective Amendment No. ____ ☐ Post-Effective Amendment No. ____ ☐ TCW ETF TRUST (Exact Name of Registrant as Specified in Charter) Peter Davidson 515 South Flower Street Los Angeles, CA 90071 (Address of Principal Executive Offices) Registrant’s Telephone Number, including Area Code: (213) 244-0000 Megan McClellan TCW Investment Management Company LLC 515 South Flower Street, Los Angeles, CA 90071 (Name and address of agent for service) Copies to: Brian McCabe Ropes & Gray LLP 800 Boylston Street Boston, MA 02199 Telephone Number: (617) 951-7000 Approximate Date of Proposed Public Offering: As soon as practicable after this Registration Statement becomes effective under the Securities Act of 1933, as amended. It is proposed that this filing will become effective on May 2, 2025 pursuant to Rule 488 under the Securities Act of 1933, as amended. Title of Securities Being Registered: Shares of Beneficial Interest, no par v […] etWest Intermediate Bond Fund 515 South Flower Street Los Angeles, CA 90071 Dear Shareholder: We are writing to inform you about a transaction that will affect your investment in TCW MetWest Intermediate Bond Fund (the “Target Fund”). You are receiving this combined Prospectus and Information Statement (the “Prospectus/Information Statement”) because you own shares in the Target Fund, a series of TCW Metropolitan West Funds, a Delaware statutory trust (the “MetWest Trust”), which is managed by Metropolitan West Asset Management, LLC (the “Target Fund Adviser”). We are pleased to inform you of the planned reorganization of the Target Fund, which is a mutual fund, with and into TCW Core Plus Bond ETF (the “Acquiring Fund”), a newly-organized exchange-traded fund (“ETF”), which will be managed by TCW Investment Management Company LLC (the “Acquiring Fund Adviser”). The Acquiring Fund Adviser and the Target Fund Adviser are under the common control of The TCW Group, Inc. Pursuant to an Agreement and Plan of Reorganization (the “Plan”), the Target Fund will be reorganized with and into the TCW Core Plus Bond ETF (the “Acquiring Fund”), a newly created series of TCW ETF Trust, a Delaware statutory trust (the “ETF Trust”), that has a similar investment objective, similar investment policies and investment strategies, and the same portfolio management team as the Target Fund (the “Reorganization”). Target Fund Acquiring Fund TCW MetWest Intermediate Bond Fund à TCW Core Plus Bond ETF The Plan, which is by and among the MetWest Trust, on behalf of the Target Fund, the ETF Trust, on behalf of the Acquiring Fund, and the Acquiring Fund Adviser (solely with respect to Section 9.2), provides for: (i) the acquisition of the assets and assumption of the liabilities of the Target Fund by the Acquiring Fund in exchange for shares of the Acquiring Fund of equal value to the net assets of the Target Fund being acquired; (ii) the pro rata distribution of such shares to the shareholders of the Target Fund, and (iii) the complete liquidation and dissolution of the Target Fund, all upon the terms and conditions set forth in the Plan. The Plan has been filed as an exhibit to the Acquiring Fund’s Registration Statement on Form N-14 of  […]  PROXY. The terms and conditions of the Reorganization are further described in this Prospectus/Information Statement and are set forth in the form of Agreement and Plan of Reorganization (the “Plan”). The Board of Trustees of the MetWest Trust and the ETF Trust (the “Board”) unanimously approved the proposed Reorganization and Plan and determined that participation in the Reorganization is in the best interests of the Target Fund and that the interests of existing Target Fund shareholders will not be diluted as a result of the Reorganization. The Target Fund and the Acquiring Fund are each a series of a registered, open-end management investment company, although the Target Fund is a mutual fund while the Acquiring Fund will operate as an exchange-traded fund (“ETF”). The Acquiring Fund is a newly organized series of the ETF Trust and currently has no assets or liabilities. The Acquiring Fund was created specifically in connection with the Reorganization for the purpose of acquiring the assets and assuming the liabilities of the Target Fund and will not commence operations until the closing date of the Reorganization. The Target Fund will be the accounting and performance survivor in the Reorganization, and the Acquiring Fund, as the corporate survivor in the Reorganization, will adopt the accounting and performance history of the Target Fund. In order to transact in shares of the Acquiring Fund received as part of the Reorganization, you must hold your Target Fund shares in a brokerage account that can hold shares of an ETF. If Target Fund shareholders do not hold their shares of the Target Fund through a brokerage account that can hold shares of an ETF, the Acquiring Fund shares they receive as part of the Reorganization will be held by the Acquiring Fund’s transfer agent for the benefit of the Target Fund shareholders for one year, after which they will be liquidated and proceeds sent to the Target Fund shareholders. This Prospectus/Information Statement includes additional information on the actions that Target Fund shareholders that do not currently hold their Target Fund shares through a brokerage account that can hold shares of an ETF must take in order to transact in shares of the Acquiring Fund as par […] L HIGHLIGHTS 41 EXHIBIT D PRINCIPAL HOLDERS OF SECURITIES 44 v SUMMARY This is only a summary of certain information contained in this Prospectus/Information Statement. You should read the more complete information in the rest of this Prospectus/Information Statement, including the Acquiring Fund’s Prospectus (enclosed) and the Plan (which has been filed as an exhibit to the Acquiring Fund’s Registration Statement on Form N-14 of which this Prospectus/Information Statement is a part). Why am I receiving a combined Prospectus/Information Statement? You are receiving a combined Prospectus/Information Statement because you own shares of the Target Fund. It is proposed that the Target Fund, which is currently operated as a mutual fund, will be converted into an ETF through the Reorganization with and into the Acquiring Fund. The Acquiring Fund is a newly organized series of the ETF Trust and currently has no assets or liabilities. The Acquiring Fund was created specifically in connection with the Reorganization for the purpose of acquiring the assets and assuming the liabilities of the Target Fund and will not commence operations until the closing date of the Reorganization. The Reorganization will be accomplished in accordance with the Plan between the MetWest Trust, on behalf of the Target Fund, the ETF Trust, on behalf of the Acquiring Fund, and the Acquiring Fund Adviser (solely with respect to Section 9.2 of the Plan). Among other things, the Plan provides for: (1) the acquisition of the assets and the assumption of the liabilities of the Target Fund by the Acquiring Fund in exchange for shares of the Acquiring Fund of equal value to the net assets of the Target Fund (“Acquiring Fund Shares”); (2) the pro rata distribution of the Acquiring Fund Shares to the shareholders of the Target Fund, and (3) the complete liquidation of the Target Fund, all upon the terms and conditions set forth in the Plan. In accordance with the MetWest Trust’s organizational documents and applicable Delaware state and U.S. federal law (including Rule 17a-8 under the Investment Company Act of 1940, as amended), the Reorganization can be effected without the approval of shareholders of the Target Fund. Therefore, we are not asking you  […] rget Fund will receive shares of the Acquiring Fund with an equivalent aggregate NAV of the Acquiring Fund. In particular, the Plan provides that (1) the assets of the Target Fund will be acquired by the Acquiring Fund and the liabilities of the Target Fund will be assumed by the Acquiring Fund in exchange for Acquiring Fund Shares of equal value to the net assets of the Target Fund being acquired; and (2) the Acquiring Fund Shares received by the Target Fund in the exchange will then be distributed pro rata to shareholders of the Target Fund. After the Acquiring Fund Shares are distributed to the Target Fund’s shareholders, the Target Fund will be completely liquidated. The Plan also provides that Class M shares of the Target Fund will be converted into Class I shares with the same aggregate NAV (without a contingent deferred sales charge or other charge) prior to the Reorganization. Following such conversion but prior to the closing of the Reorganization, the Target Fund shall redeem all fractional shares of the Target Fund outstanding on the records of the Target Fund’s transfer agent. 2 How will the Reorganization affect me as a shareholder? If the Reorganization is completed, you will cease to be a shareholder of the Target Fund and will become a shareholder of the Acquiring Fund. Upon completion of the Reorganization, Target Fund shareholders will own shares of the Acquiring Fund having an aggregate NAV equal to the aggregate NAV of the shares of the Target Fund that were owned when the Reorganization happened. Shares of the Acquiring Fund will be transferred to a shareholder’s brokerage account. For Target Fund shareholders that hold Target Fund shares through accounts that are not permitted to hold the Acquiring Fund’s shares, the Acquiring Fund shares may be held by a transfer agent of the Acquiring Fund as agent for and for the account and benefit of the Target Fund shareholders for one year, after which they will be liquidated and proceeds sent to the Target Fund shareholders. For more information about the brokerage account needed to hold shares of the Acquiring Fund, see “ What do I need to do to prepare for the Reorganization? ” below. Shares of the Acquiring Fund are not issued in fractional shar\n"

ars exactly\nonce in your answer map (count them); every event object quotes ETF-acquirer evidence;\nevery date matches ^\\d{4}-\\d{2}-\\d{2}$ or is \"NA\"; no ticker field contains a space.】\n文件: 0001193125-19-225992 (form 497, filed 2019-08-21, BlackRock Funds III  (CIK 0000893818))\nsource_url: https://www.sec.gov/Archives/edgar/data/893818/000119312519225992/d750095d497.htm\n节选:\n497 1 d750095d497.htm BLACKROCK LIFEPATH INDEX FUND Blackrock Lifepath Index Fund Table of Contents BLACKROCK FUNDS III BlackRock LifePath ® Index 2020 Fund 400 Howard Street San Francisco, California 94105 (800) 441-7762 August 21, 2019 Dear Shareholder: I am writing to inform you about a reorganization that will affect your investment in BlackRock LifePath ® Index 2020 Fund (the “Target Fund”), a series of BlackRock Funds III (the “Trust”), a Delaware statutory trust. As provided in an Agreement and Plan of Reorganization (the “Reorganization Agreement”), the Target Fund will be reorganized into BlackRock LifePath ® Index Retirement Fund (the “Acquiring Fund”), a series of the Trust (the “Reorganization”). The Target Fund is a “feeder” fund that invests all of its assets in LifePath ® Index 2020 Master Portfolio (the “Target Master Portfolio”), a series of Master Investment Portfolio (“MIP”), a Delaware statutory trust, which has an investment objective, strategies and policies substantially identical to those of the Target Fund. The Acquiring Fund is also a “feeder” fund and invests all of its assets in LifePath ® Index Retirement Master Portfolio (the “Acquiring Master Portfoli […] e to pay any sales charge, commission or other similar fee in connection with the Reorganization? A: No, you will not have to pay any sales charge, commission or other similar fee in connection with the Reorganization. As more fully discussed in the Combined Prospectus/Information Statement, the holding period with respect to any CDSC that applies to shares of the Acquiring Fund acquired by you in the Reorganization will be measured from the earlier of the time (i) you purchased your Target Fund shares or (ii) you purchased your shares of any other fund advised by BFA and subsequently exchanged them for shares of the Target Fund. Q: Do I need to take any action in connection with the Reorganization? A: No. Your shares will automatically be converted into shares of the Acquiring Fund on the date of the completion of the Reorganization. You will receive written confirmation that this change has taken place. No certificates for shares will be issued in connection with the Reorganization. The aggregate net asset value of the Acquiring Fund Shares you receive in the Reorganization will be equal to the aggregate net asset value of the shares you own in the Target Fund immediately prior to the Reorganization. Q: Will the Reorganization create a taxable event for me? A: The Reorganization is expected to qualify as a tax-free “reorganization” under Section 368(a) of the Internal Revenue Code of 1986, as amended (the “Code”), and the Master Reorganization is expected to qualify as a tax-free transaction under the Code. In general, if the Reorganization so qualifies, the Target Fund and the Acquiring Fund will not recognize any gain or loss for U.S. federal income tax purposes from the transactions contemplated by the Reorganization (except for any gain or loss that may be required to be recognized solely as a result of the close of the Target Fund’s taxable year due to the Reorganization or as a result of the transfer of certain assets). Additionally, if the Master Reorganization qualifies as a tax-tree transaction under the Code, the Target Master Portfolio and the Acquiring Master Portfolio will not recognize gain or loss for U.S. federal income tax purposes from the transactions contemplated by the Master Reorganizati […] on or the combination of Underlying Funds determined by BFA could result in underperformance as compared to funds with similar investment objectives and strategies. Concentration Risk — To the extent that an underlying index of an Underlying Fund is concentrated in the securities of companies, a particular market, industry, group of industries, sector or asset class, country, region or group of countries, that Underlying Fund may be adversely affected by the performance of those securities, may be subject to increased price volatility and may be more susceptible to adverse economic, market, political or regulatory occurrences affecting that market, industry, group of industries, sector or asset class, country, region or group of countries. Convertible Securities Risk — The market value of a convertible security performs like that of a regular debt security; that is, if market interest rates rise, the value of a convertible security usually falls. In addition, convertible securities are subject to the risk that the issuer will not be able to pay interest or dividends when due, and their market value may change based on changes in the issuer’s credit rating or the market’s perception of the issuer’s creditworthiness. Since it derives a portion of its value from the common stock into which it may be converted, a convertible security is also subject to the same types of market and issuer risks that apply to the underlying common stock. Debt Securities Risk — Debt securities, such as bonds, involve interest rate risk, credit risk, extension risk, and prepayment risk, among other things. Interest Rate Risk — The market value of bonds and other fixed-income securities changes in response to interest rate changes and other factors. Interest rate risk is the risk that prices of bonds and other fixed-income securities will increase as interest rates fall and decrease as interest rates rise. 12 Table of Contents The Combined Fund may be subject to a greater risk of rising interest rates due to the current period of historically low rates. For example, if interest rates increase by 1%, assuming a current portfolio duration of ten years, and all other factors being equal, the value of the Combined Fund’s investments would be expected to decrease by 10%. The magnitude of these fluctuations in the market price of bonds and other fixed-income securities is generally greater for those securities with longer maturities. Fluctuations in the market price of the Combined Fund’s investments will not affect interest income derived from instruments already owned by the Combined Fund, but will be reflected in the Combined Fund’s net asset value. The Combined Fund may lose money if short-term or long-term interest rates rise sharply in a manner not anticipated by Combined Fund management. To the extent the […] ness may also affect the value of the Combined Fund’s investment in that issuer. The degree of credit risk depends on both the financial condition of the issuer and the terms of the obligation. Extension Risk — When interest rates rise, certain obligations will be paid off by the obligor more slowly than anticipated, causing the value of these obligations to fall. Prepayment Risk — When interest rates fall, certain obligations will be paid off by the obligor more quickly than originally anticipated, and the Combined Fund may have to invest the proceeds in securities with lower yields. Depositary Receipts Risk — Depositary receipts are generally subject to the same risks as the foreign securities that they evidence or into which they may be converted. In addition to investment risks associated with the underlying issuer, depositary receipts expose the Combined Fund to additional risks associated with the non-uniform terms that apply to depositary receipt programs, credit exposure to the depository bank and to the sponsors and other parties with whom the depository bank establishes the programs, currency risk and the risk of an illiquid market for depositary receipts. The issuers of unsponsored depositary receipts are not obligated to disclose information that is, in the United States, considered material. Therefore, there may be less information available regarding these issuers and there may not be a correlation between such information and the market value of the depositary receipts. 13 Table of Contents Derivatives Risk — The Combined Fund’s use of derivatives may increase its costs, reduce the Combined Fund’s returns and/or increase volatility. Derivatives involve significant risks, including: Volatility Risk — Volatility is defined as the characteristic of a security, an index or a market to fluctuate significantly in price within a short time period. A risk of the Combined Fund’s use of derivatives is that the fluctuations in their values may not correlate with the overall securities markets. Counterparty Risk — Derivatives are also subject to counterparty risk, which is the risk that the other party in the transaction will not fulfill its contractual obligation. Market and Illiquidity Risk — The possible  […] There is no guarantee that an Underlying Fund’s investment results will have a high degree of correlation to those of its underlying index or that the Underlying Fund will achieve its investment objective. Market disruptions and regulatory restrictions could have an adverse effect on an Underlying Fund’s ability to adjust its exposure to the required levels in order to track its underlying index. Errors in index data, index computations or the construction of an underlying index in accordance with its methodology may occur from time to time and may not be identified and corrected by the index provider for a period of time or at all, which may have an adverse impact on an Underlying Fund and its shareholders. Investments in Mutual Funds and Exchange-Traded Funds (“ETFs”) Risk — Because the Combined Fund invests substantially all of its assets in Underlying Funds, its investment performance is related to the performance of the Underlying Funds. The Combined Fund may also directly invest in ETFs. The Combined Fund’s net asset value will change with changes in the value of the mutual funds, ETFs and other securities in which it invests. An investment in the Combined Fund will entail more direct and indirect costs and expenses than a direct investment in the Underlying Funds and ETFs. 15 Table of Contents Leverage Risk — Some transactions may give rise to a form of economic leverage. These transactions may include, among others, derivatives, and may expose the Combined Fund to greater risk and increase its costs. The use of leverage may cause the Combined Fund to liquidate portfolio positions when it may not be advantageous to do so to satisfy its obligations or to meet any required asset segregation requirements. Increases and decreases in the value of the Combined Fund’s portfolio will be magnified when the Combined Fund uses leverage. Management Risk — As an Underlying Fund may not fully replicate its underlying index, it is subject to the risk that the Underlying Fund’s investment manager’s investment strategy may not produce the intended results. Market Risk and Selection Risk — Market risk is the risk that one or more markets in which the Combined Fund invests will go down in value, including the possibility t\n"

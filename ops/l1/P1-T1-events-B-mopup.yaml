luable. Convertible Securities Risk. The market values of convertible securities are affected by market interest rates, the risk of issuer default on interest or principal payments and the value of the underlying common stock into which the convertible security may be converted. Additionally, a convertible security is subject to the same types of market and issuer risk as apply to underlying common stock. In addition, certain convertible securities are subject to involuntary conversions and may undergo principal write-downs upon the occurrence of certain triggering events, and, as a result, are subject to an increased risk of loss. Convertible securities may be rated below investment grade. Restricted and Illiquid Securities Risk. Certain securities generally trade in lower volume and may be less liquid than securities of large established companies. If a security is illiquid, the Adviser may not be able to sell the security at a time when it might wish to sell, which means that the Fund could lose money. Debt Securities Risk . Debt securities are issued with a specific interest rate and maturity. Once the securities are issued, they are subject to credit risk and interest rate risk. Credit risk is the chance that the issuer will fail to pay the stipulated interest payments on the security, or to pay the principal at maturity. Negative perceptions of the issuer’s ability to make interest or principal payments will cause the price of the security to decline. While U.S. government-back\n"

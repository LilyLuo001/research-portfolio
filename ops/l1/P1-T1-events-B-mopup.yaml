ars exactly\nonce in your answer map (count them); every event object quotes ETF-acquirer evidence;\nevery date matches ^\\d{4}-\\d{2}-\\d{2}$ or is \"NA\"; no ticker field contains a space.】\n文件: 0001445546-24-005389 (form N-14/A, filed 2024-08-06, FIRST TRUST SERIES FUND  (CIK 0001497778))\nsource_url: https://www.sec.gov/Archives/edgar/data/1497778/000144554624005389/globalgrowth_n14a.htm\n节选:\nN-14/A 1 globalgrowth_n14a.htm INITIAL REGISTRATION STATEMENT As filed electronically with the Securities and Exchange Commission on or about August 6, 2024 Registration No. 333-280037 UNITED STATES SECURITIES AND EXCHANGE COMMISSION Washington, DC 20549 FORM N-14 REGISTRATION STATEMENT UNDER THE SECURITIES ACT OF 1933 [ X ] Pre-Effective Amendment No. 1 [ ] Post-Effective Amendment No. ___ FIRST TRUST SERIES FUND (Exact Name of Registrant as Specified in Charter) 120 East Liberty Drive Suite 400 Wheaton, Illinois 60187 (Address of Principal Executive Offices) (Zip Code) (630) 765-8000 (Registrant’s Area Code and Telephone Number) W. Scott Jardine First Trust Advisors L.P. Suite 400 120 East Liberty Drive Wheaton, Illinois 60187 (Name and Address of Agent for Service) With copies to: Eric F. Fess Chapman and Cutler LLP 320 South Canal Street Chicago, Illinois 60606 TITLE OF SECURITIES BEING REGISTERED: Shares of beneficial interest ($0.01 par value per share) of First Trust WCM Focused Global Growth Fund, a Series of the Registrant. Approximate date of proposed public offering: As soon as practicable after the effective date of this Registration Statement. No filing fee is required […] a sub-adviser. ** The Target Board has approved a change of the Target Fund’s distributor from Natixis Distribution, LLC to First Trust Portfolios, L.P., which will be effective on or around September 3, 2024. Q. How will management of the Acquiring Fund differ from the management of the Target Fund as a result of the Reorganization? A. WCM has served as investment adviser to the Target Fund since its inception on June 28, 2013. First Trust will advise the Acquiring Fund after the Reorganization, with WCM handling the day-to-day operations of the Acquiring Fund as sub-adviser. First Trust is an SEC-registered investment adviser. First Trust is an experienced investment adviser that serves as adviser or sub-adviser to four mutual funds, 255 exchange-traded funds and nine closed-end funds and has over $228 billion in assets under management as of June 30, 2024. - 3 - Q. Will shareholders of the Target Fund have to pay any direct fees or expenses in connection with the Reorganization? A. No, the direct costs associated with the proposed Reorganization, including the costs associated with the Meeting, will be borne by First Trust and WCM, regardless of whether the Reorganization is completed. Certain emerging market countries may not permit the in-kind transfer of securities from the Target Fund to the Acquiring Fund. To the extent the Target Fund holds such securities, it will sell the securities in advance of the Reorganization and transfer cash to the Acquiring Fund. The Target Fund will bear the transaction costs associated with the sale of the securities and the Acquiring Fund will bear the transaction costs associated with the reinvestment of the cash received. Q. Will the Target Fund’s portfolio be repositioned prior to the Reorganization? A. No, as the strategies of the Target Fund and the Acquiring Fund will be substantially similar, it is not anticipated that the Target Fund will reposition its portfolio prior to the Reorganization. Q. How will the Reorganization impact ongoing fees and expenses? A. The Acquiring Fund will pay the same management fee rate currently paid by the Target Fund. As described in more detail in the Proxy Statement/Prospectus, WCM has contractually agreed to waive its fees and/or  […] information contained elsewhere in this Proxy Statement/Prospectus with respect to the proposed Reorganization and shareholders should reference the more complete information contained in this Proxy Statement/Prospectus and in the accompanying SAI and the appendices thereto, including the Agreement and Plan of Reorganization. Shareholders should read the entire Proxy Statement/Prospectus carefully. Certain capitalized terms used but not defined in this summary are defined elsewhere in this Proxy Statement/Prospectus. The Proposed Reorganization WCM, the investment adviser to the Target Fund, recommended to the Target Trust’s Board of Trustees that the Target Fund be reorganized into the Acquiring Fund, a newly created series of First Trust Exchange-Traded Fund for which First Trust would serve as the investment adviser. First Trust currently manages other exchange-traded funds that are investment portfolios of First Trust Series Fund. To effectuate this, the Board has approved the Reorganization pursuant to the Plan. WCM will serve as investment sub-adviser to the Acquiring Fund, and it is expected that the Acquiring Fund’s portfolio will be managed by the portfolio managers who are currently responsible for the day-to-day management of the Target Fund’s portfolio. The investment objective, principal investment strategies, principal investment risks and investment limitations of the Acquiring Fund are substantially similar to those of the Target Fund, as discussed in more detail in the Proxy Statement/Prospectus. WCM recommended the Reorganization to the Target Trust’s Board of Trustees because the Target Fund has had difficulty differentiating itself in the market place and WCM believes that First Trust has extensive experience providing investment advisory services to mutual funds; that the Target Fund can benefit from First Trust’s investment advisory experience, and that First Trust can differentiate the Acquiring Fund in the marketplace and add the Acquiring Fund to First Trust’s existing distribution networks, which could potentially add size and scale to the Fund. If shareholders of the Target Fund approve the Proposal and the Reorganization is completed each Target Fund shareholder will receive a number of shares of the applicable class of the Acquiring Fund equal in value to the aggregate net asset value of the Target […] Investments in securities issued by governments and companies operating in emerging market countries involve additional risks relating to political, economic, or regulatory conditions not associated with investments in securities and instruments issued by U.S. companies or by companies operating in other developed market countries. Investments in emerging markets securities are generally considered speculative in nature and are subject to the following heightened risks: smaller market capitalization of securities markets which may suffer periods of relative illiquidity; market manipulation; significant price volatility; restrictions on foreign investment; possible repatriation of investment income and capital; rapid inflation; and currency convertibility issues. Emerging market countries also often have less uniformity in accounting, auditing and reporting requirements, unsettled securities laws, unreliable securities valuation and greater risk associated with custody of securities. Financial and other reporting by companies and government entities also may be less reliable in emerging market countries. Shareholder claims that are available in the U.S., as well as regulatory oversight and authority that is common in the U.S., including for claims based on fraud, may be difficult or impossible for shareholders of securities in emerging market countries or for U.S. authorities to pursue. For funds that track an index or are managed based upon a benchmark, the index may not weight the securities in emerging market countries on the basis of investor protection limitations, financial reporting quality or available oversight mechanisms. Furthermore, investors may be required to register the proceeds of sales and future economic or political crises could lead to price controls, forced mergers, expropriation or confiscatory taxation, seizure, nationalization or creation of government monopolies. - 10 - Equity Securities Risk. The value of the Fund’s shares will fluctuate with changes in the value of the equity securities in which it invests. Equity securities prices fluctuate for several reasons, including changes in investors’ perceptions of the financial condition of an issuer or the general condition of the relevant […] eign countries. Risks Applicable to the Acquiring Fund The following principal risks are applicable to the Acquiring Fund. References below to the “Fund” apply to the “Acquiring Fund”. Depositary Receipts Risk. Depositary receipts represent equity interests in a foreign company that trade on a local stock exchange. Depositary receipts may be less liquid than the underlying shares in their primary trading market. Any distributions paid to the holders of depositary receipts are usually subject to a fee charged by the depositary. Holders of depositary receipts may have limited voting rights, and investment restrictions in certain countries may adversely impact the value of depositary receipts because such restrictions may limit the ability to convert the equity shares into depositary receipts and vice versa. Such restrictions may cause the equity shares of the underlying issuer to trade at a discount or premium to the market price of the depositary receipts. Europe Risk. The Fund may invest in the securities of European issuers. Therefore, in addition to the risks associated with investments in non-U.S. securities generally, the Fund is subject to certain risks associated specifically with investments in securities of European issuers. Political or economic disruptions in European countries, even in countries in which the Fund is not invested, may adversely affect security values and thus the Fund's holdings. A significant number of countries in Europe are member states in the EU, and the member states no longer control their own monetary policies by directing independent interest rates for their currencies. In these member states, the authority to direct monetary policies, including money supply and official interest rates for the Euro, is exercised by the European Central Bank. In a 2016 referendum, the United Kingdom elected to withdraw from the EU. After years of negotiations between the United Kingdom and the EU, a withdrawal agreement was reached whereby the United Kingdom formally left the EU. As the second largest economy among EU members, the implications of the United Kingdom’s withdrawal are difficult to gauge and cannot be fully known. Trade between the United Kingdom and the EU is highly integrated th\n"

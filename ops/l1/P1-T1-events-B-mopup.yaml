 Report 94 Audit and Related Fees 95 Audit Committee Pre-Approval Policies and Procedures 96 Appointment of the Independent Registered Public Accounting Firm 97 vii ADDITIONAL INFORMATION ABOUT THE ACQUIRING FUND 98 Annual Expenses Excluding the Costs of Leverage 98 Certain Provisions in the Acquiring Fund’s Declaration of Trust and By-Laws 98 Repurchase of Common Shares; Conversion to Open-End Fund 100 Description of Outstanding Acquiring Fund MFP Shares 101 Description of Outstanding Acquiring Fund VRDP Shares 104 Description of Outstanding Acquiring Fund AMTP Shares 107 Custodian, Transfer Agent, Dividend Disbursing Agent and Redemption and Paying Agent 108 Federal Income Tax Matters Associated with Investment in the Acquiring Fund 108 Net Asset Value 112 Legal Opinions 113 Experts 113 GENERAL INFORMATION 114 Outstanding Shares of the Acquiring Fund and the Target Fund 114 Shareholders of the Acquiring Fund and the Target Fund 114 Expenses of Proxy Solicitation 116 Shareholder Proposals 116 Shareholder Communications 117 Fiscal Year 117 Shareholder Report Delivery 117 Other Information 118 APPENDIX A—FORM OF AGREEMENT AND PLAN OF REORGANIZATION A-1 APPENDIX B—FINANCIAL HIGHLIGHTS B-1 viii PROPOSAL NO. 1—REORGANIZATION OF THE TARGET FUND INTO THE ACQUIRING FUND A. SYNOPSIS The following is a summary of certain information contained elsewhere in this Joint Proxy Statement/Prospectus with respect to the proposed Reorganization. More complete information is contained elsewhere in this Joint Proxy Statement/Prospectus and in the Reorganization SAI and the appendices hereto and thereto. Shareholders should read the entire Joint Proxy Statement/Prospectus carefully. Background and Reasons for the Reorganization The Target Fund’s Board has approved the Reorganization as part of an ongoing initiative to streamline Nuveen’s municipal closed-end fund  […] ative information about the organization, capitalization and operation of the Funds. Organization Fund Organization Date State of Organization Entity Type Acquiring Fund July 29, 2002 Commonwealth of Massachusetts business trust Target Fund (1) August 24, 2012 Commonwealth of Massachusetts business trust (1) The Target Fund was originally organized as Nuveen Michigan Quality Income Municipal Fund, Inc., a Minnesota corporation, on July 25, 1991. The Target Fund changed its domicile to a Massachusetts business trust in connection with a prior reorganization pursuant to a joint proxy statement/prospectus filed on September 12, 2012. Capitalization—Common Shares (1) Fund Authorized Shares Shares Outstanding (1) Par Value Per Share Preemptive, Conversion or Exchange Rights Rights to Cumulative Voting Exchange on which Common Shares are Listed Acquiring Fund Unlimited 278,590,267 $0.01 None None NYSE Target Fund Unlimited 20,226,887 $0.01 None None NYSE (1) As of September 8, 2020. Each Fund’s common shares are listed for trading on the NYSE. 3 The Funds currently have outstanding the following series of preferred shares, with the Acquiring Fund’s MFP Shares, VRDP Shares and AMTP Shares remaining outstanding following the completion of the Reorganization: Acquiring Fund—Preferred Shares Series Shares Outstanding Par Value Per Share Liquidation Preference Per Share Series A MFP Shares 1,850 $ 0.01 $ 100,000 Series B MFP Shares 3,350 $ 0.01 $ 100,000 Series C MFP Shares 2,380 $ 0.01 $ 100,000 Series D MFP Shares 200,000 $ 0.01 $ 1,000 Series 1 VRDP Shares 2,190 $ 0.01 $ 100,000 Series 2 VRDP Shares 1,309 $ 0.01 $ 100,000 Series 3 VRDP Shares 3,509 $ 0.01 $ 100,000 Series 4 VRDP Shares 4,895 $ 0.01 $ 100,000 Series 5 VRDP Shares 1,000 $ 0.01 $ 100,000 Series 2028 AMTP Shares 1,435 $ 0.01 $ 100,000 Target Fund—Preferred Shares Series Shares Outstanding Par Value Per Share Liquidation Preference Per Share Series 2028 AMTP Shares 1,730 $ 0.01 $ 100,000 Each Fund’s preferred shares are entitled to one vote per share. The AMTP Shares of the Acquiring Fund to be issued in connection with the Reorganization will have equal priority with each other and with the Acquiring Fund’s other outstanding preferred shares as to the paym […] old only pursuant to Rule 144A under the Securities Act of 1933, as amended (the “Securities Act”), and repurchase agreements with maturities in excess of seven days. Illiquid Securities: The Fund may invest in illiquid securities (i.e., securities that are not readily marketable), including, but not limited to, restricted securities (securities the disposition of which is restricted under the federal securities laws), securities that may only be resold pursuant to Rule 144A under the Securities Act of 1933, as amended (the “Securities Act”), and repurchase agreements with maturities in excess of seven days. Identical. Other Investment Companies: The Fund may invest in securities of other open- or closed-end investment companies (including exchange-traded funds (“ETFs”)) that invest primarily in municipal securities of the types in which the Fund may invest directly, to the extent permitted by the 1940 Act, the rules and regulations issued thereunder and applicable exemptive orders issued by the SEC. Other Investment Companies: Subject to certain exemptions, under the 1940 Act, the Fund may invest up to 10% of its Managed Assets in securities of other open- or closed-end investment companies (including ETFs) that invest primarily in municipal securities of the types in which the Fund may invest directly. In addition, the Fund may invest a portion of its Managed Assets in pooled investment vehicles (other than investment companies) that invest primarily in municipal securities of the types in which the Fund may invest directly. Substantially similar. Weighted Average Maturity Policy: The Fund will invest primarily in municipal securities with long-term maturities in order to maintain an average effective maturity of 15 to 30 years, including the effects of leverage, but the average effective maturity of obligations held by the Fund may be lengthened or shortened as a result of portfolio transactions effected by the Fund’s investment adviser or sub-adviser, depending on market conditions and on an Weighted Average Maturity Policy: The Fund buys municipal securities with different maturities and intends to maintain an average portfolio maturity of 15 to 30 years, although this may be shortened depending on market  […] s with higher credit ratings. While each Fund may currently invest in high yield securities, the Acquiring Fund expects to consistently allocate a greater percentage of its portfolio to lower rated municipal securities relative to the Target Fund. • Issuer Credit Risk . This is the risk that a security in a Fund’s portfolio will fail to make dividend or interest payments when due. Investments in lower rated securities are subject to higher risks than investments in higher rated securities. Because the Acquiring Fund may allocate a greater amount of its assets to lower rated municipal securities compared to the Target Fund, it is more susceptible to issuer credit risk. • Interest Rate Risk . Fixed-income securities such as bonds, preferred, convertible and other debt securities will decline in value if market interest rates rise. • Reinvestment Risk . If market interest rates decline, income earned from a Fund’s portfolio may be reinvested at rates below that of the original bond that generated the income. A decline in income could negatively affect the market price of a Fund’s shares or a shareholder’s returns. • Call Risk or Prepayment Risk . Issuers may exercise their option to prepay principal earlier than scheduled, forcing a Fund to reinvest in lower yielding securities. • Tax Risk . The tax treatment of the Funds and their distributions may be affected by new Internal Revenue Service (the “IRS”) interpretations of the Code and future changes in tax laws and regulations. In addition, because the interest income from the municipal securities held by the Funds is normally not subject to federal income tax, and in the case of the Acquiring Fund and, to a lesser extent, the Target Fund, the federal alternative minimum tax applicable to individuals, the attractiveness of municipal securities in relation to other investment alternatives is affected by changes in the tax-exempt status of interest income from municipal securities. Any proposed or actual changes in such exempt status, therefore, can significantly affect the demand for and supply, liquidity and marketability of municipal securities. This could in turn affect a Fund’s net asset value and ability to acquire and dispose of municipal securities at desir\n"

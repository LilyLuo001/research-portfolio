ars exactly\nonce in your answer map (count them); every event object quotes ETF-acquirer evidence;\nevery date matches ^\\d{4}-\\d{2}-\\d{2}$ or is \"NA\"; no ticker field contains a space.】\n文件: 0001680359-20-000076 (form N-14, filed 2020-03-20, NATIONWIDE MUTUAL FUNDS  (CIK 0001048702))\nsource_url: https://www.sec.gov/Archives/edgar/data/1048702/000168035920000076/nmfn14retirement03202020.htm\n节选:\nN-14 1 nmfn14retirement03202020.htm As filed with the Securities and Exchange Commission on March 20, 2020 File No. 333-_______ UNITED STATES SECURITIES AND EXCHANGE COMMISSION WASHINGTON, D.C. 20549 FORM N-14 REGISTRATION STATEMENT UNDER THE SECURITIES ACT OF 1933 Pre-Effective Amendment No. ____ [ ] Post-Effective Amendment No. ____ [ ] (Check appropriate box or boxes) NATIONWIDE MUTUAL FUNDS (Exact Name of Registrant as Specified in Charter) ONE NATIONWIDE PLAZA, MAIL CODE 05-02-210, COLUMBUS, OHIO 43215 (Address of Principal Executive Offices) (Number, Street, City, State, Zip Code) (614) 435-5787 (Registrant's Area Code and Telephone Number) Send Copies of Communications to: ALLAN J. OSTER, ESQ. PRUFESH R. MODHERA, ESQ. 10 WEST NATIONWIDE BOULEVARD STRADLEY RONON STEVENS, & YOUNG LLP COLUMBUS, OHIO 43215 2000 K STREET, N.W., SUITE 700 WASHINGTON, D.C. 20006 (NAME AND ADDRESS OF AGENT FOR SERVICE) Approximate Date of Public Offering: As soon as practicable after this Registration Statement becomes effective under the Securities Act of 1933, as amended. Title of securities being registered: Class A, Class R, Class R6 and Institutional Service Class shares of beneficial interest, […] tion 2020 Fund, a series of Nationwide Mutual Funds (the “Trust”), will be reorganized with and into the Nationwide Destination Retirement Fund, also a series of the Trust (the “Transaction”). The Prospectus/Information Statement discusses this proposed Transaction and provides you with information that you should consider. The Board of Trustees of the Trust approved the Transaction and concluded that the Transaction is in the best interests of the Nationwide Destination 2020 Fund and its shareholders. Please review the information in the Prospectus/Information Statement for your reference. You do not need to take any action regarding your account. On or about _____________, 2020, your shares of the Nationwide Destination 2020 Fund will be converted automatically at their net asset value into the shares of the corresponding class of the Nationwide Destination Retirement Fund. If you have any questions, please call the Trust toll-free at (800) 848-0920. i PROSPECTUS/INFORMATION STATEMENT TABLE OF CONTENTS INTRODUCTION 3 The Transaction 3 How do the investment objectives, principal strategies and policies of the Target Fund compare against the Acquiring Fund? 3 What are the principal risks associated with investments in the Target Fund versus the Acquiring Fund? 4 What are the general tax consequences of the Transaction? 4 Who manages the Funds? 4 What are the fees and expenses of each Fund and what might they be after the Transaction? 5 How do the performance records of the Funds compare? 8 Where can I find more financial information about the Funds? 10 What are other key features of the Funds? 10 COMPARISON OF INVESTMENT OBJECTIVES, PRINCIPAL STRATEGIES, POLICIES AND PRINCIPAL RISKS 11 What are the differences between the investment objectives of the Target Fund and the Acquiring Fund? 12 What are the most significant differences between the principal strategies and policies of the Target Fund compared to the Acquiring Fund? 12 How do the fundamental investment restrictions of the Target Fund differ from the Acquiring Fund? 12 What are the principal risk factors associated with investments in the Funds? 13 REASONS FOR THE TRANSACTION 15 INFORMATION ABOUT THE TRANSACTION AND THE PLAN 16 How will the Transaction  […] ly 26% in U.S. stocks (including smaller company stocks), and approximately 9% in international stocks. Each Fund is classified as “non-diversified” under applicable federal law and will not concentrate its investments in any one industry. For further information about the investment objectives and policies of the Funds, see “Comparison of Investment Objectives, Principal Strategies, Policies and Principal Risks” below. What are the principal risks associated with investments in the Target Fund versus the Acquiring Fund? At the time of the Transaction, the Target Fund and Acquiring Fund will have identical principal risks and in the same degree. Specifically, the Target Fund and Acquiring Fund share the following risks: fund-of-funds risk, exchange-traded funds risk, management risk, market risk, equity securities risk, foreign securities risk, smaller company risk, fixed-income securities risk, mortgage-backed and asset-backed securities risks, derivatives risk, index fund risk, liquidity risk, limited portfolio holdings risk and retirement goal risk. For a detailed comparison of each Fund’s principal risks, see the section below entitled “Comparison of Investment Objectives, Principal Strategies, Policies and Principal Risks.” What are the general tax consequences of the Transaction? The Transaction is intended to qualify as a tax-free reorganization for federal income tax purposes (although there can be no assurance that the Internal Revenue Service (“IRS”) will adopt a similar position). This means that the shareholders of the Target Fund will not recognize any gain or loss for federal income tax purposes as a result of the exchange of their shares in the Target Fund for Acquiring Fund Shares pursuant to the Transaction. Prior to and in anticipation of the closing of the Transaction, the Target Fund will distribute to its shareholders, in one or more taxable distributions, all of its income and gains (net of available capital loss carryovers) not previously distributed for taxable years ending on or prior to the date of closing of the Transaction. You should consult your tax advisor regarding the effect, if any, of the Transaction in light of your individual circumstances. You should also consult your tax a […] s, such as common stocks of U.S. and international companies. The Target Fund currently allocates approximately 59% of its assets in fixed-income securities, approximately 29% in U.S. stocks (including smaller company stocks), and approximately 12% in international stocks. The Acquiring Fund currently allocates approximately 65% of its assets in fixed-income securities, approximately 26% in U.S. stocks (including smaller company stocks), and approximately 9% in international stocks. The Target Fund’s asset allocations are expected to be adjusted before the Merger to match the Acquiring Fund’s asset allocations. Each Fund invests primarily in affiliated portfolios of Nationwide Mutual Funds, but also may invest in affiliated or unaffiliated exchange-traded funds (each, an \"Underlying Fund\" or collectively, \"Underlying Funds\"), that collectively represent several asset classes. Each Fund may also invest in a fixed interest contract issued by Nationwide Life Insurance Company (“Nationwide Contract”). Many Underlying Funds are \"index\" funds that invest directly in equity securities, bonds or other securities with a goal of obtaining investment returns that closely track a benchmark stock or bond index. Each Fund also invests in certain Underlying Funds that are not index funds. Some Underlying Funds may use futures, swaps and options, which are derivatives, either to hedge against investment risks, to obtain exposure to certain securities or groups of securities, or otherwise to increase returns. Although each Fund seeks to provide diversification across several asset classes, each Fund invests a significant portion of its assets in a small number of issuers (i.e., Underlying Funds). However, each Fund may invest directly in securities and derivatives (futures, options, and swaps) in addition to investing in Underlying Funds. Further, the Underlying Funds in which the Funds invest generally are diversified. Each Fund is classified as “non-diversified” under applicable federal law, which means that, with respect to 75% of its total assets, the Fund may invest more than 5% of such assets in any one issuer or may hold more than 10% of the outstanding securities of any one issuer. Each Fund will not purchase the securi […] iliated Underlying Funds and, therefore, has an incentive to invest the Fund’s assets in affiliated Underlying Funds instead of unaffiliated Underlying Funds. In addition, NFA might have an interest in making an investment in an affiliated Underlying Fund, or in maintaining an existing investment in an affiliated Underlying Fund, in order to benefit that affiliated Underlying Fund (for example, by assisting the affiliated Underlying Fund in achieving or maintaining scale). To the extent that the Fund invests in the Nationwide Contract, Nationwide Life Insurance Company, an affiliate of the investment adviser, also earns money. Notwithstanding the foregoing, NFA has a fiduciary duty to the Fund and must act in the best interest of the Fund. Exchange-traded funds risk . When a Fund invests in an exchange-traded fund (“ETF”), you will indirectly bear fees and expenses charged by the ETF in addition to a Fund’s direct fees and expenses. In addition, a Fund may be affected by losses of the ETF and the level of risk arising from the investment practices of the ETF (such as the use of leverage by the ETF). A Fund has no control over the investments and related risks taken by the ETF in which it invests. Additionally, investments in ETFs are also subject to the following risks: (i) the market price of an ETF’s shares may trade above or below their net asset value; (ii) an active trading market for an ETF’s shares may not develop or be maintained; or (iii) trading of an ETF’s shares may be halted for a number of reasons. Management risk. Each Fund is subject to the risk that the methods and analyses employed by NFA, or by an Underlying Fund’s investment adviser or subadvisers, may not produce the desired results. This could cause a Fund to lose value or its results to lag those of relevant benchmarks or other funds with similar objectives. Market risk. The risk that one or more markets in which a Fund or an Underlying Fund invests will go down in value, including the possibility that the markets will go down sharply and unpredictably. Equity securities risk. Stock markets are volatile. The price of an equity security fluctuates based on changes in a company’s financial condition and overall market and economic condition\n"

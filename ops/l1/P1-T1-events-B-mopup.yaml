ows of\n   the Target/Acquiring fund table, a 4-fund filing yields 4 objects}, ... ]}\n  or the no_event object above.\nEach event object:\n  fund_name        target mutual fund's full name (from excerpt)\n  family           fund family/trust (from excerpt)\n  mutual_fund_ticker / etf_ticker\n                   a single 2-6 char UPPERCASE symbol from the excerpt, else \"NA\".\n                   NEVER a fund name. Multiple class tickers → \"NA\" and list them in evidence.\n  announce_date    YYYY-MM-DD only. Board-approval date if stated; else the document's own\n                   date; else the filed date. Vague (\"May 2020\",\"Q4 2026\") → \"NA\".\n  date_basis       \"board\" | \"document\" | \"filed\" | \"NA\"\n  effective_date   YYYY-MM-DD only; the stated closing/completion date. Vague → \"NA\".\n  asset_class      equity_US / equity_intl / fixed_income / other — ONLY if locatable in the\n                   excerpt (bond/muni/high-yield/MBS→fixed_income; International/EM/Asia→\n                   equity_intl; explicit US equity→equity_US; managed-futures/multi-asset/\n                   long-short→other). Name alone insufficient → \"NA\".\n  AUM_at_conversion_USD  number from excerpt or \"NA\"\n  source_accession copy from the 文件 line\n  confidence       H = fund identity + (announce or effective) with explicit basis;\n                   M = identity clear, dates partly missing/document-dated;\n                   L = identity inferred from title only\n  evidence         ≤25-word quote fragment supporting the verdict (for events: the words\n                   showing the acquirer is an ETF; for no_event: the words showing why not)\nNEED_HUMAN only when TWO date statements INSIDE THIS ONE EXCERPT contradict for the same\nfund: {\"NEED_HUMAN\": true, \"quotes\": [\"...\", \"...\"]}. Different filings never contradict.\nNever fill any field from memory — excerpt-locatable or \"NA\".\n\nSELF-CHECK before emitting (do this, don't print it): every input item id appears exactly\nonce in your answer map (count them); every event object quotes ETF-acquirer evidence;\nevery date matches ^\\d{4}-\\d{2}-\\d{2}$ or is \"NA\"; no ticker field contains a space.】\n文件: 0001592900-24-002426 (form N-14, filed 2024-11-27, EA Series Trust  (CIK 0001592900))\nsource_url: https://www.sec.gov/Archives/edgar/data/1592900/000159290024002426/matrixn-14a.htm\n节选:\nN-14 1 matrixn-14a.htm N-14 Matrix N-14 AS FILED WITH THE SECURITIES AND EXCHANGE COMMISSION ON NOVEMBER 27, 2024 File No. 333-[ ] SECURITIES AND EXCHANGE COMMISSION WASHINGTON, D.C. 20549 FORM N-14 REGISTRATION STATEMENT UNDER THE SECURITIES ACT OF 1933 [X] Pre-Effective Amendment No. [ ] Post-Effective Amendment No. [ ] (Check appropriate box or boxes) EA Series Trust (Exact Name of Registrant as Specified in Charter) 19 East Eagle Road Havertown, Pennsylvania 19083 (Address of Principal Executive Offices) (215) 330-4476 (Registrant’s Area Code and Telephone Number) Alyssa M. Bernard 19 East Eagle Road Havertown, Pennsylvania 19083 (Name and Address of Agent for Service) Copy to: Karen Aspinall, Esq. Practus, LLP 11300 Tomahawk Creek Parkway, Suite 310 Leawood, Kansas 66211 Approximate Date of Proposed Public Offering: As soon as practicable after this Registration Statement becomes effective under the Securities Act of 1933, as amended. Title of Securities Being Registered: Shares of beneficial interest, with no par value, of the Matrix Advisors Value ETF. It is proposed that the filing will go effective on December 27, 2024 pursuant to Rule 488 under the Securities Act of 1933. […]  and Plan of Reorganization (the “Plan”). The Plan will provide for the transfer of all of the assets of the Acquired Fund to the Matrix Advisors Value ETF (the “Acquiring Fund”), a newly created series of the EA Series Trust (the “EA Trust”), in exchange solely for shares of the Acquiring Fund and cash, and the assumption of all of the liabilities of the Target Fund by the Acquiring Fund, and the distribution of the Acquiring Fund’s shares and cash received by the Target Fund to its shareholders in complete liquidation of the Target Fund (the “Reorganization”). In order to receive shares of the Acquiring Fund as part of the Reorganization, you must hold your shares of the Target Fund through a brokerage account that permits investments in exchange-traded fund shares (a “Qualifying Account”). If you are unsure about the ability of your account to receive Acquiring Fund shares, please contact your financial advisor or other financial intermediary. You also may call Matrix Advisors at 1-800-366-6223 for assistance. • Each shareholder of the Target Fund that holds their Target Fund shares through a Qualifying Account will receive a number of shares of beneficial interest of the Acquiring Fund and cash in lieu of fractional Acquiring Fund shares (if applicable) equal in value to the aggregate net asset value of the shares of the Target Fund held by the Target Fund shareholder immediately prior to the Reorganization and will become a shareholder of the Acquiring Fund. You will receive cash from your financial intermediary in lieu of fractional shares (which will generally result in the recognition of gain or loss by the Target Fund shareholder for federal income tax purposes). • Each shareholder of the Target Fund that holds their Target Fund shares through an account that is not permitted to hold Acquiring Fund shares (a “Non-Qualifying Account”) will receive cash equal in value to the aggregate net asset value of the shares of the Target Fund held by the Target Fund shareholder immediately prior to the Reorganization (which will generally result in the recognition of gain or loss by the Target Fund shareholder for federal income tax purposes) and will not become a shareholder of the Acquiring Fund. If you hold you […] et Fund’s shareholders vote to approve the Plan, on the closing date of the Reorganization, shareholders of the Target Fund will receive shares of the Acquiring Fund plus a cash payment in lieu of fractional shares, of equivalent aggregate NAV to their investment in the Target Fund, immediately prior to the reorganization. The Target Fund will then be liquidated and dissolved. The Target Fund and the Acquiring Fund (each, a “Fund” and, collectively, the “Funds”) have identical investment objectives and substantially similar principal investment strategies. The Funds also have substantially similar principal investment risks, except that the Acquiring Fund will also be subject to certain principal investment risks due to its structure as an exchange-traded fund (“ETF”). 13 This Proxy Statement/Prospectus includes information about the Plan and the Acquiring Fund that you should know before voting on the Plan, which if approved, would result in your owning shares of the Acquiring Fund after the Reorganization. The following documents each have been filed with the U.S. Securities and Exchange Commission (the “SEC”), and are incorporated herein by reference: Target Fund Prospectus and Statement of Additional Information (“SAI”) dated October 31, 2024, as supplemented, filed with the SEC (File Nos. 002-84222 and 811-03758) (Accession No. 0000894189-24-006424); Target Fund Annual Report to shareholders for the fiscal year ended June 30, 2024, filed with the SEC (File No. 811-03758) (Accession No. 0001133228-24-008838). Target Fund Semi-Annual Report to shareholders for the period ended December 31, 2023, filed with the SEC (File No. (811-03758) (Accession No. 0001104659-24-031838). Acquiring Fund Prospectus and Statement of Additional Information dated [ ], 2024, filed with the SEC on [ ] (Accession No. [ ]). You may request a free copy of the Target Fund’s Prospectus and SAI without charge by writing to the Target Fund at 10 Bank Street, Suite 590, White Plains, NY 10606 or by calling (800) 366-6223. You may request a free copy of the Acquiring Fund’s Prospectus and SAI by calling (215) 330-4476. Because the Acquiring Fund has not yet commenced operations, no shareholder reports are available. This Proxy Statement/P […]  of the Reorganization will be borne by Matrix Advisors; • The Reorganization is expected to qualify as a tax-free reorganization for federal income tax purposes; • The capabilities of EA Advisers, including the depth and experience of senior management; • Possible disadvantages to shareholders were outweighed by the advantages. In this regard, the Board considered disadvantages such as that shares must be held in a brokerage account, not at the Fund’s transfer agent which could require an application be completed by shareholders to open a brokerage account if one does not exist; Shareholders may have slightly higher trading costs because ETFs trade like stocks, and the market trade price for the ETF may differ slightly from the NAV; • The conversion process should be a non-event to nearly all Target Fund shareholders because only a small segment of shareholders hold their shares outside of a brokerage account; and 2 • The alternatives to the Reorganization such as maintaining the status quo, liquidating the Target Fund or merging with another acquiring fund were less favorable than the Reorganization. After considering Matrix Advisors’ presentations, discussions with representatives of Matrix Advisors and EA Advisers, and Matrix Advisors’ recommendation to the Target Fund Board during a meeting on November 1, 2024, the Target Fund Board, based on these considerations, approved the Reorganization, recommended that shareholders approve the Plan, and approved the solicitation of shareholders of the Target Fund to vote on the Plan, the form of which is attached to this Proxy Statement/Prospectus in Appendix A. B. Comparison Fee Tables and Examples The following table shows the fees and expenses for the Target Fund based on the Target Fund’s fees and expenses as of October 31, 2024. The table also shows the estimated pro forma fees and expenses attributable to the pro forma Acquiring Fund. The fees and expenses and the example below do not include the brokerage commissions and other fees to financial intermediaries that investors may pay on their purchases and sales of shares of a Fund. The Target Fund pays Matrix Advisors an advisory fee and separately bears various other expenses incurred by the Target Fund. Matr […] ders, provided that no such amendment after such approval may have the effect of changing the Plan to the detriment of such shareholders without their further approval. In addition, the Plan may be terminated at any time prior to the Closing by the Target Fund Board or the EA Trust Board if, among other reasons, the Target Fund Board or the EA Trust Board determines that the Reorganization is not in the best interests of its shareholders. 2. Description of the Acquiring Fund’s Shares The Acquiring Fund’s shares issued to the shareholders of the Target Fund pursuant to the Reorganization will be duly authorized, validly issued, fully paid and non-assessable when issued, will be transferable without restriction and will have no preemptive or conversion rights. Individual shares of the Acquiring Fund may only be bought and sold in the secondary market through a broker-dealer at market price. 3. Board Considerations Relating to the Reorganization The Target Fund Board considered and discussed the Reorganization with representatives of Matrix Advisors and EA Advisers at a meeting held on November 1, 2024. The Target Fund Board, based on these considerations, approved the Plan and the solicitation of shareholders of the Target Fund to vote on the Plan. In considering the Plan and the Reorganization, the Target Fund Board and its Independent Directors reviewed information provided by EA Advisers and Matrix Advisors in response to an information request addressing, among other things, the nature and structure of the Reorganization, the proposed impact and benefits to shareholders, any changes in portfolio strategy, management, or design, the differences to shareholders of owning shares of an ETF compared to a more traditional mutual fund, EA Advisers’ experience, resources and capabilities, and the tax impact of the Reorganization. At the meeting held on November 1, 2024, the Target Fund Board met with representatives from EA Advisers and Matrix Advisors who presented their reasoning for the Reorganization of the Target Fund into the Acquiring Fund. Matrix Advisors explained to the Target Fund Board that it had concluded that the Reorganization should benefit shareholders of the Target Fund and recommended that the Tar\n"

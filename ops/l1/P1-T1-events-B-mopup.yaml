    For the Conversion of the Dividend Builder Fund, the “other expenses” component of the Acquiring ETF’s
    annual fund operating expenses will be lower upon conversion, 0.97% as compared to 1.00% . For both
    Acquiring ETFs, the Adviser has entered into an expense limitation agreement which will run through
    June 2024, to ensure that for each Conversion, shareholders will receive Acquiring ETF shares that

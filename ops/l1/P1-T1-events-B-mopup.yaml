e same as that of the Target Fund’s shares. The total annual fund operating expenses for the shares of the Target Fund are 0.75% of the Target Fund’s average daily net assets. The projected total annual fund operating expenses for the shares of the Acquiring Fund are estimated to be 0.75% of the Acquiring Fund’s average daily net assets. Shareholders will continue to be able to make additional purchases or sales of the Target Fund shares through their financial intermediary up to and including the day of the Reorganization. If the Reorganization is approved, Target Fund shares will automatically be converted to Acquiring Fund shares. 2 SUMMARY COMPARISON OF THE FUNDS Fees and Expenses of the Fund The table below describes the fees and expenses that you pay if you buy and hold shares of the Target Fund and the pro forma fees and expenses that you may pay if you buy and hold shares of the Acquiring Fund after giving effect to the Reorganization. Expenses for the Target Fund are based on operating expenses of the Target Fund for the fiscal period ended May 31, 2019. Expenses for the Acquiring Fund are pro forma operating expenses of the Acquiring Fund for the same period, assuming the Reorganization had occurred prior to the start of the period. Fees and Expenses Target Fund Shares Acquiring Fund Shares (pro forma) Annual Fund Operating Expenses (e xpenses that you pay each year as a percentage of the value of your investment) Management Fee 0.75% 0.75% Distribution (12b-1) Fees 0.00% 0.00% Other Expenses 0.00% 0.00% (1) Total Annual Fund Operating Expenses 0.75% 0.75% (1) Based on estimated amounts for the current fiscal year. Example The Example below is intended to help you compare the cost of investing in shares of the Target Fund with the cost of investing in shares of the Acquiring Fund on a pro forma basis. The Example assumes that you invest $10,000 in each Fund and then redeem all of your shares at the end of each period. The Example also assumes that your investment has a 5% annual return and that operating expenses remain the same. Although your actual costs may […] x treatment of the Reorganization. The opinion of counsel, if delivered, will be based on the Code, regulations issued by the Treasury Department under the Code, court decisions, and administrative pronouncements issued by the IRS with respect to all of the foregoing, all as in effect on the date of the opinion, and all of which may be repealed, revoked or modified thereafter, possibly on a retroactive basis. Description of the Acquiring Fund’s Shares Shares of the Acquiring Fund issued to the shareholders of the Target Fund pursuant to the Reorganization will be duly authorized, validly issued, fully paid, and non-assessable when issued in accordance with the Plan and will be transferable without restriction and will have no preemptive or conversion rights. Capitalization The capitalization of the Target Fund as of October 22, 2019 and the Acquiring Fund’s pro forma combined capitalization as of that date, after giving effect to the Reorganization, are as follows: (unaudited) Target Fund Shares Pro forma Acquiring Fund Shares Net Assets $10,270,585 $10,270,585 Shares Outstanding 450,000 450,000 Net Asset Value per Share $22.82 $22.82 15 ADDITIONAL INFORMATION ABOUT THE FUNDS General For a general discussion of the operation and organization of the Target Fund, see “General Information About the Trust” and “Exchange Listing and Trading” in the Target Fund SAI, which is incorporated by reference herein. For a general discussion of the operation and organization of the Acquiring Fund, see “General Information About the Trust” and “Exchange Listing and Trading” in Appendix E attached to this Proxy Statement. Rights of the Funds’ Shareholders ESS is not required to hold annual meetings of shareholders. Each Target Fund share has one vote with respect to matters upon which a shareholder vote is required consistent with the requirements of the 1940 Act. Target Fund shares have no preemptive, exchange, subscription, or conversion rights and are freely transferable. For a description of other significant attributes of shares of the Target Fund see “Description of Shares” in the Target Fund SAI, which is incorporated by reference herein. PFT is not required to hold meetings of shareholders. Shares of the Acquiring Fund have equal voting rights. Acquiring Fund shares are freely transferable. Shares of the Acquiring Fund will not have preemptive rights or cumulative voting rights, and none of the shares will have any preference to conversion, exchange, dividends, retirements, liquidation, redemption, or any other feature. For a description of other significant attributes of shares of the Acquiring Fund see “Description of Shares” in the Appendix E attached to this Proxy Statement. Pricing of Fund Shares For information on how the NAV per share of each Fund is calculated, see “Determination of NAV” in the Target Fund Prospectus and “Buying and Selling Fund Shares” in Appendix D attached to this Proxy Statement. Dividends, Other Distributions, and Taxes The Target Fund and the Acquiring Fund each intend to pay out dividends quarterly, if any, and distribute any net realized capital gains to their applicable shareholders at least annually. A portion of the distributions made by a Fund may be treated as return of capital for federal income tax purposes. One or more additional distributions may be made generally in December or after a Fund’s fiscal year-end to comply with applicable law. Each Fund will declare and pay capital gain distributions in cash. Distributions in cash may be reinvested automatically in additional Fund shares only if the broker through whom you purchased Fund shares makes such option available. Your broker is responsible for distributing the income and capital gain distributions to you. For a discussion of the Target Fund’s policies with respect to dividends and distributions, and federal income tax considerations, see “Dividends, Distributions, and Taxes” in the Target Fund Prospectu […] ll be repaid by the Fund promptly. Borrowing will tend to exaggerate the effect on NAV of any increase or decrease in the market value of the Fund’s portfolio. Money borrowed will be subject to interest costs that may or may not be recovered by earnings on the securities purchased. The Fund also may be required to maintain minimum average balances in connection with a borrowing or to pay a commitment or other fee to maintain a line of credit; either of these requirements would increase the cost of borrowing over the stated interest rate. DEPOSITARY RECEIPTS. To the extent the Fund invests in stocks of foreign corporations, the Fund’s investment in securities of foreign companies may be in the form of depositary receipts or other securities convertible into securities of foreign issuers. American Depositary Receipts (“ADRs”) are dollar-denominated receipts representing interests in the securities of a foreign issuer, which securities may not necessarily be denominated in the same currency as the securities into which they may be converted. ADRs are receipts typically issued by United States banks and trust companies which evidence ownership of underlying securities issued by a foreign corporation. Generally, ADRs in registered form are designed for use in domestic securities markets and are traded on exchanges or over-the-counter in the United States. Depositary receipts will not necessarily be denominated in the same currency as their underlying securities. The Fund will not invest in any unlisted Depositary Receipts or any Depositary Receipt that the Adviser deems to be illiquid or for which pricing information is not readily available. In addition, all Depositary Receipts generally must be sponsored. However, the Fund may invest in unsponsored Depositary Receipts under certain limited circumstances. The issuers of E-3 unsponsored Depositary Receipts are not obligated to disclose material information in the United States and, therefore, there may be less information available regarding such issuers and there may not be a correlation between such information and the value of the Depositary Receipts. The use of Depositary Receipts may increase tracking error relative to an underlying Index. Equity Securities . E\n"

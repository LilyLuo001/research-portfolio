been taken into account in the net asset valuation of the Target Fund, and, upon delivery of the Assets and the filing of any documents that may be required under Delaware state law, the Acquiring Fund will acquire good and marketable title to the Assets, subject to no restrictions on their full transfer, other than such restrictions as might arise under the 1933 Act, and other than as disclosed to and accepted in writing by the Acquiring Fund. (n) (i) The Trust, on behalf of the Target Fund, has the power to enter into this Agreement and to consummate the transactions contemplated herein; (ii) the execution, delivery and performance of this Agreement and consummation of the transactions contemplated herein have been duly authorized by all necessary action on the part of the Trustees of the Trust, on behalf of the Target Fund; and (iii) this Agreement constitutes a valid and binding obligation of the Trust, on behalf of the Target Fund, enforceable in accordance with its terms, and no other action or proceedings by the Trust, on behalf of th\n"

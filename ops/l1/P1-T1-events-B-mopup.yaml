ows of\n   the Target/Acquiring fund table, a 4-fund filing yields 4 objects}, ... ]}\n  or the no_event object above.\nEach event object:\n  fund_name        target mutual fund's full name (from excerpt)\n  family           fund family/trust (from excerpt)\n  mutual_fund_ticker / etf_ticker\n                   a single 2-6 char UPPERCASE symbol from the excerpt, else \"NA\".\n                   NEVER a fund name. Multiple class tickers → \"NA\" and list them in evidence.\n  announce_date    YYYY-MM-DD only. Board-approval date if stated; else the document's own\n                   date; else the filed date. Vague (\"May 2020\",\"Q4 2026\") → \"NA\".\n  date_basis       \"board\" | \"document\" | \"filed\" | \"NA\"\n  effective_date   YYYY-MM-DD only; the stated closing/completion date. Vague → \"NA\".\n  asset_class      equity_US / equity_intl / fixed_income / other — ONLY if locatable in the\n                   excerpt (bond/muni/high-yield/MBS→fixed_income; International/EM/Asia→\n                   equity_intl; explicit US equity→equity_US; managed-futures/multi-asset/\n                   long-short→other). Name alone insufficient → \"NA\".\n  AUM_at_conversion_USD  number from excerpt or \"NA\"\n  source_accession copy from the 文件 line\n  confidence       H = fund identity + (announce or effective) with explicit basis;\n                   M = identity clear, dates partly missing/document-dated;\n                   L = identity inferred from title only\n  evidence         ≤25-word quote fragment supporting the verdict (for events: the words\n                   showing the acquirer is an ETF; for no_event: the words showing why not)\nNEED_HUMAN only when TWO date statements INSIDE THIS ONE EXCERPT contradict for the same\nfund: {\"NEED_HUMAN\": true, \"quotes\": [\"...\", \"...\"]}. Different filings never contradict.\nNever fill any field from memory — excerpt-locatable or \"NA\".\n\nSELF-CHECK before emitting (do this, don't print it): every input item id appears exactly\nonce in your answer map (count them); every event object quotes ETF-acquirer evidence;\nevery date matches ^\\d{4}-\\d{2}-\\d{2}$ or is \"NA\"; no ticker field contains a space.】\n文件: 0001213900-26-041534 (form 497, filed 2026-04-08, Investment Managers Series Trust III  (CIK 0000924727))\nsource_url: https://www.sec.gov/Archives/edgar/data/924727/000121390026041534/ea0285517-01_497.htm\n节选:\n497 1 ea0285517-01_497.htm 497 INVESTMENT MANAGERS SERIES TRUST III Mast Managed Futures Strategy Fund 235 West Galena Street Milwaukee, Wisconsin 53212 April 8, 2026 Dear Valued Shareholder: A Special Meeting of Shareholders of the Mast Managed Futures Strategy Fund (the “Target Fund”), a series of Investment Managers Series Trust III (the “Trust”), has been scheduled for May 22, 2026 (the “Special Meeting”). At the Special Meeting, you will be asked to vote on an Agreement and Plan of Reorganization (the “Plan”) providing for thesv reorganization of the Target Fund, a mutual fund, into the Mast HedgeIndex Managed Futures Strategy ETF (the “Acquiring ETF”), a newly organized exchange-traded fund (“ETF”) series of the Trust. The Plan will provide for the transfer of all of the assets of the Target Fund to the Acquiring ETF, in exchange solely for shares of the Acquiring ETF and the assumption of all of the liabilities of the Target Fund by the Acquiring ETF, and the distribution of the Acquiring ETF’s shares received by the Target Fund to its shareholders in complete liquidation of the Target Fund (the “Reorganization”). The Acquiring ETF is a newly organized series of the Trust th […]  the attached Proxy Statement) . As a result, management recommended to the Trust’s Board of Trustees (the “Board”) that the Target Fund be reorganized into the Acquiring ETF. After careful consideration, for the reasons discussed in the attached combined proxy statement/prospectus (“Proxy Statement”), the Board determined that the Reorganization is in the best interest of the Target Fund and that the interests of the Target Fund’s shareholders will not be diluted as a result of the Reorganization. The Board recommends that you read the attached Proxy Statement carefully and then vote FOR the proposal. If the Reorganization is approved by shareholders, prior to the Reorganization, the Target Fund’s Class A shares and Class C shares will be converted into the Target Fund’s Class I Shares. No sales charges or redemption fees will be imposed in connection with this conversion. Unlike Class A and Class C shares, the Target Fund’s Class I shares are not subject to sales charges or fees pursuant to a distribution plan adopted pursuant to Rule 12b-1 under the Investment Company Act of 1940, as amended. Shareholders will be informed of the share class conversion date once it has been determined. The costs incurred with respect to the Reorganization will be borne by Mast Investments and the Reorganization is not expected to result in any increase in ongoing shareholder fees or expenses. No sales charges or redemption fees will be imposed in connection with the Reorganization. If the shareholders of the Target Fund do not approve the Reorganization, then the Reorganization will not be implemented and Mast Investments will continue to manage the Target Fund. The attached Proxy Statement is designed to give you more information about the proposal. If you have any questions regarding the proposal, please do not hesitate to call 1-833-829-0010. If you were a shareholder of record of the Target Fund as of the close of business on March 23, 2026, the record date for the Special Meeting, you are entitled to vote on the proposal at the Special Meeting and at any adjournment thereof. While you are, of course, welcome to join us at the Special Meeting, we expect that most shareholders will cast their votes by filling out and signing the enclosed proxy card or voting by telephone or Internet as described herein. Whether or not you are planning to attend the Special Meeting, we need your vote. Please submit your vote via the options listed on your proxy card, which includes voting by mail, calling the toll-free number on your proxy card to vote by telephone or Internet voting. You may revoke your proxy before it is exercised at the Spec […]  respect to cash received by shareholders in lieu of fractional shares and with respect to shares held through Non-Qualifying Accounts, as described below). Q: How will the Reorganization work? A. In the Reorganization, pursuant to the Plan, the Target Fund will transfer all of its assets to the Acquiring ETF in return for shares of the Acquiring ETF, and the Acquiring ETF’s assumption of the Target Fund’s liabilities. The Target Fund will then liquidate by distributing the shares and cash it receives from the Acquiring ETF to the shareholders of the Target Fund. In order to receive shares of the Acquiring ETF as part of the Reorganization, you must hold your shares of the Target Fund through a brokerage account that permits investments in exchange-traded fund shares (a “ Qualifying Account ”). If you hold your Target Fund shares through a Qualifying Account, you will receive Acquiring ETF shares and cash in lieu of fractional Acquiring ETF shares (if applicable) having an aggregate net asset value equal to the aggregate net asset value of the shares of the Target Fund you owned immediately prior to the Reorganization. The Acquiring ETF does not issue fractional shares. If your financial intermediary does not have a policy to hold fractional shares of ETFs, you will receive cash from your financial intermediary in lieu of fractional shares. You should contact your financial intermediary to determine its policy with respect to fractional shares of ETFs and whether you will hold fractional shares of the Acquiring ETF after the Reorganization or whether you will receive cash in lieu of fractional shares. Shareholders that receive cash will generally be required to recognize gain or loss upon the receipt of cash for their fractional shares. If you hold your Target Fund shares through an account that is not permitted to hold Acquiring ETF shares (a “ Non-Qualifying Account ”), such as an account directly with the Target Fund at the Target Fund’s transfer agent, you will receive cash equal in value to the aggregate net asset value of the shares of the Target Fund you owned immediately prior to the Reorganization (which will generally result in the recognition of gain or loss for federal income tax purposes) and you w […] ive cash equal in value to the net asset value of the Target Fund shares. If you hold Target Fund shares in an IRA account, the return of cash may be treated as a taxable withdrawal or other taxable distribution by the IRA or other retirement account to you. In addition to being treated as taxable income, in some cases, the cash payment may also be subject to a 10% early distribution tax for IRAs. Please consult with your financial intermediary for more information on the impact that the Reorganization will have on you and your investments. If you hold shares of the Target Fund in an account directly with the Target Fund and do not take action to transfer your investment in the Target Fund to a brokerage account that permits investments in exchange-traded fund shares prior to the Reorganization, your Target Fund shares will be liquidated and you will receive cash equal in value to the net asset value of the Target Fund shares (which will generally result in the recognition of gain or loss to you for federal income tax purposes) and you will not become a shareholder of the Acquiring ETF. If you are unsure about the ability of your account to receive Acquiring ETF shares, please call 1-833-829-0010 or contact your financial advisor or other financial intermediary. Q. Has the Board approved the Reorganization? A. Yes, the Board approved the Reorganization at a meeting on January 20, 2026. After careful consideration, the Board, including all of the Trustees who are not “interested persons” of the Target Fund (as defined in the Investment Company Act of 1940, as amended (the “1940 Act”)) (the “Independent Trustees”), determined that the Reorganization is in the best interests of the Target Fund and its shareholders and that the Target Fund’s existing shareholders’ interests will not be diluted as a result of its Reorganization. The Acquiring ETF does not have existing shareholders. Q. What will change when the mutual fund is converted to an ETF? A. Your fund will be an exchange traded investment company, known as an ETF. After the Reorganization, your fund will remain a registered investment company, but it will be exchange traded, and, if you own your Target Fund shares in a Qualifying Account, you will own shares\n"

    497 1 d526971d497.htm HARTFORD FUNDS EXCHANGE-TRADED TRUST Hartford Funds Exchange-Traded Trust Table
    of Contents Filed pursuant to Rule 497(b) File No. 333-273214 HARTFORD QUALITY VALUE FUND THE HARTFORD
    MUTUAL FUNDS II, INC. Dear Shareholder, August 11, 2023 We are writing to inform you about a transaction
    that will affect your investment in Hartford Quality Value Fund. You are receiving this Combined Information
    Statement/Prospectus because you own shares in Hartford Quality Value Fund (the “Acquired Fund”),
    a series of The Hartford Mutual Funds II, Inc., a Maryland corporation (“HMF II”). We are pleased
    to inform you of the planned conversion of the Acquired Fund, which is a mutual fund, into an exchange-traded
    fund (“ETF”), which will continue to be managed by Hartford Funds Management Company, LLC (“HFMC”
    or the “Investment Manager”). Pursuant to an Agreement and Plan of Reorganization and Liquidation
    (the “Plan”), the Acquired Fund will be converted into an ETF through the reorganization of the Acquired
    Fund into Hartford Quality Value ETF (the “Acquiring Fund”), a newly created series of Hartford Funds
    Exchange-Traded Trust, a Delaware statutory trust (the “Trust”), that ha […] ly with the ETF. All
    other shareholders will buy and sell shares of the ETF on an exchange at market prices. As a result
    of these structural differences, there are certain benefits associated with the ETF structure, such
    as secondary market liquidity, increased transparency, and the potential for increased tax efficiency.
    There are, however, certain risks associated with the ETF structure, including the risk that shares
    of an ETF will trade at market prices that are above (premium) or below (discount) NAV, or that an
    ETF’s “authorized participants” will not engage in creation or redemption transactions which could
    cause the Acquiring Fund’s shares to trade at a discount to NAV and possibly face trading halts and/or
    delisting. Following the Conversion, shareholders may bear certain costs with respect to maintaining
    brokerage accounts and buying and selling Acquiring Fund Shares in the secondary market that shareholders
    do not experience as shareholders of the Acquired Fund. Q: Has the Board of Directors approved the
    Conversion? A: Yes, the Board of Directors of The Hartford Mutual Funds II, Inc. (the “Acquired Fund
    Board” or “Board”) approved the Conversion. The Acquired Fund Board, including all of the Independent
    Directors (i.e., Directors who are not “interested persons” of the Acquired Fund as defined in the
    Investment Company Act of 1940 (the “1940 Act”)), determined that participation in the Conversion
    is in the best interests of the Acquired Fund, and that the interests of the Acquired Fund’s existing
    shareholders will not be diluted as a result of the Conversion. Q. What information did the Acquired
    Fund Board consider when evaluating the Conversion? A. The Acquired Fund Board considered the Conversion
    proposed by Hartford Funds Management Company, LLC (“HFMC” or the “Investment Manager”) and approved
    the Plan with respect to the Acquired Fund. In considering the Plan, the Acquired Fund Board requested
    and received detailed information from the officers of HMF II, and representatives of HFMC, regarding
    the Conversion, including: (1) the reasons for and expected shareholder benefits of the Conversion;
    (2) the investment objectives, investment strategies, and fundamental investment policies of the Acquired
    Fund and the Acquiring Fund; (3) a comparison of the fees and expenses of the Funds; (4) the proposed
    plan for ongoing management, distribution, and operation of the Acquiring Fund; (5) the management
    and business of HFMC and its affiliates; (6) the impacts of the Conversion on the Acquired Fund and
    shareholders of the Acquired Fund, including shareholders that will not participate in the Conversion;
    and (7) the specific terms of the Plan. Q: Why is the Conversion occurring? A: The Directors of The
    Hartford Mutual Funds II, Inc. (who are also the Trustees of Hartford Funds Exchange-Traded Trust)
    concluded that the Conversion is in the best interests of the Acquired Fund because it is expected
    to provide certain potential benefits including lower net expenses, intraday trading flexibility,
    increased portfolio transparency, and the potential for enhanced tax efficiency. Q: How will the Conversion
    affect me as a shareholder? A: When the Conversion is completed, you will cease to be a shareholder
    of the Acquired Fund. As of October 6, 2023, the Acquired Fund’s Class A, C, I, Y, R3, R4, R5 and
    R6 shareholders (the “Converting Shareholders”) whose shares are held in brokerage accounts that can
    hold ETF shares will no longer be eligible to hold Class A, C, I, Y, R3, R4, R5 and R6 shares of the
    Acquired Fund. As of that same date, Class F shares’ eligibility requirements will be revised such
    that all Converting Shareholders may invest in Class F shares without regard to an investment minimum.
    As of October 6, 2023, shares of the Acquired Fund held by Converting Shareholders will be automatically
    converted to Class F shares of the Acquired Fund. In order to receive shares of ii Table of Contents
    the Acquiring Fund as part of the Conversion, you must hold your shares of the Acquired Fund through
    a brokerage account that can accept shares of an ETF (the Acquiring Fund) on the closing date of the
    Conversion. • Non-Accommodating Brokerage Accounts. If you hold your shares of the Acquired Fund in
    a brokerage account with a financial intermediary that only allows you to hold shares of mutual funds
    in the account, you will need to contact your financial intermediary to set up a brokerage account
    that permits investments in ETF shares. If such a change is not made before the Conversion, you will
    not receive shares of the Acquiring Fund as part of the Conversion. Instead, your investment will
    be liquidated and you will receive cash equal in value to the NAV of your Acquired Fund Shares as
    of the Conversion Date, which is a taxable event. • Retirement Accounts Held with Financial Intermediary.
    If you hold your shares of the Acquired Fund through an individual retirement account (“IRA”) or group
    retirement plan whose plan sponsor does not have the ability to hold shares of ETFs on its platform,
    you may need to redeem your shares prior to the Conversion or, if applicable, your financial intermediary
    may transfer your investment in the Acquired Fund to a different investment option prior to the Conversion.
    • Directly Held Retirement and Qualified Accounts. If you hold your shares of the Acquired Fund directly
    with the Acquired Fund in a retirement account, such as an IRA, or Coverdell account through Hartford
    Funds and maintained by UMB Bank, n.a. (a “Directly Held Qualified Account”), we encourage you to
    (i) transfer your Acquired Fund Shares to a brokerage account that can accept shares of the ETF and
    be established as a Qualified Account prior to October 6, 2023 (see “Direct Accounts” below for more
    information) or (ii) provide instructions for the exchange or reinvestment of Acquired Fund Shares
    prior to the Conversion. If a Directly Held Qualified Account shareholder does not provide instructions
    prior to the Conversion, your Acquired Fund Shares will – without any further notice – be automatically
    exchanged on the Conversion Date for shares of The Hartford Short Duration Fund, a mutual fund managed
    by HFMC (“Short Duration Fund”). This automatic exchange provision is disclosed in the custodial agreement
    between the shareholder and UMB Bank, n.a. and is applicable to each Directly Held Qualified Account.
    The Short Duration Fund has a different investment objective and different principal strategies and
    principal risks than the Acquired Fund. If you do not wish for your Acquired Fund Shares to be automatically
    exchanged for shares of the Short Duration Fund, you must contact the Acquired Fund at 1-888-843-7824
    before the Conversion Date, which currently is scheduled for October 13, 2023. If the Acquired Fund
    does not receive any instructions prior to the Conversion Date, your Acquired Fund Shares held in
    the Directly Held Qualified Account will be exchanged for shares of the same class of the Short Duration
    Fund. More information will be provided in a separate letter to Directly Held Qualified Account shareholders.
    • Direct Accounts. If you hold your shares of the Acquired Fund in an account directly with the Acquired
    Fund at its transfer agent (i.e., not held at the plan level or as an omnibus position), Hartford
    Administrative Services Company (“Direct Account”), you should transfer your shares of the Acquired
    Fund to a brokerage account that can accept shares of an ETF prior to October 6, 2023. If such a change
    is not made before October 6, 2023, you will not receive shares of the Acquiring Fund as part of the
    Conversion. Instead, your investment will be liquidated and you will receive cash equal in value to
    the NAV of your Acquired Fund Shares as of the Conversion Date, which is a taxable event. Shares of
    the Acquiring Fund are not issued in fractional shares. As a result, cash will be paid to all Acquired
    Fund shareholders in lieu of fractional shares of the Acquiring Fund, as applicable, which may be
    taxable. In some cases, the liquidation of your investment and return of cash, or the transfer of
    your investment to another fund, may be subject to fees and expenses and may also be subject to tax.
    It may take time for you to receive your cash. Please consult with your financial intermediary for
    more information on the impact that the Conversion will have on you and your investments. If you are
    unsure about the ability of your account to accept shares of the Acquiring Fund, please call 1-888-843-7824
    or contact your financial professional or other financial intermediary. iii Table of Contents If you
    do not currently hold your shares of the Acquired Fund through a brokerage account that can hold shares
    of the Acquiring Fund, please see the information below, including the separate Q&A that follows,
    for additional actions that you must take to receive shares of the Acquiring Fund as part of the Conversion.
    No further action is required for shareholders that hold shares of the Acquired Fund through a brokerage
    account that can hold shares of the Acquiring Fund. After the Conversion, individual shares of the
    Acquiring Fund may only be purchased and sold in the secondary market. Shares of Hartford Quality
    Value ETF are expected to be listed for trading on the Cboe BZX Exchange, Inc. Shares of the Acquiring
    Fund may also be traded on other national securities exchanges, electronic crossing networks, and
    other alternative trading systems. Should you decide to purchase or sell shares of the Acquiring Fund
    after the Conversion, you will need to place a trade through a broker who will execute your trade
    in the secondary market at prevailing market prices. Because the Acquiring Fund’s shares trade at
    market prices rather than at NAV, the Acquiring Fund’s shares may trade at a price less than (discount)
    or greater than (premium) the Acquiring Fund’s NAV. As with all trading in ETF shares, your broker
    may charge a commission for purchase and sale transactions, although ETFs trade with no transaction
    fees (NTF) on many platforms. Q: Am I being asked to vote on the Conversion? A: No. Shareholders of
    the Acquired Fund are not required to approve the Conversion under Maryland law or the 1940 Act, or
    the organizational documents governing the Acquired Fund. We are not asking you for a proxy and you
    are requested not to send us a proxy. Q: Will the Conversion affect the way my investments are managed?
    A: No. HFMC and Wellington Management Company LLP (“Wellington Management” or the “Sub-Adviser”),
    the Investment Manager and Sub-Adviser, respectively, to the Acquired Fund are also the Investment
    Manager and Sub-Adviser, respectively, to the Acquiring Fund. The Acquiring Fund will have the same
    investment objective, investment strategy and fundamental investment policies as the Acquired Fund.
    The same individuals currently responsible for the day-to-day investment of the assets of the Acquired
    Fund will also be responsible for the day-to-day portfolio investment of the assets of the Acquiring
    Fund. HFMC and Wellington Management do not expect to sell portfolio securities in connection with
    the Conversion except as necessary to raise cash to redeem non-converting shares. Q: Will the fees
    and expenses of the Acquiring Fund be lower than the fees and expenses of the Acquired Fund? A : Yes.
    Following the Conversion, the Acquiring Fund is expected to have a lower net expense ratio than the
    net expense ratio of each share class of the Acquired Fund after taking into consideration fees waived
    and/or expenses reimbursed pursuant to an expense limitation agreement between the Investment Manager
    and the Acquired Fund. In addition, the Acquiring Fund is expected to have lower gross expenses, before
    giving effect to fee waivers and/or expense reimbursements, than any class of shares of the Acquired
    Fund. More information on the effects of the potential expense reductions is available in the accompanying
    Combined Information Statement/Prospectus. Q: Are there other benefits that I could experience as
    a shareholder of the Acquiring Fund? A: Yes. In addition to lower net expenses, as a shareholder of
    the Acquiring Fund, you could also benefit from the intraday trading flexibility, increased transparency
    of portfolio holdings, and the potential for enhanced tax efficiency available from investing in ETFs.
    • Intraday Trading Flexibility . As a shareholder of the Acquired Fund, you can only purchase or redeem
    your Acquired Fund Shares at a price based on the Acquired Fund’s NAV that is next calculated after
    iv Table of Contents your order is received by the Acquired Fund. This NAV is calculated once per
    business day. As a shareholder of the Acquiring Fund, however, you will be able to purchase and sell
    shares of the Acquiring Fund throughout a trading day on the secondary market. These trades will occur
    at market prices, which may be higher or lower than the Acquiring Fund’s NAV. This intraday liquidity
    will give you the opportunity to act on purchase and sale decisions immediately, rather than waiting
    to transact at the Acquiring Fund’s NAV. • Increased Portfolio Transparency . Currently, the Acquired
    Fund only provides periodic disclosure of its complete portfolio holdings. Following the Conversion,
    however, the Acquiring Fund will make its complete portfolio holdings public each business day. This
    holdings information, along with other information about the Acquiring Fund, will be found on the
    Acquiring Fund’s website at www.hartfordfunds.com. • Potential for Enhanced Tax Efficiency . Shareholders
    of the Acquired Fund also are expected to benefit from the potential for greater tax efficiency available
    from the ETF structure. While the tax treatment of ETFs and mutual funds is the same, the mechanics
    of the creation and redemption process for ETFs allows ETFs to acquire securities in-kind and redeem
    securities in-kind, which generally allows shareholders of an ETF to defer the realization of a portion
    of capital gains as the result of the ETF’s portfolio transactions. In contrast, when portfolio securities
    are sold within a mutual fund (either to rebalance the mutual fund’s holdings or to raise cash for
    redemptions), the sale can result in the realization of capital gains by the mutual fund that impact
    all shareholders of the mutual fund that hold their shares in taxable accounts. Q: Are there any differences
    in risks between the Acquired Fund and Acquiring Fund? A: Yes. While the portfolio investment risks
    of the Acquired Fund and Acquiring Fund are the same, the Acquiring Fund is subject to certain risks
    unique to operating as an ETF. For example, you will be subject to the risk that your shares of the
    Acquiring Fund will trade at market prices that are above (premium) or below (discount) the Acquiring
    Fund’s NAV. You will also be subject to the risk that your Acquiring Fund’s “authorized participants,”
    which are the only entities that are permitted to engage in creation or redemption transactions directly
    with the Acquiring Fund, do not engage in such transactions, which could cause the Acquiring Fund’s
    shares to trade at a larger premium or discount to the Acquired Fund’s NAV and possibly result in
    trading halts and/or delisting. Following the Conversion, shareholders may bear certain costs with
    respect to maintaining brokerage accounts and buying and selling Acquiring Fund Shares in the secondary
    market that shareholders do not experience as shareholders of the Acquired Fund. For additional discussion
    of these and other risk factors, please see the section entitled “Principal Risks.” Q: Is there anything
    else that will be different once I am a shareholder of the Acquiring Fund? A: Yes. As noted above,
    as a shareholder of the Acquired Fund, you can only purchase or redeem your Acquired Fund Shares at
    a price based on the Acquired Fund’s NAV that is next calculated after your order is received by the
    Acquired Fund, subject to any applicable sales charges and fees. Acquiring Fund Shares, however, may
    only be purchased and sold on the secondary market through a broker at market prices. When you buy
    or sell shares of the Acquiring Fund through a broker, you may incur a brokerage commission or other
    charges imposed by the broker. In addition, the Acquired Fund operates in a multiple class structure.
    A multiple class fund is an open-end investment company that issues two or more classes of shares
    representing interests in the same investment portfolio, but with different availability and eligibility
    criteria, sales charges, expenses, dividends and distributions. In contrast, the Acquiring Fund will
    not issue multiple classes of shares. Unlike shareholders of the Acquired Fund, shareholders of the
    Acquiring Fund will not own a particular class of shares. v Table of Contents Q: Will shareholders
    have to pay any sales load, commission or other similar fee in connection with the Conversion? A:
    No. Neither the Acquired Fund nor Acquiring Fund shareholders will pay any sales load, commission,
    or other similar fee in connection with the Conversion. Q: When is the Conversion expected to occur?
    A: The Conversion is expected to take effect as of the close of business on or about October 13, 2023
    (the “Closing Date”). The Acquired Fund will publicly disclose material developments, including the
    date of the Conversion. Q: Who will pay the costs in connection with the Conversion? A: HFMC will
    pay the costs incurred by the Funds associated with the Conversion (including the legal costs associated
    with the Conversion). Brokerage fees and expenses related to the disposition and acquisition of assets
    (including any disposition to raise cash to pay redemption proceeds) that are incurred in the ordinary
    course of business will not be covered by HFMC. Q: Will the Conversion result in any federal tax liability
    to me? A: The Conversion is intended to be treated as a tax-free reorganization for U.S. federal income
    tax purposes. If the Conversion qualifies for tax-free treatment, Acquired Fund shareholders would
    recognize no gain or loss for U.S. federal income tax purposes upon the exchange of Acquired Fund
    Shares for Acquiring Fund Shares pursuant to the Conversion (except with respect to cash received
    in liquidation of your Acquired Fund Shares in lieu of receiving Acquiring Fund Shares). Capital gains
    from securities sales by the Acquired Fund prior to the Conversion may be distributed by the Acquiring
    Fund after the Conversion. You may experience tax consequences if your investment is liquidated and
    the cash value of your Acquired Fund Shares is returned to you or if your shares of the Acquired Fund
    are transferred by your financial intermediary to a different investment option because you did not
    hold your shares of the Acquired Fund through a brokerage account that can accept shares of the Acquiring
    Fund on the Closing Date of the Conversion. Different tax considerations apply to you if you hold
    your shares of the Acquired Fund through an individual retirement account (“IRA”) or Coverdell account
    through Hartford Funds and maintained by UMB Bank, n.a. The information about tax consequences in
    this document relates to the federal income tax consequences of the Conversion only. Shareholders
    should consult their tax advisors about possible federal, state and local tax consequences of the
    Conversion. Q: Can I purchase, redeem or exchange Acquired Fund Shares before the Conversion takes
    place? A: Yes. You can purchase Acquired Fund Shares until October 11, 2023. You can exchange or redeem
    Acquired Fund Shares until the day before the Conversion occurs. That means your exchange or redemption
    order must be received by October 12, 2023. Any shares not redeemed before the date of the Conversion,
    which we expect will occur on October 13, 2023, will be exchanged for shares of the Acquiring Fund,
    unless they are not held in a brokerage account that can hold shares of the Acquiring Fund or are
    fractional shares, in which case such shares will be liquidated and you will receive cash equal in
    value to the NAV of your liquidated Acquired Fund Shares. If you do not hold your shares in such a
    brokerage account, your shares will be redeemed immediately before the Conversion, which could be
    a taxable event for you. As of October 6, 2023, the Acquired Fund’s Class A, C, I, Y, R3, R4, R5 and
    R6 shareholders (the “Converting Shareholders”) whose shares are held in brokerage accounts will no

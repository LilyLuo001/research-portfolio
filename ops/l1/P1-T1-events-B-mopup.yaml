    a lower total expense ratio than the corresponding Target Fund. This expense cap will remain in place
    until at least June 30, 2024 and does not permit the Adviser to recoup waived expenses if the Acquiring
    ETF grows in size. If the expense cap is not renewed in 2024, the expenses of an Acquiring ETF could
    increase. · intraday trading , because the Acquiring ETF shares can be purchased and sold throughout
    the trading day at fair market value on the exchange. (This means that if you decide to sell your
    shares of the Acquiring ETF, you can do that right away at the then-prevailing market price; with
    the mutual fund, you place your redemption order and your shares are redeemed at the next calculated
    net asset value, which happens at the end of the trading day). o This means you will no longer redeem
    your shares for cash at the next determined NAV. o Buying or selling shares of the Acquiring ETFs
    may involve paying a brokerage commission. Additionally, prices on the exchange may be higher or lower
    than the Acquiring ETF’s net asset value per share. · tax benefits , because generally the fund will
    not incur gains and losses from portfolio transactions that are incurred to meet redemption requests
    from other shareholders. o We say generally here because a few foreign markets don’t permit in-kind
    transfers of securities, and sometimes, the Acquiring ETFs might sell securities within their portfolios
    to meet the redemption requests. - 8 - The Adviser believes, and the Board agreed, that operating
    these two fund strategies in the exchange traded fund structure offers a better value proposition
    than traditional open-end mutual funds, primarily because of in reduced operational costs, superior
    transaction flexibility, greater holdings transparency and potentially a fairer tax treatment. After
    the Conversions, shareholders of each Target Fund will still be invested in an open-end fund with
    the same investment objectives, strategies, policies and restrictions, operated by the same investment
    adviser and portfolio managers, but at a lower overall cost. The Conversions are designed to not be
    taxable events for fund shareholders. Q. How will this Conversion affect me as a shareholder? A. After
    the Conversion of your Fund, you will own shares of an ETF having an aggregate net asset value equal
    to the aggregate net asset value of the shares of the Fund you owned when the Conversion happened.
    Your brokerage firm may not be able to handle fractional shares; if this is the case, we will redeem
    any fractional shares that you may have at net asset value immediately prior to effectuating the Conversion,
    and send you the proceeds of that redemption. In the Conversion, all of the assets and the liabilities
    of each Target Fund will be transferred to a newly-formed Acquiring ETF. You, as a shareholder of
    the Target Fund, will receive shares of the corresponding Acquiring ETF equal to the value of the
    shares you own of the Target Fund. Shares of the Acquiring ETF will be transferred to each shareholder’s
    brokerage account or for direct shareholders, held by a transfer agent until the brokerage account
    is identified (subject to applicable federal or state laws concerning unclaimed property). No physical
    share certificates will be issued to shareholders. After the Conversion, a Target Fund shareholder
    will hold the same percentage of ownership in the corresponding Acquiring ETF as that shareholder
    held in the Target Fund prior to the Conversion (adjusted for cash distributions, if any). Q. Why
    is no shareholder action necessary? A. No vote of the shareholders of the Target Fund is required
    to approve the Conversions under Delaware law or under the Trust’s Declaration of Trust. Under Rule
    17a-8 of the 1940 Act, a vote of shareholders of each Target Fund is not required. This is because
    each Acquiring ETF is constructed to correspond to its Target Fund. Each Acquiring ETF will operate
    using the same investment strategies and policies, and the same portfolio managers, as its respective
    Target Fund. Q. What will change when the Funds are converted to ETFs? A. Your Fund will be an exchange
    traded investment company, known as an ETF. After the Conversion, your Fund will remain a registered
    investment company, but it will be exchange traded, and you will own shares as you did before the
    Conversion, but in an Acquiring ETF instead of a Target Fund. You will no longer redeem individual
    shares directly from the Fund; should you decide to purchase or sell shares in your Acquiring ETF
    after the Conversion, you will need to place a trade through a broker-dealer who will execute your
    trade on the NYSE or other nationally recognized exchange at prevailing market prices. As with all
    ETFs, your broker may charge a commission for purchase and sales transactions. Your fund will be a
    fully transparent, actively managed ETF, which means that portfolio holdings will be available on
    the ETF’s website every day. The ETF’s website will also contain other information about things like
    the net asset value, market price, premiums and discounts, and bid-ask spreads, as required by rules
    that govern exchange traded funds. - 9 - Q. What’s the difference between Guinness Atkinson and SmartETFs?
    A. After the conversion, the two ETFs will carry the SmartETFs brand name rather than the Guinness
    Atkinson Funds brand name. The Adviser will still be Guinness Atkinson. During the conversion process
    you will be able to find information about the Conversion on the gafunds.com website and the smartetfs.com
    website. After the Conversion you can get up to date information on the Acquiring ETFs at www.smartetfs.com.
    Q. Will the Conversion affect the way the Funds are invested? A. No. Guinness Atkinson Asset Management
    will remain as adviser to the Acquiring ETFs and each Acquiring ETF will be managed using the same
    investment style, restrictions, philosophy, parameters and methodology currently used by its respective
    Target Fund. The Funds will continue to be actively managed and the portfolio managers will remain
    the same. Q. Are there any risks to owning ETFs that are different than the risks of owning mutual
    funds? A. Yes, there are some differences in risks, and all of these differences relate to the structure
    of ETFs . We discuss these risks later in the Information Statement/Prospectus, but below, we summarizing
    some of the risks and their associated benefits. Basically, · The Acquiring Fund’s ETF shares will
    be listed for trading on NYSE Arca, a stock exchange, and shares are bought and sold in the secondary
    market at a market price. Although it is expected that the market price of an ETF share will approximate
    its net asset value (NAV), there could be times when the market price and the NAV differ significantly.
    If that happened, you could pay more or less than NAV when you buy shares on the exchange, and you
    could receive more or less than NAV when you sell shares on the exchange. All ETFs face this risk.
    · Each Acquiring ETF’s shares will be listed for trading, but it is possible that an active trading
    market might not be maintained. · Trading in ETF shares on an exchange can be halted for […]  variety
    of reasons, and this could be an individual trading halt (a particular share is halted) or a market-wide
    trading halt (the whole exchange stops trading). ETF shares could also be delisted. Both trading halts
    and delistings happen for a variety of reasons. All ETFs face these risks. · Only financial institutions
    that enter into an Authorized Participant Agreement with the Trust can engage in creation or redemption
    transactions for ETF shares. If the Acquiring ETFs Authorized Participants decide not to create or
    redeem shares, shares could trade at a premium or discount to Acquiring ETFs NAV, and could face trading
    halts or delistings. Q. Are the Expenses Higher or Lower for the Acquiring ETFs as compared to the
    Target Funds? A. The Conversion of the Asia Pacific Dividend Builder Fund will lead to higher gross
    operating expenses immediately upon conversion, 4.22% as compared to 4.19%. The Conversion of the
    Dividend Builder Fund will lead to lower gross operating expenses immediately upon conversion, 1.42%
    as compared to 1.45% . In both cases, the Adviser has entered into an expense limitation agreement
    which will run through June 2024, to ensure that for each Conversion, shareholders will receive Acquiring
    ETF shares that operate with a lower net total expense ratio than the corresponding Target Fund. If
    the expense limitation agreement is not extended in 2024, operating expenses could increase. We discuss
    this issue later in this document. Q. Can you explain more about the operating expenses of the ETFs?
    A. The services required to operate the Acquiring ETFs are somewhat different than the services required
    to operate the Target Funds, which are traditional mutual funds. - 10 - Transfer agency and shareholder
    servicing fees for mutual funds often involve minimum annual fees as well as variable fees based on
    the size of the fund and sometimes, specific expenses incurred to service the fund. By comparison,
    for ETFs, the transfer agency fees are fixed and the fixed rate for ETFs is often less than the minimum
    for traditional mutual funds. ETFs generally don’t have shareholder servicing fees. In many states,
    mutual funds are required to pay state registration fees. These fees often involve a minimum fee plus
    a variable amount based on the number of shares purchased in each state. Because they are exchange
    listed, ETFs are exempt from these fees. However, ETFs must pay an exchange listing fee. While circumstances
    vary, exchange listing fees are lower than the state registration fees for mutual funds. Both mutual
    funds and ETFs pay custody fees , which is a fee paid to a service provider that holds the fund’s
    assets. Some activity-base […] . · When a mutual fund redeems shares, it may sell portfolio holdings
    to pay redemptions, and pay custody fees on those trades and realize capital gains and losses to be
    distributed to all shareholders. When a block of shares is redeemed from the ETF, the redemption is
    paid out by delivering to the Authorized Participant shares of the underlying portfolio holdings,
    which means that the ETF generally does not sell portfolio holdings to pay redemptions. (We say “generally”
    because both of the Target Funds hold foreign securities; in some foreign securities markets, often
    called “cash in lieu” markets, a shareholder cannot transfer the shares it owns to another shareholder,
    but has to sell them in the market and deliver the proceeds). For the Conversion of the Guinness Atkinson
    Asia Pacific Dividend Builder Fund, in the aggregate, immediately after the Conversion, these expenses
    will be higher for the Acquiring ETF (4.22% gross operating expenses) than the corresponding costs
    in the Target Fund (4.19% gross operating expenses). For the Conversion of the Guinness Atkinson Dividend

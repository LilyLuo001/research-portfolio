ows of\n   the Target/Acquiring fund table, a 4-fund filing yields 4 objects}, ... ]}\n  or the no_event object above.\nEach event object:\n  fund_name        target mutual fund's full name (from excerpt)\n  family           fund family/trust (from excerpt)\n  mutual_fund_ticker / etf_ticker\n                   a single 2-6 char UPPERCASE symbol from the excerpt, else \"NA\".\n                   NEVER a fund name. Multiple class tickers → \"NA\" and list them in evidence.\n  announce_date    YYYY-MM-DD only. Board-approval date if stated; else the document's own\n                   date; else the filed date. Vague (\"May 2020\",\"Q4 2026\") → \"NA\".\n  date_basis       \"board\" | \"document\" | \"filed\" | \"NA\"\n  effective_date   YYYY-MM-DD only; the stated closing/completion date. Vague → \"NA\".\n  asset_class      equity_US / equity_intl / fixed_income / other — ONLY if locatable in the\n                   excerpt (bond/muni/high-yield/MBS→fixed_income; International/EM/Asia→\n                   equity_intl; explicit US equity→equity_US; managed-futures/multi-asset/\n                   long-short→other). Name alone insufficient → \"NA\".\n  AUM_at_conversion_USD  number from excerpt or \"NA\"\n  source_accession copy from the 文件 line\n  confidence       H = fund identity + (announce or effective) with explicit basis;\n                   M = identity clear, dates partly missing/document-dated;\n                   L = identity inferred from title only\n  evidence         ≤25-word quote fragment supporting the verdict (for events: the words\n                   showing the acquirer is an ETF; for no_event: the words showing why not)\nNEED_HUMAN only when TWO date statements INSIDE THIS ONE EXCERPT contradict for the same\nfund: {\"NEED_HUMAN\": true, \"quotes\": [\"...\", \"...\"]}. Different filings never contradict.\nNever fill any field from memory — excerpt-locatable or \"NA\".\n\nSELF-CHECK before emitting (do this, don't print it): every input item id appears exactly\nonce in your answer map (count them); every event object quotes ETF-acquirer evidence;\nevery date matches ^\\d{4}-\\d{2}-\\d{2}$ or is \"NA\"; no ticker field contains a space.】\n文件: 0001193125-25-250212 (form 497, filed 2025-10-24, Columbia ETF Trust I  (CIK 0001551950))\nsource_url: https://www.sec.gov/Archives/edgar/data/1551950/000119312525250212/d96007d497.htm\n节选:\n497 1 d96007d497.htm COLUMBIA ETF TRUST I Columbia ETF Trust I COLUMBIA FUNDS SERIES TRUST II Columbia Integrated Large Cap Value Fund 290 Congress Street Boston, MA 02210 1-800-345-6611 www.columbiathreadneedleus.com October 22, 2025 Dear Shareholder: I am writing to inform you about a transaction that will affect your investment in Columbia Integrated Large Cap Value Fund (the “Target Fund”). You are receiving this combined Information Statement and Prospectus (the “Combined Information Statement/Prospectus”) because you own shares in the Target Fund. The Target Fund is a series of Columbia Funds Series Trust II (“CFST II”) and is managed by Columbia Management Investment Advisers, LLC (“Columbia Threadneedle”). We are pleased to inform you of the planned merger of the Target Fund, which is a mutual fund, with and into an exchange-traded fund (“ETF”), which is also managed by Columbia Threadneedle. Pursuant to the Agreement and Plan of Reorganization (the “Agreement”), the Target Fund will be merged with and into Columbia Research Enhanced Value ETF (the “Acquiring Fund”), an ETF that is a series of Columbia ETF Trust I, a Massachusetts business trust (“ETF Trust”) (the “Reorgani […] ned Information Statement/Prospectus and keep it for future reference. Sincerely, Michael G. Clarke, President Columbia Funds Series Trust II COLUMBIA FUNDS SERIES TRUST II Columbia Integrated Large Cap Value Fund COMBINED INFORMATION STATEMENT/PROSPECTUS October 22, 2025 Columbia Management Investment Advisers, LLC (“Columbia Threadneedle”) has recommended, and the Board of Trustees of the Columbia Integrated Large Cap Value Fund (the “Target Fund”) have approved, a proposal to reorganize the Target Fund into Columbia Research Enhanced Value ETF (the “Acquiring Fund”). Both the Target Fund and the Acquiring Fund are managed by Columbia Threadneedle. It is proposed that the Target Fund, which is currently operated as a mutual fund, will be converted into an exchange-traded fund (“ETF”) through a merger with and into the Acquiring Fund (the “Reorganization”). The Target Fund and Acquiring Fund are referred to collectively as the “Funds.” No shareholder approval is required to effect the Reorganization, which is expected to be completed on or about March 16, 2026. This is a brief overview of the Reorganization of the Target Fund. We encourage you to read the full text of the enclosed combined Information Statement/Prospectus (the “Combined Information Statement/Prospectus”) to obtain detailed information with respect to the Reorganization of the Target Fund. This Combined Information Statement/Prospectus was first mailed to shareholders of the Target Fund beginning on or about October 29, 2025. SHAREHOLDER APPROVAL OF THE REORGANIZATION IS NOT REQUIRED. THIS COMBINED INFORMATION STATEMENT/PROSPECTUS IS FOR INFORMATIONAL PURPOSES ONLY, AND YOU DO NOT NEED TO DO ANYTHING IN RESPONSE TO RECEIVING IT EXCEPT TO CONFIRM WHETHER YOU HAVE A BROKERAGE ACCOUNT THAT CAN ACCEPT SHARES OF AN ETF AND TO CONSIDER OPENING SUCH AN ACCOUNT, IF NEEDED. NO FUND IS ASKING YOU FOR A PROXY OR TO VOTE ON ANYTHING WITH RESPECT TO THE REORGANIZATION AND YOU ARE NOT BEING REQUESTED TO SEND A PROXY OR ANY VOTING INSTRUCTION TO THE FUND WITH RESPECT TO THE REORGANIZATION. Shareholders of the Target Fund should know the options available to them with respect to the Reorganization, including (i) maintaining current positions in Target Fund shares and receiving  […] ap Value Fund g Columbia Research Enhanced Value ETF ii Q: What actions do I need to take in connection with the Reorganization? None – unless you hold Target Fund shares in an account that cannot transact in ETF shares. In order to buy and sell the shares of the Acquiring Fund you receive in the Reorganization you would need to hold such shares in a brokerage account that can transact in ETF shares. In accordance with the Target Fund’s Agreement and Declaration of Trust and applicable state and U.S. federal law (including Rule 17a-8 under the Investment Company Act of 1940, as amended (the “1940 Act”)), the Reorganization may be effected without the approval of shareholders of the Target Fund. Your Target Fund shares will automatically be converted into shares of the Acquiring Fund on the Closing Date of the Reorganization of the Target Fund with and into the Acquiring Fund. You will receive written confirmation that this change has taken place. No certificates for shares will be issued in connection with the Reorganization. The aggregate net asset value (the “NAV”) of the Acquisition Shares you receive with respect to a class of Target Fund Shares in the Reorganization will be equal to the aggregate NAV of the relevant class of shares you own in the Target Fund computed as of the close of regular trading on the New York Stock Exchange on the Valuation Date (as defined below) less cash you receive in lieu of fractional Acquisition Shares. If you sell your shares or are otherwise no longer a shareholder of the Target Fund as of the Closing Date of the Reorganization, this transaction will not impact you. It is important for you to determine whether you hold your Target Fund shares in the type of account that can accommodate the ETF shares that will be received in the Reorganization. If you hold your shares of the Target Fund in an account directly with the Target Fund at the Target Fund’s transfer agent or in a brokerage account with a financial intermediary that only allows you to hold mutual fund shares, you will need to set up a brokerage account that allows investments in ETF shares if the Reorganization is consummated and you wish to transact in shares of the Acquiring Fund. For more information see the section of the enclosed Combined Information Statement/Prospectus titled “Section A – The Reorganization – Summary – Important Information for Target Fund Shareholders.” Q: Why did Columbia Threadneedle propose the Reorganization? Columbia Threadneedle, the investment adviser for the Target Fund and Acquiring Fund, has recommended the Reorganization because it believes that the Reorganization is in the best interests of shareholders of the Target Fund. Columbia Threadneedle believes that reorganizing the Target Fund into the Acquiring Fund and the resulting conversion into an ETF may offer operational advantages, including lower overall operating expenses, potentially more efficient portfolio management, and more flexible trading of shares of the Acquiring Fund ( i.e. the ability of shareholders to buy or sell shares at current market prices throughout the trading hours of NYSE Arca, the exchange upon which shares of the Acquiring Fund are listed and trade). Further, iii management believes that, absent the Reorganization, the Target Fund, is unlikely to achieve long-term economic viability. Also, although past performance is no guarantee of future results, the Acquiring Fund outperformed the Target Fund over the 1, 3 and 5-year periods ended June 30, 2025. For more information, please see “What are some features of ETFs that differ from mutual funds?” below. Following the Reorganization, shareholders of the Target Fund would be invested in a fund with a lower net annual fund operating expense ratio. Please refer to “Section A – The Reorganization – Summary – Fees and Expenses” and “Section A – The Reorganization – Synopsis – Comparison of Management of the Funds” in the enclosed Combined Information Statement/Prospectus for a detailed discussion of the Reorganization’s expected impact on management fee rates and total and net annual fund operating expense ratios. The Acquiring Fund like the Target Fund, focuses on value companies included in the Russell 1000 ® Value Index and uses that index as its primary performance benchmark […] he non-taxable account. Shareholders should consult with their tax advisor about the tax consequences of the liquidation and reinvestment. The Target Fund may be required to sell securities in order to fund such share liquidations, which may result in the recognition of gains that are distributed to shareholders of the Target Fund as taxable dividends. For Target Fund shareholders that hold Target Fund shares through accounts that are not permitted to hold Acquisition Shares, such Acquisition Shares will be held by a transfer agent of the Acquiring Fund as agent for and for the account and benefit of the Target Fund shareholders for one year, after which they will be liquidated and proceeds will be sent to the Target Fund shareholders. The conversion of Acquisition Shares to cash may be subject to fees and expenses and will be a taxable event for shareholders who hold their shares in a taxable account. • Non-Accommodating Brokerage Accounts . If you hold your Target Fund shares in a brokerage account with a financial intermediary that only allows you to transact in shares of mutual funds in the account, you will need to contact your financial intermediary to set up a brokerage account that permits investment in ETF shares. • Non-Accommodating Retirement Accounts . If you hold your Target Fund shares through an IRA or group retirement plan whose plan sponsor does not have the ability to hold shares of ETFs on its platform, you may need to make a new investment selection in your non-accommodating retirement account or your financial intermediary may divest you from the Target Fund and select a different investment option prior to the Reorganization. Q: How do I transfer my Target Fund shares from a non-accommodating brokerage account to a brokerage account that will accept Acquiring Fund shares? The financial intermediary, such as a broker or dealer, where you hold your Target Fund shares should be able to assist you in changing your account to an account that is permitted to hold ETF shares. Contact your broker right away to make the necessary changes to your account. Q: What will happen if I don’t have a brokerage account that can hold ETF shares at the time of the Reorganization? If your shares are held in an \n"

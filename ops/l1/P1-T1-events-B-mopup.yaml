  prompt: "【规则 v2 (manual §T1 + QC修订). Follow the STEPS in order for THIS filing's excerpt.\n\nSTEP 1 — Identify every reorganization/conversion described. For each one name:\n  TARGET = the entity whose shareholders receive new shares (acquired/converted fund)\n  ACQUIRER = the entity that survives (acquiring/successor fund)\nSTEP 2 — Classify both, quoting the excerpt:\n  TARGET must be an OPEN-END MUTUAL FUND (multi-class shares, bought/redeemed at NAV).\n  ACQUIRER must be an ETF (exchange-traded fund / \"will operate as an exchange-traded\n  fund\" / listed on an exchange).\nSTEP 3 — Verdict:\n  EVENT only if TARGET=open-end mutual fund AND ACQUIRER=ETF. This includes:\n   (a) shell-ETF conversions and cross-trust reorganizations into a new ETF;\n   (b) acquisition of a mutual fund by an EXISTING ETF;\n   (c) RETROSPECTIVE statements of completed conversions (\"the ETF is the successor\n       to the X Fund as a result of a reorganization on <date>\") — record the event\n       with effective_date = the stated completion date.\n  NOT events — output {\"no_event\": true, \"reason\": \"<code>\"} with code:\n   MF_TO_MF   mutual fund merged into another MUTUAL FUND (acquirer not an ETF)\n   ETF_TO_ETF target is itself an ETF (trust adoption/re-domiciliation/rebrand)\n   CEF        target is a closed-end fund (incl. CEF→ETF: code CEF, add \"flag\":\"CEF_to_ETF\")\n   INTERVAL   acquirer is an interval fund or other non-ETF structure\n   SHARECLASS share-class conversion/aging (e.g. Class C→A), fund rename, no reorganization\n   MENTION    ETFs appear only as portfolio holdings/risk language/ordinary prospectus text\n  If the excerpt truly shows no reorganization at all, use code MENTION.\n\nOUTPUT — one JSON value per item id. Copy the item id EXACTLY as printed after 文件:\n(character-for-character; never re-type digits). Value is a PLAIN JSON object (never a\nquoted/escaped string):\n  {\"events\": [ {one object PER TARGET FUND named in the filing — enumerate ALL rows of\n   the Target/Acquiring fund table, a 4-fund filing yields 4 objects}, ... ]}\n  or the no_event object above.\nEach event object:\n  fund_name        target mutual fund's full name (from excerpt)\n  family           fund family/trust (from excerpt)\n  mutual_fund_ticker / etf_ticker\n                   a single 2-6 char UPPERCASE symbol from the excerpt, else \"NA\".\n                   NEVER a fund name. Multiple class tickers → \"NA\" and list them in evidence.\n  announce_date    YYYY-MM-DD only. Board-approval date if stated; else the document's own\n                   date; else the filed date. Vague (\"May 2020\",\"Q4 2026\") → \"NA\".\n  date_basis       \"board\" | \"document\" | \"filed\" | \"NA\"\n  effective_date   YYYY-MM-DD only; the stated closing/completion date. Vague → \"NA\".\n  asset_class      equity_US / equity_intl / fixed_income / other — ONLY if locatable in the\n                   excerpt (bond/muni/high-yield/MBS→fixed_income; International/EM/Asia→\n                   equity_intl; explicit US equity→equity_US; managed-futures/multi-asset/\n                   long-short→other). Name alone insufficient → \"NA\".\n  AUM_at_conversion_USD  number from excerpt or \"NA\"\n  source_accession copy from the 文件 line\n  confidence       H = fund identity + (announce or effective) with explicit basis;\n                   M = identity clear, dates partly missing/document-dated;\n                   L = identity inferred from title only\n  evidence         ≤25-word quote fragment supporting the verdict (for events: the words\n                   showing the acquirer is an ETF; for no_event: the words showing why not)\nNEED_HUMAN only when TWO date statements INSIDE THIS ONE EXCERPT contradict for the same\nfund: {\"NEED_HUMAN\": true, \"quotes\": [\"...\", \"...\"]}. Different filings never contradict.\nNever fill any field from memory — excerpt-locatable or \"NA\".\n\nSELF-CHECK before emitting (do this, don't print it): every input item id appears exactly\nonce in your answer map (count them); every event object quotes ETF-acquirer evidence;\nevery date matches ^\\d{4}-\\d{2}-\\d{2}$ or is \"NA\"; no ticker field contains a space.】\n文件: 0001193125-24-087068 (form N-14, filed 2024-04-04, FIDELITY SUMMER STREET TRUST  (CIK 0000225322))\nsource_url: https://www.sec.gov/Archives/edgar/data/225322/000119312524087068/d811541dn14.htm\n节选:\nN-14 1 d811541dn14.htm FIDELITY SUMMER STREET TRUST Fidelity Summer Street Trust Table of Contents As filed with the Securities and Exchange Commission on April 4, 2024 Registration No. 33- (Investment Company Act Registration No. 811-02737) SECURITIES AND EXCHANGE COMMISSION Washington, D.C. 20549 FORM N-14 REGISTRATION STATEMENT UNDER THE SECURITIES ACT OF 1933 Pre-Effective Amendment No. [ ] Post-Effective Amendment No. [ ] Fidelity Summer Street Trust (Exact Name of Registrant as Specified in Charter) Registrant’s Telephone Number (617) 563-7000 245 Summer St., Boston, MA 02210 (Address Of Principal Executive Offices) Margaret Carey, Secretary and Chief Legal Officer 245 Summer Street Boston, MA 02210 (Name and Address of Agent for Service) Approximate Date of Proposed Public Offering: As soon as practicable after the Registration Statement becomes effective under the Securities Act of 1933. The Registrant has registered an indefinite amount of securities under the Securities Act of 1933 pursuant to Section 24(f) under the Investment Company Act of 1940; accordingly, no fee is payable herewith because of reliance upon Section 24(f). It is proposed that this filing will become e […] anization is currently scheduled to take place as of the close of business of the New York Stock Exchange (the NYSE) on September 13, 2024, or such other time and date as the parties may agree (the Closing Date). Fidelity High Income Fund (together with Fidelity Global High Income Fund, the funds), a high income fund, is a diversified series of Fidelity Summer Street Trust, an open-end management investment company registered with the Securities and Exchange Commission (the SEC). Fidelity High Income Fund seeks a high level of current income. Growth of capital may also be considered. Fidelity High Income Fund seeks to achieve its investment objective by normally investing primarily in income-producing debt securities, preferred stocks, and convertible securities, with an emphasis on lower-quality debt securities (those of less than investment-grade quality, also referred to as high yield debt securities or junk bonds). THESE SECURITIES HAVE NOT BEEN APPROVED OR DISAPPROVED BY THE SEC, NOR HAS THE SEC PASSED UPON THE ACCURACY OR ADEQUACY OF THIS INFORMATION STATEMENT AND PROSPECTUS. ANY REPRESENTATION TO THE CONTRARY IS A CRIMINAL OFFENSE. The Information Statement sets forth concisely the information about the Reorganization and Fidelity High Income Fund that shareholders should know. Please read it carefully and keep it for future reference. The following documents have been filed with the SEC and are incorporated into this Information Statement by reference, which means they are part of this Information Statement for legal purposes: (i) the Statement of Additional Information dated May 20, 2024, relating to this Information Statement; (ii) the Prospectus for Fidelity High Income Fund dated June 29, 2023, as supplemented March 1, 2024, relating to Fidelity High Income Fund shares, a retail class of Fidelity High Income Fund, a copy of which, if applicable, accompanies this Information Statement; (iii) the Prospectus for Fidelity High Income Fund, relating to Class A, Class M, Class C, Class I and Class Z shares and Fidelity Global High Income Fund, relating to Class A, Class M, Class C, and Class I, dated June 29, 2023, as revised November 8, 2023 and as supplemented March 1, 2024, a copy of which, if applicab […] ks a high level of current income. Growth of capital may also be considered. Fidelity Global High Income Fund’s investment objective is non-fundamental and does not require shareholder approval to change. Fidelity High Income Fund’s investment object is fundamental and may only be changed with shareholder approval. Although the funds have somewhat similar principal investment strategies , there are some differences of which you should be aware. The following compares the principal investment strategies of Fidelity Global High Income Fund and Fidelity High Income Fund: Fidelity Global High Income Fund Fidelity High Income Fund The Adviser normally invests the fund’s assets primarily in income-producing debt securities, preferred stocks, and convertible securities, with an emphasis on lower-quality debt securities (those of less than investment-grade quality, also referred to as high yield debt securities or junk bonds), of U.S. and non-U.S. issuers, including emerging markets. Many lower-quality debt securities are subject to legal or contractual restrictions limiting the Adviser’s ability to resell securities to the general public. The Adviser may also invest the fund’s assets in non-income producing securities, including defaulted securities and common stocks. The Adviser may invest in companies whose financial condition is troubled or uncertain and that may be involved in bankruptcy proceedings, reorganization or financial restructurings. The proportions of the fund’s assets invested in each type of security vary based on the Adviser’s interpretation of economic conditions and underlying security values. Emerging markets include countries that have an emerging stock market as defined by MSCI, countries or markets with low- to middle-income economies as classified by the World Bank, and other countries or markets that the Adviser identifies as having similar emerging markets characteristics. Emerging markets tend to have relatively low gross national product per capita compared to the world’s major economies and may have the potential for rapid economic growth. The Adviser normally invests the fund’s assets primarily in income-producing debt securities, preferred stocks, and convertible securities, with an emphasis on lower-quality debt securities (those of less than investment-grade quality, also referred to as high yield debt securities or junk bonds). Many lower-quality debt securities are subject to legal or contractual restrictions limiting the Adviser’s ability to resell the securities to the general public. The Adviser may also invest the fund’s assets in non-income producing securities, including defaulted securities and common stocks. The Adviser currently intends to limit common stocks to 10% of the fund’s total assets. The Adviser may invest in companies whose financial condition is troubled or uncertain and that may be involved in bankruptcy proceedings, reorganizations, or financial restructurings. No corresponding principal strategy. The Adviser uses the credit quality distribution of an index representing the overall high yield bond market as a guide in structuring the fund’s credit quality composition. As of April 30, 2023, the Adviser used the ICE BofA US High Yield Constrained Index to represent the overall high yield bond market. The Adviser normally allocates the fund’s investments across different countries and regions. The Adviser may invest the fund’s assets in securities of foreign issuers in addition to securities of domestic issuers. Although the fund will invest in securities of issuers located throughout the world, it may invest a significant portion of its assets in securities of U.S. issuers. No corresponding princip […]  7.14 $ 7.43 $ 7.91 $ 8.71 $ 7.93 $ 8.83 Total Return C,D (1.20)% (1.04)% (4.75)% 14.89% (5.35)% 5.83% Ratios to Average Net Assets B,E,F Expenses before reductions .65% G .73% .70% .69% .69% .70% Expenses net of fee waivers, if any .64% G .73% .70% .69% .69% .70% Expenses net of all reductions .64% G .73% .70% .69% .69% .70% Net investment income (loss) 6.11% G 5.48% 4.31% 4.61% 5.33% 5.66% Supplemental Data Net assets
r to Shareholders of Guinness Atkinson Asia Pacific Dividend Builder Fund and Guinness Atkinson Dividend Builder Fund, each a series of Guinness Atkinson Funds 2. Questions and Answers for Shareholders of Guinness Atkinson Asia Pacific Dividend Builder Fund and Guinness Atkinson Dividend Builder Fund 3. Information Statement/Prospectus regarding the Conversion of the Guinness Atkinson Asia Pacific Dividend Builder Fund into SmartETFs Asia Pacific Dividend Builder ETF and the Guinness Atkinson Dividend Builder Fund into SmartETFs Dividend Builder ETF, each a series of Guinness Atkinson Funds 4. Part C Information 5. Exhibits: A. Plan & Agreement of Reorganization B. Financial Highlights - 2 - February 26, 2021 Dear Shareholder: I am writing to inform you about a transaction that will affect your investment in: · Guinness Atkinson Asia Pacific Dividend Builder Fund, or · Guinness Atkinson Dividend Builder Fund. We are planning on converting these two Funds into Exchange Traded Funds, commonly referred to as ETFs. Each Fund will be converted into an ETF by merging it into a newly-created ETF. We refer to this as a “Conversion”. Throughout this document you’ll see the phrase Target Fund or Target Funds. The Target Funds are simply the two existing mutual funds. You’ll also see references to the phrase Acquiring Fund or Acquiring Funds. These are simply the newly-formed ETFs. We are excited about the Conversions and believe that each Target Fund and its shareholders will benefit from their Fund’s Conversion. This documents explains the details and the reasons for the Conversions. The information presented in this document is important and we encourage you to read it. There is an informative Q&A section below which should answer many of your questions. As we explain below, you may need to take action. Once converted, the two ETFs will still be managed by Guinness Atkinson Asset Management and there will be no changes to the management style, investment restrictions or portfolio managers as a result of the Conversion. The Board of Trustees of the Trust (the “Board”) believes that the Conversion is in the best interests of each Target Fund and its shareholders, and that the interests of each Fund’s shareholders will not be diluted as a result of the Conversion. Here are the technical details and reasons behind the Conversion. Each of these Target Funds are a series of the Guinness Atkinson Funds (the “Trust”), a Delaware statutory trust. As provided in an Agreement and Plan of Reorganization (the “Reorganization Agreement”), each Target Fund will be merged into a new series of the Trust (each, a “Acquiring ETF”), which will be advised by Guinness Atkinson Asset Management, Inc. (“GAAM” or the “Adviser”), the investment adviser to the Target Funds. For each Fund, we are calling this transaction the “Conversion”. The Conversions will transform each Target Fund from an open-ended mutual fund into an open ended exchange traded fund (or ETF). The Target Funds and the Acquiring ETFs are each referred to as a “Fund” and collectively referred to as the “Funds.” The enclosed Information Statement/Prospectus contains information about the Conversions. As a result of each Target Fund’s Conversion, you will receive shares of the corresponding Acquiring ETF with the same aggregate net asset value as the shares of the Target Fund you own immediately prior to the Conversion. Some brokerage firms may not accept fractional shares; if that is the case, the Target Fund will redeem your fractional share at net asset value immediately before effectuating the Conversion, and distribute the cash value of the fractional share to you. - 3 - Each Conversion is taking place because the Board believes that it is in the best interests of the Target Fund and its shareholders to merge into its respective Acquiring ETF, each of which is managed similarly to the Target Fund but is offered as an exchange-traded fund, or ETF, which will permit each Fund operate at lower overall costs and to achieve further reduced operating costs through the benefits of economies of scale as the Funds increase in size (although cost reduction is not guaranteed). The Board believes that shareholders of each Target Fund will benefit from the Conversion, and some of these benefits come with additional or different risks: (i) the Acquiring ETFs will operate at lower overall cost than the Target Funds. For both Conversions, the Adviser has entered into an expense limitation agreement (which will run through June 2024) with each Acquiring ETF so that after the Conversions, each Acquiring ETF will operate with a lower net total expense ratio than its respective Target Fund. If the expense limitation agreement is not extended after 2024, costs would be higher. We provide more details on the cost savings later in this document. (ii) shares of the Acquiring ETFs can be purchased and sold throughout the trading day at the then-prevailing market price on the exchange. Buying or selling shares of the Acquiring ETFs may involve paying a brokerage commission. Additionally, prices on the exchange may be higher or lower than the Acquiring ETF’s net asset value. Shareholders will no longer redeem their shares for cash at a value determined at the close of the market. (iii) each Conversion is structured to qualify as tax-free for U.S. federal income tax purposes. For some shareholders, there could be a small cash payment for fractional shares, and that could be taxable. After the Conversion, former Target Fund shareholders will still be invested in a diversified, open-end fund that pursues the identical investment objective, applies the same investment policies and uses the same principal investment strategies, but they will hold shares of their Acquiring ETF, which will be an exchange traded fund. NO SHAREHOLDER APPROVAL IS REQUIRED FOR THE CONVERSIONS What are your options as a shareholder? 1. Accept the Conversion. When the Conversion happens, your shares will be deposited into your account. (If you are a direct shareholder, see below). 2. Exchange your shares into another Guinness Atkinson Fund. You can do this by calling your broker, or by calling Guinness Atkinson Funds at 800 915-6566. 3. Redeem your shares in the Asia Pacific Dividend Builder Fund or the Dividend Builder Fund. You can do this by calling your broker or calling the Guinness Atkinson Funds at 800 915-6566. If you do not wish for your shares to be converted to ETFs you will need to redeem your shares or exchange your shares for other Funds in the Guinness Atkinson Funds family. You may hold your shares in a brokerage account, or you may hold your shares directly with the Fund. If you hold your shares in a brokerage account you do not need to take any action unless you wish to redeem your shares. - 4 - DIRECT SHAREHOLDERS MUST TAKE ACTION BEFORE RECEIVING THEIR ETF SHARES. What is a direct shareholder? If you hold your shares directly with the Guinness Atkinson Funds, you are a direct shareholder. If you hold your shares through a brokerage account, you are NOT a direct shareholder. We provide more information, including how to determine if you’re a direct shareholder, in special section contained in a box below. Direct shareholders must do one of the following: 1. Transfer your shares to the broker dealer of your choice. We urge you to begin this process immediately if this is your preferred option. This is the option that we recommend. Look at the box at the end of this letter for more information. 2. Exchange your shares into another Guinness Atkinson Fund. You can do this by calling Guinness Atkinson Funds at 800 915-6566. 3. Redeem your shares in the Asia Pacific Dividend Builder Fund or the Dividend Builder Fund. You can do this by calling 800 915-6566. If you are a direct shareholder and you fail to take any action your shares will be converted into shares of the SmartETFs Asia Pacific Dividend Builder ETF or SmartETFs Dividend Builder ETF, as appropriate, and held by a stock transfer agent, American Stock Transfer, waiting for your instructions. 1 I will continue to contact you to assist you in transferring the ETF shares into a brokerage account. This document is provided for information only, because shareholder approval is not required to effectuate the Conversion for each Fund under the Trust’s operative documents, and applicable Delaware state and U.S. federal law (including the Investment Company Act of 1940, as amended). The Trust’s operative documents provide the Board with power to merge each Target Fund into an Acquiring ETF without shareholder approve. In addition, rules under the Investment Company Act of 1940 permit a merger of affiliated funds without obtaining shareholder approval if certain conditions are met. The Conversions are expected to take place on March 26, 2021. I encourage you to carefully review the enclosed materials, which explain the Conversions in more detail. If you have any questions or need additional information, please contact Guinness Atkinson Asset Management, Inc. at (626) 628-2787. Sincerely, James J. Atkinson President Guinness Atkinson Funds 225 South Lake Avenue, Suite 216 Pasadena, California 91101 1 Shares held by this stock transfer agent are held subject to applicable state and federal law concerning unclaimed property. - 5 - Important Information for Direct Shareholders Are You a Direct Shareholder? If you are a Direct Shareholder, that means that your shares are held by the Fund’s Transfer Agent. How do you know if you hold your shares directly? If you receive quarterly statements from Guinness Atkinson Funds, then you hold your shares directly. If your shares in the Funds are listed as a position on a statement from your brokerage firm, then you already hold your shares in a brokerage account. If you are uncertain please call 800 915-6566 and ask if you’re a direct shareholder. Additionally, if you hold your shares directly you will receive separate communications from us including email, regular mail, express delivery and via telephone. As mentioned above, you have the same options to redeem or exchange your shares if you do not wish to hold ETF shares. To exchange or redeem, please call Guinness Atkinson Funds at 800 915-6566. Transferring Your Direct Shares to a Brokerage Account Transferring your shares from the Transfer Agent to a brokerage account should be a simple and seamless  […] an be found on your statement. Your broker will help you complete a form to initiate the transfer. Once you sign this form, your broker will submit the form to the Transfer Agent directly and the shares will be transferred into your brokerage account. The sooner you initiate the transfer, the better. If you have any questions about this process or need assistance, call us at 800 915-6566. This step is only required by shareholders that hold their shares directly with the Guinness Atkinson Funds. If you already hold your shares in a brokerage account, you can ignore this section. - 6 - QUESTIONS AND ANSWERS We recommend that you read the complete Information Statement/Prospectus. This section contains a brief Q&A which will help explain the Conversions including the reasons for the Conversions. Following this section is a more detailed discussion. Q. What is Happening? Why am I receiving this Document? A. Two of the Guinness Atkinson Funds are converting from open-end mutual funds to exchange traded funds. The two Funds are: · Guinness Atkinson Asia Pacific Dividend Builder Fund · Guinness Atkinson Dividend Builder Fund We call these funds the Target Funds. The Conversion will be accomplished by merging each Target Fund into its own newly created exchange traded fund, which will also be part of the Guinness Atkinson Funds trust, but will be part of a new brand called SmartETFs. The two ETFs are: · SmartETFs Asia Pacific Dividend Builder ETF · SmartETFs Dividend Builder ETF The Board of Trustees (“the “Board”) has approved the Conversions. You are receiving this document because, as of February 19, 2021, you were a shareholder in at least one of the two Target Funds. We refer to each of these transactions as a Conversion. Each Conversion is structured as a merger of a Fund (each, a “Target Fund”), into a corresponding shell fund that will operate as an exchange traded fund (each, an “Acquiring ETF” and, together with the Target Funds, the “Funds” and each, a “Fund”). After each Conversion takes place, only the Acquiring Fund will continue to operate. Q. What is this document and why did we send it to you? A. This is an Information Statement/Prospectus that provides you with information about the Conversion of your Fund. The Target Funds and their Acquiring ETFs are series of Guinness Atkinson Funds (the “Trust”). Each Fund and its respective Acquiring ETF pursues identical investment objectives and operates with identical investment strategies and restrictions. There is no change in investment adviser or portfolio managers. When each Conversion is completed, your shares of the Target Fund will be exchanged for shares of the Acquiring ETF, and the Target Fund will be terminated as a series of the Trust. You are receiving this document because, as of February 19, 2021, you were a shareholder in one of the two Target Funds. The Conversions do not require approval by shareholders of either Target Fund or its Acquiring ETF, and you are not being asked to vote. Q. Has the Board of Trustees approved the Conversions? A. Yes, the Board of Trustees of the Trust (the “Board”) approved the Conversions in May 2020. After careful consideration, the Board, including all of the Trustees who are not “interested persons” of the Funds (as defined in the Investment Company Act of 1940 (the “1940 Act”)) (the “Independent Trustees”), determined that for each Target Fund, the Conversion is in the best interests of the Target Fund and its shareholders and that neither Target Fund’s existing shareholders’ interests will be diluted as a result of its Conversion. The Acquiring ETFs do not have existing shareholders. - 7 - Q. Why is the Conversion occurring? A . The Adviser and the Board believe that operating these two Funds as ETFs is in the best interests of each Fund and its shareholders. We believe that operating these two funds as ETFs will offer a number of advantages to shareholders that will benefit you following the Conversions. These benefits include: · lower expenses: We expect that, over time, the ETFs will be less expensive to operate. To ensure that shareholders receive this benefit, the Adviser has entered into an expense limitation agreement (“expense cap”) with the Funds under which each Acquiring ETF will be operated at a lower net total expense ratio than its respective Target Fund. The lower expense caps for the Acquiring ETFs will remain in place through at least June 2024, and this arrangement does not permit any recoupment of fees waived or expenses reimbursed. If this expense limitation agreement is not renewed after its expiration, the ETF’s total annual fund operating expenses could increase. A number of expenses involved in the operation of the Acquiring ETFs are lower than they are for the Target Funds, which operate as traditional mutual funds. This includes transfer agency fees, shareholder servicing fees, state registration fees and certain custody related expenses. o There are some expenses specific to the Acquiring ETFs, including exchange listing fees and fees paid to the transfer agent, custodian and distributor for the Acquiring ETFs for services unique to Acquiring ETFs. These are largely fixed expenses which do not increase as the ETFs grow or based on individual shareholder activity. For one Conversion, at the current asset base, these ETF-specific expenses are greater than the mutual fund expenses that are saved. To offset this, the Adviser has agreed to a lower expense cap for each of the Acquiring ETFs to ensure that the net total expense ratio of each Acquiring ETF is lower than its respective Target Fund. o To ensure that shareholders receive the benefits of the lower overall fee structure, the Adviser has agreed to fee reductions, and together with the lower net total expense ratios in place due to the expense cap, the Adviser believes that this cost structure reflects the benefits of the lower cost structure for the Acquiring ETFs. For both Conversions, the expense cap ensures that after the Conversion, each Acquiring ETF will operate at a lower net total expense ratio than the corresponding Target Fund. This expense cap will remain in place until at least June 30, 2024 and does not permit the Adviser to recoup waived expenses if the Acquiring ETF grows in size. If the expense cap is not renewed in 2024, the expenses of an Acquiring ETF could increase. · intraday trading , because the Acquiring ETF shares can be purchased and sold throughout the trading day at fair market value on the exchange. (This means that if you decide to sell your shares of the Acquiring ETF, you can do that right away at the then-prevailing market price; with the mutual fund, you place your redemption order and your shares are redeemed at the next calculated net asset value, which happens at the end of the trading day). o This means you will no longer redeem your shares for cash at the next determined NAV. o Buying or selling shares of the Acquiring ETFs may involve paying a brokerage commission. Additionally, prices on the exchange may be higher or lower than the Acquiring ETF’s net asset value per share. · tax benefits , because generally the fund will not incur gains and losses from portfolio transactions that are incurred to meet redemption requests from other shareholders. o We say generally here because a few foreign markets don’t permit in-kind transfers of securities, and sometimes, the Acquiring ETFs might sell securities within their portfolios to meet the redemption requests. - 8 - The Adviser believes, and the Board agreed, that operating these two fund strategies in the exchange traded fund structure offers a better value proposition than traditional open-end mutual funds, primarily because of reduced operational costs, superior transaction flexibility, greater holdings transparency and potentially a fairer tax treatment. After the Conversions, shareholders of each Target Fund will still be invested in an open-end fund with the same investment objectives, strategies, policies and restrictions, operated by the same investment adviser and portfolio managers, but at a lower overall cost. The Conversions are designed to not be taxable events for fund shareholders. Q. How will this Conversion affect me as a shareholder? A. After the Conversion of your Fund, you will own shares of an ETF having an aggregate net asset value equal to the aggregate net asset value of the shares of the Fund you owned when the Conversion happened. Your brokerage firm may not be able to handle fractional shares; if this is the case, we will redeem any fractional shares that you may have at net asset value immediately prior to effectuating the Conversion, and send you the proceeds of that redemption. In the Conversion, all of the assets and the liabilities of each Target Fund will be transferred to a newly-formed Acquiring ETF. You, as a shareholder of the Target Fund, will receive shares of the corresponding Acquiring ETF equal to the value of the shares you own of the Target Fund. Shares of the Acquiring ETF will be transferred to each shareholder’s brokerage account or for direct shareholders, held by a transfer agent until the brokerage account is identified (subject to applicable federal or state laws concerning unclaimed property). No physical share certificates will be issued to shareholders. After the Conversion, a Target Fund shareholder will hold the same percentage of ownership in the corresponding Acquiring ETF as that shareholder held in the Target Fund prior to the Conversion (adjusted for cash distributions, if any). Q. Why is no shareholder action necessary? A. No vote of the shareholders of the Target Fund is required to approve the Conversions under Delaware law or under the Trust’s Declaration of Trust. Under Rule 17a-8 of the 1940 Act, a vote of shareholders of each Target Fund is not required. This is because each Acquiring ETF is constructed to correspond to its Target Fund. Each Acquiring ETF will operate using the same investment strategies and policies, and the same portfolio managers, as its respective Target Fund. Q. What will change when the Funds are converted to ETFs? A. Your Fund will be an exchange traded investment company, known as an ETF. After the Conversion, your Fund will remain a registered investment company, but it will be exchange traded, and you will own shares as you did before the Conversion, but in an Acquiring ETF instead of a Target Fund. You will no longer redeem individual shares directly from the Fund; should you decide to purchase or sell shares in your Acquiring ETF after the Conversion, you will need to place a trade through a broker-dealer who will execute your trade on the NYSE or other nationally recognized exchange at prevailing market prices. As with all ETFs, your broker may charge a commission for purchase and sales transactions. Your fund will be a fully transparent, actively managed ETF, which means that portfolio holdings will be available on the ETF’s website every day. The ETF’s website will also contain other information about things like the net asset value, market price, premiums and discounts, and bid-ask spreads, as required by rules that govern exchange traded funds. - 9 - Q. What’s the difference between Guinness Atkinson and SmartETFs? A. After the conversion, the two ETFs will carry the SmartETFs brand name rather than the Guinness Atkinson Funds brand name. The Adviser will still be Guinness Atkinson. During the conversion process you will be able to find information about the Conversion on the gafunds.com website and the smartetfs.com website. After the Conversion you can get up to date information on the Acquiring ETFs at www.smartetfs.com. Q. Will the Conversion affect the way the Funds are invested? A. No. Guinness Atkinson Asset Management will remain as adviser to the Acquiring ETFs and each Acquiring ETF will be managed using the same investment style, restrictions, philosophy, parameters and methodology currently used by its respective Target Fund. The Funds will continue to be actively managed and the portfolio managers will remain the same. Q. Are there any risks to owning ETFs that are different than the risks of owning mutual funds? A. Yes, there are some differences in risks, and all of these differences relate to the structure of ETFs . We discuss these risks later in the Information Statement/Prospectus, but below, we summarizing some of the risks and their associated benefits. Basically, · The Acquiring Fund’s ETF shares will be listed for trading on NYSE Arca, a stock exchange, and shares are bought and sold in the secondary market at a market price. Although it is expected that the market price of an ETF share will approximate its net asset value (NAV), there could be times when the market price and the NAV differ significantly. If that happened, you could pay more or less than NAV when you buy shares on the exchange, and you could receive more or less than NAV when you sell shares on the exchange. All ETFs face this risk. · Each Acquiring ETF’s shares will be listed for trading, but it is possible that an active trading market might not be maintained. · Trading in ETF shares on an exchange can be halted for […] iety of reasons, and this could be an individual trading halt (a particular share is halted) or a market-wide trading halt (the whole exchange stops trading). ETF shares could also be delisted. Both trading halts and delistings happen for a variety of reasons. All ETFs face these risks. · Only financial institutions that enter into an Authorized Participant Agreement with the Trust can engage in creation or redemption transactions for ETF shares. If the Acquiring ETFs Authorized Participants decide not to create or redeem shares, shares could trade at a premium or discount to Acquiring ETFs NAV, and could face trading halts or delistings. Q. Are the Expenses Higher or Lower for the Acquiring ETFs as compared to the Target Funds? A. In each Conversion, the total annual fund operating expenses are going down, and each Acquiring ETF will operate with lower total annual fund operating expenses than its predecessor Target Fund. However, with respect to the Conversion of the Asia Pacific Dividend Builder Fund, the “other expenses” component of this Acquiring ETF’s annual fund operating expenses will be increasing upon conversion, rising to 4.22% as compared to 4.19%. For the Conversion of the Dividend Builder Fund, the “other expenses” component of the Acquiring ETF’s annual fund operating expenses will be lower upon conversion, 0.97% as compared to 1.00% . For both Acquiring ETFs, the Adviser has entered into an expense limitation agreement which will run through June 2024, to ensure that for each Conversion, shareholders will receive Acquiring ETF shares that operate with a lower net total expense ratio than the corresponding Target Fund. If the expense limitation agreement is not extended in 2024, each Acquiring ETF’s total annual fund operating expenses could increase. We discuss this issue later in this document. Q. Can you explain more about the “other expenses” component of the ETFs’ operating expenses? A. The services required to operate the Acquiring ETFs are somewhat different than the services required to operate the Target Funds, which are traditional mutual funds. These services fall into the “other expenses” component of a fund’s expenses as shown in the fee table of the fund’s prospectus. - 10 - Transfer agency and shareholder servicing fees for mutual funds often involve minimum annual fees as well as variable fees based on the size of the fund and sometimes, specific expenses incurred to service the fund. By comparison, for ETFs, the transfer agency fees are fixed and the fixed rate for ETFs is often less than the minimum for traditional mutual funds. ETFs generally don’t have shareholder servicing fees. In many states, mutual funds are required to pay state registration fees. These fees often involve a minimum fee plus a variable amount based on the number of shares purchased in each state. Because they are exchange listed, ETFs are exempt from these fees. However, ETFs must pay an exchange listing fee. While circumstances vary, exchange listing fees a […] . · When a mutual fund redeems shares, it may sell portfolio holdings to pay redemptions, and pay custody fees on those trades and realize capital gains and losses to be distributed to all shareholders. When a block of shares is redeemed from the ETF, the redemption is paid out by delivering to the Authorized Participant shares of the underlying portfolio holdings, which means that the ETF generally does not sell portfolio holdings to pay redemptions. (We say “generally” because both of the Target Funds hold foreign securities; in some foreign securities markets, often called “cash in lieu” markets, a shareholder cannot transfer the shares it owns to another shareholder, but has to sell them in the market and deliver the proceeds). For the Conversion of the Guinness Atkinson Asia Pacific Dividend Builder Fund, in the aggregate, immediately after the Conversion, the “other expenses” component of the gross total annual fund operating expenses will be higher for the Acquiring ETF (4.22% “other expenses”) than the corresponding costs in the Target Fund (4.19% “other expenses”). For the Conversion of the Guinness Atkinson Dividend Builder Fund, in the aggregate, immediately after the Conversion, the “other expenses” component of the gross total annual fund operating expenses will be lower for the Acquiring ETF (0.97% “other expenses”) than the corresponding costs in the Target Fund (1.00% “other expenses”). To ensure that shareholders do not pay higher total annual fund operating expenses, as explained later in this Information Statement/Prospectus, the Adviser has agreed to limit the total expense ratios for the two Acquiring ETFs. For the Asia Pacific Dividend Builder ETF the Adviser has agreed to an expense limit of 0.78%. For the Dividend Builder ETF, the Adviser has agreed to an expense limit of 0.65%. For each of the Acquired ETFs, these expense caps are lower than the current expense caps that apply to their respective Target Funds. As with the existing expense caps, these lowered expense caps exclude acquired fund fees and expenses, if any, interest, taxes, dividends on short positions and any extraordinary expenses, as well as brokerage commissions or fees for securities lending activities. These lowered ex\n"

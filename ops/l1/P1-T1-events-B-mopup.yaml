ows of\n   the Target/Acquiring fund table, a 4-fund filing yields 4 objects}, ... ]}\n  or the no_event object above.\nEach event object:\n  fund_name        target mutual fund's full name (from excerpt)\n  family           fund family/trust (from excerpt)\n  mutual_fund_ticker / etf_ticker\n                   a single 2-6 char UPPERCASE symbol from the excerpt, else \"NA\".\n                   NEVER a fund name. Multiple class tickers → \"NA\" and list them in evidence.\n  announce_date    YYYY-MM-DD only. Board-approval date if stated; else the document's own\n                   date; else the filed date. Vague (\"May 2020\",\"Q4 2026\") → \"NA\".\n  date_basis       \"board\" | \"document\" | \"filed\" | \"NA\"\n  effective_date   YYYY-MM-DD only; the stated closing/completion date. Vague → \"NA\".\n  asset_class      equity_US / equity_intl / fixed_income / other — ONLY if locatable in the\n                   excerpt (bond/muni/high-yield/MBS→fixed_income; International/EM/Asia→\n                   equity_intl; explicit US equity→equity_US; managed-futures/multi-asset/\n                   long-short→other). Name alone insufficient → \"NA\".\n  AUM_at_conversion_USD  number from excerpt or \"NA\"\n  source_accession copy from the 文件 line\n  confidence       H = fund identity + (announce or effective) with explicit basis;\n                   M = identity clear, dates partly missing/document-dated;\n                   L = identity inferred from title only\n  evidence         ≤25-word quote fragment supporting the verdict (for events: the words\n                   showing the acquirer is an ETF; for no_event: the words showing why not)\nNEED_HUMAN only when TWO date statements INSIDE THIS ONE EXCERPT contradict for the same\nfund: {\"NEED_HUMAN\": true, \"quotes\": [\"...\", \"...\"]}. Different filings never contradict.\nNever fill any field from memory — excerpt-locatable or \"NA\".\n\nSELF-CHECK before emitting (do this, don't print it): every input item id appears exactly\nonce in your answer map (count them); every event object quotes ETF-acquirer evidence;\nevery date matches ^\\d{4}-\\d{2}-\\d{2}$ or is \"NA\"; no ticker field contains a space.】\n文件: 0001398344-20-013598 (form 497, filed 2020-07-10, Centre Funds  (CIK 0001517238))\nsource_url: https://www.sec.gov/Archives/edgar/data/1517238/000139834420013598/fp0055448_497.htm\n节选:\n497 1 fp0055448_497.htm July 10, 2020 Dear Shareholders: We have called a special meeting of shareholders of the Centre Active U.S. Treasury Fund (the “Treasury Fund”), a series of Centre Funds (the “Trust”), to be held at the offices of Centre Asset Management, LLC, 48 Wall Street, Suite 1100, New York, New York 10005 on Thursday, August 20, 2020 at 10:00 am. The purpose of the special meeting is to seek shareholder approval of an Agreement and Plan of Reorganization under which the Treasury Fund would be reorganized into Centre Global Infrastructure Fund (the “Infrastructure Fund”), another series of the Trust. Each of the Treasury Fund and the Infrastructure Fund is managed by Centre Asset Management, LLC (the “Adviser”). Please refer to the enclosed combined proxy statement/prospectus for a detailed explanation of the reorganization. After careful deliberation, the Adviser determined that it would be advisable to pursue the reorganization of the Treasury Fund into the Infrastructure Fund and recommended to the Board of Trustees of the Trust (the “Board”) that the Board approve the proposed reorganization. The Adviser believes that the Infrastructure Fund, which has an investmen […] iew is based on: (i) the high relative underlying divided yield of the Infrastructure Fund (as of March 31, 2020), 5.14%, as compared to the 2.69% underlying yield for the Treasury Fund; and (ii) the tax treatment of qualified dividends distributed by the Infrastructure Fund, which are taxable at the federal capital gains rate. Furthermore, the Adviser has the ability to invest 20% of the Infrastructure Fund’s net assets, plus borrowings for investment purposes, in debt securities that are infrastructure-related debt securities of U.S. and non-U.S. issuers (including municipal, corporate debt obligations and asset-backed securities), energy-related infrastructure companies organized as master limited partnerships (“MLPs”), common stock and convertible securities. Lastly, the Infrastructure Fund may invest in convertible securities when the attributes of a particular company’s convertible security is superior, in terms of total return (interest or dividends plus capital appreciation), to the common shares of the same company. 3 For additional information about the reasons for the Reorganization, please see the section of this Proxy Statement/Prospectus entitled “The Proposed Plan and Reorganization - Reasons for the Reorganization Considered by the Board.” 2. Board Consideration of the Reorganization The Trustees, including a majority of the Independent Trustees, unanimously determined that the proposed Reorganization is in the best interests of both the Treasury Fund’s shareholders and the Infrastructure Fund’s shareholders. In approving the proposed Plan and Reorganization with respect to the Treasury Fund, the Board considered the Adviser’s reasons for recommending the Reorganization and information presented to them by the Adviser regarding the alternatives to the Reorganization. The Board’s approval of the Plan and the Reorganization, and its determination to recommend that Treasury Fund shareholders approve the Plan, were based on the Board’s consideration of, among other factors: (i) the Adviser’s reasons for proposing the Plan (and the Reorganization provided for therein), and the terms and conditions of the Plan and the Reorganization; (ii) that the Adviser will pay all costs and expenses related to the Reorganization, except for any costs or expenses incurred in connection with the disposition of any portfolio securities (although no such […] recasting process designed to forecast interest rates on a monthly basis. The Adviser’s investment approach seeks to manage and take advantage of short-term deviations from the general trend in rates. The Adviser reviews the Fund’s portfolio on a monthly basis and adjusts it, as appropriate, based on the Adviser’s interest rate outlook. The Adviser also assesses the relative yields available on securities with different maturities and future changes in interest rates. The Adviser may select securities with varying maturities. If the market environment is defensive characterized by an expectation of rising interest rates, the Fund may invest primarily in securities with shorter-term maturities, cash or cash equivalents, as well as sell U.S. exchange-traded futures contracts on bond indices or U.S. Treasury notes and bonds to shorten the duration of the portfolio. Conversely, in an aggressive market environment of low inflation, characterized by declining interest rates, the Fund may invest primarily in securities with longer-term maturities, as well as purchase U.S. exchange-traded futures contracts on bond indices or U.S. Treasury notes and bonds to lengthen the duration of the portfolio. Infrastructure Fund The Infrastructure Fund is a diversified fund that normally invests at least 80% of its net assets, plus the amount of any borrowings for investment purposes, in equity securities issued by U.S. and foreign (non-U.S.) infrastructure-related companies (the “Infrastructure Fund 80% Policy”). For this purpose, an “infrastructure-related” company has (i) at least 50% of its assets (excluding cash) consisting of infrastructure assets, or (ii) 50% of its gross income or net profits attributable to, or derived (directly or indirectly) from, the ownership, management, construction, development, operation, use, creation or financing of infrastructure assets. “Infrastructure assets” are the physical structures and networks that provide necessary services for society, including, but not limited to, transportation assets ( e.g ., railroads, toll roads, bridges, tunnels, airports, parking facilities and seaports); utility assets ( e.g ., electric transmission and distribution lines, power generation facilities, oil, gas and water distribution facilities and related midstream assets, communications networks and satellites, sewage treatment plants and critical internet networks) and social assets ( e.g ., hospitals, courts, schools, correctional facilities and subsidized housing). The Infrastructure Fund 80% Policy may be changed without sharehold […] he Fund must comply with the Infrastructure Fund 80% Policy at the time the Fund invests its assets. Accordingly, when the Fund no longer meets the 80% requirement as a result of circumstances beyond its control, such as changes in the value of portfolio holdings, it would not have to sell its holdings, but any new investments it makes would need to be consistent with the policy. The remaining 20% of the Infrastructure Fund’s net assets, plus borrowings for investment purposes, may include infrastructure-related debt securities of U.S. and non-U.S. issuers (including municipal, corporate debt obligations and asset-backed securities), energy-related infrastructure companies organized as master limited partnerships (“MLPs”), common stock and convertible securities. The Fund’s common stock investments may consist of exchange-listed equities from companies across various industries, sectors and market capitalizations. The Fund may invest in convertible securities when the attributes of a particular company’s convertible security is superior, in terms of total return (interest or dividends plus capital appreciation), to the common shares of the same company. 6 Under normal market conditions, the Fund will invest at least 40% of its net assets, plus the amount of any borrowings for investment purposes, in securities of companies organized or located in at least three non-U.S. countries. Although the Fund may invest in emerging market securities without limit, under normal market conditions, the non-U.S. companies in which the Fund currently intends to invest will be organized or located primarily in developed market countries, such as Japan, Spain, Canada, and the United Kingdom. The Fund may also engage in transactions in foreign currencies. The Fund’s investments in securities of foreign issuers may include sponsored or unsponsored depositary receipts for such securities, such as American Depositary Receipts (“ADRs”) and Global Depositary Receipts (“GDRs”). The Fund intends to generally maintain a fully-invested posture, and, as such, cash will typically be held to a minimum. However, significant client inflows may temporarily increase cash positions. The Fund may engage in frequent or active trading of its portfolio securities depending on market conditions, which may result in a high portfolio turnover rate and cause the Fund to incur related increased transaction costs, including brokerage commissions. In selecting investments for the Fund, the Adviser utilizes a “bottom-up” f […]  payments, and the risk of price volatility. As interest rates rise, the value of fixed-income securities typically declines. Investment Adviser Risk. Centre’s implementation of each Fund’s strategy may fail to produce the intended results. Centre’s ability to choose suitable investments has a significant impact on the ability of the Fund to achieve its investment objectives. The performance of the Treasury Fund, which seeks returns relating to changes in interest rates over time and management of duration, may be more adversely affected than that of other funds if Centre’s interest rate forecasts are incorrect. 12 Additional Principal Risks of the Treasury Fund Derivative Risk. Loss may result from the Fund’s use of derivatives, including exchange-traded futures on bond indices or U.S. Treasury notes and bonds. The value of derivatives in which the Fund may invest may rise or fall more rapidly than other investments. Other risks of investments in derivatives include imperfect correlation between the value of these instruments and the underlying assets; risks of default by the other party to a non-exchange traded derivative transaction; risk that the transactions may result in losses that offset gains in portfolio positions; and risks that the derivative transactions may not be liquid. Derivatives may contain “inherent” leverage because derivative contracts may give rise to an obligation on the part of the Fund for future payment or liabilities that are larger than the initial margin or premiums required to establish such positions. Combined with the volatility of derivatives prices, the leveraged nature of derivatives trading could cause the Fund to sustain large and sudden losses. TIPS-Related Risks. TIPS are issued with a fixed interest rate and a fixed maturity date, but their principal value will change, as the U.S. Treasury raises or lowers such value each month to keep pace with inflation. Consequently, the coupon payments made to investors will also vary. Although generally considered a low-risk investment because they are backed by the U.S. government and have a fixed interest rate, TIPS are long-duration assets, sensitive to changes in interest rates and, in the short term, can experience substantial \n"

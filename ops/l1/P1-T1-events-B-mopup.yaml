ars exactly\nonce in your answer map (count them); every event object quotes ETF-acquirer evidence;\nevery date matches ^\\d{4}-\\d{2}-\\d{2}$ or is \"NA\"; no ticker field contains a space.】\n文件: 0001741773-20-002693 (form 497, filed 2020-08-31, MAINSTAY FUNDS TRUST  (CIK 0001469192))\nsource_url: https://www.sec.gov/Archives/edgar/data/1469192/000174177320002693/c497.htm\n节选:\n497 1 c497.htm 497 Untitled Document Prospectus for MainStay CBRE Specialty Funds MainStay Funds ® August 31, 2020 SIMPLE CLASS CBRE Specialty MainStay CBRE Global Infrastructure Fund -- MainStay CBRE Real Estate Fund -- Neither the Securities and Exchange Commission nor any state securities commission has approved or disapproved of these securities or passed upon the accuracy or adequacy of this Prospectus. Any representation to the contrary is a criminal offense. Beginning on January 1, 2021, paper copies of each MainStay Fund’s annual and semiannual shareholder reports will no longer be sent by mail, unless you specifically request paper copies of the reports from MainStay Funds or from your financial intermediary. Instead, the reports will be made available on the MainStay Funds’ website. You will be notified by mail and provided with a website address to access the report each time a new report is posted to the website. If you already elected to receive shareholder reports electronically, you will not be affected by this change and you need not take any action. At any time, you may elect to receive reports and other communications from MainStay Funds electronically by calling  […] . Examples of infrastructure assets include transportation assets (such as toll roads, bridges, railroads, airports, and seaports), utility assets (such as electric transmission and distribution lines, gas distribution pipelines, water pipelines and treatment facilities, and sewer facilities), energy assets (such as oil and gas pipelines, storage facilities, and other facilities used for gathering, processing, or transporting hydrocarbon products as well as contracted renewable power assets), and communications assets (such as communications towers, data centers, fiber networks, and satellites). Under normal circumstances, the Fund invests primarily in common stock, but may also invest in other equity securities including preferred stocks, convertible securities, rights or warrants to buy common stocks, and depositary receipts with characteristics similar to common stock. The Fund may also invest up to 25% of its net assets in master limited partnerships. The Fund may invest up to 30% of its assets in securities of companies located or doing business in emerging markets. The Fund’s investments may be denominated in U.S. dollars, non-U.S. currencies, or multinational currency units. The Fund may hedge its currency exposure to securities denominated in non-U.S. currencies. The Fund may invest in securities of companies of any market size. The Fund may invest in other investment companies, including exchange-traded funds. Under normal market conditions, the Fund will invest a significant amount of its net assets (at least 40%, unless the Subadvisor deems market conditions to be unfavorable, in which case the Fund will invest at least 30%) in foreign securities. Generally, foreign securities are issued by companies organized outside the United States or that trade primarily in non-U.S. securities markets. The Fund will normally invest in companies located in at least three countries outside of the United States. Investment Process: The Subadvisor uses a multi-step investment process for constructing the Fund’s investment portfolio that combines top-down geographic region and infrastructure sector allocation with bottom-up individual stock selection. The Subadvisor first selects infrastructure sectors in certain geographic regions in which to invest, and determines the degree of representation in the portfolio of such sectors and regions, through a systematic evaluation of the regulatory environment and economic outlook, capital market trends, macroeconomic conditions, and the relative value of infrastructure sectors. The Subadvisor then uses an in-house valuation process to identify infrastructure companies whose risk-adjusted returns it believes are compelling relative to their peers. The Subadvisor’s in-house valuation process examines several factors, including the company’s management and strategy, the stability and growth potential of cash flows and dividends, the lo […] peculative investments. If a right or warrant is not exercised by the date of its expiration, the Fund will lose its entire investment in such right or warrant. Depositary Receipts Risk: Investments in depositary receipts may entail the special risks of investing in foreign securities, including currency exchange fluctuations, government regulations, and the potential for political and economic instability. Preferred Stock Risk: Preferred stock is subject to many of the risks associated with debt securities, including interest rate risk. In addition, preferred stocks may not pay dividends, an issuer may suspend payment of dividends on preferred stock at any time, and in certain situations an issuer may call or redeem its preferred stock or convert it to common stock. To the extent that the Fund invests a substantial portion of its assets in convertible preferred stocks, declining common stock values may also cause the value of the Fund’s investments to decline. Convertible Securities Risk: Convertible securities are typically subordinate to an issuer’s other debt obligations. In part, the total return for a convertible security depends upon the performance of the underlying stock into which it can be converted. Also, issuers of convertible securities are often not as strong financially as those issuing securities with higher credit ratings, are more likely to encounter financial difficulties and typically are more vulnerable to changes in the economy, such as a recession or a sustained period of rising interest rates, which could affect their ability to make interest and principal payments. If an issuer stops making interest and/or principal payments, the Fund could lose its entire investment. Master Limited Partnership (“MLP”) Risk: MLPs carry many of the risks inherent in investing in a partnership. State law governing partnerships is often less restrictive than state law governing corporations. Accordingly, there may be fewer protections afforded investors in a MLP. Limited partners may also have more limited control and limited rights to vote on matters affecting the MLP. Foreign Securities Risk: Investments in foreign (non-U.S.) securities may be riskier than investments in U.S. securities. Foreign regulatory regimes and securities markets can have less stringent investor protections and disclosure standards and less liquid trading markets than U.S. regulatory regimes and securities markets, and can experience political, social and economic developments that may affect the value of the Fund's investments in foreign securities. Foreign securities may also subject the Fund's investments to changes in currency rates. Changes in the value of foreign currencies may make the return on an investment i […] kets. The risks of investing in emerging markets include the risks of illiquidity, increased price volatility, smaller market capitalizations, less government regulation, less extensive and less frequent accounting, financial and other reporting requirements, loss resulting from problems in share registration and custody, substantial economic and political disruptions and the nationalization of foreign deposits or assets. Investments in Other Investment Companies Risk: The Fund's investment in another investment company may subject the Fund indirectly to the risks of that investment company. The Fund also will bear its share of the underlying investment company's fees and expenses, which are in addition to the Fund's own fees and expenses. Exchange-Traded Fund (\"ETF\") Risk: The risks of owning an ETF generally reflect the risks of owning the securities in which the ETF invests or is designed to track, although lack of liquidity in an ETF could result in it being more volatile than its underlying portfolio securities. Disruptions in the markets for the securities underlying ETFs purchased or sold by the Fund could result in losses on the Fund's investment in ETFs. ETFs also have management fees and transaction costs that may make them more expensive than owning the underlying securities directly. Market Capitalization Risk: To the extent the Fund invests in securities issued by small-, mid-, or large-cap companies, the Fund will be subject to the risks associated with securities issued by companies of the applicable market capitalization. Securities of small-cap and mid-cap companies may be subject to greater price volatility, significantly lower trading volumes, cyclical, static or moderate growth prospects and greater spreads between their bid and ask prices than securities of larger companies. Smaller capitalization companies frequently rely on narrower product lines and niche markets and may be more vulnerable to adverse business or market developments. Securities issued by larger companies may have less growth potential and may not be able to attain the high growth rates of successful smaller companies, especially during strong economic periods. In addition, larger companies may be less capable of respondin […] ate owners, real estate managers, real estate brokers, real estate dealers, and companies with substantial real estate holdings. The Fund is non-diversified, which means it may invest a greater percentage of its assets in a 8 MainStay CBRE Real Estate Fund smaller number of issuers than a diversified fund. Under normal market conditions, the Fund will invest more than 25% of its total assets (concentrate its investments) in securities issued by companies principally engaged in the real estate industry. The Subadvisor may invest in companies with any market capitalization. However, the Subadvisor will generally not invest in companies with a market capitalization of less than $100 million at the time of purchase. The Fund may also invest in convertible securities, initial public offerings, and Rule 144A securities. The Fund may invest in other investment companies, including exchange-traded funds. Investment Process: The Subadvisor focuses on investments that generally provide income and also have the potential for long-term capital appreciation. The Subadvisor uses systematic, top-down research to evaluate property market conditions and trends to judge which market sectors offer potentially attractive returns. The Subadvisor uses proprietary analytical techniques to conduct fundamental company analysis, which provides a framework for security selection. This approach incorporates several quantitative and qualitative factors that aid in evaluating performance characteristics of individual securities independently and relative to each other. The Subadvisor will also typically employ portfolio optimization tools to help in its evaluation of the Fund’s current portfolio and its identification of potential investments for the Fund. The Subadvisor's investment approach, with its emphasis on investments in companies primarily engaged in the real estate industry, is expected to produce a total return that is closely tied to the performance of the market for publicly traded real estate companies, including real estate investment trusts, which is a narrow segment of the overall U.S. stock market. The Subadvisor may sell securities for a variety of reasons, such as to secure gains, limit losses, or redeploy assets into op\n"

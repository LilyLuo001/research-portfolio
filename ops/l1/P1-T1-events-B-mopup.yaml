rs of the Akre Focus Fund (or the “Mutual Fund”): I am writing to inform you of, and to ask for your vote on, a very important matter affecting your investment in the Akre Focus Fund. Akre Capital Management, LLC (“Akre” or the “Adviser”), the investment adviser of the Akre Focus Fund, recommended, and the Board of Trustees of the Trust (the “Board”) approved, the conversion of the Mutual Fund into an exchange-traded fund (the “Reorganization”). Subject to shareholder approval, the Mutual Fund will be reorganized into the Akre Focus ETF (the “ETF”), and the ETF will continue to be managed by Akre with no changes to its investment objectives, investment strategies, or fundamental investment restrictions. Although the ETF will have the same investment objectives, investment strategies and fundamental investment policies as the Mutual Fund, exchange-traded funds are structurally different from mutual funds and have risks that are specific to exchange-traded funds. These risks are discussed in the enclosed proxy statement/prospectus. Shareholders of the Mutual Fund generally will not recognize a taxable gain (or loss) for U.S. tax purposes as a result of the Reorganization (except with respect to any cash received for Mutual Fund fractional shares held, as explained in the enclosed proxy statement/prospectus). The Board, including all the Trustees who are not “interested persons” (as defined in the Investment Company Act of 1940, as amended) of the Mutual Fund, determined that participation in the Reorganization is in the best interests of the Mutual Fund, and the interests of the existing shareholders of the Mutual Fund will not be diluted as a result of the Reorganization. As such, the Board, upon the recommendation of Akre, recommends that you vote “FOR” the approval of the Agreement and Plan of Reorganization (the “Plan”) to reorganize the Akre Focus Fund into the Akre Focus ETF. These materials are for a special meeting (the “Meeting”) of shareholders of the Akre Focus Fund, a series of Professionally Managed Portfolios (the “Trust”), which will be held on [September 19, 2025], at [12:00 p.m.], Central time, at the offices of the Mutual Fund’s administrator, U.S. Bank Global Fund Services, 777 East Wisconsin Avenue, 5th Floor, Milwaukee, Wisconsin 53202. These materials discuss proposals to be voted on at the Meeting and contain a Notice of Special Meeting of Shareholders, a Proxy Statement/Prospectus (the “P […] ice of Special Meeting 1 QUESTIONS AND ANSWERS YOUR VOTE IS VERY IMPORTANT! QUESTION 1 : WHAT IS THIS DOCUMENT AND WHY ARE YOU SENDING IT TO ME? WHAT IS HAPPENING TO THE AKRE FOCUS FUND? Answer : This is a combined Proxy Statement of the Mutual Fund/Prospectus for the ETF. You are receiving this Proxy Statement/Prospectus because you own shares in the Mutual Fund as of the Record Date (as defined below) and, therefore, have the right to vote on the Proposals described herein concerning the Mutual Fund. This Proxy Statement/Prospectus contains information that shareholders should know before voting on the Proposals. It is proposed that the Akre Focus Fund (the “Mutual Fund” or “Target Fund”), which is currently operated as a mutual fund, be converted into an ETF through a Reorganization with and into the Akre Focus ETF (the “ETF” or the “Acquiring Fund”). The ETF is a series of the PMP, which has not yet begun operations, and it will acquire the assets and assume the liabilities of the Mutual Fund and continue the Mutual Fund’s business (the “Reorganization”). Upon closing of the Reorganization, shareholders who hold their Mutual Fund shares in a brokerage account eligible to hold exchange-traded fund shares (a “Qualifying Brokerage Account,” as further explained in this Q&A, will receive ETF shares having an aggregate net asset value equal to the aggregate net asset value of their Mutual Fund shares held immediately prior to the Reorganization, plus any cash in lieu of fractional shares, if applicable. As a result, such shareholders will become shareholders of the ETF and will no longer be shareholders of the Mutual Fund. The Mutual Fund will then be dissolved. The ETF shares will be traded on the New York Stock Exchange (NYSE) following the Reorganization. The Reorganization will be accomplished in accordance with the Agreement and Plan of Reorganization (the “Plan”). QUESTION 2 : ON WHAT AM I BEING ASKED TO VOTE? Answer : You are being asked to approve the Plan under which the Akre Focus Fund would be reorganized into the Akre Focus ETF within PMP. The Plan, with respect to the Mutual Fund, provides for: 1. the transfer of all of the assets of the Mutual Fund to the ETF in exchange for shares of the ETF and the ETF’s assumption of all of the Mutual Fund’s liabilities; 2. the distribution of shares of the ETF to the shareholders of the Mutual Fund; and 3. the liquidation and dissolution of the Mutual Fund. The proposed Reorganization includes the conversion of the Mutual Fund, which currently operates as a mutual fund, into an exchange-traded fund or ‘ETF’. Approval by shareholders of the Mutual Fund is needed to proceed with the Reorganization. The Meeting will be held on [September 19, 2025] to consider the Proposal. QUESTION 3 : WHAT ARE THE REASONS FOR THE PROPOSED REORGANIZATION? Answer : Akre and the Board believe that the Reorganization will offer: (a) the ETF a better opportunity to grow its asset base by expanding its pool of potential investors; (b) benefits related to the management of capital gains distributions as a result of the ETF structure, allowing for potentially greater tax efficiency for shareholders; and (c) potential benefits related to additional liquidity for shareholders, as shareholders will be able to purchase or sell shares at any time during market hours, assuming there is sufficient volume. The following are some unique features of ETFs, as compared to mutual funds: 1. Lower Net Expenses for Retail and Institutional Class Shareholders : The total annual fund operating expenses of the ETF are expected to be lower than the current net expenses of the Mutual Fund for shareholders that hold Retail Class and Institutional Class shares of the Mutual Fund and are expected to be the same for shareholders that hold Supra Institutional Class shares of the Mutual Fund 2. Additional Trading Flexibility : Unlike shares of the Mutual Fund, which can only be purchased or sold once per day based on the Mutual Fund’s NAV, shares of the ETF can be purchased or sold Q&A 1 throughout a t […] ional Class Shares of the Mutual Fund will receive Institutional Class Shares of the Mutual Fund having an aggregate net asset value equal to the aggregate net asset value of the shareholder’s Supra Institutional Class Shares. Institutional Class Shares . Following the Share Class Consolidation, the Mutual Fund will have a single class of Institutional Shares. Effective on or about October 10, 2025, the Adviser has agreed to waive its fees and/or pay the Mutual Fund’s expenses such that the total expense ratio of the Institutional Class Shares will not exceed 0.98% of the average daily net assets of the Institutional Class Shares. Upon the closing of the Reorganization expected on or about October 24, 2025, the Institutional Shares will be converted into ETF shares pursuant to the Agreement and Plan of Reorganization. The Board of Trustees of PMP (the “Board”) has approved the Plan and has determined that approval of the Reorganization is in the best interests of the Mutual Fund, and that the interests of the existing shareholders of the Mutual Fund will not be diluted as a result of the Reorganization. Accordingly, the Board recommends that shareholders of the Mutual Fund vote “FOR” the Proposal. The ETF will assume and continue the investment operations of the Mutual Fund, including its performance history and financial records. The ETF has not commenced investment operations. The Mutual Fund and the ETF have identical investment objectives and substantially similar investment strategies. The Mutual Fund and ETF have substantially similar investment restrictions and risks. Akre Capital Management, LLC (“Akre” or the “Adviser”) serves as investment adviser to the Mutual Fund and will serve as the investment adviser to the ETF with the same portfolio managers responsible for day-to-day management. There are differences in: • how the ETF is distributed, • purchase procedures for the ETF, and • redemption procedures for the ETF. Each of the differences is summarized in the enclosed Proxy Statement/Prospectus. After the Reorganization, the ETF will be operated at a lower total expense ratio than the Mutual Fund for shareholders that hold Retail Class and Institutional Class shares of the Mutual Fund and at the sam […] Akre Focus Fund and the Akre Focus ETF Akre Focus Fund Akre Focus ETF The investment objective for both Funds is to seek long-term capital appreciation. 2 Principal Investment Strategies of the Akre Focus Fund and the Akre Focus ETF Akre Focus Fund Akre Focus ETF Under normal market conditions, the Fund invests primarily in securities of companies listed on U.S. stock exchanges. Investments consist primarily of common stocks of companies of any size market capitalization. The Fund may also invest in preferred stocks, warrants, options, and other equity-like instruments, such as partnership interests, limited liability company interests, business trust shares and rights, Real Estate Investment Trusts (“REITs”), and other securities that are convertible into equity securities. The Fund may invest up to 35% of its total assets in securities issued by foreign issuers, including in American Depositary Receipts (“ADRs”), European Depositary Receipts (“EDRs”), Global Depositary Receipts (“GDRs”), and directly in foreign equity securities. Additionally, the Fund may participate in securities lending arrangements of up to 33-1/3% of its total asset value with brokers, dealers, and financial institutions (but not individuals) in order to increase the return on its portfolio. The Fund may, from time to time, have significant exposure to one or more sectors of the market. As of July 31, 2024, 46.9% of the Fund’s net assets were invested in securities of issuers within the financial services sector. Under normal market conditions, the Fund invests primarily in securities of companies listed on U.S. stock exchanges. Investments consist primarily of common stocks of companies of any size market capitalization. The Fund may also invest in preferred stocks, warrants, options, and other equity-like instruments, such as partnership interests, limited liability company interests, business trust shares and rights, Real Estate Investment Trusts (“REITs”), and other securities that are convertible into equity securities. The Fund may invest up to 35% of its total assets in securities issued by foreign issuers, including in American Depositary Receipts (“ADRs”), European Depositary Receipts (“EDRs”), Global Depositary Receipts (“GDRs”\n"

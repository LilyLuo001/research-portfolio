CO may be included in the ROA calculation only if the shareholder notifies his or her financial advisor about such assets. Raymond James & Associates, Inc., Raymond James Financial Services, Inc. and Each En […] ss A shares available at Raymond James: • Shares purchased in an investment advisory program. • Shares purchased within the same fund family through a systematic reinvestment of capital gains and dividend distributions. • Employees and registered representatives of Raymond James or its affiliates and their family members as designated by Raymond James. • Shares purchased from the proceeds of redemptions within the same fund family, provided (1) the repurchase occurs within 90 days following the redemption, (2) the redemption and purchase occur in the same account, and (3) redeemed shares were subject to a front-end or deferred sales load (known as Rights of Reinstatement). • A shareholder in the fund's Class C shares will have their shares converted at net asset value per share (NAV) to Class A shares (or the appropriate share class) of the fund if the shares are no longer subject to a CDSC and the conversion is in line with the policies and procedures of Raymond James. CDSC Waivers on Classes A, B and C shares available at Raymond James: • Death or disability of the shareholder. • Shares sold as part of a systematic withdrawal plan as described in the fund's prospectus. • Return of excess contributions from an IRA Account. • Shares sold as part of a required minimum distribution for IRA and retirement accounts due to the shareholder reaching the qualified age based on applicable IRS regulations as described in the fund’s prospectus. • Shares sold to pay Raymond James fees but only if the transaction is initiated by Raymond James. • Shares acquired through a right of reinstatement. Front-end load discounts available at Raymond James: breakpoints , rights of accumulation, and/or letters of intent: • Breakpoints as described in this prospectus. • Rights of accumulation which entitle shareholders to breakpoint discounts will be automatically calculated based on the aggregated holding of fund family assets held by accounts within the purchaser's household at Raymond James. Eligible fund family assets not held at Raymond James may be included in the calculation of rights of accumulation only if the shareholder notifies his or her financial advisor about such assets. • Letters of intent which allow for breakpoint dis\n"

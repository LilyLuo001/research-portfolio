ars exactly\nonce in your answer map (count them); every event object quotes ETF-acquirer evidence;\nevery date matches ^\\d{4}-\\d{2}-\\d{2}$ or is \"NA\"; no ticker field contains a space.】\n文件: 0001193125-19-270006 (form 497, filed 2019-10-18, BLACKROCK FOCUS GROWTH FUND, INC.  (CIK 0001097293))\nsource_url: https://www.sec.gov/Archives/edgar/data/1097293/000119312519270006/d786924d497.htm\n节选:\n497 1 d786924d497.htm BLACKROCK FOCUS GROWTH FUND, INC. BlackRock Focus Growth Fund, Inc. Table of Contents BLACKROCK LARGE CAP SERIES FUNDS, INC. BlackRock Large Cap Focus Growth Fund 100 Bellevue Parkway Wilmington, Delaware 19809 (800) 441-7762 October 16, 2019 Dear Shareholder: I am writing to inform you about a reorganization that will affect your investment in BlackRock Large Cap Focus Growth Fund (the “Target Fund”), a series of BlackRock Large Cap Series Funds, Inc. (the “Target Corporation”), a Maryland corporation. As provided in an Agreement and Plan of Reorganization that has been unanimously approved by the Board of Directors of the Target Corporation (the “Target Board”) and by the Board of Directors of the Acquiring Fund (the “Acquiring Board” and together with the Target Board, the “Feeder Boards” and each, a “Feeder Board”), the Target Fund will be reorganized into BlackRock Focus Growth Fund, Inc. (the “Acquiring Fund”), a Maryland corporation (the “Reorganization”). The Target Fund is a “feeder” fund that invests all of its assets into Master Large Cap Focus Growth Portfolio (the “Target Master Portfolio”), a series of Master Large Cap Series LLC (the “Target Mas […] ay any sales charge, commission or other similar fee in connection with the Reorganization? A: No, you will not have to pay any sales charge, commission or other similar fee in connection with the Reorganization. As more fully discussed in the Combined Prospectus/Information Statement, the holding period with respect to any CDSC that applies to shares of the Acquiring Fund acquired by you in the Reorganization will be measured from the earlier of the time (i) you purchased your Target Fund shares or (ii) you purchased your shares of any other fund advised by BlackRock and subsequently exchanged them for shares of the Target Fund. Q: Do I need to take any action in connection with the Reorganization? A: No. Your shares will automatically be converted into shares of the Acquiring Fund on the date of the completion of the Reorganization. You will receive written confirmation that this change has taken place. iv Table of Contents No certificates for shares will be issued in connection with the Reorganization. The aggregate NAV of the Acquiring Fund shares you receive in the Reorganization will be equal to the aggregate NAV of the shares you own in the Target Fund immediately prior to the Reorganization. Q: Will the Reorganization create a taxable event for me? A: The Reorganization is expected to qualify as a tax-free “reorganization” under Section 368(a) of the Internal Revenue Code of 1986, as amended (the “Code”), and the Master Reorganization is expected to qualify as a tax-free transaction under the Code. In general, if the Reorganization so qualifies, the Target Fund and the Acquiring Fund will not recognize any gain or loss for U.S. federal income tax purposes from the transactions contemplated by the Reorganization (except for any gain or loss that may be required to be recognized solely as a result of the close of the Target Fund’s taxable year due to the Reorganization or as a result of the transfer of certain assets). Additionally, if the Master Reorganization qualifies as a tax-free transaction under the Code, the Target Master Portfolio and the Acquiring Master Portfolio will not recognize gain or loss for U.S. federal income tax purposes from the transactions contemplated by the Master Reorganization  […] ces, the Acquiring Fund seeks to invest at least 80% of its net assets plus the amount of any borrowings for investment purposes in large cap equity securities and derivatives that have similar economic characteristics to such securities. For purposes of the Acquiring Fund’s 80% policy, large cap equity securities are equity securities that at the time of purchase have a market capitalization within the range of companies included in the Russell 1000 Growth Index. The Russell 1000 Growth Index is a capitalization-weighted index from a broad range of industries chosen for market size, liquidity and industry group representation. The Target Fund primarily intends to invest in equity securities, which include common stock, preferred stock and convertible securities, or other financial instruments that are components of, or have characteristics similar to, the securities included in the Russell 1000 Growth Index. Equity securities consist of common stock, preferred stock and convertible securities, other financial instruments that are components of, or have characteristics similar to, the securities included in the Russell 1000 Growth Index, and American Depositary Receipts (“ADRs”), which are receipts typically issued by an American bank or trust company that evidence underlying securities issued by a foreign company. 5 Table of Contents Target Fund Acquiring Fund The Target Fund is a growth fund that invests primarily in common stock. The Target Fund may invest without limitation in the securities of foreign companies in the form of ADRs. The Acquiring Fund is an aggressive growth fund that invests primarily in common stock of not less than 25 to not more than 45 aggressive growth companies. The Acquiring Fund may invest without limitation in the securities of foreign companies in the form of ADRs. In addition to ADRs, the Target Fund may also invest up to 20% of its total assets in other forms of securities of foreign companies, including European Depositary Receipts, which are receipts typically issued in Europe evidencing an ownership arrangement with the foreign company or other securities of foreign companies. In addition to ADRs, the Acquiring Fund may also invest up to 20% of its total assets in other forms of securities of foreign companies, including European Depositary Receipts, which are receipts typically issued in Europe evidencing an ownership arrangement with the foreign company or other securities of foreign companies. The Target Fund may seek to provide exposure to the investment returns of real assets that trade in the commodity markets through investment in commodity-linked derivative instruments and investment vehicles such as exchange-traded funds (“ETFs”) that invest exclusively in commodities and are designed to provide this exposure without direct investment in physical commodities. — The Target Fund may engage in active and frequent trading of portfolio securities to achieve its primary investment strategies. — Comparison. The principal investment strategies of the Target Fund and the Acquiring Fund are similar although there are some differences. Each Fund invests at least 80% of its net assets plus the amount of any borrowings for investment purposes in large cap equity securities and derivatives that have similar economic characteristics to such securities. Both Funds primarily intend to invest in equity securities, which include common stock, preferred stock and convertible securities, or other financial instruments that are components of, or have characteristics similar to, the securities included in the Russell 1000 Growth Index. Each Fund may invest without limitation in the securities of foreign companies in the form of ADRs. In addition to ADRs, each Fund may also invest up to 20% of its total assets in other forms of securities of foreign companies, including European Depositary Receipts. Differing principal investment strategies are set forth in the chart above, and include the following: • While both Funds are growth funds, the principal investment strategies of the Acquiring Fund specify that it is an aggressive growth fund and that it invests primarily in common stock of not less than 25 to not more than 45 aggressive growth companies. • The principal investment strategies of the Target Fund provide that the Target Fund may seek to provide exposure to the investment returns of real assets that trade in the commodity markets through investment in commodity-linked derivative instruments and investment vehicles such as ETFs that invest exclusively in commodities, while the Acquiring Fund’s principal investment strategies do not. • The principal investment strategies of the Target Fund also provide that the Target Fund may engage in active and frequent trading of portfolio securities to achieve its primary investment strategies, while the Acquiring Fund’s principal investment strategies do not. 6 Table of Contents Other Strateg […] arget Fund Acquiring Fund Borrowing — The Target Fund may borrow for temporary or emergency purposes, including to meet redemptions, for the payment of dividends, for share repurchases or for the clearance of transactions, subject to the limits set forth under the 1940 Act, the rules and regulations thereunder and any applicable exemptive relief. Borrowing — The Acquiring Fund may borrow for temporary or emergency purposes, including to meet redemptions, for the payment of dividends, for share repurchases or for the clearance of transactions, subject to the limits set forth under the 1940 Act, the rules and regulations thereunder and any applicable exemptive relief. — Debt Securities — The Acquiring Fund may invest in investment grade, non-convertible debt securities, and U.S. Government securities of any maturity, although it typically will not do so to a significant extent. — Derivative Transactions — The Acquiring Fund may also invest in certain derivative securities. Derivatives are financial instruments whose value is derived from another security, a commodity (such as gold or oil), or an index such as the Russell 1000 ® Growth Index. The Acquiring Fund may, but is not required to, use derivatives, such as swaps, futures and options, to hedge its investment portfolio against market, interest rate and currency risks or to seek to enhance its return. Emerging Markets Issuers — The Target Fund may also invest a portion of its assets in securities of issuers located in emerging markets. Emerging Markets Issuers — The Acquiring Fund may also invest a portion of its assets in securities of issuers located in emerging markets. Illiquid/Restricted Securities — The Target Fund may invest up to 15% of its net assets in illiquid securities that it cannot sell within seven days at approximately current value. The Target Fund may also invest in restricted securities, which are securities that cannot be offered for public resale unless registered under the applicable securities laws or that have a contractual restriction that prohibits or limits their resale ( i.e. , Rule 144A securities). They may include private placement securities that have not been registered under the applicable securities laws. Restricted securit […] lso provides a description of each Fund’s distribution and service fees, information about dividends and distributions, procedures for purchase, redemption, exchange, transfer and valuation of shares and market timing policies. Investment Risks Comparison of the Target Fund’s and the Acquiring Fund’s Principal Investment Risks Because of their substantively identical investment objectives and similar investment strategies, the Target Fund and the Acquiring Fund are subject to similar principal investment risks associated with an investment in the relevant Fund. The principal risks of each Fund are set out in the table below. Target Fund and Acquiring Fund Risk Target Fund Acquiring Fund Commodities Related Investments Risk Principal Risk — Convertible Securities Risk Principal Risk Principal Risk Depositary Receipts Risk Principal Risk Principal Risk Derivatives Risk Principal Risk Non-Principal Risk Equity Secur
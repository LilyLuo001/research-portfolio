vestment Strategies of the Fund The Fund invests at least 80% of its net assets, plus any borrowings for investment purposes, in a portfolio of equity securities and investments that have economic characteristics similar to equity securities. These equity securities and investments may include U.S. exchange-listed common stocks, equity index futures, and/or exchange-traded funds (“ETFs”) that track U.S. large-capitalization (“large-cap”) indices, such as the S&P 500® Index. For purposes of this 80% investment policy, the Adviser will consider the underlying holdings of any ETFs in which the Fund invests. The Fund’s investments in derivatives that have economic characteristics similar to equity securities will be valued at mark-to-market for purposes of the 80% policy. On the portfolio, the Fund systematically writes (sells) equity index and/or ETF call options, covered calls, and option spreads to generate additional income. A portion of this income is used to systematically purchase a series of protective equity index and/or ETF put options or put spreads to reduce the negative impact of stock market declines on long-term performance. The Fund’s strategy is an equity strategy that aims to provide better risk-adjusted returns across market cycles compared to investing solely in the securities of companies that comprise U.S. large-capitalization indices such as the S&P 500® Index. The Fund follows a proprietary rules-based BUY, HOLD & HEDGE™ strategy. The strategy systematically selects option strike prices, maturities, and trade dates based upon several measurable market factors. Through the use of options, the Fund intends to reduce the downside risk inherent in equity investments while generating long‑term equity returns in line with the benchmark index. Thus, the Fund seeks to provide an efficient trade-off between risk and r […] ccessor to the Predecessor Fund, which was also advised by the Adviser and had the same investment objective and strategies as the Fund
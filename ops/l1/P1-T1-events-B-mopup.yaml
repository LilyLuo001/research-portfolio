commodity futures contract or commodity index. CONCENTRATION To the extent that the Wide Moat Index is concentrated in a particular sector or sectors or industry or group of industries, VanEck Morningstar Wide Moat Fund will be subject to the risk that economic, political or other conditions that have a negative effect on that sector or industry will negatively impact the Fund to a greater extent than if the Fund’s assets were invested in a wider variety of sectors or industries. CONVERTIBLE SECURITIES The Funds may invest in securities that are convertible into common stock or other securities of the same or a different issuer or into cash within a particular period of time at a specified price or formula. Convertible securities are generally fixed income securities (but may include preferred stock) and generally rank senior to common stocks in a corporation’s capital structure and, therefore, entail less risk than the corporation’s common stock. The value of a convertible security is a function of its “investment value” (its value as if it did not have a conversion privilege), and its “conversion value” (the security’s worth if it were to be exchanged for the underlying security, at market value, pursuant to its conversion privilege). To the extent that a convertible security’s investment value is greater than its conversion value, its price will be primarily a reflection of such investment value and its price will be likely to increase when interest rates fall and decrease when interest rates rise, as with a fixed-income security (the credit standing of the issuer and other factors may also have an effect on the convertible security’s value). If the conversion value exceeds the investment value, the price of the convertible security will rise above its investment value and, in addition, will sell at some premium over its conversion value. (This premium represents the price investors are willing to pay for the privilege of purchasing a fixed-income security with a possibility of capital appreciation due to the conversion privilege.) At such times, the price of the convertible security will tend to fluctuate directly 5 with the price of the underlying equity security. Convertible securities may be purchased by the Funds at varying price levels above their investment values and/or their conversion values in keeping with the Funds’ objectives. CREDIT Credit risk is the risk that the issuer or guarantor of a debt security or the counterparty to an over-the-counter (“OTC”) contract (including many derivatives) will be unable or unwilling to make timely principal, interest or settlement payments or otherwise honor its obligations. The Funds invest in debt securities that are subject to varying degrees of risk that the issuers of the securities will have their credit ratings downgraded or will default, potentially reducing the value of the securities. A Fund may enter into financial transactions that involve a limited number of counterparties, which may increase the Fund’s exposure to credit risk. The Fund does not specifically limit its credit risk with respect to any single counterparty. Further, there is a risk that no suitable counterparties will be willing to enter into, or continue to enter into, transactions with the Fund and, as a result, the Fund may not be able to achieve its investment objective. CURRENCY FORWARDS A currency forward transaction is a contract to buy or sell a specified quantity of currency at a specified date in the future at a specified price which may be any fixed number of days from the date of the contract agreed upon by the parties. Currency forward contracts may be used to increase or reduce exposure to currency price movements. The use of currency forward transactions involves certain risks. For example, if the counterparty under […] e strongly than its bonds, other debt and preferred stock to actual or perceived changes in the company’s financial condition or prospects. Stocks of smaller companies may be more vulnerable to adverse developments than those of larger companies. Stocks of companies that the portfolio manager believes are fast-growing may trade at a higher multiple of current earnings than other stocks. The value of such stocks may be more sensitive to changes in current or expected earnings than the values of other stocks. 9 Different types of equity securities provide different voting and dividend rights and priority in the event of the bankruptcy and/or insolvency of the issuer. In addition to common stock, equity securities may include preferred stock, convertible securities and warrants, which are discussed elsewhere in the Prospectus and this Statement of Additional Information. Equity securities other than common stock are subject to many of the same risks as common stock, although possibly to different degrees. EXCHANGE TRADED PRODUCTS VanEck NDR Managed Allocation Fund may invest in Exchange Traded Products. While the risks of owning shares of an Exchange Traded Product generally reflect the risks of owning the underlying investments of the Exchange Traded Product, lack of liquidity in the Exchange Traded Product can result in its value being more volatile than its underlying portfolio investments. In addition, the value of an exchange traded note (“ETN”) may be influenced by time to maturity, level of supply and demand for the ETN, changes in the applicable interest rates, and changes in the issuer’s credit rating and economic, legal, political or geographic events that affect the referenced market. If a rating agency lowers the issuer’s credit rating, the value of the ETN will decline and a lower credit rating reflects a greater risk that the issuer will default on its obligation. An Exchange Traded Product can trade at prices higher or lower than the value of its underlying assets. In addition, an active trading market for shares of an Exchange Traded Product may not develop or be maintained and trading in the Exchange Traded Product may be halted by the exchange on which it trades. EXCHANGE TRADED PRODUCTS’ UNDERLY […] IGN SECURITIES Foreign securities include securities issued by a foreign government, quasi-government or corporate entity, traded in foreign currencies or issued by companies with most of their business interests in foreign countries. Investors should recognize that investing in foreign securities involves certain special considerations that are not typically associated with investing in United States securities. Since investments in foreign companies will frequently involve currencies of foreign countries, and since the Funds may hold securities and funds in foreign currencies, the Funds may be affected favorably or unfavorably by changes in currency rates and in exchange control regulations, if any, and may incur costs in connection with conversions between various currencies. Most foreign stock markets, while growing in volume of trading activity, have less volume than the New York Stock Exchange (“NYSE”), and securities of some foreign companies are less liquid and more volatile than securities of comparable domestic companies. Similarly, volume and liquidity in most foreign bond markets are less than in the United States, and at times volatility of price can be greater than in the United States. Fixed commissions on foreign securities exchanges are generally higher than negotiated commissions on United States exchanges, although the Funds endeavor to achieve the most favorable net results on their portfolio transactions. There is generally less government supervision and regulation of securities exchanges, brokers and listed companies in foreign countries than in the United States. In addition, with respect to certain foreign countries, there is the possibility of exchange control restrictions, expropriation or confiscatory taxation, political, economic or social instability, which could affect investments in those countries. Foreign securities such as those purchased by the Funds may be subject to foreign government taxes, higher custodian fees, higher brokerage commissions and dividend collection fees which could reduce the yield on such securities. Trading in futures contracts traded on foreign commodity exchanges may be subject to the same or similar risks as trading in foreign securities. 10 FOREIGN S\n"

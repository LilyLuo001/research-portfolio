es. Under normal circumstances, the fund invests 10% or less (usually less) of its total assets in cash and cash equivalents. The fund may invest in initial public offerings (IPOs). The fund may also purchase real estate investment trusts (REITs) or other real estate related equity securities, U.S. dollar-denominated foreign securities, and certain exchange-traded funds (ETFs). ETFs are considered securities with a market capitalization equal to the weighted average market capitalization of the basket of securities that compose the ETF. The fund may focus its investments in a particular sector or sectors of the economy. The manager emphasizes a fundamental, bottom-up approach to individual stock selection, looking for companies with durable, niche business models with the potential for high returns on capital and that the manager believes are undervalued. Companies are screened based on a number of factors, including balance sheet quality, profitability, liquidity, size, and risk profile. The fund intends to invest in a number of different sectors based on stock selection and sector weightings may vary significantly from its benchmark. The fund may focus its investments in a particular sector or sectors. The fund may invest up to 10% of its total assets in foreign securities including emerging-market securities and securities of non-U.S. companies traded on a U.S. exchange. The fund may invest in initial public offerings (IPOs), real estate investment trusts (REITs) or other real estate-related equity securities, and certain exchange-traded funds (ETFs). The fund normally will invest 10% or less of its total assets in cash and cash equivalents, including repurchase agreements, money market securities, U.S. government securities, and other short-term investments. The fund may invest in derivatives to a limited extent. Derivatives may be used to reduce risk and/or obtain efficient market exposure, and may include futures contracts and foreign currency forward contracts. Changes to Principal Investment Strategies The Board can change each Fund’s investment objective and strategies without shareholder approval. Each Fund will provide 60 days’ written notice to shareholders prior to a change in its 80% investment strategy. 7 Table of Contents John Hancock Small Cap Value Fund, a series of John Hancock Funds II (Target Fund) John Hancock Small Cap Core Fund, a series of John Hancock Investment Trust (Acquiring Fund) Temporary Defensive Investing Each Fund may invest up to 100% of its assets in cash, money market instruments, or other investment-grade short-term securities for the purpose of protecting the fund in the event the manager determines that market, economic, political, or other conditions warrant a defensive posture. To the extent that the fund is in a defensive position, its ability to achieve its investment objective will be limited. In deciding whether to approve the Reorganization, you should consider the similarities and differences between the Funds. Investment Objectives and Principal  […] en by the U.S. Federal Reserve or foreign central banks to stimulate or stabilize economic growth, may at times result in unusually high market volatility, which could negatively impact performance. Reduced liquidity in credit and fixed-income markets could adversely affect issuers worldwide. Banks and financial services companies could suffer losses if interest rates rise or economic conditions deteriorate. Equity securities risk. The price of equity securities may decline due to changes in a company’s financial condition or overall market conditions. Securities the manager believes are undervalued may never realize their full potential value, and in certain markets value stocks may underperform the market as a whole. 13 Table of Contents Exchange-traded funds (ETFs) risk. The risks of owning shares of an ETF include the risks of owning the underlying securities the ETF holds. Lack of liquidity in an ETF could result in the ETF being more volatile than its underlying securities. An ETF’s shares could trade at a significant premium or discount to its net asset value (NAV). A fund bears ETF fees and expenses indirectly. Foreign securities risk. Less information may be publicly available regarding foreign issuers, including foreign government issuers. Foreign securities may be subject to foreign taxes and may be more volatile than U.S. securities. Currency fluctuations and political and economic developments may adversely impact the value of foreign securities. If applicable, depositary receipts are subject to most of the risks associated with investing in foreign securities directly because the value of a depositary receipt is dependent upon the market price of the underlying foreign equity security. Depositary receipts are also subject to liquidity risk. Initial public offerings (IPOs) risk. IPO share prices are frequently volatile and may significantly impact fund performance. Liquidity risk. The extent (if at all) to which a security may be sold or a derivative position closed without negatively impacting its market value may be impaired by reduced market activity or participation, legal restrictions, or other economic and market impediments. Operational and cybersecurity risk. Cybersecurity breaches may allo […]  conduct its “historic business” (within the meaning of that section) in a substantially unchanged manner; and from the Approval Time through the Effective Time, the Acquired Fund (1) has not disposed of and/or acquired, and will not dispose of and/or acquire, any assets (a) for the purpose of satisfying the Acquiring Fund’s investment objective or policies or (b) for any other reason except in the ordinary course of its business as a RIC and (2) has not changed, and will not change, its historic investment policies in connection with the Reorganization; 4.1.13. At the Effective Time, (1) at least 33 1 ⁄ 3 % of the Acquired Fund’s Fund assets — including, for these purposes, a proportionate share of the Fund assets of any RIC (including an exchange-traded fund that is a RIC) in which the Acquired Fund invests — will meet the Acquiring Fund’s investment objective, strategies, policies, risks, and restrictions (collectively, “ Investment Criteria ”), (2) the Acquired Fund will not have altered its portfolio in connection with the Reorganization to meet that 33 1 ⁄ 3 % threshold, and (3) the Acquired Fund will not have modified any of its Investment Criteria as part of the plan of reorganization, for purposes of section 1.368-1(d)(2) of the Regulations; 4.1.14. To the best of the Acquired Fund’s management’s knowledge, there is no plan or intention by the Acquired Fund’s shareholders to redeem, sell, exchange, or otherwise dispose of a number of Acquired Fund Shares (or Acquiring Fund Shares to be received in the Reorganization), in connection with the Reorganization, that would reduce their ownership of the Acquired Fund Shares (or the equivalent Acquiring Fund Shares) to a number of shares that is less than 50% of the current number of Acquired Fund Shares outstanding; 4.1.15. During the five-year period ending at the Effective Time, neither the Acquired Fund nor any person “related” (within the meaning of section 1.368-1(e)(4) of the Regulations (“ Related ”), without regard to section 1.368-1(e)(4)(i)(A) thereof) to it will have (1) acquired Acquired Fund Shares with consideration other than Acquiring Fund Shares or Acquired Fund Shares, or (2) made distributions with respect to Acquired Fund Shares except for […] he Effective Time will be, duly and validly issued and outstanding, fully paid, and non-assessable by the Acquired Fund and have been offered and sold in every state and the District of Columbia in compliance in all material respects with applicable registration requirements of the 1933 Act and state securities laws; all issued and outstanding Acquired Fund Shares will, at the Effective Time, be held by the persons and in the amounts set forth on the Acquired Fund’s shareholder records (as provided in the Certificate to be delivered pursuant to paragraph 3.3); and the Acquired Fund does not have outstanding any options, warrants, or other rights to subscribe for or purchase any Acquired Fund Shares, nor are there outstanding any securities convertible into any Acquired Fund Shares, and in regard to the statement that the outstanding shares will be non-assessable, it is noted that the Acquired Fund Trust is a “Massachusetts business trust” and under Massachusetts law, shareholders could, under certain circumstances, be held personally liable for the obligations of the Acquired Fund; 4.1.17. The Acquired Fund incurred the Liabilities, which are associated with the Assets, in the ordinary course of its business; 4.1.18. The Acquired Fund is not under the jurisdiction of a court in a “title 11 or similar case” (as defined in section 368(a)(3)(A)); 4.1.19. Not more than 25% of the value of the Acquired Fund’s total assets (excluding cash, cash items, and Government securities) is invested in the stock and securities of any one issuer, and not more than 50% of the value of those assets is invested in the stock and securities of five or fewer issuers; provided that a proportionate share of the assets of any RIC in which the Acquired Fund invests (and not the securities issued by the RIC itself) shall be taken into account for this purpose; 4.1.20. On the effective date of the Registration Statement ( as defined in paragraph 4.3.1), at the time of the Shareholders Meeting (as defined in paragraph 5.2), and at the Effective Time, the Acquired Fund’s Pro/SAI will (a) conform in all material respects to the applicable requirements of the 1933 Act and the 1940 Act and the rules and regulations of the Commission thereunder \n"

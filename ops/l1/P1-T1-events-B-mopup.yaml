subject to federal income tax. Who will pay the costs of the Reorganization? Wasmer and CSIM or their affiliates will pay all of the direct costs of the Reorganization, including costs associated with the preparation, printing and distribution of this Proxy Statement/Prospectus, legal fees, accounting fees, transfer agent and custodian conversion costs, and expenses of soliciting Target Fund shareholders and holding the Meeting (and adjournments and postponements thereof). However, the Target Fund will pay the brokerage or other transaction costs, including capital gains taxes and transfer taxes for foreign securities, incurred in connection with the alignment of the Target Fund's portfolio holdings with the Acquiring Fund's investment strategies and the transfer of the Target Fund's portfolio holdings to the Acquiring Fund. Based on the information available as of the date of this Proxy Statement/Prospectus, including information regarding CSIM's proposed alignment of the Target Fund's portfolio holdings with the Acquiring Fund's investment strategies and information regarding the Target Fund's portfolio holdings in certain foreign countries that do not permit in-kind transfers of securities, the Target Fund is expected to reposition approximately [XX]% of its portfolio, and pay approximately $[XX] ($[XX] per share) in brokerage and other transaction costs, in connection with the Reorganization. The actual brokerage and other transaction costs will vary depending upon market conditions, shareholder activity, the portfolio holdings of the Target Fund and the Acquiring Fund, and the specific securities sold and/or transferred to the Acquiring Fund. When is the Reorganization expected to occur? If shareholders of the Target Fund approve the Reorganization, it is anticipated that the Reorganization will occur  […] es, if any, of the Reorganization because this discussion is only a general summary of certain federal income tax consequences. Costs of the Reorganization CSIM and Wasmer, or their affiliates, will bear those expenses relating to the Reorganization as set forth in Section 9.2 of the Agreement, whether or not the Reorganization is consummated. The costs relating to the Reorganization to be borne by CSIM and Wasmer, or their affiliates, shall include costs associated with organizing the Acquiring Fund, costs associated with the preparation, printing and distribution of the N-14 Registration Statement for the Reorganization (including the prospectus/proxy statement contained therein), legal fees, accounting fees, transfer agent and custodian conversion costs, and expenses of soliciting Target Fund Shareholders and holding the shareholder meeting (and adjournments thereof). The costs relating to the Reorganization shall not include brokerage or other transaction costs, including capital gains taxes and transfer taxes for foreign securities, incurred in connection with the Reorganization, and such costs shall be borne by the Target Fund. For the avoidance of doubt, neither the Acquiring Fund nor the Target Fund will bear any costs relating to the Reorganization, other than as described in this Agreement. Notwithstanding the foregoing, CSIM will not pay liability insurance expenses covering the actions of the trustees and officers of the Target Trust with respect to the Target Fund, and Wasmer will not pay liability insurance expenses covering the actions of the trustees and officers of the Acquiring Trust with respect to the Acquiring Fund. CSIM and Wasmer will assume or pay only those expenses that are solely and directly related to the Reorganization (determined in accordance with the guidelines set forth in Rev. Rul. 73-54, 1973-1 C.B. 187), and the shareholders of the Target Fund and the Acquiring Fund will pay their own expenses, if any, incurred in connection with the Reorganization. Section 9.2 of the Agreement shall survive the termination of the Agreement and the Closing. The Target Trust Board unanimously recommends that shareholders of the Target Fund approve the Reorganization. VOTING INFORMATION Proxy  […] ount directly with the Acquiring Fund. When selling or exchanging shares, you should be aware of the following Acquiring Fund policies: ∙ For accounts held through a financial intermediary, the Acquiring Fund typically expects to pay sale proceeds to the financial intermediary for payment to redeeming shareholders within two business days following receipt of a shareholder redemption order; however, the Acquiring Fund may take up to seven days to pay sale proceeds. ∙ The Acquiring Fund reserves the right to honor redemptions in liquid portfolio securities instead of cash when your redemptions over a 90-day period exceed $250,000 or 1% of the Acquiring Fund's assets, whichever is less. You may incur transaction expenses and taxable gains in converting these securities to cash. In addition, a redemption in liquid portfolio securities would be treated as a taxable event for you and may result in the recognition of gain or loss for federal income tax purposes. ∙ Exchange orders are limited to other Schwab Funds (that are not Sweep Investments®) and the Laudus International MarketMasters Fund, and must meet the minimum investment and other requirements for the fund and share class, if applicable, into which you are exchanging. ∙ You should obtain and read the prospectus for the fund into which you are exchanging prior to placing your order. Investing Directly with the Acquiring Fund Investor Eligibility Requirements for Placing Direct Orders Investors may not purchase shares directly from the Acquiring Fund's transfer agent, DST Asset Manager Solutions, Inc. Eligible Shareholders (as defined below) who previously purchased Acquiring Fund shares directly from, and continue to hold such shares directly through, the transfer agent may continue to place additional purchase orders in the same account(s) directly with the transfer agent. Prior to October 2, 2017, Eligible Shareholders that could purchase shares directly from the transfer agent included, but were not limited to, qualified and non-qualified employee benefit plans (including but not limited to defined benefit plans, defined contribution plans and 401(k) plans), foundations and endowments, banks, trusts, investment companies and corporate capital and cash man […] chases of the Acquiring Fund's shares in the same account(s) by mail. Additional investments may be made at any time by mailing a check (payable to Schwab Funds) to the transfer agent at DST Asset Manager Solutions, Inc., Attn: Schwab Funds, P.O. Box 219647, Kansas City, MO 64121-9647. Be sure to include your account number on your check. The Acquiring Fund reserves the right to suspend the privilege of direct purchase of additional shares of the Acquiring Fund at any time. Subject to acceptance by the Acquiring Fund, payment for the purchase of shares received by mail will be credited to a shareholder's account at the net asset value per share of the Acquiring Fund next determined after receipt, even though the check may not yet have been converted into federal funds. For purposes of calculating the purchase price of Acquiring Fund shares, a purchase order is received by the Acquiring Fund on the day that it is in good order unless it is rejected by the Acquiring Fund's transfer agent. For a cash purchase order of Acquiring Fund shares to be in good order on a particular day, a check must be received on or before the close of the Acquiring Fund (generally 4:00 p.m. Eastern time or the close of the NYSE, whichever is earlier) on that day. If the payment is received by the Acquiring Fund after the deadline, the purchase price of Acquiring Fund shares will be based upon the next determination of net asset value of Acquiring Fund shares. No currency, third party checks, foreign checks, starter checks, credit card checks, traveler's checks or money orders will be accepted by the Acquiring Fund. Direct Redemptions and Exchanges Eligible Shareholders may continue to exchange and redeem shares held directly with the Acquiring Fund's transfer agent. When selling or exchanging shares directly, you should be aware of the following Acquiring Fund policies: ∙ The Acquiring Fund typically expects to pay sale proceeds by wire, ACH, or by mailing a check, to redeeming shareholders within two business days following receipt of a shareholder redemption order; however, the Acquiring Fund may take up to seven days to pay sale proceeds. ∙ The Acquiring Fund reserves the right to honor redemptions in liquid portfolio securities ins\n"

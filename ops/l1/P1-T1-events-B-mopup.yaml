ition. The Acquiring Portfolio Board, including all of the Independent Directors ( i.e ., director […] e Adviser’s bottom-up research in value, growth, core and other investment style disciplines. The Adviser may allocate assets to companies in different targeted ranges of market capitalization. The Adviser relies on both fundamental and quantitative research to manage risk and return for the Portfolio. Equity securities in which the Portfolio may invest include, but are not limited to, common stocks, preferred stocks, depositary receipts, real estate investment trusts (REITs), participation notes or other structured notes, and other instruments that provide exposure to equity securities. The Portfolio may invest in companies of any size. The Portfolio invests primarily in common stocks, but may also invest in preferred stocks, warrants and convertible securities of foreign issuers, including sponsored or unsponsored American Depositary Receipts (“ADRs”) and Global Depositary Receipts (“GDRs”). Under most conditions, the Portfolio intends to have its assets invested among multiple emerging-market countries, although the Portfolio may also invest in more developed country markets. In allocating the Portfolio’s assets among emerging-market countries, the Adviser considers such factors as the geographical distribution of the Portfolio, the sizes of the stock markets represented and the various key economic characteristics of the countries. However, the Portfolio may not necessarily be diversified on a The Portfolio invests in issuers that are determined by the Adviser to offer compelling profitability prospects, reasonable valuations, and favorable fundamental and quantitative trends. The Adviser employs an integrated approach that combines both fundamental and quantitative research to identify attractive investment opportunities and to manage risk. The Portfolio may invest in issuers of any market capitalization, industry or investment style. Under most conditions, the Portfolio intends to have its assets invested among multiple emerging market countries, although the Portfolio may also invest in developed markets countries. In allocating the Portfolio’s assets among countries, the Advisor relies primarily on individual security selection driven by a bottom-up research process, though country-level factors are als\n"

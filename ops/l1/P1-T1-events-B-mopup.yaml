 of equity securities of U.S. companies. Under normal circumstances, the Fund will invest at least 80% of its assets (net assets plus any borrowings for investment purposes) in equity securities of U.S. companies across all market capitalizations. Generally, an issuer of a security is considered to be U.S. or foreign based on the issuer's \"country of risk,\" as determined by a third-party service provider such as Bloomberg. Equity securities include common stocks and securities convertible into common stock, such as warrants, rights, convertible bonds, debentures and convertible preferred stock. Convertible preferred stocks and debentures must be rated investment grade by a nationally recognized statistical rating organization when purchased, or if unrated, considered by Epoch Investment Partners, Inc., the Fund’s Subadvisor, to be of comparable quality. Investment Process: The Subadvisor invests primarily in companies that generate increasing levels of free cash flow and have management teams that the Subadvisor believes allocate free cash flow effectively to create shareholder value. The security selection process focuses on free-cash-flow analytics as opposed to traditional accounting-based metrics. The Subadvisor seeks to identify companies with a consistent, straightforward ability to both generate free cash flow and to intelligently allocate it among internal reinvestment opportunities, acquisitions, dividends, share repurchases and/or debt reduction. The Subadvisor may give consideration to certain environmental, social, and governance (“ESG”) criteria when evaluating an investment opportunity. The Subadvisor may sell or reduce a position in a security when it believes its investment objectives have been met or if the investment thesis is failing to materialize. The Subadvisor may also sell or reduce a position in a security when the security is deemed less attractive relative to another security on a return/risk basis. Although the Fund may invest in securities of companies across all market capitalizations, it may invest a significant portion of its assets i […] n narrower product lines and niche markets and may be more vulnerable to adverse business or market developments. Securities issued by larger companies may have 5 MainStay Epoch U.S. All Cap Fund less growth potential and may not be able to attain the high growth rates of successful smaller companies, especially during strong economic periods. In addition, larger companies may be less capable of responding quickly to competitive challenges and industry changes, including those resulting from improvements in technology, and may suffer sharper price declines as a result of earnings disappointments. There is a risk that the securities issued by companies of a certain market capitalization may underperform the broader market at any given time. Convertible Securities Risk: Convertible securities are typically subordinate to an issuer’s other debt obligations. In part, the total return for a convertible security depends upon the performance of the underlying stock into which it can be converted. Also, issuers of convertible securities are often not as strong financially as those issuing securities with higher credit ratings, are more likely to encounter financial difficulties and typically are more vulnerable to changes in the economy, such as a recession or a sustained period of rising interest rates, which could affect their ability to make interest and principal payments. If an issuer stops making interest and/or principal payments, the Fund could lose its entire investment. Foreign Securities Risk: Investments in foreign (non-U.S.) securities may be riskier than investments in U.S. securities. Foreign regulatory regimes and securities markets can have less stringent investor protections and disclosure standards and less liquid trading markets than U.S. regulatory regimes and securities markets, and can experience political, social and economic developments that may affect the value of the Fund's investments in foreign securities. Foreign securities may also subject the Fund's investments to changes in currency rates. Changes in the value of foreign currencies may make the return on an investment increase or decrease, unrelated to the quality or performance of the investment itself. These risks may be greater with respect to securities of companies that conduct their business activities in emerging markets or whose securities are traded principally in emerging markets. Rights and Warrants Risk: Rights and warrants may provide a greater potential for profit or loss than an equivale […]  fees and expenses) of Class R6 do not exceed those of Class I. These agreements will remain in effect until February 28, 2022, and shall renew automatically for one-year terms unless New York Life Investments provides written notice of termination prior to the start of the next term or upon approval of the Board of Trustees of the Fund. Example The Example is intended to help you compare the cost of investing in the Fund with the cost of investing in other mutual funds. The Example assumes that you invest $10,000 in the Fund for the time periods indicated whether or not you redeem all of your shares at the end of those periods (except as indicated with respect to Class B and Class C shares). The Example reflects Class B and Class C shares converting into Investor Class shares in years 9-10; expenses could be lower if you are eligible to convert to Class A shares instead. The Example also assumes that your investment has a 5% return each year and that the Fund's operating expenses remain the same. The Example reflects the contractual fee waiver and/or expense reimbursement arrangement, if applicable, for the current duration of the arrangement only. Although your actual costs may be higher or lower, based on these assumptions your costs would be: 9 MainStay Epoch U.S. Equity Yield Fund Expenses After Class A Investor Class B Class C Class I C
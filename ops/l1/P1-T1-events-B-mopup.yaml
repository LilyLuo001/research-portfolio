ixed, variable, or floating interest rates and may include asset-backed securities, mortgage-backed securities (which may include “to be announced” (“TBA”) transactions, which are standardized contracts for future delivery in which the exact mortgage pools to be delivered are not specified until a few days prior to settlement), zero-coupon securities, convertible securities, inflation-indexed bonds, structured notes, bank loans, loan participations, loan assignments, municipal securities, and other securities bearing fixed or variable interest rates of any maturity. “Investment-grade” securities are securities that, at the time of purchase, are rated by at least one major rating agency in one of its top four rating categories, or, if unrated, are determined by the Adviser to be of similar quality. In the case of a split rated security (that is, two or more rating agencies give a security different ratings), the highest rating shall apply. The Fund may invest without limit in U.S. dollar denominated foreign securities. The Fund may invest in ETFs (open-end investment companies whose shares may be bought and sold by investors in transactions on major stock exchanges). The Fund may also invest a portion of its assets in cash and cash equivalents. The Fund normally invests at least 80% of its net assets, plus the amount of any borrowing for investment purposes, in fixed income securities. This investment policy may be changed by the Fund upon 60 days’ prior notice to shareholders. The Fund may use derivatives and ETFs with economic characteristics similar to fixed income securities for purposes of complying with this policy. At times, the Fund’s investments in municipal securities may be substantial depending on the Adviser’s outlook on the market. While the Fund may invest in fixed income securities of any maturity or duratio […]  Bond Index, as measured through the Sub-Adviser’s proprietary sustainable scoring methodology. The Fund’s total return includes income earned on the Fund’s investments, plus capital appreciation, if any. Fixed income securities in which the Fund may invest include obligations of governments, government agencies or instrumentalities, supra-national issuers, or corporate issuers. They may pay fixed, variable, or floating interest rates and may include asset-backed securities, mortgage-backed securities (which may include “to be announced” (“TBA”) transactions, which are standardized contracts for future delivery in which the exact mortgage pools to be delivered are not specified until a few days prior to settlement), zero-coupon securities, convertible securities, inflation-indexed bonds, structured notes, bank loans, loan participations, loan assignments, municipal securities, and other securities bearing fixed or variable interest rates of any maturity. “Investment-grade” securities are securities that, at the time of purchase, are rated by at least one major rating agency in one of its top four rating categories, or, if unrated, are determined by the Sub-Adviser, to be of similar quality. In the case of a split rated security (that is, two or more rating agencies give a security different ratings), the average rating shall apply. The Fund may invest in U.S. dollar denominated foreign securities. The Fund may invest in exchange-traded funds (“ETFs”) (open-end investment companies whose shares may be bought and sold by investors in transactions on major stock exchanges). The Fund may also invest a portion of its assets in 5 Target Fund Principal Investment Strategy Acquiring Fund Principal Investment Strategy effective duration of the Bloomberg Barclays U.S. Aggregate Bond Index was 6.02 years. The Fund’s average effective duration may vary over time depending on market and economic conditions. Duration is a measure of a debt security’s price sensitivity to a given change in interest rates; effective duration is a measure of the Fund’s portfolio duration adjusted for the anticipated effect of interest rate changes on pre-payment rates. Generally, the higher a debt security’s duration, the greater its price sensitivity to a change in interest rates. Unlike the maturity of a fixed income security, which measures only the time until final payment is due, duration takes into account the time until all payments of interest and principal on a security are expected to be made, including how these payments are affected by prepayments and by changes in interest rates. The Adviser’s decision to purchase or sell a security or make investments in a particular sector is based on relative value considerations. In analyzing the relative attractiveness of a particular security or sector, the Adviser assesses an issue’s historical relationships to other bonds, technical factors including supply and demand an […] ses of the investment process, from stock selection to portfolio construction and engagement. The Adviser believes that this ESG assessment, which is integrated with more traditional methods, is an important consideration to understand the potential of a company. The Adviser engages with management of certain issuers regarding corporate governance practices as well as what the Adviser deems to be materially important environmental and/or social issues facing a company. The emphasis that the Adviser places on various factors when purchasing and selling securities for the Fund may change with changes in the markets. The Adviser may engage actively in transactions involving derivatives in managing the Fund. Derivative transactions may include exchange-traded or over-the-counter derivatives, such as swap contracts including interest rate swaps, total return swaps, and credit default swaps, and futures contracts and options on futures (typically for the purposes of interest rate or other risk management or as a substitute for direct investment), and foreign currency exchange transactions, including currency futures, forwards, and option transactions (typically to hedge against changes in the values of currencies in which investments are denominated). The notional value of the Fund’s investments in derivatives that provide exposure comparable, in the judgment of the adviser, to investments in fixed income securities may be counted toward satisfaction of the 80% policy described above. The Fund may engage in active and frequent trading of portfolio securities in seeking to achieve its investment objective. cash and cash equivalents. The Sub-Adviser may use derivatives, typically exchange-traded futures, for hedging or investment purposes. At times, the Fund’s investments in municipal securities may be substantial depending on the Sub-Adviser’s outlook on the market. While the Fund may invest in fixed income securities of any maturity or duration, under normal market conditions, the Sub-Adviser seeks to maintain an average effective portfolio duration that is within 20% of the average effective duration of the Fund’s benchmark, the Bloomberg U.S. Aggregate Bond Index, on an adjusted basis. As of May 31, 2021, the average effective duration of the Bloomberg U.S. Aggregate Bond Index was 6.36 years. The Fund’s average effective duration may vary over time depending on market and economic conditions. Duration is a measure of a debt security’s price sensitivity to a given change in interest rates; effective duration is a measure of the Fund’s portfolio duration adjusted for the anticipated effect of interest rate changes on pre-payment rates. Generally, the higher a debt security’s duration, the greater its price sensitivity to a change in interest rates. Unlike the maturity of a fixed income security, which measures only the time until final payment is due, duration takes into account the time until all payments of interest and principal on a security are expected to be made, including how these payments are affected by prepayments and by changes in interest rates. The Sub-Adviser’s decision to purchase or sell a security or make investments in 
ows of\n   the Target/Acquiring fund table, a 4-fund filing yields 4 objects}, ... ]}\n  or the no_event object above.\nEach event object:\n  fund_name        target mutual fund's full name (from excerpt)\n  family           fund family/trust (from excerpt)\n  mutual_fund_ticker / etf_ticker\n                   a single 2-6 char UPPERCASE symbol from the excerpt, else \"NA\".\n                   NEVER a fund name. Multiple class tickers → \"NA\" and list them in evidence.\n  announce_date    YYYY-MM-DD only. Board-approval date if stated; else the document's own\n                   date; else the filed date. Vague (\"May 2020\",\"Q4 2026\") → \"NA\".\n  date_basis       \"board\" | \"document\" | \"filed\" | \"NA\"\n  effective_date   YYYY-MM-DD only; the stated closing/completion date. Vague → \"NA\".\n  asset_class      equity_US / equity_intl / fixed_income / other — ONLY if locatable in the\n                   excerpt (bond/muni/high-yield/MBS→fixed_income; International/EM/Asia→\n                   equity_intl; explicit US equity→equity_US; managed-futures/multi-asset/\n                   long-short→other). Name alone insufficient → \"NA\".\n  AUM_at_conversion_USD  number from excerpt or \"NA\"\n  source_accession copy from the 文件 line\n  confidence       H = fund identity + (announce or effective) with explicit basis;\n                   M = identity clear, dates partly missing/document-dated;\n                   L = identity inferred from title only\n  evidence         ≤25-word quote fragment supporting the verdict (for events: the words\n                   showing the acquirer is an ETF; for no_event: the words showing why not)\nNEED_HUMAN only when TWO date statements INSIDE THIS ONE EXCERPT contradict for the same\nfund: {\"NEED_HUMAN\": true, \"quotes\": [\"...\", \"...\"]}. Different filings never contradict.\nNever fill any field from memory — excerpt-locatable or \"NA\".\n\nSELF-CHECK before emitting (do this, don't print it): every input item id appears exactly\nonce in your answer map (count them); every event object quotes ETF-acquirer evidence;\nevery date matches ^\\d{4}-\\d{2}-\\d{2}$ or is \"NA\"; no ticker field contains a space.】\n文件: 0001193125-24-273332 (form 497, filed 2024-12-09, JOHN HANCOCK BOND TRUST  (CIK 0000315554))\nsource_url: https://www.sec.gov/Archives/edgar/data/315554/000119312524273332/d574545d497.htm\n节选:\n497 1 d574545d497.htm JOHN HANCOCK BOND TRUST JOHN HANCOCK BOND TRUST Table of Contents December 9, 2024 Your action is required. Please vote today. Dear High Yield Fund shareholder: At John Hancock Investment Management, we continually review our lineup of mutual funds to ensure that each fund continues to serve the best interests of shareholders. Included in that assessment is a review of account fees and long-term prospects for growth, and whether the combination of similar funds might promote beneficial economies of scale. On occasions where we believe a fund may benefit from its combination with another similar fund, we have taken action, and we believe your fund would benefit from such action at this time. After careful consideration, we proposed, and your fund’s Trustees agreed, that shareholders would benefit from a merger of High Yield Fund, a series of John Hancock Funds II (the “Fund” or “Target Fund”) with and into John Hancock High Yield Fund, a series of John Hancock Bond Trust (the “Acquiring Fund”) (the “Reorganization”). Advantages of the proposed merger: • Expected economies of scale and potentially lower expenses in the future. Following the Reorganization, and a […] objective . The proposed merger is expected to allow shareholders of the Target Fund to pursue a similar investment objective in a larger combined fund. Both the Target Fund and the Acquiring Fund have similar investment objectives: to realize an above-average total return over a market cycle of three to five years, consistent with reasonable risk for the Target Fund and to seek high current income with capital appreciation as a secondary goal for the Acquiring Fund. The Target Fund invests primarily in high yield securities (securities rated BB and Ba through C and D, respectively) which may include corporate bonds, preferred stocks, U.S. government and foreign securities, mortgage-backed securities, loan assignments or participations and convertible securities. The Acquiring Fund invests primarily in U.S. and foreign fixed-income securities rated BB/Ba or lower and their unrated equivalents which may consist of domestic and foreign corporate bonds and government obligations, debentures and notes, convertible securities and preferred securities. The combined fund’s portfolio will be substantially similar to the Acquiring Fund’s current portfolio. • Continuity of management . John Hancock Investment Management LLC serves as investment advisor to your Fund and the Acquiring Fund and will continue to serve as the investment advisor to the combined fund. Western Asset Management Company, LLC, and Western Asset Management Company Limited serve as the investment subadvisor and sub-subadvisor, respectively, of the Target Fund, while Manulife Investment Management (US) LLC, serves as the Acquiring Fund’s investment subadvisor and will continue to serve as subadvisor of the combined fund. How to vote Note that this Reorganization cannot proceed without the approval of shareholders, so a special shareholder meeting will be held at 200 Berkeley Street, Boston, Massachusetts 02116 on January 15, 2025, at 1:00 P.M., Eastern Time. Please read the enclosed proxy statement, and vote your shares as described below. While you may attend the meeting, voting today will save on the potential cost of future mailings required to obtain shareholder votes . You may vote your shares by proxy in one of three ways: Online: by visiting the website on your proxy card(s) and entering your control number Phone: by calling the number listed on your proxy card(s) Mail: by returning the enclosed proxy card(s) I encourage you to read the enclosed proxy statement and prospectus for more information, and I […] ter waivers. The greater asset size of the combined fund may allow the Acquiring Fund, relative to the Target Fund, to reduce per-share expenses by spreading fixed costs over a larger asset base. Your Fund seeks to realize an above-average total return over a market cycle of three to five years, consistent with reasonable risk. Similarly, the Acquiring Fund seeks (and the combined fund will also seek) high current income with capital appreciation as a secondary goal. The Target Fund invests primarily in high yield securities (securities rated BB and Ba through C and D, respectively) which may include corporate bonds, preferred stocks, U.S. government and foreign securities, mortgage-backed securities, loan assignments or participations and convertible securities. The Acquiring Fund invests primarily in U.S. and foreign fixed-income securities rated BB/Ba or lower and their unrated equivalents which may consist of domestic and foreign corporate bonds and government obligations, debentures and notes, convertible securities and preferred securities. The combined fund’s portfolio will be substantially similar to the Acquiring Fund’s current portfolio. 1 Table of Contents While the Acquiring Fund and Target Fund have similar investment objectives and principal investment strategies and all securities held by the Target Fund are consistent with the Acquiring Fund’s investment restrictions and can be held by the Acquiring Fund, prior to the Reorganization, the Target Fund is planning to sell approximately 90% of its investments in anticipation of the Reorganization and invest the proceeds of such sales due to the investment preferences of the portfolio management team. The Target Fund offers one class of shares, Class 1 shares. The Acquiring Fund offers four classes of shares, Class A, Class C, Class I and Class R6 shares, however, only Class R6 shares will be involved the Reorganization. Each Fund incurs costs for legal, accounting, transfer agency services, insurance, and custodial and administrative services. Many of these resources and costs are duplicative. The combination of the Funds resulting from the Reorganization may enable the combined fund to benefit from the ability to spread fixed expenses over a larger asset base in a manner that may contribute to a lower expense ratio in the long-term than each Fund would achieve separately, both before and after current expense waivers. As shown in the table below, the hypothetical pro forma expense ratio of the Acquiring Fun […] e Portfolio Manger • Managed the fund since 2022 Caryn E. Rothman, CFA • Senior Portfolio Manager, Head of Global Credit • Managed the fund since 2017 Investment Objective To realize an above-average total return over a market cycle of three to five years, consistent with reasonable risk. To seek a high current income. Capital appreciation is a secondary goal. Principal Investment Strategies Under normal market conditions, the fund invests at least 80% of its net assets (plus any borrowings for investment purposes) at the time of investment in high yield securities. The fund’s investments may include corporate bonds, preferred stocks, U.S. government and foreign securities, mortgage-backed securities, loan assignments or participations and convertible securities which have the following ratings (or, if unrated, are considered by the manager to be of equivalent quality): Corporate Bonds, Preferred Stocks and Convertible Securities Moody’s Investor Services, Inc. Ba through C S&P Global Ratings BB through D Under normal market conditions, the fund invests at least 80% of its net assets (plus any borrowings for investment purposes) in U.S. and foreign fixed-income securities rated BB/Ba or lower and their unrated equivalents. Bonds rated at or below BB by S&P Global Ratings (S&P) or Fitch Ratings, Inc. (Fitch Ratings) or Ba by Moody’s Investors Service, Inc. 6 Table of Contents High Yield Fund, a series of John Hancock Funds II (Target Fund) John Hancock High Yield Fund, a series of John Hancock Bond Trust (Acquiring Fund) Below-investment-grade securities are commonly referred to as “junk bonds.” The fund may also invest in investment-grade securities. As part of its investment strategy, the fund will generally invest without restrictions within these ratings category ranges, or in unrated securities considered to be of equivalent quality by the manager. The fund may invest in foreign bonds and other fixed-income securities denominated in foreign currencies, where, in the opinion of the manager, the combination of current yield and currency value offer attractive expected returns. Foreign securities in which the fund may invest include emerging market securities. The fund may invest up to 100% of its assets in foreign securities. The fund may also enter into various derivative transactions for both hedging and non-hedging purposes, including for purposes of enhancing returns. Thes […] securities), futures contracts and/or mortgage-backed securities to a significant extent, although the amounts invested in these instruments may change from time to time. The fund may invest in fixed- and floating-rate loans, generally in the form of loan participations and assignments of such loans. The fund normally maintains an average portfolio duration of between three and seven years. However, the fund may invest in individual securities of any duration. Duration is an approximate measure of the sensitivity of the market value of a security to changes in interest rates. (Moody’s) are considered junk bonds. These may include, but are not limited to, domestic and foreign corporate bonds and government obligations, debentures and notes, convertible securities, preferred securities, and domestic and foreign government obligations. No more than 10% of the fund’s total assets may be invested in securities that are rated in default by S&P, Fitch Ratings or Moody’s. The fund’s investment policies are based on credit ratings at the time of purchase. There is no limit on the fund’s average maturity. The manager focuses on industry allocation and securities selection in making investment decisions. The manager uses top-down analysis to determine which industries may benefit from current and future changes in the economy. The manager uses bottom-up research to find individual securities that appear comparatively undervalued. The manager looks at the financial condition of the issuers, as well as the collateralization and other features of the securities themselves. The fund may hold up to 20% of its total assets in the securities of companies in any one industry and up to 10% of its total assets in the securities of any individual issuer. The fund typically invests in a broad range of industries. The manager considers environmental, social, and/or governance (ESG) factors, alongside other relevant factors, as part of its investment process. ESG factors may include, but are not limited to, matters regarding board diversity, climate change policies, and supply chain and human rights policies. The ESG characteristics utilized in the fund’s investment process may change over time and one or more characteristics may not b\n"

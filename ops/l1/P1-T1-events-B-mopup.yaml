ollows this section. Q. What is happening to my investment? Why am I receiving an Information Statement/Prospectus? A. You are receiving this Information Statement/Prospectus because you own shares in JPMorgan Unconstrained Debt Fund (the “Target Fund”). The Target Fund currently operates as an open-end mutual fund. The Target Fund will be reorganized into an exchange-traded fund (“ETF”) though the reorganization of the Target Fund into a newly-created ETF, JPMorgan Flexible Debt ETF (the “Acquiring Fund” and together with the Target Fund, the “Funds”). The Target Fund and the Acquiring Fund have identical investment objectives and fundamental investment policies and have substantially similar investment strategies, except for the changes that are not expected to affect the way that the Target Fund is currently managed as discussed in the section entitled “How do the Funds’ investment objectives, investment strategies, and fundamental investment policies compare?” Following the Reorganization, the Target Fund will be liquidated. The Reorganization will be accomplished in accordance with an Agreement and Plan of Reorganization and Liquidation (the “Plan”). The Plan provides for the transfer of all of the assets and liabilities of the Target Fund to the Acquiring Fund in exchange for shares of the Acquiring Fund having an aggregate net asset value (“NAV”) equal to the aggregate NAV of the Target Fund followed immediately by the distribution by the Target Fund to its shareholders of the portion of shares of the Acquiring Fund to which the shareholder is entitled (including cash in lieu of fractional shares of the Acquiring Fund) in complete liquidation of the Target Fund, except as noted below. If you remain a shareholder of the Target Fund on the Closing Date (as defined below), you will receive shares of the Acquiring Fund and, in  […] fference between your tax basis in the shares and the amount you receive for them. Q. Whom do I contact for further information? A. If you have questions, please call 1-800-480-4111. You can also find information online at www.jpmorganfunds.com. Important additional information about the Reorganization is set forth in the accompanying Information Statement/Prospectus. Please read it carefully. Table of Contents INFORMATION STATEMENT/PROSPECTUS Dated [ ], 2025 JPMorgan Trust I 277 Park Avenue New York, NY 10172 This Information Statement/Prospectus is being furnished to shareholders of JPMorgan Unconstrained Debt Fund (the “Target Fund”) of JPMorgan Trust I (“Target Fund Trust”) to inform them of a plan to reorganize the Target Fund into an exchange-traded fund (“ETF”), which will continue to be managed by JPMIM. The Target Fund will be reorganized into a newly-created ETF, JPMorgan Flexible Debt ETF (the “Acquiring Fund” and together with the Target Fund, the “Funds”) that is a series of J.P. Morgan Exchange-Traded Fund Trust (the “ETF Trust” and together with the Target Fund Trust, the “Trusts”), and the Target Fund will subsequently be liquidated (the “Reorganization”). At a meeting held May 8, 2025, the Board of Trustees of the Target Fund (the “Target Fund Board”) approved the Reorganization. The Target Fund Board, including all of the Independent Trustees (i.e., Trustees who are not “interested persons” of the Target Fund as defined in the Investment Company Act of 1940 (the “1940 Act”)), determined that, for the Target Fund, participation in the Reorganization is in the best interests of the Target Fund and that the interests of existing Target Fund’s shareholders will not be diluted as a result of the Reorganization. The Reorganization will be accomplished in accordance with an Agreement and Plan of Reorganization and Liquidation (the “Plan”). The Plan provides for the transfer of all of the assets and liabilities of the Target Fund to the Acquiring Fund in exchange for shares of the Acquiring Fund having an aggregate net asset value (“NAV”) equal to the aggregate NAV of the Target Fund followed immediately by the distribution by the Target Fund to its shareholders of the portion of shares of the Acquiring Fund to which the shareholder is entitled (including cash in lieu of fractional shares of the Acquiring Fund) in complete liquidation of the Target Fund, except as noted below. A copy of the form of the Plan pertaining to the Reorganization is included as Append […]  are available at https://am.jpmorgan.com/us/en/asset-management/adv/products/fund-documents. You may request free copies of the Target Fund’s prospectuses and statement of additional information (including any supplement thereto), the Acquiring Fund’s prospectus and statement of additional information (including any supplement thereto ), and the Statement of Additional Information by calling collect at 1-800-480-4111, or by writing to J.P. Morgan Funds Services, P.O. Box 219143, Kansas City, MO 64121-9143. Table of Contents You may also request free copies of the Acquiring Fund’s prospectus and statement of additional information and the Statement of Additional Information by calling collect at 1-844-457-6383, or by writing to J.P. Morgan Exchange-Traded Funds, 277 Park Avenue New York, New York 10172. Because the Acquiring Fund has not yet commenced operations, no shareholder reports are available for it. All available materials have been filed with the SEC. Each Fund also files proxy materials, information statements, reports, and other information with the SEC in accordance with the informational requirements of the Securities Exchange Act of 1934, as amended, and the 1940 Act. These materials can be obtained electronically from the EDGAR database on the SEC’s Internet site ( http://www.sec.gov ) or, after paying a duplicating fee, by electronic request at the following e-mail address: publicinfo@sec.gov. This Information Statement/Prospectus dated [ ], 2025, is expected to be mailed to shareholders of the Target Fund on or about [ ], 2025. AN INVESTMENT IN THE FUNDS IS NOT A DEPOSIT OF ANY BANK AND IS NOT INSURED OR GUARANTEED BY THE FEDERAL DEPOSIT INSURANCE CORPORATION OR ANY OTHER GOVERNMENT AGENCY. AN INVESTMENT IN THE FUNDS INVOLVES INVESTMENT RISK, INCLUDING THE POSSIBLE LOSS OF PRINCIPAL. LIKE ALL FUNDS, THE U.S. SECURITIES AND EXCHANGE COMMISSION HAS NOT APPROVED OR DISAPPROVED THESE SECURITIES OR PASSED UPON THE ADEQUACY OF THIS INFORMATION STATEMENT/PROSPECTUS. ANY REPRESENTATION TO THE CONTRARY IS A CRIMINAL OFFENSE. Table of Contents TABLE OF CONTENTS SUMMARY 8 What is happening to the Target Fund? 8 How will the Reorganization be implemented? 8 Why is the Reorganization happening and did the B\n"

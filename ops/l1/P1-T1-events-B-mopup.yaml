    ETF is lower than its respective Target Fund. o To ensure that shareholders receive the benefits of
    the lower-overall fee structure, the Adviser has agreed to fee reductions, and together with the lower
    total expense ratios in place due to the expense cap, the Adviser believes that this cost structure

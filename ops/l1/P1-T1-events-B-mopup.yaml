ther Fidelity ® fund; drawing on an available line or lines of credit from a bank or banks; or using reverse repurchase agreements. These methods may be used during both normal and stressed market conditions. In addition to paying redemption proceeds in cash, a fund reserves the right to pay part or all of your redemption proceeds in readily marketable securities instead of cash (redemption in-kind). Redemption in-kind proceeds will typically be made by delivering the selected securities to the redeeming shareholder within seven days after the receipt of the redemption order in proper form by a fund. Converting Shares A fund will automatically convert your class of shares of the fund to Class Z shares, if Class Z of the fund is available under your plan. A fund may convert your Class Z shares to another class of shares of the fund, including classes of shares not offered in this prospectus that are available under your plan, if your plan is no longer eligible to offer Class Z. Information on the other classes of shares of the fund can be found in that class’s prospectus. Investors will be notified in writing before any such conversion to another class. A conversion will be based on the respective NAVs of the two classes, without the imposition of any fees, on the trade date of the conversion. A conversion between share classes of the same fund is a non-taxable event. Conversion Feature. Effective June 21, 2021, after a maximum of eight years from the initial date of purchase, Class C shares convert automatically to Class A shares of a fund. Prior to June 21, 2021, after a maximum of 10 years from the initial date of purchase, Class C shares convert automatically to Class A shares of a fund. Conversion to Class A shares will be made at NAV. At the time of conversion, a portion of the Class C shares bought through the reinvestment of dividends or capital gains (Dividend Shares) will also convert to Class A shares. The portion of Dividend Shares that will convert is determined by the ratio of your converting Class C non-Dividend Shares to your total Class C non-Dividend Shares. A fund may convert shares sooner in certain circumstances. A shorter holding period may also apply depending on your intermediary. Please see \"Sales Charge Waiver Policies Applied by Certain Intermediaries\" in the \"Appendix\" section of this prospectus. A fund will permit an intermediary to transition Class C shares to Class A shares of the same fund, regardless of holding period, if the intermediary is unable to administer this conversion policy. Such transitions to Class A shares will be made at NAV minus any applicable CDSC. Exchanging Shares An exchange involves the redemption of all or a portion of the shares of one fund and the purchase of shares of another fund. As a Class A shareholder, you have the privilege of exchanging Class A shares for the same class of shares of other Fidelity ® funds that offer Advisor classes of shares at NAV or for Daily Money Class shares of Fidelity ® funds that offer Daily Money Class shares. As a Class M shareholder, you have the privilege of exchanging Class M shares for the same class of shares of other Fidelity ® funds that offer Advisor classes of shares at NAV or for Advisor M Class shares of Fidelity ® Government Money Market Fund. If you purchased your Class M shares through certain investment professionals that have signed an agreement with FDC, you also have the privilege of exchanging your Class M shares for shares of Fidelity ® Capital Appreciation Fund. As a Class C shareholder, you have the privilege of exchanging Class C shares for the same class of shares of other Fidelity ® funds that offer Advisor classes of shares or for Advisor C Class shares of Fidelity ® Treasury Money Market Fund. As a Class I shareholder, you have the privilege of exchanging Class I shares for the same class of shares of other Fidelity ® funds that offer Advisor classes of shares or for shares of Fidelity ® funds. As a Class Z shareholder, you have the privilege of exchang […] be automatically invested in the same class of shares of another identically registered Fidelity ® fund. Any capital gain distributions will be automatically invested in the same class of shares of another identically registered Fidelity ® fund, automatically reinvested in additional shares of the fund, or paid in cash. Not all distribution options may be available for every account and certain restrictions may apply. If the option you prefer is not listed on your account application, or if you want to change your current option, contact your investment professional directly or call Fidelity. If you elect to receive distributions paid in cash by check and the U.S. Postal Service does not deliver your checks, your distribution option may be converted to the Reinvestment Option. You will not receive interest on amounts represented by uncashed distribution checks. Any dividends and capital gain distributions paid to retirement plan participants will be automatically reinvested. Tax Consequences As with any investment, your investment in a fund could have tax consequences for you. If you are not investing through a tax-advantaged retirement account, you should consider these tax consequences. Taxes on Distributions Distributions you receive from each fund are subject to federal income tax, and may also be subject to state or local taxes. For federal tax purposes, certain of each fund's distributions, including dividends and distributions of short-term capital gains, are taxable to you as ordinary income, while certain of each fund's distributions, including distributions of long-term capital gains, are taxable to you generally as capital gains. A percentage of certain distributions of dividends may qualify for taxation at long-term capital gains rates (provided certain holding period requirements are met). If you buy shares when a fund has realized but not yet distributed income or capital gains, you will be \"buying a dividend\" by paying the full price for the shares and then receiving a portion of the price back in the form of a taxable distribution. Any taxable distributions you receive from a fund will normally be taxable to you when you receive them, regardless of your distribution option. Distributions by each […] of their immediate families) of intermediaries having agreements with FDC. A member of the immediate family of a bank trust officer, a registered representative, or other employee of intermediaries having agreements with FDC, is a spouse of one of those individuals, an account for which one of those individuals is acting as custodian for a minor child, and a trust account that is registered for the sole benefit of a minor child of one of those individuals. Purchased to repay a loan against Class A or Class M shares held in the investor's Fidelity Advisor ® 403(b) program. Purchased for an employer-sponsored health savings account. (Applicable only to Class A) Purchased by a former Destiny® Planholder in a Fidelity Advisor® account that was converted directly from a Destiny® Plan account after September 30, 2008. This waiver shall apply as long as the ownership of the Fidelity Advisor® account does not change. If the Fidelity Advisor® account is no longer directly held at Fidelity, your intermediary may be able to apply the waiver, assuming the stated conditions are met. Please contact your investment professional for more information. Purchased for a mutual fund only brokerage platform that charges a platform entrance fee and where the distributor has agreed with the broker to participate in such platform. Pursuant to Rule 22d-1 under the 1940 Act, FDC exercises its right to waive Class A's and Class M's front-end sales charge on shares acquired through reinvestment of dividends and capital gain distributions or in connection with a fund's merger with or acquisition of any investment company or trust. FDC also exercises its right to waive Class A's and Class M's front-end sales charge on purchases of $10.00 or less. The CDSC may be waived on the redemption of shares (applies to Class A, Class M, and Class C, unless otherwise noted): For disability or death. From employer-sponsored retirement plans (except SIMPLE IRAs, SEPs, and SARSEPs) in accordance with required minimum distributions as mandated by the Internal Revenue Code and related regulations. For required minimum distributions from Traditional IRAs, Rollover IRAs, SIMPLE IRAs, SEPs, and SARSEPs (excludes Roth accounts) as mandated by the Internal Revenu\n"

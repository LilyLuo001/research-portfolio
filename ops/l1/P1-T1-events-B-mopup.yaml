ows of\n   the Target/Acquiring fund table, a 4-fund filing yields 4 objects}, ... ]}\n  or the no_event object above.\nEach event object:\n  fund_name        target mutual fund's full name (from excerpt)\n  family           fund family/trust (from excerpt)\n  mutual_fund_ticker / etf_ticker\n                   a single 2-6 char UPPERCASE symbol from the excerpt, else \"NA\".\n                   NEVER a fund name. Multiple class tickers → \"NA\" and list them in evidence.\n  announce_date    YYYY-MM-DD only. Board-approval date if stated; else the document's own\n                   date; else the filed date. Vague (\"May 2020\",\"Q4 2026\") → \"NA\".\n  date_basis       \"board\" | \"document\" | \"filed\" | \"NA\"\n  effective_date   YYYY-MM-DD only; the stated closing/completion date. Vague → \"NA\".\n  asset_class      equity_US / equity_intl / fixed_income / other — ONLY if locatable in the\n                   excerpt (bond/muni/high-yield/MBS→fixed_income; International/EM/Asia→\n                   equity_intl; explicit US equity→equity_US; managed-futures/multi-asset/\n                   long-short→other). Name alone insufficient → \"NA\".\n  AUM_at_conversion_USD  number from excerpt or \"NA\"\n  source_accession copy from the 文件 line\n  confidence       H = fund identity + (announce or effective) with explicit basis;\n                   M = identity clear, dates partly missing/document-dated;\n                   L = identity inferred from title only\n  evidence         ≤25-word quote fragment supporting the verdict (for events: the words\n                   showing the acquirer is an ETF; for no_event: the words showing why not)\nNEED_HUMAN only when TWO date statements INSIDE THIS ONE EXCERPT contradict for the same\nfund: {\"NEED_HUMAN\": true, \"quotes\": [\"...\", \"...\"]}. Different filings never contradict.\nNever fill any field from memory — excerpt-locatable or \"NA\".\n\nSELF-CHECK before emitting (do this, don't print it): every input item id appears exactly\nonce in your answer map (count them); every event object quotes ETF-acquirer evidence;\nevery date matches ^\\d{4}-\\d{2}-\\d{2}$ or is \"NA\"; no ticker field contains a space.】\n文件: 0000894189-22-006827 (form N-14, filed 2022-09-08, Trust for Advised Portfolios  (CIK 0001261788))\nsource_url: https://www.sec.gov/Archives/edgar/data/1261788/000089418922006827/soundwatchetfn-14conversion.htm\n节选:\nN-14 1 soundwatchetfn-14conversion.htm N-14 Soundwatch ETF N-14 Conversion Filed with the U.S. Securities and Exchange Commission on September 8, 2022 Registration No. 333-_____________ UNITED STATES SECURITIES AND EXCHANGE COMMISSION Washington, D.C. 20549 FORM N-14 Registration under the Securities Act of 1933 ☒ Pre-Effective Amendment No. __ [ ] Post-Effective Amendment No. __ [ ] Trust for Advised Portfolios Trust for Advised Portfolios (Exact Name of Registrant as Specified in Charter) 615 East Michigan Street Milwaukee, Wisconsin 53202 (Address of Principal Executive Offices) (Zip Code) (626) 914-7385 (Registrant’s Telephone Numbers, Including Area Code) The Corporation Trust Company 1209 Orange Street Corporation Trust Center Wilmington, DE 19801 (Name and Address of Agent for Service) Copies to: Russell B. Simon, President Trust for Advised Portfolios c/o U.S. Bank Global Fund Services 777 East Wisconsin Avenue, 10 th Floor Milwaukee, Wisconsin 53202 Christopher D. Menconi, Esquire Morgan, Lewis & Bockius LLP 1111 Pennsylvania Avenue NW Washington, D.C. 20004 Approximate Date of Proposed Public Offering: As soon as practicable after this Registration Statement becomes effec […]  ETF shareholders should expect that they may receive distributions of capital gains on occasion, but ETFs generally have been able to minimize large annual distributions of capital gains, because ETFs generally do not sell assets in the portfolio to fund redemptions of creation units; instead, they transfer the to the redeeming Authorized Participant. ETF shareholders will recognize gain or loss on their ETF shares when purchase and sell their ETF shares, which may result tax liability for shareholders subject to tax. Brokerage Interaction for Sales – ETFs are bought and sold differently than mutual funds. While ETFs enjoy a cost advantage over traditional open-end mutual funds, investors that wish to purchase or sell ETF shares after the Conversion will need to have a broker-dealer execute their transaction. Unlike a mutual fund, Acquiring ETF shares cannot be purchased or redeemed directly from the Acquiring ETF, except if you are an Authorized Participant. This could mean that as a disadvantage, shareholders will pay a brokerage commission to sell, or buy, Acquiring ETF shares (although some brokerage firms no longer charge brokerage commissions for transactions in ETFs). Paying a brokerage commission may or may not be significant depending on the type of brokerage firm used, the commission structure (which could be a flat fee or a per share charge) and the services provided by the broker-dealer. By contrast, under the mutual fund model, shares in the Target Fund are currently available for purchase directly from the Target Fund without any charge and are also available from a variety of broker-dealers; currently, when shares in the Target Fund are traded through these broker-dealers, sometimes there is a transaction charge and sometimes there is no transaction charge, depending on the individual shareholder’s relationship with the broker-dealer; and some shareholders who buy shares through a broker-dealer are participating in an investment arrangement that includes other charges, such as an account fee. In addition, another disadvantage could be that ETF shares have a bid-ask spread and this spread may be considered a form of transaction charge. A bid-ask spread is the difference between the highest price  […] hich the ETF shares trade, and thus align the market price more closely with the NAV. Similarly, when an ETF’s shares trade at market prices above the NAV (at a “premium”), Authorized Participants would likely make new creation units of ETF shares, which they will then sell into the market, profiting from the difference, and this selling pressure also may have the effect of driving market price of the ETF shares closer to NAV. The activity described here should work to keep the NAV and the market price generally in line with one another. There are times when the markets are extremely volatile that this mechanism breaks down, and there have been instances where some ETFs trade at prices significantly different from the NAV. Q. When will the Conversion occur? A. The Adviser is anticipating a Conversion date of around October 21, 2022. This date could be delayed, because some administrative conditions must be satisfied to implement the Conversion. Q. Who will pay for the Conversion? A. The costs of the Conversion will be borne by the Adviser. The costs associated with the Conversion will not have an effect on the NAV per share of the Target Fund. The costs associated with the Conversion are expected to be approximately $107,500. Q. Will shareholders have to pay any sales load, commission or other similar fee in connection with the Conversion? A. No. Shareholders will not pay any sales load, commission or other similar fee in connection with the Conversion. Neither the Target Fund nor the Acquiring ETF charges a sales load. After the Conversion takes place, shareholders of the Acquiring ETF will no longer redeem their individual shares directly from the Trust. Instead, they will be able to sell their shares on the Exchange. Sales of shares on the Exchange take place through a broker, and some brokers charge commissions or other fees. Q. Will the Conversion result in any federal tax liability to me? A. The Conversion is designed to be treated as a tax-free reorganization for federal income tax purposes. There is one caveat to this: It is likely that as part of the Conversion, shareholders will receive cash compensation for any fractional shares that they hold. The redemption of these fractional shares will likely be a taxable event, which could result in a small capital gain. Assuming that the parties comply with the terms of the Agreement and Plan of Reorganization and Termination (“Plan of Reorganization”) and supply appropriate representation letters, the Trust will receive an opinion, with respect to the Conversion, that the transaction will be tax-free for federal income tax purposes. The realized and unrealized gains, losses and net income for the Target Fund will carry over to the Acquiring ETF in the Conversion, and net realized and net income, if any, will continue to be distributed in a manner consistent with the Questions & Answers 5 current Target Fund. Shareholders should consult their tax advisor about possible state and local tax consequences of the Conversion, if any, because the information about tax consequences in this document only relates to the federal income tax consequences of the Conversion. Q. Can I purchase, redeem or exchange shares of the Target Fund before the Conversion takes place? A. Yes. You can purchase or redeem shares of the Target Fund as usual until the Conversion occurs. You may redeem your Target Fund shares at any time before the Conversion takes place. Any shares not redeemed before the closing date of the Conversion will be exchanged for shares of the Acquiring ETF. Direct shareholders can redeem their shares by calling the customer service team at 888‑244-4601. If you hold your Target Fund shares with a broker, you can purchase additional shares or redeem as usual by contacting your broker. We do not recommend additional purchase transactions for direct shareholders during the Conversion process. Q. What if I want to purchase or redeem shares of the Acquiring ETF after the Conversion? A. You will need to contact your broker. After the Conversion, you will hold shares of the Acquiring ETF that corresponds to the aggregate NAV of the shares you held in the Target Fund. Because the Acquiring ETF is an ETF, this means that you cannot redeem your individual shares directly anymore. Instead, you will need to call your broker and place an order to sell your Acquiring ETF shares on the Exchange. Depending on your brokerage firm this may mean paying a commission. Q. Whom do I contact for further information? A. You can contact your financial advisor for further information. You may also contact the Target Fund at 888‑244-4601. Important additional information about the Conversion is set forth in the accompanying Information Statement/Prospectus. Please read it carefully. Questions & Answers 6 CONVERSION OF Soundwatch Hedged Equity Fund (A series of Trust for Advised Portfolios) c/o U.S. Bank Global Fund Services P.O. Box 701 Milwaukee, WI 53201-0701 888‑244-4601 INTO THE Soundwatch Hedged Equity ETF (A series of Trust for Advised Portfolios) c/o U.S. Bank Global Fund Services P.O. Box 701 Milwaukee, WI 53201-0701 888‑244-4601 _____________________________________ INFORMATION STATEMENT/PROSPECTUS DATED [Shareholder Letter Date], 2022 WE ARE NOT ASKING YOU FOR A PROXY AND YOU ARE REQUESTED NOT TO SEND US A PROXY This Information Statement/Prospectus (the “Information Statement/Prospectus” ) is furnished to you as a shareholder of the Soundwatch Hedged Equity Fund (the “Fund” or “Target Fund”). After careful consideration, the Fund’s investment adviser, Soundwatch Capital, LLC (“Soundwatch” or the “Adviser”), has recommended, and the Board of Trustees (the “Board”) of Trust for Advised Portfolios, a Delaware statutory trust (the “Trust”), has approved, the reorganization of the Target Fund into the Soundwatch Hedged Equity ETF (the “Soundwatch ETF” or “Acquiring ETF”). Both the Fund and the Soundwatch ETF are series of the Trust and may be referred to together as the “Funds.” The Target Fund and the Acquiring ETF have identical investment objectives, investment strategies, and restrictions and substantially similar risks, and there will be no change in investment adviser or portfolio managers. There are differences in: • how the Acquiring ETF is distributed, • purchase procedures for the Acquiring ETF, and • redemption procedures for the Acquiring ETF. Each of the differences is summarized below. After the conversion transaction occurs, the Acquiring ETF will be operated at a lower total expense ratio than the Target Fund. The Board has approved the Conversion and has determined that the Conversion is in the best interests of the Target Fund and its shareholders. Shares of the Acquiring ETF will be listed for trading on the Chicago Board Options Exchange (the “CBOE” or “Exchange”). In preparation for the closing of the Conversion, the last day to purchase or redeem shares of the Target Fund will be October 17, 2022. The Conversion is expected to close after the end of trading on October 21, 2022 (the “Closing Date”). The Acquiring ETF will open for trading on October 24, 2022. This Information Statement/Prospectus sets forth concisely the information you should know about the Conversion of the Target Fund and constitutes an offering of the shares of the Acquiring ETF issued in the Conversion. Please read it carefully and retain it for future reference. In addition, the following documents each have been filed with the U.S. Securities and Exchange Commission (the “SEC”), and are incorporated herein by reference: • the Statement of Additional Information dated [Shareholder Letter Date], 2022 relating to this Information Statement/Prospectus; • the Prospectus related to the Target Fund, dated February 28, 2022 and is on file with the SEC ( http://www.sec.gov ) (File No. 811-21422) (Accession No. 0000894189-22-001604); • the Statement of Additional Information related to the Target Fund, dated February 28, 2022 and is on file with the SEC ( http://www.sec.gov ) (File No. 811-21422) (Accession No. 0000894189-22-001604); • the Annual Report to shareholders of the Target Fund for the fiscal year ended October 31, 2021, which has previously been sent to shareholders of the Target Fund and is on file with the SEC ( http://www.sec.gov ) (File No. 811-21422) (Accession No. 0000894189-22-000087); and • the Semi-Annual Report to shareholders of the Target Fund for the six-month semi-period ended April 30, 2022, which has previously been sent to shareholders of the Target Fund and is on file with the SEC ( http://www.sec.gov ) (File No. 811-21422) (Accession No. 0000894189-22-004733); and In addition, the Acquiring ETF has filed a Prospectus and Statement of Additional Information for the Acquiring ETF as they will be offered after the Conversion. Because the Acquiring ETF has not yet commenced operations, no annual or semi-annual report is available. This Information Statement/Prospectus will be mailed on or about [Mailing Date], 2022 to shareholders of record of the Target Fund as of August 31, 2022 (the “Record Date”). The Target Fund is subject to the informational requirements of the Securities Exchange Act of 1934, as amended, and the Investment Company Act of 1940, as amended (the “1940 Act”), and in accordance therewith, file reports and other information, including proxy materials, with the SEC. The Target Fund’s Prospectus, Statement of Additional Information, annual and semi-annual reports and the Statement of Additional Information related to this Information Statement/Prospectus are available upon request and without charge by writing to the Target Fund at Soundwatch Funds, c/o U.S. Bank Global Fund Services, P.O. Box 701, Milwaukee, Wisconsin 53201-0701 or by calling toll-free at 888‑244-4601. This information is also accessible via the EDGAR database on the SEC’s internet Information Statement/Prospectus ii site at www.sec.gov and copies may be obtained upon payment of a duplicating fee, by electronic request at the following E-mail address: publicinfo@sec.gov. The U.S. Securities and Exchange Commission has not approved or disapproved these securities or passed upon the adequacy of this Information Statement/Prospectus. Any representation to the contrary is a criminal offense. No person has  […] ent/Prospectus and, if so given or made, such information or representation must not be relied upon as having been authorized. This Information Statement/Prospectus does not constitute an offer to sell or a solicitation of an offer to buy any securities in any jurisdiction in which, or to any person to whom, it is unlawful to make such offer or solicitation. We are not asking you for a proxy and you are requested not to send us a proxy. Information Statement/Prospectus iii Table of Contents OVERVIEW 1 FEES AND EXPENSES 1 COMPARISON OF INVESTMENT OBJECTIVE, STRATEGIES, RISKS AND RESTRICTIONS 3 PERFORMANCE HISTORY 14 MANAGEMENT OF THE FUNDS 16 DIFFERENCE IN PURCHASE PROCEDURES AND REDEMPTION PROCEDURES 17 DISTRIBUTOR 19 INFORMATION ABOUT THE CONVERSION 19 DIVIDENDS AND DISTRIBUTIONS 23 TAXES 24 FINANCIAL HIGHLIGHTS SUMMARY 26 DESCRIPTION OF THE SECURITIES TO BE ISSUED; RIGHTS OF SHAREHOLDERS 26 FUND TRUSTEES AND OFFICERS 27 OTHER SERVICE PROVIDERS 27 AVAILABLE INFORMATION 28 LEGAL MATTERS 28 EXPERTS 28 OTHER MATTERS 28 APPENDIX A - MORE INFORMATION ON PURCHASES AND REDEMPTIONS OF SHARE S A- 1 APPENDIX B - FORM OF AGREEMENT AND PLAN OF R EORGANIZATION B- 1 APPENDIX C - FINANCIAL HIGHLIGHTS C- 1 OVERVIEW This Information Statement/Prospectus relates to the Conversion of the Target Fund into the Acquiring ETF. The Conversion is taking place to convert the Target Fund, a traditional open-end mutual fund, into an exchange-traded fund, or “ETF”. The Trust, organized under the laws of the state of Delaware, is an open-end management investment company registered with the SEC. The Target Fund and the Acquiring ETF are organized as separate series of the Trust. Soundwatch serves as investment adviser to the Target Fund and the Acquiring ETF. Shareholders of the Target Fund are not required to approve the Conversion. Section 7.2 of Article VII of the Trust's Declaration of Trust permits the Trust, unless otherwise required by law, to cause any one or more series of the Trust to be merged or consolidated with or into any one or more series of the Trust without shareholder approval. The Target Fund and the Acquiring ETF are both series of the Trust, and are considered to be affiliated companies under the 1940 Act, and the Co\n"

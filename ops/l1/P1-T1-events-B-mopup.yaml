ined that the Reorganizations will not have a material adverse effect on the shareholders of each share class of the Target Funds. The enclosed Combined Prospectus/Information Statement contains information about the Reorganizations. Each Target Fund currently operates as an open-end mutual fund. Each Target Fund will be reorganized into an exchange-traded fund (“ETF”) though the reorganization of the Target Fund into its corresponding Acquiring Fund, each a newly-created ETF. ETFs are structurally different from mutual funds in several important aspects: • A mutual fund may offer multiple share classes with different sales charges, expenses, and/or minimum investments. An ETF will not issue multiple classes of shares. • A mutual fund investor may purchase and redeem shares directly from the mutual fund (through a distributor or a financial intermediary). Most ETF investors will buy and sell shares in secondary market transactions through brokers. • A mutual fund will accept purchase and redemption orders from any shareholders, and only on days that the mutual fund is open for business, and those orders will be effected at that day’s net asset value (“NAV”). An ETF will issue or redeem shares at its NAV per share only in one or more groupings of a large specified number of shares called a “Creation Unit,” on days that the ETF is open for business. Only an ETF’s “authorized participants” are permitted to engage in creation or redemption transactions directly with the ETF. All other shareholders will buy and sell shares of the ETF on an exchange at market price. Following the reorganization, each Target Fund will be liquidated. Each Acquiring Fund will be managed by BFA. Each Target Fund and its corresponding Acquiring Fund have identical investment objectives and fundamental investment policies, and substantially […]  reorganization and liquidation, the “Reorganization” and collectively, the “Reorganizations”). The Target Funds and the Acquiring Funds are each referred to as a “Fund” and collectively referred to as the “Funds.” Disciplined Volatility Acquiring Fund, following completion of its Reorganization, may be referred to as the “Disciplined Volatility Combined Fund,” and Dynamic Acquiring Fund, following completion of its Reorganization, may be referred to as the “Dynamic Combined Fund.” The Disciplined Volatility Combined Fund and the Dynamic Combined Fund (each, a “Combined Fund”) may collectively be referred to as the “Combined Funds.” Each Target Fund currently operates as an open-end mutual fund. Each Target Fund will be reorganized into an exchange-traded fund (“ETF”) though the reorganization of the Target Fund into its corresponding Acquiring Fund, each a newly-created ETF. Each Target Fund and its corresponding Acquiring Fund pursue the same investment objectives and employ identical fundamental investment policies and substantially similar investment strategies to achieve their respective investment objectives. Each Reorganization will be accomplished in accordance with the relevant Agreement and Plan of Reorganization. The Reorganization Agreement provides for: Step 1: The transfer of all of the assets of a Target Fund to its corresponding Acquiring Fund in exchange for the assumption by the Acquiring Fund of certain stated liabilities of the Target Fund and newly issued shares of the Acquiring Fund (the “Acquiring Fund Shares”). The Target Fund expects that all recorded liabilities of the Target Fund will be assumed by the Acquiring Fund pursuant to the Reorganization. Step 2: The distribution of the Acquiring Fund Shares pro rata by the Target Fund to its shareholders (except as noted below). Step 3: The termination, dissolution and liquidation of the Target Fund. If you remain a shareholder of a Target Fund on the Closing Date (as defined below) of a Reorganization, you will receive shares of the corresponding Acquiring Fund and, in some cases, cash that combined with the shares have the same value as your shares of the relevant Target Fund on that date. Shares of the Acquiring Fund are not issued in fr […]  adviser under common control with BlackRock. The Target Funds and the Acquiring Funds are each referred to as a “Fund” and collectively referred to as the “Funds.” Disciplined Volatility Acquiring Fund, following completion of its Reorganization, may be referred to as the “Disciplined Volatility Combined Fund,” and Dynamic Acquiring Fund, following completion of its Reorganization, may be referred to as the “Dynamic Combined Fund.” The Disciplined Volatility Combined Fund and the Dynamic Combined Fund (each, a “Combined Fund”) may collectively be referred to as the “Combined Funds” in this Combined Prospectus/Information Statement. Each Target Fund currently operates as an open-end mutual fund. Each Target Fund will be reorganized into an exchange-traded fund (“ETF”) though the reorganization of the Target Fund into its corresponding Acquiring Fund. Following the reorganizations, each Target Fund will be liquidated. Each Acquiring Fund will continue to be managed by BFA. The Board of Trustees of the Target Trust (the “Target Trust Board”) and the Board of Trustees of the Acquiring Trust (the “Acquiring Trust Board”) have determined that each Reorganization is in the best interests of each Fund, and that the interests of each Target Fund’s shareholders will not be diluted as a result of the Reorganizations. The Target Trust Board has also determined that the Reorganizations will not have a material adverse effect on the shareholders of each share class of the Target Funds. WE ARE NOT ASKING FOR A PROXY AND YOU ARE REQUESTED NOT TO SEND US A PROXY Each Target Fund and its corresponding Acquiring Fund pursue identical investment objectives and employ substantially similar investment strategies to achieve their respective investment objectives. The investment objective of the Disciplined Volatility Target Fund and the Disciplined Volatility Acquiring Fund is to seek to provide risk-adjusted total return. The investment objective of the Dynamic Target Fund and the Dynamic Acquiring Fund is to seek to provide total return. For more information on each Fund’s investment strategies, see “Summary—Investment Objectives, Investment Processes, Principal Investment Strategies and Other Strategies” below. Each Target Fund w […] posure to such securities or to one or more market risk factors associated with such securities. Each Fund seeks to achieve its investment objective by investing in 5 both equity and fixed-income securities, including money market securities and other short-term securities or instruments that each Fund management team believes may offer attractive risk-adjusted returns. Equity securities include common stock, preferred stock, American Depository Receipts, or securities or other instruments whose price is linked to the value of common stock. The combination of equity securities will be varied from time to time both with respect to types of securities and markets in response to changing market and economic trends. Each Fund may also purchase convertible securities. Each Fund may invest in the securities of companies of any market capitalization. Each Fund may also invest in Real Estate Investment Trusts. Each Fund seeks to provide risk-adjusted total return while managing volatility levels by using a systematic, quantitative model-based approach. Generally, each Fund seeks diversification across markets, industries and issuers as one of its strategies to reduce volatility. Each Fund management may consider a variety of factors, such as, without limitation, valuation, the relative opportunity for capital appreciation, quality and sentiment. Each Fund may invest in developed and emerging markets, including frontier markets. This flexibility allows each Fund management to look for investments in markets around the world that it believes will provide the best relative asset allocation to meet the Fund’s objective. In pursuing its investment objective, each Fund may utilize short positions. Each Fund expects to implement short positions through short sales of any instrument that the Fund may purchase for investment or by using options, swaps, futures, forwards, contracts for difference or other derivative instruments. With respect to each Fund’s fixed-income investments, the Fund may invest in all types of debt securities, including, but not limited to, U.S. and foreign government bonds, corporate bonds and convertible bonds, structured notes, credit-linked notes, loan assignments and participations, mortgage- and ass\n"

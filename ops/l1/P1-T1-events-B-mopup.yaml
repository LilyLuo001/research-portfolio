ows of\n   the Target/Acquiring fund table, a 4-fund filing yields 4 objects}, ... ]}\n  or the no_event object above.\nEach event object:\n  fund_name        target mutual fund's full name (from excerpt)\n  family           fund family/trust (from excerpt)\n  mutual_fund_ticker / etf_ticker\n                   a single 2-6 char UPPERCASE symbol from the excerpt, else \"NA\".\n                   NEVER a fund name. Multiple class tickers → \"NA\" and list them in evidence.\n  announce_date    YYYY-MM-DD only. Board-approval date if stated; else the document's own\n                   date; else the filed date. Vague (\"May 2020\",\"Q4 2026\") → \"NA\".\n  date_basis       \"board\" | \"document\" | \"filed\" | \"NA\"\n  effective_date   YYYY-MM-DD only; the stated closing/completion date. Vague → \"NA\".\n  asset_class      equity_US / equity_intl / fixed_income / other — ONLY if locatable in the\n                   excerpt (bond/muni/high-yield/MBS→fixed_income; International/EM/Asia→\n                   equity_intl; explicit US equity→equity_US; managed-futures/multi-asset/\n                   long-short→other). Name alone insufficient → \"NA\".\n  AUM_at_conversion_USD  number from excerpt or \"NA\"\n  source_accession copy from the 文件 line\n  confidence       H = fund identity + (announce or effective) with explicit basis;\n                   M = identity clear, dates partly missing/document-dated;\n                   L = identity inferred from title only\n  evidence         ≤25-word quote fragment supporting the verdict (for events: the words\n                   showing the acquirer is an ETF; for no_event: the words showing why not)\nNEED_HUMAN only when TWO date statements INSIDE THIS ONE EXCERPT contradict for the same\nfund: {\"NEED_HUMAN\": true, \"quotes\": [\"...\", \"...\"]}. Different filings never contradict.\nNever fill any field from memory — excerpt-locatable or \"NA\".\n\nSELF-CHECK before emitting (do this, don't print it): every input item id appears exactly\nonce in your answer map (count them); every event object quotes ETF-acquirer evidence;\nevery date matches ^\\d{4}-\\d{2}-\\d{2}$ or is \"NA\"; no ticker field contains a space.】\n文件: 0001193125-24-162714 (form 497, filed 2024-06-17, Perpetual Americas Funds Trust  (CIK 0001830437))\nsource_url: https://www.sec.gov/Archives/edgar/data/1830437/000119312524162714/d852826d497.htm\n节选:\n497 1 d852826d497.htm 497 497 Table of Contents Filed pursuant to Rule 497(b) under the Securities Act of 1933 File No. 333-279441 June 17, 2024 Dear Shareholder: I am writing to inform you about an upcoming special meeting (the “Meeting”) of the shareholders of the following funds, each a series of The Advisors’ Inner Circle Fund III (“AIC”): • Barrow Hanley Concentrated Emerging Markets ESG Opportunities Fund; • Barrow Hanley Total Return Bond Fund; • Barrow Hanley Credit Opportunities Fund; • Barrow Hanley Floating Rate Fund; • Barrow Hanley US Value Opportunities Fund; • Barrow Hanley Emerging Markets Value Fund; and • Barrow Hanley International Value Fund (each, a “Barrow Hanley Fund” and collectively, the “Barrow Hanley Funds”). The Meeting is being held to seek shareholder approval of the following proposals (each, a “Proposal,” and collectively, the “Proposals”) discussed below and in the accompanying Proxy Statement/Prospectus: PROPOSALS: To approve the Agreement and Plan of Reorganization in substantially the form presented with respect to each Barrow Hanley Fund (the “Plan”), which provides for: (i) the acquisition by Perpetual Americas Funds Trust, a Massachusetts busi […] eved through and following the Reorganizations. With respect to the Target Total Return Bond Fund, Perpetual-PGIA has contractually agreed to waive certain fees and reimburse certain expenses to the extent necessary to keep total annual fund operating expenses for Class I shares from exceeding 0.35% of the Fund’s daily net assets. PAFS proposes to continue these fee waivers and/or expense reimbursements for Institutional Class shares of the Acquiring Total Return Bond Fund through at least February 1, 2026. As such, the expense ratio of the Acquiring Total Return Bond Fund after fee waivers and/or expense reimbursements will be the same as that of the Target Total Return Bond Fund. 1 Class Y Shares of the Barrow Hanley Fund previously were converted to Class I Shares, and former shareholders of Class Y Shares of the Barrow Hanley Fund will receive Institutional Class Shares of the corresponding Acquiring Fund. 2 PAFS is the business name under which JOHCM (USA) Inc subcontracts portfolio management services to affiliated investment advisers to act in a sub-adviser capacity. Table of Contents The Reorganizations are being proposed following the acquisition of Pendal Group Limited, the previous parent company of PAFS, by Perpetual Limited, the ultimate parent company of Perpetual-PGIA and Barrow Hanley. PAFS, Perpetual-PGIA, and Barrow Hanley, each now a subsidiary of Perpetual Limited following that acquisition, believe that the Reorganizations would benefit shareholders in a number of ways. PAFS, Perpetual-PGIA and Barrow Hanley expect that shareholders will experience lower expense ratios from certain economies of scale generated primarily through efficiencies in operational management and oversight, compliance oversight, sponsorship and governance matters, favorable service provider relationships, as well as enhanced distribution capabilities that stem from the Acquiring Funds being housed in the same mutual fund trust as other U.S. mutual funds advised by PAFS, and managed by other affiliates owned by Perpetual Limited, both through and following the Reorganizations. PAFS, Perpetual-PGIA, Barrow Hanley, and their parent company Perpetual Limited, also believe that the proposed Reorganizations will provide op […] th that of other funds of the Acquiring Trust. The share purchase, redemption, and exchange procedures of the Acquiring Funds are similar to those of the Target Funds, except for differences in the applicable class eligibility requirements (e.g., different investment minimums) and distribution and shareholder fees, and the Target Trust does not anticipate any changes in the availability of the Funds on existing distribution platforms as a result of the Reorganizations. Unlike the Target Funds, the Acquiring Funds do not impose subsequent investment minimums. The Target Funds previously offered Class Y shares, which were authorized to charge a maximum asset based shareholder servicing fee of 0.15%. The Target Funds’ Class Y shares have been converted into Class I shares. Like the Target Funds’ Class I shares, the Acquiring Funds’ Institutional Class shares do not bear a distribution and service fee adopted under Rule 12b-1 of the 1940 Act (a “12b-1 Fee”) or a separate shareholder servicing fee. The Acquiring Funds’ Institutional Class shares are, however, authorized to bear expenses for Sub-Transfer Agency Services, as defined below under “Distribution Plans and Service Plans.” How do I vote my shares? You are entitled to one vote for each whole share, and a proportionate fractional vote for each fractional share, that you own of the Target Funds as of June 7, 2024. Although you may attend the Meeting and vote in person, you do not have to. You can vote your shares by completing and signing the enclosed Proxy Card and mailing it in the enclosed postage-paid envelope. You may also vote by calling the toll-free number printed on your Proxy Card or by Internet by going to the website printed on your Proxy Card. In order to record your vote on time, the Proxy Solicitor, EQ Fund Solutions, requests that shareholders holding Target Fund shares through financial advisers and intermediaries return their vote at least one day before the Meeting. Shareholders holding Target Fund shares directly with the Funds can vote online or by phone up to the time of the Meeting. On what proposals am I being asked to vote? As the Target Funds Shareholder, you are being asked to vote on the approval of the Plan. The Plan provides for:  […] arrow Hanley Credit Opportunities Fund Barrow Hanley Credit Opportunities Fund 3 Barrow Hanley Floating Rate Fund Barrow Hanley Floating Rate Fund 4 Barrow Hanley US Value Opportunities Fund Barrow Hanley US Value Opportunities Fund 5 Barrow Hanley Emerging Markets Value Fund Barrow Hanley Emerging Markets Value Fund 6 Barrow Hanley International Value Fund Barrow Hanley International Value Fund 7 Target Fund Share Classes Corresponding Acquiring Fund Share Classes Class I Shares Institutional Class Shares Each of the Target Funds currently offers Class I shares. Previously, the Target Emerging Markets Value Fund and Target International Value Fund also offered Class Y shares. However, Class Y shares of each of those Target Funds have been converted to Class I shares, and former shareholders of Class Y shares will receive Institutional Class shares of the corresponding Acquiring Fund. The Acquiring Funds currently offer Institutional Class shares and have registered Advisor Class, Investor Class and Class Z shares. In connection with the Reorganizations, Shareholders of each Target Fund’s Class I shares will receive Institutional Class shares of the corresponding Acquiring Fund, in each case having a total dollar value equal to the total dollar value of the Class I shares such shareholder held in the corresponding Target Fund immediately prior to the effectiveness of the Reorganizations as determined pursuant to the Plan. Target Fund Shareholders who do not wish to have their Target Funds Shares exchanged for Acquiring Fund Shares as part of a Reorganization should redeem their shares prior to the completion of a Reorganization. Such Target Fund Shareholders will not be charged a redemption fee for redeeming their shares. If you redeem your shares, you generally will recognize a taxable gain or loss for U.S. federal income tax purposes based on the difference between your tax basis in the shares and the amount you receive for them upon redemption. If, instead, you receive Acquiring Fund Shares in exchange for your Target Funds Shares as part of a Reorganization, you are not expected to recognize any taxable gain or loss for U.S. federal income tax purposes on such exchange. For more information about the tax co […] ould not change as a result of the Reorganizations. How do the fees of the Acquiring Funds compare to those of the Target Funds? Shareholders of the Target Funds can expect to experience the same management fees following the Reorganizations. As a result of the proposed Reorganizations and before accounting for any fee waivers or expense reimbursements, expenses as a percentage of net assets for Institutional Class shares of each Acquiring Fund will be lower than expenses as a percent of net assets for Class I shares of the corresponding Target Fund. After any applicable expense waivers and reimbursements, shareholders of Class I shares of the Target Funds, including former holders of Class Y shares of Target Fund whose Class Y shares were converted into Class I shares, other than shareholders of the Target Total Return Bond Fund, can expect to experience lower net total operating expenses as a percentage of average daily net assets as shareholders of the corresponding Institutional Class of the Acquiring Funds after the Reorganizations. With respect to the Target Total Return Bond Fund, Perpetual-PGIA has contractually agreed to waive certain fees and reimburse certain expenses to the extent necessary to keep total annual fund operating expenses for Class I shares from exceeding 0.35% of the Fund’s average daily net assets. PAFS proposes to continue the fee waivers and/or expense reimbursements for Institutional Class shares of the Acquiring Funds through at least February 1, 2026. The investment advisory fee, as a percentage of net assets, of each Acquiring Fund will be the same as the investment advisory fee of its corresponding Target Fund. The Target Funds’ Class Y shares were authorized to charge a maximum asset based shareholder servicing fee of 0.15%. Like the Target Funds’ Class I shares, the Acquiring Funds’ Institutional Class shares do not bear a 12b-1 Fee or a shareholder servicing fee. The Acquiring Funds’ Institutional Class shares are, however, authorized to bear expenses for Sub-Transfer Agency Services, as defined below under “Distribution Plans and Service Plans.” For more details, please see “Comparison of Fee Tables” and “Comparison of Investment Advisers and Other Service Providers” below.\n"

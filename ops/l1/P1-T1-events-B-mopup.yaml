ows of\n   the Target/Acquiring fund table, a 4-fund filing yields 4 objects}, ... ]}\n  or the no_event object above.\nEach event object:\n  fund_name        target mutual fund's full name (from excerpt)\n  family           fund family/trust (from excerpt)\n  mutual_fund_ticker / etf_ticker\n                   a single 2-6 char UPPERCASE symbol from the excerpt, else \"NA\".\n                   NEVER a fund name. Multiple class tickers → \"NA\" and list them in evidence.\n  announce_date    YYYY-MM-DD only. Board-approval date if stated; else the document's own\n                   date; else the filed date. Vague (\"May 2020\",\"Q4 2026\") → \"NA\".\n  date_basis       \"board\" | \"document\" | \"filed\" | \"NA\"\n  effective_date   YYYY-MM-DD only; the stated closing/completion date. Vague → \"NA\".\n  asset_class      equity_US / equity_intl / fixed_income / other — ONLY if locatable in the\n                   excerpt (bond/muni/high-yield/MBS→fixed_income; International/EM/Asia→\n                   equity_intl; explicit US equity→equity_US; managed-futures/multi-asset/\n                   long-short→other). Name alone insufficient → \"NA\".\n  AUM_at_conversion_USD  number from excerpt or \"NA\"\n  source_accession copy from the 文件 line\n  confidence       H = fund identity + (announce or effective) with explicit basis;\n                   M = identity clear, dates partly missing/document-dated;\n                   L = identity inferred from title only\n  evidence         ≤25-word quote fragment supporting the verdict (for events: the words\n                   showing the acquirer is an ETF; for no_event: the words showing why not)\nNEED_HUMAN only when TWO date statements INSIDE THIS ONE EXCERPT contradict for the same\nfund: {\"NEED_HUMAN\": true, \"quotes\": [\"...\", \"...\"]}. Different filings never contradict.\nNever fill any field from memory — excerpt-locatable or \"NA\".\n\nSELF-CHECK before emitting (do this, don't print it): every input item id appears exactly\nonce in your answer map (count them); every event object quotes ETF-acquirer evidence;\nevery date matches ^\\d{4}-\\d{2}-\\d{2}$ or is \"NA\"; no ticker field contains a space.】\n文件: 0001398344-22-010009 (form 497, filed 2022-05-18, Investment Managers Series Trust II  (CIK 0001587982))\nsource_url: https://www.sec.gov/Archives/edgar/data/1587982/000139834422010009/fp0076277_497.htm\n节选:\n497 1 fp0076277_497.htm AAF First Priority CLO Bond ETF May 18, 2022 Dear Valued Shareholders: A Special Meeting of Shareholders of the AAF First Priority CLO Bond ETF (the “Target Fund”) series of Listed Funds Trust (the “Trust”) has been scheduled for June 21, 2022 (the “Special Meeting”) and will be held at the offices of Listed Funds Trust, 615 East Michigan Street, Milwaukee, Wisconsin 53202. Shareholders of the Target Fund are being asked to approve an Agreement and Plan of Reorganization (the “Plan”) pursuant to which the Target Fund would reorganize into the AXS First Priority CLO Bond ETF, a newly created series (the “Acquiring Fund”) of Investment Managers Series Trust II (“IMST II”). The Plan will provide for the transfer of all of the assets of the Target Fund to the Acquiring Fund in exchange for shares of the Acquiring Fund and the assumption of all of the liabilities of the Target Fund by the Acquiring Fund, and the distribution of the Acquiring Fund’s shares received by the Target Fund to its shareholders in complete liquidation of the Target Fund (the “Reorganization”). On February 3, 2022, AXS Investments LLC (“AXS”), the investment advisor of the Acquiring Fund,  […] ING COMMISSION HAVE NOT APPROVED OR DISAPPROVED THESE SECURITIES NOR HAVE THEY PASSED ON THE ACCURACY OR ADEQUACY OF THIS COMBINED PROXY STATEMENT AND PROSPECTUS. ANY REPRESENTATION TO THE CONTRARY IS A CRIMINAL OFFENSE. COMBINED PROXY STATEMENT AND PROSPECTUS May 18, 2022 FOR THE REORGANIZATION OF AAF First Priority CLO Bond ETF, a series of Listed Funds Trust 615 East Michigan Street Milwaukee, Wisconsin 53202 (800) 617-0004 Into AXS First Priority CLO Bond ETF, a series of Investment Managers Series Trust II 235 W. Galena Street Milwaukee, Wisconsin 53212 (866) 984-2510 PROXY STATEMENT/PROSPECTUS May 18, 2022 This Proxy Statement/Prospectus is being furnished to shareholders of the AAF First Priority CLO Bond ETF (the “Target Fund”), an exchange-traded fund organized as a separate series of Listed Funds Trust, an open-end management investment company (the “Trust”), in connection with a Special Meeting of Shareholders (the “Meeting”) called by the Board of Trustees of the Trust (the “Board”), on behalf of the Target Fund, to be held at the offices of the Trust, 615 East Michigan Street, Milwaukee, Wisconsin 53202, on June 21, 2022 at 1:00 p.m. Central time, as may be adjourned or postponed, to consider the proposal listed below, and discussed in greater detail elsewhere in this Proxy Statement/Prospectus. The Target Fund and AXS First Priority CLO Bond ETF (the “Acquiring Fund”), a newly formed exchange-traded fund organized as a separate series of Investment Managers Series Trust II, an open-end management investment company (“IMST II”), are referred to herein collectively as the “Funds” and each is referred to herein individually as a “Fund.” This Proxy Statement/Prospectus explains concisely what you should know before voting on the proposal described in this Proxy Statement/Prospectus. Please read it carefully and keep it for future reference. At the Meeting, the shareholders of the Target Fund will be asked to approve the proposal, as described below (the “Proposal”): 11 1. To approve an Agreement and Plan of Reorganization (the “Plan”) by and between the Trust, on behalf of the Target Fund, and IMST II, on behalf of the Acquiring Fund, pursuant to which the Target Fund would (i) transfer all of its assets to the Acquiring Fund in exchange solely for newly issued shares of the Acquiring Fund and the Acquiring Fund’s assumption of all of the liabilities of the Target Fund and (ii) immediately distribute such newly issued shares of the Acquiring Fund to the Target Fund shareholders (collectively, the “Reorganization”). 2. The transaction of such other business as may properly come before the Special Meeting or any continuations after an adjournment thereof. A copy of the Plan is attached as Exhibit A . This Proxy Statement/Prospectus will be mailed on or about May 20, 2022, to shareholders of record of the Target Fund as of April 22, 2022 (the “Record Date”). At  […] orate debt hedge funds and CLOs. Prior to joining Alternative Access, Mr. Coppa spent 14 years as Managing Director at Marathon Asset Management (“MAM”). He has experience in value and event-driven distressed investing, dynamic hedging and portfolio management, corporate financial analysis, and macro-economic research. From 2009 to 2017, Mr. Coppa was a portfolio manager for MAM’s distressed and credit opportunities fund. He has invested in dozens of special credit opportunities throughout his career, in sectors including, but not limited to, airlines, telecommunications, metals and mining, energy and power, and a variety of sovereigns. Prior to 2009, Mr. Coppa was an analyst and trader for MAM’s credit opportunities, structured credit and convertible arbitrage funds. He began his career as a credit analyst at Delaware Investments. Mr. Coppa received a B.S. in economics from The Wharton School at the University of Pennsylvania. Investment Advisory and Sub-Advisory Agreements Pursuant to the Investment Advisory Agreement between Alternative Access and the Trust, on behalf of the Target Fund, Alternative Access currently receives an annual unitary management fee equal to 0.25% of the Target Fund’s average daily net assets. In connection with the unitary management fee Alternative Access receives from the Target Fund, Alternative Access has agreed to pay all expenses incurred by the Target Fund except for interest charges on any borrowings, dividends and other expenses on securities sold short, taxes, brokerage commissions and other expenses incurred in placing orders for the purchase and sale of securities and other investment instruments, acquired fund fees and expenses, accrued deferred tax liability, extraordinary expenses, distribution fees and expenses paid by the Target Fund under any distribution plan adopted pursuant to Rule 12b-1 under the 1940 Act, and the unified management fee payable to Alternative Access. Alternative Access is not liable to the Trust under the terms of the Investment Advisory Agreement for any error of judgment or mistake of law or for any loss suffered by Alternative Access or the Trust in connection with the performance of the Investment Advisory Agreement, except a loss resulting […] ook-entry ownership of the Acquiring Fund shares. 30 The direct expenses incurred in connection with the Reorganization (whether or not the Reorganization is consummated) will be borne by AXS, UMB Fund Services, Inc. (“UMBFS”) and Mutual Fund Administration, LLC (“MFAC”). Direct Reorganization related expenses include, without limitation: (a) expenses associated with the preparation and filing of this Proxy Statement/Prospectus and related proxy materials; (b) postage; (c) printing; (d) accounting fees; (e) audit and legal fees, including fees of the counsel to the Trust, counsel to the Independent Trustees of the Trust, counsel to IMST II, and counsel to the Independent Trustees of the IMST II; (f) solicitation costs; (g) service provider conversion fees; and (g) any costs associated with meetings of each Fund’s Board of Trustees relating to the transactions contemplated herein. It is estimated that the amount of direct expenses to be incurred by AXS, UMBFS and MFAC will be approximately $45,000. The Plan may be terminated and the Reorganization abandoned due to (i) mutual agreement of IMST II, on behalf of the Acquiring Fund, and the Trust, on behalf of the Target Fund; (ii) a breach by the non-terminating party of any representation, or warranty, or agreement to be performed at or before the closing of the reorganization, if not cured within 30 days of the breach or, in the sole discretion of the non-breaching party’s Board of Trustees, prior to the closing; (iii) a condition precedent to the obligations of the terminating party that has not been met or waived and it reasonably appears that it will not or cannot be met; or (iv) a determination by the Board of Trustees of either the Target Fund or the Acquiring Fund that the consummation of the transactions contemplated in the Plan is not in the best interests of its respective Fund involved in the transactions contemplated by the Plan. The Plan will also be terminated and the Reorganization contemplated thereby abandoned if the opinion that the Reorganization will constitute a “reorganization” within the meaning of Section 368(a) of the Code for federal income tax purposes is not delivered. The delivery of this opinion cannot be waived. If the Proposal to ap […]  redemptions of Creation Units to cover the costs incurred by the Fund in effecting trades. Given this structure, the IMST II Board determined that it is unlikely that trading due to arbitrage opportunities or market timing by shareholders would result in negative impact to the Acquiring Fund or its shareholders. In addition, frequent trading of shares of the Acquiring Fund done by Authorized Participants and arbitrageurs is critical to ensuring that the market price remains at or close to NAV. Description of the Shares to be Issued by the Acquiring Fund The Acquiring Fund shares, when issued in the Reorganization, will be validly issued, fully paid and non-assessable, will be transferable without restriction and will have no preemptive or conversion rights. Individual shares of the Acquiring Fund may only be bought and sold in the secondary market through a broker-dealer at market price. Federal Income Tax Matters The following discussion is very general and does not address investors subject to special rules, such as investors who hold Acquiring Fund shares through an IRA, 401(k) plan or other tax-advantaged account. The Reorganization SAI contains further information about taxes. Because each shareholder’s circumstances are different and special tax rules may apply, you should consult your tax advisor about your investment in the Acquiring Fund. You will generally have to pay federal income taxes, as well as any state or local taxes, on distributions received from the Acquiring Fund, whether paid in cash or reinvested in additional shares. If you sell Acquiring Fund shares, it is generally considered a taxable event. Distributions of net investment income, other than distributions the Acquiring Fund reports as “qualified dividend income,” are taxable for federal income tax purposes at ordinary income tax rates. Distributions of net short-term capital gains are also generally taxable at ordinary income tax rates. Distributions from the Acquiring Fund’s net capital gain (i.e., the excess of its net long-term capital gain over its net short-term capital loss) are taxable for federal income tax purposes as long-term capital gain, regardless of how long the shareholder has held Acquiring Fund shares. 41 Dividends\n"

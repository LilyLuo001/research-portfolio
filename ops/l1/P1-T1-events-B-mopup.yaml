ows of\n   the Target/Acquiring fund table, a 4-fund filing yields 4 objects}, ... ]}\n  or the no_event object above.\nEach event object:\n  fund_name        target mutual fund's full name (from excerpt)\n  family           fund family/trust (from excerpt)\n  mutual_fund_ticker / etf_ticker\n                   a single 2-6 char UPPERCASE symbol from the excerpt, else \"NA\".\n                   NEVER a fund name. Multiple class tickers → \"NA\" and list them in evidence.\n  announce_date    YYYY-MM-DD only. Board-approval date if stated; else the document's own\n                   date; else the filed date. Vague (\"May 2020\",\"Q4 2026\") → \"NA\".\n  date_basis       \"board\" | \"document\" | \"filed\" | \"NA\"\n  effective_date   YYYY-MM-DD only; the stated closing/completion date. Vague → \"NA\".\n  asset_class      equity_US / equity_intl / fixed_income / other — ONLY if locatable in the\n                   excerpt (bond/muni/high-yield/MBS→fixed_income; International/EM/Asia→\n                   equity_intl; explicit US equity→equity_US; managed-futures/multi-asset/\n                   long-short→other). Name alone insufficient → \"NA\".\n  AUM_at_conversion_USD  number from excerpt or \"NA\"\n  source_accession copy from the 文件 line\n  confidence       H = fund identity + (announce or effective) with explicit basis;\n                   M = identity clear, dates partly missing/document-dated;\n                   L = identity inferred from title only\n  evidence         ≤25-word quote fragment supporting the verdict (for events: the words\n                   showing the acquirer is an ETF; for no_event: the words showing why not)\nNEED_HUMAN only when TWO date statements INSIDE THIS ONE EXCERPT contradict for the same\nfund: {\"NEED_HUMAN\": true, \"quotes\": [\"...\", \"...\"]}. Different filings never contradict.\nNever fill any field from memory — excerpt-locatable or \"NA\".\n\nSELF-CHECK before emitting (do this, don't print it): every input item id appears exactly\nonce in your answer map (count them); every event object quotes ETF-acquirer evidence;\nevery date matches ^\\d{4}-\\d{2}-\\d{2}$ or is \"NA\"; no ticker field contains a space.】\n文件: 0001398344-26-003172 (form 497, filed 2026-02-17, STERLING CAPITAL FUNDS  (CIK 0000889284))\nsource_url: https://www.sec.gov/Archives/edgar/data/889284/000139834426003172/fp0097612-1_497.htm\n节选:\n497 1 fp0097612-1_497.htm Filed pursuant to Rule 497(c) File No. 333-292740 CAPITOL SERIES TRUST Sterling Capital Enhanced Core Bond ETF 225 Pictoria Drive, Suite 450 Cincinnati, Ohio 45246 (513) 587-3400 February 14, 2026 Dear Valued Shareholder: A Special Meeting of Shareholders of the Sterling Capital Enhanced Core Bond ETF (the “Target Fund”), a series of Capitol Series Trust (“CST”), will be held at the offices of Ultimus Fund Solutions, the Target Fund’s Administrator located at 225 Pictoria Drive, Suite 450 , Cincinnati, Ohio 45246, on March 20, 2026 at 11:00 a.m. Eastern time (the “Special Meeting”). The Special Meeting has been called to vote on three important proposals relating to the Target Fund: 1. To approve an Agreement and Plan of Reorganization (the “Plan”) to reorganize (the “Reorganization”) the Target Fund into the Sterling Capital Enhanced Core Bond ETF, a new series of Sterling Capital Funds (the “Acquiring Fund”, and together with the Target Fund, the “Funds”). Importantly, approval of the Plan would provide for substantial continuity of the Target Fund’s current operations. As discussed in the attached Proxy Statement/Prospectus, both Funds have the same inv […] rumentality of the U.S. government may not be. No assurance can be given that the U.S. government would provide financial support to its agencies and instrumentalities if not required to do so by law. Variable and Floating Rate Instrument Risk: Variable and floating rate instruments are generally less sensitive to interest rate changes than other fixed rate instruments; however, the value of floating rate instruments may decline if their interest rates do not rise as quickly, or as much, as general interest rates. The following risks are applicable to the Target Fund. These risks also generally apply to the Acquiring Fund but do not represent a material change in risks between the Target Fund and the Acquiring Fund. Cash Transactions Risk: Exchange-Traded Funds (ETFs) are known for their tax efficiency, which is created primarily by their unique “in-kind” redemption process. In this process, authorized participants exchange ETF shares for a basket of the fund’s underlying securities, allowing the ETF to offload appreciated assets without triggering taxable events for its shareholders. This process helps minimize capital gains distributions, enhancing tax efficiency. However, to the extent that the Fund effects its creation and redemptions in cash, as it intends regularly to do, the Fund may need to sell securities to generate the necessary funds for a redemption. Such sales may result in the Fund realizing capital gains, which under applicable tax regulations must be distributed to all shareholders, leading to potential tax liabilities for shareholders that would not have been incurred had the redemptions been in-kind. Such cash redemptions may also result in the Fund incurring brokerage costs that might not have been incurred if the purchase or redemption of creation units were effected in kind, and the imposition of such costs may decrease the Fund’s net asset value. The use of cash creations and redemptions may also cause the Fund’s shares to trade in the market at wider bid-ask spreads or greater premiums or discounts to the Fund’s NAV. Foreign Currency Transaction Risk: Funds that invest directly in foreign currencies and in securities that trade in, or receive revenues in, foreign currencies are subject t […]  may have the effect of changing the provisions for determining the number of shares of the Acquiring Fund to be issued to the shareholders of the Target Fund to the detriment of such shareholders without their further approval. In addition, the Plan may be terminated at any time prior to the closing of the Reorganization by the mutual agreement of the Sterling Trust, on behalf of the Acquiring Fund, and CST, on behalf of the Target Fund. 2. Description of the Acquiring Fund’s Shares The Acquiring Fund’s shares issued to the shareholders of the Target Fund pursuant to the Reorganization will be duly authorized, validly issued, fully paid and non-assessable when issued, will be transferable without restriction and will have no preemptive or conversion rights. 3. Board Considerations Relating to the Reorganization The CST Board considered and discussed the Reorganization with representatives of the Sterling Trust and Sterling Capital at a meeting held on October 23, 2025. The CST Board, based on these considerations and the recommendation of Sterling Capital, approved the Reorganization and the solicitation of shareholders of the Target Fund to vote on the Plan. In considering the Reorganization, the CST Board and the Independent Trustees reviewed information provided by the Sterling Trust and Sterling Capital in response to an information request addressing, among other information, things, the nature and structure of the Reorganization, the proposed impact and benefits to shareholders, any changes in portfolio strategy, management, or design, and the tax impact of the Reorganization. At a meeting on October 23, 2025, Sterling Capital presented its reasoning for the Reorganization of the Target Fund into the Acquiring Fund and recommended that the CST Board approve the Reorganization. Among the reasons provided and factors considered were: 26 ● that the Reorganization was recommended by Sterling Capital, the current adviser to the Target Fund and the proposed adviser to the Acquiring Fund; ● representations made by Sterling Capital concerning potential economies of scale and other benefits of having all of the SEC registered funds advised by Sterling Capital operate as part of a single fund family with the same  […] , fully paid and non-assessable by the Capitol Trust and have been offered and sold in any state, territory or the District of Columbia in compliance in all material respects with applicable registration requirements of all applicable federal and state securities laws. All of the issued and outstanding Selling Fund Shares of the Selling Fund will, at the time of the Closing Date, be held by the persons and in the amounts set forth in the records of the Selling Fund’s transfer agent, on behalf of the Selling Fund, as provided in paragraph 3.3. The Selling Fund does not have outstanding any options, warrants, or other rights to subscribe for or purchase any of the Selling Fund Shares of the Selling Fund, nor is there outstanding any security convertible into any of the Selling Fund Shares of the Selling Fund. (l) At the Closing Date, the Capitol Trust, on behalf of the Selling Fund, will have good and marketable title to the Assets and full right, power, and authority to sell, assign, convey, transfer, and deliver such assets hereunder free any liens or other encumbrances, except as previously disclosed to the Acquiring Fund, and, upon delivery and payment for such assets, the Sterling Funds, on behalf of the Acquiring Fund, will, to the knowledge of the Capitol Trust, acquire good and marketable title thereto, subject to no restrictions on the full transfer thereof, including such restrictions as might arise under the 1933 Act. (m) The Selling Fund has no known Liabilities of a material nature, contingent or otherwise, other than those shown as belonging to it on its statement of assets and liabilities as of the Valuation Date, those incurred pursuant to this Agreement and those incurred in the ordinary course of the Target Fund’s business, as an investment company, since such date. (n) The books and records of or relating to the Selling Fund (including all books and records required to be maintained under the 1940 Act and the Code and the rules and regulations under the 1940 Act and the Code) made available to the Sterling Funds and/or its counsel are true and correct in all material respects and contain no material omissions with respect to the business and operations of the Capitol Trust and the Selling Fund. […]  Capitol Trust, on behalf of the Selling Fund, to Ropes & Gray, LLP pursuant to paragraph 8.5 hereof will not on the Closing Date contain any untrue statement of a material fact or omit to state a material fact necessary to make the statements therein not misleading. (u) There are no certificates representing ownership of Selling Fund Shares currently outstanding. (v) No consent, approval, authorization, or order of any court or governmental authority is required for the consummation by the Capitol Trust, on behalf of the Selling Fund, of the transactions contemplated herein, except such as may be required under the 1933 Act, the 1934 Act, the 1940 Act, state securities laws and the Hart-Scott-Rodino Act. (w) Selling Fund does not own any “converted property” (as that term is defined in Treasury Regulation Section 1.337(d)-7(a)(1)) that is subject to the rules of Section 1374 of the Code as a consequence of the application of Section 337(d)(1) of the Code and Treasury Regulations thereunder. 4.2 REPRESENTATIONS OF THE ACQUIRING FUND. Except as has been fully disclosed to the Capitol Trust in Schedule 4.2 to this Agreement, the Sterling Funds, on behalf of the Acquiring Fund, represents and warrants to the Capitol Trust and the Selling Fund as follows: 64 (a) The Acquiring Fund is duly established as a separate investment series of the Sterling Funds, a Massachusetts business trust duly organized, validly existing, and in good standing under the laws of the Commonwealth of Massachusetts, with power under its Agreement and Declaration of Trust (the “Sterling Funds Declaration of Trust”), to own all of its assets and to carry on its business as being conducted as of the date hereof. The Sterling Funds is duly qualified to do business as a foreign trust in each jurisdiction in which the conduct of its business makes such qualified necessary except where the failure to so qualify would not have a material adverse effect on the condition (financial or otherwise), business, properties, net assets or results of operations of the Sterling Funds. The Sterling Funds has all necessary federal, state and local authorization to carry on its business as now being conducted and to fulfill the terms of this Agreement, except as\n"

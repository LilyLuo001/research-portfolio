xpenses of 0.25% of the Fund’s average daily net assets attributable to Class A shares, as described below under Distribution Fees . 39 Class C Shares Class C shares of the Funds, formerly known as Advisor Class shares, are sold at NAV without an initial sales charge. This means that 100% of your investment is placed into shares of the Funds. Class C shares of the Funds are not subject to a CDSC. The Funds have adopted a Distribution Plan, pursuant to which each Fund pays the Fund’s distributor an annual fee for distribution and shareholder servicing expenses of 1.00% of the Fund’s average daily net assets attributable to Class C shares, as described below under Distribution Fees . Automatic conversion of Class C shares Beginning January 2, 2021, (the “Effective Date”), Class C Shares will automatically convert to Class A Shares approximately eight years after the date of purchase. Class C shares purchased eight years prior to the Effective Date will be converted into Class A shares. After the Effective Date, all Class C shares of a Fund held in accounts directly with the Trust’s transfer agent will automatically convert to Class A shares of the same Fund on or about the first business day following the eight -year anniversary of purchase. After the Class C Conversion Date, all Class C shares of a Fund held through a financial intermediary (subject to the exceptions noted below) will automatically convert to Class A shares of the same Fund following the eight -year anniversary of purchase. Although the timing of this conversion may differ from the timing stated above, it is expected to occur the business day following the eight-year anniversary of purchase. Such conversions will be effected on the basis of the relative net asset values of the Class C and Class A shares involved in the conversion without any sales charge, fee or other charge in connection with such conversion. When Class C shares convert, any other Class C shares that were acquired by the shareholder
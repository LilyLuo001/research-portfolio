man High Income Bond Fund, Neuberger Berman Municipal Impact Fund (formerly, Neuberger Berman New York Municipal Income Fund), Neuberger Berman Short Duration High Income Fund, Neuberger Berman Strategic Income Fund and Neuberger Berman Unconstrained Bond Fund may pledge assets in connection with permitted borrowings. For purposes of the investment limitation on commodities, a Fund does not consider foreign currencies or forward contracts to be physical commodities. Also, this limitation does not prohibit a Fund from purchasing securities backed by physical commodities, including interests in exchange-traded investment trusts and other similar entities, or derivative instruments. Also, this limitation does not prohibit Neuberger Berman Municipal High Income Fund and Neuberger Berman Unconstrained Bond Fund from purchasing physical commodities. None of the foregoing limitations shall be construed to prevent a Fund from purchasing, holding or selling all or a portion of any issuance of sukuk or similarly structured investments. With respect to the fundamental policy relating to industry concentration set forth in (4) above, the 1940 Act does not define what constitutes “concentration” in an industry. The SEC staff has taken the position that investment of 25% or more of a fund’s total assets in one or more issuers conducting their principal activities in the same industry or group of industries constitutes concentration. It is possible that interpretations of concentration could change in the future. The policy in (4) above will be interpreted to refer to concentration as that term may be interpreted from time to time by the SEC, SEC staff or other relevant authority. The policy also will be interpreted to permit investment without limit in the following: securities of the U.S. government and its agencies or instrumentalities; securities of state, territory, possession or municipal governments and their authorities, agencies, instrumentalities or political subdivisions; securities of foreign governments; and repurchase agreements collateralized by any such obligatio […] other investments that provide 14 investment exposure to such debt securities. Although this is a non-fundamental policy, the Fund Trustees will not change this policy without at least 60 days’ notice to shareholders. 8. Investment by a Fund of Funds . If shares of a Fund are purchased by another fund in reliance on Section 12(d)(1)(G) of the 1940 Act, for so long as shares of the Fund are held by such fund, the Fund will not purchase securities of registered open-end investment companies or registered unit investment trusts in reliance on Section 12(d)(1)(F) or Section 12(d)(1)(G) of the 1940 Act. For purposes of a Fund’s non-fundamental policy to invest at least 80% of its net assets in debt securities or debt instruments, as applicable, convertible debt securities are considered to be debt. A Fund currently considers preferred securities and contingent convertible securities to be either debt or equity based on the recommendation of an independent third party. Senior Securities Section 18(f)(1) of the 1940 Act prohibits an open-end investment company from issuing any class of senior security, or selling any class of senior security of which it is the issuer, except that the investment company may borrow from a bank provided that immediately after any such borrowing there is asset coverage of at least 300% for all of its borrowings. The SEC has taken the position that certain instruments that create future obligations may be considered senior securities subject to provisions of the 1940 Act that limit the ability of investment companies to issue senior securities. Common examples include reverse repurchase agreements, short sales, futures and options positions, forward contracts and when-issued securities. However, the SEC has clarified that, if a fund segregates cash or liquid securities sufficient to cover such obligations or holds off-setting positions (or, 
ows of\n   the Target/Acquiring fund table, a 4-fund filing yields 4 objects}, ... ]}\n  or the no_event object above.\nEach event object:\n  fund_name        target mutual fund's full name (from excerpt)\n  family           fund family/trust (from excerpt)\n  mutual_fund_ticker / etf_ticker\n                   a single 2-6 char UPPERCASE symbol from the excerpt, else \"NA\".\n                   NEVER a fund name. Multiple class tickers → \"NA\" and list them in evidence.\n  announce_date    YYYY-MM-DD only. Board-approval date if stated; else the document's own\n                   date; else the filed date. Vague (\"May 2020\",\"Q4 2026\") → \"NA\".\n  date_basis       \"board\" | \"document\" | \"filed\" | \"NA\"\n  effective_date   YYYY-MM-DD only; the stated closing/completion date. Vague → \"NA\".\n  asset_class      equity_US / equity_intl / fixed_income / other — ONLY if locatable in the\n                   excerpt (bond/muni/high-yield/MBS→fixed_income; International/EM/Asia→\n                   equity_intl; explicit US equity→equity_US; managed-futures/multi-asset/\n                   long-short→other). Name alone insufficient → \"NA\".\n  AUM_at_conversion_USD  number from excerpt or \"NA\"\n  source_accession copy from the 文件 line\n  confidence       H = fund identity + (announce or effective) with explicit basis;\n                   M = identity clear, dates partly missing/document-dated;\n                   L = identity inferred from title only\n  evidence         ≤25-word quote fragment supporting the verdict (for events: the words\n                   showing the acquirer is an ETF; for no_event: the words showing why not)\nNEED_HUMAN only when TWO date statements INSIDE THIS ONE EXCERPT contradict for the same\nfund: {\"NEED_HUMAN\": true, \"quotes\": [\"...\", \"...\"]}. Different filings never contradict.\nNever fill any field from memory — excerpt-locatable or \"NA\".\n\nSELF-CHECK before emitting (do this, don't print it): every input item id appears exactly\nonce in your answer map (count them); every event object quotes ETF-acquirer evidence;\nevery date matches ^\\d{4}-\\d{2}-\\d{2}$ or is \"NA\"; no ticker field contains a space.】\n文件: 0001193125-23-138404 (form 497, filed 2023-05-08, AIM INVESTMENT FUNDS (INVESCO INVESTMENT FUNDS)  (CIK 0000826644))\nsource_url: https://www.sec.gov/Archives/edgar/data/826644/000119312523138404/d263707d497.htm\n节选:\n497 1 d263707d497.htm 497 497 May 8, 2023 Dear Shareholder: Invesco regularly conducts a review of its product line to sharpen its offerings to investors. A key goal of this effort is to reduce overlap and enhance efficiency across the product line for the benefit of the Invesco Funds’ shareholders and Invesco. In connection with this process, the Invesco Funds’ Board of Trustees (the “Board”) has approved a fund reorganization that will combine two Invesco Funds. Specifically, as described in the attached Information Statement/Prospectus, Invesco Emerging Markets Innovators Fund (the “Target Fund”) is proposed to reorganize with and into Invesco Developing Markets Fund (the “Acquiring Fund”). The reorganization is intended to: • combine Funds with the same portfolio management team and investment process, providing greater opportunity to accelerate growth as a singular offering; • reduce advisory fees and expenses; • reduce overlap in the product lineup; and • create scale in the resulting Fund. The Board of the Target Fund and the Acquiring Fund, including its independent trustees, believes that the reorganization in the Information Statement/Prospectus is in the best interest of […] ts if they are included in an MSCI emerging markets index or 15 excluded from an index that captures representation across developed market countries, classified as a developing or emerging market, or classified under a similar or corresponding classification, by organizations such as the World Bank and The International Monetary Fund, or have economies, industries and stock markets with similar characteristics as such countries. The Target Fund discloses as a principal strategy that it may also invest in frontier markets, which will count towards its 80% investment policy. The Acquiring Fund also counts frontier markets towards its 80% policy. Both Funds focus on common stocks, but also may invest in preferred stocks, depositary receipts, convertible securities, rights and warrants. Additionally, both Funds may invest directly in China A-shares (shares of companies based in mainland China that trade on the Shanghai Stock Exchange and the Shenzhen Stock Exchange), and the Acquiring Fund may also invest in China A-shares through a private investment vehicle (previously defined as the “Private Fund”). The Private Fund is a wholly owned and controlled subsidiary of the Acquiring Fund organized under the laws of Delaware. For operational efficiency and regulatory considerations, the Acquiring Fund may gain access to certain companies established or operating in, or with significant exposure to, the People’s Republic of China or other developing markets countries through an investment in the Private Fund. The Target Fund focuses on investments in securities of companies in emerging or developing markets that the Adviser believes are innovative in either, or a combination of, their products, services, processes, business models, management, use of technology, or approach to servicing geographic and consumer markets. The Acquiring Fund focuses on companies with above-average earnings growth. Both Funds may invest in equity and debt securities of U.S. companies, but currently do not expect to invest a significant amount of their assets in such securities. Both Funds may buy securities of issuers of any size, any market capitalization range and any industry or sector. However, the Acquiring Fund will invest in growth co […] both qualitative and quantitative environmental, social, and governance (“ESG”) factors as one component of its assessment of issuers eligible for investment, which are not necessarily determinative to an investment decision. Such factors may change over time, one or more factors may not be relevant with respect to all issuers eligible for investment and ESG considerations may not be applied to each issuer or investment. 16 Principal Risks. The table below describes the principal risks that may affect each Fund’s investment portfolio. Principal Risks Common to Both the Target Fund and Acquiring Fund Principal Risk Disclosed By the Acquiring Fund but not the Target Fund Principal Risks Disclosed By the Target Fund but not the Acquiring Fund Convertible Securities Risk Debt Securities Risk Depositary Receipts Risk Derivatives Risk Emerging Market Securities Risk/Frontier Market Risk Environmental, Social and Governance (ESG) Considerations Risk Foreign Securities Risk Geographic Focus Risk Growth Investing Risk Investing in Greater China Risk Investing in Stocks Risk Liquidity Risk Management Risk Market Risk Preferred Securities Risk Rights and Warrants Risk Rule 144A Securities and Other Exempt Securities Risk Sector Focus Risk Small- and Mid-Capitalization Companies Risk U.S. Government Obligations Risk Investing in the Private Fund Risk None The following sets forth a description of the principal risk of the Acquiring Fund that is not disclosed by the Target Fund. Investing in the Private Fund Risk. The Private Fund is not registered under the Investment Company Act of 1940. As an investor in the Private Fund, the Fund does not have all of the protections offered to investors by the Investment Company Act of 1940. However, the Private Fund is controlled by the Fund and managed by OppenheimerFunds, Inc. The Private Fund may invest substantially all of its assets in a limited number of issuers or a single issuer. To the extent that it does so, the Private Fund is more subject to the risks associated with and developments affecting such issuers than a fund that invests more widely. In addition, investments in the Private Fund will be deemed illiquid and therefore subject the Fund to liquidity risk. Repositioning […] of Subchapter M of the Code to maintain such qualification for the period beginning on the first day of its current taxable year and ending on the Closing Date. The Target Fund (including its predecessor fund, if any) has been eligible to compute its federal income tax under Section 852 of the Code. The Target Fund (including its E-5 predecessor fund, if any) has paid or made provision for the payment of any tax liability under Sections 852 or 4982 of the Code for any period ended on before the Closing Date. The Target Fund (including its predecessor fund, if any) has no earnings or profits accumulated with respect to any taxable year in which the provisions of Subchapter M of the Code did not apply to it. The Target Fund does not own any “converted property” (as that term is defined in Treasury Regulation Section 1.337(d)-7T(a)(2)) that is subject to the rules of Section 1374 of the Code as a consequence of the application of Section 337(d)(1) of the Code and the Treasury Regulations promulgated thereunder. In order to (i) ensure continued qualification of the Target Fund for treatment as a “regulated investment company” for tax purposes and (ii) eliminate any tax liability of the Target Fund arising by reason of undistributed investment company taxable income or net capital gain, the Target Fund , will declare on or prior to the Valuation Time on the Closing Date to the shareholders of the Target Fund a dividend or dividends that, together with all previous such dividends, shall have the effect of distributing (i) substantially all of its investment company taxable income (determined without regard to any deductions for dividends paid) and substantially all of its net capital gains (after reduction for any capital loss carryover), if any, for the period from the close of its last fiscal year to the Closing Time on the Closing Date; (ii) all of its investment company taxable income and net capital gains for its taxable year ended prior to the Closing Date to the extent not otherwise already distributed; and (iii) at least 90 percent of the excess, if any, of the Target Fund’s interest income excludible from gross income under Section 103(a) of the Code over its deductions disallowed under Sections 265 and 171(\n"

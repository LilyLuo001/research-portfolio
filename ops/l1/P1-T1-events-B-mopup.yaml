 at the rate prevailing in the foreign currency exchange market or through a forward foreign currency contract. The portfolio managers may also enter into forward contracts for the Fund if they have agreed to sell a security and want to “lock in” the price of that security, in terms of US dollars. Investors should be aware of the costs of currency conversion. The Fund will not use forward contracts for speculative purposes. Despite the ability to utilize foreign currency transactions as described above, the Fund does not currently intend to use such transactions often and may determine not to use foreign currency transactions at all. The Acquiring Fund may invest up to 20% of its net assets in securities of foreign issuers, which may include global depositary receipts (“GDRs”) and, without limitation, sponsored and unsponsored American depositary receipts (“ADRs”) that are actively traded in the United States, including issuers located or operating in emerging markets and frontier markets. The Acquiring Fund determines that a market is an emerging market if it is included in the MSCI Emerging Markets Index; the Acquiring Fund determines that a market is a frontier market if it is included in the MSCI Frontier Markets Index. To the extent the Acquiring Fund invests in securities denominated in a particular currency, it may invest in forward foreign currency exchange contracts to hedge currency risks associated with the investment. 24 The Target Fund may invest in REITs. In addition, the Acquiring Fund may invest in real estate investment trusts (“REITs”). REITs are corporations or trusts that invest primarily in fee or leasehold ownership of real estate, mortgages or shares issued by other REITs, and that receive favorable tax treatment provided they meet certain conditions, including the requirement that they distribut […] C is being sold in connection with the Reorganization, DMC, JSP and the Acquiring Trust will use all commercially reasonable efforts to ensure that for a period of at least three (3) years after the Closing, at least 75 per cent of the members of the Acquiring Fund Board are not interested persons of either DMC or JSP; and that for a period of at least two (2) years after the Closing, no undue burden is imposed on the Acquiring Fund or their shareholders. 40 COSTS OF REORGANIZATION The Reorganization costs, including any costs directly associated with preparing, filing, printing, and distributing to the shareholders of the Target Fund all materials relating to this Proxy Statement/Prospectus and soliciting shareholder votes, as well as the conversion costs associated with the Reorganization, will be borne by JSP and DMC. Neither the Target Fund nor the Acquiring Fund will bear any costs related to the Reorganization. The costs related to the Reorganization include, but are not limited to, costs associated with preparation, printing and distribution of the N-14 Registration Statement for the Reorganization (including the prospectus/proxy statement contained therein), legal fees, accounting fees, and expenses of soliciting Target Fund shareholders and holding shareholder meetings. U.S. FEDERAL INCOME TAX CONSIDERATIONS The following is a general summary of the material U.S. federal income tax considerations of the Reorganization and is based upon the current provisions of the Code, the existing U.S. Treasury regulations thereunder, current administrative rulings of the IRS and published judicial decisions, all of which are subject to change. These considerations are general in nature and individual shareholders should consult their own tax advisers as to the federal, state, local, and foreign tax considerations applicable to them and their individual circumstances. These same considerations generally do not apply to shareholders who hold their shares in tax-advantaged accounts. The Reorganization is intended to qualify as a “reorganization” under Section 368(a) of the Code. As a condition to the closing of the Reorganization, the Target Fund and the Acquiring Fund will receive an opinion from Ropes & Gray LLP sub […] ,348 Shares Outstanding – Class R 254,380 N/A -254,380 N/A Net Asset Value Per Share – Class R $24.55 N/A N/A N/A Net Assets – Class R $6,243,793 N/A $6,243,793 N/A Shares Outstanding – Class R6 176,843 N/A -176,843 N/A Net Asset Value Per Share – Class R $30.87 N/A N/A N/A Net Assets – Class R $5,458,921 N/A $(5,458,921) N/A Shares Outstanding –Investor Class N/A 3,541 14,577,501 14,581,042 Net Asset Value Per Share – Class I/Institutional Class N/A $13.80 N/A $13.80 Net Assets – Class I/Institutional Class N/A $48,850 $201,104,462 $201,153,312 Shares Outstanding –IS Class N/A 6,529,935 393,679 6,923,614 Net Asset Value Per Share – IS Class N/A $13.87 N/A $13.87 Net Assets – IS Class N/A $90,546,812 $5,458,921 $96,005,733 (1) Reflects the conversion of Target Fund Shares for Acquiring Fund Shares as a result of the Transaction DISSENTERS' RIGHTS If the Reorganization is approved at the Meeting, Target Fund shareholders will not have the right to dissent and obtain payment of the fair value of their shares because the exercise of dissenters’ rights is subject to the forward pricing requirements of Rule 22c-1 under the 1940 Act, which supersedes state law. 48 Shareholders of the Target Fund, however, have the right to redeem their shares at net asset value until the Closing Date of the Reorganization. After the Reorganization, Target Fund shareholders will hold shares of the Acquiring Fund, which may also be redeemed at net asset value. SHAREHOLDER PROPOSALS The governing instruments of the Target Trust do not require that the Target Fund hold annual meetings of shareholders. The Target Fund is, however, required to call meetings of shareholders in accordance with the requirements of the 1940 Act to seek approval of new or material amendments to advisory arrangements or of a change in the fundamental investment policies, objectives or restrictions of the Target Fund. The Target Trust also would be required to hold a shareholder meeting to elect new Trustees at such time as less than a majority of the Trustees holding office have been elected by shareholders. The Target Trust’s governing instruments generally provide that a shareholder meeting shall be called upon written request of the holders of shares entitled […]  of the Code to maintain such qualification for the period beginning on the first day of its current taxable year and ending on the Effective Date. For each taxable year since inception (or portion thereof), the Target Fund has been eligible to compute its federal income tax under Section 852 of the Code. The Target Fund, to its knowledge, has not had at any time since its inception (and will not have as of B-8 the Effective Date) any material tax liability under Sections 852 or 4982 of the Code for any period ended before the Effective Date. The Target Fund, to its knowledge, has no earnings or profits accumulated in any taxable year in which the provisions of Subchapter M of the Code did not apply to it. The Target Fund does not own any “converted property” (as that term is defined in Treasury Regulation Section 1.337(d)-7(a)(2)) that is subject to the rules of Section 1374 of the Code as a consequence of the application of Section 337(d)(1) of the Code and the Treasury Regulations promulgated thereunder; (m) The Target Fund has not changed its taxable year end within the most recent 60-month period ending on […], 2021, and will not change its taxable year end prior to the Effective Date, without the consent of the Acquiring Entity, whose consent will not be unreasonably withheld; (n) All issued and outstanding shares of the Target Fund are, and on the Effective Date will be, duly authorized and validly issued and outstanding, fully paid and non-assessable by the Target Entity and, in every state where offered or sold, such offers and sales have been in compliance in all material respects with applicable registration and/or notice requirements of the 1933 Act and state and District of Columbia securities laws or exemptions therefrom; (o) The execution, delivery and performance of this Agreement will have been duly authorized prior to the Effective Date by all necessary action, if any, on the part of the board of trustees of the Target Entity, on behalf of the Target Fund, and subject to the approval of the shareholders of the Target Fund and the due authorization, execution and delivery of this Agreement by the other parties hereto, this Agreement will constitute a valid and binding obligation of the Target F\n"

ars exactly\nonce in your answer map (count them); every event object quotes ETF-acquirer evidence;\nevery date matches ^\\d{4}-\\d{2}-\\d{2}$ or is \"NA\"; no ticker field contains a space.】\n文件: 0001741773-23-002552 (form 497, filed 2023-08-16, Franklin Custodian Funds  (CIK 0000038721))\nsource_url: https://www.sec.gov/Archives/edgar/data/38721/000174177323002552/c497.htm\n节选:\n497 1 c497.htm PROSPECTUS FRANKLIN CUSTODIAN FUNDS February 1, 2023, as amended August 16, 2023 Class A Class A1 Class C Class R Class R6 Advisor Class Franklin DynaTech Fund FKDNX — FDYNX FDNRX FDTRX FDYZX Franklin Focused Growth Fund FFQBX — FFQCX FFQRX FFQSX FFQZX Franklin Growth Fund FKGRX — FRGSX FGSRX FIFRX FCGAX Franklin Income Fund FKIQX FKINX FCISX FISRX FNCFX FRIAX Franklin U.S. Government Securities Fund FKFSX FKUSX FRUGX FUSRX FGORX FUSAX Franklin Utilities Fund FKUQX FKUTX FRUSX FRURX FUFRX FRUAX The U.S. Securities and Exchange Commission (SEC) has not approved or disapproved these securities or passed upon the adequacy of this prospectus. Any representation to the contrary is a criminal offense. FCF P 08/23 Contents Fund Summaries Information about the Fund you should know before investing Franklin DynaTech Fund 2 Franklin Focused Growth Fund 10 Franklin Growth Fund 26 Franklin Income Fund 34 Franklin U.S. Government Securities Fund 45 Franklin Utilities Fund 53 Fund Details More information on investment policies, practices and risks/financial highlights Franklin DynaTech Fund 61 Franklin Focused Growth Fund 77 Franklin Growth Fund 95 Franklin Income Fund 111 Frankl […] 8, 2023, the Mutual Fund will not accept purchase orders from new investors for any class other than Advisor Class shares. • Advisor Class shares will be closed to purchases by new investors. Effective September 1, 2023, the Mutual Fund will not accept purchase orders from new investors for the Advisor Class shares. • All classes of shares except Advisor Class shares will be closed to purchases by all investors. Effective September 26, 2023, the Mutual Fund will not accept purchase orders from any investor for any class other than Advisor Class shares. This includes a purchase as part of an ongoing dividend reinvestment program. • Prior to the reorganization, each class of shares of the Mutual Fund, other than Advisor Class shares, will be converted into Advisor Class shares (without a contingent deferred sales charge or other charge). Effective October 12, 2023. 10 Prospectus franklintempleton.com FRANKLIN FOCUSED GROWTH FUND FUND SUMMARIES • Advisor Class shares will be closed to purchases by all investors. Effective October 27, 2023, the Mutual Fund will not accept purchase orders for Advisor Class shares from any investor. This includes a purchase as part of an ongoing dividend reinvestment program. • Shareholders who do not currently have a brokerage account will need to open a brokerage account and may need to transfer their Mutual Fund shares into it prior to the closing of the reorganization to receive and hold the ETF shares distributed in the reorganization. More information about opening a brokerage account and transferring Mutual Fund shares into it is included in the attached “Questions and Answers” document. Shareholders must open a brokerage account no later than November 2, 2023 (except shareholders who hold Mutual Fund shares with Fiduciary Trust International of the South (FTIOS) as the custodian). If a shareholder does not have a brokerage account to hold the ETF shares and, in certain cases, has not transferred their Mutual Fund shares into it by that date, the shares will generally be held by American Stock Transfer & Trust Company, LLC in a default trustee account on behalf of the shareholder after the closing of the reorganization. • Shareholders who hold Mutual Fund shares with Fiduciary […] l receive ETF shares after the market close on November 3, 2023. If you did not establish a brokerage account and, in certain cases, did not transfer your Mutual Fund shares into it before the closing of the reorganization, your ETF shares will generally be held on your behalf by American Stock Transfer & Trust Company, LLC in a default trustee account. If you think the ETF shares received by you in the reorganization will be held by American Stock Transfer & Trust, after the reorganization is consummated, you may contact them for more information by emailing help@astfinancial.com or calling (800) 937-5449. If the ETF shares are not transferred into a brokerage account within a year of the date of the reorganization, the ETF shares will be converted to cash and the cash proceeds will be sent to the account holder of record (subject to applicable federal or state laws concerning unclaimed property). For further information, please contact the Mutual Fund toll-free at (800) DIAL BEN ® or (800) 342-5236 . franklintempleton.com Prospectus 13 FRANKLIN FOCUSED GROWTH FUND FUND SUMMARIES IMPORTANT NOTICE ABOUT YOUR FUND ACCOUNT QUESTIONS AND ANSWERS The following is a brief Q&A that provides information to help you to determine if you need to take action with respect to your shareholder account prior to the reorganization of the Mutual Fund in order to receive shares of the ETF. Q. What types of shareholder accounts can receive shares of the ETF as part of the reorganization? A. If you hold your shares of the Mutual Fund in a brokerage account that permits you to purchase securities traded in the stock market, such as ETFs or other types of stocks, then you will be eligible to receive shares of the ETF in the reorganization. No further action is required. Q. What types of shareholder accounts cannot receive shares of the ETF as part of the reorganization? A. The following account types cannot hold shares of ETFs: Distributor Accounts . If you hold your shares of the Mutual Fund in an account where Franklin Distributors, LLC is the broker-dealer of record (a “Distributor Account”), you should transfer your shares of the Mutual Fund to a brokerage account that can accept shares of the ETF prior to the reorganization. Fo […] st in ETF shares. Contact your broker right away to make the necessary changes to your account. Q. What will happen if I do not have a brokerage account that can accept ETF shares at the time of the reorganization? A. If your account cannot accept ETF shares at the time of the reorganization, the ETF shares received by you in connection with the reorganization will generally be held by a stock transfer agent, American Stock Transfer & Trust Company, LLC (“American Stock Transfer & Trust”), until a brokerage account is identified into which American Stock Transfer & Trust can transfer the shares. As planned, if the ETF shares are not transferred into a brokerage account within a year of the date of the reorganization, the ETF shares will be converted to cash and the cash proceeds will be sent to the account holder of record (subject to applicable federal or state laws concerning unclaimed property). The conversion of ETF shares to cash may be subject to fees and expenses and will likely be a taxable event for shareholders who hold their shares in a taxable account. In some cases, the liquidation of your investment and return of cash, or the transfer of your investment, may be subject to fees and expenses and may also be subject to tax. It may take time for you to receive your cash. Please consult with your financial intermediary for more information on the impact that the reorganization will have on you and your investments. For more information about specific accounts that cannot hold ETFs, see “What type of shareholder accounts cannot receive shares of the ETF as part of the reorganization?” above. Q. What if I do not want to own shares of the ETF? A. If you do not want to receive shares of the ETF in connection with the reorganization, you can exchange your Mutual Fund shares for shares of another Franklin mutual fund that is not participating in a reorganization or redeem your Mutual Fund shares. Prior to doing so, however, you should consider the tax consequences associated with either action. Redemption of 16 Prospectus franklintempleton.com FRANKLIN FOCUSED GROWTH FUND FUND SUMMARIES your Mutual Fund shares will be a taxable event if you hold your shares in a taxable account. The last day to exchange your shares of the Mutual Fund for shares of another Franklin mutual fund is November 2, 2023, and the last day to redeem your shares of the Mutual Fund is November 2, 2023. Prior announcement from December 2022: I. Proposed Conversion of Fund to ETF At a meeting held on December 14-15, 2022, the Board of Trustees of the Franklin Custodian Funds approved the reorganization of the Franklin Focused Growth Fund (the “Mutual Fund”) into the Franklin Focused Growth ETF (the “ETF”), a newly-organized series of the Franklin Templeton ETF Trust, pursuant to an Agreement and Plan of Reorganization. If the Agreement and Plan of Reorganization is approved by the shareholders of the Mutual Fund, the reorganization of the Mutual Fund would consist of (1) the transfer of substantially all of the Mutual Fund’s assets, subject to its liabilities, to the ETF for shares of the ETF; and (2) the distribution of the ETF shares to the Mutual Fund’s shareholders in complete liquidation of the Mutual Fund. The new ETF will be managed in a substantially similar manner as the Mutual Fund, and the ETF’s investment objective, principal investment strategies, investment adviser and portfolio management team will be the same as that of the corresponding Mutual Fund, except that the ETF, unlike the Mutual Fund, will be a non-diversified fund (within the meaning of the Investment Company Act of 1940) which means that it will generally invest a greater proportion of its assets in the securities of one or more issuers and will invest overall in a smaller number of issuers than a diversified fund. A notice of a special meeting of shareholders and a proxy statement/prospectus seeking shareholder approval for the Agreement and Plan of Reorganization and containing information about the ETF, reasons for the proposed reorganization and potential benefits to the Mutual Fund’s shareholders, will be sent to the shareholders of the Mutual Fund in the second calendar quarter of 2023. If the reorganization is approved by the Mutual Fund’s shareholders, each class of shares of the Mutual Fund, other than Advisor Class shares, will then be converted into Advisor Class shares (without a contingent deferred sales charge or other charge) prior to the reorganization. After such conversion, any fractional shares held by shareholders will be redeemed, and the Mutual Fund will distribute the redemption proceeds to those shareholders. The distribution of redemption proceeds to shareholders may be a taxable event and those shareholders are encouraged to consult their tax advisors to determine the effect of any such redemption. franklintempleton.com Prospectus 17 FRANKLIN FOCUSED GROWTH FUND FUND SUMMARIES In addition, shareholders who do not currently have a brokerage account will need to open a brokerage account prior to the closing of the reorganization to receive and hold the ETF shares distributed in the reorganization (or alternatively the shares will be held in a default trustee account on behalf of the shareholder). Upon the closing of the reorganization of the Mutual Fund, each shareholder of the Mutual Fund will receive shares of the ETF having the same aggregate net asset value as the shares of the Mutual Fund they held on the date of the reorganization and become a shareholder of the ETF. It is anticipated that the reorganization will qualify as a tax-free reorganization for federal income tax purposes and that shareholders will not recognize any gain or loss in connection with the reorganization, except to the extent that they receive cash in connection with the redemption of any fractional shares prior to the reorganization. If approved by the shareholders of the Mutual Fund, it is anticipated that the reorganization of the Mutual Fund would […] rmance. During the most recent fiscal year, the Fund's portfolio turnover rate was 77.65% of the average value of its portfolio. Principal Investment Strategies Under normal market conditions, the Fund invests in a diversified portfolio of debt and equity securities. The Fund may shift its investments from one asset class to another based on the investment manager's analysis of the best opportunities for the Fund’s portfolio in a given market. The equity securities in which the Fund invests consist primarily of common stocks, including those with dividend yields the investment manager believes are attractive. Debt securities include all varieties of fixed, floating and variable rate instruments, including secured and unsecured bonds, bonds convertible into common stock, senior floating rate and term loans, mortgage-backed securities and other asset-backed securities, debentures, and shorter term instruments. Bond investments may include U.S. and foreign corporate debt, U.S. Treasuries and foreign government bonds. The Fund may invest up to 100% of its total assets in debt securities that are rated below investment grade (also known as \"junk bonds\"), including a portion in defaulted securities, although the Fund will not invest more than 5% of its assets in securities that are defaulted at the time of purchase. The Fund maintains the flexibility to invest in securities of companies from a variety of sectors, but from time to time, based on economic conditions, the Fund may have significant investments in particular sectors. The Fund may also invest up to 25% of its assets in foreign securities, either directly or through depositary receipts. The Fund may, from time to time, use a variety of equity-related derivatives and complex equity securities, which may include purchasing or selling call and put options on equity securities and equity security indices, futures on equity securities and equity indexes, options on equity index futures and equity-linked notes, for various purposes including enhancing Fund returns, increasing liquidity, gaining exposure to particular instruments in more efficient or less expensive ways and/or hedging risks relating to changes in certain equity markets. In addition, the Fund may, \n"

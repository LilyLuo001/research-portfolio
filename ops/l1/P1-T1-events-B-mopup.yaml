r, will seek to produce above average, risk-adjusted total returns, including capital appreciation, dividend and interest income and option premiums, through investments both long and short in real estate related securities, including publicly traded securities, REITs, other equities and equity-related derivatives and may also invest in debt and convertible debt and preferred securities. To the extent allowable under applicable regulations, the Target Fund will use leverage to obtain greater exposure to markets in its investment portfolio. The Target Fund will not purchase real estate directly or acquire other forms of direct ownership in real estate. The Target Fund may invest in equity and equity derivative securities of both U.S. and non-U.S. real estate companies, as well as companies located in emerging markets and issuers of any capitalization and in any style (from growth to value). The Target Fund considers emerging market issuers to be those located in the countries that are represented in the MSCI Emerging Markets Index. The Target Fund may invest in convertible debt securities of any maturity or credit quality, including those rated below investment grade (“high yield securities” or “junk bonds”). Below investment grade debt securities are those rated below Baa3 by Moody’s Investors Service or equivalently by another nationally recognized statistical rating organization (“NRSRO”). The Target Fund may invest a portion of its assets in private placement offerings of real estate companies which may be illiquid. The Target Fund may also invest in preferred stock, options (both covered and uncovered or “naked”), convertible securities, or rights or warrants to buy stocks, and may create long or short positions in exchange traded funds (“ETFs”), other investment companies, or American Depositary Receipts (“ADRs”). The Target Fund’s investments in ETFs may be made (i) as part of the management of portfolio investments, (ii) to hedge various investments for risk management (see below) and/or (iii) for income enhancement, which is also known as speculation. The Target Fund concentrates investments in the real estate industry, meaning that under normal circumstances, it invests over 25% of its assets in real estate industry securities. The Acquiring Fund’s investment objective is pursued through a “Value, Yield-Advantage” strategy (as described in more detail below) through investment in public real estate securities, which may include equity real estate investment trusts (a “REIT” or “REITs”), mortgage REITs, REIT preferreds, and other publicly traded companies whose primary business is in the real estate industry. This strategy often leads to investment in smaller capitalization companies (under $1B). The composition of the portfolio does not seek to mimic equity REIT indices. The Value, Yield-Advantage strategy seeks to invest in companies that in LDR’s view have (i) underlying real estate assets that are trading at a discount to the private market value of such assets and (ii) have an above-average dividend yield or strong free cash flow. LDR screens its universe of real estate securi […] ership, construction, development, financing, leasing, management and/or sale of commercial, industrial or residential real estate, companies that have a significant portion of their assets invested these types of real estate related companies, including, for example, real estate investment trusts (“REITs”), or companies that may not participate directly in real estate, but which may present an attractive investment opportunity based on the inherent value of their real estate holdings or exposure, or provide sales, leasing or other strategic services to real estate companies. Equity securities of real estate companies will include (1) common stocks, (2) preferred stocks, (3) stock warrants, (4) stock rights and (5) debt securities that are convertible into stock. Under normal conditions, the Acquiring Fund invests at least 80% of its net assets, plus the amount of any borrowings for investment purposes, in equity securities of companies principally engaged in the real estate industry and other real estate related investments. Equity securities can consist of shares of REITs, and securities issued by other companies principally engaged in the real estate industry. Equity securities can also include securities convertible into common stocks where the conversion feature represents, in LDR’s view, a significant element of a security’s value, and preferred stocks. The Acquiring Fund considers a company to be principally engaged in the real estate industry if it either (i) derives at least 50% of its revenues from the ownership, construction, financing, management or sale of commercial or residential real estate or (ii) has at least 50% of its assets in real estate or such real estate businesses. These include securities issued by REITs and real estate operating companies. The Acquiring Fund does not invest in real estate directly. The remainder of the Acquiring Fund's assets will be invested in cash or short-term investments or securities of real estate operating companies that may pay little or no dividends. In addition, the Target Fund may engage in transactions for the purpose of hedging against changes in the price of other Target Fund portfolio securities, such as purchasing put options, selling securities short or writing covered call options. Such defensive or hedged positions may also include investments in equity securities of real estate as well as non-real estate companies. Additionally, the Target Fund may employ leverage by borrowing from banks in an amount of up to 33% of the Target Fund’s assets (defined as net assets plus borrowing for investment purposes). The Acquiring Fund may take short positions totaling up to 30% of the Acquiring Fund’s total assets. LDR is most likely to use shorting to protect accumul […] estment policy and may be changed without shareholder approval upon 60 days’ written notice to shareholders. Comparison of Principal Investment Risks This section will help you compare the risks of the Target Fund and the Acquiring Fund. Because the investment objectives of the Funds are similar and the investment strategies of the Target Fund and the Acquiring Fund are similar, they are generally subject to the same principal risks. The Target Fund and the Acquiring Fund share many of the same principal risks of investment, while others are different. The principal risks of each Fund are set out in the table below. 20 Principal Risks Target Fund Acquiring Fund/ Combined Fund Active and Frequent Trading Risk X Alternative Strategies Risk X Convertible Securities Risk X X Credit Risk X X Debt Securities Risk X Depositary Receipts Risk X Derivatives Risk X Developing and Emerging Markets Risk X Equity Markets Risk X Exchange-Traded Funds (ETF) Risk X Foreign Currency Risk X Foreign Investment and Foreign Exchange Risk X Hedging Risks X High-Growth Company-Related Risks X High Yield or Junk Bond Risk X Impairment of Collateral Risk X Index Non-Correlation Risk X Interest Rate Risk X Investments in Smaller Companies Risk X Investment Style Risk X Issuer Concentration Risk X Issuer-Specific Risk X Large Capitalization Stock Risk X Leverage Risk X X Liquidity Risk X Management Risk X Market and Geopolitical Risk X Non-Diversification Risk X Options Risk X Other Investment Companies Risk X Preferred Securities Risk X X Real Estate Market and Related Risk X Real Estate Sector Concentration Risk X X REIT Risk X X Reliance on Corporation Management and Financial Reporting Risk X Restricted and Illiquid Securities Risk X X Short Sales Risk X X Small and Medium Capitalization Company Risk X Trade Execution Risk X Description of Investment Risks The following are the principal investment risks associated with the Acquiring Fund and, therefore, also with the Combined Fund. You will find additional descriptions of specific risks in the Prospectus and Statement of Additional Information for the Acquiring Fund. There is no guarantee that your investment in a Fund will increase in value. The value of your investment in a Fund could go down, meaning you could lose some or all of your investment. 21 Principal Risks An investment in the Fund is not guaranteed and you may lose money by investing in the Fund […] tion and ability to make timely payments to shareholders, including economic, political, legal, or regulatory changes and natural disasters. Event risk is unpredictable and can significantly impact preferred security holders since they are paid after bondholders. Also, in the event of a sale or privatization of a company, its preferred shares may be negatively impacted. Preferred securities are also subject to duration risk as they are long-duration instruments, typically callable only at the option of the issuer. They are also subject to the risk that if the company is taken over by another company with higher leverage than the current issuer, coverages and other credit metrics could decline making the preferred security less valuable. 23 Convertible Securities Risk. The market values of convertible securities are affected by market interest rates, the risk of issuer default on interest or principal payments and the value of the underlying common stock into which the convertible security may be converted. Additionally, a convertible security is subject to the same types of market and issuer risk as apply to underlying common stock. In addition, certain convertible securities are subject to involuntary conversions and may undergo principal write-downs upon the occurrence of certain triggering events, and, as a result, are subject to an increased risk of loss. Convertible securities may be rated below investment grade. Restricted and Illiquid Securities Risk. Certain securities generally trade in lower volume and may be less liquid than securities of large established companies. If a security is illiquid, the Adviser may not be able to sell the security at a time when it might wish to sell, which means that the Fund could lose money. Debt Securities Risk . Debt securities are issued with a specific interest rate and maturity. Once the securities are issued, they are subject to credit risk and interest rate risk. Credit risk is the chance that the issuer will fail to pay the stipulated interest payments on the security, or to pay the principal at maturity. Negative perceptions of the issuer’s ability to make interest or principal payments will cause the price of the security to decline. While U.S. government-back\n"

quisition”) of Emerging Markets Portfolio (the “Acquired Portfolio”), a series of Sanford C. Bernstein Fund, Inc., a Maryland corporation, which is currently operated as a mutual fund, by AB Emerging Markets Opportunities ETF, a series of AB Active ETFs, Inc., a Maryland corporation (the “Acquiring Portfolio”). The Acquiring Portfolio is an exchange-traded fund (“ETF”) and has a similar investment objective and identical fundamental investment policies as the Acquired Portfolio. Both Portfolios may be viewed as implementing “core” investment strategies, and both Portfolios focus their investments in equity securities of emerging markets issuers. As an existing ETF, the Acquiring Portfolio’s shares are listed and traded on NYSE Arca, Inc. (the “Exchange”). The Acquisition will be accomplished in accordance with the Agreement and Plan of Acquisition and Termination (the “Plan”). The form of Plan is attached as Exhibit A to the Information Statement/Prospectus. The Plan provides for (i) the transfer of all of the assets of the Acquired Portfolio to the Acquiring Portfolio, (ii) the assumption by the Acquiring Portfolio of all of the liabilities of the Acquired Portfolio, (iii) the receipt of shares of the Acquiring Portfolio and cash (corresponding to any fractional Acquired Portfolio shares), with an aggregate value equal to the value of your Acquired Portfolio shares as of the closing date of the Acquisition, and (iv) the cessation of operations and termination of the Acquired Portfolio. Shares of the Acquiring Portfolio will be transferred to each stockholder’s brokerage account. If a stockholder does not hold their Acquired Portfolio shares in a brokerage account, the Acquired Portfolio stockholder will not receive a distribution of the Acquiring Portfolio’s shares and in lieu thereof will receive cash in redem […] tfolio shares. The redemption or exchange of your Acquired Portfolio shares may be a taxable event. viii Table of Contents INFORMATION STATEMENT/PROSPEC
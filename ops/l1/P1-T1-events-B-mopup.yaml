ars exactly\nonce in your answer map (count them); every event object quotes ETF-acquirer evidence;\nevery date matches ^\\d{4}-\\d{2}-\\d{2}$ or is \"NA\"; no ticker field contains a space.】\n文件: 0001104659-25-039502 (form 497, filed 2025-04-25, MORGAN STANLEY GLOBAL FIXED INCOME OPPORTUNITIES FUND  (CIK 0000882381))\nsource_url: https://www.sec.gov/Archives/edgar/data/882381/000110465925039502/tm2512849d5_497.htm\n节选:\n497 1 tm2512849d5_497.htm 497 Filed by: Morgan Stanley ETF Trust Pursuant to Rule 425 under the Securities Act of 1933 and deemed filed under Rule 14a-12(b) under the Securities Exchange Act of 1934. Subject Company: Morgan Stanley Global Fixed Income Opportunities Fund SEC File No. 811-06515 and 033-44782 SUPPLEMENT DATED APRIL 25, 2025 TO THE SUMMARY PROSPECTUSES, PROSPECTUSES, AND STATEMENT OF ADDITIONAL INFORMATION OF Morgan Stanley Global Fixed Income Opportunities Fund, dated February 28, 2025, as supplemented At a meeting held on April 23-24, 2025, the Board of Trustees (the “Board”) of Morgan Stanley Global Fixed Income Opportunities Fund (to be renamed, Morgan Stanley Income Opportunities Fund) (the “Acquired Fund”) unanimously approved the reorganization of the Acquired Fund into an exchange-traded fund (“ETF”), which will be managed by Morgan Stanley Investment Management Inc. (“MSIM”), which is also the investment adviser to the Acquired Fund. The Board, which is comprised solely of Trustees who are not “interested persons” (as defined in the Investment Company Act of 1940, as amended) of the Acquired Fund, determined that participation in the Reorganization (defined be […] und Shares and, in some cases, cash that, combined with the Acquiring Fund Shares, is equal in value to the aggregate NAV of your Acquired Fund Shares on the Closing Date of the Reorganization. Acquiring Fund Shares will not be issued in fractional shares. As a result, cash will be paid to Acquired Fund Shareholders in lieu of fractional Acquiring Fund Shares, which cash payment may be taxable. Following the Reorganization, Acquiring Fund Shareholders may bear certain costs with respect to maintaining brokerage accounts and buying and selling Acquiring Fund Shares in the secondary market that Acquired Fund Shareholders do not experience as shareholders of the Acquired Fund. In addition, the market price of ETF shares, like the price of any exchange-traded security, includes a “bid-ask spread” charged by the market makers or other participants that trade the particular security. As discussed below, if the Reorganization is approved by Acquired Fund Shareholders and you desire to hold Acquiring Fund Shares, it is important for you to determine that you hold your Acquired Fund Shares in the type of account that can accommodate the receipt of the ETF shares that will be received in the Reorganization or, if you do not own Acquired Fund Shares through such an account, that you take necessary actions to be able to receive Acquiring Fund Shares. Q. What will happen if I do not have a brokerage account that can accept Acquiring Fund Shares at the time of the Reorganization? A . If you do not have a brokerage account that can accept Acquiring Fund Shares at the time of the Reorganization, you will not receive Acquiring Fund Shares in connection with the Reorganization. Instead, depending on the type of account through which you hold your Acquired Fund Shares, you will either receive cash or R Shares of Morgan Stanley U.S. Government Money Market Trust equal in value to the aggregate NAV of your Acquired Fund Shares on the Closing Date of the Reorganization (except as discussed below with respect to non-accommodating retirement accounts). In some cases, the liquidation of your investment and return of cash, or the transfer of your investment, may be subject to fees and expenses. In addition, the liquidation or transfer o […] . Acquiring Fund Shares may also be traded on other national securities exchanges, electronic crossing networks, and other alternative trading systems. Should you decide to purchase or sell Acquiring Fund Shares after the Reorganization, you will need to place a trade through a broker who will execute your trade in the secondary market at prevailing market prices. Because Acquiring Fund Shares will trade at market prices rather than at NAV, Acquiring Fund Shares may trade at a price less than (discount), at, or greater than (premium) the Acquiring Fund’s NAV per share. As with all transactions for ETFs, your broker may charge a commission for purchase and sale transactions. In addition, the market price of ETF shares, like the price of any exchange-traded security, includes a “bid-ask spread” charged by the market makers or other participants that trade the particular security. Q. How do I transfer my Acquired Fund Shares from a fund direct account to a brokerage account that will accept Acquiring Fund Shares? A. Transferring your Acquired Fund Shares from a fund direct account to a brokerage account that can accept Acquiring Fund Shares should be a simple process. If you have a brokerage account or a relationship with a brokerage firm, please talk to your broker and inform the broker that you would like to transfer a mutual fund position that you hold directly with the Acquired Fund into your brokerage account. Also, inform your broker that such an account will need to be set up to accept shares of an ETF, such as the Acquiring Fund. If you don’t have a brokerage account or a relationship with a brokerage firm, you will need to open an account. It is suggested that you provide your broker with a copy of your quarterly account statement from the Acquired Fund. Your broker will require your account number with the Acquired Fund, which can be found on your statement. Your broker will help you complete a form to initiate the transfer. Once you sign that form, your broker will submit the form to the transfer agent directly, and the shares will be transferred into your brokerage account. The sooner you initiate the transfer, the better. 4 Q. How do I transfer my Acquired Fund Shares from a non-accommodating brokerag […] u can exchange your Acquired Fund Shares for shares of another Morgan Stanley mutual fund that is not participating in the Reorganization or redeem your Acquired Fund Shares. Prior to doing so, however, you should consider the tax consequences associated with either action. Redemption of your Acquired Fund Shares will be a taxable event if you hold your shares in a taxable account. The last date to redeem your Acquired Fund Shares or exchange them into another Morgan Stanley mutual fund prior to the Reorganization is the second business day immediately preceding the Closing Date (and the Closing Date is anticipated to be on or about November 7, 2025). ADDITIONAL INFORMATION ABOUT THE REORGANIZATION Q: How will the Acquired Fund change post-conversion? A: As described above, the Board has approved certain changes to the Acquired Fund, which will be effective on May 30, 2025. The table below summarizes certain differences between the Acquiring Fund and Acquired Fund after giving effect to the May 30, 2025 changes to the Acquired Fund described above. There are also differences between the fee and expense arrangements for the Acquired Fund and Acquiring Fund. The fee and expense structure of the Acquiring Fund is described below. Fund Changes Acquired Fund Acquiring Fund Fund Name Morgan Stanley Income Opportunities Fund Eaton Vance Income Opportunities ETF Portfolio Managers Michael Kushma Andrew Szczurowski, CFA* Brian Shaw, CFA* Justin Bourgette, CFA* Michael Kushma Andrew Szczurowski, CFA Brian Shaw, CFA Justin Bourgette, CFA Brandon Matsui, CFA *Will begin managing the Acquired Fund on May 30, 2025. Prior to such date, other individuals serve as portfolio managers of the Acquired Fund along with Michael Kushma. Q: What are the differences between an ETF and a mutual fund? A: ETFs are structurally different from mutual funds in several important aspects: · A mutual fund may offer multiple share classes with different sales charges, expenses, and/or minimum investments. The Acquiring Fund does not issue multiple classes of shares. · A mutual fund investor may purchase and redeem shares directly from the mutual fund (through a distributor or a financial intermediary). Most ETF investors will buy and sell shares \n"

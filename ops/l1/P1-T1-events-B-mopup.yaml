    You can do this by calling your broker or calling the Guinness Atkinson Funds at 800 915-6566. If
    you do not wish for your shares to be converted to ETFs you will need to redeem your shares or exchange
    your shares for other Funds in the Guinness Atkinson Funds family. You may hold your shares in a brokerage
    account, or you may hold your shares directly with the Fund. If you hold your shares in a brokerage
    account you do not need to take any action unless you wish to redeem your shares. DIRECT SHAREHOLDERS
    MUST TAKE ACTION BEFORE RECEIVING THEIR ETF SHARES. What is a direct shareholder ? If you hold your
    shares directly with the Guinness Atkinson Funds, you are a direct shareholder. If you hold your shares
    through a brokerage account, you are NOT a direct shareholder. We provide more information, including
    how to determine if you’re a direct shareholder, in special section contained in a box below. Direct
    shareholders must do one of the following: 1. Transfer your shares to the broker dealer of your choice.
    We urge you to begin this process immediately if this is your preferred option. This is the option
    that we recommend. Look at the box at the end of this letter for more information. 2. Exchange your

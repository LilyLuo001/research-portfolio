ars exactly\nonce in your answer map (count them); every event object quotes ETF-acquirer evidence;\nevery date matches ^\\d{4}-\\d{2}-\\d{2}$ or is \"NA\"; no ticker field contains a space.】\n文件: 0001104659-20-048256 (form N-14, filed 2020-04-17, RMB INVESTORS TRUST  (CIK 0000030126))\nsource_url: https://www.sec.gov/Archives/edgar/data/30126/000110465920048256/tm2015251d1_n14.htm\n节选:\nN-14 1 tm2015251d1_n14.htm N-14 As filed with the Securities and Exchange Commission on April 17, 2020 1933 Act File No. [ ] UNITED STATES SECURITIES AND EXCHANGE COMMISSION Washington, D.C. 20549 FORM N-14 REGISTRATION STATEMENT UNDER THE SECURITIES ACT OF 1933 Pre-Effective Amendment No . __ ¨ Post-Effective Amendment No . __ ¨ (Check appropriate box or boxes) RMB Investors Trust (Exact Name of Registrant) 115 South LaSalle Street, 34 th Floor Chicago, Illinois 60603 (Address and Zip Code of Principal Executive Offices) 1-800-462-2392 Registrant’s Telephone Number, including Area Code Christopher M. Graff 115 South LaSalle Street, 34 th Floor Chicago, Illinois 60603 (Name and Address of Agent for Service) With a copy to: Joseph Mannon, Esq. Vedder Price 222 North LaSalle Street Chicago, Illinois 60601 Approximate Date of Proposed Public Offering: As soon as practicable after this Registration Statement becomes effective under the Securities Act of 1933, as amended . Title of Securities Being Registered: Class A, Class C, and Class I shares of beneficial interest, par value $0.10 per share, of RMB Mendon Financial Services Fund, a series of the Registrant, are being registered. No […] ds to value accurately. Some derivatives are more sensitive to market price fluctuations and to interest rate changes than other investments. The Funds also could suffer losses related to its derivatives positions as a result of unanticipated market movements, which losses are potentially unlimited. The Funds also may be exposed to losses if the counterparty in the transaction does not fulfill its contractual obligation. In addition, derivatives traded over-the-counter (“OTC derivatives”) do not benefit from the protections provided by exchanges in the event that a counterparty is unable to fulfill its contractual obligation. Such OTC derivatives therefore involve greater counterparty and credit risk and may be more difficult to value than exchange-traded derivatives. When a derivative is used as a hedge against a position that the Funds hold, any loss generated by the derivative should generally be offset by gains on the hedged instrument, and vice versa. While hedging can reduce or eliminate losses, it also can reduce or eliminate gains. Hedges are sometimes subject to imperfect matching between the derivative and the hedged investment, and there can be no assurance that the Funds’ hedging transactions will be effective. Also, suitable derivative transactions may not be available in all circumstances. Derivatives are subject to fees and other costs which are not reflected in the Annual Fund Operating Expenses table. Derivative instruments may also be subject to the additional risks described below. Counterparty risk. The risk that each Fund will be subject to credit risk with respect to the counterparties to derivative contracts and other instruments entered into directly by the Fund. Other than to maintain its status as a regulated investment company for U.S. federal income tax purposes, a Fund is not subject to any limit with respect to the number of transactions it can enter into with a single counterparty. To the extent that a Fund enters into multiple transactions with a single or a small set of counterparties, it will be subject to increased counterparty risk. 14 Leverage Risk. To the extent each Fund’s use of derivatives creates leverage, the value of the Fund’s shares may be more volatile because leverage will amplify the effect of increases or decreases in the value of the Fund’s derivative investments. Liquidity Risk. Derivatives are also subject to liquidity risk. Liquidity risk is the risk that a derivative instrument cannot be sold, closed out or replaced quickly at or very close to its fundamental value. Generally, exchange-traded derivatives are very liquid because the exchange clearinghouse is the counterparty of every contract. OTC derivatives are less liquid than exchange-traded derivatives since they often can be closed out only with the other party to the transaction. Each Fund’s ability to sell or close out a position in an instrument prior to expiration or maturity depends on the existence of a liquid secondary market or, in the absence of such a market, the ability and willingness of the counterparty to enter into a transaction closing out the position. Therefore, there is no assurance that any derivatives position can be sold or closed out at a time and price that is favorable to a Fund. Futures and forwards risk. In addition to the general risks described above, each Fund’s use of futures and forwards contracts involves risks different from, or possibly greater than, the risks associated with investing directly in securities and other traditional investments. In addition, while futures and forwards contracts are generally liquid instruments, under certain market conditions they may become illiquid. As a result, each Fund may be unable to close out its futures contracts at a time which is advantageous. The successful use of futures depends upon a variety of factors, particularly the ability of the Adviser to predict movements of the underlying securities markets, which requires different skills than predicting changes in the prices of individual securities. There can be no assurance that any particular futures strategy adopted will succeed. Swap risk. Risks associated with swap agreements include changes in the returns of the un […]  the event of any such termination, in the absence of willful default, there shall be no liability for damages on the part of the Acquiring Fund, the Target Fund, the Trust, or its Trustees or officers to any other party, including, without limitation, consequential damages. Description of the Securities to be Issued Shareholders of the Target Fund as of the closing will receive full and fractional shares of the Acquiring Fund in accordance with the terms of the Plan. The shares of the Acquiring Fund to be issued in connection with the Reorganization will be duly and validly issued and outstanding, fully paid and non-assessable by the Acquiring Fund. Shares of the Acquiring Fund to be issued in the Reorganization will have no preemptive or conversion rights and no share certificates will be issued. Costs of the Reorganization The costs of the Reorganization are expected to be approximately $115,000. These costs represent management’s estimate of professional services fees, trustees’ fees and expenses, and printing costs and mailing charges related to the Reorganization. Because the estimated benefits of the Reorganization, in terms of approximate savings to shareholders realized during the first year following completion of the Reorganization, exceeds the expected Reorganization costs, the Funds will bear the costs of the Reorganization based on each Fund’s respective portion of the projected cost savings during the first year following the Reorganization. Based on each Fund’s net assets as of March 18, 2020, the Reorganization Expenses are estimated as $94,727 allocated to the Target Fund and $20,273 allocated to the Acquiring Fund. The Adviser will pay the Reorganization Expenses (as defined in the Plan) allocated to a Fund to the extent such allocated Reorganization Expenses exceed the Fund’s projected cost savings during the first year following the Reorganization. If the Reorganization is not completed, the Adviser will bear full responsibility for payment of the Reorganization Expenses. 23 Material Federal Income Tax Consequences The following discussion summarizes the material federal income tax consequences of the Reorganization that are applicable to you as a Target Fund shareholder. It is based on the […] ormation Statement and all of which are subject to change, including changes with retroactive effect. The discussion below does not address any state, local, or foreign tax consequences of the Reorganization. Your tax treatment may vary depending upon your particular situation. You also may be subject to special rules not discussed below if you are a certain kind of Target Fund shareholder, including, but not limited to: an insurance company; a tax-exempt organization; a financial institution; broker-dealer; a person who is neither a citizen nor resident of the United States or an entity that is not organized under the laws of the United States or a political subdivision thereof; a holder of Target Fund shares as part of a hedge, straddle, conversion or other integrated transaction; a person with “applicable financial statements” within the meaning of Section 451(b) of the Code; a person who does not hold Target Fund shares as a capital asset at the time of the Reorganization; or an entity taxable as a partnership for federal income tax purposes. The Reorganization is intended to qualify for federal income tax purposes as a tax-free reorganization under Section 368(a) of the Code. As a condition to the closing of the Reorganization, the Target Fund and the Acquiring Fund will receive an opinion from the law firm of Vedder Price P.C. substantially to the effect that, on the basis of the existing provisions of the Code, Treasury regulations issued thereunder, current administrative rules, pronouncements and court decisions, and certain representations, qualifications, and assumptions with respect to the Reorganization, for federal income tax purposes: (i) The transfer by the Target Fund of all its assets to the Acquiring Fund solely in exchange for Acquiring Fund shares and the assumption by the Acquiring Fund of all the liabilities of the Target Fund, immediately followed by the pro rata, by class, distribution of all the Acquiring Fund shares so received by the Target Fund to the Target Fund’s shareholders of record in complete liquidation of the Target Fund and the termination of the Target Fund promptly thereafter, will constitute a “reorganization” within the meaning of Section 368(a)(1) of the Code, and the […]  the full amount of your purchase payment may be immediately invested in the Funds. Any CDSC applicable to your shares of the Target Fund will not be incurred as a result of your shares being exchanged for shares of the Acquiring Fund pursuant to the Reorganization, and the holding period applicable to your Target Fund shares for purposes of the CDSC will carry over to the shares of the Acquiring Fund that you receive in the Reorganization. Shares not subject to a CDSC are redeemed first; remaining shares are redeemed in the order purchased. No CDSC applies to shares that: · Represent increases in the NAV above the net cost of the original investment · Were acquired through reinvestment of dividends or distributions · Class C shares do not convert to any other class of shares Waiver of Class C Sales Charge. CDSCs will be waived on redemptions of Class C shares in connection with: · Distributions from certain employee tax-qualified benefit plans · The shareholder’s death or disability · Withdrawals under an automatic withdrawal plan, provided the annual withdrawal is less than 10% of your account’s original value 36 Class I Shares You may buy Class I shares without paying a sales charge. The Class I shares are available to all investors directly from the Trust or through a financial intermediary, including but not limited to, financial advisors, retirement plans, broker-dealers and bank trust departments. To meet the minimum initial investment amount described in Exhibit D, investors may consider aggregating multiple accounts with common ownership and financial advisors may consider aggregating multiple client accounts within the Trust. Class I share accounts offered through a service organization may meet the minimum initial investment amount by aggregating multiple accounts within the Trust. Exceptions to the Class I share investment minimums may apply for qualified retirement plans and other account types with lower or no networking and/or omnibus fees charged to the Trust. The Trust reserves the right to change the amount of minimums through service organizations from time to time or to waive them in whole or in part. Holders through Financial Intermediaries: Investors who hold Class I shares of the Funds th\n"

ows of\n   the Target/Acquiring fund table, a 4-fund filing yields 4 objects}, ... ]}\n  or the no_event object above.\nEach event object:\n  fund_name        target mutual fund's full name (from excerpt)\n  family           fund family/trust (from excerpt)\n  mutual_fund_ticker / etf_ticker\n                   a single 2-6 char UPPERCASE symbol from the excerpt, else \"NA\".\n                   NEVER a fund name. Multiple class tickers → \"NA\" and list them in evidence.\n  announce_date    YYYY-MM-DD only. Board-approval date if stated; else the document's own\n                   date; else the filed date. Vague (\"May 2020\",\"Q4 2026\") → \"NA\".\n  date_basis       \"board\" | \"document\" | \"filed\" | \"NA\"\n  effective_date   YYYY-MM-DD only; the stated closing/completion date. Vague → \"NA\".\n  asset_class      equity_US / equity_intl / fixed_income / other — ONLY if locatable in the\n                   excerpt (bond/muni/high-yield/MBS→fixed_income; International/EM/Asia→\n                   equity_intl; explicit US equity→equity_US; managed-futures/multi-asset/\n                   long-short→other). Name alone insufficient → \"NA\".\n  AUM_at_conversion_USD  number from excerpt or \"NA\"\n  source_accession copy from the 文件 line\n  confidence       H = fund identity + (announce or effective) with explicit basis;\n                   M = identity clear, dates partly missing/document-dated;\n                   L = identity inferred from title only\n  evidence         ≤25-word quote fragment supporting the verdict (for events: the words\n                   showing the acquirer is an ETF; for no_event: the words showing why not)\nNEED_HUMAN only when TWO date statements INSIDE THIS ONE EXCERPT contradict for the same\nfund: {\"NEED_HUMAN\": true, \"quotes\": [\"...\", \"...\"]}. Different filings never contradict.\nNever fill any field from memory — excerpt-locatable or \"NA\".\n\nSELF-CHECK before emitting (do this, don't print it): every input item id appears exactly\nonce in your answer map (count them); every event object quotes ETF-acquirer evidence;\nevery date matches ^\\d{4}-\\d{2}-\\d{2}$ or is \"NA\"; no ticker field contains a space.】\n文件: 0001213900-25-120167 (form N-14, filed 2025-12-10, Wedbush Series Trust  (CIK 0002055464))\nsource_url: https://www.sec.gov/Archives/edgar/data/2055464/000121390025120167/ea0268737-01_n14.htm\n节选:\nN-14 1 ea0268737-01_n14.htm N-14 As filed with the Securities and Exchange Commission on December 10, 2025 Securities Act File No. 333-[●] UNITED STATES SECURITIES AND EXCHANGE COMMISSION WASHINGTON, D.C. 20549 FORM N-14 REGISTRATION STATEMENT UNDER THE SECURITIES ACT OF 1933 ☒ Pre-Effective Amendment No. ___ ☐ Post-Effective Amendment No. ___ ☐ WEDBUSH SERIES TRUST (Exact Name of Registrant as Specified in Charter) 225 S Lake Ave Pasadena, CA 91101 (Address of Principal Executive Office) Registrant’s Telephone Number, including Area Code: (213) 688-4357 Matthew Bromberg Wedbush Series Trust 225 S Lake Ave Pasadena, CA 91101 (Name and Address of Agent for Service) Copy to: Eric Simanek, Esq. Eversheds Sutherland (US) LLP 700 6th St NW Washington, DC 20001 Approximate Date of Proposed Public Offering: As soon as practicable after the effective date of this Registration Statement. Title of Securities Being Registered: Investment Company Shares. No filing fee is required because an indefinite number of common shares of beneficial interest of Wedbush Series Trust have previously been registered pursuant to Rule 24f-2 under the Investment Company Act of 1940. It is proposed that this fi […] tement of Additional Information related to the Proxy Statement. The Proxy Statement should be retained for future reference . Question : How does the ETFOT Board recommend that I vote? Answer : After careful consideration, the ETFOT Board recommends that shareholders vote “FOR” the Plan and the proposed Reorganization. Question : What is the reason for the Reorganization? Answer : Wedbush Fund Advisers, LLC (“Wedbush Adviser”) is a wholly owned subsidiary of Wedbush Financial Services, LLC (“Wedbush”), a financial services holding company with subsidiaries engaged in retail and high net worth brokerage and advisory activities. As of October 15, 2025, Wedbush Adviser provided discretionary advisory services to approximately $887 million in exchange-traded fund assets. Wedbush seeks to continue building the Wedbush Trust platform through strategic acquisitions of ETFs. Wedbush Adviser believes that the addition of a core equity value oriented ETF, managed by Laffer Tengler Investments, Inc. (“Laffer Tengler”), under its oversight, to the Wedbush Trust is a compelling proposition. The success Wedbush Adviser has had promoting the research based fundamental analysis supporting its differentiated products has been seen in its inaugural launch, and it is anticipated that the Target Fund will benefit from complimentary marketing and sales support, and other economies of scale. The Acquiring Fund is a newly created series of Wedbush Trust that was created specifically for the purpose of acquiring the assets and assuming the liabilities as set forth in the Plan of the Target Fund. The Reorganization will allow Laffer Tengler to continue implementing the Target Fund’s investment strategies under the oversight of Wedbush Adviser, and ultimately the Wedbush Trust Board of Trustees (“Wedbush Trust Board”). Question : How will the Reorganization work? Answer : As part of the Reorganization, a new series of the Wedbush Trust, referred to as the “Acquiring Fund,” with substantially similar investment policies and strategies as the Target Fund, has been created. The Acquiring Fund is newly organized and has no assets or liabilities. If the Target Fund’s shareholders approve the Plan, the Target Fund will transfer all of its as […] zation? Answer : Yes, the Acquiring Fund will have a different fiscal year end than the Target Fund. The Target Fund has a July 31 fiscal year end, while the Acquiring Fund is expected to have a April 30 fiscal year end. Question : Will I own the same number of shares of the Acquiring Fund as I currently own of the Target Fund? Answer : Although the number of shares of the Acquiring Fund you receive may differ from the number of shares of the Target Fund that you hold, in exchange for your shares of the Target Fund, you will receive shares of the Acquiring Fund equal in value to the net asset value of your shares of the Target Fund immediately prior to the Reorganization. Question : Will the Reorganization result in any taxes? Answer : The conversion of the Target Fund into the Acquiring Fund as part of the Reorganization is expected to qualify as a “reorganization” within the meaning of section 368(a)(1)(F) of the U.S. Internal Revenue Code of 1986, as amended (the “Code”). The Target Fund is not expected to recognize any gain or loss as a direct result of the transfer of all of its assets and liabilities as set forth in the Plan in exchange for shares of the Acquiring Fund or as a result of its liquidation and termination, and shareholders of the Target Fund are not expected to recognize any gain or loss upon receipt of shares of the Acquiring Fund in connection with the Reorganization. Shareholders of the Target Fund should consult their own tax advisers regarding the federal, state, local, and other tax treatment and implications of the Reorganization in light of their individual circumstances. Question : Will my basis change as a result of the Reorganization? Answer : No, your aggregate tax basis for federal income tax purposes of the Acquiring Fund shares that you receive in the Reorganization is expected to be the same as the basis of the Target Fund shares that you held immediately before the Reorganization. Question : Will I incur any direct or indirect fees or expenses as a result of the Reorganization? Answer : No commission or other direct transactional fees will be imposed on shareholders in connection with the Reorganization. Question : Why do I need to vote? Answer : Your vote is needed to ensure […] ying expenses related to the Special Meeting and the Reorganization? Answer : Wedbush Adviser will bear all direct expenses relating to the Reorganization, including the costs relating to the Special Meeting and Proxy Statement. Question : Will the Reorganization affect my ability to buy and sell shares? Answer : No. You may continue to make additional purchases or sales of Target Fund shares through your financial intermediary up to and including the day of the Reorganization, which is anticipated to be on or about March 9, 2026. Any purchases or sales of Target Fund shares made after the Reorganization will be purchases or sales of the Acquiring Fund. If the Reorganization is approved, your shares of the Target Fund will automatically be converted to shares of the Acquiring Fund. Question : What will happen if the Plan is not approved by shareholders? Answer : If shareholders of the Target Fund do not approve the Plan, then the Target Fund will not be reorganized into the Acquiring Fund and the Board will consider what further actions to take with respect to the Target Fund. In such event, the Target Fund will continue to operate and Tuttle Capital will continue to serve as investment adviser and Laffer Tengler will continue to serve as sub-adviser to the Target Fund while the Board considers other alternatives in the best interest of the Target Fund’s shareholders, including, but not limited to, continuing operations of the Target Fund, alternative reorganizations with different acquiring funds and the liquidation of the Target Fund Question : How do I vote my shares? Answer : You can vote your shares as indicated under “HOW TO VOTE YOUR SHARES” which immediately precedes this Question and Answers section. Question : Who do I call if I have questions? Answer : If you have any questions regarding the proposals or the proxy card, or need assistance voting your shares, please call the Target Fund’s proxy solicitor, EQ Fund Solutions at 888-540-8736. COMBINED PROXY STATEMENT AND PROSPECTUS [January 20], 2026 For the Reorganization of LAFFER|TENGLER Equity Income ETF (TGLR) into Wedbush LAFFER|TENGLER New Era Value ETF a series of ETF Opportunities Trust a series of Wedbush Series Trust This Combined Proxy Statem […] bution of the Acquiring Fund shares to Target Fund shareholders, and the liquidation and termination of the Target Fund. Shares of the Acquiring Fund issued in connection with the Reorganization will have an aggregate NAV equal to the aggregate value of the assets that the Target Fund transferred to the Acquiring Fund, less the Target Fund’s liabilities that the Acquiring Fund assumes. As a result of the Reorganization, existing shareholders of the Target Fund will become shareholders of the Acquiring Fund. Shareholders of the Target Fund will receive shares of the Acquiring Fund with a value equal to the aggregate NAV of their shares of the Target Fund held immediately prior to the Reorganization. For U.S. federal income tax purposes, the conversion of the Target Fund into the Acquiring Fund that is part of the Reorganization is expected to qualify as a “reorganization” within the meaning of section 368(a)(1)(F) of the Code. The Target Fund is not expected to recognize any gain or loss as a result of the transfer of all of its assets and liabilities as set forth in the Plan in exchange for shares of the Acquiring Fund or as a result of its liquidation and termination, and shareholders of the Target Fund are not expected to recognize any gain or loss upon receipt of shares of the Acquiring Fund in connection with the Reorganization. ETFOT and Wedbush Trust will receive an opinion from tax counsel to the Wedbush Trust confirming such tax treatment. 1 EFFECT OF THE REORGANIZATION The primary purpose of the Reorganization is for the Acquiring Fund to acquire the assets of the Target Fund and continue the business of the Target Fund. Certain basic information about the Target Fund and Acquiring Fund is provided in the table below. LAFFER|TENGLER Equity Income ETF (Target Fund) Wedbush LAFFER|TENGLER New Era Value ETF (Acquiring Fund) Investment Objective Income and long-term capital appreciation. Same Management Fee 0.95% Up to $225 million: 0.85% $225 million – $500 million: 0.80% Over $500 million: 0.75%% Listing Exchange Cboe BZX Exchange, Inc. NYSE Arca Ticker Symbol TGLR TGLR Fiscal Year End July 31 April 30 Diversification Status Non-Diversified Non-Diversified Investment Adviser Tuttle Capital Management, LL\n"

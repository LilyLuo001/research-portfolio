ows of\n   the Target/Acquiring fund table, a 4-fund filing yields 4 objects}, ... ]}\n  or the no_event object above.\nEach event object:\n  fund_name        target mutual fund's full name (from excerpt)\n  family           fund family/trust (from excerpt)\n  mutual_fund_ticker / etf_ticker\n                   a single 2-6 char UPPERCASE symbol from the excerpt, else \"NA\".\n                   NEVER a fund name. Multiple class tickers → \"NA\" and list them in evidence.\n  announce_date    YYYY-MM-DD only. Board-approval date if stated; else the document's own\n                   date; else the filed date. Vague (\"May 2020\",\"Q4 2026\") → \"NA\".\n  date_basis       \"board\" | \"document\" | \"filed\" | \"NA\"\n  effective_date   YYYY-MM-DD only; the stated closing/completion date. Vague → \"NA\".\n  asset_class      equity_US / equity_intl / fixed_income / other — ONLY if locatable in the\n                   excerpt (bond/muni/high-yield/MBS→fixed_income; International/EM/Asia→\n                   equity_intl; explicit US equity→equity_US; managed-futures/multi-asset/\n                   long-short→other). Name alone insufficient → \"NA\".\n  AUM_at_conversion_USD  number from excerpt or \"NA\"\n  source_accession copy from the 文件 line\n  confidence       H = fund identity + (announce or effective) with explicit basis;\n                   M = identity clear, dates partly missing/document-dated;\n                   L = identity inferred from title only\n  evidence         ≤25-word quote fragment supporting the verdict (for events: the words\n                   showing the acquirer is an ETF; for no_event: the words showing why not)\nNEED_HUMAN only when TWO date statements INSIDE THIS ONE EXCERPT contradict for the same\nfund: {\"NEED_HUMAN\": true, \"quotes\": [\"...\", \"...\"]}. Different filings never contradict.\nNever fill any field from memory — excerpt-locatable or \"NA\".\n\nSELF-CHECK before emitting (do this, don't print it): every input item id appears exactly\nonce in your answer map (count them); every event object quotes ETF-acquirer evidence;\nevery date matches ^\\d{4}-\\d{2}-\\d{2}$ or is \"NA\"; no ticker field contains a space.】\n文件: 0001193125-19-226010 (form 497, filed 2019-08-21, BlackRock Funds II  (CIK 0001398078))\nsource_url: https://www.sec.gov/Archives/edgar/data/1398078/000119312519226010/d751169d497.htm\n节选:\n497 1 d751169d497.htm BLACKROCK FUNDS II BlackRock Funds II Table of Contents BLACKROCK FUNDS II BlackRock LifePath ® Smart Beta 2020 Fund 100 Bellevue Parkway Wilmington, Delaware 19809 (800) 441-7762 August 21, 2019 Dear Shareholder: I am writing to inform you about a reorganization that will affect your investment in BlackRock LifePath ® Smart Beta 2020 Fund (the “Target Fund”), a series of BlackRock Funds II (the “Trust”), a Massachusetts business trust. As provided in an Agreement and Plan of Reorganization (the “Reorganization Agreement”), the Target Fund will be reorganized into BlackRock LifePath ® Smart Beta Retirement Fund (the “Acquiring Fund”), a series of the Trust (the “Reorganization”). The Acquiring Fund is advised by BlackRock Advisors, LLC (“BAL”), the same investment adviser to the Target Fund. Following the completion of the Reorganization, the Acquiring Fund may be referred to as the “Combined Fund.” The Target Fund and the Acquiring Fund are each referred to as a “Fund” and collectively referred to as the “Funds.” The Board of Trustees of the Trust (the “Board”) has determined that the Reorganization is in the best interests of each Fund, and that the interest […] e to pay any sales charge, commission or other similar fee in connection with the Reorganization? A: No, you will not have to pay any sales charge, commission or other similar fee in connection with the Reorganization. As more fully discussed in the Combined Prospectus/Information Statement, the holding period with respect to any CDSC that applies to shares of the Acquiring Fund acquired by you in the Reorganization will be measured from the earlier of the time (i) you purchased your Target Fund shares or (ii) you purchased your shares of any other fund advised by BAL and subsequently exchanged them for shares of the Target Fund. Q: Do I need to take any action in connection with the Reorganization? A: No. Your shares will automatically be converted into shares of the Acquiring Fund on the date of the completion of the Reorganization. You will receive written confirmation that this change has taken place. ii Table of Contents No certificates for shares will be issued in connection with the Reorganization. The aggregate net asset value of the Acquiring Fund Shares you receive in the Reorganization will be equal to the aggregate net asset value of the shares you own in the Target Fund immediately prior to the Reorganization. Q: Will the Reorganization create a taxable event for me? A: The Reorganization is expected to qualify as a tax-free “reorganization” under Section 368(a) of the Internal Revenue Code of 1986, as amended (the “Code”). In general, if the Reorganization so qualifies, the Target Fund and the Acquiring Fund will not recognize any gain or loss for U.S. federal income tax purposes from the transactions contemplated by the Reorganization (except for any gain or loss that may be required to be recognized solely as a result of the close of the Target Fund’s taxable year due to the Reorganization or as a result of the transfer of certain assets). At any time before the Reorganization takes place, a shareholder may redeem shares of the Target Fund. Generally, such redemptions would be taxable transactions. It is not anticipated that the Acquiring Fund will sell any securities of the Target Fund acquired in the Reorganization in preparation for, or as a result of, the Reorganization, other than in the or […] ut approval of the Fund’s shareholders. Following completion of the Reorganization, the Combined Fund will have the same non-fundamental investment objective as the Acquiring Fund. Principal Investment Strategies . The Target Fund and the Acquiring Fund employ substantially the same principal investment strategies in seeking to achieve their respective objectives, although there are certain differences. Each Fund, which is a fund of funds, allocates and reallocates its assets among a combination of equity, fixed income and money market funds (the “underlying funds”) in proportions based on its own comprehensive investment strategy. Under normal circumstances, each Fund intends to invest primarily in affiliated open-end funds and affiliated exchange-traded funds. The Target Fund, which initially had a longer time horizon than the Acquiring Fund, invested a greater portion of its assets in underlying funds that invest in equity securities, which provide a greater opportunity for capital appreciation over the long-term but have a greater risk of loss. The Acquiring Fund, which initially had a shorter time horizon than the Target Fund, invested a greater portion of its assets in underlying funds that invest in fixed income, including money market instruments, which typically offer reduced risk and price volatility but forego some potential returns. As the Target Fund approaches its designated time horizon, it systematically seeks to reduce the level of risk by allocating assets more conservatively among the underlying funds. This systematic shift toward more conservative investments is designed to reduce the risk of significant reductions in the value of an investment in the Target Fund as it approaches its stated time horizon. As the Target Fund reaches its stated time horizon and enters its most conservative phase, the allocation of its assets and its investment strategy is expected to be substantially the same as the Acquiring Fund. Fees and Expenses The following table shows which share class of the Combined Fund shareholders will receive once the Reorganization is completed. The Acquiring Fund Shares that shareholders of the Target Fund will receive in the Reorganization will have the same aggregate NAV as the […] nt and clearance of U.S. investments. High Portfolio Turnover Risk — The Combined Fund may engage in active and frequent trading of its portfolio securities. High portfolio turnover (more than 100%) may result in increased transaction costs to the Combined Fund, including brokerage commissions, dealer mark-ups and other transaction costs on the sale of the securities and on reinvestment in other securities. The sale of Combined Fund portfolio securities may result in the realization and/or distribution to shareholders of higher capital gains or losses as compared to a fund with less active trading policies. These effects of higher than normal portfolio turnover may adversely affect Combined Fund performance. Investments in Mutual Funds and Exchange-Traded Funds (“ETFs”) Risk — The Combined Fund’s investments are concentrated in underlying BlackRock-advised funds, so the Combined Fund’s investment performance is directly related to the performance of the underlying funds. The Combined Fund may also directly invest in ETFs. The Combined Fund’s net asset value will change with changes in the equity and bond markets and the value of the mutual funds, ETFs and other securities in which it invests. An investment in the Combined Fund will entail more direct and indirect costs and expenses than a direct investment in the underlying funds and ETFs. For example, the Combined Fund indirectly pays a portion of the expenses (including operating expenses and management fees) incurred by the underlying funds and ETFs. Leverage Risk — Some transactions may give rise to a form of economic leverage. These transactions may include, among others, derivatives, and may expose the Combined Fund to greater risk and increase its costs. The use of leverage may cause the Combined Fund to liquidate portfolio positions when it may not be advantageous to do so to satisfy its obligations or to meet any required asset segregation requirements. Increases and decreases in the value of the Combined Fund’s portfolio will be magnified when the Combined Fund uses leverage. Market Risk and Selection Risk — Market risk is the risk that one or more markets in which the Combined Fund invests will go down in value, including the possibility that the mar […] d under the laws of the Commonwealth of Massachusetts. Under the Trust’s organizational documents, each Fund is authorized to issue an unlimited number of shares of beneficial interest, with a par value of $0.001 per share. With respect to each Fund, shares of the same class within such Fund have equal dividend, distribution, liquidation, and voting rights, and fractional shares have those rights proportionately. With respect to each Fund, each class of shares within such Fund bears its own expenses related to its distribution of shares (and other expenses such as shareholder or administrative services), and has exclusive voting rights with respect to matters relating to the class’ distribution expenditures. The shares of each Fund have no conversion or exchange rights except as the Board may grant in its discretion. There are no preemptive or appraisal rights in connection with the shares of either the Target Fund or the Acquiring Fund. When issued in accordance with the provisions of their respective prospectuses (and, in the case of shares of the Acquiring Fund, issued in connection with the Reorganization), all shares are fully paid and non-assessable, provided however that shareholders of a Massachusetts business trust may, under certain circumstance, be held liable for its obligations. The Declaration of Trust of the Trust, however, provides that shareholders are not personally liable solely by reason or his or her being or having been a shareholder of the Trust and requires the Trust to indemnify a shareholder against any loss or expense arising from any such liability. The Trust will assume the defense of any such claim against a shareholder for personal liability at the request of the shareholder. 35 Table of Contents APPENDIX I FUNDAMENTAL AND NON-FUNDAMENTAL INVESTMENT RESTRICTIONS Fundamental Investment Restrictions: Each Fund may not: 1. Purchase any securities which would cause 25% or more of the value of the Fund’s total assets at the time of purchase to be invested in the securities of one or more issuers conducting their principal business activities in the same industry, provided that (a) each Fund may cause 25% or more of its total assets at the time of purchase to be invested in the securiti\n"

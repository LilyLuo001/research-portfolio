ows of\n   the Target/Acquiring fund table, a 4-fund filing yields 4 objects}, ... ]}\n  or the no_event object above.\nEach event object:\n  fund_name        target mutual fund's full name (from excerpt)\n  family           fund family/trust (from excerpt)\n  mutual_fund_ticker / etf_ticker\n                   a single 2-6 char UPPERCASE symbol from the excerpt, else \"NA\".\n                   NEVER a fund name. Multiple class tickers → \"NA\" and list them in evidence.\n  announce_date    YYYY-MM-DD only. Board-approval date if stated; else the document's own\n                   date; else the filed date. Vague (\"May 2020\",\"Q4 2026\") → \"NA\".\n  date_basis       \"board\" | \"document\" | \"filed\" | \"NA\"\n  effective_date   YYYY-MM-DD only; the stated closing/completion date. Vague → \"NA\".\n  asset_class      equity_US / equity_intl / fixed_income / other — ONLY if locatable in the\n                   excerpt (bond/muni/high-yield/MBS→fixed_income; International/EM/Asia→\n                   equity_intl; explicit US equity→equity_US; managed-futures/multi-asset/\n                   long-short→other). Name alone insufficient → \"NA\".\n  AUM_at_conversion_USD  number from excerpt or \"NA\"\n  source_accession copy from the 文件 line\n  confidence       H = fund identity + (announce or effective) with explicit basis;\n                   M = identity clear, dates partly missing/document-dated;\n                   L = identity inferred from title only\n  evidence         ≤25-word quote fragment supporting the verdict (for events: the words\n                   showing the acquirer is an ETF; for no_event: the words showing why not)\nNEED_HUMAN only when TWO date statements INSIDE THIS ONE EXCERPT contradict for the same\nfund: {\"NEED_HUMAN\": true, \"quotes\": [\"...\", \"...\"]}. Different filings never contradict.\nNever fill any field from memory — excerpt-locatable or \"NA\".\n\nSELF-CHECK before emitting (do this, don't print it): every input item id appears exactly\nonce in your answer map (count them); every event object quotes ETF-acquirer evidence;\nevery date matches ^\\d{4}-\\d{2}-\\d{2}$ or is \"NA\"; no ticker field contains a space.】\n文件: 0001133228-25-000086 (form N-14, filed 2025-01-03, Fidelity Merrimack Street Trust  (CIK 0001562565))\nsource_url: https://www.sec.gov/Archives/edgar/data/1562565/000113322825000086/fmst-efp13398_n14.htm\n节选:\nN-14 1 fmst-efp13398_n14.htm FIDELITY MERRIMACK STREET TRUST - N-14 As filed with the Securities and Exchange Commission on January 3, 2025 Registration No. 33-___________ (Investment Company Act Registration No. 811-22796) SECURITIES AND EXCHANGE COMMISSION Washington, D.C. 20549 FORM N-14 REGISTRATION STATEMENT UNDER THE SECURITIES ACT OF 1933 Pre-Effective Amendment No. ☐ Post-Effective Amendment No. ____ ☐ Fidelity Merrimack Street Trust (Exact Name of Registrant as Specified in Charter) Registrant’s Telephone Number (617) 563-7000 245 Summer St., Boston, MA 02210 (Address Of Principal Executive Offices) Nicole Macarchuk, Secretary and Chief Legal Officer 245 Summer Street Boston, MA 02210 (Name and Address of Agent for Service) Approximate Date of Proposed Public Offering: As soon as practicable after the Registration Statement becomes effective under the Securities Act of 1933. The Registrant has registered an indefinite amount of securities under the Securities Act of 1933 pursuant to Section 24(f) under the Investment Company Act of 1940; accordingly, no fee is payable herewith because of reliance upon Section 24(f). It is proposed that this filing will become effective on  […] re in this Information Statement. Shareholders should read the entire Information Statement carefully for more complete information. What is involved in the Reorganization? All of the assets and liabilities of the Acquired Fund will be transferred to a newly created Acquiring Fund in exchange for shares of the Acquiring Fund equal to the Acquired Fund’s net asset value (NAV). The Acquired Fund will distribute to its shareholders the portion of shares of the Acquiring Fund to which the shareholder is entitled (and shareholders may receive cash in lieu of fractional shares). Shares of the Acquiring Fund will be transferred to each shareholder’s brokerage account. If a shareholder does not have a brokerage account, Acquired Fund shares may be converted to cash, less any fees and expenses your intermediary may charge (subject to applicable federal or state laws concerning unclaimed property). After shares of the Acquiring Fund are distributed to the Acquired Fund’s shareholders, the Acquired Fund will be completely liquidated and dissolved. As a result of the Reorganization, you will cease to be a shareholder of the Acquired Fund and will become a shareholder of the Acquiring Fund. The Reorganization is currently scheduled to take place as of the close of business of the NYSE on April 4, 2025. For more information, please refer to the section entitled “The Transaction – Agreement and Plan of Reorganization and Liquidation.” What are the differences between an ETF and a mutual fund? ETFs are structurally different from mutual funds in several important aspects: ETF Mutual Fund Does not issue multiple classes of shares. May offer multiple share classes with different sales charges, expenses, and/or minimum investments. Individual investors buy or sell shares of an ETF on the secondary market through an exchange. Investors or their intermediaries buy or sell shares directly from the mutual fund. Buy and sell orders are processed throughout the day and reflect real time market prices on an exchange. Buy and sell orders are processed once a day using the day’s ending NAV. As a result of these structural differences, there are certain benefits associated with an ETF structure, such as secondary market liquidity and incre […] gnificant losses if you sell your shares. There are various methods by which investors can purchase and sell shares and various orders that may be placed. Investors should consult their financial intermediary before purchasing or selling shares of a fund. Disruptions at market makers, Authorized Participants or market participants may also result in significant differences between the market price of the fund’s shares and the fund’s NAV. In addition, in stressed market conditions or periods of market disruption or volatility, the market for shares may become less liquid in response to deteriorating liquidity in the markets for the fund’s underlying portfolio holdings. The market price of shares during the trading day, like the price of any exchange-traded security, includes a bid-ask spread charged by the exchange specialist, market makers, or other participants that trade the particular security. In times of severe market disruption or volatility, the bid-ask spread can increase significantly. At those times, shares are most likely to be traded at a discount to NAV, and the discount is likely to be greatest when the price of shares is falling fastest, which may be the time that you most want to sell your shares. Securities held by a fund may be traded in markets that close at a different time than the listing exchange. During the time when the listing exchange is open but after the applicable market closing, fixing or settlement times, bid-ask spreads and the resulting premium or discount to the fund’s NAV may widen. The Adviser expects that, under normal market conditions, large discounts or premiums to NAV will not be sustained in the long term because of arbitrage opportunities. 12 TABLE OF CONTENTS • Trading Issues . Although shares are listed on an exchange, there can be no assurance that an active trading market or requirements to remain listed will be met or maintained. Only an Authorized Participant may engage in creation or redemption transactions directly with the fund. The fund has a limited number of intermediaries that act as Authorized Participants. There are no obligations of market makers to make a market in the fund’s shares or of Authorized Participants to submit purchase or redemption orders […] rtfolio securities and the market price of fund shares. To the extent no other Authorized Participants are able to step forward to create or redeem, shares may trade at a discount to NAV and possibly face delisting. In addition, trading of shares in the secondary market may be halted, for example, due to activation of marketwide “circuit breakers.” If trading halts or an unanticipated early closing of the listing exchange occurs, a shareholder may be unable to purchase or sell shares of the fund. FDC, the distributor of the fund’s shares, does not maintain a secondary market in the shares. If the fund’s shares are delisted from the listing exchange, the Adviser may seek to list the fund shares on another market, merge the fund with another exchange-traded fund or traditional mutual fund, or redeem the fund shares at NAV. Shares of the fund, similar to shares of other issuers listed on a stock exchange, may be sold short and are therefore subject to the risk of increased volatility and price decreases associated with being sold short. • Cash Transactions Risk. Unlike certain ETFs, the fund may effect some or all creations and redemptions using cash, rather than in-kind securities. Therefore, it may be required to sell portfolio securities and recognize gains on such sales that the fund might not have recognized if it were to distribute portfolio securities in-kind. As a result, an investment in the fund may be less tax-efficient than an investment in an ETF that distributes portfolio securities entirely in-kind. The use of cash creations and redemptions may also cause the fund’s shares to trade in the market at greater bid-ask spreads or greater premiums or discounts to the fund’s NAV. Furthermore, cash creation and redemption transactions may result in certain brokerage, tax, foreign exchange, execution, price movement and other costs and expenses related to the execution of trades resulting from such transactions. To the extent that the maximum additional charge for creation or redemption transactions is insufficient to cover these costs and expenses, the fund’s performance could be negatively impacted. • Rules-Based Strategy Risk. Although the index uses a rules-based proprietary index methodology, there is n\n"

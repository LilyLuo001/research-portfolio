vestable assets (cash, securities, and receivables relating to securities) in an open-end management investment company having substantially the same investment objective, policies, and limitations as the Fund. With respect to the investment limitation on borrowings, the Fund may pledge assets in connection with permitted borrowings. For purposes of the investment limitation on commodities, the Fund does not consider foreign currencies or forward contracts to be physical commodities. This limitation does not prohibit the Fund from purchasing securities backed by physical commodities, including interests in exchange-traded investment trusts and other similar entities, or derivative instruments. In addition, this limitation does not prohibit the Fund from purchasing physical commodities. For purposes of the limitation on commodities, the restriction does not prevent the Fund from investing in a wholly owned subsidiary, thereby gaining exposure to the investment returns of commodities markets within the limitations of federal income tax requirements, or from investing in commodity-linked derivative instruments. None of the foregoing limitations shall be construed to prevent the Fund from purchasing, holding or selling all or a portion of any issuance of sukuk or similarly structured investments. For purposes of the investment limitation on concentration in a particular industry, industry classifications are determined for the Fund in accordance with the industry or sub-industry classifications established by the Global Industry Classification Standard. The more narrowly industries are defined, the more likely it is that multiple industries will be affected in a similar fashion by a single economic or regulatory development. With respect to the fundamental policy relating to industry concentration set forth in (4) above, the 1940 Act does not define what constitutes “concentration” in an industry. The SEC staff has taken the position that investment of 25% or more of a 
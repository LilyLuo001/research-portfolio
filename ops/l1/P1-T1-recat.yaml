A-1 APPENDIX B – PROXY VOTING POLICY FOR NEUBERGER BERMAN INVESTMENT ADVISERS LLC B-1 iv INVESTMENT INFORMATION Each Fund is a separate operating series of Neuberger Berman Income Funds (“Trust”), a Delaware statutory trust established on December 29, 1992. The Trust is registered with the Securities and Exchange Commission (“SEC”) as an open-end management investment company. At the close of business on June 10, 2005, Neuberger Berman Core Bond Fund acquired all the assets and assumed all the liabilities of Ariel Premier Bond Fund, a series of Ariel Investment Trust. Prior to that date, Neuberger Berman Core Bond Fund had no operations. Financial and performance information in this SAI prior to June 10, 2005, for each class of the Fund is that of each respective class of the Ariel Premier Bond Fund, the predecessor to Neuberger Berman Core Bond Fund for performance and accounting purposes. Neuberger Berman Emerging Markets Debt Fund commenced operations as a separate series of the Trust on September 27, 2013. Neuberger Berman Floating Rate Income Fund commenced operations as a separate series of the Trust on December 29, 2009. At the close of business on September 6, 2002, Neuberger Berman High Income Bond Fund acquired all the assets and assumed all the liabilities of Lipper High Income Bond Fund, a series of The Lipper Funds, Inc., and Neuberger Berman High Yield Bond Fund, a prior series of the Trust. Prior to that date, Neuberger Berman High Income Bond Fund had no operations. Neuberger Berman Municipal High Income Fund commenced operations as a separate series of the Trust on June 22, 2015. Through February 9, 2001, Neuberger Berman Municipal Intermediate Bond Fund and Neuberger Berman Short Duration Bond Fund were organized as feeder funds in a master-feeder structure rather than as funds in a multiple-class structure. As feeder funds, they were series of the Trust and Neuberger Berman Income Trust. As of that date, those feeder funds reorganized into the Funds’ Investor Class and Trust Class units of beneficial interest (“shares”), respectively. At the close of business on March 8, 2013, Neuberger Berman Municipal Impact Fund acquired all the assets and assumed all the liabilities of The Empire Builder Tax Free Bond Fund (the “Predecessor Fund”) (the “Reorganization”), and shareholders of the Predecessor Fund received Neuberger Berman Municipal Impact Fund shares in exchange for their Predecessor Fund shares. Prior to that date, Neuberger Berman Municipal Impact Fund had no operations. Financial information in this SAI prior to March 8, 2013, for the Institutional Class of Neuberger Berman Municipal Impact Fund is that of the Builder Class of the Predecessor Fund, the predecessor to Neuberger Berman Municipal Impact Fund for accounting purposes. Neuberger Berman Strategic Income Fund commenced operations as a separate series of the Trust on July 11, 2003. The following information supplements the discussion of the Funds’ investment objectives, policies, and limitations in the Prospectuses. 5 The investment objective and, unless otherwise specified, the investment policies and limitations of each Fund are not fundamental. Any investment objective, policy, or limitation that is not fundamental may be changed by the trustees of the Trust (“Fund Trustees”) without shareholder approval. The fundamental investment policies and limitations of a Fund may not be changed without the approval of the lesser of: (1) 67% of the shares of the Fund present at a meeting at which more than 50% of the outstanding shares of the Fund are present or represented, or (2) a majority of the outstanding shares of the Fund. These percentages are required by the Investment Company Act of 1940, as amended (“1940 Act”), and are referred to in this SAI as a “1940 Act majority vote.” The policy of a Fund permitting it to operate as a non-diversified investment company under the 1940 Act may also change by operation of law. Specifically, Rule 13a-1 under the 1940 Act provides in effect that, if a fund’s investment portfolio actually meets the standards of a diversified fund for three consecutive years, the fund’s status will change to that of a diversified fund. Each Fund (except Neuberger Berman Emerging Markets Debt Fund) operates as a diversified investment company. NBIA is responsible for the day-to-day management of Neuberger Berman Core Bond Fund, Neuberger Berman Floating Rate Income Fund, Neuberger Berman High Income Bond Fund, Neuberger Berman Municipal High Income Fund, Neuberger Berman Municipal Impact Fund, Neuberger Berman Municipal Intermediate Bond Fund, Neuberger Berman Short Duration Bond Fund, and Neuberger Berman Strategic Income Fund. Throughout this SAI, the term “Manager” refers to NBIA with respect to each of these Funds. NBIA has delegated to Neuberger Berman Europe Limited (“NBEL”) day-to-day investment business of Neuberger Berman Emerging Markets Debt Fund. Throughout this SAI, the term “Manager” refers to NBIA or NBEL, as appropriate, with respect to each of these Funds. Investment Policies and Limitations Except as set forth in the investment limitation on borrowing and the investment limitation on illiquid securities, any investment policy or limitation that involves a maximum percentage of securities or assets will not be considered exceeded unless the percentage limitation is exceeded immediately after, and because of, a transaction by a Fund. If events subsequent to a transaction result in a Fund exceeding the percentage limitation on illiquid securities, the Manager will take appropriate steps to reduce the percentage held in illiquid securities, as may be required by law, within a reasonable amount of time. The following investment policies and limitations are fundamental and apply to all Funds unless otherwise indicated: 1. Borrowing (All Funds except Neuberger Berman Core Bond Fund). No Fund may borrow money, except that a Fund may (i) borrow money from banks for temporary or emergency 6 purposes and (except for Neuberger Berman High Income Bond Fund, Neuberger Berman Emerging Markets Debt Fund, and Neuberger Berman Municipal High Income Fund) not for leveraging or investment, and (ii) enter into reverse repurchase agreements for any purpose; provided that (i) and (ii) in combination do not exceed 33-1/3% of the value of its total assets (including the amount borrowed) less liabilities (other than borrowings). If at any time borrowings exceed 33-1/3% of the value of a Fund’s total assets, that Fund will reduce its borrowings within three days (excluding Sundays and holidays) to the extent necessary to comply with the 33-1/3% limitation. Borrowing (Neuberger Berman Core Bond Fund). The Fund may not borrow money, except that it may borrow money from banks for temporary or emergency purposes and not for leveraging or investment; provided that borrowings do not exceed 33-1/3% of the value of its total assets (including the amount borrowed) less liabilities (other than borrowings). If at any time borrowings exceed 33-1/3% of the value of the Fund’s total assets, it will reduce its borrowings within three days (excluding Sundays and holidays) to the extent necessary to comply with the 33-1/3% limitation. 2. Commodities (Neuberger Berman Core Bond Fund, Neuberger Berman High Income Bond Fund, Neuberger Berman Municipal Intermediate Bond Fund and Neuberger Berman Short Duration Bond Fund). Neuberger Berman Core Bond Fund, Neuberger Berman High Income Bond Fund, Neuberger Berman Municipal Intermediate Bond Fund and Neuberger Berman Short Duration Bond Fund may not purchase physical commodities or contracts thereon, unless acquired as a result of the ownership of securities or instruments, but this restriction shall not prohibit a Fund from purchasing futures contracts or options (including options on futures contracts, but excluding options or futures contracts on physical commodities) or from investing in securities of any kind. For Neuberger Be
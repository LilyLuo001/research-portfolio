      497 1 dhrof4978-26x20.htm 497 Document Diamond Hill Funds 325 John H. McConnell Boulevard, Suite 200 Columbus, Ohio 43215 For shareholders of: Diamond Hill Research Opportunities Fund August 26, 2020 Dear Shareholder: We wanted to inform you, as a shareholder of Diamond Hill Research Opportunities Fund, that Diamond Hill Capital Management, Inc. (the “Adviser”) recommended, and the Board of Trustees of your Fund approved, the Adviser’s proposal (“Proposal”) to reorganize your Fund into Diamond Hill Long-Short Fund (together with Diamond Hill Research Opportunities Fund, the “Funds”), effective on or about October 23, 2020. The Adviser’s recommendation to reorganize the two Funds was based largely on your Fund’s ability to attract assets and reach scale and its history of net redemption activity. This reorganization is subject to approval by shareholders of Diamond Hill Research Opportunities Fund. If the reorganization is approved and other closing conditions are satisfied or waived, you will receive the same class of shares of Diamond Hill Long-Short Fund that you hold in Diamond Hill Research Opportunities Fund as of the reorganization date. Both Funds have identical investment objectives. However, while the Funds’ principal investment strategies and investment policies are similar in many respects, there are critical differences between the two. The Diamond Hill Research Opportunities Fund may invest up to 40% of its net assets directly in non-U.S. equity securities, including securities in emerging market countries. By contrast, the Diamond Hill Long-Short Fund may not invest directly in non-U.S. equity securities. As of December 31, 2019, the Diamond Hill Research Opportunities Fund had approximately 10% of its net assets allocated to non-U.S. investments. In addition, per the Funds’ Prospectuses, the Diamond Hill Research Opportunities Fund may sell securities short as part of its principal strategy, whereas the Diamond Hill Long-Short Fund will engage in short sales as part of its principal strategy. Currently, in practice, each Fund sells securities short as part of its principal strategy. As of December 31, 2019, the Diamond Hill Research Opportunities Fund held approximately 19% of its net assets in short holdings, while the Diamond Hill Long-Short Fund held approximately 30% of its net assets in short holdings. The Adviser believes the proposed reorganization offers a number of benefits to shareholders of the Diamond Hill Research Opportunities Fund, including being shareholders of a Fund with greater asset size that creates greater opportunity to benefit from long-term economies of scale and potentially lower total expenses. The Diamond Hill Long-Short Fund has a lower management fee than the Diamond Hill Research Opportunities Fund, but the total expenses for each class may be slightly higher because the Diamond Hill Long-Short Fund currently has higher dividend expenses and fees on securities sold short. The reorganization is designed to qualify as a tax-free reorganization, so you should generally not realize a tax gain or loss as a direct result of the reorganization. If the proposed reorganization is not approved by shareholders, the Adviser intends to recommend that the Board of Trustees vote to liquidate the Diamond Hill Research Opportunities Fund. Shareholders would receive a liquidating distribution on the liquidation date equal to the value of the shares owned. The liquidating distribution would be a taxable transaction. The Proposal will be presented to shareholders at a special meeting of shareholders to be held on October 20, 2020 (the “Meeting”). Additional details about the proposed reorganization are described in the enclosed Q&A/Synopsis and Proxy statement/Prospectus, which you should read carefully. Your Fund’s Board of Trustees believes the proposed reorganization is in the best interest of the Fund and unanimously recommends that shareholders vote FOR the Proposal. Please read the enclosed Proxy Statement/Prospectus carefully and submit your voting instructions. If you have any questions about the Proposal, please call 614-255-3333. Thank you for your consideration of the Proposal, which is important and warrants your consideration. We value your investment and look forward to our continued relationship. Sincerely, Thomas E. Line President Diamond Hill Funds Diamond Hill Funds 325 John H. McConnell Boulevard, Suite 200 Columbus, Ohio 43215 NOTICE OF SPECIAL MEETING OF SHAREHOLDERS To Be Held October 20, 2020 Notice is hereby given that the Board of Trustees of Diamond Hill Funds (the “Trust”) has called a Special Meeting of Shareholders of Diamond Hill Research Opportunities Fund (the “Target Fund”), a series of the Trust, to be held at 325 John H. McConnell Blvd., Suite 200, Columbus, Ohio 43215, on October 20, 2020, at 10:00 a.m. Eastern Time (together with any adjournments or postponements thereof, the “Meeting”). At the Meeting, shareholders of the Target Fund will be asked to vote on the Proposal set forth below, and to transact such other business, if any, as may properly come before the Meeting. Proposal: Approve an Agreement and Plan of Reorganization, which provides for the transfer of all or substantially all of the assets of the Diamond Hill Research Opportunities Fund to Diamond Hill Long-Short Fund in exchange for shares of beneficial interest of Diamond Hill Long-Short Fund and the assumption by Diamond Hill Long-Short Fund of all of the liabilities of Diamond Hill Research Opportunities Fund. Only shareholders of record of the Target Fund as of the close of business on August 14, 2020 (the “Record Date”) are entitled to notice of, and to vote at, the Meeting and any adjournments or postponements thereof. The Notice of Meeting, Proxy Statement and accompanying form of proxy will first be mailed to shareholders on or about August 26, 2020. The Board of Trustees of the Trust unanimously recommends that shareholders of the Target Fund vote FOR the Proposal. By Order of the Board of Trustees, Thomas E. Line, President YOUR VOTE IS IMPORTANT To assure your representation at the Meeting, please complete, date and sign the enclosed proxy card and return it promptly in the accompanying envelope. You also may vote by telephone or via the Internet by following the instructions on the enclosed proxy card. Whether or not you plan to attend the Meeting in person, please vote your shares; if you attend the Meeting, you may revoke your proxy and vote your shares in person. For more information or assistance with voting, please call 614-255-3333. DIAMOND HILL RESEARCH OPPORTUNITIES FUND PROXY STATEMENT/PROSPECTUS AUGUST 26, 2020 Relating to the acquisition of the assets of DIAMOND HILL RESEARCH OPPORTUNITIES FUND by and in exchange for shares of beneficial interest of DIAMOND HILL LONG-SHORT FUND each a series of DIAMOND HILL FUNDS 325 John H. McConnell Blvd., Suite 200 Columbus, Ohio 43215 614-255-3333 INTRODUCTION This proxy statement/prospectus (the “Proxy Statement/Prospectus”) is being furnished to shareholders of Diamond Hill Research Opportunities Fund (the “Target Fund”), a series of Diamond Hill Funds (the “Trust”), in connection with a special meeting of the shareholders of the Target Fund to be held at 325 John H. McConnell Blvd., Suite 200, Columbus, Ohio 43215 on October 20, 2020 at 10:00 a.m. Eastern Time (together with any adjournments or postponements thereof, the “Meeting”). The Board of Trustees of the Trust (the “Board of Trustees” or the “Trustees”) is soliciting proxies from shareholders of the Target Fund for the Meeting. At the Meeting, shareholders will be asked to vote on the Proposal set forth below, and to transact such other business, if any, as may properly come before the Meeting. Proposal: Approve an Agreement and Plan of Reorganization, which provides for the transfer of all or substantially all of the assets of the Diamond Hill Research Opportunities Fund to Diamond Hill Long-Short Fund in exchange for shares of beneficial interest of Diamond Hill Long-Short Fund and the assumption by Diamond Hill Long-Short Fund of all of the liabilities of Diamond Hill Research Opportunities Fund. We refer to Diamond Hill Long-Short Fund as the “Acquiring Fund.” We refer to the Target Fund and the Acquiring Fund collectively as the “Funds.” The Agreement and Plan of Reorganization for this proposed transaction is referred to herein as the “Plan,” and the transaction contemplated by the Plan is referred to herein as the “Reorganization.” As a result of the proposed Reorganization, each shareholder of the Target Fund will receive a number of full and fractional shares of the Acquiring Fund equal in value to their holdings in the Target Fund as of the close of regular trading on the New York Stock Exchange (“NYSE”) on the date of the Reorganization. The number of Acquiring Fund shares of each class that a shareholder of the Target Fund receives will depend on the relative net asset values per share of the applicable class of each Fund immediately prior to the Reorganization. Thus, although the aggregate net asset value in a shareholder’s account will be the same, a Target Fund shareholder may receive a greater or lesser number of shares of the Acquiring Fund than the number of shares of the Target Fund held by the shareholder. The Reorganization will not affect the value of your investment at the time of Reorganization and your interest in the Target Fund will not be diluted. Diamond Hill Capital Management, Inc. (the “Adviser”) is the investment adviser for both the Acquiring Fund and the Target Fund and will remain the investment adviser of the Acquiring Fund following the completion of the Reorganization. After the Reorganization is completed, the Target Fund will be dissolved. The consummation of the Reorganization is contingent upon approval of the Plan by shareholders of the Target Fund. A form of the Plan is attached as Appendix A. If shareholders approve the Plan, the Reorganization is expected to occur on or about October 23, 2020, or as soon as practicable thereafter (the “Closing Date”). This Proxy Statement/Prospectus, Notice of Special Meeting, and the proxy card(s) are first being mailed to shareholders of the Target Fund on or about August 26, 2020. Shareholders of record of the Target Fund as of the close of business on August 14, 2020 (the “Record Date”) are entitled to notice of and to vote at the Meeting. The Board of Trustees unanimously recommends that shareholders of the Target Fund vote FOR the Proposal. This Proxy Statement/Prospectus, which you should read carefully and retain for future reference, sets forth the information that you should know about the Target Fund, the Acquiring Fund, the proposed Reorganization, and the Proposal, before voting on the Proposal. Both Funds have identical investment objectives. However, while the Funds’ principal investment strategies and investment policies are similar in many respects, there are critical differences between the two. The Diamond Hill Research Opportunities Fund may invest up to 40% of its net assets directly in non-U.S. equity securities, including securities in emerging market countries. By contrast, the Diamond Hill Long-Short Fund may not invest directly in non-U.S. equity securities. As of December 31, 2019, the Diamond Hill Research Opportunities Fund had approximately 10% of its net assets allocated to non-US investments. In addition, per the Funds’ Prospectuses, the Diamond Hill Target Fund will sell securities short as part of its principal strategy, whereas the Acquiring Fund may engage in short sales as part of its principal strategy. Currently, in practice, each Fund sells securities short as part of its principal strategy. As of December 31, 2019, the Diamond Hill Research Opportunities Fund held approximately 19% of its net assets in short holdings, while the Diamond Hill Long-Short Fund held approximately 30% of its net assets in short holdings. The Adviser believes that shareholders of the Target Fund may benefit by being shareholders of a Fund with greater asset size that creates greater opportunity to benefit from long-term economies of scale and potentially lower total expenses. The Diamond Hill Long-Short Fund has a lower management fee than the Diamond Hill Research Opportunities Fund, but the total expenses for each class may be slightly higher because the Diamond Hill Long-Short Fund currently has higher dividend expenses and fees on securities sold short and acquired fund fees and expenses. The Board of Trustees has approved the Proposal. The Proxy Statement/Prospectus serves as a prospectus of the Acquiring Fund in connection with the issuance of the Acquiring Fund common shares in the Reorganization. No person has been authorized to give any information or make any representation not contained in this Proxy Statement/Prospectus and, if so given or made, such information or representation must not be relied upon as having been authorized. This Proxy Statement/Prospectus does not constitute an offer to sell or a solicitation of an offer to buy any securities in any jurisdiction in which, or to any person to whom, it is unlawful to make such offer or solicitation. Shares of the Acquiring Fund have not been approved or disapproved by the U.S. Securities and Exchange Commission (“SEC”) nor has the SEC passed upon the accuracy or adequacy of this Proxy Statement/Prospectus. Any representation to the contrary is a criminal offense. The shares of the Funds are not deposits or obligations of, or guaranteed or endorsed by, any financial institution or the U.S. Government, are not insured by the Federal Deposit Insurance Corporation, the Federal Reserve Board or any other government agency, and involve risk, including the possible loss of the principal amount invested. Incorporation by Reference For more information about the investment objective, strategies, restrictions, and risks of the Fund

      497 1 filing859.htm PRIMARY DOCUMENT Supplement to the Fidelity® Limited Term Municipal Income Fund Class A, Class M, Class C, Class I and Class Z February 29, 2020 Prospectus The following information replaces similar information found in the “Fund Basics” section under the “Principal Investment Risks" heading. Many factors affect the fund's performance. Developments that disrupt global economies and financial markets, such as pandemics and epidemics, may magnify factors that affect a fund’s performance. The fund's share price and yield change daily based on changes in market conditions and interest rates and in response to other economic, political, or financial developments. The fund's reaction to these developments will be affected by the types and maturities of securities in which the fund invests, the financial condition, industry and economic sector, and geographic location of an issuer, and the fund's level of investment in the securities of that issuer. Unlike individual debt securities, which typically pay principal at maturity, the value of an investment in the fund will fluctuate. When you sell your shares they may be worth more or less than what you paid for them, which means that you could lose money by investing in the fund. The following information replaces similar information found in the “Shareholder Information” section under the “Converting Shares” heading. Conversion Feature. Effective June 21, 2021, after a maximum of eight years from the initial date of purchase, Class C shares convert automatically to Class A shares of a fund. Prior to June 21, 2021, after a maximum of 10 years from the initial date of purchase, Class C shares convert automatically to Class A shares of a fund. Conversion to Class A shares will be made at NAV. At the time of conversion, a portion of the Class C shares bought through the reinvestment of dividends or capital gains (Dividend Shares) will also convert to Class A shares. The portion of Dividend Shares that will convert is determined by the ratio of your converting Class C non-Dividend Shares to your total Class C non-Dividend Shares. A fund may convert shares sooner in certain circumstances. A shorter holding period may also apply depending on your intermediary. Please see "Sales Charge Waiver Policies Applied by Certain Intermediaries" in the "Appendix" section of this prospectus. A fund will permit an intermediary to transition Class C shares to Class A shares of the same fund, regardless of holding period, if the intermediary is unable to administer this conversion policy. Such transitions to Class A shares will be made at NAV minus any applicable contingent deferred sales charge (CDSC). The following information replaces similar information found in the "Fund Services" section under the "Fund Distribution" heading. The CDSC may be waived on the redemption of shares (applies to Class A, Class M, and Class C, unless otherwise noted): For disability or death. From employer-sponsored retirement plans (except SIMPLE IRAs, SEPs, and SARSEPs) in accordance with required minimum distributions as mandated by the Internal Revenue Code and related regulations. For required minimum distributions from Traditional IRAs, Rollover IRAs, SIMPLE IRAs, SEPs, and SARSEPs (excludes Roth accounts) as mandated by the Internal Revenue Code and related regulations. Through the Fidelity Advisor ® Systematic Withdrawal Program, if the amount does not exceed 12% of the account balance in a rolling 12-month period. (Applicable to Class A and Class M only) Held by insurance company separate accounts. (Applicable to Class A and Class M only) From an employee benefit plan (except SIMPLE IRAs, SEPs, SARSEPs, and plans covering self-employed individuals and their employees) or 403(b) programs (except Fidelity Advisor ® 403(b) programs for which Fidelity or an affiliate serves as custodian). (Applicable to Class A and Class M only) On which a finder's fee was eligible to be paid to an investment professional at the time of purchase, but was not paid because payment was declined (to determine your eligibility for this CDSC waiver, please ask your investment professional if he or she received a finder's fee at the time of purchase). (Applicable to Class C only) On which investment professionals did not receive a concession at the time of purchase. The following information replaces similar information found in the “Appendix” section under the “Sales Charge Waiver Policies Applied by Certain Intermediaries” heading. Sales Charge Waiver Policies Applied by Certain Intermediaries Ameriprise The following information applies to Class A shares purchases if you have an account with or otherwise purchase fund shares through Ameriprise Financial: Shareholders purchasing fund shares through an Ameriprise Financial brokerage account are eligible for the following front-end sales charge waivers and discounts, which may differ from those disclosed elsewhere in this prospectus or SAI. Class A Shares Front-End Sales Charge Waivers Available at Ameriprise Financial: • Employer-sponsored retirement plans (e.g., 401(k) plans, 457 plans, employer-sponsored 403(b) plans, profit sharing and money purchase pension plans and defined benefit plans). For purposes of this provision, employer-sponsored retirement plans do not include SEP IRAs, Simple IRAs or SAR-SEPs. • Shares purchased through reinvestment of capital gains distributions and dividend reinvestment when purchasing shares of the same fund (but not any other fund within the same fund family). • Shares exchanged from Class C shares of the same fund in the month of or following the 7-year anniversary of the purchase date. To the extent that this prospectus elsewhere provides for a waiver with respect to exchanges of Class C shares or conversion of Class C shares following a shorter holding period, that waiver will apply. • Employees and registered representatives of Ameriprise Financial or its affiliates and their immediate family members. • Shares purchased by or through qualified accounts (including IRAs, Coverdell Education Savings Accounts, 401(k)s, 403(b) TSCAs subject to ERISA and defined benefit plans) that are held by a covered family member, defined as an Ameriprise financial advisor and/or the advisor’s spouse, advisor’s lineal ascendant (mother, father, grandmother, grandfather, great grandmother, great grandfather), advisor’s lineal descendant (son, step-son, daughter, step-daughter, grandson, granddaughter, great grandson, great granddaughter) or any spouse of a covered family member who is a lineal descendant. • Shares purchased from the proceeds of redemptions within the same fund family, provided (1) the repurchase occurs within 90 days following the redemption, (2) the redemption and purchase occur in the same account, and (3) redeemed shares were subject to a front-end or deferred sales load (i.e. Rights of Reinstatement). Edward D. Jones & Co., L.P. ("Edward Jones") Policies Regarding Transactions Through Edward Jones The following information has been provided by Edward Jones: Effective on or after February 1, 2021, the following information supersedes prior information with respect to transactions and positions held in fund shares through an Edward Jones system. Clients of Edward Jones (also referred to as "shareholders") purchasing fund shares on the Edward Jones commission and fee-based platforms are eligible only for the following sales charge discounts (also referred to as "breakpoints") and waivers, which can differ from discounts and waivers described elsewhere in the mutual fund prospectus or statement of additional information ("SAI") or through another broker-dealer. In all instances, it is the shareholder's responsibility to inform Edward Jones at the time of purchase of any relationship, holdings of the fund family, or other facts qualifying the purchaser for discounts or waivers. Edward Jones can ask for documentation of such circumstance. Shareholders should contact Edward Jones if they have questions regarding their eligibility for these discounts and waivers. Breakpoints • Breakpoint pricing, otherwise known as volume pricing, at dollar thresholds as described in the prospectus. Rights of Accumulation ("ROA"): • The applicable sales charge on a purchase of Class A shares is determined by taking into account all share classes (except certain money market funds and any assets held in group retirement plans) of the mutual fund family held by the shareholder or in an account grouped by Edward Jones with other accounts for the purpose of providing certain pricing considerations ("pricing groups"). If grouping assets as a shareholder, this includes all share classes held on the Edward Jones platform and/or held on another platform. The inclusion of eligible fund family assets in the ROA calculation is dependent on the shareholder notifying Edward Jones of such assets at the time of calculation. Money market funds are included only if such shares were sold with a sales charge at the time of purchase or acquired in exchange for shares purchased with a sales charge. • The employer maintaining a SEP IRA plan and/or SIMPLE IRA plan may elect to establish or change ROA for the IRA accounts associated with the plan to a plan-level grouping as opposed to including all share classes at a shareholder or pricing group level. • ROA is determined by calculating the higher of cost minus redemptions or market value (current shares x NAV). Letter of Intent ("LOI"): • Through a LOI, shareholders can receive the sales charge and breakpoint discounts for purchases shareholders intend to make over a 13-month period from the date Edward Jones receives the LOI. The LOI is determined by calculating the higher of cost or market value of qualifying holdings at LOI initiation in combination with the value that the shareholder intends to buy over a 13-month period to calculate the front-end sales charge and any breakpoint discounts. Each purchas
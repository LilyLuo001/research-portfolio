eholder Services Plan. (2) Based on estimated amounts for the current fiscal year. The Fund is newly formed and will commence operations following the completion of the reorganization of The E-Valuator Very Conservative (0%-15%) RMS Fund (the “Predecessor Fund”), a series of World Funds Trust, into the Fund, which is expected to occur on or about May 21, 2021. Estimated amounts for the current fiscal year are based on actual expenses incurred for the fiscal period ending September 30, 2020 (excluding non-recurring, legal, trustee and reorganization expenses), adjusted for the new fee and expense structure that will be in effect following the reorganization. (3) Acquired Fund Fees and Expenses are the indirect costs of investing in other investment companies. Total Annual Fund Operating Expenses do not reflect Fund expenses paid indirectly and do not correlate to the expense ratios in the Fund’s Financial Highlights because the Financial Highlights include only the direct operating expenses incurred by the Fund and exclude Acquired Fund Fees and Expenses. (4) Systelligence, LLC (the “Adviser”), has contractually agreed to waive its management fee to an annual rate of 0.38% of the average daily net assets of the Fund. Additionally, after giving effect to the foregoing fee waiver, the Adviser has contractually agreed to limit the total expenses of the Fund (exclusive of interest, distribution fees pursuant to Rule 12b-1 Plans, taxes, acquired fund fees and expenses, brokerage commissions, dividend expense on short sales, other expenditures which are capitalized in accordance with generally accepted accounting principles and other extraordinary expenses not incurred in the ordinary course of business) to an annual rate of 0.80% of the average daily net assets of the Fund. Each waiver and/or reimbursement of an expense by the Adviser is subject to repayment by the Fund within three years following the date that such waiver was made or such expense was incurred, provided 
entations must not be relied upon as having been authorized by the Fund or its distributor. The Prospectuses and this SAI do not constitute an offering by the Fund or its distributor in any jurisdiction in which such offering may not lawfully be made. The “Neuberger Berman” name and logo and “Neuberger Berman Investment Advisers LLC” are registered service marks of Neuberger Berman Group LLC. The individual Fund name in this SAI is either a service mark or registered service mark of Neuberger Berman Investment Advisers LLC. ©2024 Neuberger Berman BD LLC, distributor. All rights reserved. TABLE OF CONTENTS Page INVESTMENT INFORMATION 1 Investment Policies and Limitations 1 Cash Management and Temporary Defensive Positions 5 Additional Investment Information 5 PERFORMANCE INFORMATION 70 TRUSTEES AND OFFICERS 70 Information about the Board of Trustees 70 Information about the Officers of the Trust 75 The Board of Trustees 77 INVESTMENT MANAGEMENT AND ADMINISTRATION SERVICES 86 Investment Manager and Administrator 86 Management and Administration Fees 88 Fund Accounting Agent 89 Contractual Expense Limitations 89 Subadvisers 90 Portfolio Manager Information 91 Other Investment Companies or Accounts Managed 95 Codes of Ethics 96 Management and Control of NBIA 96 DISTRIBUTION ARRANGEMENTS 96 Distributor 96 Additional Payments to Financial Intermediaries 97 Distribution Plan (Class A Only) 99 Distribution Plan (Class C Only) 99 Distribution Plan (Class A and Class C) 100 ADDITIONAL PURCHASE INFORMATION 100 Share Prices and Net Asset Value 100 Subscriptions in Kind 102 Financial Intermediaries 102 Automatic Investing and Dollar Cost Averaging 102 Sales Charges 103 ADDITIONAL EXCHANGE INFORMATION 103 ADDITIONAL REDEMPTION INFORMATION 104 Suspension of Redemptions 104 Redemptions in Kind 104 i CONVERSION INFORMATION 105 DIVIDENDS AND OTHER DISTRIBUTIONS 106 ADDITIONAL TAX INFORMATION 107 Taxation of the Fund 107 Taxation of the Fund’s Shareholders 113 Special Tax Considerations Pertaining to Funds of Funds 116 FUND TRANSACTIONS 117 Portfolio Turnover 120 Proxy Voting 120 PORTFOLIO HOLDINGS DISCLOSURE 121 Portfolio Holdings Disclosure Policy 121 Public Disclosure 121 Selective Disclosure Procedures 122 Portfolio Holdings Approved Recipients 122 REPORTS TO SHAREHOLDERS 124 ORGANIZATION, CAPITALIZATION AND OTHER MATTERS 124 CUSTODIAN AND TRANSFER AGENT 125 INDEPENDENT REGISTERED PUBLIC ACCOUNTING FIRM 125 LEGAL COUNSEL 125 CONTROL PERSONS AND PRINCIPAL HOLDERS OF SECURITIES 125 REGISTRATION STATEMENT 129 FINANCIAL STATEMENTS 129 APPENDIX A – Long-Term and Short-Term Debt Securities Rating Descriptions A-1 APPENDIX B – SUBADVISER PROXY VOTING POLICIES B-1 APPENDIX C – PROXY VOTING POLICY FOR NEUBERGER BERMAN INVESTMENT ADVISERS LLC C-1 ii INVESTMENT INFORMATION The Fund is a separate operating series of Neuberger Berman Alternative Funds (“Trust”), a Delaware statutory trust since February 15, 2005, that is registered with the Securities and Exchange Commission (“SEC”) as an open-end management investment company. The Fund commenced operations on May 15, 2012. The following information supplements the discussion of the Fund’s investment objectives, policies, and limitations in the Prospectuses. The investment objective and, unless otherwise specified, the investment policies and limitations of the Fund are not fundamental. Any investment objective, policy, or limitation that is not fundamental may be changed by the trustees of the Trust (“Fund Trustees”) without shareholder approval. The fundamental investment policies and limitations of the Fund may not be changed without the approval of the lesser of: (1) 67% of the units of beneficial interest (“shares”) of the Fund present at a meeting at which more than 50% of the outstanding shares of the Fund are present or represented, or (2) a majority of the outstanding shares of the Fund. These percentages are required by the Investment Company Act of 1940, as amended (“1940 Act”), and are referred to in this SAI as a “1940 Act majority vote.” The Fund operates as a diversified investment company. Neuberger Berman Investment Advisers LLC (“NBIA”) is responsible for allocating the assets of the Fund to several subadvisers (each a “Subadviser,” collectively the “Subadvisers”). Throughout this SAI, the term “Manager” refers to NBIA or the Subadvisers, as appropriate. Investment Policies and Limitations Except as set forth in the investment limitation on borrowing and the investment limitation on illiquid securities, any investment policy or limitation that involves a maximum percentage of securities or assets will not be considered exceeded unless the percentage limitation is exceeded immediately after, and because of, a transaction by the Fund. If events subsequent to a transaction result in the Fund exceeding the percentage limitation on illiquid securities, the Manager will take appropriate steps to reduce the percentage held in illiquid securities, as may be required by law, within a reasonable amount of time. The following investment policies and limitations are fundamental: 1. Borrowing . The Fund may not borrow money, except that the Fund may (i) borrow money from banks for temporary or emergency purposes and for leveraging or investment and (ii) enter into reverse repurchase agreements for any purpose; provided that (i) and (ii) in combination do not exceed 33-1/3% of the value of its total assets (including the amount borrowed) less liabilities (other than borrowings). If at any time borrowings exceed 33 1/3% of the value of the Fund’s total assets, the Fund will reduce its borrowings within three days (excluding Sundays and holidays) to the extent necessary to comply with the 33-1/3% limitation. 2. Commodities . The Fund may purchase or sell commodities or contracts related to commodities to the extent permitted by (i) the 1940 Act or interpretations or modifications by the SEC, SEC staff or other authority with appropriate jurisdiction, or (ii) exemptive or other relief or permission from the SEC, SEC staff or other authority. 1 3. Diversification . The Fund may not, with respect to 75% of the value of its total assets, purchase the securities of any issuer (other than securities issued or guaranteed by the U.S. Government or any of its agencies or instrumentalities (“U.S. Government and Agency Securities”) or securities issued by other investment companies) if, as a result, (i) more than 5% of the value of the Fund’s total assets would be invested in the securities of that issuer or (ii) the Fund would hold more than 10% of the outstanding voting securities of that issuer. 4. Industry Concentration . The Fund may not make any investment if, as a result, the Fund’s investments will be concentrated in any one industry except as permitted by (i) the 1940 Act or interpretations or modifications by the SEC, SEC staff or other authority with appropriate jurisdiction, or (ii) exemptive or other relief or permission from the SEC, SEC staff or other authority. This limitation does not apply to U.S. Government and Agency Securities, securities of other investment companies, and state, territorial or municipal securities or such other securities as may be excluded for this purpose under the 1940 Act, the rules and regulations thereunder and any applicable exemptive relief or SEC or SEC staff interpretations. 5. Lending . The Fund may lend money or other assets to the extent permitted by (i) the 1940 Act or interpretations or modifications by the SEC, SEC staff or other authority with appropriate jurisdiction, or (ii) exemptive or other relief or permission from the SEC, SEC staff or other authority. 6. Real Estate . The Fund may not purchase or sell real estate except as permitted by (i) the 1940 Act or interpretations or modifications by the SEC, SEC staff or other authority with appropriate jurisdiction, or (ii) exemptive or other relief or permission from the SEC, SEC staff or other authority. 7. Senior Securities . The Fund may not issue senior securities except as permitted by (i) the 1940 Act or interpretations or modifications by the SEC, SEC staff or other authority with appropriate jurisdiction, or (ii) exemptive or other relief or permission from the SEC, SEC staff or other authority. 8. Underwriting . The Fund may not engage in the business of underwriting the securities of other issuers except as permitted by (i) the 1940 Act or interpretations or modifications by the SEC, SEC staff or other authority with appropriate jurisdiction, or (ii) exemptive or other relief or permission from the SEC, SEC staff or other authority. The Fund’s limitation on investments in any one issuer does not limit the Fund’s ability to invest up to 100% of its total assets in a master portfolio with the same investment objective, policies and limitations as the Fund. The Fund has the following additional fundamental investment policy: Notwithstanding any other investment policy of the Fund, the Fund may invest all of its investable assets (cash, securities, and receivables relating to securities) in an open-end management investment company having substantially the same investment objective, policies, and limitations as the Fund. With respect to the investment limitation on borrowings, the Fund may pledge assets in connection with permitted borrowings. For purposes of the investment limitation on commodities, the Fund does not consider foreign currencies or forward contracts to be physical commodities. This limitation does not prohibit the Fund from purchasing securities backed by physical commodities, including interests in exchange-traded investment trusts and other similar entities, or derivative instruments. In addition, this limitation does not prohibit the Fund from purchasing physical commodities. 2 For purposes of the limitation on commodities, the restriction does not prevent the Fund from investing in a wholly owned subsidiary, thereby gaining exposure to the investment returns of commodities markets within the limitations of federal income tax requirements, or from investing in commodity-linked derivative instruments. None of the foregoing limitations shall be construed to prevent the Fund from purchasing, holding or selling all or a portion of any issuance of sukuk or similarly structured investments. For purposes of the investment limitation on concentration in a particular industry, industry classifications are determined for the Fund in accordance with the industry or sub-industry classifications established by the Global Industry Classification Standard. The more narrowly industries are defined, the more likely it is that multiple industries will be affected in a similar fashion by a single economic or regulatory development. With respect to the fundamental policy relating to industry concentration set forth in (4) above, the 1940 Act does not define what constitutes “concentration” in an industry. The SEC staff has taken the position that investment of 25% or more of a fund’s total assets in one or more issuers conducting their principal activities in the same industry or group of industries constitutes concentration. It is possible that interpretations of concentration could change in the future. The policy in (4) above will be interpreted to refer to concentration as that term may be interpreted from time to time by the SEC, SEC staff or other relevant authority. The policy also will be interpreted to permit investment without limit in the following: securities of the U.S. government and its agencies or instrumentalities; securities of state, territory, possession or municipal governments and their authorities, agencies, instrumentalities or political subdivisions; securities of foreign governments; and repurchase agreements collateralized by any such obligations. Accordingly, issuers of the foregoing securities will not be considered to be members of any industry and there will be no limit on investment in issuers domiciled in a single jur

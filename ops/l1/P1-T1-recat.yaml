re a shareholder of Patient Opportunity Trust (the “Target Fund”), a series of Trust for Advised Portfolios (“TAP Trust”) advised by Patient Capital Management, LLC (“Patient Capital” or the “Adviser”). After careful consideration, the Board of Trustees of TAP Trust (the “TAP Board”) has determined that it is in the best interests of the Target Fund to reorganize and merge the Target Fund into a newly created series (the “Acquiring Fund”) of Advisor Managed Portfolios (“AMP Trust”), with the same name as the Target Fund. This transaction will be referred to as the “Reorganization.” Once the Reorganization occurs, the Acquiring Fund will be managed by Patient Capital, including the same portfolio managers, investment analysts and operations teams responsible for day-to-day management, and will have the same management style and investment restrictions as were in place for the Target Fund. The Board has determined that the Reorganization is in the best interests of the Target Fund and its shareholders, and that the interests of the Target Fund’s shareholders will not be diluted as a result of the Reorganization. Importantly, the Reorganization will not result in any change to the Target Fund’s fees and expenses, investment objective, principal investment strategies and risks, or portfolio management team. Following the Reorganization, the advisory agreement and fundamental policies of the Acquiring Fund will not be materially different from those of the Target Fund. Furthermore, the independent members of the TAP Board comprise a majority of the independent members of the Board of Trustees of AMP Trust. In addition, AMP Trust, on behalf of Class A, Class C, Class R and Class FI shares of the Acquiring Fund, will adopt a plan pursuant to Rule 12b-1 under the Investment Company Act of 1940 (the “1940 Act”) that is substantially similar to the plan pursuant to Rule 12b-1 that is currently in place for Class A, Class C, Class R and Class FI shares of the Target Fund, and the Rule 12b-1 distribution fees applicable to Class A, Class C, Class R and Class FI shares of the Acquiring Fund will be identical to the Rule 12b-1 distribution fees applicable to Class A, Class C, Class R and Class FI shares of the Target Fund. As a result, we are not seeking shareholder approval for the Reorganization and we are not requesting a proxy from you. The enclosed Information Statement/Prospectus contains information about the Reorganization. As a result of the Reorganization, shareholders of the Target Fund will receive shares of the corresponding share class of the Acquiring Fund with the same aggregate net asset value as the shares of the Target Fund owned immediately prior to the Reorganization. In evaluating the Reorganization proposal, the TAP Board considered the pending litigation against TAP Trust with respect to an unrelated series of TAP Trust and determined, among other things, that the Reorganization may enable the Acquiring Fund to benefit from greater economies of scale in the future than would otherwise be available to the Target Fund, which could lead to reduced fees or expenses for Acquiring Fund shareholders in the future, and to avoid any negative impact for the Target Fund relating to the pending litigation, including but not limited to the inability to recruit and nominate new independent trustees to serve on the TAP Board. With respect to economies of scale, it is anticipated that AMP Trust could grow to a greater number of investment advisers and funds, as well as net assets, than TAP Trust, which would enable each series of AMP Trust, including the Acquiring Fund, to benefit from spreading certain fixed operating expenses of AMP Trust across more funds and net assets than TAP Trust. The Reorganization is structured to qualify as tax-free for U.S. federal income tax purposes. This document is provided for information only because shareholder approval is not required to effectuate the Reorganization for the Target Fund under TAP Trust’s operating documents, and applicable Delaware state and U.S. federal law (including the 1940 Act). You are encouraged to carefully review the enclosed materials, which explain the Reorganization in more detail. If you have any questions or need additional information, please contact Patient Capital at 800-655-0324. Sincerely, /s/ Russell B. Simon Russell B. Simon, President Trust for Advised Portfolios REORGANIZATION OF Patient Opportunity Trust (a series of Trust for Advised Portfolios) 615 East Michigan Street Milwaukee, WI 53202 800-655-0324 INTO THE Patient Opportunity Trust (a series of Advisor Managed Portfolios) 615 East Michigan Street Milwaukee, WI 53202 800-655-0324 _____________________________________ INFORMATION STATEMENT/PROSPECTUS DATED November 9, 2023 WE ARE NOT ASKING YOU FOR A PROXY AND YOU ARE REQUESTED NOT TO SEND US A PROXY This Information Statement/Prospectus (the “Information Statement/Prospectus”) is furnished to you as a shareholder of Patient Opportunity Trust (the “Target Fund”), a series of Trust for Advised Portfolios (“TAP Trust”) advised by Patient Capital Management, LLC (“Patient Capital” or the “Adviser”). After careful consideration, the Board of Trustees of TAP Trust (the “TAP Board”), including all of the Independent Trustees of TAP Trust, has determined that it is in the best interests of the Target Fund to reorganize and merge the Target Fund into the acquiring fund, Patient Opportunity Trust (the “Acquiring Fund”), a newly created series of Advisor Managed Portfolios (“AMP Trust”) with the same name as the Target Fund. The transaction will be referred to as the “Reorganization,” and the Target Fund and the Acquiring Fund may be referred to together as the “Funds” or a “Fund”. The Target Fund and the Acquiring Fund have identical investment objectives, investment strategies, restrictions, and risks, and there will be no change in investment adviser or portfolio managers. The Target Fund and the Acquiring Fund have identical share class structures. Importantly, the Reorganization will not result in any increase in fees or expenses for the Fund. The TAP Board has approved the Reorganization and has determined that the Reorganization is in the best interests of the Target Fund and its shareholders. The Reorganization is expected to close on or about December 1, 2023 (the “Closing Date”). The Acquiring Fund will open for trading on December 4, 2023. This Information Statement/Prospectus sets forth concisely the information you should know about the Reorganization of the Target Fund and constitutes an offering of the shares of the Acquiring Fund issued in the Reorganization. Please read it carefully and retain it for future reference. In addition, the following documents each have been filed with the U.S. Securities and Exchange Commission (the “SEC”), and are incorporated herein by reference: • the Statement of Additional Information (“SAI”) dated November 9, 2023 relating to this Information Statement/Prospectus; • the Prospectus and SAI related to the Target Fund , dated April 30, 2023, as supplemented June 20, 2023, and is on file with the SEC ( http://www.sec.gov ) (File No. 333-108394) (File No. 811-21422) (Accession No. 0000894189-23-004265); • the Annual Report to shareholders of the Target Fund for the fiscal year ended December 31, 2022, which has previously been sent to shareholders of the Target Fund and is on file with the SEC ( http://www.sec.gov ) (File No. 811-21422) (Accession No. 0001104659-23-030541); • the Semi-Annual Report to shareholders of the Target Fund for the six-month period ended June 30, 2023, which has previously been sent to shareholders of the Target Fund and is on file with the SEC ( http://www.sec.gov ) (File No. 811-21422) (Accession No. 0000894189-23-006917); and • the Prospectus and SAI related to the Acquiring Fund, dated November 1, 2023, and is on file with the SEC ( http://www.sec.gov ) (File No. ) (File No. 333-270997) (File No. 811-23859) (Accession No. [ ]). Because the Acquiring Fund has not yet commenced operations, no annual or semi-annual report is available. This Information Statement/Prospectus will be mailed on or about November 10, 2023 to shareholders of record of the Target Fund as of July 31, 2023 (the “Record Date”). The Target Fund is subject to the informational requirements of the Securities Exchange Act of 1934, as amended, and the 1940 Act, and in accordance therewith, file reports and other information, including proxy materials, with the SEC. The above documents are available upon request and without charge by writing to the Target Fund at Patient Opportunity Trust, c/o U.S. Bank Global Fund Services, P.O. Box 701, Milwaukee, Wisconsin 53201-0701 or by calling toll-free at 800-655-0324. This information is also accessible via the EDGAR database on the SEC’s internet site at www.sec.gov and copies may be obtained upon payment of a duplicating fee, by electronic request at the following E-mail address: publicinfo@sec.gov. The U.S. Securities and Exchange Commission has not approved or disapproved these securities or passed upon the adequacy of this Information Statement/Prospectus. Any representation to the contrary is a criminal offense. No person has been authorized to give any information or make any representation not contained in this Information Statement/Prospectus and, if so given or made, such information or representation must not be relied upon as having been authorized. This Information Statement/Prospectus does not constitute an offer to sell or a solicitation of an offer to buy any securities in any jurisdiction in which, or to any person to whom, it is unlawful to make such offer or solicitation. We are not asking you for a proxy and you are requested not to send us a proxy. Information Statement/Prospectus ii Table of Contents OVERVIEW 1 COMPARISON OF INVESTMENT OBJECTIVE S , STRATEGIES, RISKS AND RESTRICTIONS 1 FEES AND EXPENSES 10 PERFORMANCE HISTORY 11 MANAGEMENT 
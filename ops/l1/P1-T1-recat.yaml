nder normal market conditions, in the securities of other unaffiliated investment companies, including open-end funds, exchange-traded funds (“ETFs”) and closed-end funds (collectively referred to as “Underlying Funds”). The Fund utilizes a risk- managed strategy (thus, the term “RMS” in the Fund’s name) which involves the allocation of invested assets across multiple underlying investments in a manner that attempts to limit fluctuations in annualized returns that would be commensurate to an investor seeking to experience very low volatility as measured by standard deviation. An investment’s volatility is commonly measured by standard deviation. Standard deviation provides the probable range of anticipated returns based on the performance fluctuations over previous time periods (1-year, 3-year, or 5-year). Investments with the lowest levels of standard deviation would be considered very conservative (less volatile), while investments with higher levels of standard deviation would be considered more growth oriented and aggressive in nature (more volatile). The strategy of this Fund is to keep the level of annual performance fluctuation within standard deviation parameters that would be suitable for a very conservative investor, that is, an investor anticipating very low fluctuations in annual return on a year-over-year basis. The standard deviation goal for the Fund is to average between 1% to 3.5% over a 3-year timeframe or a 5-year timeframe. The Fund allocates assets across three broad asset classes (money market, bonds, equities) in a manner that provides a high probability of meeting the standard deviation goals. The Fund will generally allocate 85%-100% of the Fund’s assets among a variety of Underlying Funds that focus on investments in fixed income securities (e.g., money markets and bonds) that possess varying qualities of credit and duration including high-yield securities (also referred to as “junk bonds”). The remaining portion of the Fund’s assets (up to
 and returning it in the enclosed postage-paid return envelope or by voting by telephone or via the internet using the instructions on the proxy card. The Target Trust Board recommends that shareholders of the Target Fund vote “FOR” the Proposal as described in the accompanying Proxy Statement/Prospectus. By order of the Board of Trustees, /s/ Brian R. Wiedmeyer Brian R. Wiedmeyer President and Principal Executive Officer [DATE], 2024 iii SUBJECT TO COMPLETION THE INFORMATION IN THIS PROXY STATEMENT/PROSPECTUS IS NOT COMPLETE AND MAY BE CHANGED. WE MAY NOT SELL THESE SECURITIES UNTIL THE REGISTRATION STATEMENT FILED WITH THE U.S. SECURITIES AND EXCHANGE COMMISSION IS EFFECTIVE. THIS PROXY STATEMENT/PROSPECTUS IS NOT AN OFFER TO SELL THESE SECURITIES AND IS NOT SOLICITING AN OFFER TO BUY THESE SECURITIES IN ANY JURISDICTION WHERE THE OFFER OR SALE IS NOT PERMITTED. Ecofin Global Renewables Infrastructure Fund, a series of Managed Portfolio Series, 615 East Michigan Street Milwaukee, Wisconsin 53202 414-516-1712 Ecofin Global Renewables Infrastructure Fund, a series of The Advisors’ Inner Circle Fund III, One Freedom Valley Drive Oaks, Pennsylvania 19456 1-877-713-7678 PROXY STATEMENT/PROSPECTUS [______], 2024 Introduction This Proxy Statement/Prospectus sets forth concisely information that shareholders of the Ecofin Global Renewables Infrastructure Fund (the “Target Fund”), a series of Managed Portfolio Series (the “Target Trust”), should know before voting on the proposed reorganization that is described herein (the “Reorganization”), and should be retained for future reference. This document is both the proxy statement of the Target Fund and also a prospectus for the Ecofin Global Renewables Infrastructure Fund (the “Acquiring Fund”), a series of The Advisors’ Inner Circle Fund III (the “Acquiring Trust”). The Target Fund and the Acquiring Fund (each, a “Fund” and together, the “Funds”) are each series of registered open-end management investment companies. The Reorganization will be effected pursuant to an Agreement and Plan of Reorganization (the “Agreement”). Under the Agreement, the Target Fund will transfer all of its assets to the Acquiring Fund in exchange for the assumption by the Acquiring Fund of all of the Target Fund’s liabilities and the classes of shares of the Acquiring Fund as set forth in the following chart: If you own shares of the Target Fund listed below Share Class You will receive shares of the Acquiring Fund listed below Share Class Ecofin Global Renewables Infrastructure Fund, a series of the Target Trust A Class Ecofin Global Renewables Infrastructure Fund, a series of the Acquiring Trust A Class Institutional Class Institutional Class RWC Asset Management LLP (the “Acquiring Fund Adviser”) serves as the investment adviser of the Acquiring Fund. Tortoise Capital Advisors, L.L.C, doing business as TCA Advisors (the “Target Fund Adviser”), serves as the investment adviser of the Target Fund. Ecofin Advisors Limited (the “Target Fund Sub-Adviser”) serves as the investment sub-adviser to the Target Fund. A special meeting of the shareholders of the Target Fund (the “Meeting”) will be held on [September 23] at [10:00 a.m.] [Central Time] at the offices of the Target Fund, 615 East Michigan Street, Milwaukee, Wisconsin 53202. At the Meeting, shareholders of the Target Fund will be asked to consider the following proposal (the “Proposal”), and any other matters that may properly come before the Meeting or any adjournment or postponement thereof. Proposal: Ecofin Global Renewables Infrastructure Fund Reorganization To approve the Agreement and Plan of Reorganization, which provides for: (a) the acquisition of all of the assets and assumption of all of the liabilities of the Target Fund by the Ecofin Global Renewables Infrastructure Fund (the “Acquiring Fund”), a newly created series of The Advisors’ Inner Circle Fund III (the “Acquiring Trust”), in exchange for A Class Shares and Institutional Class Shares of the Acquiring Fund; (b) the distribution of such shares to the shareholders of A Class Shares and Institutional Class Shares, respectively, of the Target Fund; and (c) the liquidation of the Target Fund. The total net asset value of shares of the Acquiring Fund (“Acquiring Fund Shares”) that you will receive in the Reorganization will be the same as the total net asset value of your Target Fund shares immediately prior to the Reorganization. The Reorganization is anticipated to be a tax-free transaction for federal income tax purposes. For more detailed information about the federal income tax consequences of the Reorganization, please refer to the section titled “Federal Income Tax Considerations” below. The Board of Trustees of the Target Trust (the “Target Trust Board”) and officers of the Target Trust have fixed the close of business on [July 29], 2024 as the record date (“Record Date”) for the determination of Target Fund shareholders entitled to notice of and to vote at the Meeting and at any adjournment or postponement thereof. Shareholders of the Target Fund on the Record Date will be entitled to one vote for each share of the Target Fund held (and a proportionate fractional vote for each fractional share). This Proxy Statement/Prospectus, the enclosed Notice of Special Meeting of Shareholders, and the enclosed proxy card will be mailed on or about [August 23], 2024, to all shareholders eligible to vote on the Proposal. The Target Trust Board has approved the Agreement and has determined that the Reorganization is in the best interests of the Target Fund and its shareholders. Accordingly, the Target Trust Board recommends that shareholders vote “ FOR ” the Proposal. If shareholders of the Target Fund do not approve its Reorganization, the Target Trust Board will consider other possible courses of action for the Target Fund, including liquidation of the Target Fund. Additional information about the Target Fund is available in the following: 1. Summary Prospectus

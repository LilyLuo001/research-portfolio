ge (load) Imposed on Purchases (as a percentage of offering price) 5.75% None None None None None None Maximum Deferred Sales Charge (load) (as a percentage of the lower of original purchase price or redemption proceeds) None 1.00% None None None None None ANNUAL FUND OPERATING EXPENSES (expenses that you pay each year as a percentage of the value of your investment) Class A Class C Class S Class I Class N Class R Class T Management Fees (1) 0.60% 0.60% 0.60% 0.60% 0.60% 0.60% 0.60% Distribution/Service (12b-1) Fees 0.25% 1.00% 0.25% None None 0.50% None Other Expenses 0.14% 0.13% 0.44% 0.13% 0.02% 0.44% 0.27% Total Annual Fund Operating Expenses 0.99% 1.73% 1.29% 0.73% 0.62% 1.54% 0.87% Fee Waiver and/or Expense Reimbursement (2) 0.00% 0.00% 0.08% 0.00% 0.00% 0.07% 0.00% Total Annual Fund Operating Expenses After Fee Waiver and/or Expense Reimbursement (2) 0.99% 1.73% 1.21% 0.73% 0.62% 1.47% 0.87% (1) This fee may adjust up or down monthly based on the Fund’s performance relative to its benchmark index over the performance measurement period. For more information regarding performance-based advisory fees, refer to “Management Expenses” in the Fund’s Prospectus. (2) The Adviser has contractually agreed to waive its investment advisory fee and/or reimburse operating expenses to the extent that the Fund’s total annual fund operating expenses (excluding any performance adjustments to management fees, the fees payable pursuant to a Rule 12b-1 plan, shareholder servicing fees, such as transfer agency fees (including out-of-pocket costs), administrative services fees and any networking/omnibus fees payable by any share class, brokerage commissions, interest, dividends, taxes, acquired fund fees and expenses, and extraordinary expenses) exceed 0.75 % for at least a one-year period commencing on January 26, 2024 . This contractual waiver may be terminated or modified only at the discretion of the Board of Trustees. EXAMPLE: The Example is intended to help you compare the co
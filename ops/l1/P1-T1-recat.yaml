# P1-T1-recat — full-text re-categorization recovery (deepseek v4-pro)
# BUILT ON BOX; targets reasons=['MENTION', 'recheck_noevent']. Re-reads whole filings.
worker: deepseek
web_search: false
max_items_per_call: 4
est_cost: 0.10   # per-chunk estimate (guard multiplies by n_chunks); real ~Y3
items:
  - id: "0000894189-25-003730"
    prompt: |
      【规则 v2 (manual §T1). 这是"再判定"任务: 给你某备案的完整正文(而非节选)。
      STEP 1 找出所有 reorganization/conversion, 指明 TARGET(被并入/被转换方) 与 ACQUIRER(存续方)。
      STEP 2 用原文判定二者结构: TARGET 是否 open-end mutual fund(多类别/按 NAV 申赎);
      ACQUIRER 是否 ETF(exchange-traded fund/上市交易)。
      STEP 3 判定: 仅当 TARGET=open-end mutual fund 且 ACQUIRER=ETF → event(含 shell 转换、
      被现有 ETF 收购、以及已完成转换的追溯陈述)。否则 no_event 并给 reason:
      MF_TO_MF / ETF_TO_ETF / CEF / INTERVAL / SHARECLASS / MENTION。
      输出一个 JSON 对象: {"verdict":"event|no_event","reason":"<若 no_event>",
      "fund_name":"目标共同基金名","mutual_fund_ticker":"XXXXX|NA","etf_ticker":"XXXX|NA",
      "announce_date":"YYYY-MM-DD|NA","effective_date":"YYYY-MM-DD|NA",
      "asset_class":"equity_US|equity_intl|fixed_income|other|NA","confidence":"H|M|L",
      "evidence":"≤25词原文引用(event 必引证 ACQUIRER 为 ETF 且 TARGET 为共同基金)"}。
      不得凭记忆; 原文找不到的字段填 NA。】
      完整正文:
      497 1 scharf497a.htm 497 scharf497a Filed pursuant to Rule 497(a) File Nos. 333-17391; 811-07959 Subject to Completion, dated May 8, 2025 The information in this prospectus is not complete and may be changed. We may not sell these securities until the registration statement filed with the Securities and Exchange Commission is effective. This prospectus is not an offer to sell these securities and is not soliciting an offer to buy these securities in any state where the offer or sale is not permitted. PROSPECTUS [ ], 2025 Scharf ETF (Ticker: KAT) Scharf Global Opportunity ETF (Ticker: GKAT) each of the above listed on The Nasdaq Stock Market LLC (the “Exchange”) The U.S. Securities and Exchange Commission has not approved or disapproved these securities or determined if this Prospectus is truthful or complete. Any representation to the contrary is a criminal offense. TABLE OF CONTENTS SUMMARY SECTIONS 1 Scharf ETF 1 Scharf Global Opportunity ETF 9 PRINCIPAL INVESTMENT STRATEGIES AND RELATED RISKS 17 PORTFOLIO HOLDINGS INFORMATION 25 MANAGEMENT OF THE FUNDS 25 HOW TO BUY AND SELL SHARES 28 DIVIDENDS, DISTRIBUTIONS, AND TAXES 30 DISTRIBUTION 32 PREMIUM/DISCOUNT INFORMATION 33 ADDITIONAL NOTICES 33 INDEX DESCRIPTIONS 33 FINANCIAL HIGHLIGHTS 34 SUMMARY SECTION Scharf ETF Investment Objective The Scharf ETF (the “Fund”) seeks long-term capital appreciation. Fees and Expenses of the Fund The following table describes the fees and expenses you may pay if you buy, hold, and sell shares of the Fund (“Shares”). This table and the Example below do not include the brokerage commissions and other fees to financial intermediaries that investors may pay on their purchases and sales of Shares. ANNUAL FUND OPERATING EXPENSES ( expenses that you pay each year as a percentage of the value of your investment ) Management Fees 0.75 % Distribution and Service (Rule 12b-1) Fees None Other Expenses* 0.00 % Total Annual Fund Operating Expenses 0.75 % * Estimated for the current fiscal year. Example This Example is intended to help you compare the cost of investing in the Fund with the cost of investing in other funds. The Example assumes that you invest $10,000 in the Fund for the time periods indicated and then redeem and hold all of your Shares at the end of those periods. The Example also assumes that your investment has a 5% return each year and that the Fund’s operating expenses remain the same. The Example does not take into account brokerage commissions that you may pay on your purchases and sales of Shares. Although your actual costs may be higher or lower, based on these assumptions your costs would be: 1 Year 3 Years $77 $240 Portfolio Turnover The Fund pays transaction costs, such as commissions, when it buys and sells securities (or “turns over” its portfolio). A higher portfolio turnover rate may indicate higher transaction costs and may result in higher taxes when Fund shares are held in a taxable account. These costs, which are not reflected in annual fund operating expenses or in the Example, affect the Fund’s performance. For the most recent fiscal year, the Scharf Predecessor Fund’s (defined below) portfolio turnover rate was 33% of the average value of its portfolio. Principal Investment Strategies of the Fund Under normal market conditions, the Fund primarily invests in equity securities that the Adviser believes have significantly more appreciation potential than downside risk over the long term. Equity securities in which the Fund may invest include, but are not limited to, common and preferred stock of mid- and large- capitalization companies, rights, and warrants. The Fund may invest up to 50% of its total assets in securities of foreign issuers listed on foreign exchanges (excluding depositary receipts), including up to 25% of its total assets in issuers in emerging markets. The Fund may invest without limit in depositary receipts, such as American Depositary Receipts (“ADRs”), European Depositary Receipts (“EDRs”) and Global Depositary Receipts (“GDRs”). The Fund may also invest up to 30% of its total assets in non- 1 money market investment companies, including exchange-traded funds (“ETFs”). The Fund may also invest in Rule 144A securities. In general, the Adviser utilizes five key elements in its equity investment philosophy: low valuation, discount to fair value, investment flexibility, focus and long-term perspective. Through a proprietary screening process, the Adviser seeks to identify investments with low valuations combined with growing earnings, cash flow and/or book value. The Fund may also invest in “special situations,” which may occur when the securities of a company are affected by circumstances, including, but not limited to, hidden assets ( i.e. , assets that may be undervalued on a company’s balance sheet or otherwise difficult to value and therefore not properly reflected in the company’s share price), spinoffs, liquidations, reorganizations, recapitalizations, mergers, management changes and technological changes. In addition, the Fund may invest up to 30% of its total assets in fixed-income securities. Fixed-income securities in which the Fund may invest include, but are not limited to, those of domestic and foreign governments, government agencies, inflation-protected securities, asset-backed securities, exchange-traded notes (“ETNs”), money market instruments, convertible securities, bank debt, limited partnerships, municipalities and companies across a wide range of industries, market capitalizations and maturities and may include those that are rated below investment grade ( i.e. , “junk bonds”). The types of asset-backed securities in which the Fund may invest include mortgage-backed securities. The Adviser uses a combination of proprietary research techniques including traditional fundamental research as well as quantitative technology tools (including rules-based software-enhanced models) to analyze and interpret information relevant to security selection and to integrate the Adviser’s views on security selection, valuation and risk into portfolio construction. The Fund may invest up to 100% of its net assets in cash, cash equivalents, and high-quality, short-term debt securities, money market mutual funds and money market instruments due to a lack of suitable investment opportunities or for temporary defensive purposes. When selling securities, the Adviser considers the same factors it uses in evaluating a security for purchase and generally sells securities that it believes no longer have sufficient upside potential. The Fund is classified as “non-diversified” under the 1940 Act, which means that it may invest more of its assets in the securities of a single issuer or a smaller number of issuers than if it were a diversified fund. Principal Risks of Investing in the Fund By itself, the Fund is not a complete, balanced investment plan. The Fund cannot guarantee that it will achieve its investment objectives. Losing all or a portion of your investment is a risk of investing in the Fund. The following risks are considered principal and could affect the value of your investment in the Fund: • ETF Risks. The Fund is an ETF, and, as a result of an ETF’s structure, it is exposed to the following risks: ◦ Authorized Participants, Market Makers, and Liquidity Providers Concentration Risk. The Fund has a limited number of financial institutions that may act as Authorized Participants (“APs”). In addition, there may be a limited number of market makers and/or liquidity providers in the marketplace. To the extent either of the following events occur, Shares may trade at a material discount to NAV and possibly face delisting: (i) APs exit the business or otherwise become unable to process creation and/or redemption orders and no other APs step forward to perform these services, or (ii) market makers and/or liquidity providers exit the business or significantly reduce their business activities and no other entities step forward to perform their functions. 2 ◦ Costs of Buying or Selling Shares. Due to the costs of buying or selling Shares, including brokerage commissions imposed by brokers and bid-ask spreads, frequent trading of Shares may significantly reduce investment results and an investment in Shares may not be advisable for investors who anticipate regularly making small investments. ◦ Shares May Trade at Prices Other Than NAV. As with all ETFs, Shares may be bought and sold in the secondary market at market prices. Although it is expected that the market price of Shares will approximate the Fund’s NAV, there may be times when the market price of Shares is more than the NAV intra-day (premium) or less than the NAV intra-day (discount) due to supply and demand of Shares or during periods of market volatility. This risk is heightened in times of market volatility, periods of steep market declines, and periods when there is limited trading activity for Shares in the secondary market, in which case such premiums or discounts may be significant. Because securities held by the Fund may trade on foreign exchanges that are closed when the Fund’s primary listing exchange is open, the Fund is likely to experience premiums and discounts greater than those of domestic ETFs. ◦ Trading . Although Shares are listed for trading on the Exchange and may be traded on U.S. exchanges other than the Exchange, there can be no assurance that Shares will trade with any volume, or at all, on any stock exchange. In stressed market conditions, the liquidity of Shares may begin to mirror the liquidity of the Fund’s underlying portfolio holdings, which can be significantly less liquid than Shares. ◦ Cash Transaction Risk . The Fund may effect a portion of its creations and redemptions for cash, rather than in-kind securities. The Fund may be required to sell or unwind portfolio investments to obtain the cash needed to distribute redemption proceeds. This may cause the Fund to recognize a capital gain that it might not have recognized if it had made a redemption in kind. As a result, the Fund may pay out higher annual capital gain distributions than if the in-kind redemption process was used. The use of cash creations and redemptions may also cause the Fund’s shares to trade in the market at wider bid-ask spreads or greater premiums or discounts to the Fund’s NAV • General Market Risk. Economies and financial markets throughout the world are becoming increasingly interconnected, which increases the likelihood that events or conditions in one country or region will adversely impact markets or issuers in other countries or regions. Securities in the Fund’s portfolio may underperform in comparison to securities in general financial markets, a particular financial market or other asset classes due to a number of factors, including: inflation (or expectations for inflation); deflation (or expectations for deflation); interest rates; market instability; financial system instability; debt crises and downgrades; embargoes; tariffs; sanctions and other trade barriers; regulatory events; other governmental trade or market control programs and related geopolitical events. In addition, the value of the Fund’s investments may be negatively affected by the occurrence of global events such as war, terrorism, environmental disasters, natural disasters or events, country instability, and infectious disease epidemics or pandemics. Conflict, loss of life and disaster connected to ongoing armed conflict between Ukraine and Russia in Europe and Israel and Hamas in the Middle East could have severe adverse effects on the region, including significant adverse effects on the regional or global economies and the markets for certain securities. The U.S. and the European Union imposed sanctions on certain Russian individuals and companies, including certain financial institutions, and have limited certain exports and imports to and from Russia. The war has contributed to recent market volatility and may continue to do so. • Equity Securities Risk. The value of the Fund’s shares will go up or down based on the movement of the overall stock market and the value of the individual securities held by the Fund, both of which can sometimes be volatile. 3 • Management Risk. The Fund is an actively managed portfolio. The Adviser’s management practices and investment strategies might not produce the desired results. The Adviser may be incorrect in its assessment of a stock’s appreciation potential. • Model Risk. The Adviser may use proprietary models in identifying, evaluating and selecting securities for the Fund, and to weight the portfolio. These models generally use technology and software and rely on both internally developed data as well as third-party data. Technology implemented tools are subject to greater risks associated with computer hardware and software, including risks associated with cybersecurity events or software faults. Inaccurate or incomplete data, or improper application of data within a model, could limit the effectiveness of any quantitative tool. Models may be improperly constructed, or may rely on factors (such as historical market performance data) that may not be as relevant in current markets. The Fund could be adversely affected by the Adviser’s use of models in managing the Fund’s portfolio. • Technology Risk. The Adviser uses a range of technology and software programs in managing the Fund. These include proprietary and third-party data and systems used to identify or evaluate securities or otherwise support portfolio managers. Software or hardware failures or faults, cyber events, incorrect programming, or inaccurate, incomplete or unreliable data could adversely affect the Adviser’s implementation of the investment strategy and the Fund’s performance. • Foreign and Emerging Market Securities Risk. Investments in foreign currencies and foreign issuers are subject to additional risks, including political and economic risks, greater volatility

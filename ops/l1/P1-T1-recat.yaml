      Rule 497 (c) File No. 333-215607 PROSPECTUS WEBs ETF Trust (formerly, Syntax ETF Trust) WEBs Defined Volatility QQQ ETF ( DVQQ ) December 17, 2024 Principal U.S. Listing Exchange: Nasdaq, Inc. WEBs Defined Volatility QQQ ETF (the “Fund”) is an exchange -traded fund (“ETF”). This means that shares of the Fund (“Shares”) are listed on Nasdaq, Inc., its Principal U.S. Listing Exchange (the “Exchange”), a national securities exchange, and trade at market prices. The market price for the Shares may be different from the Fund’s net asset value per share (the “NAV”). The Securities and Exchange Commission (“SEC”) has not approved or disapproved these securities or passed upon the accuracy or adequacy of this Prospectus. Any representation to the contrary is a criminal offense. The Shares are not guaranteed or insured by the Federal Deposit Insurance Corporation or any other agency of the U.S. Government, nor are Shares deposits or obligations of any bank. It is possible to lose money by investing in the Fund. Table of Contents WEBs DEFINED VOLATILITY QQQ ETF 3 ADDITIONAL INFORMATION ABOUT THE FUND’S PRINCIPAL INVESTMENT STRATEGIES 12 ADDITIONAL RISK INFORMATION 14 MANAGEMENT 20 FUND SERVICE PROVIDERS 22 SHAREHOLDER PROCEEDINGS 22 INDEX/TRADEMARK LICENSES AND DISCLAIMER 23 ADDITIONAL PURCHASE AND SALE INFORMATION 23 DISTRIBUTIONS 24 PORTFOLIO HOLDINGS DISCLOSURE 25 U.S. FEDERAL INCOME TAXATION 25 GENERAL INFORMATION 27 PREMIUM/DISCOUNT INFORMATION 28 CODE OF ETHICS 28 DISTRIBUTION PLAN 28 OTHER INFORMATION 28 FINANCIAL HIGHLIGHTS 28 WHERE TO LEARN MORE ABOUT THE FUND 29 2 WEBs DEFINED VOLATILITY QQQ ETF OBJECTIVE The Fund seeks to provide investment results that, before fees and expenses, correspond to the performance of the Syntax Defined Volatility Triple Q’s Index (the “Index”). FEES AND EXPENSES OF THE FUND This table describes the fees and expenses that you may pay if you buy, hold and sell shares of the Fund (“Fund Shares”). You may pay other fees, such as brokerage commissions and other fees to financial intermediaries, which are not reflected in this table and the Example below. Annual Fund Operating Expenses (Expenses that you pay each year as a percentage of the value of your investment): Management Fees 1 0.85 % Distribution and Service (12b-1) Fees 0.00 % Other Expenses 2 0.00 % Acquired Fund Fees and Expenses 3 0.11 % Total Annual Fund Operating Expenses 0.96 % ​ (1) Unitary management fee under which the investment adviser pays substantially all expenses of the Fund (including the cost of transfer agency, sub-advisory, custody, fund administration, legal, audit and other services and license fees, if any, and any expenses incurred by the Trust and allocated to the Fund), excluding the fee paid to the investment adviser, interest, taxes, acquired fund fees and expenses, if any, brokerage commissions and other expenses connected with the Independent Trustees of the Trust, their counsel, the execution of portfolio transactions (including any net account or similar fees charged by futures commission merchants), distribution and service fees payable pursuant to a Rule 12b-1 plan, if any, and extraordinary expenses. ​ (2) “Other Expenses” are estimates based on the expenses the Fund expects to incur for the current fiscal year. ​ (3) “Acquired Fund Fees and Expenses” are based on estimated amounts for the current fiscal year. Example: This Example is intended to help you compare the cost of investing in the Fund with the cost of investing in other funds. The Example assumes that you invest $10,000 in the Fund for the time periods indicated, and then sell all of your Fund Shares at the end of those periods. The Example also assumes that your investment has a 5% return each year and that the Fund’s operating expenses remain the same. Although your actual costs may be higher or lower, based on these assumptions your costs would be: 1 Year 3 Years $ 98 $ 306 PORTFOLIO TURNOVER The Fund pays transaction costs, such as commissions, when it buys and sells securities (or “turns over” its portfolio). A higher portfolio turnover rate may indicate higher transaction costs and may result in higher taxes when Fund Shares are held in a taxable account. These costs, which are not reflected in Total Annual Fund Operating Expenses or in the Example, affect the Fund’s performance. Because the Fund has not yet commenced operations, portfolio turnover information is unavailable at this time. PRINCIPAL INVESTMENT STRATEGIES The Fund is a passively managed ETF listed for trading on the Exchange. The Fund implements its investment objective by investing, under normal market conditions, at least 80% of its net assets (including borrowings for investment purposes) in financial instruments that achieve the investment results of the Index. Syntax Defined Volatility Triple Q’s Index . The Index is a rules -based strategy that seeks to track the performance of the Invesco QQQ Trust SM , Series 1 (“QQQ” or the “Underlying ETF”), with investment exposure to the Underlying ETF adjusted for a targeted annual volatility rate of 22% (a representation of the annual long -term volatility rate of the Underlying ETF) (the “Defined Volatility Rate”). The Index was created by Syntax LLC (“Syntax” or the “Index Provider”). 3 Volatility is a statistical measurement of the magnitude of asset price fluctuations (increases or decreases in an asset’s price) over time. In general, an investment with high levels of volatility will subject an investor to more significant variances in gains and losses than the investment with lower volatility over the same period. Realized volatility is the historically observed movement of the price of an asset over a given period. The Index dynamically allocates exposure to the Underlying ETF by comparing the Underlying ETF’s 21 -day realized volatility (short -term volatility) to the Defined Volatility Rate. The Fund, in seeking to track the Index, will increase exposure to the Underlying ETF to the extent short -term volatility is lower than the Defined Volatility Rate and, conversely, will decrease exposure to the Underlying ETF to the extent short -term volatility is higher than the Defined Volatility Rate. On each day of trading of the Underlying ETF, the Index calculates the short -term volatility of the Underlying ETF by measuring the daily volatility returns of the past 21 days of trading for the Underlying ETF and • when the measured Underlying ETF short -term volatility is below the Defined Volatility Rate, the Index increases exposure to the Underlying ETF in order to adjust the Underlying ETF short -term volatility up to the Defined Volatility Rate; • when the measured Underlying ETF short -term volatility is above the Defined Volatility Rate, the Index decreases exposure to the Underlying ETF in order to adjust the Underlying ETF short -term volatility down to the Defined Volatility Rate. As further described below, the Index seeks to implement this strategy by primarily allocating to shares of the Underlying ETF and alternately allocating to either a total return swap on the Underlying ETF, as a way of applying leverage to the Underlying ETF and thereby increasing volatility to the Defined Volatility Rate, or a cash position as a way of reducing volatility to the Defined Volatility Rate. The Fund does not seek to track the investment performance of the Underlying ETF, and exposure to the Underlying ETF will vary dynamically in the Fund’s strategy, between 0 -200 %. See “Additional Information About the Fund’s Principal Investment Strategies” for a discussion of the Index. There is no assurance that the Index or the Fund will successfully maintain the Defined Volatility Rate in accordance with its investment objective. The Fund’s returns will likely differ in amount, and possibly even direction, from the returns of the Underlying ETF. These differences can be significant, the Fund and the Underlying ETF may incur substantial losses. The Fund could lose money regardless of the performance of its Underlying ETF and as a result of portfolio rebalancing, fees, the Underlying ETF’s volatility, compounding and other factors, the Fund is unlikely to match the performance of the Underlying ETF . The Index seeks to provide investment exposure to the “total returns” of the Underlying ETF. The total returns of the Underling ETF are based upon the Underlying ETF’s market price and include capital gains, dividends and distributions paid by the Underlying ETF. The Underlying ETF is a unit investment trust that seeks to track the investment results, before fees and expenses, of the NASDAQ -100 Index, which includes 100 of the largest domestic and international non -financial companies listed on the Nasdaq Stock Market based on market capitalization. While Index and the Underlying ETF reflect companies across major industry groups, more than 50% of the holdings are in the information technology sector. The Underlying ETF does not contain securities of financial companies, including investment companies. Swap agreements are contracts entered into primarily with major financial institutions for a specified period ranging from a day to more than one year. In a “swap” transaction, two parties agree to exchange the return (or differentials in rates of return) earned or realized on predetermined investments or instruments for a specified time period. The Fund expects to enter into one or more over -the-counter (“OTC”) swap agreements with major global financial institutions for a specified period ranging from a day to more than one year to provide exposure to the investment performance the Index. The terms of the Fund’s OTC swap agreement are expected to provide payments whereby only the net amount is paid to the counterparty entitled to receive the net payment. The Fund’s obligations (or rights) under the OTC swap agreement will be equal only to the net amount to be paid or owed under the agreement, based on the relative values of the positions held by each counterparty. The Fund will, from time to time as determined by the Index, hold cash, cash -like instruments or high -quality fixed income securities (collectively, a “Cash Position”). The Cash Position may consist of income -producing (1) U.S. Government securities, such as bills, notes and bonds issued by the U.S. Treasury; (2) money market funds; (3) fixed income ETFs; (4) collateralized repurchase agreements; and/or (5) corporate debt securities, such as commercial paper and other short -term unsecured promissory notes issued by companies that are rated investment grade or of comparable quality. 4 Concentration Policy. To the extent the Underlying ETF concentrates ( i.e. , holds 25% or more of its total assets) in the securities of a particular industry or group of industries, the Fund will concentrate its investments to approximately the same extent as the Underlying ETF. As of the date of this prospectus, a significant portion of the Underlying ETF is represented by securities of companies in the information technology sector. Diversification Status. The Fund is classified as “non -diversified ” under the Investment Company Act of 1940 (the “1940 Act”), which means that the Fund may invest a higher percentage of its assets in a fewer number of issuers than is permissible for a “diversified” fund. PRINCIPAL RISKS OF INVESTING IN THE FUND As with all investments, there are certain risks of investing in the Fund. Fund Shares will change in value, and you could lose money by investing in the Fund. An investment in the Fund is not a deposit of a bank and is not insured or guaranteed by the Federal Deposit Insurance Corporation or any other governmental agency. There can be no assurance that the Fund’s investment objective will be achieved. The principal risks are presented in alphabetical order to facilitate finding particular risks and comparing them with other funds. Each risk summarized below is considered a “principal risk” of investing in the Fund, regardless of the order in which it appears. The significance of each risk factor below may change over time and you should review each risk factor carefully. Active Market Risk. Although the Fund Shares are listed for trading on the Exchange, there can be no assurance that an active trading market for the Fund Shares will develop or be maintained. Fund Shares trade on the Exchange at market prices that may be below, at or above the Fund’s NAV. Securities, including the Fund Shares, are subject to market fluctuations and liquidity constraints that may be caused by such factors as economic, political, or regulatory developments, changes in interest rates, and/or perceived trends in securities prices. Fund Shares could decline in value or underperform other investments. Authorized Participant Concentration Risk. Only an authorized participant may engage in creation or redemption transactions directly with the Fund. The Fund has a limited number of institutions that act as authorized participants on an agency basis (i.e. on behalf of other market participants). To the extent that these institutions exit the business or are unable to proceed with orders for issuance or redemption of creation units and no other authorized participant is able to step forward to fulfill the order, in either of these cases, Shares may trade at a discount to the Fund’s NAV and possibly face delisting. This may also result in significantly diminished trading market for the Shares. Cash Position Risk. The Fund’s Cash Position may include obligations issued or guaranteed by the U.S. Government, its agencies and instrumentalities, including bills, notes and bonds issued by the U.S. Treasury, money market funds, short term bond ETFs and corporate debt securities, such as commercial paper. Some securities issued or guaranteed by federal agencies and U.S. Government -sponsored instrumentalities may not be backed by the full faith and credit of the United States, in which case 
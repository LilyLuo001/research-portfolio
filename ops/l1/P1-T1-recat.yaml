      N-14 1 d852707dn14.htm N-14 N-14 Table of Contents As filed with the Securities and Exchange Commission on October 11, 2024 File No. 333- UNITED STATES SECURITIES AND EXCHANGE COMMISSION Washington, D.C. 20549 FORM N-14 REGISTRATION STATEMENT UNDER THE SECURITIES ACT OF 1933 ☐ Pre-Effective Amendment No. ☐ Post-Effective Amendment No. TIAA-CREF FUNDS (Exact Name of Registrant as Specified in Charter) 730 Third Avenue New York, New York 10017-3206 (Address of Principal Executive Offices: Number, Street, City, State, Zip Code) (800) 842-2733 (Area Code and Telephone Number) Rachael M. Zufall, Esq. Teachers Advisors, LLC 8500 Andrew Carnegie Blvd. Charlotte, North Carolina 28262 (Name and Address of Agent for Service) Copy to: Deborah Bielicke Eades Vedder Price P.C. 222 North LaSalle Street Chicago, Illinois 60601 Mark Czarniecki, Esq. Nuveen Fund Advisors, LLC Vice President and Secretary 901 Marquette Avenue Minneapolis, Minnesota 55402 Christopher P. Harvey, Esq. Adam T. Teufel, Esq. Dechert LLP One International Place, 40th Floor 100 Oliver Street Boston, Massachusetts 02110 Eric F. Fess, Esq. Chapman and Cutler LLP 320 South Canal Chicago, Illinois 60606 Approximate date of proposed public offering: As soon as practicable after the effective date of this Registration Statement. Title of securities being registered: Shares of beneficial interest, par value $0.0001 per share, of the Registrant. It is proposed that this filing will become effective on November 12, 2024 pursuant to Rule 488 under the Securities Act of 1933, as amended. No filing fee is required because of reliance on Section 24(f) and an indefinite number of shares have previously been registered pursuant to Rule 24f-2 under the Investment Company Act of 1940, as amended. Table of Contents IMPORTANT INFORMATION FOR SHAREHOLDERS OF NUVEEN MID CAP VALUE 1 FUND At a special meeting of shareholders of Nuveen Mid Cap Value 1 Fund (the “Target Fund”), a series of Nuveen Investment Funds, Inc. (the “Target Company”), you will be asked to vote on the proposed reorganization of your Target Fund into Nuveen Mid Cap Value Fund (the “Acquiring Fund”), a series of TIAA-CREF Funds (the “Acquiring Trust”). The Target Fund and the Acquiring Fund are collectively referred to herein as the “Funds” and individually as a “Fund.” The reorganization of the Target Fund and Acquiring Fund is referred to herein as the “Reorganization.” The Board of Directors of the Target Company (the “Board”), comprised entirely of independent Board members, unanimously recommends that you vote FOR the proposed Reorganization. Although we recommend that you read the complete Proxy Statement/Prospectus enclosed herewith, for your convenience we have provided the following brief overview of the proposal to be voted on. Q. What is the rationale for the Reorganization? A. The Target Fund and the Acquiring Fund are managed by affiliated investment advisers. Nuveen Fund Advisors, LLC (“Nuveen Fund Advisors”) serves as the Target Fund’s investment adviser, and Nuveen Asset Management, LLC (“Nuveen Asset Management”) serves as the Target Fund’s sub-adviser. Teachers Advisors, LLC (“Teachers Advisors”) serves as the investment adviser of the Acquiring Fund. Nuveen Fund Advisors, Nuveen Asset Management and Teachers Advisors (collectively, the “Advisers”) are each wholly-owned subsidiaries of Nuveen, LLC (“Nuveen”), the investment management arm of Teachers Insurance and Annuity Association of America (“TIAA”). The Reorganization is part of Nuveen’s ongoing effort to enhance the increasingly integrated offerings of Nuveen’s global equities platform. In light of the overlapping of investment teams, including that the portfolio managers of the Target Fund joined the team of portfolio managers of the Acquiring Fund in March 2024, the Advisers determined that combining the Funds would eliminate redundant products, would result in lower expenses for Target Fund shareholders and may result in expense savings for the surviving Fund over time. The Reorganization will allow shareholders of the Target Fund to continue their investment in a mid-cap equity fund with investment objectives and strategies that are similar to those of the Target Fund and with generally comparable historical performance. In addition, shareholders of the Target Fund are expected to recognize cost savings because of the Acquiring Fund’s lower total annual operating expenses. See the Proxy Statement/Prospectus under “Board Approval of the Reorganization.” Q. How will the Reorganization affect my shares? A. Upon the closing of the Reorganization, shareholders of the Target Fund will receive shares of the Acquiring Fund having a total net asset value equal to the total net asset value of the Target Fund shares surrendered by such shareholder. This means that the total value of the Acquiring Fund shares you receive in the Reorganization will be the same as the total value of the Target Fund shares you held immediately prior to the closing of the Reorganization. Holders of Class A shares and Class C shares of the Target Fund will receive Class A shares of the Acquiring Fund, holders of Class I shares of the Target Fund will receive Class I shares of the Acquiring Fund and Class R6 holders of the Target Fund will receive Class R6 shares of the Acquiring Fund. See the Proxy Statement/Prospectus under “The Reorganization – Description of Securities.” Table of Contents Q. Will shareholders of the Target Fund incur sales loads, contingent deferred sales charges (“CDSC”) or any other similar fees on Acquiring Fund shares in the Reorganization? A. No. Shareholders will not incur a sales load, commission or any other similar fee on shares issued in connection with the Reorganization. If your Target Fund shares are subject to a CDSC (which may be the case for purchases of Class A shares of $1 million or more that were not subject to a front-end sales load or Class C shares), the holding period will carry over to the Acquiring Fund for purposes of determining whether the CDSC applies with respect to Class A shares of the Acquiring Fund received by Class A shareholders of the Target Fund, and the CDSC will be waived with respect to Class A shares of the Acquiring Fund received by Class C shareholders of the Target Fund. After the completion of the Reorganization, additional purchases of shares of the Acquiring Fund will not be subject to any sales load, CDSC or other similar fees, other than Class A shares, which may be subject to a sales load of up to 5.75% of the offering price. As a result of the Reorganization, (i) holders of Class A shares and Class C shares of the Target Fund will receive Class A shares of the Acquiring Fund, and such shares will be subject to the $15 annual low balance account fee if held in certain types of accounts (including individual retirement accounts and Coverdell Education Savings Accounts) with balances under $1,000; and (ii) all other holders of shares of the Target Fund will receive their respective class of shares of the Acquiring Fund, which are not subject to an annual low balance account fee. Q. Are the Target Fund and the Acquiring Fund managed by the same investment adviser, sub-adviser and portfolio managers? A. The Target Fund and the Acquiring Fund have different, but affiliated, investment advisers, and the portfolio managers of the Target Fund are also portfolio managers of the Acquiring Fund. The Target Fund is managed by an affiliated sub-adviser, while the Acquiring Fund does not have a sub-adviser and is managed by Teachers Advisors. Following the Reorganization, Teachers Advisors will serve as the adviser for the surviving Fund. The portfolio managers responsible for the day-to-day management of the Target Fund are Karen L. Bowie and David F. Johnson, and the portfolio managers responsible for the day-to-day management of the Acquiring Fund are Karen L. Bowie, David A. Chalupnik, David F. Johnson and Evan F. Staples. Following the Reorganization, the portfolio managers of the Acquiring Fund will continue to serve as the portfolio managers for the surviving Fund. Q. How do the Funds’ investment objectives, principal investment strategies and principal risks compare? A. The investment objective of the Target Fund is to seek capital appreciation, and the investment objective of the Acquiring Fund is to seek a favorable long-term total return, mainly through capital appreciation, primarily from equity securities of medium-sized domestic companies. The Target Fund pursues its objective by investing at least 80% of its net assets and the amount of any borrowings for investment purposes in common stocks of companies that have market capitalizations within the market capitalization range of the companies in the Russell Midcap ® Index. The Target Fund invests in companies that Nuveen Asset Management believes are undervalued relative to other companies in the same industry or market, exhibit good or improving fundamentals, and exhibit an identifiable catalyst that could close the gap between market value and fair value over the next one to two years. The Acquiring Fund pursues its objective by investing at least 80% of its net assets in equity securities of medium-sized companies, as defined by the Acquiring Fund’s benchmark index, the Russell Midcap ® Value Index. The Acquiring Fund invests in companies that Teachers Advisors believes appear undervalued by the market based on an evaluation of their potential worth. A more detailed comparison of the investment objectives and investment policies of the Funds is contained in the Proxy Statement/Prospectus. ii Table of Contents Given the Funds’ similar investment objectives and strategies, an investment in each Fund is subject to many of the same principal risks (e.g., market risk, mid-cap risk and foreign investment risk). The risks applicable to the Funds are listed and compared in the Proxy Statement/Prospectus under “Risk Factors.” Q. How will the Reorganization impact fees and expenses? A. If the Reorganization had taken place as of April 30, 2024, the date of the most recent semi-annual shareholder report for each Fund, the pro forma total annual fund operating expenses of the Acquiring Fund following the Reorganization would have been lower than the Target Fund’s total annual fund operating expenses across all share classes, both before and after fee waivers and expense reimbursements. The increased asset size of the surviving Fund may result in expense savings for shareholders of the surviving Fund over time. Pro forma amounts are estimated; actual operating expenses will vary based on asset size and other factors. See the Proxy Statement/Prospectus under “Further Comparison of the Funds—Fees and Expenses.” Q. Will shareholders of the surviving Fund receive the same shareholder services that shareholders of the Target Fund currently receive? A. Yes. The shareholder services and shareholder programs of the Funds are identical. Q. Will the portfolio of the Target Fund be repositioned prior to the Reorganization? A. Yes, but such repositioning is expected to occur only after Target Fund shareholders approve the Reorganization. Prior to completion of the Reorganization, the Target Fund will sell certain securities to better align the Target Fund’s holdings with those of the Acquired Fund. If the Reorganization had taken place as of June 30, 2024, the Advisers estimate that approximately 9% of the Target Fund portfolio would have been sold and other securities would have been purchased to more closely align to holdings of the Acquiring Fund. If such sales had occurred as of June 30, 2024, the Advisers estimate that the transaction costs associated with repositioning would have been approximately $14,680 (or $0.0018 per share) for the Target Fund. These transaction costs represent expenses of the Target Fund and thus will be borne by the Target Fund and its shareholders. Actual market prices and gains or losses experienced by the Target Fund will depend upon market conditions at the time of its portfolio repositioning. Q. Will the Reorganization have tax consequences to me? A. The Reorganization is intended to qualify as a tax-free reorganization for federal income tax purposes. Therefore, it is expected that you will recognize no gain or loss for federal income tax purposes as a direct result of the Reorganization. However, prior to the closing of the Reorganization, the Target Fund expects to distribute all its previously undistributed net investment income and net capital gains, if any. The Acquiring Fund is also expected to make such a distribution prior to the closing of the Reorganization. Such distributions will generally be taxed as ordinary income or capital gains for federal income tax purposes, unless you are investing through a tax-advantaged account such as an IRA or 401(k) plan (in which case you may be taxed upon withdrawal of your investment from such account). These distributions will be reinvested in additional shares of the Funds unless a shareholder has made an election to receive distributions in cash. The tax character of such distributions will be the same regardless of whether they are paid in cash or reinvested in additional Fund shares. Any unutilized capital loss carryforwards of the Target Fund would carry over to the Acquiring Fund and potentially could be used for the benefit of all Acquiring Fund shareholders, although the use of such loss carryforwards after the Reorganization may be subject to an annual limitation. See the Proxy Statement/Prospectus under “The Reorganization—Material Federal Income Tax Consequences.” iii Table of Contents Q. Who will bear the costs of the Reorganization? A. Nuveen Fund Advisors, Teachers Advisors or an affiliate thereof will bear the direct costs of the Reorganization, which the Advisers estimate to be approximately $615,000. The Target Fund and its shareholders will bear the cost of portfolio repositioning i

ders, printing, postage, costs of calculating net asset value, brokerage commissions or transaction costs, taxes, registration fees, the fees and expenses of qualifying each Fund and its shares for distribution under federal and state securities laws and membership dues in the Investment Company Institute or any similar organization. In rendering investment advisory services, the Adviser may use the portfolio management, research and other resources of William Blair International, Ltd. (U.K.) (“William Blair U.K.”), an affiliate of the Adviser. William Blair U.K. is not registered with the U.S. Securities and Exchange Commission (the “SEC”) as an investment adviser under the Investment Advisers Act of 1940, as amended. William Blair U.K. has entered into a Memorandum of Understanding (“MOU”) with the Adviser pursuant to which William Blair U.K. is considered a “participating affiliate” of the Adviser as that term is used in relief granted by the staff of the SEC allowing U.S. registered investment advisers to use portfolio management or research resources of advisory affiliates subject to the supervision of a registered adviser. Investment professionals from William Blair U.K. may render portfolio management, research and other services to the Funds under the MOU and are subject to supervision by the Adviser. The Management Agreement continues in effect from year to year for each Fund for so long as its continuation is approved at least annually (a) by a majority of the Trustees who are not parties to such Management Agreement or interested persons of any such party except in their capacity as Trustees of the Trust and (b) by the shareholders of the Fund or the Board of Trustees. The Management Agreement may be terminated at any time upon 60 days’ notice by either party. A Fund may terminate the Management Agreement either by vote of the Board of Trustees or by majority vote of the outstanding shares of the Fund. The Management Agreement may also be terminated at an
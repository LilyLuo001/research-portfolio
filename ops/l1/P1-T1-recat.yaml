      497 1 d728925d497.htm CALAMOS INVESTMENT TRUST CALAMOS INVESTMENT TRUST Table of Contents Table of Contents Table of Contents Calamos Timpani SMID Growth Fund 1 Other Important Information Regarding Fund Shares 4 Additional Information About Investment Strategies and Related Risks 5 Fund Facts 9 Who manages the Fund? 9 What classes of shares does the Fund offer? 10 How can I buy shares? 15 How can I sell (redeem) shares? 19 Transaction information 24 Distributions and taxes 28 Other Information 29 Financial Highlights 31 Appendix 32 For More Information back cover Table of Contents Calamos Timpani SMID Growth Fund Investment Objective Calamos Timpani SMID Growth Fund’s investment objective is capital appreciation. Fees and Expenses of the Fund The following table describes the fees and expenses that you may pay if you buy and hold shares of the Fund. You may qualify for sales charge discounts on purchases of Class A shares if you and your family invest, or agree to invest in the future, at least $50,000 in Calamos Funds. More information about these and other discounts is available from your financial professional and under “Fund Facts — What classes of shares do the Funds offer?” on page 10 of the Fund’s prospectus, in the Appendix to this prospectus and “Share Classes and Pricing of Shares” on page 46 of the Fund’s statement of additional information. Investors may pay commissions and/or other forms of compensation to an intermediary, such as a plan record-keeper or financial intermediary, for transactions in Class R6 shares, which are not reflected in the table or the example below. Shareholder Fees (fees paid directly from your investment): CLASS A CLASS I CLASS R6 Maximum Sales Charge (Load) Imposed on Purchases (as a percentage of offering price) 4.75 % None None Maximum Deferred Sales Charge (Load) (as a percentage of the lesser of the redemption price or offering price) None None None Annual Fund Operating Expenses (expenses that you pay each year as a
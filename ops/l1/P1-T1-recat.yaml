      497 1 rationalspecial497.htm 497 Rational Special Situations Income Fund Class A: RFXAX Class C: RFXCX Institutional: RFXIX PROSPECTUS July 17, 2019 This Prospectus provides important information about the Fund that you should know before investing. Please read it carefully and keep it for future reference. The Securities and Exchange Commission has not approved or disapproved these securities or determined if this Prospectus is truthful or complete. Any representation to the contrary is a criminal offense. Beginning January 1, 2021, the Fund intends to meet its shareholder report delivery obligations by posting annual and semi-annual shareholder reports to the Fund’s website, www.rationalmf.com rather than delivering paper copies. You will be notified by mail each time a report is posted and provided with the website link to access the report. You may elect to receive paper copies of a specific shareholder report or all future shareholder reports free of charge by contacting your financial intermediary (such as a broker-dealer or bank) or, if you are a direct investor, by calling the Fund at 1-800-253-0412 . Your election to receive reports in paper will apply to all funds held within the fund complex. You may elect to receive shareholder reports and other communications from the Fund or your financial intermediary electronically by contacting your financial intermediary or, if you are a direct shareholder, by calling the Fund at 1-800-253-0412 . If you already elected to receive shareholder reports electronically, you will not be affected by this change and you do not need to do anything. TABLE OF CONTENTS FUND SUMMARY: RATIONAL SPECIAL SITUATIONS INCOME FUND 3 ADDITIONAL INFORMATION ABOUT THE FUND’S PRINCIPAL INVESTMENT STRATEGIES AND RELATED RISKS 13 HOW TO BUY SHARES 42 ADDITIONAL PAYMENTS TO FINANCIAL INTERMEDIARIES 54 VALUING FUND ASSETS 54 DIVIDENDS, DISTRIBUTIONS AND TAXES 55 MANAGEMENT OF THE FUND 57 FINANCIAL HIGHLIGHTS 59 APPENDIX A 60 FOR MORE INFORMATION 64 FUND SUMMARY: RATIONAL SPECIAL SITUATIONS INCOME FUND Investment Objective: The Fund’s investment objective is to seek total return consisting of capital appreciation and income. Fees and Expenses of the Fund: This table describes the fees and expenses that you may pay if you buy and hold shares of the Fund. You may qualify for sales charge discounts on purchases of Class A shares if you and your family invest, or agree to invest in the future, at least $50,000 in the Fund. More information about these and other discounts is available from your financial professional and is included in the sections of the Fund’s Prospectus entitled How to Buy Shares on page 43 and Appendix A - I ntermediary-Specific Sales Charge Reductions and Waivers , and in the sections of the Fund’s Statement of Additional Information (“SAI”) entitled Waivers and Reductions of Up-Front Sales Charge on Class A Shares on page 52. Shareholder Fees (fees paid directly from your investment) Institutional Shares Class A Shares Class C Shares Maximum Sales Charge (Load) Imposed on Purchases (as a percentage of offering price) None 4.75% None Maximum Deferred Sales Charge (Load) (as a percentage of the lesser of the original purchase price or the net asset value of shares at the time of redemption) None None (1) 1.00% (2) Maximum Sales Charge (Load) Imposed on Reinvested Dividends and other Distributions None None None Redemption Fee None None None Exchange Fee None None None Annual Fund Operating Expenses (expenses that you pay each year as a percentage of the value of your investment) Management Fees 1.50% 1.50% 1.50% Distribution (12b-1) Fees None 0.25% 1.00% Other Expenses (including shareholder services fee of up to 0.25%) (3) 0.66% 0.66% 0.66% Total Annual Fund Operating Expenses (3) 2.16% 2.41% 3.16% Fee Waivers and/or Expense Reimbursements (3)(4) 0.41% 0.41% 0.41% Total Annual Fund Operating Expenses After Fee Waivers and/or Expense Reimbursements (3)(4) 1.75% 2.00% 2.75% (1) In the case of investments of $1 million or more (where you do not pay an initial sales charge and the selling broker receives a commission), a 1.00% contingent deferred sales charge (“CDSC”) may be assessed on shares redeemed within two years of purchase. (2) Maximum Deferred Sales Charge on Class C Shares applies to shares sold within 12 months of purchase. (3) Estimated expenses for the current fiscal year. (4) The Fund’s investment advisor, Rational Advisors, Inc., has contractually agreed to waive all or a portion of its management fee and/or reimburse certain operating expenses of the Fund to the extent necessary in order to limit the Total Annual Fund Operating Expenses (exclusive of acquired fund fees and expenses, brokerage commissions and trading costs, interest (including borrowing costs and overdraft charges), taxes, short sale dividends and interest expenses, non-routine or extraordinary expenses (such as litigation or reorganizational costs), and costs and expenses of litigation or claims on behalf of the Fund regarding portfolio investments initiated (or threatened) by the investment adviser or sub-advisor) to not more than 1.75%, 2.00% and 2.75% of the daily net assets of the Fund’s Institutional Shares, Class A Shares and Class C Shares, respectively, through April 30, 2021. This arrangement may only be terminated prior to this date with the agreement of the Fund’s Board of Trustees. Under certain conditions, the Advisor may recoup management fees that it waived or Fund expenses that it paid under this agreement for a period of three years after the fees were waived or expenses paid, if the recoupment can be achieved without causing the expense ratio of the share class (after the recoupment is taken into account) to exceed (i) the expense limit in effect at the time the fees were waived or expenses paid, or (ii) the expense limit in place at the time of the recoupment. 1 Example: This Example is intended to help you compare the cost of investing in the Fund with the cost of investing in other mutual funds. The Example assumes that you invest $10,000 in the Fund for the time periods indicated and then redeem (or you hold, as applicable) all of your shares at the end of those periods. The Example also assumes that your investment has a 5% return each year, operating expenses remain the same and that the expense reduction/reimbursement remains in place for the contractual period only. Although your actual costs may be higher or lower, based on these assumptions your costs would be: 1 Year 3 Years Institutional Shares $178 $637 Class A Shares $668 $1,154 Class C Shares – no redemption $278 $936 Class C Shares – with redemption $378 $936 Portfolio Turnover : The Fund pays transaction costs, such as commissions, when it buys and sells securities (or “turns over” its portfolio). A higher portfolio turnover rate may indicate higher transaction costs and may result in higher taxes when Fund shares are held in a taxable account. These costs, which are not reflected in annual fund operating expenses or in the Example, affect the Fund’s performance. Because the Fund has not commenced operations as a mutual fund as of the date of this Prospectus, the Fund has not yet had any portfolio turnover. In the future, the portfolio turnover rate for the most recent fiscal year will be provided here. Principal Investment Strategies : The Fund seeks to achieve its investment objective by primarily investing in agency and non-agency residential and commercial mortgage-backed securities, with a focus on non-agency residential mortgage-backed securities. Non-agency residential mortgage-backed securities are collateralized by pools of residential mortgages which are not insured by government sponsored enterprises or agencies (such as Federal National Mortgage Association (FNMA), Federal Home Loan Mortgage Corporation (FHLMC) and Government National Mortgage Association (GNMA). The Fund’s non-agency mortgage-backed securities investments have a wide variety of payment characteristics and preferences, and can have fixed or floating interest rates. The Fund may also invest in collateralized debt obligations (“CDOs”), collateralized loan obligations (“CLOs”) and other asset-backed securities, including those backed by credit card receivables, auto loans, aircraft leases and student loans. The Fund’s investment sub-advisor, ESM Management, LLC (the "Sub-Advisor"), will allocate the Fund’s investments to asset classes that it views as offering the best values in the marketplace on a relative (risk-adjusted) basis at that time, with an emphasis on preservation of capital. The Sub-Advisor seeks to identify, through its own proprietary research and analysis, investments that it believes are undervalued and/or have the potential to achieve an above-market yield over the longer term. The investment strategy seeks to identify “special situations” within fixed income markets, particularly the market for non-agency mortgage-backed securities, where the Fund will make opportunistic investments in securities that may be mispriced due to structural or market driven factors. In this regard, the Sub-Advisor seeks to identify inefficiencies or flaws in the underlying legal and technical structures of certain debt issuances, and then exploit these opportunities while seeking to limit downside exposure. The Sub-Advisor seeks to identify investments where a technical or structural flaw that has gone unnoticed by other market participants, or if the market is aware of the issue, where other participants are, in the opinion of the Sub-Advisor, undervaluing the expected return. The Sub-Advisor will seek to remedy issues it has identified in the security through activist strategies, including (i) bringing the technical issue to the attention of indenture trustees or servicers; (ii) negotiating with the applicable parties to compensate the Fund for the issue; or (iii) through litigation or the threat of litigation. The opportunities that the Sub-Advisor seeks to identify may come in the form of flaws of logic or interpretation in a debt security’s pooling and servicing 2 agreements or bond indentures. Once an investment is identified, the Sub-Advisor estimates various factors, including the investment’s anticipated baseline return, potential upside, probability of upside scenario and investment horizon. Based on this analysis and the market opportunity in terms of outstanding issue size and ability to source the security, the Fund’s investment will be sized based on the Sub-Advisor’s discretion. The Fund does not limit its investments to a particular credit quality and may invest without limitation in debt securities rated below investment grade (commonly referred to as "junk" bonds). Below investment grade securities include those rated, at the time of purchase, below Baa3 by Moody's Investor Services or equivalently by another nationally recognized statistical rating organization (“NRSRO”), as well as non-rated securities determined by the Sub-Advisor to be of comparable quality. The securities underlying the mortgage- and asset-backed securities in which the Fund invests may include distressed debt securities (i.e., underlying loans and assets that are in default or likely to default). An NRSRO will consider the underlying loans or assets collateralizing a mortgage- or asset-backed security when determining the credit rating of such security. The Sub-Advisor will also take into account the security’s credit rating when evaluating the security for investment by the Fund. In managing the Fund’s investments, the Sub-Advisor seeks to construct an investment portfolio with a weighted average maturity that ranges between 1 and 30 years and a weighted average effective duration that ranges between -9 and 9 years. Duration measures the price sensitivity of a fixed income security to changes in interest rates. Effective duration is a measure of the Fund’s portfolio duration adjusted for the anticipated effect of interest rate changes on bond and mortgage pre-payment rates. Certain mortgage-related securities in which the Fund may invest such as interest-only securities and related derivatives have “negative duration.” This means that the value of these instruments normally increases as interest rates increase, unlike most other debt instruments. This generally allows some portion of the portfolio’s market risk to be hedged with a purchase, rather than a short sale, and allows the portfolio to realize positive cash flows on the hedge as a result of interest received with respect to that security. The Fund may also invest in U.S. Treasury and agency securities, structured notes, and over-the-counter and exchange-traded derivative instruments. The Fund will use derivatives for hedging and investment purposes. The Fund may hedge against rising interest rates through interest rate swaps, interest rate-linked futures and call and put options on interest rate futures. The Fund may hedge against rising default rates through credit default swaps, total return swaps linked to an asset or asset class representative of the default risks faced by the Fund, and credit spread options. The Fund may also use one or more of these derivatives as a substitute for or to gain exposure to a security or asset class. The Fund concentrates its investments in the mortgage-backed securities industry, which includes agency and non-agency mortgage-backed securities. The Fund is classified as “non-diversified” for purposes of the Investment Company Act of 1940 (the “1940 Act”), which means a relatively high percentage of the Fund’s assets may be invested in the securities of a limited number of issuers. Principal Risks of Investing in the Fund : As with any mutual fund, there is no guarantee that the Fund will achieve its objective. Investment markets are unpredictable and there will be certain market conditions where the Fund will not meet its investment objective and will lose money. The Fund’

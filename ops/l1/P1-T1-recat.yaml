Appendix to this prospectus and “Share Classes and Pricing of Shares” on page 75 of the Fund’s statement of additional information. Shareholder Fees (fees paid directly from your investment): CLASS A CLASS C CLASS I Maximum Sales Charge (Load) Imposed on Purchases (as a percentage of offering price) 2.25 % None None Maximum Deferred Sales Charge (Load) (as a percentage of the lesser of the redemption price or offering price) None 1.00 % None Annual Fund Operating Expenses (expenses that you pay each year as a percentage of the value of your investment): CLASS A CLASS C CLASS I Management Fees 0.66 % 0.66 % 0.66 % Distribution and/or Service Fees (12b-1) 0.25 % 1.00 % None Dividend Expense on Short Positions 0.18 % 0.18 % 0.18 % Other Expenses 0.15 % 0.15 % 0.15 % Acquired Fund Fees and Expenses 1 0.02 % 0.02 % 0.02 % Total Annual Fund Operating Expenses 1.26 % 2.01 % 1.01 % 1 “Acquired Fund Fees and Expenses” include certain expenses incurred in connection with the Fund’s investment in various money market funds, affiliated mutual funds, and ETFs. Example This example is intended to help you compare the cost of investing in the Fund with the cost of investing in other mutual funds. The example assumes that you invest $10,000 in the Fund for the time periods indicated and then either redeem or do not redeem your shares at the end of the reflected time periods. The example also assumes that your investment has a 5% return each year, that all dividends and capital gain distributions are reinvested, that you pay a maximum initial or contingent deferred sales charge and that the Fund’s operating expenses remain the same. Although your actual performance and costs may be higher or lower, based on these assumptions, your costs would be: You would pay the following expenses if you redeemed your shares at the end of the period: One Year Three Years Five Years Ten Years Class A 350 616 901 1,713 Class C 304 630 1,083 2,338 Class I 103 322 558 1,236 You would pay the following expenses if you did not redeem your shares: One Year Three Years Five Years Ten Years Class A 350 616 901 1,713 Class C 204 630 1,083 2,338 Class I 103 322 558 1,236 PROSPECTUS | February 28, 2020 1 Table of Contents Calamos Market Neutral Income Fund Portfolio Turnover The Fund pays transaction costs, such as commissions, when it buys and sells securities (or “turns over” its portfolio). A higher portfolio turnover rate may indicate higher transaction costs and may result in higher taxes when Fund shares are held in a taxable account. These costs, which are not reflected in the annual fund operating expenses or in the example, affect the Fund’s performance. During the most recent fiscal year, the Fund’s portfolio turnover rate was 73.8% of the average value of its portfolio. Principal Investment Strategies The Fund’s investment strategy can be characterized as “market neutral” because it seeks to achieve maximum current income while maintaining a low correlation to the fluctuations of the U.S. equity market as a whole. The Fund invests (i) equities (ii) convertible securities (including synthetic convertible securities) of U.S. companies without regard to market capitalization and (iii) employs short selling and enters into total return swaps to enhance income and hedge against market risk. The convertible securities in which the Fund invests may be either debt securities or preferred stocks that can be exchanged for common stock. The average term to maturity of the convertible securities purchased by the Fund will typically range from two to ten years. A synthetic convertible instrument is a financial instrument (or two or more securities held in tandem) that is designed to simulate the economic characteristics of a convertible security through the combined features of a debt instrument and a security providing an option on an equity security. The Fund may establish a synthetic convertible instrument by combining fixed-income securities (which may be either convertible or non-convertible) with the right to acquire equity securities. In establishing a synthetic instrument, the Fund may combine a basket of fixed-income securities with a basket of warrants or options that together produce economic characteristics similar to a convertible security. Within each basket of fixed-income securities and warrants or options, different companies may issue the fixed-income and convertible components, which may be purchased separately and at different times. The Fund may seek to generate income from option premiums by writing (selling) options. This would include the use of both call and put options. The Fund may write call options (i) on a portion of the equity securities (including securities that are convertible into equity securities) in the Fund’s portfolio and (ii) on broad-based securities indexes (such as the S&P 500 or MSCI EAFE) or ETFs (exchange traded funds). In addition, to seek to offset some of the risk of a potential decline in value of certain long positions, the Fund may also purchase put options on individual securities, broad-based securities indexes (such as the S&P 500), or ETFs. The Fund may invest without limit in high yield fixed-income securities (often referred to as “junk bonds”). In addition, the Fund may engage in active and frequent trading of portfolio securities. The Fund may also invest in ETFs. The Fund’s investment adviser seeks to lower the risks of investing in stocks by using a “top-down approach” of diversification by company, industry, sector, country and currency and focusing on macro-level investment themes. Principal Risks An investment in the Fund is subject to risks, and you could lose money on your investment in the Fund. There can be no assurance that the Fund will achieve its investment objective. The risks associated with an investment in the Fund can increase during times of significant market volatility. Your investment in the Fund is not a deposit in a bank and is not insured or guaranteed by the Federal Deposit Insurance Corporation or any other government agency. The principal risks of investing in the Fund include: • Convertible Hedging Risk — If the market price of the underlying common stock increases above the conversion price on a convertible security, the price of the convertible security will increase. The Fund’s increased liability on any outstanding short position would, in whole or in part, reduce this gain. • Convertible Securities Risk — The value of a convertible security is influenced by changes in interest rates, with investment value declining as interest rates increase and increasing as interest rates decline. The credit standing of the issuer and other factors also may have an effect on the convertible security’s investment value. • Covered Call Writing Risk — As the writer of a covered call option on a security, the Fund foregoes, during the option’s life, the opportunity to profit from increases in the market value of the security, covering the call option above the sum of the premium and the exercise price of the call. 2 CALAMOS FAMILY OF FUNDS Table of Contents Calamos Market Neutral Income Fund • Debt Securities Risk — Debt securities are subject to various risks, including interest rate risk, credit risk and default risk. • Interest Rate Risk — The value of debt securities generally decreases in periods when interest rates are rising. In addition, interest rate changes typically have a greater effect on prices of longer-term debt securities than shorter term debt securities. Recent fixed-income market events, including increases in volatility and interest rates, may expose the Fund to heightened interest rate risk and volatility. • Credit Risk — A debt security could deteriorate in quality to such an extent that its rating is downgraded or its market value declines relative to comparable securities. If the Fund holds securities that have been downgraded, or that default on payment, the Fund’s performance could be negatively affected. • Default Risk — A company that issues a debt security may be unable to fulfill its obligation to repay principal and interest. The lower a bond is rated, the greater its default risk. To the extent the Fund holds securities that have been downgraded, or that default on payment, its performance could be negatively affected. • Derivatives Risk — Derivatives are instruments, such as futures and forward foreign currency contracts, whose value is derived from that of other assets, rates or indices. The use of derivatives for non-hedging purposes may be considered more speculative than other types of investments. Derivatives can be used for hedging (attempting to reduce risk by offsetting one investment position with another) or non-hedging purposes. Hedging with derivatives may increase expenses, and there is no guarantee that a hedging strategy will work. While hedging can reduce or eliminate losses, it can also reduce or eliminate gains. In addition, derivative instruments are subject to counter party risk, meaning that the party who issues the derivatives may experience a significant credit event and may be unwilling or unable to make timely settlement payments or otherwise honor its obligations. Changes in the value of a derivative may not correlate perfectly with the underlying asset, rate or index, and the Fund could lose more than the principal amount invested. • Equity Securities Risk — The securities markets are volatile, and the market prices of the Fund’s securities may decline generally. The price of equity securities fluctuates based on changes in a company’s financial condition and overall market and economic conditions. If the market prices of the securities owned by the Fund (i.e., the Fund’s long position) fall, the value of your investment in the Fund will decline. • Foreign Securities Risk — Risks associated with investing in foreign securities include fluctuations in the exchange rates of foreign currencies that may affect the U.S. dollar value of a security, the possibility of substantial price volatility as a result of political and economic instability in the foreign country, less public information about issuers of securities, different securities regulation, different accounting, auditing and financial reporting standards and less liquidity than in U.S. markets. • High Yield Risk — High yield securities and unrated securities of similar credit quality (commonly known as “junk bonds”) are subject to greater levels of credit and liquidity risks. High yield securities are considered primarily speculative with respect to the issuer’s continuing ability to make principal and interest payments. • Liquidity Risk — Liquidity risk exists when particular investments are difficult to purchase or sell. The Fund’s investments in illiquid securities may reduce the returns of the Fund because it may be unable to sell the illiquid securities at an advantageous time or price. • Options Risk — The Fund’s ability to close out its position as a purchaser or seller of an over-the-counter or exchange-listed put or call option is dependent, in part, upon the liquidity of the option market. There are significant differences between the securities and options markets that could result in an imperfect correlation among these markets, causing a given transaction not to achieve its objectives. The Fund’s ability to utilize options successfully will depend on the ability of the Fund’s investment adviser to predict pertinent market movements, which cannot be assured. • Other Investment Companies (including ETFs) Risk — The Fund may invest in the securities of other investment companies to the extent that such investments are consistent with the Fund’s investment objective and the policies are permissible under the 1940 Act. Under the 1940 Act, the Fund may not acquire the securities of other domestic or non-U.S. investment companies if, as a result, (1) more than 10% of the Fund’s total assets would be invested in securities of

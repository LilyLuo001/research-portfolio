ished by the fund pursuant to an exemptive order issued by the Securities and Exchange Commission or as otherwise permitted under the Investment Company Act of 1940. For Fidelity Advisor ® Small Cap Fund: The fund may not issue senior securities, except as permitted under the Investment Company Act of 1940. Borrowing For each fund: The fund may not borrow money, except that the fund may borrow money for temporary or emergency purposes (not for leveraging or investment) in an amount not exceeding 33 1/3% of its total assets (including the amount borrowed) less liabilities (other than borrowings). Any borrowings that come to exceed this amount will be reduced within three days (not including Sundays and holidays) to the extent necessary to comply with the 33 1/3% limitation. Underwriting For each fund: The fund may not underwrite securities issued by others, except to the extent that the fund may be considered an underwriter within the meaning of the Securities Act of 1933 in the disposition of restricted securities or in connection with investments in other investment companies. Concentration For each fund: The fund may not purchase the securities of any issuer (other than securities issued or guaranteed by the U.S. Government or any of its agencies or instrumentalities) if, as a result, more than 25% of the fund's total assets would be invested in the securities of companies whose principal business activities are in the same industry. For purposes of each of Fidelity Advisor ® Dividend Growth Fund's, Fidelity Advisor ® Equity Growth Fund's, Fidelity Advisor ® Equity Income Fund's, Fidelity Advisor ® Equity Value Fund's, Fidelity Advisor ® Growth & Income Fund's, Fidelity Advisor ® Growth Opportunities Fund's, Fidelity Advisor ® Large Cap Fund's, Fidelity Advisor ® Small Cap Fund's, Fidelity Advisor ® Stock Selector Mid Cap Fund's, Fidelity Advisor ® Value Strategies Fund's, and Fidelity ® Convertible Securities Fund's concentration limitation discussed above, with 
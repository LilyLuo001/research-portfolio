fects on performance if the Fund were required to sell securities, invest cash or hold a relatively large amount of cash at times when it would not otherwise do so. The principal risks of investing in the Fund are summarized below. Market Risk: The value of the Fund’s investments may fluctuate because of changes in the markets in which the Fund invests, which could cause the Fund to underperform other funds with similar investment objectives and strategies. Such changes may be rapid and unpredictable. From time to time, markets may experience periods of stress for potentially prolonged periods that may result in: (i) increased market volatility; (ii) reduced market liquidity; and (iii) increased redemptions of Fund shares. Such conditions may add significantly to the risk of volatility in the net asset value of the Fund's shares. Portfolio Management Risk: The investment strategies, practices and risk analyses used by the Subadvisor may not produce the desired results. The Subadvisor may give consideration to certain ESG criteria when evaluating an investment opportunity. The application of ESG criteria may result in the Fund (i) having exposure to certain securities or industry sectors that are significantly different than the composition of the Fund's benchmark; and (ii) performing differently than other funds and strategies in its peer group that do not take into account ESG criteria or the Fund's benchmark. 5 MainStay Epoch U.S. Equity Yield Fund Equity Securities Risk: Investments in common stocks and other equity securities are particularly subject to the risk of changing economic, stock market, industry and company conditions and the risks inherent in the portfolio managers' ability to anticipate such changes that can adversely affect the value of the Fund's holdings. Dividend-Paying Stock Risk: The Fund’s emphasis on equity and equity-related securities that produce income or other distributions subjects the Fund to the risk that such securities may fall out
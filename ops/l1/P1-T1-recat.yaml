 majority of the directors who are not “interested persons” of the Funds, as that term is defined in the Investment Company Act of 1940, as amended, approved the Reorganization. Upon the recommendation of Empower Capital Management, LLC, the investment adviser of both Funds, the Board unanimously concluded that: (i) the Reorganization is in the best interests of each Fund; and (ii) the interests of the shareholders of each Fund will not be diluted as a result of the Reorganization. The Reorganization is expected to occur on or about October 25, 2024, and upon completion shareholders of the Target Fund will become shareholders of the Acquiring Fund. The Reorganization is intended to be a tax-free reorganization for federal income tax purposes, and the closing of the Reorganization will be conditioned upon, among other things, receiving an opinion of counsel to the effect that the Reorganization will qualify as a tax-free reorganization for federal income tax purposes. As a result, it is anticipated that shareholders will not recognize any gain or loss as a direct result of this Reorganization. Detailed information about the Agreement and Plan of Reorganization (the “Agreement”) and the reasons for the Board’s approval of the Agreement are contained in the enclosed materials. NO ACTION ON YOUR PART IS REQUIRED TO EFFECT THE REORGANIZATION. You will automatically receive shares of the Acquiring Fund in exchange for your shares of the Target Fund on or about October 25, 2024. If you have any questions, please contact us at (866) 831-7129. If you have any questions after considering the enclosed materials, please call. Sincerely, Jonathan D. Kreider President & Chief Executive Officer Empower Funds, Inc. Table of Contents Important Information for Empower Ariel Mid Cap Value Fund Shareholders The enclosed Information Statement/Prospectus describes the contemplated reorganization of the Empower Ariel Mid Cap Value Fund (the “Target Fund”), a series of Empower Funds, Inc. (“Empower Funds”), into the Empower Mid Cap Value Fund (the “Acquiring Fund”), also a series of Empower Funds (the “Reorganization”). The Target Fund and the Acquiring Fund are collectively referred to herein as the “Funds” or individually as a “Fund.” Although we recommend that you read the complete Information Statement/Prospectus, for your convenience, we have provided the following brief overview of the Reorganization. Please refer to the more complete information about the Reorganization contained in the Information Statement/Prospectus. SHAREHOLDER APPROVAL IS NOT REQUIRED TO EFFECT THE REORGANIZATION. YOU ARE NOT ASKED TO RETURN A PROXY OR TO TAKE ANY OTHER ACTION AT THIS TIME. Q. Why am I receiving this Information Statement/Prospectus? A. You are receiving this Information Statement/Prospectus because you are invested in the Target Fund through an insurance company separate account for certain variable annuity contracts and variable life insurance policies, an individual retirement account, or a qualified retirement plan (collectively, “Permitted Accounts”). Q. What will happen on the effective date of the Reorganization? A. As of the close of business on the effective date of the Reorganization, investments in the Institutional Class and Investor Class shares of the Target Fund will automatically become investments in the corresponding Institutional Class or Investor Class shares of the Acquiring Fund. The total net asset value of the shares of the Acquiring Fund that you receive on the effective date of the Reorganization will be equal to the total net asset value of your investment in the Target Fund. You will not incur any fees or charges or any federal income tax liability as a direct result of the Reorganization. It is currently anticipated that the Reorganization will take effect on or about October 25, 2024. Q. Why has this Reorganization been proposed for the Target Fund? A. At a meeting held on June 12-13, 2024, the Board of Directors of Empower Funds (the “Board”) considered the Reorganization upon the recommendation of Empower Capital Management, LLC (“ECM”), both Funds’ investment adviser. ECM proposed the Reorganization in order to address the underperformance of the Target Fund and, secondarily, as part of a continuing effort to reduce redundancy in its fund offerings by consolidating two mid cap value offerings into a single offering, the Acquiring Fund. ECM believes that shareholders of the Target Fund will benefit from the historically better and more consistent performance of the Acquiring Fund. ECM also believes one mid cap value fund is more commercially viable and beneficial to shareholders of both Funds than maintaining two separate mid cap value funds. The Reorganization is also intended to create a larger combined Fund with a broader shareholder base and a larger asset base against which fixed dollar costs may be allocated and potentially create economies of scale to benefit shareholders. The Board concluded the Reorganization is in the best interests of the Target Fund and its shareholders, and the Target Fund’s existing shareholders will not be diluted as a result of the Reorganization. In reaching this conclusion, the Board considered a number of factors, which are discussed in greater detail in the enclosed materials. Table of Contents Q. How do the fees and expenses compare? A. Currently, the management fee and expense limit of the Acquiring Fund is higher than the management fee and expense limit of the Target Fund. However, in connection with its approval of the Reorganization, the Board approved lowering the management fee and expense limit of the Acquiring Fund to match those of the Target Fund. The total annual operating expenses of the Acquiring Fund immediately following the Reorganization are expected to be the same as the total annual operating expenses of the Target Fund. As a result, total annual operating expenses will remain unchanged for shareholders of the Target Fund and shareholders of the Acquiring Fund will receive a reduction in total annual operating expenses when the Reorganization takes effect. For details on fees and expenses, please see the section entitled “Fees and Expenses” of the Information Statement/Prospectus. Q. Will you receive new shares in exchange for your current shares? A. Yes. As part of the Reorganization, you will receive shares of the corresponding class of the Acquiring Fund in an amount equal to the total net asset value of the Target Fund shares that you surrender in the Reorganization, determined in each case as of the close of trading on the effective date of the Reorganization. Although the number of shares of the Acquiring Fund you receive may differ from the number of shares you held in the Target Fund, the total net asset value will be the same. Q. Will I have to pay federal income taxes as a result of the Reorganization? A. No. The Reorganization is intended to qualify as a tax-free reorganization for federal income tax purposes. It is expected that shareholders of the Target Fund will recognize no gains or losses for federal income tax purposes as a direct result of the Reorganization. The section entitled “The Reorganization - Material Federal Income Tax Consequences” of the Information Statement/Prospectus provides additional information regarding the federal income tax consequences of the Reorganization. Q. Who will pay for the Reorganization? A. ECM will bear all expenses of the Reorganization even if the Reorganization is not completed, including legal costs, audit fees, and printing and mailing expenses. ECM estimates the costs of the Reorganization to be $95,000. Q. What is the timetable for the Reorganization? A. The Reorganization is expected to take effect at the close of business on October 25, 2024, or such other date as the officers of Empower Funds reasonably determine. Q. Whom do I call if I have questions? A. If you need any assistance, or have any questions regarding the Reorganization, please call (866) 831-7129. Table of Contents Information Statement/Prospectus Dated August 26, 2024 EMPOWER FUNDS, INC. Relating to the Acquisition of the Assets and Liabilities of EMPOWER ARIEL MID CAP VALUE FUND by EMPOWER MID CAP VALUE FUND This Information Statement/Prospectus is being furnished to shareholders of the Empower Ariel Mid Cap Value Fund (the “Target Fund”), a series of Empower Funds, Inc. (“Empower Funds”), a Maryland corporation registered as an open-end investment company under the Investment Company Act of 1940, as amended (the “1940 Act). This Information Statement/Prospectus is provided in connection with the reorganization of the Target Fund into the Empower Mid Cap Value Fund (the “Acquiring Fund”), also a series of Empower Funds (the “Reorganization”). The Target Fund and the Acquiring Fund are referred to herein collectively as the “Funds” and individually as a “Fund.” Upon completion of the Reorganization, holders of Institutional Class and Investor Class shares of the Target Fund will receive Institutional Class and Investor Class shares, respectively of the Acquiring Fund. Shares of the Acquiring Fund received in the Reorganization will have the same total net asset value as the total net asset value of the Target Fund shares surrendered by such shareholders, determined in each case as of the close of trading on the closing date of the Reorganization. The Board of Directors of Empower Funds (the “Board”) determined the Reorganization is in the best interests of the Target Fund, the Acquiring Fund, and their respective shareholders. The address, principal executive office and telephone number of Empower Funds is 8515 East Orchard Road, Greenwood Village, Colorado 80111 and (866) 831-7129. The Securities and Exchange Commission has not approved or disapproved these securities or determined whether the information in this Information Statement/Prospectus is truthful or complete. Any representation to the contrary is a criminal offense. This Information Statement/Prospectus concisely sets forth the information shareholders of the Target Fund should know about the Reorganization (in effect, investing in Institutional Class and Investor Class shares of the Acquiring Fund) and constitutes an offering of Institutional Class and Investor Class shares of common stock, par value $0.10 per share, of the Acquiring Fund. Please read it carefully and retain it for future reference. SHAREHOLDER APPROVAL IS NOT REQUIRED TO EFFECT THE REORGANIZATION. YOU ARE NOT ASKED TO RETURN A PROXY OR TO TAKE ANY OTHER ACTION AT THIS TIME. The following documents contain additional information about the Funds, have been filed with the Securities and Exchange Commission (“SEC”), and are incorporated into this Information Statement/Prospectus by reference: i. the Empower Funds’ prospectuses, dated April 30, 2024, as supplemented through the date of this Information Statement/Prospectus, only insofar as they relate to the Funds (File No. 811-03364); ii. the Empower Funds’ statement of additional information, dated April 30, 2024, as supplemented through the date of this Information Statement/Prospectus, only insofar as it relates to the Funds (File No. 811-03364). iii. supplement to the Empower Ariel Mid Cap Value Fund dated June 14, 2024 (File No. 811-03364). iv. the statement of additional information relating to the Reorganization, dated August 26, 2024 (the “Reorganization SAI”). Table of Contents v. the Acquiring Fund’s audited financial statements as of December 31, 2023, and the report of Deloitte & Touche LLP, an independent registered public accounting firm, as contained in the Funds’ annual report for the fiscal year ended December 31, 2023 (File No.811-03364); vi. the Target Fund’s audited financial statements as of December 31, 2023, and the report of Deloitte & Touche LLP, an independent registered public accounting firm, as contained in the Funds’ annual report for the fiscal year ended December 31, 2023 (File No.

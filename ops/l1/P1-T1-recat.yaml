ore information about these and other discounts is available from your investment professional and in the "Fund Distribution" section beginning on page 19 of the prospectus and in the sales charge waiver appendix to the prospectus. Shareholder fees (fees paid directly from your investment) Class A Class M Class C Class I Class Z Maximum sales charge (load) on purchases (as a % of offering price) 5.75 % 3.50 % None None None Maximum contingent deferred sales charge (as a % of the lesser of original purchase price or redemption proceeds) None A None A 1.00 % B None None A Class A and Class M purchases of $1 million or more will not be subject to a front-end sales charge. Such Class A and Class M purchases may be subject, upon redemption, to a contingent deferred sales charge (CDSC) of 1.00% and 0.25%, respectively. B On Class C shares redeemed less than one year after purchase. Annual Operating Expenses (expenses that you pay each year as a % of the value of your investment) Class A Class M Class C Class I Class Z Management fee (fluctuates based on the fund's performance relative to a securities market index) 0.71 % A, B 0.71 % A, B 0.71 % A, B 0.71 % A, B 0.58 % A, B Distribution and/or Service (12b-1) fees 0.25 % 0.50 % 1.00 % None None Other expenses 0.01 % B 0.01 % B 0.01 % B 0.01 % B 0.01 % B Total annual operating expenses 0.97 % 1.22 % 1.72 % 0.72 % 0.59 % A The management fee comprises a basic fee, which may vary by class, that is adjusted up or down (subject to a maximum rate) based on the performance of the fund or a designated class of the fund relative to that of the MSCI EAFE Index. Please see "Fund Services - Fund Management - Advisory Fee(s)" for additional information. B Based on estimated amounts for the current fiscal year. This example helps compare the cost of investing in the fund with the cost of investing in other funds. Let's say, hypothetically, that the annual return for shares of the fund is 5% and that the fees and the annual operating expenses for shares of the fund are exactly as described in the fee table. This example illustrates the effect of fees and expenses, but is not meant to suggest actual or expected fees and expenses or returns, all of which may vary. For every $10,000 you invested, here's how much you would pay in total expenses if you sell all of your shares at the end of each time period indicated and if you hold your shares: Class A Class M Class C Class I Class Z Sell All Shares Hold Shares Sell All Shares Hold Shares Sell All Shares Hold Shares Sell All Shares Hold Shares Sell All Shares Hold Shares 1 year $ 668 $ 668 $ 470 $ 470 $ 275 $ 175 $ 74 $ 74 $ 60 $ 60 3 years $ 866 $ 866 $ 724 $ 724 $ 542 $ 542 $ 230 $ 230 $ 189 $ 189 5 years $ 1,080 $ 1,080 $ 997 $ 997 $ 933 $ 933 $ 401 $ 401 $ 329 $ 329 10 years $ 1,696 $ 1,696 $ 1,776 $ 1,776 $ 1,831 $ 1,831 $ 894 $ 894 $ 738 $ 738 Portfolio Turnover The fund pays transaction costs, such as commissions, when it buys and sells securities (or "turns over" its portfolio). A higher portfolio turnover rate may indicate higher transaction costs and may result in higher taxes when fund shares are held in a taxable account. These costs, which are not reflected in annual operating expenses or in the example, affect the fund's performance. During the most recent fiscal year, the fund's portfolio turnover rate was 35 % of the average value of its portfolio. Principal Investment Strategies Normally investing at least 80% of assets in non-U.S. securities. The Adviser considers non-U.S. securities to include investments that are tied economically to a particular country or region outside the U.S. The Adviser considers a number of factors to determine whether an issuer is located in or tied economically to a particular country or region including: whether a third-party vendor has assigned a particular country or region classification to the issuer or included the issuer in an index representative of a particular country or region; the issuer's domicile, incorporation, and location of assets; whether the issuer derives at least 50% of its revenues from, or has at least 50% of its assets in, a particular country or region; the source of government guarantees (if any); and the primary trading market or listing exchange. Whether an issuer is located in or tied economically to a particular country can be determined under any of these factors. Effective December 11, 2025, derivative instruments that provide investment exposure to the investments above or exposure to one or more market risk factors associated with such investments are included in the fund's 80% policy, consistent with the fund's investment policies and limitations with respect to investments in derivatives. Normally investing primarily in common stocks. Allocating investments across different countries and regions. Using fundamental analysis of factors such as each issuer's financial condition and industry position, as well as market and economic conditions, to select investments. Principal Investment Risks Stock Market Volatility. Stock markets are volatile and can decline significantly in response to adverse issuer, political, regulatory, market, or economic developments. Different parts of the market, including different market sectors, and different types of securities can react differently to these developments. Foreign Exposure. Foreign markets, particularly emerging markets, can be more volatile than the U.S. market due to increased risks of adverse issuer, political, regulatory, market, or economic developments and can perform differently from the U.S. market. The extent of economic development; political stability; market depth, infrastructure, and capitalization; and regulatory oversight can be less than in more developed markets. Emerging markets typically have less established legal, accounting and financial reporting systems than those in more developed markets, which may reduce the scope or quality of financial information available to investors. Emerging markets can be subject to greater social, economic, regulatory, and political uncertainties and can be extremely volatile. Foreign exchange rates also can be extremely volatile. Geographic Exposure to Europe. Because the fund invests a meaningful portion of its assets in Europe, the fund's performance is expected to be closely tied to social, political, and economic conditions within Europe and to be more volatile than the performance of more geographically diversified funds. Issuer-Specific Changes. The value of an individual security or particular type of security can be more volatile than, and can perform differently from, the market as a whole. An investment in the fund is not a deposit of a bank and is not insured or guaranteed by the Federal Deposit Insurance Corporation or any other government agency . You could lose money by investing in the fund. Performance The following information is intended to help you understand the risks of investing in the fund. The information illustrates the changes in the performance of Fidelity® Overseas Fund, a class of shares of the fund, from year to year and compares the performance of this class to the performance of a securities market index over various periods of time. The index description appears in the "Additional Index Information" section of the prospectus. Past performance (before and after taxes) is not an indication of future performance . Visit www.fidelity.com for more recent performance information for Fidelity® Overseas Fund, a class of shares of the fund. Performance history will be available at institutional.fidelity.com for Class A, Class M, Class C, Class I, and Class Z after Class A, Class M, Class C, Class I, and Class Z have been in operation for one calendar year. Year-by-Year Returns * 2015 2016 2017 2018 2019 2020 2021 2022 2023 2024 8.25 % - 1.32 % 29.65 % - 14.69 % 28.42 % 15.42 % 19.36 % - 24.79 % 20.55 % 5.20 % During the periods shown in the chart for Fidelity® Overseas Fund:
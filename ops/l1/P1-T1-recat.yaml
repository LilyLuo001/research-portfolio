      N-14 1 d23729dn14.htm N-14 N-14 Table of Contents As filed with the Securities and Exchange Commission on December 10, 2025 File No. 333- UNITED STATES SECURITIES AND EXCHANGE COMMISSION WASHINGTON, D.C. 20549 FORM N-14 REGISTRATION STATEMENT UNDER THE SECURITIES ACT OF 1933 Pre-Effective Amendment No. ☐ Post-Effective Amendment No. ☐ (Check appropriate box or boxes) AIM Variable Insurance Funds (Invesco Variable Insurance Funds) (Exact Name of Registrant as Specified in Charter) 11 Greenway Plaza, Suite 1000, Houston, TX 77046 (Address of Principal Executive Offices) (Number, Street, City, State, Zip Code) (713) 626-1919 (Registrant’s Area Code and Telephone Number) Melanie Ringold, Esquire 11 Greenway Plaza, Suite 1000, Houston, TX 77046 (Name and address of Agent for Service) Copy to: Taylor V. Edwards, Esquire Invesco Advisers, Inc. 225 Liberty Street, 15 th Fl. New York, NY 10281-1087 Matthew R. DiClemente, Esquire Mena Larmour, Esquire Stradley Ronon Stevens & Young, LLP 2005 Market Street, Suite 2600 Philadelphia, PA 19103-7018 Approximate Date of Public Offering: As soon as practicable after this Registration Statement becomes effective under the Securities Act of 1933, as amended. Title of securities being registered: Series I and Series II shares of beneficial interest, without par value, of the Invesco V.I. Global Fund, a series of the Registrant. It is proposed that this filing will become effective on January 9, 2026 pursuant to Rule 488 under the Securities Act of 1933, as amended. No filing fee is due because Registrant is relying on Section 24(f) of the Investment Company Act of 1940, as amended. Table of Contents [January 29], 2026 Dear Contract Owner, Invesco regularly conducts a review of its product line to sharpen its offerings to investors. A key goal of this effort is to reduce overlap and enhance efficiency across the product line for the benefit of the Invesco Funds’ shareholders. In connection with this process, the Invesco Funds’ Board of Trustees (the “Board”) has approved a reorganization that will combine two Invesco Funds, subject to shareholder approval. Specifically, as described in the attached Proxy Statement/Prospectus, Invesco V.I. Global Core Equity Fund (the “Target Fund”) is proposed to reorganize with and into Invesco V.I. Global Fund (the “Acquiring Fund”). The Target Fund and the Acquiring Fund are referred to herein individually as a “Fund”, or collectively as the “Funds”. The proposed reorganization intends to: • Provide improved growth opportunity as a singular offering in Invesco’s variable insurance product line; • Reduce overlap in the product lineup; • Reduce current effective advisory fees upon the closing of the reorganization, if approved, and reduce expenses for both the Target Fund and Acquiring Fund; and • Create greater scale in the resulting fund. Each Fund is a series of AIM Variable Insurance Funds (Invesco Variable Insurance Funds) (the “Trust”). If the proposed reorganization of the Target Fund is approved by shareholders, the combining of Fund assets would result in a larger asset base against which fixed dollar costs may be spread. It is anticipated that the reorganization will result in a decrease in the Target Fund’s total expense ratio, thereby decreasing costs for Fund shareholders. The Board of the Target Fund and the Acquiring Fund, including its independent trustees, believes that the reorganization proposed in this Proxy Statement/Prospectus is in the best interests of each Fund. The attached voting instruction card seeks your vote in favor of the proposed reorganization. You are eligible to provide voting instructions on how to vote on this proposal because shares of the Invesco V.I. Global Core Equity Fund are held through your variable annuity contract or variable life insurance policy. Your voting instructions are important no matter how many shares are held through your contract. Please take a moment after reviewing the enclosed materials to sign and return your voting instruction card in the enclosed postage paid return envelope. If you expect to attend the meeting in person, or have questions, please notify us by calling 1-800-952-3502. You may also provide your voting instructions by telephone or through a website established for that purpose by following the instructions that appear on the enclosed voting instruction card. Sincerely, Melanie Ringold Senior Vice President, Chief Legal Officer and Secretary Table of Contents AIM Variable Insurance Funds (Invesco Variable Insurance Funds) 11 Greenway Plaza, Suite 1000 Houston, Texas 77046-1173 1-800-959-4246 NOTICE OF SPECIAL MEETING OF SHAREHOLDERS To Be Held on [April 13], 2026 A special meeting (together with any postponements or adjournments thereof, the “Meeting”) of the shareholders of Invesco V.I. Global Core Equity Fund (the “Target Fund”), will be held at 11 Greenway Plaza, Suite 1000, Houston, Texas 77046-1173 on [April 13], 2026 at 1:00 p.m., Central time, to vote on the following proposal: To approve an Agreement and Plan of Reorganization (the “Agreement”) that provides for the reorganization of the Target Fund into Invesco V.I. Global Fund (the “Acquiring Fund”), each a series of AIM Variable Insurance Funds (Invesco Variable Insurance Funds) (the “Trust”). The Agreement provides for: (a) the transfer of the assets and assumption of the liabilities of the Target Fund by the Acquiring Fund in exchange for shares of a corresponding class of the Acquiring Fund; (b) the distribution of such shares of the corresponding class to the shareholders of the Target Fund; and (c) the distribution of shares in complete liquidation of the Target Fund and the cancellation of the outstanding shares of the Target Fund (the “Reorganization”). The Target Fund and the Acquiring Fund are referred to collectively herein as the “Funds”. Shareholders of record as of the close of business on [January 14], 2026 are entitled to notice of, and to vote at, the Meeting, or any adjournments thereof. If the shareholders of the Target Fund vote to approve the Agreement, then shareholders of the Target Fund will become shareholders of the Acquiring Fund on or about [April 24], 2026, and will no longer be shareholders of the Target Fund. The Target Fund is generally sold only to separate accounts of various insurance companies (“Participating Insurance Companies”) to fund the benefits of variable annuity or variable life insurance policies. Individual variable annuity or life insurance policy owners (“Contract Owners”) are not the shareholders of record of the Target Fund. Rather, the insurance companies and their separate accounts are the shareholders. However, the Participating Insurance Companies are furnishing this Proxy Statement/Prospectus to Contract Owners and, except as otherwise might be required by applicable law, each Participating Insurance Company will offer Contract Owners the opportunity to instruct it as to how it should vote shares held by it and the separate accounts on the proposal to be considered at the Meeting. Contract Owners may provide voting instructions on how to vote shares held through their variable annuity contract or variable life insurance policy at the Meeting or any adjournments of the Meeting. The Board of Trustees that oversees the Target Fund (the “Board”) requests that the Participating Insurance Companies and any other direct shareholders of the Target Fund vote their shares by completing the enclosed proxy card and returning it in the enclosed postage paid return envelope. If you are a Contract Owner, the Participating Insurance Companies request that you provide voting instructions by completing the enclosed voting instruction card and returning it in the enclosed postage paid return envelope, or by voting by telephone or via the internet, if available, using the instructions on the voting instruction card. The Board recommends that you cast your vote or provide voting instructions FOR the above proposal as described in the Proxy Statement/Prospectus. Please sign and promptly return the proxy card/voting instruction card in the postage paid return envelope regardless of the number of shares owned. Melanie Ringold Senior Vice President, Chief Legal Officer and Secretary [January 29], 2026 Table of Contents AIM Variable Insurance Funds (Invesco Variable Insurance Funds) 11 Greenway Plaza, Suite 1000 Houston, Texas 77046-1173 1-800-959-4246 PROXY STATEMENT/PROSPECTUS [January 29], 2026 Introduction This Proxy Statement/Prospectus contains information that shareholders of the Invesco V.I. Global Core Equity Fund (the “Target Fund”), a series of AIM Variable Insurance Funds (Invesco Variable Insurance Funds) (the “Trust”), should know before voting on the proposed reorganization that is described herein and should be retained for future reference. This document is both the proxy statement of the Target Fund and also a prospectus for the Invesco V.I. Global Fund (“Acquiring Fund”), which is also a series of the Trust. The Trust is a registered open-end management investment company. The Target Fund and the Acquiring Fund collectively are referred to as the “Funds” and individually as a “Fund.” A special meeting of the shareholders of the Target Fund will be held at 11 Greenway Plaza, Suite 1000, Houston, Texas 77046-1173 on [April 13], 2026 at 1:00 p.m., Central time (together with any adjournments or postponements thereof, the “Meeting”). At the Meeting, shareholders of the Target Fund will be asked to consider the following proposal: To approve an Agreement and Plan of Reorganization (the “Agreement”) that provides for the reorganization of the Target Fund into the Acquiring Fund, each a series of the Trust. The Agreement provides for: (a) the transfer of the assets and assumption of the liabilities of the Target Fund by the Acquiring Fund in exchange for shares of a corresponding class of the Acquiring Fund; (b) the distribution of such shares of the corresponding class to the shareholders of the Target Fund; and (c) the distribution of shares in complete liquidation of the Target Fund and the cancellation of the outstanding shares of the Target Fund (the “Reorganization”). The Target Fund generally is sold only to separate accounts (the “Accounts”) of various insurance companies (the “Participating Insurance Companies”) to fund the benefits of variable annuity and/or variable life insurance policies (the “Contracts”). The Accounts may invest in shares of the Target Fund in accordance with allocation instructions received from owners of the Contracts (“Contract Owners”). Such allocation rights, as well as sales charges and other expenses imposed on Contract Owners by the Contracts, are further described in the Contract prospectus. Individual Contract Owners are not the shareholders of the Target Fund. Rather, the insurance companies and their Accounts are the shareholders. However, the Participating Insurance Companies are furnishing this Proxy Statement/Prospectus to Contract Owners and each Participating Insurance Company will offer Contract Owners the opportunity to instruct it as to how it should vote shares held by it and the Accounts on the proposal to be considered at the Meeting. This Proxy Statement/Prospectus is provided to Contract Owners entitled to give voting instructions regarding the Target Fund. Each Participating Insurance Company hereby solicits voting instructions from its Contract Owners with respect to the shares of the Target Fund attributable to such Contracts. The Board of Trustees of the Target Fund (the “Board”) hereby solicits proxies from shareholders of the Target Fund, including each Participating Insurance Company and its Accounts. This Proxy Statement/Prospectus contains information that a Contract Owner should know before providing voting instructions on the proposed reorganization that is described herein and which, if the proposed reorganization is approved, will result in your investment in the Acquiring Fund. For purposes of this Proxy Statement/Prospectus, the terms “shareholder,” “you,” and “your” may refer to: (i) Contract Owners; (ii) Accounts and Participating Insurance Companies, as direct owners of Target Fund shares; and (iii) any other direct shareholders of the Target Fund, unless the context otherwise requires. If the shareholders of the Target Fund vote to approve the Agreement and Plan of Reorganization (the “Agreement”), then shareholders of the Target Fund will become shareholders of the Acquiring Fund on or about [April 24], 2026, and will no longer be shareholders of the Target Fund. The total value of the shares of each class of the Acquiring Fund that shareholders will receive in the Reorganization will be the same as the total value of the shares of each class of the Target Fund that shareholders held immediately prior to the Reorganization. The Reorganization is anticipated to be a tax-free transaction, meaning that shareholders should not be required to pay any federal income tax in connection with the Reorganization. However, the Reorganization will not be taxable to Contract Owners, regardless of the tax status of the Reorganization, provided that the Contracts qualify to be treated as life insurance contracts or as annuity contracts under the applicable provisions of the Internal Revenue Code of 1986, as amended (the “Code”). No sales charges or redemption fees will be imposed in connection with the Reorganization. The Board has fixed the close of business on [January 14], 2026 as the record date (“Record Date”) for the determination of shareholders entitled to notice of and to vote at the Meeting and at any adjournments thereof. Shareholders of the Target Fund on the Record Date will be entitled to one vote for each share of the Target Fund held (and a proportionate fractional vote for each fractional share). This Proxy Statement/Prospectus, the enclosed Notice of Special Meeting of Shareholders and the enclosed proxy card/

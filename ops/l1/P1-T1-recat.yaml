es in connection with the reorganization. The Board of Trustees of the Trust has carefully considered and unanimously approved the reorganization, as set forth in the Agreement and Plan of Reorganization and described in the accompanying materials, and believes that the reorganization is in the best interests of the Target Fund and its shareholders. The Board of Trustees believes that the reorganization offers you the opportunity to pursue your investment goals in a larger fund with the same or reduced expenses, similar investment strategies and the same portfolio manager as your existing fund. The Acquiring Fund’s investment objective and its investment strategies are similar to those of the Target Fund. The expenses associated with the reorganization will be paid by the Target Fund and the Acquiring Fund, and will be allocated pro rata based on their assets under management. You are not being asked to vote on, or take any other action in connection with, the reorganization. If you have any questions, please call (800) 243-1574 between 8:30 a.m. and 6:00 p.m. Eastern time, Monday through Thursday, Friday until 5:00 p.m. We are committed to serving you and appreciate your continued investment in Virtus Mutual Funds. Sincerely, George R. Aylward President, Virtus Mutual Funds Mutual Funds distributed by VP Distributors, LLC ACQUISITION OF ASSETS OF VIRTUS KAR GLOBAL QUALITY DIVIDEND FUND a series of Virtus Equity Trust c/o VP Distributors, LLC 101 Munson Street Greenfield, Massachusetts 01301 (800) 243-1574 BY AND IN EXCHANGE FOR SHARES OF VIRTUS KAR EQUITY INCOME FUND a series of Virtus Equity Trust c/o VP Distributors, LLC 101 Munson Street Greenfield, Massachusetts 01301 (800) 243-1574 PROSPECTUS/INFORMATION STATEMENT DATED July 28, 2025 This Prospectus/Information Statement is being furnished in connection with the reorganization of Virtus KAR Global Quality Dividend Fund (“Target Fund”), a series of Virtus Equity Trust (the “Trust”), into the Virtus KAR Equity Income Fund (“Acquiring Fund”), another series of the Trust. This Prospectus/Information Statement is being mailed on or about August 12, 2025 to shareholders of the Target Fund as of July 25, 2025. GENERAL We are not asking you for a proxy, and you are requested not to send us a proxy. The Board of Trustees of the Trust has approved the reorganization of the Target Fund into the Acquiring Fund. The Target Fund and Acquiring Fund are sometimes referred to in this Prospectus/Information Statement individually as a “Fund” and collectively as the “Funds.” In the reorganization, all of the assets of the Target Fund will be acquired by the Acquiring Fund in exchange for Class A, Class C, Class I and Class R6 shares of the Acquiring Fund and the assumption by the Acquiring Fund of the liabilities of the Target Fund (the “Reorganization”). Class A, Class C, Class I and Class R6 shares of the Acquiring Fund will be distributed to each shareholder in liquidation of the Target Fund, and the Target Fund will be terminated as a series of the Trust. You will then hold that number of full and fractional shares of the Acquiring Fund which have an aggregate net asset value equal to the aggregate net asset value of your shares of the Target Fund. Each of the Target Fund and the Acquiring Fund is a separate diversified series of the Trust, a Delaware statutory trust, which is registered as an open-end management investment company under the Investment Company Act of 1940, as amended (the “1940 Act”). The investment objective of the Target Fund is similar to that of the Acquiring Fund, as follows: Fund Investment Objective(s) Target Fund Total return, consisting of both capital appreciation and current income. Acquiring Fund Capital appreciation and current income. 1 The investment strategies for the Target Fund and the Acquiring Fund are similar, but there are some differences. Under normal circumstances, each Fund invests at least 80% of its assets in dividend paying equity securities. Each Fund’s investment strategy emphasizes companies the subadviser believes to have a durable competitive advantage, strong management and low financial risk and to be able to grow over market cycles. Each Fund typically invests in the securities of medium to large capitalization companies, but neither is limited to investing in the securities of companies of any particular size. Generally, each Fund invests in approximately 25 to 50 securities at any given time. Whereas the Target Fund invests in companies that are tied economically to a number of countries throughout the world, the Acquiring Fund invests in U.S. companies, or companies with significant economic ties to the U.S. In determining whether an issuer is a U.S. company for this purpose, the Acquiring Fund’s subadviser evaluates the following criteria: actual building address (domicile), primary exchange on which the security is traded, and country in which the greatest percentage of company revenue or profit is generated. This evaluation is conducted so as to determine to which country’s economic fortunes and risks the issuer’s assets are primarily exposed. Equity securities in which each fund invests include common stocks and American Depositary Receipts (ADRs). Each fund is diversified under federal securities laws. The fundamental investment restrictions of the Target Fund are the same as those of the Acquiring Fund. Virtus Investment Advisers, Inc. (“VIA” or the “Adviser”) serves as the investment adviser for both Funds and Kayne Anderson Rudnick Investment Management, LLC (“KAR” or the “Subadviser”), an affiliate of VIA, serve as the investment subadviser for both Funds. This Prospectus/Information Statement explains concisely the information about the Acquiring Fund that you should know. Please read it carefully and keep it for future reference. Additional information concerning each Fund and the Reorganization is contained in the documents described below, all of which have been filed with the Securities and Exchange Commission (“SEC”): Information about the Target Fund: How to Obtain this Information: Prospectus of the Trust relating to the Target Fund, dated January 28, 2025, as supplemented Copies are available upon request and without charge if you: Statement of Additional Information of the Trust relating to Target Fund, dated January 28, 2025, as supplemented · Visit www.virtus.com on the Internet; Annual Report of the Trust relating to the Target Fund for the year ended September 30, 2024 · Write to VP Distributors, LLC One Financial Plaza Hartford, Connecticut 06103; or Semi-Annual Report of the Trust relating to the Target Fund for the period ended March 31, 2025 · Call (800) 243-1574 toll-free. Information about the Acquiring Fund: How to Obtain this Information: Prospectus of the Trust relating to the Acquiring Fund, dated January 28, 2025, as supplemented, which accompanies this Prospectus/Information Statement Copies are available upon request and without charge if you: Statement of Additional Information of the Trust relating to the Acquiring Fund, dated January 28, 2025, as supplemented · Visit www.virtus.com on the Internet; Annual Report of the Trust relating to the Acquiring Fund for the year ended September 30, 2024 · Write to VP Distributors, LLC One Financial Plaza Hartford, Connecticut 06103; or Semi-Annual Report of the Trust relating to the Acquiring Fund for the period ended March 31, 2025 · Call (800) 243-1574 toll-free. 2 Information about the Reorganization: How to Obtain this Information: Statement of Additional Information dated July 28, 2025, which relates to this Prospectus/Information Statement and the Reorganization Copies are available upon request and without charge if you: · Write to VP Distributors, LLC One Financial Plaza Hartford, Connecticut 06103; or · Call (800) 243-1574 toll-free. You can also obtain copies of any of these documents without charge on the EDGAR database on the SEC’s Internet site at http://www.sec.gov. Copies are available for a fee by electronic request at the following e-mail address: publicinfo@sec.gov. Information relating to both the Target Fund and the Acquiring Fund is contained in the Prospectus of the Trust dated January 28, 2025 , as supplemented (SEC File No. 811-00945 ; 002-16590 ) and is incorporated by reference in this document. (This means that such information is legally considered to be part of this Prospectus/Information Statement.) The Statement of Additional Information dated July 28, 2025, relating to this Prospectus/Information Statement and the Reorganization, which includes the financial statements of the Trust relating to the Target Fund and the Acquiring Fund for the year ended September 30, 2024 and the six-month period ended March 31, 2025, is incorporated by reference in its entirety in this document. The Securities and Exchange Commission has not determined that the information in this Prospectus/Information Statement is accurate or adequate, nor has it approved or disapproved these securities. Anyone who tells you otherwise is committing a criminal offense. An investment in the Acquiring Fund: · is not a deposit of, or guaranteed by, any bank · is not insured by the FDIC, the Federal Reserve Board or any other government agency · is not endorsed by any bank or government agency · involves investment risk, including possible loss of the purchase payment of your original investment 3 Table of Contents GENERAL 1 SUMMARY 5 Why is the Reorganization happening? 5 What are the key features of the Reorganization? 5 After the Reorganization, what shares will I own? 5 How will the Reorganization affect me? 6 Will I be able to purchase, exchange and redeem shares and receive distributions in the same way? 6 How do the Funds’ investment objectives and principal investment strategies compare? 6 How do the Funds’ fees and expenses compare? 7 Portfolio Turnover 11 How do the Funds’ performance records compare? 11 Who will be the Adviser and Subadvisers of my Fund after the Reorganization? What will the advisory and subadvisory fees be after the Reorganization? 14 What will be the primary federal tax consequences of the Reorganization? 16 RISKS 17 INFORMATION ABOUT THE REORGANIZATION 18 Reasons for the Reorganization 18 Agreement and Plan of Reorganization 19 Federal Income Tax Consequences 20 Pro Forma Capitalization 21 Distribution of Shares 22 Purchase and Redemption Procedures 24 Exchange Privileges 24 Dividend Policy 24 COMPARATIVE INFORMATION ON SHAREHOLDERS’ RIGHTS 25 Form of Organization 25 Capitalization 25 Shareholder Liability 25 Shareholder Meetings and Voting Rights 26 Liquidation 26 Liability and Indemnification of Trustees 26 Shareholder Information 27 Control Persons and Principal Holders of Securities 27 FINANCIAL STATEMENTS AND EXPERTS 32 LEGAL MATTERS 32 ADDITIONAL INFORMATION 32 EXHIBIT A — AGREEMENT AND PLAN OF REORGANIZATION A-1 EXHIBIT B – FINANCIAL HIGHLIGHTS B-1 4 SUMMARY THIS SECTION SUMMARIZES THE PRIMARY FEATURES AND CONSEQUENCES OF THE REORGANIZATION. IT MAY NOT CONTAIN ALL OF THE INFORMATION THAT IS IMPORTANT TO YOU. TO UNDERSTAND THE REORGANIZATION, YOU SHOULD READ THIS ENTIRE PROSPECTUS/INFORMATION STATEMENT AND THE EXHIBIT. This summary is qualified in its entirety by reference to the additional information contained elsewhere in this Prospectus/Information Statement, the Prospectuses and Statement of Additional Information relating to the Funds and the form of the Agreement and Plan of Reorganization (the “Plan”), which is attached to this Prospectus/Information Statement as Exhibit A. Why is the Reorganization happening? The Reorganization will allow shareholders of the Target Fund to own a fund that is similar in style with the same portfolio management and with a greater amount of combined assets after the Reorganization. The Acquiring Fund has substantially similar investment objectives, and similar strategies and risks to those of the Target Fund, but the Acquiring Fund

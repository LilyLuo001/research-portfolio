d’s “Satellite” component pertains to the portion of the Fund’s asset allocation that is devoted to active management. Active management is considered a form of investment management whereby the allocation is driven by security selection and trading with an overriding goal of outperforming a stated index, or benchmark. The Fund’s allocation to “Satellite” holdings is achieved by investing a portion of the Fund’s assets in actively managed Underlying Funds. By constructing the Fund’s portfolio with Core and Satellite holdings, the Adviser is blending two management philosophies in an effort to capture the returns of the market indexes through Core holdings, while also seeking to enhance the overall performance of the Fund with Satellite holdings, and thus attempting to deliver above average performance. 2 The Adviser selects the Fund’s “Core” holdings by first arriving at an asset allocation across three broad asset classes (money market, bonds, and equities) that the Adviser believes provides the highest probability of meeting the stated volatility goals. Once this broad asset allocation is determined, the second decision is to determine the allocations within each of the aforementioned broad asset classes. For instance, once the allocation percentage into fixed income has been determined, the next step would be to identify the amount allocated between investment grade and hi-yield securities. Once this has been determined, the next decision is to determine the allocation into short term, intermediate term, and long-term securities within each applicable sub- group. When the allocations have been determined, the Adviser will dedicate a portion of that allocation into passive management, i.e. index, also referred to as “Core”. Likewise, the Adviser will allocate a portion of the allocation into active management, also referred to as “Satellite”. The Adviser allocates the Fund’s assets with respect to Satellite holdings among the Underlying Funds by utilizing proprietary qu

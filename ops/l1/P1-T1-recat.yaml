      N-14 1 d665674dn14.htm TIAA-CREF FUNDS TIAA-CREF Funds As filed with the Securities and Exchange Commission on February 15, 2019 File No. 333- UNITED STATES SECURITIES AND EXCHANGE COMMISSION Washington, D.C. 20549 FORM N-14 REGISTRATION STATEMENT UNDER THE SECURITIES ACT OF 1933 ☐ Pre-Effective Amendment No. ☐ Post-Effective Amendment No. TIAA-CREF FUNDS (Exact Name of Registrant as Specified in Charter) 730 Third Avenue New York, New York 10017 (Address of Principal Executive Offices: Number, Street, City, State, Zip Code) (800) 842-2733 (Area Code and Telephone Number) Rachael M. Zufall, Esq. Teachers Advisors, LLC 8500 Andrew Carnegie Blvd. Charlotte, North Carolina 28262 (Name and Address of Agent for Service) Copy to: Christopher P. Harvey, Esq. Adam T. Teufel, Esq. Dechert LLP One International Place, 40th Floor 100 Oliver Street Boston, Massachusetts 02110 Christopher M. Rohrbacher, Esq. Nuveen Fund Advisors, LLC 333 West Wacker Drive Chicago, Illinois 60606 Eric F. Fess, Esq. Chapman and Cutler LLP 111 West Monroe Street Chicago, Illinois 60603 Approximate date of proposed public offering : As soon as practicable after the effective date of this Registration Statement. Title of securities being registered: Shares of beneficial interest, par value $0.0001 per share, of the Registrant. It is proposed that this filing will become effective on March 15, 2019 pursuant to Rule 488 under the Securities Act of 1933, as amended. No filing fee is required because of reliance on Section 24(f) and an indefinite number of shares have previously been registered pursuant to Rule 24f-2 under the Investment Company Act of 1940, as amended. IMPORTANT INFORMATION FOR SHAREHOLDERS OF NUVEEN STRATEGY CONSERVATIVE ALLOCATION FUND NUVEEN STRATEGY BALANCED ALLOCATION FUND NUVEEN STRATEGY GROWTH ALLOCATION FUND NUVEEN STRATEGY AGGRESSIVE GROWTH ALLOCATION FUND At a special meeting of shareholders of Nuveen Strategy Conservative Allocation Fund, Nuveen Strategy Balanced Allocation Fund, Nuveen Strategy Growth Allocation Fund and Nuveen Strategy Aggressive Growth Allocation Fund (each, a “Target Fund” and together, the “Target Funds”), each a series of Nuveen Strategy Funds, Inc. (the “Target Corporation”), you will be asked to vote on the proposed reorganization of your Target Fund into a corresponding TIAA-CREF Fund (each, an “Acquiring Fund” and collectively, the “Acquiring Funds”), as illustrated below: Target Fund Acquiring Fund Nuveen Strategy Conservative Allocation Fund g TIAA-CREF Lifestyle Conservative Fund Nuveen Strategy Balanced Allocation Fund g TIAA-CREF Lifestyle Moderate Fund Nuveen Strategy Growth Allocation Fund g TIAA-CREF Lifestyle Growth Fund Nuveen Strategy Aggressive Growth Allocation Fund g TIAA-CREF Lifestyle Aggressive Growth Fund The Target Funds and the Acquiring Funds are collectively referred to herein as the “Funds” and individually as a “Fund.” The reorganizations of the Target Funds and Acquiring Funds are referred to herein as the “Reorganizations” and individually as a “Reorganization.” The Board of Directors of the Target Corporation (the “Board”), including the independent Board members, unanimously recommends that you vote FOR each proposed Reorganization. Although we recommend that you read the complete Proxy Statement/Prospectus, for your convenience we have provided the following brief overview of the matter to be voted on. Q. Why are the Reorganizations being proposed? A. The Target Funds and the Acquiring Funds are managed by affiliated investment advisers. Nuveen Fund Advisors, LLC (“Nuveen Fund Advisors”) serves as each Target Fund’s investment adviser and Nuveen Asset Management, LLC (“Nuveen Asset Management”) serves as each Target Fund’s sub-adviser. Teachers Advisors, LLC (“Teachers Advisors”) serves as the investment adviser of each Acquiring Fund. Nuveen Fund Advisors, Nuveen Asset Management and Teachers Advisors (collectively, the “Advisers”) are each wholly-owned subsidiaries of Nuveen, LLC (“Nuveen”), the investment management arm of Teachers Insurance and Annuity Association of America (“TIAA”). The proposed Reorganizations are an outgrowth of Nuveen’s larger effort to integrate the investment teams responsible for asset allocation strategies across Nuveen, including the teams that manage the Target Funds and the Acquiring Funds. In light of the combination of investment teams, the Advisers determined that maintaining similar asset allocation funds managed by the same investment team would be inefficient and confusing to the marketplace, and therefore proposed that the Target Funds be reorganized into the Acquiring Funds. The proposed Reorganizations will allow shareholders of the Target Funds to continue their investment in an asset allocation fund with similar investment objectives and strategies and with historical performance over the past five years that is generally superior for most periods. In addition, shareholders of the Target Funds are expected to recognize cost savings as a result of the Acquiring Funds’ lower total annual operating expenses. In addition to considering the benefits to shareholders expected to result from the Reorganizations, the Board considered that Nuveen may realize certain efficiencies by no longer providing certain services to the Target Funds. See the Proxy Statement/Prospectus under “Approval of the Proposed Reorganizations by the Board of Directors of the Target Corporation.” Q. How will the Reorganizations affect my shares? A. Upon the closing of each Reorganization, shareholders of each Target Fund will receive shares of the corresponding Acquiring Fund having a total net asset value equal to the total net asset value of the Target Fund shares surrendered by such shareholder. This means that the total value of the Acquiring Fund shares you receive in a Reorganization will be the same as the total value of the Target Fund shares you held immediately prior to the closing of the Reorganization. Holders of Class A shares, Class C shares and Class R3 shares of each Target Fund will receive Retail Class shares of the corresponding Acquiring Fund, and holders of Class I shares of each Target Fund will receive Advisor Class shares of the corresponding Acquiring Fund. See the Proxy Statement/Prospectus under “The Proposed Reorganizations–Description of Securities.” Q. Will shareholders of the Target Funds incur sales loads, contingent deferred sales charges (“CDSC”) or any other similar fees on Acquiring Fund shares as a result of the Reorganizations? A. No. All Acquiring Fund shares will be delivered to the corresponding Target Fund without a sales load, commission or any other similar fee being imposed. If your Target Fund shares are subject to a CDSC (which may be the case for purchases of Class A shares of $1 million or more that were not subject to a front-end sales load or Class C shares), that CDSC will not be imposed in connection with the Reorganization and the corresponding Acquiring Fund shares you receive in the Reorganization will not be subject to a CDSC upon redemption. After the completion of each Reorganization, additional purchases of shares of an Acquiring Fund will not be subject to any sales load, CDSC or other similar fees. Class A shares, Class C shares and Class I shares (but not Class R3 shares) of each Target Fund held directly with the Fund in the following types of accounts with balances under $1,000 are subject to an annual low balance account fee of $15: individual retirement accounts (“IRAs”), Coverdell Education Savings Accounts and accounts established pursuant to the Uniform Transfers to Minors Act or Uniform Gifts to Minors Act. Retail Class shares of each Acquiring Fund held through certain types of accounts, including IRAs and Coverdell Education Savings Accounts, are subject to an annual account maintenance fee of $15 on accounts with balances under $2,000. As a result of each Reorganization, (i) holders of Class A shares and Class C shares of a Target Fund will receive Retail Class shares of the corresponding Acquiring Fund, and such shares will be subject to the $15 annual account maintenance fee if held in certain types of accounts with balances under $2,000; (ii) holders of Class R3 shares of a Target Fund will receive Retail Class shares of the corresponding Acquiring Fund, which will not be subject to an annual account maintenance fee; and (iii) holders of Class I shares of a Target Fund will receive Advisor Class shares of the corresponding Acquiring Fund, which are not subject to an annual account maintenance fee. ii Q. Are the Funds managed by the same investment adviser, sub-adviser and portfolio managers? A. No. The Target Funds and the Acquiring Funds have different investment advisers; the Target Funds have a sub-adviser, while the Acquiring Funds do not; and the Target Funds have a different portfolio management team than the Acquiring Funds. The Target Funds are advised by Nuveen Fund Advisors and sub-advised by Nuveen Asset Management, with Derek B. Bloom, CFA, and Nathan S. Shetty, CFA, serving as the Funds’ portfolio managers. The Acquiring Funds are advised by Teachers Advisors, with John Cunniff, CFA, and Hans Erickson, CFA, serving as the Funds’ portfolio managers. Following each Reorganization, Teachers Advisors will serve as the adviser for each surviving fund and Mr. Cunniff and Mr. Erickson will continue to serve as the portfolio managers for each surviving fund. Q. How do the Funds’ investment objectives, principal investment strategies and principal risks compare? A. The Funds’ investment objectives and principal investment strategies are similar. The Funds are structured as “funds of funds,” varying their allocations among funds based on the Funds’ different risk-return profiles. In pursuit of their investment objectives, the Target Funds invest primarily in other mutual funds advised by Nuveen Fund Advisors (“Nuveen Underlying Funds”), whereas the Acquiring Funds invest primarily in other mutual funds advised by Teachers Advisors (“TIAA-CREF Underlying Funds”). The Funds’ investment objectives and principal investment strategies are listed and compared in the Proxy Statement/Prospectus under “Comparison of Investment Objectives and Principal Investment Strategies.” Given the Funds’ similar investment objectives and strategies, an investment in each Fund is subject to many of the same principal risks (e.g., asset allocation risk, active management risk and underlying funds risk). The risks applicable to the Funds are listed and compared in the Proxy Statement/Prospectus under “Risk Factors.” Q. How will the Reorganizations impact fees and expenses? A. If a Reorganization had taken place as of November 30, 2018, the date in the Fees and Expenses tables in the Proxy Statement/Prospectus, the pro forma total annual fund operating expenses of each Acquiring Fund following the applicable Reorganization would have been lower than the corresponding Target Fund’s total annual fund operating expenses across all share classes, both before and after fee waivers and expense reimbursements. Pro forma amounts are estimated; actual operating expenses will vary based on asset size and other factors. Data is provided as of November 30, 2018 which this is the date of the most recent shareholder report for the Acquiring Funds. See the Proxy Statement/Prospectus under “Further Comparison of the Funds—Fees and Expenses.” Q. Will shareholders of the surviving fund receive the same shareholder services that shareholders of the Target Funds currently receive? A . Yes, the shareholder services and shareholder programs of the Funds are substantially the same. However, because the Acquiring Funds are no-load funds, the Acquiring Funds do not have the same privileges (e.g., rights of accumulation or letters of intent) as the Target Funds. Target Fund shareholders who hold shares of other Nuveen mutual funds will not be permitted to iii consider shares held in the TIAA-CREF Fund Complex for purposes of rights of accumulation or letters of intent applicable to purchases of other Nuveen mutual funds. Once the Reorganizations are completed, shareholders would have the right to exchange their Acquiring Fund shares for shares of the same class of other TIAA-CREF funds, but would not have the right to exchange their shares back into other Nuveen mutual funds. Q. Will the portfolios of each Target Fund be repositioned prior to the Reorganizations? A. Yes. Prior to each Reorganization, each Target Fund’s portfolio will be liquidated and repositioned into the TIAA-CREF Underlying Funds held by the corresponding Acquiring Fund. The transaction costs associated with the Target Funds’ portfolio repositionings are expected to be minimal, as the shares of the underlying funds in which the Target Funds and the Acquiring Funds invest are not subject to commissions or other sales charges when purchased or redeemed. If the portfolio repositionings had taken place as of November 30, 2018, it is estimated that the Nuveen Strategy Conservative Allocation Fund, Nuveen Strategy Balanced Allocation Fund, Nuveen Strategy Growth Allocation Fund and Nuveen Strategy Aggressive Growth Allocation Fund would have incurred transaction costs of $633, $1,907, $1,517 and $877, respectively, in each case less than $0.01 per share of the applicable Target Fund, in connection with closing out certain futures contracts held by each Target Fund. Q. Will the Reorganizations have tax consequences to me? A. Each Reorganization is intended to qualify as a tax-free reorganization for federal income tax purposes. Therefore, it is expected that you will recognize no gain or loss for federal income tax purposes as a direct result of a Reorganization. However, prior to the closing of each Reorganization, each Target Fund expects to distribute all its undistributed net investment income and net capital gains, if any. Such distributions will generally be taxed as ordinary inc

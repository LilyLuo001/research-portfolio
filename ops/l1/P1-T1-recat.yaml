and the Funds This Prospectus tells you about sixteen separate DoubleLine mutual funds. Each Fund is a series of DoubleLine Funds Trust, a Delaware statutory trust (the “Trust”). Each Fund offers shares in a number of different classes. DoubleLine Total Return Bond Fund, DoubleLine Core Fixed Income Fund, DoubleLine Low Duration Bond Fund, DoubleLine Flexible Income Fund, and DoubleLine Shiller Enhanced CAPE ® offer Class R6 shares in a separate prospectus (the “R6 Prospectus”) and statement of additional information (the “R6 SAI”). Most of the Funds provide investment programs investing principally in debt obligations, and are referred to in this Prospectus as “ fixed income funds .” The remaining Funds are the DoubleLine Multi-Asset Growth Fund, the DoubleLine Strategic Commodity Fund, DoubleLine Shiller Enhanced CAPE ® , DoubleLine Shiller Enhanced International CAPE ® and DoubleLine Colony Real Estate and Income Fund. A Note Regarding Debt Obligations Generally, this Prospectus uses the terms debt security, debt obligation, bond, fixed-income instrument, fixed-income obligation and fixed-income security interchangeably. These terms should be considered to include any evidence of indebtedness, including, by way of example, a security or instrument having one or more of the following characteristics: a security or instrument issued at a discount to its face value, a security or instrument that pays interest at a fixed, floating, or variable rate, or a security or instrument with a stated principal amount that requires repayment of some or all of that principal amount to the holder of the security. These terms are interpreted broadly to include any instrument or security evidencing what is commonly referred to as an IOU rather than evidencing the corporate ownership of equity unless that equity represents an indirect or derivative interest in one or more debt securities. For this purpose, the terms also include instruments that are intended to provide one or more of the characteristics of a direct investment in one or more debt securities. This Prospectus also uses the term hybrid security to refer to a security that DoubleLine Capital LP, DoubleLine Alternatives LP or a third party creates by combining an income-producing debt security and the right to receive payment based on the change in the price of an equity security. Table of Contents Fund Summary DoubleLine Total Return Bond Fund Investment Objective The Fund’s investment objective is to seek to maximize total return. Fees and Expenses of the Fund This table describes the fees and expenses you may pay if you buy and hold shares of the Fund. If you purchase Class I shares through a broker or other financial intermediary acting as an agent on behalf of its customers, that financial intermediary may charge you a commission. Such commissions, if any, are not charged by the Fund and are not reflected in the fee table or expense example below. Shareholder Fees (fees paid directly from your investment) Share Class Class I Class N Maximum Sales Charge (Load) Imposed on Purchases (as a percentage of the offering price) None None Maximum Deferred Sales Charge (Load) (as a percentage of the original purchase price) None None Maximum Sales Charge (Load) Imposed on Reinvested Dividends None None Redemption Fee (as a percentage of shares redeemed within 90 days of purchase) None None Fee for Redemption by Wire $15 $15 Exchange Fee None None Account Fee None None -2- Table of Contents Annual Fund Operating Expenses (expenses that you pay each year as a percentage of the value of your investment) Share Class Class I Class N Management Fees 0.40% 0.40% Distribution and/or Service (12b-1) Fees None 0.25% Other Expenses (includes sub-transfer agent accounting or administrative services expenses) 0.08% 0.08% Total Annual Fund Operating Expenses 0.48% 0.73% Example This example is intended to help you compare the cost of investing in the Fund with the cost of investing in other mutual funds. This example assumes that you invest $10,000 in the Fund for the time periods indicated and then redeem all your shares at the end of those periods. The example also assumes that your investment has a 5% return each year and that the Fund’s operating expenses remain the same. Although your actual costs may be higher or lower, based on these assumptions, your costs would be: Class I Class N 1 Year $49 $75 3 Years $154 $233 5 Years $269 $406 10 Years $604 $906 Portfolio Turnover The Fund incurs transaction costs when it buys and sells securities (or “turns over” its portfolio). A higher portfolio turnover rate may indicate higher transaction costs and may result in higher taxes when Fund shares are held in a taxable account. These costs, which are not reflected in annual fund operating expenses or in the example, affect the Fund’s performance. During the most recent fiscal year, the Fund’s portfolio turnover rate was 28% of the average value of its portfolio. -3- Table of Contents Principal Investment Strategies Under normal circumstances, the Fund intends to invest more than 50% of its net assets in residential and commercial mortgage-backed securities. These investments may include mortgage-backed securities of any maturity or type, including those guaranteed by, or secured by collateral that is guaranteed by, the United States Government, its agencies, instrumentalities or sponsored corporations, and privately issued mortgage-backed securities rated at the time of investment Aa3 or higher by Moody’s Investors Service, Inc. (“ Moody’s ”) or AA- or higher by S&P Global Ratings (“ S&P ”) or the equivalent by any other nationally recognized statistical rating organization or unrated securities that are determined by DoubleLine Capital LP (an “ Adviser ” or “ DoubleLine Capital ”) to be of comparable quality. These investments also include, among others, government mortgage pass-through securities, collateralized mortgage obligations (“ CMOs ”), multiclass pass-through securities, private mortgage pass-through securities, stripped mortgage securities (interest-only and principal-only securities) and inverse floaters. Since the Fund’s inception, the Fund has historically invested substantially all of its assets in mortgage-backed securities; short term investments, such as notes issued by U.S. Government agencies and shares of money market funds; and, from time to time, other asset-backed obligations, collateralized loan obligations (“ CLOs ”), and obligations of the U.S. Government and its agencies, instrumentalities and sponsored corporations. The Fund may invest in other instruments as part of its principal investment strategies, but it has not historically done so and there can be no assurance it will do so in the future. In managing the Fund’s portfolio, the portfolio managers typically use a controlled risk approach. The techniques of this approach attempt to control the principal risk components of the fixed income markets and may include, among other factors, consideration of the Adviser’s view of the following: the potential relative performance of various market sectors, security selection available within a given sector, the risk/reward equation for different asset classes, liquidity conditions in various market sectors, the shape of the yield curve and projections for changes in the yield curve, potential fluctuations in the overall level of interest rates, and current fiscal policy. Under normal circumstances, the Fund intends to invest at least 80% of its net assets (plus the amount of borrowings for investment purposes) in -4- Table of Contents bonds. “Bonds” include bonds, debt securities, and other fixed income instruments issued by governmental or private-sector entities. If the Fund changes this investment policy, it will notify shareholders at least 60 days in advance of the change. The Fund may invest in bonds of any credit quality, including those that are at the time of investment unrated or rated BB+ or 
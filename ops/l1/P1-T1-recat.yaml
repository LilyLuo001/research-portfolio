      N-14 1 tm238540d1_n14.htm N-14 As filed with the Securities and Exchange Commission on March 13, 2023 Securities Act File No. 333-_________ UNITED STATES SECURITIES AND EXCHANGE COMMISSION Washington, D.C. 20549 FORM N-14 REGISTRATION STATEMENT UNDER THE SECURITIES ACT OF 1933 x Pre-Effective Amendment No. ____ ¨ Post-Effective Amendment No. ____ ¨ MAINSTAY FUNDS TRUST (Exact Name of Registrant as Specified in Charter) 51 Madison Avenue, New York, New York 10010 (Address of Principal Executive Offices) (Zip Code) (800) 624-6782 (Registrant’s Area Code and Telephone Number) J. Kevin Gao, Esq. MainStay Funds Trust 30 Hudson Street Jersey City, New Jersey 07302 (Name and Address of Agent for Service) With copies to: Thomas C. Bogle, Esq. Corey F. Rose, Esq. Dechert LLP 1900 K Street, NW Washington, DC 20006 Approximate Date of Proposed Public Offering: As soon as practicable after this Registration Statement becomes effective. It is proposed that this filing will become effective on April 12, 2023, pursuant to Rule 488 under the Securities Act of 1933, as amended. No filing fee is required because an indefinite number of shares have previously been registered pursuant to Rule 24f-2 under the Investment Company Act of 1940, as amended. Title of Securities Being Registered: Class A and Class I shares of MainStay Fiera SMID Growth Fund, a series of the Registrant FIERA CAPITAL SERIES TRUST Fiera Capital Small/Mid-Cap Growth Fund 375 Park Avenue, 8th Floor New York, NY 10152 _____________, _____ Dear Shareholder: On behalf of the Board of Trustees (the “Board”) of Fiera Capital Small/Mid-Cap Growth Fund (the “Acquired Fund”), a series of Fiera Capital Series Trust (the “Trust”), we are pleased to invite you to a special meeting of shareholders (with any postponements or adjournments, the “Special Meeting”) of the Acquired Fund. The Special Meeting is scheduled to be held on June 8, 2023, at 11:00 a.m., local time, at 375 Park Avenue, 8th Floor, New York, NY 10152. At the Special Meeting, as a shareholder of the Acquired Fund, you will be asked to consider and vote on the following proposals: · To approve an Agreement and Plan of Reorganization providing for the transfer of the assets of the Acquired Fund to MainStay Fiera SMID Growth Fund (the “Acquiring Fund”), a series of MainStay Funds Trust, in exchange for the assumption of all of the liabilities of the Acquired Fund by the Acquiring Fund and shares of the Acquiring Fund, followed by the complete liquidation of the Acquired Fund (the “Reorganization”); and · To transact such other business as may properly come before the Special Meeting. The Acquiring Fund is managed by New York Life Investment Management LLC and subadvised by Fiera Capital Inc. (“Fiera Capital”). Fiera Capital is also the advisor to the Acquired Fund. Formal notice of the Special Meeting appears on the next page, followed by a combined proxy statement and prospectus (the “Proxy Statement/Prospectus”). The Reorganization is discussed in detail in the enclosed Proxy Statement/Prospectus, which you should read carefully. The Board recommends that you vote “FOR” the Reorganization. Your vote is important, regardless of the number of shares of the Acquired Fund you own. Whether or not you expect to attend the Special Meeting in person, please read the Proxy Statement/Prospectus and cast your vote promptly. You may cast your vote by completing, signing and returning the enclosed proxy card by mail in the postage-paid envelope provided or by following the instructions on the proxy card for voting your proxy on the Internet or by touch-tone telephone. It is important that your vote be received no later than 11:59 p.m. ET on June 7, 2023. We appreciate your participation and prompt response in this matter and thank you for your continued support. Sincerely, /s/ 2 FIERA CAPITAL SERIES TRUST Fiera Capital Small/Mid-Cap Growth Fund 375 Park Avenue, 8th Floor New York, NY 10152 NOTICE OF SPECIAL MEETING OF SHAREHOLDERS TO BE HELD ON June 8, 2023 NOTICE IS HEREBY GIVEN THAT a special meeting of shareholders (with any postponements or adjournments, the “Special Meeting”) of Fiera Capital Small/Mid-Cap Growth Fund (the “Acquired Fund”), a series of Fiera Capital Series Trust, is scheduled to be held on June 8, 2023, at 11:00 a.m., local time, at 375 Park Avenue, 8th Floor, New York, NY 10152 to consider and vote on the following proposals: · To approve an Agreement and Plan of Reorganization providing for the transfer of the assets of the Acquired Fund to MainStay Fiera SMID Growth Fund (the “Acquiring Fund”), a series of MainStay Funds Trust, in exchange for the assumption of all of the liabilities of the Acquired Fund by the Acquiring Fund and shares of the Acquiring Fund, followed by the complete liquidation of the Acquired Fund (the “Reorganization”); and · To transact such other business as may properly come before the Special Meeting . Please read the enclosed combined proxy statement and prospectus (the “Proxy Statement/Prospectus”) carefully for information concerning the Reorganization. The Board of Trustees of the Acquired Fund recommends that you vote “FOR” the Reorganization. Shareholders of record as of the close of business on April 7, 2023 are entitled to notice of, and to vote at, the Special Meeting. Your attention is called to the Proxy Statement/Prospectus. Regardless of whether you plan to attend the Special Meeting, please complete, sign and return the enclosed proxy card by 11:59 p.m. ET on June 7, 2023 or follow the instructions on the proxy card for voting your proxy on the Internet or by touch-tone telephone to help achieve a quorum and so that a maximum number of shares may be voted. Proxies may be revoked at any time before they are exercised by submitting a revised proxy card, by giving written notice of revocation to the Acquired Fund or by voting in person at the Special Meeting. By Order of the Board of Trustees of Fiera Capital Series Trust 3 QUESTIONS AND ANSWERS RELATING TO THE REORGANIZATION We recommend that you read the complete Proxy Statement/Prospectus. However, we thought it would be helpful to provide brief answers to some questions concerning the proposal described in this Proxy Statement/Prospectus. Q. Why is a shareholder meeting being held? A. You are being asked to consider and approve the Agreement and Plan of Reorganization (the “Reorganization Agreement”) providing for the transfer of the assets of the Acquired Fund, a series of Fiera Capital Series Trust, to the Acquiring Fund, a series of MainStay Funds Trust, in exchange for the assumption of all of the liabilities of the Acquired Fund by the Acquiring Fund and shares of the Acquiring Fund, followed by the complete liquidation of the Acquired Fund. The Acquiring Fund and the Acquired Fund may be referred to together in this Proxy Statement/Prospectus as the “Funds.” As described more fully in this Proxy Statement/Prospectus, the Acquiring Fund will commence operations upon the completion of the Reorganization described above and will be managed by New York Life Investment Management LLC (“New York Life Investments”), an indirect wholly-owned subsidiary of New York Life Insurance Company. Also, upon completion of the Reorganization, Fiera Capital Inc. (“Fiera Capital”) will continue its day-to-day portfolio management responsibilities for the Acquiring Fund, under the supervision of New York Life Investments, pursuant to a subadvisory agreement with New York Life Investments. Fiera Capital currently serves as the advisor for the Acquired Fund. New York Life Investments or its affiliates will provide distribution and administrative services to the Acquiring Fund, among other services, in addition to supervising the day-to-day portfolio management activities of Fiera Capital. For more information regarding New York Life Investments and Fiera Capital, please see “Information about Management of the Funds” in the Proxy Statement/Prospectus. Q. Why is the Reorganization being proposed? A. Fiera Capital, the investment adviser for the Acquired Fund, has agreed to sell assets used in its investment advisory business relating to the Acquired Fund to New York Life Investments, subject to shareholder approval of the Reorganization. If the Reorganization is approved, New York Life Investments will serve as investment adviser of the Acquiring Fund and Fiera Capital would serve as investment subadvisor to the Acquiring Fund. The Reorganization is intended to provide continuity in day-to-day portfolio management of the Acquired Fund’s portfolio as Fiera Capital would continue to provide portfolio management services to the Acquiring Fund as the subadvisor to the Acquiring Fund, subject to the oversight of New York Life Investments. The portfolio management team currently serving the Acquired Fund would be the same team serving the Acquiring Fund. As further described in the attached Proxy Statement/Prospectus, the Reorganization is not expected to change the way your assets are managed. The Reorganization would also result in the Acquired Fund’s existing shareholders becoming part of a larger fund family with access to the wide array of distribution, marketing, administrative and other services offered by New York Life Investments or its affiliates. Q. What are the potential benefits from the Reorganization? A. The Reorganization is expected to result in lower fees/expense for existing shareholders of the Acquired Fund as the Acquiring Fund would be subject to lower management fees and other expenses than the Acquired Fund. Furthermore, the Reorganization is intended to provide continuity in portfolio management of the Acquired Fund’s portfolio. If the Reorganization is approved, Fiera Capital will serve as the subadvisor to the Acquiring Fund and will continue its day-to-day portfolio management responsibilities for the Acquiring Fund, under the oversight of New York Life Investments, pursuant to a subadvisory agreement with New York Life Investments. Following the Reorganization, Mr. Reddy and Mr. Cook, portfolio managers of the Acquired Fund, will continue to serve as the portfolio managers of the Acquiring Fund and will be responsible for the day-to-day management of the Acquiring Fund’s portfolio. As further described in the attached Proxy Statement/Prospectus, the Acquired Fund’s and Acquiring Fund’s investment objectives are identical in that they both seek to achieve long-term capital growth. 4 The Acquiring Fund and Acquired Fund have principal investment strategies that are identical in all material respects. Any differences between the principal investment strategies, such as with respect to the manner in which an issuer is determined to be U.S. or foreign or when Fiera Capital may determine to sell a portfolio holding, are minor and do not reflect a material difference in the manner in which each Fund is, or will be, managed, as applicable. In addition, shareholders of the Acquired Fund will become shareholders of the Acquiring Fund, which is part of a larger fund family, the MainStay Funds Trust. This larger family benefits from a wider array of distribution, marketing and administrative services than those currently provided to the Fiera Capital Series Trust. Q. How will the Reorganization affect me? A. If shareholders of the Acquired Fund approve the Reorganization, you will become a shareholder of the Acquiring Fund. You will receive shares of a comparable class of the Acquiring Fund equal in value to the shares that you hold of the Acquired Fund as of the close of business of the New York Stock Exchange, usually 4:00 pm Eastern time, on the closing day of the Reorganization. If approved by shareholders, the Reorganization will take place on or about June 30, 2023 (“Closing Date”). Q. Are there differences between the Funds? A. Yes. Fiera Capital is the Acquired Fund’s investment adviser. New York Life Investments serves as the investment manager to the Acquiring Fund and will supervise the services provided by Fiera Capital which will serve as subadvisor to the Acquiring Fund. The portfolio managers of the Acquired Fund are also the portfolio managers of the Acquiring Fund. The Acquired Fund’s and Acquiring Fund’s investment objective are identical in that they both seek to achieve long-term capital growth. The Acquiring Fund and Acquired Fund have principal investment strategies that are identical in all material respects. Any differences between the principal investment strategies, such as with respect to the manner in which an issuer is determined to be U.S. or foreign or when Fiera Capital may determine to sell a portfolio holding, are minor and do not reflect a material difference in the manner in which each Fund is, or will be, managed, as applicable. See “Comparison of the Acquired Fund and the Acquiring Fund” in the Proxy Statement/Prospectus for more information. Q. How will the Reorganization affect shareholder fees and expenses? A. The Reorganization is expected to result in a reduction in Total Annual Fund Operating Expenses immediately after the consummation of the Reorganization as compared to the Acquired Fund’s current Total Annual Fund Operating Expenses. Following the expiration of the expense limitation agreement, it is possible that the total annual fund operating expenses of one or more share classes of the Acquiring Fund may be higher than the total annual fund operating expenses of the corresponding share class of the Acquired Fund, based in part on the asset size of the Acquiring Fund at that time. Investor Class and Institutional Class shareholders of the Acquired Fund will receive Class A shares and Class I shares of the Acquiring Fund, respectively. New York Life Investments has contractually agreed to waive fees and/or reimburse expenses on the Acquiring Fund so that Total Annual Fund Operating Expenses (excluding taxes, interest, litigation, extraordinary expenses, brokerage and other transaction e

e Small-Cap Opportunity Fund, Royce Small-Cap Special Equity Fund, Royce Small-Cap Value Fund, Royce Smaller-Companies Growth Fund, Royce Dividend Value Fund, and Royce International Premier Fund) of its assets in securities for which market quotations are not readily available (i.e., illiquid securities) (except for Royce Small-Cap Fund, which is not subject to any such limitation); 9. Invest, with respect to 75% of its total assets, more than 5% of its assets in the securities of any one issuer (except U.S. Government securities); 10. Invest more than 25% of its assets in any one industry; 11. Acquire more than 10% of the outstanding voting securities of any one issuer; 12. Purchase or sell real estate or real estate mortgage loans or invest in the securities of real estate companies unless such securities are publicly-traded; 13. Purchase or sell commodities or commodity contracts; 14. Make loans, except for purchases of portions of issues of publicly-distributed bonds, debentures and other securities, whether or not such purchases are made upon the original issuance of such securities, and except that each Fund may loan up to 25% of its assets to qualified brokers, dealers or institutions for their use relating to short sales or other securities transactions (provided that such loans are fully collateralized at all times); 15. Invest in companies for the purpose of exercising control of management; 16. Purchase portfolio securities from or sell such securities directly to any of the Trust’s Trustees, officers, employees or investment adviser, as principal for their own accounts; or 17. Invest more than 5% of its total assets in warrants, rights and options. Certain operating policies of the Funds are set forth below. Such operating policies may be changed by a majority vote of the Board and without shareholder approval. Notwithstanding any Fundamental Policy set forth herein, no Fund may, as a matter of operating policy, enter into any “derivatives transaction” 
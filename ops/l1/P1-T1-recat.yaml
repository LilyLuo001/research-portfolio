      N-14 1 allspringfundstrustnwrapper.htm INITIAL REGISTRATION STATEMENT FILED ON FORM N14 FOR OPEN-END INVESTMENT COMPANY, INCLUDING THOSE FILED WITH AUTOMATIC EFFECTIVENESS UNDER RULE 488 (BUSINESS COMBINATIONS) AS FILED WITH THE SECURITIES AND EXCHANGE COMMISSION ON AUGUST 31, 2022 1933 Act No. 333-________ UNITED STATES SECURITIES AND EXCHANGE COMMISSION Washington D.C. 20549 FORM N-14 REGISTRATION STATEMENT UNDER THE SECURITIES ACT OF 1933 Pre-Effective Amendment No. [] Post-Effective Amendment No. [] (Check appropriate box or boxes) ALLSPRING FUNDS TRUST (Exact Name of Registrant as Specified in Charter) 525 Market Street San Francisco, California 94105 (Address of Principal Executive Offices) (800) 222-8222 (Registrant’s Telephone Number) Matthew Prasse Allspring Funds Management, LLC 525 Market Street, 12th Floor San Francisco, California 94105 (Name and Address of Agent for Service) With a copy to: Marco E. Adelfio, Esq. Goodwin Procter LLP 1900 N Street, N.W. Washington, D.C. 20036 It is proposed that this filing will be declared effective on September 30, 2022 pursuant to Rule 488. No filing fee is required under the Securities Act of 1933 because an indefinite number of shares of beneficial interest in the Registrant has previously been registered pursuant to Rule 24f-2 under the Investment Company Act of 1940, as amended. 1 ALLSPRING FUNDS TRUST PART A PROSPECTUS/PROXY STATEMENT Prospectus/Proxy Statement | Important merger information [September xx, 2022] Dear Valued Shareholder: A Special Meeting (the “Meeting”) of Shareholders of the Target Funds listed below, each a series of Investment Managers Series Trust (the “Target Trust”), will be held at the offices of Mutual Fund Administration, LLC, [2220 East Route 66, Ste. 226, Glendora, CA 91740] on [November 4, 2022] at [xx:xx] a.m. Pacific time. Shareholders of each Target Fund are being asked to approve an Agreement and Plan of Reorganization (the “Plan”) providing for the merger of their Target Fund into the corresponding Acquiring Fund, including the acquisition of all of the assets of the Target Fund by the corresponding Acquiring Fund in exchange for shares of the Acquiring Fund and the assumption by the Acquiring Fund of all of the liabilities of the Target Fund (each a “Merger” and collectively the “Mergers”). The Plan also provides for the prompt distribution of the Acquiring Fund shares to shareholders of the Target Fund in liquidation of the Target Fund. Target Fund Acquiring Fund 361 Domestic Long/Short Equity Fund Allspring U.S. Long/Short Equity Fund 361 Global Long/Short Equity Fund Allspring Global Long/Short Equity Fund The Target Fund’s investment advisor, Hamilton Lane Advisors, L.L.C. (“Hamilton Lane”), has recommended that each Target Fund be reconstituted as a series of Allspring Funds Trust (the “Acquiring Trust”). Hamilton Lane has indicated that it no longer considers acting as investment adviser to mutual funds to be part of its long term strategic plan, and that it believes that continuing the Target Funds as new series of the Acquiring Trust may benefit each Target Fund and its shareholders by providing the ability to continue to invest in a mutual fund with a substantially similar investment strategy that is part of a fund family consisting of series advised by Allspring Funds Management, LLC (“Allspring Funds Management”), the proposed investment advisor to each Acquiring Fund. In addition, Hamilton Lane has indicated its belief that a transition of the Target Funds to new series of the Acquiring Trust may result in more customized growth and distribution support for the Acquiring Funds, thereby resulting in the potential for increased assets and decreased operating expenses over the long term. If the Mergers are completed, Allspring Global Investments, LLC (“Allspring Investments”), the current sub-adviser to each Target Fund, and each Target Fund’s current portfolio managers will continue to provide the day-to-day management of the corresponding Acquiring Fund’s portfolio. If shareholders of a Target Fund approve the Plan and certain other closing conditions are satisfied or waived, each shareholder of that Target Fund will receive after the closing of the Merger (in accordance with the Plan) a number of shares of beneficial interest of the corresponding Acquiring Fund equal in value to the aggregate net asset value of the shares of the Target Fund held by the Target Fund shareholder immediately prior to the Merger, and the Target Fund shareholders will become shareholders of the Acquiring Fund. Each Acquiring Fund is a newly organized fund that will commence operation upon the closing of the Merger of the corresponding Target Fund. The investment objectives, principal investment strategies, policies, and risks of each Target Fund and the corresponding Acquiring Fund are substantially similar. Each Merger generally is not expected to result in the recognition of gain or loss by the applicable Target Fund or its shareholders for federal income tax purposes. No sales charges or redemption fees will be imposed in connection with the Mergers. If the shareholders of a Target Fund do not approve the applicable Merger, then the Merger of that Target Fund will not be implemented and such Target Fund will continue to operate as a series of the Trust. In addition, the Merger of the 361 Domestic Long/Short Equity Fund is contingent on shareholder approval of the 361 Global Long/Short Equity Fund. If a Merger of a Target Fund is not completed, the Board of Trustees of the Target Trust (the “Board”) will consider additional actions as it deems to be in the best interests of such Target Fund, including the possible liquidation of the Target Fund. After careful consideration, for the reasons discussed in the attached Prospectus/Proxy Statement, and based on the recommendation of the Trust’s investment advisor, Hamilton Lane, the Board, including a majority of Trustees who are not “interested persons” of each Target Fund, as that term is defined in the Investment Company Act of 1940, as amended, has approved each Merger and the solicitation of each Target Fund’s shareholders with respect to the applicable Plan. The Board recommends that the shareholders of each Target Fund vote “FOR” approval of the Plan with respect to their Target Fund and the Merger it contemplates. The attached Prospectus/Proxy Statement is designed to give you more information about the proposal. If you have any questions regarding the proposal to be voted on, please do not hesitate to call the number on the enclosed proxy card. If you were a shareholder of record of a Target Fund as of the close of business on September 9, 2022, the record date for the Special Meeting, you are entitled to vote on the proposal with respect to your Target Fund(s) at the Special Meeting and at any adjournment thereof. While you are, of course, welcome to join us at the Special Meeting, we expect that most shareholders will cast their votes by filling out and signing the enclosed proxy card. Whether or not you are planning to attend the Special Meeting, we need your vote. Please submit your vote via the options listed on your proxy card. You can mark, sign and date the enclosed proxy card and promptly return it in the enclosed, postage-paid envelope so that the maximum number of shares may be voted. You should follow the enclosed instructions on your proxy card as to how to vote, which includes calling the toll-free number on your proxy card to vote by telephone. [You may also vote via the Internet at the website listed on your proxy card.] You may revoke your proxy before it is exercised at the Special Meeting, either by writing to the Secretary of the Trust at the address noted in the Prospectus/Proxy Statement or in person at the time of the Special Meeting. A prior proxy vote can also be revoked by voting the proxy at a later date through the toll-free number listed on the proxy card. Thank you for taking the time to consider this important proposal and for your continuing investment in the Investment Managers Series Trust. Sincerely, Maureen Quill Maureen Quill President INVESTMENT MANAGERS SERIES TRUST 235 WEST GALENA STREET, MILWAUKEE, WI 53212 1-626-914-4141 [September xx, 2022] NOTICE OF SPECIAL MEETING OF SHAREHOLDERS TO BE HELD ON [NOVEMBER 4, 2022] A Special Meeting (the “Meeting”) of Shareholders of the Target Funds listed below (each, a “Target Fund” and collectively, the “Target Funds”), each a series of Investment Managers Series Trust (the “Target Trust”) will be held at Mutual Fund Administration, LLC, [2220 East Route 66, Ste. 226, Glendora, CA 91740] on [November 4, 2022] at [xx:xx] a.m. Central Time. Target Fund Acquiring Fund 361 Domestic Long/Short Equity Fund Allspring U.S. Long/Short Equity Fund 361 Global Long/Short Equity Fund Allspring Global Long/Short Equity Fund With respect to each Target Fund, the Meeting is being held for the following purposes: 1. To consider and act upon an Agreement and Plan of Reorganization (the “Plan”) dated as of August 29, 2022, providing for the reorganization of the Target Fund into the corresponding Acquiring Fund, including the acquisition of all of the assets of the Target Fund by the corresponding Acquiring Fund in exchange for shares of the Acquiring Fund (the “Acquiring Fund Shares”) and the assumption by the Acquiring Fund of all of the liabilities of the Target Fund. The Plan also provides for the prompt distribution of the Acquiring Fund Shares to shareholders of the Target Fund in liquidation of the Target Fund. 2. To transact any other business which may properly come before the Meeting or any adjournment(s) thereof. Any adjournment(s) of the Meeting will be held at the above address. The Board of Trustees of the Target Trust has fixed the close of business on September 9, 2022 as the record date (the “Record Date”) for the Meeting. Only shareholders of record as of the close of business on the Record Date will be entitled to this notice and to vote at the Meeting or any adjournment(s) thereof. IT IS IMPORTANT THAT PROXY CARDS BE RETURNED PROMPTLY. ALL SHAREHOLDERS ARE URGED TO COMPLETE, DATE, SIGN AND RETURN WITHOUT DELAY THEIR ENCLOSED PROXY CARD IN THE ENCLOSED POSTAGE-PAID ENVELOPE, OR TO VOTE USING ONE OF THE OTHER METHODS DESCRIBED AT THE END OF THE PROSPECTUS/PROXY STATEMENT SO THAT YOUR SHARES MAY BE REPRESENTED AT THE MEETING. YOUR PROMPT ATTENTION TO THE ENCLOSED PROXY CARD WILL HELP TO AVOID THE EXPENSE OF FURTHER SOLICITATION. By order of the Board of Trustees, Diane Drake Secretary ALLSPRING FUNDS TRUST 525 MARKET STREET, 12TH FLOOR, SAN FRANCISCO, CA 94105 1-800-222-8222 [September xx, 2022] PROSPECTUS/PROXY STATEMENT This Prospectus/Proxy Statement contains information you should know before voting on the proposed mergers (each a “Merger” and collectively the “Mergers”) of the Target Funds listed below (each, a “Target Fund” and collectively, the “Target Funds”), each of which is a series of Investment Managers Series Trust (the “Target Trust”), a registered open-end management investment company, into the corresponding Acquiring Funds listed below (each, an “Acquiring Fund” and collectively, the “Acquiring Funds”), each of which is a series of Allspring Funds Trust (the “Acquiring Trust”), a registered open-end management investment company. If approved, each Merger will result in shareholders of the respective Target Fund receiving shares of the corresponding Acquiring Fund in exchange for their shares of the Target Fund. Target Fund Acquiring Fund 361 Domestic Long/Short Equity Fund Allspring U.S. Long/Short Equity Fund 361 Global Long/Short Equity Fund Allspring Global Long/Short Equity Fund The Target Funds and Acquiring Funds listed above are collectively referred to as the “Funds.” Please read this Prospectus/Proxy Statement carefully and retain it for future reference. Additional information concerning each Fund and Merger has been filed with the Securities and Exchange Commission (the “SEC”). The prospectus , statement of additional information (“SAI”) , annual reports and semi-annual reports of each Target Fund are incorporated into this document by reference and are legally deemed to be part of this Prospectus/Proxy Statement. Copies of these documents are available upon request without charge by writing to 361 Funds, PO Box 2175, Milwaukee, WI 53201 or by calling 1.888.736.1227 or visiting the Target Funds website at www.361funds.com. Each Acquiring Fund is a “shell fund” being registered with the SEC in order to receive the assets, assume the liabilities, and continue the business of the corresponding Target Fund. As such, no prospectus, SAI, annual report or semiannual report for the Acquiring Funds are available as of the date of this Prospectus/Proxy Statement. Information about the Acquiring Funds that would otherwise be available in a prospectus can be found in the sections entitled “Merger Summary” and “Account Information” of this Prospectus/Proxy Statement. Additional information is included in the Merger Statement of Additional Information (the “Merger SAI”). You may also view or obtain available documents from the SEC: by phone at 1.800.SEC.0330 (duplicating fee required); in person or by mail at Public Reference Section, Securities and Exchange Commission, 100 F Street, N.E., Washington, D.C. 20549-0213 (duplicating fee required); by email at publicinfo@sec.gov (duplicating fee required); or by internet at www.sec.gov . The SEC has not approved or disapproved these securities or determined if this Prospectus/Proxy Statement is truthful or complete. Any representation to the contrary is a criminal offense. The shares offered by this Prospectus/Proxy Statement are not deposits of a bank, are not insured, endorsed or guaranteed by the FDIC or any government agency and involve investment risk, including possible loss of your original investment. Table of Contents Overview Key Features of the Merge

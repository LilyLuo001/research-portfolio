      N-14 1 d840119dn14.htm N-14 N-14 As filed with the Securities and Exchange Commission on January 24, 2020 File No. 333- UNITED STATES SECURITIES AND EXCHANGE COMMISSION WASHINGTON, D.C. 20549 FORM N-14 REGISTRATION STATEMENT UNDER THE SECURITIES ACT OF 1933 Pre-Effective Amendment No. ☐ Post-Effective Amendment No. ☐ (Check appropriate box or boxes) AIM Variable Insurance Funds (Invesco Variable Insurance Funds) (Exact Name of Registrant as Specified in Charter) 11 Greenway Plaza, Suite 1000, Houston, TX 77046 (Address of Principal Executive Offices) (Number, Street, City, State, Zip Code) (713) 626-1919 (Registrant’s Area Code and Telephone Number) Jeffrey H. Kupor, Esquire 11 Greenway Plaza, Suite 1000, Houston, TX 77046 (Name and address of Agent for Service) Copy to: Joseph C. Benedetti, Esquire Invesco Advisers, Inc. 11 Greenway Plaza, Suite 1000 Matthew R. DiClemente, Esquire Stradley Ronon Stevens & Young, LLP 2005 Market Street, Suite 2600 Houston, TX 77046-1173 Philadelphia, PA 19103-7018 Approximate Date of Public Offering: As soon as practicable after this Registration Statement becomes effective under the Securities Act of 1933, as amended. Title of securities being registered: Series I and Series II shares of beneficial interest, without par value, of the Invesco Oppenheimer V.I. Discovery Mid Cap Growth Fund, a series of the Registrant. It is proposed that this filing will become effective on February 24, 2020 pursuant to Rule 488 under the Securities Act of 1933, as amended. No filing fee is due because Registrant is relying on Section 24(f) of the Investment Company Act of 1940, as amended. February [ ], 2020 Dear Shareholder, On May 24, 2019, Invesco successfully completed its acquisition of OppenheimerFunds, a leading global asset manager. Since May 2019, Invesco has been conducting a comprehensive review of its product line to sharpen its offerings to investors. A key goal of this effort is to reduce overlap and enhance efficiency across the product line for the benefit of the Invesco Funds’ shareholders and Invesco. As the next step in the process of integrating the combined businesses of Invesco and OppenheimerFunds, the Invesco Funds’ Boards approved a series of fund reorganizations that will combine two or more Invesco funds. Some of these fund reorganizations will require shareholder approval in order to proceed. The proposed reorganizations are intended to: • Distinguish and emphasize Invesco’s most compelling investment processes and strategies; • Reduce overlap in the product lineup; • Create scale in the resulting funds; and • Build a solid foundation for further growth to meet client and shareholder needs. As described in the attached proxy statement/prospectus, it is proposed that the Invesco V.I. Mid Cap Growth Fund (the “Target Fund”), a series of AIM Variable Insurance Funds (the “Trust”) reorganize with and into Invesco Oppenheimer V.I. Discovery Mid Cap Growth Fund (the “Acquiring Fund”), another series of the Trust. The Acquiring Fund is larger than the Target Fund. If the proposed reorganization of the Target Fund is approved by shareholders, the combining of Fund assets would result in a larger asset base against which fixed dollar costs may be spread. It is anticipated that the Target Fund will continue to be managed by its existing investment management team following the reorganization. Moreover, it is anticipated that shareholders will experience a reduction in total expense ratio if the proposed reorganization is approved, decreasing the cost of their investment. The Board of your Fund, including its independent trustees, believes that the reorganization proposed in this proxy statement/prospectus is in the best interest of your Fund. The attached proxy card/voting instruction form seeks your vote in favor of the proposed reorganization. You are eligible to provide voting instructions on how to vote on this proposal because shares of the Invesco V.I. Mid Cap Growth Fund are held through your variable annuity contract or variable life insurance policy. Your voting instructions are important no matter how many shares are held through your contract. Please take a moment after reviewing the enclosed materials to sign and return your proxy card/voting instruction form in the enclosed postage paid return envelope. If you expect to attend the meeting in person, or have questions, please notify us by calling 1-800-952-3502. You may also provide your voting instructions by telephone or through a website established for that purpose by following the instructions that appear on the enclosed proxy card/voting instruction form. If we do not hear from you after a reasonable amount of time, you may receive a telephone call from our proxy solicitor, Computershare, Inc., reminding you to provide your voting instructions. Sincerely, Jeffrey H. Kupor Senior Vice President, Chief Legal Officer and Secretary AIM Variable Insurance Funds (Invesco Variable Insurance Funds) 11 Greenway Plaza, Suite 1000 Houston, Texas 77046-1173 1-800-959-4246 NOTICE OF SPECIAL MEETING OF SHAREHOLDERS To Be Held on April 24, 2020 A special meeting (together with any postponements or adjournments thereof, the “Meeting”) of the shareholders of the Invesco V.I. Mid Cap Growth Fund (the “Target Fund”), will be held on April 24, 2020 at 1:00 p.m. Central time, at 11 Greenway Plaza, Suite 1000, Houston, Texas 77046-1173 to vote on the following proposal: To approve an Agreement and Plan of Reorganization (the “Agreement”) that provides for the reorganization of the Invesco V.I. Mid Cap Growth Fund (the “Target Fund”) into the Invesco Oppenheimer V.I. Discovery Mid Cap Growth Fund (the “Acquiring Fund”), each a series of AIM Variable Insurance Funds (Invesco Variable Insurance Funds) (the “Trust”). The Agreement provides for: (a) the transfer of the assets and assumption of the liabilities of the Target Fund by the Acquiring Fund in exchange for shares of a corresponding class of the Acquiring Fund; (b) the distribution of such shares of the corresponding class to the shareholders of the Target Fund; and (c) the distribution of shares in complete liquidation of the Target Fund and the cancellation of the outstanding shares of the Target Fund (the “Reorganization”). The Target Fund and the Acquiring Fund are referred to collectively herein as the “Funds.” Shareholders of record as of the close of business on January 27, 2020 are entitled to notice of, and to vote at, the Meeting, or any adjournment thereof. If the shareholders of the Target Fund vote to approve the Agreement, then shareholders of the Target Fund will become shareholders of the Acquiring Fund on or about April 30, 2020, and will no longer be shareholders of the Target Fund. The Target Fund is generally sold only to separate accounts of various insurance companies (“Participating Insurance Companies”) to fund the benefits of variable annuity or variable life insurance policies, and other mutual funds that invest in other funds (“funds of funds” or a “fund of fund”). Individual variable annuity or life insurance policy owners (“Contract Owners”) are not the shareholders of the Target Fund. Rather, the insurance companies and their separate accounts are the shareholders. However, the Participating Insurance Companies are furnishing this Proxy Statement/Prospectus to Contract Owners and, except as otherwise might be required by applicable law, each insurance company will offer Contract Owners the opportunity to instruct it as to how it should vote shares held by it and the separate accounts on the proposal to be considered at the Meeting. Contract Owners may provide voting instructions on how to vote shares held through their variable annuity contract or variable life insurance policy at the Meeting or any adjournment of the Meeting. The Board of Trustees that oversees the Target Fund (the “Board”) requests that the Participating Insurance Companies and any other direct shareholders of the Target Fund vote their shares by completing the enclosed proxy card and returning it in the enclosed postage paid return envelope. If you are a Contract Owner, the Participating Insurance Companies request that you provide voting instructions by completing the enclosed voting instruction form and returning it in the enclosed postage paid return envelope, or by voting by telephone or via the internet, if available, using the instructions on the voting instruction form. To the extent that any shares of the Target Fund are owned directly by a fund that operates as a fund of funds those shares will be voted directly by the fund of funds in the same proportion as all other votes received from the other holders of the underlying Target Fund’s shares (so called “echo voting”). The Board recommends that you cast your vote or provide voting instructions FOR the above proposal as described in the Proxy Statement/Prospectus. Please sign and promptly return the proxy card/voting instruction form in the postage paid return envelope regardless of the number of shares owned. Voting instructions may be revoked at any time before they are exercised by submitting a written notice of revocation or a subsequently executed voting instruction form to the appropriate Participating Insurance Company or by attending the Meeting and providing voting instructions in person. Jeffrey H. Kupor Senior Vice President, Chief Legal Officer and Secretary [February ], 2020 AIM Variable Insurance Funds (Invesco Variable Insurance Funds) 11 Greenway Plaza, Suite 1000 Houston, Texas 77046-1173 1-800-959-4246 PROXY STATEMENT/PROSPECTUS [February ____], 2020 Introduction This Proxy Statement/Prospectus contains information that shareholders of the Invesco V.I. Mid Cap Growth Fund (the “Target Fund”), a series of AIM Variable Insurance Funds (Invesco Variable Insurance Funds) (the “Trust”) should know before voting on the proposed reorganization that is described herein and should be retained for future reference. This document is both the proxy statement of the Target Fund and also a prospectus for Invesco Oppenheimer V.I. Discovery Mid Cap Growth Fund (the “Acquiring Fund”), which is another series of the Trust. The Trust is a registered open-end management investment company. The Target Fund and the Acquiring Fund collectively are referred to as the “Funds” and individually as a “Fund.” A special meeting of the shareholders of the Target Fund (together with any adjournments or postponements thereof, the “Meeting”) will be held at 11 Greenway Plaza, Suite 1000, Houston, Texas 77046-1173 on April 24, 2020 at 1:00 p.m. Central time. At the Meeting, shareholders of the Target Fund will be asked to consider the following proposal: To approve an Agreement and Plan of Reorganization (the “Agreement”) that provides for the reorganization of the Target Fund into the Acquiring Fund, each a series of AIM Variable Insurance Funds (Invesco Variable Insurance Funds). The Agreement provides for: (a) the transfer of the assets and assumption of the liabilities of the Target Fund by the Acquiring Fund in exchange for shares of a corresponding class of the Acquiring Fund; (b) the distribution of such shares of the corresponding class to the shareholders of the Target Fund; and (c) the distribution of shares in complete liquidation of the Target Fund and the cancellation of the outstanding shares of the Target Fund (the “Reorganization”). The Target Fund generally is sold only to separate accounts (the “Accounts”) of various insurance companies (the “Participating Insurance Companies”) to fund the benefits of variable annuity and/or variable life insurance policies and funds of funds (the “Contracts”). The Accounts may invest in shares of the Target Fund in accordance with allocation instructions received from owners of the Contracts (“Contract Owners”). Such allocation rights, as well as sales charges and other expenses imposed on Contract Owners by the Contracts, are further described in the Contract prospectus. Individual Contract Owners are not the shareholders of the Target Fund. Rather, the insurance companies and their Accounts are the shareholders. However, the Participating Insurance Companies are furnishing this Proxy Statement/Prospectus to Contract Owners and each Participating Insurance Company will offer Contract Owners the opportunity to instruct it as to how it should vote shares held by it and the Accounts on the proposal to be considered at the Meeting. This Proxy Statement/Prospectus is provided to Contract Owners entitled to give voting instructions regarding the Target Fund. Each Participating Insurance Company hereby solicits voting instructions from its Contract Owners with respect to the shares of the Target Fund attributable to such Contracts. The Board of Trustees of the Trust (the “Board”) hereby solicits proxies from shareholders of the Target Fund, including each Participating Insurance Company and its Accounts. This Proxy Statement/Prospectus contains information that a Contract Owner should know before providing voting instructions on the proposed reorganization that is described herein and which, if such proposed reorganization is approved, will result in your investment in the Acquiring Fund. For purposes of this Proxy Statement/Prospectus, the terms “shareholder,” “you,” and “your” may refer to: (i) Contract Owners; (ii) Accounts and participating insurance companies, as direct owners of Target Fund shares; and (iii) any other direct shareholders of the Target Fund, unless the context otherwise requires. If the shareholders of the Target Fund vote to approve the Agreement, then shareholders of the Target Fund will become shareholders of the Acquiring Fund on or about April 30, 2020, and will no longer be shareholders of the Target Fund. The total value of the Acquiring Fund shares of each class that shareholders will receive in the Reorganization will be the same as the total value of the shares of each cla
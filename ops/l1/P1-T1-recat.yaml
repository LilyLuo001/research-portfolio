f its portfolio. Principal investment strategies The Fund pursues its investment objective by investing, under normal circumstances, at least 80% of its net assets (plus any borrowings for investment purposes) in equity securities with the potential for long-term growth of capital. The Fund normally invests in a portfolio of 35-55 common stocks. Portfolio management seeks to invest in companies where the stock price trades at a significant discount to portfolio management’s estimate of fair value and whose intrinsic value portfolio management believes will grow over time. The Fund is classified as nondiversified, which allows it to hold larger positions in securities compared to a fund that is classified as diversified. The Fund may invest in companies of any size, from larger, well-established companies to smaller, emerging growth companies. The Fund may also invest in fixed-income instruments, such as convertible securities and preferred stock. The Fund may invest in foreign securities. Portfolio management applies a “bottom up” approach in choosing investments. In other words, portfolio management looks at companies one at a time to determine if a company is an attractive investment opportunity and if it is consistent with the Fund’s investment policies. In conducting the “bottom up” analysis, portfolio management seeks to identify durable businesses whose stocks are available at market prices below portfolio management’s estimate of their intrinsic value, whose intrinsic value is expected to grow over time, and whose management teams are aligned with shareholders. Portfolio management will generally consider selling a stock when, in portfolio management’s opinion, the business shows declining fundamentals, the stock is overvalued, or if the investing thesis for owning the stock has changed. The Fund may seek to earn additional income through lending its securities to certain qualified broker-dealers and institutions on a short-term or long-term basis, in an amount equal to up to one-third of its total assets as determined at the time of the loan origination. Principal investment risks The biggest risk is that the Fund’s returns will vary, and you could lose money. The Fund is designed for long-term investors seeking an equity portfolio, including common stocks. Common stocks tend to be more volatile than many other investment choices. The principal risks associated with investing in the Fund are set forth below. 2 | Janus Investment Fund Market Risk. The value of the Fund’s portfolio may decrease due to short-term market movements and over more prolonged market downturns. As a result, the Fund’s net asset value may fluctuate and it may be more difficult to value or sell the Fund’s holdings. Market risk may affect a single issuer, industry, economic sector, or the market as a whole. Market risk may be magnified if certain social, political, economic, and other conditions and events (such as terrorism, conflicts, including related sanctions, social unrest, natural disasters, epidemics and pandemics, including COVI D-1 9) adversely interrupt the global economy and financial markets. It is important to understand that the value of your investment may fall, sometimes sharply, in response to changes in the market, and you could lose money. Portfolio Management Risk. The Fund is an actively managed investment portfolio and is therefore subject to the risk that the investment strategies and research process employed for the Fund may fail to produce the intended results. Accordingly, the Fund may underperform its benchmark index or other mutual funds with similar investment objectives. Small- and Mid-Sized Companies Risk. Investments in securities issued by small- and mid-sized companies, which can include smaller , start-up companies offering emerging products or services, may involve greater risks than are customarily associated with larger, more established companies. For example, small- and mid-sized companies may suffer more significant losses as a result of their narrow product lines, limited operating history, greater exposure to competitive threats, limited financial resources, limited trading markets, and the potential lack of management depth. Securities issued by small- and mid-sized companies tend to be more volatile and somewhat more speculative than securities issued by larger or more established companies and may underperform as compared to the securities of larger or more established companies. These holdings are also subject to wider price fluctuations and tend to be less liquid than stocks of larger or more established companies, which could have a significant adverse effect on the Fund’s returns, especially as market conditions change. Value Investing Risk. Because different types of stocks tend to shift in and out of favor depending on market and economic conditions, “value” stocks may perform differently than other types of stocks and from the market as a whole, and can continue to be undervalued by the market for long periods of time. It is also possible that a value stock will never appreciate to the extent expected by portfolio management. Growth Securities Risk. Securities of companies perceived to be “growth” companies may be more volatile than other stocks and may involve special risks. If portfolio management’s perception of a company’s growth potential is not realized, the securities purchased may not perform as expected, reducing the Fund’s returns. In addition, because different types of stocks tend to shift in and out of favor depending on market and economic conditions, “growth” stocks may perform differently from other types of securities and the market as a whole. Nondiversification Risk. The Fund is classified as nondiversified under the Investment Company Act of 1940, as amended. This gives the Fund’s portfolio management more flexibility to hold larger positions in securities. As a result, an increase or decrease in the value of a single security held by the Fund may have a greater impact on the Fund’s net asset value and total return. Issuer Concentration Risk. The Fund’s portfolio may be comprised of a relatively small number of issuers in comparison to other funds. As a result, the Fund may be subject to greater risks than a fund that invests in a greater number of issuers. A change in the value of any single investment held by the Fund may affect the overall value of the Fund more than it would affect a fund that holds more investments. In particular, the Fund may be more susceptible to adverse developments affecting any single issuer held by the Fund and may be susceptible to greater losses because of these developments. Foreign Exposure Risk. Foreign markets can be more volatile than the U.S. market. As a result, the Fund’s returns and net asset value may be affected by fluctuations in currency exchange rates or political or economic conditions in a particular country. In some foreign markets, there may not be protection against failure by other parties to complete transactions. It may not be possible for the Fund to repatriate capital, dividends, interest, and other income from a particular country or governmental entity. In addition, a market swing in one or more countries or regions where the Fund has invested a significant amount of its assets may have a greater effect on the Fund’s performance than it would in a more geographically diversified portfolio. Convertible Securities Risk. The Fund may invest in securities that are convertible into preferred and common stocks, and thus, is subject to the risks of investments in both debt and equity securities. The market value of convertible securities tends to decline as interest rates increase and, conversely, tends to increase as interest rates decline. In addition, because of the 3 | Janus Henderson Contrarian Fund conversion feature, the market value of convertible securities tends to vary with fluctuations in the market value of the underlying preferred an
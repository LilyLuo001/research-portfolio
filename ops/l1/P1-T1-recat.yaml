      N-14 1 fp0085114-1_n14.htm AS FILED WITH THE U.S. SECURITIES AND EXCHANGE COMMISSION ON SEPTEMBER 13, 2023 1933 Act File No. 333- U.S. SECURITIES AND EXCHANGE COMMISSION WASHINGTON, D.C. 20549 FORM N-14 REGISTRATION STATEMENT UNDER THE SECURITIES ACT OF 1933 /X/ Pre-Effective Amendment No. Post-Effective Amendment No. BISHOP STREET FUNDS (Exact Name of Registrant as Specified in Charter) One Freedom Valley Drive Oaks, Pennsylvania 19456 (Address of Principal Executive Offices, Zip Code) 1-888-462-5386 (Registrant’s Telephone Number) Michael Beattie c/o SEI Investments One Freedom Valley Drive Oaks, Pennsylvania 19456 (Name and Address of Agent for Service) Copy to: Sean Graber, Esquire Morgan, Lewis & Bockius LLP 1701 Market Street Philadelphia, Pennsylvania 19103 Title of Securities being Registered: Class A Shares of the Hawaii Municipal Bond Fund. Approximate Date of Proposed Public Offering: As soon as practicable after the Registration Statement becomes effective under the Securities Act of 1933, as amended. No filing fee is required under the Securities Act of 1933, as amended, because an indefinite number of shares of beneficial interest have previously been registered pursuant to Section 24(f) under the Investment Company Act of 1940, as amended. It is proposed that this filing will become effective on October 13, 2023 pursuant to Rule 488 under the Securities Act of 1933, as amended. Terry Lee, CEO LEE FINANCIAL MUTUAL FUND, INC. Hawaii Municipal Fund 3113 Olu Street Honolulu, Hawaii 96816 [October 13], 2023 Dear Shareholders of the Hawaii Municipal Fund (“SURFX”): I hope this letter finds you and your families in good health and spirits. Our special thoughts also go out to all the families that have been impacted by the horrible fires in Lahaina. I can’t believe this year commemorates the 35th anniversary of SURFX. It doesn’t seem that many years ago that I left my position at Merrill Lynch to start a mutual fund that would invest in Hawaii state municipal bonds which would offer Hawaii residents the opportunity to earn income that is state and federal tax free. At the time, there were other funds with similar objectives but we wanted to offer our fund with no front or back-end commission (no-load). I had no idea that as a young man of 31 years, I would be laying down the foundation for an unbelievable career and what would ultimately be the most important business event in my life’s journey. Putting our shareholders first has been our focus from day one. I do want to acknowledge that I have a great team of professionals that have also committed themselves to providing you with a quality investment with excellent service throughout the years. Most of all I want to thank you for the trust and confidence you’ve placed in us throughout the years. SURFX would not be here if not for you. I will always cherish the friendships I have made with many of you. Given recent challenges posed in a changing investment landscape, various economic factors and especially escalating costs, we have engaged in extensive discussions and thorough evaluations to determine the most prudent path forward for SURFX. In light of these factors, we are excited to share our decision to merge with the Hawaii Municipal Bond Fund (“BHIAX”). The investment adviser of BHIAX is Bishop Street Capital Management, which is a wholly-owned subsidiary of First Hawaiian Bank. We believe this move will create a mutual fund that is well positioned to continue to offer Hawaii residents a mutual fund with tax-free opportunities. So on behalf of myself, Lee Financial Group Hawaii, and the Board of Directors of SURFX we are pleased to invite you to a special shareholders meeting to be held at 10:30 a.m. (HST) on [Tuesday, November 28], 2023 at Japanese Cultural Center, 2454 S. Beretania St., Honolulu, Hawaii 96826 (the “Special Meeting”). At the Special Meeting, shareholders of SURFX will be asked to approve an Agreement and Plan of Reorganization, dated as of [ ], 2023, which contemplates the reorganization (the “Reorganization”) of SURFX (the “Target Fund”) into the Hawaii Municipal Bond Fund (the “Acquiring Fund”), a series of Bishop Street Funds (the “Acquiring Trust”). Upon the completion of the Reorganization, each shareholder of the Target Fund will receive Class A Shares of the Acquiring Fund, as discussed in greater detail in the enclosed Combined Proxy Statement/Prospectus. The other members of the Board of Directors of Lee Financial Mutual Fund, Inc. and I unanimously recommend that you vote to approve the proposed Reorganization. The proposed Reorganization will enable SURFX shareholders to invest in a larger fund with a similar investment objective and investment strategy. By combining the assets of SURFX and BHIAX, a single fund will be created with a considerably larger asset base than the assets of SURFX alone. This greater asset size should allow shareholders to take advantage of the possible benefits of future economies of scale and spread fixed costs across a larger asset base. The Reorganization will be structured to be tax free to SURFX shareholders. We urge you to vote as soon as possible. Your vote is important to us regardless of the number of shares that you own. Please carefully review the enclosed materials and cast your vote on the Proxy Card(s) or by telephone or via the Internet. The formal Notice of Special Meeting, a Combined Proxy Statement/Prospectus, and a Proxy Card are enclosed. We look forward to your attendance at the Special Meeting or receiving your vote so that your shares may be voted at the Special Meeting. We would still love to have you attend the special shareholders meeting even though you may have already voted. We are concerned about your health and safety and intend to monitor the recommendations of public health officials and governmental restrictions due to the public health impact of the coronavirus pandemic (COVID-19). If we decide to hold the Special Meeting at a different time, in a different location, or partially or entirely by means of remote communication (i.e., a virtual meeting), we will announce any such updates by means of a press release, which will be posted on www.LeeHawaii.com. We encourage you to check the website prior to the Special Meeting if you plan to attend the Special Meeting. An announcement of any change will also be filed with the Securities and Exchange Commission via its EDGAR system. Please call us at 808-988-8088, or toll-free at 1-800-354-9654 if you plan to attend the meeting or if you have any questions about the Reorganization. /s/ Terrence K.H. Lee Terrence K.H. Lee CEO ii Lee Financial Mutual Fund, Inc. 3113 Olu Street Honolulu, Hawaii 96816 NOTICE OF SPECIAL MEETING OF SHAREHOLDERS HAWAII MUNICIPAL FUND To Be Held on [November 28], 2023 A special meeting (the “Meeting”) of the shareholders of the Hawaii Municipal Fund (the “Target Fund”), a series of Lee Financial Mutual Fund, Inc. (the “Target Company”) will be held on [November 28], 2023 at 10:30 a.m. (HST) at Japanese Cultural Center, 2454 S. Beretania St., Honolulu, Hawaii 96826 to vote on the following proposal (the “Proposal”), and any other matters that may properly come before the Meeting or any adjournment or postponement thereof. Proposal: Hawaii Municipal Fund – Hawaii Municipal Bond Fund Reorganization To approve an Agreement and Plan of Reorganization between the Target Company, on behalf of the Target Fund, and Bishop Street Funds (the “Acquiring Trust”), on behalf of the Hawaii Municipal Bond Fund (the “Acquiring Fund”), providing for: (a) the acquisition of all of the assets of the Target Fund by the Acquiring Fund in exchange for the assumption by the Acquiring Fund of all of the liabilities of the Target Fund and Class A Shares of the Acquiring Fund; (b) the pro rata distribution of such shares to the shareholders of Investor Class Shares of the Target Fund; and (c) the liquidation and termination of the Target Fund. Target Fund shareholders of record as of the close of business on October 16, 2023 (the “Record Date”) are entitled to notice of, and to vote at, the Meeting or any adjournment or postponement of the Meeting. If sufficient votes to approve the Proposal are not received by the date of the Meeting or any reconvened Meeting following an adjournment, the Meeting or reconvened Meeting may be adjourned or postponed to permit further solicitations of proxies. Please vote your shares by completing the enclosed proxy card and returning it in the enclosed postage-paid return envelope or by voting by telephone or via the internet using the instructions on the proxy card. If you are voting by mail, please sign and promptly return the proxy card in the postage-paid return envelope regardless of the number of shares owned. Proxy card instructions may be revoked at any time before they are exercised by submitting a written notice of revocation or a subsequently executed proxy card or by participating in the virtual Meeting and recasting your vote. The Board of Directors of the Target Company (the “Target Company Board”) requests that you vote your shares by completing the enclosed proxy card and returning it in the enclosed postage-paid return envelope or by voting by telephone or via the internet using the instructions on the proxy card. iii The Target Company Board recommends that shareholders of the Target Fund vote “FOR” the Proposal as described in the accompanying Proxy Statement/Prospectus. By order of the Board of Directors, /s/ Terrence K. H. Lee Terrence K. H. Lee Chief Executive Officer [October 13], 2023 iv SUBJECT TO COMPLETION THE INFORMATION IN THIS PROXY STATEMENT/PROSPECTUS IS NOT COMPLETE AND MAY BE CHANGED. WE MAY NOT SELL THESE SECURITIES UNTIL THE REGISTRATION STATEMENT FILED WITH THE U.S. SECURITIES AND EXCHANGE COMMISSION IS EFFECTIVE. THIS PROXY STATEMENT/PROSPECTUS IS NOT AN OFFER TO SELL THESE SECURITIES AND IS NOT SOLICITING AN OFFER TO BUY THESE SECURITIES IN ANY JURISDICTION WHERE THE OFFER OR SALE IS NOT PERMITTED. Hawaii Municipal Fund a series of Lee Financial Mutual Fund, Inc. 3113 Olu Street Honolulu, Hawaii 96816 808-988-8088 Hawaii Municipal Bond Fund a series of Bishop Street Funds One Freedom Valley Drive Oaks, Pennsylvania 19456 888-462-5386 PROXY STATEMENT/PROSPECTUS [October 13], 2023 Introduction This Proxy Statement/Prospectus contains information that shareholders of the Hawaii Municipal Fund (the “Target Fund”), a series of Lee Financial Mutual Fund, Inc. (the “Target Company”), should know before voting on the proposed reorganization that is described herein (the “Reorganization”), and should be retained for future reference. This document is both the proxy statement of the Target Fund and also a prospectus for the Hawaii Municipal Bond Fund (the “Acquiring Fund”), a series of Bishop Street Funds (the “Acquiring Trust”). The Target Fund and the Acquiring Fund (each a “Fund” and together, the “Funds”) are each series of registered open-end management investment companies. The Reorganization will be effected pursuant to an Agreement and Plan of Reorganization (the “Agreement”). Under the Agreement, the Target Fund will transfer all of its assets to the Acquiring Fund in exchange for (i) the assumption by the Acquiring Fund of all of the liabilities of the Target Fund and (ii) Class A Shares of the Acquiring Fund: A special meeting of the shareholders of the Target Fund (the “Meeting”) will be held on [November 28], 2023 at 10:30 a.m. (HST) at Japanese Cultural Center, 2454 S. Beretania St., Honolulu, Hawaii 96826. At the Meeting, shareholders of the Target Fund will be asked to consider the following proposal (the “Proposal”), and any other matters that may properly come before the Meeting or any adjournment or postponement thereof. Proposal: Hawaii Municipal Fund – Hawaii Municipal Bond Fund Reorganization To approve an Agreement and Plan of Reorganization between the Target Company, on behalf of the Target Fund, and the Acquiring Trust, on behalf of the Acquiring Fund, providing for: (a) the acquisition of all of the assets of the Target Fund by the Acquiring Fund in exchange for the assumption by the Acquiring Fund of all of the liabilities of the Target Fund and Class A Shares of the Acquiring Fund; (b) the pro rata distribution of such shares to the shareholders of Investor Class Shares of the Target Fund; and (c) the liquidation and termination of the Target Fund. The Reorganization is anticipated to be a tax-free transaction for federal income tax purposes. For more detailed information about the federal income tax consequences of the Reorganization, please refer to the section titled “Federal Income Tax Considerations” below. v The Board of Directors of the Target Company (the “Target Company Board”) has fixed the close of business on October 16, 2023 as the record date (“Record Date”) for the determination of Target Fund shareholders entitled to notice of and to vote at the Meeting and at any adjournment or postponement thereof. Shareholders of the Target Fund on the Record Date will be entitled to one vote for each share of the Target Fund held (and a proportionate fractional vote for each fractional share). This Proxy Statement/Prospectus, the enclosed Notice of Special Meeting of Shareholders, and the enclosed proxy card will be mailed on or about on October 26, 2023 to all shareholders eligible to vote on the Proposal. The Target Company Board has approved the Agreement and has determined that the Reorganization is in the best interests of the Target Fund and its shareholders. Accordingly, the Target Company Board recommends that shareholders vote “ FOR ” the Proposal. If shareholders of the Target Fund do not approve the Reorganization, the Target Company Board will consider what further action is appropriate for the Target Fund, which could include abandoning the Reorganization, liquidation (which would be a fully taxable redemption to shareholders), 
hareholder reports. If you invest directly with a Fund, you can call 877-DLINE11 (877-354-6311) or send an email request to fundinfo@doubleline.com to let the Fund know you wish to continue receiving paper copies of your shareholder reports. Your election to receive reports in paper will apply to all funds held in your account if you invest through your financial intermediary or all Funds held with the fund complex if you invest directly with a Fund. Table of Contents TABLE OF CONTENTS The Trust and the Funds 1 DoubleLine Total Return Bond Fund 2 DoubleLine Core Fixed Income Fund 16 DoubleLine Low Duration Bond Fund 32 DoubleLine Flexible Income Fund 49 DoubleLine Shiller Enhanced CAPE ® 69 Summary of Other Important Information Regarding Fund Shares 91 Purchase and Sale of Shares 91 Tax Information 91 Payments to Broker-Dealers and Other Financial Intermediaries 91 Additional Information About Principal Investment Strategies and Principal Risks 92 Investment Objectives 92 Principal Investment Strategies 92 Other Information Regarding Principal Investment Strategies 116 Principal Risks 117 Temporary Defensive Strategies 171 Portfolio Holdings Information 172 Management of the Funds 173 Investment Advisers 173 Portfolio Managers 173 Advisory Agreements 175 Additional Information 177 Share Class Features 178 Class R6 Shares 178 Expenses 180 How to Buy Shares 180 General Information 180 Other Payments to Financial Intermediaries 181 Payments to Financial Intermediaries for Shareholder Services 183 Calculation of NAV 183 Verification of Identity 186 Minimum Investments for Shares 186 New Account Application 187 Purchase by Mail 187 Purchase by Telephone 188 Purchase by Internet 189 Purchase by Wire 189 Automatic Investment Plan 190 Purchases Through an Authorized Third Party 191 How to Redeem Shares 191 General Information 191 Redemptions by Mail 193 Signature Guarantees 195 Redemptions by Telephone 195 Redemptions by Internet 196 Systematic Withdrawal Plan 197 Redemptions Through Your Financial Intermediary or Other Authorized Third Party 198 Other Account Policies 198 Trading Limits 198 Trading Limit Policies 199 Exchange Privilege 201 Conversion of Shares Between Classes 201 Notice Regarding Delivery of Fund Documents 201 Lost Shareholders, Inactive Accounts and Unclaimed Property 201 Cost Basis Reporting 202 Distributions 203 Taxes 203 Index Descriptions 208 Disclaimers 210 Financial Highlights 212 PRIVACY POLICY 218 Table of Contents The Trust and the Funds This Prospectus tells you about five separate DoubleLine mutual funds. Each Fund is a series of DoubleLine Funds Trust, a Delaware statutory trust (the “Trust”). The Funds offer other share classes that have different fees and expenses, which are described in the prospectus for those share classes. Most of the Funds provide investment programs investing principally in debt obligations, and are referred to in this Prospectus as “ fixed income funds .” The remaining Fund is the DoubleLine Shiller Enhanced CAPE ® . A Note Regarding Debt Obligations Generally, this Prospectus uses the terms debt security, debt obligation, bond, fixed-income instrument, fixed-income obligation and fixed-income security interchangeably. These terms should be considered to include any evidence of indebtedness, including, by way of example, a security or instrument having one or more of the following characteristics: a security or instrument issued at a discount to its face value, a security or instrument that pays interest at a fixed, floating, or variable rate, or a security or instrument with a stated principal amount that requires repayment of some or all of that principal amount to the holder of the security. These terms are interpreted broadly to include any instrument or security evidencing what is commonly referred to as an IOU rather than evidencing the corporate ownership of equity unless that equity represents an indirect or derivative interest in one or more debt securities. For this purpose, the terms also include instruments that are intended to provide one or more of the characteristics of a direct investment in one or more debt securities. This Prospectus also uses the term hybrid security to refer to a security that DoubleLine Capital LP or a third party creates by combining an income-producing debt security and the right to receive payment based on the change in the price of an equity security. Table of Contents Fund Summary DoubleLine Total Return Bond Fund Investment Objective The Fund’s investment objective is to seek to maximize total return. Fees and Expenses of the Fund This table describes the fees and expenses you may pay if you buy and hold shares of the Fund. If you purchase Class R6 shares through a broker or other financial intermediary acting as an agent on behalf of its customers, that financial intermediary may charge you a commission. Such commissions, if any, are not charged by the Fund and are not reflected in the fee table or expense example below. Shareholder Fees (fees paid directly from your investment) Share Class Class R6 Maximum Sales Charge (Load) Imposed on Purchases (as a percentage of the offering price) None Maximum Deferred Sales Charge (Load) (as a percentage of the original purchase price) None Redemption Fee (as a percentage of shares redeemed within 90 days of purchase) None Fee for Redemption by Wire $15 Annual Fund Operating Expenses (expenses that you pay each year as a percentage of the value of your investment) Share Class Class R6 Management Fees 0.40% Distribution and/or Service (12b-1) Fees None Other Expenses 1 0.03% Total Annual Fund Operating Expenses 0.43% 1 “Other Expenses” are historical expenses incurred by Class I shares less those expenses borne by Class I shares that Class R6 shares are not expected to bear; actual expenses will vary. -2- Table of Contents Example This example is intended to help you compare the cost of investing in the Fund with the cost of investing in other mutual funds. This example assumes that you invest $10,000 in Class R6 shares of the Fund for the time periods indicated and then redeem all your shares at the end of those periods. The example also assumes that your investment has a 5% return each year and that the Fund’s operating expenses remain the same. Although your actual costs may be higher or lower, based on these assumptions, your costs would be: Class R6 1 Year $44 3 Years $138 5 Years $241 10 Years $542 Portfolio Turnover The Fund incurs transaction costs when it buys and sells securities (or “turns over” its portfolio). A higher portfolio turnover rate may indicate higher transaction costs and may result in higher taxes when Fund shares are held in a taxable account. These costs, which are not reflected in annual fund operating expenses or in the example, affect the Fund’s performance. During the most recent fiscal year, the Fund’s portfolio turnover rate was 28% of the average value of its portfolio. Principal Investment Strategies Under normal circumstances, the Fund intends to invest more than 50% of its net assets in residential and commercial mortgage-backed securities. These investments may include mortgage-backed securities of any maturity or type, including those guaranteed by, or secured by collateral that is guaranteed by, the United States Government, its agencies, instrumentalities or sponsored corporations, and privately issued mortgage-backed securities rated at the time of investment Aa3 or higher by Moody’s Investors Service, Inc. (“ Moody’s ”) or AA- or higher by S&P Global Ratings (“ S&P ”) or the equivalent by any other nationally recognized statistical rating organization or unrated securities that are determined by DoubleLine Capital LP (an “ Adviser ” or “ DoubleLine Capital ”) to be of -3- Table of Contents comparable quality. These investments also include, among others, government mortgage pass-through securities, collateralized mortgage obligations (“ CMOs ”), multiclass pass-through securities, private mortgage pass-through securities, stripped mortgage securities (interest-only and principal-only securities) and inverse floaters. Since the Fund’s inception, the Fund has historically invested substantially all of its assets in mortgage-backed securities; short term investments, such as notes issued by U.S. Government agencies and shares of money market funds; and, from time to time, other asset-backed obligations, collateralized loan obligations (“ CLOs ”), and obligations of the U.S. Government and its agencies, instrumentalities and sponsored corporations. The Fund may invest in other instruments as part of its principal investment strategies, but it has not historically done so and there can be no assurance it will do so in the future. In managing the Fund’s portfolio, the portfolio managers typically use a controlled risk approach. The techniques of this approach attempt to control the principal risk components of the fixed income markets and may include, among other factors, consideration of the Adviser’s view of the following: the potential relative performance of various market sectors, security selection available within a given sector, the risk/reward equation for different asset classes, liquidity conditions in various market sectors, the shape of the yield curve and projections for changes in the yield curve, potential fluctuations in the overall level of interest rates, and current fiscal policy. Under normal circumstances, the Fund intends to invest at least 80% of its net assets (plus the amount of borrowings for investment purposes) in bonds. “Bonds” include bonds, debt securities, and other fixed income instruments issued by governmental or private-sector entities. If the Fund changes this investment policy, it will notify shareholders at least 60 days in advance of the change. The Fund may invest in bonds of any credit quality, including those that are at the time of investment unrated or rated BB+ or lower by S&P or Ba1 or lower by Moody’s or the equivalent by any other nationally recognized statistical rating organization. Bonds and fixed income instruments rated below investment grade, or such instruments that are unrated and determined by the Adviser to be of comparable quality, are high yield, high risk bonds, commonly known as “junk bonds”. The Fund may invest up to 33 1/3% of its net assets in junk bonds, bank loans and assignments rated below investment grade or unrated but determined by the Adviser to be of comparable quality, and credit default swaps of companies in the high yield -4- Table of Contents universe. The Adviser does not consider the term “junk bonds” to include any mortgage-backed securities or any other asset-backed securities, regardless of their credit rating or credit quality. The Fund may invest a portion of its assets in inverse floater securities and interest-only and principal-only securities. The Adviser monitors the duration of the Fund’s portfolio securities to seek to assess and, in its discretion, adjust the Fund’s exposure to interest rate risk. In managing the Fund’s investments, under normal market conditions, the portfolio managers intend to seek to construct an investment portfolio with a dollar-weighted average effective duration of no less than one year and no more than eight years. Duration is a measure of the expected life of a fixed income instrument that is used to determine the sensitivity of a security’s price to changes in interest rates. Effective duration is a measure of the Fund’s portfolio duration adjusted for the anticipated effect of interest rate changes on bond and mortgage pre-payment rates as determined by the Adviser. The effective duration of the Fund’s investment portfolio may vary materially from its target range, from time to time, and there is no assurance that the effective duration of the Fund’s investment portfolio will always be within its target range. Portfolio securities may be sold at any time. By way of example, sales
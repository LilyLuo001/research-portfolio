      497 1 arrowrescapmgmt497.htm 497 Arrow Reserve Capital Management ETF ARCM PROSPECTUS June 1, 2021 1-877-ARROW-FD (1-877-277-6933) www.ArrowFunds.com This Prospectus provides important information about the Arrow Reserve Capital Management ETF (the “Fund”) that you should know before investing. Please read it carefully and keep it for future reference. Neither the Securities and Exchange Commission nor the Commodity Futures Trading Commission has approved or disapproved of these securities or passed upon the accuracy or adequacy of this Prospectus. Any representation to the contrary is a criminal offense. Shares of the Fund are listed and traded on the Cboe BZX Exchange, Inc. (the “Exchange”). Table of Contents Fund Summary 1 Investment Objective 1 Fees and Expenses of the Fund 1 Principal Investment Strategies of the Fund 1 Principal Risks of Investing in the Fund 2 Fund Performance 4 Management of the Fund 4 Purchase and Sale of Fund Shares 5 Tax Information 5 Payments to Broker-Dealers and Other Financial Intermediaries 5 Additional Information About the Principal Investment Strategies and Risks 6 Investment Objective 6 Principal Investment Strategies 6 Principal Investment Risks 6 Portfolio Holdings Information 9 Cybersecurity 9 Management of the Fund 9 Investment Advisor 9 Investment Sub-Advisor 10 Portfolio Managers 10 Net Asset Value 11 Premium/Discount Information 12 How to Buy and Sell Shares 12 Share Trading Prices 13 Book Entry 13 Frequent Purchases and Redemptions of Shares 13 Distribution and Service Plan 13 Dividends, Other Distributions and Taxes 13 Fund Service Providers 15 Other Information 15 Investments by Investment Companies 15 Continuous Offering 15 Householding 16 Financial Highlights 17 Privacy Notice 18 Fund Summary Investment Objective The Fund seeks to preserve capital while maximizing current income. Fees and Expenses of the Fund The table below describes the fees and expenses you may pay if you buy, hold, and sell shares of the Fund. Investors may pay other fees, such as brokerage commissions and other fees to financial intermediaries, on their purchases and sales of shares in the secondary market, which are not reflected in the table or the example below. Shareholder Fees (fees paid directly from your investment) None Annual Fund Operating Expenses (expenses that you pay each year as a percentage of the value of your investment) Management Fees 0.30% Distribution and/or Service (12b-1) Fees 0.00% Other Expenses 0.25% Total Annual Fund Operating Expenses 0.55% Fee Waiver and/or Expense Reimbursement (1) (0.05)% Total Annual Fund Operating Expenses After Fee Waiver 0.50% (1) Arrow Investment Advisors, LLC (the “Advisor”) has contractually agreed to waive its fees and/or reimburse expenses of the Fund until May 31, 2022 to ensure that the Fund’s Total Annual Fund Operating Expenses After Fee Waiver and/or Expense Reimbursement (exclusive of any front-end or contingent deferred sales loads, taxes, leverage interest, brokerage commissions, expenses incurred in connection with any merger or reorganization, dividend expense on securities sold short, underlying fund fees and expenses, foreign custody transaction costs and foreign account set up fees, and extraordinary expenses, such as litigation) will not exceed 0.50% of average daily net assets . These fee waivers and expense reimbursements are subject to possible recoupment from the Fund in future years on a rolling three-year basis (within the three years after the fees have been waived or reimbursed) if such recoupment can be achieved within the foregoing expense limits. This agreement may be terminated by the Fund’s Board of Trustees on 60 days’ written notice to the Advisor. Example This example is intended to help you compare the cost of investing in the Fund with the cost of investing in other funds. This example assumes that you invest $10,000 in the Fund for the time periods indicated and then redeem all of your shares at the end of those periods. This example also assumes that your investment has a 5% return each year and that the Fund’s operating expenses remain the same. Although your actual costs may be higher or lower, based on these assumptions, your costs would be: 1 YEAR 3 YEARS 5 YEARS 10 YEARS $51 $171 $302 $684 Portfolio Turnover The Fund pays transaction costs, such as commissions, when it buys and sells securities (or “turns over” its portfolio). A higher portfolio turnover rate may indicate higher transaction costs and may result in higher taxes when Fund shares are held in a taxable account. These costs, which are not reflected in Annual Fund Operating Expenses or in the Example, affect the Fund’s performance. During the most recent fiscal year, the Fund’s portfolio turnover rate was 118% of the average value of its portfolio. Principal Investment Strategies of the Fund The Fund invests in a variety of domestic fixed income securities. The Fund invests in fixed income instruments with a dollar-weighted average effective maturity of 0 to 2 years issued by U.S. Dollar-denominated issuers, including mortgage- or asset-backed securities, rated Baa- or higher by Moody’s Investors Service, Inc.(“Moody’s”), or equivalently rated by Standard & Poor’s Ratings Services (“S&P”) or Fitch, Inc.(“Fitch”), or, if unrated, determined by the Fund’s sub-advisor to be of comparable quality. The Fund may also invest in interest rate futures and forwards. The Fund’s investments in interest rate futures and forward contracts attempt to gain exposure to a particular group of securities or asset class without actually purchasing those securities or investments, or to hedge interest rate risk. In selecting investments for purchase and sale, the Fund’s Sub-Advisor, Halyard Asset Management LLC, (“Halyard” or the “Sub-Advisor”), attempts to maximize income by identifying securities that offer an acceptable yield for a given level of credit risk and maturity. The Sub-Advisor attempts to identify short duration securities that offer a comparably better return potential and yield than money market funds. The Fund is not a money market fund and is more risky than a money market fund. The Sub-Advisor may retain securities if the rating of the security falls below investment grade (commonly referred to as a “junk bond”), and the Sub-Advisor deems retention of the security to be in the best interests of the Fund. The average effective duration of the Fund will vary based on the Sub-Advisor’s forecast for interest rates and will normally not exceed 18 months. Duration is a measure used to determine the sensitivity of a security’s price to changes in interest rates. The longer a security’s duration, the more sensitive it will be to changes in interest rates. The dollar-weighted average portfolio maturity of the Fund is normally not expected to exceed three years. 1 In managing the Fund's portfolio, the Sub-Advisor may engage in frequent trading of the Fund's portfolio securities, resulting in a higher portfolio turnover rate. Principal Risks of Investing in the Fund As with all funds, there is the risk that you could lose money through your investment in the Fund. Many factors affect the Fund’s net asset value, price of shares, and performance. The following describes the risks the Fund bears with respect to its investments. As with any fund, there is no guarantee that the Fund will achieve its objective. The following risks apply to the Fund’s investments. · Asset-Backed Securities Risk: When the Fund invests in asset-backed securities and mortgage-backed securities, the Fund is subject to the risk that, if the underlying borrowers fail to pay interest or repay principal, the assets backing these securities may not be sufficient to support payments on the securities. · Counterparty Risk: The Fund’s use of such financial instruments, including forward contracts, exposes the Fund to risks that are different than those associated with direct investments in portfolio securities. For example, if a forward contract counterparty defaults on its payment obligations to the Fund, this default will cause the value of your investment in the Fund to decrease. · Credit Risk: There is a risk that issuers and counterparties will not make payments on securities and other investments held by the Fund, resulting in losses to the Fund. In addition, the credit quality of securities held by the Fund may be lowered if an issuer’s financial condition changes. Lower credit quality may lead to greater volatility in the price of a security and in shares of the Fund. Lower credit quality also may affect liquidity and make it difficult for the Fund to sell the security. · Derivatives Risk: The use of derivative instruments (such as interest rate futures or forward contracts) involves risks different from, or possibly greater than, the risks associated with investing directly in securities and other traditional investments. These risks include (i) the risk that the counterparty to a derivative transaction may not fulfill its contractual obligations; (ii) risk of mispricing or improper valuation; and (iii) the risk that changes in the value of the derivative may not correlate perfectly with the underlying asset. Derivative prices are highly volatile and may fluctuate substantially during a short period of time. Such prices are influenced by numerous factors that affect the markets, including, but not limited to: changing supply and demand relationships; government programs and policies; national and international political and economic events, changes in interest rates, inflation and deflation and changes in supply and demand relationships. Trading derivative instruments involves risks different from, or possibly greater than, the risks associated with investing directly in securities. · ETF Structure Risks : The Fund is structured as an exchange-traded fund (“ETF”) and as a result is subject to the special risks, including: o Not Individually Redeemable : Shares of the Fund (“Shares”) are not individually redeemable and may be redeemed by the Fund at NAV only in large blocks known as “Creation Units.” There can be no assurance that there will be sufficient liquidity in Shares in the secondary market to permit assembly of a Creation Unit. In addition, investors may incur brokerage and other costs in connection with assembling a Creation Unit. o Trading Issues : Trading in Shares on the Exchange may be halted due to market conditions or for reasons that, in the view of the Exchange, make trading in Shares inadvisable, such as extraordinary market volatility. There can be no assurance that Shares will continue to meet the listing requirements of the Exchange, which may result in the Shares being delisted. An active trading market for the Shares may not be developed or maintained. If the securities in the Fund’s portfolio are traded outside a collateralized settlement system, the number of financial institutions that can act as authorized participants (“Authorized Participants”) that can post collateral on an agency basis is limited, which may limit the market for the Shares. o Market Price Variance Risk : The market prices of Shares will fluctuate in response to changes in NAV and supply and demand for Shares and will include a “bid-ask spread” charged by the exchange specialists, market makers or other participants that trade the particular security. There may be times when the market price and the NAV vary significantly. This means that Shares may trade at a discount to NAV. § In times of market stress, market makers may step away from their role market making in shares of ETFs and in executing trades, which can lead to differences between the market value of Shares and the Fund’s NAV. § The market price for the Shares may deviate from the Fund’s NAV, particularly during times of market stress, with the result that investors may pay significantly more or significantly less for Shares than the Fund’s NAV, which is reflected in the bid and ask price for Shares or in the closing price. 2 § When all or a portion of an ETF’s underlying securities trade in a market that is closed when the market for the Shares is open, there may be changes from the last quote of the closed market and the quote from the Fund’s domestic trading day, which could lead to differences between the market value of the Shares and the Fund’s NAV. § In stressed market conditions, the market for the Shares may become less liquid in response to the deteriorating liquidity of the Fund’s portfolio. This adverse effect on the liquidity of the Shares may, in turn, lead to differences between the market value of the Shares and the Fund’s NAV. · Fixed Income Risk: When the Fund invests in fixed income securities, the value of your investment in the Fund will fluctuate with changes in interest rates. Typically, a rise in interest rates causes a decline in the value of fixed income securities owned by the Fund. On the other hand, if rates fall, the value of the fixed income securities generally increases. Your investment will decline in value if the value of the Fund’s investments decreases. · Futures Risk: The Fund’s use of futures involves risks different from, or possibly greater than, the risks associated with investing directly in securities and other traditional investments. These risks include (i) leverage risk (ii) risk of mispricing or improper valuation; and (iii) the risk that changes in the value of the futures contract may not correlate perfectly with the underlying index. Investments in futures involve leverage, which means a small percentage of assets invested in futures can have a disproportionately large impact on the Fund. This risk could cause the Fund to lose more than the principal amount invested. Futures contracts may become mispriced or improperly valued when compared to the Advisor’s expectation and may not produce the desired investment results. Additionally, changes in the value of futures contracts may not track o

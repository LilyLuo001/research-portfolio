      N-14 1 d811559dn14.htm FIDELITY INVESTMENT TRUST Fidelity Investment Trust Table of Contents As filed with the Securities and Exchange Commission on April 4, 2024 Registration No. 33-___________ (Investment Company Act Registration No. 811-04008) SECURITIES AND EXCHANGE COMMISSION Washington, D.C. 20549 FORM N-14 REGISTRATION STATEMENT UNDER THE SECURITIES ACT OF 1933 Pre-Effective Amendment No. [ ] Post-Effective Amendment No. ____ [ ] Fidelity Investment Trust (Exact Name of Registrant as Specified in Charter) Registrant’s Telephone Number (617) 563-7000 245 Summer St., Boston, MA 02210 (Address Of Principal Executive Offices) Margaret Carey, Secretary and Chief Legal Officer 245 Summer Street Boston, MA 02210 (Name and Address of Agent for Service) Approximate Date of Proposed Public Offering: As soon as practicable after the Registration Statement becomes effective under the Securities Act of 1933. The Registrant has registered an indefinite amount of securities under the Securities Act of 1933 pursuant to Section 24(f) under the Investment Company Act of 1940; accordingly, no fee is payable herewith because of reliance upon Section 24(f). It is proposed that this filing will become effective on May 4, 2024, pursuant to Rule 488. Table of Contents Important Notice Regarding the Availability of Proxy Materials for the Shareholder Meeting to be held on July 16, 2024 The Letter to Shareholders, Notice of Meeting, and Proxy Statement are available at [https://www.proxy-direct.com/Fidelity]. FIDELITY LATIN AMERICA FUND SERIES OF FIDELITY INVESTMENT TRUST 245 Summer Street, Boston, Massachusetts 02210 1-800-544-8544 (Retail classes) 1-877-208-0098 (Advisor classes) NOTICE OF SPECIAL MEETING OF SHAREHOLDERS To the Shareholders of the above fund: NOTICE IS HEREBY GIVEN that a Special Meeting of Shareholders (the Meeting) of Fidelity Latin America Fund (the fund), a series of Fidelity Investment Trust (Investment Trust or the trust) will be held on July 16, 2024, at 8:00 a.m. Eastern Time (ET). Shareholders of other Fidelity funds are receiving a separate proxy statement in connection with Proposal 1. Appendix A contains a list of all funds that are holding a special meeting of shareholders to vote on Proposal 1. The purpose of the Meeting is to consider and act upon the following proposals and to transact such other business as may properly come before the Meeting or any adjournments thereof. 1. To elect a Board of Trustees. 2. To approve an Agreement and Plan of Reorganization providing for the transfer of all of the assets of Fidelity Latin America Fund to Fidelity Emerging Markets Fund in exchange solely for corresponding shares of beneficial interest of Fidelity Emerging Markets Fund and the assumption by Fidelity Emerging Markets Fund of Fidelity Latin America Fund’s liabilities, in complete liquidation of Fidelity Latin America Fund. The Board of Trustees has fixed the close of business on May 20, 2024, as the record date for the determination of the shareholders of the fund entitled to notice of, and to vote at, such Meeting and any adjournments thereof. By order of the Board of Trustees, MARGARET CAREY Secretary and Chief Legal Officer May 20, 2024 Table of Contents Your vote is important – please vote your shares promptly. The Meeting will be held in a virtual format only. Shareholders are invited to attend the Meeting by means of remote audio communication at meetnow.global/MQZDHHG. You will not be able to attend the Meeting in person. You will be required to enter the control number found on your proxy card or voting instruction form you previously received. If you have lost or misplaced your control number, please email Computershare Fund Services, the proxy tabulator for the Meeting (“Computershare”), at shareholdermeetings@computershare.com (include your full name, street address, city, state & zip code) to verify your identity and obtain your control number. If your shares are held through a brokerage account or by a bank or other holder of record you will need to request a legal proxy in order to receive access to the virtual Meeting. To do so, you must submit proof of your proxy power (legal proxy) reflecting your holdings, along with your name and email address, to Computershare. Requests for registration must be labeled as “Legal Proxy” and be received no later than 5:00 p.m. ET on [Thursday, July, 11, 2024]. You will receive a confirmation of your registration by email that includes the control number necessary to access and vote at the Meeting. Requests for registration should be directed to Computershare at shareholdermeetings@computershare.com. Questions from shareholders to be considered at the Meeting must be submitted to Computershare at shareholdermeetings@computershare.com no later than 8:00 a.m. ET on Monday, July 15, 2024. Any shareholder who does not expect to virtually attend the Meeting is urged to vote using the touch-tone telephone or internet voting instructions that follow or by indicating voting instructions on the enclosed proxy card, dating and signing it, and returning it in the envelope provided, which needs no postage if mailed in the United States. In order to avoid unnecessary expense, we ask for your cooperation in responding promptly, no matter how large or small your holdings may be. If you wish to wait until the Meeting to vote your shares, you will need to follow the instructions available on the Meeting’s website during the Meeting in order to do so. INSTRUCTIONS FOR EXECUTING PROXY CARD The following general rules for executing proxy cards may be of assistance to you and help avoid the time and expense involved in validating your vote if you fail to execute your proxy card properly. 1. Individual Accounts: Your name should be signed exactly as it appears in the registration on the proxy card. 2. Joint Accounts: Either party may sign, but the name of the party signing should conform exactly to a name shown in the registration. 3. All other accounts should show the capacity of the individual signing. This can be shown either in the form of the account registration itself or by the individual executing the proxy card. For example: REGISTRATION VALID SIGNATURE A. 1 ) ABC Corp. John Smith, Treasurer 2 ) ABC Corp. John Smith, Treasurer c/o John Smith, Treasurer B. 1 ) ABC Corp. Profit Sharing Plan Ann B. Collins, Trustee 2 ) ABC Trust Ann B. Collins, Trustee 3 ) Ann B. Collins, Trustee Ann B. Collins, Trustee u/t/d 12/28/78 C. 1 ) Anthony B. Craft, Cust. Anthony B. Craft f/b/o Anthony B. Craft, Jr. UGMA INSTRUCTIONS FOR VOTING BY TOUCH-TONE TELEPHONE OR THROUGH THE INTERNET 1. Read the proxy statement, and have your proxy card handy. 2. Call the toll-free number or visit the web site indicated on your proxy card. 3. Enter the number found in the box on the front of your proxy card. 4. Follow the recorded or on-line instructions to cast your vote up until 11:59 p.m. ET on [July 15], 2024. Table of Contents SPECIAL MEETING OF SHAREHOLDERS OF FIDELITY LATIN AMERICA FUND A SERIES OF FIDELITY INVESTMENT TRUST TO BE HELD ON JULY 16, 2024 PROXY STATEMENT AND PROSPECTUS MAY 20, 2024 This combined Proxy Statement and Prospectus (Proxy Statement) is furnished to shareholders of Fidelity Latin America Fund, a series of Fidelity Investment Trust (Investment Trust or the trust), in connection with a solicitation of proxies made by, and on behalf of, Investment Trust’s Board of Trustees to be used at the Special Meeting of Shareholders of Fidelity Latin America Fund and at any adjournments thereof (the Meeting), to be held on July 16, 2024 at 8:00 a.m. Eastern Time (ET) The Board of Trustees and Fidelity Management & Research Company LLC (FMR) have determined that the Meeting will be held in a virtual format only. The Meeting will be accessible solely by means of remote audio communication. Shareholders of other Fidelity funds are receiving a separate proxy statement in connection with Proposal 1. Appendix A contains a list of all funds that are holding a special meeting of shareholders to vote on Proposal 1. The following table summarizes the proposals applicable to the fund: Proposal Number Proposal Description 1. To elect a Board of Trustees. 2. To approve an Agreement and Plan of Reorganization providing for the transfer of all of the assets of Fidelity Latin America Fund to Fidelity Emerging Markets Fund in exchange solely for corresponding shares of beneficial interest of Fidelity Emerging Markets Fund and the assumption by Fidelity Emerging Markets Fund of Fidelity Latin America Fund’s liabilities, in complete liquidation of Fidelity Latin America Fund. If Proposal 2 is approved by the fund’s shareholders and the Reorganization occurs, each shareholder of Fidelity Latin America Fund will become a shareholder of Fidelity Emerging Markets Fund. Fidelity Latin America Fund will transfer all of its assets to Fidelity Emerging Markets Fund in exchange solely for shares of beneficial interest of Fidelity Emerging Markets Fund and the assumption by Fidelity Emerging Markets Fund of Fidelity Latin America Fund’s liabilities in complete liquidation of Fidelity Latin America Fund. The total value of your fund holdings will not change as a result of the Reorganization. The Reorganization is currently scheduled to take place as of the close of business of the New York Stock Exchange (the NYSE) on or about September 13, 2024, or such other time and date as the parties may agree (the Closing Date). If shareholder approval of the Agreement cannot be achieved, the Board of Trustees has approved a plan of liquidation for Fidelity Latin America Fund and the fund would liquidate on or about September 13, 2024. Fidelity Emerging Markets Fund is a diversified series of Fidelity Investment Trust, an open-end management investment company registered with the Securities and Exchange Commission (the SEC). Fidelity Emerging Markets Fund seeks capital appreciation. Fidelity Emerging Markets Fund seeks to achieve its investment objective by normally investing at least 80% of assets in securities of issuers in emerging markets and other investments that are tied economically to emerging markets. Emerging markets include countries that have an emerging stock market as defined by MSCI, countries or markets with low- to middle-income economies as classified by the World Bank, and other countries or markets that the Adviser identifies as having similar emerging markets characteristics. The principal business address of FMR, the fund’s investment adviser, is 245 Summer Street, Boston, Massachusetts 02210 and FIL Investment Advisors (FIA), the fund’s sub-adviser, is Pembroke Hall, 42 Crow Lane, Pembroke HM19, Bermuda. For each fund holding a special meeting of shareholders to vote on Proposal 1, each fund’s sub-adviser(s) and each sub-adviser’s principal business address are included in Appendix B. The principal business address of Fidelity Distributors Corporation (FDC), the fund’s principal underwriter and distribution agent, is 900 Salem Street, Smithfield, Rhode Island 02917. THESE SECURITIES HAVE NOT BEEN APPROVED OR DISAPPROVED BY THE SEC, NOR HAS THE SEC PASSED UPON THE ACCURACY OR ADEQUACY OF THIS PROXY STATEMENT AND PROSPECTUS. ANY REPRESENTATION TO THE CONTRARY IS A CRIMINAL OFFENSE. This solicitation is being made primarily by the mailing of this Proxy Statement and the accompanying proxy cards on or about May 20, 2024. For more detailed information about the solicitation with respect to each Proposal, please refer to the “Other Information About the Fund - Voting Information” section of this Proxy Statement. The Proxy Statement sets forth concisely the information about the Proposals that you should know before voting on the Proposals. Please read it carefully and keep it for future reference. Solely for purposes of Proposal 2, the following documents have been filed with the SEC and are incorporated into this Proxy Statement by reference, which means they are part of this Proxy Statement for legal purposes: (i) the Statement of Additional Information dated May 20, 2024, relating to this Proxy Statement; 1 Table of Contents (ii) the Prospectus for Fidelity Emerging Markets Fund relating to Class A, Class M, Class C, Class I, and Class Z shares, dated December 30, 2023, as supplemented March 1, 2024; (iii) the Prospectus for Fidelity Emerging Markets Fund and Fidelity Latin America Fund relating to retail class shares of each fund, dated December 30, 2023, as supplemented March 1, 2024; (iv) the Prospectus for Fidelity Latin America relating to Class A, Class M, Class C, Class I, and Class Z shares Fund, dated December 30, 2023, as supplemented March 1, 2024. (v) the Statement of Additional Information for Fidelity Emerging Markets Fund and Fidelity Latin America Fund relating to Class A, Class M, Class C, Class I, and Class Z shares, dated December 30, 2023, as supplemented March 1, 2024; (vi) the Statement of Additional Information for Fidelity Emerging Markets Fund and Fidelity Latin America Fund, relating to retail class shares of each fund, dated December 30, 2023, as supplemented March 1, 2024; (vii) the Annual Report for Fidelity Emerging Markets Fund for the fiscal year ended October 31, 2023; and (viii) the Annual Report for Fidelity Latin America Fund for the fiscal year ended October 31, 2023. An investment in the fund is not a deposit of a bank and is not insured or guaranteed by the Federal Deposit Insurance Corporation or any other government agency. Although the fund seeks to preserve the value of your investment at $1.00 per share, it is possible to lose money by investing in the fund. For a free copy of the fund’s current Prospectus, Statement of Additional Information or annual and/or semiannual reports, call Fidelity at 1-800-544-8544 (Retail class) or 1-877-208-0098 (Advisor classes), visit Fidelity’s web sites at www.fidelity.com, institutional.fidelity.com, or www.401k.com (plan accounts), or write

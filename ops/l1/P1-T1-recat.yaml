n 53202 (the “Meeting”). At the Meeting, you will be asked to approve an Agreement and Plan of Reorganization (the “Agreement”), by and among (i) the Target Trust, on behalf of its series, the Target Fund, (ii) The Advisors’ Inner Circle Fund III (the “Acquiring Trust”) on behalf of its newly created series, the Ecofin Global Renewables Infrastructure Fund (the “Acquiring Fund”) and (iii) RWC Asset Management LLP (“the Acquiring Fund Adviser”), investment adviser of the Acquiring Fund, which contemplates the reorganization of the Target Fund into the Acquiring Fund as set forth in the table below (the “Reorganization”). Target Fund shareholders of record as of the close of business on [July 29], 2024 are entitled to vote at the meeting and at any adjournment or postponement of the meeting. If you own shares of the Target Fund listed below Share Class You will receive shares of the Acquiring Fund listed below Share Class Ecofin Global Renewables Infrastructure Fund, a series of the Target Trust A Class Ecofin Global Renewables Infrastructure Fund, a series of the Acquiring Trust A Class Institutional Class Institutional Class The attached combined Proxy Statement/Prospectus gives you information relating to the Reorganization. The Board of Trustees (the “Board”) of the Target Trust recommends that shareholders of the Target Fund approve the Reorganization. If shareholders of the Target Fund approve its Reorganization, and all other closing conditions are met, the Reorganization is expected to take effect on or about [September 30], 2024. Upon the completion of the Reorganization, each shareholder of the Target Fund will receive shares of the corresponding class of shares of the Acquiring Fund. We encourage you to support the Board’s recommendation to approve the proposal. Before you vote, however, please read the full text of the combined Proxy Statement/Prospectus. Please vote your shares by completing the enclosed proxy card and returning it in the enclosed postage-paid return envelope or by voting by telephone or via the internet using the instructions on the proxy card. If you are voting by mail, please sign and promptly return the proxy card in the postage-paid return envelope regardless of the number of shares owned. Proxy card instructions may be revoked at any time before they are exercised by submitting a written notice of revocation or a subsequently executed proxy card or by participating in the Meeting and recasting your vote. Your vote is important regardless of the number of shares you own. To assure your representation at the Meeting, please follow the instructions on the enclosed proxy ballot whether or not you expect to be present at the Meeting. If you attend the Meeting, you may revoke your proxy and vote your shares in person. Should you have any questions, please feel free to call the Target Fund (toll-free) at 855-TCA-Fund (855-822-3863). Thank you for taking the time to consider this important proposal and for your continuing investment. /s/ Brian R. Wiedmeyer Brian R. Wiedmeyer President and Principal Executive Officer ii Managed Portfolio Series 615 East Michigan Street Milwaukee, Wisconsin 53202 NOTICE OF SPECIAL MEETING OF SHAREHOLDERS Ecofin Global Renewables Infrastructure Fund To Be Held on [September 23], 2024 A special meeting (the “Meeting”) of the shareholders of the Ecofin Global Renewables Infrastructure Fund (the “Target Fund”), a series of Managed Portfolio Series (the “Target Trust”) will be held on [September 23, 2024] at [10:00 a.m.] [Central Time] at the offices of the Target Fund, 615 East Michigan Street, Milwaukee, Wisconsin 53202 to vote on the following proposal (the “Proposal”), and any other matters that may properly come before the Meeting or any adjournment or postponement thereof. Proposal: Ecofin Global Renewables Infrastructure Fund Reorganization To approve an Agreement and Plan of Reorganization providing for: (a) the acquisition of all of the assets and assumption of all 
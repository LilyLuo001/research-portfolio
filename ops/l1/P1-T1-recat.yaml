ures and Policies Dividends and Capital Gain Distributions Tax Consequences Fund Services Fund Management Fund Distribution Fund Summary Fund/ Class : Fidelity® Sustainability U.S. Equity Fund/ Fidelity® Sustainability U.S. Equity Fund Investment Objective The fund seeks long-term growth of capital. Fee Table The following table describes the fees and expenses that may be incurred when you buy and hold shares of the fund. Shareholder fees (fees paid directly from your investment) None Annual Operating Expenses (expenses that you pay each year as a % of the value of your investment) Management fee (fluctuates based on the fund's performance relative to a securities market index) 0.53 % Distribution and/or Service (12b-1) fees None Other expenses (a) 1.35 % Total annual operating expenses 1.88 % Fee waiver and/or expense reimbursement (b) 0.98 % Total annual operating expenses after fee waiver and/or expense reimbursement 0.90 % (a) Based on estimated amounts for the current fiscal year. (b) Fidelity Management & Research Company LLC (FMR) has contractually agreed to reimburse the class of shares of the fund to the extent that total operating expenses (excluding interest, certain taxes, fees and expenses of the Independent Trustees, proxy and shareholder meeting expenses, extraordinary expenses, and acquired fund fees and expenses (including fees and expenses associated with a wholly owned subsidiary), if any, as well as non-operating expenses such as brokerage commissions and fees and expenses associated with the fund's securities lending program, if applicable), as a percentage of its average net assets, exceed 0.90% (the Expense Cap). If at any time during the current fiscal year expenses for the class of shares of the fund fall below the Expense Cap, FMR reserves the right to recoup through the end of the fiscal year any expenses that were reimbursed during the current fiscal year up to, but not in excess of, the Expense Cap. This arrangement will remain in effect through September 30, 2022 . FMR may not terminate this arrangement before the expiration date without the approval of the Board of Trustees and may extend it in its discretion after that date. This example helps compare the cost of investing in the fund with the cost of investing in other funds. Let's say, hypothetically, that the annual return for shares of the fund is 5% and that your shareholder fees and the annual operating expenses for shares of the fund are exactly as described in the fee table. This example illustrates the effect of fees and expenses, but is not meant to suggest actual or expected fees and expenses or returns, all of which may vary. For every $10,000 you invested, here's how much you would pay in total expenses if you sell all of your shares at the end of each time period indicated: 1 year $ 92 3 years $ 470 Portfolio Turnover The fund pays transaction costs, such as commissions, when it buys and sells securities (or "turns over" its portfolio). A higher portfolio turnover rate may indicate higher transaction costs and may result in higher taxes when fund shares are held in a taxable account. These costs, which are not reflected in annual operating expenses or in the example, affect the fund's performance. Principal Investment Strategies Normally investing primarily in equity securities. Normally investing at least 80% of assets in equity securities of U.S. companies that Fidelity Management & Research Company LLC (FMR) believes have proven or improving sustainability practices based on an evaluation of such companies' individual environmental, social, and governance (ESG) profile. Using FMR’s proprietary ESG ratings process to evaluate the current state of a company’s sustainability practices using a data-driven framework that includes both proprietary and third-party data, and also provide a qualitative forward looking assessment of a company’s sustainability outlook provided by FMR’s fundamental research analysts and ESG team. FMR’s ESG ratings of companies are derived from multiple factors, including a company’s environmental profile, which may include, but is not limited to, carbon and toxic emissions, water management, waste management, vulnerability to the physical impacts of climate change, and research and investment into products, services, and energies that reduce emissions and/or provide opportunities to achieve a low carbon transition. An assessment of a firm’s social profile includes, but is not limited to, its approach to diversity and inclusion, human capital management, data privacy, product safety and human rights. With respect to governance, the independence and diversity of a company’s board, its compensation practices and board oversight of critical ESG issues are considered as part of the assessment. These factors are weighted based on how material FMR believes each factor is to a company’s financial outlook, and not all factors may be applicable to all companies. Investing in companies that FMR believes deliver tangible environmental or social impact through core business operations. An assessment of the impact characteristics of a company may involve corporate engagement and an analysis of company alignment with the United Nations Sustainable Development Goals using qualitative analysis as well as proprietary or third-party data. For example, companies that provide access to clean water, education, or clean energy through their core business may be considered to deliver tangible impact. Investing in securities of domestic and foreign issuers. In addition to the ESG ratings process, using fundamental analysis of factors such as each issuer's financial condition and industry position, as well as market and economic conditions, to select investments. Principal Investment Risks Stock Market Volatility. Stock markets are volatile and can decline significantly in response to adverse issuer, political, regulatory, market, or economic developments. Different parts of the market, including different market sectors, and different types of securities can react differently to these developments. Sustainability Risk. The fund’s adherence to its ESG ratings process may affect the fund’s exposure to certain companies, sectors, regions, and countries and may affect the fund’s performance depending on whether such investments are in or out of favor. Adhering to the ESG ratings process may also affect the fund’s performance relative to similar funds that do not adhere to such criteria or apply such analysis. The criteria related to the fund’s ESG ratings process may result in the fund forgoing opportunities to buy certain securities when it might otherwise be advantageous to do so, or selling securities for ESG reasons when it might be otherwise disadvantageous for it to do so. There are significant differences in interpretations of what it means for a company to have positive ESG factors. While the Adviser believes its definitions are reasonable, the portfolio decisions it makes may differ with other investors’ or advisers’ views. Foreign Exposure. Foreign markets can be more volatile than the U.S. market due to increased risks of adverse issuer, political, regulatory, market, or economic developments and can perform differently from the U.S. market. Issuer-Specific Changes. The value of an individual security or particular type of security can be more volatile than, and can perform differently from, the market as a whole. Small- and Mid-Cap Investing. The value of securities of small to medium size, less well-known issuers can perform differently from the market as a whole and other types of stocks and can be more volatile than that of larger issuers. Management Risk. The Adviser’s application of the fund’s strategy criteria may not achieve its intended results. The fund could underperform in comparison to other funds with a similar benchmark or similar objectives and investment strategies. An investment in the fund is not a deposit of a bank and is not insured or guaranteed by the Federal Deposit Insurance Corporation or any other government agency. You could lose money by investing in the fund. Performance Performance history will be available for the fund after the fund has been in operation for one calendar year. Investment Adviser FMR (the Adviser) is the fund's manager. Other investment advisers serve as sub-advisers for the fund. Portfolio Manager(s) Nicole Connolly (co-manager) has managed the fund since June 2021. Michael Robertson (co-manager) has managed the fund since June 2021. Purchase and Sale of Shares You may buy or sell shares through a Fidelity ® brokerage or mutual fund account, through a retirement account, or through an investment professional. You may buy or sell shares in various ways: Internet www.fidelity.com Phone Fidelity Automated Service Telephone (FAST ® ) 1-800-544-5555 To reach a Fidelity representative 1-800-544-6666 Mail Additional purchases: Fidelity Investments P.O. Box 770001 Cincinnati, OH 45277-0003 Redemptions: Fidelity Investments P.O. Box 770001 Cincinnati, OH 45277-0035 TDD- Service for the Deaf and Hearing Impaired 1-800-544-0118 The price to buy one share is its net asset value per share (NAV). Shares will be bought at the NAV next calculated after an order is received in proper form. The price to sell one share is its NAV. Shares will be sold at the NAV next calculated after an order is received in proper form. The fund is open for business each day the New York Stock Exchange (NYSE) is open. There is no purchase minimum for fund shares. Tax Information Distributions you receive from the fund are subject to federal income tax and generally will be taxed as ordinary income or capital gains, and may also be subject to state or local taxes, unless you are investing through a tax-advantaged retirement account (in which case you may be taxed later, upon withdrawal of your investment from such account). Payments to Broker-Dealers and Other Financial Intermediaries The fund, 
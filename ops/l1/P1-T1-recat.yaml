      497 1 fp0057726_497.htm Prospectus May 1, 2020 as supplemented May 22, 2020, August 18, 2020, and as amended September 16, 2020 GUINNESS|ATKINSON TM FUNDS ☐ Alternative Energy Fund (GAAEX) ☐ Asia Focus Fund (IASMX) ☐ Asia Pacific Dividend Builder Fund (GAADX) ☐ China & Hong Kong Fund (ICHKX) ☐ Dividend Builder Fund (GAINX) ☐ Global Energy Fund (GAGEX) ☐ Global Innovators Fund Investor Class (IWIRX) Institutional Class (GINNX) ☐ Renminbi Yuan & Bond Fund (GARBX) Beginning on January 1, 2021, as permitted by regulations adopted by the Securities and Exchange Commission, paper copies of the Funds’ annual and semi-annual shareholder reports will no longer be sent by mail, unless you specifically request paper copies of the reports. Instead, the reports will be made available on the Funds’ website (www.gafunds/resource-insight-center/), and you will be notified by mail each time a report is posted and provided with a website link to access the report. If you already elected to receive shareholder reports electronically, you will not be affected by this change and you need not take any action. You may elect to receive shareholder reports and other communications from a fund electronically anytime by contacting your financial intermediary (such as a broker-dealer or bank) or, if you invest directly with the Guinness Atkinson Funds, by calling 800-915-6565. You may elect to receive all future reports in paper free of charge. If you invest through a financial intermediary, such as a broker or bank, you can contact your financial intermediary to request that you continue to receive paper copies of your shareholder reports. Pease note that not all financial intermediaries may offer this service. If you invest directly, you can call 800-915-6565 to request that you continue to receive paper copies of the Guinness Atkinson Funds’ shareholder reports. Your election to receive reports in paper will apply to all funds held in your account. The Securities and Exchange Commission has not approved or disapproved these securities or passed upon the adequacy of this prospectus. Any representation to the contrary is a criminal offense. GUINNESS|ATKINSON TM F U N D S Prospectus May 1, 2020 as supplemented May 22, 2020, August 18, 2020, and as amended September 16, 2020 TABLE OF CONTENTS SUMMARY SECTION This important section summarizes the Funds’ investments, risks, fees and past performance. SUMMARY SECTION 1 Alternative Energy Fund 1 Asia Focus Fund 8 Asia Pacific Dividend Builder Fund 15 China & Hong Kong Fund 22 Dividend Builder Fund 28 Global Energy Fund 34 Global Innovators Fund 40 Renminbi Yuan & Bond Fund 47 MORE ABOUT THE FUNDS’ INVESTMENT STRATEGIES AND RISKS This section provides details about the Funds’ investment strategies and risks. MORE ABOUT THE FUNDS’ INVESTMENT STRATEGIES AND RISKS 53 Alternative Energy Fund 53 Asia Focus Fund 55 Asia Pacific Dividend Builder Fund 57 China & Hong Kong Fund 59 Dividend Builder Fund 61 Global Energy Fund 63 Global Innovators Fund 65 Renminbi Yuan & Bond Fund 67 MANAGEMENT OF THE FUNDS Review this section for information about the organizations and people who oversee the Funds. MANAGEMENT OF THE FUNDS 80 Investment Adviser 80 Fund Expenses 82 Distribution and Shareholder Servicing Plans 83 SHAREHOLDER INFORMATION This section explains how shares are valued and how to purchase and sell shares, and provides information on dividends, distributions and taxes. SHAREHOLDER INFORMATION 84 How to Purchase, Exchange, and Redeem Shares 84 Purchasing 86 Exchanging and Redeeming 88 Additional Exchange/Redemption Information 91 Distributions and Taxes 93 FINANCIAL STATEMENTS Review this section for details on selected financial statements of the Funds. FINANCIAL HIGHLIGHTS 95 Alternative Energy Fund 95 Asia Focus Fund 96 Asia Pacific Dividend Builder Fund 97 China & Hong Kong Fund 98 Dividend Builder Fund 99 Global Energy Fund 100 Global Innovators Fund – Investor Class 101 Global Innovators Fund – Institutional Class 102 Renminbi Yuan & Bond Fund 103 INDEX DESCRIPTIONS INDEX DESCRIPTIONS 104 This section provides a description of each index used as a benchmark to measure a Fund’s performance. SUMMARY SECTION SUMMARY SECTION Alternative Energy Fund Investment Objective The Alternative Energy Fund’s investment objective is long-term capital appreciation. Fees and Expenses of the Fund This table describes the fees and expenses that you may pay if you buy and hold shares of the Alternative Energy Fund: Shareholder Fees (fees paid directly from your investment) None (1) Annual Fund Operating Expenses (expenses that you pay each year as a percentage of the value of your investments) Management Fees: 1.00% Distribution (12b-1) Fees: None Other Expenses: 2.00% Shareholder Servicing Plan Fees 0.19% All Other Expenses 1.81% Total Annual Fund Operating Expenses: 3.00% Fee Waiver/Expense Reimbursement (2) : -1.02 % Total Annual Fund Operating Expenses After Fee Waiver and/or Expense Reimbursement (2) : 1.98% (1) The Fund charges a $15 fee for each payment of redemption proceeds by wire transfer. (2) The Adviser has contractually agreed to reduce its fees and/or pay Fund expenses (excluding Acquired Fund Fees and Expenses, interest, taxes, dividends on short positions and extraordinary expenses) in order to limit the Fund’s Total Annual Operating Expenses to 1.98% through June 30, 2024. To the extent that the Adviser absorbs expenses to satisfy this cap, it may recoup a portion or all of such amounts absorbed at any time within three fiscal years after the fiscal year in which such amounts were absorbed, subject to the expense cap in place at the time recoupment is sought, which cannot exceed the expense cap at the time of the waiver. The expense limitation agreement may be terminated by the Board of the Fund at any time without penalty upon 60 days’ notice. Example This Example is intended to help you compare the cost of investing in the Alternative Energy Fund with the cost of investing in other mutual funds. The Example assumes that you invest $10,000 in the Fund for the time periods indicated and then redeem all of your shares at the end of those periods. The Example also assumes that your investment has a 5% return each year and that the Fund’s operating expenses remain the same. Although your actual costs may be higher or lower, based on these assumptions your costs would be: 1 Year 3 Years 5 Years 10 Years $201 $621 $1,205 $3,013 Portfolio Turnover The Fund pays transaction costs, such as commissions, when it buys and sells securities (or “turns over” its portfolio). A higher portfolio turnover rate may indicate higher transaction costs and may result in higher taxes when Fund shares are held in a taxable account. These costs, which are not reflected in annual fund operating expenses or in the example, affect the Fund’s performance. During the most recent fiscal year, the Fund’s portfolio turnover rate was 43.19% of the average value of its portfolio. Principal Investment Strategies The Alternative Energy Fund invests at least 80% of its net assets (plus any borrowings for investment purposes) in publicly-traded equity securities of alternative energy companies (both U.S. and non-U.S.). The Fund will focus on a particular group of companies that the Adviser considers to be “Sustainable Energy” companies, which are companies that, in the Adviser’s view, provide or support alternative or renewable sources of energy (as compared to more traditional sources of energy that can be environmentally depletive, such as fossil fuels like oil or coal or other hydrocarbon-based fuels), or that produce, generate, transport, deliver, or extend energy applications in a way that makes alternative or renewable energy more efficient or accessible. The Fund will invest in alternative energy companies including companies that generate power through solar, wind, hydroelectric, tidal wave, geothermal, biomass or biofuels and the various companies that provide the equipment and technologies that enable these sources to be tapped, used, stored or transported, including companies that create, facilitate or improve technologies that conserve or enable more efficient use of energy. The Fund will not change this policy unless it gives shareholders at least 60 days’ notice. 1 SUMMARY SECTION In determining whether to buy or sell a portfolio position, the Adviser uses proprietary and independent research and applies traditional fundamental analysis to assess a company’s business and business prospects, market capitalization, the valuation of the company, its dividend history, its ratio of debt to equity, as well as how the company’s business relates to sustainable characteristics like growth or development of alternative or renewable energy. The Adviser conducts an independent assessment of each portfolio company’s business. The Adviser categorizes the universe of companies it deems to be Sustainable Energy companies into four key areas related to the specific aspects of the energy business. Currently, these key areas are: Generation: companies involved in generating sustainable energy, either pure-play companies or companies working to transition from hydrocarbon-based fuels Installation: companies involved in manufacturing equipment for generation and consumption of sustainable energy Displacement: companies involved in the displacement or improved efficient usage of existing hydrocarbon-based energy Electrification: companies effectuating the switching from hydrocarbon-based fuel demand towards electricity or other renewal energy sources, especially for transportation The Fund’s holdings in each key area may vary and the Fund may invest in companies that do not fall within these key areas. Equity securities may include common stocks, preferred stocks, securities convertible into common stocks, rights and warrants. The Fund’s allocations may vary depending on changing market conditions (including but not limited to, liquidity, volatility, and the number of companies meeting selection criteria). The Fund will normally hold around 30 positions of approximately equal weight, but the portfolio may vary over time, and under normal market conditions, the Fund may have as few as 25 holdings, or may hold securities in 75 or more companies. The Adviser will invest the Fund’s assets in securities of all market capitalization companies, but under normal market conditions, the Fund will invest in companies with a minimum market capitalization of $500 milllion. The Fund will invest in companies economically tied to U.S. and to foreign countries, including, potentially, companies domiciled or traded in emerging markets. The Fund’s currency is US Dollars, while some of its investments are denominated in foreign currencies. Additional information on Principal Investment Strategies can be found in the prospectus. Also see Additional Investment Strategies and Risks in the Statement of Additional Information. For temporary defensive purposes, any portion of the Fund’s total assets may be invested in cash and cash equivalents, including money market funds, to respond to adverse market, economic, political or other conditions. While the Fund is applying this temporary defensive strategy, it be unable to achieve its investment objective. The Fund is designed for investors who seek long-term capital appreciation through focused investment in equity securities of companies, wherever located, engaged in alternative or sustainable energy businesses. Principal Risks Your investment in the Fund is subject to the risks common to all mutual funds that invest in equity securities and there can be no assurance that the Fund will achieve its investment objective. Risks associated with investments in the Fund can increase during times of market volatility. Investing in this Fund may be more risky than investing in a fund that only invests in U.S. securities due to increased volatility of foreign markets. You may lose money by investing in this Fund. The principal risks are: Energy Industry Risks. Prices of energy, whether traditional or sustainable, may fluctuate or decline due to many factors, including international political or economic developments, real or perceived, demand for energy and sustainable energy, production and distribution policies of OPEC (Organization of Petroleum Exporting Countries) and other oil-producing countries, energy conservation projects, changes in governmental regulations affecting companies in the energy sector, including alternative or sustainable energy companies, changes in technology affecting alternative or sustainable energy, and changes in tax regulations relating to energy. A decline in energy prices would likely have a negative effect on securities held by the Fund. The Fund’s focus on the energy sector to the exclusion of other sectors exposes the Fund to greater market risk and potential monetary losses than if the Fund’s assets were diversified among various sectors. 2 SUMMARY SECTION Equity Securities Risk. The Fund invests in publicly-traded equity securities, and their value may fluctuate, sometimes rapidly and unpredictably, which means a security may be worth more or less than when it was purchased. These fluctuations can be based on a variety of factors including a company’s financial condition as well as macro-economic factors such as interest rates, inflation rates, global market conditions, and non-economic factors such as market perceptions and social or political events. Market Risk . General market conditions can affect the value of the Fund’s securities holdings. Market risk applies to individual securities, a particular sector or the entire economy. Recently, global financial markets have experienced a period of extreme stress which has resulted in unusual and extreme volatility in the equity markets and in the prices of individual securities. In some cases, the prices of securities issued by individual companies have been ne

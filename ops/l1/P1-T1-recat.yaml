      497 1 d299630d497.htm FORM 497 Form 497 Table of Contents Prospectus (Share Class – Ticker Symbol) iMGP Equity Fund (formerly, PartnerSelect Equity Fund) Institutional Class – MSEFX iMGP International Fund (formerly, PartnerSelect International Fund) Institutional Class – MSILX iMGP Alternative Strategies Fund (formerly, PartnerSelect Alternative Strategies Fund) Institutional Class – MASFX Investor Class – MASNX iMGP High Income Alternatives Fund (formerly, PartnerSelect High Income Alternatives Fund) Institutional Class – MAHIX iMGP SBH Focused Small Value Fund (formerly, PartnerSelect SBH Focused Small Value Fund) Institutional Class – PFSVX iMGP Oldfield International Value Fund (formerly, PartnerSelect Oldfield International Value Fund) Institutional Class – POIVX iMGP Dolan McEniry Corporate Bond Fund (formerly, iM Dolan McEniry Corporate Bond Fund) Institutional Class – IDMIX Investor Class – IDMAX April 29, 2022, as revised June 15, 2022 As with all mutual funds, the U.S. Securities and Exchange Commission (“SEC”) has not approved or disapproved these securities, nor has the SEC judged whether the information in this Prospectus is accurate or adequate. Any representation to the contrary is a criminal offense. Paper copies of the Funds’ annual and semi-annual shareholder reports will no longer be sent by mail, unless you specifically request paper copies of the reports. Instead, the reports will be made available on the Funds’ website (www.imgpfunds.com), and you will be notified by mail each time a report is posted and provided with a website link to access the report. You may elect to receive all future reports in paper free of charge. If you invest through a financial intermediary, you can contact your financial intermediary to request that you receive paper copies of your reports. If you invest directly with the Trust, you can call 1-800-960-0188. Your election to receive reports in paper will apply to all Funds in the Trust or held with your financial intermediary. Table of Contents Table of Contents Summary Section 2 Equity Fund 2 International Fund 7 Alternative Strategies Fund 12 High Income Alternatives Fund 19 SBH Focused Small Value Fund 27 Oldfield International Value Fund 30 Dolan McEniry Corporate Bond Fund 34 Summary of Other Important Information Regarding the Funds 39 Transaction Policies – All Funds 39 Tax Information – All Funds 39 Payments to Broker-Dealers and Other Financial Intermediaries – All Funds 39 Description of Principal Investment Risks 40 Fund Management and Investment Styles 61 The Advisor 61 Equity Fund – Sub-Advisors 65 International Fund – Sub-Advisors 70 Alternative Strategies Fund – Sub-Advisors 73 High Income Alternatives Fund – Sub-Advisors 80 SBH Focused Small Value Fund – Sub-Advisor 85 Oldfield International Value Fund – Sub-Advisor 87 Dolan McEniry Corporate Bond Fund – Sub-Advisor 89 Shareholder Services 91 Index Descriptions 98 Financial Highlights 100 For More Information Back Cover Table of Contents iMGP Equity Fund Summary Section Investment Objective The iMGP Equity Fund (the “Equity Fund”) seeks long-term growth of capital; that is, the increase in the value of your investment over the long term. Fees and Expenses of the Equity Fund This table describes the fees and expenses that you may pay if you buy, hold and sell shares of the Equity Fund. You may pay other fees, such as brokerage commissions and other fees to financial intermediaries, which are not reflected in the table and example below. Shareholder Fees (fees paid directly from your investment) Institutional Class None Annual Operating Expenses (expenses that you pay each year as a percentage of the value of your investment) Institutional Class Management Fees 1.10% Other Expenses 0.18% Interest and Dividend Expenses 0.01% Total Other Expenses 0.19% Total Annual Fund Operating Expenses 1.29% Fee Waiver and/or Expense Reimbursement (1) (0.13)% Total Annual Fund Operating Expenses After Fee Waiver and/or Expense Reimbursement (1) 1.16% (1) iM Global Partner Fund Management, LLC (formerly, Litman Gregory Fund Advisors, LLC) (“iM Global” or the “Advisor”), the advisor to the Equity Fund, has contractually agreed, through April 30, 2023, to waive a portion of its advisory fees so that after paying all of the sub-advisory fees, the net advisory fee as a percentage of the Equity Fund’s daily net assets retained by iM Global is 0.40%. This agreement may be terminated at any time by the Board of Trustees of the Litman Gregory Funds Trust (the “Trust”) upon sixty (60) days’ written notice to iM Global, and iM Global may decline to renew this agreement by written notice to the Trust at least thirty (30) days before the agreement’s annual expiration date. iM Global has waived its right to receive reimbursement of the portion of its advisory fees waived pursuant to this agreement. Example This example is intended to help you compare the cost of investing in the Equity Fund with the cost of investing in other mutual funds. The example assumes that you invest $10,000 in the Equity Fund for the time periods indicated and then redeem all of your shares at the end of those periods. The example also assumes that your investment has a 5% return each year and that the Equity Fund’s operating expenses remain the same. The cost for the Equity Fund reflects the net expenses of the Fund that result from the contractual expense limitation in the first year only. Although your actual costs may be higher or lower, based on these assumptions your costs would be: One Year Three Years Five Years Ten Years Institutional Class $118 $392 $691 $1,541 Portfolio Turnover The Equity Fund pays transaction costs, such as commissions, when it buys and sells securities (or “turns over” its portfolio). A higher portfolio turnover rate may indicate higher transaction costs and may result in higher taxes when shares of the Equity Fund are held in a taxable account as compared to shares of investment companies that hold investments for a longer period. These costs, which are not reflected in annual fund operating expenses or in the example, affect the Equity Fund’s performance. During the most recent fiscal year, the Equity Fund’s portfolio turnover rate was 27.74% of the average value of its portfolio. Principal Strategies The Equity Fund invests in the securities of companies that the sub-advisors to the Fund (each, a “manager” or “sub-advisor”) believe have strong appreciation potential. Under normal conditions, each sub-advisor manages a portion of the Equity Fund’s assets by independently managing a portfolio typically composed of at least 5, but not more than 15, stocks. There is no minimum or maximum allocation of the Fund’s portfolio assets to each sub-advisor. Under normal market conditions, the Equity Fund invests at least 80% of its net assets, plus the amount of any borrowings for investment purposes, in equity securities. Equity securities in which the Equity Fund may invest include common stocks, preferred stocks and convertible debt securities, which may be converted on specified terms into stock of the issuer. Concentration of investments in certain sectors – including, but not limited to, the communications services, consumer discretionary, financial, healthcare and technology sectors – may occur from time to time as a result of the implementation of the Equity Fund’s investment strategy by the sub-advisors. The Fund invests primarily in the securities of large-, mid- and small-sized U.S. companies, as measured by market capitalization at the time of acquisition, although the managers also have flexibility to invest in the securities of foreign companies. Up to 50% of the Equity Fund’s net assets may be invested in foreign equity securities, which may include emerging markets. iM Global defines an emerging market country as any country that is included in the MSCI Emerging Markets Index. Each sub-advisor uses its own discretion to invest in any sized company it deems appropriate. By executing its investment strategy, the Equity Fund seeks to: • combine the efforts of several experienced, high quality managers; • access the favorite stock-picking ideas of each manager at any point in time; • deliver a portfolio that is prudently diversified in terms of stocks (typically 60 to 100) and industries while allowing each manager to run a portion of the portfolio focused on only its favorite stocks; and • further diversify across different-sized companies and stock-picking styles by incorporating managers with a variety of stock-picking disciplines. 2 Litman Gregory Funds Trust Table of Contents Generally, a security may be sold: (1) if the manager believes the security’s market price exceeds the manager’s estimate of intrinsic value; (2) if the manager’s view of the business fundamentals or management of the underlying company changes; (3) if a more attractive investment opportunity is found; (4) if general market conditions trigger a change in the manager’s assessment criteria; or (5) for other portfolio management reasons. Principal Risks Investment in stocks exposes shareholders of the Equity Fund to the risk of losing money if the value of the stocks held by the Equity Fund declines during the period an investor owns shares in the Equity Fund. The following risks could affect the value of your investment. Each risk summarized below is considered a “principal risk” of investing in the Equity Fund, regardless of the order in which it appears. Some or all of these risks may adversely affect the Equity Fund’s net asset value per share, total return and/or ability to meet its objective. • Equity Securities Risk . This is the risk that the value of equity securities may fluctuate, sometimes rapidly and unpredictably, due to factors affecting the general market, an entire industry or sector, or particular companies. These factors include, without limitation, adverse changes in economic conditions, the general outlook for corporate earnings, interest rates or investor sentiment; increases in production costs; and significant management decisions. This risk is greater for small- and medium-sized companies, which tend to be more vulnerable to adverse developments than larger companies. • Convertible Securities Risk . This is the risk that the market value of convertible securities may fluctuate due to changes in, among other things, interest rates; other general economic conditions; industry fundamentals; market sentiment; the issuer’s operating results, financial statements, and credit ratings; and the market value of the underlying common or preferred stock. • Market Risk. As with all mutual funds that invest in common stocks, the value of an individual’s investment will fluctuate daily in response to the performance of the individual stocks held in the Equity Fund. The stock market has been subject to significant volatility recently, which has increased the risks associated with an investment in the Equity Fund. • Public Health Emergency Risk . This is the risk that pandemics and other public health emergencies, including outbreaks of infectious diseases such as the current outbreak of the novel coronavirus (“COVID-19”), can result, and in the case of COVID-19 has resulted and may continue to result, in market volatility and disruption, and materially and adversely impact economic conditions in ways that cannot be predicted, all of which could result in substantial investment losses. The ultimate impact of COVID-19, including new variants of the underlying virus, or other health emergencies on global economic conditions and businesses is impossible to predict accurately. Ongoing and potential additional material adverse economic effects of indeterminate duration and severity are possible. The resulting adverse impact on the value of an investment in the Fund could be significant and prolonged. Other public health emergencies that may arise in the future could have similar or other unforeseen effects. • Smaller Companies Risk. The Equity Fund may invest a portion of its assets in the securities of small- and mid-sized companies. Securities of small and mid-cap companies are generally more volatile and less liquid than the securities of large-cap companies. This is because smaller companies may be more reliant on a few products, services or key personnel, which can make it riskier than investing in larger companies with more diverse product lines and structured management. • Foreign Investment Risk. This is the risk that an investment in foreign (non-U.S.) securities may cause the Fund to experience more rapid and extreme changes in value than a fund that invests exclusively in securities of U.S. companies, due to , among other factors, less publicly available information, less stringent and less uniform accounting, auditing and financial reporting standards, less liquid and more volatile markets, higher transaction and custody costs, additional taxes, less investor protection, delayed or less frequent settlement, political or social instability, civil unrest, acts of terrorism, regional economic volatility, and the imposition of sanctions, confiscations, trade restrictions (including tariffs) and other government restrictions by the United States and/or other governments. • Emerging Markets Risk. This is the risk that the value of the Fund’s emerging markets investments will decline due to the greater degree of economic, political and social instability of emerging or developing countries as compared to developed countries. Investments in emerging market countries are subject to substantial risks due to, among other factors, different accounting standards and thinner trading markets as compared to those in developed countries; less publicly available and reliable information about issuers as compared to developed markets; the possibility of currency transfer restrictions; and the risk of expropriation, nationalization or other adverse political, economic 

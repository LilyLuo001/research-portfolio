      497 1 trf-sai.htm TRF-SAI-0521 THE ROYCE FUND STATEMENT OF ADDITIONAL INFORMATION THE ROYCE FUND (the “Trust”), a Delaware statutory trust, is an open-end registered management investment company, which offers investors the opportunity to invest in eleven separate portfolios or series. Each of those series is classified as a “diversified” fund within the meaning of the Investment Company Act of 1940 (the “1940 Act”). The eleven series of the Trust (each, a “Fund” and collectively, the “Funds”), the share classes offered hereunder, and their related ticker symbols are: Royce Pennsylvania Mutual Fund— Investment (PENNX), Service (RYPFX), Institutional (RPMIX), Consultant (RYPCX), and R (RPMRX) Royce Micro-Cap Fund —Investment (RYOTX), Service (RMCFX) and Consultant (RYMCX) Royce Premier Fund —Investment (RYPRX), Service (RPFFX), Institutional (RPFIX), Consultant (RPRCX), and R (RPRRX) Royce Total Return Fund —Investment (RYTRX), Service (RYTFX), Institutional (RTRIX), Consultant (RYTCX), and R (RTRRX) Royce Opportunity Fund —Investment (RYPNX), Service (RYOFX), Institutional (ROFIX), Consultant (ROFCX), and R (ROFRX) Royce Special Equity Fund —Investment (RYSEX), Service (RSEFX), Institutional (RSEIX) and Consultant (RSQCX) Royce Small-Cap Value Fund —Investment (RVVHX), Service (RYVFX), Consultant (RVFCX), and R (RVVRX) Royce Smaller-Companies Growth Fund —Investment (RVPHX), Service (RYVPX), Institutional (RVPIX), and Consultant (RVPCX) Royce Global Financial Services Fund —Service (RYFSX) and Institutional (RGFIX) Royce Dividend Value Fund —Investment (RDVIX), Service (RYDVX), Institutional (RDIIX), and Consultant (RDVCX) Royce International Premier Fund —Investment (RIPNX), Service (RYIPX), Institutional (RIPIX), and Consultant (RINPX) This Statement of Additional Information is not a prospectus, but should be read in conjunction with the Trust’s current statutory Prospectuses relating to the Investment, Service, Institutional, Consultant, and R Classes, dated May 1, 2021. Please retain this document for future reference. The audited financial statements included in the Funds’ Annual Reports to Shareholders for the fiscal year ended December 31, 2020 (SEC Accession No. 0000949377-21-000044) are incorporated herein by reference. To obtain an additional copy of a Prospectus or an Annual Report to Shareholders for any of the Funds, without a charge, please call Investor Information at (800) 221-4268. InvestmentAdviser Transfer Agent Royce Investment Partners (“Royce”) 1 DST Asset Manager Solutions, Inc. Distributor Custodian Royce Fund Services, LLC (“RFS”) State Street Bank and Trust Company May 1, 2021 1 Royce & Associates, LP is a Delaware limited partnership that primarily conducts its business under the name Royce Investment Partners. TABLE OF CONTENTS Page OTHER INVESTMENT STRATEGIES 3 INVESTMENT POLICIES AND LIMITATIONS 4 RISK FACTORS AND SPECIAL CONSIDERATIONS 7 MANAGEMENT OF THE TRUST 13 PRINCIPAL HOLDERS OF SHARES 22 INVESTMENT ADVISORY SERVICES 43 ADMINISTRATION AGREEMENT 45 PORTFOLIO MANAGERS 46 DISTRIBUTION 50 CUSTODIAN 53 TRANSFER AGENT 54 INDEPENDENT REGISTERED PUBLIC ACCOUNTING FIRM 54 SECURITIES LENDING AGENT 54 PORTFOLIO TRANSACTIONS 55 CODE OF ETHICS AND RELATED MATTERS 57 PROXY VOTING POLICIES AND PROCEDURES 58 PORTFOLIO HOLDINGS DISCLOSURE POLICY 59 PRICING OF SHARES BEING OFFERED 61 REDEMPTIONS IN KIND 61 APPLICATION OF FREQUENT TRADING POLICY TO CERTAIN INVESTORS 61 TAXATION 61 DESCRIPTION OF THE TRUST 67 2 OTHER INVESTMENT STRATEGIES In addition to the principal investment strategies described in their respective Prospectuses, each Fund may invest the balance of its assets as described below. ROYCE PENNSYLVANIA MUTUAL FUND – in securities of companies with stock market capitalizations greater than that of the largest company in the Russell 2000® Index at the time of its most recent reconstitution and non- convertible preferred stocks and debt securities. This Fund does not focus its investments in companies that do business in the State of Pennsylvania. ROYCE MICRO-CAP FUND – in securities of companies with stock market capitalizations greater than that of the largest company in the Russell Microcap® Index at the time of its most recent reconstitution and non-convertible preferred stocks and debt securities. ROYCE PREMIER FUND – in securities of companies with stock market capitalizations greater than that of the largest company in the Russell 2000® Index at the time of its most recent reconstitution, non-convertible preferred stocks and debt securities. ROYCE TOTAL RETURN FUND – in securities with stock market capitalizations greater than that of the largest company in the Russell 2000® Index at the time of its most recent reconstitution, non-dividend-paying common stocks and non-convertible securities. ROYCE OPPORTUNITY FUND – in securities of companies with stock market capitalizations greater than that of the largest company in the Russell 2000® Index at the time of its most recent reconstitution and non-convertible preferred stocks and debt securities. ROYCE SPECIAL EQUITY FUND – in common stocks and convertible securities of companies with market capitalizations greater than that of the largest company in the Russell 2000® Index at the time of its most recent reconstitution and non-convertible preferred stocks and debt securities. ROYCE SMALL-CAP VALUE FUND – in securities of companies with stock market capitalizations greater than that of the largest company in the Russell 2000® Index at the time of its most recent reconstitution and non-convertible preferred stocks and debt securities. ROYCE SMALLER-COMPANIES GROWTH FUND – in securities of companies with stock market capitalizations above $7.5 billion and non-convertible preferred stocks and debt securities. ROYCE GLOBAL FINANCIAL SERVICES FUND – in securities of non-financial services companies, securities of financial services companies with stock market capitalizations above $5 billion and non-convertible preferred stocks and debt securities. ROYCE DIVIDEND VALUE FUND – in securities with stock market capitalizations above $15 billion, non-dividend paying common stocks and non-convertible securities. ROYCE INTERNATIONAL PREMIER FUND – in securities of companies with stock market capitalizations below $1 billion and above $5 billion, U.S. equity securities, and non-convertible preferred stocks and debt securities. 3 INVESTMENT POLICIES AND LIMITATIONS Listed below are the Funds’ fundamental investment policies and limitations and operating policies. A Fund’s fundamental investment policies cannot be changed without the approval of a “majority of the outstanding voting securities” (as defined in the 1940 Act) of the Fund. Except for the fundamental investment policies set forth below, the investment policies and limitations described in this Statement of Additional Information and the Funds’ investment objectives are operating policies and may be changed by the Board of Trustees of the Trust (the “Board”) without shareholder approval. However, shareholders will be notified prior to a material change in an operating policy affecting a Fund in which they beneficially own shares. Unless otherwise expressly noted, compliance with each Fund’s investment policies and limitations will be determined immediately after or at the time of the acquisition of the security or relevant asset except for Fundamental Policy No. 4, with which the Funds must comply on a continuous basis. Accordingly, any subsequent change in values, net assets or other circumstances will not be considered in determining whether an investment complies with a Fund’s investment policies and limitations (other than for Fundamental Policy No. 4). In the event the percentage of a Fund’s assets invested in securities for which market quotations are not readily available exceeds the applicable limit set forth in Fundamental Policy No. 8 due to a subsequent change in values, net assets, or other circumstances, the Fund will consider, based on all relevant facts and circumstances, taking appropriate measures to reduce the percentage of its assets invested in such securities in an orderly fashion. No Fund, however, will be required to sell securities for which market quotations are not readily available if the percentage of its assets invested in such securities exceeds the applicable limit set forth in Fundamental Policy No. 8 due to a subsequent change in values, net assets, or other circumstances. No Fund may, as a matter of fundamental policy: 1. Issue any senior securities; 2. Purchase securities on margin or write call options on its portfolio securities; 3. Sell securities short; 4. Borrow money, except that each of the Funds may borrow money from banks as a temporary measure for extraordinary or emergency purposes in an amount not exceeding 5% of such Fund’s total assets; 5. Underwrite the securities of other issuers; 6. Invest more than 25% of its total assets in the securities of foreign issuers in the case of Royce Opportunity Fund and Royce Special Equity Fund. All other Funds are not subject to this restriction; 7. Invest in restricted securities (except for Royce Opportunity Fund, Royce Small-Cap Value Fund, Royce Smaller- Companies Growth Fund, Royce Global Financial Services Fund, and Royce Dividend Value Fund, each of which may invest up to 15% of its net assets in illiquid securities, including restricted securities and Royce Pennsylvania Mutual Fund, Royce Micro-Cap Fund, Royce Premier Fund, Royce Total Return Fund, and Royce International Premier Fund, each of which is not subject to this restriction,) or in repurchase agreements which mature in more than seven days; 8. Invest more than 10% (15% for Royce Opportunity Fund, Royce Special Equity Fund, Royce Small-Cap Value Fund, Royce Smaller-Companies Growth Fund, Royce Global Financial Services Fund, Royce Dividend Value Fund, and Royce International Premier Fund) of its assets in securities for which market quotations are not readily available (i.e., illiquid securities) (except for Royce Pennsylvania Mutual Fund, which is not subject to any such limitation); 9. Invest, with respect to 75% of its total assets, more than 5% of its assets in the securities of any one issuer (except U.S. Government securities); 10. Invest more than 25% of its assets in any one industry (except for Royce Global Financial Services Fund, which will concentrate and may invest up to 100% of its assets in financial services companies); 4 11. Acquire more than 10% of the outstanding voting securities of any one issuer; 12. Purchase or sell real estate or real estate mortgage loans or invest in the securities of real estate companies unless such securities are publicly-traded; 13. Purchase or sell commodities or commodity contracts; 14. Make loans, except for purchases of portions of issues of publicly-distributed bonds, debentures and other securities, whether or not such purchases are made upon the original issuance of such securities, and except that each Fund may loan up to 25% of its assets to qualified brokers, dealers or institutions for their use relating to short sales or other securities transactions (provided that such loans are fully collateralized at all times); 15. Invest in companies for the purpose of exercising control of management; 16. Purchase portfolio securities from or sell such securities directly to any of the Trust’s Trustees, officers, employees or investment adviser, as principal for their own accounts; or 17. Invest more than 5% of its total assets in warrants, rights and options. Certain operating policies of the Funds are set forth below. Such operating policies may be changed by the Board without shareholder approval. No Fund may, as a matter of operating policy, invest more than 5% of its net assets in lower-rated (high-risk) non-convertible debt securities. Royce Opportunity Fund may not, as a matter of operating policy, invest more than 10% of its assets in the securities of foreign issuers. Royce Special Equity Fund may not, as a matter of operating policy: 1. Invest more than 10% of its assets in the securities of foreign issuers; 2. Invest more than 5% of its assets in securities for which market quotations are not readily available; or 3. Invest more than 5% of its assets in the securities of other investment companies. Royce Pennsylvania Mutual Fund, Royce Micro-Cap Fund, Royce Premier Fund, Royce Total Return Fund, Royce Small-Cap Value Fund, Royce Smaller-Companies Growth Fund, and Royce Dividend Value Fund may not, as a matter of operating policy, invest more than 25% of their net assets in the securities of foreign issuers. Royce International Premier Fund may not, as a matter of operating policy, invest more than 35% of its net assets in the securities of companies headquartered in developing countries. Royce Pennsylvania Mutual Fund, Royce Micro-Cap Fund, Royce Premier Fund, Royce Total Return Fund, Royce Small-Cap Value Fund, Royce Smaller-Companies Growth Fund, and Royce Dividend Value Fund may not, as a matter of operating policy, invest more than 5% of their net assets in the securities of companies that are headquartered in developing countries. Royce Global Financial Services Fund may not, as a matter of operating policy, invest more than 10% of its net assets in the securities of companies headquartered in developing countries. Royce Pennsylvania Mutual Fund, Royce Micro-Cap Fund, Royce Premier Fund, Royce Total Return Fund, and Royce International Premier Fund may not, as a matter of operating policy, invest more than 15% of their net assets in restricted securities. 5 For purposes of Fundamental Policy No. 6, the Trust does not consider foreign government securities to be the securities of foreign issuers. For purposes of Fundamental Policy No. 7, the Trust does not consider securities to be “restricted” if they may be sold by the Funds without restriction in the market in which they are primarily tr

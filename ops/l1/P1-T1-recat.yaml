 offering price) None None None Annual Fund Operating Expenses (expenses that you pay each year as a percentage of the value of your investment): CLASS A CLASS I CLASS R6 Management Fees 0.90 % 0.90 % 0.90 % Distribution and/or Service Fees (12b-1) 0.25 % None None Other Expenses 1 0.32 % 0.32 % 0.22 % Total Annual Fund Operating Expenses 1.47 % 1.22 % 1.12 % Expense Reimbursement 2 (0.17 %) (0.17 %) (0.17 %) Total Annual Fund Operating Expenses After Reimbursement 1.30 % 1.05 % 0.95 % 1 “Other Expenses” are based on estimated amounts for the current fiscal year. 2 The Fund’s investment advisor has contractually agreed to reimburse Fund expenses through March 1, 2022 to the extent necessary so that Total Annual Fund Operating Expenses of Class A shares and Class I shares are limited to 1.30% and 1.05% of average net assets, respectively. The Fund’s investment advisor has contractually agreed to limit the Fund’s annual ordinary operating expenses for Class R6 shares (as a percentage of average net assets) to 1.05% less the Fund’s annual sub-transfer agency ratio (the aggregate sub-transfer agency fees of the Fund’s other share classes divided by the aggregate average annual net assets of the Fund’s other share classes). For purposes of these expense limitations, operating expenses do not include taxes, interest, short interest, short dividend expenses, brokerage commissions, acquired fund fees and expenses, and extraordinary expenses, if any. C ALAMOS A DVISORS may recapture previously waived expense amounts within the same fiscal year for any day where the respective share class’s expense ratio falls below the contractual expense limit up to the expense limit for that day. This undertaking is binding on C ALAMOS A DVISORS and any of its successors and assigns. This agreement is not terminable by either party. Example This example is intended to help you compare the cost of investing in the Fund with the cost of investing in other mutual funds. The example assumes that you invest $10,000 in the Fund for the time periods indicated and then either redeem or do not redeem your shares at the end of the reflected time periods. The example also assumes that your investment has a 5% return each year that all dividends and capital gain distributions are reinvested, that you pay a maximum initial or contingent deferred sales charge and that the Fund’s operating expenses remain the same. Any applicable fee waivers and/or expense reimbursements are reflected in the below examples for the period through March 1, 2022 only. Although your actual performance and costs may be higher or lower, based on these assumptions, your costs would be: You would pay the following expenses whether or not you redeemed your shares at the end of the period: One Year Three Years Class A $ 601 $ 868 Class I $ 107 $ 334 Class R6 $ 97 $ 303 PROSPECTUS | April 15, 2019 1 Table of Contents Calamos Timpani Small Cap Growth Fund Portfolio Turnover The Fund pays transaction costs, such as commissions, when it buys and sells securities (or “turns over” its portfolio). A higher portfolio turnover rate may indicate higher transaction costs and may result in higher taxes when Fund shares are held in a taxable account. These costs, which are not reflected in the annual fund operating expenses or in the example, affect the Fund’s performance. The Fund’s portfolio turnover rate is not available as the Fund had not commenced investment operations as of the date of this prospectus. The portfolio turnover rate of the Frontier Timpani Small Cap Growth Fund (the “Predecessor Fund,” which is discussed in more detail below) was 126% for the fiscal year ended June 30, 2018. Principal Investment Strategies Under normal market conditions, the Fund invests at least 80% of its net assets (plus any borrowings) in equity securities of small capitalization companies that the Fund’s investment adviser, C ALAMOS A DVISORS LLC (“Calamos Advisors”), believes have sound growth potential. Equity securities in which the Fund invests as a part of its principal investment strategy consist of common stocks and American Depositary Receipts (“ADRs”). The Fund may invest up to 25% of its net assets in foreign securities. Foreign securities are securities issued by issuers that are organized under the laws of a foreign country, that have a substantial portion of their operations or assets in a foreign country or countries, or that derive a substantial portion of their revenue or profits from businesses, investments or sales outside of the United States. The Fund may also invest in foreign securities that are represented in the United States securities markets by ADRs or similar depositary arrangements. The Fund’s foreign investments can be denominated in U.S. dollars or in foreign currencies. C ALAMOS A DVISORS uses fundamental research to evaluate investment opportunities, focusing on companies that it believes have superior management and whose business models have a high potential for earnings upside. C ALAMOS A DVISORS may actively trade portfolio securities. Currently, the Fund has significant investments in the healthcare and technology sectors due to C ALAMOS A DVISORS ’ investment process yielding opportunities for sound growth potential within those sectors. However, the Fund is actively managed, and its portfolio may change in the future. Principal Risks An investment in the Fund is subject to risks, and you could lose money on your investment in the Fund. There can be no assurance that the Fund will achieve its investment objective. The risks associated with an investment in the Fund can increase during times of significant market volatility. Your investment in the Fund is not a deposit in a bank and is not insured or guaranteed by the Federal Deposit Insurance Corporation or any other government agency. The principal risks of investing in the Fund include: • American Depositary Receipts Risk — The stocks of most foreign companies that trade in the U.S. markets are traded as ADRs. U.S. depositary banks issue these stocks. Each ADR represents one or more shares of foreign stock or a fraction of a share. The price of an ADR corresponds to the price of the foreign stock in its home market, adjusted to the ratio of the ADRs to foreign company shares. Therefore while purchasing a security on a U.S. exchange, the risks inherently associated with foreign investing still apply to ADRs. • Cash Holdings Risk — The Fund may invest in cash and cash equivalents for indefinite periods of time when the Fund’s investment adviser determines the prevailing market environment warrants doing so. When the Fund holds cash positions, it may lose opportunities to participate in market appreciation, which may result in lower returns than if the Fund had remained fully invested in the market. Furthermore, cash and cash equivalents may generate minimal or no income and could negatively impact the Fund’s performance and ability to achieve its investment objective. • Cybersecurity Risk — Investment companies, such as the Fund, and their service providers are exposed to operational and information security risks resulting from cyberattacks, which may result in financial losses to the Fund and its shareholders. Cyberattacks include, among other behaviors, stealing or corrupting data maintained online or digitally, denial of service attacks on websites, “ransomware” that renders systems inoperable until ransom is paid, the unauthorized release of confidential information, or various other forms of cybersecurity breaches. Cyber-attacks affecting the Fund or the Fund’s investment adviser, custodian, transfer agent, distributor, administrator, intermediaries, trading counterparties, and other third-party service providers may adversely impact the Funds or the companies in which the Fund invests, causing the Fund’s investments to lose value or to prevent a shareholder redemption or purchase from clearing in a timely manner. 2 CALAMOS FAMILY OF FUNDS Table of Contents Calamos Timpani Small Cap Growth Fund • Equity Securities Risk — The securities markets are volatile, and the market prices of the Fund’s securities may decline generally. The price of equity securities fluctuates based on changes in a company’s financial condition and overall market and economic conditions. If the market prices of the securities owned by the Fund fall, the value of your investment in the Fund will decline. • Foreign Securities Risk — Risks associated with investing in foreign securities include fluctuations in the exchange rates of foreign currencies that may affect the U.S. dollar value of a security, the possibility of substantial price volatility as a result of political and economic instability in the foreign country, less public information about issuers of securities, different securities regulation, different accounting, auditing and financial reporting standards and less liquidity than in U.S. markets. • Growth Stock Risk — Growth securities typically trade at higher multiples of current earnings than other securities and, therefore, may be more sensitive to changes in current or expected earnings than other equity securities and may be more volatile. • Liquidity Risk — Liquidity risk exists when particular investments are difficult to purchase or sell. The Fund’s investments in illiquid securities may reduce the returns of the Fund because it may be unable to sell the illiquid securities at an advantageous time or price. • Portfolio Selection Risk — The value of your investment may decrease if the investment adviser’s judgment about the attractiveness, value or market trends affecting a particular security, issuer, industry or sector or about market movements is incorrect. • Portfolio Turnover Risk — The portfolio managers may actively and frequently trade securities or other instruments in the Fund’s portfolio to carry out its investment strategies. A high portfolio turnover rate increases transaction costs, which may increase the Fund’s expenses. Frequent and active trading may also cause adverse tax consequences for investors in the Fund due to an increase in short-term capital gains. • Sector Risk — To the extent the Fund invests a significant portion of its assets in a particular sector, a greater portion of the Fund’s performance may be affected by the general business and economic conditions affecting that sector. Each sector may share economic risk with the broader market, however there may be economic risks specific to each sector. As a result, returns from those sectors may trail returns from the overall stock market, and it is possible that the Fund may underperform the broader market or experience greater volatility. • Small Company Risk — Small company stocks have historically been subject to greater investment risk than mid and large company stocks. The prices of small company stocks tend to be more volatile than prices of mid and large company stocks. Fund Performance The performance shown in the bar chart and performance table is the performance of the Predecessor Fund prior to the commencement of the Fund’s operations. Effective as of the close of business on May 31, 2019, the Fund acquired all of the assets, subject to the liabilities, of the Predecessor Fund through a tax-free reorganization (the “Reorganization”). As a result of the Reorganization, the Fund adopted the performance and financial history of the Predecessor Fund. The Fund has the same investment objective, strategy and portfolio manager as the Predecessor Fund. As a result, the performance of the Fund would have been substantially similar to that of the Predecessor Fund. The bar chart shows the performance of the Predecessor Fund’s Institutional Class performance which has been adopted by the Class I shares of the Fund for periods prior to the Reorganization. The information shows you how the Predecessor Fund’s performance has varied year by year and provides some indication of the risks of investing in 

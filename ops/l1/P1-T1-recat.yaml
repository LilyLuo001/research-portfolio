of the corresponding class of shares of the Acquiring Fund. We encourage you to support the Board’s recommendation to approve the proposal. Before you vote, however, please read the full text of the combined Proxy Statement/Prospectus. Please vote your shares by completing the enclosed proxy card and returning it in the enclosed postage-paid return envelope or by voting by telephone or via the internet using the instructions on the proxy card. If you are voting by mail, please sign and promptly return the proxy card in the postage-paid return envelope regardless of the number of shares owned. Proxy card instructions may be revoked at any time before they are exercised by submitting a written notice of revocation or a subsequently executed proxy card or by participating in the Meeting and recasting your vote. Your vote is important regardless of the number of shares you own. To assure your representation at the Meeting, please follow the instructions on the enclosed proxy ballot whether or not you expect to be present at the Meeting. If you attend the Meeting, you may revoke your proxy and vote your shares in person. Should you have any questions, please feel free to call the Target Fund (toll-free) at 855-TCA-Fund (855-822-3863). Thank you for taking the time to consider this important proposal and for your continuing investment. /s/ Brian R. Wiedmeyer Brian R. Wiedmeyer President and Principal Executive Officer ii Managed Portfolio Series 615 East Michigan Street Milwaukee, Wisconsin 53202 NOTICE OF SPECIAL MEETING OF SHAREHOLDERS Ecofin Global Renewables Infrastructure Fund To Be Held on September 23, 2024 A special meeting (the “Meeting”) of the shareholders of the Ecofin Global Renewables Infrastructure Fund (the “Target Fund”), a series of Managed Portfolio Series (the “Target Trust”) will be held on September 23, 2024 at 10:00 a.m. Central Time at the offices of the Target Fund, 615 East Michigan Street, Milwaukee, Wisconsin 53202 to vote on the following proposal (the “Proposal”), and any other matters that may properly come before the Meeting or any adjournment or postponement thereof. Proposal: Ecofin Global Renewables Infrastructure Fund Reorganization To approve an Agreement and Plan of Reorganization providing for: (a) the acquisition of all of the assets and assumption of all of the liabilities of the Target Fund by the Ecofin Global Renewables Infrastructure Fund (the “Acquiring Fund”), a newly created series of The Advisors’ Inner Circle Fund III (the “Acquiring Trust”), in exchange for A Class Shares and Institutional Class Shares of the Acquiring Fund; (b) the distribution of such shares to the shareholders of A Class Shares and Institutional Class Shares, respectively, of the Target Fund; and (c) the liquidation of the Target Fund. Target Fund shareholders of record as of the close of business on July 29, 2024 (the “Record Date”) are entitled to notice of, and to vote at, the Meeting or any adjournment or postponement of the Meeting. If sufficient votes to approve the Proposal are not received by the date of the Meeting or any reconvened Meeting following an adjournment, the Meeting or reconvened Meeting may be adjourned or postponed to permit further solicitations of proxies. If any other proposals in addition to the Proposal properly come before the Meeting or any adjournment or postponement thereof, then the shareholders of the Target Fund will vote separately on each such proposal. Shareholders of both classes of the Target Fund, A Class Shares and Institutional Shares, are entitled to vote on the Proposal. Please vote your shares by completing the enclosed proxy card and returning it in the enclosed postage-paid return envelope or by voting by telephone or via the internet using the instructions on the proxy card. If you are voting by mail, please sign and promptly return the proxy card in the postage-paid return envelope regardless of the number of shares owned. Proxy card instructions may be revoked at any time before they are exercised by submitting a written notice of revocation or a subsequently executed proxy card, by participating in the Meeting and recasting your vote in person. The Board of Trustees of the Target Trust (the “Target Trust Board”) requests that you vote your shares by completing the enclosed proxy card and returning it in the enclosed postage-paid return envelope or by voting by telephone or via the internet using the instructions on the proxy card. The Target Trust Board recommends that shareholders of the Target Fund vote “FOR” the Proposal as described in the accompanying Proxy Statement/Prospectus. By order of the Board of Trustees, /s/ Brian R. Wiedmeyer Brian R. Wiedmeyer President and Principal Executive Officer August 19, 2024 iii Ecofin Global Renewables Infrastructure Fund, a series of Managed Portfolio Series, 615 East Michigan Street Milwaukee, Wisconsin 53202 414-516-1712 Ecofin Global Renewables Infrastructure Fund, a series of The Advisors’ Inner Circle Fund III, One Freedom Valley Drive Oaks, Pennsylvania 19456 1-877-713-7678 PROXY STATEMENT/PROSPECTUS August 19, 2024 Introduction This Proxy Statement/Prospectus sets forth concisely information that shareholders of the Ecofin Global Renewables Infrastructure Fund (the “Target Fund”), a series of Managed Portfolio Series (the “Target Trust”), should know before voting on the proposed reorganization that is described herein (the “Reorganization”), and should be retained for future reference. This document is both the proxy statement of the Target Fund and also a prospectus for the Ecofin Global Renewables Infrastructure Fund (the “Acquiring Fund”), a series of The Advisors’ Inner Circle Fund III (the “Acquiring Trust”). The Target Fund and the Acquiring Fund (each, a “Fund” and together, the “Funds”) are each series of registered open-end management investment companies. The Reorganization will be effected pursuant to an Agreement and Plan of Reorganization (the “Agreement”). Under the Agreement, the Target Fund will transfer all of its assets to the Acquiring Fund in exchange for the assumption by the Acquiring Fund of all of the Target Fund’s liabilities and the classes of shares of the Acquiring Fund as set forth in the following chart: If you own shares of the Target Fund listed below Share Class You will receive shares of the Acquiring Fund listed below Share Class Ecofin Global Renewables Infrastructure Fund, a series of the Target Trust A Class Ecofin Global Renewables Infrastructure Fund, a series of the Acquiring Trust A Class Institutional Class Institutional Class RWC Asset Management LLP (the “Acquiring Fund Adviser”) serves as the investment adviser of the Acquiring Fund. Tortoise Capital Advisors, L.L.C, doing business as TCA Advisors (the “Target Fund Adviser”), serves as the investment adviser of the Target Fund. Ecofin Advisors Limited (the “Target Fund Sub-Adviser”) serves as the investment sub-adviser to the Target Fund. A special meeting of the shareholders of the Target Fund (the “Meeting”) will be held on September 23 at 10:00 a.m. Central Time at the offices of the Target Fund, 615 East Michigan Street, Milwaukee, Wisconsin 53202. At the Meeting, shareholders of the Target Fund will be asked to consider the following proposal (the “Proposal”), and any other matters that may properly come before the Meeting or any adjournment or postponement thereof. Proposal: Ecofin Global Renewables Infrastructure Fund Reorganization To approve the Agreement and Plan of Reorganization, which provides for: (a) the acquisition of all of the assets and assumption of all of the liabilities of the Target Fund by the Ecofin Global Renewables Infrastructure Fund (the “Acquiring Fund”), a newly created series of The Advisors’ Inner Circle Fund III (the “Acquiring Trust”), in exchange for A Class Shares and Institutional Class Shares of the Acquiring Fund; (b) the distribution of such shares to the shareholders of A Class Shares and Institutional Class Shares, respectively, of the Target Fund; and (c) the liquidation of the Target Fund. The total net asset value of shares of the Acquiring Fund (“Acquiring Fund Shares”) that you will receive in the Reorganization will be the same as the total net asset value of your Target Fund shares immediately prior to the Reorganization. The Reorganization is anticipated to be a tax-free transaction for federal income tax purposes. For more detailed information about the federal income tax consequences of the Reorganization, please refer to the section titled “Federal Income Tax Considerations” below. The Board of Trustees of the Target Trust (the “Target Trust Board”) and officers of the Target Trust have fixed the close of business on July 29, 2024 as the record date (“Record Date”) for the determination of Target Fund shareholders entitled to notice of and to vote at the Meeting and at any adjournment or postponement thereof. Shareholders of the Target Fund on the Record Date will be entitled to one vote for each share of the Target Fund held (and a proportionate fractional vote for each fractional share). This Proxy Statement/Prospectus, the enclosed Notice of Special Meeting of Shareholders, and the enclosed proxy card will be mailed on or about August 23, 2024, to all shareholders eligible to vote on the Proposal. The Target Trust Board has approved the Agreement and has determined that the Reorganization is in the best interests of the Target Fund and its shareholders. Accordingly, the Target Trust Board recommends that shareholders vote “ FOR ” the Proposal. If shareholders of the Target Fund do not approve its Reorganization, the Target Trust Board will consider other possible courses of action for the Target Fund, which could include ongoing operation of the Target Fund until shareholder approval of the Reorganization is obtained or other viable options are identified, or liquidation of the Target Fund. Additional information about the Target Fund is available 

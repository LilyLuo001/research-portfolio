Class C shares convert automatically to Class A shares of a fund. Prior to June 21, 2021, after a maximum of 10 years from the initial date of purchase, Class C shares convert automatically to Class A shares of a fund. Conversion to Class A shares will be made at NAV. At the time of conversion, a portion of the Class C shares bought through the reinvestment of dividends or capital gains (Dividend Shares) will also convert to Class A shares. The portion of Dividend Shares that will convert is determined by the ratio of your converting Class C non-Dividend Shares to your total Class C non-Dividend Shares. A fund may convert shares sooner in certain circumstances. A shorter holding period may also apply depending on your intermediary. Please see "Sales Charge Waiver Policies Applied by Certain Intermediaries" in the "Appendix" section of this prospectus. A fund will permit an intermediary to transition Class C shares to Class A shares of the same fund, regardless of holding period, if the intermediary is unable to administer this conversion policy. Such transitions to Class A shares will be made at NAV minus any applicable CDSC. The following information replaces similar information found in the "Fund Services" section under the "Fund Distribution" heading. The CDSC may be waived on the redemption of shares (applies to Class A, Class M, and Class C, unless otherwise noted): For disability or death. From employer-sponsored retirement plans (except SIMPLE IRAs, SEPs, and SARSEPs) in accordance with required minimum distributions as mandated by the Internal Revenue Code and related regulations. For required minimum distributions from Traditional IRAs, Rollover IRAs, SIMPLE IRAs, SEPs, and SARSEPs (excludes Roth accounts) as mandated by the Internal Revenue Code and related regulations. Through the Fidelity Advisor ® Systematic Withdrawal Program, if the amount does not exceed 12% of the account balance in a rolling 12-month period. (Applicable to Class A and Class M only) Held by insurance company separate accounts. (Applicable to Class A and Class M only) From an employee benefit plan (except SIMPLE IRAs, SEPs, SARSEPs, and plans covering self-employed individuals and their employees) or 403(b) programs (except Fidelity Advisor ® 403(b) programs for which Fidelity or an affiliate serves as custodian). (Applicable to Class A and Class M only) On which a finder's fee was eligible to be paid to an investment professional at the time of purchase, but was not paid because payment was declined (to determine your eligibility for this CDSC waiver, please ask your investment professional if he or she received a finder's fee at the time of purchase). (Applicable to Class C only) On which investment professionals did not receive a concession at the time of purchase. The following information replaces similar information found in the “Appendix” section under the “Sales Charge Waiver Policies Applied by Certain Intermediaries” heading. Sales Charge Waiver Policies Applied by Certain Intermediaries Ameriprise The following information applies to Class A shares purchases if you have an account with or otherwise purchase fund shares through Ameriprise Financial: Shareholders purchasing fund shares through an Ameriprise Financial brokerage account are eligible for the following front-end sales charge waivers and discounts, which may differ from those disclosed elsewhere in this prospectus or SAI. Class A Shares Front-End Sales Charge Waivers Available at Ameriprise Financial: • Employer-sponsored retirement plans (e.g., 401(k) plans, 457 plans, employer-sponsored 403(b) plans, profit sharing and money purchase pension plans and defined benefit plans). For purposes of this provision, employer-sponsored retirement plans do not include SEP IRAs, Simple IRAs or SAR-SEPs. • Shares purchased through reinvestment of capital gains distributions and dividend reinvestment when purchasing shares of the same fund (but not any other fund within the same fund family). • Shares exchanged from Class C shares of the same fund in the month of or following the 7-year anniversary of the purchase date. To the extent that this prospectus elsewhere provides for a waiver with respect to exchanges of Class C shares or conversion of Class C shares following a shorter holding period, that waiver will apply. • Employees and registered representatives of Ameriprise Financial or its affiliates and their immediate family members. • Shares purchased by or through qualified accounts (including IRAs, Coverdell Education Savings Accounts, 401(k)s, 403(b) TSCAs subject to ERISA and defined benefit plans) that are held by a covered family member, defined as an Ameriprise financial advisor and/or the advisor’s spouse, advisor’s lineal ascendant (mother, father, grandmother, grandfather, great grandmother, great grandfather), advisor’s lineal descendant (son, step-son, daughter, step-daughter, grandson, granddaughter, great grandson, great granddaughter) or any spouse of a covered family member who is a lineal descendant. • Shares purchased from the proceeds of redemptions within the same fund family, provided (1) the repurchase occurs within 90 days following the redemption, (2) the redemption and purchase occur in the same account, and (3) redeemed shares were subject to a front-end or deferred sales load (i.e. Rights of Reinstatement). Edward D. Jones & Co., L.P. ("Edward Jones") Policies Regarding Transactions Through Edward Jones The following information has been provided by Edward Jones: Effective on or after February 1, 2021, the following information supersedes prior information with respect to transactions and positions held in fund shares through an Edward Jones system. Clients of Edward Jones (also referred to as "shareholders") purchasing fund shares on the Edward Jones commission and fee-based platforms are eligible only for the following sales charge discounts (also referred to as "breakpoints") and waivers, which can differ from discounts and waivers described elsewhere in the mutual fund prospectus or statement of additional information ("SAI") or through another broker-dealer. In all instances, it is the shareholder's responsibility to inform Edward Jones at the time of purchase of any relationship, holdings of the fund family, or other facts qualifying the purchaser for discounts or waivers. Edward Jones can ask for documentation of such circumstance. Shareholders should contact Edward Jones if they have questions regarding their eligibility for these discounts and waivers. Breakpoints • Breakpoint pricing, otherwise known as volume pricing, at dollar thresholds as described in the prospectus. Rights of Accumulation ("ROA"): • The applicable sales charge on a purchase of Class A shares is determined by taking into account all share classes (except certain money market funds and any assets held in group retirement plans) of the mutual fund family held by the shareholder or in an account grouped by Edward Jones with other accounts for the purpose of providing certain pricing considerations ("pricing groups"). If grouping assets as a shareholder, this includes all share classes held on the Edward Jones platform and/or held on another platform. The inclusion of eligible fund family assets in the ROA calculation is dependent on the shareholder notifying Edward Jones of such assets at the time of calculation. Money market funds are included only if such shares were sold with a sales charge at the time of purchase or acquired in exchange for shares purchased with a sales charge. • The employer maintaining a SEP IRA plan and/or SIMPLE IRA plan may elect to establish or change ROA for the IRA accounts associated with the plan to a plan-level grouping as opposed to including all share classes at a shareholder or pricing group level. • ROA is determined by calculating the higher of cost minus redemptions or market value (current shares x NAV). Letter of Intent ("LOI"): • Through a LOI, shareholders can receive the sales charge and breakpoint discounts for purchases shareholders intend to make over a 13-month period from the date Edward Jones receives the LOI. The LOI is determined by calculating the higher of cost or market value of qualifying holdings at LOI initiation in combination with the value that the shareholder intends to buy over a 13-month period to calculate the front-end sales charge and any breakpoint discounts. Each purchase the shareholder makes during that 13-month period will receive the sales charge and breakpoint discount that applies to the total amount. The inclusion of eligible fund family assets in the LOI calculation is dependent on the shareholder notifying Edward Jones of such assets at the time of calculation. Purchases made before the LOI is received by Edward Jones are not adjusted under the LOI and will not reduce the sales charge previously paid. Sales charges will be adjusted if LOI is not met. If the employer maintaining a SEP IRA plan and/or SIMPLE IRA plan has elected to establish or change ROA for the IRA accounts associated with the plan to a plan-level grouping, LOIs will also be at the plan-level and may only be established by the employer. Sales Charge Waivers: Sales charges are waived for the following shareholders and in the following situations: • Associates of Edward Jones and its affiliates and their family members who are in the same pricing group (as determined by Edward Jones under its policies and procedures) as the associate. This waiver will continue for the remainder of the associate's life if the associate retires from Edward Jones in good-standing and remains in good standing pursuant to Edward Jones' policies and procedures. • Shares purchased in an Edward Jones fee-based program. • Shares purchased through reinvestment of capital gains distributions and dividend reinvestment. • Shares purchased from the proceeds of redeemed shares of the same fund family so long as the following conditions are met: 1) the proceeds are from the sale of shares within 60 days of the purchase, and 2) the sale and purchase are made in the same share class and the same account or the purchase is made in an individual retirement account with proceeds from liquidations in a non-retirement account. • Shares exchanged into Class A shares from another share class so long as the exchange is into the same fund and was initiated at the discretion of Edward Jones. Edward Jones is responsible for any remaining CDSC due to the fund company, if applicable. Any future purchases are subject to the applicable sales charge as disclosed in the prospectus. • Exchanges from Class C shares to Class A shares of the same fund, generally, in the 84th month following the anniversary of the purchase date or earlier at the discretion of Edward Jones. CDSC Waivers: If the shareholder purchases shares that are subject to a CDSC and those shares are redeemed before the CDSC is expired, the shareholder is responsible to pay the CDSC except in the following conditions: • The death or disability of the shareholder. • Systematic withdrawals with up to 10% per year of the account value. • Return of excess contributions from an Individual Retirement Account (IRA). • Shares sold as part of a required minimum distribution for IRA and retirement accounts if the redemption is taken in or after the year the shareholder reaches qualified age based on applicable IRS regulations. • Shares sold to pay Edward Jones fees or costs in such cases where the transaction is initiated by Edward Jones. • Shares exchanged in an Edward Jones fee-based program. • Shares acquired through NAV reinstatement. • Shares redeemed at the discretion of Edward Jones for Minimum Balances, as described below. Other Important Information Regarding Transactions Through Edward Jones Minimum Purchase Amounts: • Initial purchase minimum: $250 • Subsequent purchase minimum: none Minimum Balances: Edward Jones has the right to redeem at its discretion fund holdin
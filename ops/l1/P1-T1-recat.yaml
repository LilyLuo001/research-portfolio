e Fund Fund Basics Investment Details Valuing Shares Shareholder Information Additional Information about the Purchase and Sale of Shares Exchanging Shares Features and Policies Dividends and Capital Gain Distributions Tax Consequences Fund Services Fund Management Fund Distribution Appendix Financial Highlights Additional Index Information Fund Summary Fund /Class: Fidelity Advisor® Multi-Asset Income Fund /Fidelity® Multi-Asset Income Fund Investment Objective Fidelity Advisor® Multi-Asset Income Fund seeks to provide a combination of income and capital appreciation. Fee Table The following table describes the fees and expenses that may be incurred when you buy, hold, and sell shares of the fund. In addition to the fees and expenses described below, your broker may also require you to pay brokerage commissions on purchases and sales of certain share classes of the fund. Shareholder fees (fees paid directly from your investment) None Annual Operating Expenses (expenses that you pay each year as a % of the value of your investment) Management fee 0.55 % Distribution and/or Service (12b-1) fees None Other expenses 0.18 % Acquired fund fees and expenses 0.08 % A Total annual operating expenses 0.81 % A A Includes interest expense of certain underlying Fidelity® funds. Excluding interest expense of the applicable underlying Fidelity funds, Total annual operating expenses are 0.73%. This example helps compare the cost of investing in the fund with the cost of investing in other funds. Let's say, hypothetically, that the annual return for shares of the fund is 5% and that the fees and the annual operating expenses for shares of the fund are exactly as described in the fee table. This example illustrates the effect of fees and expenses, but is not meant to suggest actual or expected fees and expenses or returns, all of which may vary. For every $10,000 you invested, here's how much you would pay in total expenses if you sell all of your shares at the end of each time period indicated: 1 year $ 83 3 years $ 259 5 years $ 450 10 years $ 1,002 Portfolio Turnover The fund pays transaction costs, such as commissions, when it buys and sells securities (or "turns over" its portfolio). A higher portfolio turnover rate may indicate higher transaction costs and may result in higher taxes when fund shares are held in a taxable account. These costs, which are not reflected in annual operating expenses or in the example, affect the fund's performance. During the most recent fiscal year, the fund's portfolio turnover rate was 256 % of the average value of its portfolio. Principal Investment Strategies Normally investing primarily in income producing securities of all types. Allocating the fund's assets among equity and debt securities, including common and preferred stock, investment-grade debt securities, lower-quality debt securities (those of less than investment-grade quality, also referred to as high yield debt securities or junk bonds), floating rate securities, and convertible securities. Investing in domestic and foreign issuers. Allocating assets across different market sectors and maturities. Analyzing a security's structural features and current pricing, its issuer's potential for success, and the credit, currency, and economic risks of the security and its issuer to select investments. Adjusting allocation among asset classes to take advantage of short-term market opportunities and strategic, longer-term opportunities. Principal Investment Risks Asset Allocation Risk. If the fund's asset allocation strategy does not work as intended, the fund may not achieve its objective. Stock Market Volatility. Stock markets are volatile and can decline significantly in response to adverse issuer, political, regulatory, market, or economic developments. Different parts of the market, including different market sectors, and different types of securities can react differently to these developments. Floating Rate Loans. A floating rate loan may not be fully collateralized which may cause the floating rate loan to decline significantly in value. Floating rate loans generally are subject to restrictions on resale. Floating rate loans sometimes trade infrequently in the secondary market. As a result, valuing a floating rate loan can be more difficult, and buying and selling a floating rate loan at an acceptable price can be more difficult or delayed, including extended trade settlement periods. Difficulty in selling a floating rate loan can result in a loss. Interest Rate Changes. Interest rate increases can cause the price of a debt security to decrease. Foreign Exposure. Foreign markets, particularly emerging markets, can be more volatile than the U.S. market due to increased risks of adverse issuer, political, regulatory, market, or economic developments and can perform differently from the U.S. market. The extent of economic development; political stability; market depth, infrastructure, and capitalization; and regulatory oversight can be less than in more developed markets. Emerging markets typically have less established legal, accounting and financial reporting systems than those in more developed markets, which may reduce the scope or quality of financial information available to investors. Emerging markets can be subject to greater social, economic, regulatory, and political uncertainties and can be extremely volatile. Foreign exchange rates also can be extremely volatile. Prepayment. The ability of an issuer of a debt security to repay principal prior to a security's maturity can cause greater price volatility if interest rates change and can limit the potential for gains when the credit quality of the issuer improves. Issuer-Specific Changes. The value of an individual security or particular type of security can be more volatile than, and can perform differently from, the market as a whole. A decline in the credit quality of an issuer or a provider of credit support or a maturity-shortening structure for a security can cause the price of a security to decrease. Lower-quality debt securities (those of less than investment-grade quality, also referred to as high yield debt securities or junk bonds), including floating rate loans, and certain types of other securities involve greater risk of default or price changes due to changes in the credit quality of the issuer. The value of lower-quality debt securities, including floating rate loans, and certain types of other securities can be more volatile due to increased sensitivity to adverse issuer, political, regulatory, market, or economic developments and can be difficult to resell. High Portfolio Turnover. High portfolio turnover (more than 100%) may result in increased transaction costs and potentially higher capital gains or losses. The effects of higher than normal portfolio turnover may adversely affect the fund's performance. An investment in the fund is not a deposit of a bank and is not insured or guaranteed by the Federal Deposit Insurance Corporation or any other government agency . You could lose money by investing in the fund. Unlike individual debt securities, which typically pay principal at maturity, the value of an investment in the fund will fluctuate. Performance The following information is intended to help you understand the risks of investing in the fund. The information illustrates the changes in the performance of the fund's shares from year to year and compares the performance of the fund's shares to the performance of a securities market index and a hypothetical composite of market indexes over various periods of time. Although the indexes have characteristics relevant to the fund's investment strategies, the fund's composite index provides information that may be helpful in understanding the fund's risk profile, and does not necessarily reflect how the fund will implement its investment strategy. Index descriptions appear in the "Additional Index Information" section of the prospectus. Past performance (before and after taxes) is not an indication of future performance. Visit www.fidelity.com for more recent performance information. Year-by-Year Returns 2019 2020 2021 2022 23.14 % 16.55 % 17.80 % - 12.83 % During the periods shown in the chart: Returns Quarter ended Highest Quarter Return 11.14 % June 30, 2020 Lowest Quarter Return - 13.88 % June 30, 2022 Average Annual Returns After-tax returns are calculated using the historical highest individual federal marginal income tax rates, but do not reflect the impact of state or local taxes. Actual after-tax returns may differ depending on your individual circumstances. The after-tax returns shown are not relevant if you hold your shares in a retirement account or in another tax-deferred arrangement, such as an employee benefit plan (profit sharing, 401(k), or 403(b) plan). Return After Taxes on Distributions and Sale of Fund Shares may be higher than other returns for the same period due to a tax benefit of realizing a capital loss upon the sale of fund shares. For the periods ended December 31, 2022 Past 1 year Life of class A Fidelity® Multi-Asset Income Fund Return Before Taxes - 12.83 % 8.55 % Return After Taxes on Distributions - 14.16 % 7.27 % Return After Taxes on Distributions and Sale of Fund Shares - 7.32 % 6.29 % Bloomberg U.S. Aggregate Bond Index (reflects no deduction for fees, expenses, or taxes) - 13.01 % 0.38 % S&P 500®/Bloomberg U.S. Aggregate Bond 50/50 Index (reflects no deduction for fees, expenses, or taxes) - 15.26 % 5.68 % A From March 28, 2018 . Investment Adviser Fidelity Management & Research Company LLC (FMR) (the Adviser) is the fund's manager. Other investment advisers serve as sub-advisers for the fund. Portfolio Manager(s) Adam Kramer (Lead Portfolio Manager) has managed the fund since 2015. Ford O'Neil (Co-Portfolio Manager) has managed the fund since 2015. Ramona Persaud (Co-Portfolio Manager) has managed the fund since 2017. Purchase and Sale of Shares You may buy or sell 
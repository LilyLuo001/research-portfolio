the cost of investing in other mutual funds. Please see below a hypothetical example showing the expenses of a $10,000 investment for the time periods indicated and then, except as shown below, assuming you sell all of your shares at the end of those periods. The example assumes a 5% average annual return and that fund expenses will not change over the periods. Although your actual costs may be higher or lower, based on these assumptions, your costs would be: 1 Table of Contents Expenses ($) A B C I R1 R2 R3 R4 R5 R6 Sold Not Sold Sold Not Sold 1 year 633 712 212 312 212 110 177 152 167 126 106 101 3 years 917 955 655 655 655 346 548 471 517 415 331 315 5 years 1,222 1,324 1,124 1,124 1,124 600 944 813 892 725 574 547 10 years 2,084 2,242 2,242 2,421 2,421 1,328 2,052 1,779 1,944 1,604 1,271 1,213 Portfolio turnover The fund, which operates as a fund of funds and invests in underlying funds, does not pay transaction costs, such as commissions, when it buys and sells shares of underlying funds (or "turns over" its portfolio). An underlying fund does pay transaction costs when it turns over its portfolio, and a higher portfolio turnover rate may indicate higher transaction costs. A higher portfolio turnover rate may result in higher taxes when fund shares are held in a taxable account. These costs, which are not reflected in annual fund operating expenses or in the example, affect the performance of the underlying funds and of the fund. During its most recent fiscal year, the fund's portfolio turnover rate was 22% of the average value of its portfolio. Principal investment strategies The fund operates as a fund of funds and, except as otherwise described below, normally invests approximately 100% of its assets in underlying funds that invest primarily in equity securities. Variations in the target percentage allocation between underlying funds that invest primarily in equity securities and underlying funds that invest primarily in fixed-income securities are permitted up to 10%. Thus, based on its target percentage allocation of approximately 100% of assets in equity underlying funds, the fund may have an equity/fixed-income underlying fund allocation of 90%/10%. Although variations beyond the 10% range are generally not permitted, the manager may determine, in light of market or economic conditions, that the normal percentage limitations should be exceeded to protect the fund or to achieve its goal. The fund may invest in various actively managed underlying funds that, as a group, hold a wide range of equity-type securities. The fund may also invest in various passively managed underlying funds. Equity-type securities include small-, mid-, and large-capitalization stocks; domestic and foreign securities (including emerging-market securities); and sector holdings. Each of these underlying funds has its own investment strategy that, for example, may focus on growth stocks or value stocks or may employ a strategy combining growth and income stocks and/or may invest in derivatives, such as options on securities and futures contracts. The fund may also invest in various underlying funds that invest in alternative and specialty asset classes. The fund may invest in affiliated and nonaffiliated investment companies. In addition to investing in exchange-traded funds (ETFs), the fund may also invest in U.S. government securities and derivatives, such as credit default swaps and options on equity index futures, interest-rate swaps, and foreign currency forward contracts, in each case for the purposes of reducing risk, obtaining efficient market exposure, and/or enhancing investment returns. The fund may also directly invest in exchange-traded notes (ETNs). The fund is also authorized to use various other investment strategies such as investing directly in fixed-income and equity securities, closed-end funds, and partnerships, and short-selling securities. Principal risks An investment in the fund is not a bank deposit and is not insured or guaranteed by the Federal Deposit Insurance Corporation or any other government agency. Many factors affect performance, and fund shares will fluctuate in price, meaning you could lose money. The fund's investment strategy may not produce the intended results. During periods of heightened market volatility or reduced liquidity, governments, their agencies, or other regulatory bodies, both within the United States and abroad, may take steps to intervene. These actions, which could include legislative, regulatory, or economic initiatives, might have unforeseeable consequences and could adversely affect the fund's performance or otherwise constrain the fund's ability to achieve its investment objective. Because this fund has a greater exposure to underlying funds that invest primarily in equity securities than John Hancock Multimanager Lifestyle Portfolios with greater target allocations to underlying funds that invest primarily in fixed-income securities, equity security risks are more prevalent in this fund than in other Multimanager Lifestyle Portfolios. In addition to equity securities risk, the fund's other main risks are listed below in alphabetical order. Before investing, be sure to read the additional descriptions of these risks beginning on page 32 of the prospectus. Principal risks of investing in the fund of funds Commodity risk. Commodity prices may be volatile due to fluctuating demand, supply disruption, speculation, and other factors. Certain commodity investments may have no active trading market at times. Credit and counterparty risk. The issuer or guarantor of a fixed-income security, the counterparty to an over-the-counter derivatives contract, or a borrower of fund securities may not make timely payments or otherwise honor its obligations. U.S. government securities are subject to varying degrees of credit risk depending upon the nature of their support. A downgrade or default affecting any of the fund's securities could affect the fund's performance.

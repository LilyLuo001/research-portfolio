      N-14 1 d884166dn14.htm COLUMBIA ACORN TRUST Columbia Acorn Trust Table of Contents As filed with the Securities and Exchange Commission on February 28, 2020 Securities Act File No. 333-[ ] UNITED STATES SECURITIES AND EXCHANGE COMMISSION Washington, DC 20549 FORM N-14 REGISTRATION STATEMENT UNDER THE SECURITIES ACT OF 1933 ☒ Pre-Effective Amendment No. ☐ Post-Effective Amendment No. ☐ COLUMBIA ACORN TRUST (Exact Name of Registrant as Specified in Charter) 27 West Monroe Street, Suite 3000 Chicago, Illinois 60606 Telephone number: 312.634.9200 Ryan C. Larrenaga, Esq. c/o Columbia Management Investment Advisers, LLC 225 Franklin Street Boston, Massachusetts 02110 Matthew A. Litfin Louis J. Mendes Columbia Acorn Trust 71 S. Wacker, 25 th Floor Chicago, Illinois 60606 Mary C. Moynihan Perkins Coie LLP 700 13th Street, N.W., Suite 600 Washington, D.C. 20005 (Name and Address of Agents for Service) TITLE OF SECURITIES BEING REGISTERED: Class A, Class Adv, Class C, Class Inst, Class Inst2 and Class Inst3 shares of Columbia Acorn International Select, a series of the Registrant. Approximate Date of Proposed Public Offering: As soon as practicable after the effective date of this Registration Statement. No filing fee is required because an indefinite number of shares have previously been registered pursuant to Rule 24f-2 under the Investment Company Act of 1940. It is proposed that this filing will become effective on March 30, 2020 pursuant to Rule 488 under the Securities Act of 1933, as amended. Table of Contents Columbia Funds Series Trust Columbia Select International Equity Fund COMBINED PROXY STATEMENT/PROSPECTUS [•], 2020 Columbia Management Investment Advisers, LLC (“Columbia Threadneedle”) and Columbia Wanger Asset Management, LLC (“Columbia Wanger” and together the “Investment Managers” and each, an “Investment Manager”) have recommended a series of mutual fund liquidations and reorganizations as part of an initiative to streamline the product offerings of the mutual funds managed by the Investment Managers or their affiliates (the “Columbia Funds”). As part of this initiative, the board of trustees of Columbia Select International Equity Fund, a series of Columbia Funds Series Trust (the “Target Fund”), has approved a proposal (the “Proposal”) to reorganize the Target Fund into Columbia Acorn International Select, a series of Columbia Acorn Trust (the “Acquiring Fund”). This is a brief overview of the Proposal. We encourage you to read the full text of the enclosed Combined Proxy Statement/Prospectus to obtain detailed information with respect to the Proposal. Q: Why are you sending me this information? The Target Fund is required to obtain shareholder approval for certain kinds of changes, like the Proposal in the enclosed Combined Proxy Statement/Prospectus. As a shareholder of the Target Fund, you are being asked to vote on the reorganization involving the Target Fund (the “Reorganization”). Q: Is my vote important? Yes. While the board of trustees of the Target Fund (the “Target Fund Board”) has approved the Proposal and recommends that you approve it, the Proposal cannot go forward without the approval of shareholders of the Target Fund. The Target Fund will continue to contact shareholders asking them to vote until it is sure that a quorum will be reached, and may continue to contact shareholders thereafter. Q: What is a fund reorganization? A fund reorganization involves one fund transferring all of its assets and liabilities to another fund in exchange for shares of such fund. Once completed, shareholders of the fund being reorganized will hold shares of the acquiring fund. Q: Why is the Reorganization being proposed? The Investment Managers proposed the Reorganization primarily in order to streamline the product offerings of the Columbia Funds, so that management, distribution and other resources can be focused more effectively on a smaller group of Columbia Funds. Further, the Reorganization of the Target Fund into the Acquiring Fund will enable shareholders of the Target Fund to invest in a larger, potentially more efficient portfolio while continuing to pursue a similar investment objective. As noted below, it is expected that following the proposed Reorganization, the expenses borne by Target Fund shareholders as shareholders of the Acquiring Fund would generally be lower than the expenses they currently bear as shareholders of the Target Fund. Q: Will the portfolio manager or investment manager of my fund change as a result of the Reorganization? Yes. The investment manager and portfolio managers of the Acquiring Fund are different than the investment manager and portfolio managers for the Target Fund. Columbia Threadneedle is the investment manager of the Target Fund and Columbia Wanger, an affiliate of Columbia Threadneedle, is the investment manager of the Acquiring Fund. The portfolio managers of the Acquiring Fund and Columbia Wanger will continue to manage the Acquiring Fund following the Reorganization. Table of Contents Q: Will there be any changes to the options or services associated with my account as a result of the Reorganization? No. Account-level features and options such as dividend distributions, dividend diversification, automatic investment plans, systematic withdrawals and dollar cost averaging currently set up with the Target Fund for your account will automatically carry over to your account in the Acquiring Fund. If you purchase shares through a broker-dealer or other financial intermediary, please contact your financial intermediary for additional details. Q: Are there costs of the Reorganization? You will not pay any sales charges in connection with the acquisition of shares of the Acquiring Fund issued in the Reorganization. Reorganization costs will be allocated to the Funds as described in the Combined Proxy Statement/Prospectus, but will be limited to an amount that is not more than the anticipated reduction in expenses borne by a Fund’s shareholders during the first year following the Reorganization. Any amounts in excess of this limit will be borne by the Investment Managers. Reorganization costs do not include repositioning costs arising from sales of portfolio assets by the Target Fund before the Reorganization, which will be borne by the Target Fund. Repositioning costs are described in more detail in the section of the Combined Proxy Statement/Prospectus entitled “Section A – Information on the Proposed Reorganization – Synopsis of the Proposal – Comparison of Fees and Expenses – Portfolio Turnover.” Q: What are the U.S. federal income tax consequences of the Reorganization? The Reorganization is expected to qualify as a tax-free reorganization for U.S. federal income tax purposes. Accordingly, it is expected that Target Fund shareholders will not, and the Target Fund generally will not, recognize gain or loss as a direct result of the Reorganization, as described in more detail in the section of the Combined Proxy Statement/Prospectus entitled “Section A – Information on the Proposed Reorganization – Additional Information About the Reorganization – U.S. Federal Income Tax Status of the Reorganization.” A significant portion of the portfolio assets of the Target Fund is expected to be sold by the Target Fund prior to the Reorganization. All such sales will cause the Target Fund to incur transaction costs and are expected to result in an increased taxable distribution to shareholders of the Target Fund. Additionally, because the Reorganization will end the tax year of the Target Fund, it will accelerate distributions to shareholders from the Target Fund for its tax year ending on the date of the Reorganization. Those tax year-end distributions will be taxable, and will include any distributable, but not previously distributed, income and capital gains resulting from portfolio turnover prior to consummation of the Reorganization. Q: Will there be any changes to my fees and expenses as a result of the Reorganization? It is expected that, following the proposed Reorganization, the expenses borne by Target Fund shareholders as shareholders of the Acquiring Fund will generally be lower than the expenses they currently bear, net of fee waivers and/or expense reimbursements. See the Combined Proxy Statement/Prospectus under “Section A – Information on the Proposed Reorganization – Synopsis – Comparison of Fees and Expenses.” Q: If approved, when will the Reorganization happen? The Reorganization will take place following shareholder approval of the Reorganization, and is scheduled to close in the third quarter of 2020. Q: How does the Board recommend that I vote? After careful consideration, the Target Fund Board recommends that you vote FOR the Proposal. Q: How can I vote? You can vote in one of four ways: • By telephone (call the toll free number listed on your proxy card) • By Internet (log on to the Internet site listed on your proxy card) ii Table of Contents • By mail (using the enclosed postage prepaid envelope) • In person at the special shareholder meeting scheduled to occur at 225 Franklin Street, Boston, MA (31 st Floor, Room 3100) on July 1, 2020 The deadline for voting by telephone or Internet is 11:59 P.M. E.T. on [•], 2020. We encourage you to vote as soon as possible to avoid the cost of additional solicitation efforts. Please refer to the enclosed proxy card for instructions for voting by telephone, Internet or mail. Q: Will I be notified of the results of the vote? The final voting results for the Proposal will be included in the Target Fund’s next report to shareholders following the special shareholder meeting. Q: Whom should I call if I have questions? If you have questions about the Proposal described in the Combined Proxy Statement/Prospectus or about voting procedures, please call the Target Fund’s proxy solicitor, Computershare Fund Services, toll free at (866) 456-7935. Shareholders of the Target Fund may also call (800) 345-6611 to request, at no charge, a copy of the Target Fund’s annual or semi-annual report to shareholders. iii Table of Contents NOTICE OF A SPECIAL MEETING OF SHAREHOLDERS Columbia Funds Series Trust Columbia Select International Equity Fund To be held July 1, 2020 A special meeting of shareholders (the “Meeting”) of Columbia Select International Equity Fund (the “Target Fund”) will be held at 10:00 A.M. E.T. on July 1, 2020, at 225 Franklin Street, Boston, Massachusetts (31 st Floor, Room 3100). At the Meeting, shareholders will consider the following proposal (the “Proposal”), with respect to the Target Fund: To approve the Agreement and Plan of Reorganization (the “Agreement”) by and among Columbia Funds Series Trust, on behalf of its series Columbia Select International Equity Fund (the “Target Fund”), Columbia Acorn Trust, on behalf of its series Columbia Acorn International Select (the “Acquiring Fund”), Columbia Management Investment Advisers, LLC, the investment manager of the Target Fund, and Columbia Wanger Asset Management, LLC, the investment manager of the Acquiring Fund, pursuant to which the Target Fund will transfer that portion of its assets attributable to each class of its shares (in aggregate, all of its assets) to the Acquiring Fund, in exchange for shares of a corresponding class of shares of the Acquiring Fund and the assumption by the Acquiring Fund of all of the liabilities of the Target Fund. Shareholders of the Target Fund will be asked to vote on the Proposal, and to transact such other business as may properly come before the Meeting. Please carefully read the enclosed Combined Proxy Statement/Prospectus, which discusses the Proposal in more detail. If you were a shareholder of the Target Fund as of the close of business on [•], 2020, you may vote at the Meeting or at any adjournment or postponement of the Meeting. You are welcome to attend the Meeting in person. If you cannot attend in person, please vote by mail, telephone or internet by following the instructions on the enclosed proxy card. If you have questions, please call the Target Fund’s proxy solicitor toll free at (800) 708-7953. It is important that you vote. The Board of Trustees of the Target Fund recommends that you vote FOR the Proposal. By order of the Board of Trustees Ryan C. Larrenaga, Secretary [•], 2020 Table of Contents The information contained in this Combined Proxy Statement/Prospectus is not complete and may be changed. We may not sell these securities until the registration statement filed with the Securities and Exchange Commission is effective. This Combined Proxy Statement/Prospectus is not an offer to sell these securities, and it is not soliciting an offer to buy these securities, in any jurisdiction where the offer or sale is not permitted. SUBJECT TO COMPLETION, DATED FEBRUARY 28, 2020 Columbia Funds Series Trust Columbia Select International Equity Fund COMBINED PROXY STATEMENT/PROSPECTUS Dated [•], 2020 This document is a proxy statement for Columbia Select International Equity Fund, a series of Columbia Funds Series Trust (the “Target Fund”) and a prospectus for Columbia Acorn International Select, a series of Columbia Acorn Trust (the “Acquiring Fund”). The mailing address and telephone number of the Target Fund and the Acquiring Fund is c/o Columbia Management Investment Services Corp., P.O. Box 219104, Kansas City, MO 64121-9104 and 800-345-6611. This Combined Proxy Statement/Prospectus and the enclosed proxy card were first mailed to shareholders of the Target Fund beginning on or about [•], 2020. This Combined Proxy Statement/Prospectus contains information you should know before voting on the following proposal (the “Proposal”) with respect to the Target Fund. You should read this document carefully and retain it for future reference. The board of trustees of the Target Fund (the “Target Fund Board”) is soliciting proxies from shareholders of the Target Fund for a joint special meeting of shareholders (the “Meeting”). Pr

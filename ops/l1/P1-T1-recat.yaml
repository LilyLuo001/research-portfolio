 operating expenses or in the example, affect the fund’s performance. Principal Investment Strategies • Allocating investments across different market sectors, countries (U.S. and non‑U.S.), and regions, including emerging markets. Emerging markets include countries that have an emerging stock market as defined by MSCI, countries or markets with low‑ to middle-income economies as classified by the World Bank, and other countries or markets that the Adviser identifies as having similar emerging markets characteristics. • Allocating the fund’s assets among affiliated and unaffiliated mutual funds and exchange-traded funds (collectively, underlying funds) and derivatives that provide exposure to equity, debt, currency, and commodities markets. • Using fundamental analysis to evaluate macroeconomic themes based on secular trends, business cycles and market regimes, and to invest the fund in assets that offer an attractive risk/return profile in the context of those themes. • Using proprietary portfolio construction methodologies to express views on major asset allocation dimensions. • Investing in underlying funds, derivatives, cash and cash equivalents. • Engaging in transactions that have a leveraging effect on the fund, including long and short investments in derivatives – such as forward contracts, futures, options and swaps – and forward-settling securities, to: create and adjust the fund’s investment exposure; enhance total return; hedge against fluctuations in securities prices, Prospectus 4 interest rates, or currency exchange rates; change the effective duration of the fund’s portfolio; manage certain investment risk; manage volatility; and/or substitute for the purchase or sale of securities or currencies. • Investing up to 25% of assets in a wholly-owned subsidiary organized under the laws of the Cayman Islands that invests in commodity-linked total return swaps based on the value of commodities or commodities indexes and in other commodity-linked derivative instruments, commodity-related ETFs and commodity-related exchange-traded notes (ETNs). Principal Investment Risks • Asset Allocation Risk. The fund is subject to risks resulting from the Adviser’s asset allocation decisions. The selection of underlying funds and the allocation of the fund’s assets among various asset classes could cause the fund to lose value or its results to lag relevant benchmarks or other funds with similar objectives. • Investing in Other Funds. Regulatory restrictions may limit the amount that one fund can invest in another, which means that the fund’s manager may not be able to invest as much as it wants to in some other funds. The fund bears all risks of investment strategies employed by the underlying funds, including the risk that the underlying funds will not meet their investment objectives. Underlying funds that are passively managed attempt to track the performance of an unmanaged index of securities and as such their performance could be lower than actively managed funds, which may shift their portfolio assets to take advantage of market opportunities or lessen the impact of a market decline. In addition, errors in the construction of the index tracked by an underlying passively managed fund may have an adverse impact on the performance of such underlying fund. • Investing in ETFs and ETNs. ETFs and ETNs may trade in the secondary market at prices below the value of their underlying portfolios and may not be liquid. ETFs that track an index are subject to tracking error and may be unable to sell poorly performing assets that are included in their index or other benchmark. ETNs are subject to the risks associated with debt securities, including counterparty risk of the issuer. • Interest Rate Changes. Interest rate increases can cause the price of a debt security to decrease. • Correlation Risk. The fund’s investment strategy seeks to balance risk across multiple asset classes and, within each asset class, across different countries and investments. To the extent the asset classes or the selected countries and investments become correlated in a way not anticipated by the Adviser, the fund’s risk allocation process may result in magnified risks and loss instead of reducing the risk of loss. • Stock Market Volatility. Stock markets are volatile and can decline significantly in response to adverse issuer, political, regulatory, market, or economic developments. Different parts of the market, including different 5 Prospectus Fund Summary – continued market sectors, and different types of securities can react differently to these developments. • Leverage Risk. Leverage can increase market exposure, magnify investment risks, and cause losses to be realized more quickly. The fund’s use of futures, forwards, options, swaps, and other derivative instruments may result in losses. The value of these derivative instruments may pose risks in addition to and greater than those associated with investing directly in securities, currencies or other instruments and may be illiquid or less liquid, volatile, difficult to price and leveraged so that small changes in the value of underlying instruments may produce disproportionate losses to the fund. The use of derivatives is a highly specialized activity that involves investment techniques and risks different from those associated with investments in more traditional securities and instruments. Moreover, a relatively small price movement in a derivative contract may result in substantial losses to the fund, exceeding the amount of the margin paid. The use of derivatives can increase the fund’s risk exposure to underlying assets and their attendant risks, while also exposing the fund to the risk of mispricing or other improper valuation and the risk that changes in the value of a derivative may not correlate as anticipated with the underlying asset, rate, index or overall securities markets, thereby reducing their effectiveness. • Commodity-Linked Investing. The value of commodities and commodity-linked investments may be affected by the performance of the overall commodities markets as well as weather, political, tax, and other regulatory and market developments. Commodity-linked investments may be more volatile and less liquid than the underlying commodity, instruments, or measures. • Commodity Futures. Investments in commodity futures contracts are also subject to the risk of the failure of any of the exchanges on which the fund’s positions trade or of its clearinghouses or counterparties. In addition, certain commodity exchanges limit fluctuations in certain futures contract prices during a single day by regulations referred to as “daily price fluctuation limits” or “daily limits.” Under such daily limits, during a single trading day no trades may be executed at prices beyond the daily limit. If triggered, these limits could prevent the fund from liquidating unfavorable positions and subject the fund to losses or prevent it from entering into desired trades during the particular trading day. • Foreign and Emerging Markets Risk. Foreign markets, particularly emerging markets, can be more volatile than the U.S. market due to increased risks of adverse issuer, political, regulatory, market, or economic developments and can perform differently from the U.S. market. The extent of economic development; political stability; market depth, infrastructure, and capitalization; and regulatory oversight can be less than in more developed markets. Emerging markets typically have less established legal, accounting and financial reporting systems than those in more developed markets, which may reduce the scope or quality of financial Prospectus 6 information available to investors. Emerging markets can be subject to greater social, economic, regulatory, and political uncertainties and can be extremely volatile. Foreign exchange rates also can be extremely volatile . • Currency Exposure. Because the fund is normally exposed to foreign currencies,

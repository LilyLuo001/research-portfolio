y the World Bank, and other countries or markets that the Adviser identifies as having similar emerging markets characteristics. • Allocating the fund’s assets among affiliated and unaffiliated mutual funds and exchange-traded funds (collectively, underlying funds) and derivatives that provide exposure to equity, debt, currency, and commodities markets. • Using fundamental analysis to evaluate macroeconomic themes based on secular trends, business cycles and market regimes, and to invest the fund in assets that offer an attractive risk/return profile in the context of those themes. • Using proprietary portfolio construction methodologies to express views on major asset allocation dimensions. • Investing in underlying funds, derivatives, cash and cash equivalents. • Engaging in transactions that have a leveraging effect on the fund, including long and short investments in derivatives – such as forward contracts, futures, options and swaps – and forward-settling securities, to: create and adjust the fund’s investment exposure; enhance total return; hedge against fluctuations in securities prices, Prospectus 4 interest rates, or currency exchange rates; change the effective duration of the fund’s portfolio; manage certain investment risk; manage volatility; and/or substitute for the purchase or sale of securities or currencies. • Investing up to 25% of assets in a wholly-owned subsidiary organized under the laws of the Cayman Islands that invests in commodity-linked total return swaps based on the value of commodities or commodities indexes and in other commodity-linked derivative instruments. Principal Investment Risks • Asset Allocation Risk. The fund is subject to risks resulting from the Adviser’s asset allocation decisions. The selection of underlying funds and the allocation of the fund’s assets among various asset classes could cause the fund to lose value or its results to lag relevant benchmarks or other funds with similar objectives. • Investing in Other Funds. Regulatory restrictions may limit the amount that one fund can invest in another, which means that the fund’s manager may not be able to invest as much as it wants to in some other funds. The fund bears all risks of investment strategies employed by the underlying funds, including the risk that the underlying funds will not meet their investment objectives. Underlying funds that are passively managed attempt to track the performance of an unmanaged index of securities and as such their performance could be lower than actively managed funds, which may shift their portfolio assets to take advantage of market opportunities or lessen the impact of a market decline. In addition, errors in the construction of the index tracked by an underlying passively managed fund may have an adverse impact on the performance of such underlying fund. • Investing in ETFs. ETFs may trade in the secondary market at prices below the value of their underlying portfolios and may not be liquid. ETFs that track an index are subject to tracking error and may be unable to sell poorly performing assets that are included in their index or other benchmark. • Interest Rate Changes. Interest rate increases can cause the price of a debt security to decrease. • Correlation Risk. The fund’s investment strategy seeks to balance risk across multiple asset classes and, within each asset class, across different countries and investments. To the extent the asset classes or the selected countries and investments become correlated in a way not anticipated by the Adviser, the fund’s risk allocation process may result in magnified risks and loss instead of reducing the risk of loss. • Stock Market Volatility. Stock markets are volatile and can decline significantly in response to adverse issuer, political, regulatory, market, or economic developments. Different parts of the market, including different market sectors, and different types of securities can react differently to these developments. 5 Prospectus Fund Sum

uest that you continue to receive paper copies of your shareholder reports. If you invest directly with the Fund, you can call 877-DLINE11 (877-354-6311) or send an email request to fundinfo@doubleline. com to let the Fund know you wish to continue receiving paper copies of your shareholder reports. Your election to receive reports in paper will apply to all funds held in your account if you invest through your financial intermediary or all funds held with the fund complex if you invest directly with the Fund. Table of Contents TABLE OF CONTENTS Fund Summary DoubleLine Emerging Markets Local Currency Bond Fund 2 Additional Information About Principal Investment Strategies and Principal Risks 22 Investment Objective 22 Principal Investment Strategies 22 Principal Risks 27 Temporary Defensive Strategies 72 Portfolio Holdings Information 72 Management of the Fund 74 Investment Adviser 74 Portfolio Managers 74 Advisory Agreement 76 Additional Information 78 Share Class Features 78 Types of Shares Available 78 Expenses 79 Choosing a Share Class 79 How to Buy Shares 81 General Information 81 Distribution and Rule 12b-1 Fees (Class N Shares Only); Other Distribution-Related Payments to Financial Intermediaries 82 Payments to Financial Intermediaries for Shareholder Services 83 Calculation of NAV 84 Verification of Identity 87 Minimum Investments for Shares 88 New Account Application 88 Purchase by Mail 89 Purchase by Telephone 90 Purchase by Internet 90 Purchase by Wire 90 Automatic Investment Plan 91 Purchases Through an Authorized Third Party 92 How to Redeem Shares 92 General Information 92 Redemptions by Mail 94 Signature Guarantees 95 Redemptions by Telephone 95 Redemptions by Internet 96 Systematic Withdrawal Plan 97 Redemptions Through Your Financial Intermediary or Other Authorized Third Party 97 Other Account Policies 98 Trading Limits 98 Trading Limit Policies 99 Additional Trading Limit Policies 99 Exchange Privilege 100 Conversion of Shares Between Classes 101 
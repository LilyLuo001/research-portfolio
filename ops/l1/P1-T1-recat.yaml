      497K 1 grizzle-497k_080823.htm SUMMARY PROSPECTUS Grizzle Growth ETF Trading Symbol: DARP Listed on NYSE Arca, Inc Summary Prospectus August 7, 2023 www.etf.grizzle.com Before you invest, you may want to review the Grizzle Growth ETF (the “Fund”) statutory prospectus and statement of additional information, which contain more information about the Fund and its risks. The current statutory prospectus and statement of additional information dated August 7, 2023 are incorporated by reference into this Summary Prospectus. You can find the Fund’s statutory prospectus, statement of additional information, reports to shareholders, and other information about the Fund online at www.etf.grizzle.com,. You can also get this information at no cost by calling at 1-800-617-0004 or by sending an e-mail request to invest@etf.grizzle.com. Grizzle Growth ETF - FUND SUMMARY Investment Objective The Grizzle Growth ETF (the “Fund”) seeks capital appreciation. Fees and Expenses of the Fund This table describes the fees and expenses that you may pay if you buy, hold, and sell shares of the Fund (“Shares”). You may pay other fees, such as brokerage commissions and other fees to financial intermediaries, which are not reflected in the table and Example below. Annual Fund Operating Expenses (1) (expenses that you pay each year as a percentage of the value of your investment) (1) Management Fees 0.75% Distribution and Service (12b-1) Fees 0.00% Other Expenses 0.00% Total Annual Fund Operating Expenses 0.75% (1) The Fund’s adviser will pay, or require a sub-adviser to pay, all expenses incurred by the Fund (except for advisory fees and sub-advisory fees, as the case may be) excluding interest charges on any borrowings made for investment purposes, dividends and other expenses on securities sold short, taxes, brokerage commissions and other expenses incurred in placing orders for the purchase and sale of securities and other investment instruments, acquired fund fees and expenses, accrued deferred tax liability, distribution fees and expenses paid by the Fund under any distribution plan adopted pursuant to Rule 12b-1 under the 1940 Act, and litigation expenses, and other non-routine or extraordinary expenses. Expense Example This Example is intended to help you compare the cost of investing in the Fund with the cost of investing in other funds. The Example assumes that you invest $10,000 in the Fund for the time periods indicated and then redeem or hold all of your Shares at the end of those periods. The Example also assumes that your investment has a 5% return each year and that the Fund’s operating expenses remain the same. The Example does not take into account brokerage commissions that you may pay on your purchases and sales of Shares. Although your actual costs may be higher or lower, based on these assumptions your costs would be: 1 Year 3 Years 5 Years 10 Years $77 $240 $417 $930 Portfolio Turnover The Fund pays transaction costs, such as commissions, when it buys and sells securities (or “turns over” its portfolio). A higher portfolio turnover rate may indicate higher transaction costs and may result in higher taxes when Shares are held in a taxable account. These costs, which are not reflected in the total annual fund operating expenses or in the Example, affect the Fund’s performance. During the most recent fiscal period from December 16, 2021 to July 31, 2022, the Target Fund’s (defined below) portfolio turnover rate was 102% of the average value of its portfolio. 1 Principal Investment Strategies The Fund is an actively managed exchange-traded fund (“ETF”) that invests primarily in equity securities of companies, with a focus on growth, innovation and disruption. The Fund seeks to identify future leaders in the following overarching key growth themes including, but not limited to: Digitization and Cloud Computing, Future Media and Entertainment, Health and Wellness, and Sustainability and Energy Transition. Within these preceding four themes the Fund seeks to invest in the following subsectors including, but not limited to: Sector/Industry Theme Description Automobile Manufacturers Electronic Vehicles Companies in the business of creating electrified vehicles (including hybrid vehicles) and vehicles that run using other renewable sources of energy Cannabis Cannabis Companies that cultivate, distribute and sell cannabis products; Companies that research medical uses for cannabis and create medical formulations of cannabis Casinos and Gaming Online Gambling Companies that provide online or brick and mortar platforms for placing wagers on sporting events Communication Services Media and Streaming Services Companies in the business of creating unique media content and/or devices to stream content into homes Energy Energy and Energy Transition Companies engaged in drilling, producing, storing and transporting oil and/or natural gas Financial Services Future of Finance Companies creating novel lending and payment solutions and facilitating such transactions; Companies that are diversifying their offerings and helping investors access new, potentially high-growth investment areas, including cryptocurrency exchanges Healthcare Biotechnology and Novel Drug Research and Treatment (including medical psychedelics) Companies engaged in the genetic manipulation of microorganisms, the manufacturing of medicinal drugs and research and application of novel pharmaceutical formulations (including legally derived psychedelic medicines that bind to specific serotonin receptors and cause changes in perception and cognition in the pursuit of treating mental diseases such as PTSD and clinically resistant depression) Industrials Renewable Energy (Wind and Solar) Companies engaged in building solar power systems and other renewable energy systems ( e.g. , wind, solar and energy storage) Information Technology Software as a Service*, Microprocessors, Robotics, and Autonomous Technologies Companies that create software programs and computer hardware for corporations and individual consumers and companies that provide equipment, an interconnected system or subsystem of equipment or software that is used in the acquisition, storage, manipulation, management, movement, control, display, switching, interchange, transmission or reception of data or information Materials Green Technology Companies engaged in using new technology to create renewable materials Electric Metals** and Infrastructure Companies engaged in mining the raw materials that will support the growth in infrastructure and renewable energy ecosystems (e.g., solar panels, battery storage, wind turbines and hydrogen fuel cells) Media and Entertainment Esports/Gaming Companies engaged in video game publishing, creating interactive worlds and e-sports Packaged Foods and Meats Plant Based Foods Companies creating novel new food formulations, such as plant based meats and dairy * Software as a service is a method of software delivery and licensing in which software is accessed online via a subscription, rather than bought and installed on individual computers. ** Electric Metals are metals used in the manufacture of electric vehicles, renewable energy technologies, and other electronics. Grizzle Investment Management LLC (“Grizzle”), an investment sub-adviser to the Fund, uses proprietary internal fundamental research and analysis to identify companies well-positioned for growth within the targeted sectors. The Fund’s other sub-adviser, Cambria Investment Management, L.P., also provides Grizzle with fundamental research. Grizzle uses its research and fundamental analysis findings to determine the Fund’s industry allocations within each sector and to select individual securities within each industry. Grizzle uses a quantitative screening overlay to identify prospective companies in addition to deep fundamental analysis. The Fund’s portfolio is expected to consist of 30 to 60 equity securities, and may be comprised of common stock and depositary receipts of U.S. and foreign issuers of any market capitalization. The Fund’s exposure to foreign issuers may include issuers in both developed and emerging market countries. Emerging market countries are those countries with low- to middle-income economies as classified by the World Bank or included in any of the Morgan Stanley Capital International (“MSCI”) emerging markets indices. In addition, Grizzle may opportunistically invest in options to both enhance the Fund’s return and seek to provide downside risk protection for specific positions in the Fund’s portfolio. Grizzle uses proprietary valuation models and analysis of historical portfolio profit and loss information to identify favorable risk-managed option trading opportunities, including use of covered calls (selling calls on stock positions in the portfolio) and selling an option and buying another to bet on the direction of a stock while capping both the downside risk (i.e., risk of loss) and upside performance (i.e., limiting participation in any gain). 2 While the Fund’s sector exposure to sectors may vary over time, as of the date of this Prospectus, the Fund had significant exposure to companies in the Information Technology Sector. The Fund is considered to be non-diversified, which means that it may invest more of its assets in the securities of a single issuer or a smaller number of issuers than if it were a diversified fund. Principal Investment Risks The principal risks of investing in the Fund are summarized below. As with any investment, there is a risk that you could lose all or a portion of your investment in the Fund. Some or all of these risks may adversely affect the Fund’s net asset value per share (“NAV”), trading price, yield, total return and/or ability to meet its investment objective. For more information about the risks of investing in the Fund, see the section in the Fund’s Prospectus titled “Additional Information About the Fund Principal Risks of Investing in The Fund.” Each risk summarized below is considered a principal risk of investing in the Fund, regardless of the order in which it appears. Growth Investing Risk. Growth stocks can be volatile for several reasons. Since those companies usually invest a high portion of earnings in their businesses, they may lack the dividends of value stocks that can cushion stock prices in a falling market. The prices of growth stocks are based largely on projections of the issuer’s future earnings and revenues. If a company’s earnings or revenues fall short of expectations, its stock price may fall dramatically. N on-Diversification Risk. Because the Fund is non-diversified, it may invest a greater percentage of its assets in the securities of a single issuer or a smaller number of issuers than if it was a diversified fund. As a result, a decline in the value of an investment in a single issuer or a smaller number of issuers could cause the Fund’s overall value to decline to a greater degree than if the Fund held a more diversified portfolio. Style Risk . If at any time the market is not favoring the Fund’s growth investment style, the Fund’s gains may not be as big as, or its losses may be bigger than, those of other funds using different investment styles. Management Risk. The Fund is actively managed using proprietary investment strategies and processes. There can be no guarantee that Grizzle’s judgments about the attractiveness, value and potential appreciation of particular investments and strategies for the Fund will be correct or produce the desired results or that the Fund will achieve its investment objective. If Grizzle fails to accurately evaluate market risk or appropriately react to current and developing market conditions, the Fund’s share price may be adversely affected. Sector Risks. To the extent the Fund invests more heavily in particular sectors of the economy, its performance will be especially sensitive to developments that significantly affect those sectors. The Fund may invest a significant portion of its assets in the following sectors and, therefore, the performance of the Fund could be negatively impacted by events affecting each of these sectors. ● Automobile Sector. The Automobiles Industry can be highly cyclical, and companies in the industry may suffer periodic operating losses. The Automobiles Industry also can be significantly affected by labor relations and fluctuating component prices. Companies in the Automobiles Industry, particularly those engaged in the production of electric vehicles may be affected by the obsolescence of existing technology, short product cycles, falling prices and profits, competition from new market entrants and general economic conditions. While most of the major manufacturers are large, financially strong companies, many others are small and can be non-diversified in both product line and customer base. Additionally, developments in automotive technologies (e.g., autonomous vehicle technologies) may require significant capital expenditures that may not generate profits for several years, if any. Companies in the Automobiles Industry may be significantly subject to government policies and regulations regarding imports and exports of automotive products. Governmental policies affecting the Automobiles Industry, such as taxes, tariffs, duties, subsidies, and import and export restrictions on automotive products can influence industry profitability. In addition, such companies must comply with environmental laws and regulations, for which there may be severe consequences for non-compliance. Legislative or regulatory changes and increased government supervision also may affect companies in the Automobiles Industry. Autonomous and electric vehicle companies typically engage in significant amounts of spending on research and development, capital expenditures and mergers and acquisitions, and there is no guarantee that the products or services produced by these companies will be successful. Companies 

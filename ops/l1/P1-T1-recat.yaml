RATEGIES In addition to the principal investment strategies described in their respective Prospectuses, each Fund may invest the balance of its assets as described below. ROYCE SMALL-CAP FUND – in securities of companies with stock market capitalizations greater than that of the largest company in the Russell 2000® Index at the time of its most recent reconstitution and non-convertible preferred stocks and debt securities. ROYCE MICRO-CAP FUND – in securities of companies with stock market capitalizations greater than that of the largest company in the Russell Microcap® Index at the time of its most recent reconstitution and non-convertible preferred stocks and debt securities. ROYCE PREMIER FUND – in securities of companies with stock market capitalizations greater than that of the largest company in the Russell 2000® Index at the time of its most recent reconstitution, non-convertible preferred stocks and debt securities. ROYCE SMALL-CAP TOTAL RETURN FUND – in securities with stock market capitalizations greater than that of the largest company in the Russell 2000® Index at the time of its most recent reconstitution, non-dividend-paying common stocks and non-convertible securities. ROYCE SMALL-CAP OPPORTUNITY FUND – in securities of companies with stock market capitalizations greater than that of the largest company in the Russell 2000® Index at the time of its most recent reconstitution and non-convertible preferred stocks and debt securities. ROYCE SMALL-CAP SPECIAL EQUITY FUND – in common stocks and convertible securities of companies with market capitalizations greater than that of the largest company in the Russell 2000® Index at the time of its most recent reconstitution and non-convertible preferred stocks and debt securities. ROYCE SMALL-CAP VALUE FUND – in securities of companies with stock market capitalizations greater than that of the largest company in the Russell 2000® Index at the time of its most recent reconstitution and non-convertible preferred stocks and debt securities. ROYCE SMALLER-COMPANIES GROWTH FUND – in securities of companies with stock market capitalizations above $7.5 billion and non-convertible preferred stocks and debt securities. ROYCE DIVIDEND VALUE FUND – in securities with stock market capitalizations above $15 billion, non-dividend paying common stocks and non-convertible securities. ROYCE INTERNATIONAL PREMIER FUND – in securities of companies with stock market capitalizations below $1 billion and above $5 billion, U.S. equity securities, and non-convertible preferred stocks and debt securities. 3 INVESTMENT POLICIES AND LIMITATIONS The Funds’ investment objectives are set forth in the Prospectuses. The Funds’ fundamental investment policies, limitations and operating policies are listed below. A Fund’s fundamental investment policies cannot be changed without the approval of a “majority of the outstanding voting securities” (as defined in the 1940 Act) of that Fund. The remaining investment policies and limitations described in this SAI and the Funds’ investment objectives described in the Prospectuses are operating policies and may be changed by a majority vote of the Board of Trustees of the Trust (the “Board”) and without shareholder approval. However, shareholders will be notified prior to any material change to the operating policies of any Fund in which they beneficially own shares. Unless otherwise expressly noted, compliance with each Fund’s investment policies and limitations will be determined immediately after or at the time of that Fund’s acquisition of the security or relevant asset except for Fundamental Policy No. 4, which the Funds must comply with on a continuous basis. Accordingly, any subsequent change in values, net assets or other circumstances will not be considered in determining whether an investment complies with a Fund’s investment policies and limitations, except as it relates to Fundamental Policy No. 4. In the event the percentage of a Fund’s assets investe
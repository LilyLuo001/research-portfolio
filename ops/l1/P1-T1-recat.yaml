      N-14 1 d938780dn14.htm GREAT-WEST SMALL CAP VALUE N-14 Great-West Small Cap Value N-14 Table of Contents As filed with the Securities and Exchange Commission on July 13, 2020 File No. [ ] SECURITIES AND EXCHANGE COMMISSION Washington, D.C. 20549 FORM N-14 REGISTRATION STATEMENT UNDER THE SECURITIES ACT OF 1933 ( ) Pre-Effective Amendment No. ( ) Post-Effective Amendment No. GREAT-WEST FUNDS, INC. (Exact Name of Registrant as Specified in Charter) 8515 E. Orchard Road Greenwood Village, Colorado 80111 Registrant’s Telephone Number, including Area Code (866) 831-7129 Jonathan D. Kreider President and Chief Executive Officer Great-West Funds, Inc. 8515 E. Orchard Road Greenwood Village, Colorado 80111 (Address of Principal Executive Offices) Copy to: Ryan L. Logsdon Vice President, Counsel & Secretary Great-West Funds, Inc. 8515 E. Orchard Road Greenwood Village, Colorado 80111 Approximate date of proposed public offering: As soon as practicable after the effective date of this Registration Statement. TITLE OF SECURITIES BEING REGISTERED: Shares of Common Stock (par value $0.10 per share) of the Registrant. No filing fee is required because of reliance on Section 24(f) and an indefinite number of shares have previously been registered pursuant to Rule 24f-2 under the Investment Company Act of 1940. It is proposed this filing will become effective on August 14, 2020 pursuant to Rule 488. Table of Contents Dear Shareholder, We wish to provide you with important information concerning your investment in the Great-West Invesco Small Cap Value Fund (the “Target Fund”), a series of Great-West Funds, Inc. (“Great-West Funds”). The Board of Directors of Great-West Funds (the “Board”) has approved the reorganization of the Target Fund into the Great-West Small Cap Value Fund ( formerly Great-West Loomis Sayles Small Cap Value Fund) (the “Acquiring Fund”), also a series of Great-West Funds (the “Reorganization”). As a result, effective on or about October 23, 2020, shareholders of the Target Fund will become shareholders of the Acquiring Fund. The Target Fund and the Acquiring Fund (each a “Fund” or collectively the “Funds”) share a common investment adviser, Great-West Capital Management, LLC. The Target Fund’s investment objectives are identical, and its investment strategies and investment risks are substantially similar, to those of the Acquiring Fund. The Acquiring Fund’s current investment advisory fee is 0.71% of net assets, which is nine (9) basis points less than the Target Fund’s current investment advisory fee of 0.80% of net assets. Each share class of the Target Fund and Acquiring Fund has identical shareholder services fees (0.35% for Investor Class). Additionally, as of December 31, 2019, the Acquiring Fund has lower operating expenses than the Target Fund. As a result, shareholders of the Target Fund will pay a lower total expense ratio upon effectiveness of the Reorganization. The Reorganization is intended to be a tax-free reorganization for federal income tax purposes, and the closing of the Reorganization will be conditioned upon, among other things, receiving an opinion of counsel to the effect that the Reorganization will qualify as a tax-free reorganization for federal income tax purposes. As a result, it is anticipated that shareholders will not recognize any gain or loss as a direct result of this Reorganization. Detailed information about the Agreement and Plan of Reorganization (the “Agreement”) and the reasons for the Board’s approval of the Agreement are contained in the enclosed materials. NO ACTION ON YOUR PART IS REQUIRED TO EFFECT THE REORGANIZATION. You will automatically receive shares of the Acquiring Fund in exchange for your shares of the Target Fund on or about October 23, 2020. If you have any questions, please contact us at (866) 831-7129. If you have any questions after considering the enclosed materials, please call. Sincerely, Jonathan D. Kreider President & Chief Executive Officer Great-West Funds, Inc. Table of Contents Important Information for Great-West Invesco Small Cap Value Fund Shareholders The enclosed Information Statement/Prospectus describes the contemplated reorganization of the Great-West Invesco Small Cap Value Fund (the “Target Fund”), a series of Great-West Funds, Inc. (“Great-West Funds”), into the Great-West Small Cap Value Fund ( formerly Great-West Loomis Sayles Small Cap Value Fund) (the “Acquiring Fund”), also a series of Great-West Funds (the “Reorganization”). The Target Fund and the Acquiring Fund are collectively referred to herein as the “Funds” or individually as a “Fund.” Although we recommend that you read the complete Information Statement/Prospectus, for your convenience, we have provided the following brief overview of the Reorganization. Please refer to the more complete information about the Reorganization contained in the Information Statement/Prospectus. SHAREHOLDER APPROVAL IS NOT REQUIRED TO EFFECT THE REORGANIZATION. YOU ARE NOT ASKED TO RETURN A PROXY OR TO TAKE ANY OTHER ACTION AT THIS TIME. Q. Why am I receiving this Information Statement/Prospectus? A. You are receiving this Information Statement/Prospectus because you are invested in the Target Fund through an insurance company separate account for certain variable annuity contracts and variable life insurance policies, an individual retirement account, or a qualified retirement plan (collectively, “Permitted Accounts”). Q. What will happen on the effective date of the Reorganization? A. As of the close of business on the effective date of the Reorganization, investments in the Institutional Class and Investor Class shares of the Target Fund will automatically become investments in the corresponding Institutional Class or Investor Class shares of the Acquiring Fund. The total net asset value of the shares of the Acquiring Fund that you receive on the effective date will be equal to your investment in the Target Fund. You will not incur any fees or charges or any federal income tax liability as a direct result of the Reorganization. It is currently anticipated that the Reorganization will take effect on or about October 23, 2020. Q. Why has this Reorganization been proposed for the Target Fund? A. At meetings held on June 10-11, 2020, the Board of Directors of Great-West Funds (the “Board”) considered the Reorganization upon the recommendation of Great-West Capital Management, LLC (“GWCM”), both Funds’ investment adviser. GWCM believes the Reorganization will benefit the Target Fund and its shareholders by, among other things, allowing the reorganization of the Target Fund into a fund with identical investment objectives, substantially similar investment strategies and risks, similar performance, and a lower total expense ratio. The Board concluded the Reorganization is in the best interests of the Target Fund and its shareholders, and the Target Fund’s existing shareholders will not be diluted as a result of the Reorganization. In reaching this conclusion, the Board considered a number of factors, which are discussed in greater detail in the enclosed materials. Table of Contents Q. How do the fees and expenses compare? A. The Acquiring Fund’s current investment advisory fee is 0.71% of net assets, which is nine (9) basis points less than the Target Fund’s current investment advisory fee of 0.80% of net assets. Each share class of the Target Fund and Acquiring Fund has identical shareholder services fees (0.35% for Investor Class). Additionally, as of December 31, 2019, the Acquiring Fund has lower operating expenses ( i.e. , the “Other Expenses” listed in the fee table in the section entitled “Fees and Expenses” below) than the Target Fund. As a result, shareholders of the Target Fund will pay a lower total expense ratio when the Reorganization takes effect. For details on fees and expenses, please see the section entitled “Fees and Expenses” of the Information Statement/Prospectus. Q. Will you receive new shares in exchange for your current shares? A. Yes. As part of the Reorganization, you will receive shares of the corresponding class of the Acquiring Fund in an amount equal to the total net asset value of the Target Fund shares that you surrender in the Reorganization, determined in each case as of the close of trading on the effective date of the Reorganization. Q. Will I have to pay federal income taxes as a result of the Reorganization? A. No. The Reorganization is intended to qualify as a tax-free reorganization for federal income tax purposes. It is expected that shareholders of the Target Fund will recognize no gains or losses for federal income tax purposes as a direct result of the Reorganization. The section entitled “The Reorganization—Material Federal Income Tax Consequences” of the Information Statement/Prospectus provides additional information regarding the federal income tax consequences of the Reorganization. Q. Who will pay for the Reorganization? A. GWCM will bear all expenses of the Reorganization even if the Reorganization is not completed, including legal costs, audit fees, and printing and mailing expenses. GWCM estimates the costs of the Reorganization to be $45,510. Q. What is the timetable for the Reorganization? A. The Reorganization is expected to take effect at the close of business on October 23, 2020, or such other date as the officers of Great-West Funds reasonably determine. Q. Whom do I call if I have questions? A. If you need any assistance, or have any questions regarding the Reorganization, please call (866) 831-7129. Table of Contents Information Statement/Prospectus Dated August 14, 2020 Relating to the Acquisition of the Assets and Liabilities of GREAT-WEST INVESCO SMALL CAP VALUE FUND by GREAT-WEST SMALL CAP VALUE FUND ( formerly GREAT-WEST LOOMIS SAYLES SMALL CAP VALUE FUND) This Information Statement/Prospectus is being furnished to shareholders of Great-West Invesco Small Cap Value Fund (the “Target Fund”), a series of Great-West Funds, Inc. (“Great-West Funds”), a Maryland corporation registered as an open-end investment company under the Investment Company Act of 1940, as amended (the “1940 Act). This Information Statement/Prospectus is provided in connection with the reorganization of the Target Fund into the Great-West Small Cap Value Fund (formerly Great-West Loomis Sayles Small Cap Value Fund) (the “Acquiring Fund”), also a series of Great-West Funds (the “Reorganization”). The Target Fund and the Acquiring Fund are referred to herein collectively as the “Funds” and individually as a “Fund.” Upon completion of the Reorganization, holders of Institutional Class and Investor Class shares of the Target Fund will receive Institutional Class and Investor Class shares, respectively of the Acquiring Fund. Shares of the Acquiring Fund received in the Reorganization will have the same total net asset value as the total net asset value of the Target Fund shares surrendered by such shareholders, determined in each case as of the close of trading on the closing date of the Reorganization. The Board of Directors of Great-West Funds (the “Board”) determined the Reorganization is in the best interests of the Target Fund, the Acquiring Fund, and their respective shareholders. The address, principal executive office and telephone number of Great-West Funds is 8515 East Orchard Road, Greenwood Village, Colorado 80111 and (866) 831-7129. The Securities and Exchange Commission has not approved or disapproved these securities or determined whether the information in this Information Statement/Prospectus is truthful or complete. Any representation to the contrary is a criminal offense. This Information Statement/Prospectus concisely sets forth the information shareholders of the Target Fund should know about the Reorganization (in effect, investing in Institutional Class and Investor Class shares of the Acquiring Fund) and constitutes an offering of Institutional Class and Investor Class shares of common stock, par value $0.10 per share, of the Acquiring Fund. Please read it carefully and retain it for future reference. SHAREHOLDER APPROVAL IS NOT REQUIRED TO EFFECT THE REORGANIZATION. YOU ARE NOT ASKED TO RETURN A PROXY OR TO TAKE ANY OTHER ACTION AT THIS TIME. The following documents contain additional information about the Funds, have been filed with the Securities and Exchange Commission (“SEC”), and are incorporated into this Information Statement/Prospectus by reference: i. the Great-West Funds’ prospectuses, dated April 29, 2020, as supplemented through the date of this Information Statement/Prospectus, only insofar as they relate to the Funds (File No. 811-03364); ii. the Great-West Funds’ statement of additional information, dated April 29, 2020, as supplemented through the date of this Information Statement/Prospectus, only insofar as it relates to the Funds (File No. 811-03364). iii. the statement of additional information relating to the Reorganization, dated August 14, 2020 (the “Reorganization SAI”). Table of Contents iv. the Acquiring Fund’s audited financial statements as of December 31, 2019, and the report of Deloitte & Touche LLP, an independent registered public accounting firm, as contained in the Funds’ annual reports for the fiscal year ended December 31, 2019 (File No. 811-03364); v. the Target Fund’s audited financial statements as of December 31, 2019, and the report of Deloitte & Touche LLP, an independent registered public accounting firm, as contained in the Funds’ annual reports for the fiscal year ended December 31, 2019 (File No. 811-03364). No other parts of the documents referenced above are incorporated by reference herein. Copies of the foregoing may be obtained without charge by calling (866) 831-7129 or writing to Great-West Funds, Inc., Attn: Secretary, 8515 East Orchard Road, Greenwood Village, Colorado 80111. If you wish to request the Reorganization SAI, please ask for the “Reorganization SAI.” Great-West Funds is subject to t
uture Fund/ Fidelity ® Healthy Future Fund Investment Objective The fund seeks long-term growth of capital. Fee Table The following table describes the fees and expenses that may be incurred when you buy and hold shares of the fund. In addition to the fees and expenses described below, your broker may also require you to pay brokerage commissions on purchases and sales of certain share classes of the fund. Shareholder fees (fees paid directly from your investment) None Annual Operating Expenses (expenses that you pay each year as a % of the value of your investment) Management fee 0.67 % Distribution and/or Service (12b‑1) fees None Other expenses A 1.65 % Total annual operating expenses 2.32 % Fee waiver and/or expense reimbursement B 1.27 % Total annual operating expenses after fee waiver and/or expense reimbursement 1.05 % A Based on estimated amounts for the current fiscal year. B Fidelity Management & Research Company LLC (FMR) has contractually agreed to reimburse the class of shares of the fund to the extent that total operating expenses (excluding interest, certain taxes, fees and expenses of the Independent Trustees, proxy and shareholder meeting expenses, extraordinary expenses, and acquired fund fees and expenses (including fees and expenses associated with a wholly owned subsidiary), if any, as well as non‑operating expenses such as brokerage commissions and fees and expenses associated with the fund’s securities lending program, if applicable), as a percentage of its average net assets, exceed 1.05% (the Expense Cap). If at any time during the current fiscal year expenses for the class of shares of the fund fall below the Expense Cap, FMR reserves the right to recoup through the end of the fiscal year any expenses that were reimbursed during the current fiscal year up to, but not in excess of, the Expense Cap. This arrangement will remain in effect through August 31, 2023 . FMR may not terminate this arrangement before the expiration date without the approval of the Board of Trustees and may extend it in its discretion after that date. 3 Prospectus Fund Summary – continued This example helps compare the cost of investing in the fund with the cost of investing in other funds. Let’s say, hypothetically, that the annual return for shares of the fund is 5% and that your shareholder fees and the annual operating expenses for shares of the fund are exactly as described in the fee table. This example illustrates the effect of fees and expenses, but is not meant to suggest actual or expected fees and expenses or returns, all of which may vary. For every $10,000 you invested, here’s how much you would pay in total expenses if you sell all of your shares at the end of each time period indicated: 1 year $ 107 3 years $ 559 Portfolio Turnover The fund pays transaction costs, such as commissions, when it buys and sells securities (or “turns over” its portfolio). A higher portfolio turnover rate may indicate higher transaction costs and may result in higher taxes when fund shares are held in a taxable account. These costs, which are not reflected in annual operating expenses or in the example, affect the fund’s performance. Principal Investment Strategies • Normally investing at least 80% of its assets in equity securities of companies that FMR believes are working to: (i) extend and/or improve life expectancy, enhance health and wellness in people’s lives, and/or (ii) mitigate environmental impacts affecting health and wellness, in each case through the products, services, or technology they provide. Such companies include those that (i) attribute 50% or more of their revenues to products focused on disease treatment, health care access, nutrition, fitness and wearables, or clean emissions, or (ii) with respect to seeking to mitigate environmental impacts, those that are contained in the MSCI World Health & Wellness Select Net MA Index. • Investing in securities of domestic and foreign issuers. • Using fundamental analysis of factors such as each issuer’s financial condition and industry position, as well as market and economic conditions, to select investments. • Employing sustainable investing exclusion criteria to avoid investments in issuers that are directly engaged in, and/or derive significant revenue from, certain industries. Please see “Fund Basics – Investment Details – Sustainable Investing Exclusion” for additional information. Principal Investment Risks • Stock Market Volatility. Stock markets are volatile and can decline significantly in response to adverse issuer, political, regulatory, market, or economic developments. Different parts of the market, including different market sectors, and different types of Prospectus 4 securities can react differently to these developments. • Sustainability Risk. Application of FMR’s (the Adviser’s) ESG ratings process and/or its sustainable investing exclusion criteria may affect the fund’s exposure to certain issuers, sectors, regions, and countries and may affect the fund’s performance depending on whether certain investments are in or out of favor. The criteria related to the fund’s ESG ratings process and/or adherence to its sustainable investing exclusion criteria may result in the fund forgoing opportunities to buy certain securities when it might otherwise be advantageous to do so, or selling securities for ESG reasons when it might be otherwise disadvantageous for it to do so. As a result, the fund’s performance may at times be better or worse than the performance of funds that do not use ESG or sustainability criteria. There are significant differences in interpretations of what it means for an issuer to have positive ESG factors. While the Adviser believes its definitions are reasonable, the portfolio decisions it makes may differ with other investors’ or advisers’ views. When evaluating an issuer, the Adviser is dependent on information or data obtained through voluntary or third-party reporting that may be incomplete, inaccurate, or unavailable, which could cause the Adviser to incorrectly assess an issuer’s business practices. • Foreign Exposure. Foreign markets can be more volatile than the U.S. market due to increased risks of adverse issuer, political, regulatory, market, or economic developments and can perform differently from the U.S. market. • Issuer-Specific Changes. The value of an individual security or particular type of security can be more volatile than, and can perform differently from, the market as a whole. • Small- and Mid‑Cap Investing. The value of securities of small to medium size, less well-known issuers can perform differently from the market as a whole and other types of stocks and can be more volatile than that of larger issuers. • Management Risk. The Adviser’s application of the fund’s strategy criteria may not achieve its intended results. The fund could underperform in comparison to other funds with a similar benchmark or similar objectives and investment strategies. In addition, the fund is classified as non‑diversified under the Investment Company Act of 1940 (1940 Act), which means that it has the ability to invest a greater portion of assets in securities of a smaller number of individual issuers than a diversified fund. As a result, changes in the market value of a single investment could cause greater fluctuations in share price than would occur in a more diversified fund. An investment in the fund is not a deposit of a bank and is not insured or guaranteed by the Federal Deposit Insurance Corporation or any other government agency. You could lose money by investing in the fund. 5 Prospectus Fund Summary – continued Performance Performance history will be available for the fund after the fund has been in operation for one calendar year. Investment Adviser FMR is the fund’s manager. Other investment advisers serve as sub‑advisers for the fund. Portfolio Manager(s) Paul McElroy (co‑ manager) has managed the fund since May 2022. Melissa Reilly (co‑ manager) has managed the fund since May 2022. Purchase and Sale of Shares You may buy or sell shares through a Fidelity ® brokerage or mutual fund account, through a retirement account, or through an investment professional. You may buy or sell shares in various ways: Internet www.fidelity.com Phone Fidelity Automated Service Telephone (FAST ® ) 1‑800‑544‑5555 To reach a Fidelity representative 1‑800‑544‑6666 Mail Additional purchases: Fidelity Investments P.O. Box 770001 Cincinnati, OH 45277-0003 Redemptions: Fidelity Investments P.O. Box 770001 Cincinnati, OH 45277-0035 TDD‑ Service for the Deaf and Hearing Impaired 1‑800‑544‑0118 The price to buy one share is its net asset value per share (NAV). Shares will be bought at the NAV next calculated after an order is received in proper form. The price to sell one share is its NAV. Shares will be sold at the NAV next calculated after an order is received in proper form. The fund is open for business each day the New York Stock Exchange (NYSE) is open. There is no purchase minimum for fund shares. Tax Information Distributions you receive from the fund are subject to federal income tax and generally will be taxed as ordinary income or capital gains, and may also be subject to state or local taxes, unless you are investing through a tax‑advantaged retirement account (in which case you may be taxed later, upon withdrawal of your investment from such account). Payments to Broker-Dealers and Other Financial Intermediaries The fund, the Adviser, Fidelity Distributors Company LLC (FDC), and/or their affiliates may pay intermediaries, which may include banks, broker-dealers, retirement plan sponsors, administrators, or service-providers (who may be affiliated with the Adviser or FDC), for the sale of fund shares and related services. These payments may create a conflict of interest by influencing your intermediary and your investment professional to recommend the fund over another investment. Ask your investment professional or visit your intermediary’s web site for more information. Prospectus 6 Fund Basics Investment Details Investment Objective Fidelity ® Healthy Future Fund seeks long-term growth of capital. Principal Investment Strategies The Adviser normally invests at least 80% of the fund’s assets in equity securities of companies that FMR believes are working to: (i) extend and/or improve life expectancy, enhance health and wellness in people’s lives, and/or (ii) mitigate environmental impacts affecting health and wellness, in each case through the products, services, or technology they provide. Such companies include those that (i) attribute 50% or more of their revenues to products focused on disease treatment, health care access, nutrition, fitness and wearables, or clean emissions, or (ii) with respect to seeking to mitigate environmental impacts, those that are contained in the MSCI World Health & Wellness Select Net MA Index. The Adviser is not constrained by any particular investment style. At any given time, the Adviser may tend to buy “growth” stocks or “value” stocks or a combination of both types. In buying and selling securities for the fund, the Adviser relies on fundamental analysis, which involves a bottom‑up assessment of a company’s potential for success in light of factors including its financial condition, earnings outlook, strategy, management, industry position, and economic and market conditions. The Adviser may invest the fund’s assets in securities of foreign issuers in addition to securities of domestic issuers. Because the fund is classified as non‑diversified, the Adviser may invest a significant percentage of the fund’s assets in a single issuer. Although the Adviser focuses on investing the fund’s assets in securities issued by larger‑sized companies, the Adviser may also make substantial investments in securities issued by medium and smaller companies. If the Adviser’s strategies do not work as intended, the fund may not achieve its objective. Description of P

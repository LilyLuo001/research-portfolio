      N-14 1 d735115dn14.htm THRIVENT MUTUAL FUNDS Thrivent Mutual Funds As filed with the Securities and Exchange Commission on March 28, 2024 1933 Act Registration No. [333-________] SECURITIES AND EXCHANGE COMMISSION Washington, DC 20549 FORM N-14 REGISTRATION STATEMENT UNDER THE SECURITIES ACT OF 1933 Pre-Effective Amendment No. ___ ☐ Post-Effective Amendment No. ___ ☐ (Check appropriate box or boxes) Thrivent Mutual Funds (Exact Name of Registrant as Specified in Charter) 901 Marquette Avenue, Suite 2500 Minneapolis, Minnesota 55402-3211 (Address of Principal Executive Offices) (612) 844-7190 (Registrant’s Telephone Number, including Area Code) John D. Jackson Secretary and Chief Legal Officer Thrivent Mutual Funds 901 Marquette Avenue, Suite 2500 Minneapolis, Minnesota 55402-3211 (Name and Address of Agent for Service) Approximate Date of Proposed Public Offering: As soon as practicable after this registration statement becomes effective. Title of Securities Being Registered: Shares of beneficial interest, par value $0.01 per share of Thrivent Global Stock Fund, a series of the Registrant. It is proposed that this filing will become effective on April 29, 2024, pursuant to Rule 488. The Registrant has registered an indefinite number of shares of beneficial interest pursuant to Section 24(f) of the Investment Company Act of 1940, as amended, and is in a continuous offering of such shares under an effective registration statement (File Nos. 033-12911 and 811-05075). No filing fee is due herewith because the Registrant is relying on Section 24(f) of the Investment Company Act of 1940, as amended. Thrivent Mutual Funds 901 Marquette Avenue, Suite 2500 Minneapolis, Minnesota 55402 [May __, 2024] Dear Shareholder: The Board of Trustees of Thrivent Mutual Funds (the “Trust”) has scheduled a special meeting of shareholders for June 27, 2024 (with any adjournments, postponements, or delays of the meeting, the “Meeting”) to be held at 901 Marquette Avenue, Suite 2500, Minneapolis, Minnesota 55402. At the Meeting, shareholders of Thrivent Low Volatility Equity Fund (the “Target Fund”) will be asked to consider and approve an Agreement and Plan of Reorganization (the “Reorganization Agreement”) providing for its reorganization into Thrivent Global Stock Fund (the “Acquiring Fund”). If a merger is approved, your investment in the Target Fund will automatically be transferred into the Acquiring Fund. We will send you a written confirmation after this takes place. This transfer is not expected to be a taxable event. (Of course, you may exchange your investment to a completely different series of the Trust.) Your vote counts! If you are not planning to attend the Meeting in person, please vote before June 27, 2024 in one of the following ways: • Internet: see the instructions on the enclosed proxy card. • Phone: see the instructions on the enclosed proxy card. • Mail: use the enclosed proxy card and postage-paid envelope. Thank you for taking this matter seriously and participating in this important process. Sincerely, Michael W. Kremenak President 1 Thrivent Low Volatility Equity Fund a series of Thrivent Mutual Funds 901 Marquette Avenue, Suite 2500 Minneapolis, Minnesota 55402 800-847-4836 Questions and Answers for Shareholders Although we recommend that you read the complete Prospectus/Proxy Statement, we have provided the following questions and answers to clarify and summarize the matter to be voted on. Q: Why is a shareholder meeting being held? A: Thrivent Mutual Funds (the “Trust”) is holding a special meeting of shareholders of Thrivent Low Volatility Equity Fund (the “Target Fund”) on June 27, 2024 (with any adjournments, postponements, or delays of the meeting, the “Meeting”), to seek shareholder approval for the reorganization (the “Reorganization”) of the Target Fund into Thrivent Global Stock Fund (the “Acquiring Fund”). Please refer to the Prospectus/Proxy Statement for a detailed explanation of the proposed Reorganization and for a more complete description of the Acquiring Fund. Q: Why is the Reorganization being recommended? A: After careful consideration, the Board of Trustees (the “Board”) of the Trust has determined that a Reorganization is in the best interests of the shareholders of the Target Fund and recommends that you cast your vote “FOR” the proposed Reorganization. The Target Fund and the Acquiring Fund both invest primarily in equity securities and each is a series of the Trust, an open-end investment company registered under the Investment Company Act of 1940. Thrivent Asset Management, LLC (“Thrivent Asset Mgt.” or the “Adviser”) is the investment adviser for the Target Fund and the Acquiring Fund. 2 The Reorganization was approved by the Board on February 28, 2024. The Board considered the fact that as of December 31, 2023, the Target Fund was ranked in the bottom decile of its Morningstar peer group for the one- and five-year periods and in the 65 th percentile for the three-year period. The Board also considered that the Acquiring Fund has posted more competitive results, ranking in the top half of the peer group for the one-, three-, and five-year periods. The Board noted that the current portfolio managers of the Acquiring Fund are as follows: Kurt J. Lauber, CFA since March 2013, Noah J. Monsen, CFA since February 2018, Lauri A. Brunner since September 2018, and David R. Spangler, CFA since February 2019. The Board believes that the Reorganization would be in the best interests of the shareholders of the Target Fund because: (i) shareholders will become shareholders of a larger combined portfolio with greater potential to increase asset size and achieve economies of scale; (ii) at the time of the Board’s approval on February 28, 2024, the Acquiring Fund had achieved better performance than the Target Fund for the one-, three-, and five-year periods ended December 31, 2023, both in terms of Morningstar peer group rankings and on an absolute basis, though there is no guarantee of future performance; (iii) the Adviser believes that it can most effectively manage the assets currently in the Target Fund by combining such assets with the Acquiring Fund; and (iv) the Acquiring Fund has lower gross and net expense ratios than the Target Fund and shareholders of the Target Fund will experience lower gross and net expense ratios in the Acquiring Fund following the Reorganization. Q: Who can vote? A: Shareholders of the Fund as of April 26, 2024, are entitled to vote at the Meeting. Q: How will the Reorganization affect me? A: Assuming the proposed Reorganization is approved by shareholders, the assets of the Target Fund will be combined with those of the Acquiring Fund. Class S shares of the Target Fund would automatically be exchanged for Class S shares of the Acquiring Fund. Following the Reorganization, the Target Fund will dissolve. Q: Will I have to pay any commission or other similar fee as a result of the Reorganization? A: Shareholders will not pay any commissions or fees in connection with the Reorganization, although brokerage and other transaction costs of approximately $6,095 will be borne by the Target Fund and/or the Acquiring Fund. Other direct and 3 indirect costs of the Reorganization will be borne by the Adviser, as further discussed in the “Additional Information About the Reorganization—Expenses of the Reorganization” section in the Prospectus/Proxy Statement. Q: Will the total annual operating expenses that my portfolio investment bears increase as a result of the Reorganization? A: No, they are likely to decrease. An unexpected increase in “Other Expenses” of the Acquiring Fund could cause them to increase. For more information about how fund expenses may change as a result of the Reorganization, please see the comparative and pro forma table and related disclosures in the “Comparison of the Funds — Fees and Expenses” section of the Prospectus/Proxy Statement. Q: Will I have to pay any U.S. federal income taxes as a result of the Reorganization? A: The Reorganization is expected to be tax-free for federal income tax purposes. The Target Fund will seek an opinion of counsel to this effect. Generally, shareholders will not incur capital gains or losses on the exchange of Target Fund shares for Acquiring Fund shares as a result of the Reorganization. Q: If shareholders of the Target Fund do not approve the Reorganization, what will happen to the Target Fund? A: The Adviser will reassess what changes it would like to make to the Target Fund, including repurposing the Target Fund’s principal investment strategies or recommending to the Board a liquidation of the Target Fund. It may ultimately decide to make no changes. Q: Who pays the costs of the Reorganization? A: If the Reorganization is approved, brokerage and other transaction costs will be borne by the Target Fund and/or the Acquiring Fund. Other costs associated with the Reorganization, such as the costs of the Meeting, proxy expenses, legal fees, IT system changes, audit fees and filing fees, will be paid by Thrivent Asset Mgt. and will not be borne by shareholders of the Target Fund, regardless of whether the Reorganization is completed. The Reorganization is expected to be tax-free for federal income tax purposes and shareholders are not expected to experience a tax impact from the Reorganization. 4 Q: How can I vote? A: Shareholders are invited to attend the Meeting to cast their vote in person. You may also vote by executing a proxy using one of three methods: • Internet: Instructions for casting your vote via the Internet can be found in the enclosed proxy voting materials. The required control number is printed on your enclosed proxy card. If this feature is used, there is no need to mail the proxy card. • Phone: Instructions for casting your vote via phone can be found in the enclosed proxy voting materials. The toll-free number and required control number are printed on your enclosed proxy card. If this feature is used, there is no need to mail the proxy card. • Mail: If you vote by mail, please indicate your voting instructions on the enclosed proxy card, date and sign the card, and return it in the envelope provided, which is addressed for your convenience and needs no postage if mailed in the United States. Shareholders who execute proxies by Internet, phone or mail may revoke them at any time prior to the Meeting by filing with the Trust a written notice of revocation; executing and returning another proxy bearing a later date; voting later by Internet or phone; or attending the Meeting and providing new voting instructions. Attending the Meeting will not by itself revoke any previously submitted voting instructions. Q: How can I attend the Meeting? A: The Meeting will be held at the offices of Thrivent Asset Management, LLC, 901 Marquette Avenue, Suite 2500, Minneapolis, Minnesota 55402. You are entitled to participate in the Meeting only if you were a shareholder of record as of the close of business on April 26, 2024. The Meeting will begin promptly at [9:00 a.m. Central Time] on June 27, 2024. We encourage you to arrive at the Meeting prior to the start time leaving ample time for the check in. Q: When should I vote? A: Every vote is important and the Board encourages you to record your vote as soon as possible. Voting your proxy now will ensure that the necessary number of votes is obtained, without the time and expense required for additional proxy solicitation. 5 Q: Who should I call if I have questions about the proposals in the Prospectus/Proxy Statement? A: If you need assistance, you may call Mediant at 888-441-3205 from 9:00 a.m. to 6:00 p.m. Eastern Time, Monday through Friday. Your call will be answered by a live representative that can assist you with questions on the proposal or the voting process and accept your vote on a recorded line. Please have your proxy card ready when calling. Q: How can I get more information about the Target and Acquiring Funds? A: You may obtain (1) a prospectus, statement of additional information or annual/semiannual shareholder report for the Funds or (2) the Reorganization SAI by: • Internet. For a copy of a prospectus, a statement of additional information, and/or annual/semiannual shareholder report for the Funds, visit thriventmutualfunds.com/prospectus. For a copy of the Reorganization SAI, visit www.proxypush.com/THR. You will need to provide the control number printed on your proxy card. • Phone. Call 800-847-4836 and say “mutual funds.” • Email. Send an email to contactus@thriventfunds.com. 6 Thrivent Low Volatility Equity Fund a series of Thrivent Mutual Funds 901 Marquette Avenue, Suite 2500 Minneapolis, Minnesota 55402 800-847-4836 Notice of Special Meeting of Shareholders to be Held on June 27, 2024 Notice is hereby given that a special meeting of shareholders (with any adjournments, postponements, or delays of the meeting, the “Meeting”) of Thrivent Low Volatility Equity Fund (the “Target Fund”), a series of Thrivent Mutual Funds (the “Trust”), will be held on June 27, 2024 at [9:00 a.m. Central Time] at the offices of Thrivent Asset Management, LLC, 901 Marquette Avenue, Suite 2500, Minneapolis, Minnesota 55402. The Board of Trustees of the Trust (the “Board”) has fixed the close of business on April 26, 2024, as the record date for determining shareholders entitled to notice of, and to vote at, the Meeting. The Meeting is being held for the following purposes: 1. To approve an Agreement and Plan of Reorganization pursuant to which the Target Fund would (i) transfer all of its assets to Thrivent Global Stock Fund (the “Acquiring Fund”), a series of the Trust, in exchange for Class S shares of the Acquiring Fund, (ii) distribute such Class S shares of the Acquiring Fund to shareholders of the Target Fund, and (iii) dissolve. 2. To transact such other business as may properly be presented at the Meeting. Shareholders are invited to attend the Meeting to cast their vote in p

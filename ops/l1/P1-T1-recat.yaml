rmal circumstances, the Fund will invest at least 80% of its assets (net assets plus any borrowings for investment purposes) in equity securities of U.S. companies across all market capitalizations. Generally, U.S. companies are companies organized in the United States or companies that issue securities that trade primarily in U.S. securities markets. Equity securities include common stocks and securities convertible into common stock, such as warrants, rights, convertible bonds, debentures and convertible preferred stock. Convertible preferred stocks and debentures must be rated investment grade by a nationally recognized statistical rating organization when purchased, or if unrated, considered by Epoch Investment Partners, Inc., the Fund’s Subadvisor, to be of comparable quality. Investment Process: The Subadvisor invests primarily in companies that generate increasing levels of free cash flow and have management teams that the Subadvisor believes allocate free cash flow effectively to create shareholder value. The security selection process focuses on free-cash-flow analytics as opposed to traditional accounting-based metrics. The Subadvisor seeks to identify companies with a consistent, straightforward ability to both generate free cash flow and to intelligently allocate it among internal reinvestment opportunities, acquisitions, dividends, share repurchases and/or debt reduction. The Subadvisor may sell or reduce a position in a security when it believes its investment objectives have been met or if the investment thesis is failing to materialize. The Subadvisor may also sell or reduce a position in a security when the security is deemed less attractive relative to another security on a return/risk basis. Although the Fund may invest in securities of companies across all market capitalizations, it may invest a significant portion of its assets in companies of one particular market capitalization category when the Subadvisor believes such companies offer attractive opportunities. The Fund may also invest up to 15% of its net assets in foreign securities. Generally, foreign securities are issued by companies organized outside the United States or that trade primarily in non-U.S. securities markets. Principal Risks You can lose money by investing in the Fund. An investment in the Fund is not a bank deposit and is not insured or guaranteed by the Federal Deposit Insurance Corporation or any other governmental agency. The investments selected by the Subadvisor may underperform the market in which the Fund invests or other investments. The Fund may receive large purchase or redemption orders which may have adverse effects on performance if the Fund were required to sell securities, invest cash or hold a relatively large amount of cash at times when it would not otherwise do so. The principal risks of investing in the Fund are summarized below. Market Risk: The value of the Fund’s investments may fluctuate because of changes in the markets in which the Fund invests, which could cause the Fund to underperform other funds with similar investment objectives and strategies. Such changes may be rapid and unpredictable. From time to time, markets may experience periods of stress for potentially prolonged periods that may result in: (i) increased market volatility; (ii) reduced market liquidity; and (iii) increased redemptions of Fund shares. Such conditions may add significantly to the risk of volatility in the net asset value of the Fund's shares. Portfolio Management Risk: The investment strategies, practices and risk analyses used by the Subadvisor may not produce the desired results. Equity Securities Risk: Investments in common stocks and other equity securities are particularly subject to the risk of changing economic, stock market, industry and company conditions and the risks inherent in the portfolio managers' ability to anticipate such changes that can adversely affect the value of the Fund's holdings. Growth Stock Risk: If 
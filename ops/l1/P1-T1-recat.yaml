hares, subject to recapture as described below. In addition, the ratio of total annual fund operating expenses for Class IS shares will not exceed the ratio of total annual fund operating expenses for Class I shares, subject to recapture as described below. These arrangements cannot be terminated prior to December 31, 2025 without the Board of Trustees’ consent. The manager is permitted to recapture amounts waived and/or reimbursed to a class within three years after the fiscal year in which the manager earned the fee or incurred the expense if the class’ total annual fund operating expenses have fallen to a level below the limits described above. In no case will the manager recapture any amount that would result, on any particular business day of the fund, in the class’ total annual fund operating expenses exceeding the applicable limits described above or any other lower limit then in effect. In addition, the manager has agreed to waive the fund’s management fee to an extent sufficient to offset the net management fee payable in connection with any investment in an affiliated money market fund. This management fee waiver is not subject to the recapture provision discussed above. Example This example is intended to help you compare the cost of investing in the fund with the cost of investing in other mutual funds. The example assumes: ● You invest $10,000 in the fund for the time periods indicated ● Your investment has a 5% return each year and the fund’s operating expenses remain the same (except that any applicable fee waiver or expense reimbursement is reflected only through its expiration date) ● You reinvest all distributions and dividends without a sales charge Although your actual costs may be higher or lower, based on these assumptions your costs would be: Number of years you own your shares ($) 1 year 3 years 5 years 10 years Class A (with or without redemption at end of period) 536 902 1,292 2,382 Class C (with redemption at end of period) 343 769 1,322 2
s intended to help you compare the cost of investing in shares of the Fund with the cost of investing in other mutual funds. The example assumes that you invest $10,000 in the Fund for the time periods indicated and then redeem all of your shares at the end of those periods. The example also assumes that your investment has a 5% return each year and the Fund’s operating expenses remain the same. The figures reflect the expense limitation for the first year. Although your actual costs may be higher or lower, based on these assumptions your costs would be: 1 Year 3 Years Class I $ 101 $ 364 Class R6 96 342 1 Portfolio Turnover: The Fund pays transaction costs, such as commissions, when it buys and sells securities (or “turns over” its portfolio). A higher portfolio turnover may indicate higher transaction costs and may result in higher taxes when Fund shares are held in a taxable account. These costs, which are not reflected in annual fund operating expenses or in the example, affect the Fund’s performance. The Fund has not commenced operations as of the date of this Prospectus. PRINCIPAL INVESTMENT STRATEGIES: Under normal circumstances, the Fund invests at least 80% of its net assets (plus the amount of any borrowings for investment purposes) in emerging markets securities, excluding companies with their principal office in the People’s Republic of China (“PRC”). (For the avoidance of doubt, the PRC shall include mainland China, Hong Kong and Macau but exclude Taiwan.) The Fund invests primarily in a diversified portfolio of equity securities, including common stocks and other forms of equity investments (e.g., securities convertible into common stocks), issued by emerging market companies (excluding companies with their principal office in the PRC) of all sizes that the Adviser believes have above-average growth, profitability and quality characteristics. The Adviser seeks investment opportunities in companies at different stages of development ranging from large, well-established companies to smaller companies at earlier stages of development. Emerging market companies, for purposes of the Fund, are companies organized under the laws of an emerging market country or that have securities traded principally on an exchange or over‑the‑counter in an emerging market country. Currently, for purposes of the Fund, emerging markets include every country in the world except the United States, Canada, Japan, Australia, New Zealand, Hong Kong, Singapore and most Western European countries. The Fund’s investments are normally allocated among at least six different countries and no more than 50% of the Fund’s equity holdings may be invested in securities of issuers in one country at any given time. In choosing investments, the Adviser performs fundamental company analysis and focuses on stock selection. The Adviser generally seeks equity securities, including common stocks, of emerging market companies that historically have had superior growth, profitability and quality relative to local markets and relative to companies within the same industry worldwide, and that are expected to continue such performance. Such companies generally will exhibit superior business fundamentals, including leadership in their field, quality products or services, distinctive marketing and distribution, pricing flexibility and revenue from products or services consumed on a steady, recurring basis. These business characteristics should be accompanied by management that is shareholder return-oriented and that uses conservative accounting policies. Companies with above-average returns on equity, strong balance sheets and consistent, above-average earnings growth will be the primary focus. Stock selection will take into account both local and global comparisons. The Adviser will vary the Fund’s sector and geographic diversification based upon the Adviser’s ongoing evaluation of economic, market and political trends throughout the world. In making decisions regarding country allocation, the Adviser will consider such factors as the conditions and growth potential of various economies and securities markets, currency exchange rates, technological developments in the various countries and other pertinent financial, social, national and political factors. PRINCIPAL RISKS: The Fund’s returns will vary, and you could lose money by investing in the Fund. The following is a summary of the principal risks associated with an investment in the Fund. The principal risks of investing in the Fund are: Equity Funds General. Because the Fund invests substantially all of its assets in equity securities of emerging market companies, the primary risk is that the value of the equity securities it holds might decrease in response to the activities of an individual company or in response to general market, business and economic conditions. If this occurs, the Fund’s share price may also decrease. In addition, there is the risk that individual securities may not perform as expected or a strategy used by the Adviser may fail to produce its intended result. 2 Market Risk. The value of the Fund’s investments may go up or down, sometimes rapidly or unpredictably. The value of an investment may decline due to factors affecting securities markets generally or particular industries represented in the securities markets. The value of an investment may decline due to general market conditions that are not specifically related to a particular company, such as real or perceived adverse economic conditions, changes in the general outlook for corporate earnings, changes in interest or currency rates or adverse investor sentiment generally. Events such as war, acts of terrorism, social unrest, natural disasters, the spread of infectious illness or other public health threats could also significantly impact the Fund and its investments. The value of an investment may also decline due to factors that affect a particular industry or industries, such as labor shortages or increased production costs and competitive conditions within an industry. During a general downturn in the securities markets, multiple asset classes may decline in value simultaneously. Geopolitical and other events may also disrupt securities markets and adversely affect global economies and markets and thereby decrease the value of the Fund’s investments. Foreign Investment Risk. The risks of foreign investments may include less publicly available information, less stringent investor protections and disclosure standards, less governmental regulation and supervision of foreign stock exchanges, brokers and issuers, share registration and custody, a lack of uniform accounting, auditing and financial reporting standards, practices and requirements, the possibility of expropriation, seizure or nationalization, confiscatory taxation, limits on repatriation, adverse changes in investment or exchange control regulations, political instability, restrictions on the flow of international capital, imposition of foreign withholding or other taxes, fluctuating currencies, inflation, difficulty in obtaining and enforcing judgments against foreign entities or other adverse political, social or diplomatic developments that could affect the Fund’s investments. Foreign investments may be less liquid and their prices more volatile than the securities of U.S. companies. The Fund is expected to incur operating expenses that are higher than those of mutual funds investing exclusively in U.S. equity securities due to the higher custodial fees associated with foreign securities investments. Currency Risk. The value of the Fund’s portfolio may be affected by changes in exchange rates or control regulations. If a local currency gains against the U.S. dollar, the value of the security increases in U.S. dollar terms. If a local currency declines against the U.S. dollar, the value of the security decreases in U.S. dollar terms. The currencies of emerging market countries may experience a devaluation relative to the U.S. dollar, and continued devaluations may adversely affect the value of the Fund’s assets denominated in such currencies. Many emerging market countries have experienced substantial rates of inflation for many years, and continued inflation may adversely affect the economies and securities markets of such countries. Emerging Markets Risk. Foreign investment risk is typically magnified in emerging markets, which are the less developed and developing nations. Geographic Risk. To the extent that the Fund invests a significant portion of its assets in any one country or geographic region, the Fund will be subject to greater risk of loss or volatility than if the Fund always maintained wide geographic diversity among the countries and geographic regions in which it invests. Investing in any one country or geographic region makes the Fund more vulnerable to the risks of adverse securities markets, exchange rates and social, political, regulatory and economic events in that one country or geographic region. Smaller Company Risk. Stocks of smaller companies involve greater risk than those of larger, more established companies. This is because smaller companies may be in earlier stages of development, may be dependent on a small number of products or services, may lack substantial capital reserves and/or do not have proven track records. Smaller companies may be traded in low volumes. This can increase volatility and increase the risk that the Fund will not be able to sell a security on short notice at a reasonable price. The securities of smaller companies may be more volatile and less liquid than securities of large capitalized companies. New Fund Risk. As a new fund, there can be no assurance that the Fund will grow to or maintain an economically viable size, in which case it could ultimately liquidate. 3 Share Ownership Concentration Risk. To the extent that a significant portion of the Fund’s shares is held by a limited number of share
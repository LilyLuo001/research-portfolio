. If you already elected to receive shareholder reports electronically, you will not be affected by this change and you need not take any action. You may elect to receive shareholder reports and other communications from a Fund electronically anytime by contacting your financial intermediary (such as a broker- dealer or bank) or, if you are a direct investor, by calling 877-DLine11 (877-354-6311) or by sending an e-mail request to DoubleLine at fundinfo@doubleline.com. Beginning on January 1, 2019, you may elect to receive all future reports in paper free of charge. If you invest through a financial intermediary, you can contact your financial intermediary to request that you continue to receive paper copies of your shareholder reports. If you invest directly with a Fund, you can call 877-DLINE11 (877-354-6311) or send an email request to fundinfo@doubleline.com to let the Fund know you wish to continue receiving paper copies of your shareholder reports. Your election to receive reports in paper will apply to all funds held in your account if you invest through your financial intermediary or all Funds held with the fund complex if you invest directly with a Fund. Table of Contents TABLE OF CONTENTS The Trust and the Funds 1 DoubleLine Total Return Bond Fund 2 DoubleLine Core Fixed Income Fund 17 DoubleLine Emerging Markets Fixed Income Fund 34 DoubleLine Low Duration Bond Fund 48 DoubleLine Floating Rate Fund 66 DoubleLine Flexible Income Fund 84 DoubleLine Low Duration Emerging Markets Fixed Income Fund 105 DoubleLine Long Duration Total Return Bond Fund 122 DoubleLine Global Bond Fund 142 DoubleLine Ultra Short Bond Fund 161 DoubleLine Infrastructure Income Fund 175 DoubleLine Multi-Asset Growth Fund 195 DoubleLine Strategic Commodity Fund 216 DoubleLine Shiller Enhanced CAPE ® 236 DoubleLine Shiller Enhanced International CAPE ® 259 DoubleLine Colony Real Estate and Income Fund 283 Summary of Other Important Information Regarding Fund Shares 307 Purchase and Sale
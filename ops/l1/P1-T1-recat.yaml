      N-14/A 1 am14tstcreditoppscombo.htm N-14/A Am. N-14 TFGT Credit Opps II - Proxy-Prospectus-SAI Combined Document As filed with the Securities and Exchange Commission on July 25, 2019 1933 Act File No. 333-232307 UNITED STATES SECURITIES AND EXCHANGE COMMISSION Washington, D.C. 20549 FORM N-14 REGISTRATION STATEMENT UNDER THE SECURITIES ACT OF 1933 ý Pre-Effective Amendment No. 2 o Post-Effective Amendment No. (Check appropriate box or boxes) Touchstone Funds Group Trust (Exact Name of Registrant as Specified in Charter) 1-800-543-0407 (Area Code and Telephone Number) 303 Broadway, Suite 1100, Cincinnati, Ohio 45202 (Address of Principal Executive Offices: Number, Street, City, State, Zip Code) Jill T. McGruder 303 Broadway, Suite 1100 Cincinnati, Ohio 45202 (Name and Address of Agent for Service) Copies to: Deborah Bielicke Eades, Esq. Vedder Price P.C. 222 North LaSalle Street Chicago, Illinois 60601 (312) 609-7661 Renee M. Hardt, Esq. Vedder Price P.C. 222 North LaSalle Street Chicago, Illinois 60601 (312) 609-7616 Approximate Date of Proposed Public Offering: As soon as practicable after this Registration Statement becomes effective under the Securities Act of 1933, as amended. Title of Securities Being Registered: Class A, Class C, Class Y, and Institutional Class shares of beneficial interest, par value $0.01 per share, of Touchstone Credit Opportunities II Fund, a series of the Registrant, are being registered. No filing fee is due because Registrant is relying on Section 24(f) of the Investment Company Act of 1940, as amended. It is proposed that this filing will become effective in accordance with Section 8(a) of the Securities Act of 1933 or until the Registration Statement shall become effective on such date as the Commission, acting pursuant to said Section 8(a), may determine. ______________________________________________________________________________________________________ TOUCHSTONE CREDIT OPPORTUNITIES FUND a series of TOUCHSTONE STRATEGIC TRUST 303 Broadway, Suite 1100 Cincinnati, Ohio 45202 (800) 543-0407 [__], 2019 Dear Shareholder: We have important information concerning your investment in the Touchstone Credit Opportunities Fund (the “Target Fund”), a series of Touchstone Strategic Trust (the “Target Trust”). As a shareholder of the Target Fund, we wish to inform you that the Board of Trustees of the Target Trust has approved the reorganization, subject to shareholder approval, of the Target Fund into the Touchstone Credit Opportunities II Fund (the “Acquiring Fund,” and together with the Target Fund, the “Funds”), a series of Touchstone Funds Group Trust (the “Acquiring Trust”) (the “Reorganization”). The investment advisor to both Funds is Touchstone Advisors, Inc. (“Touchstone Advisors”). The Funds have the same investment goals and principal investment strategies and are both sub-advised by Ares Capital Management II LLC (“Ares”). The Reorganization is intended to eliminate the offering of multiple funds with the same investment goal and principal investment strategies and has the potential to provide efficiencies and economies of scale for the combined Fund. Pursuant to an Agreement and Plan of Reorganization, the Target Fund will transfer all of its assets and liabilities to the Acquiring Fund. As a result of the Reorganization, you will receive shares of the Acquiring Fund that will have a total value as of the close of business on the closing date of the Reorganization equal to the total value of your shares in the Target Fund as of such time. The Target Fund will then cease operations and terminate. The Reorganization is expected to be completed on or about September 6, 2019. The following table shows the share class of the Acquiring Fund that will be issued to each corresponding share class of the Target Fund. Target Fund and Share Classes Acquiring Fund and Share Classes Touchstone Credit Opportunities Fund, a series of the Target Trust Touchstone Credit Opportunities II Fund, a series of the Acquiring Trust Class A Class C Class Y Institutional Class Class A Class C Class Y Institutional Class The Board of Trustees of the Target Trust recommends that you vote FOR the Reorganization proposal. We have enclosed a Proxy Statement/Prospectus that describes the Reorganization proposal in greater detail, as well as important information about the Acquiring Fund. Please contact Shareholder Services at (800) 543-0407 with any questions. Sincerely, Jill T. McGruder President Touchstone Strategic Trust QUESTIONS & ANSWERS We recommend that you read the enclosed Proxy Statement/Prospectus. In addition to the detailed information in the Proxy Statement/Prospectus, the following questions and answers provide an overview of key features of the Reorganization. Q. Why are we sending you the Proxy Statement/Prospectus? A. On May 16, 2019, the Board of Trustees of the Target Trust (the “Board”) approved the Reorganization of the Target Fund into the Acquiring Fund, subject to the approval of the Target Fund’s shareholders. As a shareholder of the Target Fund, you are receiving the enclosed Proxy Statement/Prospectus in connection with a special shareholder meeting of the Target Trust with respect to the Target Fund. At the special meeting, shareholders of the Target Fund will be asked to vote on the approval of an Agreement and Plan of Reorganization providing for the reorganization of the Target Fund into the Acquiring Fund. Q. Why has the Board recommended the Reorganization proposal? A. Touchstone Advisors recommended, and the Board approved, the Reorganization in order to eliminate the offering of multiple funds with the same investment goal and principal investment strategies. The Board considered information provided by Touchstone Advisors regarding potential benefits of the Reorganization, including that (1) shareholders would be able to continue their investment in a Fund with the same investment goals and strategies, (2) the combined assets will provide the potential for economies of scale for shareholders of the combined Fund and will reduce redundancies within the Touchstone Funds’ product lineup, (3) both Funds have the same share classes and (4) the advisory fee schedules, sub-advisory fee schedules and expense caps for each Fund are identical. Q. What will happen to my existing shares? A. Immediately after the Reorganization, you will own shares of the Acquiring Fund that have a total value as of the close of business on the date of the Reorganization equal to the total value of your shares of the Target Fund as of such time (although the number of shares and the net asset value per share may be different). Q. How do the fees and expenses of the Funds compare? A. At the February 12, 2019 meeting of the Board of Trustees of the Acquiring Trust, the Board approved changes, which took effect May 11, 2019, with regard to the Acquiring Fund’s name, investment goal and principal investment strategies and risks in connection with its appointment of Ares Capital Management II LLC (“Ares”) as sub-advisor to the Acquiring Fund. In addition, the Board of Trustees of the Acquiring Trust approved an amendment to the Acquiring Fund’s investment management agreement to reduce the Fund’s advisory fee to an annual rate of 0.60%. The advisory fee rate of the Acquiring Fund is the same as the advisory fee rate of the Target Fund. In addition, each Fund has entered into an expense limitation agreement with Touchstone Advisors, each Fund’s investment advisor. Touchstone Advisors has contractually agreed to waive a portion of its fees and reimburse certain Fund expenses in order to limit annual fund operating expenses for each Fund. At the February 12, 2019 meeting of the Board of Trustees of the Acquiring Trust, the Board approved an amendment, which took effect May 11, 2019, to the Acquiring Fund’s expense limitation agreement, to further reduce the Acquiring Fund’s expense levels. The expense limitation for each share class of the Acquiring Fund is the same as the expense limitation for the corresponding share class of the Target Fund. The expense limitation agreement for the Target Fund is effective through February 29, 2020. The expense limitation agreement for the Acquiring Fund is effective through May 30, 2020 and after the Reorganization, will be effective through September 29, 2020. For Classes A and C shares, the Funds have the same 12b-1 fees and sales charges. Class Y and Institutional Class shares of each Fund are not subject to any 12b-1 fees or sales charges. The section titled “Summary—Reorganization—How do the Funds’ fees and expenses compare?” of the Proxy Statement/Prospectus compares the fees and expenses of the Funds in detail and the section titled “The Funds’ Management—Expense Limitation Agreement” provides additional information regarding the expense limitation agreements. Q. How do the Funds’ investment goals and principal investment strategies compare? A. Following the Board of Trustees of the Acquiring Trust’s approval of changes to the Acquiring Fund’s investment goal and principal investment strategies, which took effect May 11, 2019, the Funds have the same investment goal and 1 principal investment strategies. The investment goal of the Funds is to seek absolute total return, primarily from income and capital appreciation. Each Fund invests, under normal circumstances, at least 80% of its assets (including the amount of borrowings for investment purposes) in U.S. and non-U.S. debt instruments. The section of the Proxy Statement/Prospectus titled “Summary—Reorganization—How do the Funds’ investment goals and principal investment strategies compare?” describes the investment goal and principal investment strategies of each Fund. Q. Who will manage the Acquiring Fund after the Reorganization? A. Touchstone Advisors serves as the investment advisor to both Funds. At the February 12, 2019 meeting of the Board of Trustees of the Acquiring Trust, the Board approved Ares as sub-advisor to the Acquiring Fund, which took effect May 11, 2019. Ares is the sub-advisor to both Funds and the portfolio managers for each Fund are Seth Brufsky, Jason Duko and Kapil Singh. For more information please see the sections of the Proxy Statement/Prospectus titled “Summary—Reorganization—Who will be the Advisor, Sub-Advisor, and Portfolio Managers of my Fund after the Reorganization?”, “The Funds’ Management—Investment Advisor” and “The Funds’ Management—Sub-Advisor and Portfolio Managers.” Q. What are the primary federal income tax consequences of the Reorganization? A. You are not expected to recognize any gain or loss for federal income tax purposes on the exchange of your shares of the Target Fund for shares of the Acquiring Fund. The Reorganization is intended to qualify as a tax-free reorganization for federal income tax purposes. The sections of the Proxy Statement/Prospectus titled “Summary—Reorganization—What will be the primary federal income tax consequences of the Reorganization?” and “Information About the Reorganization—Material Federal Income Tax Consequences” of the Proxy Statement/Prospectus provide additional information regarding the federal income tax consequences of the Reorganization. Because the Funds’ investment goals and principal investment strategies are the same, no repositioning is expected solely as a result of the Reorganization. The Acquiring Fund may buy and sell portfolio securities in the ordinary course consistent with its investment strategies. For more information, please see the sections of the Proxy Statement/Prospectus titled “Summary—Reorganization—What will be the primary federal income tax consequences of the Reorganization?”, “Summary—Reorganization—Will there be any repositioning costs?” and “Information About the Reorganization—Material Federal Income Tax Consequences.” Q. Will I have to pay any sales load, commission, or other similar fee in connection with the Reorganization? A. No, you will not pay any sales load, commission, or other similar fee in connection with the shares of the Acquiring Fund you will receive in the Reorganization, and any contingent deferred sales charge (“CDSC”) holding period on your shares of the Target Fund will carry over to the shares of the Acquiring Fund that you receive in the Reorganization. However, following the Reorganization, additional purchases, exchanges and redemptions of shares of the Acquiring Fund will be subject to any applicable sales loads, commissions, and other similar fees. Q. Who will pay the costs of the Reorganization? A. Touchstone Advisors, and not the Funds, will bear 100% of the costs of the Reorganization, which are estimated to be approximately $90,000 or approximately 0.15% of the Target Fund’s net assets (as of May 31, 2019), whether or not the Reorganization is completed. Q. What if I redeem my shares before the Reorganization takes place? A. If you choose to redeem your shares before the Reorganization takes place, then the redemption will be treated as a normal sale of shares and, generally, will be a taxable transaction and may be subject to any applicable CDSC. Q. What will happen if shareholders of the Target Fund do not approve the Reorganization or the transaction is not completed? A. If the shareholders of the Target Fund do not approve the Reorganization or other closing conditions are not satisfied or waived, the Reorganization will not be completed, and the Board will consider other possible courses of action for the Target Fund, including continuing to operate the Fund as a stand-alone fund or merging the Fund into another Touchstone Fund. Q. When will the Reorganization occur? 2 A. The Reorganization is expected to be completed on or about September 6, 2019. Q. Who should I contact for more information? A. You can contact Shareholder Services at (800) 543-0407 for more information. 3 TOUCHSTONE CREDIT OPPORTUNITIES FUND a series of TOUCHSTONE STRATEGIC TRUST 303 Broadway, Suite 1100 Cincinna

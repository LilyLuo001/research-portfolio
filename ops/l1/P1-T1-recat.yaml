folio managers for the Acquiring Fund. The proposed Reorganization is also expected to result in the Target Fund being overseen by a different board of trustees and having different third-party service providers. AllianzGI U.S. and the Board of Trustees of the Allianz Trust ("Allianz Board" or "Allianz Trustees") believe that the proposed Reorganization will be beneficial to shareholders of the Target Fund ("Target Fund Shareholders"). The proposed Reorganization will provide Target Fund Shareholders with continued exposure to the asset classes and investment strategies of their original investment without interruption or significant transaction costs. For Institutional Class Target Fund Shareholders, the proposed Reorganization is expected to result in reduced operating expenses, after giving effect to a contractual expense limitation arrangement. Class A Target Fund Shareholders are expected to experience the same fund operating expenses after the proposed Reorganization, after giving effect to a contractual expense limitation arrangement. On a gross basis, expenses as a percentage of net assets are expected to increase for Class A shares of the Target Fund and remain the same for Institutional Class shares of the Target Fund following the proposed Reorganization. AllianzGI U.S. believes that the proposed Reorganization may benefit Target Fund Shareholders by providing the Fund with access to the Nationwide Insurance companies' distribution platform, which could provide potential asset growth opportunities that, if realized, may result in greater efficiencies and economies of scale for the Target Fund and Target Fund Shareholders. Neither the Target Fund nor the Acquiring Fund will bear any direct fees or expenses in connection with the proposed Reorganization, except with respect to the cost of buying and i selling portfolio securities necessary to effect the proposed Reorganization. If the proposed Reorganization is approved, AllianzGI U.S. does not expect that 
ies, by entering into repurchase agreements, or through the lending of its portfolio securities. The Fund may make loans, including to affiliated investment companies, to the extent permitted by the 1940 Act, the rules and regulations thereunder and any applicable exemptive relief. 6. The Fund may purchase or sell commodities to the extent permitted by applicable law from time to time. 7. The Fund may not purchase or sell real estate. The Fund may, for clarity, (i) purchase interests in issuers which deal or invest in real estate, including limited partnership interests of limited partnerships that invest or deal in real estate, (ii) purchase securities which are secured by real estate or interests in real estate, including real estate mortgage loans, and (iii) hold and dispose of real estate or interests in real estate acquired through the exercise of its rights as a holder of securities which are secured by real estate or interests therein. (For purposes of this restriction, investments by the Fund in mortgage-backed securities and other securities representing interests in mortgage pools shall not constitute the purchase or sale of real estate.) The investment restrictions numbered 1 through 7 below have been adopted as fundamental policies for the Low Duration Bond Fund. 1. The Fund may not issue any class of securities which is senior to the Fund’s shares of beneficial interest, except to the extent the Fund is permitted to borrow money and except as otherwise consistent with applicable law from time to time. 2. The Fund may not borrow money, except to the extent permitted by applicable law from time to time. 3. The Fund may not act as underwriter of securities of other issuers except to the extent that, in connection with the disposition of portfolio securities or in connection with the purchase of securities directly from the issuer thereof, it may be deemed to be an underwriter under certain federal securities laws. 4. The Fund may not purchase any security 
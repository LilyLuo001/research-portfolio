nses (expenses that you pay each year as a percentage of the value of your investment) Management Fees 0.95% Distribution and/or Service (12b-1) Fees 0.00% Other Expenses (1) 0.20% Total Annual Fund Operating Expenses 1.15% Fee Waiver (2) (0.15)% Total Annual Fund Operating Expenses After Fee Waiver 1.00% (1) Other Expenses are estimated for the current fiscal year. (2) The Fund’s advisor has contractually agreed to waive its fees and/or reimburse expenses of the Fund until December 31, 2023 to ensure that the Fund’s Total Annual Fund Operating Expenses After Fee Waiver (exclusive of any front-end or contingent deferred sales loads, taxes, leverage interest, brokerage commissions, expenses incurred in connection with any merger or reorganization, dividend expense on securities sold short, underlying fund fees and expenses and extraordinary expenses such as litigation) will not exceed 1.00% of average daily net assets. These fee waivers and expense reimbursements are subject to possible recoupment from the Fund in future years on a rolling three-year basis (within the three years after the fees have been waived or reimbursed) if such recoupment can be achieved within the foregoing expense limit and any then-current expense limit. This agreement may be terminated by the Fund’s Board of Trustees on 60 days’ written notice to the Fund’s advisor. Example The following example is intended to help retail investors compare the cost of investing in the Fund with the cost of investing in other funds. It illustrates the hypothetical expenses that such investors would incur over various periods if they invest $10,000 in the Fund for the time periods indicated and then redeem all of the shares at the end of those periods. This example assumes that the Fund provides a return of 5% a year and that operating expenses remain the same. Although your actual costs may be higher or lower, based on these assumptions, your costs would be: 1 YEAR 3 YEARS $102 $350 1 Portfolio Turnover The Fund pays transaction costs, such as commissions, when it buys and sells securities (or “turns over” its portfolio). A higher portfolio turnover rate may indicate higher transaction costs and may result in higher taxes when Fund shares are held in a taxable account. These costs, which are not reflected in annual fund operating expenses or in the Example, affect the Fund’s performance. Principal Investment Strategies of the Fund The Fund seeks capital appreciation by dynamically managing its allocation to Bitcoin futures and gold futures. The Fund does not invest in Bitcoin or gold directly. The advisor uses quantitative research that follows the methods of the AI Dynamic Bitcoin Index to determine the anticipated rise and fall of Bitcoin and gold. The index is designed and maintained by an indirect affiliate of the advisor and is intended to capture Bitcoin uptrends while incorporating dynamic allocations to gold and cash to attempt to minimize the downside risk and volatility when compared to a pure Bitcoin investment. Unlike the index, the Fund will be exposed to bitcoin futures. The advisor allocates assets by incorporating three long-term trend-following models, that employ a rules-based methodology that largely depends on the relative performance of Bitcoin and gold, and the Fund’s portfolio will dynamically change based on the indicators described below. Bitcoin to Gold Model. When the relative trends of Bitcoin compared to gold weaken, based on the model’s “Bitcoin to Gold Indicator,” the allocation to Bitcoin futures is reduced and allocation to gold futures increases. Bitcoin to Cash Model . When the relative trends of Bitcoin compared to cash weaken, based on the model’s “Bitcoin to Cash Indicator,” the allocation to Bitcoin futures is reduced and allocation to cash increases. Gold to Cash Model . When the relative trends of gold compared to cash weaken, based on the model’s “Gold to Cash Indicator,” the allocation to gold futures is reduced and allocation to cash increases. The advisor re-weights allocations to the three models in a manner similar to the AI Dynamic Bitcoin Index. The Fund’s allocation to these models may be driven by their relative performance for an extended period. Each model is independently driven by its long-term trend-following methodology. The Fund may allocate up to 25% of its net assets to Bitcoin futures, and up to 25% of its net assets in gold futures. Allocations may shift frequently based upon model signals. The advisor dynamically allocates the Fund’s assets and may have a significant allocation to c ash investments for prolonged periods of time when the advisor expects Bitcoin or gold to fall in value. 2 Bitcoin Futures Bitcoin is a digital asset, commonly referred to as a “cryptocurrency.” The ownership and operation of Bitcoin is determined by participants in an online, peer-to-peer network commonly referred to as the “Bitcoin Network”. The Bitcoin Network connects computers that run publicly accessible open-source software that follows the rules governing the Bitcoin Network. This is commonly referred to as the Bitcoin Protocol. The value of Bitcoin is not backed by any government, corporation, or other entity. Rather, its value is determined by the supply and demand in markets created to facilitate trading of Bitcoin. Ownership records and transaction records for Bitcoin are protected through public-key cryptography. The supply of Bitcoin is determined by the “Bitcoin Protocol.” No single entity owns or operates the Bitcoin Network. The Bitcoin Network is collectively maintained by (i) a decentralized group of participants running software that results in the recording and validation of transactions (this group is commonly referred to as “miners”), (ii) software developers who propose improvements to the Bitcoin Protocol and related software and (iii) users who choose which version of the Bitcoin software to run. Occasionally, developers suggest changes to the Bitcoin software. If a sufficient number of users and miners elect not to adopt the changes, a new digital asset, operating on the earlier version of the Bitcoin software, may be created. This is referred to as a “fork.” The Fund achieves an allocation to Bitcoin through Bitcoin futures. Bitcoin futures are intended to track, although not lockstep, the price of Bitcoin. The Fund only invests in standardized, cash-settled Bitcoin futures contracts traded on commodity exchanges registered with the Commodity Futures Trading Commission, such as the Chicago Mercantile Exchange (the “CME”). As of the date of this prospectus, only the CME has such contracts. The value of Bitcoin futures is determined by reference to the CME CF Bitcoin Reference Rate, which is designed to provide an indication of the price of Bitcoin across certain cash Bitcoin exchanges. The Fund invests primarily in front-month Bitcoin futures. Front-month Bitcoin futures contracts are those contracts with the shortest time to maturity. Gold and Gold Futures Contracts The Fund achieves an allocation to gold through gold futures. Gold futures are intended to track, although not lockstep, the price of gold. The Fund invests in standardized gold futures contracts traded on commodity exchanges registered with the Commodity Futures Trading Commission, such as the Commodity Exchange Inc. (commonly known as COMEX), which is a part of the Chicago Mercantile Exchange Group. The value of gold futures is determined by reference to 100 troy ounces of gold subject to an assay minimum fineness (i.e. 99.5% pure). The advisor invests primarily in front-month gold futures. Front-month gold futures contracts are those contracts with the shortest time to maturity. Investing through a Subsidiary To achieve an allocation to Bitcoin futures and gold futures consistent with the limits of the U.S. federal tax law requirements applicable to registered investment companies, the Fund employs a subsidiary. The Fund may invest up to 25% of its total assets in the Subsidiary. The Subsidiary invests in Bitcoin futures and gold futures, as well as cash equivalents, which are intended to serve as margin or collateral for the Subsidiary’s investments in futures. When viewed on a consolidated basis, the Subsidiary is subject to the same investment restrictions as the Fund. 3 The Fund consolidates the Subsidiary for purposes of financial statements, leverage and concentration. The advisor is solely responsible for managing the assets of the Subsidiary. Cash Investments To generate income, the advisor allocates a significant portion of the Fund’s portfolio to cash investments. Cash investments consist of high-quality short-term securities, including (i) U.S. Government securities, such as bills, notes and bonds issued by the U.S. Treasury; (ii) money market funds and short duration fixed income ETFs; (iii) corporate debt securities, such as commercial paper and other short-term unsecured promissory notes issued by businesses that are rated investment grade or determined by the advisor to be of comparable quality; and (iv) repurchase agreements (contracts in which a seller of securities, usually U.S. government securities or other money market instruments, agrees to buy the securities back at a specified time and price). A portion of cash investments serve as the collateral for investments in Bitcoin futures and gold futures held by the Subsidiary. The Fund will invest at least 50% of its net assets in cash at all times. Principal Risks of Investing in the Fund As with all funds, there is the risk that you could lose money through your investment in the Fund. Many factors affect the Fund’s net asset value (“NAV”), price of shares, and performance. The following describes the risks the Fund bears with respect to its direct investments as well as indirectly through investments in the Subsidiary. As with any fund, there is no guarantee that the Fund will achieve its objective. The following risks apply to the Fund’s investments: Bitcoin Risk. The value of the Fund’s investment in Bitcoin futures is subject to fluctuations in the value of bitcoins. The value of bitcoins is determined by the supply of and demand for bitcoins in the global market for the trading of bitcoins, which consists of transactions on electronic bitcoin exchanges (“Bitcoin Exchanges”). Pricing on Bitcoin Exchanges and other venues can be volatile and can adversely affect the value of Bitcoin futures. Currently, there is relatively small use of bitcoins in the retail and commercial marketplace in comparison to the relatively large use of bitcoins by speculators, thus contributing to price volatility that could adversely affect the Fund’s investment in Bitcoin futures. The further development of the Bitcoin Network and the acceptance and use of Bitcoin are subject to a variety of factors that are difficult to evaluate. The slowing, stopping or reversing of the development of the Bitcoin Network or the acceptance of Bitcoin may adversely affect the price of Bitcoin. Bitcoin is subject to the risk of fraud, theft, manipulation or security failures, operational or other problems that impact Bitcoin trading venues. Additionally, if one or a coordinated group of miners were to gain control of 51% of the Bitcoin Network, they would have the ability to manipulate transactions, halt payments and fraudulently obtain Bitcoin. A significant portion of Bitcoin is held by a small number of holders sometimes referred to as “whales.” These holders have the ability to manipulate the price of Bitcoin. 4 Unlike the exchanges for more traditional assets, such as equity securities and futures contracts, Bitcoin and Bitcoin trading venues are largely unregulated. As a result of the lack of regulation, individuals or groups may engage in fraud or market manipulation (including using social media to promote Bitcoin in a way that artificially increases the price of Bitcoin). Investors may be more exposed to the risk of theft, fraud and market mani

      497 1 tm2424670d25_497.htm 497 out - none - 12.524s TABLE OF CONTENTS MASSMUTUAL FUNDS ​ This Prospectus describes the following Funds: Fund Name ​ ​ Class I ​ ​ Class R5 ​ ​ Service Class ​ ​ Administrative Class ​ ​ Class R4 ​ ​ Class A ​ ​ Class R3 ​ ​ Class Y ​ MassMutual U.S. Government Money Market Fund ​ ​ ​ ​ ​ MKSXX ​ ​ ​ ​ ​ ​ ​ ​ ​ ​ ​ ​ ​ ​ ​ ​ ​ ​ ​ MassMutual Inflation-Protected and Income Fund ​ ​ MIPZX ​ ​ MIPSX ​ ​ MIPYX ​ ​ MIPLX ​ ​ MIPRX ​ ​ MPSAX ​ ​ MIPNX ​ ​ MMODX ​ MassMutual Core Bond Fund ​ ​ MCZZX ​ ​ MCBDX ​ ​ MCBYX ​ ​ MCBLX ​ ​ MCZRX ​ ​ MMCBX ​ ​ MCBNX ​ ​ MMNWX ​ MassMutual Diversified Bond Fund ​ ​ MDBZX ​ ​ MDBSX ​ ​ MDBYX ​ ​ MDBLX ​ ​ MDBFX ​ ​ MDVAX ​ ​ MDBRX ​ ​ MMOBX ​ MassMutual Balanced Fund ​ ​ MBBIX ​ ​ MBLDX ​ ​ MBAYX ​ ​ MMBLX ​ ​ MBBRX ​ ​ MMBDX ​ ​ MMBRX ​ ​ MMNVX ​ MassMutual Disciplined Growth Fund ​ ​ MPDIX ​ ​ MPGSX ​ ​ DEIGX ​ ​ MPGLX ​ ​ MPDGX ​ ​ MPGAX ​ ​ MPDRX ​ ​ MMNYX ​ MassMutual Small Cap Opportunities Fund ​ ​ MSOOX ​ ​ MSCDX ​ ​ MSVYX ​ ​ MSCLX ​ ​ MOORX ​ ​ DLBMX ​ ​ MCCRX ​ ​ MMOGX ​ MassMutual Global Fund ​ ​ MGFZX ​ ​ MGFSX ​ ​ MGFYX ​ ​ MGFLX ​ ​ MGFRX ​ ​ MGFAX ​ ​ MGFNX ​ ​ MMOCX ​ MassMutual International Equity Fund ​ ​ MIZIX ​ ​ MIEDX ​ ​ MYIEX ​ ​ MIELX ​ ​ MEIRX ​ ​ MMIAX ​ ​ MEERX ​ ​ MMOEX ​ The Securities and Exchange Commission has not approved or disapproved these securities or passed upon the adequacy of this Prospectus. Any statement to the contrary is a crime. PROSPECTUS February 1, 2025, as Revised on February 5, 2025 − 1 − TABLE OF CONTENTS ​ Table Of Contents ​ ​ ​ Page ​ About the Funds ​ MassMutual U.S. Government Money Market Fund ​ ​ ​ ​ 3 ​ ​ MassMutual Inflation-Protected and Income Fund ​ ​ ​ ​ 7 ​ ​ MassMutual Core Bond Fund ​ ​ ​ ​ 15 ​ ​ MassMutual Diversified Bond Fund ​ ​ ​ ​ 23 ​ ​ MassMutual Balanced Fund ​ ​ ​ ​ 31 ​ ​ MassMutual Disciplined Growth Fund ​ ​ ​ ​ 41 ​ ​ MassMutual Small Cap Opportunities Fund ​ ​ ​ ​ 46 ​ ​ MassMutual Global Fund ​ ​ ​ ​ 52 ​ ​ MassMutual International Equity Fund ​ ​ ​ ​ 58 ​ ​ Additional Information Regarding Investment Objectives and Principal Investment Strategies ​ ​ ​ ​ 65 ​ ​ Disclosure of Portfolio Holdings ​ ​ ​ ​ 68 ​ ​ Additional Information Regarding Principal Risks ​ ​ ​ ​ 68 ​ ​ Management of the Funds ​ Investment Adviser ​ ​ ​ ​ 88 ​ ​ Subadvisers and Portfolio Managers ​ ​ ​ ​ 88 ​ ​ About the Classes of Shares – I, R5, Service, Administrative, R4, A, R3, and Y Shares ​ ​ ​ ​ 94 ​ ​ Sales Charges by Class ​ ​ ​ ​ 96 ​ ​ Sales Charge Waivers and Discounts by Class ​ ​ ​ ​ 97 ​ ​ Distribution Plan, Shareholder Servicing, and Payments to Intermediaries ​ ​ ​ ​ 99 ​ ​ Buying, Redeeming, and Exchanging Shares ​ ​ ​ ​ 101 ​ ​ Cost Basis Reporting ​ ​ ​ ​ 104 ​ ​ Frequent Trading Policies ​ ​ ​ ​ 105 ​ ​ Determining Net Asset Value ​ ​ ​ ​ 106 ​ ​ Taxation and Distributions ​ ​ ​ ​ 107 ​ ​ Financial Highlights ​ ​ ​ ​ 110 ​ ​ Index Descriptions ​ ​ ​ ​ 127 ​ ​ Appendix A ​ ​ ​ ​ A-1 ​ ​ − 2 − TABLE OF CONTENTS ​ ​ MassMutual U.S. Government Money Market Fund INVESTMENT OBJECTIVE This Fund seeks current income consistent with preservation of capital and liquidity. FEES AND EXPENSES OF THE FUND This table describes the fees and expenses that you may pay if you buy, hold, and sell shares of the Fund. You may pay brokerage commissions and other fees to financial intermediaries which are not reflected in the tables and examples below. Shareholder Fees (fees paid directly from your investment) ​ ​ ​ Class R5 ​ ​ Maximum Sales Charge (Load) Imposed on Purchases (as a % of offering price) ​ ​ ​ None ​ ​ Maximum Deferred Sales Charge (Load) (as a % of the lower of the original offering price or redemption proceeds) ​ ​ ​ None ​ Annual Fund Operating Expenses (expenses that you pay each year as a percentage of the value of your investment) ​ ​ ​ Class R5 ​ ​ Management Fees ​ ​ ​ 0.35% ​ Distribution and Service (Rule 12b-1) Fees ​ ​ ​ None ​ Other Expenses ​ ​ ​ 0.19% ​ Total Annual Fund Operating Expenses ​ ​ 0.54% ​ Example This example is intended to help you compare the cost of investing in the Fund with the cost of investing in other mutual funds. It assumes that you invest $10,000 in Class R5 shares of the Fund for the time periods indicated and then redeem all of your shares at the end of those periods. The example also assumes that your investment earns a 5% return each year and that the Fund’s operating expenses are exactly as described in the preceding table. Although your actual costs may be higher or lower, based on these assumptions your costs would be: ​ ​ ​ 1 Year ​ ​ ​ 3 Years ​ ​ ​ 5 Years ​ ​ ​ 10 Years ​ ​ Class R5 ​ ​ ​ $55 ​ ​ $173 ​ ​ $302 ​ ​ $677 ​ INVESTMENTS, RISKS, AND PERFORMANCE ​ Principal Investment Strategies The Fund normally invests at least 99.5% of its total assets in cash, U.S. Government securities, and/or repurchase agreements fully collateralized by cash or U.S. Government securities. In managing the Fund, the Fund’s subadviser, Barings LLC (“Barings”), intends to comply with Rule 2a-7 under the Investment Company Act of 1940, as amended (the “1940 Act”), which sets forth the requirements for money market funds regarding credit quality, diversification, liquidity, and maturity. The Fund seeks to maintain, but does not guarantee, a stable $1.00 share price. Under normal circumstances, the Fund invests at least 80% of its net assets in U.S. Government securities and repurchase agreements that are fully collateralized by U.S. Government securities. U.S. Government securities are high-quality securities issued or guaranteed by the U.S. Treasury or by an agency or instrumentality of the U.S. Government. U.S. Government securities may be backed by the full faith and credit of the U.S. Treasury, the right to borrow from the U.S. Treasury, or the agency or instrumentality issuing or guaranteeing the security. Certain issuers of U.S. Government securities, including Fannie Mae, Freddie Mac, and the Federal Home Loan Banks, are sponsored or chartered by Congress but their securities are neither issued nor guaranteed by the U.S. Treasury. Principal Risks You could lose money by investing in the Fund. Although the Fund seeks to preserve the value of your investment at $1.00 per share, it cannot guarantee it will do so. An investment in the Fund is not a bank account and is not insured or guaranteed by the Federal Deposit Insurance Corporation or any other government agency. The Fund’s sponsor is not required to reimburse the Fund for losses, and you should not expect that the sponsor will provide ​ − 3 − TABLE OF CONTENTS financial support to the Fund at any time, including during periods of market stress. Certain risks relating to instruments and strategies used in the management of the Fund are placed first. The significance of any specific risk to an investment in the Fund will vary over time, depending on the composition of the Fund’s portfolio, market conditions, and other factors. You should read all of the risk information presented below carefully, because any one or more of these risks may result in losses to the Fund. Money Market Instruments Risk The value of a money market instrument typically will decline during periods of rising interest rates, and can also decline in response to changes in the financial condition of the issuer, borrower, counterparty, or underlying collateral assets, or changes in market, economic, industry, political, regulatory, public health, and other conditions affecting a particular type of security or issuer or fixed income securities generally. U.S. Government Securities Risk Obligations of certain U.S. Government agencies and instrumentalities are not backed by the full faith and credit of the U.S. Government, and there can be no assurance that the U.S. Government would provide financial support to such agencies and instrumentalities. Repurchase Agreement Risk These transactions must be fully collateralized, but involve credit risk to a Fund if the other party should default on its obligation and the Fund is delayed or prevented from recovering the collateral. Credit Risk Credit risk is the risk that an issuer, guarantor, or liquidity provider of a fixed income security held by the Fund may be unable or unwilling, or may be perceived (whether by market participants, ratings agencies, pricing services or otherwise) as unable or unwilling, to make timely principal and/or interest payments, or to otherwise honor its obligations. The Fund may also be exposed to the credit risk of its counterparty to repurchase agreements, reverse repurchase agreements, swap transactions, and other derivatives transactions, and to the counterparty’s ability or willingness to perform in accordance with the terms of the transaction. The value of such transactions to the Fund will depend on the willingness and ability of the counterparty to perform its obligations, including among other things the obligation to return collateral or margin to the Fund. If a counterparty becomes bankrupt or otherwise fails to perform its obligations under a derivative contract due to financial difficulties, the Fund may experience significant delays in obtaining any recovery under the derivative contract in a bankruptcy or other reorganization proceeding. The Fund may obtain only a limited recovery or may obtain no recovery in such circumstances. Inflation Risk The value of assets or income from the Fund’s investments will be less in the future as inflation decreases the value of money. As inflation increases, the value of the Fund’s assets can decline as can the value of the Fund’s distributions. Inflation rates may change frequently and drastically as a result of various factors, including unexpected shifts in the domestic or global economy (or expectations that such policies will change), and the Fund’s investments may not keep pace with inflation, which may result in losses to the Fund’s investors. Liquidity Risk Certain securities may be difficult (or impossible) to sell or certain positions may be difficult to close out at a desirable time and price, and the Fund may be required to hold an illiquid investment that is declining in value, or it may be required to sell certain illiquid investments at a price or time that is not advantageous in order to meet redemptions or other cash needs. Some securities may be subject to restrictions on resale. There can be no assurance that there will be a liquid market for instruments held by the Fund at any time. The Fund may not receive the proceeds from the sale of certain investments for an extended period. Management and Operational Risk The Fund relies on the manager’s investment analysis and its selection of investments to achieve its investment objective, and the Fund is subject to the risk that the manager’s assessment of an investment is wrong. There can be no assurance that the Fund will achieve the intended results and the Fund may incur significant losses. The Fund also runs the risk that deficiencies in the investment adviser’s, subadviser’s, or another service provider’s internal systems or controls will cause losses for the Fund or impair Fund operations. Market Risk The value of the Fund’s portfolio securities may decline, at times sharply and unpredictably, as a result of unfavorable market-induced changes affecting particular industries, sectors, or issuers. Stock and bond markets can decline significantly in response to issuer, market, economic, industry, political, regulatory, ​ − 4 − TABLE OF CONTENTS geopolitical, public health, and other conditions, as well as investor perceptions of these conditions. The Fund is subject to risks affecting issuers, such as management performance, financial leverage, industry problems, and reduced demand for goods or services. Prepayment Risk Prepayment risk is the risk that principal of a debt obligation will be repaid at a faster rate than anticipated. In such a case, a Fund may lose the benefit of a favorable interest rate for the remainder of the term of the security in question, and may only be able to reinvest the amount of the prepayment at a less favorable rate. Valuation Risk The Fund is subject to the risk of mispricing or improper valuation of its investments, in particular to the extent that its securities are fair valued. Performance Information The following bar chart and table provide some indication of the risks of investing in the Fund. The bar chart shows changes in the Fund’s performance from year to year for Class R5 shares. The table shows how the Fund’s average annual returns for 1, 5, and 10 years compare with those of a broad measure of market performance and an additional index that MML Advisers believes more closely reflects the market segments in which the Fund invests (FTSE 3 Month US T Bill Index). The Fund’s name, investment objective, and investment strategy changed on May 1, 2016 when the Fund changed from a money market fund to a government money market fund. Performance results shown were achieved when the Fund could invest in types of securities that it is no longer able to hold. Future performance of the Fund may be lower as a result. Past performance (before and after taxes) is not necessarily an indication of how the Fund will perform in the future. More up-to-date performance information is available at https://www.massmutual.com/product-performance/mutual-funds or by calling 1-888-309-3539. Annual Performance Class R5 Shares ​ Highest Quarter: ​ ​ ​ 4Q ’23, ​ ​ ​ ​ ​ 1.24 % ​ ​ ​ Lowest Quarter: ​ ​ ​ 1Q ’15 thru 4Q ’16; 2Q ’20 thru 1Q ’22; 0.00% ​ Average Annual Total Returns (for the periods ended December 31, 2024) ​ ​ ​ ​ ​ ​ ​ ​ One Year ​ ​ ​ ​ Five Years ​ ​ ​ ​ Ten Years ​ ​ Class R5 ​ ​ ​ ​ Return Before Taxes ​ ​ ​ ​ ​ ​ 4.78 % ​ ​ ​ ​ ​ ​ 2.14 % ​ ​ ​ ​ ​ ​ 1.41 % ​ ​ Bloomberg U.S. Aggregate Bond Index (reflects no deduction for fees, expenses, or taxes) (1) ​ ​ ​ ​ ​ 1.25 % ​ ​ ​ ​ ​ ​ -0.33 % ​ ​ ​ ​ ​ ​ 1.35 % ​ ​ FTSE 
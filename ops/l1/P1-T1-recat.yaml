      N-14 1 rems-n14_100120.htm INITIAL REGISTRATION STATEMENT As filed with the Securities and Exchange Commission on October 1, 2020 Registration No.333- UNITED STATES SECURITIES AND EXCHANGE COMMISSION Washington, D.C. 20549 FORM N-14 REGISTRATION STATEMENT UNDER THE SECURITIES ACT OF 1933 Pre-Effective Amendment No. ☐ Post-Effective Amendment No. ☐ WORLD FUNDS TRUST (Exact Name of Registrant as Specified in Charter) 8730 Stony Point Parkway, Suite 205, Richmond, VA 23235 (Address of Principal Executive Offices) (804) 267-7400 (Registrant’s Telephone Number) The Corporation Trust Co. Corporation Trust Center, 1209 Orange St., Wilmington, DE 19801 (Name and Address of Agent for Service) With Copy to: John H. Lively Practus, LLP 11300 Tomahawk Creek Parkway, Suite 310 Leawood, KS 66211 Title of Securities Being Registered: Institutional Shares and Platform Shares of the REMS Real Estate Value-Opportunity Fund series of the Registrant. No filing fee is required because the Registrant is relying on Section 24(f) of the Investment Company Act of 1940, as amended, pursuant to which it has previously registered an indefinite number of shares. Approximate Date of Proposed Public Offering: As soon as practicable after this Registration Statement becomes effective under the Securities Act of 1933, as amended. It is proposed that this filing will become effective October 31, 2020 pursuant to Rule 488 under the Securities Act of 1933, as amended, unless effectiveness is accelerated as requested by the Registrant. WORLD FUNDS TRUST CONTENTS OF REGISTRATION STATEMENT Cover Sheet Contents of Registration Statement Letter to Shareholders Questions and Answers Part A — Combined Information Statement/Prospectus Part B — Statement of Additional Information Part C — Other Information Signature Page Exhibits Part A The information in this combined proxy statement and prospectus is not complete and may be changed. We may not sell these securities until the registration statement filed with the Securities and Exchange Commission is effective. This combined proxy statement and prospectus is not an offer to sell these securities and is not soliciting an offer to buy these securities in any state where the offer or sale is not permitted. COMBINED PROXY STATEMENT AND PROSPECTUS For the Reorganization of REMS Real Estate Income 50/50 Fund Institutional Shares (Ticker: RREIX) Platform Shares (Ticker: RREFX) Z Shares (Ticker: RREZX) 8730 Stony Point Parkway Suite 205 Richmond, VA 23235 (800) 673-0550 into the REMS Real Estate Value-Opportunity Fund Institutional Shares (Ticker: HLRRX) Platform Shares (Ticker: HLPPX) Z Shares (Ticker: HLZZX) 8730 Stony Point Parkway Suite 205 Richmond, VA 23235 (800) 673-0550 Each a series of World Funds Trust November __, 2020 REMS REAL ESTATE INCOME 50/50 FUND A SERIES OF WORLD FUNDS TRUST 8730 Stony Point Parkway Suite 205 Richmond, VA 23235 November __, 2020 Dear Shareholder: On behalf of the Board of Trustees (the “Board”) of World Funds Trust (the “Trust”), we are pleased to invite you to a special meeting of shareholders (the “Special Meeting”) of the REMS Real Estate Income 50/50 Fund (the “Target Fund”). The Special Meeting is scheduled for December 16, 2020, at the offices of the Target Fund’s transfer agent, Commonwealth Fund Services, Inc., 8730 Stony Point Parkway, Suite 205, Richmond, Virginia 23235. We intend to hold the Special Meeting in person. However, we are sensitive to the public health and travel concerns our shareholders may have and recommendations that public health officials may issue in light of the evolving COVID-19 pandemic. As a result, we may impose additional procedures or limitations on Special Meeting attendees or may decide to hold the Special Meeting in a different location or solely by means of remote communication. We plan to announce any such updates on our proxy website _______________, and we encourage you to check this website prior to the Special Meeting if you plan to attend. We also encourage you to consider your options to vote by internet, telephone, or mail, as discussed below, in advance of the Special Meeting in the event that, as of December 16, 2020, in-person attendance at the Special Meeting is either prohibited under a federal, state, or local order or contrary to the advice of public health care officials. At the Special Meeting, shareholders of the Target Fund will be asked to vote on the proposed reorganization (the “Reorganization”) of the Target Fund into the REMS Real Estate Value-Opportunity Fund (the “Survivor Fund”) . The Target Fund and the Survivor Fund are both series of the Trust. The Target Fund and the Survivor Fund are sometimes each referred to separately as a “Fund”, and together as the “Funds”. The series surviving the Reorganization, the Survivor Fund, will be referred to herein as the “Combined Fund”. While the Funds’ investment objectives, principal investment strategies and investment policies are similar, there are differences between the two, as further described in the enclosed combined proxy statement and prospectus (the “Proxy Statement/Prospectus”). Real Estate Management Services Group, LLC (the “Adviser”), the investment adviser to the Funds, recommended the reorganization of the Target Fund because the Adviser believes that it is in the best interests of each Fund’s shareholders if the Target Fund is combined with the Survivor Fund because (1) the Survivor Fund has a similar investment objective and similar real estate, yield-focused investment strategy using the same primary benchmark, the MSCI US REIT Index, as the Target Fund; (2) the same portfolio managers that currently manage each Fund will manage the Combined Fund following the closing of the Reorganization; (3) the Adviser anticipates enhanced return opportunities will exist for investors in the Combined Fund as a result of the highly unusual pandemic market environment which has resulted in material discounted valuations for public real estate equities and resultant increased value and yield opportunities; (4) the Reorganization will allow Target Fund shareholders to remain invested without the potential for incurring any federal tax liability; and (5) the expenses of the Target Fund are in excess of the Fund’s expense cap at current asset levels, and are unlikely to fall below the cap in the current market environment. The assets of the Target Fund are not at the levels that the Adviser anticipated due to a number of factors, including market factors related to the COVID-19 global pandemic and its impact on investor interest in public real estate securities. Accordingly, the Adviser would be required to subsidize the Target Fund to continue its operations as currently structured, which the Adviser is not willing to do. At a special meeting of the Board held on September 22, 2020, the Board approved the Reorganization subject to the approval of shareholders of the Target Fund. A discussion of the factors considered by the Board in approving the Reorganization is set forth in the Proxy Statement/Prospectus. If the Reorganization is approved by shareholders, you will become a shareholder of the Survivor Fund on or around the date the Reorganization occurs. The Agreement and Plan of Reorganization provides that the Target Fund will transfer all of its assets and liabilities to the Survivor Fund. In exchange for the transfer of these assets and liabilities, the Survivor Fund will simultaneously issue shares to the Target Fund in an amount equal in value to the net asset value of the Target Fund’s shares as of the close of business on the business day the foregoing transfers are made. These transfers are expected to occur on or about December 18, 2020 (the “Closing Date”). Immediately after the close of business on the Closing Date, the Target Fund will make a liquidating distribution to its shareholders of the Survivor Fund shares received, so that a holder of shares in the Target Fund on the Closing Date will receive a number of shares of the Survivor Fund with the same aggregate value as the value of the shares the shareholder had in the Target Fund immediately before the Reorganization. As a result of the Reorganization, you will receive shares (including fractional shares, if any) of the class in the Survivor Fund with the same aggregate net asset value as the shares of the same class of the Target Fund you own immediately prior to the Reorganization. Following the Reorganization, the Target Fund will be terminated and cease operations as a separate series of the Trust. Shareholders of the Target Fund will not be assessed any sales charges, redemption fees or any other shareholder fee in connection with the Reorganization. Formal notice of the Special Meeting appears on the next page, followed by the Proxy Statement/Prospectus. The proposal is discussed in detail in the enclosed Proxy Statement/Prospectus, which you should read carefully. The Board recommends that you vote “FOR” the proposal. Your vote is important regardless of the number of shares you own. To avoid the added cost of follow-up solicitations and possible adjournments, please read the Proxy Statement/Prospectus and cast your vote. It is important that your vote be received before December 16, 2020. You can vote in one of four ways: ● By mail with the enclosed proxy card; ● By internet through the website listed in the proxy voting instructions; ● By telephone using the toll-free number listed in the proxy voting instructions; or ● In person at the special shareholder meeting on December 16, 2020. We appreciate your participation and prompt response in this matter and thank you for your continued support. Sincerely, /s/ David A. Bogaert David A. Bogaert President REMS Real Estate Income 50/50 Fund a series of World Funds Trust 8730 Stony Point Parkway Suite 205 Richmond, VA 23235 Important Notice Regarding Availability of Proxy Materials for the Shareholder Meeting to be held on December 16, 2020 NOTICE OF SPECIAL MEETING OF SHAREHOLDERS To the Shareholders of the REMS Real Estate Income 50/50 Fund: NOTICE IS HEREBY GIVEN that a special meeting of the shareholders (the “Special Meeting”) of the REMS Real Estate Income 50/50 Fund (the “Target Fund”) is scheduled for December 16, 2020 at 10:00 a.m. Eastern Time at the offices of the Target Fund’s transfer agent, Commonwealth Fund Services, Inc., 8730 Stony Point Parkway, Suite 205, Richmond, Virginia 23235. We intend to hold the Special Meeting in person. However, we are sensitive to the public health and travel concerns our shareholders may have and recommendations that public health officials may issue in light of the evolving COVID-19 pandemic. As a result, we may impose additional procedures or limitations on Special Meeting attendees or may decide to hold the Special Meeting in a different location or solely by means of remote communication. We plan to announce any such updates on our proxy website _______________, and we encourage you to check this website prior to the Special Meeting if you plan to attend. We also encourage you to consider your options to vote by internet, telephone, or mail, as discussed below, in advance of the Special Meeting in the event that, as of December 16, 2020, in-person attendance at the Special Meeting is either prohibited under a federal, state, or local order or contrary to the advice of public health care officials. At the Special Meeting, the Target Fund’s shareholders will be asked to vote on one proposal: 1. To approve an Agreement and Plan of Reorganization by and between the Target Fund and the REMS Real Estate Value-Opportunity Fund (the “Survivor Fund”), providing for the reorganization of the Target Fund into the Survivor Fund (the “Reorganization”); and 2. To transact such other business, not currently contemplated, that may properly come before the Special Meeting, or any adjournments or postponements thereof, in the discretion of the proxies or their substitutes. Please read the enclosed combined proxy statement and prospectus (the “Proxy Statement/Prospectus”) carefully for information concerning the proposal to be placed before the Special Meeting. The Board of Trustees recommends that you vote “FOR” the Proposal. Shareholders of record as of the close of business on September 23, 2020, are entitled to notice of, and to vote at, the Special Meeting and are also entitled to vote at any adjournments or postponements thereof. Your attention is called to the accompanying Proxy Statement/Prospectus. Regardless of whether you plan to attend the Special Meeting, please complete, sign, and return the enclosed Proxy Ballot before December 16, 2020 so that a quorum will be present and a maximum number of shares may be voted. Proxies may be revoked at any time before they are exercised by submitting a revised Proxy Ballot, by giving written notice of revocation to the Target Fund or by voting in person at the Special Meeting. This Notice of Special Meeting of Shareholders and the Proxy Statement/Prospectus are available by calling (toll-free) 1-(866) 828-9088 or on the internet at https://vote.proxyonline.com/wft/docs/REMSRealEstate.pdf. On this webpage, you also will be able to access the Target Fund’s Prospectus, the Survivor Fund’s Prospectus, and any amendments or supplements to the foregoing material that are required to be furnished to shareholders. We encourage you to access and review all of the important information contained in the proxy materials before voting. By Order of the Board of Trustees /s/ David A. Bogaert David A. Bogaert President PROXY STATEMENT/PROSPECTUS November __, 2020 Special Meeting of Shareholders of the REMS Real Estate Income 50/50 Fund Scheduled for December 16, 2020 Acquisition of the Assets and Liabilities of: By and in Exchange for Shares of Beneficial Interest of: REMS Real Estate Income 50/50 Fund INSTITUTIONAL SHARES (Ticker: RREIX) PLATFORM SHARES (Ticker: RREFX) Z SHARES (Ticker: RR
counts; financial markets; foreign investment regulations; stability of exchange rate policy; and labor conditions. Although the Fund invests principally in investments denominated in local currencies, the Fund may invest in investments denominated in the U.S. dollar (including U.S. Government securities). There is no limit on the percentage of the Fund’s assets that may be invested in any single emerging market country, currency, or issuer or any group of emerging market countries, currencies, or issuers. The Fund expects normally to have significant exposure to foreign currencies, which may be achieved by investing in bonds denominated in the local currencies of foreign issuers or by investing in currencies directly or in currency-related instruments, such as forward contracts. The Fund may enter into foreign currency exchange transactions, including foreign currency futures and forward contracts and foreign currency swaps and options, to take long or short positions in various currencies, including currencies to which the Fund might not otherwise have exposure, in order to benefit from changes in the values of those currencies anticipated by the Adviser. The Fund may also enter into foreign currency exchange transactions in order to hedge against changes in the values of its portfolio investments due to declines in the values of the currencies in which those investments are denominated against the U.S. dollar (although the Fund does not expect typically to hedge portfolio currency exposures). The Fund may use any of the instruments, or any combination of the instruments, described above ( e.g ., an interest rate swap combined with a long forward -5- Table of Contents currency contract) to create long or short synthetic positions as a substitute for a cash investment. Foreign currency exchange transactions may have the effect of creating investment leverage in the Fund’s portfolio, and the returns from such transactions may represent, from time to time, a signific
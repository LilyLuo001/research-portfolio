ing price or redemption proceeds) None 2 None 2 5.00 % 1.00 % None None Annual Fund Operating Expenses (expenses that you pay each year as a percentage of the value of your investment) Management Fees (as an annual percentage of the Fund's average daily net assets) 3 0.84 % 0.84 % 0.84 % 0.84 % 0.84 % 0.84 % Distribution and/or Service (12b-1) Fees 0.25 % 0.25 % 1.00 % 1.00 % None None Other Expenses 0.08 % 0.39 % 0.39 % 0.39 % 0.08 % 0.03 % Total Annual Fund Operating Expenses 1.17 % 1.48 % 2.23 % 2.23 % 0.92 % 0.87 % 1. Class B shares are closed to all new purchases as well as additional investments by existing Class B shareholders. 2. No initial sales charge applies on investments of $1 million or more (and certain other qualified purchases). However, a contingent deferred sales charge of 1.00% may be imposed on certain redemptions made within 18 months of the date of purchase on shares that were purchased without an initial sales charge. 3. The management fee is as follows: 0.85% on assets up to $500 million; 0.825% on assets from $500 million to $1 billion; and 0.80% on assets over $1 billion. Example The Example is intended to help you compare the cost of investing in the Fund with the cost of investing in other mutual funds. The Example assumes that you invest $10,000 in the Fund for the time periods indicated whether or not you redeem all of your shares at the end of those periods (except as indicated with respect to Class B and Class C shares). The Example reflects Class B shares converting into Investor Class shares in years 9-10; fees could be lower if you are eligible to convert to Class A shares instead. The Example also assumes that your investment has a 5% return each year and that the Fund's operating expenses remain the same. The Example reflects the contractual fee waiver and/or expense reimbursement arrangement, if applicable, for the current duration of the arrangement only. Although your actual costs may be higher or lower, based on these assumptions your costs would be: Expenses After Class A Investor Class B Class C Class I Class R6 Class Assuming no redemption Assuming redemption at end of period Assuming no redemption Assuming redemption at end of period 1 Year $ 663 $ 692 $ 226 $ 726 $ 226 $ 326 $ 94 $ 89 3 Years $ 901 $ 992 $ 697 $ 997 $ 697 $ 697 $ 293 $ 278 5 Years $ 1,158 $ 1,313 $ 1,195 $ 1,395 $ 1,195 $ 1,195 $ 509 $ 482 10 Years $ 1,892 $ 2,221 $ 2,376 $ 2,376 $ 2,565 $ 2,565 $ 1,131 $ 1,073 Portfolio Turnover The Fund pays transaction costs, such as commissions, when it buys and sells securities (or "turns over" its portfolio). A higher portfolio turnover rate may indicate higher transaction costs and may result in higher taxes when Fund shares are held in a taxable account. These costs, which are not reflected in annual fund operating expenses or in the Example, affect the Fund's performance. During the most recent fiscal year, the Fund's portfolio turnover rate was 41% of the average value of its portfolio. Principal Investment Strategies The Fund invests primarily in a diversified portfolio consisting of equity securities of U.S. companies. Under normal circumstances, the Fund will invest at least 80% of its assets (net assets plus any borrowings for investment purposes) in equity securities of U.S. companies across all market 4 MainStay Epoch U.S. All Cap Fund capitalizations. Generally, U.S. companies are companies organized in the United States or companies that issue securities that trade primarily in U.S. securities markets. Equity securities include common stocks and securities convertible into common stock, such as warrants, rights, convertible bonds, debentures and convertible preferred stock. Convertible preferred stocks and debentures must be rated investment grade by an independent rating agency, such as Baa3 or better by Moody's Investors Service Inc. or BBB- or better by Standard & Poor's when purchased, or if unrated, considered by Epoch Investment Partners, Inc., the Fund’s Subadvisor, to be of comparable quality. Investment Process: The Subadvisor invests primarily in companies that generate increasing levels of free cash flow and have management teams that allocate free cash flow effectively to create shareholder value. The security selection process focuses on free-cash-flow analytics as opposed to traditional accounting-based metrics. The Subadvisor seeks to identify companies with a consistent, straightforward ability to both generate free cash flow and to intelligently allocate it among internal reinvestment opportunities, acquisitions, dividends, share repurchases and/or debt reduction. The Subadvisor may sell or reduce a position in a security when it believes its investment objectives have been met or if the investment thesis is failing to materialize. The Subadvisor may also sell or reduce a position in a security when the security is deemed less attractive relative to another security on a return/risk basis. Although the Fund may invest in securities across all market capitalizations, it may invest a significant portion of its assets in companies of one particular market capitalization category when the Subadvisor believes such companies offer attractive opportunities. The Fund may also invest up to 15% of its net assets in foreign securities. Generally, foreign securities are issued by companies organized outside the United States or that trade primarily in non-U.S. securities markets. Principal Risks You can lose money by investing in the Fund. An investment in the Fund is not a bank deposit and is not insured or guaranteed by the Federal Deposit Insurance Corporation or any other governmental agency. The investments selected by the Subadvisor may underperform the market in which the Fund invests or other investments. The Fund may receive large purchase or redemption orders which may have adverse effects on performance if the Fund were required to sell securities, invest cash or hold a relatively large amount of cash at times when it would not otherwise do so. The principal risks of investing in the Fund are summarized below. Market Risk: The value of the Fund's investments may fluctuate because of changes in the markets in which the Fund invests, which could cause the Fund to underperform other funds with similar investment objectives and strategies. Such changes may be rapid and unpredictable. From time to time, markets may experience periods of stress for potentially prolonged periods that may result in: (i) increased market volatility; (ii) reduced market liquidity; and (iii) increased redemptions of Fund shares. Such conditions may add significantly to the risk of volatility in the net asset value of the Fund's shares. Portfolio Management Risk: The investment strategies, practices and risk analyses used by the Subadvisor may not produce the desired results. In addition, the Fund may not achieve its investment objective, including during periods in which the Subadvisor takes temporary positions in response to unusual or adverse market, economic or political conditions, or other unusual or abnormal circumstances. Equity Securities Risk: Investments in common stocks and other equity securities are particularly subject to the risk of changing economic, stock market, industry and company conditions and the risks inherent in the portfolio managers' ability to anticipate such changes that can adversely affect the value of the Fund's holdings. Growth Stock Risk: If growth companies do not increase their earnings at a rate expected by investors, the market price of the stock may decline significantly, even if earnings show an absolute increase. Growth company stocks also typically lack the dividend yield that can cushion stock prices in market downturns. Value Stock Risk: Value stocks may never reach what the Subadvisor believes is their full value or they may go down in value. In addition, different types of stocks tend to shift in and out of favor depending on market and economic conditions,

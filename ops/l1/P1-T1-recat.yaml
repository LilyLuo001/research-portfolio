, Income Fund, and Emerging Markets Local Currency Bond Fund which are classified as non-diversified Funds. Please see the Prospectus for a discussion of the principal investment policies and risks of investing in the Funds. References to an “Adviser” below in the discussion of a Fund’s investment policies, investment strategies or risk considerations shall generally refer to a Fund’s investment adviser, which is DoubleLine Alternatives in respect of DoubleLine Multi-Asset Trend Fund, DoubleLine Strategic Commodity Fund, DoubleLine Shiller Enhanced CAPE ® and DoubleLine Real Estate and Income Fund, and is DoubleLine Capital in respect of each other Fund. In respect of DoubleLine Multi-Asset Trend Fund, DoubleLine Shiller Enhanced CAPE ® and DoubleLine Real Estate and Income Fund, references to the “Adviser” in the context of those Funds’ investment policies, investment strategies and risk considerations that relate to debt securities shall generally refer to DoubleLine Capital, the sub-adviser to those Funds and the entity primarily responsible for the day-to-day management of those Funds’ fixed income portfolios. INVESTMENT RESTRICTIONS Fundamental Investment Policies The investment restrictions numbered 1 through 8 below have been adopted as fundamental policies for each of the Total Return Bond Fund, the Core Fixed Income Fund, and the Emerging Markets Fixed Income Fund, unless otherwise noted. A fundamental policy affecting a particular Fund may not be changed without the vote of a majority of the outstanding voting shares of that Fund (as defined in the 1940 Act). 1. The Total Return Bond Fund and the Core Fixed Income Fund may not with respect to 75% of each Fund’s total assets, and the Emerging Markets Fixed Income Fund may, purchase the securities of any issuer (other than U.S. Government Securities or securities of other investment companies) if, as a result, (a) more than 5% of the Fund’s total assets would be invested in the securities of that issuer, or 
res $ 116 $ 366 $ 636 $ 1,407 Class I Shares $ 68 $ 219 $ 382 $ 857 Class N Shares $ 59 $ 190 $ 333 $ 748 Class T Shares $ 84 $ 266 $ 464 $ 1,035 Portfolio Turnover: The Fund pays transaction costs, such as commissions, when it buys and sells securities (or “turns over” its portfolio). A higher portfolio turnover rate may indicate higher transaction costs and may result in higher taxes when Fund shares are held in a taxable account. These costs, which are not reflected in annual fund operating expenses or in the Example, affect the Fund’s performance. During the most recent fiscal year, the Fund’s portfolio turnover rate was 71 % of the average value of its portfolio. Principal investment strategies The Fund pursues its investment objective by primarily investing, under normal circumstances, in a multi-sector portfolio of U.S. and non-U.S. debt securities of varying maturities that portfolio management believes have high income potential relative to other fixed-income instruments available at a given point in time. Portfolio management may also consider the capital appreciation potential of certain investments. The Fund’s investment sectors include, but are not limited to: (i) government notes and bonds; (ii) corporate bonds, including high-yield bonds (also known as “junk” bonds); (iii) commercial loans; (iv) agency and non-agency commercial and residential mortgage-backed securities; (v) asset-backed securities; (vi) convertible securities and preferred stock; and (vii) emerging market debt. Portfolio management believes that by investing in multiple sectors that potentially have low correlation to each other, the Fund’s overall volatility may be reduced. The Fund may not have exposure to all of these investment sectors, and the Fund’s exposure to any one investment sector will vary over time. The Fund’s investments in below investment grade securities are limited to 65% of its net assets, but under unusual circumstances, such as when new issue allocations are higher than expected, this limit may be exceeded on a temporary basis. The Fund may invest up to 50% of its total assets in the commercial loans sector. Such investments may include bank loans, bridge loans, debtor-in-possession (“DIP”) loans, mezzanine loans, and other fixed and floating rate loans. Normally, the Fund’s exposure to the commercial loans sector will be approximately 15% of the Fund’s total assets. The Fund may invest in floating rate obligations, including collateralized loan obligations, credit risk transfer securities (“CRTs”), floating rate senior 2 | Janus Investment Fund secured syndicated bank loans, floating rate unsecured loans, and other floating rate bonds, loans and notes. The Fund may enter into “to be announced” or “TBA” commitments when purchasing mortgage-backed securities or other securities. The Fund may also invest in securities that have contractual restrictions that prohibit or limit their public resale, which may include Rule 144A securities. Additionally, the Fund may invest its assets in derivatives. Derivative instruments have a value derived from, or directly linked to, an underlying asset, such as fixed-income securities, commodities, currencies, interest rates, or market indices. In particular, the Fund may use swaps, including interest rate, total return and credit-default swaps, and interest rate or bond futures. The Fund may use derivatives for various investment purposes including for hedging purposes, such as to manage portfolio risk or currency risk, to enhance returns, or manage duration. The Fund’s exposure to derivatives will vary. The Fund may engage in short sales of derivatives instruments. Portfolio management’s investment process is research-driven, incorporating “top-down” and “bottom-up” factors to identify and manage exposure to risks across sectors, industries, and individual investments. Portfolio management evaluates expected risk-adjusted returns on a portfolio and position level by analyzing fundamentals, valuations, and market technical indicators. This research encompasses both traditional fundamental analysis and data driven quantitative models and signals from such models. As part of its investment process, portfolio management considers environmental, social, and governance (“ESG”) risks and opportunities (“ESG Factors”) that it believes are financially material, alongside other fundamental investment factors. Examples of potential financially material ESG Factors include: corporate governance, company culture, exposure to climate change, and human capital management. To assess ESG Factors, portfolio management uses issuer reports, third-party data, and internally-generated analyses and may engage directly with issuers. ESG Factors are one of many considerations in the investment decision-making process, may not be determinative in deciding to include or exclude an investment from the portfolio, and may not be considered for every investment decision. The Fund may seek to earn additional income through lending its securities to certain qualified broker-dealers and institutions, in an amount equal to up to one-third of its total assets as determined at the time of the loan origination. Principal investment risks The biggest risk is that the Fund’s returns and yields will vary, and you could lose money. The principal risks associated with investing in the Fund are set forth below. Market Risk. The value of the Fund’s portfolio may decrease due to short-term market movements and over more prolonged market downturns. As a result, the Fund’s net asset value may fluctuate and it may be more difficult to value or sell the Fund’s holdings. Market risk may affect a single issuer, industry, economic sector, or the market as a whole. Market risk may be magnified if certain social, political, economic, and other conditions and events (such as financial institution failures, economic recessions, tariffs, trade disputes, terrorism, war, armed conflicts, including related sanctions, social unrest, natural disasters, and epidemics and pandemics) adversely interrupt the global economy and financial markets. It is important to understand that the value of your investment may fall, sometimes sharply, in response to changes in the market, and you could lose money. Fixed-Income Securities Risk. Fixed-income securities are generally subject to the following risks: • Interest rate risk, which is the risk that prices of bonds and other fixed-income securities will increase as interest rates fall and decrease as interest rates rise. Changing interest rates have unpredictable effects on the markets and may expose fixed- income and related markets to heightened volatility. • Credit risk, which is the risk that the credit strength of an issuer of a fixed-income security will weaken and/or that the issuer will be unable to make timely principal and interest payments and that the security may go into default. • Prepayment risk, which is the risk that, during periods of falling interest rates, certain debt obligations may be paid off quicker than originally anticipated, which may cause the Fund to reinvest its assets in securities with lower yields, resulting in a decline in the Fund’s income or return potential. • Extension risk, which is the risk that, during periods of rising interest rates, certain debt obligations may be paid off substantially slower than originally anticipated, and as a result, the value of those obligations may fall. • Valuation risk, which is the risk that one or more of the fixed-income securities in which the Fund invests are priced differently than the value realized upon such security’s sale. In times of market instability, valuation may be more difficult. 3 | Janus Henderson Multi-Sector Income Fund Valuation may also be affected by changes in the issuer’s financial strength, the market’s perception of such strength, or in the credit rating of the issuer or the security. • Liquidity risk, which is the risk that fixed-income secu

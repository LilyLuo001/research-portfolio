cost of investing in other mutual funds. The example assumes that you invest $10,000 in the Fund for the time periods indicated and then either redeem or do not redeem your shares at the end of the reflected time periods. The example also assumes that your investment has a 5% return each year, that all dividends and capital gain distributions are reinvested, that you pay a maximum initial or contingent deferred sales charge and that the Fund's operating expenses remain the same. Although your actual performance and costs may be higher or lower, based on these assumptions, your costs would be: You would pay the following expenses if you redeemed your shares at the end of the period: One Year Three Years Five Years Ten Years Class A 397 655 932 1,723 Class C 301 621 1,068 2,306 Class I 100 312 542 1,201 Class R6 92 287 498 1,108 PROSPECTUS | March 1, 2021 1 Calamos Market Neutral Income Fund You would pay the following expenses if you did not redeem your shares: One Year Three Years Five Years Ten Years Class A 397 655 932 1,723 Class C 201 621 1,068 2,306 Class I 100 312 542 1,201 Class R6 92 287 498 1,108 Portfolio Turnover The Fund pays transaction costs, such as commissions, when it buys and sells securities (or "turns over" its portfolio). A higher portfolio turnover rate may indicate higher transaction costs and may result in higher taxes when Fund shares are held in a taxable account. These costs, which are not reflected in the annual fund operating expenses or in the example, affect the Fund's performance. During the most recent fiscal year, the Fund's portfolio turnover rate was 76.6% of the average value of its portfolio. Principal Investment Strategies The Fund's investment strategy can be characterized as "market neutral" because it seeks to achieve maximum current income while maintaining a low correlation to the fluctuations of the U.S. equity market as a whole. The Fund invests (i) equities, (ii) convertible securities (including synthetic convertible securities) of U.S. companies without regard to market capitalization, and (iii) employs short selling and enters into total return swaps to enhance income and hedge against market risk. The convertible securities in which the Fund invests may be either debt securities or preferred stocks that can be exchanged for common stock. The average term to maturity of the convertible securities purchased by the Fund will typically range from two to ten years. A synthetic convertible instrument is a financial instrument (or two or more securities held in tandem) that is designed to simulate the economic characteristics of a convertible security through the combined features of a debt instrument and a security providing an option on an equity security. The Fund may establish a synthetic convertible instrument by combining fixed-income securities (which may be either convertible or non-convertible) with the right to acquire equity securities. In establishing a synthetic instrument, the Fund may combine a basket of fixed-income securities with a basket of warrants or options that together produce economic characteristics similar to a convertible security. Within each basket of fixed-income securities and warrants or options, different companies may issue the fixed-income and convertible components, which may be purchased separately and at different times. The Fund may seek to generate income from option premiums by writing (selling) options. This would include the use of both call and put options. The Fund may write call options (i) on a portion of the equity securities (including securities that are convertible into equity securities) in the Fund's portfolio and (ii) on broad-based securities indexes (such as the S&P 500 or MSCI EAFE) or ETFs (exchange traded funds). In addition, to seek to offset some of the risk of a potential decline in value of certain long positions, the Fund may also purchase put options on individual securities, broad-based securities indexes (such as the S&P 500), or ETFs. The Fund may invest without limit in high yield fixed-income securities (often referred to as "junk bonds"). In addition, the Fund may engage in active and frequent trading of portfolio securities. The Fund may also invest in ETFs. The Fund's investment adviser seeks to lower the risks of investing in stocks by using a "top-down approach" of diversification by company, industry, sector, country and currency and focusing on macro-level investment themes. Principal Risks An investment in the Fund is subject to risks, and you could lose money on your investment in the Fund. There can be no assurance that the Fund will achieve its investment objective. The risks associated with an investment in the Fund can increase during times of significant market volatility. Your investment in the Fund is not a deposit in a bank and is not insured or CALAMOS FAMILY OF FUNDS 2 Calamos Market Neutral Income Fund guaranteed by the Federal Deposit Insurance Corporation or any other government agency. The principal risks of investing in the Fund include: • Convertible Hedging Risk — If the market price of the underlying common stock increases above the conversion price on a convertible security, the price of the convertible security will increase. The Fund's increased liability on any outstanding short position would, in whole or in part, reduce this gain. • Convertible Securities Risk — The value of a convertible security is influenced by changes in interest rates, with investment value declining as interest rates increase and increasing as interest rates decline. The credit standing of the issuer and other factors also may have an effect on the convertible security's investment value. • Covered Call Writing Risk — As the writer of a covered call option on a security, the Fund foregoes, during the option's life, the opportunity to profit from increases in the market value of the security, covering the call option above the sum of the premium and the exercise price of the call. • Debt Securities Risk — Debt securities are subject to various risks, including interest rate risk, credit risk and default risk. • Interest Rate Risk — The value of debt securities generally decreases in periods when interest rates are rising. In addition, interest rate changes typically have a greater effect on prices of longer-term debt securities than shorter term debt securities. Recent fixed-income market events, including increases in volatility and interest rates, may expose the Fund to heightened interest rate risk and volatility. • Credit Risk — A debt security could deteriorate in quality to such an extent that its rating is downgraded or its market value declines relative to comparable securities. If the Fund holds securities that have been downgraded, or that default on payment, the Fund's performance could be negatively affected. • Default Risk — A company that issues a debt security may be unable to fulfill its obligation to repay principal and interest. The lower a bond is rated, the greater its default risk. To the extent the Fund holds securities that have been downgraded, or that default on payment, its performance could be negatively affected. • Derivatives Risk — Derivatives are instruments, such as futures and forward foreign currency contracts, whose value is derived from that of other assets, rates or indices. The use of derivatives for non-hedging purposes may be considered more speculative than other types of investments. Derivatives can be used for hedging (attempting to reduce risk by offsetting one investment position with another) or non-hedging purposes. Hedging with derivatives may increase expenses, and there is no guarantee that a hedging strategy will work. While hedging can reduce or eliminate losses, it can also reduce or eliminate gains. In addition, derivative instruments are subject to counter party risk, meaning that the party with whom the Fund enters into a derivative transaction may experience a significant credit ev

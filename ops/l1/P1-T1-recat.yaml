      497 1 fp0053501_497.htm Prospectus GUINNESS|ATKINSON TM May 1, 2020 FUNDS ● Alternative Energy Fund (GAAEX) ● Asia Focus Fund (IASMX) ● Asia Pacific Dividend Builder Fund (GAADX) ● China & Hong Kong Fund (ICHKX) ● Dividend Builder Fund (GAINX) ● Global Energy Fund (GAGEX) ● Global Innovators Fund Investor Class (IWIRX) Institutional Class (GINNX) ● Renminbi Yuan & Bond Fund (GARBX) Beginning on January 1, 2021, as permitted by regulations adopted by the Securities and Exchange Commission, paper copies of the Funds’ annual and semi-annual shareholder reports will no longer be sent by mail, unless you specifically request paper copies of the reports. Instead, the reports will be made available on the Funds’ website (www.gafunds/resource-insight-center/), and you will be notified by mail each time a report is posted and provided with a website link to access the report. If you already elected to receive shareholder reports electronically, you will not be affected by this change and you need not take any action. You may elect to receive shareholder reports and other communications from a fund electronically anytime by contacting your financial intermediary (such as a broker-dealer or bank) or, if you invest directory with the Guinness Atkinson Funds, by calling 800-915-6565. You may elect to receive all future reports in paper free of charge. If you invest through a financial intermediary, such as a broker or bank, you can contact your financial intermediary to request that you continue to receive paper copies of your shareholder reports. If you invest directly, you can call 800-915-6565 to request that you continue to receive paper copies of the Guinness Atkinson Funds’ shareholder reports. Your election to receive reports in paper will apply to all funds held in your account. The Securities and Exchange Commission has not approved or disapproved these securities or passed upon the adequacy of this prospectus. Any representation to the contrary is a criminal offense. GUINNESS|ATKINSON TM F U N D S Prospectus May 1, 2020 TABLE OF CONTENTS SUMMARY SECTION This important section summarizes the Funds’ investments, risks, fees and past performance. SUMMARY SECTION 1 Alternative Energy Fund 1 Asia Focus Fund 6 Asia Pacific Dividend Builder Fund 10 China & Hong Kong Fund 14 Dividend Builder Fund 18 Global Energy Fund 22 Global Innovators Fund 26 Renminbi Yuan & Bond Fund 31 MORE ABOUT THE FUNDS’ INVESTMENT STRATEGIES AND RISKS This section provides details about the Funds’ investment strategies and risks. MORE ABOUT THE FUNDS’ INVESTMENT STRATEGIES AND RISKS 37 Alternative Energy Fund 37 Asia Focus Fund 39 Asia Pacific Dividend Builder Fund 41 China & Hong Kong Fund 43 Dividend Builder Fund 45 Global Energy Fund 47 Global Innovators Fund 49 Renminbi Yuan & Bond Fund 51 MANAGEMENT OF THE FUNDS Review this section for information about the organizations and people who oversee the Funds. MANAGEMENT OF THE FUNDS 60 Investment Adviser 60 Fund Expenses 62 Distribution and Shareholder Servicing Plans 63 SHAREHOLDER INFORMATION This section explains how shares are valued and how to purchase and sell shares, and provides information on dividends, distributions and taxes. SHAREHOLDER INFORMATION 64 How to Purchase, Exchange, and Redeem Shares 64 Purchasing 66 Exchanging and Redeeming 68 Additional Exchange/Redemption Information 71 Distributions and Taxes 73 FINANCIAL STATEMENTS Review this section for details on selected financial statements of the Funds. FINANCIAL HIGHLIGHTS 75 Alternative Energy Fund 75 Asia Focus Fund 76 Asia Pacific Dividend Builder Fund 77 China & Hong Kong Fund 78 Dividend Builder Fund 79 Global Energy Fund 80 Global Innovators Fund – Investor Class 81 Global Innovators Fund – Institutional Class 82 Renminbi Yuan & Bond Fund 83 INDEX DESCRIPTIONS This section provides a description of each index used as a benchmark to measure a Fund’s performance. INDEX DESCRIPTIONS 84 SUMMARY SECTION SUMMARY SECTION Alternative Energy Fund Investment Objective The Alternative Energy Fund’s investment objective is long-term capital appreciation. Fees and Expenses of the Fund This table describes the fees and expenses that you may pay if you buy and hold shares of the Alternative Energy Fund: Shareholder Fees (fees paid directly from your investment) None (1) Annual Fund Operating Expenses (expenses that you pay each year as a percentage of the value of your investments) Management Fees: 1.00% Distribution (12b-1) Fees: None Other Expenses: 2.00% Shareholder Servicing Plan Fees 0.19% All Other Expenses 1.81% Total Annual Fund Operating Expenses: 3.00% Fee Waiver/Expense Reimbursement (2) : -1.02 % Total Annual Fund Operating Expenses After Fee Waiver and/or Expense Reimbursement (2) : 1.98% (1) The Fund charges a $15 fee for each payment of redemption proceeds by wire transfer. (2) The Adviser has contractually agreed to reduce its fees and/or pay Fund expenses (excluding Acquired Fund Fees and Expenses, interest, taxes, dividends on short positions and extraordinary expenses) in order to limit the Fund’s Total Annual Operating Expenses to 1.98% through June 30, 2021. To the extent that the Adviser absorbs expenses to satisfy this cap, it may recoup a portion or all of such amounts absorbed at any time within three fiscal years after the fiscal year in which such amounts were absorbed, subject to the expense cap in place at the time recoupment is sought, which cannot exceed the expense cap at the time of the waiver. The expense limitation agreement may be terminated by the Board of the Fund at any time without penalty upon 60 days’ notice. Example This example is intended to help you compare the cost of investing in the Alternative Energy Fund with the cost of investing in other mutual funds. The Example assumes that you invest $10,000 in the Fund for the time periods indicated and then redeem all your shares at the end of those periods. The Example also assumes that your investment has a 5% return each year and that the Fund’s operating expenses remain the same. Although your actual costs may be higher or lower, under these assumptions, your costs would be: 1 Year 3 Years 5 Years 10 Years $201 $815 $1,472 $3,233 Portfolio Turnover The Fund pays transaction costs, such as commissions, when it buys and sells securities (or “turns over” its portfolio). A higher portfolio turnover may indicate higher transaction costs and may result in higher taxes when Fund shares are held in a taxable account. These costs, which are not reflected in annual fund operating expenses or in the example, affect the Fund’s performance. During the most recent fiscal year, the Fund’s portfolio turnover rate was 43.19% of the average value of its portfolio. Principal Investment Strategies The Alternative Energy Fund invests at least 80% of its net assets (plus any borrowings for investment purposes) in equity securities of alternative energy companies (both U.S. and non-U.S.). Alternative energy companies include, but are not limited to companies that generate power through solar, wind, hydroelectric, tidal wave, geothermal, biomass or biofuels and the various companies that provide the equipment and technologies that enable these sources to be tapped, used, stored or transported, including companies that create, facilitate or improve technologies that conserve or enable more efficient use of energy. The Fund will not change this policy unless it gives shareholders at least 60 days’ notice. Equity securities may include common stocks, preferred stocks, securities convertible into common stocks, rights and warrants. The Fund’s concentration may vary depending on changing market conditions (including but not limited to, liquidity, volatility, and the number of companies meeting selection criteria) although the Adviser has a bias towards concentration. The degree of concentration of the portfolio will vary over time, and under normal market conditions, the Fund may have as few as 25 holdings, or may hold securities in 75 or more companies. The Adviser will invest the Fund’s assets in securities of all market capitalization companies and in companies domiciled in the U.S. and foreign countries, including, potentially, companies domiciled or traded in emerging markets. Additional information on Principal Investment Strategies can be found in the prospectus. Also see Additional Investment Strategies and Risks in the Statement of Additional Information. 1 SUMMARY SECTION The Fund is designed for investors who seek long-term capital appreciation through focused investment in equity securities of companies, wherever located, engaged in the alternative energy industries. For temporary defensive purposes, any portion of the Fund’s total assets may be invested in cash and cash equivalents, including money market funds, to respond to adverse market, economic, political or other conditions, which could adversely affect the Fund’s ability to achieve its investment objective. Principal Risks Your investment in the Fund is subject to the risks common to all mutual funds that invest in equity securities and there can be no assurance that the Fund will achieve its investment objective. Risks associated with investments in the Fund can increase during times of market volatility. Investing in this Fund may be more risky than investing in a fund that only invests in U.S. securities due to increased volatility of foreign markets. You may lose money by investing in this Fund. The principal risks are: Industry Risks. Prices of energy (including traditional sources of energy such as oil, gas, or electricity) or alternative energy may fluctuate or decline due to many factors, including international political developments, production and distribution policies of the OPEC (Organization of Petroleum Exporting Countries) and other oil-producing countries, changes in governmental regulations affecting the energy sector, and changes in technology affecting the alternative energy industry. A decline in energy prices would likely have a negative effect on securities held by the Fund. The Fund’s focus on the energy sector to the exclusion of other sectors exposes the Fund to greater market risk and potential monetary losses than if the Fund’s assets were diversified among various sectors. Equity Securities Risk. The Fund holds equity securities. The market value of an equity security may fluctuate, sometimes rapidly and unpredictably. A variety of factors can negatively impact the value of common stocks, including a company’s financial condition, as well as economic factors such as interest rates and inflation rates and non-economic factors such as market perception, or financial or political events that affect a specific issuer, a market segment, an entire market or markets globally. Risks Associated with Investments in Companies outside the United States. Investments in companies in foreign countries, including countries in Europe and Asia, are subject to additional political, social, economic, legal, regulatory and other risks, related to the size of the securities markets, competition for investments, currencies, political, social and economic instability, interest rates, and global or foreign trade restrictions and tariffs, or threats of changes to trade restrictions or tariffs, as well as transitions in the global economy such as “Brexit”, the withdrawal of the United Kingdom from the European Union, which could result in increased volatility, lack of liquidity, and adverse impacts on economic growth. Impacts of Brexit are likely to be higher on companies with significant contacts with the United Kingdom, including companies in Europe. The value of shares of companies in foreign countries, whether in developed or emerging markets, may be more sensitive to these factors than the value of shares of companies in U.S. markets. The Fund may invest in securities of companies in Asia, including China, Hong Kong, and South Korea, which are subject to special risks. Investments in securities of Chinese companies can also be impacted by currency and exchange rate fluctuations, in addition to price volatility, illiquidity and changes in China’s regulatory, monetary and socioeconomic policies, and limitations on access to Chinese issuers. Foreign securities experience more volatility than their domestic counterparts, in part because of higher political and economic risks, lack of reliable information, differences in accounting, audit or reporting standards, fluctuations in currency exchange rates and the risks that a foreign government may take over assets, restrict the ability to exchange currency or restrict the delivery of securities. Foreign Securities Market Risks. Foreign securities markets generally have less trading volume than U.S. markets, which means it may be more difficult for the Fund to buy or sell foreign securities. Government oversight of foreign stock exchanges and brokerage industries may be less stringent than oversight of U.S. securities markets. Additionally, trading on foreign securities markets may involve longer settlement periods and higher transaction costs. Some foreign securities markets are closed to trading for extended periods, which could make the Fund’s holdings in those markets illiquid. The ability of the Fund to access foreign markets can be limited; these limitations can affect the availability, liquidity and pricing of securities. Emerging Markets Risk. The Fund may invest in companies in emerging markets, including China. Emerging market countries may have less established economies and may face greater social, economic, regulatory and political risks, and may have smaller or more limited capital markets, which could contribute to increased volatility or more difficulty in determining the value or liquidity of holdings. The Fund’s investments in foreign issuers and depository receipts could make these holdings riskier than holdings in domestic companies. Market Risk
d’s current portfolio. • Continuity of management. John Hancock Investment Management LLC serves as investment advisor to your Fund and the Acquiring Fund and will continue to serve as the investment advisor to the combined fund. Trillium Asset Management, LLC currently serves as the investment subadvisor of the Target Fund and Manulife Investment Management (US) LLC serves as the investment subadvisor of the Acquiring Fund, and will continue to serve as the investment subadvisor to the combined fund. How to vote Note that this Reorganization cannot proceed without the approval of shareholders, so a special shareholder meeting will be held at 200 Berkeley Street, Boston, Massachusetts 02116 on [December 10, 2025], at [2:00 P.M.], Eastern Time Please read the enclosed proxy statement, and vote your shares as described below. While you may attend the meeting, voting today will save on the potential cost of future mailings required to obtain shareholder votes . You may vote your shares by proxy in one of three ways: Online: [www. ] Phone: [ ] Mail: by returning the enclosed proxy card(s) I encourage you to read the enclosed proxy statement and prospectus for more information, and I thank you for acting on this matter today. Sincerely, Kristie M. Feinberg President (Chief Executive Officer and Principal Executive Officer) John Hancock Investment Management Head of Wealth and Asset Management United States and Europe Table of Contents Please vote today We need your input on an important proposal that affects your investment Online Phone Mail Table of Contents September [ ], 2025 Your action is required. Please vote today. Dear John Hancock ESG Large Cap Core Fund shareholder: At John Hancock Investment Management, we continually review our lineup of mutual funds to ensure that each fund continues to serve the best interests of shareholders. Included in that assessment is a review of account fees and long-term prospects for growth, and whether the combination of similar funds might promote beneficial economies of scale. On occasions where we believe a fund may benefit from its combination with another similar fund, we have taken action, and we believe your fund would benefit from such action at this time. After careful consideration, we proposed, and your fund’s Trustees agreed, that shareholders would benefit from a merger of John Hancock ESG Large Cap Core Fund (the “Fund” or “Target Fund”) with and into John Hancock Fundamental Large Cap Core Fund (the “Acquiring Fund”) (the “Reorganization”). Advantages of the proposed merger: • Expected economies of scale and potentially lower expenses in the future. Following the Reorganization, on a pro forma basis, the operating expense ratios of Class A, Class C, Class I, and Class R6 shares of the Acquiring Fund to be received in the Reorganization are expected to be lower than the respective operating expense ratios for the corresponding share class of the Target Fund, both before and after expense waivers. Moreover, as fixed costs are spread across the larger asset base of a combined fund with greater potential for asset growth, overall gross shareholder expenses may be reduced in the future. • Same investment objective . The proposed merger is expected to allow shareholders of the Target Fund to pursue the same investment objective in a larger combined fund. The investment objective for both the Target Fund and the Acquiring Fund is to seek long-term capital appreciation. The Target Fund invests primarily in equity securities of large-capitalization companies or sectors that meet the manager’s sustainability criteria. The Acquiring Fund invests primarily in equity securities of large-capitalization companies. The combined fund’s portfolio will be substantially similar to the Acquiring Fund’s current portfolio. • Continuity of management. John Hancock Investment Management LLC serves as investment advisor to your Fund and the Acquiring Fund and will continue to serve as the investment advisor to the combined fund. Trillium Asset Management, LLC currently serves as the investment subadvisor of the Target Fund and Manulife Investment Management (US) LLC serves as the investment subadvisor of the Acquiring Fund, and will continue to serve as the investment subadvisor to the combined fund. How to vote Note that this Reorganization cannot proceed without the approval of shareholders, so a special shareholder meeting will be held at 200 Berkeley Street, Boston, Massachusetts 02116 on [December 10, 2025], at [2:00 P.M.], Eastern Time Please read the enclosed proxy statement, and vote your shares as described below. While you may attend the meeting, voting today will save on the potential cost of future mailings required to obtain shareholder votes . You may vote your shares by proxy in one of three ways: Online: by visiting the website on your proxy card(s) and entering your control number Phone: by calling the number listed on your proxy card(s) Mail: by returning the enclosed proxy card(s) I encourage you to read the enclosed proxy statement and prospectus for more information, and I thank you for acting on this matter today. Sincerely, Kristie M. Feinberg President (Chief Executive Officer and Principal Executive Officer) John Hancock Investment Management Head of Wealth and Asset Management United States and Europe Table of Contents JOHN HANCOCK ESG LARGE CAP CORE FUND (a series of John Hancock Investment Trust) (the “ Fund ”) 200 Berkeley Street Boston, MA 02116 800-225-5291 Notice of Special Meeting of Shareholders Scheduled for [December 10, 2025] This is the formal agenda for the Fund’s shareholder meeting. It tells you what matters will be voted on and the time of the meeting, in case you want to attend. To the shareholders of the Fund: A shareholder meeting of the Fund will be held at 200 Berkeley Street, Boston, Massachusetts 02116 on [December 10, 2025], at [2:00 P.M.], Eastern Time (the “ Meeting ”) to consider the following: 1. A proposal to
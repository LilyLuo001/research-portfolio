      497 1 form497.htm NEUBERGER BERMAN ALTERNATIVE FUNDS STATEMENT OF ADDITIONAL INFORMATION DATED FEBRUARY 28, 2022, AS AMENDED AND RESTATED JUNE 9, 2022 Fund Institutional Class Class A Class C Class R6 Neuberger Berman Commodity Strategy Fund NRBIX NRBAX NRBCX -- Neuberger Berman Global Allocation Fund NGLIX NGLAX NGLCX NRGLX Neuberger Berman Long Short Fund NLSIX NLSAX NLSCX -- Neuberger Berman U.S. Equity Index PutWrite Strategy Fund NUPIX NUPAX NUPCX NUPRX 1290 Avenue of the Americas, New York, NY 10104 Shareholder Services 800.877.9700 Institutional Services 800.366.6264 www.nb.com Neuberger Berman Commodity Strategy Fund, Neuberger Berman Global Allocation Fund, Neuberger Berman Long Short Fund and Neuberger Berman U.S. Equity Index PutWrite Strategy Fund (each a “Fund,” and collectively, the “Funds”) are mutual funds that offer shares pursuant to prospectuses dated February 28, 2022. The prospectus and summary prospectus (together, the “Prospectus”) for your share class provide more information about your Fund that you should know before investing. You can get a free copy of the Prospectus, annual report and/or semi-annual report for your share class from Neuberger Berman Investment Advisers LLC (“NBIA” or the “Manager”), 1290 Avenue of the Americas, New York, NY 10104, or by calling the appropriate number listed above for your share class. You should read the Prospectus for your share class and consider the investment objective, risks, and fees and expenses of your Fund carefully before investing. This Statement of Additional Information (“SAI”) is not a prospectus and should be read in conjunction with the Prospectus for your share class. This SAI is not an offer to sell any shares of any class of the Funds. A written offer can be made only by a Prospectus. Each Fund’s financial statements, notes thereto and the report of its independent registered public accounting firm are incorporated by reference from the Fund’s annual report to shareholders into (and are therefore legally part of) this SAI. No person has been authorized to give any information or to make any representations not contained in the Prospectuses or in this SAI in connection with the offering made by the Prospectuses, and, if given or made, such information or representations must not be relied upon as having been authorized by a Fund or its distributor. The Prospectuses and this SAI do not constitute an offering by a Fund or its distributor in any jurisdiction in which such offering may not lawfully be made. The “Neuberger Berman” name and logo and “Neuberger Berman Investment Advisers LLC” are registered service marks of Neuberger Berman Group LLC. The individual Fund names in this SAI are either service marks or registered service marks of Neuberger Berman Investment Advisers LLC. ©2022 Neuberger Berman BD LLC, distributor. All rights reserved. ii TABLE OF CONTENTS Page INVESTMENT INFORMATION 1 Investment Policies and Limitations 1 Cash Management and Temporary Defensive Positions 6 Additional Investment Information 7 PERFORMANCE INFORMATION 92 TRUSTEES AND OFFICERS 93 Information about the Board of Trustees 93 Information about the Officers of the Trust 97 The Board of Trustees 100 INVESTMENT MANAGEMENT AND ADMINISTRATION SERVICES 109 Investment Manager and Administrator 109 Management and Administration Fees 111 Contractual Expense Limitations 113 Advisory Fee Waiver 115 Portfolio Manager Information 115 Other Investment Companies or Accounts Managed 122 Codes of Ethics 123 Management and Control of NBIA 123 DISTRIBUTION ARRANGEMENTS 123 Distributor 123 Additional Payments to Financial Intermediaries 127 Distribution Plan (Class A Only) 128 Distribution Plan (Class C Only) 129 Distribution Plan (Class A and Class C) 130 ADDITIONAL PURCHASE INFORMATION 130 Share Prices and Net Asset Value 130 Subscriptions in Kind 133 Financial Intermediaries 133 Automatic Investing and Dollar Cost Averaging 133 Sales Charges 134 ADDITIONAL EXCHANGE INFORMATION
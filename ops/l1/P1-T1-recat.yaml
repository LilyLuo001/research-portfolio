      497 1 a497.htm NEUBERGER BERMAN EQUITY FUNDS STATEMENT OF ADDITIONAL INFORMATION Institutional Class Shares, Class A Shares, and Class C Shares Dated March 3, 2021 Fund Institutional Class Class A Class C Neuberger Berman U.S. Equity Impact Fund NEQIX NEQAX NEQCX 1290 Avenue of the Americas, New York, NY 10104 Shareholder Services 800.877.9700 Institutional Services 800.366.6264 www.nb.com Neuberger Berman U.S. Equity Impact Fund (the “Fund”) is a mutual fund that offers shares pursuant to prospectuses dated March 3, 2021. The prospectus and summary prospectus (together, the “Prospectus”) for your share class provide more information about your Fund that you should know before investing. You can get a free copy of the Prospectus from Neuberger Berman Investment Advisers LLC (“NBIA” or the “Manager”), 1290 Avenue of the Americas, New York, NY 10104 or by calling the appropriate number listed above for your share class. You should read the Prospectus for your share class and consider the investment objective, risks, and fees and expenses of the Fund carefully before investing. This Statement of Additional Information (“SAI”) is not a prospectus and should be read in conjunction with the Prospectus for your share class. This SAI is not an offer to sell any shares of any class of the Fund. A written offer can be made only by a Prospectus. No person has been authorized to give any information or to make any representations not contained in the Prospectus or in this SAI in connection with the offering made by the Prospectus, and, if given or made, such information or representations must not be relied upon as having been authorized by the Fund or its distributor. The Prospectus and this SAI do not constitute an offering by the Fund or its distributor in any jurisdiction in which such offering may not lawfully be made. The “Neuberger Berman” name and logo and “Neuberger Berman Investment Advisers LLC” are registered service marks of Neuberger Berman Group LLC. The individual Fund name in this SAI are either service marks or registered service marks of Neuberger Berman Investment Advisers LLC. © 2021 Neuberger Berman BD LLC, distributor. All rights reserved. TABLE OF CONTENTS Page INVESTMENT INFORMATION 1 Investment Policies and Limitations 1 Cash Management and Temporary Defensive Positions 6 Additional Investment Information 6 DESCRIPTION OF ENHANCED SUSTAINABLE EXCLUSION CRITERIA 61 PERFORMANCE INFORMATION 63 TRUSTEES AND OFFICERS 63 Information about the Board of Trustees 64 Information about the Officers of the Trust 69 The Board of Trustees 71 INVESTMENT MANAGEMENT AND ADMINISTRATION SERVICES 80 Investment Manager and Administrator 80 Management and Administration Fees 82 Contractual Expense Limitations 83 Portfolio Manager Information 83 Other Investment Companies or Accounts Managed 87 Codes of Ethics 88 Management and Control of NBIA 88 DISTRIBUTION ARRANGEMENTS 89 Distributor 89 Additional Payments to Financial Intermediaries 90 Distribution Plan (Class A Only) 91 Distribution Plan (Class C Only) 91 Distribution Plan (Class A and Class C) 92 ADDITIONAL PURCHASE INFORMATION 92 Share Prices and Net Asset Value 92 Subscriptions in Kind 95 Financial Intermediaries 95 Automatic Investing and Dollar Cost Averaging 95 Sales Charges 95 ADDITIONAL EXCHANGE INFORMATION 96 ADDITIONAL REDEMPTION INFORMATION 97 Suspension of Redemptions 97 Redemptions in Kind 97 CONVERSION INFORMATION 97 i DIVIDENDS AND OTHER DISTRIBUTIONS 99 ADDITIONAL TAX INFORMATION 100 Taxation of the Fund 100 Taxation of the Fund’s Shareholders 106 Special Tax Considerations Pertaining to Funds of Funds 108 FUND TRANSACTIONS 110 Portfolio Turnover 113 Proxy Voting 113 PORTFOLIO HOLDINGS DISCLOSURE 114 Portfolio Holdings Disclosure Policy 114 Selective Disclosure Procedures 116 Portfolio Holdings Approved Recipients 116 REPORTS TO SHAREHOLDERS 118 ORGANIZATION, CAPITALIZATION AND OTHER MATTERS 118 CUSTODIAN AND TRANSFER AGENT 119 INDEPENDENT REGISTERED PUBLIC ACCOUNTING FIRM 119 LEGAL COUNSEL 119 REGISTRATION STATEMENT 119 APPENDIX A – LONG-TERM AND SHORT-TERM DEBT SECURITIES RATING DESCRIPTIONS A-1 APPENDIX B – PROXY VOTING POLICY FOR NEUBERGER BERMAN INVESTMENT ADVISERS LLC B-1 ii INVESTMENT INFORMATION The Fund is a separate operating series of Neuberger Berman Equity Funds (“Trust”), a Delaware statutory trust established on December 29, 1992. The Trust is registered with the Securities and Exchange Commission (“SEC”) as an open-end management investment company. The Fund is newly organized as of, and had no operations prior to, the date of this SAI. The following information supplements the discussion of the Fund’s investment objective, policies, and limitations in the Prospectus. The investment objective and, unless otherwise specified, the investment policies and limitations of the Fund are not fundamental. Any investment objective, policy, or limitation that is not fundamental may be changed by the trustees of the Trust (“Fund Trustees”) without shareholder approval. The fundamental investment policies and limitations of the Fund may not be changed without the approval of the lesser of: (1) 67% of the shares of the Fund present at a meeting at which more than 50% of the outstanding shares of the Fund are present or represented, or (2) a majority of the outstanding shares of the Fund. These percentages are required by the Investment Company Act of 1940, as amended (“1940 Act”), and are referred to in this SAI as a “1940 Act majority vote.” The Fund operates as a diversified investment company. NBIA is responsible for the day-to-day management of the Fund. Throughout this SAI, the term “Manager” refers to NBIA with respect to the Fund. Investment Policies and Limitations Except as set forth in the investment limitation on borrowing and the investment limitation on illiquid securities, any investment policy or limitation that involves a maximum percentage of securities or assets will not be considered exceeded unless the percentage limitation is exceeded immediately after, and because of, a transaction by the Fund. If events subsequent to a transaction result in the Fund exceeding the percentage limitation on illiquid securities, the Manager will take appropriate steps to reduce the percentage held in illiquid securities, as may be required by law, within a reasonable amount of time. The following investment policies and limitations are fundamental: 1. Borrowing. The Fund may not borrow money except as permitted by (i) the 1940 Act or interpretations or modifications by the SEC, SEC staff or other authority with appropriate jurisdiction, or (ii) exemptive or other relief or permission from the SEC, SEC staff or other authority. 2. Commodities. The Fund may purchase or sell commodities or contracts related to commodities to the extent permitted by (i) the 1940 Act or interpretations or modifications by the SEC, SEC staff or other authority with appropriate jurisdiction, or (ii) exemptive or other relief or permission from the SEC, SEC staff or other authority. 1 3. Industry Concentration . The Fund may not make any investment if, as a result, the Fund’s investments will be concentrated in any one industry except as permitted by (i) the 1940 Act or interpretations or modifications by the SEC, SEC staff or other authority with appropriate jurisdiction, or (ii) exemptive or other relief or permission from the SEC, SEC staff or other authority. This limitation does not apply to U.S. Government and Agency Securities, securities of other investment companies, and state, territorial or municipal securities or such other securities as may be excluded for this purpose under the 1940 Act, the rules and regulations thereunder and any applicable exemptive relief or SEC or SEC staff interpretations 4. Lending. The Fund may lend money or other assets to the extent permitted by (i) the 1940 Act or interpretations or modifications by the SEC, SEC staff or other authority with appropriate jurisdiction, or (ii) exemptive or other relief or permission from the SEC, SEC staff or other authority. 5. Real Estate . The Fund may not purchase or sell real estate except as permitted by (i) the 1940 Act or interpretations or modifications by the SEC, SEC staff or other authority with appropriate jurisdiction, or (ii) exemptive or other relief or permission from the SEC, SEC staff or other authority. 6. Senior Securities. The Fund may not issue senior securities except as permitted by (i) the 1940 Act or interpretations or modifications by the SEC, SEC staff or other authority with appropriate jurisdiction, or (ii) exemptive or other relief or permission from the SEC, SEC staff or other authority. 7. Underwriting. The Fund may not engage in the business of underwriting the securities of other issuers except as permitted by (i) the 1940 Act or interpretations or modifications by the SEC, SEC staff or other authority with appropriate jurisdiction, or (ii) exemptive or other relief or permission from the SEC, SEC staff or other authority. The Fund’s limitation on investments in any one issuer does not limit the Fund’s ability to invest up to 100% of its total assets in a master portfolio with the same investment objective, policies and limitations as the Fund. The Fund has the following additional fundamental investment policy: Notwithstanding any other investment policy of the Fund, the Fund may invest all of its net investable assets in an open‑end management investment company having substantially the same investment objective, policies, and limitations as the Fund. With respect to the investment limitation on borrowings, the Fund may pledge assets in connection with permitted borrowings. With respect to the fundamental policy relating to borrowing money set forth in (1) above, the 1940 Act permits the Fund to borrow money in amounts of up to one-third of the Fund’s total assets from banks for any purpose, and to borrow up to 5% of the Fund’s total assets from banks or other lenders for temporary purposes. (The Fund’s total assets include the amounts being borrowed.) To limit the risks attendant to borrowing, the 1940 Act requires the Fund to maintain an “asset coverage” of at least 300% of the amount of its borrowings, provided that in the event that the Fund’s asset 2 coverage falls below 300%, the Fund is required to reduce the amount of its borrowings so that it meets the 300% asset coverage threshold within three days (not including Sundays and holidays). Asset coverage means the ratio that the value of the Fund’s total assets (including amounts borrowed), minus liabilities other than borrowings, bears to the aggregate amount of all borrowings. Certain trading practices and investments, such as reverse repurchase agreements, may be considered to be borrowings and thus subject to the 1940 Act restrictions. The Fund also has obtained exemptive relief from the SEC to permit it to borrow money from other funds for temporary purposes. For purposes of the investment limitation on commodities, the Fund does not consider foreign currencies or forward contracts to be physical commodities. Also, this limitation does not prohibit the Fund from purchasing securities backed by physical commodities, including interests in exchange-traded investment trusts and other similar entities, derivative instruments, or from purchasing physical commodities. None of the foregoing limitations shall be construed to prevent the Fund from purchasing, holding or selling all or a portion of any issuance of sukuk or similarly structured investments. With respect to the fundamental policy relating to industry concentration set forth above, the 1940 Act does not define what constitutes “concentration” in an industry. The SEC staff has taken the position that investment of 25% or more of a fund’s total assets in one or more issuers conducting their principal activities in the same industry or group of industries constitutes concentration. It is possible that interpretations of concentration could change in the future. The policy on industry concentration above will be interpreted to refer to concentration as that term may be interpreted from time to time by the SEC, SEC staff or other relevant authority. The policy also will be interpreted to permit investment without limit in the following: securities of the U.S. government and its agencies or instrumentalities; securities of state, territory, possession or municipal governments and their authorities, agencies, instrumentalities or political subdivisions; securities of foreign governments; and repurchase agreements collateralized by any such obligations. Accordingly, issuers of the foregoing securities will not be considered to be members of any industry and there will be no limit on investment in issuers domiciled in a single jurisdiction or country. The policy also will be interpreted to give broad authority to the Fund as to how to classify issuers within or among industries. Also for purposes of the fundamental policy relating to concentration, mortgage-backed and asset-backed securities are grouped according to the nature of their collateral, and certificates of deposit (“CDs”) are interpreted to include similar types of time deposits. Also with respect to the fundamental policy relating to industry concentration set forth above, the Fund determines the “issuer” of a municipal obligation that is not a general obligation note or bond based on the obligation’s characteristics. The most significant of these characteristics is the source of funds for the repayment of principal and payment of interest on the obligation. If an obligation is backed by an irrevocable letter of credit or other guarantee, without which the obligation would not qualify for purchase under the Fund’s quality restrictions, the issuer of the letter of credit or the guarantee is considered an issuer of the obligation. If an obligation meets the Fund’s quality restrictions without credit support, the F

      N-14/A 1 c103604_n14a.htm Filed with the Securities and Exchange Commission on May 3, 2022 1933 Act Registration File No. 333-264516 SECURITIES AND EXCHANGE COMMISSION Washington, D.C. 20549 FORM N-14 REGISTRATION STATEMENT UNDER THE SECURITIES ACT OF 1933 x x Pre-Effective Amendment No. 1 o Post-Effective Amendment No. ___ (Check appropriate box or boxes.) INVESTMENT MANAGERS SERIES TRUST II (Exact Name of Registrant as Specified in Charter) 235 West Galena Street Milwaukee, WI 53212-3948 (Address of Principal Executive Offices, including Zip Code) Registrant’s Telephone Number, including Area Code: (626) 385-5777 Diane J. Drake Mutual Fund Administration, LLC 2220 E. Route 66, Suite 226 Glendora, California 91740 (Name and Address of Agent for Service) Copy to: Laurie Dee Morgan, Lewis & Bockius LLP 600 Anton Boulevard, Suite 1800 Costa Mesa, California 92626 Approximate Date of Proposed Public Offering: As soon as practicable after the Registration Statement becomes effective under the Securities Act of 1933, as amended. The registrant hereby amends this registration statement on such date or dates as may be necessary to delay its effective date until the registrant shall file a further amendment which specifically states that this registration statement shall thereafter become effective in accordance with Section 8(a) of the Securities Act of 1933 or until the registration statement shall become effective on such date as the Commission, acting pursuant to said Section 8(a), may determine. Title of Securities Being Registered: AXS SPAC and New Issue ETF AXS De-SPAC ETF AXS Short De-SPAC ETF AXS FOMO ETF AXS Revere Sector Opportunity ETF AXS Short Innovation ETF No filing fee is required because an indefinite number of shares have previously been registered pursuant to Rule 24f-2 under the Investment Company Act of 1940. Collaborative Investment Series Trust The SPAC and New Issue ETF The De-SPAC ETF The Short De-SPAC ETF FOMO ETF Revere Sector Opportunity ETF Tuttle Capital Short Innovation ETF (each, a “Target Fund” and collectively, the “Target Funds”) 500 Damonte Ranch Parkway Building 700, Unit 700 Reno, NV 89521 1- (866) 904-0406 [ ], 2022 Dear Valued Shareholder: A Special Meeting of Shareholders of each Target Fund, each a series of the Collaborative Investment Series Trust (the “Trust”), has been scheduled for [ ], 2022 (the “Special Meeting”) and will be held at the offices of [ ] on [ ], 2022. Shareholders of each Target Fund are being asked to approve an Agreement and Plan of Reorganization (each, a “Plan” and collectively, the “Plans”) of their Target Fund into a corresponding, newly created series (each, an “Acquiring Fund” and together, the “Acquiring Funds”) of Investment Managers Series Trust II (“IMST II”), as set forth below. Each Plan will provide for the transfer of all of the assets of a Target Fund to the corresponding Acquiring Fund in exchange for shares of that Acquiring Fund and the assumption of all of the liabilities of such Target Fund by the corresponding Acquiring Fund, and the distribution of the Acquiring Fund’s shares received by such Target Fund to its shareholders in complete liquidation of the Target Fund (each, a “Reorganization” and collectively, the “Reorganizations”). Target Fund Acquiring Fund The SPAC and New Issue ETF AXS SPAC and New Issue ETF The De-SPAC ETF AXS De-SPAC ETF The Short De-SPAC ETF AXS Short De-SPAC ETF FOMO ETF AXS FOMO ETF Revere Sector Opportunity ETF AXS Revere Sector Opportunity ETF Tuttle Capital Short Innovation ETF AXS Short Innovation ETF On ____________, AXS Investments LLC (“AXS”), the investment advisor of each Acquiring Fund, entered into an agreement with Tuttle Capital Management, LLC (“Tuttle Capital”), the investment advisor of each Target Fund, whereby Tuttle Capital would transfer its investment advisory business relating to the Target Funds to AXS (the “Transaction”). In connection with the Transaction, AXS wishes to reorganize the Target Funds into the AXS family of funds. To effectuate this, the Board of Trustees of the Trust (the “Board”) has approved, pursuant to a Plan for each Reorganization, the Reorganization of each Target Fund. Each Acquiring Fund will be managed by AXS and has the same investment objective and principal investment strategies, and substantially similar risks as the corresponding Target Fund. Matthew Tuttle, the current portfolio manager of The SPAC and New Issue ETF, The De-SPAC ETF, The Short De-SPAC ETF, FOMO ETF and Tuttle Capital Short Innovation ETF, is currently a dual employee of AXS and Tuttle Capital and he will continue to serve as a portfolio manager of the corresponding Acquiring Funds following the Reorganizations as an employee of AXS. Following the Reorganizations, Tuttle Capital intends to remain in business as a separate investment advisor for a limited period, but will not be involved in the management of the Acquiring Funds. In addition, Revere Wealth Management LLC, the current sub-advisor of the Revere Sector Opportunity ETF, and Scott Fullman, the current portfolio manager of the Revere Sector Opportunity ETF, will continue to serve as sub-adviser and portfolio manager, respectively, to the AXS Revere Sector Opportunity ETF following the Reorganization. If shareholders of a Target Fund approve the applicable Plan and certain other closing conditions are satisfied or waived, each shareholder of that Target Fund will receive after the closing of the applicable Reorganization (in accordance with the Plan) a number of shares of beneficial interest of the corresponding Acquiring Fund equal in value to the aggregate net asset value of the shares of the Target Fund held by the Target Fund shareholder immediately prior to the Reorganization, and the Target Fund shareholders will become shareholders of the Acquiring Fund. Each Acquiring Fund is a newly organized fund that will commence operation upon the closing of the Reorganization of the corresponding Target Fund. Each Reorganization generally is not expected to result in the recognition of gain or loss by the applicable Target Fund or its shareholders for federal income tax purposes. No sales charges or redemption fees will be imposed in connection with the Reorganizations. The Reorganization of each Target Fund into the corresponding Acquiring Fund is not conditioned upon receipt of shareholder approval of the Reorganization relating to any of the other Target Funds. If the shareholders of a Target Fund do not approve the applicable Reorganization, then the Reorganization of that Target Fund will not be implemented and such Target Fund will continue to operate as a series of the Trust. The Board will consider additional actions as it deems to be in the best interests of such Target Fund, including liquidation. After careful consideration, for the reasons discussed in the attached Proxy Statement/Prospectus, and based on the recommendation of the Trust’s investment advisor, Tuttle Capital, the Board has approved each Reorganization and the solicitation of each Target Fund’s shareholders with respect to the applicable Plan. The Board recommends that the shareholders of each Target Fund vote “FOR” approval of the Plan with respect to their Target Fund and the Reorganization it contemplates. The attached Proxy Statement/Prospectus is designed to give you more information about the proposal. If you have any questions regarding the proposal to be voted on, please do not hesitate to call [ ]. If you were a shareholder of record of a Target Fund as of the close of business on [ ], 2022, the record date for the Special Meeting, you are entitled to vote on the proposal with respect to your Target Fund(s) at the Special Meeting and at any adjournment thereof. While you are, of course, welcome to join us at the Special Meeting, we expect that most shareholders will cast their votes by filling out and signing the enclosed proxy card. Whether or not you are planning to attend the Special Meeting, we need your vote. Please submit your vote via the options listed on your proxy card. You can mark, sign and date the enclosed proxy card and promptly return it in the enclosed, postage-paid envelope so that the maximum number of shares may be voted. You should follow the enclosed instructions on your proxy card as to how to vote, which includes calling the toll-free number on your proxy card to vote by telephone. You may revoke your proxy before it is exercised at the Special Meeting, either by writing to the Secretary of the Trust at the address noted in the Proxy Statement/Prospectus or in person at the time of the Special Meeting. A prior proxy vote can also be revoked by voting the proxy at a later date through the toll-free number listed on the proxy card. Thank you for taking the time to consider this important proposal and for your continuing investment in the Collaborative Investment Series Trust . Sincerely, Gregory Skidmore Gregory Skidmore President Collaborative Investment Series Trust The SPAC and New Issue ETF The De-SPAC ETF The Short De-SPAC ETF FOMO ETF Revere Sector Opportunity ETF Tuttle Capital Short Innovation ETF (each, a “Target Fund” and collectively, the “Target Funds”) 500 Damonte Ranch Parkway Building 700, Unit 700 Reno, NV 89521 1- (866) 904-0406 NOTICE OF JOINT SPECIAL MEETING OF SHAREHOLDERS TO BE HELD ______________, 2022 Collaborative Investment Series Trust, a Delaware statutory trust (the “Trust”), will hold a Joint Special Meeting of Shareholders (the “Special Meeting”) of the Target Funds , each a series of the Trust, on [ ], 2022, at the offices of [ ], at 1:00 p.m. Eastern time. At the Special Meeting, you and the other shareholders of the Target Funds will be asked to consider and vote upon the following proposal for your Target Fund(s): 1. To approve an Agreement and Plan of Reorganization by and between Collaborative Investment Series Trust, on behalf of The SPAC and New Issue ETF, and Investment Managers Series Trust II, on behalf of the AXS SPAC and New Issue ETF pursuant to which The SPAC and New Issue ETF would (i) transfer all of its assets to the AXS SPAC and New Issue ETF in exchange solely for newly issued shares of the AXS SPAC and New Issue ETF and the AXS SPAC and New Issue ETF’s assumption of all of the liabilities of The SPAC and New Issue ETF and (ii) immediately distribute such newly issued shares of the AXS SPAC and New Issue ETF to The SPAC and New Issue ETF shareholders. 2. To approve an Agreement and Plan of Reorganization by and between Collaborative Investment Series Trust, on behalf of The De-SPAC ETF, and Investment Managers Series Trust II, on behalf of the AXS De-SPAC ETF pursuant to which The De-SPAC ETF would (i) transfer all of its assets to the AXS De-SPAC ETF in exchange solely for newly issued shares of the AXS De-SPAC ETF and the AXS De-SPAC ETF’s assumption of all of the liabilities of The De-SPAC ETF and (ii) immediately distribute such newly issued shares of the AXS De-SPAC ETF to The De-SPAC ETF shareholders. 3. To approve an Agreement and Plan of Reorganization by and between Collaborative Investment Series Trust, on behalf of The Short De-SPAC ETF, and Investment Managers Series Trust II, on behalf of the AXS Short De-SPAC ETF pursuant to which The Short De-SPAC ETF would (i) transfer all of its assets to the AXS Short De-SPAC ETF in exchange solely for newly issued shares of the AXS Short De-SPAC ETF and the AXS Short De-SPAC ETF’s assumption of all of the liabilities of The Short De-SPAC ETF and (ii) immediately distribute such newly issued shares of the AXS Short De-SPAC ETF to The Short De-SPAC ETF shareholders. 4. To approve an Agreement and Plan of Reorganization by and between Collaborative Investment Series Trust, on behalf of the FOMO ETF, and Investment Managers Series Trust II, on behalf of the AXS FOMO ETF pursuant to which the FOMO ETF would (i) transfer all of its assets to the AXS FOMO ETF in exchange solely for newly issued shares of the AXS FOMO ETF and the AXS FOMO ETF’s assumption of all of the liabilities of the FOMO ETF and (ii) immediately distribute such newly issued shares of the AXS FOMO ETF to the FOMO ETF shareholders. 5. To approve an Agreement and Plan of Reorganization by and between Collaborative Investment Series Trust, on behalf of the Revere Sector Opportunity ETF, and Investment Managers Series Trust II, on behalf of the AXS Revere Sector Opportunity ETF pursuant to which the Revere Sector Opportunity ETF would (i) transfer all of its assets to the AXS Revere Sector Opportunity ETF in exchange solely for newly issued shares of the AXS Revere Sector Opportunity ETF and the AXS Revere Sector Opportunity ETF’s assumption of all of the liabilities of the Revere Sector Opportunity ETF and (ii) immediately distribute such newly issued shares of the AXS Revere Sector Opportunity ETF to the Revere Sector Opportunity ETF shareholders. 6. To approve an Agreement and Plan of Reorganization by and between Collaborative Investment Series Trust, on behalf of the Tuttle Capital Short Innovation ETF, and Investment Managers Series Trust II, on behalf of the AXS Short Innovation ETF pursuant to which the Tuttle Capital Short Innovation ETF would (i) transfer all of its assets to the AXS Short Innovation ETF in exchange solely for newly issued shares of the AXS Short Innovation ETF and the AXS Short Innovation ETF’s assumption of all of the liabilities of the Tuttle Capital Short Innovation ETF and (ii) immediately distribute such newly issued shares of the AXS Short Innovation ETF to the Tuttle Capital Short Innovation ETF shareholders. 7. The transaction of such other business as may properly come before the Special Meeting or any continuations after an adjournment thereof. Only shareholders of record of the Target Funds at the close of business on [ ], 2022, the record date for this Joint Special Meeting, will be entitled to notice of, and to vote at, the Joint Special Meeting 

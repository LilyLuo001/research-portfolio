      N-14 1 d49656dn14.htm JOHN HANCOCK INVESTMENT TRUST JOHN HANCOCK INVESTMENT TRUST Table of Contents As filed with the Securities and Exchange Commission on August 18, 2025 File No. 333-[ ] UNITED STATES SECURITIES AND EXCHANGE COMMISSION WASHINGTON, D.C. 20549 FORM N-14 REGISTRATION STATEMENT UNDER THE SECURITIES ACT OF 1933 [X] PRE-EFFECTIVE AMENDMENT NO. [ ] POST-EFFECTIVE AMENDMENT NO. [ ] JOHN HANCOCK INVESTMENT TRUST (EXACT NAME OF REGISTRANT AS SPECIFIED IN CHARTER) 200 BERKELEY STREET BOSTON, MASSACHUSETTS 02116 (ADDRESS OF PRINCIPAL EXECUTIVE OFFICES) (ZIP CODE) REGISTRANT'S TELEPHONE NUMBER, INCLUDING AREA CODE (800) 225-5291 CHRISTOPHER SECHLER, ESQ. 200 BERKELEY STREET BOSTON, MASSACHUSETTS 02116 (NAME AND ADDRESS OF AGENT FOR SERVICE) COPIES OF COMMUNICATIONS TO: MARK P. GOSHKO, ESQ. K&L GATES LLP ONE CONGRESS STREET, SUITE 2900 BOSTON, MASSACHUSETTS 02114 _______________________________________________________ Approximate Date Of Proposed Public Offering: As soon as practicable after the effective date of this Registration Statement. Title of securities being registered: Shares of beneficial interest of the Registrant. ________________________________________________________ Calculation of Registration Fee under the Securities Act of 1933: No filing fee is due because of reliance on Section 24(f) of the Investment Company Act of 1940, which permits registration of an indefinite number of securities. It is proposed that this filing will become effective on September 18, 2025 pursuant to Rule 488 under the Securities Act of 1933, as amended. Table of Contents Please vote today We need your input on an important proposal that affects your investment Online [www. ] Phone [ ] Mail Sign and return the enclosed voting card Table of Contents September [ ], 2025 Your action is required. Please vote today. Dear John Hancock ESG Large Cap Core Fund shareholder: At John Hancock Investment Management, we continually review our lineup of mutual funds to ensure 
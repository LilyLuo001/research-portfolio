-months divided by current price per share. Potentially investing in stocks not considered low-priced. Investing in domestic and foreign issuers. Investing in either "growth" stocks or "value" stocks or both. Using fundamental analysis of factors such as each issuer's financial condition and industry position, as well as market and economic conditions, to select investments. Principal Investment Risks Stock Market Volatility. Stock markets are volatile and can decline significantly in response to adverse issuer, political, regulatory, market, or economic developments. Different parts of the market, including different market sectors, and different types of securities can react differently to these developments. Foreign Exposure. Foreign markets can be more volatile than the U.S. market due to increased risks of adverse issuer, political, regulatory, market, or economic developments and can perform differently from the U.S. market. Issuer-Specific Changes. The value of an individual security or particular type of security can be more volatile than, and can perform differently from, the market as a whole. The value of securities of smaller issuers can be more volatile than that of larger issuers. "Growth" Investing. "Growth" stocks can perform differently from the market as a whole and other types of stocks and can be more volatile than other types of stocks. "Value" Investing. "Value" stocks can perform differently from the market as a whole and other types of stocks and can continue to be undervalued by the market for long periods of time. An investment in the fund is not a deposit of a bank and is not insured or guaranteed by the Federal Deposit Insurance Corporation or any other government agency . You could lose money by investing in the fund. Performance The following information is intended to help you understand the risks of investing in the fund. The information illustrates the changes in the performance of the fund's shares from year to year and compares the
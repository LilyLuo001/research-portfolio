      N-14 1 fcst-efp14710_n14.htm FIDELITY CONCORD STREET TRUST - N-14 As filed with the Securities and Exchange Commission on February 28, 2025 Registration No. 33-___________ (Investment Company Act Registration No. 811-05251) SECURITIES AND EXCHANGE COMMISSION Washington, D.C. 20549 FORM N-14 REGISTRATION STATEMENT UNDER THE SECURITIES ACT OF 1933 Pre-Effective Amendment No._____ ☐ Post-Effective Amendment No. _____ ☐ Fidelity Concord Street Trust (Exact Name of Registrant as Specified in Charter) Registrant’s Telephone Number (617) 563-7000 245 Summer St., Boston, MA 02210 (Address Of Principal Executive Offices) Nicole Macarchuk, Secretary and Chief Legal Officer 245 Summer Street Boston, MA 02210 (Name and Address of Agent for Service) Approximate Date of Proposed Public Offering: As soon as practicable after the Registration Statement becomes effective under the Securities Act of 1933. The Registrant has registered an indefinite amount of securities under the Securities Act of 1933 pursuant to Section 24(f) under the Investment Company Act of 1940; accordingly, no fee is payable herewith because of reliance upon Section 24(f). It is proposed that this filing will become effective on March 30, 2025, pursuant to Rule 488. Fidelity Advisor ® Large Cap Fund a SERIES OF Fidelity Advisor Series I Fidelity Advisor ® OVERSEAS Fund a SERIES OF Fidelity Advisor Series VIII 245 Summer Street, Boston, Massachusetts 02210 1-877-208-0098 NOTICE OF SPECIAL MEETING OF SHAREHOLDERS To the Shareholders of the above trusts: NOTICE IS HEREBY GIVEN that a Special Meeting of Shareholders (the Meeting) of the above-named trusts (the trusts) will be held on June 11, 2025, at 8:00 A.M. Eastern Time (ET). The purpose of the Meeting is to consider and act upon the following proposals and to transact such other business as may properly come before the Meeting or any adjournments thereof. (1) For Fidelity Advisor ® Large Cap Fund, to approve an Agreement and Plan of Reorganization providing for the transfer of all of the assets of Fidelity Advisor ® Large Cap Fund to Fidelity ® Large Cap Stock Fund in exchange solely for corresponding shares of beneficial interest of Fidelity ® Large Cap Stock Fund and the assumption by Fidelity ® Large Cap Stock Fund of Fidelity Advisor ® Large Cap Fund’s liabilities, in complete liquidation of Fidelity Advisor ® Large Cap Fund. (2) For Fidelity Advisor ® Overseas Fund, to approve an Agreement and Plan of Reorganization providing for the transfer of all of the assets of Fidelity Advisor ® Overseas Fund to Fidelity ® Overseas Fund in exchange solely for corresponding shares of beneficial interest of Fidelity ® Overseas Fund and the assumption by Fidelity ® Overseas Fund of Fidelity Advisor ® Overseas Fund’s liabilities, in complete liquidation of Fidelity Advisor ® Overseas Fund. The Boards of Trustees have fixed the close of business on April 14, 2025 as the record date for the determination of the shareholders of both of the funds entitled to notice of, and to vote at, such Meeting and any adjournments thereof. By order of the Board of Trustees, NICOLE MACARCHUK, Secretary April 14, 2025 Your vote is important – please vote your shares promptly . The Meeting will be held in a virtual format only. Shareholders are invited to attend the Meeting by means of remote audio communication. You will not be able to attend the Meeting in person. To participate in the Meeting, you must register at www.viewproxy.com/fidelityfunds2/broadridgevsm/. You will be required to enter your name, an email address, and the control number found on your proxy card or notice you previously received. If you have lost or misplaced your control number, call Fidelity at 1-877-208-0098 to verify your identity and obtain your control number. Requests for registration must be received no later than 5:00 p.m. ET on Tuesday, June 10, 2025. Once your registration is approved, you will receive an email confirming your registration with an event link and optional dial-in information to attend the Meeting. A separate email will follow containing a password to enter at the event link in order to access the Meeting. You may vote during the Meeting at www.proxyvote.com/proxy. You will need your control number to vote. Questions from shareholders to be considered at a Meeting must be submitted to Broadridge at www.viewproxy.com/fidelityfunds2/broadridgevsm/ no later than 8:00 a.m. ET on Tuesday, June 10, 2025. Shareholders whose shares are held by a broker, bank or other nominee must first obtain a “legal proxy” from the applicable nominee/ record holder, who will then provide the shareholder with a newly-issued control number. We note that obtaining a legal proxy may take several days. Requests for registration should be received no later than 5:00 p.m. ET on Tuesday, June 10, 2025. Once shareholders have obtained a new control number, they must visit www.viewproxy.com/fidelityfunds2/broadridgevsm/ and submit their name and newly issued control number in order to register to participate in and vote at the Meeting. Any shareholder who does not expect to virtually attend the Meeting is urged to vote using the touch-tone telephone or internet voting instructions that follow or by indicating voting instructions on the enclosed proxy card, dating and signing it, and returning it in the envelope provided, which needs no postage if mailed in the United States. In order to avoid unnecessary expense, we ask for your cooperation in responding promptly, no matter how large or small your holdings may be. If you wish to wait until the Meeting to vote your shares, you will need to follow the instructions available on the Meeting’s website during the Meeting in order to do so. INSTRUCTIONS FOR EXECUTING PROXY CARD The following general rules for executing proxy cards may be of assistance to you and help avoid the time and expense involved in validating your vote if you fail to execute your proxy card properly. 1. Individual Accounts: Your name should be signed exactly as it appears in the registration on the proxy card. 2. Joint Accounts: Either party may sign, but the name of the party signing should conform exactly to a name shown in the registration. 3. All other accounts should show the capacity of the individual signing. This can be shown either in the form of the account registration itself or by the individual executing the proxy card. For example: REGISTRATION VALID SIGNATURE A. 1) ABC Corp. John Smith, Treasurer 2) ABC Corp. John Smith, Treasurer c/o John Smith, Treasurer B. 1) ABC Corp. Profit Sharing Plan Ann B. Collins, Trustee 2) ABC Trust Ann B. Collins, Trustee 3) Ann B. Collins, Trustee Ann B. Collins, Trustee u/t/d 12/28/78 C. 1) Anthony B. Craft, Cust. Anthony B. Craft f/b/o Anthony B. Craft, Jr. UGMA INSTRUCTIONS FOR VOTING BY TOUCH-TONE TELEPHONE OR THROUGH THE INTERNET 1. Read the proxy statement, and have your proxy card handy. 2. Call the toll-free number or visit the web site indicated on your proxy card. 3. Enter the number found in the box on the front of your proxy card. 4. Follow the recorded or on-line instructions to cast your vote up until 11:59 p.m. ET on June 10, 2025. SUBJECT TO COMPLETION The information in this combined information statement and prospectus is not complete and may be changed. We may not sell these securities until the registration statement filed with the Securities and Exchange Commission is effective. This combined information statement and prospectus is not an offer to sell these securities and is not soliciting an offer to buy these securities in any state where the offer or sale is not permitted. FIDELITY ADVISOR ® Large Cap FUND A series of Fidelity Advisor Series I Fidelity ® Large Cap Stock Fund a SERIES OF FIDELITY CONCORD STREET TRUST FIDELITY ADVISOR ® OVERSEAS FUND A series of Fidelity Advisor Series VIII Fidelity ® OVERSEAS Fund A series of Fidelity INVESTMENT trust 245 SUMMER STREET, BOSTON, MASSACHUSETTS 02210 1-877-208-0098 PROXY STATEMENT AND PROSPECTUS APRIL 14, 2025 This combined Proxy Statement and Prospectus (Proxy Statement) is furnished to shareholders of Fidelity Advisor ® Large Cap Fund, a series of Fidelity Advisor Series I, and Fidelity Advisor ® Overseas Fund, a series of Fidelity Advisor Series VIII (Fidelity Advisor Series VIII, and together with Fidelity Advisor Series I, the trusts), in connection with a solicitation of proxies made by, and on behalf of, the trusts’ Board of Trustees to be used at the Special Meeting of Shareholders of Fidelity Advisor ® Large Cap Fund and Fidelity Advisor ® Overseas Fund and at any adjournments thereof (together, the Meeting), to be held on June 11, 2025 at 8:00 Eastern Time (ET). The Board of Trustees and Fidelity Management & Research Company LLC (FMR or the Adviser), the investment adviser of each proposed target fund listed in the table below (each a Target Fund and together the Target Funds), have determined that the Meeting will be held in a virtual format only. The Meeting will be accessible solely by means of remote audio communication. You will not be able to attend the Meeting in person. This Proxy Statement and the accompanying proxy card are first being mailed on or about April 14, 2025. As more fully described in the Proxy Statement, shareholders of each Target Fund are being asked to consider and vote on an Agreement and Plan of Reorganization (each an Agreement, and together, the Agreements) relating to the proposed acquisition of such Target Fund by the corresponding acquiring fund listed in the table (each an Acquiring Fund and together the Acquiring Funds, and the Target Funds together with the Acquiring Funds, the funds). Proposal Target Fund Acquiring Fund 1 Fidelity Advisor ® Large Cap Fund Fidelity ® Large Cap Stock Fund 2 Fidelity Advisor ® Overseas Fund Fidelity ® Overseas Fund The transactions contemplated by the Agreements are each referred to as a Reorganization and, together, the Reorganizations. Approval of each Reorganization will be determined solely by approval of the shareholders of the affected Target Fund. It will not be necessary for both Reorganizations to be approved for either one of them to occur. If the Agreement relating to your fund is approved by fund shareholders and the related Reorganization occurs, you will become a shareholder of the corresponding Acquiring Fund. Your fund will transfer all of its assets to the corresponding Acquiring Fund in exchange solely for shares of beneficial interest of the corresponding Acquiring Fund and the assumption by the corresponding Acquiring Fund of your fund’s liabilities in complete liquidation of the Target Fund. The total value of your fund holdings will not change as a result of a Reorganization. The Reorganizations are currently scheduled to take place as of the close of business of the New York Stock Exchange (the NYSE) on July 25, 2025, or such other time and date as the parties to the respective Agreement may agree (the Closing Date). Fidelity ® Large Cap Stock Fund, an equity fund, is a diversified series of Fidelity Concord Street Trust, an open-end management investment company registered with the Securities and Exchange Commission (the SEC). Fidelity ® Large Cap Stock Fund seeks long-term growth of capital. Fidelity ® Large Cap Stock Fund seeks to achieve its investment objective by normally investing at least 80% of assets in common stocks of companies with large market capitalizations (which, for purposes of this fund, are those companies with market capitalizations similar to companies in the Russell 1000 ® Index or the S&P 500 ® Index). Fidelity ® Overseas Fund, an equity fund, is a diversified series of Fidelity Investment Trust, an open-end management investment company registered with the SEC. Fidelity ® Overseas Fund seeks long-term growth of capital. Fidelity ® Overseas Fund seeks to achieve its investment objective by normally investing at least 80% of assets in non-U.S. securities. The Adviser considers non-U.S. securities to include investments that are tied economically to a particular country or region outside the U.S. THESE SECURITIES HAVE NOT BEEN APPROVED OR DISAPPROVED BY THE SEC, NOR HAS THE SEC PASSED UPON THE ACCURACY OR ADEQUACY OF THIS PROXY STATEMENT AND PROSPECTUS. ANY REPRESENTATION TO THE CONTRARY IS A CRIMINAL OFFENSE. The Proxy Statement sets forth concisely the information about each Reorganization and each Acquiring Fund that shareholders should know before voting on the proposed Reorganizations. Please read it carefully and keep it for future reference. The following documents have been filed with the SEC and are incorporated into this Proxy Statement by reference, which means they are part of this Proxy statement for legal purposes: (i) the Statement of Additional Information dated April 14, 2025, relating to this Proxy Statement; (ii) the Annual Report for Fidelity ® Large Cap Stock Fund dated April 30, 2024; (iii) the Form N-CSR for Fidelity ® Overseas Fund dated October 31, 2024; (iv) the Form N-CSRS for Fidelity ® Large Cap Stock Fund dated October 31, 2024; (v) the Prospectus for Fidelity Advisor ® Large Cap Fund dated January 29, 2025 , as supplemented January 29, 2025, relating to Class A, Class M, Class C, Class I, and Class Z shares; (vi) the Prospectus for Fidelity Advisor ® Overseas Fund dated December 30, 2024 , as supplemented January 24, 2025, relating to Class A, Class M, Class C, Class I, and Class Z shares; (vii) the Statement of Additional Information for Fidelity Advisor ® Large Cap Fund dated January 29, 2025, relating to Class A, Class M, Class C, Class I, and Class Z shares; (viii) the Statement of Additional Information for Fidelity Advisor ® Overseas Fund dated December 30, 2024, relating to Class A, Class M, Class C, Class I, and Class Z shares; (ix) the Form N-CSR for Fidelity Advisor ® Large Cap Fund dated November 30, 2024; (x) the Form N-CSR for Fidelity Advisor ® Overseas Fund dated October 31, 2024; For 

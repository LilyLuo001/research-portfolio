nized as follows: 1. Letter to Shareholders of BlackRock LifePath ® Dynamic 2020 Fund, a series of BlackRock Funds III. 2. Questions and Answers for Shareholders of BlackRock LifePath ® Dynamic 2020 Fund, a series of BlackRock Funds III. 3. Combined Prospectus/Information Statement regarding the reorganization of BlackRock LifePath ® Dynamic 2020 Fund, a series of BlackRock Funds III, into BlackRock LifePath ® Dynamic Retirement Fund, a series of BlackRock Funds III. 4. Statement of Additional Information regarding the reorganization of BlackRock LifePath ® Dynamic 2020 Fund, a series of BlackRock Funds III, into BlackRock LifePath ® Dynamic Retirement Fund, a series of BlackRock Funds III. 5. Part C Information 6. Exhibits BLACKROCK FUNDS III BlackRock LifePath ® Dynamic 2020 Fund 400 Howard Street San Francisco, California 94105 (800) 441-7762 [•], 2019 Dear Shareholder: I am writing to inform you about a reorganization that will affect your investment in BlackRock LifePath ® Dynamic 2020 Fund (the “Target Fund”), a series of BlackRock Funds III (the “Trust”), a Delaware statutory trust. As provided in an Agreement and Plan of Reorganization (the “Reorganization Agreement”), the Target Fund will be reorganized into BlackRock LifePath ® Dynamic Retirement Fund (the “Acquiring Fund”), a series of the Trust (the “Reorganization”). The Target Fund is a “feeder” fund that invests all of its assets in LifePath ® Dynamic 2020 Master Portfolio (the “Target Master Portfolio”), a series of Master Investment Portfolio (“MIP”), a Delaware statutory trust, which has an investment objective, strategies and policies substantially identical to those of the Target Fund. The Acquiring Fund is also a “feeder” fund and invests all of its assets in LifePath ® Dynamic Retirement Master Portfolio (the “Acquiring Master Portfolio” and together with the Target Master Portfolio, the “Master Portfolios” and each, a “Master Portfolio”), a series of MIP, which has an investment objective, strategies and policies substantially identical to those of the Acquiring Fund. The Acquiring Master Portfolio is advised by BlackRock Fund Advisors (“BFA”), the same investment adviser to the Target Master Portfolio. Following the completion of the Reorganization, the Acquiring Fund and the Acquiring Master Portfolio may be referred to as the “Combined Fund” and the “Combined Master Portfolio,” respectively. Since each Fund is a feeder fund that invests all of its assets in a corresponding Master Portfolio, there are other aspects of the Reorganization that are not covered in the enclosed Combined Prospectus/Information Statement because they do not relate to the Target Fund or the Acquiring Fund directly. The Board of Trustees of MIP has approved an Agreement and Plan of Reorganization between MIP, on behalf of the Target Master Portfolio, and MIP, on behalf of the Acquiring Master Portfolio (the “Master Reorganization Agreement), pursuant to which the Target Master Portfolio and the Acquiring Master Portfolio will be combined (the “Master Reorganization”) prior to the Reorganization of the Target Fund into the Acquiring Fund. The Master Reorganization is not governed by the enclosed Combined Prospectus/Information Statement. The Target Fund and the Acquiring Fund are each referred to as a “Fund” and collectively referred to as the “Funds.” The Board of Trustees of the Trust (the “Board”) has determined that the Reorganization is in the best interests of each Fund, and that the interests of each Fund’s shareholders will not be diluted as a result of the Reorganization. The enclosed Combined Prospectus/Information Statement contains information about the Reorganization. As a result of the Reorganization, you will receive shares (including fractional shares, if any) of the class of shares in the Acquiring Fund set out in the table below with the same aggregate net asset value as the shares of the Target Fund you own immediately prior to the Reorganization: If you own the following Target Fund Shares You will receive the following Acquiring Fund Shares Investor A Investor A Investor C Investor C Institutional Institutional Class R Class R Class K Class K As the target date of the Target Fund approaches in 2020, the investment objective, policies and strategies of the Target Fund are converging with the investment objective, policies and strategies of the Acquiring Fund. The Funds are part of the LifePath investment program pursuant to which the Target Fund will have a substantially similar investment objective and identical investment policies, strategies, restrictions and risks as the Acquiring Fund as the target date of the Target Fund approaches in 2020. It is expected that the Reorganization will enable the Combined Fund to operate more efficiently in the future. BFA will continue as the investment adviser of the Combined Fund after the Reorganization and no change in portfolio managers will result from the Reorganization. In addition, no increase in advisory, administration or other fee rates will result from the Reorganization. The Target Fund and the Acquiring Fund have the same expense structure, the same types of fees and the same fee rates. Assuming the Reorganization had occurred on December 31, 2018, the Combined Fund would have (A) total annual fund operating expenses for each of its share classes to be issued in the Reorganization that are estimated to be the same as those of each of the corresponding share classes of the Target Fund prior to the Reorganization and (B) net annual fund operating expenses for each of its share classes to be issued in the Reorganization that are estimated to be the same as those of each of the corresponding share classes of the Target Fund prior to the Reorganization, after giving effect to all applicable contractual fee and expense waivers and/or reimbursements that BlackRock has agreed to continue through April 30, 2021 and April 30, 2030, in each case as of December 31, 2018. NO SHAREHOLDER ACTION IS REQUIRED AS A RESULT OF THE REORGANIZATION. In accordance with the Target Fund’s and the Acquiring Fund’s operative documents, and applicable Delaware state and U.S. federal law (including Rule 17a-8 under the Investment Company Act of 1940, as amended), the Reorganization may be effected without the approval of shareholders of any Fund. I encourage you to carefully review the enclosed materials, which explain the Reorganization in more detail. If you have any questions or need additional information, please contact BlackRock Investor Services at (800) 441-7762. Sincerely, JOHN M. PERLOWSKI President and Chief Executive Officer BlackRock LifePath ® Dynamic 2020 Fund B LACK R OCK F UNDS III 400 Howard Street, San Francisco, California 94105 (800) 441-7762 QUESTIONS & ANSWERS We recommend that you read the complete Combined Prospectus/Information Statement. For your convenience, we have provided a brief overview of the Reorganization (as defined below). Q: Why is the Reorganization taking place? A: The Board of Trustees of the Trust (as defined below) has determined that the Reorganization is in the best interests of each Fund, and that the interests of each Fund’s shareholders will not be diluted as a result of the Reorganization. Q: What does the Reorganization provide for? A: Pursuant to an Agreement and Plan of Reorganization (the “Reorganization Agreement”) between BlackRock Funds III (the “Trust”), on behalf of BlackRock LifePath ® Dynamic 2020 Fund (the “Target Fund”) and the Trust, on behalf of BlackRock LifePath ® Dynamic Retirement Fund (the “Acquiring Fund”), the Target Fund will be reorganized into the Acquiring Fund (the “Reorganization”). Following the completion of the Reorganization, the Acquiring Fund and the Acquiring Master Portfolio (as defined below) may be referred to as the “Combined Fund” and the “Combined Master Portfolio,” respectively. The Target Fund and the Acquiring Fund are each referred to as a “Fund” and collectively 
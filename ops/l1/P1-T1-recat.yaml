      497 1 a497.htm NEUBERGER BERMAN ALTERNATIVE FUNDS STATEMENT OF ADDITIONAL INFORMATION DATED FEBRUARY 28, 2018, AS AMENDED AND RESTATED JANUARY 2, 2019 Fund Institutional Class Class A Class C Class R6 Neuberger Berman Absolute Return Multi-Manager Fund NABIX NABCX NABAX NRABX 1290 Avenue of the Americas, New York, NY 10104 Shareholder Services 800.877.9700 Institutional Services 800.366.6264 www.nb.com Neuberger Berman Absolute Return Multi-Manager Fund (the “Fund”) is a mutual fund that offers shares pursuant to prospectuses dated February 28, 2018. The prospectus and summary prospectus (together, the “Prospectus”) for your share class provide more information about the Fund that you should know before investing. You can get a free copy of the Prospectus, annual report and/or semi-annual report for your share class from Neuberger Berman Investment Advisers LLC (“NBIA” or the “Manager”), 1290 Avenue of the Americas, New York, NY 10104, or by calling the appropriate number listed above for your share class. You should read the Prospectus for your share class and consider the investment objective, risks, and fees and expenses of the Fund carefully before investing. This Statement of Additional Information (“SAI”) is not a prospectus and should be read in conjunction with the Prospectus for your share class. This SAI is not an offer to sell any shares of any class of the Fund. A written offer can be made only by a Prospectus. The Fund’s financial statements, notes thereto and the report of its independent registered public accounting firm are incorporated by reference from the Fund’s annual report to shareholders into (and are therefore legally part of) this SAI. No person has been authorized to give any information or to make any representations not contained in the Prospectuses or in this SAI in connection with the offering made by the Prospectuses and, if given or made, such information or representations must not be relied upon as having been authorized by the Fund or its distributor. The Prospectuses and this SAI do not constitute an offering by the Fund or its distributor in any jurisdiction in which such offering may not lawfully be made. The “Neuberger Berman” name and logo and “Neuberger Berman Investment Advisers LLC” are registered service marks of Neuberger Berman Group LLC. The individual Fund name in this SAI is either a service mark or registered service mark of Neuberger Berman Investment Advisers LLC. ©2018 Neuberger Berman BD LLC, distributor. All rights reserved. TABLE OF CONTENTS INVESTMENT INFORMATION 1 Investment Policies and Limitations 1 Cash Management and Temporary Defensive Positions 4 Additional Investment Information 4 PERFORMANCE INFORMATION 84 TRUSTEES AND OFFICERS 84 Information about the Board of Trustees 84 Information about the Officers of the Trust 90 INVESTMENT MANAGEMENT AND ADMINISTRATION SERVICES 102 Investment Manager and Administrator 102 Management and Administration Fees 104 Fund Accounting Agent 105 Contractual Expense Limitations 105 Subadvisers 107 Portfolio Manager Information 108 Other Investment Companies or Accounts Managed 112 Codes of Ethics 113 Management and Control of NBIA 114 DISTRIBUTION ARRANGEMENTS 114 Distributor 114 Additional Payments to Financial Intermediaries 115 Distribution Plan (Class A Only) 117 Distribution Plan (Class C Only) 117 Distribution Plan (Class A and Class C) 118 ADDITIONAL PURCHASE INFORMATION 119 Share Prices and Net Asset Value 119 Subscriptions in Kind 121 Financial Intermediaries 121 Automatic Investing and Dollar Cost Averaging 121 Sales Charges 122 ADDITIONAL EXCHANGE INFORMATION 122 ADDITIONAL REDEMPTION INFORMATION 123 Suspension of Redemptions 123 Redemptions in Kind 124 CONVERSION INFORMATION 124 DIVIDENDS AND OTHER DISTRIBUTIONS 125 ii ADDITIONAL TAX INFORMATION 126 Taxation of the Fund 126 Taxation of the Fund’s Shareholders 134 Special Tax Considerations Pertaining to Funds of Funds 137 FUND TRANSACTIONS 138 Portfolio Turnover 142 Proxy Voting 142 PORTFOLIO HOLDINGS DISCLOSURE 143 Portfolio Holdings Disclosure Policy 143 Portfolio Holdings Approved Recipients 144 REPORTS TO SHAREHOLDERS 146 ORGANIZATION, CAPITALIZATION AND OTHER MATTERS 146 CUSTODIAN AND TRANSFER AGENT 147 INDEPENDENT REGISTERED PUBLIC ACCOUNTING FIRM 147 LEGAL COUNSEL 147 CONTROL PERSONS AND PRINCIPAL HOLDERS OF SECURITIES 147 REGISTRATION STATEMENT 151 FINANCIAL STATEMENTS 151 APPENDIX A – LONG-TERM AND SHORT-TERM DEBT SECURITIES RATING DESCRIPTIONS A-1 APPENDIX B – SUBADVISER PROXY VOTING POLICIES B-1 iii INVESTMENT INFORMATION The Fund is a separate operating series of Neuberger Berman Alternative Funds (“Trust”), a Delaware statutory trust since February 15, 2005, that is registered with the Securities and Exchange Commission (“SEC”) as an open-end management investment company. The Fund commenced operations on May 15, 2012. The following information supplements the discussion of the Fund’s investment objectives, policies, and limitations in the Prospectuses. The investment objective and, unless otherwise specified, the investment policies and limitations of the Fund are not fundamental. Any investment objective, policy, or limitation that is not fundamental may be changed by the trustees of the Trust (“Fund Trustees”) without shareholder approval. The fundamental investment policies and limitations of the Fund may not be changed without the approval of the lesser of: (1) 67% of the units of beneficial interest (“shares”) of the Fund present at a meeting at which more than 50% of the outstanding shares of the Fund are present or represented, or (2) a majority of the outstanding shares of the Fund. These percentages are required by the Investment Company Act of 1940, as amended (“1940 Act”), and are referred to in this SAI as a “1940 Act majority vote.” The Fund operates as a diversified investment company. Neuberger Berman Investment Advisers LLC (“NBIA”) is responsible for allocating the assets of the Fund to several subadvisers (each a “Subadviser,” collectively the “Subadvisers”). Throughout this SAI, the term “Manager” refers to NBIA or the Subadvisers, as appropriate. Investment Policies and Limitations Except as set forth in the investment limitation on borrowing and the investment limitation on illiquid securities, any investment policy or limitation that involves a maximum percentage of securities or assets will not be considered exceeded unless the percentage limitation is exceeded immediately after, and because of, a transaction by the Fund. If events subsequent to a transaction result in the Fund exceeding the percentage limitation on illiquid securities, the Manager will take appropriate steps to reduce the percentage held in illiquid securities, as may be required by law, within a reasonable amount of time. The following investment policies and limitations are fundamental: 1. Borrowing . The Fund may not borrow money, except that the Fund may (i) borrow money from banks for temporary or emergency purposes and for leveraging or investment and (ii) enter into reverse repurchase agreements for any purpose; provided that (i) and (ii) in combination do not exceed 33-1/3% of the value of its total assets (including the amount borrowed) less liabilities (other than borrowings). If at any time borrowings exceed 33 1/3% of the value of the Fund’s total assets, the Fund will reduce its borrowings within three days (excluding Sundays and holidays) to the extent necessary to comply with the 33-1/3% limitation. 2. Commodities . The Fund may not purchase physical commodities, except to the extent permitted under the 1940 Act, the rules and regulations thereunder and any applicable exemptive relief or unless acquired as a result of the ownership of securities or instruments, but this restriction shall not prohibit the Fund from purchasing futures contracts, options, foreign currencies or forward contracts, swaps, caps, collars, floors and other financial instruments or from investing in securities of any kind. 3. Diversification . The Fund may not, with respect to 75% of the value of its total assets, purchase the securities of any issuer (other than securities issued or guaranteed by the U.S. Government or any of its agencies or instrumentalities (“U.S. Government and Agency Securities”) or securities issued by other investment companies) if, as a result, (i) more than 5% of the value of the Fund’s total assets would be invested in the securities of that issuer or (ii) the Fund would hold more than 10% of the outstanding voting securities of that issuer. 4. Industry Concentration . The Fund may not purchase any security if, as a result, 25% or more of its total assets (taken at current value) would be invested in the securities of issuers having their principal business activities in the same industry. This limitation does not apply to U.S. Government and Agency Securities, securities of other investment companies and tax-exempt securities or such other securities as may be excluded for this purpose under the 1940 Act, the rules and regulations thereunder and any applicable exemptive relief. 5. Lending. The Fund may not lend any security or make any other loan if, as a result, more than 33-1/3% of its total assets (taken at current value) would be lent to other parties, except, in accordance with its investment objective, policies, and limitations, (i) through the purchase of a portion of an issue of debt securities, loans, loan participations or other forms of direct debt instruments or (ii) by engaging in repurchase agreements. 6. Real Estate . The Fund may not purchase real estate unless acquired as a result of the ownership of securities or instruments, but this restriction shall not prohibit the Fund from purchasing securities issued by entities or investment vehicles that own or deal in real estate or interests therein or instruments secured by real estate or interests therein. 7. Senior Securities . The Fund may not issue senior securities, except as permitted under the 1940 Act. 8. Underwriting . The Fund may not underwrite securities of other issuers, except to the extent that the Fund, in disposing of portfolio securities, may be deemed to be an underwriter within the meaning of the Securities Act of 1933, as amended (“1933 Act”). For purposes of the limitation on commodities, the restriction does not prevent the Fund from investing in a wholly owned subsidiary, thereby gaining exposure to the investment returns of commodities markets within the limitations of federal income tax requirements, or from investing in commodity-linked derivative instruments. 2 For purposes of the investment limitation on commodities, the Fund does not consider foreign currencies or forward contracts to be physical commodities. Also, this limitation does not prohibit the Fund from purchasing securities backed by physical commodities, including interests in exchange-traded investment trusts and other similar entities, derivative instruments, or from purchasing physical commodities. With respect to the fundamental policy relating to industry concentration, the policy will be interpreted to permit investment without limit in the following: securities of the U.S. government and its agencies or instrumentalities; securities of state, territory, possession or municipal governments and their authorities, agencies, instrumentalities or political subdivisions; securities of foreign governments; and repurchase agreements collateralized by any such obligations. Accordingly, issuers of the foregoing securities will not be considered to be members of any industry. For purposes of the Fund’s industry concentration policy, the Fund will not exclude securities the interest on which is exempt from federal income tax (“tax-exempt securities”) that are issued by municipalities to finance non-governmental projects, such as hospitals (i.e., private activity bonds (“PABs”)), from the industry concentration policy. For purposes of the investment limitation on concentration in a particular industry, industry classifications are determined for the Fund in accordance with the industry or sub-industry classifications established by the Global Industry Classification Standard. The Fund has the following additional fundamental investment policy: Notwithstanding any other investment policy of the Fund, the Fund may invest all of its investable assets (cash, securities, and receivables relating to securities) in an open‑end management investment company having substantially the same investment objective, policies, and limitations as the Fund. The following investment policies and limitations are non-fundamental: 1. Lending . Except for the purchase of debt securities, loans, loan participations or other forms of direct debt instruments and engaging in repurchase agreements, the Fund may not make any loans other than securities loans. 2. Margin Transactions . The Fund may not purchase securities on margin from brokers or other lenders, except that the Fund may obtain such short-term credits as are necessary for the clearance of securities transactions. Margin posted as collateral in connection with derivatives transactions and short sales shall not constitute the purchase of securities on margin and shall not be deemed to violate the foregoing limitation. 3. Illiquid Securities . The Fund may not purchase any security if, as a result, more than 15% of its net assets would be invested in illiquid securities. Generally, illiquid securities include securities that cannot be expected to be sold or disposed of within seven days in the ordinary course of business for approximately the amount at which the Fund has valued the securities, such as repurchase agreements maturing in more than seven days. 3 4. Investment by a Fund of Funds. If shares of the Fund are purchased by another fund in reliance on Section 12(d)(1)(G) of the 1940 Act, for so long as shares of the Fund are held by such fund, the Fund will not purchase 

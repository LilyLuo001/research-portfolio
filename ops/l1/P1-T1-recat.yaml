      N-14 1 d114057dn14.htm AMG FUNDS AMG Funds AS FILED ELECTRONICALLY WITH THE SECURITIES AND EXCHANGE COMMISSION ON March 23, 2021 SECURITIES ACT FILE NO. 333-[ ] U.S. SECURITIES AND EXCHANGE COMMISSION WASHINGTON, D.C. 20549 FORM N-14 REGISTRATION STATEMENT UNDER THE SECURITIES ACT OF 1933 ☐ Pre-Effective Amendment No. ☐ Post-Effective Amendment No. AMG FUNDS (Exact Name of Registrant as Specified in Charter) One Stamford Plaza 263 Tresser Boulevard, Suite 949 Stamford, Connecticut 06901 (Address of Principal Executive Offices) (800) 548-4539 (Registrant’s Telephone Number, Including Area Code) Gregory C. Davis Ropes & Gray LLP Three Embarcadero Center San Francisco, CA 94111-4006 (Name and Address of Agent for Service) Title of Securities being Registered: shares of beneficial interest, no par value per share. The Registrant hereby amends this registration statement on such date or dates as may be necessary to delay its effective date until the Registrant shall file a further amendment which specifically states that this registration statement shall thereafter become effective in accordance with Section 8(a) of the Securities Act of 1933 or until this registration statement shall become effective on such date as the Securities and Exchange Commission, acting pursuant to said Section 8(a), may determine. Approximate Date of Proposed Public Offering: As soon as practicable after this Registration Statement becomes effective. No filing fee is required because an indefinite number of shares of the Registrant have previously been registered pursuant to Section 24(f) of the Investment Company Act of 1940, as amended. NOTICE: PLEASE COMPLETE THE ENCLOSED PROXY CARD AND RETURN IT AS SOON AS POSSIBLE. AMG FUNDS IV One Stamford Plaza 263 Tresser Boulevard, Suite 949 Stamford, Connecticut 06901 AMG GW&K SMALL CAP VALUE FUND II (FORMERLY AMG MANAGERS SILVERCREST SMALL CAP FUND) Special Meeting of Shareholders To Be Held on [June 9, 2021] Dear Valued Shareholder: You are being asked to vote on two important proposals: (1) approval of a proposed reorganization transaction for your fund, AMG GW&K Small Cap Value Fund II (formerly AMG Managers Silvercrest Small Cap Fund) (the “ Target Fund ”), a series of AMG Funds IV (“ AMG Funds IV ”); and (2) approval of a new subadvisory agreement between AMG Funds LLC (“ AMGF ”) and GW&K Investment Management, LLC (“ GW&K ”) with respect to the Target Fund. GW&K has been an affiliate of AMGF and Affiliated Managers Group, Inc. (“AMG”), the ultimate parent company of AMGF (affiliates of AMG are collectively referred to herein as “Affiliates”), since 2008 and currently serves as subadviser to fourteen other funds in the AMG Funds Family of Funds. For more than two decades, AMG has been the partner of choice to the world’s leading alpha-generating boutique firms. AMG takes great pride in its process for making new investments and in partnering with best in class boutique investment firms globally. With over $600 billion in aggregate assets, AMG’s Affiliates offer a broad array of active, return-seeking strategies, with a focus on strategies in which boutiques maintain a competitive advantage in generating excess returns across market cycles. AMG’s unique partnership approach preserves each Affiliate’s operational and investment autonomy while leveraging the scale of AMG’s global business, with continued direct equity ownership by the Affiliate’s management partners. As highly specialized, independent, partner-owned investment firms, AMG’s Affiliates put their capital at risk alongside that of their clients, ensuring that Affiliates, as subadvisers, are incented to deliver the appropriate long term risk return profile for their Fund clients. The proposed changes for the Target Fund, which have been approved by the Board of Trustees of AMG Funds IV (the “ AMG Funds IV Board ”), are part of a strategic repositioning of the AMG Funds complex for greater alignment with AMG, in which each fund not currently subadvised by an AMG Affiliate will be transitioned to an AMG Affiliate subadviser. A reorganization transaction is also proposed for the Target Fund, as described further below. We believe this move will provide a platform for the continued growth and success of the AMG Funds complex, and will create value for the Target Fund, the other funds in the AMG Funds complex and their shareholders through enhanced resources, competitive fee levels, and greater stability for the complex. The repositioning will bring AMG’s strong partnerships in support of the Target Fund and AMG Funds complex as a whole and enable AMG Funds to bring the best capabilities of AMG’s Affiliates to the Target Fund and the rest of the AMG Funds complex. We believe the proposed changes are in the best interest of the Target Fund. The AMG Funds IV Board has called a special meeting of shareholders of the Target Fund to be held on [June 9, 2021] to vote on the two proposals, which are described further below. Your vote is very important regardless of the number of shares you own. Whether or not you plan to attend the meeting, please read the enclosed materials and authorize a proxy to vote promptly. To authorize a proxy to cast your vote, simply complete, sign and return the enclosed proxy card using the postage-paid envelope provided or follow the instructions on the proxy card to vote by telephone or the Internet. It is important that your vote is received no later than the time of the meeting. After careful consideration, the AMG Funds IV Board unanimously recommends that you vote “FOR” each proposal. Proposal 1: Reorganization of AMG GW&K Small Cap Value Fund II into AMG GW&K Small Cap Value Fund The AMG Funds IV Board has approved a transaction whereby the Target Fund would be reorganized into AMG GW&K Small Cap Value Fund (formerly AMG Managers Skyline Special Equities Fund) (the “ Acquiring Fund ” and together with the Target Fund, each a “ Fund ” and collectively, the “ Funds ”), a series of AMG Funds (“ AMG Funds ”) (the “ Reorganization ”). AMGF serves as investment manager to each Fund. GW&K serves as investment subadviser to the Acquiring Fund and is also the current interim subadviser to the Target Fund. The Target Fund and the Acquiring Fund are overseen by the same Trustees. If approved by shareholders, the Reorganization is expected to close on or about July 12, 2021, or as soon thereafter as practicable (the “ Closing Date ”). After the Reorganization, AMGF will continue to serve as the investment manager to the Acquiring Fund and GW&K will continue to serve as the subadviser to the Acquiring Fund. Proposal 2: Approval by shareholders of AMG GW&K Small Cap Value Fund II of a subadvisory agreement between AMG Funds LLC and GW&K Investment Management, LLC At a meeting held on March 17-18, 2021, and based upon the recommendation of AMGF, the strategic realignment discussed above, and other factors, the AMG Funds IV Board terminated the Target Fund’s subadvisory agreement with Silvercrest Asset Management Group LLC (“ Silvercrest ”), the then-current subadviser of the Target Fund, and approved the appointment of GW&K as the subadviser to the Target Fund on an interim basis to replace Silvercrest, with GW&K’s services beginning on March 19, 2021. GW&K was appointed interim subadviser to the Target Fund pursuant to an interim subadvisory agreement (the “ Interim Subadvisory Agreement ”) as permitted by Rule 15a-4 under the Investment Company Act of 1940, as amended (the “ 1940 Act ”). As required by applicable law, the Interim Subadvisory Agreement will remain in effect for a term no longer than 150 days. At the meeting held on March 17-18, 2021, the AMG Funds IV Board also approved the longer-term appointment of 1 GW&K as the subadviser to the Target Fund and the adoption of a new subadvisory agreement between AMGF and GW&K with respect to the Target Fund (the “ New Subadvisory Agreement ”), subject to shareholder approval. If approved, the New Subadvisory Agreement would only go into effect in the event that the Reorganization is not consummated prior to [August 16, 2021], when the Interim Subadvisory Agreement will automatically terminate. Information regarding the Interim Subadvisory Agreement and the New Subadvisory Agreement is contained in the enclosed proxy materials. The AMG Funds IV Board believes that approval of each of the proposals is in the best interests of the Target Fund. Accordingly, the AMG Funds IV Board unanimously recommends that you vote “FOR” each proposal. If you have any questions about the proxy materials or the proposed Reorganization, please call your investment professional or Computershare Fund Services at 888-456-7087. Very truly yours, /s/ Keitha L. Kinne Keitha L. Kinne President of AMG Funds IV 2 AMG FUNDS IV One Stamford Plaza 263 Tresser Boulevard, Suite 949 Stamford, Connecticut 06901 QUESTIONS AND ANSWERS YOUR VOTE IS IMPORTANT! Dated: [ ], [ ] Q: What am I being asked to vote on? A: As a shareholder of the Target Fund, you are being asked to vote to approve the Reorganization of the Target Fund into the Acquiring Fund pursuant to an Agreement and Plan of Reorganization among AMG Funds IV, on behalf of the Target Fund, AMG Funds, on behalf of the Acquiring Fund, and AMGF (for purposes of Section 5 only). In connection with the Reorganization, the Target Fund will transfer all of its assets to the Acquiring Fund, the Acquiring Fund will assume all of the liabilities of the Target Fund, and you will receive a class of shares of the Acquiring Fund with a value equal to the net asset value of your corresponding class of shares of the Target Fund immediately prior to the Reorganization, based upon the Acquiring Fund’s valuation procedures, in liquidation of the Target Fund. The Reorganization is expected to be a transaction that is generally tax-free for U.S. federal income tax purposes. Upon completion of the Reorganization, you will become a shareholder of the Acquiring Fund. Target Fund/Share Class Acquiring Fund/Share Class AMG GW&K Small Cap Value Fund II — Class N g AMG GW&K Small Cap Value Fund — Class N AMG GW&K Small Cap Value Fund II — Class I g AMG GW&K Small Cap Value Fund — Class I AMG GW&K Small Cap Value Fund II — Class Z g AMG GW&K Small Cap Value Fund — Class Z You are also being asked to vote to approve the New Subadvisory Agreement. GW&K currently serves as subadviser to the Target Fund pursuant to an Interim Subadvisory Agreement that expires on August 16, 2021. To address the possibility that the Reorganization is not consummated prior to the termination of the Interim Subadvisory Agreement, AMGF recommended, and the AMG Funds IV Board approved, the New Subadvisory Agreement for the Target Fund in order to ensure the continuous management of the Target Fund. Q: Has the AMG Funds IV Board approved the Proposals? A: Yes. The AMG Funds IV Board determined that the Reorganization and New Subadvisory Agreement are in the best interests of the Target Fund and unanimously recommends that you vote “FOR” both proposals. Q: Why is the AMG Funds IV Board recommending the Proposals? A : Based on the information provided by AMGF, the AMG Funds IV Board believes that appointing GW&K as the subadviser, either through participation in the Reorganization or through the New Subadvisory Agreement, will benefit the Target Fund’s shareholders. In reaching this conclusion, the AMG Funds IV Board considered several factors, which are discussed in the enclosed materials. The Reorganization will allow shareholders to continue to invest in a mutual fund managed on a day-to-day basis in a substantially similar manner and by the same portfolio management personnel that currently manage the Target Fund on an interim basis. AMGF, which serves as the Target Fund’s investment manager and provides administration and shareholder services for the Target Fund, would continue to provide the overall investment oversight responsibilities as the investment manager of the Acquiring Fund as well as administration and shareholder services for the Acquiring Fund. Because GW&K, the current subadviser to the Acquiring Fund and the interim subadviser to the Target Fund, is an affiliate of AMGF, AMGF indirectly benefits from the compensation received by GW&K. The AMG Funds Family of Funds is a mutual fund complex comprised of [46] different funds, each having distinct investment management objectives, strategies, risks, and policies. AMGF has advised the AMG Funds IV Board that AMGF is committed to providing shareholders with access to a complete array of investment products and a comprehensive, high-quality set of shareholder services. 3 Q: Who will manage the Acquiring Fund once the Reorganization is completed? A: Following the Reorganization, AMGF will continue to serve as the investment manager and GW&K will continue to serve as the subadviser to the Acquiring Fund. GW&K currently has day-to-day portfolio management responsibility as subadviser to the Target Fund, and it is currently anticipated that the Target Fund’s portfolio will be managed in a substantially similar manner and by the same personnel as the Acquiring Fund prior to the Reorganization, and these personnel will continue to have day-to-day portfolio management responsibility with respect to the Acquiring Fund after the Reorganization. Q: How will the expenses that I bear as a shareholder of the Acquiring Fund compare to the expenses I currently bear as a shareholder of the Target Fund? A: Based on the net asset levels and expenses of the Target Fund for the fiscal year ended October 31, 2020 and the Acquiring Fund for the fiscal year ended December 31, 2020, and after giving effect to current contractual fee rates, the total operating expense ratio of each class of shares of the Acquiring Fund is expected to be lower than the total operating expense ratio of the corresponding class of shares of the Target Fund, after giving effect to contractual expense 
      497 1 d365627d497.htm FIDELITY GREENWOOD STREET TRUST Fidelity Greenwood Street Trust Fidelity ® Macro Opportunities Fund Class /Ticker Fidelity ® Macro Opportunities Fund /FAQAX Fidelity ® Risk Parity Fund Class /Ticker Fidelity ® Risk Parity Fund /FAPSX In this prospectus, the term “shares” (as it relates to the fund) means the class of shares offered through this prospectus. Prospectus May 23, 2022 As Revised July 7, 2022 The Securities and Exchange Commission and the Commodity Futures Trading Commission have not approved or disapproved these securities or determined if this prospectus is accurate or complete. Any representation to the contrary is a criminal offense. 245 Summer Street, Boston, MA 02210 Contents Fund Summary 3 Fidelity ® Macro Opportunities Fund 9 Fidelity ® Risk Parity Fund Fund Basics 15 Investment Details 26 Valuing Shares Shareholder Information 28 Additional Information about the Purchase and Sale of Shares 34 Exchanging Shares 34 Features and Policies 36 Dividends and Capital Gain Distributions 37 Tax Consequences Fund Services 39 Fund Management 40 Fund Distribution Appendix 42 Additional Index Information Prospectus 2 Fund Summary Fund/ Class : Fidelity ® Macro Opportunities Fund/ Fidelity ® Macro Opportunities Fund Investment Objective The fund seeks total return. Fee Table The following table describes the fees and expenses that may be incurred when you buy and hold shares of the fund. In addition to the fees and expenses described below, your broker may also require you to pay brokerage commissions on purchases and sales of certain share classes of the fund. Shareholder fees (fees paid directly from your investment) Annual Operating Expenses (expenses that you pay each year as a % of the value of your investment) Management fee 0.80% Distribution and/or Service (12b-1) fees None Other expenses (a) 1.48% Acquired fund fees and expenses (a) 0.05% Total annual operating expenses 2.33% Fee waiver and/or expense reimbursement (b) 1.48% Total annual operating expenses after fee waiver and/or expense reimbursement 0.85% (a) Based on estimated amounts for the current fiscal year. (b) Fidelity Diversifying Solutions LLC (FDS) has contractually agreed to reimburse the class of shares of the fund to the extent that total operating expenses (excluding interest, certain taxes, proxy and shareholder meeting expenses, extraordinary expenses, and acquired fund fees and expenses (including fees and expenses associated with a wholly owned subsidiary), if any, as well as non-operating expenses such as brokerage commissions and fees and expenses associated with the fund’s securities lending program, if applicable), as a percentage of its average net assets, exceed 0.80% (the Expense Cap). If at any time during the current fiscal year expenses for the class of shares of the fund fall below the Expense Cap, FDS reserves the right to recoup through the end of the fiscal year any expenses that were reimbursed during the current fiscal year up to, but not in excess of, the Expense Cap. This arrangement will remain in effect through May 31, 2023. FDS may not terminate this arrangement before the expiration date without the approval of the Board of Trustees and may extend it in its discretion after that date. 3 Prospectus Fund Summary – continued This example helps compare the cost of investing in the fund with the cost of investing in other funds. Let’s say, hypothetically, that the annual return for shares of the fund is 5% and that your shareholder fees and the annual operating expenses for shares of the fund are exactly as described in the fee table. This example illustrates the effect of fees and expenses, but is not meant to suggest actual or expected fees and expenses or returns, all of which may vary. For every $10,000 you invested, here’s how much you would pay in total expenses if you sell all of your shares at the end of each time period indicated: 1 year $ 87 3 years $ 560 Portfolio Turnover The fund pays transaction costs, such as commissions, when it buys and sells securities (or “turns over” its portfolio). A higher portfolio turnover rate may indicate higher transaction costs and may result in higher taxes when fund shares are held in a taxable account. These costs, which are not reflected in annual operating expenses or in the example, affect the fund’s performance. Principal Investment Strategies • Allocating investments across different market sectors, countries (U.S. and non-U.S.), and regions, including emerging markets. Emerging markets include countries that have an emerging stock market as defined by MSCI, countries or markets with low- to middle-income economies as classified by the World Bank, and other countries or markets that the Adviser identifies as having similar emerging markets characteristics. • Allocating the fund’s assets among affiliated and unaffiliated mutual funds and exchange-traded funds (collectively, underlying funds) and derivatives that provide exposure to equity, debt, currency, and commodities markets. • Using fundamental analysis to evaluate macroeconomic themes based on secular trends, business cycles and market regimes, and to invest the fund in assets that offer an attractive risk/return profile in the context of those themes. • Using proprietary portfolio construction methodologies to express views on major asset allocation dimensions. • Investing in underlying funds, derivatives, cash and cash equivalents. • Engaging in transactions that have a leveraging effect on the fund, including long and short investments in derivatives – such as forward contracts, futures, options and swaps – and forward-settling securities, to: create and adjust the fund’s investment exposure; enhance total return; hedge against fluctuations in securities prices, Prospectus 4 interest rates, or currency exchange rates; change the effective duration of the fund’s portfolio; manage certain investment risk; manage volatility; and/or substitute for the purchase or sale of securities or currencies. • Investing up to 25% of assets in a wholly-owned subsidiary organized under the laws of the Cayman Islands that invests in commodity-linked total return swaps based on the value of commodities or commodities indexes and in other commodity-linked derivative instruments, commodity-related ETFs and commodity-related exchange-traded notes (ETNs). Principal Investment Risks • Asset Allocation Risk. The fund is subject to risks resulting from the Adviser’s asset allocation decisions. The selection of underlying funds and the allocation of the fund’s assets among various asset classes could cause the fund to lose value or its results to lag relevant benchmarks or other funds with similar objectives. • Investing in Other Funds. Regulatory restrictions may limit the amount that one fund can invest in another, which means that the fund’s manager may not be able to invest as much as it wants to in some other funds. The fund bears all risks of investment strategies employed by the underlying funds, including the risk that the underlying funds will not meet their investment objectives. Underlying funds that are passively managed attempt to track the performance of an unmanaged index of securities and as such their performance could be lower than actively managed funds, which may shift their portfolio assets to take advantage of market opportunities or lessen the impact of a market decline. In addition, errors in the construction of the index tracked by an underlying passively managed fund may have an adverse impact on the performance of such underlying fund. • Investing in ETFs and ETNs. ETFs and ETNs may trade in the secondary market at prices below the value of their underlying portfolios and may not be liquid. ETFs that track an index are subject to tracking error and may be unable to sell poorly performing assets that are included in their index or other benchmark. ETNs are subject to the risks associated with debt securities, including counterparty risk of the issuer. • Interest Rate Changes. Interest rate increases can cause the price of a debt security to decrease. • Correlation Risk. The fund’s investment strategy seeks to balance risk across multiple asset classes and, within each asset class, across different countries and investments. To the extent the asset classes or the selected countries and investments become correlated in a way not anticipated by the Adviser, the fund’s risk allocation process may result in magnified risks and loss instead of reducing the risk of loss. • Stock Market Volatility. Stock markets are volatile and can decline significantly in response to adverse issuer, political, regulatory, market, or economic developments. Different parts of the market, including different 5 Prospectus Fund Summary – continued market sectors, and different types of securities can react differently to these developments. • Leverage Risk. Leverage can increase market exposure, magnify investment risks, and cause losses to be realized more quickly. The fund’s use of futures, forwards, options, swaps, and other derivative instruments may result in losses. The value of these derivative instruments may pose risks in addition to and greater than those associated with investing directly in securities, currencies or other instruments and may be illiquid or less liquid, volatile, difficult to price and leveraged so that small changes in the value of underlying instruments may produce disproportionate losses to the fund. The use of derivatives is a highly specialized activity that involves investment techniques and risks different from those associated with investments in more traditional securities and instruments. Moreover, a relatively small price movement in a derivative contract may result in substantial losses to the fund, exceeding the amount of the margin paid. The use of derivatives can increase the fund’s risk exposure to underlying assets and their attendant risks, while also exposing the fund to the risk of mispricing or other improper valuation and the risk that changes in the value of a derivative may not correlate as anticipated with the underlying asset, rate, index or overall securities markets, thereby reducing their effectiveness. • Commodity-Linked Investing. The value of commodities and commodity-linked investments may be affected by the performance of the overall commodities markets as well as weather, political, tax, and other regulatory and market developments. Commodity-linked investments may be more volatile and less liquid than the underlying commodity, instruments, or measures. • Commodity Futures. Investments in commodity futures contracts are also subject to the risk of the failure of any of the exchanges on which the fund’s positions trade or of its clearinghouses or counterparties. In addition, certain commodity exchanges limit fluctuations in certain futures contract prices during a single day by regulations referred to as “daily price fluctuation limits” or “daily limits.” Under such daily limits, during a single trading day no trades may be executed at prices beyond the daily limit. If triggered, these limits could prevent the fund from liquidating unfavorable positions and subject the fund to losses or prevent it from entering into desired trades during the particular trading day. • Foreign and Emerging Markets Risk. Foreign markets, particularly emerging markets, can be more volatile than the U.S. market due to increased risks of adverse issuer, political, regulatory, market, or economic developments and can perform differently from the U.S. market. The extent of economic development; political stability; market depth, infrastructure, and capitalization; and regulatory oversight can be less than in more developed markets. Emerging markets typically have less established legal, accounting and financial reporting systems than those in more developed markets, which may reduce the scope or quality of financial Prospectus 6 information available to investors. Emerging markets can be subject to greater social, economic, regulatory, and political uncertainties and can be extremely volatile. Foreign exchange rates also can be extremely volatile . • Currency Exposure. Because the fund is normally exposed to foreign currencies, it could experience losses based solely on the weakness of foreign currencies versus the U.S. dollar and changes in the exchange rates between foreign currencies and the U.S. dollar. Currency risk may be particularly high to the extent that a fund invests in foreign currencies or engages in foreign currency transactions that are economically tied to emerging market countries. These emerging markets currency transactions may present market, credit, currency, liquidity, legal, political and other risks different from, or greater than, the risks of investing in developed foreign currencies or engaging in foreign currency transactions that are economically tied to developed foreign countries. • Issuer-Specific Changes. The value of an individual security or particular type of security can be more volatile than, and can perform differently from, the market as a whole. Changes in the financial condition of an issuer or counterparty (e.g., broker-dealer or other borrower in a securities lending transaction) can increase the risk of default by an issuer or counterparty, which can affect a security’s or instrument’s value or result in delays in recovering securities and/or capital from a counterparty. • Subsidiary Risk. Investment in Fidelity Global Macro Opportunities Cayman Ltd., an unregistered subsidiary, is not subject to the investor protections of the Investment Company Act of 1940 (1940 Act) and is subject to the risks associated with investing in derivatives and commodity-linked investing in general. Changes in tax and other laws could negatively affect investments in the subsidiary. • Prepayment. The ability of an issuer of a debt security to repay principal prior to

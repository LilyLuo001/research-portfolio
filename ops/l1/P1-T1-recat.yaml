e the Management Agreement either by vote of the Board of Trustees or by majority vote of the outstanding shares of the Fund. The Management Agreement may also be terminated at any time either by vote of the Board of Trustees or by majority vote of the outstanding voting shares of a Fund if the Adviser were determined to have breached the Management Agreement. The Management Agreement will terminate automatically upon assignment. The Management Agreement provides that the Adviser shall not be liable for any error of judgment or of law, or for any loss suffered by a Fund in connection with the matters to which the Management Agreement relates, except a loss resulting from willful misfeasance, bad faith or gross negligence on the part of the Adviser in the performance of its obligations and duties, or by reason of its reckless disregard of its obligations and duties under the Management Agreement. Upon termination of the Management Agreement and when so requested by the Adviser, the Trust or a Fund will refrain from using the name “William Blair” in its name or in its business in any form or combination. William Blair & Company, L.L.C. is the principal underwriter and distributor of the Trust and is referred to herein as the “Distributor” or “WBC.” WBIM and WBC are referred to herein collectively as “William Blair.” WBIM and WBC are limited liability companies that are 100% owned by WBC Holdings, L.P., a limited partnership. The affairs of WBIM and WBC are controlled by the general partner of WBC Holdings, L.P., WBC GP L.L.C., which in turn, is controlled by the Executive Committee. The Executive Committee is comprised of Stephanie G. Braming, Cissie Citardi, Peter Dalrymple, Ryan J. DeVore, John R. Ettelson, Brent W. Gledhill, Matthew Zimmer and Jon W. Zindel. 1 Management Fees . For the services and facilities furnished by the Adviser under the Management Agreement, each Fund pays the Adviser a management fee, which is accrued daily and paid monthly the following month. The annual rate for each Fund expressed as a percentage of average daily net assets is as follows: % of Average Daily Net Assets Growth Fund 0.75 % Large Cap Growth Fund 0.60 % Mid Cap Growth Fund 0.90 % Mid Cap Value Fund 0.70 % Small-Mid Cap Core Fund 0.90 % Small-Mid Cap Growth Fund 1.00 % Small Cap Growth Fund 1.10 % Small Cap Value Fund 0.75 % Global Leaders Fund 0.85 % International Leaders Fund 0.85 % International Growth Fund: First $3 billion 0.94 % Next $2 billion 0.90 % Next $5 billion 0.85 % Next $5 billion 0.825 % In excess of $15 billion 0.80 % Institutional International Growth Fund: First $1.875 billion 0.94 % Next $625 million 0.90 % Next $2.5 billion 0.875 % Next $5 billion 0.85 % Next $5 billion 0.825 % In excess of $15 billion 0.80 % International Small Cap Growth Fund 1.00 % Emerging Markets Leaders Fund 0.94 % Emerging Markets Growth Fund 0.94 % Emerging Markets ex China Growth Fund 0.94 % Emerging Markets Small Cap Growth Fund 1.10 % China Growth Fund 0.94 % Emerging Markets Debt Fund 0.65 % Macro Allocation Fund 0.80 % Expense Waivers. The Adviser has entered into a contractual agreement with each Fund listed below to waive fees and/or reimburse expenses, if necessary, in order to limit the Fund’s operating expenses (excluding interest expenses, taxes, brokerage commissions, acquired fund fees and expenses, dividend and interest expenses on short sales, other investment-related costs and extraordinary expenses, such as litigation and other expenses not incurred in the ordinary course of the Fund’s business) for each class to the levels reflected in the table below until April 30, 2023 or, with respect to the Mid Cap Value Fund and Emerging Markets ex China Growth Fund, April 30, 2024. The agreement terminates upon the earlier of April 30, 2023 (for all Funds except the Mid Cap Value Fund and Emerging Markets ex China Growth Fund), April 30, 2024 (for the Mid Cap Value Fund and Emerging Markets ex China Growth Fund only), or the termination of the Management Agreement. With respect to each of the Mid Cap Value Fund, Small-Mid Cap Core Fund, China Growth Fund, and Emerging Markets Debt Fund, the Adviser is entitled to recoupment of previously waived fees and reimbursed expenses for a period of three years subsequent to each Fund’s commencement of operations (March 16, 2022, October 1, 2019, August 27, 2021, and May 25, 2021, respectively) to the extent that such recoupment does not cause the Fund’s annual Fund operating expenses (after the recoupment is taken into account) to exceed both (1) the 2 expense limit in place when such amounts were waived or reimbursed, and (2) such Fund’s current expense limitation. With respect to the Emerging Markets ex China Growth Fund, the Adviser will be entitled to recoupment of waived fees and reimbursed expenses for a period of three years subsequent to the Fund’s commencement of operations to the extent that such recoupment does not cause the Fund’s annual Fund operating expenses (after the recoupment is taken into account) to exceed both (1) the expense limit in place when such amounts are waived or reimbursed, and (2) the Fund’s current expense limitation. Class N Class I Class R6/ Institutional Growth Fund 1.20 % 0.95 % 0.90 % Large Cap Growth Fund 0.90 % 0.65 % 0.60 % Mid Cap Growth Fund 1.20 % 0.95 % 0.90 % Mid Cap Value Fund N/A 0.75 % 0.70 % Small-Mid Cap Core Fund N/A 0.95 % 0.90 % Small-Mid Cap Growth Fund 1.35 % 1.10 % 1.05 % Small Cap Growth Fund 1.50 % 1.25 % 1.20 % Small Cap Value Fund 1.15 % 0.89 % 0.85 % Global Leaders Fund 1.15 % 0.90 % 0.85 % International Leaders Fund 1.15 % 0.90 % 0.85 % International Growth Fund 1.24 % 0.99 % 0.94 % Institutional International Growth Fund N/A N/A 0.94 % International Small Cap Growth Fund 1.55 % 1.30 % 1.25 % Emerging Markets Leaders Fund 1.24 % 0.99 % 0.94 % Emerging Markets Growth Fund 1.24 % 0.99 % 0.94 % Emerging Markets Small Cap Growth Fund 1.55 % 1.30 % 1.25 % Emerging Markets ex China Growth Fund N/A 
”). Each Fund offers shares in a number of different classes. Most of the Funds provide investment programs investing principally in debt obligations and are referred to in this Prospectus as “ fixed income funds .” The remaining Funds are DoubleLine Strategic Commodity Fund, DoubleLine Shiller Enhanced CAPE ® , and DoubleLine Shiller Enhanced International CAPE ® . -1- Table of Contents Fund Summary DoubleLine Total Return Bond Fund Investment Objective The Fund’s investment objective is to seek to maximize total return. Fees and Expenses of the Fund This table describes the fees and expenses you may pay if you buy, hold and sell shares of the Fund. You may pay other fees, such as brokerage commissions and other fees to financial intermediaries (defined below), including when purchasing Class I, Class I2 and Class R6 shares through a broker or other financial intermediary acting as an agent on your behalf. Such commissions and other fees, if any, are not charged by the Fund and are not reflected in the fee table or expense example below. Shareholder Fees (fees paid directly from your investment) Share Class Class I Class I2 Class N Class R6 Maximum Sales Charge (Load) Imposed on Purchases (as a percentage of the offering price) None None None None Maximum Deferred Sales Charge (Load) (as a percentage of the original purchase price) None None None None Maximum Sales Charge (Load) Imposed on Reinvested Dividends None None None None Redemption Fee (as a percentage of shares redeemed within 90 days of purchase) None None None None Fee for Redemption by Wire $15 $15 $15 $15 Exchange Fee None None None None Account Fee None None None None Annual Fund Operating Expenses (expenses that you pay each year as a percentage of the value of your investment) Share Class Class I Class I2 Class N Class R6 Management Fees 0.40% 0.40% 0.40% 0.40% Distribution and/or Service (12b-1) Fees None None 0.25% None Other Expenses (includes sub-transfer agent accounting or administrative services expenses) 0.10% 0.15% 1 0.10% 0.03% Total Annual Fund Operating Expenses 0.50% 0.55% 0.75% 0.43% 1 “Other expenses” for Class I2 shares are estimated for the current fiscal year. Actual expenses may differ from estimates. Example This example is intended to help you compare the cost of investing in the Fund with the cost of investing in other mutual funds. This example assumes that you invest $10,000 in the Fund for the time periods indicated and then redeem all your shares at the end of those periods. The example also assumes that your investment has a 5% return each year and that the Fund’s operating expenses remain the same. Although your actual costs may be higher or lower, based on these assumptions, your costs would be: Class I Class I2 Class N Class R6 1 Year $51 $56 $77 $44 3 Years $160 $176 $240 $138 5 Years $280 $307 $417 $241 10 Years $628 $689 $930 $542 -2- Table of Contents Portfolio Turnover The Fund incurs transaction costs when it buys and sells securities (or “turns over” its portfolio). A higher portfolio turnover rate may indicate higher transaction costs and may result in higher taxes when Fund shares are held in a taxable account. These costs, which are not reflected in annual fund operating expenses or in the example, affect the Fund’s performance. During the most recent fiscal year, the Fund’s portfolio turnover rate was 33% of the average value of its portfolio. Principal Investment Strategies Under normal circumstances, the Fund intends to invest more than 50% of its net assets in residential and commercial mortgage-backed securities and U.S. Treasury obligations rated at the time of investment Aa3 or higher by Moody’s Investors Service, Inc. (“ Moody’s ”) or AA- or higher by S&P Global Ratings (“ S&P ”) or the equivalent by any other nationally recognized statistical rating organization or unrated securities that are determined by DoubleLine Capital LP (the “ Adviser ” or “ DoubleLine Capital ”) to be of comparable quality. These investments may include mortgage-backed securities of any maturity or type, including those guaranteed by, or secured by collateral that is guaranteed by, the United States Government, its agencies, instrumentalities or sponsored corporations, and privately issued mortgage-backed securities. These investments also include, among others, government mortgage pass-through securities, collateralized mortgage obligations, multiclass pass-through securities, private mortgage pass-through securities, stripped mortgage securities (interest-only and principal-only securities) and inverse floaters. The Fund’s investments in derivatives and other synthetic instruments that provide exposures comparable, in the judgment of the Adviser, to any of the foregoing instruments described in this paragraph will be counted toward satisfaction of the Fund’s 50% policy (using, where determined appropriate in the Adviser’s discretion, an instrument’s notional amount). Since the Fund’s inception, the Fund has historically invested substantially all of its assets in mortgage-backed securities; short term investments, such as notes issued by U.S. Government agencies and shares of money market funds; and other asset-backed obligations, collateralized loan obligations, obligations of the U.S. Government and its agencies, instrumentalities and sponsored corporations, and futures contracts. The Fund may invest in other instruments as part of its principal investment strategies, but it has not historically done so to a significant extent and there can be no assurance it will do so in the future. In managing the Fund’s portfolio, the portfolio managers typically use a controlled risk approach. The techniques of this approach attempt to control the principal risk components of the fixed income markets and may include, among other factors, consideration of the Adviser’s view of the following: the potential relative performance of various market sectors, security selection available within a given sector, the risk/reward equation for different asset classes, liquidity conditions in various market sectors, the shape of the yield curve and projections for changes in the yield curve, potential fluctuations in the overall level of interest rates, and current fiscal policy. Under normal circumstances, the Fund intends to invest at least 80% of its net assets (plus the amount of borrowings for investment purposes) in bonds. “Bonds” include bonds, debt securities, and other fixed income instruments issued by governmental or private-sector entities. The Fund may invest in bonds of any credit quality, including those that are at the time of investment unrated or rated BB+ or lower by S&P or Ba1 or lower by Moody’s or the equivalent by any other nationally recognized statistical rating organization. Bonds and fixed income instruments rated below investment grade, or such instruments that are unrated and determined by the Adviser to be of comparable quality, are high yield, high risk bonds, commonly known as “junk bonds.” Such “junk bonds” also may be considered to possess some speculative characteristics. The Fund may invest up to 33 1/3% of its net assets in junk bonds, bank loans and assignments rated below investment grade or unrated but determined by the Adviser to be of comparable quality, and credit default swaps of companies in the high yield universe. The Adviser does not consider the term “junk bonds” to include any mortgage-backed securities or any other asset-backed securities, regardless of their credit rating or credit quality, and accordingly may invest without limit in such investments. The Fund may invest a portion of its assets in inverse floater securities and interest-only and principal-only securities. The Adviser monitors the duration of the Fund’s portfolio securities to seek to assess and, in its discretion, adjust the Fund’s exposure to interest rate risk. The Adviser may seek to manage the dollar-weighted average effective duration of the Fund’s portfolio through the use of derivative instruments and other investments (including, among others, inverse floaters, futures contracts, U.S. Treasury swaps, interest rate swaps, total return swaps and options, including options on swap agreements). The Fund incurs costs in implementing duration management strategies, and there can be no assurance that the Fund will engage in duration management strategies or that any duration management strategy employed by the Fund will be successful. In managing the Fund’s investments, under normal market conditions, the portfolio managers intend to seek to -3- Table of Contents construct an investment portfolio with a dollar-weighted average effective duration of no less than one year and no more than eight years. Duration is a measure of the expected life of a fixed income instrument that is used to determine the sensitivity of a security’s price to changes in interest rates. Effective duration is a measure of the Fund’s portfolio duration adjusted for the anticipated effect of interest rate changes on bond and mortgage prepayment rates as determined by the Adviser. The effective duration of the Fund’s investment portfolio may vary materially from its target range, from time to time, and there is no assurance that the effective duration of the Fund’s investment portfolio will always be within its target range. The Fund may enter into derivatives transactions and other instruments of any kind for hedging purposes or otherwise to gain, or reduce, long or short exposure to one or more asset classes or issuers. The Fund may use derivatives transactions with the purpose or effect of creating investment leverage. For example, the Fund may use futures contracts and options on futures contracts, in order to gain efficient long or short investment exposures as an alternative to cash investments or to hedge against portfolio exposures; interest rate swaps, to gain indirect long or short exposures to interest rates, issuers, or currencies, or to hedge

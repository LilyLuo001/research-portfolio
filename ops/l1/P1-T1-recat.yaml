r vote to be counted. Signature(s) and Title(s), if applicable Sign the box above. Date NOTE: Please sign exactly as your name(s) appear(s) on this voting instruction card. If signing for estates, trusts or other fiduciaries, your title or capacity should be stated and where more than one name appears, a majority must sign. If shares are held jointly, one or more joint owners should sign personally. If a corporation, the signature should be that of an authorized officer who should state his or her title. Important Notice Regarding the Availability of Proxy Materials for this Special Meeting of Shareholders to be held on July 24, 2023. The Proxy Statement for this Meeting is available a t https://proxyvotinginfo.com/p/grspx2023 YOUR VOTE IS IMPORTANT NO MATTER HOW MANY SHARES YOU OWN. PLEASE CAST YOUR VOTE TODAY! YOUR SIGNATURE IS REQUIRED FOR YOUR VOTE TO BE COUNTED. IF YOU ARE NOT VOTING BY PHONE OR INTERNET, PLEASE SIGN AND DATE THIS PROXY CARD ON THE REVERSE SIDE AND RETURN IT PROMPTLY IN THE ENCLOSED ENVELOPE. PLEASE DETACH AT PERFORATION BEFORE MAILING. --------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------- This proxy is solicited on behalf of the Board of Directors of the Fund. It will be voted as specified. If no specification is made, this proxy shall be voted FOR the proposals. If any other matters properly come before the Meeting to be voted on, the proxy holders may, in their discretion, vote upon any other matters as may properly come before the Special Meeting and any adjournments or postponements thereof. THE BOARD OF DIRECTORS UNANIMOUSLY RECOMMENDS A VOTE FOR THE PROPOSALS. TO VOTE, MARK BOX(ES) BELOW IN BLUE OR BLACK INK AS FOLLOWS: ☒ FOR AGAINST ABSTAIN 1 To approve the Agreement and Plan of Reorganization, which has been approved by the Greenspring Fund, Incorporated Board of Directors, which provides for the reorganization of the Target Fund, into the Cromwell Greenspring Mid Cap Fund, a newly created series of Total Fund Solution (the “Reorganization”); and ☐ ☐ ☐ 2 To transact such other business as may properly come before the Meeting and any adjournments thereof. ☐ ☐ ☐

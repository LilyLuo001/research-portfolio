erating policies of any Fund in which they beneficially own shares. Unless otherwise expressly noted, compliance with each Fund’s investment policies and limitations will be determined immediately after or at the time of that Fund’s acquisition of the security or relevant asset except for Fundamental Policy No. 4, which the Funds must comply with on a continuous basis. Accordingly, any subsequent change in values, net assets or other circumstances will not be considered in determining whether an investment complies with a Fund’s investment policies and limitations, except as it relates to Fundamental Policy No. 4. In the event the percentage of a Fund’s assets invested in securities for which market quotations are not readily available (i.e., illiquid securities) exceeds the applicable limit set forth in Fundamental Policy No. 8 due to a subsequent change in values, net assets, or other circumstances, the Fund will consider, based on all relevant facts and circumstances, taking appropriate measures to reduce the percentage of its assets invested in such securities in an orderly fashion. No Fund, however, will be required to sell securities for which market quotations are not readily available (i.e., illiquid securities) if the percentage of its assets invested in such securities exceeds the applicable limit set forth in Fundamental Policy No. 8 due to a subsequent change in values, net assets, or other circumstances. No Fund may, as a matter of fundamental policy: 1. Issue any senior securities; 2. Purchase securities on margin or write call options on its portfolio securities; 3. Sell securities short; 4. Borrow money, except that each of the Funds may borrow money from banks as a temporary measure for extraordinary or emergency purposes in an amount not exceeding 5% of such Fund’s total assets; 5. Underwrite the securities of other issuers; 6. Invest more than 25% of its total assets in the securities of foreign issuers in the case of Royce Small-Cap Opportunity F
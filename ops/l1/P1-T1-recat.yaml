      497 1 c497.htm 497 Untitled Document Prospectus for MainStay CBRE Specialty Funds MainStay Funds ® August 31, 2020 SIMPLE CLASS CBRE Specialty MainStay CBRE Global Infrastructure Fund -- MainStay CBRE Real Estate Fund -- Neither the Securities and Exchange Commission nor any state securities commission has approved or disapproved of these securities or passed upon the accuracy or adequacy of this Prospectus. Any representation to the contrary is a criminal offense. Beginning on January 1, 2021, paper copies of each MainStay Fund’s annual and semiannual shareholder reports will no longer be sent by mail, unless you specifically request paper copies of the reports from MainStay Funds or from your financial intermediary. Instead, the reports will be made available on the MainStay Funds’ website. You will be notified by mail and provided with a website address to access the report each time a new report is posted to the website. If you already elected to receive shareholder reports electronically, you will not be affected by this change and you need not take any action. At any time, you may elect to receive reports and other communications from MainStay Funds electronically by calling toll-free 800-624-6782, by sending an e-mail to MainStayShareholderServices@nylim.com, or by contacting your financial intermediary. You may elect to receive all future shareholder reports in paper form free of charge. If you hold shares of a MainStay Fund directly, you can inform MainStay Funds that you wish to receive paper copies of reports by calling toll-free 800-624-6782 or by sending an e-mail to MainStayShareholderServices@nylim.com. If you hold shares of a MainStay Fund through a financial intermediary, please contact the financial intermediary to make this election. Your election to receive reports in paper form will apply to all MainStay Funds in which you are invested and may apply to all funds held with your financial intermediary. Table of Contents MainStay CBRE Specialty Funds MainStay CBRE Global Infrastructure Fund 3 MainStay CBRE Real Estate Fund 8 More About Investment Strategies and Risks 13 Shareholder Guide 25 Know With Whom You Are Investing 67 Financial Highlights 70 Appendix A – Intermediary-Specific Sales Charge Waivers and Discounts 80 MainStay CBRE Global Infrastructure Fund Investment Objective The Fund seeks total return. Fees and Expenses of the Fund The table below describes the fees and expenses that you may pay if you buy and hold shares of the Fund. You may be required to pay a commission or other transaction charge to your financial intermediary for effecting transactions in a class of shares of the Fund that has no initial sales charge, contingent deferred sales charge, or other asset-based fee for sales or distribution, such as SIMPLE Class. These commissions are not reflected in the fee and expense table or expense example below. SIMPLE Class Shareholder Fees (fees paid directly from your investment) Maximum Sales Charge (Load) Imposed on Purchases (as a percentage of offering price) None Maximum Deferred Sales Charge (Load) (as a percentage of the lesser of the original offering price or redemption proceeds) None Annual Fund Operating Expenses (expenses that you pay each year as a percentage of the value of your investment) Management Fees (as an annual percentage of the Fund's average daily net assets) 0.85 % Distribution and/or Service (12b-1) Fees 0.50 % Other Expenses 1 0.69 % Total Annual Fund Operating Expenses 2.04 % Waivers / Reimbursements 2 (0.34) % Total Annual Fund Operating Expenses After Waivers / Reimbursements 2 1.70 % 1. Based on amounts expected to be incurred during the current fiscal year. 2. New York Life Investment Management LLC ("New York Life Investments") has contractually agreed to waive fees and/or reimburse expenses so that Total Annual Fund Operating Expenses (excluding taxes, interest, litigation, extraordinary expenses, brokerage and other transaction expenses relating to the purchase or sale of portfolio investments, and acquired (underlying) fund fees and expenses) do not exceed 1.70% of the Fund’s average daily net assets. This agreement will remain in effect until February 28, 2022, and shall renew automatically for one-year terms unless New York Life Investments provides written notice of termination prior to the start of the next term or upon approval of the Board of Trustees of the Fund. Example The Example is intended to help you compare the cost of investing in the Fund with the cost of investing in other mutual funds. The Example assumes that you invest $10,000 in the Fund for the time periods indicated whether or not you redeem all of your shares at the end of those periods. The Example also assumes that your investment has a 5% return each year and that the Fund's operating expenses remain the same. The Example reflects the contractual fee waiver and/or expense reimbursement arrangement, if applicable, for the current duration of the arrangement only. Although your actual costs may be higher or lower, based on these assumptions your costs would be: Expenses After SIMPLE Class 1 Year $ 173 3 Years $ 572 5 Years $1,034 10 Years $2,313 Portfolio Turnover The Fund pays transaction costs, such as commissions, when it buys and sells securities (or "turns over" its portfolio). A higher portfolio turnover rate may indicate higher transaction costs and may result in higher taxes when Fund shares are held in a taxable account. These costs, which are not reflected in annual fund operating expenses or in the Example, affect the Fund's performance. During the most recent fiscal period, the Fund's portfolio turnover rate was 49% of the average value of its portfolio. Principal Investment Strategies Under normal circumstances, the Fund invests at least 80% of its assets (net assets plus borrowings for investment purposes) in securities issued by infrastructure companies. The Fund expects to invest primarily in equity securities of companies located in a number of different countries, including the United States. Under normal market conditions, the Fund will invest more than 25% of the value of its total assets at the time of purchase in the securities of issuers conducting their business activities in the infrastructure group of industries. The Fund’s Subadvisor, CBRE Clarion Securities LLC, defines an infrastructure company as a company that derives at least 50% of its revenues or profits from, or devotes at least 50% of its assets to, the 3 MainStay CBRE Global Infrastructure Fund ownership, management, development, construction, renovation, enhancement, or operation of infrastructure assets or the provision of services to companies engaged in such activities. Examples of infrastructure assets include transportation assets (such as toll roads, bridges, railroads, airports, and seaports), utility assets (such as electric transmission and distribution lines, gas distribution pipelines, water pipelines and treatment facilities, and sewer facilities), energy assets (such as oil and gas pipelines, storage facilities, and other facilities used for gathering, processing, or transporting hydrocarbon products as well as contracted renewable power assets), and communications assets (such as communications towers, data centers, fiber networks, and satellites). Under normal circumstances, the Fund invests primarily in common stock, but may also invest in other equity securities including preferred stocks, convertible securities, rights or warrants to buy common stocks, and depositary receipts with characteristics similar to common stock. The Fund may also invest up to 25% of its net assets in master limited partnerships. The Fund may invest up to 30% of its assets in securities of companies located or doing business in emerging markets. The Fund’s investments may be denominated in U.S. dollars, non-U.S. currencies, or multinational currency units. The Fund may hedge its currency exposure to securities denominated in non-U.S. currencies. The Fund may invest in securities of companies of any market size. The Fund may invest in other investment companies, including exchange-traded funds. Under normal market conditions, the Fund will invest a significant amount of its net assets (at least 40%, unless the Subadvisor deems market conditions to be unfavorable, in which case the Fund will invest at least 30%) in foreign securities. Generally, foreign securities are issued by companies organized outside the United States or that trade primarily in non-U.S. securities markets. The Fund will normally invest in companies located in at least three countries outside of the United States. Investment Process: The Subadvisor uses a multi-step investment process for constructing the Fund’s investment portfolio that combines top-down geographic region and infrastructure sector allocation with bottom-up individual stock selection. The Subadvisor first selects infrastructure sectors in certain geographic regions in which to invest, and determines the degree of representation in the portfolio of such sectors and regions, through a systematic evaluation of the regulatory environment and economic outlook, capital market trends, macroeconomic conditions, and the relative value of infrastructure sectors. The Subadvisor then uses an in-house valuation process to identify infrastructure companies whose risk-adjusted returns it believes are compelling relative to their peers. The Subadvisor’s in-house valuation process examines several factors, including the company’s management and strategy, the stability and growth potential of cash flows and dividends, the location of the company’s assets, the regulatory environment in which the company operates and the company’s capital structure. The Subadvisor may sell securities for a variety of reasons, such as to secure gains, limit losses, or redeploy assets into opportunities believed to be more promising, among others. Principal Risks You can lose money by investing in the Fund. An investment in the Fund is not a bank deposit and is not insured or guaranteed by the Federal Deposit Insurance Corporation or any other governmental agency. The investments selected by the Subadvisor may underperform the market in which the Fund invests or other investments. The Fund may receive large purchase or redemption orders which may have adverse effects on performance if the Fund were required to sell securities, invest cash or hold a relatively large amount of cash at times when it would not otherwise do so. The principal risks of investing in the Fund are summarized below. Market Risk: The value of the Fund’s investments may fluctuate because of changes in the markets in which the Fund invests, which could cause the Fund to underperform other funds with similar investment objectives and strategies. Such changes may be rapid and unpredictable. From time to time, markets may experience periods of stress for potentially prolonged periods that may result in: (i) increased market volatility; (ii) reduced market liquidity; and (iii) increased redemptions of Fund shares. Such conditions may add significantly to the risk of volatility in the net asset value of the Fund's shares. Portfolio Management Risk: The investment strategies, practices and risk analyses used by the Subadvisor may not produce the desired results. Investments selected using quantitative methods or based on models that analyze information and data ("quantitative tools") may perform differently from the market as a whole. The quantitative tool used by the Subadvisor, and the investments selected based on the quantitative tool, may not perform as expected. The quantitative tool may contain certain assumptions in construction and implementation that may adversely affect the Fund’s performance. There may also be technical issues with the construction and implementation of quantitative tools (for example, software or other technology malfunctions, or programming inaccuracies). In addition, the Fund’s performance will reflect, in part, the Subadvisor’s ability to make active qualitative decisions and timely adjust the quantitative tool, including the tool’s underlying metrics and data. Equity Securities Risk: Investments in common stocks and other equity securities are particularly subject to the risk of changing economic, stock market, industry and company conditions and the risks inherent in the portfolio managers' ability to anticipate such changes that can adversely affect the value of the Fund's holdings. Infrastructure Investment Risk: The Fund’s investments in infrastructure-related securities expose the Fund to potential adverse economic, regulatory, political, legal and other changes affecting such investments. Issuers of securities in infrastructure-related businesses are subject to a variety of factors that may adversely affect their business or operations, including high interest costs in connection with capital construction 4 MainStay CBRE Global Infrastructure Fund programs, high leverage, costs associated with environmental or other regulations and the effects of economic slowdowns. Rising interest rates could lead to higher financing costs and reduced earnings for infrastructure companies. Rights and Warrants Risk: Rights and warrants may provide a greater potential for profit or loss than an equivalent investment in the underlying securities. Prices of these investments do not necessarily move in tandem with the prices of the underlying securities, and warrants are speculative investments. If a right or warrant is not exercised by the date of its expiration, the Fund will lose its entire investment in such right or warrant. Depositary Receipts Risk: Investments in depositary receipts may entail the special risks of investing in foreign securities, including currency exchange fluctuations, government regulations, and the potential for political and economic instability. Preferred Stock Risk: Preferred stock is subject to

 % (1) Restated to reflect the termination of the Shareholder Services Plan. (2) Based on estimated amounts for the current fiscal year. The Fund is newly formed and will commence operations following the completion of the reorganization of The E-Valuator Very Conservative (0%-15%) RMS Fund (the “Predecessor Fund”), a series of World Funds Trust, into the Fund, which is expected to occur on or about May 21, 2021. Estimated amounts for the current fiscal year are based on actual expenses incurred for the fiscal period ending September 30, 2020 (excluding non-recurring, legal, trustee and reorganization expenses), adjusted for the new fee and expense structure that will be in effect following the reorganization. (3) Acquired Fund Fees and Expenses are the indirect costs of investing in other investment companies. Total Annual Fund Operating Expenses do not reflect Fund expenses paid indirectly and do not correlate to the expense ratios in the Fund’s Financial Highlights because the Financial Highlights include only the direct operating expenses incurred by the Fund and exclude Acquired Fund Fees and Expenses. (4) Systelligence, LLC (the “Adviser”), has contractually agreed to waive its management fee to an annual rate of 0.38% of the average daily net assets of the Fund. Additionally, after giving effect to the foregoing fee waiver, the Adviser has contractually agreed to limit the total expenses of the Fund (exclusive of interest, distribution fees pursuant to Rule 12b-1 Plans, taxes, acquired fund fees and expenses, brokerage commissions, dividend expense on short sales, other expenditures which are capitalized in accordance with generally accepted accounting principles and other extraordinary expenses not incurred in the ordinary course of business) to an annual rate of 0.80% of the average daily net assets of the Fund. Each waiver and/or reimbursement of an expense by the Adviser is subject to repayment by the Fund within three years following the date that such waiver was made or such expense was incurred, provided that the Fund is able to make the repayment without exceeding the expense limitation in place at the time of the waiver or reimbursement and at the time the waiver or reimbursement is recouped. The Adviser may not terminate this contractual agreement prior to January 31, 2023, and thereafter the agreement shall continue in effect from year-to-year for successive one-year periods provided the agreement may be terminated by the Board of Trustees of the Fund or the Adviser, without payment of any penalty, upon ninety (90) days’ prior written notice. 1 Example This example is intended to help you compare the cost of investing in the Fund with the cost of investing in other mutual funds. The example assumes that you invest $10,000 in the Fund for the time periods indicated and then redeem all of your shares at the end of those periods. The example also assumes that your investment has a 5% return each year and that the Fund’s operating expenses remain the same. The effect of the Adviser’s agreement to waive fees and/or reimburse expenses is only reflected in the first year of each example shown below. Although your actual costs may be higher or lower, based on these assumptions your costs would be: Share Class 1 year 3 years 5 years 10 years Service Class $ 102 $ 338 $ 592 $ 1,321 Portfolio Turnover The Fund pays transaction costs, such as commissions, when it buys and sells securities (or “turns over” its portfolio). A higher portfolio turnover rate may indicate higher transaction costs and may result in higher taxes when Fund shares are held in a taxable account. These costs, which are not reflected in Total Annual Fund Operating Expenses or in the example, affect the Fund’s performance . During the most recent fiscal year ended September 30, 2020, the Predecessor Fund’s portfolio turnover rate was 302.98% of the average value of its portfolio. Principal Investment Strategies The Fund seeks to achieve its objective by investing, under normal market conditions, in the securities of other unaffiliated investment companies, including open-end funds, exchange-traded funds (“ETFs”) and closed-end funds (collectively referred to as “Underlying Funds”). The Fund utilizes a risk- managed strategy (thus, the term “RMS” in the Fund’s name) which involves the allocation of invested assets across multiple underlying investments in a manner that attempts to limit fluctuations in annualized returns that would be commensurate to an investor seeking to experience very low volatility as measured by standard deviation. An investment’s volatility is commonly measured by standard deviation. Standard deviation provides the probable range of anticipated returns based on the performance fluctuations over previous time periods (1-year, 3-year, or 5-year). Investments with the lowest levels of standard deviation would be considered very conservative (less volatile), while investments with higher levels of standard deviation would be considered more growth oriented and aggressive in nature (more volatile). The strategy of this Fund is to keep the level of annual performance fluctuation within standard deviation parameters that would be suitable for a very conservative investor, that is, an investor anticipating very low fluctuations in annual return on a year-over-year basis. The standard deviation goal for the Fund is to average between 1% to 3.5% over a 3-year timeframe or a 5-year timeframe. The Fund allocates assets across three broad asset classes (money market, bonds, equities) in a manner that provides a high probability of meeting the standard deviation goals. The Fund will generally allocate 85%-100% of the Fund’s assets among a variety of Underlying Funds that focus on investments in fixed income securities (e.g., money markets and bonds) that possess varying qualities of credit and duration including high-yield securities (also referred to as “junk bonds”). The remaining portion of the Fund’s assets (up to 15%) will generally be dedicated to investments in Underlying Funds that focus on investments in Underlying Funds that invest in equity securities that have the potential of paying dividends on an annual basis. The equity allocation will be invested in Underlying Funds that invest in U.S. and foreign securities (including emerging markets securities) and that focus on investments without regard to market capitalization (i.e., investments may include securities of issuers that would be considered small, medium and/or large capitalization companies). The Fund identifies an emerging market security based on it being placed in the Diversified Emerging Market Equity category by Morningstar, Inc. Systelligence, LLC (the “Adviser”) incorporates a “Core and Satellite” management philosophy with 20% to 80% of a category allocation invested in “Core” holdings and the remaining amount investing in “Satellite” holdings. A category allocation is the amount of assets to be allocated into an investment category. Morningstar, Inc. has created what the Adviser believes to be an industry standard of investment categories, which aid in the recognition of an investment’s underlying holdings, e.g., Intermediate Term Bond Category, Short Term Government Bond Category, Domestic Large Cap Stock Category, etc. The “Core and Satellite” management philosophy is synonymous with “Passive Management” and “Active Management,” respectively. The “Core” component pertains to the portion of the Fund’s asset allocation that is devoted to passive management. Passive management is considered a form of investment management whereby the allocation mirrors the allocation of a benchmark, or index. The Fund’s allocation to “Core” holdings is achieved by investing a portion of the Fund’s assets in Underlying Funds that attempt to replicate the performance of a common index (e. g. , S&P 500®, Russell 1000, Bloomberg Barclays US Aggregate Bond Index, etc.) (that is, passively managed Underlying Funds). The Fund’s “Satellite” component pertains to the portion of the Fund’s asset allocation that is devoted to active management. Active management is considered a form of investment management whereby the allocation is driven by security selection and trading with an overriding goal of outperforming a stated index, or benchmark. The Fund’s allocation to “Satellite” holdings is achieved by investing a portion of the Fund’s assets in actively managed Underlying Funds. By constructing the Fund’s portfolio with Core and Satellite holdings, the Adviser is blending two management philosophies in an effort to capture the returns of the market indexes through Core holdings, while also seeking to enhance the overall performance of the Fund with Satellite holdings, and thus attempting to deliver above average performance. 2 The Adviser selects the Fund’s “Core” holdings by first arriving at an asset allocation across three broad asset classes (money market, bonds, and equities) that the Adviser believes provides the highest probability of meeting the stated volatility goals. Once this broad asset allocation is determined, the second decision is to determine the allocations within each of the aforementioned broad asset classes. For instance, once the allocation percentage into fixed income has been determined, the next step would be to identify the amount allocated between investment grade and hi-yield securities. Once this has been determined, the next decision is to determine the allocation into short term, intermediate term, and long-term securities within each applicable sub- group. When the allocations have been determined, the Adviser will dedicate a portion of that allocation into passive management, i.e. index, also referred to as “Core”. Likewise, the Adviser will allocate a portion of the allocation into active management, also referred to as “Satellite”. The Adviser allocates the Fund’s assets with respect to Satellite holdings among the Underlying Funds by utilizing

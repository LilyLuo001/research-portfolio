rities which is senior to the Fund’s shares of beneficial interest, except to the extent a Fund is permitted to borrow money or otherwise to the extent consistent with applicable law. 3. A Fund may not borrow money, except to the extent permitted by applicable law from time to time. 4. A Fund may not act as underwriter of securities of other issuers except to the extent that, in connection with the disposition of portfolio securities, it may be deemed to be an underwriter under certain federal securities laws. 5. A Fund may not purchase any security if as a result 25% or more of the Fund’s total assets (taken at current value) would be invested in a single industry or group of industries (for purposes of this restriction, loan participations will be considered investments in the industry of the underlying borrower, as well as that of the seller of the loan participation). 6. A Fund may not make loans, except by purchase of debt obligations or other financial instruments in which a Fund may invest consistent with its investment policies, by entering into repurchase agreements, or through the lending of its portfolio securities. A Fund may purchase loan participations or otherwise invest in loans or similar obligations, and may make loans directly to issuers, itself or as part of a lending syndicate. A Fund may make loans to affiliated investment companies to the extent permitted by the 1940 Act or any exemptions therefrom that may be granted by the Securities and Exchange Commission. 7. A Fund may not purchase commodities, except that a Fund may purchase and sell commodity contracts or any type of commodity-related derivative instrument (including, without limitation, all types of commodity-related swaps, futures contracts, forward contracts and options contracts). 8. A Fund may not purchase or sell real estate or interests in real estate, including real estate mortgage loans, although it may purchase and sell securities which are secured by real estate and securitie
ar as a percentage of the value of your investment): CLASS A CLASS C CLASS I CLASS R6 Management Fee 0.66 % 0.66 % 0.66 % 0.66 % Distribution and/or Service (12b-1) Fees 0.25 % 1.00 % None None Dividend and Interest Expense on Short Sales 0.17 % 0.17 % 0.17 % 0.17 % Other Expenses 0.13 % 0.13 % 0.13 % 0.05 % Acquired Fund Fees and Expenses 1 ​ 0.01 % 0.01 % 0.01 % 0.01 % Total Annual Fund Operating Expenses 1.22 % 1.97 % 0.97 % 0.89 % 1 "Acquired Fund Fees and Expenses" include certain expenses incurred in connection with the Fund's investment in various money market funds, affiliated mutual funds, and ETFs. Example This example is intended to help you compare the cost of investing in the Fund with the cost of investing in other mutual funds. The example assumes that you invest $10,000 in the Fund for the time periods indicated and then either redeem or do not redeem your shares at the end of the reflected time periods. The example also assumes that your investment has a 5% return each year, that all dividends and capital gain distributions are reinvested, that you pay a maximum initial or contingent deferred sales charge and that the Fund's operating expenses remain the same. Although your actual performance and costs may be higher or lower, based on these assumptions, your costs would be: You would pay the following expenses if you redeemed your shares at the end of the period: One Year Three Years Five Years Ten Years Class A 396 652 927 1,712 Class C 300 618 1,062 2,296 Class I 99 309 536 1,190 Class R6 91 284 493 1,096 PROSPECTUS | February 28, 2025 1 Calamos Market Neutral Income Fund You would pay the following expenses if you did not redeem your shares: One Year Three Years Five Years Ten Years Class A 396 652 927 1,712 Class C 200 618 1,062 2,296 Class I 99 309 536 1,190 Class R6 91 284 493 1,096 Portfolio Turnover The Fund pays transaction costs, such as commissions, when it buys and sells securities (or "turns over" its portfolio). A higher portfolio turnover rate may indicate higher transaction costs and may result in higher taxes when Fund shares are held in a taxable account. These costs, which are not reflected in the annual fund operating expenses or in the example, affect the Fund's performance. During the most recent fiscal year, the Fund's portfolio turnover rate was 35 % of the average value of its portfolio. Principal Investment Strategies The Fund's investment strategy can be characterized as "market neutral" because it seeks to achieve maximum current income while maintaining a low correlation to the fluctuations of the U.S. equity market as a whole. The Fund (i) invests in equities, (ii) invests in convertible securities (including synthetic convertible securities) of U.S. companies without regard to market capitalization, and (iii) employs short selling and enters into total return swaps to enhance income and hedge against market risk. The convertible securities in which the Fund invests may be either debt securities or preferred stocks that can be exchanged for common stock. The average term to maturity of the convertible securities purchased by the Fund will typically range from two to ten years. A synthetic convertible instrument is designed to simulate the economic characteristics of a convertible security through the combined features of a debt instrument, or loan, and a security providing an option on an equity security. The Fund may establish a synthetic convertible instrument by combining a fixed-income security with the right to acquire an equity security. The fixed-income and equity option components may have different issuers, and either component may change at any time. The Fund may seek to generate income from option premiums by writing (selling) options. This would include the use of both call and put options. The Fund may write call options (i) on a portion of the equity securities (including securities that are convertible into equity securities) in the Fund's portfolio and (ii) on broad-based securities indexes (such as the S&P 500 or MSCI EAFE) or ETFs (exchange traded funds). In addition, to seek to offset some of the risk of a potential decline in value of certain long positions, the Fund may also purchase put options on individual securities, broad-based securities indexes (such as the S&P 500), or ETFs. The Fund may invest without limit in high yield fixed-income securities (often referred to as "junk bonds"). The Fund may invest up to 10% of its total assets in stock, rights, warrants, and other securities of special purpose acquisition companies or similar special purpose entities (collectively, "SPACs"). In addition, the Fund may obtain certain private rights and other interests issued by a SPAC (commonly referred to as "founder shares"), which may be subject to forfeiture or expire worthless and which generally have more limited liquidity than SPAC shares issued in an initial public offering. In addition, the Fund may engage in active and frequent trading of portfolio securities. The Fund may also invest in ETFs. The Fund's investment adviser seeks to lower the risks of investing in stocks by using a "top-down approach" of diversification by company, industry, sector, country and currency and focusing on macro-level investment themes. Principal Risks An investment in the Fund is subject to risks, and you could lose money on your investment in the Fund. There can be no assurance that the Fund will achieve its investment objective. The risks associated with an investment in the Fund can increase during times of significant market volatility. Your investment in the Fund is not a deposit in a bank and is not insured or CALAMOS FAMILY OF FUNDS 2 Calamos Market Neutral Income Fund guaranteed by the Federal Deposit Insurance Corporation or any other government agency. The principal risks are presented in alphabetical order to facilitate finding particular risks and comparing them with other funds. Each risk summarized below is considered a "principal risk" of investing in the Fund, regardless of the order in which it appears. The principal risks of investing in the Fund include: • Convertible Hedging Risk — If the market price of the underlying common stock increases above the conversion price on a convertible security, the price of the convertible security will increase. The Fund's increased liability on any outstanding short position would, in whole or in part, reduce this gain. • Convertible Securities Risk — The value of a convertible security is influenced by changes in interest rates, with investment value declining as interest rates increase and increasing as interest rates decline. The credit standing of the issuer and other factors also may have an effect on the convertible security's investment value. • Covered Call Writing Risk — As the writer of a covered call option on a security, the Fund foregoes, during the option's life, the opportunity to profit from increases in the market value of the security covering the call option above the sum of the premium and the exercise price of the call. • Debt Securities Risk — Debt securities are subject to various risks, including interest rate risk, credit risk and default risk. • Interest Rate Risk — The value of debt securities generally decreases in periods when interest rates are rising. In addition, interest rate changes typically have a greater effect on prices of longer-term debt securities than shorter term debt securities. Changes in interest rates by the Federal Reserve Board, and other events affecting fixed-income markets, may subject a Fund to heightened interest rate risk as a result of a rise in interest rates. • Credit Risk — A debt security could deteriorate in quality to such an extent that its rating is downgraded or its market value declines relative to comparable securities. Changes in actual or perceived creditworthiness may occur quickly. If the Fund holds securities that have been downgraded, or that default on payment, the Fund's
$ 437 $ 410 $ 723 10 Years $ 1,762 $ 2,070 $ 2,267 $ 2,267 $ 983 $ 917 $ 1,590 4 NYLI Epoch U.S. Equity Yield Fund Portfolio Turnover The Fund pays transaction costs, such as commissions, when it buys and sells securities (or "turns over" its portfolio). A higher portfolio turnover rate may indicate higher transaction costs and may result in higher taxes when Fund shares are held in a taxable account. These costs, which are not reflected in annual fund operating expenses or in the Example, affect the Fund's performance. During the most recent fiscal year, the Fund's portfolio turnover rate was 13% of the average value of its portfolio. Principal Investment Strategies The Fund generally invests in a diversified portfolio consisting of equity securities of U.S. companies that have a history of attractive dividend yields and positive growth in operating cash flow. Under normal circumstances, the Fund invests at least 80% of its assets (net assets plus any borrowings for investment purposes) in equity securities of dividend-paying U.S. companies across all market capitalizations. The Fund may invest up to 15% of its net assets in foreign securities. An issuer of a security is considered to be a U.S. or foreign issuer based on the issuer's "country of risk" (or similar designation) as determined by a third-party such as Bloomberg . Investment Process: Epoch Investment Partners, Inc., the Fund's Subadvisor, invests primarily in companies that generate increasing levels of free cash flow and have management teams that the Subadvisor believes allocate free cash flow effectively to create shareholder value. The security selection process focuses on free-cash-flow analytics as opposed to traditional accounting-based metrics. The Subadvisor seeks to identify companies with a consistent, straightforward ability to both generate free cash flow and to intelligently allocate it among internal reinvestment opportunities, acquisitions, dividends, share repurchases and/or debt reduction. The Subadvisor seeks to find and invest in companies that meet its definition of quality-companies that are free cash flow positive or becoming free cash flow positive, and that are led by strong management. The Subadvisor evaluates whether a company has a focus on shareholder yield by analyzing the company's existing cash dividend, the company's share repurchase activities, and the company's debt reduction activities as well as the likelihood of positive changes to each of these criteria, among other factors. Material environmental, social and governance ("ESG") factors are identified and monitored by the Subadvisor. Material ESG factors vary by company and industry, but the Subadvisor pays particular attention to factors relating to climate change and corporate governance. This information is taken into account by the Subadvisor in making investment decisions. Material ESG factors are identified and monitored by the Subadvisor through review of ESG information published by the company (where relevant) or selected specialist third-party research and data providers. While the Subadvisor considers ESG factors in the investment decision-making process of the Fund, this does not mean that ESG considerations are the sole or foremost considerations for investment decisions. The Subadvisor may sell or reduce a position in a security when it believes its investment objectives have been met or if the investment thesis is failing to materialize. The Subadvisor may also sell or reduce a position in a security if it sees an interruption to the dividend policy, a deterioration in fundamentals or when the security is deemed less attractive relative to another security on a return/risk basis. Principal Risks You can lose money by investing in the Fund. An investment in the Fund is not a bank deposit and is not insured or guaranteed by the Federal Deposit Insurance Corporation or any other governmental agency. The investments selected by the Subadvisor may underperform the market in which the Fund invests or other investments. The Fund may receive large purchase or redemption orders which may have adverse effects on performance if the Fund were required to sell securities, invest cash or hold a relatively large amount of cash at times when it would not otherwise do so. The principal risks of investing in the Fund are summarized below. The relative significance of each principal risk summarized below may change over time. Market Risk: Changes in markets may cause the value of investments to fluctuate, which could cause the Fund to underperform other funds with similar investment objectives and strategies. Such changes may be rapid and unpredictable. From time to time, markets may experience periods of stress as a result of various market, economic and geopolitical factors (including responses to government actions or interventions) for potentially prolonged periods that may result in: (i) increased market volatility; (ii) reduced market liquidity; and (iii) increased redemptions of shares. Certain securities may be difficult to value under such conditions, and such conditions may add significantly to the risk of volatility in the net asset value of the Fund's shares and adversely affect the Fund and its investments. Portfolio Management Risk: The investment strategies, practices and risk analyses used by the Subadvisor may not produce the desired results or expected returns. The Subadvisor may give consideration to certain ESG criteria when evaluating an investment opportunity. The application of ESG criteria may result in the Fund (i) having exposure to certain securities or industry sectors that are significantly different than the composition of the Fund's benchmark; and (ii) performing differently than other funds and strategies in its peer group that do not take into account ESG criteria or the Fund's benchmark. Equity Securities Risk: Investments in common stocks and other equity securities are particularly subject to the risk of changin

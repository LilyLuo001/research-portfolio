ious derivative transactions for both hedging and non-hedging purposes, including as a substitute for buying or selling securities, for purposes of enhancing returns, which transactions may be regarded as speculative. These derivative transactions include, but are not limited to, forwards, futures, options, swaps, credit default swaps and commodity-linked investments. Further, the fund may establish short positions, mainly through, but not limited to derivatives, to a substantial degree. Derivatives will not be used in a way that would cause the fund to violate the guidelines stated BrandywineGLOBAL — Alternative Credit Fund 5 in this section, but there are no other percentage limits on the use of derivatives. The fund may use one or more types of these instruments without limit. The fund will not be leveraged through borrowing. However, certain types of derivatives have a leverage-like effect on the portfolio, in that they require a relatively small premium or margin payment in relation to the size of the investment exposure the fund acquires. The fund is classified as “non-diversified,” which means it may invest a larger percentage of its assets in a smaller number of issuers than a diversified fund. Principal risks Risk is inherent in all investing. The value of your investment in the fund, as well as the amount of return you receive on your investment, may fluctuate significantly. You may lose part or all of your investment in the fund or your investment may not perform as well as other similar investments. The fund’s investment strategies and portfolio investments differ from those of many other mutual funds. The subadviser may aggressively seek to identify favorable securities, economic and market sectors, and investment opportunities. This approach to investing may make the fund a more volatile investment than other mutual funds and cause the fund to perform less favorably than other mutual funds under similar market or economic conditions. An investment in t
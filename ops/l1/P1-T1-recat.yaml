rkets Debt Fund 4 MainStay Floating Rate Fund 10 MainStay MacKay High Yield Corporate Bond Fund 16 MainStay MacKay Short Duration High Yield Fund 22 MainStay MacKay Strategic Bond Fund 28 MainStay MacKay Total Return Bond Fund 37 MainStay MacKay U.S. Infrastructure Bond Fund 44 MainStay Short Term Bond Fund 51 Tax-Exempt MainStay MacKay California Tax Free Opportunities Fund 57 MainStay MacKay High Yield Municipal Bond Fund 64 MainStay MacKay New York Tax Free Opportunities Fund 71 MainStay MacKay Tax Free Bond Fund 78 Money Market MainStay Money Market Fund 84 Mixed Asset MainStay Income Builder Fund 89 MainStay MacKay Convertible Fund 97 More About Investment Strategies and Risks 103 Shareholder Guide 125 Know With Whom You Are Investing 167 Financial Highlights 178 Appendix A – Intermediary-Specific Sales Charge Waivers and Discounts 236 Appendix B – Taxable Equivalent Yield Table 244 MainStay Candriam Emerging Markets Debt Fund Investment Objective The Fund seeks total return. Fees and Expenses of the Fund The table below describes the fees and expenses that you may pay if you buy, hold and sell shares of the Fund. You may pay other fees, such as brokerage commissions and other fees to financial intermediaries, which are not reflected in the table and example below. You may qualify for sales charge discounts if you and your family invest, or agree to invest in the future, at least $50,000 in the MainStay Funds. This amount may vary depending on the MainStay Fund in which you invest. In addition, different financial intermediary firms and financial professionals may impose different sales loads and waivers. More information about these and other discounts or waivers is available from your financial professional, in the "Information on Sales Charges" section starting on page 133 of the Prospectus and Appendix A – Intermediary-Specific Sales Charge Waivers and Discounts, and in the "Alternative Sales Arrangements" section on page 142 of the Statement of Additional Information. Class A Investor Class Class B 1 Class C Class I Shareholder Fees (fees paid directly from your investment) Maximum Sales Charge (Load) Imposed on Purchases (as a percentage of offering price) 4.50 % 4.00 % None None None Maximum Deferred Sales Charge (Load) (as a percentage of the lesser of the original offering price or redemption proceeds) None 2 None 2 5.00 % 1.00 % None Annual Fund Operating Expenses (expenses that you pay each year as a percentage of the value of your investment) Management Fees (as an annual percentage of the Fund's average daily net assets) 3 0.70 % 0.70 % 0.70 % 0.70 % 0.70 % Distribution and/or Service (12b-1) Fees 0.25 % 0.25 % 1.00 % 1.00 % None Other Expenses 0.37 % 0.75 % 0.75 % 0.75 % 0.36 % Total Annual Fund Operating Expenses 1.32 % 1.70 % 2.45 % 2.45 % 1.06 % Waivers / Reimbursements 4,5 (0.17 )% (0.17 )% (0.17 )% (0.17 )% (0.21 )% Total Annual Fund Operating Expenses After Waivers / Reimbursements 4,5 1.15 % 1.53 % 2.28 % 2.28 % 0.85 % 1. Class B shares are closed to all new purchases as well as additional investments by existing Class B shareholders. 2. No initial sales charge applies on investments of $1 million or more (and certain other qualified purchases). However, a contingent deferred sales charge of 1.00% may be imposed on certain redemptions made within 18 months of the date of purchase on shares that were purchased without an initial sales charge. 3. The management fee is as follows: 0.70% on assets up to $500 million and 0.65% on assets over $500 million. 4. New York Life Investment Management LLC ("New York Life Investments") has contractually agreed to waive fees and/or reimburse expenses so that Total Annual Fund Operating Expenses (excluding taxes, interest, litigation, extraordinary expenses, brokerage and other transaction expenses relating to the purchase or sale of portfolio investments, and acquired (underlying) fund fees and expenses) do not exceed the following percentages of its average daily net assets: Class A, 1.15%; and Class I, 0.85%. New York Life Investments will apply an equivalent waiver or reimbursement, in an equal number of basis points as the Class A shares waiver/reimbursement, to Investor Class, Class B and Class C shares. This agreement will remain in effect until February 28, 2023, and shall renew automatically for one-year terms unless New York Life Investments provides written notice of termination prior to the start of the next term or upon approval of the Board of Trustees of the Fund. 5. New York Life Investments has contractually agreed to limit the transfer agency expenses charged to each of the Fund’s share classes to a maximum of 0.35% of that share class’s average daily net assets on an annual basis after deducting any applicable Fund or class-level expense reimbursements or small account fees. This agreement will remain in effect until February 28, 2023, and shall renew automatically for one-year terms unless New York Life Investments provides written notice of termination prior to the start of the next term or upon approval of the Board of Trustees of the Fund. Example The Example is intended to help you compare the cost of investing in the Fund with the cost of investing in other mutual funds. The Example assumes that you invest $10,000 in the Fund for the time periods indicated whether or not you redeem all of your shares at the end of those periods (except as indicated with respect to Class B and Class C shares). The Example reflects Class B and Class C shares converting into Investor Class shares in years 9-10; expenses could be lower if you are eligible to convert to Class A shares instead. The Example also assumes that your investment has a 5% return each year and that the Fund's operating expenses remain the same. The Example reflects the contractual fee waiver and/or expense reimbursement arrangement, if applicable, for the current duration of the arrangement only. Although your actual costs may be higher or lower, based on these assumptions your costs would be: Expenses After Class A Investor Class B Class C Class I Class Assuming no redemption Assuming redemption at end of period Assuming no redemption Assuming redemption at end of period 1 Year $ 562 $ 549 $ 231 $ 731 $ 231 $ 331 $ 87 3 Years $ 833 $ 898 $ 747 $ 1,047 $ 747 $ 747 $ 316 5 Years $ 1,125 $ 1,271 $ 1,290 $ 1,490 $ 1,290 $ 1,290 $ 564 10 Years $ 1,954 $ 2,315 $ 2,588 $ 2,588 $ 2,588 $ 2,588 $ 1,275 4 MainStay Candriam Emerging Markets Debt Fund Portfolio Turnover The Fund pays transaction costs, such as commissions, when it buys and sells securities (or "turns over" its portfolio). A higher portfolio turnover rate may indicate higher transaction costs and may result in higher taxes when Fund shares are held in a taxable account. These costs, which are not reflected in annual fund operating expenses or in the Example, affect the Fund's performance. During the most recent fiscal year, the Fund's portfolio turnover rate was 112% of the average value of its portfolio. Principal Investment Strategies Under normal circumstances, the Fund invests at least 80% of its assets (net assets plus any borrowings for investment purposes) in fixed income securities of issuers in emerging markets. Generally, an issuer of a security is considered to be an emerging market issuer based on the issuer’s “country of risk,” as determined by a third-party service provider such as Bloomberg. Candriam Luxembourg S.C.A., the Fund’s Subadvisor, has discretion to determine the countries considered to be emerging market countries, including taking into consideration a variety of factors such as the development of a country’s financial and capital markets and inclusion in an index, such as the J.P. Morgan Emerging Market Bond Index, considered by the Subadvisor to be representative of emerging markets. The securities in which the Fund invests may be denominated in foreign currency. The debt securities in which the Fund invests may consist of securities that are rated below investment grade. Below investment grade securities are generally securities that receive low ratings from a nationally recognized statistical rating organization (“NRSRO”) (such as securities rated lower than BBB- and Baa3), or if unrated, are deemed to be of comparable quality by the Subadvisor. Securities rated below investment grade by a NRSRO are commonly referred to as “high yield securities” or “junk bonds.” If NRSROs assign different ratings to the same security, the Fund will use the higher rating for purposes of determining the security's credit quality. The Fund may invest in fixed income securities of any duration or maturity. The Fund's principal investments include sovereign, quasi-sovereign and corporate Eurobonds. The Fund may invest in floating rate notes and inverse floating rate notes. The Fund may also invest in derivative instruments, such as forward commitments, futures, options and swap agreements to try to enhance returns or reduce the risk of loss by hedging certain of its holdings. The Fund may invest up to 20% of its total assets in swaps, including credit default swaps and credit default swap indices. The Fund may buy and sell currency on a spot basis, buy foreign currency options, and enter into foreign currency forward contracts. These techniques may be used for any purpose, including to seek to increase the Fund's return. Investment Process: The Subadvisor identifies investment opportunities by deploying a relative value focused investment approach. The approach consists of three primary layers of analysis. The first layer assesses medium-term sovereign creditworthiness and sets up the basis for identifying the second and third layer investment opportunities, which are relative country (second layer) and instrument (third layer) investment opportunities. The Subadvisor also considers key fundamental macro-economic drivers such as growth and inflation dynamics, internal and external imbalances as well as structural reform and political risk trends. The investment approach is aware of environmental, social and governance (“ESG”) risks as ESG factors are explicitly integrated in the sovereign creditworthiness analysis. The Subadvisor may avoid investments in sovereign or corporate issuers where the combination of fundamental and ESG risks are not appropriately reflected in valuations. In addition, the Subadvisor implements a Controversial Activity Exclusion policy related to companies and industries involved with the production of coal, tobacco products, chemical, biological or white phosphorus weapons, and gambling. The Subadvisor may sell a security if it believes the security will no longer contribute to meeting the investment objective of the Fund. Principal Risks You can lose money by investing in the Fund. An investment in the Fund is not a bank deposit and is not insured or guaranteed by the Federal Deposit Insurance Corporation or any other governmental agency. The investments selected by the Subadvisor may underperform the market in which the Fund invests or other investments. The Fund may receive large purchase or redemption orders which may have adverse effects on performance if the Fund were required to sell securities, invest cash or hold a relatively large amount of cash at times when it would not otherwise do so. The principal risks of investing in the Fund are summarized below. Market Risk: The value of the Fund’s investments may fluctuate because of changes in the markets in which the Fund invests, which could cause the Fund to underperform other funds with similar investment objectives and strategies. Such changes may be rapid and unpredictable. From time to time, markets may experience periods of stress for potentially prolonged periods that may result in: (i) increased market volatility; (ii) reduced market liquidity; and (iii) increased redemptions of Fund shares. Such conditions may add significantly to the risk of volatility in the net asset value of
 implied by the execution of longer and shorter dated Box Spreads. The Fund expects to trade some or all of the Box Spreads prior to their respective expiration dates, if Arin believes it is advantageous for the Fund to do so. Upon expiration or sale of any Box Spread, Arin may seek to purchase additional Box Spreads at an effective yield and expiration date that offers favorable risk and reward characteristics under current market conditions. The Fund may also invest in cash, cash equivalents, money market funds or treasury bills. The Fund’s strategy is expected to result in high portfolio turnover. The return that the Fund expects to earn from Box Spreads will fluctuate but remain consistent with the market rate for similar short-term interest rate sensitive securities as indicated by the Federal Funds Futures market. When purchasing or selling a Box Spread, the Fund will use European-style options. European style options may not be terminated or assigned in advance of the option’s expiration date and may only be exercised on their expiration date. This ensures that none of the synthetic positions created using the Box Spread will be forcibly closed prior to the Box Spread’s maturity. The Fund expects to use options on broad-based diversified assets such as the SPDR® S&P 500® ETF Trust for substantially all of the Fund’s holdings. The Fund may purchase or sell Box Spreads using exchange-listed option contracts on an ETF other than the SPDR® S&P 500® ETF Trust or on an index or individual equity security when Arin has determined that doing so would provide the Fund with better risk and return or tax characteristics. The Fund may also utilize an exchange-listed options strategy using long shares of an individual equity security or ETF (in place of the Synthetic Long) together with a Synthetic Short created by purchasing a put option and selling a call option on that equity security or ETF with the same strike and expiration date. This individual equity security or E
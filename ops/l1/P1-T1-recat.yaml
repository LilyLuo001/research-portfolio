      EX-99.(H)(3) 11 d26819dex99h3.htm ADMINISTRATIVE AGENCY AGREEMENT (MARCH 5, 2012) Administrative Agency Agreement (March 5, 2012) [LOGO] BROWN BROTHERS HARRIMAN ADMINISTRATIVE AGENCY AGREEMENT DATED as of March 5, 2012 BROWN BROTHERS HARRIMAN & CO. and PIONEER INVESTMENT MANAGEMENT, INC. With respect to the PIONEER FUNDS listed on Appendix A hereto THIS ADMINISTRATIVE AGENCY AGREEMENT is made as of March 5, 2012 by and between BROWN BROTHERS HARRIMAN & CO., a limited partnership organized under the laws of the State of New York (the "Administrator"), and Pioneer Investment Management, Inc., a Delaware corporation and member of the UniCredit banking group (the "Adviser"). WITNESSETH: WHEREAS, each of the investment companies listed on Appendix A hereto (each a "Trust" and collectively the "Trusts," on behalf of its respective series listed on Appendix A to this Agreement, each a "Fund" and collectively the "Fund") is a Delaware statutory trust and is registered with the U.S. Securities and Exchange Commission as a management investment company under the Investment Company Act of 1940 (the "1940 Act"); WHEREAS, each Trust, on behalf of itself or its respective series as listed on Appendix A to this Agreement (each Trust, on behalf of itself or each such respective series shall be referred to herein as a "Fund") has retained the Adviser to furnish certain advisory and administrative services to the Funds; and WHEREAS, the Adviser desires to retain the Administrator to render certain services to the Funds, and the Administrator is willing to render such services. NOW, THEREFORE, in consideration of the premises and mutual covenants herein contained, the parties hereto agree as follows: 1. Appointment of Administrator. The Adviser hereby appoints the Administrator to act as sub-administrator on the terms set forth in this Agreement, and the Administrator accepts such appointment. 2. Delivery of Documents. The Adviser will on a continuing basis provide the Administrator with: 2.1 properly certified or authenticated copies of any resolutions of each Fund's Board of Trustees (each a "Board") approving this Agreement; 2.2 a copy of each Fund's most recent registration statement, upon the Administrator's request; 2.3 copies of all agreements between each Fund and its service providers, including without limitation, advisory, distribution and administration agreements and distribution and/or shareholder servicing plans, upon the Administrator's request; 2.4 a copy of each Fund's valuation procedures (as may be revised or amended); 2 2.5 a copy of each Fund's Articles of Incorporation/Declaration of Trust and By-laws, upon the Administrator's request; 2.6 any other documents or resolutions (including but not limited to directions or resolutions of each Fund's Board) which relate to or affect the Administrator's performance of its duties hereunder and which the Administrator may at any time reasonably request; and 2.7 upon the Administrator's request, copies of any and all amendments or supplements to the foregoing (except for each Fund's valuation procedures, which shall be provided promptly after amendments thereto). 3. Duties as Administrator. Subject to the supervision and direction of the Adviser, the Administrator will perform for each Fund the administrative services described in Appendix B hereto. Additional services may be provided by the Administrator upon the Adviser's request as mutually agreed from time to time. In performing its duties and obligations hereunder, the Administrator will act in accordance with proper instructions as defined in Section 5 ("Instructions"). It is agreed and understood that the Administrator shall not be responsible for a Fund's compliance with any applicable documents, laws or regulations, or, except as otherwise provided herein, for losses, costs or expenses arising out of each Fund's failure to comply with said documents, laws or regulations or the Fund's failure or inability to correct any non-compliance therewith, provided that the Administrator will comply with such laws and regulations applicable to its administrative services business and the performance of its duties, obligations and services under this Agreement. The Administrator shall in no event be required to take any action, which is in contravention of any applicable law, rule or regulation or any order or judgment of any court of competent jurisdiction. 3.1 Records. The Administrator will create, maintain and retain for each Fund such records as required by the 1940 Act and other applicable federal securities laws relating to the Administrator's obligations and activities under this Agreement, including Section 31 of the 1940 Act and Rules 31a-1 and 31a-2 thereunder. The Administrator will maintain such other records on behalf of a Fund as requested by the Adviser and received by the Administrator. The Administrator shall preserve such records for the period required by law. The Administrator shall not be responsible for the accuracy and completeness of any records not created by the Administrator. The Administrator acknowledges that the records maintained and preserved by the Administrator pursuant to this Agreement on behalf of a Fund are the property of the Fund and will be, at the Fund's expense, surrendered promptly upon reasonable request. In performing its 3 obligations under this Section, the Administrator may utilize micrographic and electronic storage media meeting applicable legal requirements as well as independent third party storage facilities. 3.2 Procedures. The Administrator represents and warrants that it has compliance policies and procedures relating to its administrative business as a service provider to mutual funds contemplated by Rule 38a-l under the 1940 Act ("Compliance Program"). The Administrator will promptly furnish the Funds' Chief Compliance Officer with a written summary of its Compliance Program at least annually, including summaries of any material changes to the Compliance Program, and will furnish such policies and procedures upon request. 3.3 CCO Report Materials. The Administrator will cooperate with the Fund in connection with the annual review by the Fund's Chief Compliance Officer of the Compliance Program. As requested by the Chief Compliance Officer, the Administrator will furnish quarterly and annual reports relating to the Compliance Program and the services hereunder, and such other information as the Chief Compliance Officer may reasonably request from time to time. 3.4 Use of Agents. The Administrator may at any time or times in its discretion appoint (and may at any time remove) any affiliate or subcontractor as its agent (each an "Agent" and collectively, the "Agents") to carry out such provisions of this Agreement as it may from time to time direct. The Administrator shall exercise reasonable care in the selection and monitoring of such Agents. The appointment of an Agent shall not relieve the Administrator of its obligations and liabilities under this Agreement, and, in the case of the Administrator appointing a non-affiliate as an Agent to perform a material portion of the administrative services described in Appendix B hereto, shall be subject to the Adviser's prior written consent (such consent not to be unreasonably withheld). For the avoidance of doubt, the Adviser acknowledges that, as of the date of this Agreement, the Administrator has retained a non-affiliate, business process outsource service provider in India, Infosys BPO Limited and its affiliates ("BPO"), to provide certain services to the Administrator, and further consents to the use of BPO for such services. 4. Duties of the Adviser. The Adviser shall notify the Administrator promptly of any matter affecting the performance by the Administrator of its services under this Agreement, and, where the Administrator is providing fund accounting services pursuant to this Agreement, shall promptly notify the Administrator as to (a) the accrual of liabilities of a Fund, (b) liabilities of a Fund not appearing on the books of account kept by the Administrator, and (c) the existence, status and proper treatment of reserves, if any, authorized by a Fund. Where the Administrator is providing portfolio compliance monitoring services pursuant to this Agreement, the Adviser agrees to notify the Administrator in the event a Fund or 4 any officer, employee or agent of the Adviser or Fund detects a possible non-compliance of the Fund with its investment restrictions, policies and limitations. The Adviser agrees to provide such information relating to a Fund to the Administrator as may be requested under the banking and securities laws of the United States or other jurisdictions relating to "Know Your Customer" and money laundering prevention rules and regulations (collectively, the "KYC Requirements"). For purposes of this subsection, and in connection with all applicable KYC Requirements, each Fund is the "client" or "customer" of the Administrator. The Adviser further represents that it or the Funds will perform all obligations required under applicable KYC Requirements with respect to the Funds' "customers" (as defined in the KYC Requirements) and that, because these customers do not constitute "customers" or "clients" of the Administrator under such applicable rules and regulations, the Administrator is under no such similar obligations. 5. Instructions. 5.1 The Administrator shall not be liable for any and all losses, costs, damages or expenses arising from or as a result of, any action taken or omitted in reliance upon Instructions reasonably believed by it to be genuine and signed or authorized by the proper party or parties. A list of persons authorized by the Funds to provide Instructions hereunder ("Authorized Persons") is attached hereto as Appendix C and upon which the Administrator may rely until its receipt of notification to the contrary by the Fund. 5.2 "Instructions" shall mean a written notice, request, direction, instruction, electronic mail (subject to agreement between the Adviser and the Administrator as to the specific types of Instructions for which electronic mail will be used), or certification signed or initialed on behalf of the Fund by one or more Authorized Persons. Those Authorized Persons authorized to give Instructions may be identified by the Adviser or the Board by name, title or position and will include at least one officer empowered by the Board or the Adviser to name other individuals who are authorized to give Instructions on behalf of the Fund. 5.3 Telephonic or other oral instructions or instructions given by telefax transmission may be given by any Authorized Person and will also be considered Instructions if the Administrator believes them to have been given by an Authorized Person authorized to give such Instructions with respect to the transaction involved. 5.4 With respect to telefax transmissions, the Adviser hereby acknowledges that (i) receipt of legible instructions cannot be assured, (ii) the Administrator cannot verify that authorized 5 signatures on telefax instructions are original, and (iii) the Administrator shall not be responsible for losses or expenses incurred through actions taken in reliance on such telefax instructions. The Adviser agrees that such telefax instructions shall be conclusive evidence of a Fund's Instruction to the Administrator to act or to omit to act. 5.5 With respect to electronic mail transmissions through the Internet, the Adviser acknowledges that electronic mail is not a guaranteed method of delivery and may be susceptible to loss of information, errors, misdelivery, mistransmission, delivery delays (including without limitation, those resulting from BBH's systems, networks, processes or procedures), deletions in error (including without limitation, those resulting from BBH's systems, networks, processes or procedures), and unwanted access by third parties in such forms including, but not limited to, viruses, falsification, forgery and misuse of data. The Adviser agrees not to hold BBH liable for any losses incurred by any party resulting from or caused by the use of electronic mail to effect Instructions, including in relation to inaccuracies, incompleteness, or delays in receiving or the non-receipt of any electronic mail Instruction (including, without limitation, any of the foregoing caused by BBH's systems, networks, processes or procedures). 5.6 Instructions given orally will not be confirmed in writing and the lack of such confirmation shall in no way affect any action taken by the Administrator in reasonable reliance upon such oral Instructions. The Adviser authorizes the Administrator to tape record any and all telephonic or other oral Instructions given to the Administrator by or on behalf of the Fund (including any of its officers, directors, trustees, employees or agents or any investment manager or adviser or person or entity with similar responsibilities who is authorized to give Instructions on behalf of the Fund to the Administrator). 6. Expenses and Compensation. For the services to be rendered and the facilities to be furnished to each Fund by the Administrator as provided for in this Agreement, each Fund, severally and not jointly, shall pay the Administrator a fee based on such fee schedule as may from time to time be agreed upon in writing by the Adviser, the Fund and the Administrator. Additional services performed by the Administrator as requested by the Adviser or Fund shall be subject to additional fees as mutually agreed from time to time. In addition to such fee, the Administrator shall bill the Fund separately for any out-of-pocket disbursements of the Administrator with respect to services provided to such Fund based on an out-of-pocket schedule as may from time to time be agreed upon in writing by the Adviser, the Fund and the Administrator. The foregoing fees and disbursements shall be billed to each Fund by the Administra

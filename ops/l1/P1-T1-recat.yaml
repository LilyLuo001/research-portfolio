      497 1 atac_497-060525.htm INITIAL REGISTRATION STATEMENT ATAC Rotation Fund a series of Managed Portfolio Series Dear Shareholder: I am writing to let you know that a meeting (the “Meeting”) of shareholders of the ATAC Rotation Fund (the “Target Fund”) has been scheduled for June 5, 2025, at 1:00 p.m., Central time. If you plan to attend the Meeting, please follow the registration instructions as outlined in the enclosed Proxy Statement/Prospectus. The Meeting has been called to consider an important proposal affecting the Target Fund. The enclosed Proxy Statement/Prospectus describes a proposal to reorganize the Target Fund into a newly-created mutual fund within Tidal ETF Trust (the “Acquiring Entity”), which is also called the ATAC Rotation Fund (the “Acquiring Fund”). Shareholders of the Target Fund will receive shares of the Acquiring Fund in a transaction that is intended to be a tax-free transaction under the Internal Revenue Code of 1986, as amended. The Acquiring Fund was established solely for the purpose of acquiring the assets and liabilities of the Target Fund and continuing the Target Fund’s business. The Target Fund and the Acquiring Fund have identical investment objectives, principal investment strategies and fundamental investment policies. Tidal Investments LLC (“Tidal”), the Target Fund’s investment adviser, will serve as the investment adviser to the Acquiring Fund. The same portfolio managers that currently manage the Target Fund will manage the Acquiring Fund, although Michael Gayed, one of the named portfolio managers will manage the Acquiring Fund through a recently registered investment adviser, Tactical Rotation Management, LLC, which will serve as investment sub-adviser to the Acquiring Fund. Under the terms of the current operating expenses limitation agreement applicable to the Acquiring Fund, the expenses currently payable by shareholders of the Target Fund are expected to go down in connection with the Reorganization. If approved by shareholders, on or about June 16, 2025, the Acquiring Fund will acquire all of the assets and assume all of the liabilities of the Target Fund, and shareholders of the Target Fund will receive a number of full and fractional shares of the corresponding class of the Acquiring Fund equal in aggregate net asset value to such shareholders’ shares of the Target Fund held at the time of the exchange. Target Fund will subsequently be liquidated and terminated. This transaction with respect to the Target Fund and the Acquiring Fund may be referred to as the “Reorganization”. The enclosed Proxy Statement/Prospectus describes the Reorganization in greater detail and contains important information about the Acquiring Fund. The Reorganization is not expected to result in the recognition of gain or loss by the Target Fund or its shareholders for federal income tax purposes. The Reorganization has been carefully reviewed by the Target Fund’s Board of Trustees. The Target Fund’s Board of Trustees is responsible for protecting your interests as a shareholder. The Target Fund’s Board of Trustees believes the Reorganization is in the best interests of the Target Fund and its shareholders and approved the Reorganization at meeting held on February 19 - 20, 2025. The Target Fund’s Board of Trustees recommends that you vote in favor of the proposal and approve the Reorganization. Please read the enclosed materials and cast your vote on the proxy card(s) or by telephone or via the internet. Please vote your shares promptly. Your vote is extremely important, no matter how large or small your holdings may be. Thank you for your participation in this important initiative. Sincerely, /s/ Brian Wiedmeyer Brian Wiedmeyer President Managed Portfolio Series April 16, 2025 Managed Portfolio Series 615 East Michigan Street Milwaukee, Wisconsin 53202 Notice of Special Meeting of Shareholders of the ATAC Rotation Fund A special meeting (the “Meeting”) of shareholders of the ATAC Rotation Fund (the “Target Fund”), a series of Managed Portfolio Series (the “Target Entity”), has been scheduled for June 5, 2025, at 1:00 p.m., Central time, to be held at 615 East Michigan Street, Milwaukee, WI 53202, to vote on the following proposal (the “Proposal”), and any other matters that may properly come before the Meeting or any adjournment or postponement thereof: PROPOSAL: TO APPROVE AN AGREEMENT AND PLAN OF REORGANIZATION BETWEEN THE TARGET ENTITY, ON BEHALF OF THE TARGET FUND, AND TIDAL ETF TRUST (THE “ACQUIRING ENTITY”), ON BEHALF OF THE ATAC ROTATION FUND (THE “ACQUIRING FUND”), PROVIDING FOR: (A) THE ACQUISITION OF ALL OF THE ASSETS AND ASSUMPTION OF ALL OF THE LIABILITIES OF THE TARGET FUND BY THE ACQUIRING FUND IN EXCHANGE FOR SHARES OF THE ACQUIRING FUND; (B) THE DISTRIBUTION OF SUCH SHARES TO THE SHAREHOLDERS OF THE TARGET FUND; AND (C) THE LIQUIDATION AND TERMINATION OF THE TARGET FUND (THE “REORGANIZATION”). The Proposal will be completed with respect to the Target Fund only if the Target Fund’s shareholders approve the Proposal. Fund shareholders of record as of the close of business on April 8, 2025 are entitled to receive notice of, and to vote at, the Meeting or any adjournment thereof. If any other proposals in addition to the Proposal properly come before the Meeting or any adjournment or postponement thereof, then the shareholders of the Target Fund will vote separately on each such proposal. Shareholders of both classes of the Target Fund, Investor Class and Institutional Class, are entitled to vote on the Proposal. The Target Entity’s Board of Trustees (the “Target Fund Board”) has approved the Agreement and Plan of Reorganization and recommends that shareholders of the Target Fund cast their vote “ FOR ” the Proposal as described in the accompanying Proxy Statement/Prospectus. Please vote your shares by completing the enclosed proxy card and returning it in the enclosed postage paid return envelope or by voting by telephone or via the internet using the instructions on the proxy card. If you are voting by mail, please sign and promptly return the proxy card in the postage paid return envelope regardless of the number of shares owned. If you wish to attend the Meeting and vote your shares in person at that time, you may do so. Proxy card instructions may be revoked at any time before they are exercised by submitting a written notice of revocation or a subsequently executed proxy card or by participating in the Meeting and casting your vote. Revocations must be received prior to the start of the Meeting, which is currently scheduled for June 5, 2025, at 1:00 p.m., Central time. By order of the Target Fund Board, /s/ Brian Wiedmeyer Brian Wiedmeyer President Managed Portfolio Series April 16, 2025 ATAC Rotation Fund a series of Managed Portfolio Series 615 East Michigan Street Milwaukee, Wisconsin 53202 Proxy Statement/Prospectus April 13, 2025 This Proxy Statement/Prospectus is provided in connection with the solicitation of proxies to be voted at a special meeting of shareholders (the “Meeting”) of the ATAC Rotation Fund (the “Target Fund”), a series of Managed Portfolio Series (the “Target Entity”). The Meeting is scheduled for June 5, 2025, at 1:00 p.m., Central time, held at 615 East Michigan Street, Milwaukee, WI 53202. At the Meeting, you and other shareholders of the Target Fund will be asked to consider and vote upon the following proposal (the “Proposal”) and any other matters that may properly come before the Meeting or any adjournment or postponement thereof: PROPOSAL: TO APPROVE AN AGREEMENT AND PLAN OF REORGANIZATION (THE “PLAN”) BETWEEN THE TARGET ENTITY, ON BEHALF OF THE TARGET FUND, AND TIDAL ETF TRUST (THE “ACQUIRING ENTITY”), ON BEHALF OF THE ATAC ROTATION FUND (THE “ACQUIRING FUND”), PROVIDING FOR: (A) THE ACQUISITION OF ALL OF THE ASSETS AND ASSUMPTION OF ALL OF THE LIABILITIES OF THE TARGET FUND BY THE ACQUIRING FUND IN EXCHANGE FOR SHARES OF THE ACQUIRING FUND; (B) THE DISTRIBUTION OF SUCH SHARES TO THE SHAREHOLDERS OF THE TARGET FUND; AND (C) THE LIQUIDATION AND TERMINATION OF THE TARGET FUND (THE “REORGANIZATION”). If shareholders of the Target Fund vote to approve the Plan, shareholders of the Target Fund will receive Acquiring Fund shares in the Reorganization (in the share class as set forth in the table below) having a total dollar value equal to the value of their investment in the Target Fund immediately prior to the Reorganization, as determined pursuant to the Plan. The Target Fund will then be liquidated and terminated. The table below shows the Target Fund (and share classes) and the Acquiring Fund (and corresponding share classes): Target Fund Class Corresponding Acquiring Fund Class Investor Class Investor Class Institutional Class Institutional Class The Reorganization is anticipated to be a tax-free transaction for the Target Fund and its shareholders. The Target Entity’s Board of Trustees (the “Target Fund Board”) has approved the Plan and has determined that approval of the Reorganization is in the best interests of the Target Fund and its shareholders, and that the interests of the existing shareholders of the Target Fund will not be diluted as a result of the Reorganization. Accordingly, the Target Fund Board recommends that shareholders of the Target Fund vote “FOR” the Proposal. The Target Fund Board has fixed the close of business on April 8, 2025 as the record date (“Record Date”) for the determination of Target Fund shareholders entitled to notice of and to vote at the Meeting and at any adjournment or postponement thereof. Shareholders will be entitled to one vote for each share of the Target Fund held (and a proportionate fractional vote for each fractional share held). If any other proposals in addition to the Proposal properly come before the Meeting or any adjournment or postponement thereof, then the shareholders of the Target Fund will vote separately on each such proposal. This Proxy Statement/Prospectus sets forth certain information about the Reorganization and the Acquiring Fund that you should consider before voting on the Proposal or investing in the Acquiring Fund. You should retain this information for future reference. The Target Entity and the Acquiring Entity are separate registered open-end management investment companies. This Proxy Statement/Prospectus, the enclosed Notice of Special Meeting of Shareholders, and the enclosed proxy card will be mailed to eligible shareholders on or about April 21, 2025. Additional information is available in the following materials which are incorporated herein by reference: ● the Statement of Additional Information dated April 13, 2025, relating to this Proxy Statement/Prospectus (the “Proxy Statement SAI”); ● Prospectus dated December 29, 2024 for the Target Fund, as amended and supplemented (“Target Fund Prospectus”) (File no. 811-22525); ● Statement of Additional Information dated December 29, 2024 for the Target Fund, as amended and supplemented (“Target Fund SAI”) (File no. 811-22525); and 1 ● The Target Fund’s audited financial statements and related report of the independent registered public accounting firm included in the Target Fund’s Annual Report to Shareholders for the fiscal year ended August 31, 2024 (the “Target Fund Annual Report”) (File no. 811-22525). The financial highlights for the Target Fund contained in the Target Fund Annual Report are included in this Proxy Statement/Prospectus as Exhibit C . The Target Fund’s Prospectus, SAI, and Annual Report are available on the Target Fund’s website at www.atacfunds.com/atacx. Copies of documents relating to the Acquiring Fund, when available, may also be obtained at www.atacfunds.com/atacx. Additional information about the Acquiring Fund that will be included in the Acquiring Fund’s Prospectus, when available, is included in Exhibit D to this Proxy Statement/Prospectus. The documents listed above are on file with the U.S. Securities and Exchange Commission (the “SEC”). Copies of the Target Fund’s documents are also available at no cost by calling 855-ATACFUND (855-282-2386). Copies of the Acquiring Fund documents, when available, will also be available by calling 855-ATACFUND (855-282-2386). You may also obtain these documents from the SEC’s website at www.sec.gov. The Acquiring Fund is newly-organized and currently has no assets or liabilities. The Acquiring Fund is an open-end management investment company that has been organized in connection with the Reorganization for the purpose of acquiring the assets and liabilities of the Target Fund. The Acquiring Fund will not commence operations until the date of the Reorganization. The Target Fund will be the accounting and performance survivor of the Reorganization. The Target Fund and the Acquiring Fund may each be referred to as a “Fund,” or together as the “Funds,” in this Proxy Statement/Prospectus. THESE SECURITIES HAVE NOT BEEN APPROVED OR DISAPPROVED BY THE U.S. SECURITIES AND EXCHANGE COMMISSION NOR HAS THE U.S. SECURITIES AND EXCHANGE COMMISSION PASSED UPON THE ACCURACY OR ADEQUACY OF THIS PROXY STATEMENT/PROSPECTUS. ANY REPRESENTATION TO THE CONTRARY IS A CRIMINAL OFFENSE. AN INVESTMENT IN THE ACQUIRING FUND IS NOT A DEPOSIT WITH A BANK AND IS NOT INSURED OR GUARANTEED BY THE FEDERAL DEPOSIT INSURANCE CORPORATION OR ANY OTHER GOVERNMENT AGENCY. YOU MAY LOSE MONEY BY INVESTING IN THE ACQUIRING FUND. 2 TABLE OF CONTENTS PAGE SUMMARY OF KEY INFORMATION 5 Why are you sending me the Proxy Statement/Prospectus? 5 On what am I being asked to vote? 5 What are the reasons for the proposed Reorganization? 5 How will the investments of the Acquiring Fund be managed? 6 Has the Target Fund Board approved the Reorganization? 6 What effect will the Reorganization have on me as a shareholder? 6 How do the Funds’ investment objectives and principal investment strategies compare? 6 How do the Funds’ expenses compare? 7 Expense Example 8 How do the performance records of the Funds compare? 8 H

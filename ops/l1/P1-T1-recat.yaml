 applicable nominee/ record holder, who will then provide the shareholder with a newly-issued control number. We note that obtaining a legal proxy may take several days. Requests for registration should be received no later than 5:00 p.m. ET on Monday, May 11, 2026. Once shareholders have obtained a new control number, they must visit www.viewproxy.com/fidelityfunds3/broadridgevsm/ and submit their name and newly issued control number in order to register to participate in and vote at the Meeting. Any shareholder who does not expect to virtually attend the Meeting is urged to vote using the touch-tone telephone or internet voting instructions that follow or by indicating voting instructions on the enclosed proxy card, dating and signing it, and returning it in the envelope provided, which needs no postage if mailed in the United States. In order to avoid unnecessary expense, we ask for your cooperation in responding promptly, no matter how large or small your holdings may be. If you wish to wait until the Meeting to vote your shares, you will need to follow the instructions available on the Meeting’s website during the Meeting in order to do so. INSTRUCTIONS FOR EXECUTING PROXY CARD The following general rules for executing proxy cards may be of assistance to you and help avoid the time and expense involved in validating your vote if you fail to execute your proxy card properly. 1. Individual Accounts: Your name should be signed exactly as it appears in the registration on the proxy card. 2. Joint Accounts: Either party may sign, but the name of the party signing should conform exactly to a name shown in the registration. 3. All other accounts should show the capacity of the individual signing. This can be shown either in the form of the account registration itself or by the individual executing the proxy card. For example: REGISTRATION VALID SIGNATURE A. 1) ABC Corp. John Smith, Treasurer 2) ABC Corp. John Smith, Treasurer c/o John Smith, Treasurer B. 1) ABC Corp. 
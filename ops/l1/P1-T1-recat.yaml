      497 1 d756849d497.htm WILLIAM BLAIR FUNDS William Blair Funds Table of Contents Filed pursuant to Rule 497(e) Under the Securities Act of 1933, as amended File No.:33-17463 William Blair Funds Small-Mid Cap Core Fund Prospectus August 30, 2019, as supplemented October 7, 2019 Table of Contents August 30, 2019, as supplemented October 7, 2019 William Blair Funds Class I Class R6 Small-Mid Cap Core Fund WBCIX WBCRX The Securities and Exchange Commission has not approved or disapproved these securities or passed upon the accuracy or adequacy of this prospectus. Any representation to the contrary is a criminal offense. William Blair Funds 150 North Riverside Plaza Chicago, Illinois 60606 IMPORTANT NOTE: Beginning on January 1, 2021, as permitted by regulations adopted by the Securities and Exchange Commission, paper copies of the William Blair Funds’ (the “Funds”) annual and semi-annual shareholder reports will no longer be sent by mail, unless you specifically request paper copies of the shareholder reports from the Funds or from your financial intermediary, such as a broker-dealer or bank. Instead, shareholder reports will be available on the Funds’ website (https://www.williamblairfunds.com/investor_services/prospectus_reports_forms.fs), and you will be notified by mail each time a report is posted and provided with a website link to access the report. If you already elected to receive shareholder reports electronically, you will not be affected by this change and you need not take any action. You may elect to receive shareholder reports and other communications from the Funds electronically by notifying your financial intermediary or, if you are a direct investor, by calling 1-800-635-2886. You may elect to receive all future shareholder reports in paper free of charge. You can inform your financial intermediary that you wish to continue receiving paper copies of your shareholder reports, or if you are a direct investor, by calling 1-800-635-2886. Your election to receive reports in paper will apply to all Funds you hold directly or through your financial intermediary, as applicable. Table of Contents TABLE OF CONTENTS Page Summary 1 Additional Information Regarding Investment Objectives and Strategies 5 Principal Risks 6 Management of the Funds 9 Your Account 12 Class I Shares 12 Class R6 Shares 12 Additional Information and Exceptions to Eligibility and Minimum Investment Requirements for Class I and Class R6 Shares 14 Additional Information on Other Payments to Financial Intermediaries 14 Buying, Selling and Exchanging Shares 14 How to Buy Shares 15 How to Sell Shares 18 How to Exchange Shares 19 Dividends and Distributions 20 Federal Income Taxes 21 Shareholder Services and Account Policies 23 Determination of Net Asset Value 25 Investment Glossary 27 Financial Highlights 29 For More Information 30 -i- Table of Contents WILLIAM BLAIR SMALL-MID CAP CORE FUND SUMMARY INVESTMENT OBJECTIVE: The William Blair Small-Mid Cap Core Fund (the “Fund”) seeks long-term capital appreciation. FEES AND EXPENSES: This table describes the fees and expenses that you may pay if you buy and hold shares of the Fund. Shareholder Fees (fees paid directly from your investment): Class I Class R6 Maximum Sales Charge (Load) Imposed on Purchases None None Redemption Fee None None Annual Fund Operating Expenses (expenses that you pay each year as a percentage of the value of your investment): Class I Class R6 Management Fee 0.90% 0.90% Distribution (Rule 12b-1) Fee None None Other Expenses* 0.21% 0.06% Total Annual Fund Operating Expenses 1.11% 0.96% Fee Waiver and/or Expense Reimbursement** 0.16% 0.06% Total Annual Fund Operating Expenses After Fee Waiver and/or Expense Reimbursement 0.95% 0.90% * The Fund commenced operations on October 1, 2019. Other Expenses are based on estimated amounts for the current fiscal period. ** William Blair Investment Management, LLC (the “Adviser”) has entered into a contractual agreement with the Fund to waive fees and/or reimburse expenses in order to limit the Fund’s operating expenses (excluding interest expenses, taxes, brokerage commissions, acquired fund fees and expenses, dividend and interest expenses on short sales, other investment-related costs and extraordinary expenses, such as litigation and other expenses not incurred in the ordinary course of the Fund’s business) to 0.95% and 0.90% of average daily net assets for Class I and Class R6 shares until April 30, 2021. The Adviser may not terminate this contractual agreement prior to April 30, 2021 without the approval of the Fund’s Board of Trustees. The Adviser is entitled to recoupment of previously waived fees and reimbursed expenses for a period of three years subsequent to the Fund’s commencement of operations to the extent that such recoupment does not cause the annual Fund operating expenses (after the recoupment is taken into account) to exceed both (1) the expense limit in place when such amounts were waived or reimbursed and (2) the Fund’s current expense limitation. Example: This example is intended to help you compare the cost of investing in shares of the Fund with the cost of investing in other mutual funds. The example assumes that you invest $10,000 in the Fund for the time periods indicated and then redeem all of your shares at the end of those periods. The example also assumes that your investment has a 5% return each year and the Fund’s operating expenses remain the same. The figures reflect the expense limitation for the first year. Although your actual costs may be higher or lower, based on these assumptions your costs would be: 1 Year 3 Years Class I $97 $320 Class R6 92 294 1 Table of Contents Portfolio Turnover: The Fund pays transaction costs, such as commissions, when it buys and sells securities (or “turns over” its portfolio). A higher portfolio turnover may indicate higher transaction costs and may result in higher taxes when Fund shares are held in a taxable account. These costs, which are not reflected in annual fund operating expenses or in the example, affect the Fund’s performance. The Fund commenced operations on October 1, 2019. The Fund’s portfolio turnover information will be reported after the Fund’s fiscal period ending December 31, 2019. PRINCIPAL INVESTMENT STRATEGIES: Under normal market conditions, the Fund invests at least 80% of its net assets (plus the amount of any borrowings for investment purposes) in stocks of small capitalized (“small cap”) and medium capitalized (“mid cap”) companies. The Fund invests in a diversified portfolio of equity securities, primarily common stocks, of small cap and mid cap U.S. companies that the Adviser deems to be of high quality but undervalued by the marketplace. For purposes of the Fund, the Adviser considers a company to be a small cap or a mid cap company if it has a market capitalization no larger than the largest capitalized company included in the Russell Midcap ® Index at the time of the Fund’s investment. Securities of companies whose market capitalizations no longer meet this definition after purchase may continue to be held in the Fund. To a limited extent, the Fund may also purchase stocks of companies with business characteristics similar to small cap and mid cap companies, but that may have market capitalizations above the market capitalization of the largest member of the Russell Midcap ® Index. The Russell Midcap ® Index measures the performance of the 800 companies with the lowest market capitalizations in the Russell 1000 ® Index. The size of companies in the Russell Midcap ® Index may change with market conditions. In addition, changes to the composition of the Russell Midcap ® Index can change the market capitalization range of companies included in the index. As of May 10, 2019 the Russell Midcap ® Index included securities issued by companies that ranged in size between $2.4 billion and $35.5 billion. The Russell 2500 Index, the Fund’s benchmark, measures the performance of the 2500 smallest companies in the Russell 3000 Index with a weighted average market capitalization of approximately $4.3 billion, median capitalization of $1.2 billion and market capitalization of the largest company at $18.7 billion. In choosing investments, the Adviser performs fundamental company analysis and focuses on stock selection. The Adviser evaluates the extent to which a company meets the criteria set forth below. All of the criteria are evaluated relative to the valuation of the security. The weight given to a particular investment criterion will depend upon the circumstances, and Fund holdings may not meet all of the following criteria: (a) the company should be, or should have the expectation of becoming, a significant provider in the primary markets it serves; (b) the company should have some distinctive attribute relative to present or potential competitors (this may, for example, take the form of proprietary products or processes, a unique distribution system, an entrenched brand name or an especially strong financial position relative to its competition); and (c) the company should have a strong management team. PRINCIPAL RISKS: The Fund’s returns will vary, and you could lose money by investing in the Fund. The following is a summary of the principal risks associated with an investment in the Fund. Equity Funds General. Because the Fund invests substantially all of its assets in equity securities, the primary risk is that the value of the equity securities it holds might decrease in response to the activities of an individual company or in response to general market, business and economic conditions. If this occurs, the Fund’s share price may also decrease. In addition, there is the risk that individual securities may not perform as expected or a strategy used by the Adviser may fail to produce its intended result. Market Risk. The value of the Fund’s investments may go up or down, sometimes rapidly or unpredictably. The value of an investment may decline due to factors affecting securities markets generally or particular industries represented in the securities markets. The value of an investment may decline due to general market conditions that are not specifically related to a particular company, such as real or perceived adverse economic 2 Table of Contents conditions, changes in the general outlook for corporate earnings, changes in interest or currency rates or adverse investor sentiment generally. During a general downturn in the securities markets, multiple asset classes may decline in value simultaneously. Small and Mid Cap Company Risk. Stocks of small and mid cap companies involve greater risk than those of larger, more established companies. This is because small and mid cap companies may be in earlier stages of development, may be dependent on a small number of products or services, may lack substantial capital reserves and/or do not have proven track records. Small and mid cap companies may be traded in low volumes. This can increase volatility and increase the risk that the Fund will not be able to sell a security on short notice at a reasonable price. The securities of small and mid cap companies may be more volatile and less liquid than securities of large capitalized companies. New Fund Risk. As a new fund, there can be no assurance that the Fund will grow to or maintain an economically viable size, in which case it could ultimately liquidate. Share Ownership Concentration Risk. To the extent that a significant portion of the Fund’s shares are held by a limited number of shareholders or their affiliates, there is a risk that the share trading activities of these shareholders could disrupt the Fund’s investment strategies, which could have adverse consequences for the Fund and other shareholders (e.g., by requiring the Fund to sell investments at inopportune times or causing the Fund to maintain larger-than-expected cash positions pending acquisition of investments). Style Risk. Different investment styles (e.g., growth vs. value, quality bias, market capitalization focus) tend to shift in and out of favor depending on market conditions and investor sentiment, and at times when the investment style used by the Adviser for the Fund is out of favor, the Fund may underperform other equity funds that use different investment styles. Liquidity Risk. Small and mid cap companies may be traded in low volumes. This can increase volatility and increase the risk that the Fund will not be able to sell a security on short notice at a reasonable price. The securities of small cap and mid cap companies may be more volatile and less liquid than securities of large capitalization companies. Focus Risk. To the extent that the Fund focuses its investments in particular industries, asset classes or sectors of the economy, any market changes affecting companies in those industries, asset classes or sectors may impact the Fund’s performance. Geopolitical Risk. Geopolitical and other events may disrupt securities markets and adversely affect global economies and markets and thereby decrease the value of the Fund’s investments. War, terrorism, economic uncertainty, and related geopolitical events have led, and in the future may lead, to increased short-term market volatility and may have adverse long-term effects on U.S. and world economies and markets generally. Operational and Technology Risk. Cyber-attacks, disruptions, or failures that affect the Fund’s service providers, counterparties, market participants, or issuers of securities held by the Fund may adversely affect the Fund and its shareholders, including by causing losses for the Fund or impairing Fund operations. The Fund is not intended to be a complete investment program and is designed for long-term investors. FUND PERFORMANCE HISTORY: Information on the Fund’s annual total returns and average annual total returns will be provided after the Fund has completed a full calendar year of operations. Updated performan

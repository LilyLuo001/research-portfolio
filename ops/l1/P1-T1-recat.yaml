      497 1 d857920d497.htm BLACKROCK FUNDS III BlackRock Funds III Table of Contents BLACKROCK FUNDS III BlackRock LifePath ® Dynamic 2025 Fund 400 Howard Street San Francisco, California 94105 (800) 441-7762 July 23, 2024 Dear Shareholder: I am writing to inform you about a reorganization that will affect your investment in BlackRock LifePath ® Dynamic 2025 Fund (the “Target Fund”), a series of BlackRock Funds III (the “Trust”), a Delaware statutory trust. As provided in an Agreement and Plan of Reorganization (the “Reorganization Agreement”), the Target Fund will be reorganized into BlackRock LifePath ® Dynamic Retirement Fund (the “Acquiring Fund”), a series of the Trust (the “Reorganization”). The Acquiring Fund is advised by BlackRock Fund Advisors (“BFA”), the same investment adviser to the Target Fund. Following the completion of the Reorganization, the Acquiring Fund may be referred to as the “Combined Fund.” The Target Fund and the Acquiring Fund are each referred to as a “Fund” and collectively referred to as the “Funds.” The Board of Trustees of the Trust (the “Board”) has determined that the Reorganization is in the best interests of each Fund, and that the interests of each Fund’s shareholders will not be diluted as a result of the Reorganization. The enclosed Combined Prospectus/Information Statement contains information about the Reorganization. As a result of the Reorganization, you will receive shares (including fractional shares, if any) of the class of shares in the Acquiring Fund set out in the table below with the same aggregate net asset value as the shares of the Target Fund you own immediately prior to the Reorganization: If you own the following Target Fund Shares: You will receive the following Acquiring Fund Shares: Investor A Investor A Investor C Investor C Institutional Institutional Class R Class R Class K Class K The Funds are part of the LifePath Dynamic investment program pursuant to which the Target Fund will have a substantially similar investment objective and investment strategies and identical investment policies, restrictions and risks as the Acquiring Fund as the target date of the Target Fund approaches in 2025. It is expected that the Reorganization will enable the Combined Fund to operate more efficiently in the future. BFA will continue as the investment adviser of the Combined Fund after the Reorganization and no change in portfolio managers will result from the Reorganization. In addition, no increase in advisory, administration or other fee rates will result from the Reorganization. The Target Fund and the Acquiring Fund have the same expense structure, the same types of fees and the same fee rates. Assuming the Reorganization had occurred on December 31, 2023, the Combined Fund would have (A) total annual fund operating expenses for each of its share classes to be issued in the Reorganization that are estimated to be lower than those of each of the corresponding share classes of the Target Fund prior to the Reorganization and (B) net annual fund operating expenses for each of its share classes to be issued in the Reorganization that are estimated to be the same as those of each of the corresponding share classes of the Target Fund prior to the Reorganization, after giving effect to all applicable contractual fee and expense waivers and/or reimbursements that BFA and BlackRock Advisors, LLC have agreed to continue through June 30, 2026 and June 30, 2035, in each case as of December 31, 2023. NO SHAREHOLDER ACTION IS REQUIRED AS A RESULT OF THE REORGANIZATION. Table of Contents In accordance with the Target Fund’s and the Acquiring Fund’s operative documents, and applicable Delaware state and U.S. federal law (including Rule 17a-8 under the Investment Company Act of 1940, as amended), the Reorganization may be effected without the approval of shareholders of any Fund. I encourage you to carefully review the enclosed materials, which explain the Reorganization in more detail. If you have any questions or need additional information, please contact BlackRock Investor Services at (800) 441-7762. Sincerely, John M. Perlowski President and Chief Executive Officer BlackRock LifePath ® Dynamic 2025 Fund B LACK R OCK F UNDS III 400 Howard Street San Francisco, California 94105 (800) 441-7762 Table of Contents QUESTIONS & ANSWERS We recommend that you read the complete Combined Prospectus/Information Statement. For your convenience, we have provided a brief overview of the Reorganization (as defined below). Q: Why is the Reorganization taking place? A: BlackRock LifePath ® Dynamic 2025 Fund (the “Target Fund”), a series of BlackRock Funds III (the “Trust”), and BlackRock LifePath ® Dynamic Retirement Fund (the “Acquiring Fund”), a series of the Trust, are part of the LifePath Dynamic investment program pursuant to which the Target Fund will have a substantially similar investment objective and investment strategies and identical investment policies, restrictions and risks as the Acquiring Fund as the target date of the Target Fund approaches in 2025. It is expected that the Reorganization will enable the Combined Fund (as defined below) to operate more efficiently in the future. The Board of Trustees of the Trust has determined that the Reorganization is in the best interests of each Fund (as defined below), and that the interests of each Fund’s shareholders will not be diluted as a result of the Reorganization. Q: What does the Reorganization provide for? A: Pursuant to an Agreement and Plan of Reorganization (the “Reorganization Agreement”) between the Trust, on behalf of the Target Fund, and the Trust, on behalf of the Acquiring Fund, the Target Fund will be reorganized into the Acquiring Fund (the “Reorganization”). Following the completion of the Reorganization, the Acquiring Fund may be referred to as the “Combined Fund.” The Target Fund and the Acquiring Fund are each referred to as a “Fund” and collectively referred to as the “Funds.” The Reorganization will result in each shareholder of the Target Fund becoming a shareholder of the Acquiring Fund, another mutual fund. The Acquiring Fund is advised by BlackRock Fund Advisors (“BFA”), the same investment adviser to the Target Fund. The Target Fund and the Acquiring Fund pursue a substantially similar investment objective and employ substantially similar investment strategies to achieve their respective investment objectives. The Reorganization Agreement provides for: Step 1: The transfer and delivery of substantially all of the assets of the Target Fund to the Acquiring Fund in exchange for the assumption by the Acquiring Fund of certain stated liabilities of the Target Fund and newly-issued shares of the Acquiring Fund, including fractional shares, if any (the “Acquiring Fund Shares”). Step 2: The distribution of the Acquiring Fund Shares pro rata by the Target Fund to its shareholders. Step 3: The termination, dissolution and liquidation of the Target Fund as a series of the Trust. Q: Do I need to vote for the Reorganization? A: No. No vote of shareholders will be taken with respect to the Reorganization. THE FUNDS ARE NOT ASKING FOR A PROXY AND YOU ARE NOT REQUESTED TO SEND A PROXY TO THE FUNDS WITH RESPECT TO THE REORGANIZATION. i Table of Contents Q: In the Reorganization, what class of shares of the Acquiring Fund will I receive? A: You will receive Acquiring Fund Shares as follows: If you own the following Target Fund Shares: You will receive the following Acquiring Fund Shares: Investor A Investor A Investor C Investor C Institutional Institutional Class R Class R Class K Class K Q: Will I own the same number of shares of the Combined Fund as I currently own of the Target Fund? A: No. You will receive shares, including fractional shares, if any, of the Acquiring Fund with the same aggregate net asset value (“NAV”) as the shares of the Target Fund you own immediately prior to the Reorganization. However, the number of Acquiring Fund Shares you receive will depend on the relative NAV per share for the applicable class of the Target Fund and the Acquiring Fund computed as of the close of trading on the New York Stock Exchange on the business day immediately prior to the closing of the Reorganization (“Valuation Time”), after the declaration of payment of applicable dividends and/or other distributions. Thus, if as of the Valuation Time the NAV of a share of the Acquiring Fund is lower than the NAV of the corresponding share class of the Target Fund, you will receive a greater number of Acquiring Fund Shares in the Reorganization than you held in the Target Fund immediately prior to the Reorganization. On the other hand, if the NAV of a share of the Acquiring Fund is higher than the NAV of the corresponding share class of the Target Fund, you will receive fewer Acquiring Fund Shares in the Reorganization than you held in the Target Fund immediately prior to the Reorganization. The aggregate NAV of your Combined Fund shares immediately after the Reorganization will be the same as the aggregate NAV of your Target Fund shares immediately prior to the Reorganization. Q: Who will advise the Combined Fund once the Reorganization is completed? A: The Acquiring Fund and the Target Fund are advised by BFA, and BFA will continue to advise the Combined Fund once the Reorganization is completed. The Acquiring Fund and the Target Fund are sub-advised by BlackRock International Limited (“BIL”) and BlackRock (Singapore) Limited (“BRS”). BIL and BRS will continue to sub-advise the Combined Fund once the Reorganization is completed. Each of BFA, BIL and BRS is an indirect wholly-owned subsidiary of BlackRock, Inc. Q: How will the Reorganization affect Fund fees and expenses? A: The Target Fund and the Acquiring Fund have the same expense structure, the same types of fees and the same fee rates. Assuming the Reorganization had occurred on December 31, 2023, the Combined Fund would have (A) total annual fund operating expenses for each of its share classes to be issued in the Reorganization that are estimated to be lower than those of each of the corresponding share classes of the Target Fund prior to the Reorganization and (B) net annual fund operating expenses for each of its share classes to be issued in the Reorganization that are estimated to be the same as those of each of the corresponding share classes of the Target Fund prior to the Reorganization, after giving effect to all applicable contractual fee and expense waivers and/or reimbursements that BFA and BlackRock Advisors, LLC have agreed to continue through June 30, 2026 and June 30, 2035, in each case as of December 31, 2023. Q: Are there any differences in distribution and service fees or front-end sales charges or contingent deferred sales charges? A: The distribution and service fees and sales charges (including contingent deferred sales charges (“CDSCs”)) on the shares of the Acquiring Fund to be issued in the Reorganization to the holders of shares of the Target Fund will be identical to the corresponding charges on the shares of the Target Fund held by such shareholders immediately prior to the Reorganization. ii Table of Contents Q: Will I have to pay any sales charge, commission or other similar fee in connection with the Reorganization? A: No, you will not have to pay any sales charge, commission or other similar fee in connection with the Reorganization. As more fully discussed in the Combined Prospectus/Information Statement, the holding period with respect to any CDSC that applies to shares of the Acquiring Fund acquired by you in the Reorganization will be measured from the earlier of the time (i) you purchased your Target Fund shares or (ii) you purchased your shares of any other fund advised by BFA and subsequently exchanged them for shares of the Target Fund. Q: Do I need to take any action in connection with the Reorganization? A: No. Your shares will automatically be converted into shares of the Acquiring Fund on the date of the completion of the Reorganization. You will receive written confirmation that this change has taken place. No certificates for shares will be issued in connection with the Reorganization. The aggregate net asset value of the Acquiring Fund Shares you receive in the Reorganization will be equal to the aggregate net asset value of the shares you own in the Target Fund immediately prior to the Reorganization. Q: Will the Reorganization create a taxable event for me? A: The Reorganization is expected to qualify as a tax-free “reorganization” under Section 368(a) of the Internal Revenue Code of 1986, as amended (the “Code”). In general, if the Reorganization so qualifies, the Target Fund and the Acquiring Fund will not recognize any gain or loss for U.S. federal income tax purposes from the transactions contemplated by the Reorganization (except for any gain or loss that may be required to be recognized solely as a result of the close of the Target Fund’s taxable year due to the Reorganization or as a result of the transfer of certain assets). At any time before the Reorganization takes place, a shareholder may redeem shares of the Target Fund. Generally, such redemptions would be taxable transactions. It is anticipated that the Target Fund will dispose of certain of its holdings prior to the Reorganization in connection with realigning the Target Fund’s portfolio (“Realignment Sales”); however, it is expected that the transaction costs and capital gains impact of such dispositions will be minimal. When such portfolio assets are sold in the Realignment Sales, or deemed sold as a result of the termination of the Target Fund’s taxable year due to the Reorganization, the tax impact of such sales, deemed sales or transfers will depend on the difference between the price at which such portfolio assets are sold, deemed sold or transferred, and the Target Fund’s basis in such assets. Based on the value of portfolio securities as of May 31, 2024, any net capital ga

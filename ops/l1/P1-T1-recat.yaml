      497K 1 absolute-cefo_sumpro.htm 497K SUMMARY PROSPECTUS August 1, 2025 ABSOLUTE INVESTMENT ADVISERS LLC ABSOLUTE CEF OPPORTUNITIES (formerly Absolute Strategies Fund) INSTITUTIONAL SHARES (ACEFX) Before you invest, you may want to review the Fund’s prospectus, which contains more information about the Fund and its risks. You can find the Fund’s prospectus and other information about the Fund, including its statement of additional information (SAI) and most recent reports to shareholders, online at www.absoluteadvisers.com. You can also get this information at no cost by calling (888) 99 ABSOLUTE or (888) 992-2765 (toll free) or by sending an e-mail request to fulfillment@ultimusfundsolutions.com. This Summary Prospectus incorporates by reference the Fund’s entire prospectus and SAI, each dated August 1, 2025. ABSOLUTE CEF OPPORTUNITIES Summary Section Investment Objective Absolute CEF Opportunities (the “Fund”) seeks to achieve long-term capital appreciation with an emphasis on absolute (positive) returns and low sensitivity to traditional financial market indices such as the Standard & Poor’s 500 ® Index (“S&P 500 ® Index”). Fees and Expenses This table describes the fees and expenses that you may pay if you buy, hold, and sell shares of the Fund. You may pay other fees, such as brokerage commissions and other fees to financial intermediaries, which are not reflected in the tables and examples below . Annual Fund Operating Expenses (expenses that you pay each year as a percentage of the value of your investment) Management Fees 1.40% Distribution and/or Service (12b-1) Fees NONE Other Expenses 3.00% Dividend and Interest Expenses on Short Sales (1) 1.11% Acquired Fund Fees and Expenses (2) 1.53% Total Annual Fund Operating Expenses (3) 7.04% Fee Waiver and/or Expense Reimbursement (4) (2.61)% Total Annual Fund Operating Expenses (After Fee Waiver and/or Expense Reimbursement) (1)(3) 4.43% (1) Dividend and Interest Expenses on Short Sales include margin interest expense which is not included in Dividend and Interest Expenses on Short Sales included in the financial highlights. (2) Acquired Fund Fees and Expenses (“AFFE”) are fees and expenses incurred by the Fund in connection with its investments in other investment companies. AFFE is estimated for the current fiscal year. (3) Total Annual Fund Operating Expenses do not correlate to the ratio of expenses to average net assets given in the financial highlights due to a reduction in the expense cap for the Fund and because they do not include AFFE. Further, because AFFE is estimated for the current fiscal year, Total Annual Fund Operating Expenses in the table above are estimated for the current fiscal year. (4) Absolute Investment Advisers, LLC (“Absolute”) has contractually agreed to waive its management fee and/or reimburse certain operating expenses, but only to the extent necessary so that the Fund’s total annual operating expenses, excluding portfolio transaction and other investment-related costs (including brokerage fees and commissions); taxes; borrowing costs (such as interest and dividend expenses on securities sold short); acquired fund fees and expenses; fees and expenses associated with investments in other collective investment vehicles or derivative instruments (including for example option and swap fees and expenses); any administrative and/or shareholder servicing fees payable pursuant to a plan adopted by the Board; expenses incurred in connection with any merger or reorganization; extraordinary expenses (such as litigation expenses, indemnification of Trust officers and Trustees and contractual indemnification of Fund service providers); and 1 ABSOLUTE CEF OPPORTUNITIES other expenses that the Trustees agree have not been incurred in the ordinary course of the Fund’s business, does not exceed 1.79% through July 31, 2026 (the “Expense Cap”). This Expense Cap may not be terminated prior to this date except by the Board of Trustees upon sixty (60) days’ written notice to Absolute. Absolute may recoup from the Fund fees waived (other than management fees waived by Absolute related to the Fund’s investments in other pooled vehicles sponsored by Absolute) and expenses reimbursed by Absolute pursuant to the Expense Cap in the three years following the date the particular waiver/expense payment occurred in connection with the Fund or the Predecessor Fund, but only if such recoupment can be achieved without exceeding the annual expense limitation in effect at the time of the waiver/expense payment and any expense limitation in effect at the time of the recoupment. Absolute has contractually agreed to waive its investment management fees related to any Fund assets invested in pooled vehicles sponsored by Absolute. Example. This Example is intended to help you compare the cost of investing in the Fund with the cost of investing in other mutual funds. The Example assumes that you invest $10,000 in the Fund for the time periods indicated and then hold or redeem all of your shares at the end of those periods. The Example also assumes that your investment has a 5% return each year and that the Fund’s operating expenses remain the same. Although your actual costs may be higher or lower, based on these assumptions, whether you do or do not redeem your shares at the end of each period described below, your costs would be: 1 Year 3 Years 5 Years 10 Years $444 $1,832 $3,163 $6,260 Portfolio Turnover. The Fund pays transaction costs, such as commissions, when it buys and sells securities (or “turns over” its portfolio). A higher portfolio turnover rate may indicate higher transaction costs and may result in higher taxes when Fund shares are held in a taxable account. These costs, which are not reflected in annual fund operating expenses or in the Example, affect the Fund’s performance. During the most recent fiscal year, the Fund’s portfolio turnover rate was 169% of the average value of its portfolio. Principal Investment Strategies Absolute believes that there are important benefits that come from pursuing the Fund’s investment objective by primarily investing, under normal circumstances, at least 80% of its net assets (plus the amount of any borrowings for investment purposes) will be investments in publicly traded closed-end funds (“CEFs”), including buying securities issued by CEFs, or selling short CEF securities. The Adviser believes that certain features of CEFs can create significant market inefficiencies, and the Fund will opportunistically pursue investments created by or otherwise related to those inefficiencies. One such market inefficiency relates to differences between the trading price of the shares of a CEF as compared to the net asset value (“NAV”) of the securities and other assets held by that CEF. The Adviser focuses on relative value and event driven strategies in any given asset class. A relative value assessment involves identifying securities that the Adviser believes are mispriced relative to their NAV. The Adviser purchases securities that it believes are undervalued and shorts securities that it believes are overvalued. Relative value trades tend to be longer in nature as the Adviser buys long or sells short a CEF when that security is believed to be mispriced. Typically, the Adviser will believe there is a catalyst that will push the price of the security up or down. Some catalysts include dividend changes, activist ownership, interest rate changes, and other market conditions. 2 ABSOLUTE CEF OPPORTUNITIES An event-driven strategy is when the Adviser opportunistically invests in a security when the Adviser believes an upcoming circumstance or situation has the potential to produce positive returns. Event-driven opportunities tend to be shorter-term in nature. These potential investments are expected to be more dependent on the outcome of special situations or corporate actions related to a CEF. Some of these events include tender offers, rights offerings, fund mergers, and fund liquidations, or fund conversions into an ETF or an open-end fund, among others. Shorting may be used in two main ways: 1. Strategically hedge out exposure to a certain sector (i.e., mitigating risk) 2. As part of its “Event Driven” strategy by shorting a security when the Adviser believes the price will decline based on news, e.g. CEF cuts their dividend, or future event, i.e., a fund is merging into another fund, and as part of its “Relative Value” strategy by shorting a security that the Adviser believes to be overvalued relative to its NAV. Other Investments Although the Fund will invest primarily in CEFs, the Adviser may also invest a portion of the Fund’s assets in exchange-traded funds (“ETFs”). The Fund may utilize ETFs to gain market exposure, or as a hedge. ETFs differ from CEFs in that institutional investors can create and redeem shares on a daily basis., and therefore, their share prices are typically very close to NAV. Principal Investment Risks All investments involve risks, and the Fund cannot guarantee that it will achieve its investment objective. An investment in the Fund is not insured or guaranteed by any government agency. As with any mutual fund investment, the Fund’s returns and share price will fluctuate, and you may lose money by investing in the Fund. It is important that you closely review and understand the risks of investing in the Fund prior to making an investment in the Fund. Closed-End Fund Risk. The Fund expects to invest primarily in CEFs, and may also sell CEFs short, the shares of which may trade at a premium or discount to their net asset value. CEFs differ from open-end investment funds in that holders of interests in a CEF do not have the right to redeem their interests on a daily basis at a price based on net asset value. The CEF shares in which the Fund may trade may be traded on one or more U.S. or foreign exchanges. The Fund may also trade shares of CEFs that trade sporadically, are illiquid and may not be traded on an exchange. CEFs may be subject to various trading restrictions. The Fund will generally not have any control over the investments made by CEFs and will generally only have limited access to information about the CEFs and their investments. CEFs generally trade independently of each other and, at times, may hold economically offsetting positions. At times CEFs may make in kind distributions which could result in the Fund owning securities that were in a CEF’s portfolio. These securities may be illiquid and may take considerable time to sell. If a CEF converts to open-end status, such conversion may result in the Fund holding shares in an open-end fund. As a part of such conversion the new open-end fund’s withdrawal terms may have associated withdrawal fees, which often decline over time and consequently, if such open-end fund’s shares are held by the Fund, certain withdrawals by the Fund from such open-end fund may be subject to a withdrawal fee. Certain CEFs may also employ leverage, which may amplify investment gains and losses. 3 ABSOLUTE CEF OPPORTUNITIES Closed-End Fund Adviser Risk. Fund performance may be dependent upon the success of the advisers in the underlying CEFs that the Fund invests in while in the pursuit of their investment objectives. A CEF’s performance may depend on the success of the CEF advisers’ methodology. In addition, various CEFs in the Fund’s portfolio could enter into conflicting transactions (e.g. one CEF adviser purchasing a security at the same time another CEF adviser sells the same security or one CEF takes a long position in a security that another CEF has also sold short), which depending on the performance of such securities and the economic environment, could be beneficial or detrimental to the Fund’s performance. Since each underlying CEF will have a different portfolio manager the Fund’s portfolio turnover rate could increase, which could result in higher levels of realized capital gains or losses, higher brokerage commissions and other transaction costs. A CEF adviser may have limited experience managing funds, which, unlike other funds these advisers manage, are subject to daily inflows and outflows of investor cash and are subject to certain legal and tax-related restrictions on their investments and operations. Fund of Funds Risk. The Fund, as a shareholder of the CEFs, ETFs, or other funds (“Underlying Funds”), indirectly bears its proportionate share of any investment management fees and other expenses of the Underlying Funds. Further, due to the fees and expenses paid by the Fund, as well as small variations in the Fund’s actual allocations to the Underlying Funds and any derivatives and cash held in the Fund’s portfolio, the performance and income distributions of the Fund will not be the same as the performance and income distributions of the Underlying Funds. Event Driven Risk. Investments in CEFs that the Adviser expects will be involved in a special event carry the risk that the expected event or transaction may not be completed or may be completed on less favorable terms than originally expected, which may lower the Fund’s performance. Short Sale Risk. If the price of CEF shares which the Fund has borrowed and sold to other investors has gone up since the time the Fund borrowed the CEF shares and sold them, the Fund will lose money on the investment. Although the Fund’s gain is limited by the amount for which it sold the borrowed security, its potential loss is unlimited. A mutual fund that engages in short selling is more risky than other mutual funds that do not engage in short selling. Equity Risk. Equity securities, which include common stocks, convertible securities, preferred stocks, rights and sponsored and unsponsored ADRs may decline in value because of changes in the price of a particular holding or a broad stock market decline. Common stock ranks below preferred stock and debt securities in claims for dividends and for assets of the company in a liquidation or

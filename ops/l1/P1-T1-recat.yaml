      N-14 1 d855961dn14.htm N-14 N-14 Table of Contents As filed with the Securities and Exchange Commission on July 9, 2024 Securities Act File No. 333- U.S. SECURITIES AND EXCHANGE COMMISSION Washington, D.C. 20549 FORM N-14 REGISTRATION STATEMENT UNDER THE SECURITIES ACT OF 1933 Pre-Effective Amendment No. ☐ Post-Effective Amendment No. (Check appropriate box or boxes) ☐ iShares Trust (Exact Name of Registrant as Specified in the Charter) c/o BlackRock Fund Advisors 400 Howard Street San Francisco, California 94105 (Address of Principal Executive Office) Registrant’s Telephone Number: (415) 670-2000 The Corporation Trust Company 1209 Orange Street Wilmington, DE 19801 (Name and Address of Agent for Service) Copies to: Margery K. Neale, Esq. Benjamin J. Haskin, Esq. Anne C. Choe, Esq. Willkie Farr & Gallagher LLP 787 Seventh Avenue New York, New York 10019 Marisa Rolland, Esq. BlackRock Fund Advisors 400 Howard Street San Francisco, CA 94105 Approximate Date of Proposed Public Offering: As soon as practicable after this Registration Statement becomes effective under the Securities Act of 1933. Title of Securities Being Registered: Shares of Beneficial Interest. Calculation of Registration Fee under the Securities Act of 1933: No filing fee is required because of reliance on Section 24(f) and Rule 24f-2 under the Investment Company Act of 1940. The Registrant hereby amends this registration statement on such date or dates as may be necessary to delay its effective date until the Registrant shall file a further amendment which specifically states that this registration statement shall thereafter become effective in accordance with Section 8(a) of the Securities Act of 1933 or until this registration statement shall become effective on such date as the Securities and Exchange Commission, acting pursuant to said Section 8(a), may determine. Table of Contents EXPLANATORY NOTE This Registration Statement is organized as follows: 1. Letter to Shareholders of iShares LifePath Target Date 2025 ETF, a series of iShares Trust. 2. Questions and Answers for Shareholders of iShares LifePath Target Date 2025 ETF, a series of iShares Trust. 3. Combined Prospectus/Information Statement regarding the reorganization of iShares LifePath Target Date 2025 ETF, a series of iShares Trust, into iShares LifePath Retirement ETF, a series of iShares Trust. 4. Statement of Additional Information regarding the reorganization of iShares LifePath Target Date 2025 ETF, a series of iShares Trust, into iShares LifePath Retirement ETF, a series of iShares Trust. 5. Part C Information 6. Exhibits - 2 - Table of Contents ISHARES TRUST iShares LifePath Target Date 2025 ETF 400 Howard Street San Francisco, California 94105 (415) 670-2000 [•], 2024 Dear Shareholder: The Board of Trustees (the “Board”) of iShares Trust, a Delaware statutory trust (the “Trust”), is pleased to announce, as provided in an Agreement and Plan of Reorganization (the “Reorganization Agreement”), the iShares LifePath Target Date 2025 ETF (the “Target Fund”), a series of the Trust, will be reorganized into iShares LifePath Retirement ETF (the “Acquiring Fund”), a series of the Trust (the “Reorganization”). The Reorganization does not require your approval, and you are not being asked to vote. We do, however, ask that you review the enclosed Combined Prospectus/Information Statement, which contains information about the Acquiring Fund, outlines certain aspects of the Target Fund and the Acquiring Fund and provides details about the terms and conditions of the Reorganization. You should review the Combined Prospectus/Information Statement carefully and retain it for future reference. If the Reorganization is completed, the Target Fund shares you own will be exchanged for shares of the Acquiring Fund (plus cash in lieu of fractional shares, if any) with the same aggregate net asset value as your Target Fund shares. It is currently anticipated that the Reorganization of the Target Fund will be effected on a tax-free basis for U.S. federal income tax purposes, except for any taxes that may be imposed as a result of the receipt of cash in lieu of fractional shares. As described in the Combined Prospectus/Information Statement, BlackRock Fund Advisors, the Target Fund and Acquiring Fund’s investment adviser, has proposed the Reorganization because during the year prior to the Target Fund’s maturity date, its allocation of assets is expected to be similar to that of the Acquiring Fund. As disclosed in the Target Fund’s prospectus, as the Target Fund’s target date approaches, the Target Fund and the Acquiring Fund are expected to, subject to approval by the Board, merge into a single fund. The Combined Fund may give rise to operating efficiencies from a larger net asset size managed in a single vehicle. The Board of Trustees of the Trust believes the Reorganization is in the best interest of the Target Fund and has approved the Reorganization. As always, we appreciate your support. Sincerely, Jessica Tan President iShares LifePath Target Date 2025 ETF iShares Trust 400 Howard Street San Francisco, California 94105 (415) 670-2000 - 3 - Table of Contents QUESTIONS & ANSWERS We recommend that you read the complete Combined Prospectus/Information Statement. The following Questions and Answers provide an overview of the key features of the reorganization and of the information contained in this Combined Prospectus/Information Statement. Q-1: What is this document and why did we send it to you? A-1: This is a Combined Prospectus/Information Statement that provides you with information about an agreement and plan of reorganization (the “Reorganization Agreement”) between iShares LifePath Target Date 2025 ETF (the “Target Fund”), a series of iShares Trust, a Delaware statutory trust (the “Trust”), and iShares LifePath Retirement ETF (the “Acquiring Fund”), a series of the Trust (the “Reorganization”). BlackRock Fund Advisors (“BFA”) serves as investment adviser for each of the Target Fund and the Acquiring Fund. When the Reorganization is completed, you will become a shareholder of the Acquiring Fund, and the Target Fund will be terminated. The Acquiring Fund, following completion of the Reorganization, may be referred to as the “Combined Fund” in this Combined Prospectus/Information Statement. Please refer to the Combined Prospectus/Information Statement for a detailed explanation of the Reorganization and for a more complete description of the Acquiring Fund. You are receiving this Combined Prospectus/Information Statement because you owned shares of the Target Fund as of [•], 2024. The Reorganization does not require approval by shareholders of either the Target Fund or the Acquiring Fund, and you are not being asked to vote. Q-2: Why did BFA propose the Reorganization to the Board? A-2: The Target Fund and the Acquiring Fund are part of a group of funds referred to as the “LifePath ETFs,” each of which seeks to provide for retirement outcomes based on quantitatively measured risk that investors on average may be willing to accept given a particular time horizon, pursuant to which the Target Fund will have a similar investment objective and substantially similar investment policies, strategies, restrictions and risks as the Acquiring Fund as the target date of the Target Fund approaches in 2025. As disclosed in the Target Fund’s prospectus, as the Target Fund’s target date approaches, the Target Fund and the Acquiring Fund are expected to, subject to approval by the Board, merge into a single fund. BFA has proposed the Reorganization because during the year prior to the Target Fund’s maturity date, its allocation of assets is expected to be similar to that of the Acquiring Fund, and the Combined Fund may give rise to operating efficiencies from a larger net asset size managed in a single vehicle. Q-3: Did the Board of Trustees of the Trust approve the Reorganization? A-3: Yes, the Board of Trustees of the Trust (the “Board,” and its members, the “Trustees”) approved the Reorganization. After careful consideration, the Board, including a majority of the Trustees who are not “interested persons” of the Trust (as defined in the Investment Company Act of 1940, as amended) determined that the Reorganization is in the best interest of the Target Fund and that the Target Fund’s existing shareholders will not be diluted as a result of the Reorganization and approved the Reorganization. Q-4: How will I be affected by the Reorganization? A-4: The Reorganization will result in each shareholder of the Target Fund becoming a shareholder of the Acquiring Fund, another exchange-traded fund. The Target Fund and the Acquiring Fund pursue similar investment objectives and employ substantially similar investment strategies to achieve their respective investment objectives. The Reorganization Agreement provides for: i Table of Contents Step 1: The transfer and delivery of substantially all of the assets of the Target Fund to the Acquiring Fund in exchange for the assumption by the Acquiring Fund of certain stated liabilities of the Target Fund and newly-issued shares of the Acquiring Fund (the “Acquiring Fund Shares”) and cash in lieu of fractional shares, if any. Step 2: The distribution of the Acquiring Fund Shares pro rata by the Target Fund to its shareholders. Step 3: The termination, dissolution and liquidation of the Target Fund as a series of the Trust. Q-5: Once the Reorganization is completed, who will be the investment adviser of the Combined Fund? A-5: Both the Target Fund and the Acquiring Fund are advised by BFA, and the Combined Fund will be advised by BFA once the Reorganization is completed. Christopher Chung and Suzanne Ly are the portfolio managers of the Target Fund and the Acquiring Fund and are expected to be the portfolio managers of the Combined Fund once the Reorganization is completed. Q-6: How will the Reorganization affect fund fees and expenses? A-6: The contractual fees and expenses of the Combined Fund are expected to be the same as those of the Target Fund. For its investment advisory services to each Fund, BFA is paid a management fee from each Fund based on a percentage of each Fund’s average daily net assets, at the annual rate of 0.00%. Q-7: Will I have to pay any commission in connection with the Reorganization? A-7: No, you will not pay any commission in connection with the Reorganization. Q-8: What happens to my shares if the Reorganization is completed? Will I have to take any action? A-8: No. Your shares will automatically be converted into shares of the Acquiring Fund on the date of the completion of the Reorganization. You will receive written confirmation that this change has taken place. No certificates for shares will be issued in connection with the Reorganization. The aggregate NAV of the Acquiring Fund Shares you receive in the Reorganization plus any cash received in lieu of fractional shares will be equal to the aggregate NAV of the shares you own in the Target Fund immediately prior to the Reorganization. Q-9: Will the Reorganization create a taxable event for me? A-9: The Reorganization is expected to qualify as a tax-free “reorganization” within the meaning of section 368(a) of the U.S. Internal Revenue Code of 1986, as amended. If the Reorganization so qualifies, in general, the Target Fund will not recognize any gain or loss as a result of the transfer of all of its assets and liabilities in exchange for shares of the Acquiring Fund or as a result of its liquidation, and shareholders of the Target Fund will not recognize any gain or loss upon receipt of shares of the Acquiring Fund in connection with the Reorganization, except to the extent that a Target Fund shareholder receives cash in lieu of fractional shares of the Acquiring Fund. Q-10: What if I sell my shares before the Reorganization takes place? A-10: If you choose to sell your shares before the Reorganization takes place, then the sale will be treated as a normal sale of shares and, generally, will be a taxable transaction. Q-11: Who will pay for the Reorganization? A-11: BFA has agreed to pay all of the costs associated with the Reorganization. Q-12: When will the Reorganization occur? ii Table of Contents A-12: The Reorganization is expected to occur during the fourth quarter of 2024. Q-13: Whom do I contact if I have questions? A-13: If you need any assistance, or have any questions regarding the Reorganization, please call 1-800-iShares (1-800-474-2737). Important additional information about the Reorganization is set forth in the accompanying Combined Prospectus/Information Statement. Please read it carefully. iii Table of Contents The information in this Combined Prospectus/Information Statement is not complete and may be changed. We may not sell these securities until the registration statement filed with the Securities and Exchange Commission is effective. This Combined Prospectus/Information Statement is not an offer to sell these securities and it is not soliciting an offer to buy these securities in any state where the offer or sale is not permitted. SUBJECT TO COMPLETION, DATED July 9, 2024 COMBINED PROSPECTUS/INFORMATION STATEMENT ISHARES TRUST iShares LifePath Target Date 2025 ETF ISHARES TRUST iShares LifePath Retirement ETF c/o BlackRock Fund Advisors 400 Howard Street San Francisco, California 94105 (415) 670-2000 This Combined Prospectus/Information Statement is furnished to you as a shareholder of BlackRock LifePath Target Date 2025 ETF (the “Target Fund”), a series of iShares Trust (the “Trust”), a Delaware statutory trust. As provided in an Agreement and Plan of Reorganization (the “Reorganization Agreement”), the Target Fund will be reorganized into iShares LifePath Retirement ETF (the “Acquiring Fund”), a series of the Trust (the “Reorganization”). Following the completion of the Reorganization, the Acquiring Fund may be referred to as the “Combined Fund.” The Target Fund and the Acquiring 
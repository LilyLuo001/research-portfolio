      497 1 vaneckfundssaioctober2021.htm 497E CONSOLIDATED SAI VanEckFundsSAIOctober2021 VANECK FUNDS STATEMENT OF ADDITIONAL INFORMATION Dated October 21, 2021 EMERGING MARKETS LEADERS FUND 1 CLASS A: ELMAX / CLASS I: ELMIX / CLASS Y: ELMYX / CLASS Z: ELMZX Dated July 12, 2021 ENVIRONMENTAL SUSTAINABILITY FUND CLASS A: ENVAX / CLASS I: ENVIX / CLASS Y: ENVYX Dated May 1, 2021, as revised on July 12, 2021 and October 21, 2021 CM COMMODITY INDEX FUND CLASS A: CMCAX / CLASS I: COMIX / CLASS Y: CMCYX EMERGING MARKETS BOND FUND CLASS A: EMBAX / CLASS I: EMBUX / CLASS Y: EMBYX EMERGING MARKETS FUND CLASS A : GBFAX / CLASS C: EMRCX / CLASS I: EMRIX / CLASS Y: EMRYX/ CLASS Z: EMRZX GLOBAL RESOURCES FUND CLASS A : GHAAX / CLASS C: GHACX / CLASS I: GHAIX / CLASS Y: GHAYX INTERNATIONAL INVESTORS GOLD FUND CLASS A : INIVX / CLASS C: IIGCX / CLASS I: INIIX / CLASS Y: INIYX VANECK MORNINGSTAR WIDE MOAT FUND CLASS I: MWMIX / CLASS Z: MWMZX VANECK NDR MANAGED ALLOCATION FUND CLASS A: NDRMX / CLASS I: NDRUX / CLASS Y: NDRYX This statement of additional information (“SAI”) is not a prospectus. It should be read in conjunction with the prospectuses for VanEck Funds (the "Trust") dated (i) May 1, 2021, relating to CM Commodity Index Fund, Emerging Markets Bond Fund, Emerging Markets Fund, Global Resources Fund, International Investors Gold Fund, VanEck Morningstar Wide Moat Fund and VanEck NDR Managed Allocation Fund; (ii) July 12, 2021 relating to Environmental Sustainability Fund; and (iii) October 21, 2021 relating to Emerging Markets Leaders Fund (each, a “Fund” and collectively, the “Funds”), as each may be revised from time to time (each, a “Prospectus”). The audited financial statements of the Funds (except for Emer g ing Mar kets Leaders Fund and Environmental Sustainability Fund ) for the fiscal year ended December 31, 2020 are hereby incorporated by reference from the Funds’ Annual Report to shareholders. A copy of the Prospectuses and Annual and Semi-Annual Reports for the Trust, relating to the Funds, may be obtained without charge by visiting the VanEck website at vaneck.com, by calling toll-free 800.826.1115 or by writing to the Trust or Van Eck Securities Corporation, the Funds’ distributor (the “Distributor”). The Trust’s and the Distributor’s address is 666 Third Avenue, 9th Floor, New York, New York 10017. Capitalized terms used herein that are not defined have the same meaning as in the Prospectuses, unless otherwise noted. 1 Emerging Market Leaders Fund has not commenced operations as of the date of this Statement of Additional Information. TABLE OF CONTENTS Page GENERAL INFORMATION 1 INVESTMENT POLICIES AND RISKS 1 ADDITIONAL INFORMATION ABOUT THE CMCI 27 ADDITIONAL INFORMATION ABOUT MORNINGSTAR WIDE MOAT FOCUS INDEX 28 FUNDAMENTAL INVESTMENT RESTRICTIONS 29 PORTFOLIO HOLDINGS DISCLOSURE 31 INVESTMENT ADVISORY SERVICES 32 THE DISTRIBUTOR 36 PLAN OF DISTRIBUTION (12B-1 PLAN) 37 ADMINISTRATIVE AND PROCESSING SUPPORT PAYMENTS 39 PORTFOLIO MANAGER COMPENSATION 40 PORTFOLIO MANAGER SHARE OWNERSHIP 40 OTHER ACCOUNTS MANAGED BY THE PORTFOLIO MANAGERS 41 SECURITIES LENDING ARRANGEMENTS 43 PORTFOLIO TRANSACTIONS AND BROKERAGE 45 TRUSTEES AND OFFICERS 48 TRUSTEE INFORMATION 50 OFFICER INFORMATION 53 TRUSTEE SHARE OWNERSHIP 54 2020 COMPENSATION TABLE 56 PRINCIPAL SHAREHOLDERS 57 POTENTIAL CONFLICTS OF INTEREST 76 PROXY VOTING POLICIES AND PROCEDURES 76 CODE OF ETHICS 76 PURCHASE OF SHARES 77 AVAILABILITY OF DISCOUNTS 77 VALUATION OF SHARES 78 EXCHANGE PRIVILEGE 80 CLASS CONVERSIONS 80 INVESTMENT PROGRAMS 80 TAXES 82 TAXATION OF THE FUNDS IN GENERAL 82 TAXATION OF THE FUNDS' INVESTMENTS 83 TAXATION OF U.S. INVESTORS 86 TAXATION OF NON-U.S. INVESTORS 88 FOREIGN ACCOUNT TAX COMPLIANCE ACT 88 ADDITIONAL PURCHASE AND REDEMPTION INFORMATION 89 DESCRIPTION OF THE TRUST 89 ADDITIONAL INFORMATION 90 FINANCIAL STATEMENTS 90 LICENSING AGREEMENTS AND DISCLAIMERS 90 APPENDIX A: VEAC AND VEARA PROXY VOTING POLICIES A- 1 i STATEMENT OF ADDITIONAL INFORMATION OCTOBER 21, 2021 GENERAL INFORMATION The Trust is an open-end management investment company organized as a business trust under the laws of the Commonwealth of Massachusetts on April 3, 1985. On May 1, 2016, Van Eck Funds changed its name to VanEck Funds. The Trust’s series which are currently being offered are the following: Emerging Markets Fund, which offers Class A, Class C, Class I, Class Y and Class Z shares; Global Resources Fund (formerly, Global Hard Assets Fund prior to May 1, 2021) and International Investors Gold Fund, each of which offers Class A, Class C, Class I and Class Y shares; CM Commodity Index Fund, Emerging Markets Bond Fund, Environmental Sustainability Fund and VanEck NDR Managed Allocation Fund, each of which offers Class A, Class I and Class Y shares; and VanEck Morningstar Wide Moat Fund which offers Class I and Class Z shares. Emerging Markets Leaders Fund intends to offer Class A, Class I, Class Y and Class Z shares when it is available for purchase. The Board of Trustees of the Trust (the “Board”) has authority, without the necessity of a shareholder vote, to create additional series or funds, each of which may issue separate classes of shares. Emerging Markets Bond Fund, Emerging Markets Leaders Fund, Environmental Sustainability Fund and International Investors Gold Fund are classified as non-diversified funds under the Investment Company Act of 1940, as amended (the “1940 Act”). CM Commodity Index Fund, Emerging Markets Fund, Global Resources Fund, VanEck Morningstar Wide Moat Fund and VanEck NDR Managed Allocation Fund are classified as diversified funds under the 1940 Act. Van Eck Associates Corporation (“VEAC”) serves as investment adviser to all the Funds, except for CM Commodity Index Fund. Van Eck Absolute Return Advisers Corporation (“VEARA” and together with VEAC, each an “Adviser” or the “Advisers”) serves as investment adviser to CM Commodity Index Fund. INVESTMENT POLICIES AND RISKS The following is additional information regarding the investment policies and strategies used by the Funds in attempting to achieve their respective objectives, and should be read with the sections of the Funds’ Prospectuses titled “Summary Information - Principal Investment Strategies”, “Summary Information - Principal Risks” and “Investment Objectives, Strategies, Policies, Risks and Other Information”. The Funds, except for VanEck Morningstar Wide Moat Fund, may take temporary defensive positions in anticipation of or in an attempt to respond to adverse market, economic, political or other conditions. Such a position could have the effect of reducing any benefit a Fund may receive from a market increase. When taking a temporary defensive position, a Fund may invest all or a substantial portion of its total assets in cash or cash equivalents, government securities, short-term or medium-term fixed income securities, which may include, but not be limited to, shares of other mutual funds, U.S. Treasury bills, commercial paper or repurchase agreements. A Fund may not achieve its investment objective while it is investing defensively. Each of the Emerging Markets Bond Fund, VanEck Morningstar Wide Moat Fund and VanEck NDR Managed Allocation Fund may engage in active and frequent trading of its portfolio securities. CM Commodity Index Fund seeks to achieve its investment objective by investing in instruments that derive their value from the performance of the UBS Bloomberg Constant Maturity Commodity Total Return Index (the “CMCI”), as described below, and in bonds, debt securities and other fixed income instruments (“Fixed Income Instruments”) issued by various U.S. public- or private-sector entities. CM Commodity Index Fund invests in commodity-linked derivative instruments, including commodity index-linked notes, swap agreements, commodity futures contracts and options on futures contracts that provide economic exposure to the investment returns of the commodities markets, as represented by the CMCI and its constituents. A derivative is an investment whose value depends on (or is derived from) that value of an underlying security. Commodities are assets that have tangible properties, such as oil, metals, and agricultural products. A commodity-linked derivative is a derivative instrument whose value is linked to the movement of a commodity, commodity index, commodity option or futures contract. The value of commodity-linked derivative instruments may be affected by overall market movements and other factors affecting the value of a particular industry or commodity, such as weather, disease, embargoes, or political and regulatory developments. The CMCI is a rules-based, composite benchmark index diversified across 29 commodity components from the following five sectors: energy, precious metals, industrial metals, agriculture and livestock. The CMCI is comprised of futures contracts with maturities ranging from three months up to a maximum of about three years for each commodity, depending on liquidity. The return of the CMCI reflects a combination of (i) the returns on the futures contracts comprising the CMCI; and (ii) the fixed-income return that would be earned on a hypothetical portfolio of 13-week U.S. Treasury bills theoretically deposited as full collateral for the notional exposure of the hypothetical positions in the futures contracts comprising the CMCI. The selection and relative weightings of the components of the CMCI are designed to reflect the economic significance and market liquidity of each commodity, as determined based on global economic data, consumption data, commodity futures prices, open interest and volume data. The maturity of each commodity component in the CMCI remains fixed at a predefined time interval from the current date at all times by means of a continuous rolling process, in which a weighted percentage of 1 shorter dated contracts for each commodity are swapped for longer dated contracts on a daily basis. The CMCI is rebalanced monthly back to the target weightings of the commodity components of the CMCI and the target weightings of all commodity components are revised once per year. A more detailed description of the CMCI is contained in the section of this SAI entitled “Additional Information About the CMCI.” CM Commodity Index Fund will seek to track the returns of the CMCI by entering into swap contracts and commodity index-linked notes with one or more counterparties, which contracts and notes will rise and fall in value in response to changes in the value of the CMCI. As of the date of this SAI, UBS was the only available counterparty with which CM Commodity Index Fund may enter into such swap contracts on the CMCI. CM Commodity Index Fund may enter into such contracts and notes directly or indirectly through a wholly-owned subsidiary of the Fund (the “CMCI Subsidiary”). Commodity index-linked notes are derivative debt instruments with principal and/or coupon payments linked to the performance of commodity indices (such as the CMCI). These commodity index-linked notes are sometimes referred to as “structured notes” because the terms of these notes may be structured by the issuer and the purchaser of the note. CM Commodity Index Fund may also seek to gain exposure to the individual commodity components of the CMCI by investing in futures contracts that comprise the CMCI, either directly or indirectly through the Subsidiary. Under normal conditions, the VanEck Morningstar Wide Moat Fund invests at least 80% of its net assets in securities that comprise the Morningstar® Wide Moat Focus Index SM (the “Wide Moat Index”). The Wide Moat Index is comprised of securities issued by companies that Morningstar, Inc. (“Morningstar”) determines to have sustainable competitive advantages based on a proprietary methodology that considers quantitative and qualitative factors (“wide moat companies”). Wide moat companies are selected from the universe of companies represented in the Morningstar® US Market Index SM , a broad market index representing 97% of U.S. market capitalization. The Wide Moat Index targets a select group of wide moat companies: those that according to Morningstar’s equity research team are attractively priced as of each Wide Moat Index review. Out of the companies in the Morningstar US Market Index that Morningstar determines are wide moat companies, Morningstar selects companies to be included in Index as determined by the ratio of Morningstar’s estimate of fair value of the issuer’s common stock to the price. Morningstar’s equity research fair value estimates are calculated using a standardized, proprietary valuation model. Wide moat companies may include medium-capitalization companies. VanEck Morningstar Wide Moat Fund’s 80% investment policy is non-fundamental and may be changed without shareholder approval upon 60 days’ prior written notice to shareholders. In seeking to achieve its investment objective, VanEck Morningstar Wide Moat Fund may also invest in VanEck Vectors Morningstar Wide Moat ETF (the “underlying fund”), an affiliated fund, which also seeks to replicate the price and yield performance of the Wide Moat Index, and such investment will count towards the VanEck Morningstar Wide Moat Fund’s 80% investment policy. VanEck Morningstar Wide Moat Fund, using a “passive” or indexing investment approach, attempts to replicate the price and yield performance of the Index by investing in a portfolio of securities that generally replicate the performance of the Wide Moat Index. VEAC seeks to achieve VanEck NDR Managed Allocation Fund’s investment objective by investing, under normal conditions, primarily in (i) exchange traded products that are registered under the federal securities laws (“Exchange Traded Products”) and invest in domestic and foreign equity and debt securities, including exchange traded funds (“ETFs”) and exchange traded notes (“ETNs”); and (ii) cash or cash equivalents. The securities held by the Exchange Traded Pr

sted on your proxy card. You should follow the enclosed instructions on your proxy card as to how to vote. You may revoke your proxy before it is exercised at the Special Meeting, either by writing to the Secretary of CST at the address noted in the Proxy Statement/Prospectus or in person at the time of the Special Meeting. A prior proxy can also be revoked by voting your proxy at a later date through the toll-free number or the Internet website address listed in the enclosed voting instructions or submitting a later dated proxy card. Thank you for taking the time to consider this important proposal and for your continuing investment in the Sterling Capital Enhanced Core Bond ETF. Sincerely, /s/ Matthew J. Miller Matthew J. Miller President - 4 - CAPITOL SERIES TRUST Sterling Capital Enhanced Core Bond ETF 225 Pictoria Drive, Suite 450 Cincinnati, Ohio 45246 (513) 587-3400 NOTICE OF SPECIAL MEETING OF SHAREHOLDERS TO BE HELD MARCH 20, 2026 Capitol Series Trust, an Ohio business trust (“CST”), will hold a Special Meeting of Shareholders (the “Special Meeting”) of the Sterling Capital Enhanced Core Bond ETF (the “Target Fund”), a series of CST, at the offices of Ultimus Fund Solutions, the Target Fund’s Administrator located at 225 Pictoria Drive, Suite 450 , Cincinnati, Ohio 45246, on March 20, 2026, at 11:00 a.m. Eastern time. At the Special Meeting, you and the other shareholders of the Target Fund will be asked to consider and vote upon the following proposals: 1. Approval of an Agreement and Plan of Reorganization (the “Plan”) providing for (i) the acquisition of the assets and assumption of the liabilities of the Target Fund by the Sterling Capital Enhanced Core Bond ETF, a newly-created series of Sterling Capital Funds (the “Acquiring Fund”), in exchange for shares of the Acquiring Fund with an aggregate net asset value (“NAV”) equal to the aggregate NAV of the shares of the Target Fund; (ii) the pro rata distribution of such shares to the shareholders of the Target Fund, and (iii) the complete liquidation and dissolution of the Target Fund, all upon the terms and conditions set forth in the Plan (the “Reorganization”); 2. Approval of a New Investment Advisory Agreement between Sterling Capital Management LLC (“Sterling Capital”) and the Target Fund (the “New Agreement”). Shareholders are being asked to approve the New Agreement because of an anticipated indirect change in control of Sterling Capital (the “Adviser Transaction”), which will result in the automatic termination of the current Investment Advisory Agreement between Sterling Capital and the Target Fund. To the extent the Adviser Transaction closes before the Reorganization is completed (or if the Reorganization is not approved by shareholders), the New Agreement, if approved by shareholders, would help ensure continuity of management of the Target Fund following the Adviser Transaction. If the Reorganization is completed before the Adviser Transaction, the New Agreement would not be necessary and would not take effect; 3. To approve the removal of the Target Fund’s fundamental investment restriction that prohibits the Target Fund from engaging in specified types of options and options related transactions; and 4. The transaction of such other business as may properly come before the Special Meeting or any continuations after an adjournment thereof. The proposals are not conditioned on one another and shareholders may approve one proposal but not the other. To the extent the Adviser Transaction closes before the Reorganization is completed (or if the Reorganization is not approved by shareholders), the New Agreement, if approved by shareholders, would help ensure continuity of management of the Target Fund following the Adviser Transaction. If the Reorganization is completed before the Adviser Transaction, the New Agreement would not be necessary as the Target Fund will have merged with and into the Acquiring Fund, and therefore the New Agreement would not take 
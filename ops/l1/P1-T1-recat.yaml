      497 1 jhfii-html2540_497.htm JOHN HANCOCK FUNDS II_497 John Hancock Multi-Asset High Income Fund (formerly Income Allocation Fund) Prospectus 1/1/20 (as revised 6/4/20) Class A JIAFX Class C JIAGX Class I JIAIX Class R6 JIASX Beginning on January 1, 2021, as permitted by regulations adopted by the Securities and Exchange Commission, paper copies of the fund's shareholder reports will no longer be sent by mail, unless you specifically request paper copies of the reports from the fund or from your financial intermediary. Instead, the reports will be made available on a website, and you will be notified by mail each time a report is posted and provided with a website link to access the report. If you already elected to receive shareholder reports electronically, you will not be affected by this change and do not need to take any action. You may elect to receive shareholder reports and other communications electronically by calling John Hancock Investment Management at 800-225-5291 (Class A and Class C) or 888-972-8696 (Class I and Class R6) or by contacting your financial intermediary. You may elect to receive all reports in paper free of charge at any time. You can inform the fund or your financial intermediary that you wish to continue receiving paper copies of your shareholder reports by following the instructions listed above. Your election to receive reports in paper will apply to all funds held with John Hancock Investment Management or your financial intermediary. As with all mutual funds, the Securities and Exchange Commission and Commodity Futures Trading Commission have not approved or disapproved these securities or passed upon the adequacy of this prospectus. Any representation to the contrary is a criminal offense. Table of contents Fund summary Fund details Your account The summary section is a concise look at the investment objective, fees and expenses, principal investment strategies, principal risks, past performance, and investment management. More about topics covered in the summary section, including descriptions of the investment strategies and various risk factors that investors should understand before investing. How to place an order to buy, sell, or exchange shares, as well as information about the business policies and any distributions that may be paid. 1 John Hancock Multi-Asset High Income Fund 7 Principal investment strategies 24 Choosing an eligible share class 8 Principal risks of investing 25 Class cost structure 17 Who's who 26 How sales charges for Class A and Class C shares are calculated 20 Financial highlights 26 Sales charge reductions and waivers 28 Opening an account 30 Buying shares 33 Selling shares 39 Transaction policies 42 Dividends and account policies 43 Additional investor services 44 Appendix 1 - Intermediary sales charge waivers For more information See back cover Fund summary John Hancock Multi-Asset High Income Fund Investment objective Seeks to provide a high level of current income with consideration for capital appreciation and preservation. Fees and expenses This table describes the fees and expenses you may pay if you buy and hold shares of the fund. You may qualify for sales charge discounts on Class A shares if you and your family invest, or agree to invest in the future, at least $50,000 in the John Hancock family of funds. Intermediaries may have different policies and procedures regarding the availability of front-end sales charge waivers or contingent deferred sales charge (CDSC) waivers (See Appendix 1 - Intermediary sales charge waivers, which includes information about specific sales charge waivers applicable to the intermediaries identified therein). Although the fund does not impose any sales charges on Class I shares, you may pay commissions to your broker on your purchases and sales of Class I shares, which are not reflected in the table and example below. More information about these and other discounts is available from your financial representative and on pages 26 to 28 of the prospectus under "Sales charge reductions and waivers" or pages 162 to 165 of the fund's Statement of Additional Information under "Sales Charges on Class A, Class B, and Class C Shares." Shareholder fees (%) (fees paid directly from your investment) A C I R6 Maximum front-end sales charge (load) on purchases, as a % of purchase price 4.50 None None None Maximum deferred sales charge (load) as a % of purchase or sale price, whichever is less 1.00 (on certain purchases, including those of $1 million or more) 1.00 None None Small account fee (for fund account balances under $1,000) ($) 20 20 None None Annual fund operating expenses (%) (expenses that you pay each year as a percentage of the value of your investment) A C I R6 Management fee‌ 1 0.42 0.42 0.42 0.42 Distribution and service (Rule 12b-1) fees 0.25 ‌ 2 1.00 0.00 0.00 Other expenses‌ 3 3.98 3.98 3.98 3.87 Total annual fund operating expenses 4.65 5.40 4.40 4.29 Contractual expense reimbursement‌ 4 –3.76 –3.76 –3.76 –3.76 Total annual fund operating expenses after expense reimbursements 0.89 1.64 0.64 0.53 1 "Management fee" has been restated to reflect the contractual management fee schedule effective June 4, 2020. 2 "Distribution and service (Rule 12b-1) fees" have been restated to reflect the Rule 12b-1 plan fee schedule effective June 4, 2020. 3 "Other expenses" have been restated from fiscal year amounts to reflect current fees and expenses. 4 The advisor contractually agrees to reduce its management fee or, if necessary, make payment to the fund in an amount equal to the amount by which expenses of the fund exceed 0.52% of average daily net assets of the fund. For purposes of this agreement, "expenses of the fund" means all fund expenses, excluding (a) taxes, (b) brokerage commissions, (c) interest expense, (d) litigation and indemnification expenses and other extraordinary expenses not incurred in the ordinary course of the fund's business, (e) class-specific expenses, (f) borrowing costs, (g) prime brokerage fees, (h) acquired fund fees and expenses paid indirectly, and (i) short dividend expense. This agreement expires on December 31, 2021, unless renewed by mutual agreement of the advisor and the fund based upon a determination that this is appropriate under the circumstances at that time. The advisor also contractually agrees to waive a portion of its management fee and/or reimburse expenses for the fund and certain other John Hancock funds according to an asset level breakpoint schedule that is based on the aggregate net assets of all the funds participating in the waiver or reimbursement. This waiver is allocated proportionally among the participating funds. During its most recent fiscal year, the fund's reimbursement amounted to 0.01% of the fund's average daily net assets. This agreement expires on July 31, 2021, unless renewed by mutual agreement of the fund and the advisor based upon a determination that this is appropriate under the circumstances at that time. Expense example This example is intended to help you compare the cost of investing in the fund with the cost of investing in other mutual funds. Please see below a hypothetical example showing the expenses of a $10,000 investment for the time periods indicated and then, except as shown below, assuming you sell all of your shares at the end of those periods. The example assumes a 5% average annual return and that fund expenses will not change over the periods. Although your actual costs may be higher or lower, based on these assumptions, your costs would be: Expenses ($) A C I R6 Shares Sold Not Sold 1 year 537 267 167 65 54 3 years 1,465 1,279 1,279 989 957 5 years 2,399 2,382 2,382 1,924 1,873 10 years 4,764 5,101 5,101 4,311 4,219 Portfolio turnover The fund pays transaction costs, such as commissions, when it buys and sells securities (or "turns over" its portfolio). A higher portfolio turnover rate may indicate higher transaction costs and may result in higher taxes when fund shares are held in a taxable account. These costs, which are not reflected in annual fund operating 1 Table of Contents expenses or in the example, affect the fund's performance. During its most recent fiscal year, the fund's portfolio turnover rate was 29% of the average value of its portfolio. Principal investment strategies The fund has significant flexibility to achieve its investment objective and invests in a broad range of income-producing securities. The fund invests in debt and equity securities, as well as derivative instruments, in the U.S. and developed and emerging markets throughout the world. There is no limit on the number of countries in which the fund may invest, and the fund may focus its investments in a single country or a small group of countries. As attractive investments across asset classes and strategies arise, the manager attempts to capture these opportunities and has wide latitude to allocate the fund's assets among strategies and asset classes. The manager buys and sells securities and investments for the fund based on the manager's views of strategies, sectors, and overall portfolio construction taking into account income generation, risk/return analyses, and relative value considerations. Under normal market circumstances the fund invests in a broad range of income-producing securities across asset classes as market conditions warrant, but the fund may invest up to 100% of its assets in fixed-income securities and may invest up to 70% of its assets in equity securities from time to time to adjust to prevailing market conditions. The fund may invest in individual fixed-income securities to the fullest extent permissible. The fund may invest in a portfolio of fixed income securities such as corporate bonds and notes, mortgage-backed securities, asset-backed securities, convertible securities, preferred securities and government obligations. The fund may also invest significantly in below-investment-grade bonds (also known as junk bonds) (e.g., high yield bonds or arbitrage and distressed securities), below-investment-grade bank loans, foreign currency denominated bonds and bonds of emerging market issuers. Direct investments in loans may be illiquid and holding a loan could expose the fund to the risks of being a direct lender. The fund's investment in foreign currency-denominated bonds may be on a currency hedged or unhedged basis. Below-investment-grade bonds acquired by the fund directly or through investing in exchange-traded funds (ETFs) and other underlying funds will generally be in the lower categories of the major rating agencies (BB or lower by Standard & Poor's Ratings Services (S&P) or Ba or lower by Moody's Investors Service, Inc. (Moody's)) or, if unrated, will be determined by the management team to be of similar quality. Split-rated bonds will be considered to have the higher credit rating. The fund's investment policies are based on credit ratings at the time of purchase. The average portfolio duration of the fund will vary based on the management team's forecast of interest rates and there are no limits regarding portfolio duration or average maturity. The fund may invest in common stock, preferred stock, securities convertible into common and preferred stock, and non-convertible preferred stock. The fund generally intends to invest in dividend paying stocks. From time to time, the fund may invest in shares of companies through initial public offerings (IPOs). The fund may invest in securities of both U.S. or foreign issuers without limit, which can be U.S. dollar-based or foreign currency-based and may be currency hedged or unhedged. The fund may invest in securities of companies of any market capitalization. The fund also may invest extensively in derivative instruments such as futures, options, and swaps, which are generally financial contracts whose value depends upon, or is derived from, the value of an underlying asset, reference rate, or index, and may relate to equity securities, fixed-income securities, interest rates, total return rates, currencies or currency exchange rates, and related hedging purposes. Derivatives may be used to hedge against losses from movements in stock, currency exchange rates or interest rates. Derivatives may be used for non-hedging purposes in order to invest indirectly in securities or financial markets, for duration management which allows the fund to efficiently adjust the average maturity of the fixed-income securities it holds, to gain exposure to foreign currencies, for efficient portfolio management, or to generate additional income for the fund. The fund may also invest in structured notes that provide exposure to derivative instruments. The fund also may invest in restricted or illiquid securities. The fund writes options on a portion of the value of the fund's portfolio, although this amount is expected to vary over time based upon U.S. and non-U.S. market conditions and other factors. The fund's use of written call options involves a tradeoff between the options premiums received and the reduced participation in potential future security price appreciation of its portfolio. As the seller of call options, the fund receives cash (the premium) from purchasers of the options. The purchaser of a call option has the right to receive from the option seller any appreciation in value over a fixed price (the exercise price) as of a specified date in the future (the option expiration date). In effect, the fund sells the potential appreciation in value, or exercise price, during the term of the option in exchange for the premium. The manager also may cause the fund to sell put options if the manager considers the pricing of those options highly favorable and sale of such an option might beneficially alter the risk profile of the fund's option exposure. The transaction costs of buying and selling options consist primarily of the bid-ask spread and commissions (which are imposed in opening, closing, ex

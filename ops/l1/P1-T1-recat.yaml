), a series of DoubleLine Funds Trust (the “ Trust ”). Please read this document carefully before investing, and keep it for future reference. Neither the Securities and Exchange Commission, the Commodity Futures Trading Commission, nor any state securities commission has approved or disapproved these securities or determined if this Prospectus is truthful or complete. Any representation to the contrary is a criminal offense. Table of Contents TABLE OF CONTENTS Fund Summary DoubleLine Income Fund 1 Additional Information About Principal Investment Strategies and Principal Risks 20 Investment Objective 20 Principal Investment Strategies 20 Principal Risks 25 Temporary Defensive Strategies 73 Portfolio Holdings Information 73 Management of the Fund 74 Investment Adviser 74 Portfolio Managers 74 Advisory Agreement 75 Additional Information 77 Share Class Features 77 Types of Shares Available 77 Expenses 78 Choosing a Share Class 78 How to Buy Shares 80 General Information 80 Distribution Arrangements and Rule 12b-1 Fees (Class N Shares Only); Other Distribution-Related Payments to Financial Intermediaries 81 Payments to Financial Intermediaries 82 Calculation of NAV 83 Verification of Identity 86 Minimum Investments for Shares 86 New Account Application 87 Purchase by Mail 87 Purchase by Telephone 88 Purchase by Internet 89 Purchase by Wire 89 Automatic Investment Plan 90 Purchases Through an Authorized Third Party 91 How to Redeem Shares 91 General Information 91 Redemptions by Mail 93 Signature Guarantees 94 Redemptions by Telephone 95 Redemptions by Internet 96 Systematic Withdrawal Plan 97 Redemptions Through Your Financial Intermediary or Other Authorized Third Party 97 Other Account Policies 98 Trading Limits 98 Trading Limit Policies 99 Additional Trading Limit Policies 99 Exchange Privilege 100 Conversion of Shares Between Classes 101 Notice Regarding Delivery of Fund Documents 101 Lost Shareholders, Inactive Accounts and Unclaimed Property 101 Cost Basis Reporting 102 Distributions 103 Taxes 103 Financial Highlights 107 PRIVACY POLICY 108 Table of Contents Fund Summary DoubleLine Income Fund Investment Objective The Fund’s investment objective is to maximize total return through investment principally in income-producing securities. Fees and Expenses of the Fund This table describes the fees and expenses you may pay if you buy and hold shares of the Fund. If you purchase Class I shares through a broker or other financial intermediary acting as an agent on behalf of its customers, that financial intermediary may charge you a commission. Such commissions, if any, are not charged by the Fund and are not reflected in the fee table or expense example below. Shareholder Fees (fees paid directly from your investment) Share Class Class I Class N Maximum Sales Charge (Load) Imposed on Purchases (as a percentage of the offering price) None None Maximum Deferred Sales Charge (Load) (as a percentage of the original purchase price) None None Maximum Sales Charge (Load) Imposed on Reinvested Dividends None None Redemption Fee (as a percentage of shares redeemed within 90 days of purchase) None None Fee for Redemption by Wire $15 $15 Exchange Fee None None Account Fee None None -1- Table of Contents Annual Fund Operating Expenses (expenses that you pay each year as a percentage of the value of your investment) Share Class Class I Class N Management Fees 0.50% 0.50% Distribution and/or Service (12b-1) Fees None 0.25% Other Expenses (includes sub-transfer agent accounting or administrative services expenses) 1 0.29% 0.29% Acquired Fund Fees and Expenses 1, 2 0.01% 0.01% Total Annual Fund Operating Expenses 0.80% 1.05% Fee Waiver and/or Expense Reimbursement 3 (0.14% ) (0.14% ) Total Annual Fund Operating Expenses After Fee Waiver and/or Expense Reimbursement 0.66% 0.91% 1 Based on estimated amounts for the current fiscal year. 2 “Acquired Fund Fees and Expenses” are expenses indirectly incurred by the Fund as a result of investments in one or more underlying funds, including exchange-traded funds (“ ETFs ”) and money market funds. 3 DoubleLine Capital LP (the “ Adviser ”) has contractually agreed to waive its investment advisory fee and to reimburse the Fund for other ordinary operating expenses to the extent necessary to limit ordinary operating expenses to an amount not to exceed 0.65% for Class I shares and 0.90% for Class N shares. Ordinary operating expenses exclude taxes, commissions, mark-ups, litigation expenses, indemnification expenses, interest expenses, Acquired Fund Fees and Expenses, and any extraordinary expenses. These expense limitations are expected to apply until at least September 2, 2021, except that they may be terminated by the Board of Trustees at any time. To the extent that the Adviser waives its investment advisory fee and/or reimburses the Fund for other ordinary operating expenses, it may seek reimbursement of a portion or all of such amounts at any time within three fiscal years after the fiscal year in which such amounts were waived or reimbursed. Any such recoupment may not cause the Fund’s ordinary operating expenses to exceed the expense limitation that was in place when the fees were waived or expenses reimbursed. Additionally, the Adviser would generally seek recoupment only in accordance with the terms of any expense limitation that is in place at the time of recoupment. -2- Table of Contents Example This example is intended to help you compare the cost of investing in the Fund with the cost of investing in other mutual funds. This example assumes that you invest $10,000 in the Fund for the time periods indicated and then redeem all your shares at the end of those periods. The example also assumes that your investment has a 5% return each year and that the Fund’s operating expenses remain the same (taking into account the Fund’s expense limitation for the first year). Although your actual costs may be higher or lower, based on these assumptions, your costs would be: Class I Class N 1 Year $67 $93 3 Years $241 $320 Portfolio Turnover The Fund incurs transaction costs when it buys and sells securities (or “turns over” its portfolio). A higher portfolio turnover rate may indicate higher transaction costs and may result in higher taxes when Fund shares are held in a taxable account. These costs, which are not reflected in annual fund operating expenses or in the example, affect the Fund’s performance. Principal Investment Strategies The Fund seeks to achieve its investment objective by investing in a portfolio of income-producing instruments of varying characteristics selected by the Adviser for their potential to provide a high level of current income, capital appreciation or both. The Fund will also seek to construct a portfolio that provides yield and duration characteristics that are attractive relative to those offered by a portfolio of corporate debt instruments by investing principally in a combination of mortgage-backed securities, other asset-backed securities, and collateralized loan obligations (“ CLOs ”). The Fund expects normally to invest principally, and potentially all of its assets, in a combination of lower quality and unrated debt instruments. The Fund may invest in securities of any credit quality and may invest without -3- Table of Contents limit in securities rated below investment grade (securities rated Ba1 or below by Moody’s and BB+ or below by S&P and Fitch Ratings, Inc. (“ Fitch ”)) and unrated securities, including those judged by the Adviser to be of below investment grade quality. High yield corporate bonds and certain other fixed income instruments in which the Fund may invest are commonly known as “junk bonds.” Mortgage-backed securities in which the Fund may invest include, without limitation: mortgage-related securities of any maturity or type, including residential or commercial mortgage-backed securities, those guaranteed by, or secured by collateral that is guaranteed by, the United States Government, its agencies, instrumentalities or sponsored corporations, and privately issued mortgage-backed securities; pass-through securities, including government, private, and multiclass pass-through securities; stripped mortgage securities (interest-only and principal-only securities); and those backed by collateral such as non-performing and/or re-performing loans, non-qualifying mortgage loans, and single asset, single borrower loans. The other asset-backed securities in which the Fund will invest include, without limitation: inverse floaters; obligations backed or supported by leases of various types, including leases of real or personal property; securities backed by consumer loans, automobile loans, student loans, including loans of any type that contain fewer or less restrictive constraints on the borrower than certain other types of loans (“covenant-lite” loans); securities backed by non-mortgage assets, such as motor vehicle installment sales, installment loan contracts, and receivables from credit card agreements; and CLOs, including CLOs backed by any of the previously mentioned assets or instruments, such as CLOs backed by covenant-lite loans. In pursuing its investment objective, the Fund may also invest directly in residential or commercial real estate loans, individually or in pools of loans, which loans may include senior mortgage loans and mezzanine loans, second lien loans or other types of subordinated loans, any of which may be covenant-lite. In selecting among available residential or commercial mortgage-backed securities, the Fund expects to consider, among other things, available yield, duration characteristics, collateral quality, level of correlation to other risk assets, supply/demand technicals, and sponsor quality. With respect to asset-backed securities, the Fund also expects to seek diversified opportunities with varying risk/return profiles across different sectors of that market. The Fund will seek CLOs that offer, among other characteristics, attractive yields, diversification within the underlying pool -4- Table of Contents of loans, and quality management. The Fund may invest in any level of the capital structure of an issuer of mortgage-backed or asset-backed securities, including subordinated or residual tranches and the equity or “first loss” tranche. The Adviser has broad discretion to manage the Fund’s portfolio duration; however, the Adviser expects normally to construct an investment portfolio with a dollar-weighted average effective duration similar to, or shorter than, that of its benchmark index, the Bloomberg Barclays U.S. Aggregate Bond Index, which was 5.69 as of July 31, 2019. The Adviser monitors the duration of the Fund’s portfolio securities to seek to assess and, in its discretion, adjust the Fund’s exposure to interest rate risk. The Adviser seeks to manage the Fund’s duration based on the Adviser’s view of, among other things, future interest rates and market conditions. Duration is a measure of the expected life of a fixed income instrument that is used to determine the sensitivity of a security’s price to changes in interest rates. Effective duration is a measure of the Fund’s portfolio duration adjusted for the anticipated effect of interest rate changes on bond and mortgage pre-payment rates as determined by the Adviser. The Fund may invest in individual securities of any maturity or duration. The effective duration of the Fund’s investment portfolio may vary significantly from time to time and may be negative at certain times, and there is no assurance that the effective duration of the Fund’s investment portfolio will remain within the targeted range described above. Although the Fund will normally invest principally in mortgage-backed securities, other asset-backed securities and CLOs, the Fund may invest in other debt instruments of any kind. The Adviser expects to allocate and re-allocate the Fund’s assets among income-producing investments with varying characteris

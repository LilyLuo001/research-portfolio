      N-14 1 d216579dn14.htm THE HARTFORD MUTUAL FUNDS II, INC. The Hartford Mutual Funds II, Inc. As filed with the U.S. Securities and Exchange Commission on August 16, 2021 Securities Act File No. [ ] UNITED STATES SECURITIES AND EXCHANGE COMMISSION WASHINGTON, D.C. 20549 Form N-14 REGISTRATION STATEMENT UNDER THE SECURITIES ACT OF 1933 ☒ Pre-Effective Amendment No. Post-Effective Amendment No. ☐ ☐ The Hartford Mutual Funds II, Inc. (Exact Name of Registrant as Specified in Charter) 690 Lee Road Wayne, Pennsylvania 19087 (Address of Principal Executive Offices) (Zip Code) 1-610-386-4068 (Registrant’s Area Code and Telephone Number) Thomas R. Phillips, Esquire Hartford Funds Management Company, LLC 690 Lee Road Wayne, Pennsylvania 19087 (Name and Address of Agent for Service) With copies to: John V. O’Hanlon, Esquire Dechert LLP One International Place, 40th Floor 100 Oliver Street Boston, Massachusetts 02110-2605 Approximate Date of Proposed Public Offering: As soon as practicable after this Registration Statement becomes effective. It is proposed that this filing will become effective on September 15, 2021, pursuant to Rule 488. Title of Securities Being Registered: Class SDR Shares and Class Y Shares of Hartford Schroders Sustainable Core Bond Fund, a series of the Registrant. No filing fee is required under the Securities Act of 1933 because an indefinite number of shares have previously been registered pursuant to Rule 24f-2 under the Investment Company Act of 1940, as amended. Schroder Series Trust Schroder Core Bond Fund September 23, 2021 Dear Shareholder, At a special meeting of shareholders of Schroder Core Bond Fund (the “Target Fund”), a series of Schroder Series Trust (“Schroders Trust”), you will be asked to vote on the reorganization of the Target Fund into Hartford Schroders Sustainable Core Bond Fund (the “Acquiring Fund”), a series of The Hartford Mutual Funds II, Inc. (“HMF II”) (the “Reorganization”). The Target Fund and the Acquiring Fund are together referred to herein as the “Funds” and individually as a “Fund.” The Board of Trustees of Schroders Trust (the “Board”) unanimously recommends that you vote FOR the proposed Reorganization. Although we recommend that you read the complete Combined Proxy Statement/Prospectus enclosed herewith, for your convenience we have provided the following brief overview of the proposal to be voted on. Q: What is being proposed? Shareholders of the Target Fund are being asked to vote on the proposed Reorganization of their Target Fund into the Acquiring Fund, a newly-formed series of HMF II: Target Fund Acquiring Fund Schroder Core Bond Fund Hartford Schroders Sustainable Core Bond Fund More specifically, in the proposed Reorganization the Target Fund will transfer all of its assets and liabilities to the Acquiring Fund in exchange for shares of the class of the Acquiring Fund shown below: Target Fund Class Acquiring Fund Class R6 Shares Class SDR Shares Investor Shares Class Y Shares The Acquiring Fund will issue shares of each class of the Acquiring Fund (“Acquisition Shares”) that have an aggregate net asset value equal to the aggregate net asset value of each corresponding class of shares of the Target Fund outstanding immediately before the Reorganization. Accordingly, each shareholder of the Target Fund at the time of the Reorganization will receive shares of the corresponding class of shares of the Acquiring Fund with an aggregate net asset value equal to the aggregate net asset value of that shareholder’s investment in the Target Fund immediately before the Reorganization. Please see “Reorganization Proposal - Additional Information About The Reorganization - Terms of the Reorganization” for more information. HMF II’s Board of Directors (the “HMF II Board”) has approved the engagement of Schroder Investment Management North America Inc. (“SIMNA”), the Target Fund’s current investment adviser, as the sub-adviser to the Acquiring Fund. The portfolio managers who are primarily responsible for the day-to-day portfolio management of the Target Fund are expected to serve in the same capacities for the Acquiring Fund. Q: Why is the Reorganization being proposed? SIMNA, the Target Fund’s investment adviser, believes that reorganizing the Target Fund into the Acquiring Fund is in the best interest of the Target Fund and its shareholders as it will combine the strengths of SIMNA and Hartford Funds Management Company, LLC (“HFMC”), the Acquiring Fund’s investment adviser. In SIMNA’s view, the Reorganization, by combining SIMNA’s investment expertise with the experience and extensive distribution resources in the U.S. market of HFMC and its affiliates, will provide the Target Fund with greater potential to attract additional assets and will potentially allow shareholders to benefit from economies of scale, including those that may be achieved by spreading certain fixed costs across the larger asset base of the mutual fund complex advised by HFMC. SIMNA believes that these benefits may serve to reduce the Fund’s expenses over time. There is no guarantee, however, that these results will be achieved. Q: How will the Reorganization affect my shares? On June 25, 2021, Schroders Trust announced that its Board had approved an Agreement and Plan of Reorganization (the “Agreement”) with HMF II to reorganize the Target Fund into the Acquiring Fund. The Acquiring Fund is a new series of HMF II that was created specifically for the purpose of acquiring the assets and liabilities of the Target Fund. The Agreement provides for: (i) the transfer of all of the assets of the Target Fund to the Acquiring Fund in exchange for shares of the Acquiring Fund of equal aggregate net asset value; (ii) the assumption by the Acquiring Fund of all the Target Fund’s liabilities; (iii) the distribution of the shares of designated classes of the Acquiring Fund to the shareholders of the corresponding class of the Target Fund; and (iv) the termination, dissolution and complete liquidation of the Target Fund as soon as practicable after the closing. It is not expected that the proposed Reorganization will result in a reduction in the level or quality of advisory services that the shareholders of the Acquiring Fund will receive compared to the level and quality of advisory services they currently receive as shareholders of the Target Fund. In addition, other than with respect to the Acquiring Fund’s enhanced integration of sustainability within the Target Fund’s objective and strategies, the investment objectives and the principal investment strategies of the Target Fund and the Acquiring Fund are substantially similar. See the “Comparison of Objectives, Strategies and Risks – Comparison of Principal Investment Strategies” section below for additional information about the additional sustainability criteria to be utilized by the Acquiring Fund. In this regard, the Target Fund will pay the transaction costs, including bid-ask spreads, and/or dealer mark-ups, incurred by it in connection with the proposed alignment of the Target Fund’s portfolio holdings with the Acquiring Fund’s investment strategies related to the implementation of the additional sustainability criteria and the transfer of the Target Fund’s portfolio holdings to the Acquiring Fund. SIMNA expects the Target Fund, in order to align the Target Fund’s portfolio holdings with the Acquiring Fund’s investment strategies, to reposition approximately 6% of its portfolio, and pay approximately $4,000-$7,000 in transaction costs (which is less than 0.01% of the Target Fund’s net asset value), in connection with the Reorganization. The actual transaction costs will vary depending upon market conditions, shareholder activity, the portfolio holdings of the Target Fund and the Acquiring Fund, and the specific securities sold and/or transferred to the Acquiring Fund. Further, while there are some differences in the management fees and expected expense ratios for the Acquiring Fund as compared to the Target Fund, as discussed below, HFMC has agreed to limit the Acquiring Fund’s total operating expenses to the same level as the limits currently applicable to the Target Fund’s total operating expenses for at least two years after the closing of the Reorganization. Please see “Reorganization Proposal - Comparison of Fees and Expenses” below for more information. Q: Who will manage the Acquiring Fund following the Reorganization? It is proposed that HFMC will serve as the investment adviser to the Acquiring Fund and that, following the Reorganization, SIMNA, the Target Fund’s current investment adviser, will serve as the sub-adviser to the Acquiring Fund pursuant to a sub-advisory agreement with HFMC. The investment management arrangement for the Acquiring Fund is structured differently from that of the Target Fund. HFMC relies on an exemptive order from the U.S. Securities and Exchange Commission (the “SEC”) for certain funds (including the Acquiring Fund) under which it uses a “Manager of Managers” structure (the “Hartford Order”). The Hartford Order permits HFMC, on behalf of the Fund and subject to the approval of the Board of Directors of HMF II (“HMF II Board”), to hire, and to materially amend any existing or future sub-advisory agreements with sub-advisers that are not affiliated with HFMC as well as sub-advisers that are indirect or direct, wholly owned subsidiaries of HFMC or of another company that, indirectly or directly wholly owns HFMC, in each case without obtaining approval from the Fund’s shareholders. The Hartford Order requires that, within 90 days after hiring any new sub-adviser, the Fund’s shareholders receive information about any new sub-advisory relationship (though a shareholder vote is still required to replace HFMC with another investment adviser). As the Target Fund does not employ sub-advisers, it does not have a similar exemptive order. Despite these structural differences, the Reorganization is not expected to result in any changes to the portfolio managers who are responsible for day-to-day investment of the assets of the Acquiring Fund. Please see “Reorganization Proposal - Additional Information about the Reorganization - Manager of Managers Structure - Hartford Funds” below for more information. Q: Will there be any changes to the Target Fund shareholders’ fees and expenses as a result of the Reorganization? HFMC has contractually agreed to establish an expense reimbursement agreement applicable to the various share classes of the Acquiring Fund, under which HFMC will reimburse the Acquiring Fund’s expenses such that the total fund operating expenses of each class of shares of the Acquiring Fund will not exceed the cap of the corresponding share class of the Target Fund as set forth in the Target Fund’s current expense limitation agreement for at least two years following the closing of the Reorganization. Therefore, following the Reorganization, Target Fund shareholders will not experience an increase in fees and expenses with respect to their investment in the Acquiring Fund for at least two years (not including any increase in taxes, interest expenses, brokerage commissions, acquired fund fees and expenses, and extraordinary expenses). Following the expiration of the two-year expense reimbursement agreement, it is possible that the total annual fund operating expenses of certain share classes of the Acquiring Fund may be higher than the total annual fund operating expenses of the corresponding share class of the Target Fund, based in part on the asset size of the Acquiring Fund at that time. These anticipated subsequent expense caps are not assured, however, and are subject to change. In addition, the contractual management fee rate for the Acquiring Fund (0.32% of average daily net assets, subject to breakpoints) is higher than the management fee rate that is currently in place for the Target Fund (0.25% of average daily net assets). After the Reorganization, HFMC would take responsibility for the following services with respect to the Acquiring Fund: providing administrative, legal and compliance services, supervising operations related to service providers, providing quarterly reporting to the HMF II Board, preparing annual registration statements and annual/semi-annual reports, conducting periodic due diligence of SIMNA, and monitoring performance of the Acquiring Fund, among other things. HFMC uses a process approach to supervising, monitoring and overseeing the sub-advisers it retains. HFMC also actively reviews the risk assessment processes of a sub-adviser through its investment oversight process. HFMC believes that current shareholders are expected to benefit from a broader, experienced U.S. retail distribution network, and efficient management and stronger prospects for growth, which could lead to potential economies of scale over time. HFMC plans to keep existing expense caps in place for at least two years following the date of the Reorganization and is also adding breakpoints into the management fee schedule that will allow for sharing of potential economies of scale as assets grow. Please see “Reorganization Proposal - Comparison of Fees and Expenses” and “Reorganization Proposal - Comparison of Investment Advisers and Distributors” below for more information. Q: Will I have to pay any redemption or exchange fees in connection with the Reorganization? No. You will not have to pay any redemption or exchange fees in connection with the Reorganization. After the Reorganization, the Target Fund’s shareholders will have the opportunity to exchange into other Hartford mutual funds without incurring a sales charge or redemption or exchange fee thereby broadening their investment opportunities without increasing their trading costs. Q: How do the share purchase, redemption and exchange procedures of the Acquiring Fund compare to those of the Target Fund? The share purchase, redemption and exchange procedures of the Acquiring Fu

ough a financial intermediary, please contact the financial intermediary to make this election. Your election to receive reports in paper form will apply to all MainStay Funds in which you are invested and may apply to all funds held with your financial intermediary. Table of Contents ETF Asset Allocation MainStay Defensive ETF Allocation Fund 4 MainStay Conservative ETF Allocation Fund 10 MainStay Moderate ETF Allocation Fund 16 MainStay Growth ETF Allocation Fund 22 MainStay Equity ETF Allocation Fund 28 More About Investment Strategies and Risks 34 Shareholder Guide 48 Know With Whom You Are Investing 88 Financial Highlights 90 Appendix A – Intermediary-Specific Sales Charge Waivers and Discounts 91 MainStay Defensive ETF Allocation Fund Investment Objective The Fund seeks current income. Fees and Expenses of the Fund The table below describes the fees and expenses that you may pay if you buy and hold shares of the Fund. You may be required to pay a commission or other transaction charge to your financial intermediary for effecting transactions in a class of shares of the Fund that has no initial sales charge, contingent deferred sales charge, or other asset-based fee for sales or distribution, such as Class I or Class R6 shares. These commissions are not reflected in the fee and expense table or expense example below. You may qualify for sales charge discounts if you and your family invest, or agree to invest in the future, at least $50,000 in the MainStay Funds. This amount may vary depending on the MainStay Fund in which you invest. In addition, different financial intermediary firms and financial professionals may impose different sales loads and waivers. More information about these and other discounts or waivers is available from your financial professional, in the "Information on Sales Charges" section starting on page 55 of the Prospectus and Appendix A – Intermediary-Specific Sales Charge Waivers and Discounts, and in the "Alternative Sales Arrangements"
      497 1 html821_497.htm 497 John Hancock Infrastructure Fund (formerly John Hancock Enduring Assets Fund) Prospectus 3/1/19 (as revised 3/5/19) Class A JEEBX Class C JEEFX Class I JEEIX Class R6 JEEDX Beginning on January 1, 2021, as permitted by regulations adopted by the Securities and Exchange Commission, paper copies of the fund's shareholder reports will no longer be sent by mail, unless you specifically request paper copies of the reports from the fund or from your financial intermediary. Instead, the reports will be made available on a website, and you will be notified by mail each time a report is posted and provided with a website link to access the report. If you already elected to receive shareholder reports electronically, you will not be affected by this change and do not need to take any action. You may elect to receive shareholder reports and other communications electronically by calling John Hancock Investments at 800-225-5291 (Class A and Class C) or 888-972-8696 (Class I and Class R6) or by contacting your financial intermediary. You may elect to receive all reports in paper free of charge at any time. You can inform the fund or your financial intermediary that you wish to continue receiving paper copies of your shareholder reports by following the instructions listed above. Your election to receive reports in paper will apply to all funds held with John Hancock Investments or your financial intermediary. As with all mutual funds, the Securities and Exchange Commission has not approved or disapproved these securities or passed upon the adequacy of this prospectus. Any representation to the contrary is a criminal offense. Table of contents Fund summary Fund details Your account The summary section is a concise look at the investment objective, fees and expenses, principal investment strategies, principal risks, past performance, and investment management. More about topics covered in the summary section, including descriptions of the investment strategies and various risk factors that investors should understand before investing. How to place an order to buy, sell, or exchange shares, as well as information about the business policies and any distributions that may be paid. 1 John Hancock Infrastructure Fund 6 Principal investment strategies 20 Choosing an eligible share class 6 Principal risks of investing 21 Class cost structure 14 Who's who 22 How sales charges for Class A and Class C shares are calculated 16 Financial highlights 22 Sales charge reductions and waivers 24 Opening an account 26 Buying shares 29 Selling shares 35 Transaction policies 38 Dividends and account policies 38 Additional investor services 40 Appendix 1 - Intermediary sales charge waivers 42 Appendix 2 - Related performance information For more information See back cover Fund summary John Hancock Infrastructure Fund (formerly John Hancock Enduring Assets Fund) Investment objective To seek total return from capital appreciation and income, with an emphasis on absolute returns over a full market cycle. Fees and expenses This table describes the fees and expenses you may pay if you buy and hold shares of the fund. You may qualify for sales charge discounts on Class A shares if you and your family invest, or agree to invest in the future, at least $50,000 in the John Hancock family of funds. Intermediaries may have different policies and procedures regarding the availability of front-end sales charge waivers or CDSC waivers (See Appendix 1 - Intermediary sales charge waivers, which includes information about specific sales charge waivers applicable to the intermediaries identified therein). More information about these and other discounts is available from your financial representative and on pages 22 to 24 of this prospectus under "Sales charge reductions and waivers" or pages 155 to 159 of the fund's Statement of Additional Information under "Sales Charges on Class A, Class B, and Class C Shares." Shareholder fees (%) (fees paid directly from your investment) A C I R6 Maximum front-end sales charge (load) on purchases, as a % of purchase price 5.00 None None None Maximum deferred sales charge (load) as a % of purchase or sale price, whichever is less 1.00 (on certain purchases, including those of $1 million or more) 1.00 None None Small account fee (for fund account balances under $1,000) ($) 20 20 None None Annual fund operating expenses (%) (expenses that you pay each year as a percentage of the value of your investment) A C I R6 Management fee‌ 1 0.80 0.80 0.80 0.80 Distribution and service (Rule 12b-1) fees 0.30 1.00 0.00 0.00 Other expenses 0.28 0.28 0.30 0.19 Total annual fund operating expenses 1.38 2.08 1.10 0.99 Contractual expense reimbursement‌ 2 –0.07 –0.07 –0.10 –0.07 Total annual fund operating expenses after expense reimbursements 1.31 2.01 1.00 0.92 1 "Management fee" has been restated to reflect the contractual management fee schedule effective March 1, 2018. 2 The advisor contractually agrees to reduce its management fee or, if necessary, make payment to Class A, Class C, Class I, and Class R6 shares, in an amount equal to the amount by which the expenses of Class A, Class C, Class I, and Class R6 shares, as applicable, exceed 1.31%, 2.01%, 1.00%, and 0.92%, respectively, of the average daily net assets attributable to the class. For purposes of this agreement, "expenses of Class A, Class C, Class I, and Class R6 shares" means all expenses of the applicable class (including fund expenses attributable to the class), excluding (a) taxes, (b) portfolio brokerage commissions, (c) interest expense, (d) litigation and indemnification expenses and other extraordinary expenses not incurred in the ordinary course of the fund's business, (e) acquired fund fees and expenses paid indirectly, (f) borrowing costs, (g) prime brokerage fees, and (h) short dividend expense. This agreement expires on February 29, 2020, unless renewed by mutual agreement of the fund and the advisor based upon a determination that this is appropriate under the circumstances at that time. The advisor also contractually agrees to waive a portion of its management fee and/or reimburse expenses for the fund and certain other John Hancock funds according to an asset level breakpoint schedule that is based on the aggregate net assets of all the funds participating in the waiver or reimbursement. This waiver is allocated proportionally among the participating funds. During its most recent fiscal year, the fund's reimbursement amounted to 0.01% of the fund's average daily net assets. This agreement expires on June 30, 2020, unless renewed by mutual agreement of the fund and the advisor based upon a determination that this is appropriate under the circumstances at that time. Expense example This example is intended to help you compare the cost of investing in the fund with the cost of investing in other mutual funds. Please see below a hypothetical example showing the expenses of a $10,000 investment for the time periods indicated and then, except as shown below, assuming you sell all of your shares at the end of those periods. The example assumes a 5% average annual return and that fund expenses will not change over the periods. Although your actual costs may be higher or lower, based on these assumptions, your costs would be: Expenses ($) A C I R6 Shares Sold Not Sold 1 year 627 304 204 102 94 3 years 909 645 645 340 308 5 years 1,211 1,112 1,112 597 540 10 years 2,069 2,405 2,405 1,331 1,207 Portfolio turnover The fund pays transaction costs, such as commissions, when it buys and sells securities (or "turns over" its portfolio). A higher portfolio turnover rate may indicate higher transaction costs and may result in higher taxes when fund shares are held in a taxable account. These costs, which are not reflected in annual fund operating 1 Table of Contents expenses or in the example, affect the fund's performance. During its most recent fiscal year, the fund's portfolio turnover rate was 19% of the average value of its portfolio. Principal investment strategies The fund pursues its objective by investing, under normal circumstances, at least 80% of its net assets (plus borrowings for investment purposes) in global securities of companies with infrastructure-related assets. For purposes of this policy, global securities include: common stock, depositary receipts, real estate securities (including real estate investment trusts (REITs)), master limited partnerships (MLPs) (up to a maximum of 25% of the fund's net assets), preferred stock, rights, warrants, exchange-traded funds (ETFs), and debt securities (up to a maximum of 20% of the fund's net assets). Also for purposes of this policy, infrastructure-related assets are long-lived physical assets that are held by companies, including financial holding companies, that engage in the ownership, management, construction, development, renovation, operation, use or financing of infrastructure assets, or that provide the services and raw materials necessary for the construction and maintenance of infrastructure assets. Infrastructure assets are the physical structures, networks and systems which provide necessary services for the function, growth and development of society, including but not limited to transportation and shipping, energy and utilities, water and sewage, communication, and social assets (e.g., hospitals, schools, prisons, stadiums, courthouses, subsidized housing). Companies with long-lived physical assets are those that the manager believes possess an advantageous competitive position due to factors such as a long track record, resilience in the face of technological advances, rising replacement costs, and limited substitution risk. The manager believes investment in these types of companies can contribute to attractive, long-term absolute returns. The fund also seeks to mitigate losses during periods of unfavorable equity market conditions by attempting to limit volatility relative to the wider market. While not managed explicitly for yield, the securities in which the fund invests may often provide higher dividend yields than the broader equity market. The fund is not managed to track a benchmark index. The fund may invest in debt securities, including convertible bonds, without any maturity limit and of any credit quality, including high-yield securities (i.e., junk bonds). The fund may also invest in cash, cash equivalents, and derivative instruments. Derivatives may be used to reduce risk, obtain efficient market exposure, and/or enhance investment returns, and may include swaps, forward contracts, options, currency derivatives (including currency forwards, futures, options, and spot transactions), and similar instruments or combinations thereof. Country and regional weights are driven by bottom-up security selection and are typically unconstrained; however, the fund will generally be diversified regionally across global equity markets, including emerging markets. The fund invests in companies across the market-capitalization spectrum. The fund seeks to outperform global equity markets during periods of flat or negative market performance and may underperform during periods of strong market performance. The fund's investment returns may be volatile over short periods of time and returns over any period of time may not be positive. The maximum position in any individual security will typically be less than 10% of the fund's net assets. Generally, less than 10% of the fund's net assets will be invested in cash and cash equivalents, but can be as high as 20%. Principal risks An investment in the fund is not a bank deposit and is not insured or guaranteed by the Federal Deposit Insurance Corporation or any other government agency. Many factors affect performance, and fund shares will fluctuate in price, meaning you could lose money. The fund's investment strategy may not produce the intended results. During periods of heightened market volatility or reduced liquidity, governments, their agencies, or other regulatory bodies, both within the United States and abroad, may take steps to intervene. These actions, which could include legislative, regulatory, or economic initiatives, might have unforeseeable consequences and could adversely affect the fund's performance or otherwise constrain the fund's ability to achieve its investment objective. The fund's main risks are listed below in alphabetical order. Before investing, be sure to read the additional descriptions of these risks beginning on page 6 of the prospectus. Commodity risk. Commodity prices may be volatile due to fluctuating demand, supply disruption, speculation, and other factors. Certain commodity investments may have no active trading market at times. Credit and counterparty risk. The issuer or guarantor of a fixed-income security, the counterparty to an over-the-counter derivatives contract, or a borrower of fund securities may not make timely payments or otherwise honor its obligations. A downgrade or default affecting any of the fund's securities could affect the fund's performance. Cybersecurity and operational risk. Cybersecurity breaches may allow an unauthorized party to gain access to fund assets, customer data, or proprietary information, or cause a fund or its service providers to suffer data corruption or lose operational functionality. Similar incidents affecting issuers of a fund's securities may negatively impact performance. Operational risk may arise from human error, error by third parties, communication errors, or technology failures, among other causes. Economic and market events risk. Events in the U.S. and global financial markets, including actions taken by the U.S. Federal Reserve or foreign central banks to stimulate or stabilize economic growth, may at times result in unusually high market volatility, which could negatively impact performance. Reduced liquidity in credit and fixed-income markets could adversely affect is

      497 1 d685879d497.htm 497 497 Table of Contents DoubleLine Funds Trust 333 South Grand Avenue, Suite 1800 Los Angeles, California 90071 (213) 633-8200 STATEMENT OF ADDITIONAL INFORMATION December 17, 2018 (as supplemented January 28, 2019) DoubleLine Colony Real Estate and Income Fund Class I Ticker DBRIX Class N Ticker DLREX This Statement of Additional Information (“ SAI ”) relates to the Prospectus (the “ Prospectus ”), dated December 17, 2018, as supplemented from time to time, for the DoubleLine Colony Real Estate and Income Fund (the “ Fund ”). The Fund is an investment series of DoubleLine Funds Trust (the “ Trust ”). Class I and Class N shares of the Fund are offered through the Prospectus. The Fund is also offered through a Summary Prospectus. This SAI is not a prospectus but contains information in addition to that set forth in the Prospectus, as supplemented from time to time. This SAI should be read in conjunction with the Prospectus. A Prospectus or Summary Prospectus may be obtained at no charge by calling 877-DLine11 (877-354-6311) or on the Fund’s website at www.doublelinefunds.com. This SAI, although not in itself a prospectus, is incorporated by reference into the Prospectus in its entirety. The Fund’s audited financial statements in the Annual Report to Shareholders (when available) may be obtained upon request at no charge by calling 877-DLine11 (877-354-6311) and on the Fund’s website at www.doublelinefunds.com. Table of Contents TABLE OF CONTENTS GENERAL INFORMATION 3 INVESTMENT RESTRICTIONS 3 INVESTMENT STRATEGIES 4 RISK CONSIDERATIONS 39 PORTFOLIO TURNOVER 61 DISCLOSURE OF PORTFOLIO INFORMATION 61 BROKERAGE, ALLOCATION AND OTHER TRADING PRACTICES 62 TRUSTEES AND OFFICERS 63 INVESTMENT ADVISORY AND SUB-ADVISORY AGREEMENTS 68 CODE OF ETHICS 70 PROXY VOTING POLICIES 70 CONTROL PERSONS AND PRINCIPAL HOLDERS OF SECURITIES 70 PORTFOLIO MANAGEMENT 71 DISTRIBUTION OF TRUST SHARES 73 SHAREHOLDER SERVICING ARRANGEMENTS 74 PAYMENTS BY THE ADVISER 74 ADMINISTRATION AGREEMENT 75 CONVERSION OF SHARES BETWEEN CLASSES 75 HOW TO BUY AND REDEEM SHARES 75 PURCHASES IN KIND 75 DISTRIBUTIONS IN KIND 75 DISTRIBUTIONS AND TAXES 75 SHARES AND VOTING RIGHTS 84 TRANSFER AGENT 84 CUSTODIAN 85 LEGAL COUNSEL 85 INDEPENDENT REGISTERED PUBLIC ACCOUNTING FIRM AND FINANCIAL STATEMENTS 85 DISCLAIMERS 85 APPENDIX A 87 APPENDIX B 88 2 Table of Contents GENERAL INFORMATION The Trust was formed as a Delaware statutory trust on January 11, 2010, and is registered with the Securities and Exchange Commission (the “ SEC ”) as an open-end management investment company. DoubleLine Alternatives LP (“ DoubleLine Alternatives ”) acts as the investment adviser for the Fund. DoubleLine Capital LP (“ DoubleLine Capital ”) acts as the sub-adviser to the Fund. References to the “Adviser” in this SAI shall refer to either DoubleLine Alternatives or DoubleLine Capital, or both, as applicable. The Fund offers two classes of shares: Class I shares and Class N shares. The Fund is classified as a diversified fund under the Investment Company Act of 1940, as amended (the “ 1940 Act ”). INVESTMENT RESTRICTIONS Fundamental Investment Policies The investment restrictions numbered 1 through 7 below have been adopted as fundamental policies for the Fund. 1. The Fund may not issue any class of securities which is senior to the Fund’s shares of beneficial interest, except to the extent the Fund is permitted to borrow money and except as otherwise consistent with applicable law from time to time. 2. The Fund may borrow money to the extent permitted by applicable law from time to time. 3. The Fund may not act as underwriter of securities of other issuers except to the extent that, in connection with the disposition of portfolio securities or in connection with the purchase of securities directly from the issuer thereof, it may be deemed to be an underwriter under certain federal securities laws. 4. The Fund may not purchase any security if as a result 25% or more of the Fund’s total assets (taken at current value) would be invested in securities of issuers in a single industry, except that the Fund will concentrate its investments in real estate-related investments (for purposes of this restriction, (i) bank loans and loan participations will be considered investments in the industry of the underlying borrower, (ii) investment companies are not considered to constitute an industry, and (iii) derivatives counterparties are not considered to be part of any industry). 5. The Fund may make loans, including to affiliated investment companies, except to the extent the Fund is prohibited from doing so by applicable law. The Fund may purchase loan participations or otherwise invest in loans or similar obligations, and may make loans directly to borrowers, itself or as part of a lending syndicate. The Fund may purchase debt obligations or other financial instruments in which the Fund may invest consistent with its investment policies, enter into repurchase agreements, or lend its portfolio securities. 6. The Fund may purchase or sell commodities to the extent permitted by applicable law from time to time. 7. The Fund will not purchase real estate directly, but may possess, hold, purchase and/or dispose of it in connection with managing or exercising its rights in respect of its investments. The Fund may, for clarity, (i) purchase interests in issuers which deal or invest in real estate, including limited partnership interests of limited partnerships that invest or deal in real estate, (ii) purchase securities which are secured by real estate or interests in real estate, including real estate mortgage loans, and (iii) acquire (by way of foreclosure or otherwise), hold and/or dispose of real estate that secured, or is otherwise related to, an investment of the Fund. (For purposes of this restriction, investments by the Fund in mortgage-backed securities and other securities representing interests in mortgage pools shall not constitute the purchase or sale of real estate.) For purposes of applying the terms of the Fund’s fundamental policy number 4, the Adviser will, on behalf of the Fund, make reasonable determinations as to the appropriate industry classification to assign to each issuer of securities in which the Fund invests. As a general matter, the Fund considers an industry to be a group of companies whose principal activities, products or services offered give them a similar economic risk profile vis à vis issuers active in other sectors of the economy. The definition of what constitutes a particular industry is therefore an evolving one, particularly for issuers in industries that are new or are undergoing rapid development. Some issuers could reasonably fall within more than one industry category. For example, some companies that sell goods over the Internet (including issuers of securities in which the Fund may invest) were initially classified as Internet companies, but over time have evolved into the economic risk profiles of retail companies. The Adviser will use its reasonable efforts to assign each issuer to the category which it believes is most appropriate. Further, the Fund takes the position that mortgage-backed securities and asset-backed securities, whether government-issued or privately issued, do not represent interests in any particular industry or group of industries, and therefore the 25% concentration restrictions noted above do not apply to such securities. The Fund currently considers real estate-related investments to include, among others, securities issued by real estate investment trusts (“ REITs ”) of any kind, including commercial, residential, industrial, mortgage, and other types of REITs; investments issued by issuers engaged substantially in the ownership, construction, development, financing, management, servicing, sale, and/or leasing of commercial, residential, and/or industrial real estate; and instruments the returns of which are substantially determined by reference to any of the foregoing. The specific investments that the Fund may from time to time consider to qualify as “real estate-related investments” will change over time. For purposes of calculating the Fund’s exposure to real estate-related investments, the Fund may measure the exposure gained through a derivative instrument by reference to the instrument’s notional value. For purposes of the Fund’s policies (including the fundamental policies discussed above), any actions taken or omitted or investments made in reliance on, or in accordance with, exemptive relief, no action relief, interpretive guidance or other regulatory or governmental action or guidance, shall be considered to have been taken, made, or omitted in accordance with applicable law. Other Investment Policies All percentage limitations and requirements (including those set forth in the fundamental policies discussed above) as to 3 Table of Contents investments will apply only at the time of an investment to which the limitation or requirement is applicable and shall not be considered violated unless an excess or deficiency occurs or exists immediately after and as a result of such investment. Accordingly, any later increase or decrease resulting from a change in values, net assets or other circumstances will not be considered in determining whether any investment complies with the Fund’s limitation or requirement. Such percentage limitations and requirements do not apply to the asset coverage test set forth in Section 18(f)(1) of the 1940 Act. The 1940 Act provides that a “vote of a majority of the outstanding voting securities” of the Fund means the affirmative vote of the lesser of (1) more than 50% of the outstanding shares of the Fund, or (2) 67% or more of the shares present at a meeting if more than 50% of the outstanding shares of the Fund are represented at the meeting in person. It is contrary to the current policy of the Fund, which policy may be changed without shareholder approval, to invest more than 15% of the Fund’s net assets in securities which are determined to be illiquid by the Fund’s Board of Trustees (the “ Board ” or the “ Trustees ”), or persons designated by the Board to make such determinations (such as the Adviser) in accordance with procedures adopted by the Board. INVESTMENT STRATEGIES The Fund’s Prospectus describes the Fund’s principal investment strategies. The following provides information that supplements the information provided in the Fund’s Prospectus. Certain strategies and instruments described below may not apply to the Fund. Unless a strategy, instrument or policy described below is specifically prohibited by the investment restrictions listed in the Fund’s Prospectus, under “Investment Restrictions” in this SAI, or by applicable law, the Fund may, but will not necessarily, engage in each of the investment practices described below. Except as stated elsewhere in the Fund’s Prospectus or this SAI, to the extent the Fund has reserved the freedom to invest in a type of investment or to utilize a particular investment practice, the Fund may invest in such investment or engage in such investment practice without limit. The Adviser’s investment process may take into account a number of factors. These factors may include, among others, standard of living convergence, consumer deleveraging, private sector debt transference and demographic shifts, position in the business cycle, sector returns, relative growth, monetary and fiscal policy, risk integration, market sentiment, behavioral analysis, relative value, market technicals, and government and /or regulatory intervention. The Fund will attempt to achieve its objective by investing in a variety of investments (that may be obligations of domestic or foreign entities), such as but not limited to (as specified in greater detail below), (i) project bonds; (ii) debt obligations issued or guaranteed by governments or governmental agencies (iii) U.S. Government Securities; (iv) corporate debt securities, including bonds, notes and debentures; (v) corporate and asset-backed commercial paper; (vi) mortgage and other asset-backed securities of all kinds, including collateralized mortgage obligations (“ CMOs ”), Real Estate Mortgage Investment Conduits (“ REMICs ”) and Re-REMICs (which are REMICs that have been resecuritized); (vii) Enhanced Equipment Trust Certificates (“ EETCs ”) and Equipment Trust Certificate (“ ETCs ”) (viii) variable and floating rate debt securities (including inverse floaters and floating rate notes); (ix) subordinated corporate, mortgage, and asset-backed securities; (x) equity securities of any kind; (xi) commodities; (xii) bank certificates of deposit; (xiii) fixed time deposits and bankers’ acceptances; (xiv) money market securities; (xv) repurchase agreements and reverse repurchase agreements; (xvi) hybrid securities; (xvii) obligations of foreign governments or their subdivisions, agencies and instrumentalities or foreign corporate issuers; (xviii) loan participations and assignments; (xix) commercial or residential whole mortgage loans; (xx) derivatives (including but not limited to options, futures contracts, including Treasury futures, swap agreements such as credit default swaps, interest rate swaps, and total and excess return swaps, and currency-related transactions, including forward exchange contracts and futures contracts); (xxi) private placements, including Regulation S and Rule 144A securities; (xxii) futures and options on futures relating to currencies, indexes and other financial factors; (xxiii) loans including, without limitation, secured and unsecured senior loans, term loan Bs, mezzanine, second lien, and other subordinated loans, delayed funding loans, revolving credit facilities, non-performing loans, re-performing loans, and other fixed and floating rate loans (as well as various forms of securitizations of these and other types of loans); (xxiv) distressed and defaulted debt securities; (x

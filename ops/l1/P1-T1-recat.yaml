      N-14 1 d538634dn14.htm N-14 N-14 Securities Act Registration No. As filed with the Securities and Exchange Commission On July 14, 2023 UNITED STATES SECURITIES AND EXCHANGE COMMISSION Washington, D.C. 20549 FORM N-14 REGISTRATION STATEMENT UNDER THE SECURITIES ACT OF 1933 ☒ Pre-Effective Amendment No. ☐ Post-Effective Amendment No. ☐ JOHCM FUNDS TRUST (Exact Name of Registrant as Specified in Charter) 53 State Street, 13 th Floor Boston, Massachusetts 02109 (Address of Principal Executive Offices) Registrant’s Telephone Number, including Area Code: (617) 933-0712 Mary Lomasney 53 State Street, 13 th Floor Boston, Massachusetts 02109 (Name and Address of Agent for Service) With copy to: George Raine, Esq. Ropes & Gray LLP Prudential Tower 800 Boylston Street Boston, MA 02199-3600 Title of Securities Being Registered: Institutional Shares and Investor Shares of the Trillium ESG Global Equity Fund, a series of the Registrant. Institutional Shares of the Trillium ESG Small/Mid Cap Fund, a series of the Registrant. Approximate date of Proposed Offering: As soon as practicable after this Registration Statement becomes effective. It is proposed that this filing will become effective on August 15, 2023 pursuant to Rule 488 under the Securities Act of 1993, as amended. An indefinite amount of the Registrant’s securities have been registered under the Securities Act of 1933 pursuant to Rule 24f-2 under the Investment Company Act of 1940. In reliance upon such Rule, no filing fee is paid at this time. August [ ], 2023 Dear Shareholder: On behalf of the Board of Trustees of Professionally Managed Portfolios (“PMP”), we invite you to a special meeting of shareholders (the “Meeting”) of the Trillium ESG Global Equity Fund and the Trillium ESG Small/Mid Cap Fund, each a series of PMP (collectively, the “Trillium Funds”), which will be held at the offices of U.S. Bank Global Fund Services, 615 East Michigan Street, Milwaukee, WI, 53202 on October 5, 2023 at 11:30 AM, Central Time. We may impose additional procedures or limitations on Meeting attendees or may decide to hold the Meeting in a different location or format. Any updates to the Meeting location can be found at: https://vote.proxyonline.com/pmp/docs/trillium2023.pdf , and we encourage you to check this weblink prior to the Meeting if you plan to attend. As discussed in more detail in the enclosed Proxy Statement/Prospectus, the adviser to each of the Trillium Funds, Trillium Asset Management, LLC (“Trillium”), has determined that it would be in the best interests of shareholders to reorganize each of the Trillium Funds from PMP into newly created funds (the “Acquiring Funds”) of the JOHCM Funds Trust (“JFT”), a trust managed by JOHCM (USA) Inc (“JOHCM USA”), in order to consolidate the Trillium Funds with other funds in JFT managed by JOHCM USA (each a “Reorganization” and together, the “Reorganizations”). Importantly, the portfolio managers and the investment objectives will remain the same, and the investment policies and investment risks of the Acquiring Funds will remain substantially similar to those of the Trillium Funds as a result of the Reorganizations. Trillium will continue to be responsible for the day-to-day management of your Fund and the Reorganizations will not result in any increase in the advisory fees paid by shareholders. In fact, shareholders can expect to experience a lower expense ratio from economies of scale achieved through the Reorganizations. The Reorganizations are being proposed following the acquisition of Pendal Group Limited, the parent company of JOHCM USA, by Perpetual Limited, the ultimate parent company of Trillium. JOHCM USA and Trillium believe that the Reorganizations, which will result in the Trillium Funds being housed in the same mutual fund trust as other U.S. mutual funds advised by JOHCM USA, and managed by other affiliates owned by Perpetual Limited, would benefit shareholders in a number of ways, including by allowing for efficiencies in operational management and oversight, compliance oversight, sponsorship and governance matters. JOHCM USA and Trillium, and their parent company Perpetual Limited, also believe that the proposed Reorganizations will provide opportunities to increase the assets of the Trillium Funds through the established distribution network of JOHCM USA. As a result, Trillium has asked the Board of PMP (the “PMP Board”), and the PMP Board has agreed, subject to approval by the shareholders of the Trillium Funds, to reorganize the Trillium Funds into the Acquiring Funds, which are newly created funds of JFT. Each Reorganization would occur by transferring all the assets and liabilities of the respective Trillium Fund to a corresponding Acquiring Fund within JFT, structured nearly identically to its corresponding Trillium Fund. If shareholders approve the Agreement and Plan of Reorganization for your Trillium Fund, on the closing date of the Reorganizations, your Trillium Fund shares will be exchanged for shares of the corresponding Acquiring Fund equal in value to the net asset value of your Trillium Fund shares immediately prior to the Reorganization. Following the Reorganizations, the Trillium Funds will be dissolved, and you will no longer be a shareholder of the Trillium Fund. Instead, you will be a shareholder in the newly created Acquiring Fund within JFT that acquired the Trillium Fund’s assets. Importantly, approval of the Reorganizations will not result in any increase in shareholder fees or expenses, nor any changes to the portfolio management team. i Each Reorganization is intended to qualify as a tax-free organization for U.S. federal tax purposes. No sales charges or redemption fees will be imposed in connection with the Reorganizations. Shares will be exchanged as follows: Professionally Managed Portfolios (Trillium Funds) JOHCM Funds Trust (Acquiring Funds) Trillium ESG Global Equity Fund g Trillium ESG Global Equity Fund Retail Class Shares g Investor Class Shares Institutional Class Shares g Institutional Class Shares Trillium ESG Small/Mid Cap Fund g Trillium ESG Small/Mid Cap Fund Institutional Class Shares g Institutional Class Shares The approval of the Reorganization of one Trillium Fund is not contingent upon the approval of the Reorganization of the other Trillium Fund. Therefore, if shareholders of one Trillium Fund do not approve the Reorganization, then that Trillium Fund will not be reorganized into its corresponding new fund and the PMP Board will consider what further actions to take, if any, with respect to that Trillium Fund, which may include the continued solicitation of proxies for the Reorganization, the liquidation of that Trillium Fund or the continuation of that Trillium Fund within the PMP structure. Shareholders of record of the Trillium Funds as of the regular close of business of the New York Stock Exchange on July 21, 2023 have the opportunity to vote on the proposals. This package contains notice of the Meeting, information about the proposals and the materials to use when casting your vote. More information on the specific details of and reasons for the proposed Reorganizations is contained in the enclosed Proxy Statement/Prospectus. Please read the enclosed materials carefully and cast your vote on the Proxy Card. Please vote your shares promptly. Your vote is extremely important, no matter how many shares you own. If you have any questions about how to vote your proxy or about the Meeting in general, please call toll-free (886) 751-6311. Thank you for your participation in this important initiative. Sincerely, Matthew Patsky Chief Executive Officer, Trillium Asset Management, LLC A Proxy Card covering your Trillium Funds is enclosed along with the Proxy Statement/Prospectus. VOTING IS QUICK AND EASY. YOUR VOTE IS IMPORTANT NO MATTER HOW MANY SHARES YOU OWN. To secure the largest possible representation at the Meeting, please vote as soon as possible, via the Internet, by telephone, or mark, sign, date and return your Proxy Card by mail. If you sign, date and return the Proxy Card but give no voting instructions, your shares will be voted “FOR” the proposals indicated on the card. You may revoke your proxy at any time at or before the Meeting. Voting is quick and easy. Everything you need is enclosed. To cast your vote: PHONE: Call the toll-free number on your proxy card. Enter the control number on your proxy card and follow the instructions. INTERNET: Visit the website indicated on your proxy card. Enter the control number on your proxy card and follow the instructions. MAIL: Complete the proxy card(s) enclosed in this package. BE SURE TO SIGN EACH CARD before mailing it in the postage-paid envelope. If we do not hear from you after a reasonable amount of time, you may receive a call from our proxy solicitor, AST Fund Solutions, Inc., reminding you to vote. THE BOARD OF TRUSTEES OF THE PMP TRUST RECOMMENDS THAT YOU VOTE “FOR” THE PROPOSALS. INSTRUCTIONS FOR SIGNING PROXY CARD(S) The following general guidelines for signing Proxy Cards may be of assistance to you and will help avoid the time and expense involved in validating your vote if you fail to sign your Proxy Card properly. 1. Individual accounts: Sign your name exactly as it appears in the registration on the Proxy Card. 2. Joint accounts: Either party may sign, but the name of the party signing should conform exactly to the name shown in the registration on the Proxy Card. 3. All other accounts: The capacity of the individual signing the Proxy Card should be indicated unless it is reflected in the form of registration. For example: Registration Valid signature Corporate Accounts (1) ABC Corp. ABC Corp. John Doe, Treasurer (2) ABC Corp. John Doe, Treasurer (3) ABC Corp. c/o John Doe, Treasurer John Doe (4) ABC Corp. Profit Sharing Plan John Doe, Trustee Partnership Accounts (1) The XYZ Partnership Jane B. Smith, Partner (2) Smith and Jones, Limited Partnership Jane B. Smith, General Partner Trust Accounts (1) ABC Trust Account Jane B. Doe, Trustee (2) Jane B. Doe, Trustee u/t/d 12/18/78 Jane B. Doe Custodial or Estate Accounts (1) John B. Smith, Cust. f/b/o John B. Smith, Jr. UGMA/UTMA John B. Smith (2) Estate of John B. Smith John B. Smith, Jr., Executor Trillium ESG Global Equity Fund Trillium ESG Small/Mid Cap Fund Each a Series of Professionally Managed Portfolios c/o U.S. Bank Global Fund Services 615 East Michigan Street Milwaukee, WI 53202 NOTICE OF SPECIAL MEETING OF SHAREHOLDERS TO BE HELD ON OCTOBER 5, 2023 To the shareholders of the above referenced series (the “Target Funds”) of Professionally Managed Portfolios (“PMP” or the “Target Trust”), NOTICE IS HEREBY GIVEN that the Target Trust will hold a special meeting of shareholders (the “Meeting”) for the Target Funds at the offices of U.S. Bank Global Fund Services, 615 East Michigan Street, Milwaukee, WI, 53202 on October 5, 2023 at 11:30 AM, Central Time. We may impose additional procedures or limitations on Meeting attendees or may decide to hold the Meeting in a different location or format. Any updates to the Meeting location can be found at: https://vote.proxyonline.com/pmp/docs/trillium2023.pdf , and we encourage you to check this weblink prior to the Meeting if you plan to attend. The purpose of the Meeting is to consider and act upon the following proposals (each, a “Proposal,” and collectively, the “Proposals”): a. To approve the Agreement and Plan of Reorganization with respect to the Target Funds (the “Plan”), which provides for: (i) the acquisition by JOHCM Funds Trust, a Massachusetts business trust (the “Acquiring Trust”), on behalf of the Trillium ESG Global Equity Fund (the “Acquiring Global Equity Fund”), of (a) all of the Institutional Class shares of Trillium ESG Global Equity Fund, a series of the Target Trust (the “Target Global Equity Fund”), in exchange for Institutional Class shares of the Acquiring Global Equity Fund (“Acquiring Global Equity Fund Institutional Shares”) and (b) all of the Retail Class shares of the Target Global Equity Fund in exchange for Investor Class shares of the Acquiring Global Equity Fund (the “Acquiring Global Equity Fund Investor Shares,” and, collectively with the Acquiring Global Equity Fund Institutional Shares, the “Acquiring Global Equity Fund Shares”), and the assumption by the Acquiring Trust, on behalf of the Acquiring Global Equity Fund, of the liabilities of the Target Global Equity Fund; (ii) the acquisition by the Acquiring Trust, on behalf of the Trillium ESG Small/Mid Cap Fund (the “Acquiring SMID Fund”), of all of the Institutional Class shares of Trillium ESG Small/Mid Cap Fund, a series of the Target Trust (the “Target SMID Fund”), in exchange for Institutional Class shares of the Acquiring SMID Fund (“Acquiring SMID Fund Shares”), and the assumption by the Acquiring Trust, on behalf of the Acquiring SMID Fund, of the liabilities of the Target SMID Fund; (iii) the distribution of Acquiring Global Equity Fund Shares to the shareholders of the Target Global Equity Fund according to their respective interests in the Target Global Equity Fund and its respective share classes in complete liquidation of the Target Global Equity Fund; 1 (iv) the distribution of Acquiring SMID Fund Shares to the shareholders of the Target SMID Fund according to their respective interests in the Target SMID Fund in complete liquidation of the Target SMID Fund; and (v) the dissolution of the Target Funds as soon as practicable after the closing. b. To vote upon any other business that may properly come before the Meeting or any adjournment(s) or postponement(s) thereof. A copy of the form of the Plan, which more completely describes the proposed transaction, is attached as Appendix A to the enclosed Proxy Statement/Prospectus. It is not anticipated that any matters other than the approval of the Proposals noted above will be brought before the Meeting. If, however, any other business is properly brought before the 

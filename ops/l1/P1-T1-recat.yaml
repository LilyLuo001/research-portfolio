 on the dates shown next to the Fund names: Neuberger Berman Dividend Growth Fund (December 15, 2015), Neuberger Berman Emerging Markets Equity Fund (October 8, 2008); Neuberger Berman Equity Income Fund (November 2, 2006); Neuberger Berman International Equity Fund (June 17, 2005); Neuberger Berman International Select Fund (August 1, 2006); Neuberger Berman International Small Cap Fund (December 8, 2016); Neuberger Berman Intrinsic Value Fund (May 10, 2010); Neuberger Berman Multi-Cap Opportunities Fund (November 2, 2006); Neuberger Berman Real Estate Fund (May 1, 2002); and Neuberger Berman U.S. Equity Impact Fund (March 23, 2021). The following information supplements the discussion of the Funds’ investment objectives, policies, and limitations in the Prospectuses. The investment objective and, unless otherwise specified, the investment policies and limitations of each Fund are not fundamental. Any investment objective, policy, or limitation that is not fundamental may be changed by the trustees of the Trust (“Fund Trustees”) without shareholder approval. The fundamental investment policies and limitations of a Fund may not be changed without the approval of the lesser of: (1) 67% of the shares of the Fund present at a meeting at which more than 50% of the outstanding shares of the Fund are present or represented, or (2) a majority of the outstanding shares of the Fund. These percentages are required by the Investment Company Act of 1940, as amended (“1940 Act”), and are referred to in this SAI as a “1940 Act majority vote.” The policy of a Fund permitting it to operate as a non-diversified investment company under the 1940 Act may also change by operation of law. Specifically, Rule 13a-1 under the 1940 Act provides in effect that, if a fund’s investment portfolio actually meets the standards of a diversified fund for three consecutive years, the fund’s status will change to that of a diversified fund. By operation of law, each of Neuberger Berman Focus Fund, and Neuberger Berman Multi-Cap Opportunities Fund currently operates as a diversified investment company. Each Fund, except Neuberger Berman Real Estate Fund and Neuberger Berman Sustainable Equity Fund, operates as a diversified investment company. Each of Neuberger Berman Real Estate Fund and Neuberger Berman Sustainable Equity Fund currently operates as a non-diversified investment company. 1 Investment Policies and Limitations Except as set forth in the investment limitation on borrowing and the investment limitation on illiquid securities, any investment policy or limitation that involves a maximum percentage of securities or assets will not be considered exceeded unless the percentage limitation is exceeded immediately after, and because of, a transaction by a Fund. If events subsequent to a transaction result in a Fund exceeding the percentage limitation on illiquid securities, the Manager will take appropriate steps to reduce the percentage held in illiquid securities, as may be required by law, within a reasonable amount of time. The following investment policies and limitations are fundamental and apply to all Funds unless otherwise indicated: 1. Borrowing (All Funds except Neuberger Berman Equity Income Fund, Neuberger Berman Large Cap Value Fund, Neuberger Berman Real Estate Fund, Neuberger Berman Small Cap Growth Fund, and Neuberger Berman Sustainable Equity Fund) . A Fund may not borrow money except as permitted by (i) the 1940 Act or interpretations or modifications by the SEC, SEC staff or other authority with appropriate jurisdiction, or (ii) exemptive or other relief or permission from the SEC, SEC staff or other authority. Borrowing (Neuberger Berman Equity Income Fund, Neuberger Berman Large Cap Value Fund, Neuberger Berman Real Estate Fund, Neuberger Berman Small Cap Growth Fund, and Neuberger Berman Sustainable Equity Fund) . No Fund may borrow money, except that a Fund may (i) borrow money from banks for temporary or emergency purposes and not f
ders of the Vest S&P 500 ® Dividend Aristocrats Target Income Fund (the “Target Fund”), a series of World Funds Trust (the “Target Trust”), will be held at the offices of the Target Trust, [8730 Stony Point Parkway, Suite 205, Richmond, Virginia 23235], on [ ], 2026, at [ ] [a.m./p.m.] Eastern time (the “Meeting”). At the Meeting, shareholders of the Target Fund will consider a proposal to approve an Agreement and Plan of Reorganization (the “Plan”). The Plan will provide for the transfer of all of the assets of the Target Fund to the FT Vest S&P 500 ® Dividend Aristocrats Target High Income Fund (the “Acquiring Fund”), a newly formed open-end mutual fund organized as a separate series of First Trust Series Fund, in exchange solely for shares of the Acquiring Fund and the assumption of all of the liabilities of the Target Fund by the Acquiring Fund, and the distribution of the Acquiring Fund’s shares received by the Target Fund to its shareholders in complete liquidation of the Target Fund (the “Reorganization”). If the Plan is approved and the Reorganization is completed, shareholders of the Target Fund at the time of the Reorganization will receive shares of the Acquiring Fund, with an aggregate net asset value equal to the aggregate net asset value of shares of the Target Fund held by the shareholder immediately prior to the Reorganization. Vest Financial LLC (“Vest”), the investment adviser to the Target Fund, recommended to the Target Trust’s Board of Trustees (the “Board”) that the Target Fund be reorganized into the Acquiring Fund, a newly created series of First Trust Series Fund for which First Trust Advisors L.P. (“First Trust”) would serve as the investment adviser. To effectuate this, the Board has approved the Reorganization pursuant to the Plan. Vest will serve as investment sub-adviser to the Acquiring Fund, and it is expected that the Acquiring Fund’s portfolio will be managed by the portfolio managers who are currently responsible for the day-to-day management of the Target Fund’s portfolio. The investment objective, principal investment strategies, principal investment risks and investment limitations of the Acquiring Fund are the same in all material respects to those of the Target Fund, as discussed in more detail in the attached Proxy Statement/Prospectus. The Reorganization is not expected to result in any increase in shareholder fees or expenses. In addition, the Reorganization is expected to qualify as a tax-free reorganization for federal income tax purposes. No sales charges or redemption fees will be imposed in connection with the Reorganization. If the shareholders of the Target Fund do not approve the Reorganization, then the Reorganization will not be implemented and the Board will consider additional actions with respect to the Target Fund. After careful consideration, and based on the recommendation of Vest, the Board has unanimously approved the Reorganization and recommends that Target Fund shareholders vote “FOR” the Reorganization. Enclosed in these materials is (i) a Notice of Special Meeting of Shareholders; and (ii) a Proxy Statement and Prospectus providing detailed information on the Acquiring Fund, including a comparison to the Target Fund, and the Reorganization, including the reasons for proposing the Reorganization. Your vote is very important . As a shareholder, you are entitled to cast one vote for each share of the Target Fund that you own, while each fractional share is entitled to a proportionate fractional vote. Please read the enclosed materials carefully and then cast your vote. While you are, of course, welcome to join us at the Meeting, most shareholders cast their vote by completing and returning the enclosed proxy card or by voting by telephone or via the Internet. A postage-paid envelope is enclosed for mailing the proxy card, and touch-tone telephone and Internet voting instructions are listed at the top of your proxy card. Our proxy solicitor, [EQ Fund Solutions LLC], may contact you to encourage you to exercise your right to vote. We appreciate your participation in this important Meeting. Thank you. Sincerely yours, [ ] President, World Funds Trust on behalf of Vest S&P 500 ® Dividend Aristocrats Target Income Fund If You Need Any Assistance Or Have Any Questions Regarding The Proposed Reorganization Or How To Vote Your Shares, Call [EQ Fund Solutions LLC] at [ ] Weekdays From [9:00 a.m. To 10:00 p.m. Eastern Time]. - ii - Important Information for Shareholders of Vest S&P 500 ® Dividend Aristocrats Target Income Fund [ ] , 2025 Although we recommend that you read in its entirety the enclosed Proxy Statement and Prospectus (“Proxy Statement/Prospectus”), for your convenience, we have provided a brief overview of the proposal to be voted on at the special meeting of shareholders (the “Meeting”) of Vest S&P 500 ® Dividend Aristocrats Target Income Fund (the “Target Fund”). Q. Why am I receiving the enclosed Proxy Statement/Prospectus? A. You are receiving the Proxy Statement/Prospectus as a shareholder of the Target Fund. At the Meeting, shareholders of the Target Fund will be asked to vote on the following proposal, which will result in shareholders of the Target Fund exchanging their shares for those of a newly created open-end mutual fund: To approve the Agreement and Plan of Reorganization (the “Plan”) by and between World Funds Trust (the “Target Trust”), on behalf of the Target Fund, and First Trust Series Fund (the “Acquiring Trust”), on behalf of its series, FT Vest S&P 500 ® Dividend Aristocrats Target High Income Fund, a newly formed open-end mutual fund (the “Acquiring Fund” and, together with the Target Fund, the “Funds”), pursuant to which the Target Fund would (i) transfer all of its assets to the Acquiring Fund in exchange for newly issued shares of the Acquiring Fund and the Acquiring Fund’s assumption of all of the liabilities of the Target Fund, and (ii) immediately distribute such newly issued shares of the Acquiring Fund to shareholders of the Target Fund (the “Reorganization”). The Board of Trustees of the Target Fund (the “Board”) has determined that such proposal is in the best interests of the Target Fund. The Board recommends that you vote FOR the proposal. Q. Why is the Reorganization being recommended? A. Vest Financial LLC (“Vest”), the investment adviser to the Target Fund, recommended to the Target Trust’s Board of Trustees that the Target Fund be reorganized into the Acquiring Fund, a newly created series of First Trust Series Fund for which First Trust Advisors L.P. (“First Trust”) would serve as the investment adviser. To effectuate this, the Board has approved the Reorganization pursuant to the Plan. Vest will serve as investment sub-adviser to the Acquiring Fund, and it is expected that the Acquiring Fund’s portfolio will be managed by the portfolio managers who are currently responsible for the day-to-day management of the Target Fund’s portfolio. The investment objective, principal investment strategies, principal investment risks and investment limitations of the Acquiring Fund are the same in all material respects to those of the Target Fund, as discussed in more detail in the attached Proxy Statement/Prospectus. Vest recommended the Reorganization to the Target Board because Vest believes that First Trust has extensive experience providing investment advisory services to open-end funds; that the Target Fund can benefit from First Trust’s investment advisory experience, and that First Trust can better differentiate the Acquiring Fund in the marketplace and add the Acquiring Fund to First Trust’s existing distribution networks, which could potentially add size and scale to the Fund and reduce expenses for shareholders. Additionally, First Trust Capital Partners, LLC (“FTCP”), an affiliate of First Trust, owns a majority equity ownership interest in Vest’s parent company, and First Trust and Vest wish to reorganize the Target Fund into the First Trust family of funds. Q. How will the Reorganization work? A. Below is a summary of certain aspects of the proposed Reorganization. • It is proposed that, subject to shareholder approval, the Target Fund be reorganized into the Acquiring Fund, a newly created fund organized solely in connection with the Reorganization to acquire all of the assets and assume all of the liabilities of the Target Fund and continue the business of the Target Fund as a series of the Acquiring Trust. The Reorganization, if approved by shareholders of the Target Fund (“Target Fund Shareholders”), would be accomplished in accordance with the Plan, a form of which is attached to the Proxy Statement/Prospectus as Appendix A. • The Acquiring Fund, a series of Acquiring Trust, will offer three classes of shares, Class A, Class Y and Class I. Target Fund Shareholders who hold Class A shares of the Target Fund and Class C shares of the Target Fund will receive Class A shares of the Acquiring Fund in the Reorganization, Target Fund Shareholders who hold Class Y shares of the Target Fund will receive Class Y shares of the Acquiring Fund in the Reorganization, and Target Fund Shareholders who hold Investor Class shares of the Target Fund and Institutional Class shares of the Target Fund will receive Class I shares of the Acquiring Fund in the Reorganization. • Subject to shareholder approval, the Reorganization will be accomplished in accordance with the Plan. The Plan provides for the transfer of all of the assets of the Target Fund to the Acquiring Fund in exchange for the assumption by the Acquiring Fund of all of the liabilities of the Target Fund and shares of the Acquiring Fund having an aggregate net asset value (“NAV”) equal to the aggregate NAV of the Target Fund, followed immediately by the distribution by the Target Fund to each of its shareholders of the portion of shares of the Acquiring Fund to which the shareholder is entitled, in complete liquidation of the Target Fund. Upon the closing of the Reorganization, each Target Fund Shareholder would cease to be a shareholder of the Target Fund and would become a shareholder of the Acquiring Fund. Thereafter, the Target Fund would be terminated as a series of the Target Trust. • If the Reorganization is approved by shareholders and you remain a shareholder of the Target Fund on the Closing Date (as defined below), you will receive a number of shares of the applicable class of the Acquiring Fund (“Acquiring Fund Shares”) that, in the aggregate, have the same net asset value as your shares of the Target Fund (“Target Fund Shares”) as of immediately prior to Closing. Q. Has the Board approved the Reorganization? A. Yes, the Board unanimously approved the Reorganization and determined that the Reorganization would be in the best interests of the Target Fund. Accordingly, the Board recommends that shareholders of the Target Fund approve the Reorganization proposal. See “The Reorganization—Information About the Reorganization—Background and Trustees’ Considerations Relating to the Proposed Reorganization” in the Proxy Statement/Prospectus below. Q. How will the Reorganization affect me as a shareholder? A. Shareholders of the Target Fund as of the closing date of the Reorganization will become shareholders of the Acquiring Fund. Shareholders of Class A shares of the Target Fund and shareholders of Class C shares of the Target Fund at the time of the Reorganization will receive Class A shares of the Acquiring Fund, Shareholders of Class Y shares of the Target Fund at the time of the Reorganization will receive Class Y shares of the Acquiring Fund, and shareholders of Investor Class shares of the Target Fund and Institutional Class shares of the Target Fund at the time of the Reorganization will receive Class I shares of the Acquiring Fund. An account will be created for each shareholder of the Target Fund that will be credited with shares of the applicable class of the Acquiring Fund with an aggregate net asset value eq

 Taxes 72 FINANCIAL HIGHLIGHTS 74 INDEX DESCRIPTIONS 75 SUMMARY SECTION SUMMARY SECTION Alternative Energy Fund Investment Objective The Alternative Energy Fund’s investment objective is long -term capital appreciation. Fees and Expenses of the Fund This table describes the fees and expenses that you may pay if you buy and hold shares of the Alternative Energy Fund. You may pay other fees, such as brokerage commissions and other fees to financial intermediaries, which are not reflected in the tables and example below.: Shareholder Fees (fees paid directly from your investment) None (1) Annual Fund Operating Expenses (expenses that you pay each year as a percentage of the value of your investments) Management Fees: 0.80 % Distribution (12b-1) Fees: None Other Expenses: 1.09 % Shareholder Servicing Plan Fees 0.18 % Tax Expense 0.01 % All Other Expenses 0.90 % Total Annual Fund Operating Expenses: 1.89 % Recoupment of fees waived and/or expenses reimbursed: (2) ( 0.78 )% Total Annual Fund Operating Expenses After Recoupment of Fees Waived and/or Expense Reimbursement: (2) 1.11 % ​ (1) The Fund charges a $15 fee for each payment of redemption proceeds by wire transfer. ​ (2) The Adviser has contractually agreed to waive or reimburse Fund expenses (excluding Acquired Fund Fees and Expenses, fees related to services for reclamation or collection of foreign taxes withheld, interest, taxes, dividends on short positions, investment -related costs and extraordinary expenses) in order to limit the Fund’s Total Annual Operating Expenses to 1.10% through June 30, 2029 . To the extent that the Adviser absorbs expenses to satisfy this cap, it may recoup a portion or all of such amounts absorbed at any time within three fiscal years after the fiscal year in which such amounts were absorbed, subject to the expense cap in place at the time recoupment is sought, which cannot exceed the expense cap at the time of the waiver. The expense limitation agreement may be terminated by the Board of the Fund at any time without penalty upon 60 days’ notice. Example This Example is intended to help you compare the cost of investing in the Alternative Energy Fund with the cost of investing in other mutual funds. The Example assumes that you invest $10,000 in the Fund for the time periods indicated and then redeem all of your shares at the end of those periods. The Example also assumes that your investment has a 5% return each year and that the Fund’s operating expenses remain the same. Although your actual costs may be higher or lower, based on these assumptions your costs would be: 1 Year 3 Years 5 Years 10 Years $ 113 $ 353 $ 790 $ 2,007 Portfolio Turnover The Fund pays transaction costs, such as commissions, when it buys and sells securities (or “turns over” its portfolio). A higher portfolio turnover rate may indicate higher transaction costs and may result in higher taxes when Fund shares are held in a taxable account. These costs, which are not reflected in annual fund operating expenses or in the example, affect the Fund’s performance. During the most recent fiscal year, the Fund’s portfolio turnover rate was 17.30 % of the average value of its portfolio. 1 SUMMARY SECTION Principal Investment Strategies The Alternative Energy Fund invests at least 80% of its net assets (plus any borrowings for investment purposes) in publicly -traded equity securities of alternative energy companies (both U.S. and non -U .S.). The Fund will focus on a particular group of companies that the Adviser considers to be “Sustainable Energy” companies, which are companies that, in the Adviser’s view, generate, produce or provide alternative or renewable sources of energy (as compared to more traditional sources of energy that can be environmentally depletive, such as fossil fuels like oil or coal or other hydrocarbon -based fuels), or that produce, generate, transport, or deliver energy applications in a way that makes alternative or renewable energy more efficient or accessible or reduces the use of environmentally depletive energy resources. The Fund will invest in alternative energy companies including companies that generate power through solar, wind, hydroelectric, tidal wave, geothermal, biomass or biofuels and the various companies that provide the equipment and technologies that enable these sources to be tapped, used, stored or transported, including companies that create, facilitate or improve technologies that conserve or enable more efficient use of energy. The Fund will not change this policy unless it gives shareholders at least 60 days’ notice. In determining whether to buy or sell a portfolio position, the Adviser uses proprietary and independent research and applies traditional fundamental analysis to assess a company’s business and business prospects, market capitalization, the valuation of the company, its dividend history, its ratio of debt to equity, as well as how the company’s business relates to sustainable characteristics like growth or development of alternative or renewable energy. The Adviser conducts an independent assessment of each portfolio company’s business. The Adviser categorizes the universe of companies it deems to be Sustainable Energy companies into four key areas related to the specific aspects of the energy business. Currently, these key areas are: Generation: companies involved in generating sustainable energy, either pure -play companies or companies working to transition from hydrocarbon -based fuels Installation: companies involved in manufacturing equipment for generation and consumption of sustainable energy Displacement: companies involved in the displacement or improved efficient usage of existing hydrocarbon -based energy Electrification: companies effectuating the switching from hydrocarbon -based fuel demand towards electricity or other renewal energy sources, especially for transportation The Fund holdings in each key area may vary and the Fund’s may invest in companies that do not fall within these key areas. The Fund holdings in each key area may vary and the Fund’s may invest in companies that do not fall within these key areas. Currently, the Adviser considers portfolio companies’ alignment with four of the United Nations Sustainable Development Goals: Goal 7: Affordable and Clean Energy; Goal 9: Industry, Innovation and Infrastructure; Goal 11: Sustainable Cities and Communities; and Goal 13: Climate Action. The Adviser may change these considerations at any time without notice to shareholders. Equity securities may include common stocks, preferred stocks, securities convertible into common stocks, rights and warrants. The Fund’s allocations may vary depending on changing market conditions (including but not limited to, liquidity, volatility, and the number of companies meeting selection criteria). The Fund may invest in companies economically tied to U.S. and to foreign countries, including, potentially, companies domiciled or traded in emerging markets, including China. For more information about how the Adviser determines that a company is economically tied to a foreign country, see “More About The Funds Investment Strategies and Risks” in this Prospectus. The Fund’s currency is US Dollars, while some of its investments are denominated in foreign currencies. The Fund will normally hold around 30 positions of approximately equal weight, but the portfolio may vary over time, and under normal market conditions, the Fund may have as few as 25 holdings, or may hold securities in 75 or more companies. The Fund will concentrate its investments (that is, invest more than 25% of its total assets) in the following group of industries: solar energy, wind energy, biofuels, hydrogen, geothermal energy, energy efficiency, and hydroelectricity. The Adviser will invest the Fund’s assets in securities of all market capitalization companies, but under normal market conditions, the Fund will invest in companies with a minimum market capitalization of $500 million. Additional information on Principal Investment Strategies can be found in the prospectus. Also see Additional Investment Strategies and Risks in the Statement of Additional Information. 2 SUMMARY SECTION For temporary defensive purposes, any portion of the Fund’s total assets may be invested in cash and cash equivalents, including money market funds, to respond to adverse market, economic, political or other conditions. While the Fund is applying this temporary defensive strategy, it may be unable to achieve its investment objective. The Fund is designed for investors who seek long -term capital appreciation through focused investment in equity securities of companies, wherever located, engaged in alternative or sustainable energy businesses. Principal Risks You can lose money investing in shares of the Alternative Energy Fund and investing in shares of this Fund may be more risky than investing in a fund that only invests in U.S. securities due to increased volatility of foreign markets. Risks associated with investing in the Fund can increase during times of market volatility. There can be no assurance that the Fund will achieve its investment objective. The Fund is subject to the following risks, which could affect the Fund’s net asset value (“NAV”) or its ability to meet its investment objective. These risks are also described in the Principal Risks of Investing in our Fund section of this Prospectus and in the Fund’s Statement of Additional Information. You can lose money by investing in this Fund. The principal risks are: Industry Risks. Prices of energy, whether traditional or sustainable, may fluctuate or decline due to many factors, including international political or economic developments, real or perceived, demand for energy and sustainable energy, production and distribution policies of OPEC (Organization of Petroleum Exporting Countries) and other oil -producing countries, energy conservation projects, changes in governmental regulations affecting companies in the energy business or related lines of business, including Sustainable Energy companies, changes in technology affecting alternative or sustainable energy, and changes in tax regulations relating to energy. A decline in energy prices would likely have a negative effect on securities held by the Fund. The Fund’s focus on sustainable energy businesses exposes the Fund to greater market risk and potential monetary losses than if the Fund’s assets were diversified among various industries or sectors. Equity Securities Risk. The Fund invests in publicly -traded equity securities, and their value may fluctuate, sometimes rapidly and unpredictably, which means a security may be worth more or less than when it was purchased. These fluctuations can be based on a variety of factors including a company’s financial condition as well as macro -economic factors such as interest rates, inflation rates, global market conditions, and non -economic factors such as market perceptions and social or political events. Market Risk. General market conditions can affect the value of the Fund’s securities holdings. Market risk applies to individual securities, a particular sector or the entire economy. Recently, global financial markets have experienced a period of extreme stress which has resulted in unusual and extreme volatility in the equity markets and in the prices of individual securities. In some cases, the prices of securities issued by individual companies have been negatively impacted even though there may be little or no apparent degradation in the financial conditions or prospects of that company. Global events, financial market shocks or interest rate events could cause equity securities generally to decline in value, including if fixed income securities become more favorable. These market conditions add significantly to the risk of short term volatility of the Fund. Global Risks. The Fund invests in companies in multiple countries within the Asia Pacific region

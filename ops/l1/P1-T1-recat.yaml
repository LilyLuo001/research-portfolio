      N-14 1 dhfn14financiallongshortdoc.htm DIAMOND HILL FUNDS DHF - N-14 Financial Long-Short Combined Document As filed with the Securities and Exchange Commission on March 6, 2019 File Nos. 333-22075 and 811-8061 SECURITIES AND EXCHANGE COMMISSION Washington, D.C. 20549 FORM N-14 THE SECURITIES ACT OF 1933 Pre-Effective Amendment No. ¬ Post-Effective Amendment No. ¬ Diamond Hill Funds (Exact Name of Registrant as Specified in Charter) 325 John H. McConnell Blvd., Suite 200, Columbus, Ohio 43215 (Address of Principal Executive Offices) (Zip Code) Registrant’s Telephone Number, including Area Code: (888) 226-5595 Gary R. Young, Diamond Hill Funds 325 John H. McConnell Blvd., Suite 200, Columbus, Ohio 43215 (Name and Address of Agent for Service) With copy to: Michael V. Wible, Esq. Thompson Hine LLP 41 South High Street, Suite 1700 Columbus, Ohio 43215-6101 Title of securities being registered: Shares of Research Opportunities Fund, a series of the Registrant No filing fee is required because the Registrant is relying on Section 24(f) of the Investment Company Act of 1940, as amended, pursuant to which it has previously registered an indefinite number of shares. Approximate date of proposed public offering: As soon as practicable after this Registration Statement becomes effective under the Securities Act of 1933, as amended. It is proposed that this filing become effective on 30 days after filing date pursuant to Rule 488 under the Securities Act of 1933, as amended. Diamond Hill Funds 325 John H. McConnell Boulevard, Suite 200 Columbus, Ohio 43215 For shareholders of: Diamond Hill Financial Long-Short Fund Dear Shareholder: We wanted to inform you, as a shareholder of Diamond Hill Financial Long-Short Fund, that Diamond Hill Capital Management, Inc. (the “Adviser”) recommended, and the Board of Trustees of your Fund approved, the Adviser’s proposal (“Proposal”) to reorganize your Fund into Diamond Hill Research Opportunities Fund (together with Diamond Hill Financial Long-Short Fund, the “Funds”), effective on or about June 7, 2019. The Adviser’s recommendation to reorganize the two Funds was based largely on your Fund’s ability to attract assets and reach scale and its history of net redemption activity. This reorganization is subject to approval by shareholders of Diamond Hill Financial Long-Short Fund. If the reorganization is approved and other closing conditions are satisfied or waived, you will receive the same class of shares of Diamond Hill Research Opportunities Fund that you hold in Diamond Hill Financial Long-Short Fund as of the reorganization date. Both Funds have identical investment objectives. In addition, while the Funds’ principal investment strategies and investment policies are similar in many respects, there are critical differences between the two. The Diamond Hill Financial Long-Short Fund’s portfolio is “concentrated” in the financial services industry, meaning that it has adopted a fundamental policy to invest 25% or more of its total assets in that industry. The Diamond Hill Research Opportunities Fund’s portfolio is not concentrated, and it invests across all market sectors and industries. In addition, per the Funds’ Prospectuses, the Diamond Hill Financial Long-Short Fund will sell securities short as part of its principal strategy, whereas the Diamond Hill Research Opportunities Fund may engage in short sales as part of its principal strategy. Currently, in practice, each Fund sells securities short as part of its principal strategy. The Adviser believes the proposed reorganization offers a number of benefits to shareholders of the Diamond Hill Financial Long-Short Fund, including being shareholders of a Fund with greater asset size that creates greater opportunity to benefit from long-term economies of scale and potentially lower total expenses. Each share class of the Diamond Hill Research Opportunities Fund is expected to have lower total expenses than the corresponding class of the Diamond Hill Financial Long-Short Fund, because the Acquiring Fund currently has lower dividend expenses and fees on securities sold short. The reorganization is designed to qualify as a tax-free reorganization, so you should generally not realize a tax gain or loss as a direct result of the reorganization. If the proposed reorganization to is not approved by shareholders, the Adviser intends to recommend that the Board of Trustees vote to liquidate the Diamond Hill Financial Long-Short Fund. Shareholders would receive a liquidating distribution on the liquidation date equal to the value of the shares owned. The liquidating distribution would result in a taxable transaction. The Proposal will be presented to shareholders at a special meeting of shareholders to be held on May 30, 2019 (the “Meeting”). Additional details about the proposed reorganization are described in the enclosed Q&A/Synopsis and Proxy statement/Prospectus, which you should read carefully. Your Fund’s Board of Trustees believes the proposed reorganization is in the best interest of the Fund and unanimously recommends that shareholders vote FOR the Proposal. Please read the enclosed Proxy Statement/Prospectus carefully and submit your voting instructions. If you have any questions about the Proposal, please call 614-255-3333. Thank you for your consideration of the Proposal, which is important and warrants your consideration. We value your investment and look forward to our continued relationship. Sincerely, Gary R. Young President Diamond Hill Funds Diamond Hill Funds 325 John H. McConnell Boulevard, Suite 200 Columbus, Ohio 43215 NOTICE OF SPECIAL MEETING OF SHAREHOLDERS To Be Held May 30, 2019 Notice is hereby given that the Board of Trustees of Diamond Hill Funds (the “Trust”) has called a Special Meeting of Shareholders of Diamond Hill Financial Long-Short Fund (the “Target Fund”), a series of the Trust, to be held at 325 John H. McConnell Blvd., Suite 200, Columbus, Ohio 43215, on May 30, 2019, at 10:00 a.m. Eastern Time (together with any adjournments or postponements thereof, the “Meeting”). At the Meeting, shareholders of the Target Fund will be asked to vote on the Proposal set forth below, and to transact such other business, if any, as may properly come before the Meeting. Proposal: Approve an Agreement and Plan of Reorganization, which provides for the transfer of all or substantially all of the assets of the Diamond Hill Financial Long-Short Fund to Diamond Hill Research Opportunities Fund in exchange for shares of beneficial interest of Diamond Hill Research Opportunities Fund and the assumption by Diamond Hill Research Opportunities Fund of all of the liabilities of Diamond Hill Financial Long-Short Fund. Only shareholders of record of the Target Fund as of the close of business on March 22, 2019 (the “Record Date”) are entitled to notice of, and to vote at, the Meeting and any adjournments or postponements thereof. The Notice of Meeting, Proxy Statement and accompanying form of proxy will first be mailed to shareholders on or about April __, 2019. The Board of Trustees of the Trust unanimously recommends that shareholders of the Target Fund vote FOR the Proposal. By Order of the Board of Trustees, Gary Young, President YOUR VOTE IS IMPORTANT To assure your representation at the Meeting, please complete, date and sign the enclosed proxy card and return it promptly in the accompanying envelope. You also may vote by telephone or via the Internet by following the instructions on the enclosed proxy card. Whether or not you plan to attend the Meeting in person, please vote your shares; if you attend the Meeting, you may revoke your proxy and vote your shares in person. For more information or assistance with voting, please call 614-255-3333. DIAMOND HILL FINANCIAL LONG-SHORT FUND PROXY STATEMENT/PROSPECTUS APRIL __, 2019 Relating to the acquisition of the assets of DIAMOND HILL FINANCIAL LONG-SHORT FUND by and in exchange for shares of beneficial interest of DIAMOND HILL RESEARCH OPPORTUNITIES FUND each a series of DIAMOND HILL FUNDS 325 John H. McConnell Blvd., Suite 200 Columbus, Ohio 43215 614-255-3333 INTRODUCTION This proxy statement/prospectus (the “Proxy Statement/Prospectus”) is being furnished to shareholders of Diamond Hill Financial Long-Short Fund (the “Target Fund”), a series of Diamond Hill Funds (the “Trust”), in connection with a special meeting of the shareholders of the Target Fund to be held at 325 John H. McConnell Blvd., Suite 200, Columbus, Ohio 43215 on May 30, 2019 at 10:00 a.m. Eastern Time (together with any adjournments or postponements thereof, the “Meeting”). The Board of Trustees of the Trust (the “Board of Trustees” or the “Trustees”) is soliciting proxies from shareholders of the Target Fund for the Meeting. At the Meeting, shareholders will be asked to vote on the Proposal set forth below, and to transact such other business, if any, as may properly come before the Meeting. Proposal: Approve an Agreement and Plan of Reorganization, which provides for the transfer of all or substantially all of the assets of the Diamond Hill Financial Long-Short Fund to Diamond Hill Research Opportunities Fund in exchange for shares of beneficial interest of Diamond Hill Research Opportunities Fund and the assumption by Diamond Hill Research Opportunities Fund of all of the liabilities of Diamond Hill Financial Long-Short Fund. We refer to Diamond Hill Research Opportunities Fund as the “Acquiring Fund.” We refer to the Target Fund and the Acquiring Fund collectively as the “Funds.” The Agreement and Plan of Reorganization for this proposed transaction is referred to herein as the “Plan,” and the transaction contemplated by the Plan is referred to herein as the “Reorganization.” As a result of the proposed Reorganization, each shareholder of the Target Fund will receive a number of full and fractional shares of the Acquiring Fund equal in value to their holdings in the Target Fund as of the close of regular trading on the New York Stock Exchange (“NYSE”) on the closing date of the Reorganization. The number of shares you will receive in the Reorganization will be determined by the relative net asset value (“NAV”) of each class of shares of the Target Fund and the corresponding class of shares of the Acquiring Fund. Diamond Hill Capital Management, Inc. (the “Adviser”) is the investment adviser for both the Acquiring Fund and the Target Fund and will remain the investment adviser of the Acquiring Fund following the completion of the Reorganization. After the Reorganization is completed, the Target Fund will be dissolved. The closing of the Reorganization is contingent upon approval of the Plan by shareholders of the Target Fund. A form of the Plan is attached as Appendix A. If shareholders approve the Plan, the Reorganization is expected to occur on or about June 7, 2019, or as soon as practicable thereafter (the “Closing Date”). This Proxy Statement/Prospectus, Notice of Special Meeting, and the proxy card(s) are first being mailed to shareholders of the Target Fund on or about April __, 2019. Shareholders of record of the Target Fund as of the close of business on March 22, 2019 (the “Record Date”) are entitled to notice of and to vote at the Meeting. The Board of Trustees unanimously recommends that shareholders of the Target Fund vote FOR the Proposal. This Proxy Statement/Prospectus, which you should read carefully and retain for future reference, sets forth the information that you should know about the Target Fund, the Acquiring Fund, the proposed Reorganization, and the Proposal, before voting on the Proposal. Both Funds have identical investment objectives. In addition, while the Funds’ principal investment strategies and investment policies are similar in many respects, there are critical differences between the two. The Target Fund’s portfolio is “concentrated” in the financial services industry, meaning that it has adopted a fundamental policy to invest 25% or more of its total assets in that industry. The Acquiring Fund’s portfolio is not concentrated, and it invests across all market sectors. In addition, per the Funds’ Prospectuses, the Diamond Hill Target Fund will sell securities short as part of its principal strategy, whereas the Acquiring Fund may engage in short sales as part of its principal strategy. Currently, in practice, each Fund sells securities short as part of its principal strategy. The Board of Trustees has approved the Proposal. The Adviser believes that shareholders of the Target Fund may benefit by being shareholders of a Fund with greater asset size that creates greater opportunity to benefit from long-term economies of scale and potentially lower total expenses. Each share class of the Target Fund is expected to have lower total expenses in their corresponding share class of the Acquiring Fund after the Reorganization, because the Acquiring Fund currently has lower dividend expenses and fees on securities sold short. The Proxy Statement/Prospectus serves as a prospectus of the Acquiring Fund in connection with the issuance of the Acquiring Fund common shares in the Reorganization. No person has been authorized to give any information or make any representation not contained in this Proxy Statement/Prospectus and, if so given or made, such information or representation must not be relied upon as having been authorized. This Proxy Statement/Prospectus does not constitute an offer to sell or a solicitation of an offer to buy any securities in any jurisdiction in which, or to any person to whom, it is unlawful to make such offer or solicitation. Shares of the Acquiring Fund have not been approved or disapproved by the U.S. Securities and Exchange Commission (“SEC”) nor has the SEC passed upon the accuracy or adequacy of this Proxy Statement/Prospectus. Any representation to the contrary is a criminal offense. The shares of the Funds are not deposits or obligations of, or guaranteed or endorsed by, 

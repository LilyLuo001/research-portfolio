 each Fund and its shares for distribution under federal and state securities laws and membership dues in the Investment Company Institute or any similar organization. In rendering investment advisory services, the Adviser may use the portfolio management, research and other resources of William Blair International, Ltd. (U.K.) (“William Blair U.K.”), an affiliate of the Adviser. William Blair U.K. is not registered with the Securities and Exchange Commission (“SEC”) as an investment adviser under the Investment Advisers Act of 1940, as amended. William Blair U.K. has entered into a Memorandum of Understanding (“MOU”) with the Adviser pursuant to which William Blair U.K. is considered a “participating affiliate” of the Adviser as that term is used in relief granted by the staff of the SEC allowing U.S. registered investment advisers to use portfolio management or research resources of advisory affiliates subject to the supervision of a registered adviser. Investment professionals from William Blair U.K. may render portfolio management, research and other services to the Funds under the MOU and are subject to supervision by the Adviser. The Management Agreement continues in effect from year to year for each Fund for so long as its continuation is approved at least annually (a) by a majority of the trustees who are not parties to such Management Agreement or interested persons of any such party except in their capacity as trustees of the Trust and (b) by the shareholders of the Fund or the Board of Trustees. The Management Agreement may be terminated at any time upon 60 days’ notice by either party. A Fund may terminate the Management Agreement either by vote of the Board of Trustees or by majority vote of the outstanding shares of the Fund. The Management Agreement may also be terminated at any time either by vote of the Board of Trustees or by majority vote of the outstanding voting shares of a Fund if the Adviser were determined to have breached the Management Agreement. The Management Agreement will terminate automatically upon assignment. The Management Agreement provides that the Adviser shall not be liable for any error of judgment or of law, or for any loss suffered by a Fund in connection with the matters to which the Management Agreement relates, except a loss resulting from willful misfeasance, bad faith or gross negligence on the part of the Adviser in the performance of its obligations and duties, or by reason of its reckless disregard of its obligations and duties under the Management Agreement. Upon termination of the Management Agreement and when so requested by the Adviser, the Trust or a Fund will refrain from using the name “William Blair” in its name or in its business in any form or combination. William Blair & Company, L.L.C. is the principal underwriter and distributor of the Trust and is referred to herein as the “Distributor” or “WBC.” WBIM and WBC are referred to herein collectively as “William Blair.” WBIM and WBC are limited liability companies that are 100% owned by WBC Holdings, L.P., a limited partnership. The affairs of WBIM and WBC are controlled by the general partner of WBC Holdings, L.P., WBC GP L.L.C., which in turn, is controlled by the Executive Committee. The Executive Committee is comprised of Stephanie G. Braming, Ryan J. DeVore, John R. Ettelson, Brent W. Gledhill, John C. Moore and Jon W. Zindel. 1 Management Fees . For the services and facilities furnished by the Adviser under the Management Agreement, each Fund pays the Adviser a management fee, which is accrued daily and paid monthly on the first business day of the following month. The annual rate for each Fund expressed as a percentage of average daily net assets is as follows: % of Average Daily Net Assets Growth Fund 0.75 % Large Cap Growth Fund 0.60 % Mid Cap Growth Fund 0.90 % Small-Mid Cap Core Fund 0.90 % Small-Mid Cap Growth Fund 1.00 % Small Cap Growth Fund 1.10 % Small Cap Value Fund 0.75 % (1) Global Leaders Fund 0.85 % 
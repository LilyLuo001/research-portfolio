trustees of the Trust (“Fund Trustees”) without shareholder approval. The fundamental investment policies and limitations of a Fund may not be changed without the approval of the lesser of: (1) 67% of the units of beneficial interest (“shares”) of the Fund present at a meeting at which more than 50% of the outstanding shares of the Fund are present or represented, or (2) a majority of the outstanding shares of the Fund. These percentages are required by the Investment Company Act of 1940, as amended (“1940 Act”), and are referred to in this SAI as a “1940 Act majority vote.” The policy of a Fund permitting it to operate as a non-diversified investment company under the 1940 Act may change by operation of law. Specifically, Rule 13a-1 under the 1940 Act provides in effect that, if a fund’s investment portfolio actually meets the standards of a diversified fund for three consecutive years, the fund’s status will change to that of a diversified fund. By operation of law, each of Neuberger Berman Commodity Strategy Fund, Neuberger Berman Global Allocation Fund, and Neuberger Berman Long Short Fund currently operates as a diversified investment company. Neuberger Berman U.S. Equity Index PutWrite Strategy Fund operates as a diversified investment company. Investment Policies and Limitations Except as set forth in the investment limitation on borrowing and the investment limitation on illiquid securities, any investment policy or limitation that involves a maximum percentage of securities or assets will not be considered exceeded unless the percentage limitation is exceeded immediately after, and because of, a transaction by a Fund. If events subsequent to a transaction result in a Fund exceeding the percentage limitation on illiquid securities, the Manager will take appropriate steps to reduce the percentage held in illiquid securities, as may be required by law, within a reasonable amount of time. 1 The following investment policies and limitations are fundamental and apply to all Funds unless otherwise indicated: 1. Borrowing . No Fund may borrow money, except that a Fund may (i) borrow money from banks for temporary or emergency purposes and for leveraging or investment and (ii) enter into reverse repurchase agreements for any purpose; provided that (i) and (ii) in combination do not exceed 33-1/3% of the value of its total assets (including the amount borrowed) less liabilities (other than borrowings). If at any time borrowings exceed 33-1/3% of the value of a Fund’s total assets, that Fund will reduce its borrowings within three days (excluding Sundays and holidays) to the extent necessary to comply with the 33-1/3% limitation. 2. Commodities (Neuberger Berman Long Short Fund and Neuberger Berman U.S. Equity Index PutWrite Strategy Fund) . No Fund may purchase physical commodities, except to the extent permitted under the 1940 Act, the rules and regulations thereunder and any applicable exemptive relief or unless acquired as a result of the ownership of securities or instruments, but this restriction shall not prohibit a Fund from purchasing futures contracts, options, foreign currencies or forward contracts, swaps, caps, collars, floors and other financial instruments or from investing in securities of any kind. Commodities (Neuberger Berman Commodity Strategy Fund and Neuberger Berman Global Allocation Fund ). No Fund may purchase physical commodities or contracts thereon, except to the extent permitted under the 1940 Act, the rules and regulations thereunder and any applicable exemptive relief or unless acquired as a result of the ownership of securities or instruments, but this restriction shall not prohibit a Fund from purchasing futures contracts, options (including options on futures contracts, but excluding options or futures contracts on physical commodities other than foreign currency), foreign currencies or forward contracts, swaps, caps, collars, floors and other financial instruments or from investing in securities of any kind. 3. Diversification (Neuberger Berman U.S. Equity Index PutWrite Strategy Fund) . The Fund may not, with respect to 75% of the value of its total assets, purchase the securities of any issuer (other than securities issued or guaranteed by the U.S. Government or any of its agencies or instrumentalities (“U.S. Government and Agency Securities”) or securities issued by other investment companies) if, as a result, (i) more than 5% of the value of the Fund’s total assets would be invested in the securities of that issuer or (ii) the Fund would hold more than 10% of the outstanding voting securities of that issuer. 4. Industry Concentration (Neuberger Berman Commodity Strategy Fund) . The Fund may not purchase any security if, as a result, 25% or more of its total assets (taken at current value) would be invested in the securities of issuers having their principal business activities in the same industry, except that it may invest 25% or more of its total assets in investments that provide exposure to the group of industries that comprise the commodities sector. This limitation does not apply to U.S. Government and Agency Securities, securities of other investment companies and tax-exempt securities or such other securities as may be excluded for this purpose under the 1940 Act, the rules and regulations thereunder and any applicable exemptive relief. Industry Concentration (Neuberger Berman Global Allocation Fund, Neuberger Berman Long Short Fund and Neuberger Berman U.S. Equity Index PutWrite Strategy Fund) . No Fund may purchase any security if, as a result, 25% or more of its total assets (taken at current value) would be invested in the securities of issuers having their principal business activities in the same industry. This limitation does not apply to U.S. Government and Agency Securities, securities of other investment companies and tax-exempt 2 securities or such other securities as may be excluded for this purpose under the 1940 Act, the rules and regulations thereunder and any applicable exemptive relief. 5. Lending (Neuberger Berman Long Short Fund) . No Fund may lend any security or make any other loan if, as a result, more than 33-1/3% of its total assets (taken at current value) would be lent to other parties, except, in accordance with its investment objective, policies, and limitations, (i) through the purchase of a portion of an issue of debt securities, loans, loan participations or other forms of direct debt instruments or (ii) by engaging in repurchase agreements. Lending (Neuberger Berman Commodity Strategy Fund, Neuberger Berman Global Allocation Fund and Neuberger Berman U.S. Equity Index PutWrite Strategy Fund) . No Fund may lend any security or make any other loan if, as a result, more than 33-1/3% of its total assets (taken at current value) would be lent to other parties, except, in accordance with its investment objective, policies, and limitations, (i) through the purchase of all or a portion of an issue of debt securities, loans, loan participations or other forms of direct debt instruments or (ii) by engaging in repurchase agreements. 6. Real Estate . No Fund may purchase real estate unless acquired as a result of the ownership of securities or instruments, but this restriction shall not prohibit a Fund from purchasing securities issued by entities or investment vehicles that own or deal in real estate or interests therein or instruments secured by real estate or interests therein. 7. Senior Securities . No Fund may issue senior securities, except as permitted under the 1940 Act. 8. Underwriting . No Fund may underwrite securities of other issuers, except to the extent that a Fund, in disposing of portfolio securities, may be deemed to be an underwriter within the meaning of the Securities Act of 1933, as amended (“1933 Act”). A Fund’s limitation on investments in any one issuer does not limit the Fund’s ability to invest up to 100% of its total assets in a master portfolio with the same inv

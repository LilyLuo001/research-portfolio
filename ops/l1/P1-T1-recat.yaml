      完整正文:
      N-14/A 1 d688762dn14a.htm N-14/A N-14/A Table of Contents As filed with the Securities and Exchange Commission on January 14, 2018 File No. 333-228805 SECURITIES AND EXCHANGE COMMISSION Washington, D.C. 20549 FORM N-14 REGISTRATION STATEMENT UNDER THE SECURITIES ACT OF 1933 (X) Pre-Effective Amendment No. 1 ( ) Post-Effective Amendment No. ____ GREAT-WEST FUNDS, INC. (Exact Name of Registrant as Specified in Charter) 8515 E. Orchard Road Greenwood Village, Colorado 80111 Registrant’s Telephone Number, including Area Code (866) 831-7129 Scott C. Sipple President and Chief Executive Officer Great-West Funds, Inc. 8515 E. Orchard Road Greenwood Village, Colorado 80111 (Address of Principal Executive Offices) Copy to: Ryan L. Logsdon Vice President, Counsel & Secretary Great-West Funds, Inc. 8515 E. Orchard Road Greenwood Village, Colorado 80111 Approximate date of proposed public offering: As soon as practicable after the effective date of this Registration Statement. TITLE OF SECURITIES BEING REGISTERED: Shares of Common Stock (par value $0.10 per share) of the Registrant. No filing fee is required because of reliance on Section 24(f) and an indefinite number of shares have previously been registered pursuant to Rule 24f-2 under the Investment Company Act of 1940. It is proposed that this filing will become effective on February 13, 2019 pursuant to Rule 488. Table of Contents Dear Shareholder, We wish to provide you with some important information concerning your investment in the Great-West SecureFoundation ® Lifetime 2015 Fund (the “Target Fund”). The Board of Directors of Great-West Funds, Inc. (“Great-West Funds”) has approved this reorganization of the Target Fund, a series of Great-West Funds, into the Great-West SecureFoundation ® Balanced Fund (the “Acquiring Fund”), which is also a series of Great-West Funds. As a result, effective on or about April 12, 2019, shareholders of the Target Fund will become shareholders of the Acquiring Fund. The Target Fund and the Acquiring Fund (collectively, the “Funds”) share a common investment adviser, Great-West Capital Management, LLC. Each of the Funds is a “fund-of-funds” that pursues its investment objective by investing in other mutual funds and in a fixed interest contract issued and guaranteed by Great-West Life & Annuity Insurance Company (“GWL&A”) (the “GWL&A Contract”). The mutual funds and the GWL&A Contract are referred to as the “Underlying Funds.” Currently, both Funds have substantially similar investment objectives, investment strategies and risks. The Acquiring Fund has performed slightly better due to slightly higher allocations in U.S. small-cap and mid-cap equities and, to a lesser extent, a lower investment advisory fee. The Acquiring Fund’s investment advisory fee is 0.10% of net assets, which is two (2) basis points less than the Target Fund’s investment advisory fee of 0.12% of net assets. As a result, shareholders of the Target Fund will pay a lower total expense ratio upon effectiveness of the reorganization. This reorganization is intended to be a tax-free reorganization for federal income tax purposes, and the closing of this reorganization will be conditioned upon, among other things, receiving an opinion of counsel to the effect that this reorganization will qualify as a tax-free reorganization for federal income tax purposes. As a result, it is anticipated that shareholders will not recognize any gain or loss as a direct result of this reorganization. Detailed information about the Agreement and Plan of Reorganization and the reasons for the Board’s approval of the Plan are contained in the enclosed materials. NO ACTION ON YOUR PART IS REQUIRED TO EFFECT THE REORGANIZATION. You will automatically receive shares of the Acquiring Fund in exchange for your shares of the Target Fund on or about April 12, 2019. If you have any questions, please contact us at (866) 831-7129. If you have any questions after considering the enclosed materials, please call. Sincerely, Scott C. Sipple President & Chief Executive Officer Great-West Funds, Inc. Table of Contents Important Information for Great-West SecureFoundation Lifetime 2015 Fund Shareholders The enclosed Information Statement/Prospectus describes the contemplated reorganization of the Great-West SecureFoundation ® Lifetime 2015 Fund (the “Target Fund”) into the Great-West SecureFoundation ® Balanced Fund (the “Acquiring Fund” and, together with the Target Fund, the “Funds”). The Target Fund and the Acquiring Fund are collectively referred to herein as the “Funds” or individually as a “Fund.” Although we recommend that you read the complete Information Statement/Prospectus, for your convenience, we have provided the following brief overview of this reorganization. Please refer to the more complete information about this reorganization contained elsewhere in the Information Statement/Prospectus. SHAREHOLDER APPROVAL IS NOT REQUIRED TO EFFECT THE REORGANIZATION. YOU ARE NOT ASKED TO RETURN A PROXY OR TO TAKE ANY OTHER ACTION AT THIS TIME. Q. Why am I receiving this Information Statement/Prospectus? A. On September 18, 2018, the Board of Directors of Great-West Funds (the “Board”) approved the reorganization of the Target Fund into the Acquiring Fund. As of the close of business on the effective date of the merger, investments in the Investor Class, Service Class, and Class L shares of the Target Fund will automatically become investments in the corresponding class of the Acquiring Fund with an equal total net asset value. You will not incur any fees or charges or any federal income tax liability as a direct result of this reorganization. It is currently anticipated that this reorganization will close on or about April 12, 2019. You are receiving this Information Statement/Prospectus because you are invested in the Target Fund through insurance company separate accounts for certain variable annuity contracts and variable life insurance policies, individual retirement accounts, or qualified retirement plans (collectively, “Permitted Accounts”). Q. Why has this reorganization been proposed for the Target Fund? A. The Board considered the reorganization upon the recommendation of Great-West Capital Management, LLC (“GWCM”), each Fund’s investment adviser. GWCM believes that the reorganization will benefit the Target Fund and its shareholders by, among other things, allowing the reorganization of the Target Fund into a fund with substantially similar investment objectives, investment strategies, investment risks, performance and a lower total expense ratio. The Board has concluded that the proposed reorganization of the Target Fund into the Acquiring Fund is in the best interest of the Target Fund and its shareholders, and that the Target Fund’s existing shareholders will not be diluted as a result of the reorganization. In reaching this conclusion, the Board considered a number of factors, which are summarized below and are discussed in greater detail in the enclosed materials. Q. How do the fees and expenses compare? A. The Acquiring Fund’s investment advisory fee is 0.10% of net assets, which is two (2) basis points less than the Target Fund’s investment advisory fee of 0.12% of net assets. Each share class of the Target Fund and Acquiring Fund has identical 12b-1 fees (0.10% for Service Class and 0.25% for Class L) and shareholder services fees (0.35% for Investor Class, Service Class, and Class L). The acquired fund fees and expenses of the Funds are identical across share classes as of December 31, 2017. Due to the lower Table of Contents investment advisory fee, the Acquiring Fund’s total expenses ratio is less than the Target Fund’s total expense ratio by two (2) basis points across all classes. As a result, shareholders of the Target Fund will pay a lower total expense ratio upon effectiveness of the reorganization. For details on fees and expenses, please see the section entitled “Fees and Expenses” of the Information Statement/Prospectus. Q. Will Target Fund shareholders receive new shares in exchange for their current shares? A. Yes. Once the reorganization is completed, each Target Fund shareholder will receive shares of the corresponding class of the Acquiring Fund in an amount equal in total net asset value to the total net asset value of the Target Fund shares surrendered by such shareholder, in each case as of the close of trading on the closing date of the reorganization. Q. Will I have to pay federal income taxes as a result of the reorganization? A. No. The reorganization is intended to qualify as a tax-free reorganization for federal income tax purposes. It is expected that shareholders of the Target Fund and investors who hold shares of the Target Fund through a variable annuity contract or variable life insurance policy will recognize no gain or loss for federal income tax purposes as a direct result of this reorganization. The section entitled “The Proposed Reorganization—Material Federal Income Tax Consequences” of the Information Statement/Prospectus provides additional information regarding the federal income tax consequences of the reorganization. Q. Who will bear the costs of the reorganization? A. GWCM will bear all expenses of the reorganization even if the reorganization is not completed, including legal costs, audit fees, and printing and mailing expenses. GWCM estimates the costs of the reorganization to be $50,600. Q. What is the timetable for the reorganization? A. The reorganization is expected to occur at the close of business on or about April 12, 2019. Q. Whom do I call if I have questions? A. If you need any assistance, or have any questions regarding the reorganization, please call (866) 831-7129. Table of Contents Information Statement/Prospectus Dated February 13, 2019 Relating to the Acquisition of the Assets and Liabilities of GREAT-WEST SECUREFOUNDATION ® LIFETIME 2015 FUND by GREAT-WEST SECUREFOUNDATION ® BALANCED FUND This Information Statement/Prospectus is being furnished to shareholders of Great-West SecureFoundation Lifetime 2015 Fund (the “Target Fund”), a series of Great-West Funds, Inc. (the “Great-West Funds”), a Maryland corporation and an open-end investment company registered under the Investment Company Act of 1940, as amended (the “1940 Act). This Information Statement/Prospectus is provided in connection with the reorganization of the Target Fund into Great-West SecureFoundation Balanced Fund (the “Acquiring Fund”), a series of Great-West Funds. The Target Fund and the Acquiring Fund are referred to herein collectively as the “Funds” and individually as a “Fund.” Upon completion of this reorganization, holders of Investor Class, Service Class, and Class L shares of the Target Fund will receive shares of the corresponding class of the Acquiring Fund, with the same total net asset value as the total net asset value of the Target Fund shares surrendered by such shareholders, in each case as of the close of trading on the closing date of this reorganization. The Board has determined that this reorganization is in the best interests of both the Target Fund and the Acquiring Fund. The address, principal executive office and telephone number of Great-West Funds is 8515 East Orchard Road, Greenwood Village, Colorado 80111 and (866) 831-7129. The Securities and Exchange Commission has not approved or disapproved these securities or determined whether the information in this Information Statement/Prospectus is truthful or complete. Any representation to the contrary is a criminal offense. This Information Statement/Prospectus concisely sets forth the information shareholders of the Target Fund should know about this reorganization (in effect, investing in Investor Class, Service Class and Class L shares of the Acquiring Fund) and constitutes an offering of Investor Class, Service Class and Class L shares of common stock, par value $0.10 per share, of the Acquiring Fund. Please read it carefully and retain it for future reference. SHAREHOLDER APPROVAL IS NOT REQUIRED TO EFFECT THIS REORGANIZATION. YOU ARE NOT ASKED TO RETURN A PROXY OR TO TAKE ANY OTHER ACTION AT THIS TIME. The following document has been filed with the Securities and Exchange Commission (“SEC”) and is incorporated into this Information Statement/Prospectus by reference and also accompanies this Information Statement/Prospectus: i. the Acquiring Fund’s prospectus, dated April 30, 2018, as supplemented through the date of this Information Statement/Prospectus. The following documents contain additional information about the Funds, have been filed with the SEC and are incorporated into this Information Statement/Prospectus by reference: i. the Target Fund’s prospectus, dated April 30, 2018, as supplemented through the date of this Information Statement/Prospectus, only insofar as it relates to the Target Fund; ii. the unaudited financial statements contained in the Target Fund’s semi-annual report for the six-month period ended June 29, 2018; iii. the audited financial statements as of December 31, 2017, and the report of Deloitte & Touche LLP, an independent registered public accounting firm, are contained in the Funds’ annual reports for the fiscal year ended December 31, 2017; Table of Contents iv. the statement of additional information relating to this proposed reorganization, dated February 13, 2019 (the “Reorganization SAI”); and v. the Funds’ statement of additional information dated April 30, 2018 (the “SAI”), as supplemented through the date of this Information Statement/Prospectus, only insofar as it relates to the Funds. No other parts of the documents referenced above are incorporated by reference herein. Copies of the foregoing may be obtained without charge by calling (866) 831-7129 or writing the Funds at Great-West Funds, Inc., Attn: Secretary, 8515 East Orchard Road, Greenwood Village, Colorado 80111. If you wish to request the Reorganization SAI, please ask for the “Reorganization SAI.”

d the following amounts of the Fund's average daily net assets: Class A, 0.80%; Investor Class, 0.80%; Class C, 1.55%; Class I, 0.55% and Class R3, 1.15%. In addition, New York Life Investments will waive fees and/or reimburse expenses so that Total Annual Fund Operating Expenses (excluding taxes, interest, litigation, extraordinary expenses, brokerage and other transaction expenses relating the purchase or sale of portfolio investments, and acquired (underlying) fund fees and expenses) of Class R6 shares do not exceed those of Class I. This agreement will remain in effect until February 28, 2022, and shall renew automatically for one-year terms unless New York Life Investments provides written notice of termination prior to the start of the next term or upon approval of the Board of Trustees of the Fund. Example The Example is intended to help you compare the cost of investing in the Fund with the cost of investing in other mutual funds. The Example assumes that you invest $10,000 in the Fund for the time periods indicated whether or not you redeem all of your shares at the end of those periods (except as indicated with respect to Class C shares). The Example also assumes that your investment has a 5% return each year and that the Fund's operating expenses remain the same. The Example reflects the contractual fee waiver and/or expense reimbursement arrangement, if applicable, for the current duration of the arrangement only. Although your actual costs may be higher or lower, based on these assumptions your costs would be: Expenses After Class A Investor Class C Class I Class R3 Class R6 Class Assuming no redemption Assuming redemption at end of period 1 Year $393 $344 $172 $272 $ 70 $131 $ 70 3 Years $671 $623 $614 $614 $305 $492 $262 4 MainStay Defensive ETF Allocation Fund Portfolio Turnover The Fund pays transaction costs, such as commissions, when it buys and sells securities (or "turns over" its portfolio). A higher portfolio turnover rate may indicate higher transaction costs and may result in higher taxes when Fund shares are held in a taxable account. These costs, which are not reflected in annual fund operating expenses or in the Example, affect the Fund's performance. Because the Fund had not commenced operations as of April 30, 2020, the Fund’s portfolio turnover rate for the most recent fiscal year end is not available. Principal Investment Strategies The Fund, under normal circumstances, invests at least 80% of its assets (net assets plus any borrowings for investment purposes) in exchange-traded funds. The Fund is a “fund of funds” that seeks to achieve its investment objective by investing in unaffiliated passively-managed exchange-traded funds (the “Underlying ETFs”). The Fund is designed for investors with a particular risk profile as represented by the asset class allocations described below, and invests in a distinct mix of Underlying ETFs. The Fund seeks to achieve its investment objective by normally investing approximately 80% (within a range of 70% to 90%) of its assets in Underlying Fixed-Income ETFs and approximately 20% (within a range of 10% to 30%) of its assets in Underlying Equity ETFs. The Fund may invest approximately 5% (within a range of 0% to 15%) of its assets in Underlying International Equity ETFs. New York Life Investments may change the asset class allocations, the Underlying ETFs in which the Fund invests, or the target weighting without approval from shareholders. New York Life Investments will determine each Underlying ETF’s asset class, and for Underlying ETFs that may potentially fall into multiple asset classes, New York Life Investments will classify them based on certain factors, including, but not limited to, the Underlying ETF’s investment strategy and portfolio characteristics. New York Life Investments uses a two-step asset allocation process to create the Fund's portfolio. The first step includes a strategic review of the target allocations to the equity and fixed-income asset classes and a determination of any tactical allocation adjustments to establish the portion of the Fund's investable portfolio (meaning the Fund's assets available for investment, other than working cash balances) to be invested in each asset class. The following table illustrates the Fund's target allocations among asset classes (the target allocations and/or actual holdings will vary from time to time as a result of the tactical allocation process, although these variations will remain within the ranges described above): U.S. Equity International Equity Total Equity Fixed-Income MainStay Defensive ETF Allocation Fund 15% 5% 20% 80% The second step in the Fund's portfolio construction process involves the actual selection of Underlying ETFs to represent the asset classes indicated above and determination of target weightings among the Underlying ETFs. The Fund may invest in any or all of the Underlying ETFs within an asset class, but will not normally invest in every Underlying ETF at one time. Selection of individual Underlying ETFs is based on several factors, including, but not limited to, liquidity, benchmark tracking error and total annual fund operating expenses. New York Life Investments monitors the Fund's portfolio daily to ensure that the Fund's actual asset class allocations among the Underlying ETFs continue to conform to the Fund's target allocations over time and may periodically adjust target asset class allocations based on various quantitative and qualitative data relating to the U.S. and international economies, securities markets, and various segments within those markets. In connection with the asset allocation process, the Fund may from time to time invest more than 25% of its assets in one Underlying ETF. Principal Risks of the Fund You can lose money by investing in the Fund. An investment in the Fund is not a bank deposit and is not insured or guaranteed by the Federal Deposit Insurance Corporation or any other governmental agency. The investments selected by New York Life Investments may underperform the market in which the Fund invests or other investments. The Fund may receive large purchase or redemption orders, which may have adverse effects on performance if the Fund were required to sell securities, invest cash or hold a relatively large amount of cash at times when it would not otherwise do so. The principal risks of investing in the Fund are summarized below. Asset Allocation Risk: Although allocation among different asset classes generally limits the Fund's exposure to the risks of any one class, the risk remains that New York Life Investments may favor an asset class that performs poorly relative to the other asset classes. For example, deteriorating economic conditions might cause an overall weakness in corporate earnings that reduces the absolute level of stock prices in that market. Under these circumstances, if the Fund, through its holdings of Underlying ETFs, were invested primarily in stocks, it would perform poorly relative to a portfolio invested primarily in bonds. The Underlying ETFs selected by New York Life Investments may underperform the market or other investments. Moreover, because the Fund has set limitations on the amount of assets that normally may be allocated to each asset class, the Fund has less flexibility in its investment strategy than mutual funds that are not subject to such limitations. In addition, the asset allocations made by the Fund may not be ideal for all investors and may not effectively increase returns or decrease risk for investors. 5 MainStay Defensive ETF Allocation Fund New Fund Risk: The Fund is a new fund which may result in additional risk. There can be no assurance that the Fund will grow to an economically viable size, in which case the Fund may cease operations. In such an event, investors may be required to liquidate or transfer their investments at an inopportune time. Exchange-Traded Fund ("ETF") Risk: The risks of owning an ETF generally re

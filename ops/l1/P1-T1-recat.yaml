      497 1 d927071d497.htm FIDELITY SECURITIES FUND FIDELITY SECURITIES FUND Table of Contents Fund/Class Ticker Fidelity ® Blue Chip Growth Fund/Fidelity ® Blue Chip Growth Fund FBGRX Fidelity ® Blue Chip Value Fund FBCVX Funds of Fidelity Securities Fund STATEMENT OF ADDITIONAL INFORMATION September 28, 2024 As Revised March 14, 2025 This Statement of Additional Information (SAI) is not a prospectus. Portions of each fund’s annual report are incorporated herein. The annual report(s) are supplied with this SAI. To obtain a free additional copy of a prospectus, dated September 28, 2024, or SAI, dated September 28, 2024, As Revised March 14, 2025, or an annual report, or a free copy of a fund’s proxy voting record, please call Fidelity at 1-800-544-8544 or visit Fidelity’s web site at www.fidelity.com. For more information on any Fidelity ® fund, including charges and expenses, call Fidelity at the number indicated above for a free prospectus. Read it carefully before investing or sending money. BCF-BCV-PTB-0325-122 1.789951.122 245 Summer Street, Boston, MA 02210 Table of Contents TABLE OF CONTENTS INVESTMENT POLICIES AND LIMITATIONS 3 PORTFOLIO TRANSACTIONS 21 VALUATION 26 BUYING, SELLING, AND EXCHANGING INFORMATION 27 DISTRIBUTIONS AND TAXES 28 TRUSTEES AND OFFICERS 28 CONTROL OF INVESTMENT ADVISERS 41 MANAGEMENT CONTRACTS 41 PROXY VOTING GUIDELINES 45 DISTRIBUTION SERVICES 51 TRANSFER AND SERVICE AGENT SERVICES 52 SECURITIES LENDING 53 DESCRIPTION OF THE TRUST 53 FUND HOLDINGS INFORMATION 55 FINANCIAL STATEMENTS 56 APPENDIX 56 2 Table of Contents INVESTMENT POLICIES AND LIMITATIONS The following policies and limitations supplement those set forth in the prospectus. Unless otherwise noted, whenever an investment policy or limitation states a maximum percentage of a fund’s assets that may be invested in any security or other asset, or sets forth a policy regarding quality standards, such standard or percentage limitation will be determined immediately after and as a result of the fund’s acquisition of such security or other asset. Accordingly, any subsequent change in values, net assets, or other circumstances will not be considered when determining whether the investment complies with the fund’s investment policies and limitations. A fund’s fundamental investment policies and limitations cannot be changed without approval by a “majority of the outstanding voting securities” (as defined in the Investment Company Act of 1940 (1940 Act)) of the fund. However, except for the fundamental investment limitations listed below, the investment policies and limitations described in this Statement of Additional Information (SAI) are not fundamental and may be changed without shareholder approval. The following are each fund’s fundamental investment limitations set forth in their entirety. Diversification For Fidelity ® Blue Chip Value Fund: The fund may not with respect to 75% of the fund’s total assets, purchase the securities of any issuer (other than securities issued or guaranteed by the U.S. Government or any of its agencies or instrumentalities, or securities of other investment companies) if, as a result, (a) more than 5% of the fund’s total assets would be invested in the securities of that issuer, or (b) the fund would hold more than 10% of the outstanding voting securities of that issuer. Senior Securities For each fund: The fund may not issue senior securities, except in connection with the insurance program established by the fund pursuant to an exemptive order issued by the Securities and Exchange Commission or as otherwise permitted under the Investment Company Act of 1940. Borrowing For each fund: The fund may not borrow money, except that the fund may borrow money for temporary or emergency purposes (not for leveraging or investment) in an amount not exceeding 33 1/3% of its total assets (including the amount borrowed) less liabilities (other than borrowings). Any borrowings that come to exceed this amount will be reduced within three days (not including Sundays and holidays) to the extent necessary to comply with the 33 1/3% limitation. Underwriting For each fund: The fund may not underwrite securities issued by others, except to the extent that the fund may be considered an underwriter within the meaning of the Securities Act of 1933 in the disposition of restricted securities or in connection with investments in other investment companies. Concentration For each fund: The fund may not purchase the securities of any issuer (other than securities issued or guaranteed by the U.S. Government or any of its agencies or instrumentalities) if, as a result, more than 25% of the fund’s total assets would be invested in the securities of companies whose principal business activities are in the same industry. For purposes of each of Fidelity ® Blue Chip Growth Fund’s and Fidelity ® Blue Chip Value Fund’s concentration limitation discussed above, with respect to any investment in repurchase agreements collateralized by U.S. Government securities, Fidelity Management & Research Company LLC (FMR) looks through to the U.S. Government securities. For purposes of each of Fidelity ® Blue Chip Growth Fund’s and Fidelity ® Blue Chip Value Fund’s concentration limitation discussed above, with respect to any investment in any non-money market Central fund, FMR looks through to the holdings of the Central fund. For purposes of each of Fidelity ® Blue Chip Growth Fund’s and Fidelity ® Blue Chip Value Fund’s concentration limitation discussed above, FMR may analyze the characteristics of a particular issuer and security and assign an industry or sector classification consistent with those characteristics in the event that the third-party classification provider used by FMR does not assign a classification. 3 Table of Contents Real Estate For each fund: The fund may not purchase or sell real estate unless acquired as a result of ownership of securities or other instruments (but this shall not prevent the fund from investing in securities or other instruments backed by real estate or securities of companies engaged in the real estate business). Commodities For each fund: The fund may not purchase or sell physical commodities unless acquired as a result of ownership of securities or other instruments (but this shall not prevent the fund from purchasing or selling options and futures contracts or from investing in securities or other instruments backed by physical commodities). Loans For each fund: The fund may not lend any security or make any other loan if, as a result, more than 33 1/3% of its total assets would be lent to other parties, but this limitation does not apply to purchases of debt securities or to repurchase agreements, or to acquisitions of loans, loan participations or other forms of debt instruments. Pooled Funds For Fidelity ® Blue Chip Growth Fund: The fund may, notwithstanding any other fundamental investment policy or limitation, invest all of its assets in the securities of a single open-end management investment company with substantially the same fundamental investment objective, policies, and limitations as the fund. The following investment limitations are not fundamental and may be changed without shareholder approval. Diversification For Fidelity ® Blue Chip Growth Fund: In order to qualify as a “regulated investment company” under Subchapter M of the Internal Revenue Code of 1986, as amended, the fund currently intends to comply with certain diversification limits imposed by Subchapter M. Subchapter M generally requires the fund to invest no more than 25% of its total assets in securities of any one issuer or in the securities of certain publicly-traded partnerships and to invest at least 50% of its total assets so that (a) no more than 5% of the fund’s total assets are invested in securities of any one issuer, and (b) the fund does not hold more than 10% of the outstanding voting securities of that issuer. However, Subchapter M allows unlimited investments in cash, cash items, government securities (as defined in Subchapter M) and securities of other regulated investment companies. These tax requirements are generally applied at the end of each quarter of the fund’s taxable year. Fidelity ® Blue Chip Value Fund intends to comply both with the Subchapter M diversification requirements and with the diversification requirements described in the fundamental investment limitations disclosure above. Short Sales For each fund: The fund does not currently intend to sell securities short, unless it owns or has the right to obtain securities equivalent in kind and amount to the securities sold short, and provided that transactions in futures contracts and options are not deemed to constitute selling securities short. Margin Purchases For each fund: The fund does not currently intend to purchase securities on margin, except that the fund may obtain such short-term credits as are necessary for the clearance of transactions, and provided that margin payments in connection with futures contracts and options on futures contracts shall not constitute purchasing securities on margin. Borrowing For each fund: The fund may borrow money only (a) from a bank or from a registered investment company or portfolio for which FMR or an affiliate serves as investment adviser or (b) by engaging in reverse repurchase agreements with any party (reverse repurchase agreements are treated as borrowings for purposes of the fundamental borrowing investment limitation). 4 Table of Contents Illiquid Securities For each fund: The fund does not currently intend to purchase any security if, as a result, more than 10% of its net assets would be invested in securities that are deemed to be illiquid because they are subject to legal or contractual restrictions on resale or because they cannot be sold or disposed of in the ordinary course of business at approximately the prices at which they are valued. For purposes of each fund’s illiquid securities limitation discussed above, if through a change in values, net assets, or other circumstances, the fund were in a position where more than 10% of its net assets were invested in illiquid securities, it would consider appropriate steps to protect liquidity. Loans For each fund: The fund does not currently intend to lend assets other than securities to other parties, except by (a) lending money (up to 15% of the fund’s net assets) to a registered investment company or portfolio for which FMR or an affiliate serves as investment adviser or (b) assuming any unfunded commitments in connection with the acquisition of loans, loan participations, or other forms of debt instruments. (This limitation does not apply to purchases of debt securities, to repurchase agreements, or to acquisitions of loans, loan participations or other forms of debt instruments.) Pooled Funds For Fidelity ® Blue Chip Growth Fund: The fund does not currently intend to invest all of its assets in the securities of a single open-end management investment company with substantially the same fundamental investment objective, policies, and limitations as the fund. In addition to each fund’s fundamental and non-fundamental investment limitations discussed above: In order to qualify as a “regulated investment company” under Subchapter M of the Internal Revenue Code of 1986, as amended, each fund currently intends to comply with certain diversification limits imposed by Subchapter M. For a fund’s policies and limitations on futures and options transactions, as applicable, see “Investment Policies and Limitations – Futures, Options, and Swaps.” The following pages contain more detailed information about types of instruments in which a fund may invest, techniques a fund’s adviser (or a sub-adviser) may employ in pursuit of the fund’s investment objective, and a summary of related risks. A fund’s adviser (or a sub-adviser) may not buy all of these instruments or use all of these techniques unless it believes that doing so will help the fund achieve its goal. However, a fund’s adviser (or a sub-adviser) is not required to buy any particular instrument or use any particular technique even if to do so might benefit the fund. On the following pages in this section titled “Investment Policies and Limitations,” and except as otherwise indicated, references to “an adviser” or “the adviser” may relate to a fund’s adviser or a sub-adviser, as applicable. Affiliated Bank Transactions. A Fidelity ® fund may engage in transactions with financial institutions that are, or may be considered to be, “affiliated persons” of the fund under the 1940 Act. These transactions may involve repurchase agreements with custodian banks; short-term obligations of, and repurchase agreements with, the 50 largest U.S. banks (measured by deposits); municipal securities; U.S. Government securities with affiliated financial institutions that are primary dealers in these securities; short-term currency transactions; and short-term borrowings. In accordance with exemptive orders issued by the Securities and Exchange Commission (SEC), the Board of Trustees has established and periodically reviews procedures applicable to transactions involving affiliated financial institutions. Borrowing. If a fund borrows money, its share price may be subject to greater fluctuation until the borrowing is paid off. If a fund makes additional investments while borrowings are outstanding, this may be considered a form of leverage. Cash Management. A fund may hold uninvested cash or may invest it in cash equivalents such as money market securities, repurchase agreements, or shares of short-term bond or money market funds, including (for Fidelity ® funds and other advisory clients only) shares of Fidelity ® Central funds. Generally, these securities offer less potential for gains than other types of securities. Central Funds are special types of investment vehicles created by Fidelity for use by the Fidelity ® funds and
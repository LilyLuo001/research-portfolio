: Ten Years: $20 $74 $133 $307 PORTFOLIO TURNOVER The Fund may pay transaction costs, including commissions when it buys and sells securities (or “turns over” its portfolio). A higher portfolio turnover rate may indicate higher transaction costs and may result in higher taxes when Shares are held in a taxable account. These costs, which are not reflected in annual fund operating expenses or in the example, affect the Fund’s performance. For the fiscal period November 1, 2023 through September 30, 2024 Fund’s portfolio turnover rate was 0% of the average value of its portfolio. This rate excludes the value of portfolio securities whose maturities or expiration dates at the time of acquisition were one year or less. - 1 - PRINCIPAL INVESTMENT STRATEGIES Alpha Architect 1-3 Month Box ETF (the “Fund”) is an actively managed exchange-traded fund (“ETF”) whose investment objective is to provide investment results that, before fees and expenses, equal or exceed the price and yield performance of an investment that tracks the 1-3 month sector of the United States Treasury Bill market. To do so, the principal investment strategy of the Fund will be to utilize a series of long and short exchange-listed options combinations called a box spread (“Box Spread”). In order to accomplish its investment goals, the Fund may utilize either standard exchange-listed options or FLexible EXchange® Options (“FLEX Options”) or a combination of both. In general, an option contract is an agreement between a buyer and seller that gives the purchaser of the option the right to buy or sell a particular asset at a specified future date at an agreed upon price, commonly known as the “strike price.” In the case of a “call option”, the purchaser has the right to buy the particular asset and the seller of a “call option” has the obligation to deliver the particular asset at the strike price. In the case of a “put option”, the purchaser has the right to sell the particular asset and the seller of a “put option” has the obligation to purchase the particular asset at the strike price. By way of background, a Box Spread is the combination of a synthetic long position coupled with an offsetting synthetic short position through a combination of options contracts on an equity security or an equity index at the same expiration date. The synthetic long consists of buying a call option and selling a put option on the same security or index where the call option and put option share the same strike and expiration date (a “Synthetic Long”). When purchasing a Box Spread, the Synthetic Long will have a strike price that is less than the strike price for the Synthetic Short. The difference between the strike prices of the Synthetic Long and the Synthetic Short will determine the expiration value (or value at maturity) of the Box Spread. The synthetic short consists of buying a put option and selling a call option on the same security or index with the same expiration date as the synthetic long but using a different strike price (a “Synthetic Short”). When purchasing a Box Spread, the Synthetic Long will have a strike price that is less than the strike price for the Synthetic Short. The difference between the strike prices of the Synthetic Long and the Synthetic Short will determine the expiration value (or value at maturity) of the Box Spread. An important feature of the Box Spread construction process is the elimination of risk tied to changes in the value of the Box Spread’s reference asset (typically an equity security or equity index) so long as the Box Spread is held to its expiration date. As displayed in the diagram below, a Box Spread’s return at its expiration date stays constant no matter how low or how high the value of the Box Spread’s reference asset moves. Once the Box Spread is initiated, its return from the initiation date of such Box Spread through its expiration date is fixed, but the value of the Box Spread may increase or decrease during that period due to changes in interest rates (or expectations of such changes) and the supply and demand in short-term credit markets, among other factors. The diagram below only depicts the value of the Box Spread at its expiration date and not at points in time prior to the expiration date. - 2 - The Fund anticipates buying, holding, and/or selling multiple Box Spreads, and consequently, the Fund’s anticipated return from Box Spreads will reflect all of its investment activity, as well as changes in market prices and expected interest rates, among other factors, and will vary over time. Because the Fund will generally hold multiple Box Spreads at any time, the Fund has no fixed return amount for any particular period of time, unlike a bond. Additionally, the value of the Fund is affected by factors including those affecting the value of Box Spreads and may increase or decrease over any period of time. Buying (or selling) a Box Spread is similar to buying (or selling) a zero-coupon bond. A zero-coupon bond does not pay periodic coupons, but the bond trades at a discount to its face value. The maturity value of a zero-coupon bond is comparable to the difference in the strike prices of the Box Spread. The maturity date of a zero-coupon bond is comparable to the expiration date of the options comprising the Box Spread. When constructing a Box Spread, the strike price of the Synthetic Long will be at a lower strike price than the strike price of the Synthetic Short. When buying or selling a Box Spread, the buyer or seller generally expects the price of the Box Spread to be less than the difference in the strike prices of the Box Spread. A buyer or seller of a Box Spread will earn a profit or loss equal to the difference between the beginning price (price paid to buy or received if sold) and the ending price (expiration value or closing trade price). If the Fund holds the Box Spread until expiration, then its profit or loss will be determined by the difference between the price it paid to
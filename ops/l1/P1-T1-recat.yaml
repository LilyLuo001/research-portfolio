      N-14 1 d52501dn14.htm AMG FUNDS AMG Funds AS FILED ELECTRONICALLY WITH THE SECURITIES AND EXCHANGE COMMISSION ON October 13, 2020 SECURITIES ACT FILE NO. 333-[ ] U.S. SECURITIES AND EXCHANGE COMMISSION WASHINGTON, D.C. 20549 FORM N-14 REGISTRATION STATEMENT UNDER THE SECURITIES ACT OF 1933 Pre-Effective Amendment No. ☐ Post-Effective Amendment No. ☐ AMG FUNDS (Exact Name of Registrant as Specified in Charter) 600 Steamboat Road, Suite 300 Greenwich, Connecticut 06830 (Address of Principal Executive Offices) (800) 548-4539 (Registrant’s Telephone Number, Including Area Code) Gregory C. Davis Ropes & Gray LLP Three Embarcadero Center San Francisco, CA 94111-4006 (Name and Address of Agent for Service) Title of Securities being Registered: shares of beneficial interest, no par value per share. The Registrant hereby amends this registration statement on such date or dates as may be necessary to delay its effective date until the Registrant shall file a further amendment which specifically states that this registration statement shall thereafter become effective in accordance with Section 8(a) of the Securities Act of 1933 or until this registration statement shall become effective on such date as the Securities and Exchange Commission, acting pursuant to said Section 8(a), may determine. Approximate Date of Proposed Public Offering: As soon as practicable after this Registration Statement becomes effective. No filing fee is required because an indefinite number of shares of the Registrant have previously been registered pursuant to Section 24(f) of the Investment Company Act of 1940, as amended. NOTICE: PLEASE COMPLETE THE ENCLOSED PROXY CARD AND RETURN IT AS SOON AS POSSIBLE. AMG FUNDS III 600 Steamboat Road, Suite 300 Greenwich, Connecticut 06830 AMG GW&K MID CAP FUND (FORMERLY AMG MANAGERS CADENCE MID CAP FUND) Special Meeting of Shareholders To Be Held on January 13, 2021 Dear Valued Shareholder: You are being asked to vote on two important proposals: (1) approval of a proposed reorganization transaction for your fund, AMG GW&K Mid Cap Fund (formerly AMG Managers Cadence Mid Cap Fund) (the “ Target Fund ”), a series of AMG Funds III (“ AMG Funds III ”); and (2) approval of a new subadvisory agreement between AMG Funds LLC (“ AMGF ”) and GW&K Investment Management, LLC (“ GW&K ”) with respect to the Target Fund. The Board of Trustees of AMG Funds III (the “ AMG Funds III Board ”) has called a special meeting of shareholders of the Target Fund to be held on January 13, 2021 to vote on the two proposals, which are described further below. Your vote is very important regardless of the number of shares you own. Whether or not you plan to attend the meeting in person, please read the enclosed materials and authorize a proxy to vote promptly. To authorize a proxy to cast your vote, simply complete, sign and return the enclosed proxy card using the postage-paid envelope provided or follow the instructions on the proxy card to vote by telephone or the Internet. It is important that your vote is received no later than the time of the meeting. After careful consideration, the AMG Funds III Board unanimously recommends that you vote “FOR” each proposal. Proposal 1: Reorganization of AMG GW&K Mid Cap Fund into AMG GW&K Small/Mid Cap Fund The AMG Funds III Board has approved a transaction whereby the Target Fund would be reorganized into AMG GW&K Small/Mid Cap Fund (the “ Acquiring Fund ” and together with the Target Fund, each a “ Fund ” and collectively, the “ Funds ”), a series of AMG Funds (“ AMG Funds ”) (the “ Reorganization ”). AMGF serves as investment manager to each Fund. GW&K serves as investment subadviser to the Acquiring Fund and is also the current interim subadviser to the Target Fund. The Target Fund and the Acquiring Fund are overseen by the same Trustees. If approved by shareholders, the Reorganization is expected to close on or about February 8, 2021, or as soon thereafter as practicable (the “ Closing Date ”). After the Reorganization, AMGF will continue to serve as the investment manager to the Acquiring Fund and GW&K will continue to serve as the subadviser to the Acquiring Fund. Proposal 2: Approval by shareholders of AMG GW&K Mid Cap Fund of a subadvisory agreement between AMG Funds LLC and GW&K Investment Management, LLC At a meeting held on October 8, 2020, and based upon the recommendation of AMGF and other factors, the AMG Funds III Board terminated the Target Fund’s subadvisory agreement with Cadence Capital Management LLC (“ Cadence ”), the then-current subadviser of the Target Fund, and approved the appointment of GW&K as the subadviser to the Target Fund on an interim basis to replace Cadence, with GW&K’s services beginning on October 8, 2020. GW&K was appointed interim subadviser to the Target Fund pursuant to an interim subadvisory agreement (the “ Interim Subadvisory Agreement ”) as permitted by Rule 15a-4 under the Investment Company Act of 1940, as amended (the “ 1940 Act ”). As required by applicable law, the Interim Subadvisory Agreement will remain in effect for a term no longer than 150 days. At the meeting held on October 8, 2020, the AMG Funds III Board also approved the longer-term appointment of GW&K as the subadviser to the Target Fund and the adoption of a new subadvisory agreement between AMGF and GW&K with respect to the Target Fund (the “ New Subadvisory Agreement ”), subject to shareholder approval. If approved, the New Subadvisory 1 Agreement would only go into effect in the event that the Reorganization is not consummated prior to March 7, 2021, when the Interim Subadvisory Agreement will automatically terminate. Information regarding the Interim Subadvisory Agreement and the New Subadvisory Agreement is contained in the enclosed proxy materials. The AMG Funds III Board believes that approval of each of the proposals is in the best interests of the Target Fund. Accordingly, the AMG Funds III Board unanimously recommends that you vote “FOR” each proposal. If you have any questions about the proxy materials or the proposed Reorganization, please call your investment professional or AST Fund Solutions at 866-751-6311. Very truly yours, /s/ Keitha L. Kinne Keitha L. Kinne President of AMG Funds III 2 AMG FUNDS III 600 Steamboat Road, Suite 300 Greenwich, Connecticut 06830 QUESTIONS AND ANSWERS YOUR VOTE IS IMPORTANT! Dated: November 12, 2020 Q: What am I being asked to vote on? A: As a shareholder of the Target Fund, you are being asked to vote to approve the Reorganization of the Target Fund into the Acquiring Fund pursuant to an Agreement and Plan of Reorganization among AMG Funds III, on behalf of the Target Fund, AMG Funds, on behalf of the Acquiring Fund, and AMGF (for purposes of Section 5 only). In connection with the Reorganization, the Target Fund will transfer all of its assets to the Acquiring Fund, the Acquiring Fund will assume all of the liabilities of the Target Fund, and you will receive a class of shares of the Acquiring Fund with a value equal to the net asset value of your corresponding class of shares of the Target Fund immediately prior to the Reorganization, based upon the Acquiring Fund’s valuation procedures, in liquidation of the Target Fund. The Reorganization is expected to be a transaction that is generally tax-free for U.S. federal income tax purposes. Upon completion of the Reorganization, you will become a shareholder of the Acquiring Fund. Target Fund/Share Class Acquiring Fund/Share Class AMG GW&K Mid Cap Fund — Class N ® AMG GW&K Small/Mid Cap Fund — Class N AMG GW&K Mid Cap Fund — Class I ® AMG GW&K Small/Mid Cap Fund — Class I AMG GW&K Mid Cap Fund — Class Z ® AMG GW&K Small/Mid Cap Fund — Class Z You are also being asked to vote to approve the New Subadvisory Agreement. GW&K currently serves as subadviser to the Target Fund pursuant to an Interim Subadvisory Agreement that expires on March 7, 2021. To address the possibility that the Reorganization is not consummated prior to the termination of the Interim Subadvisory Agreement, AMGF recommended, and the AMG Funds III Board approved, the New Subadvisory Agreement for the Target Fund in order to ensure the continuous management of the Target Fund. Q: Has the AMG Funds III Board approved the Proposals? A: Yes. The AMG Funds III Board determined that the Reorganization and New Subadvisory Agreement are in the best interests of the Target Fund and unanimously recommends that you vote “FOR” both proposals. Q: Why is the AMG Funds III Board recommending the Proposals? A : Based on the information provided by AMGF, the AMG Funds III Board believes that appointing GW&K as the subadviser, either through participation in the Reorganization or through the New Subadvisory Agreement, will benefit the Target Fund’s shareholders. In reaching this conclusion, the AMG Funds III Board considered several factors, which are discussed in the enclosed materials. The Reorganization will allow shareholders to continue to invest in a mutual fund managed on a day-to-day basis in a substantively similar manner and by the same portfolio management personnel that currently manage the Target Fund on an interim basis. AMGF, which serves as the Target Fund’s investment manager and provides administration and shareholder services for the Target Fund, would continue to provide the overall investment oversight responsibilities as the investment manager of the Acquiring Fund as well as administration and shareholder services for the Acquiring Fund. Because GW&K, the current subadviser to the Acquiring Fund and the interim subadviser to the Target Fund, is an affiliate of AMGF, AMGF indirectly benefits from the compensation received by GW&K. The AMG Funds Family of Funds is a mutual fund complex comprised of 49 different funds, each having distinct investment management objectives, strategies, risks, and policies. AMGF has advised the AMG Funds III Board that AMGF is committed to providing shareholders with access to a complete array of investment products and a comprehensive, high-quality set of shareholder services. Q: Who will manage the Acquiring Fund once the Reorganization is completed? A: Following the Reorganization, AMGF will continue to serve as the investment manager and GW&K will continue to serve as the subadviser to the Acquiring Fund. GW&K currently has day-to-day portfolio management responsibility as subadviser to the Target Fund, and it is currently anticipated that the Target Fund’s portfolio will be managed in a 3 substantively similar manner and by the same personnel as the Acquiring Fund prior to the Reorganization, and these personnel will continue to have day-to-day portfolio management responsibility with respect to the Acquiring Fund after the Reorganization. Q: How will the expenses that I bear as a shareholder of the Acquiring Fund compare to the expenses I currently bear as a shareholder of the Target Fund? A: Based on the net asset levels and expenses of the Target Fund for the fiscal year ended May 31, 2020 and the Acquiring Fund for the six-month semi-annual period ended June 30, 2020 (annualized) and after giving effect to current contractual fee rates, the total operating expense ratio of Class N and Class I shares of the Acquiring Fund is expected to be the same as the total operating expense ratio of the corresponding class of shares of the Target Fund, after giving effect to contractual expense waivers and reimbursements, and the total operating expense ratio of Class Z shares of the Acquiring Fund is expected to be higher than the total operating expense ratio of the corresponding class of shares of the Target Fund. AMGF has contractually agreed, through at least May 1, 2022, to waive management fees and/or pay or reimburse the Acquiring Fund’s expenses in order to limit the total annual fund operating expenses after fee waiver and expense reimbursements (exclusive of taxes, interest (including interest incurred in connection with bank and custody overdrafts and in connection with securities sold short), shareholder servicing fees, distribution and service (12b-1) fees, brokerage commissions and other transaction costs, dividends payable with respect to securities sold short, acquired fund fees and expenses, and extraordinary expenses) of the Acquiring Fund to the annual rate of 0.82% of the Acquiring Fund’s average daily net assets, subject to later reimbursement by the Acquiring Fund in certain circumstances. This arrangement also will continue to apply to the Acquiring Fund after the Reorganization. Certain fees waived and expenses reimbursed by AMGF are subject to recoupment in limited circumstances as noted below under “Synopsis – Comparison of Fees and Expenses.” Q: Will I need to pay sales commissions or taxes as a result of the Reorganization? A: The Reorganization will not trigger any sales commissions for shareholders. Also, the Reorganization is expected generally to be a tax-free transaction for U.S. federal income tax purposes. Accordingly, it is expected that Target Fund shareholders will not and the Target Fund generally will not recognize gain or loss as a direct result of the Reorganization, as described in more detail in the section of the proxy statement/prospectus entitled “U.S. Federal Income Tax Consequences.” A portion of the portfolio assets of the Target Fund may be sold in connection with the Reorganization. Any such sales will cause the Target Fund to incur transaction costs and may result in a taxable distribution to shareholders. Additionally, because the Reorganization will end the tax year of the Target Fund, the Reorganization will accelerate distributions to shareholders from the Target Fund for its tax year ending on the date of the Reorganization. These tax year-end distributions will be taxable to shareholders of the Target Fund, and will include any distributable, but not previously distributed, capital gains resulting from portfolio turnover prior to consummation of the 

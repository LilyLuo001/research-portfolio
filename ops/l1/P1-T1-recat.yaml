 450 , Cincinnati, Ohio 45246, on March 20, 2026 at 11:00 a.m. Eastern time (the “Special Meeting”). The Special Meeting has been called to vote on three important proposals relating to the Target Fund: 1. To approve an Agreement and Plan of Reorganization (the “Plan”) to reorganize (the “Reorganization”) the Target Fund into the Sterling Capital Enhanced Core Bond ETF, a new series of Sterling Capital Funds (the “Acquiring Fund”, and together with the Target Fund, the “Funds”). Importantly, approval of the Plan would provide for substantial continuity of the Target Fund’s current operations. As discussed in the attached Proxy Statement/Prospectus, both Funds have the same investment objective and substantially similar principal investment strategies and risks. In addition, the Funds’ portfolio managers will remain the same, and Sterling Capital Management LLC (“Sterling Capital”), who serves as the investment adviser to the Target Fund, will serve as investment adviser to the Acquiring Fund and will continue to be responsible for the day-to-day management of your Fund. Further, it is anticipated that shares of the Acquiring Fund will bear the same total annual fund operating expense ratio as shares of the Target Fund. The Reorganization is expected to benefit Target Fund shareholders by having all registered funds advised by Sterling Capital organized as part of the Sterling Capital Funds, and thereby benefit from potential economies of scale and the same corporate governance, operations, and compliance platforms; 2. To approve a New Investment Advisory Agreement between Sterling Capital and the Target Fund (the “New Agreement”). As discussed in the attached Proxy Statement/Prospectus, shareholders are being asked to approve the New Agreement because of an anticipated indirect change in control of Sterling Capital (the “Adviser Transaction”), which will result in the automatic termination of the current Investment Advisory Agreement between Sterling Capital and the
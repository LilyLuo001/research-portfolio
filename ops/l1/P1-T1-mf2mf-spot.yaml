      497 1 nvitinternatleqty497b7252025.htm NATIONWIDE VARIABLE INSURANCE TRUST One Nationwide Plaza Mail Code: 1-18-102 Columbus, Ohio 43215 (844) 202-7202 NVIT NS PARTNERS INTERNATIONAL FOCUSED GROWTH FUND IMPORTANT SHAREHOLDER INFORMATION The enclosed Prospectus/Information Statement is being provided to inform you that on or about October 27, 2025, the NVIT NS Partners International Focused Growth Fund, a series of Nationwide Variable Insurance Trust (the “Trust”), will be reorganized with and into the NVIT International Equity Fund, also a series of the Trust (the “Transaction”). The Prospectus/Information Statement discusses the Transaction and provides you with additional information about the NVIT International Equity Fund. The Board of Trustees of the Trust approved the Transaction and concluded that the Transaction is in the best interests of the NVIT NS Partners International Focused Growth Fund and the NVIT International Equity Fund. Please review the information in the Prospectus/Information Statement for your reference. You do not need to take any action with regard to your account. On or about October 27, 2025, your Class I and Class II shares of the NVIT NS Partners International Focused Growth Fund will be exchanged automatically at their net asset value for Class I and Class II shares, respectively, of the NVIT International Equity Fund. If you have any questions, please call the Trust toll-free at (844) 202-7202. i PROSPECTUS/INFORMATION STATEMENT TABLE OF CONTENTS INTRODUCTION 3 The Transaction 3 How do the investment objectives, principal strategies and policies of the Target Fund compare against the Acquiring Fund? 3 What are the principal risks associated with investments in the Target Fund versus the Acquiring Fund? 4 What are the general tax consequences of the Transaction? 4 Who manages the Funds? 4 What are the fees and expenses of each Fund and what might they be after the Transaction? 5 How do the performance records of the Funds compare? 8 Where can I find more financial information about the Funds? 11 What are other key features of the Funds? 11 COMPARISON OF INVESTMENT OBJECTIVES, PRINCIPAL STRATEGIES, POLICIES AND PRINCIPAL RISKS 12 What are the differences between the investment objectives of the Target Fund and the Acquiring Fund? 13 What are the most significant differences between the principal strategies and policies of the Target Fund compared to the Acquiring Fund? 13 How do the fundamental investment restrictions of the Target Fund differ from the Acquiring Fund? 14 What are the principal risk factors associated with investments in the Funds? 15 FACTORS CONSIDERED BY THE BOARD 17 INFORMATION ABOUT THE TRANSACTION AND THE PLAN 17 How will the Transaction be carried out? 17 Who will pay the expenses of the Transaction? 18 What are the tax consequences of the Transaction? 18 What should I know about shares of the Target Fund and the Acquiring Fund? 20 What are the capitalizations of the Funds and what might the capitalization be after the Transaction? 20 MORE INFORMATION ABOUT THE FUNDS 21 EXHIBITS TO PROSPECTUS/INFORMATION STATEMENT 23 ii NATIONWIDE VARIABLE INSURANCE TRUST One Nationwide Plaza Mail Code: 1-18-102 Columbus, Ohio 43215 (844) 202-7202 PROSPECTUS/INFORMATION STATEMENT Dated July 25, 2025 Acquisition of the Assets of: NVIT NS PARTNERS INTERNATIONAL FOCUSED GROWTH FUND (a series of Nationwide Variable Insurance Trust) By and in exchange for shares of: NVIT INTERNATIONAL EQUITY FUND (a series of Nationwide Variable Insurance Trust) This Prospectus/Information Statement is being furnished to shareholders of NVIT NS Partners International Focused Growth Fund (the “Target Fund”), a series of Nationwide Variable Insurance Trust (the “Trust”), pursuant to a Plan of Reorganization (the “Plan”) whereby all of the property and assets (“Assets”) of the Target Fund will be acquired by the NVIT International Equity Fund, also a series of the Trust (the “Acquiring Fund,” and collectively with the Target Fund, the “Funds”), in exchange for shares of the Acquiring Fund (the “Transaction”), and the assumption by the Acquiring Fund of all of the liabilities of the Target Fund. According to the Plan, the Target Fund will then be liquidated and dissolved following the Transaction. The Board of Trustees of the Trust (the “Board”) has approved the Plan and the Transaction. Shareholders of the Target Fund are not required to and are not being asked to approve the Plan or the Transaction. Pursuant to the Plan, holders of Class I and Class II shares of the Target Fund will receive, in exchange for their shares, the equivalent aggregate net asset value of Class I and Class II shares, respectively, of the Acquiring Fund. The investment objectives, strategies and risks of the Target Fund and Acquiring Fund are not identical, and there are some important differences , as well as certain similarities. The fundamental and non-fundamental investment restrictions of each Fund are identical. Each Fund is a diversified series of the Trust. Nationwide Fund Advisors (“NFA” or the “Adviser”) is the investment adviser to both the Target Fund and the Acquiring Fund. NS Partners Ltd (“NS Partners”) is the subadviser to the Target Fund. Lazard Asset Management LLC (“Lazard”) is the subadviser to the Acquiring Fund. This Prospectus/Information Statement provides the information that you should know about the Transaction and about an investment in the Acquiring Fund. You should retain this Prospectus/Information Statement for future reference. A Statement of Additional Information dated July 25, 2025 (the “Statement of Additional Information”), relating to this Prospectus/Information Statement , contains more information about the Acquiring Fund and the Transaction, and has been filed with the U.S. Securities and Exchange Commission (the “SEC”) and is incorporated herein by reference. 1 The prospectus of the Acquiring Fund, dated April 30 , 2025 (1933 Act File No. 002-73024) (the “Acquiring Fund Prospectus”), is incorporated herein by reference and is considered a part of this Prospectus/Information Statement, and is intended to provide you with information about the Acquiring Fund. A copy of the current summary prospectus for the Acquiring Fund (“Acquiring Fund Summary Prospectus”) accompanies this Prospectus/Information Statement. The prospectus of the Targ et Fund, dated April 30, 2025 (1933 Act File No. 002-73024) (the “Target Fund Prospectus”), provides additional information about the Target Fund and is incorporated herein by reference. You can request a free copy of the Statement of Additional Information, Acquiring Fund Prospectus or Target Fund Prospectus, and the Annual Report and Semi-Annual Report to Shareholders of the Acquiring Fund or Target Fund for the periods ended December 31, 2024 and June 30, 2024 (the “Annual Report” and “Semi-Annual Report,” respectively), by calling (844) 202-7202, or by writing to the Trust at: One Nationwide Plaza, Mail Code: 1-18-102, Columbus, Ohio 43215. Additional information about the Acquiring Fund can be viewed online or downloaded from the EDGAR database without charge on the SEC’s internet site at www.sec.gov. Shareholders can obtain copies, upon payment of a duplicating fee, by sending an e-mail request to publicinfo@sec.gov or by mailing a written request to U.S. Securities and Exchange Commission, 100 F Street, N.E., Washington, D.C. 20549-0102. This Prospectus/Information Statement is also being furnished by certain insurance companies (each, a “Participating Insurance Company” and collectively, the “Participating Insurance Companies”) to owners of variable annuity contracts and variable insurance policies (collectively, “Variable Contracts”) having contract values allocated to a subaccount of a Participating Insurance Company separate account invested in shares of the Target Fund. All owners (“Contract Owners”) of Variable Contracts who, as of June 11, 2025, had selected the Target Fund as an underlying investment option within their Variable Contract will receive this Prospectus/Information Statement. For purposes of this Prospectus/Information Statement, the terms “you,” “your,” and “shareholder” refer to both Contract Owners who invest in the Target Fund through their Variable Contracts as well as the Participating Insurance Companies. WE ARE NOT ASKING YOU FOR A PROXY AND YOU ARE REQUESTED NOT TO SEND US A PROXY. The SEC has not approved or disapproved these securities or passed upon the adequacy of this Prospectus/Information Statement. Any representation to the contrary is a criminal offense. Mutual fund shares are not deposits or obligations of, or guaranteed or endorsed by, any bank, and are not insured by the Federal Deposit Insurance Corporation, the Federal Reserve Board, or any other U.S. government agency. Mutual fund shares involve investment risks, including the possible loss of principal. 2 INTRODUCTION This Introduction is only a summary of certain information contained in this Prospectus/Information Statement. You should read the more complete information in the rest of this Prospectus/Information Statement, including the Plan, attached as Exhibit A, and the Acquiring Fund Summary Prospectus included with this Prospectus/Information Statement. The Transaction The Plan provides for: (i) the acquisition by the Acquiring Fund of all of the Assets of the Target Fund in exchange solely for Class I and Class II shares of the Acquiring Fund (“Acquiring Fund Shares”) and the assumption by the Acquiring Fund of all of the liabilities of the Target Fund; (ii) the pro rata distribution of Class I and Class II shares of the Acquiring Fund to holders of Class I and Class II shares, respectively, of the Target Fund; and (iii) the liquidation and dissolution of the Target Fund. At a meeting held on June 10, 2025, the Board, including a majority of the Trustees who are not “interested persons” (as defined by the Investment Company Act of 1940, as amended (the “1940 Act”)) (the “Independent Trustees”), approved the Plan, which had been proposed so that shareholders of the Target Fund could take advantage of the Acquiring Fund’s stronger performance and lower fees . At the closing of the Transaction, all of the Target Fund’s Assets will be transferred to the Acquiring Fund in exchange for the Acquiring Fund Shares equal in value to the Assets of the Target Fund that are transferred to the Acquiring Fund and the assumption by the Acquiring Fund of all the liabilities of the Target Fund. The Target Fund will be liquidated and dissolved and the Acquiring Fund Shares will be distributed pro rata to the Target Fund’s shareholders. The Transaction will result in your shares of the Target Fund being exchanged for shares of the Acquiring Fund equal in value (but having a different price per share) to your shares of the Target Fund. In particular, shareholders of Class I and Class II shares of the Target Fund will receive Class I and Class II shares, respectively, of the Acquiring Fund. This means that you will cease to be a shareholder of the Target Fund and will become a shareholder of the Acquiring Fund, holding Class I or Class II shares, as applicable. These exchanges will occur on a date agreed upon by the parties to the Plan (hereafter, the “Closing Date”), which is currently anticipated to occur on or around October 27, 2025. For the reasons set forth below under “Factors Considered by the Board,” the Board has determined that the Transaction is in the best interests of the Target Fund and the Acquiring Fund. The Board has also concluded that the interests of the existing shareholders of the Target Fund and the existing shareholders of the Acquiring Fund will not be diluted as a result of the Transaction. How do the investment objectives, principal strategies and policies of the Target Fund compare against the Acquiring Fund? Investment Objectives. The Target Fund seeks long-term capital growth. The Acquiring Fund seeks long-term capital growth by investing primarily in equity securities of companies located in Europe, Australasia, the Far East and other regions, including developing countries. The Funds’ investment objectives are non-fundamental and may be changed by the Board without shareholder approval upon 60 days’ written notice to shareholders. Principal Investment Strategies and Policies. The principal strategies of the Target Fund and the Acquiring Fund are substantially similar, yet they also have some important differences. Both Funds invest in equity securities of non-U.S. companies, including companies in developed markets countries as well as emerging markets countries. The Acquiring Fund invests in equity securities issued by companies of any size, including smaller companies, that are located in, that derive at least 50% of their earnings or revenues from, or that maintain at least 50% of their assets in, countries around the world other than the United States. The Acquiring Fund also has a policy of investing, under normal circumstances, at least 80% of its net assets in equity securities. The Target Fund does not have a policy of investing a specified amount of its assets in a particular type of security, 3 but nonetheless invests primarily in equity securities of non-U.S. companies. Like the Acquiring Fund, the Target Fund may invest in companies of any size, including smaller capitalization companies. The Target Fund may invest in initial public offerings (“IPOs”) as a principal investment strategy. The Acquiring Fund does not invest in IPOs as a principal investment strategy, although it may do so as a secondary investment strategy. Further, the Target Fund invests in growth stocks that exhibit quality characteristics, such as a consistent track record of strong earnings and stable balance sheets, whereas the Acquiring Fund invests both in growth stocks and value stocks. Although each Fund is classified as “diversified” under the 1940 Act, the Target F

      497 1 d809976d497.htm 497 497 Table of Contents File No. 333-278536 TOUCHSTONE INTERNATIONAL GROWTH FUND a series of TOUCHSTONE STRATEGIC TRUST 303 Broadway, Suite 1100 Cincinnati, Ohio 45202 (800) 543-0407 May 6, 2024 Dear Shareholder: We have important information concerning your investment in the Touchstone International Growth Fund (the “Target Fund”), a series of Touchstone Strategic Trust (the “Target Fund Trust”). As a shareholder of the Target Fund, we wish to inform you that the Board of Trustees of the Target Fund Trust (the “Board”) has approved the reorganization of the Target Fund into the Touchstone Sands Capital International Growth Equity Fund (the “Acquiring Fund,” and together with the Target Fund, the “Funds”), a series of Touchstone Funds Group Trust (the “Acquiring Fund Trust”) (the “Reorganization”). The Reorganization is intended to eliminate the offering of multiple funds with identical investment goals and similar principal investment strategies and has the potential to provide efficiencies and economies of scale for the combined Fund. The Funds have similar sub-advisory fee schedules, while the advisory fee and expense limitation schedules of the combined Fund will be lower than those of the Target Fund currently, and the same as the Acquiring Fund currently. Pursuant to an Agreement and Plan of Reorganization, the Target Fund will transfer all of its assets and liabilities to the Acquiring Fund. As a result of the Reorganization, you will receive shares of the Acquiring Fund that will have a total value equal to the total value of your shares in the Target Fund as of the close of business on the closing date of the Reorganization. The Target Fund will then cease operations and liquidate. The Reorganization is expected to be completed on or about June 14, 2024. The following table shows the share class of the Acquiring Fund that will be issued to each corresponding share class of the Target Fund. Target Fund and Share Classes Acquiring Fund and Share Classes Touchstone International Growth Fund, a series of the Target Fund Trust Touchstone Sands Capital International Growth Equity Fund, a series of the Acquiring Fund Trust Class A Class C Class Y Institutional Class Class A Class C Class Y Institutional Class The Acquiring Fund also offers Class R6 shares, which are not involved in the Reorganization. Shareholder approval is not required to effect the Reorganization. We have enclosed a Prospectus/Information Statement that describes the Reorganization proposal in greater detail, as well as important information about the Acquiring Fund. Sincerely, E. Blake Moore, Jr. President Touchstone Strategic Trust 1 Table of Contents QUESTIONS & ANSWERS We recommend that you read the enclosed Prospectus/Information Statement. In addition to the detailed information in the Prospectus/Information Statement, the following questions and answers provide an overview of key features of the Reorganization. Q. Why are we sending you the Prospectus/Information Statement? A. On February 15, 2024, the Target Fund Board approved the Reorganization of the Target Fund into the Acquiring Fund. The Reorganization does not require approval by shareholders. The Prospectus/Information Statement provides important information regarding the Reorganization and the Acquiring Fund that you should consider carefully. Q. What will happen to my existing shares? A . Immediately after the Reorganization, you will own shares of the Acquiring Fund that are equal in total value to the shares of the Target Fund that you hold as of the close of business on the date of the Reorganization (although the number of shares and the net asset value per share may be different). Q. How do the fees and expenses of the Funds compare? A. Currently, the Target Fund and the Acquiring Fund pay a standard advisory fee based on net assets of the applicable Fund with breakpoints, as more fully described below. Following the Reorganization, the advisory fee rate of the combined Fund will be lower than the advisory fee rate for the Target Fund and identical to the advisory fee rate for the Acquiring Fund prior to the Reorganization. For Class A and C shares, the Funds have the same Rule 12b-1 fees and sales charges. Class Y and Institutional Class shares of the Target Fund and the Acquiring Fund are not subject to any Rule 12b-1 fees or sales charges. In addition, each Fund has entered into an expense limitation agreement with Touchstone Advisors, Inc. (“Touchstone Advisors”), each Fund’s investment advisor. Touchstone Advisors has contractually agreed to waive a portion of its fees and reimburse certain Fund expenses in order to limit annual fund operating expenses for each Fund. The expense limitation for each share class of the Acquiring Fund is lower than the expense limitation for the corresponding share class of the Target Fund. The expense limitation agreement is effective through October 29, 2024 for the Target Fund and through June 30, 2025 for the Acquiring Fund. In addition, the net annual fund operating expenses of Class A, Class C, Class Y and Institutional Class shares of the combined Fund after the Reorganization, as a percentage of average net assets, will be equal to or lower than the net annual fund operating expenses of the corresponding class of shares of the Target Fund. The section titled “Summary—Reorganization—How do the Funds’ fees and expenses compare?” of the Prospectus/Information Statement compares the fees and expenses of the Funds in detail and the section titled “The Funds’ Management—Expense Limitation Agreement” provides additional information regarding the expense limitation agreements. Q. How do the Funds’ investment goals and principal investment strategies compare? A. The Funds have identical investment goals and similar principal investment strategies. The Target Fund is managed by DSM Capital Partners LLC (“DSM”) and the Acquiring Fund is managed by Sands Capital Management, LLC (“Sands”). The section of the Prospectus/Information Statement titled “Summary—Reorganization—How do the Funds’ investment goals and principal investment strategies compare?” describes the investment goal and principal investment strategies of the Target Fund and the investment goal and principal investment strategies of the Acquiring Fund. 1 Table of Contents Q. Will I have to pay federal income taxes as a result of the Reorganization? A. You are not expected to recognize any gain or loss for federal income tax purposes on the exchange of your shares of the Target Fund for shares of the Acquiring Fund. The Reorganization is intended to qualify as a tax-free reorganization for federal income tax purposes. The sections of the Prospectus/Information Statement titled “Summary—Reorganization—What will be the primary federal income tax consequences of the Reorganization?” and “Information About the Reorganization—Material Federal Income Tax Consequences” provide additional information regarding the federal income tax consequences of the Reorganization. The Funds may incur brokerage commissions and/or transaction expenses associated with the sale and purchase of portfolio securities. Prior to the Reorganization, approximately 10% of the securities of the Target Fund are expected to be sold to provide increased liquidity in connection with the Reorganization. The Acquiring Fund may also dispose of certain securities after the Reorganization is consummated in the ordinary course. Any portfolio repositioning is not due to the investment restrictions of the Acquiring Fund. The Target Fund will bear brokerage commissions and/or other transaction costs in connection with the repositioning occurring prior to the Reorganization. It is estimated that the portfolio repositioning will result in brokerage commissions and/or transaction costs of approximately $30,000, or approximately $0.006 per share or 0.05% of net assets, for the Target Fund. For more information, please see the sections of the Prospectus/Information Statement titled “Summary—Reorganization—What will be the primary federal income tax consequences of the Reorganization?,” and “Information About the Reorganization—Material Federal Income Tax Consequences.” Q. Who will manage the Acquiring Fund after the Reorganization? A. Touchstone Advisors serves as the investment advisor to both Funds. DSM serves as the investment sub-adviser and Daniel Strickberger, Dave McVey and Eric Woodworth, CFA serve as the current portfolio managers of the Target Fund. DSM and Messrs. Strickberger, McVey and Woodworth are expected to remain as sub-adviser and portfolio managers, respectively, until the Reorganization is complete. Sands serves as the investment sub-adviser to the Acquiring Fund and Sunil H. Thakor, CFA, David E. Levanson, CFA, and Danielle Menichella, CFA serve as the current portfolio managers of the Acquiring Fund. Sands and Messrs. Thakor, Levanson, and Ms. Menichella will continue to serve as the combined Fund’s subadviser and portfolio managers, respectively, upon completion of the Reorganization. For more information please see the sections of the Prospectus/Information Statement titled “Summary—Reorganization—Who will be the Adviser, Sub-Adviser, and Portfolio Managers of my Fund after the Reorganization?,” “The Funds’ Management—Investment Adviser” and “The Funds’ Management—Sub-Adviser and Portfolio Managers.” Q. Will I have to pay any sales load, commission, or other similar fee in connection with the Reorganization? A. No, you will not pay any sales load, commission, or other similar fee in connection with the shares of the Acquiring Fund you will receive in the Reorganization and any contingent deferred sales charge (“CDSC”) holding period on your shares of the Target Fund will carry over to the shares of the Acquiring Fund that you receive in the Reorganization. However, following the Reorganization, additional purchases, exchanges and redemptions of shares of the Acquiring Fund will be subject to any applicable sales loads, commissions, and other similar fees. Q. Who will pay the costs of the Reorganization? A. Touchstone Advisors, and not the Funds, will bear 100% of the costs of the Reorganization, which are estimated to be approximately $226,000 or approximately 0.1731% of the Target Fund’s net assets (as of 2 Table of Contents February 26, 2024), whether or not the Reorganization is completed. These costs of the Reorganization are unrelated to any transaction costs relating to the purchase and sale of portfolio securities by the Target Fund and the Acquiring Fund, and any such transaction costs shall be borne by the applicable Fund. Q. What if I redeem my shares before the Reorganization takes place? A. If you choose to redeem your shares before the Reorganization takes place, then the redemption will be treated as a normal sale of shares and, generally, will be a taxable transaction. Q. Why is no shareholder action necessary? A. The declarations of trust of Touchstone Strategic Trust and Touchstone Funds Group Trusts each provide that any series may be reorganized into another series by a vote of a majority of the trustees of the Trust without the approval of shareholders. In addition, the Reorganization of the Target Fund into the Acquiring Fund satisfies the requisite conditions of Rule 17a-8 under the Investment Company Act of 1940, as amended (the “1940 Act”), such that shareholder approval is not required by the 1940 Act because (i) no policy of the Target Fund that may not be changed without a vote of a majority of the Fund’s shareholders, is materially different from a policy of the Acquiring Fund, (ii) no advisory contract between the Acquiring Fund and Touchstone Advisors is materially different from the advisory contract between the Target Fund and Touchstone Advisors, (iii) the trustees of the Board of the Target Fund who are not “interested persons,” as such term is defined in the 1940 Act, and who were elected by the Target Fund’s shareholders will comprise a majority of the trustees of the Board of the Acquiring Fund who are not “interested persons,” as such term is defined in the 1940 Act, and (iv) the distribution fees paid by the Acquiring Fund pursuant to a plan adopted in accordance with Rule 12b-1 of the 1940 Act are no greater than the distribution fees authorized to be paid by the Target Fund pursuant to such a plan. Q. When will the Reorganization occur? A. The Reorganization is expected to be completed on or about June 14, 2024. Q. Who should I contact for more information? A. You can contact Shareholder Services at (800) 543-0407 for more information. 3 Table of Contents PROSPECTUS/INFORMATION STATEMENT May 6, 2024 TOUCHSTONE INTERNATIONAL GROWTH FUND a series of TOUCHSTONE STRATEGIC TRUST 303 Broadway, Suite 1100 Cincinnati, Ohio 45202 (800) 543-0407 TOUCHSTONE SANDS CAPITAL INTERNATIONAL GROWTH EQUITY FUND a series of TOUCHSTONE FUNDS GROUP TRUST 303 Broadway, Suite 1100 Cincinnati, Ohio 45202 (800) 543-0407 This Prospectus/Information Statement is being furnished to shareholders of the Touchstone International Growth Fund (the “Target Fund”), a series of Touchstone Strategic Trust (the “Target Fund Trust”), in connection with an Agreement and Plan of Reorganization (the “Plan”) between the Target Fund and the Touchstone Sands Capital International Growth Equity Fund (the “Acquiring Fund”), a series of the Touchstone Funds Group Trust (the “Acquiring Fund Trust”), providing for (i) the transfer of all of the assets of the Target Fund to the Acquiring Fund in exchange solely for Class A, Class C, Class Y, and Institutional Class shares of the Acquiring Fund and the assumption by the Acquiring Fund of all the liabilities of the Target Fund; and (ii) the pro rata (or proportionate) distribution by class of the Acquiring Fund’s shares to the Target Fund’s shareholders in complete liquidation and termination of the Target Fund (the “Reorganization”). The Board of Trustees of

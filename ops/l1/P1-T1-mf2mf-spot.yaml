ay contact SunAmerica Asset Management, LLC at Harborside 5, 185 Hudson St., Suite 3300 Jersey City, NJ 07311-4992 or 800-858-8850. Sincerely, /s/ Gregory N. Bressler Secretary, SunAmerica Equity Funds SunAmerica Income Funds SunAmerica Series, Inc. SunAmerica Specialty Series iii INSTRUCTIONS FOR SIGNING PROXY CARDS The following general rules for signing proxy cards may be of assistance to you and avoid the time and expense in validating your vote if you fail to sign your proxy card properly. 1. Individual Accounts: Sign your name exactly as it appears in the registration on the proxy card. 2. Joint Accounts: Either party may sign, but the name of the party signing should conform exactly to the name shown in the registration on the proxy card. 3. All Other Accounts: The capacity of the individual signing the proxy card should be indicated unless it is reflected in the form of registration. For example: Registration Valid Signature Corporate Accounts (1) ABC Corp. ABC Corp. (2) ABC Corp John Doe, Treasurer (3) ABC Corp. c/o John Doe, Treasurer John Doe (4) ABC Corp. Profit Sharing Plan John Doe, Trustee Trust Accounts (1) ABC Trust Jane B. Doe, Trustee (2) Jane B. Doe, Trustee u/t/d 12/28/78 Jane B. Doe Custodial or Estate Accounts (1) John B. Smith, Cust. f/b/o John B. Smith, Jr. UGMA John B. Smith (2) Estate of John B. Smith John B. Smith, Jr., Executor Every shareholder’s vote is important! Please complete, sign, date and return your proxy card today! Your proxy vote is important! iv The information contained in this Joint Proxy Statement/Prospectus is not complete and may be changed. We may not sell these securities until the registration statement filed with the Securities and Exchange Commission is effective. This Joint Proxy Statement/Prospectus is not an offer to sell these securities, and it is not a solicitation of an offer to buy these securities, in any jurisdiction where the offer or sale is not permitted. SUBJECT TO COMPLETION, DATED MARCH 9, 2021 JOINT PRO

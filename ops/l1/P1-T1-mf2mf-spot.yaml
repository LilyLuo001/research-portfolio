      497 1 d145320d497.htm NVIT MULTI-MANAGER INTERNATIONAL VALUE FUND NVIT Multi-Manager International Value Fund NATIONWIDE VARIABLE INSURANCE TRUST One Nationwide Plaza Mail Code: 5-02-210 Columbus, Ohio 43215 (800) 848-0920 NVIT MULTI-MANAGER INTERNATIONAL VALUE FUND NOTICE OF SPECIAL MEETING OF SHAREHOLDERS To be held on: September 30, 2020 To the shareholders of the NVIT Multi-Manager International Value Fund, a series of Nationwide Variable Insurance Trust, a Delaware statutory trust (the “Trust”), and to the owners of variable life insurance policies or variable annuity contracts entitled to give voting instructions to the shareholders of the NVIT Multi-Manager International Value Fund: NOTICE IS HEREBY GIVEN that the Trust will hold a Special Meeting of Shareholders (the “Meeting”) for the NVIT Multi-Manager International Value Fund, which will be held on September 30, 2020, at 9:00 a.m., Eastern time, at 10 West Nationwide Boulevard, Columbus, Ohio 43215. The purpose of the Meeting is to vote on the following proposal (the “Proposal”): 1. To approve a Plan of Reorganization (the “Plan”) by the Trust, on behalf of its series, the NVIT Columbia Overseas Value Fund (the “Acquiring Fund”) and the NVIT Multi-Manager International Value Fund (the “Target Fund”) which provides for: (i) the acquisition by the Acquiring Fund of all of the property and assets of the Target Fund, in exchange solely for Class X and Class Z shares of the Acquiring Fund; (ii) the assumption by the Acquiring Fund of all of the Target Fund’s liabilities; (iii) the pro rata distribution of Class X shares of the Acquiring Fund to the shareholders of the Target Fund holding Class I and Class IV shares of the Target Fund, and of Class Z shares of the Acquiring Fund to the shareholders of the Target Fund holding Class II shares of the Target Fund; and (iv) the liquidation and dissolution of the Target Fund, all upon and subject to the terms and conditions of the Plan. 2. To vote upon any other business that may properly come before the Meeting or any adjournment(s) thereof. A copy of the form of the Plan, which more completely describes the transaction proposed, is attached as Exhibit A to the attached Proxy Statement/Prospectus. Shareholders of record of the Target Fund as of the regular close of business of the New York Stock Exchange on June 12, 2020, are entitled to notice of and to vote at the Meeting and at any adjournment(s) or postponement(s) thereof. Each share of the Fund is entitled to one vote, and each fractional share held is entitled to a proportional fractional vote, with respect to the Proposal. Instead of attending and voting at the Meeting, you may choose to vote and return the Proxy Card (or voting instruction form) or vote by telephone or through the Internet. Any vote cast by you, other than through attendance at the Meeting, must be duly and properly received by the Trust or its proxy solicitor by the date of the Meeting, in order to be counted for the Meeting. If you have returned the Proxy Card (or voting instruction form) or voted by telephone or through the Internet and are present at the Meeting, you may change the vote specified in the proxy at that time. However, attendance in person at the Meeting, by itself, will not revoke a previously tendered proxy. Whether or not you plan to attend the Meeting, please vote your shares by returning the Proxy Card (or voting instruction form) by mail in the enclosed postage-paid envelope provided or by voting by telephone or over the Internet. The persons named as proxies will vote in their discretion on any other business that may properly come before the Meeting or any adjournment(s) or postponements(s) thereof. 1 The Meeting is currently planned to take place at a physical location. However, due to concerns regarding the coronavirus or COVID-19, the Trust is planning for the possibility that the Meeting may be held virtually solely by means of remote communication or via a live webcast or that the Trust may allow for virtual attendance. If the Trust takes this step, the Trust will publicly announce the decision in a press release that will also be filed with the Securities and Exchange Commission as definitive additional soliciting material, and the Trust will post the announcement and additional information on its website at https://www.nationwide.com/personal/investing/mutual-funds/shareholder-news/ as soon as practicable before the Meeting. The Trust recommends that you monitor this website for updated information, and please check this website in advance of the Meeting to confirm the status of the Meeting before planning to attend in person. This Proxy Statement/Prospectus is also being furnished by Nationwide Life Insurance Company, Nationwide Life and Annuity Insurance Company, Jefferson National Life Insurance Company and Jefferson National Life Insurance Company of New York (collectively, “Nationwide Life”), and certain other insurance companies (each, a “Participating Insurance Company” and collectively, the “Participating Insurance Companies”) to owners of variable annuity contracts and variable insurance policies (collectively, “Variable Contracts”) having contract values allocated to a subaccount of a Nationwide Life or Participating Insurance Company separate account invested in shares of the Target Fund. All owners of Variable Contracts who, as of June 12, 2020, had selected the Target Fund as an underlying investment option within their Variable Contract will receive this Proxy Statement/Prospectus. By Order of the Board of Trustees of the Trust, /s/Stephen R. Rimes, Secretary August 4, 2020 Your vote is important. To secure the largest possible representation and to save the expense of further mailings, please mark your Proxy Card (or voting instruction form), sign it, and return it as soon as possible in the enclosed envelope, which requires no postage if mailed in the United States, or vote by telephone or over the Internet by following the instructions provided on the Proxy Card (or voting instruction form). Please vote your proxy regardless of the number of shares owned. You may revoke your proxy at any time at, or before, the Meeting or vote in person if you attend the Meeting, as provided in the attached Proxy Statement/Prospectus. 2 NATIONWIDE VARIABLE INSURANCE TRUST One Nationwide Plaza Mail Code: 5-02-210 Columbus, Ohio 43215 (800) 848-0920 NVIT MULTI-MANAGER INTERNATIONAL VALUE FUND IMPORTANT SHAREHOLDER INFORMATION Enclosed is a Notice, Proxy Statement/Prospectus, and proxy card(s)/voting instruction form(s) for a Special Meeting of Shareholders (the “Meeting”) relating to the NVIT Multi-Manager International Value Fund (the “Fund”), a series of Nationwide Variable Insurance Trust (the “Trust”). The Meeting will be held on September 30, 2020, at 9:00 a.m., Eastern time, at 10 West Nationwide Boulevard, Columbus, Ohio 43215. The purpose of the Meeting is to vote on an important proposal (the “Proposal”) that affects the Fund and your investment in the Fund. As a shareholder of the Fund, you have the opportunity to voice your opinion on the matters that affect the Fund. This package contains information about the Proposal and the materials to use when voting by mail, by telephone or through the Internet. The Proposal has been carefully reviewed by the Board of Trustees of the Trust (the “Board”). The Board believes that the Proposal is in the best interests of the Fund. The Board recommends that you vote FOR the Proposal. Whether or not you plan to attend the Meeting, please take a few minutes to read the enclosed materials and cast your vote promptly. To cast your vote, simply complete the proxy card(s)/voting instruction form(s) enclosed in this package. Be sure to sign and date the card(s) before mailing them in the postage-paid envelope. You also may vote your shares by telephone or over the Internet. Simply call the toll-free number or visit the website indicated on your proxy card(s)/voting instruction form(s) and follow the recorded or online instructions. Your vote is extremely important, no matter how large or small your holdings may be. It is important that your vote be received by the date of the Meeting. Shareholders who execute proxies may revoke them at any time before they are voted by filing a written notice of revocation with the Trust, by delivering a duly executed proxy bearing a later date or by attending the Meeting and voting in person. If you have any questions before you vote, please call the Trust at (800) 848-0920. You also may receive a telephone call from the Fund’s proxy solicitor, Broadridge Financial Solutions, Inc. (“Broadridge”), asking you to vote your shares. Thank you for your participation in this important initiative. The Meeting is currently planned to take place at a physical location. However, due to concerns regarding the coronavirus or COVID-19, the Trust is planning for the possibility that the Meeting may be held virtually solely by means of remote communication or via a live webcast or that the Trust may allow for virtual attendance. If the Trust takes this step, the Trust will publicly announce the decision in a press release that will also be filed with the Securities and Exchange Commission as definitive additional soliciting material, and the Trust will post the announcement and additional information on its website at https://www.nationwide.com/personal/investing/mutual-funds/shareholder-news/ 1 as soon as practicable before the Meeting. The Trust recommends that you monitor this website for updated information, and please check this website in advance of the Meeting to confirm the status of the Meeting before planning to attend in person. TELEPHONE AND INTERNET VOTING For your convenience, you also may be able to vote by telephone or over the Internet, 24 hours a day. If your account is eligible, separate instructions are enclosed. 1 The Fund’s Internet address is included in this Proxy Statement as a textual reference only. The information on the website is not incorporated by reference into this Proxy Statement, which means that the website is not a part of this Proxy Statement and is provided as an additional reference only. i IMPORTANT INFORMATION TO HELP YOU UNDERSTAND THE REORGANIZATION The following is a brief overview of the Proposal to be voted upon at the meeting of shareholders scheduled for September 30, 2020 (the “Meeting”). Your vote is important. Please read the full text of the Proxy Statement/Prospectus, which you should retain for future reference. If you need another copy of the Proxy Statement/Prospectus, please call Nationwide Variable Insurance Trust (the “Trust”) at (800) 848-0920. We appreciate your decision to invest with the Trust and we look forward to helping you achieve your financial goals. What proposal am I being asked to vote on? Shareholders of the NVIT Multi-Manager International Value Fund (the “Target Fund”) are being asked to vote to approve a Plan of Reorganization (the “Plan”) whereby the NVIT Columbia Overseas Value Fund (the “Acquiring Fund,” and collectively with the Target Fund, the “Funds”), another series of the Trust, would acquire all of the property and assets of the Target Fund in exchange for shares of the Acquiring Fund (the “Proposal”), subject to the terms and conditions of the Plan. As a result of this exchange, shareholders of the Target Fund will become shareholders of the Acquiring Fund. The Acquired Fund will assume all of the liabilities of the Target Fund. The Target Fund will then be liquidated and dissolved. Why has the reorganization been proposed? The Target Fund and the Acquiring Fund share similar investment mandates. Nationwide Fund Advisors (“NFA” or the “Adviser”) recommended the Proposal to bring the assets of both Funds together under the management of a single subadviser and to produce operational efficiencies that may, over time, produce cost savings to shareholders. The combination of the Funds would also reduce duplication among the series of the Trust. How will the reorganization work? If shareholders of the Target Fund approve the Plan, all of the Target Fund’s assets will be transferred to the Acquiring Fund in exchange solely for Class X shares and Class Z shares of the Acquiring Fund equal in value to the assets of the Target Fund that are transferred to the Acquiring Fund (the “Transaction”). Such shares of the Acquiring Fund will then be distributed pro rata to the shareholders of the Target Fund, and the Target Fund will be liquidated and dissolved. The Transaction will result in Class I and Class IV shares of the Target Fund being exchanged for Class X shares of the Acquiring Fund equal in value to (but having a different price per share than) shares of the Target Fund, and in Class II shares of the Target Fund being exchanged for Class Z shares of the Acquiring Fund equal in value to (but having a different price per share than) shares of the Target Fund. To the extent that the liabilities of the Target Fund are not discharged on or prior to the last business day prior to the date agreed upon for the exchange (which is currently anticipated to occur on or around October 12, 2020), the Acquiring Fund will assume the liabilities of the Target Fund. More detailed information about the transfer of assets by the Target Fund and the issuance of shares by the Acquiring Fund can be found in the Proxy Statement/Prospectus. Will portfolio management change? Yes. While NFA serves as investment adviser to both Funds and supervises the daily business affairs of both Funds, subject to the supervision of the Board, investment subadvisers are responsible for the day-to-day investment management of the Funds. NFA also determines the allocation of each Fund’s assets among one or more subadvisers and evaluates and monitors the performance of any such subadvisers. Dimensional Fund Advisors LP (“DFA”) and Thompson, Siegel & Walmsley LLC (“TSW”) subadvis

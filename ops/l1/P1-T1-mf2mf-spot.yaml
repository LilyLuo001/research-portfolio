      N-14/A 1 fm_n-14a.htm N-14/A As filed with the Securities and Exchange Commission on September 17 , 2021 1933 Act Registration No. 333-258685 UNITED STATES SECURITIES AND EXCHANGE COMMISSION Washington, D.C. 20549 Form N-14 REGISTRATION STATEMENT UNDER THE SECURITIES ACT OF 1933 [X] Pre-Effective [ ] Post-Effective Amendment No. 2 Amendment No. F/m Funds Trust (Exact Name of Registrant as Specified in Charter) (513) 587-3400 Area Code and Telephone Number 225 Pictoria Drive, Suite 450 Cincinnati, Ohio 45246 (Address of Principal Executive Offices: Number, Street, City, State, Zip Code) Linda J. Hoard, Esq. Ultimus Fund Solutions, LLC 225 Pictoria Drive, Suite 450 Cincinnati, Ohio 45246 (Name and Address of Agent for Service) Copies to: John L. Chilton, Esq. Sullivan & Worcester LLP 1666 K Street, N.W. Washington, D.C. 20006 Arie J. Heijkoop, Esq. Sullivan & Worcester LLP 1666 K Street, N.W. Washington, D.C. 20006 Approximate Date of Proposed Public Offering: As soon as practicable after this Registration Statement becomes effective under the Securities Act of 1933, as amended. Title of Securities Being Registered: Investor Class and Institutional Class shares of beneficial interest, no par value per share, of the Registrant’s F/m Investments Large Cap Focused Fund. No filing fee is due because Registrant is relying on Section 24(f) of the Investment Company Act of 1940, as amended. The Registrant hereby amends this Registration Statement on such date or dates as may be necessary to delay its effective date until the Registrant shall file a further amendment that specifically states that this Registration Statement shall thereafter become effective in accordance with Section 8(a) of the Securities Act of 1933 or until the Registration Statement shall become effective on such date as the Commission, acting pursuant to said Section 8(a), may determine. M3Sixty Funds Trust 4300 Shawnee Mission Parkway, Suite 100 Fairway, KS 66205 1-888-553-4233 On behalf of F/m Investments Large Cap Focused Fund September ___, 2021 Dear Valued Shareholder: A Special Meeting of Shareholders of the F/m Investments Large Cap Focused Fund series of M3Sixty Funds Trust (the “Acquired Fund”) has been scheduled for Monday, October 18, 2021 (the “Special Meeting”). The Acquired Fund proposes to reorganize into the F/m Investments Large Cap Focused Fund series of F/m Funds Trust (the “Acquiring Fund”). F/m Investments, LLC, the investment adviser to the Acquired Fund (“FMI”), will serve as investment adviser to the Acquiring Fund. The Acquired Fund and the Acquiring Fund have the same investment objectives, principal investment strategies, and fundamental limitations and substantially similar risks. Further, it is expected that the Acquiring Fund will be managed by Alexander Morris and Francisco Bido, the portfolio managers that currently manage the Acquired Fund. Proposed Reorganization Shareholders of the Acquired Fund are being asked to approve an Agreement and Plan of Reorganization (the “Reorganization Agreement”) under which the Acquired Fund will be reorganized into a corresponding newly created series (the “Acquiring Fund”) of F/m Funds Trust (“FMFT”). The Reorganization Agreement will provide for the transfer of all of the assets of the Acquired Fund to the Acquiring Fund in exchange for shares of the Acquiring Fund and the assumption of all of the liabilities of the Acquired Fund by the Acquiring Fund, and the distribution of the Acquiring Fund’s shares received by the Acquired Fund to its shareholders in complete liquidation of the Acquired Fund (the “Reorganization”). As described further below, in order to implement the Reorganization, FMFT will establish the Acquiring Fund as a newly organized fund that will commence operations upon the closing of the Reorganization. The Reorganization is not expected to result in the recognition of gain or loss by the Acquired Fund or its shareholders for federal income tax purposes. No sales charges or redemption fees will be imposed in connection with the Reorganization. The shares of the Acquiring Fund you receive will have the same aggregate net asset value as that of your shares of the Acquired Fund at the time of the Reorganization. Shares will be exchanged as follows: M3Sixty Funds Trust F/m Funds Trust F/m Investments Large Cap Focused Fund F/m Investments Large Cap Focused Fund Investor Class Shares Institutional Class Shares → → Investor Class Shares Institutional Class Shares The investment objective, strategies, and policies of the Acquiring Fund and the Acquired Fund are the same, as further described in the attached Proxy Statement/Prospectus. If the Reorganization is approved, FMI will serve as the investment adviser to the Acquiring Fund, responsible for the day-to-day management of the Acquiring Fund’s portfolio. The same portfolio managers for the Acquired Fund prior to the 1 Reorganization are expected to be responsible for the day-to-day management of the Acquiring Fund’s portfolio after the Reorganization. As a result, the day-to-day management of the Acquiring Fund following the Reorganization will not change the way your investment assets are managed. If the Reorganization is not approved by the Acquired Fund shareholders, then the Reorganization will not be implemented. In such case, the Board of Trustees of M3Sixty Funds Trust (the “Board”) will consider what further actions to take with respect to the Acquired Fund, including potentially liquidating the Acquired Fund. The attached Proxy Statement/Prospectus is designed to give you more information about the proposal. If you have any questions regarding the proposal to be voted on, please do not hesitate to call 1-888-553-4233. If you were a shareholder of record of the Acquired Fund as of the close of business on August 17, 2021, the record date for the Special Meeting, you are entitled to vote on the proposal at the Special Meeting and at any adjournment thereof. While you are, of course, welcome to join us at the Special Meeting, we expect that most shareholders will cast their votes by filling out, signing, and returning the enclosed proxy card. Whether or not you are planning to attend the Special Meeting, we need your vote. Please submit your vote via one of the options listed on your proxy card. You can mark, sign and date the enclosed proxy card and promptly return it in the enclosed, postage-paid envelope so that the maximum number of shares may be voted. You should follow the enclosed instructions on your proxy card as to how to vote, which includes calling the toll-free number on your proxy card to vote by telephone or voting through the Internet. You may revoke your proxy before it is exercised at the Special Meeting, either by writing to the Secretary of the Trust at the address noted in the Proxy Statement/Prospectus or in person at the time of the Special Meeting. A prior proxy vote can also be revoked by voting the proxy later through the toll-free number or the Internet address listed in the enclosed voting instructions. We are concerned about your health and safety during the current coronavirus (COVID-19) pandemic and we intend to monitor the recommendations of public health officials and governmental restrictions as the situation continues to evolve. If we decide to hold the Special Meeting at a different time or in a different location, we will make an announcement in the manner discussed in these materials. Thank you for taking the time to consider this important proposal and for your continuing investment in the F/m Investments Large Cap Focused Fund. Sincerely, /s/ Randall K. Linscott Randall K. Linscott President 2 M3Sixty Funds Trust F/m Investments Large Cap Focused Fund 4300 Shawnee Mission Parkway, Suite 100 Fairway, KS 66205 1-888-553-4233 NOTICE OF SPECIAL MEETING OF SHAREHOLDERS TO BE HELD October 18, 2021 M3Sixty Funds Trust, a Delaware statutory trust (the “Trust”), will hold a Special Meeting of Shareholders (the “Special Meeting”) of the F/m Investments Large Cap Focused Fund, a series of the Trust, on October 18, 2021, at the offices of Ultimus Fund Solutions, LLC, 225 Pictoria Drive, Cincinnati, Ohio 45246 at 10:00 a.m. Eastern time. As we are concerned about your health and safety during the current coronavirus (COVID-19) pandemic, we intend to monitor the recommendations of public health officials and governmental restrictions as the situation continues to evolve. If we decide to hold the Special Meeting at a different time or in a different location, we plan to announce any such updates on our proxy website vote.proxyonline.com/m3sixty/docs, and we encourage you to check this website prior to the Special Meeting if you plan to attend. Accordingly, we encourage you to consider your other voting options, if in-person attendance at the Special Meeting is either prohibited under a federal, state, or local order or contrary to the advice of public health care officials. At the Special Meeting, you and the other shareholders of the Acquired Fund will be asked to consider and vote upon the proposals below. 1. Approval of an Agreement and Plan of Reorganization providing for (i) the transfer of all of the assets of the F/m Investments Large Cap Focused Fund (the “Acquired Fund”) to the F/m Investments Large Cap Focused Fund (the “Acquiring Fund”), a newly created series of F/m Funds Trust (“FMFT”), in exchange for (a) shares of the Acquiring Fund with an aggregate net asset value (“NAV”) per class equal to the aggregate NAV of the corresponding class of shares of the Acquired Fund, and (b) the Acquiring Fund’s assumption of all of the liabilities of the Acquired Fund, followed by (ii) the liquidating distribution by the Acquired Fund to its shareholders of the shares of the Acquiring Fund received in the exchange in proportion, on a class-by-class basis, to the shareholder’s holdings of shares of the Acquired Fund; 2. The transaction of such other business as may properly come before the Special Meeting or any continuations after an adjournment thereof. Only shareholders of record of the Acquired Fund at the close of business on August 17, 2021, the record date for this Special Meeting, will be entitled to notice of, and to vote at, the Special Meeting or any postponements or continuations after an adjournment thereof. As a shareholder, you are asked to attend the Special Meeting either in person or by proxy. If you are unable to attend the Special Meeting in person, we urge you to authorize proxies to cast your votes, commonly referred to as “proxy voting.” Whether or not you expect to attend the Special Meeting, please submit your vote via one of the options listed on your proxy card. You may vote by completing, dating, and signing your proxy card and mailing it in the enclosed postage prepaid envelope, by calling the toll-free number on your proxy card to vote by telephone or, by voting through the internet. Your prompt voting by proxy will help assure a quorum at the Special Meeting. Voting by proxy will not prevent you from voting your shares in person at the Special Meeting. You may revoke your proxy before it is exercised at the Special Meeting, either by writing to the Secretary of the Trust at the address noted in the Proxy Statement/Prospectus or in person at the time of the Special Meeting. A prior proxy can also be revoked by voting your proxy at a later 1 date through the toll-free number or the Internet website address listed in the enclosed voting instructions or submitting a later dated proxy card. By Order of the Board of Trustees of M3Sixty Funds Trust /s/ Randall K. Linscott Randall K. Linscott President 2 M3Sixty Funds Trust F/m Investments Large Cap Focused Fund 4300 Shawnee Mission Parkway, Suite 100 Fairway, KS 66205 1-888-553-4233 QUESTIONS AND ANSWERS YOUR VOTE IS VERY IMPORTANT! Question : What is this document and why did you send it to me? Answer : The attached document is a proxy statement to solicit votes from shareholders of the F/m Investments Large Cap Focused Fund (the “Acquired Fund”), a series of M3Sixty Funds Trust (the “Trust”) at the special meeting of the Acquired Fund’s shareholders (“Special Meeting”), and a registration statement for the F/m Investments Large Cap Focused Fund (the “Acquiring Fund”), a new series of F/m Funds Trust (“FMFT”). This combined proxy statement/prospectus is referred to below as the “Proxy Statement.” The Proxy Statement is being provided to you by the Trust in connection with the solicitation of proxies to vote to approve an Agreement and Plan of Reorganization with respect to the Acquired Fund (the “Reorganization Agreement”) between the Trust and FMFT (the form of which is attached as Appendix A ) that provides for the transfer of all of the assets of the Acquired Fund to the Acquiring Fund and the assumption by the Acquiring Fund of all of the liabilities of the Acquired Fund, and the subsequent distribution of those Acquiring Fund shares by the Acquired Fund in liquidation of the Acquired Fund (the “Reorganization”) (Proposal 1). The Board of Trustees of the Trust (the “Board”) is recommending that shareholders of the Acquired Fund approve the Reorganization Agreement. Approval by the shareholders of the Acquired Fund is needed to proceed with the Reorganization. This document includes a Notice of Special Meeting of Shareholders, the Proxy Statement, and a proxy card. Question : Why is the Acquired Fund reorganizing into the Acquiring Fund? Answer: F/m Investments, LLC (“FMI”) serves as the sub-adviser to three series of FMFT and Alexander Morris, one of the portfolio managers to the Acquired Fund, serves as an interested trustee on the FMFT Board of Trustees. FMI believes that by consolidating all its funds into a single, dedicated trust, FMI will be better positioned to grow fund assets, have more flexibility to acquire or launch new products, and the Acquired Fund and its shareholders will benefit from reorganizing into FMFT by p

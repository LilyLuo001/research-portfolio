      497 1 d729114d497.htm BLACKROCK DYNAMIC FUNDS BlackRock Dynamic Funds Table of Contents BLACKROCK FUNDS III BlackRock LifePath ® Dynamic 2020 Fund 400 Howard Street San Francisco, California 94105 (800) 441-7762 August 21, 2019 Dear Shareholder: I am writing to inform you about a reorganization that will affect your investment in BlackRock LifePath ® Dynamic 2020 Fund (the “Target Fund”), a series of BlackRock Funds III (the “Trust”), a Delaware statutory trust. As provided in an Agreement and Plan of Reorganization (the “Reorganization Agreement”), the Target Fund will be reorganized into BlackRock LifePath ® Dynamic Retirement Fund (the “Acquiring Fund”), a series of the Trust (the “Reorganization”). The Target Fund is a “feeder” fund that invests all of its assets in LifePath ® Dynamic 2020 Master Portfolio (the “Target Master Portfolio”), a series of Master Investment Portfolio (“MIP”), a Delaware statutory trust, which has an investment objective, strategies and policies substantially identical to those of the Target Fund. The Acquiring Fund is also a “feeder” fund and invests all of its assets in LifePath ® Dynamic Retirement Master Portfolio (the “Acquiring Master Portfolio” and together with the Target Master Portfolio, the “Master Portfolios” and each, a “Master Portfolio”), a series of MIP, which has an investment objective, strategies and policies substantially identical to those of the Acquiring Fund. The Acquiring Master Portfolio is advised by BlackRock Fund Advisors (“BFA”), the same investment adviser to the Target Master Portfolio. Following the completion of the Reorganization, the Acquiring Fund and the Acquiring Master Portfolio may be referred to as the “Combined Fund” and the “Combined Master Portfolio,” respectively. The Target Fund and the Acquiring Fund are each referred to as a “Fund” and collectively referred to as the “Funds.” Since each Fund is a feeder fund that invests all of its assets in a corresponding Master Portfolio, there are other aspects of the Reorganization that are not covered in the enclosed Combined Prospectus/Information Statement because they do not relate to the Target Fund or the Acquiring Fund directly. The Board of Trustees of MIP has approved an Agreement and Plan of Reorganization between MIP, on behalf of the Target Master Portfolio, and MIP, on behalf of the Acquiring Master Portfolio (the “Master Reorganization Agreement”), pursuant to which the Target Master Portfolio and the Acquiring Master Portfolio will be combined (the “Master Reorganization”) prior to the Reorganization of the Target Fund into the Acquiring Fund. The Master Reorganization is not governed by the enclosed Combined Prospectus/Information Statement. The Board of Trustees of the Trust (the “Board”) has determined that the Reorganization is in the best interests of each Fund, and that the interests of each Fund’s shareholders will not be diluted as a result of the Reorganization. The enclosed Combined Prospectus/Information Statement contains information about the Reorganization. As a result of the Reorganization, you will receive shares (including fractional shares, if any) of the class of shares in the Acquiring Fund set out in the table below with the same aggregate net asset value as the shares of the Target Fund you own immediately prior to the Reorganization: If you own the following Target Fund Shares: You will receive the following Acquiring Fund Shares: Investor A Investor A Investor C Investor C Institutional Institutional Class R Class R Class K Class K The Funds are part of the LifePath Dynamic investment program pursuant to which the Target Fund will have a substantially similar investment objective and identical investment policies, strategies, restrictions and risks as Table of Contents the Acquiring Fund as the target date of the Target Fund approaches in 2020. It is expected that the Reorganization will enable the Combined Fund to operate more efficiently in the future. BFA will continue as the investment adviser of the Combined Fund after the Reorganization and no change in portfolio managers will result from the Reorganization. In addition, no increase in advisory, administration or other fee rates will result from the Reorganization. The Target Fund and the Acquiring Fund have the same expense structure, the same types of fees and the same fee rates. Assuming the Reorganization had occurred on December 31, 2018, the Combined Fund would have (A) total annual fund operating expenses for each of its share classes to be issued in the Reorganization that are estimated to be the same as those of each of the corresponding share classes of the Target Fund prior to the Reorganization and (B) net annual fund operating expenses for each of its share classes to be issued in the Reorganization that are estimated to be the same as those of each of the corresponding share classes of the Target Fund prior to the Reorganization, after giving effect to all applicable contractual fee and expense waivers and/or reimbursements that BFA and BlackRock Advisors, LLC have agreed to continue through April 30, 2021 and April 30, 2030, in each case as of December 31, 2018. NO SHAREHOLDER ACTION IS REQUIRED AS A RESULT OF THE REORGANIZATION. In accordance with the Target Fund’s and the Acquiring Fund’s operative documents, and applicable Delaware state and U.S. federal law (including Rule 17a-8 under the Investment Company Act of 1940, as amended), the Reorganization may be effected without the approval of shareholders of any Fund. I encourage you to carefully review the enclosed materials, which explain the Reorganization in more detail. If you have any questions or need additional information, please contact BlackRock Investor Services at (800) 441-7762. Sincerely, JOHN M. PERLOWSKI President and Chief Executive Officer BlackRock LifePath ® Dynamic 2020 Fund B LACK R OCK F UNDS III 400 Howard Street San Francisco, California 94105 (800) 441-7762 Table of Contents QUESTIONS & ANSWERS We recommend that you read the complete Combined Prospectus/Information Statement. For your convenience, we have provided a brief overview of the Reorganization (as defined below). Q: Why is the Reorganization taking place? A: BlackRock LifePath ® Dynamic 2020 Fund (the “Target Fund”), a series of BlackRock Funds III (the “Trust”), and BlackRock LifePath ® Dynamic Retirement Fund (the “Acquiring Fund”), a series of the Trust, are part of the LifePath Dynamic investment program pursuant to which the Target Fund will have a substantially similar investment objective and identical investment policies, strategies, restrictions and risks as the Acquiring Fund as the target date of the Target Fund approaches in 2020. It is expected that the Reorganization will enable the Combined Fund (as defined below) to operate more efficiently in the future. The Board of Trustees of the Trust has determined that the Reorganization is in the best interests of each Fund (as defined below), and that the interests of each Fund’s shareholders will not be diluted as a result of the Reorganization. Q: What does the Reorganization provide for? A: Pursuant to an Agreement and Plan of Reorganization (the “Reorganization Agreement”) between the Trust, on behalf of the Target Fund, and the Trust, on behalf of the Acquiring Fund, the Target Fund will be reorganized into the Acquiring Fund (the “Reorganization”). Following the completion of the Reorganization, the Acquiring Fund and the Acquiring Master Portfolio (as defined below) may be referred to as the “Combined Fund” and the “Combined Master Portfolio,” respectively. The Target Fund and the Acquiring Fund are each referred to as a “Fund” and collectively referred to as the “Funds.” The Reorganization will result in each shareholder of the Target Fund becoming a shareholder of the Acquiring Fund, another mutual fund. The Target Fund is a “feeder” fund that invests all of its assets in LifePath ® Dynamic 2020 Master Portfolio (the “Target Master Portfolio”), a series of Master Investment Portfolio (“MIP”), a Delaware statutory trust, which has an investment objective, strategies and policies substantially identical to those of the Target Fund. The Acquiring Fund is also a “feeder” fund and invests all of its assets in LifePath ® Dynamic Retirement Master Portfolio (the “Acquiring Master Portfolio” and together with the Target Master Portfolio, the “Master Portfolios” and each, a “Master Portfolio”), a series of MIP, which has an investment objective, strategies and policies substantially identical to those of the Acquiring Fund. The Acquiring Master Portfolio is advised by BlackRock Fund Advisors (“BFA”), the same investment adviser to the Target Master Portfolio. The Target Fund and the Acquiring Fund pursue a substantially similar investment objective and employ substantially the same investment strategies to achieve their respective investment objectives. The Reorganization Agreement provides for: Step 1: The transfer and delivery of substantially all of the assets of the Target Fund to the Acquiring Fund in exchange for the assumption by the Acquiring Fund of certain stated liabilities of the Target Fund and newly-issued shares of the Acquiring Fund, including fractional shares, if any (the “Acquiring Fund Shares”). Step 2: The distribution of the Acquiring Fund Shares pro rata by the Target Fund to its shareholders. Step 3: The termination, dissolution and liquidation of the Target Fund as a series of the Trust. Since each Fund is a feeder fund that invests all of its assets in a corresponding Master Portfolio, there are other aspects of the Reorganization that are not covered in the enclosed Combined Prospectus/Information Statement because they do not relate to the Target Fund or the Acquiring Fund directly. The Board of Trustees of MIP has approved an Agreement and Plan of Reorganization between MIP, on behalf of the Target Master Portfolio, and MIP, on behalf of the Acquiring Master Portfolio (the “Master Reorganization Table of Contents Agreement”), pursuant to which the Target Master Portfolio and the Acquiring Master Portfolio will be combined (the “Master Reorganization”) prior to the Reorganization of the Target Fund into the Acquiring Fund. The Master Reorganization Agreement provides for: Step 1: The transfer of substantially all of the assets and liabilities of the Target Master Portfolio to the Acquiring Master Portfolio in exchange for interests of the Acquiring Master Portfolio having equal value to the net assets transferred (the “Acquiring Master Portfolio Interests”). Step 2: The exchange of the Acquiring Master Portfolio Interests held by the Target Master Portfolio for the interests of the Target Master Portfolio held by the Target Fund. Step 3: The termination, dissolution and liquidation of the Target Master Portfolio as a series of MIP. The Master Reorganization is not governed by the enclosed Combined Prospectus/Information Statement. Q: Do I need to vote for the Reorganization? A: No. No vote of shareholders will be taken with respect to the Reorganization. THE FUNDS ARE NOT ASKING FOR A PROXY AND YOU ARE NOT REQUESTED TO SEND A PROXY TO THE FUNDS WITH RESPECT TO THE REORGANIZATION. Q: In the Reorganization, what class of shares of the Acquiring Fund will I receive? A: You will receive Acquiring Fund Shares as follows: If you own the following Target Fund Shares: You will receive the following Acquiring Fund Shares: Investor A Investor A Investor C Investor C Institutional Institutional Class R Class R Class K Class K Q: Will I own the same number of shares of the Combined Fund as I currently own of the Target Fund? A: No. You will receive shares, including fractional shares, if any, of the Acquiring Fund with the same aggregate net asset value (“NAV”) as the shares of the Target Fund you own immediately prior to the Reorganization. However, the number of Acquiring Fund Shares you receive will depend on the relative NAV per share for the applicable class of the Target Fund and the Acquiring Fund computed as of the close of trading on the New York Stock Exchange on the business day immediately prior to the closing of the Reorganization (“Valuation Time”), after the declaration of payment of applicable dividends and/or other distributions. Thus, if as of the Valuation Time the NAV of a share of the Acquiring Fund is lower than the NAV of the corresponding share class of the Target Fund, you will receive a greater number of Acquiring Fund Shares in the Reorganization than you held in the Target Fund immediately prior to the Reorganization. On the other hand, if the NAV of a share of the Acquiring Fund is higher than the NAV of the corresponding share class of the Target Fund, you will receive fewer Acquiring Fund Shares in the Reorganization than you held in the Target Fund immediately prior to the Reorganization. The aggregate NAV of your Combined Fund shares immediately after the Reorganization will be the same as the aggregate NAV of your Target Fund shares immediately prior to the Reorganization. Q: Who will advise the Combined Fund once the Reorganization is completed? A: As with the Target Fund, the Acquiring Fund does not, and the Combined Fund will not, have its own investment adviser. Rather, the Acquiring Fund is, and the Combined Fund will be, a “feeder” fund that invests all of its assets in the Acquiring Master Portfolio. The Acquiring Master Portfolio and the Target Master Portfolio are advised by BFA, and BFA will continue to advise the Combined Master Portfolio once the Reorganization is completed. The Acquiring Master Portfolio is sub-advised by BlackRock International ii Table of Contents Limited (“BIL”) and BlackRock (Singapore) Limited (“BRS”). BIL and BRS will continue to sub-advise the Combined Master Portfolio once the Reorganization is completed. Each of BFA, BIL and BRS is an indirect wholly-owned subsidiary of BlackRock, Inc. Q: How will the Reorganization affect

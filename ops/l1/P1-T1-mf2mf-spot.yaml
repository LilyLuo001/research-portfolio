      N-14 1 tm2127787d1_n14.htm VIRTUS OPPORTUNITIES TRUST As filed with the Securities and Exchange Commission on September 17, 2021 1933 Act Registration No. 333-________ UNITED STATES SECURITIES AND EXCHANGE COMMISSION Washington, D.C. 20549 Form N-14 REGISTRATION STATEMENT UNDER THE SECURITIES ACT OF 1933 ¨ Pre-Effective ¨ Post-Effective Amendment No. Amendment No. VIRTUS OPPORTUNITIES TRUST [Exact Name of Registrant as Specified in Charter] Area Code and Telephone Number: (800) 243-1574 101 Munson Street Greenfield, Massachusetts 01301 (Address of Principal Executive Offices) Jennifer S. Fromm, Esq. Vice President and Senior Counsel Virtus Investment Partners, Inc. One Financial Plaza Hartford, Connecticut 06103 (Name and Address of Agent for Service) Copies of All Correspondence to: David C. Mahaffey, Esq. Sullivan & Worcester LLP 1666 K Street, N.W. Washington, D.C. 20006 Approximate Date of Proposed Public Offering: As soon as practicable after this Registration Statement becomes effective. Title of Securities Being Registered: Shares of beneficial interest, no par value per share. No filing fee is due because the Registrant is relying on Section 24(f) of the Investment Company Act of 1940, as amended. It is proposed that this filing will become effective on October 18, 2021, pursuant to Rule 488 of the Securities Act of 1933. October 18, 2021 Dear Shareholder: The Board of Trustees of Virtus Opportunities Trust (the “Trust”) has approved the reorganization of Virtus KAR International Small-Mid Cap Fund II (formerly, Virtus KAR International Small-Mid Cap Fund) (“Target Fund”), a series of the Trust, into Virtus KAR International Small-Mid Cap Fund (formerly, Virtus KAR International Small Cap Fund) (“Acquiring Fund”), a separate series of the Trust. [Note to SEC: Name changes to take place on September 24, 2021, after which names will be updated in EDGAR.] The reorganization is expected to be completed on or about October 22, 2021. Once the reorganization is completed, you will become a shareholder of the Acquiring Fund and will receive shares of the corresponding class of the Acquiring Fund with an aggregate net asset value equal to the aggregate net asset value of your investment in the Target Fund. You will not incur any sales charges in connection with the reorganization. The Board of Trustees of the Trust has carefully considered and unanimously approved the reorganization, as set forth in the Plan and described in the accompanying materials, and believes that the reorganization is in the best interests of the Target Fund and its shareholders. The Board of Trustees believes that the reorganization offers you the opportunity to pursue your investment goals in a fund with increased scale and expanded investment opportunities. The Acquiring Fund’s investment objective and its investment strategies are identical to those of the Target Fund. The expenses associated with the reorganization will be paid by the Target Fund and the Acquiring Fund, and will be allocated pro rata based on their assets under management. You are not being asked to vote on, or take any other action in connection with, the reorganization. If you have any questions, please call (800) 243-1574 between 8:30 a.m. and 6:00 p.m. Eastern time, Monday through Thursday, Friday until 5:00 p.m. We are committed to serving you and appreciate your continued investment in Virtus Mutual Funds. Sincerely, George R. Aylward President, Virtus Mutual Funds Mutual Funds distributed by VP Distributors, LLC ACQUISITION OF ASSETS OF VIRTUS KAR INTERNATIONAL SMALL-MID CAP FUND II (FORMERLY, VIRTUS KAR INTERNATIONAL SMALL-MID CAP FUND) a series of Virtus Opportunities Trust c/o VP Distributors, LLC 101 Munson Street Greenfield, Massachusetts 01301 (800) 243-1574 BY AND IN EXCHANGE FOR SHARES OF VIRTUS KAR INTERNATIONAL SMALL-MID CAP FUND (FORMERLY, VIRTUS KAR INTERNATIONAL SMALL CAP FUND) a series of Virtus Opportunities Trust c/o VP Distributors, LLC 101 Munson Street Greenfield, Massachusetts 01301 (800) 243-1574 PROSPECTUS/INFORMATION STATEMENT DATED OCTOBER 18, 2021 This Prospectus/Information Statement is being furnished in connection with the reorganization of Virtus KAR International Small-Mid Cap Fund II (formerly, Virtus KAR International Small-Mid Cap Fund) (“Target Fund”), a series of Virtus Opportunities Trust (the “Trust”), into the Virtus KAR International Small-Mid Cap Fund (formerly, Virtus KAR International Small Cap Fund) (“Acquiring Fund”), another series of the Trust. This Prospectus/Information Statement is being mailed on or about October 18, 2021. GENERAL The Board of Trustees of the Trust has approved the reorganization of the Target Fund into the Acquiring Fund. The Target Fund and Acquiring Fund are sometimes referred to in this Prospectus/Information Statement individually as a “Fund” and collectively as the “Funds.” In the reorganization, all of the assets of the Target Fund will be acquired by the Acquiring Fund in exchange for Class A, Class C, Class I and Class R6 shares of the Acquiring Fund and the assumption by the Acquiring Fund of the liabilities of the Target Fund (the “Reorganization”). Class A, Class C, Class I and Class R6 shares of the Acquiring Fund will be distributed to each shareholder in liquidation of the Target Fund, and the Target Fund will be terminated as a series of the Trust. You will then hold that number of full and fractional shares of the Acquiring Fund which have an aggregate net asset value equal to the aggregate net asset value of your shares of the Target Fund. 1 Each of the Target Fund and the Acquiring Fund is a separate diversified series of the Trust, a Delaware statutory trust, which is registered as an open-end management investment company under the Investment Company Act of 1940, as amended (the “1940 Act”). The investment objective of the Target Fund is identical to that of the Acquiring Fund, as follows: Fund Investment Objective Target Fund Capital appreciation. Acquiring Fund Capital appreciation. The investment strategies for the Target Fund and the Acquiring Fund are substantially identical. Under normal circumstances, each fund invests at least 80% of its assets in equity securities of non-U.S. small- and mid-capitalization companies. As of the date of this Prospectus/Information Statement, each fund’s subadviser considers small- and mid-capitalization companies to be those companies that, at the time of initial purchase, have market capitalizations generally within the range of companies included in the MSCI All Country World ex U.S. SMID Cap Index on a rolling three-year basis. As of June 30, 2021, the total market capitalization range of companies included in the MSCI All Country World ex U.S. SMID Cap Index over the past three years was $0 to $40.4 billion. Each fund intends to diversify its investments among countries and normally to have represented in the portfolio business activities of a number of different countries. In determining whether an issuer is economically tied to a non-U.S. country, the subadviser primarily considers: (i) whether at least 50% of the issuer’s revenues or profits are attributable to goods produced or sold, investments made, or services performed in, a non-U.S. country; (ii) whether the issuer has at least 50% of its assets in a non-U.S. country; and (iii) whether the principal exchange listing for the issuer’s securities or the issuer’s headquarters is in a non-U.S. country. Equity securities in which each fund invests include common stocks, preferred stocks and American Depositary Receipts (ADRs). Each fund may invest in emerging markets issuers. Each fund is non-diversified under federal securities laws. Virtus Investment Advisers, Inc. (“VIA”) serves as the investment adviser for both Funds and Kayne Anderson Rudnick Investment Management, LLC (“KAR”), an affiliate of VIA, serve as the investment subadviser for both Funds. This Prospectus/Information Statement explains concisely the information about the Acquiring Fund that you should know. Please read it carefully and keep it for future reference. Additional information concerning each Fund and the Reorganization is contained in the documents described below, all of which have been filed with the Securities and Exchange Commission (“SEC”): Information about the Target Fund: How to Obtain this Information: Prospectus of the Trust relating to the Target Fund, dated February 1, 2021, as supplemented Statement of Additional Information of the Trust relating to Target Fund, dated February 1, 2021, as supplemented Annual Report of the Trust relating to the Target Fund for the year ended September 30, 2020 Semi-Annual Report of the Trust relating to the Target Fund for the period ended March 31, 2021 Copies are available upon request and without charge if you: · Visit www.virtus.com on the Internet; · Write to VP Distributors, LLC One Financial Plaza Hartford, Connecticut 06103 · Call (800) 243-1574 toll-free. 2 Information about the Acquiring Fund: How to Obtain this Information: Prospectus of the Trust relating to the Acquiring Fund, dated February 1, 2021, as supplemented, which accompanies this Prospectus/Information Statement Statement of Additional Information of the Trust relating to the Acquiring Fund, dated February 1, 2021, as supplemented Annual Report of the Trust relating to the Acquiring Fund for the year ended September 30, 2020 Semi-Annual Report of the Trust relating to the Acquiring Fund for the period ended March 31, 2021 Copies are available upon request and without charge if you: · Visit www.virtus.com on the Internet; · Write to VP Distributors, LLC One Financial Plaza Hartford, Connecticut 06103; or · Call (800) 243-1574 toll-free. Information about the Reorganization: How to Obtain this Information: Statement of Additional Information dated October 18, 2021, which relates to this Prospectus/Information Statement and the Reorganization Copies are available upon request and without charge if you: · Write to VP Distributors, LLC One Financial Plaza Hartford, Connecticut 06103; or · Call (800) 243-1574 toll-free. You can also obtain copies of any of these documents without charge on the EDGAR database on the SEC’s Internet site at http://www.sec.gov. Copies are available for a fee by electronic request at the following e-mail address: publicinfo@sec.gov, or from the Public Reference Branch, Office of Consumer Affairs and Information Services, Securities and Exchange Commission, 100 F Street, N.E., Washington, D.C. 20549. Information relating to both the Target Fund and the Acquiring Fund is contained in the Prospectus of the Trust dated February 1, 2021, as supplemented (SEC File No. 811-07455; 033-65137) and is incorporated by reference in this document. (This means that such information is legally considered to be part of this Prospectus/Information Statement.) The Statement of Additional Information dated October 18, 2021 relating to this Prospectus/Information Statement and the Reorganization, which includes the financial statements of the Trust relating to the Target Fund and the Acquiring Fund for the year ended September 30, 2020 and the six-month period ended March 31, 2021, is incorporated by reference in its entirety in this document. The Securities and Exchange Commission has not determined that the information in this Prospectus/Information Statement is accurate or adequate, nor has it approved or disapproved these securities. Anyone who tells you otherwise is committing a criminal offense. An investment in the Acquiring Fund: · is not a deposit of, or guaranteed by, any bank · is not insured by the FDIC, the Federal Reserve Board or any other government agency · is not endorsed by any bank or government agency · involves investment risk, including possible loss of the purchase payment of your original investment 3 Table of Contents [to be updated by amendment] GENERAL 1 SUMMARY 5 Portfolio Turnover 11 RISKS 17 INFORMATION 
le below under the heading Registrants (each, a “Registrant” and collectively, the “Registrants”) has called a Joint Special Meeting of Shareholders (the “Special Meeting”) of its respective series listed in the table below under the heading Target Funds (each, a “Target Fund” and collectively, the “Target Funds”) to be held virtually on June 10, 2021 at 4:00 p.m., Eastern time. The purpose of the Special Meeting is to vote on important proposals that affect your investment in your Target Fund. Registrants Target Funds SunAmerica Series, Inc., a Maryland corporation AIG Active Allocation Fund SunAmerica Income Funds, a Massachusetts business trust AIG Flexible Credit Fund SunAmerica Specialty Series, a Delaware statutory trust AIG Focused Alpha Large-Cap Fund SunAmerica Equity Funds, a Massachusetts business trust AIG International Dividend Strategy Fund SunAmerica Series, Inc., a Maryland corporation AIG Multi-Asset Allocation Fund SunAmerica Income Funds, a Massachusetts business trust AIG Strategic Bond Fund SunAmerica Series, Inc., a Maryland corporation AIG Strategic Value Fund On December 23, 2020, SunAmerica Asset Management, LLC (“SunAmerica”), investment advisor to the Target Funds, entered into an agreement to sell certain assets relating to its retail mutual fund asset management business to Touchstone Advisors, Inc. (“Touchstone Advisors”), investment advisor to the Touchstone family of mutual funds and an indirect, wholly-owned subsidiary of Western & Southern Mutual Holding Company (the “Transaction”). Currently, Touchstone Advisors’ retail mutual fund platform includes 38 separate mutual funds that are managed by Touchstone Advisors and sub-advised by various institutional investment managers (the “Touchstone Funds”). In connection with SunAmerica’s decision to sell certain assets relating to its retail mutual fund asset management business, SunAmerica recommended and the Board of each Registrant approved an Agreement and Plan of Reorganization with respect to each Target Fund pursuant to which the Target Fund would be reorganized into a corresponding Touchstone Fund (each, a “Reorganization” and collectively, the “Reorganizations”) as set forth in the table below under the heading Acquiring Funds (each, an “Acquiring Fund” and collectively, the “Acquiring Funds”). i Target Funds Acquiring Funds AIG Active Allocation Fund Touchstone Balanced Fund, a series of Touchstone Strategic Trust AIG Flexible Credit Fund Touchstone Strategic Income Opportunities Fund, a newly created series of Touchstone Strategic Trust AIG Focused Alpha Large-Cap Fund Touchstone Large Cap Focused Fund, a series of Touchstone Strategic Trust AIG International Dividend Strategy Fund Touchstone International Equity Fund, a series of Touchstone Strategic Trust AIG Multi-Asset Allocation Fund Touchstone Balanced Fund, a series of Touchstone Strategic Trust AIG Strategic Bond Fund Touchstone Strategic Income Opportunities Fund, a newly created series of Touchstone Strategic Trust AIG Strategic Value Fund Touchstone Value Fund, a series of Touchstone Strategic Trust The Board of each Registrant believes that the proposed respective Reorganization is in the best interests of the Target Fund and recommends that you vote FOR the proposed Reorganization of your Target Fund. We have enclosed a Joint Proxy Statement/Prospectus that describes each Reorganization proposal in greater detail, as well as important information about the Acquiring Funds. Your vote is extremely important, so please read the entire Joint Proxy Statement/Prospectus. Please contact our proxy solicitor, AST Fund Solutions, LLC, at 866-340-7108 with any questions. Thank you for your consideration of these important proposals. Sincerely, /s/ John T. Genoy President ii SUNAMERICA EQUITY FUNDS SunAmerica Income Funds SunAmerica Series, Inc. SunAmerica Specialty Series Harborside 5, 185 Hudson St., Suite 3300 Jersey City, NJ 07311-4992 800-858-8850 NOTICE OF JOINT SPECIAL MEETING OF SHAREHOLDERS TO BE HELD ON JUNE 10, 2021 To the Shareholders: Notice is hereby given that a Joint Special Meeting of Shareholders (the “Special Meeting”) of each registered investment company listed in the table below under the heading Registrants (each, a “Registrant” and collectively, the “Registrants”), on behalf of its respective series listed in the table below under the heading Target Funds (each, a “Target Fund” and collectively, the “Target Funds”), will be held virtually on June 10, 2021 at 4:00 p.m., Eastern time, and any adjournment or postponement thereof. Registrants Target Funds SunAmerica Series, Inc., a Maryland corporation AIG Active Allocation Fund SunAmerica Income Funds, a Massachusetts business trust AIG Flexible Credit Fund SunAmerica Specialty Series, a Delaware statutory trust AIG Focused Alpha Large-Cap Fund SunAmerica Equity Funds, a Massachusetts business trust AIG International Dividend Strategy Fund SunAmerica Series, Inc., a Maryland corporation AIG Multi-Asset Allocation Fund SunAmerica Income Funds, a Massachusetts business trust AIG Strategic Bond Fund SunAmerica Series, Inc., a Maryland corporation AIG Strategic Value Fund At the Special Meeting, shareholders of each Target Fund will be asked to consider a proposal to approve an Agreement and Plan of Reorganization (the “Plan”) between Touchstone Strategic Trust, on behalf of the respective series thereof identified in the table below (each, an “Acquiring Fund” and collectively, the “Acquiring Funds”) and each Registrant, on behalf of the applicable Target Fund, providing for (i) the transfer of all the assets of the Target Fund to the Acquiring Fund in exchange solely for shares of the Acquiring Fund as set forth in the table below and the assumption by the Acquiring Fund of the liabilities (other than certain excluded liabilities) of the Target Fund, as described in the respective Plan; (ii) the pro rata distribution, by class, to the Target Fund’s shareholders of the shares of the Acquiring Fund as set forth in the table below; and (iii) the termination of the Target Fund (each, a “Reorganization” and collectively, the “Reorganizations”). i Target Funds and Share Classes Acquiring Funds and Corresponding Share Classes AIG Active Allocation Fund Touchstone Balanced Fund Class A Class A Class B Class A Class C Class C AIG Flexible Credit Fund Touchstone Strategic Income Opportunities Fund Class A Class A Class C Class C Class W Class Y AIG Focused Alpha Large-Cap Fund Touchstone Large Cap Focused Fund Class A Class A Class C Class C Class W Class Y AIG International Dividend Strategy Fund Touchstone International Equity Fund Class A Class A Class C Class C Class W Class Y AIG Multi-Asset Allocation Fund Touchstone Balanced Fund Class A Class A Class B Class A Class C Class C AIG Strategic Bond Fund Touchstone Strategic Income Opportunities Fund Class A Class A Class B Class A Class C Class C Class W Class Y AIG Strategic Value Fund Touchstone Value Fund Class A Class A Class C Class C Class W Class Y The Board of Directors or Trustees, as applicable, of each Registrant has fixed the close of business on March 31, 2021 as the record date (the “Record Date”) for the determination of shareholders entitled to notice of and eligible to vote at the Special Meeting. In light of public health concerns regarding the COVID-19 pandemic, the Special Meeting will be held in a virtual meeting format only. Shareholders will not be able to attend the meeting in person. If your shares in your Target Fund(s) are held by a financial intermediary (such as a broker-dealer or a bank), and you wish to attend and vote at the Special Meeting, you must first obtain a legal proxy from your financial intermediary reflecting your Target Fund’s name, the number of shares you held as of the Record Date, as well as your name and address. Please email your legal proxy to AST Fund Solutions, LLC (“AST”) at attendameeting@astfinancial.com with “Legal Proxy” in the subject line.
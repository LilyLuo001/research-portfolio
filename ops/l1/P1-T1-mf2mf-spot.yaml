      497 1 d60400d497.htm JOHN HANCOCK INVESTMENT TRUST JOHN HANCOCK INVESTMENT TRUST Table of Contents Please vote today We need your input on an important proposal that affects your investment Online www.proxyvotenow.com/jhesglcc Phone 855-457-4813 Mail Sign and return the enclosed voting card Table of Contents September 18, 2025 Your action is required. Please vote today. Dear John Hancock ESG Large Cap Core Fund shareholder: At Manulife John Hancock Investments, we continually review our lineup of mutual funds to ensure that each fund continues to serve the best interests of shareholders. Included in that assessment is a review of account fees and long-term prospects for growth, and whether the combination of similar funds might promote beneficial economies of scale. On occasions where we believe a fund may benefit from its combination with another similar fund, we have taken action, and we believe your fund would benefit from such action at this time. After careful consideration, we proposed, and your fund’s Trustees agreed, that shareholders would benefit from a merger of John Hancock ESG Large Cap Core Fund (the “Fund” or “Target Fund”) with and into John Hancock Fundamental Large Cap Core Fund (the “Acquiring Fund”) (the “Reorganization”). Advantages of the proposed merger: ● Expected economies of scale and potentially lower expenses in the future. Following the Reorganization, on a pro forma basis, the operating expense ratios of Class A, Class C, Class I, and Class R6 shares of the Acquiring Fund to be received in the Reorganization are expected to be lower than the respective operating expense ratios for the corresponding share class of the Target Fund, both before and after expense waivers. Moreover, as fixed costs are spread across the larger asset base of a combined fund with greater potential for asset growth, overall gross shareholder expenses may be reduced in the future. ● Same investment objective . The proposed merger is expected to allow shareholders of the Target Fund to pursue the same investment objective in a larger combined fund. The investment objective for both the Target Fund and the Acquiring Fund is to seek long-term capital appreciation. The Target Fund invests primarily in equity securities of large-capitalization companies or sectors that meet the manager’s sustainability criteria. The Acquiring Fund invests primarily in equity securities of large-capitalization companies. The combined fund’s portfolio will be substantially similar to the Acquiring Fund’s current portfolio. ● Continuity of management . John Hancock Investment Management LLC serves as investment advisor to your Fund and the Acquiring Fund and will continue to serve as the investment advisor to the combined fund. Trillium Asset Management, LLC currently serves as the investment subadvisor of the Target Fund, and Manulife Investment Management (US) LLC serves as the investment subadvisor of the Acquiring Fund and will continue to serve as the investment subadvisor to the combined fund. How to vote Note that this Reorganization cannot proceed without the approval of shareholders, so a special shareholder meeting will be held at 200 Berkeley Street, Boston, Massachusetts 02116 on December 10, 2025, at 2:00 P.M., Eastern time. Please read the enclosed proxy statement, and vote your shares as described below. While you may attend the meeting, voting today will save on the potential cost of future mailings required to obtain shareholder votes . You may vote your shares by proxy in one of three ways: Online: www.proxyvotenow.com/jhesglcc Phone: 855-457-4813 Mail: by returning the enclosed proxy card(s) I encourage you to read the enclosed proxy statement and prospectus for more information, and I thank you for acting on this matter today. Sincerely, Kristie M. Feinberg President and CEO Manulife John Hancock Investments Head of Retail Manulife Wealth & Asset Management Table of Contents Please vote today We need your input on an important proposal that affects your investment Online Phone Mail Table of Contents September 18, 2025 Your action is required. Please vote today. Dear John Hancock ESG Large Cap Core Fund shareholder: At Manulife John Hancock Investments, we continually review our lineup of mutual funds to ensure that each fund continues to serve the best interests of shareholders. Included in that assessment is a review of account fees and long-term prospects for growth, and whether the combination of similar funds might promote beneficial economies of scale. On occasions where we believe a fund may benefit from its combination with another similar fund, we have taken action, and we believe your fund would benefit from such action at this time. After careful consideration, we proposed, and your fund’s Trustees agreed, that shareholders would benefit from a merger of John Hancock ESG Large Cap Core Fund (the “Fund” or “Target Fund”) with and into John Hancock Fundamental Large Cap Core Fund (the “Acquiring Fund”) (the “Reorganization”). Advantages of the proposed merger: ● Expected economies of scale and potentially lower expenses in the future. Following the Reorganization, on a pro forma basis, the operating expense ratios of Class A, Class C, Class I, and Class R6 shares of the Acquiring Fund to be received in the Reorganization are expected to be lower than the respective operating expense ratios for the corresponding share class of the Target Fund, both before and after expense waivers. Moreover, as fixed costs are spread across the larger asset base of a combined fund with greater potential for asset growth, overall gross shareholder expenses may be reduced in the future. ● Same investment objective . The proposed merger is expected to allow shareholders of the Target Fund to pursue the same investment objective in a larger combined fund. The investment objective for both the Target Fund and the Acquiring Fund is to seek long-term capital appreciation. The Target Fund invests primarily in equity securities of large-capitalization companies or sectors that meet the manager’s sustainability criteria. The Acquiring Fund invests primarily in equity securities of large-capitalization companies. The combined fund’s portfolio will be substantially similar to the Acquiring Fund’s current portfolio. ● Continuity of management . John Hancock Investment Management LLC serves as investment advisor to your Fund and the Acquiring Fund and will continue to serve as the investment advisor to the combined fund. Trillium Asset Management, LLC currently serves as the investment subadvisor of the Target Fund, and Manulife Investment Management (US) LLC serves as the investment subadvisor of the Acquiring Fund and will continue to serve as the investment subadvisor to the combined fund. How to vote Note that this Reorganization cannot proceed without the approval of shareholders, so a special shareholder meeting will be held at 200 Berkeley Street, Boston, Massachusetts 02116 on December 10, 2025, at 2:00 P.M., Eastern time. Please read the enclosed proxy statement, and vote your shares as described below. While you may attend the meeting, voting today will save on the potential cost of future mailings required to obtain shareholder votes . You may vote your shares by proxy in one of three ways: Online: by visiting the website on your proxy card(s) and entering your control number Phone: by calling the number listed on your proxy card(s) Mail: by returning the enclosed proxy card(s) I encourage you to read the enclosed proxy statement and prospectus for more information, and I thank you for acting on this matter today. Sincerely, Kristie M. Feinberg President and CEO Manulife John Hancock Investments Head of Retail Manulife Wealth & Asset Management Table of Contents JOHN HANCOCK ESG LARGE CAP CORE FUND (a series of John Hancock Investment Trust) (the “ Fund ”) 200 Berkeley Street Boston, MA 02116 800-225-5291 Notice of Special Meeting of Shareholders Scheduled for December 10, 2025 This is the formal agenda for the Fund’s shareholder meeting. It tells you what matters will be voted on and the time of the meeting, in case you want to attend. To the shareholders of the Fund: A shareholder meeting of the Fund will be held at 200 Berkeley Street, Boston, Massachusetts 02116 on December 10, 2025, at 2:00 P.M., Eastern time (the “ Meeting ”) to consider the following: 1. A proposal to approve an Agreement and Plan of Reorganization between John Hancock ESG Large Cap Core Fund (the “ Target Fund ”) and John Hancock Fundamental Large Cap Core Fund (the “ Acquiring Fund ”), each a series of John Hancock Investment Trust. Under this agreement, the Target Fund would transfer all of its assets to the Acquiring Fund in exchange for shares of the Acquiring Fund. These shares would be distributed, as described in the accompanying combined proxy statement and prospectus, proportionately to you and the other shareholders of the Target Fund. The direct costs of the Reorganization will be borne by the Target Fund, however, since the Target Fund is currently subject to an expense reimbursement, the merger costs will, in effect, be borne by the Advisor. The Acquiring Fund would also assume all of the Target Fund’s liabilities. Your Fund ’ s Board of Trustees recommends that you vote FOR this proposal. John Hancock ESG Large Cap Core Fund (Target Fund) John Hancock Fundamental Large Cap Core Fund (Acquiring Fund) Class A Class A Class C Class C Class I Class I Class R6 Class R6 2. Any other business that may properly come before the meeting. Shareholders of record as of September 11, 2025, are entitled to vote at the meeting and any related follow-up meetings. Whether or not you expect to attend the Meeting, please complete and return the enclosed proxy card(s). If shareholders do not return their proxies in sufficient numbers, it may result in the need for additional shareholder solicitation efforts. By order of the Board of Trustees, Christopher Sechler Secretary, John Hancock Investment Trust Boston, Massachusetts, September 18, 2025 Table of Contents COMBINED PROXY STATEMENT AND PROSPECTUS PROXY STATEMENT for John Hancock ESG Large Cap Core Fund (the “ Target Fund ,” or “ your Fund ”), a series of John Hancock Investment Trust (the “ Trust ”) PROSPECTUS for John Hancock Fundamental Large Cap Core Fund (the “ Acquiring Fund ”) a series of the Trust, (together with the Target Fund, the “ Funds ,” and each a “ Fund ”) The address of each Fund is 200 Berkeley Street, Boston, Massachusetts 02116. The telephone number of each Fund is 800-225-5291. * * * * * * DATED September 18, 2025 This proxy statement and prospectus (the “ Proxy/Prospectus ”) contains the information shareholders should know before voting on the proposed reorganization of their Fund into the Acquiring Fund (the “ Reorganization ”). This Proxy/Prospectus is being mailed on or about September 26, 2025 to shareholders of the Target Fund as of September 11, 2025. Please read it carefully and retain it for future reference. How the Reorganization will Work ◾ Your Fund will transfer all of its assets to the Acquiring Fund. The Acquiring Fund will assume all of your Fund’s liabilities. ◾ The Acquiring Fund will issue shares to your Fund in an amount equal to the value of your Fund’s net assets attributable to corresponding shares as shown in the chart below. These shares will be distributed to your Fund’s applicable class of shareholders in proportion to their holdings on the Reorganization date. ◾ No sales charges will be imposed on shares of the Acquiring Fund received by shareholders of your Fund. ◾ Your Fund will be terminated and shareholders of your Fund will become shareholders of the Acquiring Fund. ◾ For U.S. federal income tax purposes, the Reorganization is not intended to result in the recognition of income, gain, or loss by your Fund, the Acquiring Fund, or the shareholders of your Fund. John Hancock ESG Large Cap Core Fund (Target Fund) John Hancock Fundamental Large Cap Core Fund (Acquiring Fund) Class A Class A Class C Class C Class I Class I Class R6 Class R6 Rationale for the Reorganization The Reorganization is intended to consolidate your Fund with a similar fund advised by John Hancock Investment Management LLC (the “ Advisor ” or “ JHIM ”) and subadvised by Manulife Investment Management (US) LLC (the “ Subadvisor ” or “ Manulife IM (US) ”). The individuals that currently act as the portfolio managers that are jointly and primarily responsible for the day-to-day management of the Acquiring Fund are expected to continue to manage the combined fund following the Reorganization. The Reorganization is expected to allow your Fund to pursue the same investment objective in a fund with similar principal investment strategies, potential for better future performance, with comparable risk, and lower total expenses before and after waivers. The greater asset size of the 1 Table of Contents combined fund may allow the Acquiring Fund, relative to the Target Fund, to reduce per-share expenses by spreading fixed costs over a larger asset base. Your Fund and the Acquiring Fund seek long-term capital appreciation, and the combined fund will also seek long-term capital appreciation. The Acquiring Fund invests at least 80% of its net assets in equity securities of large-capitalization companies. The Target Fund invests at least 80% of its net assets in equity securities of large-capitalization companies or sectors that meet the manager’s sustainability criteria. Both Funds consider large-capitalization companies to be those companies in the capitalization range of the S&P 500 Index. The combined fund’s portfolio will be substantially similar to the Acquiring Fund’s current portfolio. While the Acquiring Fund and Target Fund have the same investment objective and similar principal investment strategies and all securities held by the Target Fund are consistent with the Acquiring Fund’s investment restriction

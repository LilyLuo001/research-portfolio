      497 1 d263707d497.htm 497 497 May 8, 2023 Dear Shareholder: Invesco regularly conducts a review of its product line to sharpen its offerings to investors. A key goal of this effort is to reduce overlap and enhance efficiency across the product line for the benefit of the Invesco Funds’ shareholders and Invesco. In connection with this process, the Invesco Funds’ Board of Trustees (the “Board”) has approved a fund reorganization that will combine two Invesco Funds. Specifically, as described in the attached Information Statement/Prospectus, Invesco Emerging Markets Innovators Fund (the “Target Fund”) is proposed to reorganize with and into Invesco Developing Markets Fund (the “Acquiring Fund”). The reorganization is intended to: • combine Funds with the same portfolio management team and investment process, providing greater opportunity to accelerate growth as a singular offering; • reduce advisory fees and expenses; • reduce overlap in the product lineup; and • create scale in the resulting Fund. The Board of the Target Fund and the Acquiring Fund, including its independent trustees, believes that the reorganization in the Information Statement/Prospectus is in the best interest of each Fund. We urge you to spend a few minutes reviewing the information in the Information Statement/Prospectus. You do not need to take any action regarding your account. Your shares of the Target Fund will automatically be converted, at net asset value, into shares of equal net asset value of the Acquiring Fund on or about June 23, 2023, as discussed in more detail below. Please note that the reorganization is not a taxable event but redeeming or exchanging your shares prior to the reorganization may be a taxable event depending on your individual tax situation. If you have any questions regarding the enclosed Information Statement/Prospectus, please call 1-800-959-4246 or your financial advisor. Sincerely, Melanie Ringold Senior Vice President, Chief Legal Officer and Secretary AIM Investment Funds (Invesco Investment Funds) 11 Greenway Plaza, Suite 1000 Houston, Texas 77046-1173 1-800-959-4246 INFORMATION STATEMENT/PROSPECTUS May 8, 2023 Introduction This Information Statement/Prospectus contains information that shareholders of Invesco Emerging Markets Innovators Fund (the “Target Fund”), a series of AIM Investment Funds (Invesco Investment Funds) (the “Trust”), should know about the Agreement and Plan of Reorganization (the “Agreement”) relating to the reorganization (the “Reorganization”) of the Target Fund into Invesco Developing Markets Fund (the “Acquiring Fund”), also a series of the Trust. This document is also a prospectus for the Acquiring Fund. The Target Fund and Acquiring Fund together are referred to as the “Funds” and individually as a “Fund.” The Reorganization contemplates (a) the transfer of all or substantially all of the assets and assumption of the liabilities of the Target Fund by the Acquiring Fund in exchange for shares of a corresponding class of the Acquiring Fund; (b) the distribution of such shares to the shareholders of the Target Fund; and (c) the distribution of shares in complete liquidation of the Target Fund and cancellation of the outstanding shares of the Target Fund. The total value of the Acquiring Fund shares of each class that shareholders will receive in the Reorganization will be the same as the total value of the shares of each class of the Target Fund that shareholders held immediately prior to the Reorganization. The Reorganization is anticipated to be a tax-free transaction, meaning that shareholders should not be required to pay any federal income tax in connection with the Reorganization. No sales charges or redemption fees will be imposed in connection with the Reorganization. The Board has approved the Agreement and has determined that the Reorganization is in the best interest of the Target Fund and Acquiring Fund and will not dilute the interests of the existing shareholders of the Target Fund or Acquiring Fund. Additional information about the Funds is available in the: • Prospectuses for the Target Fund and the Acquiring Fund; • Annual and semi-annual reports to shareholders of the Target Fund and the Acquiring Fund; and • Statements of Additional Information (“SAIs”) for the Target Fund and the Acquiring Fund. These documents are on file with the Securities and Exchange Commission (the “SEC”). The current prospectus of the Target Fund , as detailed in Exhibit B, is incorporated herein by reference and is legally deemed to be part of this Information Statement/Prospectus. A copy of the current prospectus of the Acquiring Fund of which you will receive shares accompanies this Information Statement/Prospectus. The prospectus of the Acquiring Fund , as detailed in Exhibit B, is incorporated herein by reference and deemed to be part of this Information Statement/Prospectus. The SAI to this Information Statement/Prospectus, dated the same date as this Information Statement/Prospectus, also is incorporated herein by reference and is deemed to be part of this Information Statement/Prospectus. The Target Fund prospectus, the most recent annual report to shareholders, containing audited financial statements for the most recent fiscal year, and the most recent semi-annual report to shareholders of the Target Fund have been previously mailed to shareholders and are available on the Target Fund’s website at www.invesco.com/us. Copies of all of these documents are available upon request without charge by visiting or writing to the Target Fund, at 11 Greenway Plaza, Suite 1000, Houston, Texas 77046-1173, or calling 1-800-959-4246. You also may view or obtain these documents on the EDGAR Database on the SEC’s Internet site at http://www.sec.gov, and copies of this information may be obtained, after paying a duplicating fee, by electronic request at the following e-mail address: publicinfo@sec.gov. These securities have not been approved or disapproved by the U.S. Securities and Exchange Commission (“SEC”) or the Commodities Futures Trading Commission (“CFTC”) nor has the SEC or CFTC passed upon the accuracy or adequacy of this Information Statement/Prospectus. Any representation to the contrary is a criminal offense. An investment in the Funds is not a deposit with a bank and is not insured or guaranteed by the Federal Deposit Insurance Corporation or any other government agency. You may lose money by investing in the Funds. TABLE OF CONTENTS Page SYNOPSIS 1 SUMMARY OF KEY INFORMATION 1 Why are Shareholders not being asked to vote on the Reorganization? 1 Why are you sending me this Information Statement/Prospectus? 1 What if I do not wish to participate in the Reorganization? 1 Has the Funds’ Board of Trustees approved the Reorganization? 1 What are the reasons for the proposed Reorganization? 1 What effect will the Reorganization have on me as a shareholder? 2 What are the costs of the Reorganization and who is responsible for paying the costs? 2 How do the Funds’ investment objectives, principal investment strategies and risks compare? 2 How do the Funds’ expenses compare? 2 How do the Funds’ portfolio turnover rates compare? 10 How do the performance records of the Funds compare? 10 How do the management, investment adviser and other service providers of the Funds compare? 11 How do the Funds’ purchase and redemption procedures and exchange policies compare? 14 How do the Funds’ sales charges and distribution arrangements compare? 14 Will the Acquiring Fund have different portfolio managers than the Target Fund? 14 Will there be any tax consequences resulting from the Reorganization? 14 When is the Reorganization expected to occur? 15 What will happen if the Reorganization does not occur? 15 Where can I find more information about the Funds and the Reorganization? 15 ADDITIONAL INFORMATION ABOUT THE FUNDS 15 Comparison of Investment Objectives, Principal Investment Strategies, Principal Investments and Principal Risks 15 Comparison of Fundamental and Non-Fundamental Investment Restrictions 17 Comparison of Share Classes and Distribution Arrangements 18 Comparison of Purchase and Redemption Procedures 19 Comparison of Distribution Policies 20 Comparison of Forms of Organization and Securities to be Issued 20 Where to Find More Information 20 THE REORGANIZATION 20 Summary of Agreement and Plan of Reorganization 20 Board Considerations in Approving the Reorganization 21 Federal Income Tax Considerations 22 Costs of the Reorganization 24 Share Ownership by Large Shareholders, Management and Trustees 25 OTHER MATTERS 25 Capitalization 25 WHERE TO FIND ADDITIONAL INFORMATION 26 Exhibits EXHIBIT A Target Fund and Acquiring Fund A-l EXHIBIT B Prospectuses Incorporated by Reference into the Information Statement/Prospectus B-1 EXHIBIT C Ownership of the Target Fund C-1 EXHIBIT D Ownership of the Acquiring Fund D-1 EXHIBIT E Agreement and Plan of Reorganization E-1 EXHIBIT F Financial Highlights F-1 i SYNOPSIS This Information Statement/Prospectus provides information regarding the Agreement that will have the effect of reorganizing the Target Fund with and into the Acquiring Fund, as detailed in Exhibit A to this Information Statement/Prospectus and summarized below. The Agreement provides for (a) the transfer of all or substantially all of the assets (as defined in the Agreement) and assumption of the liabilities (as defined in the Agreement) of the Target Fund by the Acquiring Fund in exchange for shares of a corresponding class of the Acquiring Fund; (b) the distribution of such shares of the corresponding class to the shareholders of the Target Fund; and (c) the distribution of shares in complete liquidation of the Target Fund and cancellation of the outstanding shares of the Target Fund (the “Reorganization”). SUMMARY OF KEY INFORMATION The following is a summary of certain information contained elsewhere in this Information Statement/Prospectus, in the Agreement, and/or in the prospectuses and SAIs of the Funds. Shareholders should read the entire Information Statement/Prospectus and the prospectus of the Acquiring Fund carefully for more complete information. Why are Shareholders not being asked to vote on the Reorganization? Rule 17a-8 under the Investment Company Act of 1940, as amended (the “1940 Act”), and the Trust’s Amended and Restated Declaration of Trust permit reorganizations of the Target Fund to occur without seeking a shareholder vote provided that certain conditions are met, including with regard to regulation under the 1940 Act: (1) fundamental investment policies of the target fund ( i.e., policies that may not be changed without a shareholder vote under Section 13 of the 1940 Act) are not materially different from those of the acquiring fund; (2) the target fund’s investment advisory agreement is not materially different from the acquiring fund’s investment advisory agreement; (3) the independent trustees of the target fund will comprise a majority of the independent directors of the acquiring fund; and (4) Rule 12b-1 distribution fees authorized to be paid by the acquiring fund are not greater than the Rule 12b-1 distribution fees authorized to be paid by the target fund. The conditions permitting the Reorganization to occur without seeking a shareholder vote have been met by the Target Fund and the Acquiring Fund. WE ARE NOT ASKING YOU FOR A PROXY AND YOU ARE REQUESTED NOT TO SEND US A PROXY. Why are you sending me this Information Statement/Prospectus? You are receiving this Information Statement/Prospectus because you own shares in the Target Fund. This Information Statement/Prospectus contains information that shareholders of the Target Fund should know about the Reorganization. This document is also a prospectus for the Acquiring Fund. What if I do not wish to participate in the Reorganization? If you do not wish to have your shares of the Target Fund exchanged for shares of the Acquiring Fund as part of the Reorganization, you may redeem your shares prior to the consummation of the Reorganization. If you redeem your shares, you will incur any applicable deferred sales charge and if you hold shares in a taxable account, you will recognize a taxable gain or loss based on the difference between your tax basis in the shares and the amount you receive for them. Has the Funds’ Board of Trustees approved the Reorganization? Yes. The Board has carefully reviewed the proposal and unanimously approved the Agreement and the Reorganization. What are the reasons for the proposed Reorganization? The Reorganization is designed to allow Invesco Ltd. (“Invesco”), the indirect parent company of Invesco Advisers, Inc., the Funds’ investment adviser (“Invesco Advisers” or the “Adviser”), to put forth its most compelling investment processes and strategies. Invesco continually conducts a comprehensive review of its product line to sharpen its offerings to investors, with key goals of reducing product overlap, reducing advisory fees and/or expenses and enhancing efficiency across the product line. The Reorganization is intended to create a larger combined Fund with a more diversified shareholder base and a larger asset base against which fixed dollar costs may be allocated and potentially create economies of scale to benefit shareholders. The Reorganization combines Funds with the same portfolio management team and investment process, providing greater opportunity to accelerate growth as a singular offering for each investment strategy and process. In addition, Target Fund shareholders will benefit from the lower advisory fees of the Acquiring Fund and a lower net expense ratio on a pro forma basis. 1 In considering the Reorganization and the Agreement, the Board considered these and other factors in concluding that the Reorganization would be in the best interests of the Funds. The Board’s considerations are described in more detail in the “THE REORGANIZATION – Board Considerations in Approving the Reorgan

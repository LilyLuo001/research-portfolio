# E2-T1-facts-B — 制度事实核验 channel B (Gemini web UI, grounding).
# Dual-channel rule (CLAUDE.md rule 2 / v1.1 appendix A): same questions as
# channel A (E2-T1-facts, Kimi $web_search), DIFFERENT vendor family, then
# machine-diff the two answer maps.
#
# Auto-dispatched: models.py grounds Gemini via the google_search tool
# (web_search: true below). Free tier bills ¥0 but the daily grounding quota
# is limited — verify at ai.google.dev/pricing before arming. FALLBACK: if
# the quota is exhausted or GEMINI_API_KEY is absent, set `manual: true`
# here and run the human channel instead:
#     python ops/l1/gemini_helper.py E2-T1-facts-B
worker: gemini_free
web_search: true
est_cost: 0.0             # free tier
items:
  - id: t1a-oracles
    prompt: |
      【C0 纪律: 只依据联网检索到的一手来源(协议官方文档、发行方法律文件、
      链上浏览器、官方博客); 二手媒体只可作线索; 禁止凭训练记忆作答; 查不到
      → UNKNOWN 并写明尝试过的检索路径; 推断必须显式标注"推断:"; 来源冲突
      时两个都列出。】
      问题(T1a-1): 下列 Morpho RWA 市场各自使用的 oracle 具体实现是什么
      (NAVLink/发行方直喂/硬编码/其他)? 逐市场回答: sACRED, mF-ONE,
      AA_FalconXUSDC, syrupUSDC, mTBILL, cUSDO。
      输出: 每市场一行 [对象, 结论, 置信度(高/中/低), 一手来源URL(可多条),
      检索日期, 备注]。
  - id: t1a-redemption
    prompt: |
      【C0 纪律: 同上 — 一手来源、逐条 URL、UNKNOWN 合法、禁止记忆。】
      问题(T1a-2): sACRED, mF-ONE, AA_FalconXUSDC, syrupUSDC, mTBILL, cUSDO
      各抵押资产发行方的赎回条款: 结算周期(T+N)、最低赎回额、是否存在赎回
      门槛(gate)条款、门槛触发条件。
      输出: 每资产一行 [对象, 结论, 置信度, 一手来源URL, 检索日期, 备注]。
  - id: t1a-navlink
    prompt: |
      【C0 纪律: 同上。】
      问题(T1a-3): Aave Horizon 各 reserve 的 NAVLink 喂价更新频率
      (每日/每工作日/其他)与周末是否更新。
      输出: 每 reserve 一行 [对象, 结论, 置信度, 一手来源URL, 检索日期, 备注]。
  - id: t1a-coinbase-vault
    prompt: |
      【C0 纪律: 同上。】
      问题(T1a-4): Coinbase USDC 出借所路由的 Morpho 金库(curator、金库地址),
      该金库当前与历史上是否配置过任何 RWA 抵押市场。
      输出: [结论, 置信度, 一手来源URL, 检索日期, 备注]; 金库地址必须来自
      链上浏览器或 Coinbase/Morpho 官方页面, 不得来自记忆。
      最后附一节"下游影响提示": 哪个结论会改变研究设计(对照计划 §2.4/§10)。
# Known-answer fence (dispatch voids the batch on a miss). Facts marked
# 已核实 in docs/E2_研究计划_RWA内嵌杠杆.md §10/§1.3 — deliberately different
# items than channel A's fence so the two fences fail independently.
sentinels:
  - id: S1
    # source: E2_研究计划_RWA内嵌杠杆.md §10 "sACRED 首发 Polygon(2025-04) | 已核实"
    # (Replaced the FalconX-CV-launch sentinel after live run 2026-07-09:
    # channel B answered 2025-06 with grounded sources vs the plan's 已核实
    # 2025-08 — a genuine A/B conflict, logged as NEED_HUMAN in
    # ops/decisions.md. A fence fact must be unambiguous; that one wasn't.)
    prompt: "On which blockchain was the sACRED token first launched in April 2025? Reply with the chain name only, one word."
    expect: "Polygon"
  - id: S2
    # source: E2_研究计划_RWA内嵌杠杆.md §2.4 "Aave Horizon 采用 Chainlink SmartData/NAVLink 喂 NAV"
    prompt: "Which oracle provider supplies the SmartData/NAVLink NAV feeds used by Aave Horizon? Reply with the provider name only, one word."
    expect: "Chainlink"

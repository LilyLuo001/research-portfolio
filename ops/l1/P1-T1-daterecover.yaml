ash, or the transfer of your investment, may be subject to fees and expenses and may also be subject to tax. It may take time for you to receive your cash. Please consult with your financial intermediary for more information on the impact that the Reorganization will have on you and your investments. Q. What if I do not want to own shares of an Acquiring Fund? A. If you do not want to receive shares of an Acquiring Fund in connection with a Reorganization, you can exchange your Fund shares for shares of another J.P. Morgan mutual fund that is not participating in a Reorganization or redeem your Fund shares. Prior to doing so, however, you should consider the tax consequences associated with either action. Redemption of your Fund shares will be a taxable event if you hold your shares in a taxable account. The last date to redeem your shares or exchange them into another J.P. Morgan mutual fund prior to each Reorganization is listed below: Fund Final Date to Redeem Fund Shares or Exchange Fund

ectuses and Statement of Additional Information are amended as follows: Institutional and Class K Shares of each Fund will be offered only on a limited basis. The section of each Fund’s Institutional Shares Summary Prospectus and Prospectus entitled “Key Facts About [the Fund]—Purchase and Sale of Fund Shares” and “Fund Overview—Key Facts About [the Fund]—Purchase and Sale of Fund Shares” is hereby amended to add the following as the first paragraph of such section: Effective May 1, 2025, Institutional Shares of the Fund are offered on a limited basis. The section of each Fund’s Class K Shares Summary Prospectus and Prospectus entitled “Key Facts About [the Fund]—Purchase and Sale of Fund Shares” and “Fund Overview—Key Facts About [the Fund]—Purchase and Sale of Fund Shares” is hereby amended to add the following as the first paragraph of such section: Effective May 1, 2025, Class K Shares of the Fund are offered on a limited basis. The section of each Fund’s Institutional Shares Prospectus entitled “Account Information—Details About the Share Class—Institutional Shares at a Glance—Availability” is hereby amended to add the following at the end of such section: Availability will be further limited as follows: • Effective beginning May 1, 2025, no new accounts held directly with BlackRock (including IRAs) will be opened. • Effective beginning July 31, 2025, shareholders holding their accounts directly with BlackRock (including IRAs) will not be permitted to purchase additional Institutional Shares. Shareholders holding their accounts directly with BlackRock may continue to reinvest dividends and distributions on Institutional Shares. • Effective beginning September 5, 2025, no new accounts to purchase Institutional Shares through a Financial Intermediary will be opened. 2 • Effective beginning September 10, 2025, shareholders holding accounts through a Financial Intermediary will not be permitted to purchase additional Institutional Shares. Shareholders already holding Institutional Shares through a Financial Intermediary may continue to reinvest dividends and distributions. The section of each Fund’s Class K Shares Prospectus entitled “Account Information—Details About the Share Class—Class K Shares at a Glance—Availability” is hereby amended to add the following at the end of such section: Availability will be further limited as follows: • Effective beginning May 1, 2025, no new accounts held directly with BlackRock (including IRAs) will be opened. • Effective beginning July 31, 2025, shareholders holding their accounts directly with BlackRock (including IRAs) will not be permitted to purchase additional Class K Shares. Shareholders holding their accounts directly with BlackRock may continue to reinvest dividends and distributions on Class K Shares. • Effective beginning September 5, 2025, no new accounts to purchase Class K Shares through a Financial Intermediary will be opened. • Effective beginning September 10, 2025, shareholders holding accounts through a Financial Intermediary will not be permitted to purchase additional Class K Shares. Shareholders already holding Class K Shares through a Financial Intermediary may continue to reinvest dividends and distributions. In anticipation of the Reorganizations, the final date to exchange shares of another BlackRock Fund for shares of a Fund will be on September 10, 2025, and the final date to purchase shares of a Fund will be September 10, 2025. The final date to exchange shares of a Fund for shares of another BlackRock Fund will be on September 10, 2025, and the final date to redeem shares of a Fund will be September 11, 2025. IMPORTANT NOTICE ABOUT YOUR FUND ACCOUNT QUESTIONS AND ANSWERS The following is a brief Q&A that provides information to help you to determine if you need to take action with respect to your Fund shareholder account prior to the Reorganizations in order to receive shares of the relevant Acquiring Fund. Q. What types of shareholder accounts can receive s
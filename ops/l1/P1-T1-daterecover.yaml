 and C Shares of the Fund will be publicly offered only on a limited basis. 2. New accounts may no longer be established directly through JPMorgan Distribution Services, Inc. (the “Distributor”). 3. No CDSC will be imposed on redemptions of the Class A or Class C Shares of the Fund. 4. No sales charge will be imposed on purchases of Clas […] cipation of the Reorganization, purchase orders, exchange orders, and redemption orders will only be accepted by the Fund until the date indicated below: Fund Final Date to Purchase Fund Shares or Exchange Shares of Another J.P. Morgan Mutual Fund for Fund Shares Final Date to Redeem Fund Shares or Exchange Fund Shares for Shares of Another J.P. Morgan Mutual Fund JPMorgan Unconstrained Debt Fund September 24, 2025 September 25, 2025 IMPORTANT NOTICE ABOUT YOUR FUND ACCOUNT QUESTIONS AND ANSWERS The following is a brief Q&A that provides information to help you to determine if you need to take action with respect to your shareholder account prior to the Reorganization in order to receive shares of the Acquiring Fund. Q. What types of shareholder accounts can receive shares of the Acquiring Fund as part of a  […] roker right away to make the necessary changes to your account. Q. What will happen if I do not have a brokerage account that can accept Acquiring Fund shares at the time of the Reorganization? A. In order to receive shares of the Acquiring Fund as part of the Reorganization, you must hold your shares of the Fund through a brokerage account that can accept shares of an ETF (the Acquiring Fund) on the closing date of the Reorganization. • Non-Accommodating Brokerage Accounts. If you hold your shares of the Fund in a brokerage account with a financial intermediary that only allows you to hold shares of mutual funds in the account, you will need to contact your financial intermediary to set up a brokerage account that permits investments in ETF shares. If such a change is not made before the  […] organ U.S. Government Money
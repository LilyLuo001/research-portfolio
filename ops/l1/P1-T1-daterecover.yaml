      [备案 0001193125-25-030799 form 497K filed 2025-02-20]: 497K 1 d825709d497k.htm MANAGED ACCOUNT SERIES (497) Managed Account Series (497) MANAGED ACCOUNT SERIES BlackRock GA Disciplined Volatility Equity Fund BlackRock GA Dynamic Equity Fund (each, a “Fund” and together, the “Funds”) Supplement dated February 20, 2025 to the Summary Prospectuses, Prospectuses and Statement of Additional Information of each Fund, as supplemented to date At a meeting held on February 20, 2025, the Board of Trustees (the “Board”) of Managed Account Series (the “Trust”), on behalf of each Fund, approved the Reorganizations (as defined below) of each Fund into an exchange-traded fund (“ETF”), which will be managed by BlackRock Fund Advisors, an investment adviser under common control with BlackRock Advisors, LLC, each Fund’s current investment adviser (“BlackRock”). The  […] each an “Acquiring Fund”), a series of the Acquiring Trust Each Fund and its corresponding Acquiring Fund have identical investment objectives and fundamental investment policies, and substantially similar investment strategies. Following the reorganizations, the Funds will be liquidated (each such reorganization and liquidation, the “Reorganization” and collectively, the “Reorganizations”). Each Reorganization is anticipated to close as of the close of trading on the New York Stock Exchange on September 12, 2025. The Acquiring Funds have not commenced investment operations, and it is anticipated that the Acquiring Funds will not have shareholders prior to the Reorganizations. Importantly, in order to receive shares of an Acquiring Fund as part of a Reorganization, shareholders of a Fund must hold their shares of the Fund through a brokerage account that can accept shares of an ETF (the  […]  a Reorganization. No further action is required for Fund shareholders that hold shares of a Fund through a brokerage account that can hold shares of the corresponding Acquiring Fund. BlackRock believes that the Reorganizations will provide multiple benefits for investors of each Fund, including lower net expenses, additional trading flexibility and increased portfolio holdings transparency. Each Reorganization will be conducted pursuant to an Agreement and Plan of Reorganization (each, a “Plan”). Each Reorganization is structured to be a tax-free reorganization under the U.S. Internal Revenue Code of 1986, as amended. As a result, Fund shareholders generally will not recognize a taxable gain (or loss) for U.S. tax purposes as a result of a Reorganization (except with respect to cash received, as explained elsewhere in this Supplement). In connection with the Reorganizations, shareholders of a Fund will receive ETF shares of the corresponding Acquiring Fund equal in value to the number of shares of the Fund they own, including a cash payment in lieu of fractional shares of the applicable Acquiring Fund, which cash payment may be taxable. Completion of each Reorganization is subject to a number of conditions under the relevant Plan, but shareholders of the Funds are not required to approve the Reorganizations. Existing shareholders of a Fund will receive a combined prospectus/information statement describing in detail both the Reorganization and the corresponding Acquiring Fund, and summarizing the Board’s considerations in approving the Reorganization. Although shareholder approval of the Reorganizations is not required and BlackRock does not anticipate that a Reorganization will be terminated, if a Reorganization is terminated, shareholders of the relevant Fund would be notified of the change and the Fund would continue to operate as a mutual fund as a series of the Trust. A Reorganization will not be contingent on the occurrence of the other Reorganization. The following changes will take effect either immediately or on an upcoming future date as described below. These actions include limits on new purchases of certain Fund shares. Consequently, each Fund’s Summary Prospectuses, Prospectuses and Statement of Additional Information are amended as follows: Institutional and Class K Shares of each Fund will be offered only on a limited basis. The section of each Fund’s Institutional Shares Summary Prospectus and Prospectus entitled “Key Facts About [the Fund]—Purchase and Sale of Fund Shares” and “Fund Overview—Key Facts About [the Fund]—Purchase and Sale of Fund Shares” is hereby amended to add the following as the first paragraph of such section: Effective May 1, 2025, Institutional Shares of the Fund are offered on a limited basis. The section of each Fund’s Class K Shares Summary Prospectus and Prospectus entitled “Key Facts About [the Fund]—Purchase and Sale of Fund Shares” and “Fund Overview—Key Facts About [the Fund]—Purchase and Sale of Fund Shares” is hereby amended to add the following as the first paragraph of such section: Effective May 1, 2025, Class K Shares of the Fund are offered on a limited basis. The section of each Fund’s Institutional Shares Prospectus entitled “Account Information—Details About the Share Class—Institutional Shares at a Glance—Availability” is hereby amended to add the following at the end of such section: Availability will be further limited as follows: • Effective beginning May 1, 2025, no new accounts held directly with BlackRock (including IRAs) will be opened. • Effective beginning July 31, 2025, shareholders holding their accounts directly with BlackRock (including IRAs) will not be permitted to purchase additional Institutional Shares. Shareholders holding their accounts directly with BlackRock may continue to reinvest dividends and distributions on Institutional Shares. • Effective beginning September 5, 2025, no new accounts to purchase Institutional Shares through a Financial Intermediary will be opened. 2 • Effective beginning September 10, 2025, shareholders holding accounts through a Financial Intermediary will not be permitted to purchase additional Institutional Shares. Shareholders already holding Institutional Shares through a Financial Intermediary may continue to reinvest dividends and distributions. The section of each Fund’s Class K Shares Prospectus entitled “Account Information—Details About the Share Class—Class K Shares at a Glance—Availability” is hereby amended to add the following at the end of such section: Availability will be further limited as follows: • Effective beginning May 1, 2025, no new accounts held directly with BlackRock (including IRAs) will be opened. • Effective beginning July 31, 2025, shareholders holding their accounts directly with BlackRock (including IRAs) will not be permitted to purchase additional Class K Shares. Shareholders holding their accounts directly with BlackRock may continue to reinvest dividends and distributions on Class K Shares. • Effective beginning September 5, 2025, no new accounts to purchase Class K Shares through a Financial Intermediary will be opened. • Effective beginning September 10, 2025, shareholders holding accounts through a Financial Intermediary will not be permitted to purchase additional Class K Shares. Shareholders already holding Class K Shares through a Financial Intermediary may continue to reinvest dividends and distributions. In anticipation of the Reorganizations, the final date to exchange shares of another BlackRock Fund for shares of a Fund will be on September 10, 2025, and the final date to purchase shares of a Fund will be September 10, 2025. The final date to exchange shares of a Fund for shares of another BlackRock Fund will be on September 10, 2025, and the final date to redeem shares of a Fund will be September 11, 2025. IMPORTANT NOTICE ABOUT YOUR FUND ACCOUNT QUESTIONS AND ANSWERS The following is a brief Q&A that provides information to help you to determine if you need to take action with respect to your Fund shareholder account prior to the Reorganizations in order to receive shares of the relevant Acquiring Fund. Q. What types of shareholder accounts can receive shares of an Acquiring Fun […] ng account types cannot hold shares of ETFs: Non-Accommodating Brokerage Accounts . If you hold your shares of a Fund in a brokerage account with a financial intermediary that only allows you to hold shares of mutual funds in the account, you will need to 3 contact your financial intermediary to set up a brokerage account that permits investments in ETF shares. If such a change is not made before September 5, 2025, you will not receive shares of the corresponding Acquiring Fund as part of the Reorganization. Instead, your investment will be liquidated on September 5, 2025 and you will receive cash equal in value to the net asset value (“NAV”) of your Fund shares. Non-Accommodating Retirement Accounts . If you hold your shares of a Fund through an individual retirement account (“IRA”) or group retirement plan whose plan sponsor does not have the ability to hold shares of ETFs on its platform, you may need to redeem your shares prior to the Reorganization or, if a

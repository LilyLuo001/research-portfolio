ridgevsm/ and submit their name and newly issued control number in order to register to participate in and vote at the Meeting. After Shareholders have submitted their registration […]  Meeting, please see the instructions beginning on page v of the Combined Proxy Statement/Prospectus (“Proxy Statement/Prospectus”) that follows. Because the Meeting will be a completely virtual meeting, there will be no physical location for Shareholders to attend. The matters referred to above are discussed in the Proxy Statement/Prospectus attached to this Notice. Shareholders of record at the close of business on November 4, 2022, the record date for the Meeting, are entitled to receive notice of and to vote at the Meeting and at any postponements or adjournments thereof. If you will not be present at the Meeting, we urge you to sign, date and promptly return the enclosed proxy card in the envelope provided, which is addressed for your convenience and needs no postage if mailed in the United States. You ma […] rganization”). The Acquired Fund currently operates as an open-end mutual fund. The Acquired Fund will be reorganized into an exchange-traded fund (“ETF”) through the Reorganization of the Acquired Fund into the Acquiring Fund. The Acquired Fund and the Acquiring Fund have identical investment objectives and fundamental investment policies and have substantially similar investment strategies. The Reorganization will be accomplished in accordance with the Plan. The Plan provides for the transfer of all of the assets and liabilities of the Acquired Fund to the Acquiring Fund in exchange for shares of the Acquiring Fund having an aggregate net asset value (“NAV”) equal to the aggregate NAV of the Acquired Fund followed immediately by the distribution by the Acquired Fund to its shareholders of the portion of shares of the Acquiring Fund to which the shareholder is entitled, except as noted below. If you remain a shareholder of the Acquired Fund on the Closing Date of the Reorganization, as defined below, you will receive shares of the Acquiring Fund and, in some cases, cash that combined with the shares have the same value as your shares of the Acquired Fund on that date. Shares of the Acquiring Fund are not issued in fractional shares, so cash will be paid to some shareholders in lieu of fractional shares of the Acquiring Fund, which cash payment may be taxable. If you do not hold your shares of the Acquired Fund through a brokerage account that can accept shares of the Acquiring Fund on the Closing Date of the Reorganization, your shares will be held by a stock transfer agent until a brokerage account is identified or the account is converted to cash (subject to applicable federal or state laws concerning unclaimed property). If you hold your shares of the Acquired Fund through a fund direct individual retirement account (“IRA”) and do not take action prior to the Reorganization, your Acquired Fund shares will be exchanged for Class A Shares of Goldman Sachs Financial Square Government Fund equal in value to the NAV of your Acquired Fund shares. QUESTIONS SPECIFIC TO PROPOSAL 1 — TO APPROVE THE PLAN RELATING TO THE REORGANIZATION OF THE ACQUIRED FUND INTO THE ACQUIRING FUND. Q. Am I Being Asked to Vote on the Reorganization? A. Yes. The Reorganization is subject to shareholder approval. Q : Why am I being asked to approve the Plan relating to the reorganization of the Acquired Fund into the Acquiring Fund? A: The Reorganization was recommended by the Funds’ investment adviser, Goldman Sachs Asset Management, L.P. (“GSAM”), because it believes the investment strategy of the Acquired Fund would be better positioned in an ETF format […]  Fund (the “Acquired Fund Trust Board”), after careful consideration, unanimously approved the Plan. After considering the recommendation of the Investment Adviser, the Acquired Fund Trust Board, including all of the Independent Trustees (i.e., Trustees who are not “interested persons” of the Acquired Fund as defined in the Investment Company Act of 1940 (the “1940 Act”)), concluded that: (i) the Reorganization is in the best interests of the Acquired Fund; and (ii) the interests of the shareholders of the Acquired Fund will not be diluted as a result of the Reorganization. Q . When is the Reorganization expected to occur? A. The Meeting is scheduled to occur on January 6, 2023. If all necessary approvals are obtained, the proposed Reorganization will likely take place in the first quarter of 2023, and is currently scheduled to take place upon the close of business (4:00 pm Eastern Time) on January 20, 2023 (the “Closing Date”). The Closing Date may be delayed. The Acquired Fund will publicly disclose any changes to the Closing Date. Q . What are the differences between an ETF and a mutual fund? A. ETFs are structurally different from mutual funds in several important aspects: • A mutual fund may offer multiple share classes with different sales charges, expenses, and/or minimum investments. A

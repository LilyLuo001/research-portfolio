      [备案 0001193125-26-053236 form 497K filed 2026-02-17]: 497K 1 d43055d497k.htm JPMORGAN TRUST I JPMorgan Trust I JPMORGAN TRUST I J.P. Morgan Municipal Bond Funds JPMorgan California Tax Free Bond Fund JPMorgan New York Tax Free Bond Fund Summary Prospectuses, Prospectuses and Statement of Additional Information dated July 1, 2025, as supplemented J.P. Morgan U.S. Equity Funds JPMorgan U.S. GARP Equity Fund Summary Prospectuses, Prospectuses and Statement of Additional Information dated November 1, 2025, as supplemented JPMORGAN TRUST IV J.P. Morgan Income Funds JPMorgan Preferred and Income Securities Fund Summary Prospectuses, Prospectuses and Statement of Additional Information dated November 1, 2025, as supplemented (All Share Classes) (each a “Fund” and collectively, the “Funds”) Supplement dated February 17, 2026 to the current Summary Prospectuses, Prospectuses and Statements of Additional Information, as supplemented At a meeting held on February 10-12, 2026, each of the Boards of Trustees of JPMorgan Trust I and JPMorgan Trust IV (together, the “Board”) approved, on behalf of the applicable Funds that it oversees, the Reorganization (as defined below) of each Fund into an exchange-traded fund (“ETF”), which will continue to be managed by J.P. Morgan Investment Management Inc. (“JPMIM”). The Board, including all of the Trustees who are not “interested persons” (as defined in the Investment Company Act of 1940, as amended (the “1940 Act”)) of the Funds, determined, with respect to each Reorganization, that participation in the Reorganization is in the best interests of the Fund and the interests of existing shareholders of the Fund will not be diluted as a result of the Reorganization. Each Fund will be reorganized into an ETF through the reorganization of the Fund into a newly created ETF (each, an “Acquiring Fund”), each of which is a series of J.P. Morgan Exchange-Traded Fund Trust. Following the reorganizations, each Fund will be liquidated (each such reorganization and liquidation, a “Reorganization”). The table below sets forth each of the Acquiring Funds and the anticipated schedule for each Reorganization: Fund Acquiring Fund Proposed Reorganization Date JPMorgan California Tax Free Bond Fund JPMorgan California Tax Free Bond ETF June 12, 2026 JPMorgan New York Tax Free Bond Fund JPMorgan New York Tax Free Bond ETF June 12, 2026 JPMorgan U.S. GARP Equity Fund JPMorgan Fundamental Data Science Large Growth ETF July 10, 2026 JPMorgan Preferred and Income Securities Fund JPMorgan Preferred and Income Securities ETF July 10, 2026 SUP-CONV-MF-226 Each new ETF will be managed in a substantially similar manner as the current mutual funds except for JPMorgan Fundamental Data Science Large Growth ETF as described below: The JPMorgan Fundamental Data Science Large Growth ETF will have the same objective and fundamental investment policies as the current mutual fund, but its investment process will be changed from a […] in equity investments of large capitalization growth companies. “Assets” means net assets, plus the amount of borrowings for investment purposes. The Fund generally defines large capitalization companies as those with a market capitalization similar to those within the universe of the Russell 1000 ® Growth Index at the time of purchase. As of the reconstitution of the Russell 1000 Growth Index on January 30, 2026, the market capitalization of the companies in the index ranged from $28.5 million to $4.1 trillion at the time of purchase. For purposes of this policy, growth companies are those that the adviser believes have growth potential compared to companies in the U.S. market more broadly, based on one or more or the following factors: projected future revenue growth, projected future earnings growth, historical revenue growth or historical earnings growth. Additionally, effective July 1, 2026, JPMorgan Preferred and Income Securities Fund will declare dividends of investment income, if any, monthly, 
te on the Reorganization at a shareholder meeting that is anticipated to be held during the first quarter of 2026 (the “Meeting”). -4- If approved by the Merging Fund Shareholders, the Reorganization will involve: (i) the transfer of substantially all of the assets of the Fund to the Securitized Credit ETF in exchange for shares of the Securitized Credit ETF, (ii) the Securitized Credit ETF’s assumption of all the liabilities of the Fund, (iii) the distribution of shares of the Securitized Credit ETF to Merging Fund Shareholders, and (iv) the complete liquidation and termination of the Fund. Upon completion of the Reorganization, Merging Fund Shareholders will become shareholders of the Securitized Credit ETF. The Securitized Credit ETF’s investment adviser will be DoubleLine ETF Adviser LP. If approved by shareholders, the Reorganization is currently targeted to occur by the end of first quarter of 2026. Immediately after the Reorganization, the Securitized Credit ETF is expected to have principal investment strategies substantially similar to those of the Fund (after the changes described above become effective) and would continue to be managed by the same portfolio management team as the Fund. The proposed Reorganization is expected to qualify as a tax‑free reorganization for U.S. federal income tax purposes, meaning Merging Fund Shareholders will not recognize any gain or loss on the exchange of their Fund shares for shares of the Securitized Credit ETF in connection with the Reorganization. However, any Fund shares held by a shareholder with a value less than the net asset value of a single ETF share will be redeemed and that may result in the realization of gains that may be taxable to the shareholder depending on the shareholder’s cost basis in those shares. Additional and important details about the Reorganization will be described in a combined proxy statement/prospectus, which is anticipated to be available in the fourth quarter of 2025. The Merging Fund Shareholders are urged to carefully read the combined proxy statement/prospectus when it becomes available and cast their vote. This supplement is not a proxy and is not soliciting any proxy, which can only be done by means of a proxy state

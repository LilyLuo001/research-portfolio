ive shares of the Acquiring Fund as part of the Reorganization, Fund shareholders must hold their shares of the Fund through a brokerage account that can accept shares of an ETF (the Acquiri […] ge account that can hold shares of the Acquiring Fund, please see the Q&A that follows for additional actions that such Fund shareholders must take to receive shares of the Acquiring Fund as part of the Reorganization. No further action is required for Fund shareholders that hold shares of the Fund through a brokerage account that can hold shares of the Acquiring Fund. BlackRock believes that the Reorganization will provide multiple benefits for investors of the Fund, including the same or lower net expenses, additional trading flexibility, increased portfolio holdings transparency and potential enhanced tax efficiency. The Reorganization will be conducted pursuant to an Agreement and Plan of Reorganization (the “Plan”). The Reorganization is structured to be a tax‑free reorganization under the U.S. Internal Revenue Code of 1986, as amended. As a result, Fund shareholders generally will not recognize a taxable gain (or loss) for U.S. tax purposes as a result of the Reorganization (except with respect to cash received, as explained elsewhere in this Supplement). In connection with the Reorganization, shareholders of the Fund will receive ETF shares of the Acquiring Fund equal in value to the number of shares of the Fund they own, including a cash payment in lieu of fractional shares of the Acquiring Fund, which cash payment may be taxable. Completion of the Reorganization is subject to a number of conditions under the Plan, but shareholders of the Fund are not required to approve the Reorganization. Existing Fund shareholders will receive a combined prospectus/information statement describing in detail both the Reorganization and the Acquiring Fund, and summarizing the Board’s considerations in approving the Reorganization. The foll […] on of the Investor A Shares, Investor C Shares and Institutional Shares Summary Prospectus and Prospectus entitled “Key Facts About BlackRock International Dividend Fund—Purchase and Sale of Fund Shares” and “Fund Overview—Key Facts About BlackRock International Dividend Fund—Purchase and Sale of Fund Shares” is hereby amended to add the following as the first paragraph of such section: Effective May 1, 2024, Investor A, Investor C and Institutional Shares of the Fund are offered on a limited basis. The section of the Class K Shares Summary Prospectus and Prospectus entitled “Key Facts About BlackRock International Dividend Fund—Purchase and Sale of Fund Shares” and “Fund Overview—Key Facts About BlackRock International Dividend Fund—Purchase and Sale of Fund Shares” is hereby amended to add the following as the first paragraph of such section: Effective May 1, 2024, Class K Shares of the Fund are offered on a limited basis. The section of the Investor A Shares, Investor C Shares and Institutional Shares Prospectus entitled “Account Information—How to Choose the Share Class that Best Suits Your Needs—Share Classes at a Glance—Availability—Investor A” is hereby deleted in its entirety and replaced with the following: Generally available through Financial Intermediaries. • Effective beginning May 1, 2024, no new accounts held directly with BlackRock (including IRAs) will be opened. • Effective beginning September 30, 2024, shareholders holding their accounts directly with BlackRock (including IRAs) will not be permitted to purchase additional Investor A Shares. Shareholders holding their accounts directly with BlackRock may continue to reinvest dividends and distributions on Investor A Shares. • Effective beginning November 13, 2024, no new accounts to purchase Investor A Shares through a Financial Intermediary will be opened. • Effective beginning November 13, 2024, shareholders holding accounts through a Financial Intermediary will not be permitted to purchase additional Investor A Shares. Shareholders already holding Investor A Shares through a Financial Intermediary may continue to reinvest dividends and distributions. 2 The section of the Investor A Shares, Investor C Shares and Institutional Shares Prospectus entitled “Account Information—How to Choose the Share Class that Best Suits Your Needs —Share Classes at a Glance—Availability—Investor C” is hereby deleted in its entirety and replaced with the following: Generally available through Financial Intermediaries. Must be held through a Financial Intermediary. Availability will be limited as follows: • Effective beginning November 13, 2024, no new accounts to purchase Investor C Shares through a Financial Intermediary will be opened. • Effective beginning November 13, 2024, shareholders holding accounts through a Financial Intermediary will not be permitted to purchase additional Investor C Shares. Shareholders already holding Investor C Shares through a Financial Intermediary may continue to reinvest dividends and distributions. The section of the Investor A Shares, Investor C Shares and Institutional Shares Prospectus entitled “Account Information—How to Choose the Share Class that Best Suits Your Needs —Share Classes at a Glance—Availability—Institutional” is hereby amended to add the following at the end of such section: Availability will be further limited as follows: • Effective beginning May 1, 2024, no new accounts held directly with BlackRock (including IRAs) will be opened. • Effective beginning September 30, 2024, shareholders holding their accounts directly with BlackRock (including IRAs) will not be permitted to purchase additional Institutional Shares. Shareholders holding their accounts directly with BlackRock may continue to reinvest dividends and distributions on Institutional Shares. • Effective beginning November 13, 2024, no new accounts to purchase Institutional Shares through a Financial Intermediary will be opened. • Effective beginning November 13, 2024, shareholders holding accounts thr
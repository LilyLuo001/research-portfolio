arter of 2024 and will no longer be shareholders of the Target Fund. Shareholders of the Target Fund will receive shares of the Acquiring Fund with an equivalent aggregate NAV of the Acquiring Fund. In particular, t […] Target Fund. After the Acquiring Fund Shares are distributed to the Target Fund’s shareholders, the Target Fund will be completely liquidated. The Plan also provides that Class M shares of the Target Fund will be converted into Class I shares with the same aggregate NAV (without a contingent deferred sales charge or other charge) prior to the Reorganization. Following such conversion but prior to the closing of the Reorganization, the Target Fund shall redeem all fractional shares of the Target Fund outstanding on the records of the Target Fund’s transfer agent. 2 How will the Reorganization affect me as a shareholder? If the Reorganization is completed, you will cease to be a shareholder of the Target Fund and will become a shareholder of the Acquiring Fund. Upon completion 

tially similar investment strategies. Following the Reorganizations, each Fund will be liquidated (each such reorganization and liquidation, a “Conversion”). The table below sets forth the anticipated schedule for each Conversion: Current Mutual Funds New ETFs Conversion Dates Fidelity ® Disruptive Automation Fund Fidelity ® Disruptive Automation ETF June 9, 2023 Fidelity ® Disruptive Communications Fund Fidelity ® Disruptive Communications ETF June 9, 2023 Fidelity ® Disruptive Finance Fund Fidelity ® Disruptive Finance ETF June 9, 2023 Fidelity ® Disruptive Medicine Fund Fidelity ® Disruptive Medicine ETF June 9, 2023 Fidelity ® Disruptive Technology Fund Fidelity ® Disruptive Technology ETF June 9, 2023 Fidelity ® Disruptors Fund Fidelity ® Disruptors ETF June 16, 2023 DSL-SUM-22-01 (Page 1 of 5) November 23, 2022 1.9907544.100 Fidelity believes that the Conversion will provide multiple benefits for investors of the Funds, including lower net expenses, additional trading flexibility, increased portfolio holdings transparency and the potential for enhanced tax efficiency. Each Conversion will be conducted pursuant to an Agreement and Plan of Reorganization and Liquidation (each, a “Plan”).  […] n statement/prospectus describing in detail both the Conversion and the corresponding ETFs, and a summary of the Board’s considerations in approving the Conversions. This communication provides important information about the timeline for the Conversion and actions that shareholders may need to take in advance of the Conversion. Please see the “Questions and Answers” section for more information. Effective Date Items in Connection with the Conversion Actions for Your Consideration / Event November 30, 2022 If you have an account that cannot hold an ETF. Your broker or financial intermediary may not accept purchase orders from new investors with an account that cannot hold an ETF. More information about opening a brokerage account that can hold ETFs and transferring Fund shares into it is included in the “Questions and Answers” section. (Page 2 of 5) Effective Date Items in Connection with the Conversion Actions for Your Consideration / Event April 1, 2023 Reduction in management fee rate. The management fee rate for Retail Class and Loyalty Class 1 for each Fund will be reduced to 0.50%. May 1 – May 25, 2023 Publicly available share classes will be consolidated into one class. Share classes will be systematically consolidated into Retail Class. (Please see above, Retail Class management fee rate 0.50% effective April 1, 2023). May 12, 2023 Fidelity Institutional ® clients. Purchase orders will not be accepted for new Institutional clients. June 2, 2023 Last day to purchase mutual fund shares for accounts that can hold an ETF. Final date for: Fidelity ® Disruptive Automation Fund Fidelity ® Disruptive Communications Fund Fidelity ® Disruptive Finance Fund Fidelity ® Disruptive Medicine Fund Fidelity ® Disruptive Technology Fund June 9, 2023 Final date for: Fidelity ® Disruptors Fund June 8, 2023 Last day to redeem mutual fund shares or exchange mutual fund shares for shares of another Fidelity mutual fund. If you do not want to receive shares of the ETF in connection with the Conversion, you can exchange your mutual fund shares for shares of another Fidelity mutual fund that is not participating in the Conversion or redeem your mutual fund shares. Prior to doing so, however, you should consider the tax consequences associated with either action. Final date for: Fidelity ® Disruptive Automation Fund Fidelity ® Disruptive Communications Fund Fidelity ® Disruptive Finance Fund Fidelity ® Disruptive Medicine Fund Fidelity ® Disruptive Technology Fund June 15, 2023 Final date for: Fidelity ® Disruptors Fund These dates may change if the closing date of a Conversion changes. Effective dates are as of close of business. In connection with the Conversions, an information statement/prospectus that will be included in a registration statement on Form N-14 will be filed with the Securities and Exchange Commission. After the registration statement is filed with the SEC, it may be amended or withdrawn and the information statement/prospectus will not be distributed to shareholders of the Funds unless […] ares of another Fidelity mutual fund that is not participating in a Conversion or redeem your fund shares. Prior to doing so, however, you should consider the tax consequences associated with either action. Exchange or redemption of your Fund shares may be a taxable event if you hold your shares in a taxable account. Q. What is happening to Loyalty Pricing (i.e., time-based pricing)? A. Effective April 1, 2023, all shareholders will receive the benefit of the lower pricing offered in Loyalty Class 2 — 0.50% (50 basis points). Therefore, this conversion will result in customers moving to the maximum pricing discount of the program sooner than planned. (Page 5 of 5)

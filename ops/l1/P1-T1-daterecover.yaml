roxy Statement/Prospectus. Shareholders will need brokerage accounts with the ability to transact in ETF shares in connection with the reorganization. The IMPORTANT NOTICE ABOUT YOUR TARGET FUND ACCOUNT—QUESTIONS AND ANSWERS that follows includes a description of required actions for shareholders who hold shares of the Target Fund in accounts t […] et Fund. The Target Fund will continue to contact shareholders asking them to vote until it is sure that a quorum will be reached, and may continue to contact shareholders thereafter. Q. Why has the Board approved the Reorganization? A. The Reorganization has been recommended by the Adviser and has been carefully reviewed and approved by the Board. Based on its review, the Board believes that the Reorganization will result in multiple benefits for investors, including, among others: · Improved tax efficiency due to the mechanics of the creation and redemption process for ETFs, which generally allows an ETF to minimize the realization of capital gains through the in-kind acquisition and redemption of securities; · The management fee of the Acquiring Fund that will apply to the Target Fund following the Reorganization is the same as the Target Fund’s current management fee; and · Additional trading flexibility due to the listing of Acquiring Fund shares on an exchange, which would enable investors to purchase or sell shares of the Fund throughout the trading day based on market prices. The Board, including all of the Trustees who are not “interested persons” of the Target Fund (as defined in the Investment Company Act of 1940 (the “1940 Act”)), determined that the Reorganization is in the best interests of the Target Fund and its shareholders and that the Target Fund shareholders’ interests will not be diluted as a result of the Reorganization. Q. Do the Funds have similar investment objectives, policies and risks? A. The Target Fund and the Acquiring Fund have similar investment objectives and policies and are managed by the same portfolio managers, but th […] , but such risks differ primarily due to the Target Fund’s stated investment policy regarding fixed income securities and because the Acquiring Fund is subject to certain risks unique to operating as an ETF ( e.g. , Market Trading Risk and Premium/Discount Risk). We discuss these risks in the Combined Proxy Statement/Prospectus. Q. How will the Reorganization affect me as a shareholder? A. If the Reorganization is consummated, you will cease to be a shareholder of the Target Fund and will become a shareholder of the Acquiring Fund. Upon completion of the Reorganization, you will own shares of the Acquiring Fund having an aggregate NAV equal to the aggregate NAV of the shares of the Target Fund you owned immediately prior to the Reorganization, with cash being received in lieu of fractional shares. Shares of the Acquiring Fund will be transferred to your brokerage account, or, if you do not have a brokerage account, the shares wil […] separately managed accounts (the “SMAs”) will also be transferred to the Acquiring Fund (the “Additional Transactions”). Shareholders of the Green Owl Fund are not required to vote on the Reorganization or the Additional Transactions and are receiving a separate information statement/prospectus for shares issued in connection with the reorganization of their fund. The consummation of one proposed reorganization is not contingent upon the consummation of the other proposed reorganization. Q. Will the fees and expenses of the Acquiring Fund be higher than the fees and expenses of the Target Fund? A. No. The management fee of the Acquiring Fund is the same as the management fee of the Target Fund and the management fee with respect to each of the Target Fund and Acquiring Fund is a “unitary”  […] holders have to pay any sales load, commission or other similar fee in connection with the Reorganization? A. No. Shareholders will not pay any sales load, commission or other similar fee in connection with the Reorganization. Q. Who will pay the costs in connection with the Reorganization? A. The Adviser will pay all of the costs and expenses resulting from the Reorganization, whether or not the Reorganization is consummated. Costs of the Reorganization, which are estimated to be approximately $[•], will not be borne by the Target Fund or the Acquiring Fund. Q. Will there be any costs associated with portfolio repositioning? Reorganization costs do not include any repositioning costs arising from sales of portfolio assets by the Target Fund before the Reorganization, which costs will be borne by the Target Fund. However, because the Target Fund’s investment objectives and policies are substantially similar to those of the Acquiring Fund, it is not currently expected that any significant portfolio sales will occur solely in connection with the Reorganization (such sales are expected to be less than 5% of the assets of the Target Fund). Q. What are the U.S. federal income tax consequences of the Reorganization? A. The Reorganization is expected to qualify as a tax-free reorganization for U.S. federal income tax purposes. Accordingly, it is expected that Target Fund shareholders who receive shares of the Acquiring Fund in the Reorganization will not recognize gain or loss as a direct result of the Reorganization (except with respect to cash received in lieu of fractional shares of the Acquiring Fund). Prior to the closing of the Reorganization, the Target Fund expects to declare a distribution of all its net investment income and net capital gains, if any. All or a portion of such distribution made by the Target Fund may be taxable to the Target Fund’s shareholders for U.S. federal income tax purposes. In addition, to the extent that portfolio securities of the Target Fund are sold in connection with any portfolio repositioning prior to the closing of the Reorganization, the Target Fund may realize gains or losses, which may increase or decrease the net capital gains or net investment income to be distributed by the Target Fund. For more information see the section of the enclosed Combined Proxy Statement/Prospectus entitled “Additional Information about the Reorganization—U.S. Federal Income Tax Status of the Reorganization.” Q. […] d mutual fund shares, you will need to set up a brokerage account that allows investment in ETF shares. A separate Q&A is provided to help you determine your account type and provide information about changing your type of account if necessary. If shares are held in an account that cannot accept ETF shares at the time of the Reorganization of the Target Fund, Acquiring Fund shares received in the Reorganization will be held by a stock transfer agent, American Stock Transfer (“AST”), on behalf of the accountholder, until a brokerage account is identified into which AST can transfer the shares. Any Acquiring Fund shares held by the stock transfer agent on behalf of a shareholder will be treated as being held by such shareholder fo

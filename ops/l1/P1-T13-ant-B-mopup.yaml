    halts and/or delisting. The Fund’s novel structure may affect the number of entities willing to act
    as Authorized Participants, and this risk may be exacerbated during times of market stress. • Predatory
    Trading Practices Risk: Although the Fund seeks to benefit from keeping its portfolio holdings information

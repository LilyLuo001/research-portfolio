    \ confidential, other traders may attempt to use the Proxy Portfolio and other publicly available\
    \ information to identify the fund’s trading strategy, which, if successful, could result in such\
    \ traders engaging in certain predatory trading practices that may have the potential to harm such\
    \ fund and its shareholders. Because each fund’s shares are traded in the secondary market, a broker\
    \ may charge a commission to execute a transaction in shares, and you may incur the cost of the spread\
    \ between the price at which a dealer will buy shares and the somewhat higher price at which a dealer\
    \ will sell shares. Each fund’s website provides additional information about the Proxy Portfolio;\
    \ the prior business day’s NAV and the closing price or bid/ask price of shares; a calculation of\
    \ the premium/discount of the closing price or bid/ask price against such NAV; bid-ask spread information;\
    \ any other information regarding premiums and discounts as may be required for other ETFs under Rule\
    \ 6c-11 under the 1940 Act; and certain analytical information described above (Portfolio Overlap,\
    \ Daily Deviation, Empirical Percentiles, and Tracking Error). T. Rowe Price will monitor on an ongoing\
    \ basis how shares trade, including the level of any market price premium or discount to NAV and the\
    \ bid/ask spreads on market transactions. T. Rowe Price will promptly call a meeting of a fund’s Board\
    \ (defined below) (and will present recommendations for appropriate remedial measures) and the Board\
    \ will promptly meet (1) if the Tracking Error exceeds 1.00%; or (2) if, for 30 or more days in any\
    \ quarter or 15 days in a row: (a) the absolute difference between either the closing price or the\
    \ bid/ask price, on the one hand, and the fund’s NAV, on the other, exceeds 2.00%, or (b) the bid-ask\
    \ spread exceeds 2.00%. In such a circumstance, the Board will consider the continuing viability of\
    \ the fund, whether shareholders are being harmed, and what, if any, action would be appropriate to,\
    \ among other things, narrow the premium/discount or spread, as applicable. The Board will then decide\
    \ whether to take 3 any such action. Such actions may include, but are not limited to, changing lead\
    \ market makers, listing the fund on a different exchange, changing the size of Creation Units, changing\

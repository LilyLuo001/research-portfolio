    and may result in higher taxes for you if your Fund shares are held in a taxable account. These costs,
    which are not reflected in annual fund operating expenses or in the example, affect the Fund’s performance.
    Investments, Risks and Performance Principal Investment Strategies Under normal market conditions,
    the Fund will invest primarily in exchange-traded U.S.-listed common stocks and other exchange-traded
    equity securities. Exchange-traded equity securities may include, for example, other exchange-traded
    funds (“ETFs”), exchange-traded notes, exchange-traded preferred stocks, and exchange-traded real
    estate investment trusts (“REITs”). The Fund focuses on stocks of large capitalization companies,
    but the Fund may invest in companies of any size. The Fund normally invests across a wide range of
    sectors and industries. The Fund is non-diversified, which means that it may invest a greater percentage
    of its assets in a particular issuer and may invest in fewer issuers than a diversified fund. The
    Fund’s portfolio will hold approximately 20 to 30 securities. The Fund’s portfolio manager employs
    a growth style of equity management that emphasizes companies with sustainable competitive advantages
    versus others, long-term structural growth drivers that will lead to above-average future cash flow
    growth, attractive cash flow returns on invested capital, and management teams focused on creating
    long-term value for shareholders. The Fund’s portfolio manager aims to invest in companies when they
    trade at a significant discount to the estimate of intrinsic value (i.e., companies with share prices
    trading significantly below what the portfolio manager believes the share price should be based on
    proprietary discount cash flow models). The Fund will consider selling a portfolio investment when
    the portfolio manager believes an unfavorable structural change occurs within a given business or
    the markets in which it operates, a critical underlying investment assumption is flawed, when a more
    attractive reward-to-risk opportunity becomes available, when the portfolio manager believes the current
    price fully reflects intrinsic value, or for other investment reasons which the portfolio manager
    deems appropriate. Although certain equity securities purchased by the Fund may be issued by domestic
    companies incorporated outside of the United States, Loomis, Sayles & Company, L.P. (“Loomis Sayles”)
    does not consider these securities to be foreign securities if they are included in the U.S. equity
    indices published by S&P Global Ratings or Russell Investments or if the security’s country of risk
    defined by Bloomberg is the United States. Non-Transparent ETF with Proxy Portfolio Structure. The
    Fund is a type of exchange traded fund (“ETF”). Unlike traditional ETFs, however, which generally
    publish their portfolio holdings on a daily basis, the Fund discloses a portfolio transparency substitute—the
    “Proxy Portfolio”—and certain related information about the relative performance of the Proxy Portfolio
    and the Fund’s actual portfolio (“Actual Portfolio”) holdings (the “Proxy Portfolio Disclosures”),
    which are intended to help keep the market price of the Fund’s shares trading at or close to the underlying
    net asset value (“NAV”) per share of the Fund. While the Proxy Portfolio includes some of the Fund’s
    holdings, it is not the Fund’s Actual Portfolio, and the Fund will not disclose the daily holdings
    of the Actual Portfolio. Although the Fund seeks to benefit from keeping its portfolio information
    secret, market participants may attempt to use the Proxy Portfolio to identify the Fund’s trading
    strategy, which if successful, could result in such market participants engaging in certain predatory
    trading practices that may have the potential to harm the Fund and its shareholders. The Fund’s exemptive

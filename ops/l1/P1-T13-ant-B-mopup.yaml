    American depositary receipts, exchange-traded real estate investment trusts, exchange-traded commodity
    pools, exchange-traded metals trusts, exchange-traded currency trusts and exchange-traded futures
    that trade contemporaneously with Fund shares, as well as cash and cash equivalents (together, the
    “Permissible Investments”). This section provides additional information about some of the securities
    and other practices in which the Fund may engage, along with their associated risks. Information About

    REITs in which the Fund may invest may be considered equity securities, thus subjecting the Fund to
    the risks of investing in equity securities generally. 3 Back To Table of Contents Fund Summary Foreign
    Securities Risk: Investments in foreign securities may be subject to greater political, economic,

    \ Dec 31 Dec 31 June 30 May 1 THE CORPORATION AND ITS FUNDS T. Rowe Price Exchange-Traded Funds, Inc.\
    \ was incorporated as a Maryland corporation on July 29, 2019, and is an open-end management investment\
    \ company registered under the 1940 Act. The Corporation is authorized to have multiple series funds\
    \ or portfolios and currently consists of five funds. This SAI contains information on each of those\
    \ funds. Each fund is an ETF that does not disclose portfolio holdings daily. Each fund offers, issues\
    \ and sells shares at its net asset value ( NAV ) per share only in aggregations of a specified number\
    \ of shares ( Creation Units ), generally 5,000 shares and multiples thereof. Creation Units will\
    \ generally be purchased and redeemed on an in-kind basis. Accordingly, except where the purchase\
    \ or redemption will include cash under the circumstances described below under the “Purchase and\
    \ Redemption of Creation Units” section, purchasers will be required to purchase Creation Units by\
    \ making an in-kind deposit of specified instruments ( Deposit Securities ), and shareholders redeeming\
    \ their shares will receive an in-kind transfer of specified instruments ( Redemption Securities ).\
    \ Only Authorized Participants, which are members or participants of a clearing agency registered\
    \ with the SEC that have a written agreement with a fund or one of its service providers, may purchase\
    \ and redeem of Creation Units. A fund may charge purchase/redemption transaction fees for each purchase\
    \ and redemption. In all cases, redemption transaction fees 2 will be limited in accord […] substitution\
    \ of Deposit Securities in lieu of cash. Shares may be issued in advance of receipt of Deposit Securities,\
    \ subject to various conditions, including a requirement that the Authorized Participant maintain\
    \ a cash deposit equal to at least 115% of the market value of the undelivered Deposit Securities,\
    \ which percentage T. Rowe Price may change from time to time, of the market value of the omitted\
    \ Deposit Securities. The Corporation may use such cash deposit at any time to purchase Deposit Securities.\
    \ See the “Purchase and Redemption of Creation Units” section below. The names and quantities of the\
    \ instruments that constitute the Deposit Instruments and the Redemption Instruments for a fund will\
    \ be the same as the fund’s designated “ Proxy Portfolio ” (a basket of cash and securities that is\
    \ designed to closely track the daily performance of a fund’s portfolio), except to the extent that\
    \ the fund requires purchases and redemptions to be made entirely or in part on a cash basis, as described\
    \ below under the “Purchase and Redemption of Creation Units” section or, in a case where the fund’s\
    \ designated Proxy Portfolio is a broad-based securities index, the Deposit Instruments and the Redemption\
    \ Instruments for the fund may be an existing ETF which tracks the same broad-based securities index.\
    \ While the Proxy Portfolio includes some of a fund’s holdings, it is not the fund’s actual portfolio.\
    \ Each fund will also provide several portfolio statistics. The “ Portfolio Overlap ” is the percentage\
    \ weight overlap between the holdings of the prior business day’s Proxy Portfolio compared to the\
    \ holdings of the fund that formed the basis for that fund’s calculation of NAV at the end of the\
    \ prior business day. The Portfolio Overlap is calculated by taking the lesser weight of each asset\

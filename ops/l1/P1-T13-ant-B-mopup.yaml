    Federal Deposit Insurance Corporation or any other government agency, and are subject to investment
    risks, including possible loss of the principal invested. 2 Fund Summary The significance of any specific
    risk to an investment in the Fund will vary over time, depending on the composition of the Fund’s
    portfolio, market conditions, and other factors. You should read all of the risk information presented
    below carefully, because any one or more of these risks may result in losses to the Fund. Proxy Portfolio
    Structure Risk: Unlike traditional ETFs that provide daily disclosure of their portfolio holdings,
    the Fund does not disclose the daily holdings of the Actual Portfolio. Instead, the Fund discloses
    a Proxy Portfolio daily that is designed to reflect the economic exposure and risk characteristics
    of the Fund’s Actual Portfolio on any given trading day. Although the Proxy Portfolio and Proxy Portfolio
    Disclosures are intended to provide authorized participants (“Authorized Participants”) and other
    market participants with enough information to allow them to engage in effective arbitrage transactions
    that will keep the market price of the Fund’s shares trading at or close to the underlying NAV per
    share of the Fund, while at the same time enabling them to establish cost- effective hedging strategies
    to reduce risk, there is a risk that market prices will vary significantly from the underlying NAV
    of the Fund. See “Premium/Discount Risk.” Similarly, shares of the Fund may trade at a wider bid/ask
    spread than shares of traditional ETFs, and may therefore be more costly for investors to trade. See
    “Trading Issues Risk.” Also, the Fund will incur expenses to license the Proxy Portfolio mechanism,
    which may impact shareholder returns. Additionally, the proxy mechanism itself may result in additional
    trading costs, which also may negatively impact shareholder returns. In addition, although the Proxy
    Portfolio is designed to protect the Fund from predatory practices such as front-running and free-riding,
    market participants may nevertheless be able to use the Proxy Portfolio and Proxy Portfolio Disclosures
    to engage in trading practices that disadvantage the Fund. See “Predatory Trading Practices Risk.”
    The Fund will monitor on an ongoing basis the premium/discount between the market price and the NAV
    of the Fund’s shares, but there can be no assurance that the Proxy Portfolio methodology will operate
    as intended. The Proxy Portfolio methodology is relatively novel and may not be an effective arbitrage
    mechanism under all market conditions. Similarly, the Proxy Portfolio methodology may be more prone
    to operational error than more traditional ETFs. The effectiveness of the Proxy Portfolio methodology
    as an arbitrage mechanism is contingent upon, among other things, the effectiveness of the Fund’s
    Factor Model analysis in creating a Proxy Portfolio that performs in a manner substantially identical
    to the performance of the Fund’s Actual Portfolio and the willingness of Authorized Participants and
    other market participants to trade based on the Proxy Portfolio. In the event that the Proxy Portfolio
    methodology does not result in effective arbitrage opportunities in the Fund shares, the Fund may
    exhibit wider premiums/discounts, bid/ask spreads and tracking error. At certain thresholds for such
    premiums/discounts, bid/ask spreads and tracking error, the Fund’s Board of Trustees will consider
    possible remedial measures, which may include liquidation or conversion to a fully-transparent, active
    ETF or a mutual fund. • Premium/Discount Risk: Shares of the Fund are listed for trading on the NYSE
    Arca, Inc. (the “NYSE Arca”) and are bought and sold in the secondary market at market prices that
    may differ from their most recent NAV. The market value of the Fund’s shares will fluctuate, in some
    cases materially, in response to changes in the Fund’s NAV, the intraday value of the Fund’s holdings,
    and the relative supply and demand for the Fund’s shares on the exchange. Although the Proxy Portfolio
    is intended to provide investors with enough information to allow for an effective arbitrage mechanism
    that will keep the market price of the Fund at or close to the Fund’s NAV, there is a risk (which
    may increase during periods of market disruption or volatility) that market prices for Fund shares
    will vary significantly from the Fund’s NAV. This risk may be greater for the Fund than for traditional
    ETFs that disclose their full portfolio holdings on a daily basis because the publication of the Proxy
    Portfolio does not provide the same level of transparency as the publication of the full portfolio
    by a fully transparent active ETF. This could cause the Fund’s shares to have wider bid/ask spreads
    and larger premiums/discounts than fully transparent ETFs using the same investment strategies. Disruptions
    to creations and redemptions, the existence of extreme market volatility or potential lack of an active
    trading market for shares may result in shares trading at a significant premium or discount to NAV
    and/or in a reduced liquidity of your investment. During such periods, you may be unable to sell your
    shares or may incur significant losses if you sell your shares. There are various methods by which
    investors can purchase and sell shares and various types of orders that may be placed. Investors should
    consult their financial intermediary before purchasing or selling shares of the Fund. If a shareholder
    purchases shares at a time when the market price is at a premium to the NAV or sells shares at a time
    when the market price is at a discount to the NAV, the shareholder may sustain losses. • Authorized
    Participant Concentration Risk: Only an Authorized Participant may engage in creation or redemption
    transactions directly with the Fund. The Fund has a limited number of institutions that act as Authorized

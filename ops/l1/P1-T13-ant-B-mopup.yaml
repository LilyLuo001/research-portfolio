    invests at least 80% of its assets in equity securities, including exchange-traded common stocks and
    exchange-traded preferred stocks. Under normal market conditions, the Fund will invest at least 80%
    of its assets in securities of U.S. issuers. The Fund’s approach to equity investing combines the
    styles of two subadvisers in selecting securities for each of the Fund’s segments. The segments and
    their subadvisers are listed below. • Harris Associates - Large Cap Value segment - Under normal circumstances,
    the Large Cap Value segment of the Fund managed by Harris Associates L.P. (“Harris Associates”) will
    invest primarily in the exchange-traded common stocks of larger- capitalization companies that Harris
    Associates believes are 1 Back To Table of Contents Fund Summary trading at a substantial discount
    to the company’s “intrinsic value.” By “intrinsic value,” Harris Associates means its estimate of
    the price a knowledgeable buyer would pay to acquire the entire business. Harris Associates believes
    that investing in securities priced significantly below what Harris Associates believes is a company’s
    intrinsic value presents the best opportunity to achieve the Fund’s investment objectives. Harris
    Associates usually sells a security when the price approaches its estimated value and monitors each
    holding and adjusts its price targets as warranted to reflect changes in the issuer’s fundamentals.
    In determining whether an issuer is a U.S. or foreign issuer for the Harris Associates – Large Cap
    Value segment, Harris Associates considers various factors, including its country of domicile, the
    primary stock exchange on which it trades, the location from which the majority of its revenue comes,
    and its reporting currency. • Loomis Sayles - All Cap Growth segment - Under normal circumstances,
    the All Cap Growth segment of the Fund, managed by Loomis, Sayles & Company, L.P. (“Loomis Sayles”),
    will invest primarily in equity securities, including exchange-traded common stocks and exchange-traded
    preferred stocks. This segment may invest in companies of any size. The segment normally invests across
    a wide range of sectors and industries. The segment’s portfolio manager employs a growth style of
    equity management that emphasizes companies with sustainable competitive advantages, long-term structural
    growth drivers, attractive cash flow returns on invested capital, and management teams focused on
    creating long-term value for shareholders. The segment’s portfolio manager aims to invest in companies
    when they trade at a significant discount to the estimate of intrinsic value. The segment will consider
    selling a portfolio investment when the portfolio manager believes an unfavorable structural change
    occurs within a given business or the markets in which it operates, a critical underlying investment
    assumption is flawed, when a more attractive reward-to-risk opportunity becomes available, when the
    portfolio manager believes the current price fully reflects intrinsic value, or for other investment
    reasons which the portfolio manager deems appropriate. Although certain equity securities purchased
    by the Loomis Sayles – All Cap Growth segment of the Fund may be issued by domestic companies incorporated
    outside of the United States, Loomis Sayles does not consider these securities to be foreign if they
    are included in the U.S. equity indices published by S&P Global Ratings or Russell Investments or
    if the security’s country of risk defined by Bloomberg is the United States. Subject to the allocation
    policy adopted by the Fund’s Board of Trustees, Natixis Advisors, L.P. (“Natixis Advisors”) generally
    allocates capital invested in the Fund equally (i.e., 50%) between its two segments. Under the allocation
    policy, Natixis Advisors may also allocate capital away from or towards each segment from time to
    time and may reallocate capital between the segments. Each subadviser manages its segment of the Fund’s
    assets in accordance with its distinct investment style and strategy. Non-Transparent ETF with Proxy
    Portfolio Structure. The Fund is a type of exchange traded fund (“ETF”). Unlike traditional ETFs,
    however, which generally publish their portfolio holdings on a daily basis, the Fund discloses a portfolio
    transparency substitute—the “Proxy Portfolio”—and certain related information about the relative performance
    of the Proxy Portfolio and the Fund’s actual portfolio (“Actual Portfolio”) holdings (the “Proxy Portfolio
    Disclosures”), which are intended to help keep the market price of the Fund’s shares trading at or
    close to the underlying net asset value (“NAV”) per share of the Fund. While the Proxy Portfolio includes
    some of the Fund’s holdings, it is not the Fund’s Actual Portfolio, and the Fund will not disclose
    the daily holdings of the Actual Portfolio. Although the Fund seeks to benefit from keeping its portfolio
    information secret, market participants may attempt to use the Proxy Portfolio to identify the Fund’s
    trading strategy, which if successful, could result in such market participants engaging in certain
    predatory trading practices that may have the potential to harm the Fund and its shareholders. The
    Fund’s exemptive relief limits the types of securities in which the Fund can invest, which may constrain
    the Fund’s ability to implement its investment strategies. The Fund is actively-managed and does not
    intend to track an index. Principal Investment Risks The principal risks of investing in the Fund
    are summarized below. The Fund does not represent a complete investment program. You may lose money
    by investing in the Fund. The significance of any specific risk to an investment in the Fund will
    vary over time, depending on the composition of the Fund’s portfolio, market conditions, and other
    factors. You should read all of the risk information presented below carefully, because any one or
    more of these risks may result in losses to the Fund. Proxy Portfolio Structure Risk: Unlike traditional
    ETFs that provide daily disclosure of their portfolio holdings, the Fund does not disclose the daily
    holdings of the Actual Portfolio. Instead, the Fund discloses a Proxy Portfolio that is designed to
    reflect the economic exposure and risk characteristics of the Fund’s Actual Portfolio on any given
    trading day. Although the Proxy Portfolio and Proxy Portfolio Disclosures are intended to provide
    Authorized Participants and other market participants with enough information to allow them to engage
    in effective arbitrage transactions that will keep the market price of the Fund’s shares trading at
    or close to the underlying NAV per share of the Fund, while at the same time enabling them to establish
    cost-effective hedging strategies to reduce risk, there is a risk that market prices will vary significantly
    from the underlying NAV of the Fund. See “Premium/Discount Risk.” Similarly, shares of the Fund may
    trade at a wider bid/ask spread than shares of traditional ETFs, and may therefore be more costly
    for investors to trade. See “Trading Issues Risk.” Also, the Fund will incur expenses to license the
    Proxy Portfolio mechanism, which may impact shareholder returns. Additionally, the proxy mechanism
    itself may result in additional trading costs, which also may negatively impact shareholder returns.
    In addition, although the Proxy Portfolio is designed to protect the Fund from predatory practices
    such as front-running and free-riding, market participants may nevertheless be able to use the Proxy
    Portfolio and Proxy Portfolio Disclosures to engage in trading practices that disadvantage the Fund.
    See “Predatory Trading Practices Risk.” The Fund will monitor on an ongoing basis the premium/discount
    between the market price and the NAV of the Fund’s shares, but there can be no assurance that the
    Proxy Portfolio methodology will operate as intended. The Proxy Portfolio methodology is novel and
    not yet proven as an effective arbitrage mechanism. The effectiveness of the Proxy Portfolio methodology
    as an arbitrage mechanism is contingent upon, among other things, the effectiveness of the Fund’s
    Factor Model analysis in creating a Proxy Portfolio that performs in a manner substantially identical
    to the performance of the Fund’s Actual Portfolio and the willingness of Authorized Participants and
    other market participants to trade based on the Proxy Portfolio. In the event that the Proxy Portfolio
    methodology does not result in effective 2 Back To Table of Contents Fund Summary arbitrage opportunities
    in the Fund shares, the Fund may exhibit wider premiums/discounts, bid/ask spreads and tracking error.
    At certain thresholds for such premiums/discounts, bid/ask spreads and tracking error, the Fund’s
    Board of Trustees will consider possible remedial measures, which may include liquidation or conversion
    to a fully-transparent, active ETF or a mutual fund. • Premium/Discount Risk: Shares of the Fund are
    listed for trading on the NYSE Arca, Inc. (the “NYSE Arca”) and are bought and sold in the secondary
    market at market prices that may differ from their most recent NAV. The market value of the Fund’s
    shares will fluctuate, in some cases materially, in response to changes in the Fund’s NAV, the intraday
    value of the Fund’s holdings, and the relative supply and demand for the Fund’s shares on the exchange.
    Although the Proxy Portfolio is intended to provide investors with enough information to allow for
    an effective arbitrage mechanism that will keep the market price of the Fund at or close to the Fund’s
    NAV, there is a risk (which may increase during periods of market disruption or volatility) that market
    prices for Fund shares will vary significantly from the Fund’s NAV. This risk may be greater for the
    Fund than for traditional ETFs that disclose their full portfolio holdings on a daily basis because
    the publication of the Proxy Portfolio does not provide the same level of transparency as the publication
    of the full portfolio by a fully transparent active ETF. This could cause the Fund’s shares to have
    wider bid/ask spreads and larger premiums/discounts than fully transparent ETFs using the same investment
    strategies. Disruptions to creations and redemptions, the existence of extreme market volatility or
    potential lack of an active trading market for shares may result in shares trading at a significant
    premium or discount to NAV and/or in a reduced liquidity of your investment. During such periods,
    you may be unable to sell your shares or may incur significant losses if you sell your shares. There
    are various methods by which investors can purchase and sell shares and various types of orders that
    may be placed. Investors should consult their financial intermediary before purchasing or selling
    shares of the Fund. If a shareholder purchases shares at a time when the market price is at a premium
    to the NAV or sells shares at a time when the market price is at a discount to the NAV, the shareholder
    may sustain losses. • Authorized Participant Concentration Risk: Only an authorized participant (“Authorized
    Participant”) may engage in creation or redemption transactions directly with the Fund. The Fund has
    a limited number of institutions that act as Authorized Participants, none of which are or will be
    obligated to engage in creation or redemption transactions. To the extent that these institutions
    exit the business or are unable to proceed with creation and/or redemption orders with respect to
    the Fund and no other Authorized Participant is able to step forward to create or redeem Creation
    Units, Fund shares may trade at a discount to NAV and possibly face trading halts and/or delisting.
    The Fund’s novel structure may affect the number of entities willing to act as Authorized Participants,
    and this risk may be exacerbated during times of market stress. • Predatory Trading Practices Risk:
    Although the Fund seeks to benefit from keeping its portfolio holdings information secret, market
    participants may attempt to use the Proxy Portfolio and related Proxy Portfolio Disclosures to identify
    the Fund’s holdings and trading strategy. If successful, this could result in such market participants
    engaging in predatory trading practices that could harm the Fund and its shareholders. The Proxy Portfolio
    and related Proxy Portfolio Disclosures have been designed to minimize the risk that market participants
    could “reverse engineer” the Fund’s portfolio and investment strategy, but they may not be successful
    in this regard. • Trading Issues Risk: Trading in Fund shares on the NYSE Arca may be halted in certain
    circumstances. If 10% or more of the Fund’s Actual Portfolio does not have readily available market
    quotations, the Fund will promptly request that the NYSE Arca halt trading in the Fund’s shares. Such
    trading halts may have a greater impact on the Fund compared to other ETFs due to its lack of transparency.
    If the trading of a security held in the Fund’s Actual Portfolio is halted or otherwise does not have
    readily available market quotations and the Adviser believes that the lack of any such readily available
    market quotations may affect the reliability of the Proxy Portfolio as an arbitrage vehicle or otherwise
    determines it is in the best interest of the Fund, the Adviser promptly will disclose on the Fund’s
    website the identity and weighting of such security for so long as such security’s trading is halted
    or otherwise does not have readily available market quotations and remains in the Actual Portfolio.There
    can be no assurance that the requirements of the NYSE Arca necessary to maintain the listing of the
    Fund will continue to be met. Because the Fund trades on the basis of a published Proxy Portfolio,
    it may trade at a wider bid/ask spread and may experience a wider premium/discount than traditional
    ETFs that publish their portfolios on a daily basis, and therefore, may cost investors more to trade
    especially during periods of market disruption or volatility. • Tracking Error Risk: Although the
    Proxy Portfolio is designed to reflect the economic exposure and risk characteristics of the Fund’s
    Actual Portfolio on any given trading day, there is a risk that the performance of the Proxy Portfolio
    will diverge from the performance of the Actual Portfolio, potentially materially. Allocation Risk:
    The Fund’s investment performance depends on how its assets are allocated. The allocation, as set
    forth above, may not be optimal in every market condition. You could lose money on your investment
    in the Fund as a result of this allocation. Equity Securities Risk: The value of the Fund’s investments
    in equity securities could be subject to unpredictable declines in the value of individual securities
    and periods of below-average performance in individual securities or in the equity market as a whole.
    Growth stocks are generally more sensitive to market movements than other types of stocks primarily

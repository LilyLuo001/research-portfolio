    In the event an issuer is liquidated or declares bankruptcy, the claims of owners of the issuer’s
    bonds generally take precedence over the claims of those who own preferred stock or common stock.
    Securities of real estate-related companies and REITs in which the Fund may invest may be considered
    equity securities, thus subjecting the Fund to the risks of investing in equity securities generally.
    Liquidity Risk: Liquidity risk is the risk that the Fund may be unable to find a buyer for its investments
    when it seeks to sell them or to receive the price it expects. Decreases in the number of financial

    spread and may experience a wider premium/discount than traditional ETFs that publish their portfolios
    on a daily basis, and therefore, may cost investors more to trade especially during periods of market
    disruption or volatility. • Tracking Error Risk: Although the Proxy Portfolio is designed to reflect
    the economic exposure and risk characteristics of the Fund’s Actual Portfolio on any given trading
    day, there is a risk that the performance of the Proxy Portfolio will diverge from the performance
    of the Actual Portfolio, potentially materially. Equity Securities Risk: The value of the Fund’s investments

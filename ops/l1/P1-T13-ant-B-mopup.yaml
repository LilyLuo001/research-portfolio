    Commission has not approved or disapproved these securities or determined if this prospectus is truthful
    or complete. Any representation to the contrary is a criminal offense. Shares of Thrivent ETF Trust
    are not deposits or other obligations of Thrivent Trust Company or any bank or insured or otherwise

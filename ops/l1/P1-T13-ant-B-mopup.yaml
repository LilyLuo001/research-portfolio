    year as a percentage of the value of your investment) Management Fees 0.65% Other Expenses 0.00% Total
    Annual Fund Operating Expenses 0.65% Example This example is intended to help you compare the cost
    of investing in the Fund with the cost of investing in other funds. The example assumes that you invest
    $10,000 in the Fund for the time periods indicated (whether or not shares are sold or redeemed), and

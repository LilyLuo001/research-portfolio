      497K 1 d142752d497k.htm PUTNAM FOCUSED EQUITY FUND Putnam Focused Equity Fund 39115-P2 03/26 PUTNAM FUNDS TRUST SUPPLEMENT DATED MARCH 30, 2026 TO THE SUMMARY PROSPECTUS AND PROSPECTUS EACH DATED JANUARY 1, 2026 OF PUTNAM FOCUSED EQUITY FUND (THE “FUND”) I. Proposed Conversion of the Fund to an ETF For all existing and prospective shareholders of the Fund: • The Fund will be converted from a mutual fund to an exchange-traded fund. This conversion is anticipated to occur in or around the fourth quarter of 2026. • If you are an existing shareholder of the Fund, and your account can hold an exchange-traded fund, your Fund shares will be converted, and no action is needed by you . • If you hold shares of the Fund in an account that cannot hold an exchange-traded fund (i.e., your account is not permitted to purchase securities traded in the stock market), there are certain actions you can take. • The conversion does not require your approval, and you are not being asked to vote. At a meeting on March 27, 2026, the Board of Trustees of the Putnam Funds (the “Board”) approved the conversion of the Fund into an exchange-traded fund through the reorganization of the Fund with and into a new […] ses and that shareholders will not recognize any gain or loss in connection with the reorganization, except to the extent that they receive cash in connection with the redemption of any shares and/or fractional shares before the reorganization, as described above. It is anticipated that the reorganization would occur in or around the fourth quarter of 2026. II. Waivers of Sales Charges Effective May 29, 2026, any front-end sales charges applicable to the purchase of Fund shares or contingent deferred sales charges applicable to the redemption of Fund shares will be waived. III. Close of Fund to New Investors Effective August 3, 2026, the Fund will not accept purchase orders from new investors. QUESTIONS AND ANSWERS Q: Why is the Fund being converted to an exchange-traded fund? A: Putnam Management and the Board believe that the conversion will provide multiple benefits for shareholders of the Fund, including lower net expenses, additional trading flexibility, potentially more efficient portfolio management, and increased portfolio holdings transparency. 3 Q: What are the differences between an exchange-traded fund and a mutual fund? A: Exchange-traded funds are structurally different from mutual funds in several important aspects: • A mutual fund may offer multiple share classes with different sales charges, expenses, and/or minimum investments. An exchange-traded fund will not issue multiple classes of shares. • A mutual fund investor may purchase and redeem shares directly from the mutual fund (through a distributor or a financial intermediary). Most exchange-traded fund investors will buy and sell shares in secondary market transactions through brokers. • A mutual fund will accept purchase and redemption orders from any shareholders on days that the mutual fund is open for business, and those orders will be effected at that day’s NAV. An exchange-traded fund will issue or redeem shares at its NAV per share only in one or more groupings of a specified large number of shares called a “Creation Unit,” on days that the exchange-traded fund is open for business. Only an exchange-traded fund’s “authorized participants” are permitted to engage in creation or redemption transactions directly with the exchange-traded fund. All other shareholders will buy and sell shares of the exchange-traded fund on an exchange at market prices. The principal risks of an investment in the ETF will be substantially similar to the principal risks of an investment in the Fund, except that, as a shareholder of the ETF, you would also be subject to risks related to its ETF structure. These risks include the risk that shares of the ETF will trade at market prices that are above (premium) or below (discount) NAV or that the ETF’s “authorized participants” will not engage in creation or redemption transactions, which could cause the ETF’s shares to trade at a discount to NAV and possibly face trading halts and/or delisting from the securities exchange on which they trade. Following the conversion, shareholders may bear certain costs with respect to maintaining brokerage accounts and buying and selling ETF shares in the secondary market that shareholders do not experience as shareholders of the Fund. 4 Q: How is the ETF expected to be managed after the change? A: The ETF is expected to be managed in substantially the same manner as the Fund, with no changes to the investment goal or investment adviser and with substantially similar principal investment strategies. The ETF is expected to be managed by the same portfolio managers as the Fund. The foregoing is not an offer to sell, nor a solicitation of an offer to buy, shares of the ETF, nor is it a solicitation of any proxy. For more information regarding the ETF, or to receive a free copy of the prospectus/information statement relating to the reorganization (and containing important information about fees, expenses and risk considerations) once a registration statement relating to the reorganization has been filed with the Securities and Exchange Commission and becomes effective, please call 1-800-225-1581. The prospectus/information statement relating to the reorganization will also be available for free on the Securities and Exchange Commission’s web site (http://www.sec.gov). Please read the prospectus/information statement relating to the reorganization carefully before making any investment decisions. Please retain this supplement for future reference. 5

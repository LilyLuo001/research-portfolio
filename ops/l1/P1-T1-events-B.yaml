      497K 1 d100357d497k.htm COHEN & STEERS MLP & ENERGY OPPORTUNITY FUND, INC. Cohen &amp; Steers MLP &amp; Energy Opportunity Fund, Inc. Summary Prospectus April 1, 2026 CLASS A (MLOAX), CLASS C (MLOCX), CLASS F (MLOFX), CLASS I (MLOIX), CLASS R (MLORX) AND CLASS Z (MLOZX) SHARES Cohen & Steers Future of Energy Fund, Inc. Before you invest, you may want to review the Fund’s prospectus, which contains more information about the Fund and its risks. You can find the Fund’s prospectus, reports to shareholders and other information about the Fund online at www.cohenandsteers.com/fund-literature. You can also get this information at no cost by calling 800.330.7348 or by sending an e-mail request to marketing@cohenandsteers.com. The current prospectus and statement of additional information, dated April 1, 2026, are incorporated by reference into this summary prospectus. Investment Objective The investment objective of Cohen & Steers Future of Energy Fund, Inc. (the “Fund”) is to provide attractive total return, comprised of current income and price appreciation. Fund Fees and Expenses This table describes the fees and expenses that you could pay if you buy, hold and sell shares of the Fund. […] ” in the Fund’s Statement of Additional Information (the “SAI”). If you purchase Class I or Class Z shares through a financial intermediary acting as an agent on behalf of its customers, that financial intermediary may charge you a commission. Such commissions, if any, are not charged by the Fund and are not reflected in the fee table or expense example below. Currently, R and Z shares of the Fund are publicly offered on a limited basis. Class F shares are currently not available for purchase. See “ How to Purchase, Exchange and Sell Fund Shares— Purchasing the Class of Fund Shares that Is Best for You” in the Prospectus for more information. At a meeting held on March 10, 2026, the Board of Directors (the “Board”) of the Fund approved the conversion of the Fund into an exchange-traded fund, the Cohen & Steers Future of Energy Active ETF (the “Acquiring Fund”), a newly created series of the Cohen & Steers ETF Trust (the “Conversion”). The Conversion is currently expected to occur on or about June 12, 2026. Effective March 11, 2026, no initial sales charge will be imposed on Class A shares, and no contingent deferred sales charge (“CDSC”) will be imposed on redemptions of Class A or C shares. Effective June 1, 2026, the Distribution (12b-1) Fees on Class A, C and R shares will be waived. Class A, Class C, Class R and Class Z shares of the Fund will be consolidated into Class I shares (without a CDSC or other charge) on or about June 5, 2026. Class A Class C Class F (1) Class I Class R (1) Class Z (1) Shareholder Fees (fees paid directly from your investment) : Maximum Sales Charge (Load) Imposed On Purchases (as % of offering price) None None None None None None Maximum Deferred Sales Charge (Load) (as % of the net asset value at the time of purchase or redemption, whichever is lower) None None None None None None Class A Class C Class F (1) Class I Class R (1) Class Z (1) Annual Fund Operating Expenses (expenses that you pay each year as a percentage of the value of your investment) : Management Fee 0.80% 0.80% 0.80% 0.80% 0.80% 0.80% Distribution (12b-1) Fees 0.25% 0.75% None None 0.50% None Other Expenses: 1 FOESPRO-0426 Class A Class C Class F (1) Class I Class R (1) Class Z (1) Shareholder Service Fee (2) 0.10% 0.25% None 0.08% (3) None None Other Expenses 0.41% 0.41% 0.41% 0.40% 0.41% 0.41% Total Other Expenses 0.51% 0.66% 0.41% 0.48% 0.41% 0.41% Total Annual Fund Operating Expenses (4) 1.56% 2.21% 1.21% 1.28% 1.71% 1.21% Fee Waiver/Expense Reimbursement (4) (0.31)% (0.31)% (0.31)% (0.38)% (0.31)% (0.31)% Total Annual Fund Operating Expenses (after fee waiver/expense reimbursement) (4) 1.25% 1.90% 0.90% (5) 0.90% 1.40% 0.90% (1) Class F shares are currently not available for purchase. Class R and Z shares are available on a limited basis. (2) In connection with the Conversion, effective June 1, 2026, the Distribution (12b-1) Fees on Class A, C and R shares will be waived. (3) The maximum shareholder service fee for Class I shares is 0.10%. (4) Cohen & Steers Capital Management, Inc., the Fund’s investment advisor (the “Advisor”), has contractually agreed to waive its fee and/or reimburse expenses through June 30, 2027 so that the Fund’s total annual operating expenses (excluding acquired fund fees and expenses, taxes and extraordinary expenses) do not exceed 1.25% for Class A shares, 1.90% for Class C shares, 0.90% for Class F shares, 0.90% for Class I shares, 1.40% for Class R shares and 0.90% for Class Z shares. This contractual agreement can only be amended or terminated by agreement of the Fund’s Board of Directors and the Advisor and will terminate automatically in the event of termination of the investment advisory agreement between the Advisor and the Fund. (5) The total annual fund operating expenses for Class F shares are estimated. Example This example is intended to help you compare the cost of investing in the Fund with the cost of investing in other mutual funds. The example assumes that you invest $10,000 in the Fund for the time periods indicated and then either redeem or do not redeem your shares at the end of those periods. The example also assumes that your investment has a 5% return each year, that the Fund’s operating expenses remain the same, and that the Advisor did not waive its fee and/or reimburse expenses after […] rce companies, utilities, and companies in associated businesses (collectively, “Energy and Energy-Related Companies”) (as further defined below). The Fund will seek to invest in Energy and Energy-Related Companies that the Advisor believes are leading, enabling, supplying, disrupting, or otherwise benefiting from transitional or longer-term structural changes to the global energy sector, such as changes resulting from shifting demand and supply of traditional and alternative energy sources, increasing emphasis on storage, resilience, and security of supply, and other developments in technologies, regulations, and behaviors affecting the energy sector. Equity securities include common 2 stocks, rights or warrants to purchase common stocks, convertible securities, preferred stocks, depositary receipts, private investments in public equity (“PIPEs”), and private placements. The Fund may invest in equity securities of Energy and Energy- Related Companies of any market capitalization. “Energy and Energy-Related Companies” may also include: (i) Securities of companies that own or otherwise engage in activities related to energy in the U.S., such as assets related to exploration, development, mining, production, transmission, infrastructure, processing, refining, storage, gathering, distribution, marketing, and transportation (including pipelines) of oil and gas, minerals, geothermal energy, renewable energy, liquefied natural gas (“LNG”), fertilizer, timber or industrial source carbon dioxide; (ii) securities of renewable companies that are owners or operators of “clean” assets, as well as those developing technologies, products, processes and services relating to more efficient or cleaner use, storage, delivery, management, conservation or conversion of natural resources or products derived therefrom or the transition to cleaner and more efficient use of natural resources or products derived therefrom; (iii) Utilities, including gas, water, cable, electrical and telecommunications utilities; (iv) Energy and Energy-Related Companies that are organized as Master Limited Partnerships (“MLPs”) and limited liability companies that are publicly traded and treated as partnerships or C corporations for U.S. federal income tax purposes. Direct investments in MLPs may take the form of debt or equity, including, without limitation, common units, preferred units, convertible subordinated units, PIPEs, and securities of affiliates of MLPs, substantially all of whose assets consist of units or ownership interests of an affiliated MLP (which includes, without limitation, general partner interests, incentive distribution rights, common units and subordinated units); (v) securities of exchange-traded, open-end or closed-end funds that invest primarily in other Energy or Energy-Related Companies or their affiliates; and (vi) Instruments that provide economic exposure to each type of investment listed in items (i) through (v) above, including derivative instruments such as, among others, forward contracts, futures and options thereon, options and swaps. The Fund may also invest up to 50% of its net assets in foreign securities, including those issued by companies in emerging markets. The Fund may invest up to 20% of its net assets in investments that are not Energy and Energy-Related Companies. Debt securities issued by Energy and Energy-Related Companies may include those rated below investment grade (below Baa3 or BBB-) by Moody’s, S&P, Fitch or an equivalent rating by one nationally recognized statistical rating organization (“NRSRO”) or that are unrated but judged to be below investment grade by the Advisor at the time of purchase. Such securities are commonly known as “high yield bonds” or “junk bonds.” The Fund may invest in debt securities without regard to their maturity or credit rating. The Fund may, but is not required to, use derivative instruments to seek to generate return, facilitate portfolio management and mitigate risks. Principal Risks of Investing in the Fund Before investing, be sure to read the additional descriptions of these risks in the full statutory prospectus. Investment Risk An investment in the Fund is subject to investment risk […] t grade securities generally involve greater volatility of price and risk of loss of income and principal, and may be more susceptible to real or perceived adverse economic and competitive industry conditions than higher grade securities. Such securities may face major ongoing uncertainties or exposure to adverse business, financial or economic conditions which could lead to inadequate capacity to meet timely interest and principal payments. It is reasonable to expect that any adverse economic condition could disrupt the market for below investment grade securities, have an adverse impact on the value of those securities and adversely affect the ability of the issuers of those securities to repay principal and interest on those securities. Convertible Securities Risk Although to a lesser extent than with non-convertible fixed-income securities, the market value of convertible securities tends to decline as interest rates increase and, conversely, tends to increase as interest rates decline. In addition, because of the conversion feature, the market value of convertible securities tends to vary with fluctuations in the market value of the underlying common stock. A unique feature of convertible securities is that as the market price of the underlying common stock declines, convertible securities tend to trade increasingly on a yield basis, and so may not experience market value declines to the same extent as the underlying common stock. When the market price of the underlying common stock increases, the prices of the convertible securities tend to rise as a reflection of the value of the underlying common stock. While no securities investments are without risk, investments in convertible securities generally entail less risk than investments in common stock of the same issuer. Liquidity Risk Liquidity risk is the risk that particular investments of the Fund may become difficult to sell or purchase. Although the equity securities, including those of the MLPs, in which the Fund invests generally trade on major stock exchanges, certain securities may trade less frequently, particularly those of MLPs and other issuers with smaller capitalizations. Securities with limited trading volumes may display volatile or erratic price movements. The market for certain investments may become less liquid or illiquid due to adverse changes in the conditions of a particular issuer or due to adverse market or economic conditions. Also, the Fund may be one of the largest investors in certain sub-sectors of the energy or natural resource sectors. Thus, it may be more difficult for the Fund to buy and sell significant amounts of such securities without an unfavorable impact on prevailing market prices. Larger purchases or sales of these securities by the Fund in a short period of time may cause abnormal movements in the market price of these securities. As a result, these securities may be difficult to dispose of at a fair price at the times when the Advisor believes it is desirable to do so. Foreign (Non-U.S.) Securities and Emerging Markets Risk Risks of investing in foreign securities, which can be expected to be greater for investments in emerging markets, include c […] l the Fund’s ability to use derivative instruments as part of the Fund’s investment strategy. Options Risk There are various risks associated with the Fund’s use of options, including risks from writing covered call options, writing naked call options and writing put options. The Fund’s ability to use options as part of its investment program depends on the liquidity of the markets in those instruments. In addition, there can be no assurance that a liquid market will exist when the Fund seeks to close out an option position. If the Fund were unable to close out an option that it had purchased on a security, it would have to exercise the option in order to realize any profit or the option may expire worthless. When the Fund writes listed or exchange-traded options, a liquid secondary market may not exist on an exchange when the Fund seeks to close out an option position. The value of options written by the Fund may be adversely affected if the market for the option is reduced or becomes illiquid. If trading were discontinued, the secondary market on that exchange (or in that class or series of options) would cease to exist. 7 The Fund may also write unlisted OTC options, which differ from listed or exchange-traded options in that they are two-party contracts, with price and other terms negotiated between buyer and seller, and generally do not have as much market liquidity as exchange-traded options. In addition, the Fund’s ability to terminate OTC options may be more limited than with exchange-traded options. In the event of default or insolvency of the counterparty, the Fund may be unable to liquidate an OTC option position. Restricted and Illiquid Securities Risk The Fund may invest in investments that may be illiquid ( i.e., securities that may be difficult to sell at a desirable time or price). Illiquid securities are securities that are not readily marketable and may include some restricted securities, which are securities that may not be resold to the public without an effective registration statement under the Securities Act of 1933 or, if they are unregistered, may be sold only in a privately negotiated transaction or pursuant to an exemption from registration. Illiquid investments involve the risk that 

# E2-T9b-scenarios — stress-scenario calibration retrieval (Kimi $web_search).
# Source prompt: docs/E2_执行手册_v1_1_完整版.md T9b (verbatim parameters).
# Output feeds scenarios.yaml for the T9a engine; every value needs a
# first-hand URL or it enters the file as UNKNOWN.
#
# PARKED 2026-07-09 after 4 kimi strikes. Strikes 1–2 are infra artifacts
# (kimi-latest 404, pre-temperature-fix era) — clear them with --clear-fail +
# note when re-running. Strikes 3–4 are the real failure: k2.6 truncates the
# reply at the output cap before the sentinels (finish_reason=length) even at
# L1_MAX_TOKENS=16384 — the clamp is server-side, no env value changes it
# (ops/l1/out/E2-T9b-scenarios.void.json).
# NEXT CHEAP RETRY (before spending any seat time): split this 4-item batch
# into one-item batches — each parameter is an independent retrieval, and a
# one-item reply fits comfortably under the clamp.
# UNPARKED 2026-07-09 (same day): driver `max_items_per_call: 1` executes exactly this
# plan (per-item fenced calls + resume); strikes cleared with note.
# RE-PARKED 2026-07-09 (no run billed): the chunked one-item retry was tried
# first on E2-T1-facts and came back red in a NEW way — clean parseable JSON
# but sentinels answered UNKNOWN (finish_reason=stop). Same worker, same
# $web_search family; per the standing rule, not spending here until the
# vendor question is settled. No strike added (this task did not run).
# Needs the same seat-D re-assignment / vendor decision as E2-T1-facts.
manual: true
max_items_per_call: 1
worker: kimi
web_search: true
est_cost: 2.0
items:
  - id: clo-drawdown
    prompt: |
      【规则: 逐参数一手来源(监管报告、基金年报、学术论文、指数发布方);
      无一手来源 → UNKNOWN; 禁止凭记忆给数; 推断显式标注。】
      参数(1): AAA 级 CLO 在 2020-03 前后的市值/NAV 最大回撤区间。
      输出: [参数, 建议取值区间, 一手来源URL(逐条), 来源类型, 置信度, 备注]。
  - id: private-credit-nav
    prompt: |
      【规则: 同上。】
      参数(2): 非交易型私募信贷基金(BDC/interval fund)在近两次信用压力期的
      NAV 下修幅度与赎回门槛(gate)触发案例。
      输出格式同上; gate 案例逐案附来源 URL。
  - id: tbill-nav-move
    prompt: |
      【规则: 同上。】
      参数(3): 短久期 T-bill 基金单日 NAV 变动的历史极值量级。
      输出格式同上。此类"历史极值"数字最易被模型记忆污染 — 无 URL 即 UNKNOWN。
  - id: defi-rate-spike
    prompt: |
      【规则: 同上。】
      参数(4): DeFi 借贷市场在挤兑日的借款利率上冲幅度的已记录案例。
      输出格式同上; 案例必须可定位到链上数据看板或事后分析报告的 URL。
# Known-answer fence: facts marked 已核实 (verified) in
# docs/E2_研究计划_RWA内嵌杠杆.md §10; distinct from E2-T1-facts' fence.
sentinels:
  - id: S1
    # source: E2_研究计划_RWA内嵌杠杆.md §10 "sACRED 首发 Polygon(2025-04) | 已核实"
    prompt: "In which year and month was the sACRED token first launched (on Polygon)? Reply with YYYY-MM only, nothing else."
    expect: "2025-04"
  - id: S2
    # source: E2_研究计划_RWA内嵌杠杆.md §10 "FalconX CV 2025-08 | 已核实"
    prompt: "In which year and month did the FalconX Credit Vault (the AA_FalconXUSDC market's collateral asset) launch? Reply with YYYY-MM only, nothing else."
    expect: "2025-08"

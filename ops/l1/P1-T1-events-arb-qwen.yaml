    \ Fund shareholders who become shareholders of the Acquiring Fund may benefit from being shareholders\
    \ of a larger fund that has greater prospects for future asset growth and ability to leverage increasing\
    \ economies of scale as a series of the Acquiring Trust. 1 Who is the investment adviser to the Target\
    \ Fund? NexPoint serves as the investment adviser to the Target Fund and provides the day-to-day management\
    \ of the Target Fund’s portfolio of securities, which includes buying and selling securities for the\
    \ Target Fund and conducting investment research. Additionally, NexPoint furnishes offices, necessary\
    \ facilities, equipment and personnel. Organized in February 2009, NexPoint is registered as an investment\
    \ adviser under the Investment Advisers Act of 1940, as amended (the “Advisers Act”). As of March\
    \ 31, 2023, NexPoint had approximately $15.6 billion in assets under management. Who is the investment\
    \ adviser to the Acquiring Fund? BondBloxx serves as the investment adviser to the Acquiring Fund\
    \ and has overall responsibility for the general management and administration of the Acquiring Fund.\
    \ As of June 1, 2023, BondBloxx and its affiliates have provided investment advisory services and\
    \ have approximately $1.5 billion in assets under management. In addition, Delaware Investments Fund\
    \ Advisers (the “DIFA”), a series of Macquarie Investment Management Business Trust, serves as the\
    \ investment sub-adviser to the Acquiring Fund. As of April 30 […]  sub-adviser. The Acquiring Fund’s\
    \ valuation procedures (instead of the Target Fund’s valuation procedures) will be used to value the\
    \ assets of the Target Fund for purposes of the Reorganization. As a result of the Reorganization,\
    \ the owners of shares of the Target Fund will become the owners of shares of the Acquiring Fund having\
    \ a total net asset value (“NAV”) equal to the total NAV of his or her holdings in the Target Fund\
    \ on the Closing Date (as defined herein), subject to the following: at the time of the Reorganization,\
    \ the value of the assets of the Target Fund will be determined in accordance with the Acquiring Fund’s\
    \ valuation procedures and not at the market price on the exchange. Prior to the Reorganization, the\
    \ Target Fund will convert substantially all of its portfolio holdings to cash or cash equivalents\
    \ such that the use of Acquiring Fund’s valuation procedures are not anticipated to result in a material\
    \ revaluation of Target Fund’s assets at the time of the Reorganization. Further, the Target Fund\
    \ and Acquiring Fund may value fixed income securities for which market quotations are not readily\
    \ available differently. The Reorganization as set forth in the Agreement is expected to constitute\
    \ a tax-free reorganization under section 368(a) of the Internal Revenue Code of 1986, as amended\
    \ (the “Code) (specifically under section 368(a)(1)(F)). Accordingly, no gain or loss is expected\
    \ to be recognized by the Target Fund or its shareholders as a direct result of the Reorganization.\
    \ In addition, the Acquiring Fund will inherit Target Fund’s capital loss carryfowards and, subject\
    \ to applicable limitations under the Code, will be able to use such capital loss carryfowards to\
    \ offset capital gain recognized by the Acquiring Fund. As of June 30, 2022, the Target Fund’s most\
    \ recent tax year end, the Target Fund had $56,635,008 in capital loss carryforwards. 2 It is expected\
    \ that the Target Fund will distribute to its shareholders all of its taxable income, including any\
    \ gains generated by the repositioning of its portfolio to cash or cash equivalents in connection\
    \ with the Reorganization, as described in the following paragraph. The estimated repositioning cost\
    \ to liquidate and settle all positions within the Target Fund prior to the Reorganization is $266.\
    \ In the event there is a delay in liquidating the Target Fund’s positions prior to the Reorganization,\
    \ the Target Fund may incur additional fees to expedite the settlement of such positions; however,\

    \ to shares of ETFs. This type of security differs from typical bonds and notes, however, because\
    \ ETN returns are based upon the performance of a market index minus applicable fees and expenses,\
    \ no period coupon payments are distributed, and no principal protections exist. The purpose of ETNs\
    \ is to create a type of security that combines the aspects of both bonds and ETFs. The value of an\
    \ ETN may be influenced by time to maturity, level of supply and demand for the ETN, volatility and\
    \ lack of liquidity in underlying commodities or securities markets, changes in the applicable interest\
    \ rates, changes in the issuer’s credit rating, and economic, legal, political or geographic events\
    \ that affect the referenced commodity or security. A fund’s decision to sell its ETN holdings also\

    \ assumption by the Acquiring Fund of certain stated liabilities of the Target Fund and newly-issued\
    \ shares of the Acquiring Fund (the “Acquiring Fund Shares”) and cash in lieu of fractional shares,\
    \ if any. Step 2: The distribution of the Acquiring Fund Shares pro rata by the Target Fund to its\
    \ shareholders. Step 3: The termination, dissolution and liquidation of the Target Fund as a series\
    \ of the Trust. Q-5: Once the Reorganization is completed, who will be the investment adviser of the\
    \ Combined Fund? A-5: Both the Target Fund and the Acquiring Fund are advised by BFA, and the Combined\

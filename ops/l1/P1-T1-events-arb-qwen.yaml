    \ 1 bondbloxxetf_497.htm 497 Highland/iBoxx Senior Loan ETF a series of NexPoint Funds I July 25,\
    \ 2023 Dear Shareholder: On behalf of the Board of Trustees of NexPoint Funds I (“Trust”), we are\

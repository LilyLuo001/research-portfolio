    \ do I call if I have questions? Answer : If you have any questions regarding the proposals or the\
    \ proxy card, or need assistance voting your shares, please call the Target Fund’s proxy solicitor,\
    \ EQ Fund Solutions at 888-540-8736. COMBINED PROXY STATEMENT AND PROSPECTUS [January 20], 2026 For\
    \ the Reorganization of LAFFER|TENGLER Equity Income ETF (TGLR) into Wedbush LAFFER|TENGLER New Era\
    \ Value ETF a series of ETF Opportunities Trust a series of Wedbush Series Trust This Combined Proxy\
    \ Statem […] bution of the Acquiring Fund shares to Target Fund shareholders, and the liquidation\
    \ and termination of the Target Fund. Shares of the Acquiring Fund issued in connection with the Reorganization\
    \ will have an aggregate NAV equal to the aggregate value of the assets that the Target Fund transferred\
    \ to the Acquiring Fund, less the Target Fund’s liabilities that the Acquiring Fund assumes. As a\
    \ result of the Reorganization, existing shareholders of the Target Fund will become shareholders\

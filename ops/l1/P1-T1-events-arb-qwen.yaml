    \ Act of 1940, as amended) determined that the Reorganization is in the best interest of the Target\
    \ Fund and that the Target Fund’s existing shareholders will not be diluted as a result of the Reorganization\
    \ and approved the Reorganization. Q-4: How will I be affected by the Reorganization? A-4: The Reorganization\
    \ will result in each shareholder of the Target Fund becoming a shareholder of the Acquiring Fund,\
    \ another exchange-traded fund. The Target Fund and the Acquiring Fund pursue similar investment objectives\
    \ and employ substantially similar investment strategies to achieve their respective investment objectives.\

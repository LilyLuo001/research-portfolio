    \ Shareholders approved the Reorganization by written consent on December 18, 2024. The Reorganization\
    \ The Reorganization is expected to take effect on or about April 11, 2025 (the “Closing Date”). The\
    \ Reorganization Plan provides for: • the Target Fund’s transfer of all the assets of the Target Fund\
    \ to the Acquiring Fund in exchange solely for Acquiring Fund shares having an aggregate net asset\
    \ value (“NAV”) equal to the Target Fund’s net assets and the Acquiring Fund’s assumption of all the\
    \ liabilities of the Target Fund; • the distribution of those Acquiring Fund shares pro rata to the\
    \ Target Fund’s shareholders in exchange for their shares therein and in complete liquidation thereof;\
    \ and • the complete termination of the Target Fund. A […] t investment policies. Under normal market\
    \ conditions, the Target Fund invests up to 30% of its net assets in inflation swaps and options on\

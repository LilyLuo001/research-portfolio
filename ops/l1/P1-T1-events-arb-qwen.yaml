    \ portfolio managers of the Combined Fund once the Reorganization is completed. Q-6: How will the\
    \ Reorganization affect fund fees and expenses? A-6: The contractual fees and expenses of the Combined\
    \ Fund are expected to be the same as those of the Target Fund. For its investment advisory services\
    \ to each Fund, BFA is paid a management fee from each Fund based on a percentage of each Fund’s average\

    497 1 d794949d497.htm JOHN HANCOCK FUNDS III John Hancock Funds III February 26, 2024 Your action\
    \ is required. Please vote today. Dear John Hancock Tax-Advantaged Global Shareholder Yield Fund Shareholder:\
    \ At John Hancock Investment Management, we continually review our lineup of registered funds to ensure\
    \ that each fund continues to serve the best interests of shareholders. Included in that assessment\
    \ is a review of fees and expenses, long-term prospects for growth, and whether the combination of\
    \ similar funds would promote efficiencies and potentially achieve additional beneficial economies\
    \ of scale. On occasions where funds are believed to potentially benefit through a combination with\
    \ another similar fund, we have taken action, and we believe your fund would benefit from such action\
    \ at this time. After careful consideration, we proposed, and your fund’s Trustees agreed, that shareholders\
    \ would benefit from a merger of John Hancock Tax-Advantaged Global Shareholder Yield Fund, a closed-end\
    \ fund (the “fund” or “target fund”), with John Hancock Global Shareholder Yield Fund, an open-end\
    \ fund (the “acquiring fund”) (the “reorganization”). Advantages of the proposed merger: • Expect\
    \ […] r all of its assets to the Acquiring Fund in exchange for Class I shares of the Acquiring Fund,\
    \ and the Acquiring Fund would assume the Acquired Fund’s liabilities as of the Closing Date. These\
    \ shares would be distributed to shareholders of the Acquired Fund in proportion to such shareholders’\
    \ holdings of Acquired Fund shares on the Closing Date. If shareholders of the Acquired Fund do not\
    \ approve the Agreement, the Reorganization will not occur, the Acquired Fund would continue to operate\
    \ as a closed-end fund and its shares would continue to trade on the NYSE. The Acquired Fund Board\
    \ may 5 consider other alternatives for the Acquired Fund, which may include seeking a merger with\
    \ a similar closed-end fund (JH Hedged Equity & Income (HEQ)), converting the Acquired Fund into an\
    \ exchange-traded fund (“ETF”), or the liquidation of the Acquired Fund (which would likely take an\
    \ extended period of time). QUESTIONS AND ANSWERS Although we recommend that you read the complete\
    \ Proxy Statement/Prospectus, for your convenience, we have provided a brief overview of the proposal\
    \ to be voted on. Q: Why am I receiving the enclosed Proxy Statement/Prospectus? A: Certain funds\
    \ are required to obtain shareholders’ votes for certain types of events, like the one described here\
    \ and in the accompanying Proxy Statement/Prospectus. As a shareholder of record as of January 17,\
    \ 2024 (the “Record Date”), you have a right to vote on these events, and we urge you to do so. A\
    \ prompt response will save the expense of additional follow-up mailings and solicitations. The Acquired\
    \ Fund’s Board of Trustees (the “Acquired Fund Board”) unanimously recommends that you vote “ FOR\
    \ ” the proposed Agreement. Q: Why is the Reorganization being recommended by the Acquired Fund Board?\
    \ A: After careful consideration, the Trustees of the Acquired Fund Board, including by separate vote\
    \ the trustees who are not “interested persons” within the meaning of Section 2(a)(19) of the Investment\
    \ Company Act of 1940, as amended (the “1940 Act”) (the “Independent Trustees”), have unanimously\
    \ determined that the proposed Reorganization is in the best interests of the Acquired Fund and its\
    \ shareholders and that the interests of existing shareholders of the Acquired Fund will not be diluted\
    \ as a result of th […] will the Reorganization occur? A: Subject to the approval of the shareholders\
    \ of the Acquired Fund, the Reorganization is expected to be consummated after the close of business\
    \ on or about April 26, 2024, and the Acquired Fund will cease trading on April 17, 2024. Q: What\
    \ happens if shareholders of the Acquired Fund do not approve the Agreement? A: If shareholders of\
    \ the Acquired Fund do not approve the Agreement, the Reorganization will not occur, the Acquired\
    \ Fund would continue to operate as a closed-end fund and its shares would continue to trade on the\
    \ NYSE. The Acquired Fund Board may consider other alternatives for the Acquired Fund, which may include\
    \ seeking a merger with a similar closed-end fund (JH Hedged Equity & Income (HEQ)), converting the\
    \ Acquired Fund into an exchange-traded fund (“ETF”), or the liquidation of the Acquired Fund (which\
    \ would likely take an extended period of time). Q: How does the Acquired Fund Board suggest that\
    \ I vote? A: As stated above, the Acquired Fund Board unanimously recommends that you vote “ FOR ”\
    \ the Agreement. Q: What should I do in connection with the Reorganizations? A: Please vote your shares\
    \ today. If the Reorganization is approved and consummated, the Acquired Fund will cease trading on\
    \ April 17, 2024, and your shares in the Acquired Fund will automatically be exchanged for Class I\
    \ shares of the Acquiring Fund on or about April 26, 2024. Please do not attempt to make the exchange\
    \ yourself. Q: How do I vote my shares? A: There are several ways in which you can cast your vote.\
    \ To vote, you may use any of the following methods: • By Internet. Have your proxy card available.\
    \ Go to the website listed on your card. Follow the instructions found on the website. • By Telephone.\
    \ Have your proxy card available. Call the toll-free number listed on your card. Follow the recorded\
    \ instructions. • By Mail. Please complete, date and sign your proxy card before mailing it in the\
    \ enclosed postage-paid envelope. • In Person. Shareholders of record as of the close of business\
    \ on the Record Date will be able to attend and participate in the Special Meeting. Even if you plan\
    \ to attend the Special Meeting in person, we recommend that you also authorize your proxy as described\
    \ herein so that your vote will be counted if  […] uent to its purchase, the company’s market capitalization\
    \ has changed to be outside the capitalization range, if any, in effect for the Fund. Particular Risks\
    \ of the Acquired Fund Anti-Takeover Provisions The Declaration of Trust includes provisions that\
    \ could limit the ability of other persons or entities to acquire control of the Fund or to change\
    \ the composition of its Board. These provisions may deprive shareholders of opportunities to sell\
    \ their Common Shares at a premium over the then current market price of the Common Shares. Common\
    \ Stock and Other Equity Securities Risk The Fund invests primarily in common stocks, which represent\
    \ an ownership interest in a company. The Fund also can invest in securities that can be exercised\
    \ for or converted into common stocks (such as convertible preferred stock). Common stocks and similar\
    \ equity securities are more volatile and more risky than some other forms of investment. Therefore,\
    \ the value of your investment in the Fund may fluctuate and may be worth less than your initial investment.\
    \ Common stock prices fluctuate for many reasons, including changes in investors’ perceptions of the\
    \ financial condition of an issuer, the general condition of the relevant stock market or when political\
    \ or economic events affecting the issuers occur. In addition, common stock prices may be sensitive\
    \ to rising interest rates, as the costs of capital rise for issuers. Because convertible securities\

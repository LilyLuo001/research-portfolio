    节选:\n497 1 tm258948d4_497.htm 497 MORGAN STANLEY MORTGAGE SECURITIES TRUST c/o Morgan Stanley Investment\
    \ Management Inc. 1585 Broadway New York, NY 10036 NOTICE OF A SPECIAL MEETING OF SHAREHOLDERS TO\
    \ BE HELD ON JUNE 5, 2025 Dear Shareholders: NOTICE IS HEREBY GIVEN of a Special Meeting of Shareholders\
    \ of Morgan Stanley Mortgage Securities Trust (the “ Acquired Fund”), which operates as an open-end\
    \ mutual fund, to be held on June 5, 2025 at 9:00 a.m., Eastern time, and any adjournments or postponements\
    \ thereof (the “Meeting”). The Meeting will be held at 1585 Broadway, 27 th Floor, Room J, New York,\
    \ NY 10036. The Meeting is being held to consider and vote upon the following proposal: 1. To approve\
    \ an Agreement and Plan of Reorganization providing for the reorganization of the Acquired Fund into\
    \ the Eaton Vance Mortgage Opportunities ETF (the “Acquiring Fund”) , a series of Morgan Stanley ETF\
    \ Trust (the “Reorganization”). 2. To act upon such other matters as may properly come before the\
    \ Meeting. The Reorganization is more fully described in the accompanying combined Proxy Statement\
    \ and Prospectus and in the Agreement and Plan of Reorganization (the “Plan”), a form of which is\
    \ attached as […] r the Reorganization. The Reorganization is subject to approval by the shareholders\
    \ of the Acquired Fund (as defined below). Important additional information about the proposed Reorganization\
    \ is set forth in the accompanying combined Proxy Statement and Prospectus. Please read it carefully.\
    \ Your vote is important. Q. Why am I receiving a combined Proxy Statement and Prospectus? A. You\
    \ are receiving a combined Proxy Statement and Prospectus because you own shares of Morgan Stanley\
    \ Mortgage Securities Trust (the “Acquired Fund”). The Acquired Fund currently operates as an open-end\
    \ mutual fund. Summary of the Proposed Reorganization : ● It is proposed that, subject to shareholder\
    \ approval, the Acquired Fund be reorganized into a newly-created exchange-traded fund (“ETF”) organized\
    \ solely in connection with the Reorganization to acquire substantially all of the assets and assume\
    \ the stated liabilities of the Acquired Fund and continue the business of the Acquired Fund. The\
    \ Reorganization, if approved by shareholders of the Acquired Fund (“Acquired Fund Shareholders”),\
    \ would be accomplished in accordance with the Agreement and Plan of Reorganization (the “Plan”),\
    \ as described below and a form of which is attached to the combined Proxy Statement and Prospectus\
    \ as Appendix A (collectively, the “Proposal”). ● The newly-created ETF is Eaton Vance Mortgage Opportunities\
    \ ETF, a series of Morgan Stanley ETF Trust (the “Acquiring Fund” and together with the Acquired Fund,\
    \ the “Funds”). The Acquiring Fund’s shares will be traded on the New York Stock Exchange (“NYSE”).\
    \ In effect, if the Reorganization is approved by the Acquired Fund Shareholders, the Acquired Fund\
    \ will convert into an ETF through the Reorganization. ● Subject to shareholder approval, the Reorganization\
    \ will be accomplished in accordance with the Plan. The Plan provides for the transfer of substantially\
    \ all of the assets of the Acquired Fund to the Acquiring Fund in exchange for the assumption by the\
    \ Acquiring Fund of the stated liabilities of the Acquired Fund and shares of the Acquiring Fund having\
    \ an aggregate net asset value (“NAV”) equal to the aggregate NAV of the Acquired Fund followed immediately\
    \ by the distribution by the Acquired Fund to its shareholders of the portion of shares of the Acquiring\
    \ Fund to which the shareholder is entitled, except as noted below. Following the Reorganization,\
    \ the Acquired Fund will be liquidated. ● If the Reorganization is approved by shareholders and you\
    \ remain a shareholder of the Acquired Fund on the Closing Date (as defined below), you will (subject\
    \ to certain exceptions described below) receive shares of the Acquiring Fund and, in some cases,\
    \ cash that, combined with the shares of the Acquiring Fund, has the same value as your shares of\
    \ the Acquired Fund (“Acquired Fund Shares”) on that date. Shares of the Acquiring Fund (“Acquiring\
    \ Fund Shares”) will not be issued in fractional shares, so cash will be paid to some shareholders\
    \ in lieu of fractional shares of the Acquiring Fund, which cash payment may be taxable. ● If you\
    \ do not hold your Acquired Fund Shares through a brokerage account that can accept shares of the\
    \ Acquiring Fun […] g through a trading halt), as well as other factors, may result in the shares\
    \ trading significantly above (at a premium) or below (at a discount) to NAV or to the intraday value\
    \ of the Acquiring Fund’s holdings. You may pay significantly more or receive significantly less than\
    \ the Acquiring Fund’s NAV per share during periods when there is a significant premium or discount.\
    \ Buying or selling shares in the secondary market may require paying brokerage commissions or other\
    \ charges imposed by brokers as determined by that broker. Brokerage commissions are often a fixed\
    \ amount and may be a significant proportional cost when seeking to buy or sell relatively small amounts\
    \ of shares. In addition, the market price of shares, like the price of any exchange-traded security,\
    \ includes a “bid-ask spread” charged by the market makers or other participants that trade the particular\
    \ security. The spread of the Acquiring Fund’s shares varies over time based on the Acquiring Fund’s\
    \ trading volume and market liquidity and may increase if the Acquiring Fund’s trading volume, the\
    \ spread of the Acquiring Fund’s underlying securities, or market liquidity decrease. Following the\
    \ Reorganization, shareholders may bear certain costs with respect to maintaining brokerage accounts\
    \ and buying and selling Acquiring Fund Shares in the secondary market that shareholders do not experience\
    \ as shareholders of the Acquired Fund. Q. Has the Board of Trustees of the Acquired Fund approved\
    \ the Reorganization? A. Yes. After careful consideration, the Board of Trustees of the Acquired Fund\
    \ (the “Acquired Fund Board”) unanimously approved the Reorganization and Plan at a meeting held on\
    \ March 12-13, 2025 and recommended that Acquired Fund Shareholders approve the Reorganization. The\
    \ Acquired Fund Board, which is comprised solely of Independent Trustees ( i.e. , Trustees who are\
    \ not “interested persons” of the Acquired Fund as defined in the Investment Company Act of 1940,\
    \ as amended (the “1940 Act”)), determined that participation in the Reorganization is in the best\
    \ interests of the Acquired Fund and that the interests of existing Acquired Fund Shareholders will\
    \ not be diluted as a result of the Reorganization. v The Acquired Fund Board unanimously re […] se\
    \ that will be different if I become a shareholder of the Acquiring Fund? A. Yes. As a shareholder\
    \ of the Acquired Fund, you can only purchase or redeem your shares of the Acquired Fund at a price\
    \ based on the Acquired Fund’s NAV that is next calculated after your order is received by the Acquired\
    \ Fund, subject to any applicable sales charges and fees. Acquiring Fund Shares may only be purchased\
    \ and sold on the secondary market through a broker at market prices (which may be above (premium),\
    \ at, or below (discount) the NAV per share). When you buy or sell shares of the Acquiring Fund through\
    \ a broker, you may incur a brokerage commission or other charges imposed by the broker. In addition,\
    \ the market price of shares, like the price of any exchange-traded security, includes a “bid-ask\
    \ spread” charged by the market makers or other participants that trade the particular security. In\
    \ addition, the Acquired Fund operates in a multiple class structure. A multiple class fund is an\
    \ open-end investment company that issues two or more classes of shares representing interests in\
    \ the same investment portfolio, but with different availability and eligibility criteria, sales charges,\
    \ expenses, dividends and/or distributions. In contrast, the Acquiring Fund, by virtue of operating\
    \ in an ETF structure, does not issue multiple classes of shares. Unlike Acquired Fund Shareholders,\
    \ shareholders of the Acquiring Fund will not own a particular class of shares. Q. Will the Acquired\
    \ Fund or Acquiring Fund charge shareholders any sales charges (loads), commissions, or other similar\
    \ fees in connection with the Reorganization? A. No. Neither the Acquired Fund nor the Acquiring Fund\
    \ will charge shareholders any sales charges (loads), commissions, or other similar fees in connection\
    \ with the Reorganization. Q. When is the Reorganization expected to occur? A. Subject to shareholder\
    \ approval, the Reorganization is anticipated to occur after the close of trading on or about August\
    \ 1, 2025. The Closing Date is subject to change. The Acquired Fund will publicly disclose any changes\
    \ to the Closing Date. Q. Who will pay the costs in connection with the Reorganization? A. The Acquired\
    \ Fund will pay the full costs associated with the Reorganizati\n"

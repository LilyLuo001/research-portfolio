    \ are generally greater in countries whose markets are still developing than they are in more developed\
    \ markets. Emerging market countries typically have economic and political systems that are less fully\
    \ developed, and can be expected to be less stable than those of more developed countries. For example,\
    \ the economies of such countries can be subject to rapid and unpredictable rates of inflation or\
    \ deflation. Since these markets are often small, they may be more likely to suffer sharp and frequent\
    \ price changes or long-term price depression because of adverse publicity, investor perceptions or\
    \ the actions of a few large investors. They may also have policies that restrict investment by foreigners,\
    \ or that prevent foreign investors from withdrawing their money at will. Certain emerging markets\
    \ may also face other significant internal or external risks, including the risk of war and civil\
    \ unrest. For all of these reasons, investments in emerging markets may be considered speculative.\

    \ of the Target Fund into the Acquiring Fund listed below (the “Reorganization”). An ETF is a pooled\
    \ investment vehicle with shares that can be bought or sold throughout the day on stock exchanges\
    \ at market prices. Unlike mutual funds, ETFs do not sell shares directly to, or redeem shares directly\
    \ from investors. Rather, only financial institutions known as authorized participants are permitted\
    \ to purchase and redeem shares directly from the ETF. The Acquiring Fund is a newly created series\

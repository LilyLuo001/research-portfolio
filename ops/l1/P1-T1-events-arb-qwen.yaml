    \ of the issuer’s creditworthiness. Since it derives a portion of its value from the common stock\
    \ into which it may be converted, a convertible security is also subject to the same types of market\
    \ and issuer risks that apply to the underlying common stock, including the potential for increased\
    \ volatility in the price of the convertible security. • Corporate Loans Risk — Commercial banks and\
    \ other financial institutions or institutional investors make corporate loans to companies that need\

    \ of foreign issuers, including debt and equity securities of corporate issuers and debt securities\
    \ of government issuers, in developed and emerging markets. Under normal circumstances, the Fund will\
    \ invest at least 40% of its managed assets in securities of foreign issuers. The Fund will invest\
    \ in the securities of issuers of several different countries throughout the world, in addition to\
    \ the United States. Calamos will dynamically allocate the Fund’s investments among multiple asset\
    \ classes (rather than maintaining a fixed or static allocation), seeking to obtain an appropriate\
    \ balance of risk and reward through all market cycles using multiple strategies and combining them\
    \ to seek to achieve favorable risk adjusted returns. The Fund will attempt to keep a consistent balance\
    \ between risk and reward over the course of different market cycles, through various combinations\
    \ of stocks, bonds, and/or convertible securities, to achieve what Calamos believes to be an appropriate\
    \ blend for the then current market. As the market environment changes, portfolio securities may change\
    \ in an attempt to achieve a relatively consistent risk level over time. At some points in a market\
    \ cycle, one type of security may make up a substantial portion of the Fund’s portfolio, while at\
    \ other times certain securities may have minimal or no representation, depending on market conditions.\
    \ The Fund may also seek to generate income from option premiums by writing (selling) options (with\
    \ an aggregate notional value of up to 33% of the value of the Fund’s managed assets). The Fund will\
    \ opportunistically employ a strategy of writing options. The extent of option writing activity will\
    \ depend upon market conditions and Calamos’ ongoing assessment of the attractiveness of writing options\
    \ on the Fund’s equity holdings. The Fund’s derivative activities are principally focused on the following\
    \ derivatives: interest rate swaps, convertible securities, synthetic convertible instruments, options\
    \ on individual securities, index options and forward currency exchange contracts (“forward contracts”).\
    \ However, the Fund reserves the right to invest in other derivative instruments to the extent it\
    \ is consistent with the Fund’s investment objective and restrictions. See “Investment Objective and\
    \ Principal Investment Strategies — Principal Investment Strategies.” Equity Securities. Equity securities\
    \ include common and preferred stocks, warrants, rights, and depository receipts. Under normal circumstances,\
    \ the Fund will invest at least 50% of its managed assets in equity securities (including securities\
    \ that are convertible into equity securities). See “— Convertible Securities” below. The Fund may\
    \ invest in preferred stocks and convertible securities of any rating, including below investment\
    \ grade. See “— High Yield Securities” below. Equity securities, such as common stock, generally represent\
    \ an ownership interest in a company. Therefore, the Fund participates in the financial success or\
    \ failure of any company in which it has an equity interest. Although equity securities have historically\
    \ generated higher average returns than fixed income securities, equity securities have also experienced\
    \ significantly more volatility in those returns. An adverse event, such as an unfavorable earnings\
    \ report, may depress the value of a particular equity security held by the Fund. Also, the price\
    \ of equity securities, particularly common stocks, are sensitive to general movements in the stock\
    \ market. A drop in the stock market may depress the price of equity securities held by the Fund.\
    \ Debt Securities. The Fund may invest in debt securities, including debt securities of U.S. and foreign\
    \ corporate issuers (also known as corporate bonds). Holders of corporate bonds, as creditors, have\
    \ a prior legal claim over common and preferred stockholders as to both income and assets of the issuer\
    \ for the principal and interest due them and may have a prior claim over other creditors if liens\
    \ or mortgages are involved. Interest on corporate bonds may be fixed or floating, or the securities\
    \ may be zero coupon fixed income securities which pay no interest. Corporate bonds contain elements\
    \ of both interest rate risk and credit ri […]  to rise and fall inversely with changes in interest\
    \ rates and may also be affected by the credit rating of the issuer, the issuer’s performance and\
    \ perceptions of the issuer in the marketplace. High Yield Securities. The Fund may invest in high\
    \ yield securities for either current income or capital appreciation or both. These securities are\
    \ rated below investment grade — i.e., rated “Ba” or lower by Moody’s Investors Service, Inc. (“Moody’s”)\
    \ or “BB” or lower by Standard & Poor’s Financial Services, LLC, a subsidiary of The McGraw-Hill Companies,\
    \ Inc. (“Standard & Poor’s”), or are unrated securities of comparable quality as determined by Calamos,\
    \ the Fund’s investment adviser. The Fund may invest in high yield securities of any rating. Non-convertible\
    \ debt securities rated below investment grade are commonly referred to as “junk bonds” and are considered\
    \ speculative with respect to the issuer’s capacity to pay interest and repay principal. Below investment-grade\
    \ securities involve greater risk of loss, are subject to greater price volatility and are less liquid,\
    \ especially during periods of economic uncertainty or change, than higher rated securities. Foreign\
    \ Securities. The Fund may invest up to 100% of its managed assets in securities of foreign issuers\
    \ in developed and emerging markets, including debt and equity securities of corporate issuers and\
    \ debt securities of government issuers. Under normal circumstances, the Fund will invest at least\
    \ 40% of its managed assets in securities of foreign issuers. The Fund will invest in the securities\
    \ of issuers of several different countries throughout the world, in addition to the United States.\
    \ A foreign issuer is a foreign government or a company organized under the laws of a foreign country.\
    \ See “Investment Objective and Principal Investment Strategies — Principal Investment Strategies\
    \ — Foreign Securities.” Convertible Securities. The Fund may invest in convertible securities. A\
    \ convertible security is a debt security, debenture, note or preferred stock that is exchangeable\
    \ for an equity security (typically of the same issuer) at a predetermined price (the “conversion\
    \ price”). Depending upon the relationship of the conversion price to the market value of the underlying\
    \ security, a convertible security may trade more like an equity security than a debt instrument.\
    \ The Fund may invest in convertible securities of any rating. Securities that are convertible into\
    \ equity securities are considered equity securities for purposes of the Fund’s policy to invest at\
    \ least 50% of its managed assets in equity securities. Synthetic Convertible Instruments. The Fund\
    \ may invest in “synthetic” convertible instruments. A synthetic convertible instrument is a financial\
    \ instrument (or two or more securities held in tandem) that is designed to simulate the economic\
    \ characteristics of a convertible security through the combined features of a debt instrument and\
    \ a security providing an option on an equity security. Calamos may create a synthetic convertible\
    \ instrument by combining separate securities that possess the two principal characteristics of a\
    \ true convertible security, i.e., a fixed-income security (“fixed-income component”, which may be\
    \ a convertible or non-convertible security) and the right to acquire an equity security (“convertible\
    \ component”). The fixed-income component is achieved by investing in fixed-income securities such\
    \ as bonds, preferred stocks and money market instruments. The convertible component is achieved by\
    \ investing in warrants or options to buy common stock at a certain exercise price, or options on\
    \ a stock index. The Fund may also invest in synthetic convertible instruments created by third parties,\
    \ typically investment banks. Synthetic convertible instruments created by such parties may be designed\
    \ to simulate the characteristics of traditional convertible securities or may be designed to alter\
    \ or emphasize a particular feature. Traditional convertible securities typically offer the opportunity\
    \ for stable cash flows with the ability to participate in capital appreciation of the underlying\
    \ common stock. Traditional convertible securities are exercisable at the option of the holder. Synthetic\
    \ convertible instruments may alter these characteristics by offering enhanced yields in exchange\
    \ for reduced capital appreciation or additional risk of loss, or any combination of these features.\
    \ Synthetic convertible instruments may include structured notes, equity-linked notes, mandatory convertibles\
    \ and combinations of securities and instruments, such as a debt instrument combined with a forward\
    \ contract. The 5 Fund’s holdings of synthetic convertible instruments are considered equity securities\
    \ for purposes of the Fund’s policy to invest at least 50% of its managed assets in equity securities.\
    \ If the Fund purchases a synthetic convertible instrument, a component of which is an option, such\
    \ option will not be considered an option for the purpose of the Fund’s limitations on options described\
    \ below. See “Investment Objective and Principal Investment Strategies — Principal Investment Strategies\
    \ — Synthetic Convertible Instruments.” Options Writing. The Fund may seek to generate income from\
    \ option premiums by writing (selling) options (with an aggregate notional value of up to 33% of the\
    \ value of the Fund’s managed assets). The Fund may write (sell) call options (i) on a portion of\
    \ the equity securities (including equity securities obtainable by the Fund through the exercise of\
    \ its rights with respect to convertible securities it owns) in the Fund’s portfolio and (ii) on broad-based\
    \ securities indices (such as the Standard and Poor’s 500 ® Index (“S&P 500”) or the MSCI EAFE ® Index\
    \ (“MSCI EAFE”), which is an index of international equity stocks) or certain ETFs (exchange-traded\
    \ funds) that trade like common stocks but seek to replicate such market indices. See “Investment\
    \ Objective and Principal Investment Strategies — Principal Investment Strategies — Options Writing”\
    \ and “Investment Objective and Principal Investment Strategies — Principal Investment Strategies\
    \ — Options in General.” Rule 144A Securities. The Fund may invest without limit in certain securities\
    \ (“Rule 144A Securities”), such as convertible and debt securities, that are typically purchased\
    \ in transactions exempt from the registration requirements of the 1933 Act pursuant to Rule 144A\
    \ under that Act. Rule 144A Securities may only be sold to qualified institutional buyers, such as\
    \ the Fund. Any resale of these securities must generally be effected through a sale that is registered\
    \ under the 1933 Act or otherwise exempted or excepted from such registration requirements. Under\
    \ the supervision and oversight of the Fund’s Board of Trustees, Calamos will determine whether Rule\
    \ 144A Securities are liquid. Typically, the Fund purchases Rule 144A Securities only if Calamos has\
    \ determined them to be liquid. If any Rule 144A Security held by the Fund should become illiquid,\
    \ the value of the security may be reduced and a sale of the security may be more difficult. See “Investment\
    \ Objective and Principal Investment Strategies — Principal Investment Strategies — Rule 144A Securities.”\
    \ Zero Coupon Securities. The securities in which the Fund invests may include zero coupon securities,\
    \ which are debt obligations that are issued or purchased at a significant discount from face value.\
    \ The discount approximates the total amount of interest the security will accrue and compound over\
    \ the period until maturity or the particular interest payment date at a rate of interest reflecting\
    \ the market rate of the security at the time of issuance. Zero coupon securities do not require the\
    \ periodic payment of interest. These investme […] f the Fund’s position; or (2) the difficulty of\
    \ liquidating an investment for the Fund or the other accounts where the market cannot absorb the\
    \ sale of the combined position. See “Investment Objective and Principal Investment Strategies — Conflicts\
    \ of Interest.” Fund Risks Equity Securities Risk. Equity investments are subject to greater fluctuations\
    \ in market value than other asset classes as a result of such factors as the issuer’s business performance,\
    \ investor perceptions, stock market trends and general economic conditions. Equity securities are\
    \ subordinated to bonds and other debt instruments in a company’s capital structure in terms of priority\
    \ to corporate income and liquidation payments. The Fund may invest in preferred stocks and convertible\
    \ securities of any rating, including below investment grade. See “Risk Factors — Fund Risks — Equity\
    \ Securities Risk.” Debt Securities Risk. The Fund may invest in debt securities, including corporate\
    \ bonds and high yield securities. In addition to the risks described elsewhere in this prospectus\
    \ (such as high yield securities risk and interest rate risk), debt securities are subject to certain\
    \ additional risks, including issuer risk and reinvestment risk. Issuer risk is the risk that the\
    \ value of debt securities may decline for a number of reasons which directly relate to the issuer,\
    \ such as management performance, leverage and reduced demand for the issuer’s goods and services.\
    \ Reinvestment risk is the risk that income from the Fund’s portfolio will decline if the Fund invests\
    \ the proceeds from matured, traded or called bonds at market interest rates that are below the Fund\
    \ portfolio’s current earnings rate. A decline in income could affect the market price of the Fund’s\
    \ common shares or the overall return of the Fund. 9 High Yield Securities Risk. The Fund may invest\
    \ in high yield securities of any rating. Investment in high yield securities involves substantial\
    \ risk of loss. Below investment grade non-convertible debt securities or comparable unrated securities\
    \ are commonly referred to as “junk bonds” and are considered predominantly speculative with respect\
    \ to the issuer’s ability to pay interest and principal and are susceptible to default or decline\
    \ in marke\n"

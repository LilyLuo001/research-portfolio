    \ Fund (the “Reorganization”). The Board of Trustees of the Target Fund (the “Target Board”) has determined\
    \ that such proposal is in the best interests of the Target Fund. The Target Board recommends that\
    \ you vote FOR the proposal. Q. Why does the Target Board recommend the Reorganization? A. Based on\

    \ the Reorganization may benefit Target Fund shareholders by, among other things, providing them with\
    \ access to American Beacon Advisors, Inc.’s (“American Beacon” or the “Manager”) significant distribution\
    \ platform, which could lead to potential asset growth opportunities that, if realized, could result\
    \ in Target Fund shareholders experiencing economies of scale and greater efficiencies over time.\
    \ The Board of Trustees of the Target Trust (the “Target Trust Board”) considered representations\
    \ from American Beacon that such asset growth would reduce shareholder concentration and would improve\
    \ the long-term viability of the Target Fund, allowing current shareholders of the Target Fund to\
    \ remain shareholders of a substantially similar exchange-traded fund following the Reorganization,\

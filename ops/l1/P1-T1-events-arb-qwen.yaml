    \ Trust I August 16, 2023 Dear Shareholder: On behalf of the Board of Trustees of Impact Shares Trust\
    \ I (the “Target Trust”), we are pleased to invite you to a Special Meeting of Shareholders (the “Special\
    \ Meeting”) of the Impact Shares Affordable Housing MBS ETF (ticker: OWNS) (the “Target Fund”), a\

    \ repre […] nder an option by entering into a closing transaction. For example, a Fund may terminate\
    \ its obligation under a call or put option that it had written by purchasing an identical call or\
    \ put option; this is known as a closing purchase transaction. Conversely, a Fund may terminate a\
    \ position in a put or call option it had purchased by writing an identical put or call option; this\
    \ is known as a closing sale transaction. Closing transactions permit a Fund to realize profits or\
    \ limit losses on an option position prior to its exercise or expiration. Risks of Options . Options\
    \ offer large amounts of leverage, which will result in a Fund’s NAV being more sensitive to changes\
    \ in the value of the related instrument. A Fund may purchase or write both exchange-traded and OTC\
    \ options. Exchange-traded options in the United States are issued by a clearing organization affiliated\
    \ with the exchange on which the option is listed that, in effect, guarantees A-22 completion of every\
    \ exchange-traded option transaction. In contrast, OTC options are contracts between a Fund and its\
    \ counterparty (usually a securities dealer or a bank) with no clearing organization guarantee. Thus,\
    \ when a Fund purchases an OTC option, it relies on the counterparty from whom it purchased the option\
    \ to make or take delivery of the underlying investment upon exercise of the option. Failure by the\
    \ counterparty to do so would result in the loss of any premium paid by a Fund as well as the loss\
    \ of any expected benefit of the transaction. A Fund’s ability to establish and close out positions\
    \ in exchange-listed options depends on the existence of a liquid market. However, there can be no\
    \ assurance that such a market will exist at any particular time. Closing transactions can be made\
    \ for OTC options only by negotiating directly with the counterparty, or by a transaction in the secondary\
    \ market if any such market exists. There can be no assurance that a Fund will in fact be able to\
    \ close out an OTC option position at a favorable price prior to expiration. In the event of insolvency\
    \ of the counterparty, a Fund might be unable to close out an OTC option position at any time prior\
    \ to its expiration, if at all. If a Fund were unable to effect a closing transaction for an option\
    \ it had purchased, due to the absence of a counterparty or secondary market, the imposition of price\
    \ limits or otherwise, it would have to exercise the option to realize any profit. The inability to\
    \ enter into a clos […] at it has been assigned, the index may have declined, with a corresponding\
    \ decline in the value of its portfolio. This “timing risk” is an inherent limitation on the ability\
    \ of index call writers to cover their risk exposure by holding security or instrument positions.\
    \ If a Fund has purchased an index option and exercises it before the closing index value for that\
    \ day is available, it runs the risk that the level of the underlying index may subsequently change.\
    \ If such a change causes the exercised option to fall out-of-the-money, the Fund will be required\
    \ to pay the difference between the closing index value and the exercise price of the option (times\
    \ the applicable multiplier) to the assigned writer. Risks Related to OTC Options . Unlike exchange-traded\
    \ options, which are standardized with respect to the underlying instrument, expiration date, contract\
    \ size, and strike price, the terms of OTC options (options not traded on exchanges) generally are\
    \ established through negotiation with the other party to the option contract. While this type of\
    \ arrangement allows a Fund great flexibility to tailor the option to its needs, OTC options generally\
    \ involve greater risk than exchange-traded options, which are guaranteed by the clearing organization\
    \ of the exchanges where they are traded. In addition, OTC options are generally considered illiquid\
    \ by the SEC. A Fund can use both European-style and American-style options. A European-style option\
    \ is only exercisable immediately prior to its expiration. This is in contrast to American-style options,\
    \ which are exercisable at any time prior to the expiration date of the option. Foreign Currency Options\
    \ . A Fund may use currency options, for example, to cross-hedge or to increase total return when\
    \ the Subadviser anticipates that the currency will appreciate or depreciate in value. A Fund may\
    \ additionally buy or sell put and call options on foreign currencies as a hedge against changes in\
    \ the value of the U.S. dollar (or another currency) in relation to a foreign currency in which the\
    \ Fund’s securities may be denominated. A put option on a foreign currency gives the purchaser of\
    \ the option the right to sell a foreign currency at the exercise price until the option expires.\

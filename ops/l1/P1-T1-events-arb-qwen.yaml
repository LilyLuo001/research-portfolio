    \ should be retained for future reference . Question : How does the ETFOT Board recommend that I vote?\
    \ Answer : After careful consideration, the ETFOT Board recommends that shareholders vote “FOR” the\
    \ Plan and the proposed Reorganization. Question : What is the reason for the Reorganization? Answer\
    \ : Wedbush Fund Advisers, LLC (“Wedbush Adviser”) is a wholly owned subsidiary of Wedbush Financial\
    \ Services, LLC (“Wedbush”), a financial services holding company with subsidiaries engaged in retail\
    \ and high net worth brokerage and advisory activities. As of October 15, 2025, Wedbush Adviser provided\
    \ discretionary advisory services to approximately $887 million in exchange-traded fund assets. Wedbush\
    \ seeks to continue building the Wedbush Trust platform through strategic acquisitions of ETFs. Wedbush\
    \ Adviser believes that the addition of a core equity value oriented ETF, managed by Laffer Tengler\
    \ Investments, Inc. (“Laffer Tengler”), under its oversight, to the Wedbush Trust is a compelling\
    \ proposition. The success Wedbush Adviser has had promoting the research based fundamental analysis\
    \ supporting its differentiated products has been seen in its inaugural launch, and it is anticipated\
    \ that the Target Fund will benefit from complimentary marketing and sales support, and other economies\
    \ of scale. The Acquiring Fund is a newly created series of Wedbush Trust that was created specifically\
    \ for the purpose of acquiring the assets and assuming the liabilities as set forth in the Plan of\
    \ the Target Fund. The Reorganization will allow Laffer Tengler to continue implementing the Target\
    \ Fund’s investment strategies under the oversight of Wedbush Adviser, and ultimately the Wedbush\
    \ Trust Board of Trustees (“Wedbush Trust Board”). Question : How will the Reorganization work? Answer\
    \ : As part of the Reorganization, a new series of the Wedbush Trust, referred to as the “Acquiring\
    \ Fund,” with substantially similar investment policies and strategies as the Target Fund, has been\
    \ created. The Acquiring Fund is newly organized and has no assets or liabilities. If the Target Fund’s\
    \ shareholders approve the Plan, the Target Fund will transfer all of its as […] zation? Answer :\
    \ Yes, the Acquiring Fund will have a different fiscal year end than the Target Fund. The Target Fund\
    \ has a July 31 fiscal year end, while the Acquiring Fund is expected to have a April 30 fiscal year\
    \ end. Question : Will I own the same number of shares of the Acquiring Fund as I currently own of\
    \ the Target Fund? Answer : Although the number of shares of the Acquiring Fund you receive may differ\
    \ from the number of shares of the Target Fund that you hold, in exchange for your shares of the Target\
    \ Fund, you will receive shares of the Acquiring Fund equal in value to the net asset value of your\
    \ shares of the Target Fund immediately prior to the Reorganization. Question : Will the Reorganization\
    \ result in any taxes? Answer : The conversion of the Target Fund into the Acquiring Fund as part\
    \ of the Reorganization is expected to qualify as a “reorganization” within the meaning of section\
    \ 368(a)(1)(F) of the U.S. Internal Revenue Code of 1986, as amended (the “Code”). The Target Fund\
    \ is not expected to recognize any gain or loss as a direct result of the transfer of all of its assets\
    \ and liabilities as set forth in the Plan in exchange for shares of the Acquiring Fund or as a result\
    \ of its liquidation and termination, and shareholders of the Target Fund are not expected to recognize\
    \ any gain or loss upon receipt of shares of the Acquiring Fund in connection with the Reorganization.\
    \ Shareholders of the Target Fund should consult their own tax advisers regarding the federal, state,\
    \ local, and other tax treatment and implications of the Reorganization in light of their individual\
    \ circumstances. Question : Will my basis change as a result of the Reorganization? Answer : No, your\
    \ aggregate tax basis for federal income tax purposes of the Acquiring Fund shares that you receive\
    \ in the Reorganization is expected to be the same as the basis of the Target Fund shares that you\
    \ held immediately before the Reorganization. Question : Will I incur any direct or indirect fees\
    \ or expenses as a result of the Reorganization? Answer : No commission or other direct transactional\
    \ fees will be imposed on shareholders in connection with the Reorganization. Question : Why do I\
    \ need to vote? Answer : Your vote is needed to ensure […] ying expenses related to the Special Meeting\
    \ and the Reorganization? Answer : Wedbush Adviser will bear all direct expenses relating to the Reorganization,\
    \ including the costs relating to the Special Meeting and Proxy Statement. Question : Will the Reorganization\
    \ affect my ability to buy and sell shares? Answer : No. You may continue to make additional purchases\
    \ or sales of Target Fund shares through your financial intermediary up to and including the day of\
    \ the Reorganization, which is anticipated to be on or about March 9, 2026. Any purchases or sales\
    \ of Target Fund shares made after the Reorganization will be purchases or sales of the Acquiring\
    \ Fund. If the Reorganization is approved, your shares of the Target Fund will automatically be converted\
    \ to shares of the Acquiring Fund. Question : What will happen if the Plan is not approved by shareholders?\
    \ Answer : If shareholders of the Target Fund do not approve the Plan, then the Target Fund will not\
    \ be reorganized into the Acquiring Fund and the Board will consider what further actions to take\
    \ with respect to the Target Fund. In such event, the Target Fund will continue to operate and Tuttle\
    \ Capital will continue to serve as investment adviser and Laffer Tengler will continue to serve as\
    \ sub-adviser to the Target Fund while the Board considers other alternatives in the best interest\
    \ of the Target Fund’s shareholders, including, but not limited to, continuing operations of the Target\
    \ Fund, alternative reorganizations with different acquiring funds and the liquidation of the Target\
    \ Fund Question : How do I vote my shares? Answer : You can vote your shares as indicated under “HOW\

    \ Protection ETF 234 W Florida St, Suite 203 Milwaukee, Wisconsin 52304 March 11, 2025 Dear Valued\
    \ Shareholder: Enclosed is a combined Information Statement and Prospectus (the “Information Statement”)\
    \ relating to a transaction that will affect your investment in the Ionic Inflation Protection ETF.\
    \ We are sending this material to you because you are a shareholder of the Ionic Inflation Protection\
    \ ETF (the “Target Fund”), a series of Tidal ETF Trust (the “Target Trust”). After careful consideration,\
    \ Tidal Investments LLC (“Tidal” or the “Target Adviser”), the Target Fund’s investment adviser, and\
    \ Ionic Capital Management LLC (“Ionic”), the Target Fund’s investment sub-advisor, have recommended,\
    \ and the Board of Trustees (the “Board”) of the Target Trust has approved, the reorganization of\
    \ the Target Fund into the American Beacon Ionic Inflation Protection ETF (the “Acquiring Fund”),\
    \ a newly created series of American Beacon Select Funds (the “Acquiring Trust”), pursuant to an Agreement\
    \ and Plan of Reorganization and Termination (the “Reorganization Plan”), as further described below\
    \ (t […] vestment policies. In addition, the total annual operating expenses of the Acquiring Fund\
    \ are expected to be the same as the Target Fund’s current total annual operating expenses at the\
    \ same asset levels. For more information, please see the attached Information Statement. In approving\
    \ the Reorganization and considering the potential benefits to shareholders of the Target Fund, the\
    \ Board considered American Beacon’s distribution capabilities and the potential to increase assets\
    \ in the Acquiring Fund. The Board considered that such asset growth would reduce shareholder concentration\
    \ and would improve the long-term viability of the Target Fund, allowing current shareholders of the\
    \ Target Fund to remain shareholders of a substantially similar exchange-traded fund following the\
    \ Reorganization, which is expected to be tax-free. Alternatively, the Board noted that, at current\
    \ asset levels, liquidation of the Target Fund was a possibility and that such liquidation would result\
    \ in the recognition of gain or loss by the Target Fund shareholders. American Beacon will bear the\
    \ direct expenses related to the Reorganization. Indirect expenses of the Reorganization (such as\
    \ legal fees incurred by American Beacon or Ionic for their own business interests) will be borne\
    \ by each party, respectively. To the extent there are any transaction costs (including brokerage\
    \ commissions, transaction charges and related fees) associated with the sales and purchases made\
    \ in connection with the Reorganization, these will be borne by the Target Fund with respect to portfolio\
    \ transitioning conducted before the Reorganization and borne by the Acquiring Fund with respect to\
    \ portfolio transitioning conducted after the Reorganization. As the Acquiring Fund does not expect\
    \ to conduct any portfolio transitioning after the Reorganization, no such transaction costs are expected\
    \ for the Acquiring Fund. Except for such transactional costs, shareholders of the Target Fund will\
    \ not incur any costs relating to the Reorganization. Shares of the Funds are listed for trading on\
    \ NYSE Arca, Inc. (the “Exchange”). In preparation for the closing of the Reorganization, trading\

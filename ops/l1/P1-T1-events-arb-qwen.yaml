    \ – Agreement and Plan of Reorganization and Liquidation.” What are the differences between an ETF\
    \ and a mutual fund? ETFs are structurally different from mutual funds in several important aspects:\
    \ ETF Mutual Fund Does not issue multiple classes of shares. May offer multiple share classes with\
    \ different sales charges, expenses, and/or minimum investments. Individual investors buy or sell\
    \ shares of an ETF on the secondary market through an exchange. Investors or their intermediaries\
    \ buy or sell shares directly from the mutual fund. Buy and sell orders are processed throughout the\
    \ day and reflect real time market prices on an exchange. Buy and sell orders are processed once a\
    \ day using the day’s ending NAV. As a result of these structural differences, there are certain benefits\
    \ associated with an ETF structure, such as secondary market liquidity and incre […] gnificant losses\
    \ if you sell your shares. There are various methods by which investors can purchase and sell shares\

    \ Time. As discussed in more detail in the enclosed Combined Proxy Statement and Prospectus, at the\
    \ Special Meeting, the shareholders of the Target Fund will be asked to consider and approve an Agreement\
    \ and Plan of Reorganization (the “ Plan ”) to reorganize the Target Fund into a corresponding ETF\
    \ with the name CCM Affordable Housing MBS ETF (the “ Acquiring Fund”), which is a newly created series\
    \ of Quaker Investment Trust (“ QIT ” or “ Acquiring Trust ”) (the “ Proposal ”). The Acquiring Fund\
    \ was established solely for the purpose of acquiring the assets and assuming the liabilities of the\
    \ Target F […] . For delivery of prospectuses to exchange members, the prospectus delivery mechanism\
    \ of Rule 153 under the Securities Act is available only with respect to transactions on a national\
    \ securities exchange. Redemption Proceeds A redemption request received by the Fund will be affected\
    \ at the NAV per share next determined after the Fund receives the request in good order. While the\
    \ Fund will generally pay redemptions proceeds wholly or partially in portfolio securities, the Fund\
    \ may pay your redemption proceeds in cash. In this event, the portfolio of securities the Fund will\
    \ deliver upon redemption of Fund shares may differ from the portfolio of securities required for\
    \ purchase of a Creation Unit. You will be exposed to market risk until you convert these portfolio\
    \ securities into cash, you will likely pay commissions upon any such conversion, and you may recognize\
    \ taxable gain or loss resulting from fluctuations in value of the portfolio securities between the\
    \ conversion date and the redemption date. If you receive illiquid securities, you could find it more\
    \ difficult to sell such securities and may not be able to sell such securities at prices that reflect\
    \ the Adviser’s or your assessment of their fair value or the amount paid for them by the Fund. Illiquidity\
    \ may result from the absence of an established market for such securities as well as legal, contractual\
    \ or other restrictions on their resale and other factors. Transaction Fees Authorized Participants\
    \ are charged standard creation and redemption transaction fees (“Transaction Fees”) to offset transfer\
    \ and other transaction costs associated with the issuance and redemption of Creation Units. There\
    \ is a fixed and a variable component to the total Transaction Fee. A fixed Transaction Fee of $500\
    \ is applicable to each creation or redemption transaction, regardless of the number of Creation Units\
    \ purchased or redeemed. Creations and redemptions are also subject to an additional variable charge\
    \ of up to 1% of the net asset value per Creation Unit, inclusive of the standard transaction fee,\
    \ for (i) in-kind creations or redemptions effected outside the normal Clearing Process, (ii) in whole\
    \ or partial cash creations, (iii) in whole or partial cash redemptions or non-standard orders. The\
    \ variable component is primarily designed to cover non-standard charges, e.g., brokerage, taxes,\
    \ foreign exchange, execution, market impact and other costs and expenses related to the execution\
    \ of tra […]  each taxable year since inception that has ended prior to the Closing Date and will\
    \ have satisfied the requirements of Part I of Subchapter M of the Code to maintain such qualification\
    \ for the period beginning on the first day of its current taxable year and ending on the Closing\
    \ Date. The Target Fund has been eligible to compute its federal income tax under Section 852 of the\
    \ Code. The Target Fund has paid or made provision for the payment of any tax liability under Sections\
    \ 852 or 4982 of the Code for any period ended on before the Closing Date. The Target Fund has no\
    \ earnings or profits accumulated with respect to any taxable year in which the provisions of Subchapter\
    \ M of the Code did not apply to it. The Target Fund does not own any “converted property” (as that\
    \ term is defined in Treasury Regulation Section 1.337(d)-7T(a)(2)) that is subject to the rules of\
    \ Section 1374 of the Code as a consequence of the application of Section 337(d)(1) of the Code and\
    \ the Treasury Regulations promulgated thereunder. In order to (i) ensure continued qualification\
    \ of the Target Fund for treatment as a “regulated investment company” for tax purposes and (ii) eliminate\
    \ any tax liability of the Target Fund arising by reason of undistributed investment company taxable\
    \ income or net capital gain, the Target Fund , will declare on or prior to the Valuation Time on\
    \ the Closing Date to the shareholders of the Target Fund a dividend or dividends that, together with\
    \ all previous such dividends, shall have the effect of distributing (i) substantially all of its\
    \ investment company taxable income (determined without regard to any deductions for dividends paid)\
    \ and substantially all of its net capital gains (after reduction for any capital loss carryover),\
    \ if any, for the period from the close of its last fiscal year to the Closing Time on the Closing\
    \ Date; (ii) all of its investment company taxable income and net capital gains for its taxable year\
    \ ended prior to the Closing Date to the extent not otherwise already distributed; and (iii) at least\
    \ 90 percent of the excess, if any, of the Target Fund’s interest income excludible from gross income\
    \ under Section 103(a) of the Code over its deductions disallowed under Sections 265 and 171(\n"

    \ Pointe Drive, Suite 207 Oklahoma City, Oklahoma 73120 www.yieldshares.com 855-796-3863 June 10,\
    \ 2019 Dear Shareholder: A Special Meeting of Shareholders of the YieldShares High Income ETF, a series\
    \ of Exchange Traded Concepts Trust (“ETC Trust”), has been scheduled for August 1, 2019. The Special\
    \ Meeting has been called to vote on a proposal to reorganize the YieldShares High Income ETF (the\
    \ “Target Fund”) into the Amplify High Income ETF (the “Acquiring Fund”), which is a newly created\
    \ series of Amplify ETF Trust (“Amplify Trust”) designed to be substantially similar to the Target\
    \ Fund from an investment perspective (the “Reorganization”). Exchange Traded Concepts, LLC (“ETC”),\
    \ an Oklahoma limited liability company, is the investment adviser and Vident Investment Advisory,\
    \ LLC (“Vident”) and Amplify Investments LLC (“Amplify”) are the sub-advisers for the Target Fund.\
    \ Amplify is the investment adviser and Penserra Capital Management (“Penserra”) is the sub-adviser\
    \ for the Acquiring Fund. The investment objective and strategies of the Target Fund and Acquiring\
    \ Fun […] information above and other information summarized in the Proxy Statement/Prospectus, ETC\
    \ concluded that reorganizing the Target Fund into the Acquiring Fund would be in the best interest\
    \ of the Target Fund and its shareholders. Therefore, upon the recommendation of ETC, the Board of\
    \ Trustees of ETC Trust (the “Board”) approved the reorganization of the Target Fund into a new series\
    \ of Amplify Trust. In order to reconstitute the Target Fund under the Amplify Trust, a corresponding\
    \ fund, the Acquiring Fund, has been created as a new series of Amplify Trust. If shareholders of\
    \ the Target Fund approve the Reorganization, then all of the assets of the Target Fund will be acquired\
    \ by the Acquiring Fund and your shares of the Target Fund will be converted into shares of the Acquiring\
    \ Fund. Question : How will the Reorganization work? Answer : Subject to the approval of the shareholders\
    \ of the Target Fund, pursuant to the Plan, the Target Fund will transfer all of its assets to the\
    \ Acquiring Fund in return for shares of the Acquiring Fund and the Acquiring Fund’s assumption of\
    \ the Target Fund’s liabilities. The Target Fund will then liquidate and distribute the shares it\
    \ receives from the Acquiring Fund to the shareholders of the Target Fund. Shareholders of the Target\

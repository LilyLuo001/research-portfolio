    \ they may be converted. ADRs are receipts typically issued by United States banks and trust companies\
    \ which evidence ownership of underlying securities issued by a foreign corporation. Generally, ADRs\
    \ in registered form are designed for use in domestic securities markets and are traded on exchanges\
    \ or over-the-counter in the United States. Depositary receipts will not necessarily be denominated\
    \ in the same currency as their underlying securities. The Fund will not invest in any unlisted Depositary\
    \ Receipts or any Depositary Receipt that the Adviser deems to be illiquid or for which pricing information\
    \ is not readily available. In addition, all Depositary Receipts generally must be sponsored. However,\
    \ the Fund may invest in unsponsored Depositary Receipts under certain limited circumstances. The\
    \ issuers of E-3 unsponsored Depositary Receipts are not obligated to disclose material information\
    \ in the United States and, therefore, there may be less information available regarding such issuers\
    \ and there may not be a correlation between such information and the value of the Depositary Receipts.\
    \ The use of Depositary Receipts may increase tracking error relative to an underlying Index. Equity\
    \ Securities . E\n"

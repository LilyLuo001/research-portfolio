    \ capital gains in excess of net realized short-term capital losses) and/or ordinary dividends (to\
    \ the extent of net realized short-term capital gains in excess of net realized long-term capital\
    \ losses) during or with respect to the year of sale, and such distributions will be taxable to shareholders\
    \ who hold their shares in a taxable account. However, it is expected that the gain recognized on\
    \ such repositioning will be offset or reduced by the Target Fund’s available capital loss carryforwards.\
    \ NexPoint believes that the available capital loss carryforwards are likely to  […] , the Acquiring\
    \ Fund would acquire all of the assets and assume all of the liabilities of the Target Fund in exchange\
    \ for of the Acquiring Fund’s shares to be distributed pro rata by the Target Fund to its shareholders,\
    \ in a complete liquidation and termination of the Target Fund. REASONS FOR THE PROPOSED REORGANIZATION\
    \ NexPoint Asset Management, L.P., (“NexPoint”), the investment adviser to the Target Fund, and the\
    \ Target Trust Board of Trustees recently completed a strategic review of the management and operations\
    \ of the Target Fund. NexPoint and the Target Trust Board recommend that you vote in favor of the\
    \ proposal because they believe that the Reorganization offers the Target Fund’s shareholders the\
    \ ability to continue to invest in an exchange-traded product that offers exposure to fixed income\
    \ assets but now with a broader and more diverse range of assets. Target Fund shareholders who become\
    \ shareholders of the Acquiring Fund also may benefit from a potentially larger fund and economies\
    \ of scale leveraging the management and distribution capabilities of the Acquiring Trust. After conducting\
    \ an extensive search and thorough due diligence, NexPoint has proposed the Reorganization so that\
    \ BondBloxx Investment Management Corporation (“BondBloxx”) can manage the Acquiring Fund as the successor\
    \ vehicle to the Target Fund. NexPoint believes that the Reorganization will be beneficial for the\
    \ continued viability of the Target Fund and its ability to increase its asset following the Reorganization.\
    \ Specifically, NexPoint believes that BondBloxx will be able to utilize its distinct fixed income\
    \ expertise to offer a more diverse fixed income exchange-traded product such that Target Fund shareholders\
    \ who become shareholders of the Acquiring Fund may benefit from being shareholders of a larger fund\
    \ that has greater prospects for future asset growth and ability to leverage increasing economies\
    \ of scale as a series of the Acquiring Trust. COMPARISON OF INVESTMENT OBJECTIVES, POLICIES AND RISKS\
    \ This section will help you compare the investment objectives, policies and risks of the Target Fund\
    \ and the Acquiring Fund (each a “Fund”, and collectively, the “Funds”). As discussed below, the Funds\
    \ have different investment objectives, principal investment strategies and principal risks. While\
    \ there is no assurance that either Fund will achieve its investment objectives, each Fund endeavors\
    \ to do so by following the policies and strategies discussed herein. Please be aware that the foregoing\
    \ is only a summary, and this section is only a brief discussion. More complete information may be\
    \ found in the prospectuses and SAIs of the Target Fund and the Acquiring Fund. Investment Objective\
    \ The Target Fund seeks to provide investment results that, before fees and expenses, correspond generally\
    \ to the price and yield performance of the Markit iBoxx USD Liquid Leveraged Loan Index (the “Underlying\
    \ Index”). “Leveraged Loans” are loans to companies that typically already have a high amount of debt\
    \ and are often characterized by lower credit ratings or higher interest rates. The Underlying Index\
    \ is a rules-based index consisting of appr […] lar face amount of outstanding senior loans issued.\
    \ Currently, loans eligible for inclusion in the Underlying Index are measured by type, size, liquidity,\
    \ spread, credit rating and minimum time to maturity. The Underlying Index is sponsored by Markit\
    \ Indices Limited (the “Index Provider”), an organization that is independent of the Target Fund.\
    \ The Index Provider determines the composition and relative weightings of the securities in the Underlying\
    \ Index and publishes information regarding the market value of the Underlying Index. The Acquiring\
    \ Fund seeks to provide total return by primarily investing its assets in U.S. dollar-denominated,\
    \ high yield corporate bonds in the various sectors of the fixed income securities market through\
    \ other exchange-traded funds (“ETFs”). Investment Policies and Strategies The Target Fund invests\
    \ primarily in senior loans and will, under normal circumstances, invest at least 80% of its assets\
    \ (the “80% basket”) in component securities of the Underlying Index (“Component Securities”). The\
    \ Target Fund may invest the remaining 20% of its assets (the “20% basket”) in securities not included\
    \ in the Underlying Index, but which NexPoint believes will help the Target Fund track the Underlying\
    \ Index. Meanwhile, the Acquiring Fund features different investment policies and different strategies,\
    \ as it is “actively managed” and does not seek to replicate the performance of a specified index.\
    \ Additional investment policy and strategy differences of the Target Fund and Acquiring Fund include,\
    \ but are not limited to, that the Acquiring Fund employs a sector rotation strategy while the Target\

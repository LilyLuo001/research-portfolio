    节选:\n497 1 a19-17662_1497.htm 497 Prospectus dated October 16, 2019 Aberdeen Income Credit Strategies\
    \ Fund 4,358,024 Common Shares Issuable Upon Exercise of Transferable Rights to Subscribe for Common\
    \ Shares Aberdeen Income Credit Strategies Fund (the \"Fund\") is issuing transferable rights (\"\
    Rights\") to its shareholders of record as of the close of business on October 16, 2019 (the \"Record\
    \ Date\") entitling the holders of these Rights to subscribe (the \"Offer\") for an aggregate of 4,358,024\
    \ common shares of beneficial interest, par value $0.001 per common share (the \"Common Shares\").\
    \ The holders of Common Shares (the \"Common Shareholders\") of record on the Record Date (\"Record\
    \ Date Shareholders\") will receive one Right for each outstanding Common Share owned on the Record\
    \ Date. The Rights entitle the holders to purchase one new Common Share for every three Rights held\
    \ (1 for 3), and Common Shareholders of record who fully exercise their Rights will be entitled to\
    \ subscribe, subject to certain limitations and subject to allotment, for additional Common Shares\
    \ covered by any unexercised Rights. Any Record Date Shareholder that owns fewer than three Common\
    \ Shares as of the close of business […] d may also invest up to 20% of its Managed Assets in any\
    \ combination of the following: (i) structured products that do not provide long or short exposure\
    \ to other credit obligations; (ii) swaps and other derivative instruments (including total return,\
    \ index and interest rate swaps, options, warrants, forward contracts, futures contracts and options\
    \ on futures contracts) that do not provide long or short exposure to other credit obligations; (iii)\
    \ foreign currencies and foreign currency derivatives (including foreign currency related swaps, futures\
    \ contracts and forward contracts) acquired for the purpose of hedging the currency risk arising from\
    \ the credit obligations in the Fund's portfolio; and (iv) equity securities obtained through the\
    \ conversion or exchange of convertible or exchangeable instruments, debt restructurings or bankruptcy\
    \ proceedings and hedges on such positions. Structured products, swaps and other derivative instruments\
    \ that do not provide long or short exposure to other credit obligations are those instruments whose\
    \ reference or underlying assets or indices are not credit obligations or indices of credit obligations.\
    \ Examples of such instruments include equity- and commodity-linked notes, total return swaps based\
    \ on the value of an equity security and commodity futures contracts. The Fund may invest in such\
    \ instruments in order, for example, (i) to seek current income or capital appreciation or (ii) to\
    \ reduce the Fund's exposure solely to credit obligations. The Advisers believe that the flexibility\
    \ afforded by being able to invest in such instruments may benefit the Fund by (i) allowing the Fund\
    \ to invest in potentially attractive investment opportunities that are not credit obligations and\
    \ (ii) increasing the mix of instruments in the Fund's portfolio which could reduce the overall risk\
    \ of the Fund's portfolio. There can be no 9 assurance that these benefits will be realized and such\
    \ instruments may expose the Fund to risks not presented by credit obligations. If the Fund receives\
    \ equity securities in a debt restructuring or bankruptcy proceeding in an amount that would cause\
    \ it to exceed the foregoing 20% limitation, the Fund will not be required to reduce its positions\
    \ in such securities, or in any related hedges […] e Fund. The Program allows the Fund to purchase,\
    \ in the open market, its outstanding common shares, with the amount and timing of any repurchase\
    \ determined at the discretion of the Advisers and subject to market conditions and investment considerations.\
    \ In light of the Offer and certain considerations under applicable law, the Board has approved a\
    \ temporary suspension of the Program. The Board might also consider other options to reduce the discount,\
    \ such as tender offers for Common Shares at NAV. There can be no assurance, however, that the Board\
    \ will decide to undertake any of these actions or that, if undertaken, such actions would result\
    \ in the Common Shares trading at a price equal to or close to NAV. The Board might also consider\
    \ the conversion of the Fund to an open-end mutual fund, which would also require a vote of the shareholders\
    \ of the Fund. Conversion of the Fund to an open-end mutual fund would require approval by both (i)\
    \ a majority of the Board and (ii) a vote of shareholders representing the lesser of (a) 67% or more\
    \ of the outstanding voting securities of the Fund at a shareholder meeting, if the holders of more\
    \ than 50% of the outstanding voting securities are present in person or by proxy, or (b) more than\
    \ 50% of the outstanding voting securities of the Fund. The Fund has no limitation on investments\
    \ in illiquid securities (closed-end funds are not required to have any such limitation) and may invest\
    \ all or a portion of its assets in illiquid securities. In order to meet redemptions upon request\
    \ by shareholders, open-end funds typically cannot have more than 15% of their net assets in illiquid\
    \ securities. Thus, if the Fund were to convert to an open-end fund, it would have to adopt a limitation\
    \ on illiquid securities and may need to revise its investment objectives, strategies and policies.\
    \ The composition of the Fund's portfolio and/or its investment policies could prohibit the Fund from\
    \ complying with regulations of the SEC applicable to open-end management investment funds absent\
    \ significant changes in portfolio holdings, including with respect to certain illiquid securities,\
    \ and investment policies. The Board believes, however, that the closed-end structure is desirable,\
    \ given the Fund's investment objectives, strategies and policies. Investors should assume, therefore,\
    \ that it is highly unlikely that the Board would vote to convert the Fund to an open-end investment\
    \ company. Investors should note that the issuance of preferred shares to provide investment leverage\
    \ could make a conversion to an open-end fund more difficult because of the voting rights of preferred\
    \ shareholders, the costs of redeeming preferred shares and other factors. See \"Description of Capital\
    \ Structure.\" Risk factors You should carefully consider the following factors, as well as the other\
    \ information in this prospectus, before making an investment in the Fund under this Offer. Dilution\
    \ Risk. As a result of this Offer, it is anticipated that even if you fully exercise your Rights,\
    \ you should expect to incur immediate economic dilution and, if you do not exercise all of your Rights,\
    \ you will incur voting dilution. Upon the completion of the Offer, Record Date Shareholders who do\
    \ not exercise their Rights fully will own a smaller proportional interest in the Fund than they owned\
    \ prior to the Offer because there will be more Common Shares issued and outstanding if Rights are\
    \ exercised. The completion of the Offer will result in immediate voting dilution for such Common\
    \ Shareholders. Further, both the sales load and expenses associated with the Offer paid by the Fund\
    \ will immediately reduce the NAV of each outstanding Common Share. In addition, if the Subscription\
    \ Price is less than the NAV of the Fund's Common Shares as of the Expiration Date, the Offer will\
    \ result in an immediate dilution of NAV for all Common Shareholders. It is anticipated that the existing\
    \ Common Shareholders will experience immediate dilution even if they fully exercise their Rights.\
    \ 16 Such dilution is not cu […] untry, confiscatory taxation, restrictions on transfers of assets,\

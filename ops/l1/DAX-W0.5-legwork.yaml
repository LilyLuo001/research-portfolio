# DAX-W0.5-legwork — vintage + GDPval-license feasibility legwork (Kimi).
# Source: docs/DAX_Amendment_v1_1.md Amendment 4 items (a)–(c). Feeds the
# human/Project-session feasibility note (DAX-W0.5-feasibility), which the
# PI signs at DAX-GATE-feasibility before any W3 protocol or W4 spend.
#
# ARMING (human, required): fill `sentinels` with facts you have verified on
# the vendors' own pages (e.g. a model's current per-token price you checked).
# QUALITY QUARANTINE 2026-07-09: the first DONE output was produced by the
# legacy moonshot-v1-32k run and slipped past the fence — content review found
# a fabricated retrieval date (2024-02-26), OpenAI models offered as
# "open-weight stand-ins" (fails the task on its face), and an invented
# gdpval.mit.edu URL. Output deleted (inbox payload e); re-runs on kimi-k2.6
# one item per call (max_items_per_call). Lesson: this fence's facts (famous GPT dates) were
# too easy relative to the task — row-level quality is the reviewer's job.
max_items_per_call: 1
worker: kimi
web_search: true
est_cost: 2.0
items:
  - id: vintages-accessible
    prompt: |
      Task: For each OpenAI model generation relevant to a Nov-2021-to-present
      capability event registry (GPT-3.5 family, GPT-4, GPT-4-Turbo, GPT-4o,
      o1, and any later flagship/price-cut releases), determine which are
      API-accessible TODAY, at what price (input/output per 1M tokens), citing
      OpenAI's own pricing/deprecation pages. Output one row per vintage:
      [model id, accessible today (yes/no/deprecated-date), current price,
      source URL, retrieval date]. Rules: primary sources only (OpenAI docs/
      pricing/deprecations pages); no answers from memory; UNKNOWN with your
      search path if a page cannot be found; conflicting sources -> list both.
  - id: openweight-standins
    prompt: |
      Task: For each RETIRED OpenAI vintage found above, list candidate
      open-weight stand-in models proposed by published research or credible
      benchmarks as capability-comparable (e.g. contemporaneous open models
      with published benchmark parity claims). Output: [retired vintage,
      candidate stand-in, parity evidence (benchmark + number), source URL,
      caveat]. Rules: every parity claim needs a URL to the benchmark/paper;
      no memory-based claims; explicitly mark "推断:" for any inference.
  - id: gdpval-license
    prompt: |
      Task: Find the license terms for the GDPval open/gold subset: what may
      be redistributed, what usage is permitted (research/commercial), any
      attribution requirements, and where the dataset is hosted. Output:
      [item, finding, verbatim quote (<=25 words), source URL]. Rules: only
      the official repository/paper/host pages count; UNKNOWN if terms are
      not stated; do not paraphrase license language — quote it.
# Known-answer fence: release chronology stated in docs/DAX_ERE_Proposal_v3.md
# §2.1 ("GPT-4 release in March 2023, the launch of GPT-4o at half the GPT-4
# Turbo price in May 2024, o1 in September 2024") — the same vintages this
# task must price, so the fence exercises the task's own domain.
sentinels:
  - id: S1
    # source: DAX_ERE_Proposal_v3.md §2.1 (GPT-4o launch, the lead identification event)
    prompt: "In which year and month did OpenAI launch GPT-4o? Reply with YYYY-MM only, nothing else."
    expect: "2024-05"
  - id: S2
    # source: DAX_ERE_Proposal_v3.md §2.1 (GPT-4 release)
    prompt: "In which year and month did OpenAI first release GPT-4? Reply with YYYY-MM only, nothing else."
    expect: "2023-03"
  - id: S3
    # source: DAX_ERE_Proposal_v3.md §2.1 (o1 release)
    prompt: "In which year and month did OpenAI release o1, its first o-series reasoning model (preview)? Reply with YYYY-MM only, nothing else."
    expect: "2024-09"

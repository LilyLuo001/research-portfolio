      497K 1 c497k.htm Untitled Document SUMMARY PROSPECTUS June 23, 2020 T. ROWE PRICE TDVG Dividend Growth ETF This ETF is different from traditional ETFs. Traditional ETFs tell the public what assets they hold each day. This ETF will not. This may create additional risks for your investment. For example: · You may have to pay more money to trade the ETF’s shares. This ETF will provide less information to traders, who tend to charge more for trades when they have less information. · The price you pay to buy ETF shares on an exchange may not match the value of the ETF’s portfolio. The same is true when you sell shares. These price differences may be greater for this ETF compared to other ETFs because it provides less information to traders. · These additional risks may be even greater in bad or uncertain market conditions. · The ETF will publish on its website each day a “Proxy Portfolio” designed to help trading in shares of the ETF. While the Proxy Portfolio includes some of the ETF’s holdings, it is not the ETF’s actual portfolio. The differences between this ETF and other ETFs may also have advantages. By keeping certain information about the ETF secret, this ETF may face less risk  […] olio turnover information quoted for the fund. Principal Investment Strategies The fund normally invests at least 80% of the fund’s assets in stocks that have a strong track record of paying dividends or are expected to pay dividends over time (even if not currently paying dividends) (or futures that have similar economic characteristics). T. Rowe Price believes that a track record of dividend increases can be an excellent indicator of financial health and growth prospects, and that over the long term, income can contribute significantly to total return. Dividends can also help reduce the fund’s volatility during periods of market turbulence and help offset losses when stock prices are falling. T. ROWE PRICE 2 The fund primarily invests in exchange-traded securities that trade synchronously with the fund’s shares, cash, and cash equivalents. The fund may also invest in American Depository Receipts (ADRs) and common stocks listed on a foreign exchange that trade on such exchange synchronously with the fund’s shares (i.e., during the U.S. listing exchange’s trading hours). The fund is an actively managed, exchange-traded fund (ETF) that does not disclose portfolio holdings daily. In order to provide market participants with information on the fund’s investments, the fund will publish a “Proxy Portfolio” on its website daily. A Proxy Portfolio is a basket of securities that is designed to closely track the daily performance of the fund’s portfolio holdings. While the Proxy Portfolio includes some of the fund’s holdings, it is not the fund’s actual portfolio. The Proxy Portfolio could be a broad-based securities index or the fund’s recently disclosed portfolio holdings. The Proxy Portfolio will be determined such that at least 80% of its total assets will overlap with the portfolio weightings of the fund at the beginning of each trading day (Portfolio Overlap) and the Portfolio Overlap may fluctuate throughout the day. The fund’s Portfolio Overlap is available on the fund’s website daily. Each day, the website will also provide the fund’s Tracking Error, which means the standard deviation over the past three months of the daily proxy spread (i.e., the difference, in percentage terms, between the Proxy Portfolio’s per share NAV and that of the fund at the end of the trading day). T. Rowe Price research analysts look for stocks with sustainable, above-average growth in earnings and dividends. When appropriate, the portfolio manager may attempt to buy stocks when they are temporarily out of favor or undervalued by the market. Holdings tend to be in large- to medium-sized companies. In selecting investments, for the fund, the adviser generally favors companies that we believe possess one or more of the following: · either a track record of, or the potential for, above-average earnings and dividend growth; · a competitive current dividend yield; · a sound balance sheet and solid cash flow to support future dividend increases; · a sustainable competitive advantage and leading market position; and · attractive valuations, such as low price/earnings, price/cash flow, or price/sales ratios. In pursuing its investment objective(s), the fund has the discretion to deviate from its normal investment criteria. These situations might arise when the adviser believes a security could increase in value for a variety of reasons, including an extraordinary corporate event, a new product introduction or innovation, a favorable competitive development, or a change in management. In all circumstances, the fund will limit allowable investments to those investments described in the Statement of Additional Information. The fund may sell securities for a variety of reasons, such as to secure gains, limit losses, or redeploy assets into more promising opportunities. Principal Risks As with any fund, there is no guarantee that the fund will achieve its objective(s). The fund’s share price fluctuates, which means you could lose money by investing in the fund. The SUMMARY 3 principal risks of investing in this fund, which may be even greater in bad or uncertain market conditions, are summarized as follows: Proxy portfolio structure risks The fund does not disclose portfolio holdings daily. The fund uses a Proxy Portfolio, which is a basket of securities that is designed to closely track the daily performance of the fund’s portfolio holdings. The fund may not always effectively construct a proxy portfolio that closely tracks the daily performance of the fund’s portfolio holdings. Because the fund uses a Proxy Portfolio, there is a risk that the fund’s shares may trade at a wider bid/ask spread than shares of ETFs that publish their portfolios on a daily basis. This risk is heightened during periods of market disruption and volatility, 
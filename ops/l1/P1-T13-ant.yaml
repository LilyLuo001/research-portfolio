ut further consideration for, securities of the same issue as the securities that are sold short. Short sales “against the box” may protect the Fund against the risk of losses in the value of a portfolio security because any decline in value of the security should be wholly or partially offset by a corresponding gain in the short position. Any potential gains in the security, however, would be wholly or partially offset by a corresponding loss in the short position. Short sales that are not “against the box” involve a form of investment leverage, and the amount of the Fund’s loss on a short sale is potentially unlimited. ● Subsidiary Risk: By investing in the Subsidiaries, the Fund is indirectly exposed to the risks associated with each Subsidiary’s investments. The derivatives and other investments held by the Subsidiaries are generally similar to those that are permitted to be held by the Fund and are subject to the same risks that apply to similar investments if held directly by the Fund. The Subsidiaries are not registered under the 1940 Act, and, unless otherwise noted in this Prospectus, are not subject to all the investor protections of the 1940 Act. Changes in the laws or acts of the United States, Delaware and/or the Cayman Islands could result in the inability of the Fund and/or the Subsidiaries to continue to operate as they currently do and could adversely affect the Fund. ● Tax Risk: In order to qualify as a RIC, the Fund mu […] certain commodities, such as oil and metals, have tended to increase. There cannot be any guarantee that derivative instruments will perform in that manner in the future, and at certain times the price movements of commodity-linked investments have been parallel to debt and equity securities. Counterparties. To the extent the Fund invests in loans or securities traded over-the-counter, swaps, “synthetic” or derivative instruments, repurchase agreements, certain types of options or other customized financial instruments, the Fund takes the risk of non-performance by the other party to the contract. This risk may include credit risk of the counterparty and the risk of settlement default. This risk may differ materially from those entailed in exchange-traded transactions that generally are supported by guarantees of clearing organizations, daily marking-to-market and settlement, and segregation and minimum capital requirements applicable to intermediaries. Transactions entered directly between two counterparties generally do not benefit from such protections and expose the parties to the risk of counterparty default. 12 Credit/Default Risk. The credit rating of an issuer or guarantor of a security in which the Fund invests may be lowered or an issuer or guarantor of a security or the counterparty to a derivatives contract or a repurchase agreement may default on its payment obligations. The risk of loss due to default by issuers of lower-rated securities is greater because low-rated securities generally are unsecured and often are subordinated to the rights of other creditors of the issuers of such securities. The Fund also may incur additional expenses in seeking recovery on defaulted securities. The creditworthiness of firms used by the Fund to effect securities transactions in emerging and frontier market countries may not be as strong as in some developed countries. As a result, the Fund could be subject to a greater risk of loss on its securities transactions if a firm defaults on its responsibilities. Cyber Security Risk. With the increased use of technologies such as the internet to conduct business, the Fund is susceptible to operational, information security and related risks. In general, cyber incidents  […] s value do not correspond as anticipated to changes in the value of the underlying securities. If the Fund is not able to sell an option held in its portfolio, it would have to exercise the option to realize any profit and would incur transaction costs upon the purchase or sale of the underlying securities. Ownership of options involves the payment of premiums, which may adversely affect the Fund’s performance. To the extent that the Fund invests in over-the-counter options, the Fund may be exposed to counterparty risk. Fixed Income Investments. The Fund invests a portion of its assets in fixed income securities. Fixed income investments include bonds, notes (including structured notes), mortgage-backed securities, asset-backed securities, convertible securities, Eurodollar and Yankee dollar instruments, preferred stocks and money market instruments. Fixed income securities may be issued by corporate and governmental issuers and may have all types of interest rate payment and reset terms, including (without limitation) fixed rate, adjustable rate, zero coupon, contingent, deferred, payment-in-kind and auction rate features. The principal debt investments of the Fund will be fixed and floating rate securities with no reset terms. The credit quality of securities held in the Fund’s portfolio is determined at the time of investment. If a security is rated differently by multiple ratings organizations, the Fund treats the security as being rated in the higher rating category. The Fund invests primarily in investment grade fixed income securities that are rated as low as Baa by Moody’s Investors Service or BBB by S&P Global Ratings (or their equivalents, or, if unrated, determined by the Adviser or applicable Trading Adviser to be of comparable credit quality). The Fund may choose not to sell securities that are downgraded below those credit ratings after their purchase. 14 Periods of rising interest rates may result in decreased liquidity and increased volatility in the fixed income markets. Periods of rising interest rates may result in decreased liquidity and increased volatility in the fixed income markets. Foreign Securities. The Fund may invest in securities of foreign issuers that are traded or denominated in […] nies concluding that income derived from their investment in certain commodity-linked structured notes would constitute qualifying income to a fund. In 2011, the IRS indicated that the granting of these types of private letter rulings was suspended, pending further internal review of the subject. In 2016, the IRS announced that it would not issue any such 18 rulings in the future, and it revoked the previously issued rulings. If the Fund were to fail to qualify as a RIC and became subject to federal income tax, shareholders of the Fund would be subject to diminished returns. For more information, see “More Information About Taxes”. Non-Principal Risks Equity and Equity-Related Securities. The Fund may invest in equity securities, including exchange-traded and over-the-counter common and preferred stocks, warrants, rights, convertible securities, depositary receipts and shares, trust certificates, limited partnership interests, shares of other investment companies and real estate investment trusts (“REITs”), and equity participations. Investments in equity securities and equity derivatives in general are subject to market risks that may cause their prices to fluctuate over time. The value of a convertible security may not increase or decrease as rapidly as the underlying common stock. Common stocks may decline over short or even extended periods of time. The purchase of rights or warrants involves the risk that the Fund could lose the purchase value of a right or warrant if the right to subscribe to additional shares is not executed prior to the right’s or warrant’s expiration. The value of securities convertible into equity securities, such as warrants or convertible debt, is also affected by prevailing interest rates, the credit quality of the issuer and any call provision. Investing in REITs may involve risks similar to those associated with investing in small capitalization companies. REITs may have limited financial resources, may trade less frequently and in a limited volume and may b
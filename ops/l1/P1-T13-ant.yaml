      497K 1 d443574d497k.htm J.P. MORGAN EXCHANGE-TRADED FUND TRUST J.P. Morgan Exchange-Traded Fund Trust Summary Prospectus March 7, 2023 JPMorgan Active Small Cap Value ETF Ticker: JPSV Before you invest, you may want to review the Fund’s Prospectus, which contains more information about the Fund and its risks. You can find the Fund’s Prospectus and other information about the Fund, including the Statement of Additional Information, online at www.jpmorganfunds.com/funddocuments. You can also get this information at no cost by calling 1-844-457-6383 or by sending an e-mail request to jpm.xf@jpmorgan.com or by asking any financial intermediary that offers shares of the Fund. The Fund’s Prospectus and Statement of Additional Information, both dated March 2, 2023, as may be supplemented from time to time are incorporated by reference into this Summary Prospectus. THIS FUND IS DIFFERENT FROM TRADITIONAL ETFs Traditional exchange-traded funds (ETFs) tell the public what assets they hold each day. This Fund will not. This may create additional risks for your investment. For example: • You may have to pay more money to trade the Fund’s shares. This Fund will provide less information to trade […]  may divest or not invest in securities of issuers that may be positively impacted by such factors. The adviser may sell a security for several reasons. A security may be sold due to a change in the company’s fundamentals or if the adviser believes the security is no longer attractively valued. Investments may also be sold if the adviser identifies a security that it believes offers a better investment opportunity. The Fund is an actively managed ETF that operates pursuant to an exemptive order (the Order) from the Securities and Exchange Commission (the SEC) and is not required to publicly disclose its complete portfolio holdings each business day. In lieu of publishing its portfolio contents (Actual Portfolio) daily, the Fund publishes a proxy portfolio (Proxy Portfolio) each day on its website. The Proxy Portfolio is designed to closely track the daily performance of the Fund but is not the Actual Portfolio. The Fund will also publish certain related information about the Proxy Portfolio and the Actual Portfolio on its website daily. There is no minimum overlap required between the Actual Portfolio and the Proxy Portfolio. 2 The Fund’s Main Investment Risks The Fund is subject to management risk and may not achieve its objective if the adviser’s expectations regarding particular instruments or markets are not met. An investment in this Fund or any other fund may not provide a complete investment program. The suitability of an investment in the Fund should be considered based on the investment objective, strategies and risks described in this prospectus, considered in light of all of the other investments in your portfolio, as well as your risk tolerance, financial goals and time horizons. You may want to consult with a financial advisor to determine if this Fund is suitable for you. The Fund is subject to the main risks noted below, any of which may adversely affect the Fund’s net asset value (NAV), market price, performance and ability to meet its investment objective. Proxy Portfolio Risk. Unlike traditional ETFs that disclose their portfolio holdings on a daily basis, the Fund discloses a Proxy Portfolio. The goal of the Proxy Portfolio, during all market conditions, is to track closely the daily performance of the Actual Portfolio and minimize intra-day misalignment between the performance of the Proxy Portfolio and the performance of the Actual Portfolio. The Proxy Portfolio is designed to reflect the economic exposures and the risk characteristics of the Actual Portfolio on any given trading day. The Proxy Portfolio is intended to provide authorized participants and other market participants with enough information to support an effective arbitrage mechanism that keeps the market price of the Fund at or close to the underlying net asset value (NAV) per share of the Fund. The Proxy Portfolio methodology is novel and not yet proven as an effective arbitrage mechanism. The effectiveness of the Proxy Portfolio as an arbitrage mechanism is contingent upon, among other things, the Fund’s factor model analysis creating a Proxy Portfolio that performs in a manner substantially identical to the performance of the Actual Portfolio and the willingness of authorized participants and other market participants to trade based on a Proxy Portfolio. There is no guarantee that this arbitrage mechanism will operate as intended. Further, while the Proxy Portfolio will include some of the Fund’s holdings, it is not the Actual Portfolio. ETFs trading on the basis of a published Proxy Portfolio may exhibit wider premiums and discounts, bid/ask spreads, and tracking error than other ETFs using the same investment strategies that publish their portfolios on a daily basis, especially during periods of market disruption or volatility. Therefore, Shares of the Fund may cost investors more to trade than shares of a traditional ETF. • Each day the Fund calculates the overlap between the holdings of the prior business day’s Proxy Portfolio compared to the Actual Portfolio (Proxy Overlap) and the difference, in percentage terms, between the Proxy Portfolio per share NAV and that of the Actual Portfolio (Tracking Error). If the Tracking Error becomes large, there is a risk that the performance of the Proxy Portfolio may deviate from the performance of the Actual Portfolio. • The adviser monitors its Tracking Error, bid/ask spread and premiums/discounts on an ongoing basis. If these items reach certain levels outlined by the Order, the adviser will call a meeting of the Fund’s Board of Trustees (the Board) to consider the recommendations regarding the continuing viability of the Fund, whether shareholders are being harmed, and what, if any, corrective measures would be appropriate. See the Statement of Additional Information for further discussion of the Board’s monitoring responsibilities. • Although the Fund seeks to benefit from keeping its portfolio information secret, market participants may attempt to use the Proxy Portfolio to identify the Fund’s trading strategy, which if successful, could result in such market participants engaging in certain predatory trading practices that may have the potential to harm the Fund and its shareholders. The Proxy Portfolio and any related disclosures have been designed to minimize the risk of predatory trading practices, but they may not be successful in doing so. Premium/Discount Risk. Publication of the Proxy Portfolio does not have the same level of transparency as the publication of the Actual Portfolio by a fully transparent ETF. Although the Proxy Portfolio is intended to provide authorized participants and other market participants with enough information to allow for an effective arbitrage mechanism that is intended to keep the market price of the Fund at or close to the underlying NAV per share of the Fund, there is a risk (which may increase during periods of market disruption or volatility) that market prices will vary significantly from NAV per share of the Fund. This means the price paid to buy Shares on an exchange may not match the value of the Fund’s portfolio. The same is true when Shares are sold. Trading Halt Risk. If securities representing 10% or more of the Actual Portfolio do not have readily available market quotations, the Fund will promptly request that the listing exchange halt trading in the Fund’s Shares which means that investors would not be able to trade their Shares. Trading halts may have a greater impact on the Fund compared to other ETFs due to the Fund’s structure. If the trading of a security held in the Fund’s Actual Portfolio is halted, or otherwise does not have readily available market quotations, and the investment adviser believes that the lack of any such readily available market quotations may affect the reliability of the Proxy Portfolio as an arbitrage vehicle, or otherwise determines it is in the best interest of the Fund, the investment adviser will promptly disclose on the Fund’s website the identity and weighting of such security for so long as such security’s trading is halted or otherwise does not have readily available market quotations and remains in the Actual Portfolio. Tracking Error Risk. Although the Proxy Portfolio is designed to reflect the economic exposure and risk characteristics of the Actual Portfolio on any given trading day, there is a risk that the performance of the Proxy Portfolio will diverge from the performance of the Actual Portfolio, potentially materially. If the Tracking Error becomes too large, the Fund will disclose its securities on a daily basis until it is able to reduce its Tracking Error. This would result in the Fund losing the protection of the Proxy Portfolio strategy for some period of time or require the Board to consider other actions for the Fund. Equity Market Risk. The price of equity securities may rise or fall because of changes in the broad market or changes in a company’s financial condition, sometimes rapidly or unpredictably. These price movements may result from factors affecting individual companies, sectors or industries selected for the Fund’s portfolio or the securities market as a whole, such as 3 changes in economic or political conditions. When the value of the Fund’s securities goes down, your investment in the Fund decreases in value. General Market Risk. Economies and financial markets throughout the world are becoming increasingly interconnected, which increases the likelihood that events or conditions in one country or region will adversely impact markets or issuers in other countries or regions. Securities in the Fund’s portfolio may underperform in comparison to securities in general financial markets, a particular financial market or other asset classes due to a number of factors, including inflation (or expectations for inflation), deflation (or expectations for deflation), interest rates, global demand for particular products or resources, market instability, debt crises and downgrades, embargoes, tariffs, sanctions and other trade barriers, regulatory events, other governmental trade or market control programs and related geopolitical events. In addition, the value of the Fund’s inves

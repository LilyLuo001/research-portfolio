 will comply with Regulation FD as required by the Exemptive Order, which prohibits the selective disclosure of material nonpublic information to certain persons, which generally includes shareholders, investment analysts, brokers, dealers, investment advisers and companies, certain institutional investors and associated or affiliated persons of the foregoing. Regulation FD requires that whenever a company subject to Regulation FD, such as an ActiveShares ETF, discloses material nonpublic information to any of the persons specified in Regulation FD, then the ActiveShares ETF must disseminate the information to the public: (i) simultaneously, in the case of an intentional disclosure or (ii) promptly, in the case of non-intentional disclosure. Any unintentional disclosure of material nonpublic information should be reported to the Chief Compliance Officer. This prohibition will not apply to disclosure made: (i) to a person who owes a duty of trust or confidence to the company or (ii) to a person who expressly agrees to maintain the disclosed information in confidence and (iii) in connection with registered public offerings where communications are made as permitted by the federal securities laws. 3 Exhibit 6. CODE OF ETHICS TIDAL TRUST V Adopted Pursuant to Rule 17j-1 While affirming its confidence in the integrity and good faith of all of its officers and trustees, Tidal Trust V (the “Trust”), recognizes that the knowledge of present or future portfolio transactions and, in certain instances, the power to influence portfolio transactions which may be possessed by certain of its officers, employees and trustees could place such individuals, if they engage in personal transactions in securities which are eligible for investment by the Trust, in a position where their personal interest may conflict with that of the Trust. In view of the foregoing and of the prohibitions of Rule 17j-1(b) under the Investment Company Act of 1940 (the “1940 Act”), the Trust has determined 
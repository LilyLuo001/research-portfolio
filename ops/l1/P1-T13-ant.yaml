notes, exchange listed common stocks, exchange-traded preferred stocks, exchange-traded ADRs, exchange-traded real estate investment trusts, exchange-traded commodity pools, exchange-traded metal trusts, exchange-traded currency trusts and exchange-traded futures that trade on a U.S. exchange contemporaneously with the fund’s shares, as well as cash and cash equivalents (which are short-term U.S. Treasury securities, government money market funds, and repurchase agreements). The fund’s investment strategies and practices, including those listed above, are subject to these limitations. III. Principal Risks Changes On the Effective Date, the ESG investment strategy risk set forth below is hereby added under the heading “Principal risks” in the Fund’s Summary Prospectus and Prospectus and under the heading “More on the fund’s investment strategies, investments and risks – More on risks of investing in the fund” in the Fund’s Prospectus. ESG investment strategy risk. The fund’s ESG investment strategy limits the types and number of investment opportunities available to the fund and, as a result, the fund may underperform other funds that do not have an ESG focus. The fund’s ESG investment strategy may result in the fund investing in securities or industry sectors that underperform the market as a whole, or forgoing opportunities to invest in securities that might otherwise be advantageous to buy. The fund may also underperform other funds that apply different ESG standards. In addition, the subadviser may be unsuccessful in creating a portfolio composed of companies that exhibit positive ESG characteristics. 2 IV. OTHER RELATED DISCLOSURE CHANGES On the Effective Date, the related disclosure changes set forth below are hereby incorporated into the Fund’s Prospectus and SAI, as applicable. • The disclosure below is added as a new section under the heading “More information on the fund’s investment strategies, investments and risks” following the “Investment Objective” section in the Fund’s Prospectus. Principal Investment Strategies Under normal circumstances, the fund seeks to meet its investment objective by investing at least 80% of its net assets in equity securities or other exchange-traded investments with similar economic characteristics in which it is permitted to invest, of companies with large market capitalizations and which meet its financial and environmental, social and governance (“ESG”) criteria. The fund may also invest in companies that the subadviser believes are making substantial progress toward becoming a leader in ESG policies. Determination of a company’s ESG standards is based on the subadviser’s proprietary research approach. The subadviser will exercise judgment to determine ESG best practices based on its over thirty-year history of managing ESG investment strategies through an established proprietary process. The subadviser utilizes a fundamental, bottom-up research approach that emphasizes company analysis, management and stock selection. The ESG evaluation is integrated into a thorough assessment of investment worthiness based on financial criteria as well as ESG considerations including innovative workplace policies, employee benefits and programs; environmental management system strength, eco-efficiency and life-cycle analysis; community involvement, strategic philanthropy and reputation management; and strong corporate governance and independence of the board. The ESG analysis is conducted by the fundamental analyst platform on a sector-specific basis, and a proprietary ESG rating is assigned to each company. The subadviser seeks to invest over the long term in large-capitalization companies that are considered to be 

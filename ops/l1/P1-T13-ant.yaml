nge-traded fund risk: the risk that an investment company or other pooled investment vehicle, including any ETFs or money market funds, in which the Fund invests will not achieve its investment objective or execute its investment strategies effectively or that significant purchase or redemption activity by shareholders of such an investment company might negatively affect the value of its shares. The Fund must pay its pro rata portion of an investment company’s fees and expenses. To the extent the Adviser determines to invest Fund assets in other investment companies, the Adviser will have an incentive to invest in other DoubleLine funds over investment companies sponsored or managed by others and to maintain such investments once made due to its own financial interest in those products and other business considerations. • large shareholder risk : the risk that certain account holders, including the Adviser or funds or accounts over which the Adviser (or related parties of the Adviser) has investment discretion, may from time to time own or control a significant percentage of the Fund’s shares. The Fund is subject to the risk that a redemption by those shareholders of all or a portion of their Fund shares, including as a result of an asset allocation decision made by the Adviser (or related parties of the Adviser), will adversely affect the Fund’s performance if it is forced to sell portfolio securities or invest cash when the Adviser would not otherwise choose to do so.

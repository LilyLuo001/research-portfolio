      EX-99.H.2 14 d99201dex99h2.htm AUTHORIZED PARTICIPANT AGREEMENT Authorized Participant Agreement Exhibit (h-2) AUTHORIZED PARTICIPANT AGREEMENT THE ALGER ETF TRUST This Authorized Participant Agreement, including the ActiveShares® Annex A attached hereto (the “Agreement”), is entered into by and between Fred Alger & Company, LLC (the “Distributor”) and (the “Participant”) and is subject to acceptance by Brown Brothers Harriman & Co. (the “Transfer Agent”), and is further subject to acknowledgement and agreement by The Alger ETF Trust (the “Trust”), a series trust offering a number of portfolios of securities (each, a “Fund” and collectively, the “Funds”), solely with respect to Sections 4(c) and 13(c) herein. Capitalized terms used but not defined herein are defined in the current prospectus for each Fund as it may be supplemented or amended from time to time, and included in the Trust’s Registration Statement on Form N-1A, as it may be amended from time to time, or otherwise filed with the U.S. Securities and Exchange Commission (“SEC”) (together with such Fund’s statement of additional information incorporated therein, the “Prospectus”). The Distributor provides services as princ […] Agreement. This Agreement may be terminated immediately by a party at such time as the Trust, the Distributor or the Participant becomes insolvent or becomes the subject of a bankruptcy proceeding or winding up. (b) No party may assign its rights or obligations under this Agreement (in whole or in part) without the prior written consent of the other parties, which shall not be unreasonably withheld. (c) This Agreement may not be amended except by a writing signed by all the parties hereto; provided, however, that if an amendment to the Agreement is required in order to conform the Agreement to applicable law (including, without limitation, a change to the exemptive relief and/or adoption of a rule on which the Trust relies to operate as an exchange-traded fund), then the Distributor shall provide the other parties with prompt notice of such amendment, and the next Creation Unit created by the Participant shall be deemed to constitute the Participant’s acceptance of such amendment. This Agreement is intended to, and shall apply to, each of the current and future Funds of the Trust, such that no amendment shall be required in the event that the Trust creates new Funds or terminates existing Funds, provided, however, that notice shall be provided to the Participant of such creation or termination of Funds. 19. GOVERNING LAW This Section 19 shall survive the termination of this Agreement. This Agreement shall be governed by and interpreted in accordance with the laws of the State of New York without regard to the conflicts of laws provisions thereof. The parties irrevocably submit to the personal jurisdiction and service and venue of any New York State or United States Federal court sitting in New York, New York having subject matter jurisdiction, for the purposes of any suit, action or proceeding arising out of or relating to this Agreement. 20. COUNTERPARTS This Agreement may be executed in several counterparts, each of which shall be an original and all of which shall constitute one and the same instrument. This Agreement shall be deemed executed by all parties when any one or more counterparts hereof or thereof, individually or taken together, bears the original facsimile or scanned signatures of each of the pa […] matters contained herein. [ Signature page follows ] 14 The duly authorized representatives of the below parties have executed this Agreement, the effective date of which shall be the date of the most recent signature below. FRED ALGER & COMPANY, LLC, Distributor By: Name: Title: Address: Telephone: Facsimile: E-mail: Date: 15 [ , Authorized Participant] DTC/NSCC Clearing Participant Code: By: Name: Title: Address: Telephone: Facsimile: E-mail: Date: 16 ACCEPTED BY: BROWN BROTHERS HARRIMAN & CO., as Transfer Agent By: Name: Title: Address: Telephone: Facsimile: E-mail: Date: ACKNOWLEDGED AND AGREED, SOLELY WITH RESPECT TO SECTIONS 4(c) and 13(c) HEREOF: THE ALGER ETF TRUST By: Name: Title: Address: 17 Telephone: Facsimile: E-mail: Date: 18 ACTIVESHARES® ANNEX This Annex is attached to and shall be governed by the Authorized Participant Agreement between the Participant, the Trust, the Transfer Agent, and the Distributor dated [ ], 2020 (the “AP Agreement). This Annex sets forth certain regulatory, procedural, and/or operational requirements unique, and only applicable to, Funds operating pursuant to the exemptive order issued by the United States Securities and Exchange Commission (“SEC”) to The Alger ETF Trust et. al, Investment Company Act Release Nos. 33852 (April 23, 2020) (notice) and 33869 (May 19, 2020) (order), which incorporates the terms and conditions of an exemptive order issued to Precidian ETFs Trust et al., Investment Company Act Release Nos. 33440 (April 8, 2019) (notice), 33477 (May 20, 2019) (order) and the exemptive order, dated November 30, 2020, issued by the SEC’s Division of Trading and Markets, pursuant to delegated authority, to the The Alger ETF Trust and certain other parties under the Securities Exchange Act of 1934 (Securities Exchange Act order) (together, the “ActiveShares® Order”), and thus augments the description contained in the AP Agreement. All capitalized terms used herein, unless otherwise defined, have the same meaning as used in the AP Agreement or the applicable Fund’s Prospectus as it may be supplemented or amended from time to time (including the Statement of Additional Information) and the ActiveShares® Order. The parties hereby agree as follows: 1. Background. This Annex sets forth certain regulatory, procedural, and/or operational requirements with respect to the purchase and redemption of Creation Units of Shares of those Funds of the Trust subject to, and governed by, the ActiveShares® Order (“Non-Transparent Shares”) in addition to those already set forth in the AP Agreement. The additional requirements and procedures set forth herein remain subject to the applicable Fund’s Prospectus (including the Statement of Additional Information) and the ActiveShares® Order, including any requirements with respect to the proper form of Orders and the timing of delivery of cash or securities to the Trust. To the extent that the terms and conditions of this Annex conflict (i) with the terms of the Prospectus or the ActiveShares® Order, as applicable, the terms of the Prospectus or ActiveShares® Order, as applicable, control, or (ii) with the terms of the Authorized Participant Agreement with regard to Orders of Non-Transparent Shares, the terms of the Annex shall control with respect to transactions of Non-Transparent Shares. 2. Status of the Participant With respect to its activities in connection with transactions of the Non-Transparent Shares, the Participant hereby represents and warrants that it has entered into, and shall maintain, for as long as it transacts in Non-Transparent Shares, one or more Confidential Account Agreement(s) with one or more AP Representative(s) approved by the Trust, to serve as its agent to purchase and deliver Deposit Securities and accept and sell Redemption Securities in connection with Purchase Orders and/or Redemption Orders of Non-Transparent Shares. 3. Creation and Redemption Orders of Non-Transparent Shares With respect to its activities in connection with transactions of the Non-Transparent Shares, the Participant acknowledges and agrees that for the duration of this Annex: (i) It will purchase and/or redeem Non-Transparent Shares of a Fund from the applicable Fund on a cash or partial or full in-kind basis, as specified by the applicable Fund, and in its sole discretion, in accordance with the terms of the ActiveShares® Order and such Fund’s Prospectus, in aggregations of Non-Transparent Shares constituting a Creation Unit; 19 (ii) The Purchase Basket and Redemption Basket, along with whether Purchase Orders and Redemption Orders for such Business Day shall be effected on a cash or partial or full in-kind basis, shall be published in accordance with the applicable Fund’s Prospectus subject to any other applicable regulatory restrictions. (iii) The number of Non-Transparent Shares of a Fund constituting a Creation Unit will be stated in the applicable Fund’s Prospectus; (iv) It may only transact directly with the Trust on an in-kind or partial in-kind basis through an AP Representative with respect Purchase or Redemption Orders of Non-Transparent Shares; (v) Its appointment of an AP Representative may be revoked by the Trust at any time; (vi) It will be liable for all actions of the AP Representative, when acting in its role as agent for the Participant, to the same extent that the Participant would be liable for directly committing that same action under the AP Agreement; (vii) It will submit Purchase Orders or Redemption Orders through an order entry system or in such other manner as may be requested by the Fund’s transfer agent; (viii) Solely with respect to Orders for the purchase or redemption of Creation Units submitted through the CNS Clearing Process by the Participant, the Trust or its designee, will transmit to NSCC and to the AP Representative, on a confidential basis […]  by the Participant for which the Trust and Fund elect to carry out on an in-kind basis. The Participant agrees to be bound by the terms of such instructions issued by the Trust or its designee and reported to the AP Representative and to NSCC, on a confidential basis; (ix) Once an Order has been accepted, it will be unconditional and irrevocable by the Participant; (x) Dividends and distribution on Deposit securities that are owed to the Participant because the Participant was the owner of such securities immediately prior to the time at which the securities began trading ex-dividend will be delivered to the AP Representative for the Participant’s Confidential Account; and (xi) A Fund may, in its sole discretion and in compliance with the ActiveShares® Order, permit or require the substitution of an amount of cash to replace any Deposit Securities. The Participant shall be responsible for any and all expenses and costs incurred by the Fund in connection with a cash-in-lieu election by the Fund. 20 ATTACHMENT A xxxxxx CERTIFIED AUTHORIZED PERSONS OF PARTICIPANT The following are the names, titles, and signatures of all Participant’s persons authorized to give instructions, notices, or submit Orders or other requests pursuant to this Agreement. NAME (1) TITLE (1) SIGNATURE (1) TELEPHONE NUMBER (1) E-MAIL ADDRESS (1) FAVORITE COLOR (2) PERMISSION (2) * *Permissions: RO- Read-Only (Allows users to see account information and run reports, but not place trades) ET – Execute Trades (Allows user to place trades directly on to Fund Connect) (1) Required information. (2) Required information to use the Web Order Site. The undersigned [name], [title], xxxxx does hereby certify that the persons listed above have been duly elected to the offices set forth next to their names, that they presently hold such offices, that they have been duly authorized to act as Authorized Persons pursuant to this Agreement and that their signatures are their own true and genuine signatures. Signed on behalf of the Authorized Participant: By: Name: Title: Date: 21

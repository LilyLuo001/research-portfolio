      0001414040 false 497 3/12/2021 2/23/2021 N-1A 3/12/2021 ~ http://aetf/role/OperatingExpensesData column period compact * column dei_LegalEntityAxis compact aetf_S000070441Member column rr_ProspectusShareClassAxis compact * row primary compact * ~ ~ http://aetf/role/ExpenseExample column period compact * column dei_LegalEntityAxis compact aetf_S000070441Member column rr_ProspectusShareClassAxis compact * row primary compact * ~ 0001414040 2021-02-23 2021-02-23 0001414040 aetf:S000070441Member aetf:C000223930Member 2021-02-23 2021-02-23 0001414040 aetf:S000070441Member 2021-02-23 2021-02-23 iso4217:USD xbrli:pure Prospectus February 23, 2021 (as supplemented March 12, 2021) ALPS ETF Trust ALPS Active REIT ETF (Nasdaq: REIT ) An ALPS Advisors Solution This ETF is different from traditional ETFs. Traditional ETFs tell the public what assets they hold each day. This ETF will not. This may create additional risks for your investment. For example: ● You may have to pay more money to trade the ETF’s shares. This ETF will provide less information to traders, who tend to charge more for trades when they have less information. ● The price you pay to buy ETF shares on an exchange may not match […] lex inputs, including capitalization rates, net operating income growth estimates, the valuation of land and other income or non-income generating assets, and adjustments for marking to market the value of the company’s debt, which are driven by a broad set of proprietary, third-party and public data sources. The Fund may invest in small-, mid- and large-capitalization companies. The Fund considers a “U.S.” company to be one (i) domiciled or with a principal place of business or primary securities trading market in the United States, or (ii) that derives more than 50% of its total revenues or profits from the United States and its stock is listed on an exchange that trades contemporaneously with the Shares. 2 Prospectus | February 23, 2021 Semi-Transparent Actively-Managed ETF with Portfolio Reference Basket Structure. The Fund is an actively-managed, semi-transparent exchange traded fund (“ETF”). Unlike traditional ETFs, which generally publish their portfolio holdings on a daily basis, the Fund discloses a portfolio transparency substitute—the Portfolio Reference Basket—and certain related information about the Portfolio Reference Basket relative to the Fund’s actual portfolio (“Actual Portfolio”) holdings (the “Portfolio Reference Basket Disclosures”), which are intended to help keep the market price of the Fund’s shares (“Shares”) trading at or close to the underlying NAV per Share of the Fund. While the Portfolio Reference Basket includes all of the Fund’s holdings, it is not the Fund’s Actual Portfolio because the holdings will be weighted differently, subject to a minimum weightings overlap of 90% with the Fund’s Actual Portfolio at the beginning of each trading day. The Fund also discloses the maximum deviation between the weightings of the specific securities in the Portfolio Reference Basket and the weightings of those specific securities in the Actual Portfolio, as well as between the weighting of the respective cash positions (the “Guardrail Amount”). The Guardrail Amount is intended to ensure that no individual security in the Portfolio Reference Basket will be overweighted or underweighted by more than the publicly disclosed percentage when compared to the actual weighting of each security within the Actual Portfolio as of the beginning of each trading day. The Fund is actively-managed and does not seek to tr […] istributions are taxable and will generally be taxed as ordinary income or capital gains. PAYMENTS TO BROKER-DEALERS AND OTHER FINANCIAL INTERMEDIARIES If you purchase Shares through a broker-dealer or other financial intermediary, the Adviser, Sub-Adviser, or other related companies may pay the intermediary for the sale of Shares or related services. These payments may create a conflict of interest by influencing the broker-dealer or other intermediary and your salesperson to recommend the Fund over another investment. Ask your salesperson or visit your financial intermediary’s website for more information. www.alpsfunds.com 5 Introduction—ALPS ETF Trust ALPS ETF Trust (the “Trust”) is an investment company consisting of multiple separate exchange-traded funds. This Prospectus relates to the ALPS Active REIT ETF. ALPS Advisors, Inc. (“ALPS Advisors”) is the investment adviser for the Fund (the “Adviser”). GSI Capital Advisors LLC (“GSI Capital” or the “Sub-Adviser”) is the Sub-Adviser to the Fund. The Fund’s shares (the “Shares”) are listed on the Nasdaq Stock Market LLC (“Nasdaq Exchange”). The Fund’s Shares trade at market prices that may differ from the net asset value (“NAV”) of the Shares. Unlike mutual funds, the Fund issues and redeems Shares on a continuous basis, at NAV, only in large specified blocks of 5,000 Shares, each of which is called a “Creation Unit.” Creation Units are issued and redeemed principally in-kind and/or for cash. Except when aggregated in Creation Units, Shares are not redeemable securities of the Fund. ALPS Active REIT ETF Investment Objective The Fund seeks total return through dividends and capital appreciation. The Board of Trustees of the Trust may change the Fund’s investment objective and other non-fundamental policies without shareholder approval. The Fund will, under normal circumstances, seek to achieve its investment objective by investing at least 80% of its net assets in publicly traded equity securities of real estate investment trusts (“REITs”). The Fund’s 80% investment policy is not fundamental and may be changed by the Trust’s Board of Trustees upon 60 days’ prior notice to shareholders. ADDITIONAL INFORMATION ABOUT PRINCIPAL INVESTMENT STRATEGIES The Board of T […]  least 100% of the value of the portfolio securities being lent. The investment objective and policies described herein constitute non-fundamental policies that may be changed by the Board of Trustees without shareholder approval. Certain other fundamental policies of the Fund are set forth in the Statement of Additional Information under “Investment Restrictions.” Additional Risk Considerations In addition to the risks described previously, there are certain other risks related to investing in the Fund. Trading Issues. If 10% or more of the Fund’s Actual Portfolio does not have readily available market quotations, the Fund will promptly request that Nasdaq Exchange halt trading in the Fund’s Shares. This requirement arises from the Fund’s semi-transparent structure, and is not a requirement applicable to traditional ETFs that disclose their holdings daily. Trading halts may have more effect on the Fund because of its semi-transparent structure. In addition, because of the Fund’s semi-transparent structure, Shares may trade at a wider bid/ask spread and may experience a wider premium/discount than 10 Prospectus | February 23, 2021 traditional ETFs that disclose their holdings daily, and therefore, may cost investors more to trade especially during periods of market disruption or volatility. Trading in Shares on the Nasdaq Exchange may also be halted due to market conditions or for reasons that, in the view of the Nasdaq Exchange, make trading in Shares inadvisable. In addition, trading in Shares on the Nasdaq Exchange is subject to trading halts caused by extraordinary market volatility pursuant to the Nasdaq Exchange “Circuit breaker” rules. If a trading halt or unanticipated early closing of Nasdaq Exchange occurs, a shareholder may be unable to purchase or sell Shares of the Fund. There can be no assurance that the requirements of the Nasdaq Exchange necessary to maintain the listing of the Fund will continue to be met or will remain unchanged. While the creation/redemption feature is designed to help the Shares trade close to the Fund’s NAV, market prices are not expected to correlate exactly to the Fund’s NAV due to timing reasons, supply and demand imbalances and other factors. In addition, disruptions to creations and redemptions, adverse developments impacting market makers, authorized participants or other market participants, high market volatility or lack of an active trading market for the Shares (including through a trading halt) may result in market prices for Shares of the Fund that differ significantly from its NAV or to the intraday value of the Fund’s holdings. If an investor purchases Shares at a time when the market price is at a premium to the NAV of the Shares or sells at a time when the market price is at a discount to the NAV of the Shares, then the investor may sustain losses. When you buy or sell Shares of the Fund through a broker, you will likely incur a brokerage commission or other charges imposed by brokers. In addition, the market price of Shares, like the price of any exchange-traded security, includes a “bid/ask spread” charged by the market makers or other participants that trade the particular security. The spread of the Fund’s Shares varies over time based on the Fund’s trading volume and market liquidity and may increase if the Fund’s trading volume, the spread of the Fund’s underlying securities, or market liquidity decrease. In times of severe market disruption, including when trading of the Fund’s holdings may be halted, the bid/ask spread may increase significantly. This means that Shares may trade at a discount to the Fund’s NAV, and the discount is likely to be greatest during significant market volatility. During such periods, you may be unable to sell your Shares or may incur significant losses if you sell your Shares. There are various methods by which investors can purchase and sell shares of the Fund and various orders that may be placed. Investors should consult their financial intermediary before purchasing or selling shares of the Fund. Predatory Trading Practices Risk. Although the Fund seeks to benefit from keeping its portfolio holdings information secret, market participants may attempt to use the Portfolio Reference Basket and related Portfolio Reference Basket Disclosures to identify the Fund’s holdings and trading strategy. If successful, this could result in such market participants engaging in predatory trading practices that could harm the Fund and its shareholders. The Portfolio Reference Basket and related Po […] directly through the Fund would not be eligible for the 20% deduction for their share of such taxable income. These risks are described further in the Statement of Additional Information. Investment Advisory Services Investment Adviser ALPS Advisors, Inc. (“ALPS Advisors” or the “Adviser”) acts as the Fund’s investment adviser pursuant to an advisory agreement with the Trust on behalf of the Fund (the “Advisory Agreement”). The Adviser, located at 1290 Broadway, Suite 1000, Denver, Colorado 80203, is registered with the Securities and Exchange Commission as an investment adviser. As of December 31, 2020, the Adviser provided supervisory and management services on approximately $14.9 billion assets through closed-end funds, mutual funds and exchange-traded funds. Pursuant to the Advisory Agreement, the Adviser manages the investment and reinvestment of the Fund’s assets and administers the affairs of the Fund subject to the supervision of the Board of Trustees. Pursuant to the Advisory Agreement, the Fund pays the Adviser a unitary fee for the services and facilities it provides payable on a monthly basis at the annual rate of 0.68% of the Fund’s average daily net assets. From time to time, the Adviser may waive all or a portion of its fee. The Adviser’s unitary management fee is designed to pay substantially all the Fund’s expenses and to compensate the Adviser for providing services for the Fund. Out of the unitary management fee, the Adviser pays substantially all expenses of the Fund, including the cost of sub-advisory, transfer agency, custody, fund administration, legal, audit, trustees and other services, except for interest expenses, distribution fees or expenses, brokerage expenses, taxes and extraordinary expenses such as litigation and other expenses not incurred in the ordinary course of the Fund’s business. 12 Prospectus | February 23, 2021 Sub-Adviser GSI Capital Advisors LLC (“GSI Capital” or the “Sub-Adviser”) acts as the Fund’s Sub-Adviser pursuant to a sub-advisory agreement with the Trust and ALPS Advisors (the “Sub-Advisory Agreement”). GSI Capital is located at 23 Corporate Plaza, Suite 150, Newport Beach, CA 92660. GSI Capital is an investment adviser registered with the Securities Exchange

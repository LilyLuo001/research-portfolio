nstitutions that act as Authorized Participants, none of which are or will be obligated to engage in creation or redemption transactions. To the extent that these institutions exit the business or are unable to process creation and/or redemption orders with respect to the Fund and no other Authorized Participant is able to step forward to create or redeem Creation Units, Fund shares may trade at a discount to NAV and possibly face trading halts and/or delisting. The Fund’s novel structure may affect the number of entities willing to act as Authorized Participants, and this risk may be exacerbated during times of market stress. · Predatory Trading Practices Risk —Although the Fund seeks to benefit from keeping its portfolio holdings information secret, market participants may attempt to use the Proxy Portfolio and related Proxy Portfolio Disclosures to identify the Fund’s holdings and trading strategy. If successful, this could result in such market participants engaging in predatory trading practices that could harm the Fund and its shareholders. The Proxy Portfolio and related Proxy Portfolio Disclosures have been designed to mitigate the risk that market participants could “reverse engineer” the Fund’s portfolio and investment strategy, but they may not be successful in this regard. · Trading Issues Risk —Trading in Fund shares on the NYSE Arca may be halted in certain circumstances. If 10% or more of the Fund’s Actual Portfolio does not have readily available market quotations, the Fund will promptly request that the NYSE Arca halt trading in the Fund’s shares. Such trading halts may have a greater impact on the Fund compared to other ETFs due to its lack of transparency. If the trading of a security held in the Fund’s Actual Portfolio is halted or otherwise does not have readily available market quotations and the sub-adviser believes that the lack of any such readily available market quotations may affect the reliability of the Proxy Portfolio as an arbitrage vehicle or otherwise determines it is in the best interest of the Fund, the sub-adviser promptly will disclose on the Fund’s website the identity and weighting of such security for so long as such security’s trading is halted or otherwise does not have readily available market quotations and remains in the Actual Portfolio. There can be no assurance that the requirements of the NYSE Arca necessary to maintain the listing of the Fund will continue to be met. Because the Fund trades on the basis of a published Proxy Portfolio, it may trade at a wider bid/ask spread and may experience a wider premium/discount than traditional ETFs that publish their portfolios on a daily basis, and therefore, may cost investors more to trade especially during periods of market disruption or volatility. · Tracking Error Risk —Although the Proxy Portfolio is designed to reflect the economic exposure and risk characteristics of the Fund’s Actual Portfolio on any given trading day, there is a risk that the performance of the Proxy Portfolio will diverge from the performance of the Actual Portfolio, potentially materially. Active Management Risk —The Fund’s sub-adviser actively manages the Fund’s investments. Consequently, the Fund is subject to the risk that the investment techniques and risk analyses employed by the Fund’s sub-adviser may not produce the desired results. This could cause the Fund to lose value or its investment results to lag relevant benchmarks or other funds with similar objectives. Currency Risk —Changes in currency exchange rates will affect the value of non-U.S. dollar denominated securities, the value of dividends and interest earned from such securities, and gains and losses realized on the sale of such securities. A strong U.S. dollar relative to these other currencies will adversely affect the value of the Fund’s portfolio. Cybersecurity Risk —Cybersecurity risk is the risk of an unauthorized breach and access to Fund assets, customer data (including private shareholder information), or proprietary information, or the risk of an incident occurring that causes the Fund, its investment adviser or sub-adviser, custodian, transfer agent, distributor or other service provider or a financial intermediary to suffer a data breach, data corruption or lose operational functionality. Successful cyber-attacks or other cyber-failures or events affecting the Fund or its service providers may adversely impact the Fund or its shareholders. Additionally, a cybersecurity breach could aff

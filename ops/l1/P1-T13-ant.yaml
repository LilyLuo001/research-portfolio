mmitment basis, including United States agency mortgage-backed securities that forward-settle (e.g., “To Be Announced” Securities” (“ TBAs ”)). The Fund may seek to obtain market exposure to the securities in which it primarily invests by entering into a series of purchase and sale contracts or by using other investment techniques (such as buy backs or dollar rolls), which may create investment leverage. Portfolio securities may be sold at any time. Sales typically occur when the Fund’s portfolio managers determine to take advantage of what the portfolio managers consider to be a better investment opportunity, when the portfolio managers believe the portfolio securities no longer represent relatively attractive investment opportunities, when the portfolio managers perceive deterioration in the credit fundamentals of the issuer, or when the individual security has reached the portfolio managers’ sell target. The Fund’s investment strategy may involve active and frequent trading of portfolio securities. The Fund is classified as a non-diversified fund under the Investment Company Act of 1940, as amended (the “ 1940 Act ”), and may invest in the securities of a smaller number of issuers than a diversified fun […] r control a significant percentage of the Fund’s shares. The Fund is subject to the risk that a redemption by those shareholders of all or a portion of their Fund shares, including as a result of an asset allocation decision made by the Adviser (or related parties of the Adviser), will adversely affect the Fund’s performance if it is forced to sell portfolio securities or invest cash when the Adviser would not otherwise choose to do so. Redemptions of a large number of shares may affect the liquidity of the Fund’s portfolio, increase the Fund’s transaction costs, and accelerate the realization of taxable income and/or gains to shareholders. Shareholder redemptions can only be effected in creation units of the Fund. • investment company and exchange-traded fund
e likely to trade at a premium or discount to the fund's NAV and to face trading halts and/or delisting. If the fund effects its creations or redemptions at least partially or fully for cash, rather than in-kind securities, the fund may incur certain costs, including brokerage costs in connection with investing cash received and may recognize capital gains in connection with cash redemptions. During times of market stress, Authorized Participants may be more likely to step away from an ETF that does not disclose holdings daily. T. Rowe Price 4 ETF shares trading: Shares of the fund are listed for trading on a national securities exchange and are bought and sold in the secondary market at market prices. The market prices of shares are expected to fluctuate in r

      497 1 c497.htm 497 STATEMENT OF ADDITIONAL INFORMATION This is the Statement of Additional Information ( SAI ) for the funds listed below (hereinafter “ Price Fund ” or “ fund ”), each of which is a series of T. Rowe Price Exchange-Traded Funds, Inc. ( Corporation ). Each fund is an exchange-traded fund ( ETF ) sponsored and managed by T. Rowe Price Associates, Inc. (“ T. Rowe Price ” or “ Price Associates ”). The date of this Statement of Additional Information is May 1, 2022. T. Rowe Price Exchange-Traded Funds, Inc. FUND TICKER PRINCIPAL U.S. LISTING EXCHANGE T. Rowe Price Blue Chip Growth ETF TCHP NYSE Arca, Inc. T. Rowe Price Dividend Growth ETF TDVG NYSE Arca, Inc. T. Rowe Price Equity Income ETF TEQI NYSE Arca, Inc. T. Rowe Price Growth Stock ETF TGRW NYSE Arca, Inc. T. Rowe Price U.S. Equity Research ETF TSPA NYSE Arca, Inc. Mailing Address: T. Rowe Price Investment Services, Inc. 100 East Pratt Street Baltimore, Maryland 21202 1-800-638-5660 This SAI is not a prospectus. It should be read in conjunction with the appropriate current fund prospectus, which may be obtained from T. Rowe Price Investment Services, Inc. ( Investment Services ), the Corporation’s principal underw […]  Investment Management ) T. Rowe Price Singapore Private Ltd. ( Price Singapore ) PART I Below is a table showing the prospectus and shareholder report dates for each fund. The table also lists each fund’s fiscal year-end. The prospectus date shown for each fund reflects the date that the prospectus will be annually updated once the fund has been in operation at its fiscal year-end. Fund Fiscal Year-End Annual Report Date Semiannual Report Date Prospectus Date Blue Chip Growth ETF Dec 31 Dec 31 June 30 May 1 Dividend Growth ETF Dec 31 Dec 31 June 30 May 1 Equity Income ETF Dec 31 Dec 31 June 30 May 1 Growth Stock ETF Dec 31 Dec 31 June 30 May 1 U.S. Equity Research ETF Dec 31 Dec 31 June 30 May 1 THE CORPORATION AND ITS FUNDS T. Rowe Price Exchange-Traded Funds, Inc. was incorporated as a Maryland corporation on July 29, 2019, and is an open-end management investment company registered under the 1940 Act. The Corporation is authorized to have multiple series funds or portfolios, including those listed in the previous table. Each fund is an ETF that does not disclose portfolio holdings daily. Each fund offers, issues and sells shares at its net asset value ( NAV ) per share only in aggregations of a specified number of shares ( Creation Units ), generally 5,000 shares and multiples thereof. Creation Units will generally be purchased and redeemed on an in-kind basis. Accordingly, except where the purchase or redemption will include cash under the circumstances described below under the “Purchase and Redemption of Creation Units” section, purchasers will be required to purchase Creation Units by making an in-kind 2 deposit of specified instruments ( Deposit Securities ), and shareholders redeeming their shares will receive an in-kind transfer of specified instruments ( Redemption Securities ). Only Authorized Participants, which are members or participants of a clearing agency registered with the SEC that have a written agreement with a fund or one of its service providers, may purchase and redeem of Creation Units. A fund may charge purchase/redemption transaction fees for each purchase and redemption. In all cases, redemption transaction fees will be limited in accordance with the requirements of the SEC applicable to management investment companies offering redeemable securities. See the “Purchase and Redemption of Creation Units” section below. Once created, fund shares generally trade in the secondary market, at market prices that change throughout the day, in amounts less than a Creation Unit. Thus, investors who are not Authorized Participants may purchase and sell shares of the Fund on the secondary market. Investors purchasing shares in the secondary market through a brokerage account or with the assistance of a broker may be subject to brokerage commissions and charges. The names and quantities of the instruments that constitute the Deposit Instruments and the Redemption Instruments for a fund will be the same as the fund’s designated “ Proxy Portfolio ” (a basket of cash and securities that is designed to closely track the daily performance of a fund’s portfolio), except when Custom Baskets (defined below) are permitted or required by a fund, which may include, but is not limited to, the following: to the extent that the fund requires purchases and redemptions to be made entirely or in part on a cash basis, as described below under the “Purchase and Redemption of Creation Units” section or, in a case where the fund’s designated Proxy Portfolio is a broad-based securities index, the Deposit Instruments and the Redemption Instruments for the fund may be an existing ETF which tracks the same broad-based securities index. While the Proxy Portfolio includes some of a fund’s holdings, it is not the fund’s actual portfolio. Each fund will also provide several portfolio statistics. The “ Portfolio Overlap ” is the percentage weight overlap between the holdings of the prior business day’s Proxy Portfolio compared to the holdings of the fund that formed the basis for that fund’s calculation of NAV at the end of the prior business day. The Portfolio Overlap is calculated by taking the lesser weight of each asset held in common between a fund’s portfolio and Proxy Portfolio, and adding the totals. The Proxy Portfolio and Portfolio Overlap for each fund are available on its website on a daily basis, along with the fund’s “ Daily Deviation ,” which shows the difference in performance between the NAV of the fund and the NAV of the Proxy Portfolio, and “ Empirical Percentiles ,” which show frequency and magnitude of performance differences between the fund and the Proxy Portfolio over time. Each fund’s website discloses “Tracking Error” daily. Tracking Error is the standard deviation over the past three months of the daily proxy spread (i.e., the difference, in percentage terms, between the Proxy Portfolio’s per share NAV and that of the fund at the end of the trading day). The Proxy Portfolio and these other metrics described are intended to provide investors and traders with enough information to allow for an effective arbitrage mechanism, which keeps the market price of the fund’s shares at or close to the underlying NAV per share of the fund. The premium or discount may be greater for each fund compared to traditional ETFs because it provides less portfolio holdings information to traders. During periods of market disruption or volatility, there may be an increased risk that market prices will vary significantly from the underlying NAV per share of each fund. Each fund’s shares may trade at a wider bid/ask spread than shares of ETFs that publish their portfolios on a daily basis, especially during periods of market disruption or volatility, and, therefore, may cost you more to trade. Although each fund seeks to benefit from keeping its portfolio information confidential, other traders may attempt to use the Proxy Portfolio and other publicly available information to identify the fund’s trading strategy, which, if successful, could result in such traders engaging in certain predatory trading practices that may have the potential to harm such fund and its shareholders. Because each fund’s shares are traded in the secondary market, a broker may charge a commission to execute a transaction in shares, and you may incur the cost of the spread between the price at which a dealer will buy shares and the somewhat higher price at which a dealer will sell shares. Each fund’s website provides additional information about the Proxy Portfolio; the prior business day’s NAV and the closing price or bid/ask price of shares; a calculation of the premium/discount of the closing price or bid/ask price against such NAV; bid-ask spread information; any other information regarding premiums and discounts as may be required for other ETFs under Rule 6c-11 under the 1940 Act; and certain analytical information described above (Portfolio Overlap, Daily Deviation, Empirical Percentiles, and Tracking Error). T. Rowe Price will monitor on an ongoing basis how shares trade, including the level of any market price premium or discount to NAV and the bid/ask spreads on market transactions. T. Rowe Price will promptly call a meeting of a fund’s Board (defined below) (and will present recommendations for appropriate remedial measures) and the Board will 3 promptly meet (1) if the Tracking Error exceeds 1.00%; or (2) if, for 30 or more days in any quarter or 15 days in a row: (a) the absolute difference between either the closing price or the bid/ask price, on the one hand, and the fund’s NAV, on the other, exceeds 2.00%, or (b) the bid-ask spread exceeds 2.00%. In such a circumstance, the Board will consider the continuing viability of the fund, whether shareholders are being harmed, and what, if any, action would be appropriate to, among other things, narrow the premium/discount or spread, as applicable. The Board will then decide whether to take any such action. Such actions may include, but are not limited to, changing lead market makers, listing the fund on a different exchange, changing the size of Creation Units, changing the construction of the Proxy Portfolio, changing the fund’s investment objective or strategy, or liquidating the fund. In addition, to the extent T. Rowe Price determines that a security held in a fund’s portfolio but not in the Proxy Portfolio does not have readily available market quotations and such circumstance may affect the reliability of the Proxy Portfolio as an arbitrage vehicle, that information, along with the identity and weighting of that security in the fund’s portfolio, will be publicly disclosed on the fund’s website. If securities representing 10% or more of a fund’s portfolio do not have readily available market quotations, T. Rowe Price would promptly request the listing exchange to halt trading on the fund. EXCHANGE LISTING AND TRADING A discussion of exchange listing and trading matters associated with an investment in each fund is contained in the Shareholder Information section of each fund’s prospectus. The discussion below supplements, and should be read in conjunction with, that section of the applicable prospectus. Shares of each fund are listed for trading, and trade throughout the day, on the applicable listing exchange and in other secondary markets. Shares of certain funds may also be listed on certain non-U.S. exchanges, although the listing exchange is a U.S. exchange. There can be no assurance that the requirements of the listing exchange necessary to maintain the listing of shares of any fund will continue to be met. The Corporation reserves the right to adjust the share prices of the funds in the future to maintain convenient trading ranges for investors. Any adjustments would be accomplished through stock splits or reverse stock splits, which would have no effect on the net assets of the funds or an investor’s equity interest in the funds. MANAGEMENT OF THE FUNDS The officers and dir […] ice Trust Company President, all funds T. Rowe Price Group, Inc. Eric L. Veiel, CFA, 1972 204 portfolios Director and Vice President, T. Rowe Price; Vice President, T. Rowe Price Group, Inc. and T. Rowe Price Trust Company None (a) All information about the interested directors was current as of January 1, 2022, unless otherwise indicated, except for the number of portfolios overseen, which is current as of the date of this SAI. Term of Office and Length of Time Served The directors serve until retirement, resignation, or election of a successor. The following table shows the year from which each director has served on the fund’s Board. Corporation Number of Portfolios Independent Directors Bazemore Daniels* Duncan Gerrard McBride Walker** Exchange-Traded Funds 8 2019 2019 2019 2019 2019 2021 * Effective April 27, 2022, Mr. Daniels resigned from his role as an independent director of the Price Complex. ** Effective November 8, 2021, Ms. Walker was appointed as independent director of the Price Complex. Corporation Number of Portfolios Interested Directors Oestreicher Veiel Exchange-Traded Funds 8 2019 2022 Officers Below is a table that sets forth certain information, as of March 31, 2022, concerning each person deemed to be an officer of the Price Funds. Name Position Held With Each Fund Robert W. Sharps President David Oestreicher Director, Principal Executive Officer, and Executive Vice President Eric L. Veiel Director 9 Name, Year of Birth, and Principal Occupation(s) During Past Five Years Position Held With Each Fund Timothy Coyne, 1967 Vice President, T. Rowe Price and T. Rowe Price Group, Inc. Executive Vice President Alan S. Dupski, CPA, 1982 Vice President, Price Investment Management, T. Rowe Price, T. Rowe Price Group, Inc., and T. Rowe Price Trust Company Principal Financial Officer, Vice President, and Treasurer Joseph B. Fath, CPA, 1971 Vice President, T. Rowe Price, T. Rowe Price Group, Inc., and T. Rowe Price Trust Company Executive Vice President Gary J. Greb, 1961 Vice President, Price Investment Management, T. Rowe Price, Price International, and T. Rowe Trust Company Vice President Paul Greene II, 1978 Vice President, T. Rowe Price and T. Rowe Price Group, Inc. Executive Vice President Ann M. Holcomb, CFA, 1972 Vice President, T. Rowe Price, T. Rowe Price Group, Inc., and T. Rowe Price Trust Company Executive Vice President Thomas J. Huber, CFA, 1966 Vice President, T. Rowe Price, T. Rowe Price Group, Inc., and T. Rowe Price Trust Company Executive Vice President Paul J. Krug, CPA, 1964 Vice President, T. Rowe Price, T. Row […] es bonds directly from the issuer or a primary market-maker acting as principal for the bonds, on a net basis. As a result, there is no explicit brokerage commission paid on these transactions, although purchases of new issues from underwriters of bonds typically include a commission or concession paid by the issuer to the underwriter and purchases from dealers serving as market-makers typically include a dealer’s markup (i.e., a spread between the bid and the asked prices). Explicit brokerage commissions are paid, however, in connection with opening and closing out futures positions. In addition, the funds do not incur any brokerage commissions when buying and selling shares of other Price Funds or another open-end mutual fund that is not exchange-traded, although a fund will pay brokerage commissions if it purchases or sells shares of an exchange-traded fund. The following table shows the approximate total amount of brokerage commissions paid by each fund for the fiscal years indicated. Fund Fiscal Year Ended 12/31/21 12/31/20 Blue Chip Growth ETF $14,211.59 $1,663.15 Dividend Growth ETF 2,515.61 1,167.93 Equity Income ETF 5,798.77 2,550.04 Growth Stock ETF 2,724.11 1,207.70 U.S. Equity Research ETF 1,710.77 (a) (a) Prior to commencement of operations. Fund Holdings in Securities of Brokers and Dealers The following lists each fund’s holdings in securities of its regular brokers and dealers as of the end of the fiscal year indicated. (Amounts in 000s) Blue Chip Growth ETF Fiscal Year Ended 12/31/21 Brokers Value of Stock Holdings Value of Bond Holdings Goldman Sachs $2,674,407 — Dividend Growth ETF Fiscal Year Ended 12/31/21 Brokers Value of Stock Holdings Value of Bond Holdings Bank of America $1,347,780 Goldman Sachs 613,610 JPMorgan Chase 2,274,856 — Morgan Stanley 1,596,474 — Equity Income ETF Fiscal Year Ended 12/31/21 Brokers Value of Stock Holdings Value of Bond Holdings Bank of America $321,707 — Citigroup 181,170 Goldman Sachs 677,879 — JPMorgan Chase 339,027 — Morgan Stanley 568,935 — 23 U.S. Equity Research ETF Fiscal Year Ended 12/31/21 Brokers Value of Stock Holdings Value of Bond Holdings Bank of America $209,014 — Citigroup 84,606 Goldman
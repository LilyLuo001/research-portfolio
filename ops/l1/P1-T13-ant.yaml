      EX-99.H.3 3 d100216dex99h3.htm FORM OF AUTHORIZED PARTICIPANT AGREEMENT Form of Authorized Participant Agreement FORM OF AUTHORIZED PARTICIPANT AGREEMENT DOUBLELINE ETF TRUST This Authorized Participant Agreement (the “Agreement”) is entered into by and between Foreside Fund Services, LLC (the “Distributor”) and __________ (the “Participant”) and is subject to acceptance by JPMorgan Chase Bank, N.A. (the “Transfer Agent”), and is further subject to acknowledgement and agreement by DoubleLine ETF Trust (the “Trust”), a series trust offering a number of portfolios of securities (each a “Fund” and collectively the “Funds”), solely with respect to Section 4(c) herein. Capitalized terms used but not defined herein are defined in the current prospectus for each Fund as it may be supplemented or amended from time to time and included in the Trust’s Registration Statement on Form N-1A, as it may be amended from time to time, or otherwise filed with the U.S. Securities and Exchange Commission (“SEC”) (together with such Fund’s Statement of Additional Information incorporated therein, the “Prospectus”). The Trust consists of series that rely on Rule 6c-11 under the Investment Company Act of  […] was deemed received by the Distributor plus the brokerage and related transaction costs associated with such purchases. The Trust will return any unused portion of the Additional Cash Deposit once all of the missing Deposit Securities or Shares have been properly received by the Custodian or, with respect to Deposit Securities, purchased by the Trust and deposited into the Trust. The Trust shall charge and the Participant agrees to pay to the Trust the Transaction Fee and any additional fees prescribed in the Prospectus. The delivery of Creation Units of the Fund so created will occur no later than the prescribed settlement date following the day on which the Creation Order is deemed received by the Distributor. Attachment B-6 ATTACHMENT C ACTIVESHARES ® ANNEX This Annex is attached to, and shall be governed by, the Authorized Participant Agreement between the [NAME OF AP] (“Participant”), DoubleLine ETF Trust (“the Trust”), JPMorgan Chase Bank, N.A., the (“Transfer Agent”), and Foreside Fund Services, LLC, the (“Distributor”) dated (DATE of AP AGREEMENT) (the “AP Agreement) and is applicable only to transactions in Funds operating pursuant to the exemptive order issued by the SEC to the Trust [ORDER NUMBER] (DATED) (the “ActiveShares Order”). All capitalized terms used herein, unless otherwise defined, have the same meaning as used in the AP Agreement or the applicable Fund’s Prospectus as it may be supplemented or amended from time to time (including the Statement of Additional Information) and the ActiveShares Order. The parties hereby agree as follows: 1. Background. This Annex sets forth certain regulatory, procedural, and operational requirements with respect to the purchase and redemption of Creation Units of Shares of those Funds subject to, and governed by, the ActiveShares Order (“Non-Transparent Shares”), in addition to those already set forth in the AP Agreement. The additional requirements and procedures set forth herein remain subject to the applicable Fund’s Prospectus (including the Statement of Additional Information) and the ActiveShares Order, including any requirements with respect to the proper form of Orders and the timing of delivery of cash or securities to the Trust. To the extent that the terms and conditions of this Annex conflict with (i) the terms of the Prospectus or the ActiveShares Order, the terms of the Prospectus or ActiveShares Order, as applicable, shall control, or (ii) the terms of the Authorized Participant Agreement with regard to Orders of Non-Transparent Shares, the terms of this Annex shall control. 2. Status of the Participant With respect to its activities in connection with transactions in Non-Transparent Shares, the Participant hereby represents and warrants that it has entered into, and shall maintain, for as long as it transacts in Non-Transparent Shares, one or more confidential account agreement(s) with one or more AP Representative(s) (as defined in the Active Shares order) approved by the Trust, to serve as its agent to purchase and deliver Deposit Securities and accept and sell Redemption Securities in connection with Participant’s Purchase and Redemption Orders of Non-Transparent Shares. 3. Creation and Redemption Orders of Non-Transparent Shares With respect to its activities in connection with transactions in Non-Transparent Shares, the Participant acknowledges and agrees that for the duration of this Annex: (i) It will purchase and/or redeem Non-Transparent Shares from the applicable Fund on a cash or partial or full in-kind basis, as specified by, and in the sole discretion of, the applicable Fund, in accordance with the terms of the ActiveShares Order and such Fund’s Prospectus, in aggregations of Non-Transparent Shares constituting a Creation Unit; (ii) The Creation and Redemption baskets, along with whether Purchase Orders and Redemption Orders for each Business Day shall be effected on a cash or partial or full in-kind basis, shall be published, through the facilities of the NSCC, and in accordance with the applicable Fund’s Prospectus subject to any other applicable regulatory restrictions. Attachment C-1 (iii) The number of Non-Transparent Shares of a Fund constituting a Creation Unit will be stated in the applicable Fund’s Prospectus; (iv) The Participant may only transact directly with the Trust on an in-kind or partial in-kind basis through the AP Representative appointed by the Trust with respect to Purchase or Redemption Orders of Non-Transparent Shares; (v) The Trust may revoke the appointment of an AP Representative at any time; (vi) The Participant will be liable for all actions of the AP Representative, when acting in its role as agent for the Participant, to the same extent that the Participant would be liable under the AP Agreement; (vii) The Participant will submit Purchase or Redemption Orders through an order entry system or in such other manner as may be requested by the Fund’s transfer agent; (viii) Solely with respect to Orders for the purchase or redemption of Creation Units of Non-Transparent Shares submitted through the CNS Clearing Process by the Participant which the Trust and  […] nd the AP Representative, on a confidential basis, the Deposit Securities and Cash Amounts and Cash Components, as applicable, and the Participant agrees to be bound by such instructions; (ix) Once an Order has been accepted by the Transfer Agent, it will be unconditional and irrevocable by the Participant; (x) Dividends and distributions on Deposit Securities that are owed to the Participant because the Participant was the owner of such securities immediately prior to the time at which the securities began trading ex-dividend will be delivered by the Transfer Agent at the instruction of the Trust to the AP Representative to an account held on behalf of the Participant; and (xi) A Fund may, in its sole discretion and in compliance with the ActiveShares Order, permit or require the substitution of an amount of cash to replace any Deposit Securities. The Participant shall be responsible for any and all expenses and costs incurred by the Fund in connection with a cash-in-lieu election by the Fund. [Signature page follows] Attachment C-2 IN WITNESS WHEREOF, the parties have caused this Annex to the AP Agreement to be executed and delivered as of the day and year written below. DATED: [AUTHORIZED PARTICIPANT] By: Name: Title: DoubleLine ETF Trust By: Name: Title: Foreside Fund Services, LLC By: Name: Title: Accepted By: JPMorgan Chase Bank, N.A. By: Name: Title: Attachment C-3

cash investments or to hedge against portfolio exposures; interest rate swaps, to gain indirect exposures to interest rates, issuers, or currencies, or to hedge against portfolio exposures; put and call options, and exchange-traded and structured notes, to take indirect positions on indexes, securities, currencies, or other indicators of value, or to hedge against portfolio exposures. Additionally, the Fund may enter into contracts to purchase or sell securities for a fixed price at a future date beyond customary settlement time (“forward commitments”), including securities it does not currently own, in furtherance of its strategies, including for any kind of hedging purposes. Forward commitments include a variety of transactions, including when-issued, delayed delivery and to-be-announced transactions (e.g., “ To Be Announced ” Securities ). The Fund may seek to obtain market exposure to the securities in which it primarily invests by entering into a series of purchase and sale contracts or by using other investment techniques (such as buy backs or dollar rolls), which may create investment leverage. Portfolio securities may be sold at any time. Sales typically occur when the Fund’s portfolio managers determine to take advantage of what the portfolio managers consider to be a better investment opportunity, when the portfolio managers believe the portfolio securities no longer represent relatively attractive investment opportunities, when the portfolio managers perceive deterioration in the credit fundamentals of the issuer, or when the individual security has reached the portfolio managers’ sell target. The Fund’s investment strategy may involve active and frequent trading of portfolio  […] eholders of all or a portion of their Fund shares, including as a result of an asset allocation decision made by the Adviser (or related parties of the Adviser), will adversely affect the Fund’s performance if it is forced to sell portfolio securities or invest cash when the Adviser would not otherwise choose to do so. In addition, a large number of shareholders collectively may purchase or sell Fund shares in large amounts rapidly or unexpectedly. Redemptions of a large number of shares may affect the liquidity of the Fund’s portfolio, increase the Fund’s transaction costs, and accelerate the realization of taxable income and/or gains to shareholders. Shareholder redemptions can only be effected in Creation Units. • investment company and exchange-traded fund risk: the risk that an investment company or other pooled investment vehicle, including any ETFs or money market funds, in which the Fund invests will not achieve its investment objective or execute its investment strategies effectively or that significant purchase or redemption activity by shareholders of such an investment company might negatively affect the value of its shares. The Fund must pay its pro rata portion of an investment company’s fees and expenses. To the extent the Adviser determines to invest Fund assets in other investment companies, the Adviser will have an incentive to invest in other investment vehicles sponsored or advised by the Adviser or a related party of the Adviser over investment companies sponsored or managed by others and to maintain such investments once made due to its own financial interest in those products and other business considerations. Please see “Additional Information About Principal Investment Strategies and Principal Risks — Principal Risks” for a more detailed description of the principal risks of investing in the Fund. Performance The following performance information provides some indication of the risks of investing in the Fund. The bar chart shows the performance of the Fund’s shares for each full calendar year since the Fund’s inception. The table below shows how the average annual total returns of the Fund’s shares for the periods shown compare to those of a broad-based securities market index. The Fund

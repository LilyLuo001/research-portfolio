      497 1 d822612d497.htm ACTIVESHARES ETF TRUST ActiveShares ETF Trust Filed under Rule 497(e) File Number 333-234497 Prospectus April 9, 2020 LEGG MASON EQUITY ETFs CLEARBRIDGE FOCUS VALUE ETF Cboe (Ticker Symbol): CFCV This Exchange-Traded Fund (“ETF”) is different from traditional ETFs. Traditional ETFs tell the public what assets they hold each day. This ETF will not. This may create additional risks for your investment. For example: • You may have to pay more money to trade the ETF’s shares. This ETF will provide less information to traders, who tend to charge more for trades when they have less information. • The price you pay to buy ETF shares on an exchange may not match the value of the ETF’s portfolio. The same is true when you sell shares. These price differences may be greater for this ETF compared to other ETFs because it provides less information to traders. • These additional risks may be even greater in bad or uncertain market conditions. The differences between this ETF and other ETFs may also have advantages. By keeping certain information about the ETF secret, this ETF may face less risk that other traders can predict or copy its investment strategy. This may improv […] xpenses of the fund 2 Principal investment strategies 2 Principal risks 3 Performance 6 Management 7 Purchase and sale of fund shares 7 Tax information 7 Payments to broker/dealers and other financial intermediaries 7 More on the fund’s investment strategies, investments and risks 8 Tax advantaged product structure 12 More on fund management 13 Shareholder information 15 Dividends, other distributions and taxes 18 Creations and redemptions 20 Financial highlights 22 Investment objective The ClearBridge Focus Value ETF (the “fund”) seeks long-term capital appreciation. Fees and expenses of the fund The accompanying table describes the fees and expenses that you may pay if you buy and hold shares of the fund. The management agreement between ActiveShares ® ETF Trust (the “Trust”) and Precidian Funds LLC (“Precidian” or the “manager”) (the “Management Agreement”) provides that Precidian will pay all operating expenses of the fund, except interest expenses, taxes, brokerage expenses, future Rule 12b-1 fees (if any), acquired fund fees and expenses, extraordinary expenses and the management fee payable to Precidian under the Management Agreement. Precidian will also pay all subadvisory fees of the fund. Investors purchasing and selling shares may be subject to costs (including brokerage commissions) charged by their broker, which are not reflected in the table and example below. Shareholder fees (fees paid directly from your investment) None Annual fund operating expenses (%) (expenses that you pay each year as a percentage of the value of your investment) Management fees 0.49 Distribution and/or service (12b-1) fees 1 0.00 Other expenses 2 None Acquired fund fees and expenses 2 0.01 Total annual fund operating expenses 0.50 1 The fund has adopted a distribution and service (12b-1) plan pursuant to which payments of up to 0.25% of average daily net assets may be made; however, the Board has determined that no such payments will be made through the next twelve (12) months of operation. 2 “Other expenses” and “Acquired fund fees and expenses” are estimated for the current fiscal year. Actual expenses may differ from estimates. Example: This example is intended to help you compare the cost of investing in the fund with […] ble account. These costs, which are not reflected in annual fund operating expenses or in the example, affect the fund’s performance. Because the fund is newly-organized, portfolio turnover information is not yet available. Principal investment strategies The fund seeks long-term capital appreciation. By employing fundamental research, in an effort to identify securities with attractive risk-adjusted returns (where the potential returns on the 2 ClearBridge Focus Value ETF investment are favorable relative to the potential risks of the investment), the fund’s portfolio management team constructs the portfolio on a bottom-up basis. Under normal circumstances, the fund will invest at least 80% of its net assets in equity securities, or other exchange-traded investments with similar economic characteristics in which it is permitted to invest, of companies with large market capitalizations. Large capitalization companies are those companies with market capitalizations similar to companies in the Russell 1000 Index (the “Index”). The size of the companies in the Index changes with market conditions and the composition of the Index. Securities of companies whose market capitalizations no longer meet this definition after purchase by the fund still will be considered securities of large capitalization companies for purposes of the fund’s 80% investment policy. The fund may also invest up to 20% of its net assets in equity securities, or other exchange-traded investments with similar economic characteristics in which it is permitted to invest, of companies with lower market capitalizations. While most of the fund’s investments will be in U.S. companies, the fund may also invest in American Depository Receipts (“ADRs”) and U.S.-listed shares of foreign companies. The fund will only invest in instruments that trade on a U.S. exchange contemporaneously with the fund’s shares and, for temporary or defensive purposes, in cash and cash equivalents, such as short-term U.S. Treasury securities, government money market funds, and repurchase agreements. Under normal circumstances, the fund will invest in a diversified portfolio typically consisting of the securities of 30 to 40 issuers. The fund operates in reliance on an exemptive order from the SEC (the “Order”), which limits the types of investments the fund may hold to those listed in the fund’s application for the Order. Under the terms of the Order, the fund is permitted to invest only in exchange-traded funds, exchange-traded notes, exchange listed common stocks, exchange-traded preferred stocks, exchange-traded ADRs, exchange-traded real estate investment trusts, exchange-traded commodity pools, exchange-traded metal trusts, exchange-traded currency trusts and exchange-traded futures that trade on a U.S. exchange contemporaneously with the Fund’s shares, as well as cash and cash equivalents (which are short-term U.S. Treasury securities, government money market funds, and repurchase agreements). The fund’s investment strategies and practices, including those listed above, are subject to these limitations. Principal risks Risk is inherent in all investing. The value of your investment in the fund, as well as the amount of return you receive on your investment, may fluctuate significantly. You may lose part or all of your investment in the fund or your investment may not perform as well as other similar investments. An investment in the fund is not insured or guaranteed by the Federal Deposit Insurance Corporation or by any bank or government agency. ActiveShares ® structure risk. Unlike most actively managed ETFs, the fund does not provide daily disclosure of its portfolio holdings. Instead, the fund provides a verified intraday indicative value (“VIIV”), calculated and disseminated every second throughout the trading day. The VIIV is intended to provide investors with enough information to allow for an effective arbitrage mechanism that will keep the market price of the fund’s shares trading at or close to the underlying net asset value (“NAV”) per share of the fund. There is, however, a risk, which may increase during periods of market disruption or volatility, that market prices will vary significantly from the underlying NAV of the fund. Similarly, because the fund’s shares trade on the basis of a published VIIV, they may trade at a wider bid/ask spread than shares of ETFs that publish their portfolios on a daily basis, especially during periods of market disruption or volatility, and therefore, may cost investors more to trade. Although the fund seeks to benefit from keeping its portfolio information secret, some market participants may attempt to use publicly available information, including the VIIV, to identify the fund’s trading strategy, which if successful, could result in such market participants engaging in certain predatory trading practices that may have the potential to harm the fund and its shareholders. Authorized Participant and AP Representative concentration risk. Each of the fund’s Authorized Partic […]  performance information will provide some indication of the risks of investing in the fund by showing changes in the fund’s performance from year to year and by showing how the fund’s average annual returns compare with those of a broad measure of market performance. The fund makes updated performance information, including its current NAV, available at www.leggmason.com/etfproducts (select fund), or by calling the fund at 1-877-721-1926. 6 ClearBridge Focus Value ETF Management Investment manager: Precidian Funds LLC (“Precidian”) Subadviser: ClearBridge Investments, LLC (“ClearBridge”) On January 21, 2020, Legg Mason, Inc. (“Legg Mason”) provided Precidian Investments, LLC (“PI”), the parent of Precidian, with notice of its intention to convert, subject to the satisfaction of certain closing conditions, its minority ownership interest in PI into a controlling interest (the “Conversion”). The completion of the Conversion would cause a change of control of Precidian, which pursuant to the Investment Company Act of 1940, as amended (the “1940 Act”), would terminate Precidian’s management agreement with the Trust, as well as the subadvisory agreements. To prevent an interruption in the management and subadvisory services to be provided to the fund, the fund’s initial shareholder, Legg Mason, approved a new management agreement between Legg Mason Partners Fund Advisor, LLC (“LMPFA”) and the Trust, pursuant to which LMPFA will assume responsibility for managing the fund, and new subadvisory agreements between LMPFA and each subadviser, each of which would become effective immediately upon the Conversion. No date has yet been set regarding the Conversion or LMPFA’s assumption of responsibility for managing the fund. In addition, on February 18, 2020, Franklin Resources, Inc. (“Franklin Resources”) and Legg Mason announced that they have entered into a definitive agreement for Franklin Resources to acquire Legg Mason in an all-cash transaction (the “Transaction”). As part of the Transaction, LMPFA and the subadvisers, each currently a wholly-owned subsidiary of Legg Mason, would become a wholly-owned subsidiary of Franklin Resources. The Transaction is subject to approval by Legg Mason’s shareholders and customary c

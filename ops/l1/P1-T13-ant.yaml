      497K 1 tm2425502-15_497k.htm 497K out - none - 1.656s ​ Summary Prospectus | October 4, 2024 Schwab ® Ariel ESG ETF ​ ​ Ticker Symbol: ​ ​ SAEF ​ ​ THIS FUND IS DIFFERENT FROM TRADITIONAL ETFs Traditional ETFs tell the public what assets they hold each day. This fund will not. This may create additional risks for your investment. For example: • You may have to pay more money to trade the fund’s shares. This fund will provide less information to traders, who tend to charge more for trades when they have less information. ​ • The price you pay to buy fund shares on an exchange may not match the value of the fund’s portfolio. The same is true when you sell shares. These price differences may be greater for this fund compared to other ETFs because it provides less information to traders. ​ • These additional risks may be even greater in bad or uncertain market conditions. ​ • The ETF will publish on its website each day a “Proxy Portfolio” designed to help trading in shares of the ETF. While the Proxy Portfolio includes some of the ETF’s holdings, it is not the ETF’s actual portfolio. ​ The differences between this fund and other ETFs may also have advantages. By keeping certain inform […] 0305441 ​ ​ ​ Expenses on a $10,000 Investment ​ ​ ​ ​ ​ 1 Year ​ ​ 3 Years ​ ​ 5 Years ​ ​ 10 Years ​ ​ ​ $ 60 ​ ​ ​ ​ $ 189 ​ ​ ​ ​ $ 329 ​ ​ ​ ​ $ 738 ​ ​ Portfolio Turnover The fund pays transaction costs, such as commissions, when it buys and sells securities (or “turns over” its portfolio). A higher portfolio turnover may indicate higher transaction costs and may result in higher taxes when fund shares are held in a taxable account. These costs, which are not reflected in the annual fund operating expenses or in the example, affect the fund’s performance. During the most recent fiscal year, the fund’s portfolio turnover rate was 11% of the average value of its portfolio. Principal Investment Strategies ​ The fund invests primarily in exchange-traded equity securities of U.S. companies that have been evaluated based on certain environmental, social and governance (ESG) criteria. The fund typically invests in exchange-traded securities of small- and mid-capitalization companies which are companies with capitalizations within the range of the Russell 2500™ Index, as measured at the time of purchase; however, the fund may invest in exchange-traded securities of companies outside the stated range. In selecting securities, the fund’s subadviser seeks to invest in companies that it believes exhibit attributes that will result in capital appreciation including: high barriers to entry, enduring competitive advantage, predictable fundamentals that allow for the potential for double-digit earnings growth (at time of initial purchase), skilled management teams, and solid financials. In addition, the fund’s subadviser generally seeks to invest in companies that are trading at a low valuation relative to potential earnings and/or a low valuation relative to intrinsic value. Additionally, the fund’s subadviser integrates ESG considerations into its investment process. As part of this process, the subadviser leverages its proprietary ESG research to derive a proprietary ESG‐risk rating for each holding, or prospective holding, which is based on the company’s Environmental (such as, physical impacts of climate change, energy management, and waste and hazardous materials management), Social (such as, diversity and inclusion, employee engagement, and human rights and community relations), and/or Governance (such as, business ethics, critical incident risk management, and business model resilience) impact, policies and practices. In addition, the subadviser employs a negative screening process with regard to security selection, which seeks to exclude from the fund’s portfolio companies whose primary (greater than 50%)  […] arket conditions, the investment adviser may manage a portion of the fund’s assets. If the investment adviser manages a portion of the fund’s assets it may or may not utilize the subadviser’s ESG-risk rating. In addition, during unusual economic or market conditions or for liquidity purposes, the fund may take temporary defensive positions, whether managed by the investment adviser or subadviser, that are inconsistent with the fund’s principal investment strategy. When the fund engages in such activities, it may not achieve its investment objective. The fund also may lend portfolio securities to earn additional income. Any income realized through securities lending may help fund performance. The fund is an actively managed, non-transparent exchange-traded fund (ETF) that does not seek to replicate the performance of a specified index. In lieu of publishing its portfolio contents (Actual Portfolio) daily, the fund publishes a proxy portfolio (Proxy Portfolio) each day on its website. The fund’s Proxy Portfolio is designed to closely track the daily performance of the fund but is not the fund’s Actual Portfolio. The fund will also publish certain related information about the Proxy Portfolio and the Actual Portfolio on its website daily. There is no minimum overlap required between the Actual Portfolio and the Proxy Portfolio. Principal Risks ​ The fund is subject to risks, any of which could cause an investor to lose money. The fund’s principal risks include: Proxy Portfolio Risk. Unlike traditional ETFs that disclose their portfolio holdings on a daily basis, the fund does not disclose its holdings daily, rather it discloses a Proxy Portfolio. The goal of the Proxy Portfolio, during all market conditions, is to track closely the daily performance of the Actual Portfolio and minimize intra-day misalignment between the performance of the Proxy Portfolio and the performance of the Actual Portfolio. The Proxy Portfolio is designed to reflect the economic exposures and the risk characteristics of the Actual Portfolio on any given trading day. The Proxy Portfolio is intended to provide authorized participants and other market participants with enough information to support an effective arbitrage mechanism that keeps the market price of the fund at or close to the underlying net asset value (NAV) per share of the fund. The Proxy Portfolio methodology is novel and not yet proven as an effective arbitrage mechanism. The effectiveness of the Proxy Portfolio as an arbitrage mechanism is contingent upon, among other things, the fund’s factor model analysis creating a Proxy Portfolio that performs in a manner substantially identical to the performance of the Actual Portfolio and the willingness of authorized participants and other market participants to trade based on a Proxy Portfolio. There is no guarantee that this arbitrage mechanism will operate as intended. Further, while the Proxy Portfolio may include some of the fund’s holdings, it is not the fund’s Actual Portfolio. ETFs trading on the basis of a published Proxy Portfolio may exhibit wider premiums and discounts, bid/ask spreads, and tracking error than other ETFs using the same investment strategies that publish their portfolios on a daily basis, especially during periods of market disruption or volatility. Therefore, shares of the fund may cost investors more to trade than shares of a traditional ETF. ​ 2 Schwab Ariel ESG ETF | Summary Prospectus ​ • Each day the fund calculates the overlap between the holdings of the prior Business Day’s Proxy Portfolio compared to the Actual Portfolio (Proxy Overlap) and the difference, in percentage terms, between the Proxy Portfolio per share NAV and that of the Actual Portfolio (Tracking Error). If the Tracking Error becomes large, there is a risk that the performance of the Proxy Portfolio may deviate from the performance of the Actual Portfolio. ​ • The fund’s Board of Trustees (the Board) monitors its Tracking Error, bid/ask spread and premiums/discounts. If deviations become too large, the Board will consider the continuing viability of the fund, whether shareholders are being harmed, and what, if any, corrective measures would be appropriate. See the Statement of Additional Information for further discussion of the Board’s monitoring responsibilities. ​ • Although the fund seeks to benefit from keeping its portfolio information secret, market participants may attempt to use the Proxy Portfolio to identify a fund’s trading strategy, which if successful, could result in such market participants engaging in certain predatory trading practices that may have the potential to harm the fund and its shareholders. The Proxy Portfolio and any related disclosures have been designed to minimize the risk of predatory trading practices, but they may not be successful in doing so. ​ Premium/Discount Risk. Publication of the Proxy Portfolio is not the same level of transparency as the publication of the Actual Portfolio by a fully transparent ETF. Although the Proxy Portfolio is intended to provide authorized participants and other market participants with enough information to allow for an effective arbitrage mechanism that is intended to keep the market price of the fund at or close to the underlying NAV per share of the fund, there is a risk (which may increase during periods of market disruption or volatility) that market prices will vary significantly from NAV per share of the fund. This means the price paid to buy shares on an exchange may not match the value of the fund’s portfolio. The same is true when shares are sold. Trading Halt Risk. If securities representing 10% or more of the fund’s Actual Portfolio do not have readily available market quotations, the fund will promptly request that the listing exchange halt trading in the fund’s shares which means that investors would not be able to trade their shares. Trading halts may have a greater impact on the fund compared to other ETFs due to the fund’s non-transparent structure. If the trading of a security held in the fund’s Actual Portfolio is halted, or otherwise does not have readily available market quotations, and the investment adviser believes that the lack of any such readily available market quotations may affect the reliability of the Proxy Portfolio as an arbitrage vehicle, or otherwise determines it is in the best interest of the fund, the investment adviser will promptly disclose on the fund’s website the identity and weighting of such security for so long as such security’s trading is halted or otherwise does not have readily available market quotations and remains in the Actual Portfolio. Authorized Participant Concentration Risk. Only an authorized participant may engage in creation or redemption transactions directly with the fund. The fund may have a limited number of institutions that act as authorized participants, none of which are obligated to engage in creation and/or redemption transactions. To the extent that these institutions exit the business or are unable to proceed with creation and/or redemption orders with respect to the fund and no other authorized participant is able to step forward to process creation and/or redemption orders, fund shares may trade at a discount to NAV and possibly face trading halts and/or delisting. This risk may be more pronounced during periods of market volatility or market disruptions. The fact that the fund is offering a novel and unique structure may affect the number of entities willing to act as authorized participants. Tracking Error Risk. Although the Proxy Portfolio is designed to reflect the economic exposure and risk characteristics of the fund’s Actual Portfolio on any given trading day, there is a risk that the performance of the Proxy Portfolio will diverge from the performance of the Actual Portfolio, potentially materially. Equity Risk. The prices of equity securities rise and fall daily. These price movements may result from factors affecting individual companies, industries or the securities market as a whole. In addition, equity markets tend to move in cycles, which may cause stock prices to fall over short or extended periods of time. Market Capitalization Risk. Securities issued by companies of different market capitalizations tend to go in and out of favor based on market and economic conditions. During a period when securities of a particular market capitalization fall behind other types of investments, the fund’s performance could be impacted. Small-Cap Company Risk. Securities issued by small-cap companies may be riskier than those issued by larger companies, and their prices may move sharply, especially during market upturns and downturns. Mid-Cap Company Risk. Mid-cap companies may be more vulnerable to adverse business or economic events than larger, more established companies and the value of securities issued by these companies may move sharply. Management Risk. As with all actively managed funds, the fund is subject to the risk that its investment adviser and/or subadviser will select investments or allocate assets in a manner that could cause the fund to underperform or otherwise not meet its investment objective. The fund’s investment adviser and/or subadviser applies its own inves

e “SEC”), which limits the types of investments that the Fund may hold to those listed in the Fund’s application for the Order. Under the terms of the Order, the Fund is permitted to invest only in the following investments, which, if listed, must trade on a U.S. exchange contemporaneously with the Shares: ETFs, exchange-traded notes, exchange-listed common stocks, exchange-traded preferred stocks, exchange-traded ADRs, exchange-traded real estate investment trusts, exchange-traded commodity pools, exchange-traded metal trusts, exchange-traded currency trusts and U.S. exchange-traded futures for which the reference asset is one in which the Fund may invest directly or, in the case of an index future traded on a U.S. exchange, is based on an index, the components of which are a type of asset in which the Fund could invest directly; as well as cash and cash equivalents (which are short-term U.S. Treasury securities, government money market funds, and repurchase agreements). The Fund’s investment strategies and practices, including those listed above, are subject to these limitations. The Adviser does not intend to invest in all of the types of instruments authorized by the Order. In that regard, the Fund is not expected to invest in futures contracts, exchange-traded commodity pools, exchange-traded metal trusts, exchange-traded notes, or exchange-traded currency trusts. 2 Principal Investment Risks: As with all funds, there is the risk that you could lose money through your investment in the Fund. Many factors affect the Fund’s net asset value (“NAV”) and performance. The following describes the risks the Fund bears with respect to its investments. As with any fund, there is no guarantee that the Fund will achieve its goal. Absence of Active Market . While the Fund’s shares (“Shares”) are expected to be listed on the Exchange, there can be no assurance that active trading markets for Shares will develop or be maintained by market makers or Authorized Participants, an
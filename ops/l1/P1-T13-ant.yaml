), will adversely affect the Fund’s performance if it is forced to sell portfolio securities or invest cash when the Adviser would not otherwise choose to do so. Redemptions of a large number of shares may affect the liquidity of the Fund’s portfolio, increase the Fund’s transaction costs, and accelerate the realization of taxable income and/or gains to shareholders. Shareholder redemptions can only be effected in creation units of the Fund. • investment company and exchange-traded fund risk: the risk that an investment company or other pooled investment vehicle, including any ETFs or money market funds, in which the Fund invests will not achieve its investment objective or execute its investment strategies effectively or that significant purchase or redemption activity by shareholders of such an investment company might negatively affect -18- the value of its shares. The Fund must pay its pro rata portion of an investment company’s fees and expenses. To the extent the Adviser determines to invest Fund assets in other investment companies, the Adviser will have an incentive to invest in other DoubleLine funds over investment companies sponsored or managed by others and to maintain such investments once made due to its own financial interest in those products and other business considerations. Please see “Additional Information About Principal Investment Strategies and Principal Risks — Principal Risks” for a more detailed description of the principal risks of investing in the Fund. Performance Because this is a new Fund that does not yet have an operating history, a bar chart and table describing the Fund’s annual performance are not yet available. Once available, information on the Fund’s investment results, including its NAV per share, can be obtained at no charge by calling (855) 937-0772 or by visiting the Fund’s website at www.doubleline.com. Investment Adviser DoubleLine ETF Adviser LP is the investment adviser to the Fund. Portfol

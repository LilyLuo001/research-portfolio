nsact may increase the Fund’s exposure to this risk. Events that may lead to increased redemptions, such as market disruptions or increases in interest rates, may also negatively impact the liquidity of the Fund’s investments when it needs to dispose of them. Markets may become illiquid quickly. If the Fund is forced to sell its investments at an unfavorable time and/or under adverse conditions in order to meet redemption requests, such sales could negatively affect the Fund. During times of market turmoil, there may be no buyers or sellers for securities in certain asset classes. In other circumstances, liquid investments may become illiquid. Liquidity issues may also make it difficult to value the Fund’s investments. The Fund may invest in liquid investments that become illiquid due to financial distress, or geopolitical events such as sanctions, trading halts or wars. Management Risk: A strategy used by the Fund’s portfolio manager may fail to produce the intended result. Market/Issuer Risk: The mar

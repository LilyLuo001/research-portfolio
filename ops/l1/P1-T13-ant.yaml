      N-1A 1 etfn1a.htm Untitled Document Registration Nos. 811-23494 UNITED STATES SECURITIES AND EXCHANGE COMMISSION WASHINGTON, D.C. 20549 FORM N-1A REGISTRATION STATEMENT UNDER THE SECURITIES ACT OF 1933 /X/ Pre-Effective Amendment No. Post-Effective Amendment No. // and/or REGISTRATION STATEMENT UNDER THE INVESTMENT COMPANY ACT OF 1940 /X/ Amendment No. // T. ROWE PRICE EXCHANGE-TRADED FUNDS, INC. Exact Name of Registrant as Specified in Charter 100 East Pratt Street, Baltimore, Maryland 21202 Address of Principal Executive Offices 410-345-2000 Registrant’s Telephone Number, Including Area Code David Oestreicher 100 East Pratt Street, Baltimore, Maryland 21202 Name and Address of Agent for Service Approximate Date of Proposed Public Offering February 17, 2020 It is proposed that this filing will become effective (check appropriate box): // Immediately upon filing pursuant to paragraph (b) // On date pursuant to paragraph (b) // 60 days after filing pursuant to paragraph (a)(1) // On date pursuant to paragraph (a)(1) // 75 days after filing pursuant to paragraph (a)(2) // On date pursuant to paragraph (a)(2) of Rule 485 If appropriate, check the following box: // This post-effective  […] solicitation of an offer to buy nor shall there be any sale of these securities in any state in which such offer, solicitation, or sale would be unlawful prior to registration or qualification under the securities laws of any such state. PROSPECTUS February 17, 2020 T. ROWE PRICE XXXXX Blue Chip Growth ETF Subject to Completion The information in this prospectus is not complete and may be changed. We may not sell these securities until the registration statement filed with the Securities and Exchange Commission is effective. This prospectus is not an offer to sell these securities and is not soliciting an offer to buy these securities in any state in which the offer or sale is not permitted. Principal U.S. Listing Exchange: NYSE Arca, Inc. Exchange-traded fund (“ETF”) shares are not individually redeemable. The Securities and Exchange Commission (“SEC”) has not approved or disapproved these securities or passed upon the adequacy of this prospectus. Any representation to the contrary is a criminal offense. This ETF is different from traditional ETFs. Traditional ETFs tell the public what assets they hold each day. This ETF will not. This may create additional risks for your investment. For example: · You may have to pay more money to trade the ETF’s shares. This ETF will provide less information to traders, who tend to charge more for trades when they have less information. · The price you pay to buy ETF shares on an exchange may not match the value of the ETF’s portfolio. The same is true when you sell shares. These price differences may be greater for this ETF compared to other ETFs because it provides less information to traders. · These additional risks may be even greater in bad or uncertain market conditions. · The ETF will publish on its website each day a “Proxy Portfolio” designed to help trading in shares of the ETF. While the Proxy Portfolio includes some of the ETF’s holdings, it is not the ETF’s actual portfolio. The differences between this ETF and other ETFs may also have advantages. By keeping certain information about the ETF secret, this ETF may face less risk that other traders can predict or copy its investment strategy. This may improve the ETF’s performance. If other traders are able to copy or predict the ETF’s investment strategy, however, this may hurt the ETF’s performance. For additional information regarding the unique attributes and risks of the ETF, see the section, “Risks, Semi-Transparent Exchange-Traded Fund Risk.” Beginning on January 1, 2021, as permitted by SEC regulations, paper copies of the T. Rowe Price funds’ annual and semiannual shareholder reports will no longer be mailed, unless you specifically request them. Instead, the reports will be made available on the funds’ website ( troweprice.com/prospectus ), and you will be notified by mail with a website link to access the reports each time a report is posted to the site. If you already elected to receive reports electronically, you will not be affected by this change and need not take any action. You may elect to receive shareholder reports and other communications from the fund electronically anytime by contacting your financial intermediary (such as a broker dealer, bank, or retirement plan). Alternatively, you may elect to receive paper copies of all future reports free of charge by contacting your financial intermediary. Your election can be changed at any time in the future. Table of Contents 1 SUMMARY Blue Chip Growth ETF 1 2 MORE ABOUT THE FUND Management of the Fund 6 More Information About the Fund’s Investment Objective(s), Strategies, and Risks 7 Portfolio Turnover 14 Financial Highlights 14 Disclosure of Fund Portfolio Information 14 3 SHAREHOLDER INFORMATION SUMMARY 1 Investment Objective(s) The fund seeks to provide long-term capital growth. Income is a secondary objective. Fees and Expenses This table describes the fees and expenses that you may pay if you buy, hold, and sell shares o […] ’s investment approach reflects the adviser’s belief that solid company fundamentals (with an T. ROWE PRICE 2 emphasis on the potential for above-average growth) combined with a positive outlook for a company’s industry will ultimately reward investors with strong investment performance. Some of the companies the adviser targets for the fund should have good prospects for dividend growth, and the fund may at times invest significantly in stocks of information technology companies. The fund may invest in American Depository Receipts (ADRs) and common stocks listed on a foreign exchange that trade on such exchange synchronously with the fund’s shares (i.e., during the U.S. listing exchange’s trading hours). The fund generally invests only in exchange-traded securities, exchange-traded futures, cash, and cash equivalents. In pursuing its investment objective(s), the fund has the discretion to deviate from its normal investment criteria. These situations might arise when the adviser believes a security could increase in value for a variety of reasons, including an extraordinary corporate event, a new product introduction or innovation, a favorable competitive development, or a change in management. The fund may sell securities for a variety of reasons, such as to secure gains, limit losses, or redeploy assets into more promising opportunities. Principal Risks As with any fund, there is no guarantee that the fund will achieve its objective(s). The fund’s share price fluctuates, which means you could lose money by investing in the fund. The principal risks of investing in this fund, which may be even greater in bad or uncertain market conditions, are summarized as follows: Semi-transparent exchange-traded fund (“ETF”) risks The fund does not disclose holdings daily, unlike traditional ETFs. Daily disclosure of portfolio holdings allows other traders to predict or copy the fund’s investment strategy, which in turn can hurt the fund’s performance. Therefore, the fund discloses portfolio holdings on a quarterly basis, similar to mutual funds. In order to provide market participants with information on the fund’s investments, the fund will publish a “Proxy Portfolio” on its website daily. A Proxy Portfolio is a basket of securities that closely tracks the daily performance of the fund’s portfolio holdings. While the Proxy Portfolio includes some of the fund’s holdings, it is not the fund’s actual portfolio. The fund will also provide several portfolio statistics, including “Portfolio Overlap,” which indicates how much of the fund’s portfolio securities overlap with the fund’s Proxy Portfolio as of the end of the prior business day. The Proxy Portfolio and Portfolio Overlap are available on the fund’s website on a daily basis, along with the fund’s (a) “Daily Deviation,” which shows the difference in performance between the net asset value (“NAV”) of the fund and the NAV of the Proxy Portfolio; (b) “Tracking Error,” which shows the percentage difference between the fund’s per share NAV and the Proxy Portfolio’s per share NAV over time; and (c) “Empirical Percentiles,” which show frequency and magnitude of performance differences between the fund and the Proxy Portfolio over time. The Proxy Portfolio and these other metrics described are intended to provide investors and traders with SUMMARY 3 enough information to allow for an effective arbitrage mechanism, which keeps the market price of the fund’s shares at or close to the underlying NAV per share of the fund. The fund’s shares are traded on an exchange and are bought and sold on the secondary market at market prices. The shares may trade at a premium or discount to NAV; as a result, investors may pay more than NAV when purchasing shares and receive less than NAV when selling shares. These price differences may be greater for this fund compared to traditional ETFs because it provides less portfolio holdings information to traders. During periods of market disruption or volatility, there may be an increased risk that market prices will vary significantly from the underlying NAV per share of the fund. There is also a risk that the fund’s shares may trade at a wider bid/ask spread than shares of ETFs that publish their portfolios on a daily basis, especially during periods of market disruption and volatility, and, therefore, may cost you more to trade. Although the fund seeks to benefit from keeping its portfolio information confidential, other traders may attempt to use the Proxy Portfolio and other publicly available information to identify the fund’s trading strategy, which, if successful, could result in such traders engaging in certain predatory trading practices that may have the potential to harm the fund and its shareholders. Because the fund’s shares are traded in the secondary market, a broker may charge a commission to execute a transaction in shares, and you may incur the cost of the spread between the price at which a dealer will buy shares and the somewhat higher price at which a dealer will sell shares. It is possible that an active trading market for the shares will not be maintained, or that trading in the shares will be halted for reasons such as market-wide trading halts or the shares no longer meeting the listing requirements of the exchange. U.S. stock investing risks Common stocks generally fluctuate in value more than bonds and may decline significantly over short time periods. There is a chance that stock prices overall will decline or may have periods of rising and falling prices. The value of a stock in which the fund invests may decline due to general weakness in the U.S. stock market, such as when the U.S. financial markets decline, or because of factors that affect a particular company or industry. Growth style investing risks Different investment styles tend to shift in and out of favor depending on market conditions and investor sentiment. The fund’s growth approach to investing could cause it to underperform other  […]  pricing flexibility as well as the potential for good unit sales. These factors, in turn, can lead to higher earnings growth and greater share price appreciation. Management Seasoned management teams with a track record of providing superior financial results are important for a company’s long-term growth prospects. Our analysts will evaluate the depth and breadth of a company’s management experience. Financial fundamentals Companies should demonstrate faster earnings growth than their competitors and the market in general; high profit margins relative to competitors; strong cash flow; a healthy balance sheet with relatively low debt; and a high return on equity with a comparatively low dividend payout ratio. T. ROWE PRICE 8 The fund is a semi-transparent, actively-managed exchange-traded fund. The fund generally invests only in exchange-traded securities, exchange-traded futures, cash, and cash equivalents. The fund’s investments are primarily in common stocks: Common and Preferred Stocks Stocks represent shares of ownership in a company. Generally, preferred stocks have a specified dividend rate and rank after bonds and before common stocks in their claim on income for dividend payments and on assets should the company be liquidated. After other claims are satisfied, common stockholders participate in company profits on a pro-rata basis and profits may be paid out in dividends or reinvested in the company to help it grow. Increases and decreases in earnings are usually reflected in a company’s stock price, so common stocks generally have the greatest appreciation and depreciation potential of all corporate securities. Unlike common stock, preferred stock does not ordinarily carry voting rights. While most preferred stocks pay a dividend, the fund may decide to purchase preferred stock where the issuer has suspended, or is in danger of suspending, payment of its dividend. The fund may invest in common stocks listed on a foreign exchange that trade on such exchange synchronously with the fund’s shares ( i.e. , during the U.S. listing exchange’s trading hours). These foreign securities could include (a) non-U.S. dollar denominated securities traded outside the U.S. so long as the stock trades at the same time a

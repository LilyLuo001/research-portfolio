utor shall provide the other parties with prompt notice of such amendment, and the next Creation Unit created by the Participant shall be deemed to constitute the Participant’s acceptance of such amendment. This Agreement is intended to, and shall apply to, each of the current and future Funds of the Trust, such that no amendment shall be required in the event that the Trust creates new Funds or terminates existing Funds, provided, however, that notice shall be provided to the Participant of such creation or termination of Funds. 20. GOVERNING LAW; ARBITRATION This Section 20 shall survive the termination of this Agreement. This Agreement shall be governed by and interpreted in accordance with the laws of the State of New York without regard to the conflicts of laws provisions thereof. The parties irrevocably submit to the personal jurisdiction and service and venue of any New York State or United States Federal court sitting in New York, New York having subject matter jurisdiction, for the purposes of any suit, action or proceeding arising out of or relating to this Agreement. 21. COUNTERPARTS This Agreement may be executed in several counterparts, each of which shall be an original and all of which shall constitute one and the same instrument. This Agreement shall be deemed executed by all parties when any one or more counterparts hereof or thereof, individually or taken together, bears the original facsimile or scanned signatures of e […] VORITE COLOR (2) PERMISSION (2) * *Permissions: RO- Read-Only (Allows users to see account information and run reports, but not place trades) ET - Execute Trades (Allows user to place trades directly on to Fund Connect) (1) Required information. (2) Required information to use the Web Order Site. The undersigned [name], [title], [Authorized Participant] does hereby certify that the persons listed above have been duly elected to the offices set forth next to their names, that they presently hold such offices, that they have been 
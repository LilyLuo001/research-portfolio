      497K 1 d304418d497k.htm CLEARBRIDGE FOCUS VALUE ESG ETF ClearBridge Focus Value ESG ETF Summary Prospectus July 29, 2022 Cboe (Ticker Symbol): CFCV CLEARBRIDGE FOCUS VALUE ESG ETF This Exchange-Traded Fund (“ETF”) is different from traditional ETFs. Traditional ETFs tell the public what assets they hold each day. This ETF will not. This may create additional risks for your investment. For example: You may have to pay more money to trade the ETF’s shares. This ETF will provide less information to traders, who tend to charge more for trades when they have less information. The price you pay to buy ETF shares on an exchange may not match the value of the ETF’s portfolio. The same is true when you sell shares. These price differences may be greater for this ETF compared to other ETFs because it provides less information to traders. These additional risks may be even greater in bad or uncertain market conditions. The differences between this ETF and other ETFs may also have advantages. By keeping certain information about the ETF secret, this ETF may face less risk that other traders can predict or copy its investment strategy. This may improve the ETF’s performance. If other traders ar […] folio turnover rate was 21% of the average value of its portfolio. During the fiscal period October 1, 2021 to March 31, 2022, the fund’s portfolio turnover rate was 7% of the average value of its portfolio. Principal investment strategies The fund seeks long-term capital appreciation. By employing fundamental research, in an effort to identify securities with attractive risk-adjusted returns (where the potential returns on the investment are favorable relative to the potential risks of the investment), the fund’s portfolio management team constructs the portfolio on a bottom-up basis. Under normal circumstances, the fund invests at least 80% of its net assets, plus borrowings for investment purposes, if any, in equity securities, or other exchange-traded investments with similar economic characteristics in which it is permitted to invest, of companies with large market capitalizations and which meet its financial and environmental, social and governance (“ESG”) criteria. Large capitalization companies are those companies with market capitalizations similar to companies in the Russell 1000 Index (the “Index”). The size of the companies in the Index changes with market conditions and the composition of the Index. Securities of companies whose market capitalizations no longer meet this definition after purchase by the fund still will be considered securities of large capitalization companies for purposes of the fund’s 80% investment policy. The fund may also invest up to 20% of its net assets in equity securities, or other exchange-traded investments with similar economic characteristics in which it is permitted to invest, of companies with lower market capitalizations. While most of the fund’s investments will be in U.S. companies, the fund may also invest in American Depository Receipts (“ADRs”) and U.S.-listed shares of foreign companies. The fund only invests in instruments that trade on a U.S. exchange contemporaneously with the fund’s shares and, for temporary or defensive purposes, in cash and cash equivalents, such as short-term U.S. Treasury securities, government money market funds, and repurchase agreements. Under normal circumstances, the fund invests in a diversified portfolio typically consisting of the securities of 30 to 40 issuers. Determination of whether a company meets the fund’s ESG standards is based on the subadviser’s proprietary research approach. The subadviser will exercise judgment to determine ESG best practices based on its over thirty-year history managing ESG investment strategies through an established proprietary process. The subadviser utilizes a fundamental, bottom-up research approach that emphasizes company analysis, management and stock selection. The subadviser’s propriety research and analysis generally incorporates information and data obtained from a variety of third-party research providers as supplementary to the subadviser’s own proprietary research and analysis. The subadviser has the right to change the third-party service providers that support t […]  a variety of ways, including through ESG engagement meetings with management personnel of companies to discuss different topics relevant to the company’s business operations, such as labor standards, workforce diversity, supply chain, environmental targets, carbon intensity, reputation, and executive compensation; applying proprietary methodologies to assess the outcome and progress of these meetings to inform the subadviser’s ESG rating of the companies; and through proxy voting. The fund operates in reliance on an exemptive order from the SEC (the “Order”), which limits the types of investments the fund may hold to those listed in the fund’s application for the Order. Under the terms of the Order, the fund is permitted to invest only in exchange-traded funds, exchange-traded notes, exchange listed common stocks, exchange-traded preferred stocks, exchange-traded ADRs, exchange-traded real estate investment trusts, exchange-traded commodity pools, exchange-traded metal trusts, exchange-traded currency trusts and exchange-traded futures that trade on a U.S. exchange contemporaneously with the fund’s shares, as well as cash and cash equivalents (which are short-term U.S. Treasury securities, government money market funds, and repurchase agreements). The fund’s investment strategies and practices, including those listed above, are subject to these limitations. As of March 31, 2022, the top three sectors represented by the fund’s underlying investments were financials, information technology and industrials. These sectors may change over time. Principal risks Risk is inherent in all investing. The value of your investment in the fund, as well as the amount of return you receive on your investment, may fluctuate significantly. You may lose part or all of your investment in the fund or your investment may not perform as well as other similar investments. An investment in the fund is not insured or guaranteed by the Federal Deposit Insurance Corporation or by any bank or government agency. The following is a summary description of certain risks of investing in the fund. ActiveShares ® structure risk. Unlike most actively managed ETFs, the fund does not provide daily disclosure of its portfolio holdings. Instead, the fund provides a verified intraday indicative value (“VIIV”), calculated and disseminated every second throughout the trading day. The VIIV is intended to provide investors with enough information to allow for an effective arbitrage mechanism that will keep the market price of the fund’s shares trading at or close to the underlying net asset value per share of the fund. There is, however, a risk, which may increase during periods of market disruption or volatility, that market prices will vary significantly from the underlying net asset value of the fund. Similarly, because the fund’s shares trade on the basis of a published VIIV, they may trade at a wider bid/ask spread than shares of ETFs that publish their portfolios on a daily basis, especially during periods of market disruption or volatility, and therefore, may cost investors more to trade. Although the fund seeks to benefit from keeping its 6 ClearBridge Focus Value ESG ETF portfolio information secret, some market participants may attempt to use publicly available information, including the VIIV, to identify the fund’s trading strategy, which if successful, could result in such market participants engaging in certain predatory trading practices that may have the potential to harm the fund and its shareholders. Authorized Participant and AP Representative concentration risk […] r-tax returns shown are not relevant to investors who hold their fund shares through tax-advantaged arrangements, such as 401(k) plans or individual retirement accounts. 12 ClearBridge Focus Value ESG ETF Management Investment manager: Legg Mason Partners Fund Advisor, LLC (“LMPFA”) Subadviser: ClearBridge Investments, LLC (“ClearBridge”) Portfolio managers: Primary responsibility for the day-to-day management of the fund lies with the following portfolio managers. Portfolio manager Title Portfolio manager of the fund since Robert Feitler, Jr. Managing Director and Portfolio Manager of ClearBridge 2020 Dmitry Khaykin Managing Director and Portfolio Manager of ClearBridge 2020 Purchase and sale of fund shares The fund is an actively managed exchange-traded fund (“ETF”). Individual shares of the fund are listed on a national securities exchange and are redeemable only by Authorized Participants in aggregated blocks of 10,000 shares or multiples thereof (“Creation Units”). Individual shares of the fund may only be purchased and sold in the secondary market through a broker-dealer at market prices. Because fund shares trade at market prices rather than at net asset value, fund shares may trade at a price greater than net asset value (a premium) or less than net asset value (a discount). When buying or selling shares in the secondary market, you may incur costs attributable to the difference between the highest price a buyer is willing to pay to purchase shares of the fund (bid) and the lowest price a seller is willing to accept for shares of the fund (ask) (the “bid-ask spread”). The fund will only issue or redeem Creation Units to Authorized Participants who have entered into agreements with the fund’s distributor. The fund generally will issue or redeem Creation Units in return for a designated portfolio of securities (and an amount of cash) that the fund specifies each day. You may access recent information, including information on the fund’s net asset value, market price, premiums and discounts, and bid-ask spreads, on the fund’s website at www.franklintempleton.com/etfproducts. ClearBridge Focus Value ESG ETF 13 Tax information The fund’s distributions are generally taxable and will be taxed as ordinary incom

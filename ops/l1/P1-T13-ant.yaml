      497K 1 acetftfdg497k.htm 497K Document Summary Prospectus January 1, 2026 American Century ® Focused Dynamic Growth ETF Ticker: FDG Exchange: NYSE Arca, Inc. Before you invest, you may want to review the fund’s prospectus, which contains more information about the fund and its risks. You can find the fund’s prospectus, reports to shareholders, and other information about the fund online at americancentury.com/etfdocs. You can also get this information at no cost by calling 833-ACI-ETFS or sending an email request to prospectus@americancentury.com. The fund’s prospectus and other information are also available from financial intermediaries through which shares of the fund may be purchased or sold. This ETF is different from traditional ETFs. Traditional ETFs tell the public what assets they hold each day. This ETF will not. This may create additional risks for your investment. For example: • You may have to pay more money to trade the ETF’s shares. This ETF will provide less information to traders, who tend to charge more for trades when they have less information. • The price you pay to buy ETF shares on an exchange may not match the value of the ETF’s portfolio. The same is true w […] ollow growth in earnings, revenues and/or cash flow. The fund will invest primarily in securities of large cap companies, but may invest in companies of any market capitalization. The fund normally invests in a relatively limited number of companies, generally 30 to 45 securities, but may incorporate more securities to account for liquidity constraints. The fund will invest principally in U.S. exchange-listed common stocks and American Depositary Receipts (ADRs). The fund uses ADRs to obtain exposure to foreign securities. ADRs are issued by a U.S. financial institution (depositary) and evidence ownership in a security or pool of securities issued by a foreign issuer that have been deposited with the depositary. The fund may only invest in exchange-traded ADRs that are registered with the Securities and Exchange Commission and trade on a U.S. exchange contemporaneously with the fund’s shares. The portfolio managers use a variety of analytical research tools and techniques to help them make decisions about buying or holding stocks of companies that meet their investment criteria and selling the stocks of companies that do not. Under normal market conditions, the portfolio managers seek securities of companies whose earnings or revenues are not only growing, but growing at an accelerated pace. This includes companies whose growth rates are expected to accelerate relative to factors including recent trends, market expectations, peers and historical data. Among other variables, the portfolio managers will consider the fund’s growth and momentum profile relative to the performance benchmark, the Russell 1000 ® Growth Index. These techniques help the portfolio managers buy or hold the stocks of companies they believe have favorable growth prospects and sell the stocks of companies whose characteristics no longer meet their criteria. The fund is an actively managed exchange-traded fund (ETF) that does not seek to replicate the performance of a specified index. When deciding whether to buy or sell a security, and how and when to implement a trade, portfolio managers may consider the expected implementation costs and tax consequences of the trade in an attempt to gain trading efficiencies, avoid unnecessary risk, minimize tax impact, and/or enhance fund performance. The fund is an actively managed, nontransparent exchange-traded fund (ETF) that does not seek to replicate the performance of a specified index. In lieu of publishing its portfolio contents (Actual Portfolio) daily, the fund publishes a proxy portfolio (Proxy Portfolio) each day and on its website. There is no minimum overlap required between the Actual Portfolio and the Proxy Portfolio. Principal Risks • Proxy Portfolio Risk — The goal of the Proxy Portfolio is, during all market conditions, to track closely the daily performance of the Actual Portfolio and minimize intra-day misalignment between the performance of the Proxy Portfolio and the performance of the Actual Portfolio. The Proxy Portfolio is designed to reflect the economic exposures and the risk characteristics of the Actual Portfolio on any given trading day. ◦ The Proxy Portfolio methodology is novel and not yet proven as an effective arbitrage mechanism. The effectiveness of the Proxy Portfolio as an arbitrage mechanism is contingent upon, among other things, the fund’s factor model analysis creating a proxy portfolio that performs in a manner substantially identical to the performance of the fund’s actual portfolio. While the Proxy Portfolio may include some of the fund’s holdings, it is not the fund’s Actual Portfolio. ETFs trading on the basis of a published Proxy Portfolio may exhibit wider premiums and discounts, bid/ask spreads, and tracking error than other ETFs using the same investment strategies that publish their portfolios on a daily basis, especially during periods of market disruption or volatility. Therefore, shares of the fund may cost investors more to trade than shares of a traditional ETF. ◦ Each day the fund calculates the overlap between the holdings of the prior Business Day’s Proxy Portfolio compared to the Actual Portfolio (Proxy Overlap) and the difference, in percentage terms, between the Proxy Portfolio per share NAV and that of the Actual Portfolio (Tracking Error). If the Tracking Error becomes large, there is a risk that the performance of the Proxy Portfolio may deviate from the performance of the Actual Portfolio. ◦ The fund’s Board of Trustees regularly reviews its Tracking Error and bid/spread. If deviations become too large, the Board will consider the continuing viability of the fund, whether shareholders are being harmed, and what, if any, corrective measures would be appropriate. See the Statement of Additional Information for further discussion of the Board’s oversight responsibilities. ◦ Although the fund seeks to benefit from keeping its portfolio information secret, market participants may attempt to use the Proxy Portfolio to identify a fund’s trading strategy, which if successful, could result in such market participants engaging in certain predatory trading practices that may have the potential to harm the fund and its shareholders. • Premium/Discount Risk — Publication of the Proxy Portfolio is not the same level of transparency as the publication of the full portfolio by a fully transparent active ETF. Although the Proxy Portfolio is intended to provide investors with enough information to allow for an effective arbitrage mechanism that will keep the market price of the fund at or close to the underlying net asset value (NAV) per share of the fund, there is a risk (which may increase during periods of market disruption or volatility) that market prices will vary significantly from the underlying NAV of the fund. This means the price paid to buy shares on an exchange may not match the value of the fund’s portfolio. The same is true when shares are sold. • Trading Issues Risk — If securities representing 10% or more of the fund’s Actual Portfolio do not have readily available market quotations, the fund will promptly request that the Exchange halt trading in the fund’s shares. Trading halts may have a greater impact on this fund compared to other ETFs due to the fund’s nontransparent structure. If the trading of a security held in the fund’s Actual Portfolio is halted, or otherwise does not have readily available market quotations, and the Advisor believes that the lack of any such readily available market quotations may affect the reliability of the Proxy Portfolio as an arbitrage vehicle, or otherwise determines it is in the best interest of the fund, the Advisor promptly will disclose on the fund’s website the identity and weighting of such security for so long as such security’s trading is halted or otherwise does not have readily available market quotations and remains in the Actual Portfolio. • Authorized Participant Concentration Risk — Only an authorized participant may engage in creation or redemption transactions directly with the fund. The fund may have a limited number of institutions that act as authorized participants. To the extent that these institutions exit the business or are unable to proceed with creation and/or redemption orders with respect to the fund and no other authorized participant is able to step forward to process creation and/or redemption orders, fund shares may trade at a discount to net asset value (NAV) and possibly face trading halts and/or delisting. This risk may be more pronounced in volatile markets, potentially where there are significant redemptions in ETFs generally. The fact that the fund is offering a novel and unique structure may affect the number of entities willing to act as Authorized Participants. During times of market stress, Authorized Participants may be more likely to step away from this type of ETF than a traditional ETF. • Growth Stocks Risk — Investments in growth stocks may be more volatile than other stocks and the overall stock market. These stocks are typical

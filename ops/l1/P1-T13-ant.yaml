rs are being harmed, and what, if any, corrective measures would be appropriate. See the Statement of Additional Information for further discussion of the Board’s monitoring responsibilities. ​ • Although the fund seeks to benefit from keeping its portfolio information secret, market participants may attempt to use the Proxy Portfolio to identify a fund’s trading strategy, which if successful, could result in such market participants engaging in certain predatory trading practices that may have the potential to harm the fund and its shareholders. The Proxy Portfolio and any related disclosures have been designed to minimize the risk of predatory trading practices, but they may not be successful in doing so. ​ Premium/Discount Risk. Publication of the Proxy Portfolio is not the same level of transparency as the publication of the Actual Portfolio by a fully transparent ETF. Although the Proxy Portfolio is intended to provide authorized participants and other market participants with enough information to allow for an effective arbitrage mechanism that is intended to keep the market price of the fund at or close to the underlying NAV per share of the fund, there is a risk (which may increase during periods of market disruption or volatility) that market prices will vary significantly from NAV per share of the fund. This means the price paid to buy shares on an exchange may not match the value of the fund’s portfolio. The same is true when shares are sold. Trading Halt Risk. If securities representing 10% or more of the fund’s Actual Portfolio do not have readily available market quotations, the fund will promptly request that the listing exchange halt trading in the fund’s shares which means that investors would not be able to trade their shares. Trading halts may have a greater impact on the fund compared to other ETFs due to the fund’s non-transparent structure. If the trading of a security held in the fund’s Actual Portfolio is halted, or otherwise does not have re
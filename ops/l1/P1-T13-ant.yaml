      497K 1 d921051d497k.htm NATIXIS VAUGHAN NELSON MID CAP ETF Natixis Vaughan Nelson Mid Cap ETF Summary Prospectus September 17, 2020 Natixis Vaughan Nelson Mid Cap ETF NYSE Arca: VNMC THIS ETF IS DIFFERENT FROM TRADITIONAL ETFs Traditional ETFs tell the public what assets they hold each day. This ETF will not. This may create additional risks for your investment. For example: • You may have to pay more money to trade this ETF’s shares. This ETF will provide less information to traders, who tend to charge more for trades when they have less information. • The price you pay to buy ETF shares on an exchange may not match the value of the ETF’s portfolio. The same is true when you sell shares. These price differences may be greater for this ETF compared to other ETFs because it provides less information to traders. • These additional risks may be even greater in bad or uncertain market conditions. • This ETF will publish on their websites each day a Proxy Portfolio (“Proxy Portfolio”) designed to help trading in shares of the ETF. While the Proxy Portfolio includes some of these ETF’s holdings, it is not the ETF’s Actual Portfolio (“Actual Portfolio”). The differences between this ETF a […] der normal market conditions, the Fund will invest at least 80% of its assets in companies that, at the time of purchase, have market capitalizations either within the capitalization range of the Russell Midcap ® Value Index or of $15 billion or less. The Russell Midcap® Value Index is an unmanaged index that measures the performance of companies with lower price to book ratios and lower forecasted growth values within the broader Russell Midcap Index ® . While the market capitalization range for the Russell Midcap ® Value Index fluctuates, at March 31, 2020, it was $72.6 million to $39.1 billion. However, the Fund may invest up tp 20% of its assets in companies with smaller or larger capitalizations. Equity securities may take the form of exchange-traded stock (e.g., common and preferred exchange-traded stocks) in corporations and exchange-traded real estate investment trusts (“REITs”). Vaughan Nelson Investment Management, L.P. (“Vaughan Nelson”) invests in medium-capitalization companies with a focus on those companies meeting Vaughan Nelson’s return expectations. Vaughan Nelson uses a bottom-up value oriented investment process in constructing the Fund’s portfolio. Vaughan Nelson seeks companies with the following characteristics, although not all of the companies selected will have these attributes: • Companies earning a positive return on capital with stable-to-improving returns. • Companies valued at a discount to their asset value. • Companies with an attractive and sustainable dividend level. In selecting investments for the Fund, Vaughan Nelson generally employs the following strategies: • Vaughan Nelson employs a value-driven investment philosophy that selects stocks selling at a relatively low value based on business fundamentals, economic margin analysis and discounted cash flow models. Vaughan Nelson selects companies that it believes are out of favor or misunderstood. 2 Fund Summary • Vaughan Nelson narrows the investment universe by using value-driven screens to create a research universe of companies with market capitalizations between $1 billion and $20 billion. • Vaughan Nelson uses fundamental analysis to construct a portfolio that, in the opinion of Vaughan Nelson, is made up of quality companies with the potential to provide significant increases in share price over a three year period. • Vaughan Nelson will generally sell a security when it reaches Vaughan Nelson’s price target or when the issuer shows a change in financial condition, competitive pressures, poor management decisions or internal or external forces reducing future expected returns from those expected at the time of investment. Non-Transparent ETF with Proxy Portfolio Structure. The Fund is a type of exchange traded fund (“ETF”). Unlike traditional ETFs, however, which generally publish their portfolio holdings on a daily basis, the Fund discloses a portfolio transparency substitute—the “Proxy Portfolio”—and certain related information about the relative performance of the Proxy Portfolio and the Fund’s actual portfolio (“Actual Portfolio”) holdings (the “Proxy Portfolio Disclosures”), which are intended to help keep the market price of the Fund’s shares trading at or close to the underlying net asset value (“NAV”) per share of the Fund. While the Proxy Portfolio includes some of the Fund’s holdings, it is not the Fund’s Actual Portfolio, and the Fund will not disclose the daily holdings of the Actual Portfolio. Although the Fund seeks to benefit from keeping its portfolio information secret, market participants may attempt to use the Proxy Portfolio to identify the Fund’s trading strategy, which if successful, could result in such market participants engaging in certain predatory trading practices that may have the potential to harm the Fund and its shareholders. The Fund’s exemptive relief limits the types of securities in which the Fund can invest, which may constrain the Fund’s ability to implement its investment strategies. The Fund is actively-managed and does not intend to track an index. Principal Investment Risks The principal risks of investing in the Fund are summarized below. The Fund does not represent a complete investment program. You may lose money by investing in the Fund. The significance of any specific risk to an investment in the Fund will vary over time, depending on the composition of the Fund’s portfolio, market conditions, and other factors. You should read all of the risk information presented below carefully, because any one or more of these risks may result in losses to the Fund. Proxy Portfolio Structure Risk: Unlike traditional ETFs that provide daily disclosure of their portfolio holdings, the Fund does not disclose the daily holdings of the Actual Portfolio. Instead, the Fund discloses a Proxy Portfolio that is designed to reflect the economic exposure and risk characteristics of the Fund’s Actual Portfolio on any given trading day. Although the Proxy Portfolio and Proxy Portfolio Disclosures are intended to provide Authorized Participants and other market participants with enough information to allow them to engage in effective arbitrage transactions that will keep the market price of the Fund’s shares trading at or close to the underlying NAV per share of the Fund, while at the same time enabling them to establish cost-effective hedging strategies to reduce risk, there is a risk that market prices will vary significantly from the underlying NAV of the Fund. See “Premium/Discount Risk.” Similarly, shares of the Fund may trade at a wider bid/ask spread than shares of traditional ETFs, and may therefore be more costly for investors to trade. See “Trading Issues Risk.” Also, the Fund will incur expenses to license the Proxy Portfolio mechanism, which may impact shareholder returns. Additionally, the proxy mechanism itself may result in additional trading costs, which also may negatively impact shareholder returns. In addition, although the Proxy Portfolio is designed to protect the Fund from predatory practices such as front-running and free-riding, market participants may nevertheless be able to use the Proxy Portfolio and Proxy Portfolio Disclosures to engage in trading practices that disadvantage the Fund. See “Predatory Trading Practices Risk.” The Fund will monitor on an ongoing basis the premium/discount between the market price and the NAV of the Fund’s shares, but there can be no assurance that the Proxy Portfolio methodology will operate as intended. The Proxy Portfolio methodology is novel and not yet proven as an effective arbitrage mechanism. The effectiveness of the Proxy Portfolio methodology as an arbitrage mechanism is contingent upon, among other things, the effectiveness of the Fund’s Factor Model analysis in creating a Proxy Portfolio that performs in a manner substantially identical to the performance of the Fund’s Actual Portfolio and the willingness of Authorized Participants and other market participants to trade based on the Proxy Portfolio. In the event that the Proxy Portfolio methodology does not result in effective arbitrage opportunities in the Fund shares, the Fund may exhibit wider premiums/discounts, bid/ask spreads and tracking error. At certain thresholds for such premiums/discounts, bid/ask spreads and tracking error, the Fund’s Board of Trustees will consider possible remedial measures, which may include liquidation or conversion to a fully-transparent, active ETF or a mutual fund. • Premium/Discount Risk: Shares of the Fund are listed for trading on the NYSE Arca, Inc. (the “NYSE Arca”) and are bought and sold in the secondary market at market prices that may differ from their most recent NAV. The market value of the Fund’s shares will fluctuate, in some cases materially, in response to changes in the Fund’s NAV, the intraday value of the Fund’s holdings, and the relative supply and demand for the Fund’s shares on the exchange. Although the Proxy Portfolio is intended to provide investors with enough information to allow for an effective arbitrage mechanism that will keep the market price of the Fund at or close to the Fund’s NAV, there is a risk (which may increase during periods of market disruption or volatility) that market prices for Fund shares will vary significantly from the Fund’s NAV. This risk may be greater for the Fund than for traditional ETFs that disclose their full portfolio holdings on a daily basis because the publication of the Proxy Portfolio does not provide the same level of transparency as the publication of the full portfolio by a fully transparent active ETF. This could cause the Fund’s shares to have wider bid/ask spreads and larger premiums/discounts than fully transparent ETFs using the same investment strategies. Disruptions to creations and redemptions, the existence of extreme market volatility or potential lack of an active trading market for shares may result in shares trading at a significant premium or discount to NAV and/or in a reduced liquidity of your investment. During such periods, you may be unable to sell your shares or may incur significant losses if you sell your shares. There are various methods by which investors can purchase and sell shares and various types of orders that may be placed. Investors should consult their financial 3 Fund Summary intermediary before purchasing or selling shares of the Fund. If a shareholder purchases shares at a time when the market price is at a premium to the NAV or sells shares at a time when the market price is at a discount to the NAV, the shareholder may sustain losses. • Authorized Participant Concentration Risk: Only an authorized participant (“Authorized Participant”) may engage in creation or redemption transactions directly with the Fund. The Fund has a limited number of institutions that act as Authorized Participants, none of which are or will be obligated to engage in creation or redemption transactions. To the extent that these institutions exit the business or are unable to proceed with creation and/or redemption orders with respect to the Fund and no other Authorized Participant is able to step forward to create or redeem Creation Units, Fund shares may trade at a discount to NAV and possibly face trading halts and/or delisting. The Fund’s novel structure may affect the number of entities willing to act as Authorized Participants, and this risk may be exacerbated during times of market stress. • Predatory Trading Practices Risk: Although the Fund seeks to benefit from keeping its portfolio holdings information secret, market participants may attempt to use the Proxy Portfolio and related Proxy Portfolio Disclosures to identify the Fund’s holdings and trading strategy. If successful, this could result in such market participants engaging in predatory trading practices that could harm the Fund and its shareholders. The Proxy Portfolio and related Proxy Portfolio Disclosures have been designed to minimize the risk that market participants could “reverse engineer” the Fund’s portfolio and investment strategy, but they may not be successful in this regard. • Trading Issues Risk: Trading in Fund shares on the NYSE Arca may be halted in certain circumstances. If 10% or more of the Fund’s Actual Portfolio does not have readily available market quotations, the Fund will promptly request that the NYSE Arca halt trading in the Fund’s shares. Such trading halts may have a greater impact on the Fund compared to other ETFs due to its lack of transparency. If the trading of a security held in the Fund’s Actual Portfolio is halted or otherwise does not have readily available market quotations and the Adviser believes that the lack of any such readily available market quotations may affect the reliability of the Proxy Portfolio as an arbitrage vehicle or otherwise determines it is in the best interest of the Fund, the Adviser promptly will disclose on the Fund’s website the identity and weighting of such security for so long as such security’s trading is halted or otherwise does not have readily available market quotations and remains in the Actual Portfolio.There can be no assurance that the requirements of the NYSE Arca necessary to maintain the listing of the Fund will continue to be met. Because the Fund trades on the basis of a published Proxy Portfolio, it may trade at a wider bid/ask spread and may experience a wider premium/discount than traditional ETFs that publish their portfolios on a daily basis, and therefore, may cost investors more to trade especially during periods of market disruption or volatility. • Tracking Error Risk: Although the Proxy Portfolio is designed to reflect the economic exposure and risk characteristics of the Fund’s Actual Portfolio on any given trading day, there is a risk that the performance of the Proxy Portfolio will diverge from the performance of the Actual Portfolio, potentially materially. Equity Securities Risk: The value of the Fund’s investments in equity securities could be subject to unpredictable declines in the value of individual securities and periods of below-average performance in individual securities or in the equity market as a whole. Value stocks can perform differently from the market as a whole and from other types of stocks. Value stocks also present the risk that their lower valuations fairly reflect their business prospects and that investors will not agree that the stocks represent favorable investment opportunities, and they may fall out of favor with investors and underperform growth stocks during any given period. In the event an issuer is liquidated or declares bankruptcy, the claims of owners of the issuer’s bonds generally take precedence over the claims of those who own preferred stock or common stock. Securities of real estate-related companies and exchange-traded REITs in which the Fund may invest may be considered equity securities, thus subjecting the Fund to the risks of investing in equity securities generally. Market/Issuer Risk: The market value of the Fund’s investments will move up and down, sometimes rapidly and unpredictably, based upon overall market and economic conditions, as well as a number of reasons that directly relate to the issuers of the Fund’s investments, such as management performance, financial condition and demand for the issuers’ goods and services. Management Risk: A strategy used by the Fund’s portfolio managers may fail to produce the intended result. Small- and Mid-Capitalization Companies Risk: Compared to large-capitalization companies, small- and mid-capitalization companies are more likely to have limited product lines, markets or financial resources. Stocks of these companies often trade less frequently and in limited volume and their prices may fluctuate more than stocks of large-capitalization companies. As a result, it may be relatively more difficult for the Fund to buy and sell securities of small- and mid-capitalization companies. Liquidity Risk: Liquidity risk is the risk that the Fund may be unable to find a buyer for its investments when it seeks to sell them or to receive the price it expects. Decreases in the number of financial institutions willing to make markets in the Fund’s investments or in their capacity or willingness to transact may increase the Fund’s exposure to […]  its shareholders. Cybersecurity and other operational and technology issues may result in financial losses to the Fund and its shareholders. Foreign Securities Risk: Investments in foreign securities may be subject to greater political, economic, environmental, credit/counterparty and information risks. The Fund’s investments in foreign securities also are subject to foreign currency fluctuations and other foreign currency-related risks. Foreign securities may be subject to higher volatility than U.S. securities, varying degrees of regulation and limited liquidity. 4 Fund Summary Investments in Other Investment Companies Risk: The Fund will indirectly bear the management, service and other fees of any other investment companies, including exchange-traded funds, in which it invests in addition to its own expenses. New and Smaller Sized Fund Risk: The Fund is relatively new and has a limited operating history for investors to evaluate and may not be successful in implementing its investment strategies. The Fund may fail to attract sufficient assets to achieve or maintain economies of scale, which could result in the Fund being liquidated at any time without shareholder approval and at a time that may not be favorable for all shareholders. Smaller ETFs will have a lower public float and lower trading volumes, leading to wider bid/ask spreads. Operational Risk: The Fund is exposed to operational risk arising from a number of factors, including but not limited to human error, processing and communication errors, errors of the Fund’s service providers, market makers, listing exchange, Authorized Participants or the issuers of securities in which the Fund invests or with which they do business, failed or inadequate processes and technology or systems failures. REITs Risk: Investments in the real estate industry, including REITs, are particularly sensitive to economic downturns and are sensitive to factors such as changes in real estate values, property taxes and tax laws, interest rates, cash flow of underlying real estate assets, occupancy rates, government regulations affecting zoning, land use and rents and the management skill and creditworthiness of the issuer. Companies in the real estate industry also may be s

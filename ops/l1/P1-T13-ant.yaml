ng normal market conditions, seeks to invest in approximately 25-30 U.S. exchange-traded common stocks of companies that are listed on U.S. national securities exchanges and trade contemporaneously with the shares of the Fund (the “Shares”). From time to time, the Fund may hold a greater number of common stocks. There is no targeted market capitalization for the common stocks held by the Fund. The Fund may also hold concentrated positions in common stocks, although the Fund’s guidelines provide that no single investment should generally be more than 10% of the Fund’s portfolio at acquisition (calculated based on initial cost and without regard to later appreciation). The Adviser identifies investments for the Fund that it believes possess durable competitive advantages ( i.e., business assets or abilities that provide superior long-term value to a company’s customers versus its competitors), earn higher than average returns on capital, treat shareholders like partners, and have opportunities to reinvest excess cash profits at above-average rates of return. The Adviser identifies these companies from those listed on U.S. national securities exchanges through fundamental research conducted by the portfolio manager and the Adviser’s research department focusing on (i) business quality (including an assessment of the potential drivers and threats to the durability of competitive advantage and long-term growth prospects), (ii) quality of management (including executive compensation and incentives), (iii) quality of earnings, and (iv) cash flow generati […] ity, without limitation, when: 1) a security no longer meets the Adviser’s investment criteria or the requirements of the Fund’s (as defined below) or its Exchange listing requirements; 2) a portfolio company’s long-term earnings and reinvestment prospects deteriorate; 3) the Adviser loses confidence in the leadership and governance of a portfolio company; 4) a new security is judged to be comparatively more attractive than a current position; and/or 5) the valuation of a security appears excessively higher than the Adviser’s estimates of long-term value. The Fund is authorized to invest solely in securities listed on U.S. exchanges. As a result, the portfolio will be comprised primarily of issuers domiciled in the U.S., but it may include exchange-traded American Depositary Receipts (“ADRs”) registered with the SEC that trade contemporaneously with the Shares and holdings in other ETFs that provide exposure to foreign companies that have the same durable competitive advantages described above. The Fund is non-diversified, which means that a meaningful portion of the Fund’s assets may be invested in the securities of a smaller number of companies and/or a more limited number of sectors than a diversified fund. Although the Fund normally holds a focused portfolio of equity securities, the Fund is not required to be fully invested in such securities and may maintain a meaningful portion of its total assets in cash and cash equivalent securities (comprised exclusively of short-term U.S. Treasury securities, government money market funds and repurchase agreements). The Fund is an actively managed, nontransparent ETF that does not seek to replicate the performance of a specified index. A primary difference for the Fund, compared to traditional ETFs, is that each broker-dealer or other financial intermediary that enters into an agreement with the Fund’s distributor to serve as authorized participant for the Fund (each, an “Authorized Participant”) establishes and maintains an account through which it conducts creations and redemptions without knowing the identities of the securities purchased or sold in its account (a “Confidential Account”) with an agent selected by the Authorized Participant and approved by the Fun […] ation Unit.” All orders to purchase or redeem Creation Units must be placed by or through an Authorized Participant that has entered into an authorized participant agreement (“AP Agreement”) with the Fund’s distributor, Northern Lights Distributors, LLC (the “Distributor”) using the Authorized Participant’s Confidential Account at the AP Representative. The Fund operates in reliance on an exemptive order from the SEC (the “Order”), which presently limits the types of investments that the Fund may hold to those listed in the Fund’s application for the Order. Under the terms of the Order, the Fund is permitted to invest only in the following investments, which, if listed, must trade on a U.S. exchange contemporaneously with the Shares: ETFs, exchange-traded notes, exchange-listed common stocks, exchange-traded preferred stocks, exchange-traded ADRs, exchange-traded real estate investment trusts, exchange-traded commodity pools, exchange-traded metal trusts, exchange-traded currency trusts and U.S. exchange-traded futures for which the reference asset is one in which the Fund may invest directly or, in the case of an index future traded on a U.S. exchange, is based on an index, the components of which are a type of asset in which the Fund could invest directly; as well as cash and cash equivalents (which are short-term U.S. Treasury securities, government money market funds, and repurchase agreements). The Fund’s investment strategies and practices, including those listed above, are subject to these limitations. The Adviser does not intend to invest in all of the types of instruments authorized by the Order. In that regard, the Fund is not expected to invest in futures contracts, exchange-traded commodity pools, exchange-traded metal trusts, exchange-traded notes or exchange-traded currency trusts. For more information about the Order, please see pages 2 and 9 of the Statement of Additional Information. 2 Principal Investment Risks: As with all funds, there is the risk that you could lose money through your investment in the Fund. Many factors affect the Fund’s net asset value (“NAV”) and performance. The following describes the risks the Fund bears with respect to its investments. As with any fund, there is no gu

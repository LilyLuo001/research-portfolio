      497 1 hft-497_082523.htm DEFINITIVE MATERIALS Filed pursuant to Rule 497(e) 1933 Act File No. 333-272430 1940 Act File No. 811-07168 PRESIDENT’S LETTER Quaker investment trust 261 North University Drive, Suite 520 Ft. Lauderdale, FL 33324 (888) 272-0007 www.ccminvests.com August 25, 2023 Dear Shareholder: We are writing to let you know about an important shareholder vote coming up for all classes of the CCM Core Impact Equity Fund and the CCM Small/Mid-Cap Impact Value Fund, each a series of Quaker Investment Trust (“ QIT ”). A special meeting of shareholders will be held on October 24, 2023, at the offices of QIT at 261 North University Drive, Suite 520, Ft. Lauderdale, Florida 33324. The purpose of the meeting is to seek shareholder approval of an Agreement and Plan of Reorganization under which the CCM Core Impact Equity Fund and the CCM Small/Mid-Cap Impact Value Fund (each, a “ Target Fund ” and together, the “ Target Funds ”) would be reorganized into the Hennessy Stance ESG ETF (the “ Acquiring Fund ”), a series of Hennessy Funds Trust (each, a “ Reorganization ” and together, the “ Reorganizations ”). Hennessy Advisors, Inc. (“ Hennessy Advisors ”) is the investment advisor […] quiring Fund. Stance Capital, LLC (“ Stance Capital ”) and Vident Advisory, LLC (“ Vident ”) serve as sub-advisors to the Acquiring Fund. The enclosed package contains important information about the proposed Reorganizations. For the Reorganizations to occur, shareholders like you must vote to approve the Agreement and Plan of Reorganization. Approval of the Plan requires the approval of all classes of the CCM Core Impact Equity Fund voting together as a group, and the approval of all classes of the CCM Small/Mid-Cap Impact Value Fund voting together as a group. If shareholders of a Target Fund approve the applicable Reorganization, the assets of all classes of the Target Fund will be merged into the Acquiring Fund. The Acquiring Fund is a semi-transparent actively-managed exchange traded fund (“ ETF ”) and its shares are listed and traded on the NYSE Arca, Inc. The Acquiring Fund does not issue multiple classes. Semi-Transparent Actively-Managed ETF with Portfolio Reference Basket Structure: As noted above, the Acquiring Fund is an actively-managed, semi-transparent ETF. Unlike traditional ETFs, which generally publish their portfolio holdings on a daily basis, the Acquiring Fund discloses a portfolio transparency substitute—the “Portfolio Reference Basket”—and certain related information about the Portfolio Reference Basket relative to the Acquiring Fund’s actual portfolio (“Actual Portfolio”) holdings (the “Portfolio Reference Basket Disclosures”), which are intended to help keep the market price of the Acquiring Fund’s shares trading at or close to the underlying net asset value (“NAV”) per share of the Acquiring Fund. While the Portfolio Reference Basket includes all of the Acquiring Fund’s holdings, it is not the Acquiring Fund’s Actual Portfolio because the holdings will be weighted differently, subject to a minimum weightings overlap of 90% with the Acquiring Fund’s Actual Portfolio at the beginning of each trading day. The Acquiring Fund also discloses the maximum deviation between the weightings of the specific securities in the Portfolio Reference Basket and the weightings of those specific securities in the Actual Portfolio, as well as between the weighting of the respective cash positions (the “Guardrail Amount”). The Guardrail Amount is intended to ensure that no individual security in the Portfolio Reference Basket will be overweighted or underweighted by more than the publicly disclosed percentage when compared to the actual weighting of each security within the Actual Portfolio as of the beginning of each […] tions ”). Shareholder approval of the Plan is needed to proceed with each of the Reorganizations, and a special meeting of shareholders of the Target Funds will be held on October 24, 2023, to consider whether to approve the Plan. Shareholders of each Target Fund will vote separately on the applicable Reorganization and the adjournment of the special meeting, with the classes of each Target Fund voting together. 1 The Target Funds’ Board of Trustees is sending this document to you for your use in deciding whether to approve the Plan at the special meeting. If the Reorganizations are approved, following consummation of the Reorganizations, shareholders of the Target Funds will become shareholders of the Acquiring Fund. The Acquiring Fund, a semi-transparent actively-managed ETF that is listed and trades on the NYSE Arca, Inc., will continue to operate pursuant to its existing investment strategies following consummation of the Reorganizations. Question 2 : What is a semi-transparent actively-managed ETF with a portfolio reference basket structure? Answer : As noted above, the Acquiring Fund is an actively-managed, semi-transparent ETF. Unlike traditional ETFs, which generally publish their portfolio holdings on a daily basis, the Acquiring Fund discloses a portfolio transparency substitute—the “ Portfolio Reference Basket ”—and certain related information about the Portfolio Reference Basket relative to the Acquiring Fund’s actual portfolio (“ Actual Portfolio ”) holdings (the “ Portfolio Reference Basket Disclosures ”), which are intended to help keep the market price of the Acquiring Fund’s shares trading at or close to the underlying net asset value (“ NAV ”) per share of the Acquiring Fund. While the Portfolio Reference Basket includes all of the Acquiring Fund’s holdings, it is not the Acquiring Fund’s Actual Portfolio because the holdings will be weighted differently, subject to a minimum weightings overlap of 90% with the Acquiring Fund’s Actual Portfolio at the beginning of each trading day. The Acquiring Fund also discloses the maximum deviation between the weightings of the specific securities in the Portfolio Reference Basket and the weightings of those specific securities in the Actual Portfolio, as well as between the weighting of the respective cash positions (the “ Guardrail Amount ”). The Guardrail Amount is intended to ensure that no individual security in the Portfolio Reference Basket will be overweighted or underweighted by more than the publicly disclosed percentage when compared to the actual weighting of each security within the Actual Portfolio as of the beginning of each trading day. Question 3 : What are the reasons for the Reorganizations? Answer : As further discussed under “Reasons for the Reorganization and Board Deliberations” below,” the Target Funds’ Board of Trustees has determined that each Reorganization is in the best interests of all classes of each Target Fund. The Reorganizations were proposed to the Board by CCM, the Target Funds’ investment advisor, because, on a going forward basis, CCM is focusing its investment advisory business on fixed income funds rather than equity funds such as the Target Funds. In seeking to reorganize the Target Funds, CCM and the Target Funds’ Board of Trustees considered converting the Target Funds from a mutual fund structure to an ETF structure because the ETF structure provides shareholders with a lower cost investment product that may be traded throughout the day. When determining to reorganize with the Acquiring Fund in particular, CCM and the Board considered that the Acquiring Fund’s structure as an ETF would subject shareholders of the Target Funds to lower shareholder fees overall, as discussed herein, and noted the strong performance of the Acquiring Fund. In addition, CCM believes, and the Target Funds’ Board of Trustees agreed, that the ETF structure offers other potential benefits, such as reduced operational costs, increased tax efficiency associated with the ETF structure, and greater liquidity. 2 As noted above, once you own shares of the Acquiring Fund, you will be able to purchase and sell Acquiring Fund shares throughout the trading day at the then-prevailing market price in the secondary market. However, you may pay a brokerage commission to sell, or buy, Acquiring Fund shares. In addition, the Acquiring Fund shares will have a bid-ask spread, which is the difference between the highest price a buyer is willing to pay for Acquiring Fund shares on the NYSE Arca, and the lowest price that a seller is willing to accept for Acquiring Fund shares on the NYSE Arca. The bid-ask spread affects the price at which you are likely to be able to buy and sell Acquiring Fund shares in the secondary market. More specifically, the larger ( […] t interests of the Target Funds’ respective shareholders, the Target Funds’ Board of Trustees approved the Plan providing for the proposed Reorganization transaction. The Target Funds’ Board of Trustees recommends that you vote “ FOR ” the Plan. Question 5 : Why did the Board of Trustees of the Target Funds determine that the Reorganizations are in the best interests of shareholders of the Target Fund? Answer : The Reorganizations were proposed to the Target Funds’ Board of Trustees by CCM because, on a going forward basis, CCM is focusing its investment advisory business on fixed income funds rather than equity funds such as the Target Funds. In seeking to reorganize the Target Funds, CCM and the Target Funds’ Board of Trustees considered converting the Target Funds from a mutual fund structure to an ETF structure because the ETF structure provides shareholders with a lower cost investment product that may be traded throughout the day. When determining to reorganize with the Acquiring Fund in particular, CCM and the Board considered that the Acquiring Fund’s structure as an ETF would subject shareholders of the Target Funds to lower shareholder fees overall, as discussed herein, and noted the strong performance of the Acquiring Fund. The Board also considered that the Target Funds and the Acquiring Fund all invest in securities that meet environmental, social, and governance (“ ESG ”) standards and are investments that CCM and Hennessy, respectively, believe can deliver strong financial performance. Further, CCM believes, and the Target Funds’ Board of Trustees agreed, that the ETF structure offers other potential benefits, such as reduced operational costs, increased tax efficiency associated with the ETF structure, and greater liquidity. The Trustees also believe that the Target Funds and their shareholders will benefit from the Reorganizations as the Acquiring Fund will have a lower total annual operating expense ratio than each class of the Target Funds and shareholders will be able to buy and sell shares of the Acquiring Fund throughout the trading day. For these reasons, the Target Funds’ Board of Trustees believes that it is in the best interests of the Target Funds and their shareholders to reorganize  […] nd you will receive cash equal in value to the NAV of your Target Fund shares. 7 Direct Accounts. If you hold your shares of the Target Funds in a Direct Account, you should transfer your shares of the Target Funds to a brokerage account that permits investments in ETF shares prior to the Reorganizations. If such a change is not made before the Reorganization, Acquiring Fund shares received in the Reorganizations will be held by the Acquiring Fund’s stock transfer agent, U.S. Bancorp Fund Services, LLC, d/b/a U.S. Bank Global Fund Services. If Acquiring Fund shares are not transferred into a brokerage account that permits investments in ETF shares within at least one year of the date of the Reorganizations, the Acquiring Fund shares may be converted to cash and the cash proceeds sent to the accountholder of record (subject to applicable federal or state laws concerning unclaimed property). The conversion of Acquiring Funds shares to cash may be subject to fees and expenses and generally will be a taxable event for U.S. federal income tax purposes. In some cases, the liquidation of a shareholder’s investment and return of cash, or the transfer of a shareholder’s investment, may be subject to fees and expenses and may also be subject to U.S. federal income taxation. It may take time for a shareholder to receive the cash. Shareholders should consult with their financial intermediary or tax and financial advisors for more information on the impact that the Reorganizations will have on them and their investments. If you are unsure about the ability of your account to accept shares of the Acquiring Fund, please call (888) 272-0007 (toll-free) or contact your financial intermediary. We will continue to contact you to assist you in transferring your shares into a brokerage account that is permitted to hold ETF shares. If a shareholder does not wish to exchange their Target Funds shares for Acquiring Fund shares, the shareholder must liquidate their Target Fund shares prior to consummation of the Reorganizations. Shareholders who hold their shares in retirement accounts generally will not be subject to U.S. federal income taxation if they liquidate their holdings prior to the Reorganizations and do not withdraw such pro

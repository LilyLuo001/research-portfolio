      497K 1 gsx-497k_030126.htm SUMMARY PROSPECTUS SUMMARY Prospectus March 1, 2026 T. ROWE PRICE TGRW Growth Stock ETF This ETF is different from traditional ETFs. Traditional ETFs tell the public what assets they hold each day. This ETF will not. This may create additional risks for your investment. For example: You may have to pay more money to trade the ETF’s shares. This ETF will provide less information to traders, who tend to charge more for trades when they have less information. The price you pay to buy ETF shares on an exchange may not match the value of the ETF’s portfolio. The same is true when you sell shares. These price differences may be greater for this ETF compared to other ETFs because it provides less information to traders. These additional risks may be even greater in bad or uncertain market conditions. The ETF will publish on its website each day a “Proxy Portfolio” designed to help trading in shares of the ETF. While the Proxy Portfolio includes some of the ETF’s holdings, it is not the ETF’s actual portfolio. The differences between this ETF and other ETFs may also have advantages. By keeping certain information about the ETF secret, this ETF may face less risk  […]  to sustain earnings momentum during economic downturns; and occupation of a lucrative niche in the economy and the ability to expand even during times of slow economic growth. The fund’s growth-oriented investment approach to stock selection reflects the belief that when a company increases its earnings faster than both inflation and the overall growth rate of the economy, it may result in a higher stock price. At times, the fund may have a significant portion of its assets invested in the same economic sector, such as the information technology sector. The fund is nondiversified, which means it may invest a greater percentage of its assets in a particular issuer than is permissible for a diversified fund. The fund is an actively-managed, exchange-traded fund (ETF) that does not disclose portfolio holdings daily. In order to provide market participants with information on the fund’s investments, the fund publishes a “Proxy Portfolio” on its website daily. A Proxy Portfolio is a basket of securities that is designed to closely track the daily performance of the fund’s portfolio holdings. While the Proxy Portfolio includes some of the fund’s holdings, it is not the fund’s actual portfolio. The Proxy Portfolio could be based on a broad-based securities index or the fund’s recently disclosed portfolio holdings. The fund’s Portfolio Overlap is available on the fund’s website daily. The Portfolio Overlap is the percentage weight overlap between the holdings of the prior business day’s Proxy Portfolio compared to the holdings of the fund that formed the basis for the fund’s calculation of net asset value (NAV) at the end of the prior business day. Principal Risks As with any fund, there is no guarantee that the fund will achieve its objective(s). The fund’s share price fluctuates, which means you could lose money by investing in the fund. The principal risks of investing in this fund, which may be even greater in unfavorable or uncertain market conditions, are summarized as follows: Proxy portfolio structure: The fund does not disclose portfolio holdings daily. The fund uses a Proxy Portfolio, which is a basket of securities that is designed to closely track the daily performance of the fund’s portfolio holdings. The fund may not always effectively construct a Proxy Portfolio that closely tracks the daily performance of the fund’s portfolio holdings. Because the fund uses a Proxy Portfolio, there is a risk that the fund’s shares may trade at a wider bid-ask spread than shares of ETFs that disclose their portfolio holdings daily. This risk is heightened during periods of market disruption and volatility, and, therefore, may cost you more to trade. Although the fund seeks to benefit from keeping its portfolio information confidential, other traders may attempt to use the Proxy Portfolio and publicly available information, including intraday net asset value (INAV), to identify the fund’s trading strategy, which, if successful, could result in such traders engaging in certain predatory trading practices that may have the potential to harm the fund and its shareholders. Because the fund’s shares are traded in the secondary market, a broker may charge a commission to execute a transaction in shares, and you may incur the cost of the spread between the price at which a dealer will buy shares and the somewhat higher price at which a dealer will sell shares. SUMMARY 3 Premium/Discount: Although the Proxy Portfolio is intended to provide investors with enough information to allow for an effective arbitrage mechanism that will keep the market price of the fund at or close to the underlying NAV per share of the fund, there is a risk (which may increase during periods of market disruption or volatility) that market prices will vary significantly from the underlying NAV per share of the fund. These price differences may be greater for this fund compared to ETFs that disclose portfolio holdings daily because it provides different portfolio holdings information to traders. The adviser will monitor on an ongoing basis how shares trade, including the level of any market price premium or discount to NAV and the bid-ask spreads on market transactions. Each day, the website provides the fund’s Tracking Error, which means the standard deviation over the past three months of the daily proxy spread (i.e., the difference, in percentage terms, between the Proxy Portfolio’s per share NAV and that of the fund at the end of the trading day). Trading halt: It is possible that an active trading market for the shares will not be maintained, or that trading in the shares will be halted for reasons such as market-wide trading halts or the shares no longer meeting the listing requirements of the listing exchange. If securities representing 10% or more of the fund’s portfolio do not have readily available market quotations, the fund would promptly request the listing exchange to halt trading on the fund. In addition, to the extent T. Rowe Price determines that a security held in a fund’s portfolio but not in the Proxy Portfolio does not have readily available market quotations and such circumstance may affect the reliability of the Proxy Portfolio as an arbitrage vehicle, that information, along with the identity and weighting of that security in the fund’s portfolio, will be publicly disclosed on the fund’s website. Authorized Participant: Only Authorized Participants may engage in creation or redemption transactions directly with the fund. The fund has a limited number of institutions that may act as Authorized Participants. Authorized Participants have no obligation to submit creation or redemption orders, and there is no assurance that Authorized Participants will establish or maintain an active trading market for shares. To the extent an Authorized Participant cannot or will not engage in creation and redemption transactions, shares may be more likely to trade at a premium or discount to the fund's NAV and to face trading halts and/or delisting. If the fund effects its creations or redemptions at least partially or fully for cash, rather than in-kind securities, the fund may incur certain costs, including brokerage costs in connection with investing cash received and may recognize capital gains in connection with cash redemptions. During times of market stress, Authorized Participants may be more likely to step away from an ETF that does not disclose holdings daily. ETF shares trading: Shares of the fund are listed for trading on a national securities exchange and are bought and sold in the secondary market at market prices. The market prices of shares are expected to fluctuate in response to chang

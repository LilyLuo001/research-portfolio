      EX-99.(D)(8) 12 ex-d8.htm INVESTMENT ADVISORY AGREEMENT BETWEEN THE REGISTRANT AND GABELLI FUNDS, LLC, ON BEHALF OF GABELLI EQUITY INCOME ETF GABELLI ETFs TRUST N-1A/A Exhibit (d)(8) INVESTMENT ADVISORY AGREEMENT INVESTMENT ADVISORY AGREEMENT, dated _____________, 2020, between The Gabelli ETFs Trust, a Delaware statutory trust, on behalf of Gabelli Equity Income ETF (the “Trust” and the “Fund”, respectively), and Gabelli Funds, LLC (the “Adviser”), a New York limited liability company. In consideration of the mutual promises and agreements herein contained and other good and valuable consideration, the receipt of which is hereby acknowledged, it is agreed by and between the parties hereto as follows: 1. In General The Trust, on behalf of the Fund, desires to employ and hereby appoints, the Adviser to act as the investment adviser and to oversee administration of all aspects of the Fund’s business and affairs and provide or arrange for others whom it believes to be competent to provide, certain services as specified below. The Adviser accepts the appointment and agrees to furnish the services set forth below for the compensation set forth below. Nothing contained herein shall be co […] oses. The Trust further agrees that the word “Gabelli” in its name is derived from the name of Mario J. Gabelli and such name may freely be used by the Adviser for other investment companies, entities or products. The Trust further agrees that, in the event that the Adviser shall cease to act as investment adviser to the Fund, the Fund shall promptly take all necessary and appropriate action to change its name to names which do not include the word “Gabelli”; provided, however, that the Fund may continue to use the word “Gabelli” if the Adviser consents in writing to such use. The Adviser represents that it has entered into an agreement permitting the use of all necessary licenses and intellectual property required for the Fund to use the “ActiveShares” name. 7. Notices Any notice under this Agreement shall be in writing to the other party at such address as the other party may designate from time to time for the receipt of such notice and shall be deemed to be received on the earlier of the date actually received or on the fourth day after the postmark if such notice is mailed first class postage prepaid. 5 8. Governing Law This Agreement shall be construed in accordance with the laws of the State of New York for contracts to be performed entirely therein and in accordance with the applicable provisions of the Act. 9. No Third Party Beneficiaries Nothing in this Agreement, express or implied, is intended to or shall confer upon any person not a party hereto any right, benefit or remedy of any nature whatsoever under or by reason of this Agreement. 10. Counterparts This Agreement may be executed in one or more counterparts, each of which shall be deemed to be an original. 6 IN WITNESS WHEREOF, the parties hereto have caused the foregoing instrument to be executed by their duly authorized officers, all as of the day and the year first above written. THE GABELLI ETFS TRUST, ON BEHALF OF GABELLI EQUITY INCOME ETF By: /s/ Peter Goldstein Name: Peter Goldstein Title: Secretary GABELLI FUNDS, LLC By: /s/ John C. Ball Name: John C. Ball Title: Authorized Signatory [Signature Page to Investment Advisory Agreement]

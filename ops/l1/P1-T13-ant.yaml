      N-14 1 hft_qit-n14.htm HENNESSY FUNDS TRUST INITIAL REGISTRATION STATEMENT UNITED STATES SECURITIES AND EXCHANGE COMMISSION WASHINGTON, D.C. 20549 FORM N-14 REGISTRATION STATEMENT UNDER THE SECURITIES ACT OF 1933 / / Pre-Effective Amendment No. / / Post-Effective Amendment No. HENNESSY FUNDS TRUST (Exact Name of Registrant as Specified in Charter) 7250 Redwood Blvd., Suite 200, Novato, California 94945 (Address of Registrant’s Principal Executive Offices) (800) 966-4354 (Registrant’s Telephone Number, Including Area Code) Teresa M. Nilsen Hennessy Advisors, Inc. 7250 Redwood Blvd Suite 200 Novato, California 94945 (Name and Address of Agent for Service) Copy to: Peter D. Fetzer Foley & Lardner LLP 777 East Wisconsin Avenue Milwaukee, Wisconsin 53202-5306 Approximate Date of Proposed Public Offering: As soon as practicable after this Registration Statement becomes effective. The registrant hereby amends this registration statement on such date or dates as may be necessary to delay its effective date until the registrant shall file a further amendment which specifically states that this registration statement shall thereafter become effective in accordance with Section 8(a) of the Se […] ll of its assets and liabilities (other than the excluded liabilities) to the Acquiring Fund in exchange for shares of the Acquiring Fund, with the CCM Core Impact Equity Fund distributing shares of the Acquiring Fund pro rata to its shareholders, plus cash in lieu of fractional shares of the Acquiring Fund, and (ii) the CCM Small/Mid-Cap Impact Value Fund will transfer all of its assets and liabilities (other than the excluded liabilities) to the Acquiring Fund in exchange for shares of the Acquiring Fund, with the CCM Small/Mid-Cap Impact Value Fund distributing shares of the Acquiring Fund pro rata to its shareholders, plus cash in lieu of fractional shares of the Acquiring Fund. Shareholders of the Target Funds will thus effectively be converted into shareholders of the Acquiring Fund and will hold shares of the Acquiring Fund with the same NAV as shares of the Target Funds that they held prior to the Reorganizations. Please refer to the enclosed Proxy Statement/Prospectus for a detailed explanation of the Reorganizations. Question 6: What are the expected U.S. federal income tax consequences of the Reorganizations to shareholders of the Target Funds? Answer : Each Reorganization is expected to qualify as a “reorganization” for U.S. federal income tax purposes. Accordingly, it is expected that Target Fund shareholders who receive shares of the Acquiring Fund in the Reorganizations will not recognize gain or loss as a direct result of the Reorganizations (except with respect to cash received in lieu of fractional shares of the Acquiring Fund). Please refer to the enclosed Proxy Statement/Prospectus for a detailed explanation of the Reorganizations. Question 7 : What will happen if the Plan is not approved? Answer : The merger of each Target Fund into the Acquiring Fund will be treated as a separate Reorganization. Accordingly, shareholder approval and consummation of each Reorganization are not contingent on shareholder approval and consummation of any other Reorganization. If the Plan is not approved by the shareholders of either Target Fund, then such Target Fund will continue to operate and the Target Funds’ Board of Trustees may take any further action it deems to be in the best interest of the Target Fu […] following companies in accordance with maintaining a fossil-fuel free portfolio: (1) companies that own, extract, produce, process, or refine fossil fuels, oil, gas, and coal, (2) companies that store, transport, explore, or produce carbon-related fuels or energy sources or (3) companies that are in the oil and gas equipment and services businesses. However, the Target Funds may invest in: (1) utilities that have current fossil fuel power sources above 15% but are actively transitioning to renewable sources, (2) companies that are pursuing alternative energy technologies or are in alternative energy sectors, or (3) companies that are working to transition away from fossil fuels. The Acquiring Fund The Acquiring Fund is an actively managed, exchange-traded fund (“ ETF ”) that invests primarily in exchange-traded equity securities of U.S. large-capitalization issuers that meet environmental, social, and governance (“ ESG ”) standards, as determined by the Portfolio Managers. The Acquiring Fund considers companies within the Russell 1000 ® Index and S&P 500 ® Index to be large-capitalization issuers. The Acquiring Fund also invests in exchange-traded equity securities of U.S. small- and medium-capitalization issuers that meet ESG standards, as determined by the Portfolio Managers. In identifying investments for the Acquiring Fund, the Portfolio Managers utilize three independent processes. First, the Portfolio Managers apply a rules-based ESG methodology that seeks to identify the top 50% from each industry and sub-industry in the universe of large-capitalization companies, medium-capitalization companies, or small-capitalization companies, as applicable. Companies who have exclusively or primarily engaged in weapons, tobacco, or thermal coal are generally excluded from consideration. The remaining universe is then quantitatively scored against industry group peers on up to 21 sustainability-related key performance indicators (“ KPIs ”) such as energy productivity, carbon intensity, water dependence, waste profile, and KPIs relating to governance, including capacity to innovate, unfunded pension fund liabilities, chief executive officer/average worker pay, safety performance, employee turnover, leadership diversity, percentage tax paid, and percent of bonus linked to sustainability performance. The securities in the top 50% may be retained. The Portfolio Managers utilize data feeds from third parties that it considers, in its sole discretion, as trustworthy or that have the expertise in specific KPI areas. The current primary external data source is Corporate Knights Research, an affiliate of Stance Capita […] io is focused, and is generally composed of about 30 investment positions. While investing in a particular sector is not a principal investment strategy of the Acquiring Fund, its portfolio may be significantly invested in a sector as a result of the portfolio 6 management decisions made pursuant to its principal investment strategy. While the Acquiring Fund does not place any restrictions on its level of sector concentration, it will limit its investments in industries within any particular sector to less than 25% of the Acquiring Fund’s total assets. On each rebalancing date, investments within a particular sector will also be capped at up to twice the weight of the sector within the S&P 500 Index. The Acquiring Fund is actively-managed, semi-transparent exchange-traded fund. Unlike traditional exchange-traded funds, which generally publish their portfolio holdings on a daily basis, the Acquiring Fund discloses a portfolio transparency substitute—the “Portfolio Reference Basket”—and certain related information about the Portfolio Reference Basket relative to its actual portfolio (“ Actual Portfolio ”) holdings (the “ Portfolio Reference Basket Disclosures ”), which are intended to help keep the market price of the Acquiring Fund’s shares trading at or close to the underlying NAV per share of the Acquiring Fund. While the Portfolio Reference Basket includes all of the Acquiring Fund’s holdings, it is not the Acquiring Fund’s Actual Portfolio because the holdings will be weighted differently, subject to a minimum weightings overlap of 90% with the Acquiring Fund’s Actual Portfolio at the beginning of each trading day. The Acquiring Fund also discloses the maximum deviation between the weightings of the specific securities in the Portfolio Reference Basket and the weightings of those specific securities in the Actual Portfolio, as well as between the weighting of the respective cash positions (the “ Guardrail Amount ”). The Guardrail Amount is intended to ensure that no individual security in the Portfolio Reference Basket will be overweighted or underweighted by more than the publicly disclosed percentage when compared to the actual weighting of each security within the Actual Portfolio as of the beginning of each trading day. The Acquiring Fund is actively managed an […]  in such series until such time as the NAV, Portfolio Reference Basket, or Actual Portfolio is available to all market participants at the same time. In addition, trading in shares on the Exchange is subject to trading halts caused by extraordinary market volatility pursuant to Exchange “circuit breaker” rules, which temporarily halt trading on the Exchange. Additional rules applicable to the Exchange may halt trading in shares when extraordinary volatility causes sudden, significant swings in the market price of shares. If a trading halt or unanticipated early closing of the Exchange occurs, a shareholder may be unable to purchase or sell shares of the Acquiring Fund. Trading halts may have more effect on the Acquiring Fund because of its semi-transparent structure. There can be no assurance that shares will trade with any volume, or at all, on any stock exchange. In stressed market conditions, the liquidity of the Acquiring Fund’s shares may begin to mirror the liquidity of the Acquiring Fund’s underlying holdings, which can be significantly less liquid than the Acquiring Fund’s shares. Shares May Trade at Prices other than NAV Risk: As with all ETFs, the Acquiring Fund’s shares may be bought and sold in the secondary market at market prices. Although the Portfolio Reference Basket structure is intended to provide market participants with enough information to allow for an effective arbitrage mechanism that will help to keep the market price of the Acquiring Fund’s shares at or close to the Acquiring Fund’s NAV, there is a risk that market prices for Acquiring Fund shares will vary significantly from the Acquiring Fund’s NAV. This risk is heightened in times of market disruption or volatility or periods of steep market declines. The market price of shares during the trading day, like the price of any exchange-traded security, includes a “bid/ask” spread charged by the exchange specialist, market makers or other participants that trade shares. In times of severe market disruption, the bid/ask spread can increase significantly. At those times, shares are most likely to be traded at a discount to NAV, and the discount is likely to be greatest when the price of shares is falling fastest, which may be the time tha

      497K 1 c497k.htm SUMMARY PROSPECTUS May 1, 2022 T. ROWE PRICE TCHP Blue Chip Growth ETF This ETF is different from traditional ETFs. Traditional ETFs tell the public what assets they hold each day. This ETF will not. This may create additional risks for your investment. For example: · You may have to pay more money to trade the ETF’s shares. This ETF will provide less information to traders, who tend to charge more for trades when they have less information. · The price you pay to buy ETF shares on an exchange may not match the value of the ETF’s portfolio. The same is true when you sell shares. These price differences may be greater for this ETF compared to other ETFs because it provides less information to traders. · These additional risks may be even greater in bad or uncertain market conditions. · The ETF will publish on its website each day a “Proxy Portfolio” designed to help trading in shares of the ETF. While the Proxy Portfolio includes some of the ETF’s holdings, it is not the ETF’s actual portfolio. The differences between this ETF and other ETFs may also have advantages. By keeping certain information about the ETF secret, this ETF may face less risk that other traders  […] tablished in their industries and have the potential for above-average earnings growth. The fund focuses on companies with leading market positions, seasoned management, and strong financial fundamentals. The fund’s investment approach reflects the belief that solid company fundamentals (with an emphasis on the potential for above-average growth) combined with a positive industry outlook will ultimately reward investors with strong investment performance. Some of the companies the adviser targets for the fund should have T. ROWE PRICE 2 good prospects for dividend growth. The fund may at times invest significantly in stocks of information technology, communication service, and consumer discretionary companies. The fund primarily invests in exchange-traded securities that trade synchronously with the fund’s shares, cash, and cash equivalents. The fund may also invest in American Depository Receipts (ADRs) and common stocks listed on a foreign exchange that trade on such exchange synchronously with the fund’s shares (i.e., during the U.S. listing exchange’s trading hours). The fund is an actively-managed, exchange-traded fund (ETF) that does not disclose portfolio holdings daily. In order to provide market participants with information on the fund’s investments, the fund will publish a “Proxy Portfolio” on its website daily. A Proxy Portfolio is a basket of securities that is designed to closely track the daily performance of the fund’s portfolio holdings. While the Proxy Portfolio includes some of the fund’s holdings, it is not the fund’s actual portfolio. The Proxy Portfolio could be based on a broad-based securities index or the fund’s recently disclosed portfolio holdings. The fund’s Portfolio Overlap is available on the fund’s website daily. The Portfolio Overlap is the percentage weight overlap between the holdings of the prior business day’s Proxy Portfolio compared to the holdings of the fund that formed the basis for the fund’s calculation of net asset value (NAV) at the end of the prior business day. The fund is “nondiversified,” meaning it may invest a greater portion of its assets in fewer issuers than is permissible for a “diversified” fund. Principal Risks As with any fund, there is no guarantee that the fund will achieve its objective(s). The fund’s share price fluctuates, which means you could lose money by investing in the fund. The principal risks of investing in this fund, which may be even greater in bad or uncertain market conditions, are summarized as follows: Proxy portfolio structure The fund does not disclose portfolio holdings daily. The fund uses a Proxy Portfolio, which is a basket of securities that is designed to closely track the daily performance of the fund’s portfolio holdings. The fund may not always effectively construct a proxy portfolio that closely tracks the daily performance of the fund’s portfolio holdings. Because the fund uses a Proxy Portfolio, there is a risk that the fund’s shares may trade at a wider bid/ask spread than shares of ETFs that publish their portfolios on a daily basis. This risk is heightened during periods of market disruption and volatility, and, therefore, may cost you more to trade. Although the fund seeks to benefit from keeping its portfolio information confidential, other traders may attempt to use the Proxy Portfolio and publicly available information, including intraday net asset value (INAV) to identify the fund’s trading strategy, which, if successful, could result in such traders engaging in certain predatory trading practices that may have the potential to harm the fund and its shareholders. Because the fund’s shares are traded in the secondary market, a broker may charge a commission to execute a transaction in shares, and you may incur the cost of the spread between the price at which a dealer will buy shares and the somewhat higher price at which a dealer will sell shares. Premium/Discount Although the Proxy Portfolio is intended to provide investors with enough information to allow for an effective arbitrage mechanism that will keep the market SUMMARY 3 price of the fund at or close to the underlying NAV per share of the fund, there is a risk (which may increase during periods of market disruption or volatility) that market prices will vary significantly from the underlying NAV per share of the fund. These price differences may be greater for this fund compared to ETFs that disclose holdings daily because it provides different portfolio holdings information to traders. The adviser will monitor on an ongoing basis how shares trade, including the level of any market price premium or discount to NAV and the bid/ask spreads on market transactions. Each day, the website will also provide the fund’s Tracking Error, which means the standard deviation over the past three months of the daily proxy spread (i.e., the difference, in percentage terms, between the Proxy Portfolio’s per share NAV and that of the fund at the end of the trading day). Trading halt It is possible that an active trading market for the shares will not be maintained, or that trading in the shares will be halted for reasons such as market-wide trading halts or the shares no longer meeting the listing requirements of the exchange. If securities representing 10% or more of the fund’s portfolio do not have readily available market quotations, the fund would promptly request the listing exchange to halt trading on the fund. In addition, to the extent T. Rowe Price determines that a security held in a fund’s portfolio but not in the Proxy Portfolio does not have readily available market quotations and such circumstance may affect the reliability of the Proxy Portfolio as an arbitrage vehicle, that information, along with the identity and weighting of that security in the fund’s portfolio, will be publicly disclosed on the fund’s website. Authorized Participant Just like ETFs that disclose holdings daily, at certain times, the fund’s shares may have a limited number of active “Authorized Participants,” which are financial institutions that are able to transact daily with the fund to purchase and redeem a large specified number of shares of the fund. To the extent they cannot or otherwise are unwilling to engage in creation and redemption transactions, and no other Authorized Participant steps in, shares of the fund may trade at a significant discount or premium to NAV and may face trading halts and delisting from the exchange. Additionally, ETFs that do not disclose portfolio holdings daily are novel, which may limit the number of entities willing to act as Authorized Participants during times of market stress. Stock investing Stocks generally fluctuate in value more than bonds and may decline significantly over short time periods. There is a chance that stock prices overall will decline because stock markets tend to move in cycles, with periods of rising and falling prices. The value of stocks held by the fund may decline due to general weakness or volatility in the stock markets in which the fund invests or because of factors that affect a particular company or industry. Market conditions The value of the fund’s investment

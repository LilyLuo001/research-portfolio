      497K 1 d14414d497k.htm CLEARBRIDGE FOCUS VALUE ETF CLEARBRIDGE FOCUS VALUE ETF Summary Prospectus January 29, 2021 Cboe (Ticker Symbol): CFCV CLEARBRIDGE FOCUS VALUE ETF This Exchange-Traded Fund (“ETF”) is different from traditional ETFs. Traditional ETFs tell the public what assets they hold each day. This ETF will not. This may create additional risks for your investment. For example: You may have to pay more money to trade the ETF’s shares. This ETF will provide less information to traders, who tend to charge more for trades when they have less information. The price you pay to buy ETF shares on an exchange may not match the value of the ETF’s portfolio. The same is true when you sell shares. These price differences may be greater for this ETF compared to other ETFs because it provides less information to traders. These additional risks may be even greater in bad or uncertain market conditions. The differences between this ETF and other ETFs may also have advantages. By keeping certain information about the ETF secret, this ETF may face less risk that other traders can predict or copy its investment strategy. This may improve the ETF’s performance. If other traders are able to  […] f charge by contacting your financial intermediary to request that you continue to receive paper copies of your shareholder reports. Your election to receive reports in paper will apply to all Legg Mason Funds held in your account with your financial intermediary. 2 ClearBridge Focus Value ETF Investment objective ClearBridge Focus Value ETF (the “fund”) seeks long-term capital appreciation. Fees and expenses of the fund The accompanying table describes the fees and expenses that you may pay if you buy, hold and sell shares of the fund. You may also be subject to additional fees, such as brokerage commissions and other fees to financial intermediaries, which are not reflected in the table and Example below. The management agreement between ActiveShares ® ETF Trust (the “Trust”) and Precidian Funds, LLC (“Precidian” or the “manager”) (the “Management Agreement”) provides that the manager will pay all operating expenses of the fund, except interest expenses, taxes, brokerage expenses, future Rule 12b-1 fees (if any), acquired fund fees and expenses, extraordinary expenses and the management fee payable to the manager under the Management Agreement. The manager will also pay all subadvisory fees of the fund. Shareholder fees (fees paid directly from your investment) None Annual fund operating expenses (%) (expenses that you pay each year as a percentage of the value of your investment) Management fees 0.49 Distribution and/or service (12b-1) fees 1 0.00 Other expenses None Total annual fund operating expenses 0.49 1 The fund has adopted a distribution and service (12b-1) plan pursuant to which payment of up to 0.25% of average daily net assets may be made; however, the Board has determined that no such payments will be made through the next twelve (12) months of operation. Example: This example is intended to help you compare the cost of investing in the fund with the cost of investing in other funds. The example assumes: ● You invest $10,000 in the fund for the time periods indicated ● Your investment has a 5% return each year and the fund’s operating expenses remain the same (except that any applicable fee waiver or expense reimbursement is reflected only through its expiration date) You may also incur usual and […]  a taxable account. These costs, which are not reflected in annual fund operating expenses or in the example, affect the fund’s performance. During the most recent fiscal year, the fund’s portfolio turnover rate was 5% of the average value of its portfolio. Principal investment strategies The fund seeks long-term capital appreciation. By employing fundamental research, in an effort to identify securities with attractive risk-adjusted returns (where the potential returns on the investment are favorable relative to the potential risks of the investment), the fund’s portfolio management team constructs the portfolio on a bottom-up basis. Under normal circumstances, the fund invests at least 80% of its net assets in equity securities, or other exchange-traded investments with similar economic characteristics in which it is permitted to invest, of companies with large market capitalizations. Large capitalization companies are those companies with market capitalizations similar to companies in the Russell 1000 Index (the “Index”). The size of the companies in the Index changes with market conditions and the composition of the Index. Securities of companies whose market capitalizations no longer meet this definition after purchase by the fund still will be considered securities of large capitalization companies for purposes of the fund’s 80% investment policy. The fund may also invest up to 20% of its net assets in equity securities, or other exchange-traded investments with similar economic characteristics in which it is permitted to invest, of companies with lower market capitalizations. While most of the fund’s investments will be in U.S. companies, the fund may also invest in American Depository Receipts (“ADRs”) and U.S.-listed shares of foreign companies. The fund only invests in instruments that trade on a U.S. exchange contemporaneously with the fund’s shares and, for temporary or defensive purposes, in cash and cash equivalents, such as short-term U.S. Treasury securities, government money market funds, and repurchase agreements. Under normal circumstances, the fund invests in a diversified portfolio typically consisting of the securities of 30 to 40 issuers. The fund operates in reliance on an exemptive order from the SEC (the “Order”), which limits the types of investments the fund may hold to those listed in the fund’s application for the Order. Under the terms of the Order, the fund is permitted to invest only in exchange-traded funds, exchange-traded notes, exchange listed common stocks, exchange-traded preferred stocks, exchange-traded ADRs, exchange-traded real estate investment trusts, exchange-traded commodity pools, exchange-traded metal trusts, exchange-traded currency trusts and exchange-traded futures that trade on a U.S. exchange contemporaneously with the fund’s shares, as well as cash and cash equivalents (which are short-term U.S. Treasury securities, government money market funds, and repurchase agreements). The fund’s investment strategies and practices, including those listed above, are subject to these limitations. Principal risks Risk is inherent in all investing. The value of your investment in the fund, as well as the amount of return you receive on your investment, may fluctuate significantly. You may lose part or all of your investment in the fund or your investment may not perform as well as other similar 4 ClearBridge Focus Value ETF investments. An investment in the fund is not insured or guaranteed by the Federal Deposit Insurance Corporation or by any bank or government agency. The following is a summary description of certain risks of investing in the fund. ActiveShares ® structure risk. Unlike most actively managed ETFs, the fund does not provide daily disclosure of its portfolio holdings. Instead, the fund provides a verified intraday indicative value (“VIIV”), calculated and disseminated every second throughout the trading day. The VIIV is intended to provide investors with enough information to allow for an effective arbitrage mechanism that will keep the market price of the fund’s shares trading at or close to the underlying net asset value per share of the fund. There is, however, a risk, which may increase during periods of market disruption or volatility, that market prices will vary significantly from the underlying net asset value of the fund. Similarly, because the fund’s shares trade on the basis of a published VIIV, they may trade at a wider bid/ask spread than shares of ETFs that publish their portfolios on a daily basis, especially during periods of market disruption or volatility, and therefore, may cost investors more to trade. Although the fund seeks to benefit from keeping its portfolio information secret, some market participants may attempt to use publicly available information, including the VIIV, to identify the fund’s trading strategy, which if successful, could result in such market participants engaging in certain predatory trading practices that may have the potential to harm the fund and its shareholders. Authorized Participant and AP Representative concentration risk. Each of the fund’s Authorized Pa […] ation of the transaction automatically terminated the subadvisory agreements that were in place for the fund prior to the transaction. The fund’s subadvisers continue to provide uninterrupted services with respect to the fund pursuant to new subadvisory agreements that were approved by fund shareholders. Portfolio managers: Primary responsibility for the day-to-day management of the fund lies with the following portfolio managers. Portfolio manager Title Portfolio manager of the fund since Robert Feitler, Jr. Managing Director and a Portfolio Manager at ClearBridge 2020 Dmitry Khaykin Managing Director and a Portfolio Manager at ClearBridge 2020 10 ClearBridge Focus Value ETF Purchase and sale of fund shares The fund is an actively managed exchange-traded fund (“ETF”). Individual shares of the fund are listed on a national securities exchange and are redeemable only by Authorized Participants in aggregated blocks of 10,000 shares or multiples thereof (“Creation Units”). Individual shares of the fund may only be purchased and sold in the secondary market through a broker-dealer at market prices. Because fund shares trade at market prices rather than at net asset value, fund shares may trade at a price greater than net asset value (a premium) or less than net asset value (a discount). When buying or selling shares in the secondary market, you may incur costs attributable to the difference between the highest price a buyer is willing to pay to purchase shares of the fund (bid) and the lowest price a seller is willing to accept for shares of the fund (ask) (the “bid-ask spread”). The fund will only issue or redeem Creation Units to Authorized Participants who have entered into agreements with the fund’s distributor. The fund generally will issue or redeem Creation Units in return for a designated portfolio of securities (and an amount of cash) that the fund specifies each day. You may access recent information, including information on the fund’s net asset value, market price, premiums and discounts, and bid-ask spreads, on the fund’s website at www.leggmason.com/etfproducts. Tax information The fund’s distributions are generally taxable and will be taxed as ordinary income or capital gains. Payments to broker/deal

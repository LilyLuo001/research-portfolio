      497K 1 d263598d497k.htm 497K 497K Summary Prospectus March 31, 2022 DoubleLine Shiller CAPE® U.S. Equities ETF Share Class (Ticker): (DCPE) Before you invest, you may wish to review the Fund’s Prospectus, which contains more information about the Fund and its principal risks. You can find the Fund’s Prospectus and other information about the Fund, including the Statement of Additional Information (SAI) and the most recent reports to shareholders, online at www.doublelinefunds.com/documents. You can also get this information at no cost by calling (855) 937-0772 or by sending an e-mail request to DoubleLine at ETFinfo@doubleline.com. This Summary Prospectus incorporates by reference the Fund’s Prospectus and SAI, both dated March 31, 2022, each as supplemented from time to time. DoubleLine || 2002 North Tampa Street, Suite 200 || Tampa, FL 33602 || (855) 937-0772 ETFinfo@doubleline.com || doubleline.com Investment Objective The DoubleLine Shiller CAPE ® U.S. Equities ETF’s (the “ Fund ” or “ Equities ETF ”) investment objective is to seek total return which exceeds the total return of the S&P 500 Index. Fees and Expenses of the Fund This table describes the fees and expenses you may  […] tment has a 5% return each year and that the Fund’s operating expenses remain the same. Although your actual costs may be higher or lower, based on these assumptions, your costs would be: 1 Year $ 66 3 Years $ 208 Portfolio Turnover The Fund incurs transaction costs when it buys and sells securities (or “turns over” its portfolio). A higher portfolio turnover rate may indicate higher transaction costs and may result in higher taxes when Fund shares are held in a taxable account. These costs, which are not reflected in annual fund operating expenses or in the example, affect the Fund’s performance. Principal Investment Strategies Under normal circumstances, the Fund invests at least 80% of its net assets in U.S. equity securities, including exchange-traded investment companies that provide exposure to U.S. equity securities, subject to the limitations described below. This investment policy may be changed by the Fund upon 60 days’ prior written notice to shareholders. Under normal market conditions, the Fund invests its assets in securities that are listed on a national securities exchange registered with the SEC, and that trade contemporaneously with the Fund’s shares. The Fund may invest in equity securities of companies of any market capitalization other than penny stocks. An issuer is considered to be a U.S. equity issuer if: (i) its principal place of business is located in the U.S.; (ii) at least 50% of its assets are located in the U.S. and/or (iii) it derives at least 50% of its revenues from the U.S. The Shiller Barclays CAPE ® US Sector TR USD Index . In seeking to achieve the Fund’s investment objective, when making investment decisions for the Fund, DoubleLine ETF Adviser LP (the “ Adviser ”) considers the underlying constituents of the Shiller Barclays CAPE ® US Sector TR USD Index (the “ Index ”), but the Fund is not limited in its ability to invest in companies other than those underlying the Index. The Index incorporates the principles of long-term investing distilled by Dr. Robert Shiller and expressed through the CAPE ® (Cyclically Adjusted Price Earnings) ratio (the “ CAPE ® Ratio ”). -3- The classic CAPE ® Ratio assesses equity market valuations and averages ten years of inflation-adjusted ea […] estment exposure to issuers underlying the Index, the Fund does not seek to track or replicate the Index. The Adviser or the Fund’s Board may in their sole discretion, after providing any required notice to shareholders, select, in place of the Index, another index (such as the S&P 500 ® Index) or a basket of reference investments. The Fund may gain exposure to any substitute index or basket of investments in any manner the Adviser determines appropriate, including those described above with respect to how the Fund may obtain exposure to the Index. Subject to the applicable limitations described below, the Fund may pursue its investment objective and obtain exposures to some or all of the asset classes described above by investing in other exchange-traded investment companies, including listed closed-end investment companies, ETFs and government money market funds, in each case affiliated or unaffiliated with the Fund. Portfolio securities may be sold at any time. Sales typically occur when the Fund’s portfolio managers determine to take advantage of what the portfolio managers consider to be a better investment opportunity, when the portfolio managers believe the portfolio securities no longer represent relatively attractive investment opportunities, when the portfolio managers perceive deterioration in the credit fundamentals of the issuer, or when the individual security has reached the portfolio managers’ sell target. The Fund’s investment strategy may involve active and frequent trading of portfolio securities. The Fund operates in reliance on an exemptive order from the SEC (the “ Order ”), which limits the types of investments the Fund may hold to those listed in the Fund’s application for the Order. Under the terms of the Order, the Fund is permitted to invest only in exchange-traded funds, exchange-traded notes, exchange listed common stocks, exchange-traded preferred stocks, exchange-traded American Depositary Receipts (“ ADRs ”), exchange-traded real estate investment trusts, exchange-traded commodity pools, exchange-traded metal trusts, exchange-traded currency trusts and exchange-traded futures that trade on a U.S. exchange contemporaneously with the Fund’s shares, as well as cash and cash equivalents (which are short-term U.S. Treasury securities, government money market funds, and repurchase agreements). The Fund will not buy securities that are illiquid investments (as defined in rule 22e-4(a)(8) under the 1940 Act) at the time of purchase. The Fund may, however, hold an illiquid investment if it becomes illiquid after purchase. The Fund’s -5- investment strategies and practices, including those listed above, are subject to these limitations. The Fund is classified as a non-diversified fund under the Investment Company Act of 1940, as amended (the “ 1940 Act ”), and may invest in the securities of a smaller number of issuers than a diversified fund. Principal Risks The value of the Fund’s shares will vary as its portfolio investments increase or decrease in value. Therefore, the value of your investment in the Fund could go down as well as up. You can lose money by investing in the Fund. The order of the below principal risks does not necessarily indicate the significance of any particular risk factor. The significance of any specific risk to an investment in the Fund will vary over time, depending on the composition of the Fund’s portfolio, market conditions, and other factors. You should read all of the risk information presented below carefully, because any one or more of these risks may result in losses to the Fund. The principal risks […] nts in a particular sector or related sectors, the Fund will be more susceptible to events or factors affecting companies in that sector or related sectors. For example, the values of securities of companies in the same or related sectors may be negatively affected by the common characteristics they share, the common business risks to which they are subject, common regulatory burdens, or regulatory changes that affect them similarly. Such characteristics, risks, burdens or changes include, but are not limited to, changes in governmental regulation, inflation or deflation, rising or falling interest rates, competition from new entrants, and other economic, market, political or other developments specific to that sector or related sectors. • ActiveShares non-transparent structure/ETF-related risks : the Fund is an ETF that is subject to the risks described below. Additionally, because the ETF utilizes the ActiveShares ® non-transparent ETF structure, it is subject to additional or enhanced ETF-related risks. Unlike most actively managed ETFs, the Fund does not provide daily disclosure of its portfolio holdings. Instead, the Fund provides a verified intraday indicative value (“ VIIV ”), calculated and disseminated every second throughout the trading day. The VIIV is intended to provide investors with an intraday highly-correlated per share value of -7- the Fund that can be compared to the current market price. The VIIV is designed to provide sufficient information to allow for an effective arbitrage mechanism that will keep the market price of the Fund’s shares trading at or close to the underlying net asset value (“ NAV ”) per share of the Fund. Shares traded on an intraday basis on an exchange, however, will not have a fixed relationship to the previous day’s or the current day’s NAV. There is, however, a risk, which may increase during periods of market disruption or volatility, that market prices will vary significantly from the underlying NAV of the Fund. Similarly, because the Fund’s shares trade with reference to a published VIIV, they may trade at a wider bid/ask spread when compared to shares of ETFs that publish their portfolios on a daily basis, especially during periods of market disruption or volatility, and therefore, may cost investors more to trade. Although the Fund seeks to benefit from keeping its portfolio information secret, some market participants may att […] at NAV only in a large specified number of shares called a “ Creation Unit .” Only a limited number of institutional investors (known as “ Authorized Participants ”) are authorized to purchase (or create) and redeem shares directly from the Fund. Each of the Fund’s Authorized Participants will engage in all creation and redemption activity through an AP Representative. The AP Representative will deliver or receive, on behalf of the Authorized -8- Participant, all consideration to o
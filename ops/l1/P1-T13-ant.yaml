      497K 1 d47179d497k.htm NUSHARES ETF TRUST Nushares ETF Trust Nuveen Dividend Growth ETF Ticker NDVG Listing Exchange: NYSE Arca 27 February 2026 THIS ETF IS DIFFERENT FROM TRADITIONAL ETFs Traditional ETFs tell the public what assets they hold each day. This ETF will not. This may create additional risks for your investment. For example: · You may have to pay more money to trade this ETF’s shares. This ETF will provide less information to traders, who tend to charge more for trades when they have less information. · The price you pay to buy ETF shares on an exchange may not match the value of the ETF’s portfolio. The same is true when you sell shares. These price differences may be greater for this ETF compared to other ETFs because it provides less information to traders. · These additional risks may be even greater in bad or uncertain market conditions. · This ETF will publish on its website each day a Proxy Portfolio (“Proxy Portfolio”) designed to help trading in shares of the ETF. While the Proxy Portfolio includes some of the ETF’s holdings, it is not the ETF’s actual portfolio. The differences between this ETF and other ETFs may also have advantages. By keeping certain infor […] ptions your costs would be: 1 Year $66 3 Years $208 5 Years $362 10 Years $810 Portfolio Turnover The Fund pays transaction costs, such as commissions, when it buys and sells securities (or “turns over” its portfolio). A higher portfolio turnover rate may indicate higher transaction costs and may result in higher taxes when Fund shares are held in a taxable account. These costs, which are not reflected in annual fund operating expenses or in the example, affect the Fund’s performance. During the most recent fiscal year, the Fund’s portfolio turnover rate was 10% of the average value of its portfolio. Principal Investment Strategies Under normal market conditions, the Fund invests at least 80% of the sum of its net assets in dividend-paying exchange-traded equity securities, which include common stocks and preferred securities. Companies in certain economic sectors of the market have historically provided higher dividend yields than companies in other sectors and industries. As a result, given the Fund’s focus on dividend-paying securities, the Fund may, from time to time, have a greater exposure to these higher dividend-yield sectors and industries than the broad equity market. The Fund defines dividend-paying equities as equity securities that have paid a dividend within the trailing twelve months and/or announced a dividend to be paid in the next twelve months at the time of purchase. The Fund may invest in small-, mid- and large-cap companies. The Fund may invest up to 25% of its net assets in exchange-traded American Depositary Receipts (“ ADRs ”) and common stocks of non-U.S. issuers that are listed and trade on a foreign exchange contemporaneously with Fund shares. Non-Transparent ETF with Proxy Portfolio Structure . The Fund is a type of exchange-traded fund (“ ETF ”). Unlike traditional ETFs, however, which generally publish their portfolio holdings on a daily basis, the Fund discloses a portfolio transparency substitute—the “ Proxy Portfolio ”— and certain related information about the relative performance of the Proxy Portfolio and the Fund’s actual portfolio (“ Actual Portfolio ”) holdings (the “ Proxy Portfolio Disclosures ”), which are intended to help keep the market price of the Fund’s shares trading at or close to the underlying net asset value (“ NAV ”) per share of the Fund. While the Proxy Portfolio includes some of the Fund’s holdings, it is not the Fund’s Actual Portfolio, and the Fund will not disclose the daily holdings of the Actual Portfolio. Although the Fund seeks to benefit from keeping its portfolio information secret, market participants may attempt to use the Proxy Portfolio to identify the Fund’s trading strategy, which if successful, could result in such market participants engaging in certain predatory trading practices that 2 Nuveen Investments may have the potential to harm the Fund and its shareholders. The Fund’s exemptive relief limits the types of securities in which the Fund can invest, which may constrain the Fund’s ability to implement its investment strategies. The Fund is actively managed and does not intend to track an index. Principal Risks The value of your investment in this Fund may change throughout the day on each day the Fund’s primary listing exchange is open. You could lose money by investing in the Fund. An investment in the Fund is not a deposit of a bank and is not insured or guaranteed by the Federal Deposit Insurance Corporation or any other government agency. The significance of any specific risk to an investment in the Fund will vary over time depending on the composition of the Fund’s portfolio, market conditions and other factors. Each risk summarized below is considered a “principal risk” of investing in the Fund, regardless of the order in which it appears. Proxy Portfolio Structure Risk —Unlike traditional ETFs that provide daily disclosure of their portfolio holdings, the Fund does not disclose the daily holdings of the Actual Portfolio. Instead, the Fund discloses a Proxy Portfolio that is designed to reflect the economic exposure and risk characteristics of the Fund’s Actual Portfolio on any given trading day. Although the Proxy Portfolio and Proxy Portfolio Disclosures are intended to provide Authorized Participants (defined below) and other market participants with enough information to allow them to engage in effective arbitrage transactions that will keep the market price of the Fund’s shares trading at or close to the underlying NAV per share of the Fund, while at the same time enabling them to establish cost-effective hedging strategies to reduce risk, there is a risk that market prices will vary significantly from the underlying NAV of the Fund. See “Premium/Discount Risk.” Similarly, shares of the Fund may trade at a wider bid/ask spread than shares of traditional ETFs, and may therefore be more costly for investors to trade. See “Trading Issues Risk.” Also, the Fund will incur expenses to license the Proxy Portfolio mechanism, which may impact shareholder returns. Additionally, the proxy mechanism itself may result in additional trading costs, which also may negatively impact shareholder returns. In addition, although the Proxy Portfolio is designed to protect the Fund from predatory practices such as front-running and free-riding, market participants may nevertheless be able to use the Proxy Portfolio and Proxy Portfolio Disclosures to engage in trading practices that disadvantage the Fund. See “Predatory Trading Practices Risk.” The Fund will monitor on an ongoing basis the premium/discount between the market price and the NAV of the Fund’s shares, but there can be no assurance that the Proxy Portfolio methodology will operate as intended. The Proxy Portfolio methodology is novel and not yet proven as an effective arbitrage mechanism. The effectiveness of the Proxy Portfolio methodology as an arbitrage mechanism is contingent upon, among other things, the effectiveness of the Fund’s Factor Model analysis in creating a Proxy Portfolio that performs in a manner substantially identical to the performance of the Fund’s Actual Portfolio and the willingness of Authorized Participants and other market participants to trade based on the Proxy Portfolio. In the event that the Proxy Portfolio methodology does not result in effective arbitrage opportunities in the Fund shares, the Fund may exhibit wider premiums/discounts, bid/ask spreads and tracking error. At certain thresholds for such premiums/discounts, bid/ask spreads and tracking error, the Fund’s Board of Trustees will consider possible remedial measures, which may include liquidation or conversion to a fully-transparent, active ETF or a mutual fund. · Premium/Discount Risk —Shares of the Fund are listed for trading on the NYSE Arca, Inc. (the “ NYSE Arca ”) and are bought and sold in the secondary market at market prices that may differ from their most recent NAV. The market value of the Fund’s shares will fluctuate, in some cases materially, in response to changes in the Fund’s NAV, the intraday value of the Fund’s holdings, and the relative supply and demand for the Fund’s shares on the exchange. Although the Proxy Portfolio is intended to provide investors with enough information to allow for an effective arbitrage mechanism that will keep the market price of the Fund at or close to the Fund’s NAV, there is a risk (which may increase during periods of market disruption or volatility) that market prices for Fund shares will vary significantly from the Fund’s NAV. This risk may be greater for the Fund than for traditional ETFs that disclose their full portfolio holdings on a daily basis because the publication of the Proxy Portfolio does not provide the same level of transparency as the publication of the full portfolio by a fully transparent active ETF. This could cause the Fund’s shares to have wider bid/ask spreads and larger premiums/discounts than fully transparent ETFs using the same investment strategies. Disruptions to creations and redemptions, the existence of extreme market volatility or potential lack of an active trading market for shares may result in shares trading at a significant premium or discount to NAV and/or in a reduced liquidity of your investment. During such periods, you may be unable to sell your shares or may incur significant losses if you sell your shares. There are various methods by which investors can purchase and sell shares and various types of orders that may be placed. Investors should consult their financial intermediary before purchasing or selling shares of the Fund. If a shareholder purchases shares at a time when the market price is at a premium to the NAV or sells shares at a time when the market price is at a discount to the NAV, the shareholder may sustain losses. Nuveen Investments 3 · Authorized Participant Concentration Risk —Only certain institutional investors (typically market makers or other broker-dealers) (“ Authorized Participants ”) may engage in creation or redemption transactions directly with the Fund. The Fund has a limited number of institutions that act as Authorized Participants, none of which are or will be obligated to engage in creation or redemption transactions. To the extent that these institutions exit the business or are unable to process creation and/or redemption orders with respect to the Fund and no other Authorized Participant is able to step forward to create or redeem Creation Units, Fund shares may trade at a discount to NAV and possibly face trading halts and/or delisting. The Fund’s novel structure may affect the number of entities willing to act as Authorized Participants, and this risk may be exacerbated during times of market stress. · Predatory Trading Practices Risk —Although the Fund seeks to benefit from keeping its portfolio holdings information secret, market participants may attempt to use the Proxy Portfolio and related Proxy Portfolio Disclosures to identify the Fund’s holdings and trading strategy. If successful, this could result in such market participants engaging in predatory trading practices that could harm the Fund and its shareholders. The Proxy Portfolio and related Proxy Portfolio Disclosures have been designed to mitigate the risk that market participants could “reverse engineer” the Fund’s portfolio and investment strategy, but they may not be successful in this regard. · Trading Issues Risk —Trading in Fund shares on the NYSE Arca may be halted in certain circumstances. If 10% or more of the Fund’s Actual Portfolio does not have readily available market quotations, the Fund will promptly request that the NYSE Arca halt trading in the Fund’s shares. Such trading halts may have a greater impact on the Fund compared to other ETFs due to its lack of transparency. If the trading of a security held in the Fund’s Actual Portfolio is halted or otherwise does not have readily available market quotations and the sub-adviser believes that the lack of any such readily available market quotations may affect the reliability of the Proxy Portfolio as an arbitrage vehicle or otherwise determines it is in the best interest of the Fund, the sub-adviser promptly will disclose on the Fund’s website the identity and weighting of such security for so long as such security’s trading is halted or otherwise does not have readily available market quotations and remains in the Actual Portfolio. There can be no assurance that the requirements of the NYSE Arca necessary to maintain the listing of the Fund will continue to be met. Because the Fund trades on the basis of a published Proxy Portfolio, it may trade at a wider bid/ask spread and may experience a wider premium/discount than traditional ETFs that publish their portfolios on a daily basis, and therefore, may cost investors more to trade especially during periods of market disruption or volatility. · Tracking Error Risk —Although the Proxy Portfolio is designed to reflect the economic exposure and risk characteristics of the Fund’s Actual Portfolio on any given trading day, there is a risk that the performance of the Proxy Portfolio will diverge from the performance of the Actual Portfolio, potentially materially. Active Management Risk —The Fund’s sub-adviser actively manages the Fund’s investments. Consequently, the Fund is subject to the risk that the investment techniques and risk analyses employed by the Fund’s sub-adviser, including its use of proprietary and third-party technology systems, models, algorithms and data management software, may not produce the desired results. This could cause the Fund to lose value or its investment results to lag relevant benchmarks or other funds with similar objectives. Currency Risk —Changes in currency exchange rates will affect the value of non-U.S. securities, the value of dividends and interest earned from such securities, and gains and losses realized on the sale of such securities. A strong U.S. dollar relative to these other currencies will adversely affect the value of the Fund’s portfolio. Cybersecurity Risk —Cybersecurity risk is the risk of an unauthorized breach and access to Fund assets, customer data (including private shareholder information), or proprietary information, or the risk of an incident occurring that causes the Fund, its investment adviser or sub-adviser, custodian, transfer agent, distributor or other service provider, a financial intermediary or the issuers of securities held by the Fund to suffer a data breach, data corruption or lose operational functionality. Successful cyber-attacks or other cyber-failures or even

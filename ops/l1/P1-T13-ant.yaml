      497 1 d451700d497.htm 497 497 Statement of Additional Information February 1, 2023, as amended February 10, 2023 Fixed Income DoubleLine Opportunistic Bond ETF (DBND) Equities DoubleLine Shiller CAPE ® U.S. Equities ETF (CAPE) DoubleLine ETF Trust (the “Trust”) offers shares, if available, of each of its separate series listed above (each, a “Fund” and, together, the “Funds”) through a single Prospectus dated February 1, 2023. Each Fund is also offered through one or more Summary Prospectuses. This Statement of Additional Information ( “SAI” ) is not a prospectus but contains information in addition to that set forth in the Prospectus, as supplemented from time to time. This SAI should be read in conjunction with the Prospectus for the Fund(s) in which you may invest. A Prospectus or Summary Prospectus may be obtained at no charge by calling (855) 937-0772 or on the Funds’ website at www.doubleline.com. This SAI, although not in itself a prospectus, is incorporated by reference into the Prospectus in its entirety. The audited financial statements of each of the Funds within each Fund’s report to shareholders for the period ended September 30, 2022 and the notes thereto are incorpor […]  discussion of the principal investment policies and risks of investing in the Funds. INVESTMENT RESTRICTIONS In addition to the investment strategies and the risks described in the Prospectus and in this SAI, each Fund may employ other investment practices and may be subject to other risks, some of which are described below. Further, the Equities ETF is permitted to employ some, but not all, of the investment practices described, and as indicated, below. The Equities ETF operates in reliance on an exemptive order from the U.S. Securities and Exchange Commission (“ SEC ”) (the “ Order ”), which incorporates by reference the conditions and restrictions of a previous SEC order issued to Precidian ETFs Trust, et al. to permit the operation of exchange-traded funds (“ ETFs ”) pursuant to the ActiveShares ® non-transparent ETF structure. The Order limits the types of investments the Equities ETF may hold to those listed in its application for the Order. Under the terms of the Order, the Equities ETF may invest only in ETFs, exchange-traded notes, exchange-listed common stocks, exchange-traded preferred stocks, exchange-traded American Depositary Receipts (“ ADRs ”), exchange-traded real estate investment trusts, exchange-traded commodity pools, exchange-traded metal trusts, exchange-traded currency trusts and exchange-traded futures that trade on a U.S. exchange contemporaneously with the Fund’s shares, as well as cash and cash equivalents (which are short-term U.S. Treasury securities, government money market funds, and repurchase agreements). In accordance with the Order, the Equities ETF will not purchase any securities that are illiquid investments (as defined in Rule 22e-4(a)(8) under the 1940 Act) at the time of purchase. Importantly, the Equities ETF’s fundamental and non-fundamental policies listed below will be limited by the terms of the Order. Fundamental Investment Policies The investment restrictions below have been adopted as fundamental policies for each Fund unless otherwise noted. A fundamental policy affecting a particular Fund may not be changed without the vote of a majority of the outstanding voting shares of that Fund (as defined in the 1940 Act). The Equities ETF’s fundamental and non-fundamental policies listed below are subject to the investment restrictions and limitations in the Order, as described and indicated below. 1. A Fund may not issue any class of securities which is senior to the Fund’s shares of beneficial interest, except to the extent the Fund is permitted to borrow money and except as otherwise consistent with applicable law from time to time. 2 2. A Fund may borrow money to the extent permitted by applicable law from time to time. 3. A Fund may not act as underwriter of securities of other issuers except to the extent that, in connection wi […] or loans, term loans, mezzanine, second lien, and other subordinated loans, debtor-in-possession loans, exit facilities, delayed funding loans, revolving credit facilities, non-performing loans, re-performing loans, and other fixed and floating rate loans (as well as various forms of securitizations of these and other types of loans); (xxiv) distressed and defaulted debt securities; (xxv) mortgage dollar rolls; (xxvi) other registered investment companies, including ETFs and mutual funds; (xxviii) structured notes; (xxix) municipal bonds and securities; (xxx) collateralized debt obligations such as collateralized loan obligations and collateralized bond obligations; (xxxi) perpetual maturity bonds; (xxxii) inflation-indexed bonds; (xxxiii) convertible securities; (xxxiv) preferred securities; (xxxv) payment-in-kind bonds; (xxxvi) zero-coupon bonds; (xxxvii) custodial receipts, cash and cash equivalents; (xxxviii) short-term, high quality investments, including, for example, commercial paper, bankers’ acceptances, certificates of deposit, and bank time deposits; (xxxix) real-estate investment trusts (“ REITs ”); (xl) credit-linked notes; (xli) pass-through notes; (xlii) contingent value rights; (xliii) Private Investments in Public Companies (“ PIPEs ”); (xliv) global depositary notes (“ GDNs ”); and (xlv) bank capital securities. Each of the Funds generally will invest in some, but generally not all, of these types of investments at any given time, each of which may be denominated in United States Dollars (“ USD ”) or any other currency worldwide unless prohibited by a Fund’s investment objective and strategies. Depending on a Fund’s principal investment strategies, the amount of a Fund’s assets that may be committed to any of these types of investments (if any) may vary. The above list of investments is not intended to be an exhaustive list of the types of investments in which the Opportunistic Bond ETF may invest. Equities ETF The Equities ETF will attempt to achieve its objective by investing in a variety of investments, subject to and in accordance with the Order, such as but not limited to (as specified in greater detail below): (i) exchange-traded funds, (ii) exchange-traded notes, (iii) exchange listed common stocks, (iv) exchange-traded preferred stocks, (v) exchange-traded American Depositary Receipts (“ ADRs ”), (vi) exchange-traded real estate investment trusts, (vii) exchange-traded commodity pools, (viii) exchange-traded metal trusts, (ix) exchange-traded currency trusts and (x) exchange-traded futures that trade on a U.S. exchange contemporaneously with the Fund’s shares, as well as cash and cash equivalents (which are short-term U.S. Treasury securities, government money market funds, and repurchase agreements). Strategies and Investments In attempting to achieve its investment objective, a Fund may utilize, among others, one or more of the strategies or securities set forth below. The Funds may, in addition, invest in other instruments (including derivative investments) or use other investment strategies that are developed or become available in the future and that are consistent with their objectives and restrictions. The investment strategies described below may be pursued directly by the Funds. 5 Strategies and Investments of the Opportunistic Bond ETF and the Equities ETF Borrowing and Other Forms of Leverage. Each Fund may borrow money to the extent permitted by its investment policies and restrictions and applicable law. When a Fund borrows money or otherwise leverages its portfolio, the value of an investment in a Fund will be more volatile and other investment risks will tend to be compounded. This is because leverage tends to exaggerate the effect of any increase or decrease in the value of a Fund’s holdings. In addition to borrowing money from banks, the Opportunistic Bond ETF may engage in certain other investment transactions that may be viewed as forms of financial leverage – for example, entering into repurchase and reverse repurchas […] onal margin when its futures contracts are marked-to-market. Prior to the expiration of a futures contract, the Fund may elect to close out its position, at which time a final determination of variation margin is made. At that time, the Fund then realizes any loss or gain on the futures transaction. 6 The values of these derivatives may fluctuate more than the relevant underlying commodity or commodities or commodity index. The requirements for qualification as a RIC can limit the manner in or extent to which a Fund may enter into certain commodity-related derivatives, such as commodities futures contracts discussed above, and such derivatives may adversely affect the Fund’s ability to qualify as a RIC. See “Distributions and Taxes” below. Convertible Securities. A Fund may invest in convertible securities. Convertible securities include bonds, debentures, notes, preferred stock and other securities that may be converted into or exchanged for, at a specific price or formula within a particular period of time, a prescribed amount of common stock or other equity securities of the same or a different issuer. Convertible securities may entitle the holder to receive interest paid or accrued on debt or dividends paid or accrued on preferred stock until the security matures or is redeemed, converted or exchanged. The market value of a convertible security is a function of its investment value and its conversion value. A security’s investment value represents the value of the security without its conversion feature ( i.e. , a nonconvertible fixed income security). The investment value may be determined by reference to its credit quality and the current value of its yield to maturity or probable call date. At any given time, investment value is dependent upon such factors as the general level of interest rates, the yield of similar nonconvertible securities, the financial strength of the issuer and the seniority of the security in the issuer’s capital structure. A security’s conversion value is determined by multiplying the number of shares the holder is entitled to receive upon conversion or exchange by the current price of the underlying security. If the conversion value of a convertible security is significantly below its investment value, the convertible security generally trades like nonconvertible debt or preferred stock and its market value will not be influenced greatly by fluctuations in the market price of the underlying security. Conversely, if the conversion value of a convertible security is near or above its investment value, the market value of the convertible security is typically more heavily influenced by fluctuations in the market price of the underlying security. Convertible securities generally have less potential for gain than common stocks. A Fund’s investments in convertible securities may at times include securities that have a mandatory conversion feature, pursuant to which the securities convert automatically into common stock or other equity securities at a specified date and a specified conversion ratio, or that are convertible at the option of the issuer. Because conversion of the security is not at the option of the holder, the Fund may be required to convert the security into the underlying common stock even at times when to do so is not in the best interests of the shareholders. The Funds also may invest in “synthetic” convertible securities, which will be selected based on the similarity of their economic characteristics to those of a traditional convertible security due to the combination of separate securities or instruments that possess the two principal characteristics of a traditional convertible security, i.e. , an income-producing security (“ income-producing component ”) and the right to acquire an equity security (“ convertible component ”). The income-producing component is achieved by investing in non-convertible, income-producing securities such as bonds, preferred stocks and money market instruments. Unlike a traditional convertible security, which is a single security having a unitary market value, a synthetic convertible comprises two or more separate securities, each with its own market value. Therefore, the “market value” of a synthetic convertible security is the sum of the values of its income-producing component and its convertible component. For this reason, the values of a synthetic convertible security and a traditional convertible security may respond differently to market fluctuations. The convertible component is achieved by purchasing warrants or options to buy common stock at a certain exercise price, or options on a stock index. The Funds may also purchase synthetic securities created by other parties, typically investment banks, including convertible structured notes. More flexibility is possible in the assembly of a synthetic convertible security than in the purchase of a convertible security. Although synthetic convertible securities may be used for a Fund where the two components are issued by a single issuer, thus making the synthetic convertible security similar to the traditional convertible security, the character of a synthetic convertible security allows the combination of components representing distinct issuers, when the Adviser believes that such a combination would better promote a Fund’s investment objective. A synthetic convertible security also is a more flexible investment in that its two components may be purchased separately. For example, an investor may purchase a warrant for inclusion in a synthetic convertible security but temporarily hold short-term investments while postponing the purchase of a corresponding bond pending development of more favorable market conditions. 7 A holder of a synthetic convertible security faces the risk of a decline in the price of the security or the level of the index involved in the convertible component, causing a decline in the value of the call option or warrant purchased to create the synthetic convertible security. Should the price of the stock fall below the exercise price and remain there throughout the exercise period, the entire amount paid for the call option or warrant would be lost. Because a synthetic convertible security includes the income-producing component as well, the holder of a synthetic convertible security also faces the risk that interest rates will rise, causing a decline in the value of the income-producing instrument. Synthetic convertible securities may be created by other parties, including convertible structured notes. Convertible structured notes are income-producing debentures linked to equity, and are typically issued by investment banks. A Fund’s investment in convertible securities may also be generally subject to the risks associated with investment in fixed income securities. See “—Debt Securities Risks.” Custodial Receipts . A Fund may invest in custodial receipts representing interests in securities held by a custodian. The securities so held may include U.S. Government Securities or other types of securities in which a Fund may invest. The custodial receipts may evidence ownership of future interest payments, principal payments or both on the underlying securities, or, in some cases, the payment obligation of a third party that has entered into an interest rate swap or other arrangement with the custodian or trustee. For certain securities laws purposes, custodial receipts may not be considered obligations of the U.S. government or other issuer of the securities held by the custodian or trustee. As a holder of custodial receipts, a Fund will bear its proportionate share of the fees and expenses charged to the custodial account. Derivatives. Some of the instruments in which a Fund may invest are referred to as “derivatives,” because their value “derives” from the value of an underlying asset, reference rate or index. These instruments include options, futures contracts, forward currency contracts, swap agreements and similar instruments. A Fund may enter into derivatives for hedging purposes or otherwise to gain, or reduce, long or short exposure to one or more asset classes or issuers. A Fund may use derivatives with the purpose or effect of creating investment leverage. Derivatives may be more volatile, illiquid and/or more difficult to value than other instruments, and each type of derivative instrument may have its own special risks. Any use of derivatives strategies entails the risks of investing directly in the securities, instruments or assets underlying the derivatives strategies, as well as the risks of using derivatives generally, and in some cases the risks of leverage, described in the Prospectus and in this SAI. In accordance with the Order, the Equities ETF is permitted only to invest in derivatives permitted by the Order, including U.S. exchange-traded futures whose reference assets are assets that the Equities ETF may invest in directly or, in the case of an index futures contract, based on an index of a type of asset that the Equities ETF could invest in directly. A Fund’s use of derivative instruments exposes the Fund to the credit risk of its counterparty. In the event the counterparty to such a derivative instrument defaults and/or becomes insolvent, the Fund potentially could lose all or a large portion of its investment in the derivative instrument and/or could be delayed in enforcing contractual remedies and obtaining any recovery in respect of its derivative instruments. Investing for hedging purposes or to increase a Fund’s return may result in certain additional transaction costs that may reduce a Fund’s performance. In addition, when used for hedging purposes, no assurance can be given that each derivative position will achieve a close correlation with the underlying instrument that is the subject of the hedge, or that a particular derivative position will be available when sought by the Adviser. While hedging strategies involving derivatives can reduce the risk of loss, they can also reduce the opportunity for gain or even result in losses by offsetting favorable price movements in other Fund investments. Certain derivatives may create a risk of loss greater than the amount invested. Equity Securities. The Funds may invest in equity securities. Equity securities are securities that represent an  […] f a Fund purchased prior to that date. A preliminary ESG assessment may lead to a determination that (1) known ESG factors may have a limited impact on the economics or valuation of the broader asset class or (2) modifying a portfolio to mitigate ESG risks or to take advantage of ESG-related opportunities may be inconsistent with an account’s investment objective or the Adviser’s fiduciary duties. In such cases, the Adviser might not take any action based on the results of the preliminary ESG assessment or conduct any further ESG assessment. For example, for investments that generally have pre-determined financial terms, such as fixed income investments, the opportunities to realize the value created by positive ESG factors may be limited. Exchange-Traded Notes (“ETNs”). A Fund may invest in ETNs. ETNs have many features of senior, unsecured, unsubordinated debt securities. Their returns are linked to the performance of a particular asset, such as a market index, less applicable fees and expenses. ETNs are listed on an exchange and traded in the secondary market. A Fund may hold the ETN until maturity, at which time the issuer is obligated to pay a return linked to the performance of the relevant asset. ETNs do not typically make periodic interest payments and principal is not protected. The market value of an ETN may be influenced by, among other things, time to maturity, level of supply and demand of the ETN, volatility and lack of liquidity in the underlying assets, changes in the applicable interest rates, the current performance of the asset to which the ETN is linked, and the credit rating of the ETN issuer. ETNs represent an unsecured obligation and therefore carry with them the risk that the counterparty will default and a Fund may not be able to recover the current value of its investment. The market value of an ETN may differ from the performance of the applicable asset and there may be times when an ETN trades at a premium or discount to the underlying asset’s value. This difference in price may be due to the fact that the supply and demand in the market for ETNs at any point in time is not always identical to the supply and demand in the market for the assets on which the ETN’s return is based. A ch

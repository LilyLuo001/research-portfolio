ynchronously with the fund’s shares, cash, and cash equivalents. The fund may also invest in American Depository Receipts (ADRs) and common stocks listed on a foreign exchange that trade on such exchange synchronously with the fund’s shares (i.e., during the U.S. listing exchange’s trading hours). The fund is an actively managed, exchange-traded fund (ETF) that does not disclose portfolio holdings daily. In order to provide market participants with information on the fund’s investments, the fund will publish a “Proxy Portfolio” on its website daily. A Proxy Portfolio is a basket of securities that is designed to closely track the daily performance of the fund’s portfolio holdings. While the Proxy Portfolio includes some of the fund’s holdings, it is not the fund’s actual portfolio. The Proxy Portfolio could be a broad-based securities index or the fund’s recently disclosed portfolio holdings. The Proxy Portfolio will be determined such that at least 80% of its total assets will overlap with the portfolio weightings of the fund at the beginning of each trading day (Portfolio Overlap) and the Portfolio Overlap may fluctuate throughout the day. The fund’s Portfolio Overlap is available on the fund’s website daily. Each day, the website will also provide the fund’s Tracking Error, which means the standard deviation over the past three months of the daily proxy spread (i.e., the difference, in percentage terms, between the Proxy Portfolio’s per share NAV and that of the fund at the end of the trading day). In selecting investments, the fund’s investment adviser generally looks for companies in the aggregate with one or more of the following: · an established operating history; · above-average dividend yield relative to the broader equity market; · low price/earnings ratio relative to the broader equity market; · a sound balance sheet and other positive financial characteristics; or · low stock price relative to a company’s underlying value as measured by assets, cash flow, or business franchises. The adviser generally seeks investments in large-capitalization companies and the fund’s yield, which reflects the level of dividends paid by the fund, is expected to normally exceed the yield of the Russell 1000 ® Value Index. In pursuing its investment objective(s), the fund has the discretion to deviate from its normal investment criteria. These situations might arise when the adviser believes a security could increase in value for a variety of reasons, including an extraordinary corporate event, a new product introduction or innovation, a favorable competitive development, or a change in management. In all circumstances, the fund will limit allowable investments to those investments described in the Statement of Additional Information. The fund may at times invest significantly in certain sectors, such as the financials sector. The fund may sell securities for a variety of reasons, such as to secure gains, limit losses, or redeploy assets into more promising opportunities. SUMMARY 3 Principal Risks As with any fund, there is no guarantee that the fund will achieve its objective(s). The fund’s share price fluctuates, which means you could lose money by investing in the fund. The principal risks of investing in this fund, which may be even greater in bad or uncertain market conditions, are summarized as follows: Proxy portfolio structure risks The fund does not disclose portfolio holdings daily. The fund uses a Proxy Portfolio, which is a basket of securities that is designed to closely track the daily performance of the fund’s portfolio holdings. The fund may not always effectively construct a proxy portfolio that closely tracks the daily performance of the fund’s portfolio holdings. Because the fund uses a Proxy Portfolio, there is a risk that the fund’s shares may trade at a wider bid/ask spread than shares of ETFs that publish their portfolios on a daily basis. This risk is heightened during periods of market disruption and volatilit
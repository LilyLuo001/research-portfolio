posure to the Index. Subject to the applicable limitations described below, the Fund may pursue its investment objective and obtain exposures to some or all of the asset classes described above by investing in other exchange-traded investment companies, including listed closed-end investment companies, ETFs and government money market funds, in each case affiliated or unaffiliated with the Fund. Portfolio securities may be sold at any time. Sales typically occur when the Fund’s portfolio managers determine to take advantage of what the portfolio managers consider to be a better investment opportunity, when the portfolio managers believe the portfolio securities no longer represent relatively attractive investment opportunities or when the individual security has reached the portfolio managers’ sell target. The Fund’s investment strategy may involve active and frequent trading of portfolio securities. The Fund operates in reliance on an exemptive order from the SEC (the “ Order ”), which limits the types of investments the Fund may hold to those listed in the Fund’s application for the Order. Under the terms of the Order, the Fund is permitted to invest only in exchange-traded funds, exchange-traded notes, exchange listed common stocks, exchange-traded preferred stocks, exchange-traded American Depositary Receipts, exchange-traded real estate investment trusts, exchange-traded commodity pools, exchange-traded metal trusts, exchange-traded currency trusts and exchange-traded futures that trade on a U.S. exchange contemporaneously with the Fund’s shares, as well as cash and cash equivalents (which are short-term U.S. Treasury securities, government money market funds, and repurchase agreements). The Fund will not buy securities that are illiquid investments (as defined in rule 22e-4(a)(8) under the Investment Company Act of 1940, as amended (the “ 1940 Act ”)) at the time of purchase. The Fund may, however, hold an illiquid investment if it becomes illiquid after purchase. The Fund’s investment strategies and practices, including those listed above, are subject to these limitations. -3- The Fund is classified as a non-diversified fund under the 1940 Act and may invest in the securities of a smaller number of issuers than a diversified fund. Principal Risks The value of the Fund’s shares will vary as its portfolio investments increase or decrease in value. Therefore, the value of your investment in the Fund could go down as well as up. You can lose money by investing in the Fund. The significance of any specific risk to an investment in the Fund will vary over time, depending on the composition of the Fund’s portfolio, market conditions, and other factors. You should read all of the risk information presented below carefully, because any one or more of these risks may result in losses to the Fund. The principal risks affecting the Fund that can cause a decline in value are: • equity issuer risk: the risk that the market price of com […] lio to a particular sector or related sectors, the Fund will be more susceptible to events or factors affecting companies in that sector or related sectors. For example, the values of securities of companies in the same or related sectors may be negatively affected by the common characteristics they share, the common business risks to which they are subject, common regulatory burdens, or regulatory changes that affect them similarly. Such characteristics, risks, burdens or changes include, but are not limited to, changes in governmental regulation, inflation or deflation, rising or falling interest rates, competition from new entrants, and other economic, market, political or other developments specific to that sector or related sectors. • ActiveShares ® non-transparent structure/ETF-related risks : the Fund is an ETF that is subject to the risks described below. Additionally, because the ETF utilizes the ActiveShares ® non-transparent ETF structure, it is subject to additional or enhanced ETF-related risks. Unlike most actively managed ETFs, the Fund does not provide daily disclosure of its portfolio holdings. Instead, the Fund provides a verified intraday indicative value (“ VIIV ”), calculated and disseminated every second throughout the trading day. The VIIV is intended to provide investors with an intraday highly-correlated per share value of the Fund that can be compared to the current market price. The VIIV is designed to provide sufficient information to allow for an effective arbitrage mechanism that will keep the market price of the Fund’s shares trading at or close to the underlying net asset value (“ NAV ”) per share of the Fund. Shares traded on an intraday basis on an exchange, however, will not have a fixed relationship to the previous day’s or the current day’s NAV. There is, however, a risk, which may increase during periods of market disruption or volatility, that market prices will vary significantly from -4- the underlying NAV of the Fund. Similarly, because the Fund’s shares trade with reference to a published VIIV, they may trade at a wider bid/ask spread when compared to shares of ETFs that publish their portfolios on a daily basis, especially during periods of market disruption or volati

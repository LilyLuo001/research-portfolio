      497 1 d176091d497.htm NUSHARES ETF TRUST Nushares ETF Trust Exchange-Traded Funds 28 September 2021 Listing Exchange Ticker Symbol Fund Name Nuveen Growth Opportunities ETF NYSE Arca NUGO THIS ETF IS DIFFERENT FROM A TRADITIONAL ETF A traditional ETF tells the public what assets it holds each day. This ETF will not. This may create additional risks for your investment. For example: · You may have to pay more money to trade this ETF’s shares. This ETF will provide less information to traders, who tend to charge more for trades when they have less information. · The price you pay to buy ETF shares on an exchange may not match the value of the ETF’s portfolio. The same is true when you sell shares. These price differences may be greater for this ETF compared to other ETFs because it provides less information to traders. · These additional risks may be even greater in bad or uncertain market conditions. · The ETF will publish on its website each day a Proxy Portfolio (“Proxy Portfolio”) designed to help trading in shares of the ETF. While the Proxy Portfolio includes some of the ETF’s holdings, it is not the ETF’s actual portfolio. The differences between this ETF and other ETFs may al […] rmediary’s website for more information. Section 1 Fund Summary 7 Section 2 Additional Detail About the Fund’s Strategies, Holdings and Risks This prospectus contains important information about investing in the Fund. Please read this prospectus carefully before you make any investment decisions. Additional information regarding the Fund is available at www.nuveen.com/etf or by calling Nuveen Investor Services at (888) 290-9881. The Fund is an actively-managed, non-transparent ETF and does not intend to track an index. Unlike traditional ETFs that provide daily disclosure of their portfolio holdings, this Fund does not disclose the daily holdings of its actual portfolio. Instead, this Fund discloses a portfolio transparency substitute (a “ Proxy Portfolio ”) and certain related information about the relative performance of the Proxy Portfolio and the Fund’s actual portfolio (“ Actual Portfolio ”) holdings (the “ Proxy Portfolio Disclosures ”), which are intended to help keep the market price of the Fund’s shares trading at or close to the underlying NAV per share of the Fund. While the Proxy Portfolio includes some of the Fund’s holdings, it is not the Fund’s Actual Portfolio, and the Fund will not disclose the daily holdings of the Actual Portfolio. The Fund’s exemptive relief limits the types of securities in which the Fund can invest, which may constrain the Fund’s ability to implement its investment strategy. Investment Objective and Principal Investment Strategies The Fund’s investment objective, which is described in the “Fund Summary” section, may be changed by the Fund’s Board of Trustees (the “Board” ) without shareholder approval. The Fund’s investment policies may be changed by the Board without shareholder approval unless otherwise noted in this prospectus or the statement of additional information. The Fund’s principal investment strategies are discussed in the “Fund Summary” section. These are the strategies that the Fund’s investment adviser and sub-adviser believe are most likely to be important in trying to achieve the Fund’s investment objective. This section provides more information about these strategies, as well as information about some additional strategies that the Fund’s sub-adviser uses, or may use, to achieve the Fund’s objective. The strategies described below are principal investment strategies unless otherwise noted. You should be aware that the Fund may also use strategies and invest in securities that are not described in this prospectus, but that are described in the statement of additional information. For a copy of the statement of additional information, call Nuveen Investor Services at (888) 290-9881 or visit the Fund’s website at www.nuveen.com/etf . Portfolio Holdings Additional information about the Fund’s portfolio holdings can be found below. Equity Securities The Fund invests in exchange-traded equity securities, including common stocks, preferred securities, real estate investment trusts, and depositary receipts. 8 Section 2 Additional Detail About the Fund's Strategies, Holdings and Risks Non-U.S. Investments The Fund may invest in common stocks of non-U.S. issuers that are listed and trade on a foreign exchange contemporaneously with Fund shares. The Fund will classify an issuer of a security as being a U.S. or non-U.S. issuer based on the determination of an unaffiliated, recognized financial data provider. Such determinations are based on a number of criteria, such as the issuer’s country of domicile, the primary exchange on which the security trades, the location from which the majority of the issuer’s revenue comes, and the issuer’s reporting currency. The Fund’s investment in non-U.S. equity securities may include direct investment in securities of non-U.S. companies traded overseas on a foreign exchange contemporaneously with Fund shares as well as ADRs. Derivatives The Fund may invest in certain derivatives as part of its principal investment strategy. Generally, a derivative is a financial contract the value of which depends upon, or is derived from, the value of an underlying asset, reference rate or index. Derivatives generally take the form of contracts under which the parties agree to payments between them based upon the performance of a wide variety of underlying references, such as stocks, bonds, loans, commodities, interest rates, currency exchange rates, and various domestic and foreign indices. The only derivative instruments in which the Fund may invest are exchange-traded futures contracts that trade contemporaneously with Fund shares. Derivatives may entail investment exposures that are greater than their cost would suggest. As a result, a small investment in derivatives could have a large impact on the Fund’s performance. Cash Equivalents and Short-Term Investments As a non-principal investment strategy, the Fund may invest in cash and cash equivalents (short-term U.S. Treasury securities, government money market funds, and repurchase agreements only), in such proportions as warranted by prevailing market conditions and the Fund’s principal investment strategies. The Fund may temporarily invest without limit in such holdings for liquidity purposes, or in an attempt to respond to adverse market, economic, political or other conditions. Being invested in these securities may keep the Fund from participating in a market upswing and prevent the Fund from achieving its investment objective. Investment Companies and Other Pooled Investment Vehicles As a non-principal investment strategy, the Fund may invest in securities of other ETFs that invest primarily in securities of the types in which the Fund may invest directly. In addition, the Fund may invest a portion of its assets in pooled investment vehicles (other than investment companies) that invest primarily in securities of the types in which the Fund may invest directly. As a shareholder in an investment company or other pooled investment vehicle, the Fund will bear its ratabl […] ies of any one investment company or more than 10% of its total assets, in the aggregate, in investment company securities. Many ETFs, however, have either obtained exemptive relief from the SEC or may rely on Rule 12d1-4 under the 1940 Act to permit unaffiliated funds to invest in the ETFs’ shares beyond these statutory limitations, subject to certain conditions and pursuant to a contractual arrangement between the ETFs and the investing Fund. The Fund may rely on these exemptive orders or Rule 12d1-4 to invest in unaffiliated ETFs beyond the foregoing statutory limitations. Subject to certain conditions, the Fund also may invest in money market funds beyond the statutory limits described above. Preferred Securities The Fund may invest in exchange-traded preferred securities. Preferred securities, which generally pay fixed or adjustable rate dividends or interest to investors, have preference over common stock in the payment of dividends or interest and the liquidation of a company’s assets, which means that a company typically must pay dividends or interest on its preferred securities before paying any dividends on its common stock. On the other hand, preferred securities are junior to most other forms of the company’s debt, including both senior and subordinated debt. Because of their subordinated position in the capital structure of an issuer, the ability to defer dividend or interest payments for extended periods of time without triggering an event of default for the issuer, and certain other features, preferred securities are often treated as equity-like instruments by both issuers and investors, as their quality and value are heavily dependent on the profitability and cash flows of the issuer rather than on any legal claims to specific assets. Securities Lending The Fund may lend securities representing up to one-third of the value of its total assets to broker-dealers, banks, and other institutions to generate additional income. When the Fund loans its portfolio securities, it will receive, at the inception of each loan, cash collateral equal to at least 102% of the value of the loaned securities. Under the Fund’s securities lending agreement, the securities lending agent will generally bear the risk th […] onth is generally available approximately two to five business days after the end of the month on the Fund’s website at www.nuveen.com/etf . Risks Risk is inherent in all investing. Investing in the Fund involves risk, including the risk that you may receive little or no return on your investment or even that you may lose part or all of your investment. Therefore, before investing you should consider carefully the principal risks and certain other risks that you assume when you invest in the Fund. Each risk summarized below is considered a “principal risk” of investing in the Fund, regardless of the order in which it appears. Because of these risks, you should consider an investment in the Fund to be a long-term investment. Principal Risks Proxy Portfolio structure risk : Unlike traditional ETFs that provide daily disclosure of their portfolio holdings, the Fund does not disclose the daily holdings of the Actual Portfolio. Instead, the Fund discloses a Proxy Portfolio that is designed to reflect the economic exposure and risk characteristics of the Fund’s Actual Portfolio on any given trading day. Although the Proxy Portfolio and Proxy Portfolio Disclosures are intended to provide Authorized Participants and other market participants with enough information to allow them to engage in effective arbitrage transactions that will keep the market price of the Fund’s shares trading at or close to the underlying NAV per share of the Fund, while at the same time enabling them to establish cost-effective hedging strategies to reduce risk, there is a risk that market prices will vary significantly from the underlying NAV of the Fund. See “Premium/Discount Risk.” Similarly, shares of the Fund may trade at a wider bid/ask spread than shares of traditional ETFs, and may therefore be more costly for investors to trade. See “Trading Issues Risk.” Also, the Fund will incur expenses to license the Proxy Portfolio mechanism, which may impact shareholder returns. Additionally, the proxy mechanism itself may result in additional trading costs, which also may negatively impact shareholder returns. In addition, although the Proxy Portfolio is designed to protect the Fund from predatory practices such as front-running and free-riding

      497 1 acetft6292021midesgasai497.htm 497 Document June 29, 2021 American Century Investments Statement of Additional Information American Century ETF Trust Ticker: Exchange: American Century ® Mid Cap Growth Impact ETF MID NYSE Arca, Inc. American Century ® Sustainable Growth ETF ESGY NYSE Arca, Inc. American Century ® Sustainable Equity ETF ESGA NYSE Arca, Inc. This statement of additional information adds to the discussion in the funds’ prospectuses dated January 1, 2021 and June 29, 2021, but is not a prospectus. The statement of additional information should be read in conjunction with the funds’ current prospectuses. If you would like a copy of a prospectus, please contact us at one of the addresses or telephone numbers listed on the back cover or visit American Century Investments’ website at americancenturyetfs.com. ©2021 American Century Proprietary Holdings, Inc. All rights reserved. Table of Contents The Funds’ History 2 Exchange Listing and Trading 2 Fund Investment Guidelines 3 Fund Investments and Risks 3 Investment Strategies and Risks 3 Investment Policies 6 Temporary Defensive Measures 8 Portfolio Turnover 8 Disclosure of Portfolio Holdings 8 Management 10 The Board […] ng (a) the description of the portfolio, (b) limitations on portfolio holdings, or (c) the applicability of Listing Exchange listing rules, specified in the Listing Exchange’s rule filing pursuant to Section 19(b) of the Securities Exchange Act of 1934 to permit the listing and trading of shares, is not continuously maintained; or (v) such other event shall occur or condition exists which, in the opinion of the Listing Exchange, makes further dealings on the Listing Exchange inadvisable. If the trading of a security held in a fund’s Actual Portfolio is halted or otherwise does not have readily available market quotations and the Advisor believes that the lack of any such readily available market quotations may affect the reliability of the Proxy Portfolio as an arbitrage vehicle or otherwise determines it is in the best interest of the fund, the Advisor promptly will disclose on the fund’s website the identity and weighting of such security for so long as such security’s trading is halted or otherwise does not have readily available market quotations and remains in the Actual Portfolio. If securities representing 10% or more of the fund’s Actual Portfolio do not have readily available market quotations, the Advisor will promptly request that the Listing Exchange halt trading in the fund’s shares. Shares of the funds may also be listed on certain non-U.S. exchanges. There can be no assurance that the requirements of the Listing Exchange necessary to maintain the listing of shares of the fund will continue to be met. 2 As in the case of other publicly traded securities, when you buy or sell shares through a broker, you will incur a brokerage commission determined by that broker. The trust reserves the right to adjust the share prices of a fund in the future to maintain convenient trading ranges for investors. Any adjustments would be accomplished through stock splits or reverse stock splits, which would have no effect on the net assets of the fund or an investor’s equity interest in the fund. Fund Investment Guidelines This section explains the extent to which the funds’ advisor, American Century Investment Management, Inc. (ACIM or the advisor), can use various investment vehicles and strategies in managing a fund’s assets. Descriptions of the investment techniques and risks associated with each appear in the section, Investment Strategies and Risks , which begins on page 3. In the case of the funds’ principal investment strategies, these descriptions elaborate upon discussions contained in the prospectuses. The funds are nontransparent, actively managed ETFs that utilize the NYSE Proxy Portfolio Methodology licensed from the NYSE Group. The funds operate in reliance on an exemptive order from the SEC (the Order), which incorporates by reference the conditions and restrictions of a previous order issued to Natixis ETF Trust II, to permit the operation of nontransparent active ETFs (the Natixis Order), and limits the types of investments the fund may hold to those listed in the application for the Natixis Order. Under the terms of the Order, the funds may invest only in exchange-traded funds, exchange-traded notes, exchange-traded common stocks, common stocks listed on a foreign exchange that trade on such exchange contemporaneously with the shares, exchange-traded preferred stocks, exchange-traded American depositary receipts (ADRs), exchange-traded real estate investment trusts, exchange-traded commodity pools, exchange-traded metals trusts, exchange-traded currency trusts and exchange-traded futures that trade contemporaneously with fund shares, as well as cash and cash equivalents (which are short-term U.S. Treasury securities, government money market funds, and repurchase agreements). The funds will not borrow for investment purposes or hold short positions. The funds also will not purchase any securities that are illiquid investments at the time of purchase. In general, within the restrictions outlined here and in the funds’ prospectuses, the portfolio managers have broad powers to decide how to invest fund assets. Investments in the fund vary according to what is judged advantageous under changing economic conditions. It is the advisor’s policy to retain maximum flexibility in management without restrictive provisions as to the proportion of one or another class of securities that may be held, subject to the investment restrictions described on the following pages. In addition to the main types of investments and strategies undertaken by the funds as described in the prospectuses, the funds also may invest in other types of instruments and engage in and pursue other investment strategies, which are described in this SAI. Investments and investment strategies with respect to the funds are discussed in greater detail in the section below entitled Investment Strategies and Risks . Incidental to a fund’s other investment activities, including in connection with a bankruptcy, restructuring, workout, or other extraordinary events concerning a partic […] issued in registered form, denominated in U.S. dollars, and designed for use in the U.S. securities markets. While the two types of depositary receipt facilities (unsponsored or sponsored) are similar, there are differences regarding a holder’s rights and obligations and the practices of market participants. A depository may establish an unsponsored facility without participation by (or acquiescence of) the underlying issuer; typically, however, the depository requests a letter of non-objection from the underlying issuer prior to establishing the facility. Holders of unsponsored depositary receipts generally bear all the costs of the facility. The depository usually charges fees upon deposit and withdrawal of the underlying securities, the conversion of dividends into U.S. dollars or other currency, the disposition of non-cash distributions, and the performance of other services. The depository of an unsponsored facility frequently is under no obligation to distribute shareholder communications received from the underlying issuer or to pass through voting rights to depositary receipt holders with respect to the underlying securities. Sponsored depositary receipt facilities are created in generally the same manner as unsponsored facilities, except that sponsored depositary receipts are established jointly by a depository and the underlying issuer through a deposit agreement. The deposit agreement sets out the rights and responsibilities of the underlying issuer, the depository, and the depositary receipt holders. With sponsored facilities, the underlying issuer typically bears some of the costs of the depositary receipts (such as dividend payment fees of the depository), although most sponsored depositary receipts agree to distribute notices of shareholders meetings, voting instructions, and other shareholder communications and information to the depositary receipt holders at the underlying issuer’s request. The depositary of an unsponsored facility frequently is under no obligation to distribute shareholder communications received from the issuer of the deposited security or to pass through, to the holders of the receipts, voting rights with respect to the deposited securities. Depositary receipts do not elimin […] pectus. Variations in a fund’s portfolio turnover rate from year to year may be due to a fluctuating volume of shareholder purchase and redemption activity, varying market conditions, and/or changes in the managers’ investment outlook. The portfolio managers will sell securities without regard to the length of time the security has been held. Because the portfolio managers do not take portfolio turnover rate into account in making investment decisions, (1) the managers have no intention of maintaining any particular rate of portfolio turnover, whether high or low; and (2) the portfolio turnover rates in the past should not be considered as representative of the rates that will be attained in the future. Disclosure of Portfolio Holdings The Proxy Portfolio Unlike traditional ETFs that publish both the identities and quantities of their portfolio holdings (“Actual Portfolio”) daily, these ETFs do not publish the identities of their portfolio holdings daily. Instead, each fund will post a proxy portfolio (“Proxy Portfolio”). These funds use the Proxy Portfolio as a portfolio transparency substitute for their respective Actual Portfolios. The Proxy Portfolio will be designed to closely track the daily performance of the Actual Portfolio. The Proxy Portfolio is designed to reflect the economic exposures and risk characteristics of the fund’s actual holdings on each trading day. This is achieved by performing an analysis of a fund’s Actual Portfolio (“Factor Model”). The Factor Model is comprised of three sets of factors or analytical metrics: market-based factors, fundamental factors, and industry/sector factors. Each fund will have a universe of securities (the “Model Universe”) that will be used to generate its Proxy Portfolio. The Model Universe will be comprised of securities that the fund can purchase and will be a financial index or stated portfolio of securities from which fund investments will be selected. The results of the Factor Model analysis of a fund’s Actual Portfolio are then applied to the fund’s Model Universe. The daily rebalanced Proxy Portfolio is then generated as a result of this Model Universe analysis with the Proxy Portfolio being a small sub-set of the Model Universe. The Factor Model is applied to both the Actual Portfolio and the Model Universe to construct the fund’s Proxy Portfolio that performs in a manner substantially identical to the performance of its Actual Portfolio. The Proxy Portfolio will only include types of investments that are allowed to be held in the Actual Portfolio. The identity and quantity of Proxy Portfolio component investments and the Proxy Overlap will be publicly available on the funds’ websites before the commencement of trading in shares on each business day. The Proxy Portfolio published on the fund’s website each Business Day will include the following information for each portfolio holding in the Proxy Portfolio: (1) ticker symbol; (2) CUSIP or other identifier; (3) description of holding; (4) quantity of each security or other asset held; and (5) percentage weight of the holding in the Proxy Portfolio. The fund’s website will note that the Proxy Overlap is calculated based on the Proxy Portfolio and portfolio holdings as of the prior Business Day. The Proxy Overlap will be calculated by taking the lesser weight of each asset held in common between the Actual Portfolio and the Proxy Portfolio and adding the totals. The goal of the Proxy Portfolio is to allow for efficient trading of shares through an effective portfolio transparency substitute. The proxy portfolio methodology, aims to allow market participants to assess the intraday value and associated risk of a fund’s Actual Portfolio. As a result, investors should be able to purchase and sell shares in the secondary market at prices that are at or close to their NAV. Daily disclosure of the Proxy Portfolio contents, Proxy Overlap, and related metrics, (together, the “Proxy Portfolio Disclosures”), would permit effective arbitrage, including hedging of risks associated with arbitrage and market making activities. In essence, the Proxy Portfolio Disclosures should permit market making in fund shares that keeps bid/ask spreads narrow and the secondary market prices of fund shares at or close to NAV. 8 Actual Portfolio Distribution to the Public ACIM has adopted policies and procedures with respect to the disclosure of fund portfolio holdings and characteristics, which are described below. Month-end full portfolio holdings for each fund will generally be made available for distribution 15 days after the end of each calendar quarter for each of the preceding three months. This disclosure is in addition to the portfolio disclosure in annual and semiannual shareholder reports and the quarter-end portfolio disclosures on Form N-PORT. Such disclosures are filed with the Securities and Exchange Commission and also posted on americancenturyetfs.com at approximately the same time the filings are made. The distribution of holdings after the above time periods is not limited. On a monthly basis, top 10 holdings (on an absolute basis and relative to the appropriate benchmark) for each fund will generally be made available for distribution 7 days after the end of each month, and will be posted on americancenturyetfs.com at or prior to such distribution. Portfolio characteristics that are derived from portfolio holdings will be made available for distribution 7 days after the end of each month, or as soon thereafter as possible, which timeframe may vary by fund. Certain characteristics, as determined by the advisor, […] %; or (b) the bid/ask spread exceeds 2%; or (3) as otherwise deemed necessary or appropriate by the Advisor. In such a circumstance, the Board will consider the continuing viability of the fund, whether shareholders are being harmed, and what, if any, corrective measures would be appropriate to, among other things, narrow the Tracking Error, premium/discount, or bid/ask spread, as applicable. The Board will then decide whether to take any such action. Potential actions may include, but are not limited to: (a) changing lead market makers; (b) listing the fund on a different exchange; (c) changing the size of Creation Units; (d) changing the fund’s investment objective or strategy; (e) publicly disclosing additional information regarding the Proxy Portfolio and/or Actual Portfolio; and (f) revising the algorithms and model universe used as part of the NYSE Proxy Portfolio Methodology. Should the Advisor conclude that the premium/discount between the market price and NAV of the shares remains persistently high, it could recommend to the Board that it liquidate the applicable fund or authorize the Advisor to pursue the potential conversion of the fund to a fully-transparent, active ETF or a mutual fund. The Board will also regularly review each fund’s historical premiums/discounts and bid-ask spreads following the three-year period after the fund’s launch, under the same standards as applied during the first three years of a fund’s life, and determine if any corrective measures may be appropriate. In performing their duties, board members receive detailed information about the funds and the advisor regularly throughout the year, and they meet in person at least quarterly with management of the advisor to review reports about fund operations. The trustees’ role is to provide oversight and not to provide day-to-day management. The board has all powers necessary or convenient to carry out its responsibilities. Consequently, the board may adopt bylaws providing for the regulation and management of the affairs of the funds and may amend and repeal them to the extent that such bylaws do not reserve that right to the funds’ shareholders. They may increase or reduce the number of board members and may, subject to the Inves

r from the Fund in a creation or redemption. AP Representatives have knowledge of the composition of the Fund’s portfolio holdings, and are restricted from disclosing such composition, including to the Authorized Participants. As a result of the Fund’s use of the ActiveShares ® structure for non-transparent ETFs, there may be a more limited number of institutions that are willing to act as Authorized Participants or as AP Representatives. During times of market stress, Authorized Participants may be more likely to step away from a non-transparent ETF than a traditional ETF. To the extent these institutions exit the business or are unable to proceed with creation and/or redemption orders with respect to the Fund, or are unavailable to purchase and sell securities in connection with creation and/or redemption orders, as applicable, and no other Authorized Participant or AP Representative agrees to create or redeem, or purchase or sell securities, as applicable, the arbitrage mechanism for keeping the market price of Fund shares trading at or close to the Fund’s per share NAV may be impaired, and Fund shares may trade at a premium or discount to NAV and possibly face trading halts and/or delisting. These risks may be more pronounced in volatile markets, particularly where there are significant redemptions in ETFs generally. ¡ secondary market trading risk : as an ETF, shares of the Fund trade on an exchange, the NYSE Arca, Inc. (the “Exchange”). The Fund faces numerous market trading risks, including the potential lack of an active market for Fund shares, losses from trading in secondary markets, periods of high volatility and disruptions in the creation/redemption process. Any of these factors, among others, may lead to the Fund’s share

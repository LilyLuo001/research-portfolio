ith Portfolio Reference Basket Structure. The Fund is an actively-managed, semi-transparent exchange traded fund (“ETF”). Unlike traditional ETFs, which generally publish their portfolio holdings on a daily basis, the Fund discloses a portfolio transparency substitute—the Portfolio Reference Basket—and certain related information about the Portfolio Reference Basket relative to the Fund’s actual portfolio (“Actual Portfolio”) holdings (the “Portfolio Reference Basket Disclosures”), which are intended to help keep the market price of the Fund’s shares (“Shares”) trading at or close to the underlying NAV per Share of the Fund. While the Portfolio Reference Basket includes all of the Fund’s holdings, it is not the Fund’s Actual Portfolio because the holdings will be weighted differently, subject to a minimum weightings overlap of 90% with the Fund’s Actual Portfolio at the beginning of each trading day. The Fund also discloses the maximum deviation between the weightings of the specific securities in the Portfolio Reference Basket and the weightings of those specific securities in the Actual Portfolio, as well as between the weighting of the respective cash positions (the “Guardrail Amount”). The Guardrail Amount is intended to ensure that no individual security in the Portfolio Reference Basket will be overweighted or underweighted by more than the publicly disclosed percentage when compared to the actual weighting of each security within the Actual Portfolio as of the beginning of each trading day. The Fund is actively-managed and does not seek to tr

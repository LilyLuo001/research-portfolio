ity) that market prices will vary significantly from the underlying NAV of the fund. This means the price paid to buy shares on an exchange may not match the value of the fund’s portfolio. The same is true when shares are sold. • Trading Issues Risk - If securities representing 10% or more of the fund’s Actual Portfolio do not have readily available market quotations, the fund will promptly request that the Exchange halt trading in the fund’s shares. Trading halts may have a greater impact on this fund compared to other ETFs due to the fund’s nontransparent structure. If the trading of a security held in the fund’s Actual Portfolio is halted, or otherwise does not have readily available market quotations, and the Advisor believes that the lack of any such readily available market quotations may affect the reliability of the Proxy Portfolio as an arbitrage vehicle, or otherwise determines it is in the best interest of the fund, the Advisor promptly will disclose on the fund’s website the identity and weighting of such security for so long as such security’s trading is halted or otherwise does not have readily available market quotations and remains in the Actual Portfolio. • Authorized Participant Concentration Risk - Only an authorized participant may engage in creation or redemption transactions directly with the fund. The fund may have a limited number of institutions that act as authorized participants. To the extent that these institutions exit the business or are unable to proceed with creation and/or redemption orders with respect to the fund and no other authorized participant is able to step forward to process creation and/or redemption orders, fund shares may trade at a discount to net asset value (NAV) and possibly face trading halts and/or delisting. This risk may be more pronounced in volatile markets, potentially where there are significant redemptions in ETFs generally. The fact that the fund is offering a novel and unique structure may affect the number of entities willing to act as Authorized Participants. During times of market stress, Authorized Participants may be more likely to step away from this type of ETF than a traditional ETF. • ESG Criteria Risk - Because the fund’s ESG criteria may exclude the securities of certain issuers for nonfinancial reasons, the fund may forgo 

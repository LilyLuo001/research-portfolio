ot track an index. The Fund is limited by the Order in the types of securities in which it can invest, which may limit the Fund’s ability to implement its investment strategies. Principal Risks The Fund is subject to the following principal investment risks, which you should review carefully and in entirety. The Fund may not achieve its investment objective and you could lose money by investing in the Fund. Proxy Portfolio Risk. Unlike traditional ETFs that disclose their portfolio holdings on a daily basis, the Fund does not disclose its holdings daily, rather it discloses a Proxy Portfolio. The goal of the Proxy Portfolio, during all market conditions, is to track closely the daily performance of the Actual Portfolio and minimize intra-day misalignment between the performance of the Proxy Portfolio and the performance of the Actual Portfolio. The Proxy Portfolio is designed to reflect the economic exposures and the risk characteristics of the Actual Portfolio on any given trading day. The Proxy Portfolio is intended to provide Authorized Participants (which are members or participants of a clearing agency registered with the SEC, which have a written agreement with the Fund that allows them to place orders for the purchase and redemption of Creation Units) and other market participants with enough information to support an effective arbitrage mechanism that keeps the market price of the Fund at or close to the underlying NAV per share of the Fund. The Adviser has licensed from a third party the right to use a model that will determine the Proxy Portfolio. The Fund’s ability to operate as described herein depends on the quality of that model and the timely and accurate determination of the Proxy Portfolio each day. The Proxy Portfolio methodology is novel, has only been in use for a limited period of time, and is not yet proven as an effective arbitrage mechanism. There can be no assurance that the Proxy Portfolio will function as expected or that it will support an effective arbitrage mechanism, especially under difficult or stressed market conditions, and there can be no assurance that the intellectual property necessary to utilize the Proxy Portfolio will remain available to the Fund. The effectiveness of the Proxy Portfolio as an arbitrage mechanism is contingent upon, among other things, the Proxy Portfolio performing in a manner substantially identical to the performance of the Actual Portfolio and the willingness of Authorized Participants and other market participants to trade based on a Proxy Portfolio. There is no guarantee that this arbitrage mechanism will operate as intended or with the intended effects. The Fund may not function as intended and the market price of its shares may be adversely affected if the licensor of the methodology used to determine the Proxy Portfolio fails to continue to make the intellectual property used to determine the Proxy Portfolio available for use by the Fund. Further, while the Proxy Portfolio may include some of the Fund’s holdings, it is not the Fund’s Actual Portfolio. ETFs trading on the basis of a published Proxy Portfolio may exhibit wider premiums and discounts, bid/ask spreads, and tracking error than other ETFs using the same investment strategies that publish their portfolios on a daily basis, especially during periods of market disruption or volatility. Therefore, shares of the Fund may cost investors more to trade than shares of a traditional ETF. There is also a possibility of additional expenses related to operating the Proxy Portfolio. • Each day the Fund calculates the overlap between the holdings of the prior Business Day’s Proxy Portfolio compared to the Actual Portfolio that formed the basis for the Fund’s calculation of NAV at the end of the prior Business Day (“Proxy Overlap”) and the difference, in percentage terms, between the Proxy Portfolio per share NAV and that of the Actual Portfolio (“Tracking Error”). If the Tracking Error becomes large, there is a risk that the performance of the Proxy Portfolio may deviate from the performance of the Actual Portfolio. • The Fund’s Board of Trustees (the “Board”) monitors its Tracking Error, bid/ask spread and premiums/discounts. If deviations become too large, the Board will consider the continuing viability of the Fund, whether shareholders are being harmed, and what, if any, corrective measures would be appropriate. See the Statement of Additional Information for further discussion of the Board’s monitoring responsibilities. • Although the Fund seeks to benefit from keeping its portfolio information secret, market participants may attempt to use the Proxy Portfolio to identify the Fund’s trading strategy, which if successful, could result in such market participants engaging in certain predatory trading practices that may have the potential to harm the Fund and its shareholders. The 3 Proxy Portfolio and any related disclosures have been designed to minimize the risk of predatory trading practices, but they may not be successful in doing so. Premium/Discount Risk. Publication of the Proxy Portfolio is not the same level of transparency as the publication of the Actual Portfolio by a fully transparent ETF. Although the Proxy Portfolio is intended to provide Authorized Participants and other market participants with enough information to allow for an effective arbitrage mechanism that is intended to keep the market price of the Fund at or close to the underlying NAV per share of the Fund, there is a risk (which may increase during periods of market disruption or volatility) that the market price of the Fund’s shares will vary significantly from the NAV per share of the Fund. This means the price paid to buy shares on an exchange may not match the value of the Fund’s portfolio. The same is true when shares are sold. Equity Security Risk. Equity securities held by the Fund may decline significantly in price, sometimes rapidly or unpredictably, over short or extended periods of t
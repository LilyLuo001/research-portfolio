-traded preferred stocks and exchange-traded real estate investment trusts (“REITs”). The Fund is non-diversified, which means that it may invest a greater percentage of its assets in a particular issuer and may invest in fewer issuers than a diversified fund. Typically, the Fund’s portfolio will generally hold 20 to 40 securities. The Fund may invest in companies with any market capitalization, although, it will typically focus its investments in mid- to large- capitalization companies. A company will be considered to be a mid- to large-capitalization company if its capitalization is $5 billion or higher. Vaughan Nelson Investment Management, L.P. (“Vaughan Nelson”) invests in companies of all market capitalizations with a focus on those companies meeting Vaughan Nelson’s return expectations. Vaughan Nelson uses a bottom-up value oriented investment process in constructing the Fund’s portfolio. Vaughan Nelson seeks companies with the following characteristics, although not all of the companies selected will have these attributes: • Companies earning a positive return on capital with stable-to-improving returns. • Companies valued at discount to their asset value. • Companies with an attractive and sustainable dividend level. In selecting investments for the Fund, Vaughan Nelson generally employs the following strategies: • Vaughan Nelson employs a value-driven investment philosophy that selects securities selling at a relatively low value based on discounted cash flow models. Vaughan Nelson selects companies that it believes are out-of-favor or misunderstood. • Vaughan Nelson starts with the entire U.S. exchange-traded equity investment universe. Vaughan Nelson then narrows the investment universe by using fundamental analysis to construct a portfolio of generally 20 to 40 securities. • Vaughan Nelson uses fundamental analysis to construct a portfolio that, in the opinion of Vaughan Nelson, is made up of quality companies with the potential to provide significant increases in share price over a three year period. • Vaughan Nelson will generally sell a security when it reaches Vaughan Nelson’s price target or when the issuer shows a change in financial condition, competitive pressures, poor management decisions or internal or external forces reducing future expected returns from the investment thesis. Non-Transparent ETF with Proxy Portfolio Structure. The Fund is a type of exchange traded fund (“ETF”). Unlike traditional ETFs, however, which generally publish their portfolio holdings on a daily basis, the Fund discloses a portfolio transparency substitute—the “Proxy Portfolio”—and certain related information about the relative performance of the Proxy Portfolio and the Fund’s actual portfolio (“Actual Portfolio”) holdings (the “Proxy Portfolio Disclosures”), which are intended to help keep the market price of the Fund’s shares trading at or close to the underlying net asset value (“NAV”) per share of the Fund. While the Proxy Portfolio includes some of the Fund’s holdings, it is not the Fund’s Actual Portfolio, and the Fund will not disclose the daily holdings of the Actual Portfolio. Although the Fund seeks to benefit from keeping its portfolio information secret, market participants may attempt to use the Proxy Portfolio to identify the Fund’s trading strategy, which if successful, could result in such market participants engaging in certain predatory trading practices 2 Fund Summary that may have the potential to harm the Fund and its shareholders. The Fund’s exemptive relief limits the types of securities in which the Fund can invest, which may constrain the Fund’s ability to implement its investment strategies. The Fund is actively-managed and does not intend to track an index. Principal Investment Risks The principal risks of investing in the Fund are summarized below. The Fund does not represent a complete investment program. You may lose money by investing in the Fund. Fund shares are not bank deposits and are not gua
cle or otherwise determines it is in the best interest of the Fund, the sub-adviser promptly will disclose on the Fund’s website the identity and weighting of such security for so long as such security’s trading is halted or otherwise does not have readily available market quotations and remains in the Actual Portfolio. There can be no assurance that the requirements of the NYSE Arca necessary to maintain the listing of the Fund will continue to be met. Because the Fund trades on the basis of a published Proxy Portfolio, it may trade at a wider bid/ask spread and may experience a wider premium/discount than traditional ETFs that publish their portfolios on a daily basis, and therefore, may cost investors more to trade especially during periods of market disruption or volatility. · Tracking Error Risk —Although the Proxy Portfolio is designed to reflect the economic exposure and risk characteristics of the Fund’s Actual Portfolio on any given trading day, there is a risk that the performance of the Proxy Portfolio will diverge from the performance of the Actual Portfolio, potentially materially. Active Management Risk —The Fund’s sub-adviser actively manages the Fund’s investments. Consequently, the Fund is subject to the risk that the investment techniques and risk analyses employed by the Fund’s sub-adviser may not produce the desired results. This could cause the Fund to lose value or its investment results to lag relevant benchmarks or other funds with similar objectives. Currency Risk —Changes in currency exchange rates will affect the value of non-U.S. dollar denominated securities, the value of dividends and interest earned from such securities, and gains and losses realized on the sale of such securities. A strong U.S. dollar relative to these other currencies will adversely affect the value of the Fund’s portfolio. Cybersecurity Risk —Cybersecurity risk is the risk of an unauthorized breach and access to Fund assets, customer data (including private shareholder information), or proprietary information, or the risk of an incident occurring that causes the Fund, its investment adviser or sub-adviser, custodian, transfer agent, distributor or other service provider or a financial intermediary to suffer a data breach, data corruption or lose operational functionality. Successful cyber-attacks or other cyber-failures or events affecting the Fund or its service providers may adversely impact the Fund or its shareholders. Additionally, a cybersecurity breach could aff […] by showing the variability of the Fund’s returns based on net assets and comparing the Fund’s performance to a broad measure of market performance. Updated performance information is available at www.nuveen.com/etf or by calling (800) 257-8787. Management Investment Adviser Nuveen Fund Advisors, LLC Sub-Adviser Santa Barbara Asset Management, LLC (effective December 31, 2021, Nuveen Asset Management, LLC) Portfolio Managers Name Title Portfolio Manager of Fund Since David S. Park, CFA Co-Head of Santa Barbara Asset Management, Portfolio Manager, Director of Research August, 2021 David A. Chalupnik, CFA Co-Head of Santa Barbara Asset Management, Portfolio Manager August, 2021 Purchase and Sale of Fund Shares The Fund is an actively managed, semi-transparent ETF. Shares of the Fund are listed on a national securities exchange and can only be bought and sold in the secondary market through a broker-dealer at market prices. Because Fund shares trade at market prices rather than NAV, shares may trade at a price greater than NAV (at a “ premium ”) or less than NAV (at a “ discount ”). An investor may also incur costs attributable to the difference between the highest price a buyer is willing to pay to purchase Fund shares (bid) and the lowest price a seller is willing to accept for Fund shares (ask) when buying and selling shares in the secondary market (the “ bid/ask spread ”). Recent information regarding the Fund, including its NAV, market price, premiums and d
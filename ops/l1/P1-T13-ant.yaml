ion Basket, along with whether Purchase Orders and Redemption Orders for such Business Day shall be effected on a cash or partial or full in-kind basis, shall be published in accordance with the applicable Fund’s Prospectus subject to any other applicable regulatory restrictions. Appendix (iii) The number of Non-Transparent Shares of a Fund constituting a Creation Unit will be stated in the applicable Fund’s Prospectus; (iv) It may only transact directly with the Trust on an in-kind or partial in-kind basis through an AP Representative with respect Purchase or Redemption Orders of Non-Transparent Shares; (v) Its appointment of an AP Representative may be revoked by the Trust at any time; (vi) It will be liable for all actions of the AP Representative, when acting in its role as agent for the Participant, to the same extent that the Participant would be liable for directly committing that same action under the AP Agreement; (vii) It will submit Purchase Orders or Redemption Orders through an order entry system or in such other manner as may be requested by the Fund’s transfer agent; (viii) Solely with respect to Orders for the purchase or redemption of Creation Units submitted through the CNS Clearing Process by the Participant, the Trust or its designee, will transmit to NSCC and to the AP Representative, on a confidentia […]  by the Participant for which the Trust and Fund elect to carry out on an in-kind basis. The Participant agrees to be bound by the terms of such instructions issued by the Trust or its designee and reported to the AP Representative and to NSCC, on a confidential basis; (ix) Once an Order has been accepted, it will be unconditional and irrevocable by the Participant; (x) Dividends and distribution on Deposit securities that are owed to the Participant because the Participant was the owner of such securities immediately prior to the time at which the securities began trading ex-dividend will be delivered to the AP Representative for the Participant’s Confidential Account; and (xi) A Fund may, in its sole discretion and in compliance with the ActiveShares ® Order, permit or require the substitution of an amount of cash to replace any Deposit Securities. The Participant shall be responsible for any and all expenses and costs incurred by the Fund in connection with a cash-in-lieu election by the Fund. [Signature page follows] Appendix IN WITNESS WHEREOF, the parties have caused this Annex to the AP Agreement to be executed and delivered as of the day and year written below. DATED: [AP] By: Name: Title: [Trust] By: Name: Title: [Distributor] By: Name: Title: Accepted By: [Transfer Agent/] By: Name: Title:

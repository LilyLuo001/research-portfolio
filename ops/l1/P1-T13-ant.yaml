ng in shares of the ETF. While the Proxy Portfolio includes some of the ETF’s holdings, it is not the ETF’s actual portfolio. The differences between this ETF and other ETFs may also have advantages. By keeping certain information about the ETF secret, this ETF may face less risk that other traders can predict or copy its investment strategy. This may improve the ETF’s performance. If other traders are able to copy or predict the ETF’s investment strategy, however, this may hurt the ETF’s performance. For additional information regarding the unique attributes and risks of the ETF, see “Proxy portfolio structure risks,” “Premium/Discount risks,” “Trading halt risks,” and “Authorized Participant risks.” Principal U.S. Listing Exchange: NYSE Arca, Inc. Exchange-traded fund (“ETF”) shares are not individually redeemable. The Securities and Exchange Commission (“SEC”) has not approved or disapproved these securities or passed upon the adequacy of this prospectus. Any representation to the contrary is a criminal offense. Beginning on January 1, 2021, as permitted by SEC regulations, paper copies of the T. Rowe Price funds’ annual and semiannual shareholder reports will no longer be mailed, unless you specifically request them. Instead, the reports will be made available on the funds’ website ( troweprice.com/prospectus ), and you will be notified by mail with a website link to access the reports each time a report is posted to the site. If you already elected to receive reports electronically, you will not be affected by this change and need not take any action. You may elect to receive shareholder reports and other communications from the fund electronically anytime by contacting your financial intermediary (such as a broker dealer, bank, or retirement plan). Alternatively, you may elect to receive paper copies of all future reports free of charge by contacting your financial intermediary. Your election can be changed at any time in the future. Table of Contents 1 SUMMARY Blue Chip Growth ETF 1 2 MORE ABOUT THE FUND Management of the Fund 7 More Information About the Fund’s Investment Objective(s), Strategies, and Risks 8 Portfolio Turnover 16 Financial Highlights 16 Disclosure of Fund Portfolio Information 17 3 SHAREHOLDER I […] viser’s view, are well established in their industries and have the potential for above-average earnings growth. The fund focuses on companies with leading market positions, seasoned management, T. ROWE PRICE 2 and strong financial fundamentals. The fund’s investment approach reflects the adviser’s belief that solid company fundamentals (with an emphasis on the potential for above-average growth) combined with a positive outlook for a company’s industry will ultimately reward investors with strong investment performance. Some of the companies the adviser targets for the fund should have good prospects for dividend growth. The fund may at times invest significantly in stocks of information technology companies. The fund primarily invests in exchange-traded securities that trade synchronously with the fund’s shares, cash, and cash equivalents. The fund may also invest in American Depository Receipts (ADRs) and common stocks listed on a foreign exchange that trade on such exchange synchronously with the fund’s shares (i.e., during the U.S. listing exchange’s trading hours). The fund is an actively-managed, exchange-traded fund (ETF) that does not disclose portfolio holdings daily. In order to provide market participants with information on the fund’s investments, the fund will publish a “Proxy Portfolio” on its website daily. A Proxy Portfolio is a basket of securities that is designed to closely track the daily performance of the fund’s portfolio holdings. While the Proxy Portfolio includes some of the fund’s holdings, it is not the fund’s actual portfolio. The Proxy Portfolio could be a broad-based securities index or the fund’s recently disclosed portfolio holdings. The Proxy Portfolio will be determined such that at least 80% of its total assets will overlap with the portfolio weightings of the fund at the beginning of each trading day (Portfolio Overlap) and the Portfolio Overlap may fluctuate throughout the day. The fund’s Portfolio Overlap is available on the fund’s website daily. Each day, the website will also provide the fund’s Tracking Error, which means the standard deviation over the past three months of the daily proxy spread (i.e., the difference, in percentage terms, between the Proxy Portfolio’s per share NAV and that of the fund at the end of the trading day). In pursuing its investment objective(s), the fund has the discretion to deviate from its normal investment criteria. These situations might arise when the adviser believes a security could increase in value for a variety of reasons, including an extraordinary corporate event, a new product introduction or innovation, a favorable competitive development, or a change in management. In all circumstances, the fund will limit allowable investments to those investments described in the Statement of Additional Information. The fund may sell securities for a variety of reasons, such as to secure gains, limit losses, or redeploy assets into more promising opportunities. Principal Risks As with any fund, there is no guarantee that the fund will achieve its objective(s). The fund’s share price fluctuates, which means you could lose money by investing in the fund. The principal risks of investing in this fund, which may be even greater in bad or uncertain market conditions, are summarized as follows: Proxy portfolio structure risks The fund does not disclose portfolio holdings daily. The fund uses a Proxy Portfolio, which is a basket of securities that is designed to closely track the daily performance of the fund’s portfolio holdings. The fund may not always effectively construct a SUMMARY 3 proxy portfolio that closely tracks the daily performance of the fund’s portfolio holdings. Because the fund uses a Proxy Portfolio, there is a risk that the fund’s shares may trade at a wider bid/ask spread than shares of ETFs that publish their portfolios on a daily basis. This risk is heightened during periods of market disruption and volatility, and, therefore, may cost you more to trade. Although the fund seeks to benefit from keeping its portfolio information confidential, other traders may attempt to use the Proxy Portfolio and publicly available information, including intraday net asset value (INAV) to identify the fund’s trading strategy, which, if successful, could result in such traders engaging in certain predatory trading practices that may have the potential to harm the fund and its shareholders. Because the fund’s shares are traded in the secondary market, a broker may charge a commission to execute a transaction in shares, and you may incur the cost of the spread between the price at which a dealer will buy shares and the somewhat higher price at which a dealer will sell shares. Premium/Discount risks Although the Proxy Portfolio is intended to provide investors with enough information to allow for an effective arbitrage mechanism that will keep the market price of the fund at or close to the underlying net asset value (NAV) per share of the fund, there is a risk (which may increase during periods of market disruption or volatility) that market prices will vary significantly from the underlying NAV per share of the fund. These price differences may be greater for this fund compared to ETFs that disclose holdings daily because it provides different portfolio holdings information to traders. The adviser will monitor on an ongoing basis how shares trade, including the level of any market price premium or discount to NAV and the bid/ask spreads on market transactions. The Board of Directors of the fund (Board) will promptly meet and determine whether to take action if (1) if the Tracking Error exceeds 1.00%; or (2) if, for 30 or more days in any quarter or 15 days in a row: (a) the absolute difference between either the closing price or the bid/ask price, on the one hand, and the fund’s NAV, on the other, exceeds 2.00%, or (b) the bid-ask spread exceeds 2.00%. The Statement of Additional Information provides more information. Trading halt risks It is possible that an active trading market for the shares will not be maintained, or that trading in the shares will be halted for reasons such as market-wide trading halts or the shares no longer meeting the listing requirements of the exchange. If securities representing 10% or more of the fund’s portfolio do not have readily available market quotations, the fund would promptly request the listing exchange to halt trading on the fund. In addition, to the extent T. Rowe Price determines that a security held in a fund’s portfolio but not in the Proxy Portfolio does not have readily available market quotations and such circumstance may affect the reliability of the Proxy Portfolio as an arbitrage vehicle, that information, along with the identity and weighting of that security in the fund’s portfolio, will be publicly disclosed on the fund’s website. Authorized Participant risks Just like ETFs that disclose holdings daily, at certain times, the fund’s shares may have a limited number of active “Authorized Participants,” which are financial institutions that are able to transact daily with the fund to purchase and redeem a large specified number of shares of the fund. To the extent they cannot or otherwise are unwilling to engage in creation and redemption transactions, and no other Authorized Participant steps in, shares of the fund may trade at a significant discount or premium to NAV T. ROWE PRICE 4 and may face trading halts and delisting from the exchange. Additionally, ETFs that do not disclose portfolio holdings daily are novel, which may limit the number of entities willing to act as Authorized Participants during times of market stress. Market conditions risks The value of the fund’s investments may decrease, sometimes rapidly or unexpectedly, due to factors affecting an issuer held by the fund, particular industries, or the overall securities markets. A variety of factors can increase the volatility of the fund’s holdings and markets generally, including political or regulatory developments, recessions, inflation, rapid interest rate changes, war or acts of terrorism, natural disasters, and outbreaks of infectious illnesses or  […] erience. Financial fundamentals Companies should demonstrate faster earnings growth than their competitors and the market in general; high profit margins relative to competitors; strong cash flow; a healthy balance sheet with relatively low debt; and a high return on equity notwithstanding ,a comparatively low dividend payout ratio. Dividend growth and return of MORE ABOUT THE FUND 9 capital through share repurchases are often indicators of strong return on equity, internal capital generation, and the quality of earnings, each of which tend to be supportive of capital growth over time. The fund is an actively-managed ETF that does not disclose portfolio holdings daily, unlike ETFs that disclose holdings daily. The fund invests primarily in exchange-traded securities that trade synchronously with the fund’s shares, cash, and cash equivalents. Daily disclosure of portfolio holdings allows other traders to predict or copy the fund’s investment strategy, which in turn can hurt the fund’s performance. Therefore, the fund discloses portfolio holdings on a quarterly basis, similar to mutual funds. In order to provide market participants with information on the fund’s investments, the fund will publish a “Proxy Portfolio” on its website daily. A Proxy Portfolio is a basket of securities that is designed to closely track the daily performance of the fund’s portfolio holdings. While the Proxy Portfolio includes some of the fund’s holdings, it is not the fund’s actual portfolio. The Proxy Portfolio could be a broad-based securities index or the fund’s recently disclosed portfolio holdings. The Proxy Portfolio can change at any time, but is generally expected to change quarterly. To the extent the adviser determines that a security held in the fund’s portfolio but not in the Proxy Portfolio does not have readily available market quotations and such circumstance may affect the reliability of the Proxy Portfolio as an arbitrage vehicle, that information, along with the identity and weighting of that security in the fund’s portfolio, will be publicly disclosed on the fund’s website. The fund will also provide several portfolio statistics. The Portfolio Overlap is the percentage weight overlap between the holdings of the prior

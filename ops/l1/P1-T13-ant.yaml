      497K 1 tm2211625-5_497k.htm 497K tm2211625-5_497k - none - 2.8281313s ​ To Statutory Prospectus To Statement of Additional Information IndexIQ Active ETF Trust ​ Summary Prospectus May 4, 2022 ​ IQ Winslow Large Cap Growth ETF IWLG This summary prospectus is designed to provide investors with key fund information in a clear and concise format. Before you invest, you may want to review the Fund’s full prospectus, which contains more information about the Fund and its risks. The Fund’s full prospectus dated May 4, 2022 and statement of additional information dated May 4, 2022 are all incorporated by reference into this Summary Prospectus. All this information may be obtained at no cost either: online at newyorklifeinvestments.com/documents; by calling IndexIQ Funds at 888-474-7725 or by sending an email request to info@indexiq.com As permitted by regulations adopted by the Securities and Exchange Commission, paper copies of the Fund’s shareholder reports will no longer be sent by mail, unless you specifically request paper copies of the reports from your financial intermediary, such as a broker-dealer or bank. Instead, the reports will be made available on a website, and you will be  […]  Management, LLC (“Winslow Capital” or the “Subadvisor”) invests substantially all of the Fund’s investable assets in domestic securities. However, the Fund is permitted to invest up to 20% of its net assets in depositary receipts issued by a trust (including American Depositary Receipts (“ADRs”)) of foreign securities and in common stocks listed on a foreign exchange that trade on such exchange contemporaneously with the Shares. Generally, an issuer of a security is considered to be U.S. or foreign-based on the issuer’s “country of risk,” as determined by a third-party service provider such as Bloomberg. The Fund is actively managed and does not intend to track an index. Pursuant to the exemptive relief that allows the Fund to utilize the proxy portfolio structure that is described in greater detail below, the Fund may only invest in securities listed or traded on a national securities exchange that trade contemporaneously with Fund Shares. The Fund is classified as “non-diversified” under the Investment Company Act of 1940, as amended (the “1940 Act”). Investment Process: The Fund invests in those companies that the Subadvisor believes will provide an opportunity for achieving superior portfolio returns (i.e., returns in excess of the returns of the average stock ETF or mutual fund) over the long term. The Subadvisor seeks to invest in companies that have the potential for above-average future earnings and cash flow growth with management focused on shareholder value. 3​ ​ When purchasing stocks for the Fund, the Subadvisor looks for companies typically having some or all of the following attributes: addressing markets with growth opportunities; leads or gains in market share; identifiable and sustainable competitive advantages; managed by a team that can perpetuate the firm’s competitive advantages; high, and preferably rising, returns on invested capital; deploys excess cash flow to enhance shareholder return; and demonstrates sound corporate governance. As part of its qualitative assessment of each potential investment, the Subadvisor evaluates the company’s non-financial performance among certain environmental, social and governance (“ESG”) factors. The Subadvisor then determines which ESG factors may be  […] ed by independent ESG research vendors. The evaluation of ESG factors is integrated as one of several aspects of the Subadvisor’s investment process and the Subadvisor does not forgo potential investments strictly based on the evaluation of ESG factors. The Subadvisor takes a “bottom-up” investment approach when selecting investments. This means it bases investment decisions on company specific factors, not general economic conditions. Under normal market conditions, the Subadvisor employs a sell discipline pursuant to which it may sell some or all of its position in a stock when a stock becomes fully valued, the fundamental business prospects are deteriorating, or the position exceeds limits set by the Subadvisor. Non-Transparent ETF with Proxy Portfolio Structure. While the Fund is an exchange-traded fund (“ETF”), it has characteristics that distinguish it from other types of ETFs. While most ETFs publish their portfolio holdings on a daily basis, the Fund discloses a portfolio transparency substitute—the “Proxy Portfolio”—and certain related information about the relative performance of the Proxy Portfolio and the Fund’s actual portfolio (“Actual Portfolio”) holdings (the “Proxy Portfolio Disclosures”). The Proxy Portfolio will only include securities listed or traded on a national securities exchange that trade contemporaneously with Fund Shares. While the Proxy Portfolio includes some of the Fund’s holdings, it is not the Fund’s Actual Portfolio, and the Fund will not disclose the daily holdings of the Actual Portfolio. The 4 ​ Proxy Portfolio Disclosures are intended to help keep the market price of the Fund’s Shares trading at or close to the underlying net asset value (“NAV”) per Share of the Fund. Although the Fund seeks to benefit from keeping its portfolio information secret, market participants may attempt to use the Proxy Portfolio to identify the Fund’s trading strategy, which if successful, could result in such market participants engaging in certain predatory trading practices that may have the potential to harm the Fund and its shareholders. The Fund’s exemptive relief limits the types of securities in which the Fund can invest, which may constrain the Fund’s ability to implement its investment strategies. Principal Risks As with all investments, there are certain risks of investing in the Fund. The Fund’s Shares will change in value and you could lose money by investing in the Fund. An investment in the Fund does not represent a complete investment program. An investment in the Fund is not a bank deposit and it is not insured or guaranteed by the Federal Deposit Insurance Corporation or any other government agency, the Advisor or any of its affiliates. You should consider carefully the following risks before investing in the Fund. Authorized Participant Concentration Risk Only certain large institutions may engage in creation or redemption transactions directly with the Fund (each, an “Authorized Participant”). The Fund has a limited number of institutions that may act as Authorized Participants on an agency basis (i.e., on behalf of other market participants). To the extent that those Authorized Participants exit the business or are unable to proceed with creation and/or redemption orders with the Fund and no other Authorized Participant is able to step forward to engage in creatio […] may have limited voting rights, and investment restrictions in certain countries may adversely impact the value of depositary receipts. Early Close/Trading Halt Risk If securities representing 10% or more of the Fund’s Actual Portfolio do not have readily available market quotations, the Fund will promptly request that the Exchange halt trading in the Fund’s Shares. Trading halts may have a greater impact on this Fund compared to other ETFs due to the Fund’s nontransparent structure. If the trading of a security held in the Fund’s Actual Portfolio is halted, or otherwise does not have readily available market quotations, and the Advisor believes that the lack of any such readily available market quotations may affect the reliability of the Proxy Portfolio as an arbitrage vehicle, or otherwise determines it is in the best interest of the Fund, the Advisor promptly will disclose on the Fund’s website the identity and weighting of such security for so long as such security’s trading is halted or otherwise does not have readily available market quotations and remains in the Actual Portfolio. Equity Securities Risk Investments in common stocks and other equity securities are particularly subject to the risk of changes in investors’ perceptions of the financial condition of an issuer, conditions affecting equity markets generally and political and/or economic events. Equity prices may also be particularly sensitive to rising interest rates, as the cost of capital rises and borrowing costs increase. Holders of an issuer’s common stock may be subject to 6 ​ greater risks than holders of its preferred stock and debt securities because common stockholders’ claims are subordinated to those of holders of preferred stocks and debt securities upon the bankruptcy of an issuer. Foreign Securities Risk Investments in the securities of non-U.S. issuers involve risks beyond those associated with investments in U.S. securities. These additional risks include greater market volatility, the availability of less reliable financial information, higher transactional and custody costs, taxation by foreign governments, decreased market liquidity and political instability. Some countries and regions have experienced security concerns, war […] olio management risk because it is an actively managed portfolio. In managing the Fund’s investment portfolio, the portfolio managers will apply investment techniques and risk analyses that 9​ ​ may not produce the desired result or, while it may be the desired result, may underperform other types of investment strategies. The application of ESG criteria may result in the Fund (i) having exposure to certain securities or industry sectors that are significantly different than the composition of the Fund’s benchmark; and (ii) performing differently than other funds and strategies in its peer group that do not take into account ESG criteria or the Fund’s benchmark. There can be no guarantee that the Fund will meet its investment objective(s). Proxy Portfolio Risk Unlike traditional ETFs that provide daily disclosure of their portfolio holdings, the Fund does not disclose the daily holdings of the Actual
l be available when sought by the Adviser. While hedging strategies involving derivatives can reduce the risk of loss, they can also reduce the opportunity for gain or even result in losses by offsetting favorable price movements in other Fund investments. Certain derivatives may create a risk of loss greater than the amount invested. Equity Securities. The Funds may invest in equity securities. Equity securities are securities that represent an  […] sectors, such as sovereign debt and emerging market securities. Additionally, the Adviser generally will not assess an issuer for ESG factors altogether if sufficient relevant or reliable information is not readily available. Further, investments in U.S. Treasury securities; cash, cash equivalents and other similar investments; investments made for short-term purposes; collateralized loan obligations; commodities; equities; municipal securities; derivative instruments (irrespective of the reference asset or counter party); and indices (or their components), as well as investments made to obtain broad-based investment exposure or that are required by or integral to a Fund’s investment strategies, are generally not assessed for ESG purposes. Exchange-Traded Notes (“ETNs”). A Fund may invest in ETNs. ETNs have many features of senior, unsecured, unsubordinated debt securities. Their returns are linked to the performance of a particular asset, such as a market index, less applicable fees and expenses. ETNs are listed on an exchange and traded in the secondary market. A Fund may hold the ETN until maturity, at which time the issuer is obligated to pay a return linked to the performance of the relevant asset. ETNs do not typically make periodic interest payments and principal is not protected. The market value of an ETN may be influenced by, among other things, time to maturity, level of supply and demand of the ETN, volatility and lack of liquidity in the underlying assets, changes in the applicable interest rates, the current performance of the asset to which the ETN is linked, and the credit rating of the ETN issuer. ETNs represent an unsecured obligation and therefore carry with them the risk that the counterparty will default and a Fund may not be able to recover the current value of its investment. The market value of an ETN may differ from the performance of the applicable asset and there may be times when an ETN trades at a premium or discount to the underlying asset’s value. This difference in price may be due to the fact that the supply and demand in the market for ETNs at any point in time is not always identical to the supply and demand in the market for the assets on which the ETN’s return is based. A ch

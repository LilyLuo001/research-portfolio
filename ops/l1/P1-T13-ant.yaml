      497 1 fmc497.htm 497 FMC Excelsior Focus Equity ETF FMCX a series of Northern Lights Fund Trust IV STATEMENT OF ADDITIONAL INFORMATION June 28, 2023 As supplemented October 3, 2023 Listed and traded on: the NYSE Arca This Statement of Additional Information (“SAI”) is not a prospectus and should be read in conjunction with the Prospectus of the FMC Excelsior Focus Equity ETF (the “Fund”) dated June 28, 2023. The Fund’s Prospectus is hereby incorporated by reference, which means it is legally part of this document. You can obtain copies of the Fund’s Prospectus, annual or semiannual reports without charge by contacting the Fund’s distributor, Northern Lights Distributors, LLC or by calling the Fund at 1-888-530-2448. You may also obtain a Prospectus by visiting the website www.FMCX.com. TABLE OF CONTENTS THE FUND 1 TYPES OF INVESTMENTS 2 INVESTMENT RESTRICTIONS 7 POLICIES AND PROCEDURES FOR DISCLOSURE OF PORTFOLIO HOLDINGS 8 MANAGEMENT 11 CONTROL PERSONS AND PRINCIPAL HOLDERS 15 INVESTMENT ADVISER AND TRADING SUB-ADVISER 15 THE DISTRIBUTOR 18 PORTFOLIO MANAGER 19 ALLOCATION OF PORTFOLIO BROKERAGE 20 PORTFOLIO TURNOVER 20 OTHER SERVICE PROVIDERS 20 DESCRIPTION OF SHARES 22 ANTI-MONEY […] l make a market in such securities. There can be no assurance that a market will be made or maintained or that any such market will be or remain liquid. The price at which securities may be sold and the value of the Shares will be adversely affected if trading markets for the Fund’s portfolio securities are limited or absent, or if bid/ask spreads are wide. The performance of the Fund may vary due to asset valuation differences. The Fund may fair value certain of the securities it holds, although it is not expected that securities will need to be fair valued because all of the portfolio securities (other than cash equivalents (which are short-term U.S. Treasury securities, government money market funds, and repurchase agreements) ) will be exchange-traded on a regulated, U.S. exchange. There may also be differences between the Fund’s portfolio as a result of legal restrictions, cost or liquidity constraints. Similarly, liquidity constraints also may delay the Fund’s purchase or sale of securities. ActiveShares® Methodology The Fund is an actively managed ETF that utilizes the ActiveShares® methodology licensed from Precidian. The Fund operates in reliance on an exemptive order from the SEC (the “Order”), which incorporates by reference the conditions and restrictions of a previous order issued to Precidian ETFs Trust to permit the operation of ActiveShares. The Order presently limits the types of investments that the Fund may hold to those listed in the application for the Precidian Order. Under the terms of the Order, the Fund is permitted to invest only in the following investments, which, if listed, must trade on a U.S. exchange contemporaneously with the Shares: exchange-traded funds (“ETFs”), exchange-traded notes, exchange-listed common stocks, exchange-traded preferred stocks, exchange-traded American Depositary Receipts (ADRs), exchange-traded real estate investment trusts, exchange-traded commodity pools, exchange-traded metals trusts, exchange-traded currency trusts and exchange-traded futures for which the reference asset is one in which the Fund may invest directly or, in the case of an index future traded on a U.S. exchange, is based on an index, the components of which are a type of asset in which the Fund could invest directly, as well as cash and cash equivalents (which are short-term U.S. Treasury securities, government money market funds, and repurchase agreements). Although the Fund may invest in securities of companies of any capitalization, the Fund will not invest in “penny stocks,” as defined by Rule 3a51-1 under the Exchange Act. The Fund will not borrow for investment purposes or hold short positions. The Fund also will not purchase any securities that 2 are illiquid investments at the time of purchase. The Fund’s investment strategies and practices are subject to these limitations as well as the other limitations described below and in the Prospectus. Securities of Other Investment Companies The Fund may invest in securities issued by other investment companies. The Fund intends to limit its investments in accordance with applicable law or as permitted by Rule 12d1-4. Among other things, such law would limit these investments so that, as determined immediately after a securities purchase is made by the Fund: (a) not more than 5% of the value of its total assets will be invested in the securities of any one investment company (the “5% Limitation”); (b) not more than 10% of the value of its total assets will be invested in the  […] o so, and, in that event, the holders of the remaining shares will be unable to elect any Trustees. Shareholders of the current series of the Trust and any other future series of the Trust will vote in the aggregate and not by series except as otherwise required by law or when the Board determines that the matter to be voted upon affects only the interest of the shareholders of a particular series or classes. Matters such as election of Trustees are not subject to separate voting requirements and may be acted upon by shareholders of the Trust voting without regard to series. The Trust is authorized to issue an unlimited number of shares of beneficial interest. Each share has equal dividend, distribution and liquidation rights. There are no conversion or preemptive rights applicable to any shares of the Fund. All shares issued are fully paid and non-assessable. ANTI-MONEY LAUNDERING PROGRAM The Trust has established an Anti-Money Laundering Compliance Program (the “Program”) as required by the Uniting and Strengthening America by Providing Appropriate Tools Required to Intercept and Obstruct Terrorism Act of 2001 (“USA PATRIOT Act”). To ensure compliance with this law, the Trust’s Program provides for the development of internal practices, procedures and controls, designation of anti-money laundering compliance officers, an ongoing training program and an independent audit function to determine the effectiveness of the Program. The Trust’s secretary serves as its Anti-Money Laundering Compliance Officer. Procedures to implement the Program include, but are not limited to, determining that the Fund’s Distributor and Transfer Agent have established proper anti-money laundering procedures, reporting suspicious and/or fraudulent activity and a providing a complete and thorough review of all new opening account applications. The Trust will not transact business with any person or entity whose identity cannot be adequately verified under the provisions of the USA PATRIOT Act. PURCHASE, REDEMPTION AND PRICING OF SHARES Calculation of Share Price As indicated in the Prospectus under the heading “How Shares are Priced,” investors may buy and sell Shares in secondary market transactions through brokers at market prices an […] he federal income tax status of all distributions. Shareholders should consult their tax advisors about the application of federal, state and local and foreign tax law in light of their particular situation. INDEPENDENT REGISTERED PUBLIC ACCOUNTING FIRM Cohen & Company, Ltd., 342 North Water Street, Suite 830, Milwaukee, Wisconsin 83202, serves as the Fund’s independent registered public accounting firm for the current fiscal year. The firm provides services including (i) audit of annual financial statements, and (ii) assistance and consultation in connection with SEC filings. LEGAL COUNSEL Thompson Hine LLP, 41 South High Street, Suite 1700, Columbus, Ohio 43215, serves as the Trust’s legal counsel. OTHER INFORMATION The Fund utilizes the ActiveShares® methodology licensed from Precidian. Precidian’s products and services are protected by domestic and international intellectual property protections, including, without limitation, the following issued patents and pending patent applications: 7813987, 8285624, 7925562, 13011746, 14528658, 14208966, 16196560. FINANCIAL STATEMENTS The audited financial statements and report of the independent registered public accounting firm required to be included in this SAI are hereby incorporated by reference to the Annual Report for the Fund for the fiscal period ended February 28, 33 2023. You can obtain a copy of the financial statements contained in the Fund’s Annual or Semi-Annual Report without charge by calling the Fund at 1-888-530-2448. 34 Appendix A First Manhattan Co. LLC Proxy Voting Policies and Procedures Background In Proxy Voting by Investment Advisers, Investment Advisers Act Release No. 2106 (January 31, 2003), the SEC noted that, “The federal securities laws do not specifically address how an adviser must exercise its proxy voting authority for its Clients. Under the Advisers Act, however, an adviser is a fiduciary that owes each of its Clients a duty of care and loyalty with respect to all services undertaken on the Client’s behalf, including proxy voting. The duty of care requires an adviser with proxy voting authority to monitor corporate events and to vote the proxies.” Rule 206(4)-6 under the Advisers Act requires each registered investment adviser tha

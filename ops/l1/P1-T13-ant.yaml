      497K 1 acetftmid497k.htm 497K Document Summary Prospectus January 1, 2021 American Century ® Mid Cap Growth Impact ETF Ticker: MID Exchange: NYSE Arca, Inc. Before you invest, you may want to review the fund’s prospectus, which contains more information about the fund and its risks. You can find the fund’s prospectus, reports to shareholders, and other information about the fund online at americancentury.com/etfdocs. You can also get this information at no cost by calling 833-ACI-ETFS or sending an email request to prospectus@americancentury.com. The fund’s prospectus and other information are also available from financial intermediaries through which shares of the fund may be purchased or sold. This fund is different from traditional ETFs. Traditional ETFs tell the public what assets they hold each day. This fund will not. This may create additional risks for your investment. For example: ● You may have to pay more money to trade the fund’s shares. This fund will provide less information to traders, who tend to charge more for trades when they have less information. ● The price you pay to buy fund shares on an exchange may not match the value of the fund’s portfolio. The same is t […] nment in combination with a fundamental growth profile—for each security. The portfolio managers may use commercial third party mapping tools, frameworks provided by sustainable investing platforms, or internal research, which may include engaging with a company’s leadership, to create each security’s SDG impact thesis. To decide whether a security aligns with an SDG, the portfolio managers place the most emphasis on the impact created by the product or service its issuing company produces. This helps the portfolio managers to avoid impact washing—investing in a company that is not truly advancing any of the SDGs, but is attempting to present itself as though it is (i.e. a company with a poor environmental track record touting that it will convert all of its delivery vehicles to clean burning natural gas, or a company with documented human rights abuses publicizing the diversity of its board of directors). While some securities in the fund’s portfolio may align with more than one SDG, to be eligible for selection by the portfolio managers, it is only necessary that a security aligns with one SDG. The fund does not prioritize any SDG over another, and so long as each security maps to at least one SDG, there is no minimum number of SDGs that must be represented in the portfolio. When evaluating a security’s potential for financial return, portfolio managers seek companies with attractive returns on invested capital that are demonstrating or expected to demonstrate long-term business improvement. Analytical indicators helping to identify or forecast signs of business improvement could include accelerating earnings or revenue growth rates, increasing cash flows, or other indications of the relative strength of a company’s business. This analysis supports the portfolio managers’ decisions to buy or hold the stocks of companies that meet their selection criteria and sell the stocks of companies whose characteristics no longer meet their criteria. The fund will invest principally in exchange-traded common stocks. Under normal market conditions, the portfolio managers will invest at least 80% of the fund’s assets in securities of medium capitalization companies that the portfolio managers believe will create impact by aligning with at least one of the SDGs, as described above. The portfolio managers consider medium capitalization companies to include those whose market capitalizations at the time of purchase are within the total capitalization range of the Russell Mid-Cap Growth Index. Though market capitalizations will change from time to time, as of September 30, 2020, the fund considers companies with market capitalizations between $677 million–$46 billion to be medium capitalization companies. The fund may purchase securities of small and large capitalization companies as well. The fund is nondiversified and normally invests in a relatively limited number of companies, generally 20–40 securities. The fund may engage in active and frequent trading of portfolio securities to achieve its principal investment strategies. This may cause higher transaction costs and may affect performance. It may also result in the realization and distribution of capital gains. The fund is an actively managed, nontransparent exchange-traded fund (ETF) that does not seek to replicate the performance of a specified index. In lieu of publishing its portfolio contents (Actual Portfolio) daily, the fund publishes a proxy portfolio (Proxy Portfolio) each day and on its website. There is no minimum overlap required between the Actual Portfolio and the Proxy Portfolio. Principal Risks • Proxy Portfolio Risk - The goal of the Proxy Portfolio is, during all market conditions, to track closely the daily performance of the Actual Portfolio and minimize intra-day misalignment between the performance of the Proxy Portfolio and the performance of the Actual Portfolio. The Proxy Portfolio is designed to reflect the economic exposures and the risk characteristics of the Actual Portfolio on any given trading day. ◦ The Proxy Portfolio methodology is novel and not yet proven as an effective arbitrage mechanism. The effectiveness of the Proxy Portfolio as an arbitrage mechanism is contingent upon, among other things, the fund’s factor model analysis creating a proxy portfolio that performs in a manner substantially identical to the performance of the fund’s actual portfolio. While the Proxy Portfolio may include some of the fund’s holdings, it is not the fund’s Actual Portfolio. ETFs trading on the basis of a published Proxy Portfolio may exhibit wider premiums and discounts, bid/ask spreads, and tracking error than other ETFs using the same investment strategies that publish their portfolios on a daily basis, especially during periods of market disruption or volatility. Therefore, shares of the fund may cost investors more to trade than shares of a traditional ETF. ◦ Each day the fund calculates the overlap between the holdings of the prior Business Day’s Proxy Portfolio compared to the Actual Portfolio (Proxy Overlap) and the difference, in percentage terms, between the Proxy Portfolio per share NAV and that of the Actual Portfolio (Tracking Error). If the Tracking Error becomes large, there is a risk that the performance of the Proxy Portfolio may deviate from the performance of the Actual Portfolio. ◦ The fund’s Board of Trustees monitors its Tracking Error and bid/spread. If deviations become too large, the Board will consider the continuing viability of the fund, whether shareholders are being harmed, and what, if any, corrective measures would be appropriate. See the Statement of Additional Information for further discussion of the Board’s monitoring responsibilities. ◦ Although the fund seeks to benefit from keeping its portfolio information secret, market participants may attempt to use the Proxy Portfolio to identify a fund’s trading strategy, which if successful, could result in such market participants engaging in certain predatory trading practices that may have the potential to harm the fund and its shareholders. • Premium/Discount Risk - Publication of the Proxy Portfolio is not the same level of transparency as the publication of the full portfolio by a fully transparent active ETF. Although the Proxy Portfolio is intended to provide investors with enough information to allow for an effective arbitrage mechanism that will keep the market price of the fund at or close to the underlying net asset value (NAV) per share of the fund, there is a risk (which may increase during periods of market disruption or volatility) that market prices will vary significantly from the underlying NAV of the fund. This means the price paid to buy shares on an exchange may not match the value of the fund’s portfolio. The same is true when shares are sold. • Trading Issues Risk - If securities representing 10% or more of the fund’s Actual Portfolio do not have readily available market quotations, the fund will promptly request that the Exchange halt trading in the fund’s shares. Trading halts may have a greater impact on this fund compared to other ETFs due to the fund’s nontransparent structure. If the trading of a security held in the fund’s Actual Portfolio is halted, or otherwise does not have readily available market quotations, and the Advisor believes that the lack of any such readily available market quotations may affect the reliability of the Proxy Portfolio as an arbitrage vehicle, or otherwise determines it is in the best interest of the fund, the Advisor promptly will disclose on the fund’s website the identity and weighting of such security for so long as such security’s trading is halted or otherwise does not have readily available market quotations and remains in the Actual Portfolio. • Authorized Participant Concentration Risk - Only an authorized participant may engage in creation or redemption transactions directly with the fund. The fund may have a limited number of institutions that act as authorized participants. To the extent that these institutions exit the business or are unable to proceed with creation and/or redemption orders with respect to the fund and no other authorized participant is able to step forward to process creation and/or redemption orders, fund shares may trade at a discount to net asset value (NAV) and possibly face trading halts and/or delisting. This risk may be more pronounced in volatile markets, potentially where there are significant redemptions in ETFs generally. The fact that the fund is offering a novel and unique structure may affect the number of entities willing to act as Authorized Participants. During times of market stress, Authorized Participants may be more likely to step away from this type of ETF than a traditional ETF. • U.N. SDG Criteria Risk - Because the portfolio managers consider the U.N. SDG in stock selection, the fund may exclude the securities of certai

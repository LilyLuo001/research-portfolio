, and it is not possible for the Manager or the other Fund service providers to identify all of the cybersecurity or other operational risks that may affect the Fund or to develop processes and controls to completely eliminate or mitigate their occurrence or effects. Most issuers in which the Fund invests are heavily dependent on computers for data storage and operations, and require ready access to the internet to conduct their business. Thus, cybersecurity incidents could also affect issuers of securities in which the Fund invests, leading to significant loss of value. 11 Table of Contents Other Investment Company Risk . To the extent the Fund invests in other investment companies, including money market funds and exchange-traded funds (ETFs), its performance will be affected by the performance of those other investment companies and to the allocation of its assets among those other investment companies. Investments in other investment companies are subject to the risks of the other investment companies’ investments, as well as to the other investment companies’ expenses. If the Fund invests in other investment companies, the Fund may receive distributions of taxable gains from portfolio transactions by that investment company and may recognize taxable gains from transactions in shares of that investment company, which could be taxable to the Fund’s shareholders when distributed to them. An ETF may trade in the secondary market at a price below the value of its underlying portfolio, may not be liquid and may be halted by the listing exchange. An actively managed ETF’s performance will reflect its adviser’s ability to make investment decisions that are suited to achieving the ETF’s investment objectives. A passively managed ETF may not replicate the performance of the index it intends to track because of, for example, the temporary unavailability of certain index securities in the secondary market or discrepancies between the ETF and the index with respect to the weighting of securities or the number of stocks held. A passively managed ETF may not be permitted to sell poorly performing stocks that are included in its index. Investing in ETFs could incur brokerage and other trading costs

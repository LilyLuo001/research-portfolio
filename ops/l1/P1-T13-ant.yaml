      497K 1 d850240d497k.htm THRIVENT ETF TRUST Thrivent ETF Trust Exchange Traded Funds Dated January 31, 2025 Thrivent Small-Mid Cap Equity ETF NYSE Arca, Inc.: TSME Summary Prospectus This fund is different from traditional ETFs. Traditional ETFs tell the public what assets they hold each day. This fund will not. This may create additional risks for your investment. For example: • You may have to pay more money to trade the fund’s shares. This fund provides less information to traders, who tend to charge more for trades when they have less information. • The price you pay to buy fund shares on an exchange may not match the value of the fund’s portfolio. The same is true when you sell shares. These price differences may be greater for this fund compared to other ETFs because it provides less information to traders. • These additional risks may be even greater in bad or uncertain market conditions. • The fund publishes on its website each day a “Proxy Portfolio” designed to help trading in shares of the fund. While the Proxy Portfolio includes some of the fund’s holdings, it is not the fund’s actual portfolio. The differences between this fund and other ETFs may also have advantages. B […] nd other metrics provided by third-party data sources or the Adviser’s own analysis. This may include more traditional assessments such as profitability, financial stability, and sales trends. The Adviser may also review factors such as the quality of a company’s board of directors or executive leadership team, employee culture, or compensation practices, in each case as compared against industry standards, in making this determination. The Adviser may utilize different third-party vendors at different times and certain factors may be given more or less weight than others. Lower-rated indicators, scores and other metrics in any particular area will not necessarily exclude a company as an eligible investment. The Fund is an actively managed exchange-traded fund (“ETF”) that operates pursuant to an exemptive order (the “Order”) from the Securities and Exchange Commission (the “SEC”) and does not publicly disclose its complete portfolio holdings each business day. Instead, the Fund discloses a “Proxy Portfolio,” which is different from the Fund’s actual portfolio holdings (“Actual Portfolio”). The Proxy Portfolio and certain related information about the Actual Portfolio are disclosed in order to keep the market price of the Fund’s shares trading at or close to the net asset value (“NAV") of the Fund’s shares. The Proxy Portfolio is a basket of cash and securities that is designed to closely track the daily performance of the Fund’s Actual Portfolio. 1 It will include some, but not all, of the Fund’s actual holdings and will include only certain securities that trade on a national securities exchange contemporaneously with the Fund’s shares. The Fund does not require a minimum overlap of holdings between the Proxy Portfolio and the Actual Portfolio. Market participants may attempt to use the Proxy Portfolio to identify the Fund’s trading strategy, which could result in market participants engaging in predatory trading practices that could harm the Fund and its shareholders. The Fund is actively managed and does not seek to replicate the performance of a specified index. The Fund is limited by the Order in the types of securities in which it can invest, which may limit the Fund’s ability to implement its investment strategies. Principal Risks The Fund is subject to the following principal investment risks, which you should review carefully and in entirety. An investment in the Fund is not a deposit or other obligation of Thrivent Trust Company or any bank and is not insured or guaranteed by the Federal Deposit Insurance Corporation or any other federal agency. The Fund may not achieve its investment objective and you could lose money by investing in the Fund. Market Risk. Over time, securities markets generally tend to move in cycles with periods when security prices rise and periods when security prices decline. The value of the Fund’s investments may move with these cycles and, in some instances, increase or decrease more than the applicable market(s) as measured by the Fund’s benchmark index(es). The securities markets may also decline because of factors that affect a particular industry or market sector, or due to impacts from domestic or global events, including regulatory events, economic downturn, government shutdowns, the spread of infectious illness such  […] ignificantly in price, sometimes rapidly or unpredictably, over short or extended periods of time, and such declines may occur because of declines in the equity market as a whole, or because of declines in only a particular country, geographic region, company, industry, or sector of the market. From time to time, the Fund may invest a significant portion of its assets in companies in one particular country or geographic region or one or more related sectors or industries, which would make the Fund more vulnerable to adverse developments affecting such countries, geographic regions, sectors or industries. Equity securities generally do not move in the same direction at the same time and are generally more volatile than most debt securities. Proxy Portfolio Risk. Unlike traditional ETFs that disclose their portfolio holdings on a daily basis, the Fund does not disclose its holdings daily, rather it discloses a Proxy Portfolio. The goal of the Proxy Portfolio, during all market conditions, is to track closely the daily performance of the Actual Portfolio and minimize intra-day misalignment between the performance of the Proxy Portfolio and the performance of the Actual Portfolio. The Proxy Portfolio is designed to reflect the economic exposures and the risk characteristics of the Actual Portfolio on any given trading day. The Proxy Portfolio is intended to provide authorized participants (“Authorized Participants”) (which are members or participants of a clearing agency registered with the SEC, which have a written agreement with the Fund that allows them to place orders for the purchase and redemption of Creation Units) and other market participants with enough information to support an effective arbitrage mechanism that keeps the market price of the Fund at or close to the underlying NAV per share of the Fund. The Adviser has licensed from a third party the right to use a model that will determine the Proxy Portfolio. The Fund’s ability to operate as described herein depends on the quality of that model and the timely and accurate determination of the Proxy Portfolio each day. The Proxy Portfolio methodology is novel, has only been in use for a limited period of time, and is not yet proven as an effective arbitrage mechanism. There can be no assurance that the Proxy Portfolio will function as expected or that it will support an effective arbitrage mechanism, especially under difficult or stressed market conditions, and there can be no assurance that the intellectual property necessary to utilize the Proxy Portfolio will remain available to the Fund. The effectiveness of the Proxy Portfolio as an arbitrage mechanism is contingent upon, among other things, the Proxy Portfolio performing in a manner substantially identical to the performance of the Actual Portfolio and the willingness of Authorized Participants and other market participants to trade based on the Proxy Portfolio. There is no guarantee that this arbitrage mechanism will operate as intended or with the intended effects. The Fund may not function as intended and the market price of its shares may be adversely affected if the licensor of the methodology used to determine the Proxy Portfolio fails to continue to make the intellectual property used to determine the Proxy Portfolio available for use by the Fund. Further, while the Proxy Portfolio may include some of the Fund’s holdings, it is not the Fund’s Actual Portfolio. ETFs trading on the basis of a published Proxy Portfolio may exhibit wider premiums and discounts, bid/ask spreads, and tracking error than other ETFs using the same investment strategies that publish their portfolios on a daily basis, especially during periods of market disruption or volatility. Therefore, shares of the Fund may cost investors more to trade than shares of a traditional ETF. There is also a possibility of additional expenses related to operating the Proxy Portfolio. • Each day the Fund calculates the overlap between the holdings of the prior Business Day’s Proxy Portfolio compared to the Actual Portfolio that formed the basis for the Fund’s calculation of NAV at the end of the prior Business Day (“Proxy Overlap”) and the difference, in percentage terms, between the Proxy Portfolio per share NAV and that of the Actual Portfolio (“Tracking Error”). If the Tracking Error becomes large, there is a risk that the performance of the Proxy Portfolio may deviate from the performance of the Actual Portfolio. • The Fund’s Board of Trustees (the “Board”) receives and reviews quarterly reports containing information about the Fund, including Tracking Error, bid/ask spread and premiums/discounts. If deviations become too large, the Board will consider the continuing viability of the Fund, whether shareholders are being harmed, and what, if any, corrective measures would be appropriate. See the Statement of Additional Information (the “SAI”) for further discussion of the Board’s oversight responsibilities. • Although the Fund seeks to benefit from keeping its portfolio information nontransparent, market participants may attempt to use the Proxy Portfolio to identify the Fund’s trading strategy, which if successful, could result in such market participants engaging in certain predatory trading practices that may have the potential to harm the Fund and its shareholders. The Proxy Portfolio and any related disclosures have been designed to minimize the risk of predatory trading practices, but they may not be successful in doing so. 2 Authorized Participant Concentration Risk. Only an Authorized Participant may engage in creation or redemption transactions directly with the Fund. The Fund may have a limited number of institutions that act as Authorized Participants, none of which are obligated to engage in creation and/or redemption transactions. To the extent that these institutions exit the business or are unable or unwilling to proceed with creation and/or redemption orders with respect to the Fund and no other Authorized Participant is able to step forward to process creation and/or redemption orders, Fund shares may trade at a discount to NAV and possibly face trading halts and/or delisting. This risk may be more pronounced during periods of market volatility or market disruptions. The fact that the Fund is offering a novel and unique structure may result in a fewer number of entities willing to act as Authorized Participants, particularly during times of market volatility. Growth Investing Risk. Growth style investing includes the risk of investing in securities whose prices historically have been more volatile than other securities, especially over the short term. Growth stock prices reflect projections of future earnings or revenues and, if a company’s earnings or revenues fall short of expectations, its stock price may fall dramatically.  […] Fund shares are listed on national securities exchanges, there can be no assurance that an active trading market for Fund shares will develop or be maintained or that any listing will be maintained. If an active market or a listing is not maintained, investors may find it difficult to buy or sell Fund shares. Mid Cap Risk. Medium-sized companies often have greater price volatility, lower trading volume, and less liquidity than larger, more-established companies. These companies tend to have smaller revenues, narrower product lines, less management depth and experience, smaller shares of their product or service markets, fewer financial resources, and less competitive strength than larger companies. Premium/Discount Risk. Publication of the Proxy Portfolio is not the same level of transparency as the publication of the Actual Portfolio by a fully transparent ETF. Although the Proxy Portfolio is intended to provide Authorized Participants and other market participants with enough information to allow for an effective arbitrage mechanism that is intended to keep the market price of the Fund at or close to the underlying NAV per share of the Fund, there is a risk (which may increase during periods of market disruption or volatility) that the market price of the Fund’s shares will vary significantly from the NAV per share of the Fund. This means the price paid to buy shares on an exchange may not match the value of the Fund’s portfolio. The same is true when shares are sold. Small Cap Risk. Smaller, less seasoned companies often have greater price volatility, lower trading volume, and less liquidity than larger, more established companies. These companies tend to have small revenues, narrower product lines, less management depth and experience, small shares of their product or service markets, fewer financial resources, and less competitive strength than larger companies. Such companies seldom pay significant dividends that could soften the impact of a falling market on returns. Tracking Error Risk. Although the Proxy Portfolio is designed to reflect the economic exposure and risk characteristics of the Fund’s Actual Portfolio on any given trading day, there is a risk that the performance of the Proxy Portfolio will

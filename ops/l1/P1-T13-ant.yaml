rge-cap U.S. companies that exhibit ESG characteristics, as described below. The Fund’s sub-adviser employs a fundamental, bottom-up investment process that centers on identifying growth companies which exhibit some or all of the following characteristics: · in an industry with growth potential; · leads or gains market share; · has identifiable and sustainable competitive advantages; · is managed by a team that can perpetuate the company’s competitive advantages; · high, and preferably rising, return on invested capital; · demonstrates sustainable Environmental, Social and Governance (ESG) characteristics; · deploys excess cash flow to enhance shareholder returns; and · demonstrates sound corporate governance. In order to identify investment candidates for the Fund, the sub-adviser begins by quantitatively screening companies in the Russell 1000 ® Index (the “ Index ’) as well as certain companies that exhibit similar financial qualities and market caps but are not otherwise in the Index. The screening process evaluates a company’s financial performance and certain ESG 2 Nuveen Investments performance factors assigned scores by the sub-adviser based on data provided by independent ESG research vendors. The companies that pass this screen are then qualitatively assessed in the context of their respective industries. As part of its qualitative assessment, the sub-adviser evaluates each company’s performance, relative to peers, with respect […]  will do so at all times, and there can be no assurance that the ESG factor evaluation or any judgment exercised by the sub-adviser will reflect the beliefs or values of any particular investor. The sub-adviser’s sell discipline utilizes the same fundamental research process in order to control risk and protect capital. Under normal market conditions, the sub-adviser employs a sell discipline pursuant to which it may sell some or all of its position in a stock when a stock becomes fully valued, the fundamental business prospects are deteriorating, the issuer’s ESG factor performance declines, or the position exceeds limits set by the sub-adviser. The Fund, under normal market conditions, invests at least 80% of the sum of its net assets in exchange-traded equity securities of companies with large capitalizations at the time of purchase. For the purposes of this policy, companies with large capitalizations are defined as companies with market capitalizations in excess of $4 billion at the time of purchase. The Fund may invest up to 20% of its net assets in non-U.S. equity securities listed on a foreign exchange that trade on such exchange contemporaneously with the shares of the Fund. Non-Transparent ETF with Proxy Portfolio Structure. The Fund is a type of exchange-traded fund (“ ETF ”). Unlike traditional ETFs, however, which generally publish their portfolio holdings on a daily basis, the Fund discloses a portfolio transparency substitute—the “ Proxy Portfolio ”— and certain related information about the relative performance of the Proxy Portfolio and the Fund’s actual portfolio (“ Actual Portfolio ”) holdings (the “ Proxy Portfolio Disclosures ”), which are intended to help keep the market price of the Fund’s shares trading at or close to the underlying net asset value (“ NAV ”) per share of the Fund. While the Proxy Portfolio includes some of the Fund’s holdings, it is not the Fund’s Actual Portfolio, Nuveen Investments 3 and the Fund will not disclose the daily holdings of the Actual Portfolio. Although the Fund seeks to benefit from keeping its portfolio information secret, market participants may attempt to use the Proxy Portfolio to identify the Fund’s trading strategy, which if successful, could result in such market participants engaging in certain predatory trading practices that may have the potential to harm the Fund and its shareholders. The Fund’s exemptive relief limits the types of securities in which the Fund can invest, which may constrain the Fund’s ability to implement its investment strategies. The Fund is actively managed and does not intend to track an index. Principal Risks You could lose money by investing in the Fund. An investment in the Fund is not a deposit of a bank and is not insured or guaranteed by the Federal Deposit Insurance Corporation or any other government agency. Each risk summarized below is considered a “principal risk” of investing in the Fund, regardless of the order in which it appears. Proxy Portfolio Structure Risk —Unlike traditional ETFs that provide daily disclosure of their portfolio holdings, the Fund does not disclose the daily holdings of the Actual Portfolio. Instead, the Fund discloses a Proxy Portfolio that is designed to reflect the economic exposure and risk characteristics of the Fund’s Actual Portfolio on any given trading day. Although the Proxy Portfolio and Proxy Portfolio Disclosures are intended to provide Authorized Participants (defined below) and other market participants with enough information to allow them to engage in effective arbitrage transactions that will keep the market price of the Fund’s shares trading at or close to the underlying NAV per share of the Fund, while at the same time enabling them to establish cost-effective hedging strategies to reduce risk, there is a risk that market prices will vary significantly from the underlying NAV of the Fund. See “Premium/Discount Risk.” Similarly, shares of the Fund may trade at a wider bid/ask spread than shares of traditional ETFs, and may therefore be more costly for investors to trade. See “Trading Issues Risk.” Also, the Fund will incur expenses to license the Proxy Portfolio mechanism, which may impact shareholder returns. Additionally, the proxy mechanism itself may result in additional trading costs, which also may negatively impact shareholder returns. In addition, although the Proxy Portfolio is designed to protect the Fund from predatory practices such as front-running and free-riding, market participants may nevertheless be able to use the Proxy Portfolio and Proxy Portfolio Disclosures to engage in trading practices that disadvantage the Fund. See “Predatory Trading Practices Risk.” The Fund will monitor on an ongoing basis the premium/discount between the market price and the NAV of the Fund’s shares, but there can be no assurance that the Proxy Portfolio methodology will operate as intended. The Proxy Portfolio methodology is novel and not yet proven as an effective arbitrage mechanism. The effectiveness of the Proxy Portfolio methodology as an arbitrage mechanism is contingent upon, among other things, the effectiveness of the Fund’s Factor Model analysis in creating a Proxy Portfolio that performs in a manner substantially identical to the performance of the Fund’s Actual Portfolio and the willingness of Authorized Participants and other market participants to trade based on the Proxy Portfolio. In the event that the Proxy Portfolio methodology does not result in effective arbitrage opportunities in the Fund shares, the Fund may exhibit wider premiums/discounts, bid/ask spreads and tracking error. At certain thresholds for such premiums/discounts, bid/ask spreads and tracking error, the Fund’s Board of Trustees will consider possible remedial measures, which may include liquidation or conversion to a fully-transparent, active ETF or a mutual fund. · Premium/Discount Risk —Shares of the Fund are listed for trading on the NYSE Arca, Inc. (the “ NYSE Arca ”) and are bought and sold in the secondary market at market prices that may differ from their most recent NAV. The market value of the Fund’s shares will fluctuate, in some cases materially, in response to changes in the Fund’s NAV, the intraday value of the Fund’s holdings, and the relative supply and demand for the Fund’s shares on the exchange. Although the Proxy Portfolio is intended to provide investors with enough information to allow for an effective arbitrage mechanism that will keep the market price of the Fund at or close to the Fund’s NAV, there is a risk (which may increase during periods of market disruption or volatility) that market prices for Fund shares will vary significantly from the Fund’s NAV. This risk may be greater for the Fund than for traditional ETFs that disclose their full portfolio holdings on a daily basis because the publication of the Proxy Portfolio does not provide the same level of transparency as the publication of the full portfolio by a fully transparent active ETF. This could cause the Fund’s shares to have wider bid/ask spreads and larger premiums/discounts than fully transparent ETFs using the same investment strategies. Disruptions to creations and redemptions, the existence of extreme market volatility or potential lack of an active trading market for shares may result in shares trading at a significant premium or discount to NAV and/or in a reduced liquidity of your investment. During such periods, you may be unable to sell your shares or may incur significant losses if you sell your shares. There are various methods by which investors can purchase and sell shares and various types of orders that may be placed. Investors should consult their financial intermediary before purchasing or selling shares of the Fund. If a shareholder purchases shares at a time when the market price is at a premium to the NAV or sells shares at a time when the market price is at a discount to the NAV, the shareholder may sustain losses. 4 Nuveen Investments · Authorized Participant Concentration Risk —Only certain institutional investors (typically market makers or other broker-dealers) (“ Authorized Participants ”) may engage in creation or redemption transactions directly with the Fund. The Fund has a limited number of institutions that act as Authorized Participants, none of which are or will be obligated to engage in creation or redemption transactions. To the extent that these institutions exit the business or are unable to process creation and/or redemption orders with respect to the Fund and no other Authorized Participant is able to step forward to create or redeem Creation Units, Fund shares may trade at a discount to NAV and possibly face trading halts and/or delisting. The Fund’s novel structure may affect the number of entities willing to act as Authorized Participants, and this risk may be exacerbated during times of market stress. · Predatory Trading Practices Risk —Although the Fund seeks to benefit from keeping its portfolio holdings information secret, market participants may attempt to use the Proxy Portfolio and related Proxy Portfolio Disclosures to identify the Fund’s holdings and trading strategy. If successful, this could result in such market participants engaging in predatory trading practices that could harm the Fund and its shareholders. The Proxy Portfolio and related Proxy Portfolio Disclosures have been designed to mitigate the risk that market participants could “reverse engineer” the Fund’s portfolio and investment strategy, but they may not be successful in this regard. · Trading Issues Risk —Trading in Fund shares on the NYSE Arca may be halted in certain circumstances. If 10% or more of the Fund’s Actual Portfolio does not have readily available market quotations, the Fund will promptly request that the NYSE Arca halt trading in the Fund’s shares. Such trading halts may have a greater impact on the Fund compared to other ETFs due to its lack of transparency. If the trading of a security held in the Fund’s Actual Portfolio is halted or otherwise does not have readily available market quotations and the sub-adviser believes that the lack of any such readily available market quotations may affect the reliability of the Proxy Portfolio as an arbitrage vehicle or otherwise determines it is in the best interest of the Fund, the sub-adviser promptly will disclose on the Fund’s website the identity and weighting of such security for so long as such security’s trading is halted or otherwise does 
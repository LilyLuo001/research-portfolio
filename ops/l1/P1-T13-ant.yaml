capitalization companies. Small-capitalization companies are defined as companies that have market capitalizations within the market capitalization range of the companies in the Russell 2000 ® Index on the last business day of the month in which its most recent reconstitution was completed. Reconstitution of the index currently is completed in June of each year. On June 30, 2023, the range of the index was $24.5 million to $15.9 billion. In selecting stocks, the Fund’s sub-adviser invests in companies that it believes meet one or more of the following criteria: · Attractively valued relative to other companies in the same industry or market. · Strong or improving cash flows, revenue and earnings growth, or other fundamentals. · An identifiable catalyst that could increase the value of the company’s stock over the next one or two years. The Fund’s sub-adviser will generally sell a stock if the stock hits its price target, the company’s fundamentals or competitive position significantly deteriorate, or if a better alternative exists in the marketplace. The Fund may invest up to 15% of its total assets in non-dollar denominated common stocks of non-U.S. issuers listed on a foreign exchange that trade on such exchange contemporaneously with the shares of the Fund (“ foreign common stocks ”). In addition, the Fund may invest up to 25% of its total assets, collectively, in foreign common stocks and dollar-denominated equity securities of non-U.S. issuers that are either listed on a U.S. stock exchange or represented by exchange-traded American depositary receipts that are issued by a U.S. financial institution. Up to 15% of the Fund’s total assets may be invested in the securities of emerging market issuers. 2 Nuveen Investments Non-Transparent ETF with Proxy Portfolio Structure . The Fund is a type of exchange-traded fund (“ ETF ”). Unlike traditional ETFs, however, which generally publish their portfolio holdings on a daily basis, the Fund discloses a portfolio transparency substitute—the “ Proxy Portfolio ”— and certain related information about the relative performance of the Proxy Portfolio and the Fund’s actual portfolio (“ Actual Portfolio ”) holdings (the “ Proxy Portfolio Disclosures ”), which are intended to help keep the market price of the Fund’s shares trading at or close to the underlying net asset value (“ NAV ”) per share of the Fund. While the Proxy Portfolio includes some of the Fund’s holdings, it is not the Fund’s Actual Portfolio, and the Fund will not disclose the daily holdings of the Actual Portfolio. Although the Fund seeks to benefit from keeping its portfolio information secret, market participants may attempt to use the Proxy Portfolio to identify the Fund’s trading strategy, which if successful, could result in such market participants engaging in certain predatory trading practices that may have the potential to harm the Fund and its shareholders. The Fund’s exemptive relief limits the types of securities in which the Fund can invest, which may constrain the Fund’s ability to implement its investment strategies. The Fund is actively managed and does not intend to track an index. Principal Risks You could lose money by investing in the Fund. An investment in the Fund is not a deposit of a bank and is not insured or guaranteed by the Federal Deposit Insurance Corporation or any other government agency. Each risk summarized below is considered a “principal risk” of investing in the Fund, regardless of the order in which it appears. Proxy Portfolio Structure Risk —Unlike traditional ETFs that provide daily disclosure of their portfolio holdings, the Fund does not disclose the daily holdings of the Actual Portfolio. Instead, the Fund discloses a Proxy Portfolio that is designed to reflect the economic exposure and risk characteristics of the Fund’s Actual Portfolio on any given trading day. Although the Proxy Portfolio and Proxy Portfolio Disclosures are intended to provide Authorized Participants (defined b
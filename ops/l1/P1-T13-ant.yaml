” section in the Fund’s Prospectus. Principal Investment Strategies Under normal circumstances, the fund seeks to meet its investment objective by investing at least 80% of its net assets in equity securities or other exchange-traded investments with similar economic characteristics in which it is permitted to invest, of companies with large market capitalizations and which meet its financial and environmental, social and governance (“ESG”) criteria. The fund may also invest in companies that the subadviser believes are making substantial progress toward becoming a leader in ESG policies. Determination of a company’s ESG standards is based on the subadviser’s proprietary research approach. The subadviser will exercise judgment to determine ESG best practices based on its over thirty-year history of managing ESG investment strategies through an established proprietary process. The subadviser utilizes a fundamental, bottom-up research approach that emphasizes company analysis, management and stock selection. The ESG evaluation is integrated into a thorough assessment of investment worthiness based on financial criteria as well as ESG considerations including innovative workplace policies, employee benefits and programs; environmental management system strength, eco-efficiency and life-cycle analysis; community involvement, strategic philanthropy and reputation management; and strong corporate governance and independence of the board. The ESG analysis is conducted by the fundamental analyst platform on a sector-specific basis, and a proprietary ESG rating is assigned to each company. The subadviser seeks to invest over the long term in large-capitalization companies that are considered to be 

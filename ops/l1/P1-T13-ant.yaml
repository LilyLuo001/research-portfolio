ial fact necessary in order to make the statements made, in light of the circumstances under which they are made, not misleading; (C) engage in any act, practice or course of business which would operate as a fraud or deceit upon such Fund; or (D) engage in any manipulative practice with respect to Fund. (2) No Portfolio Manager may purchase or sell, directly or indirectly, any Security as to which such person is a Portfolio Manager in which he had (or by reason of such transaction acquires) any Beneficial Ownership at any time within seven (7) calendar days before or after the time that the same (or a related) Security is being purchased or sold by any Fund. (3) No Special Purpose Investment Personnel may profit in the purchase and sale, or sale and purchase of a Secu

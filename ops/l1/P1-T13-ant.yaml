      ActiveShares ETF Trust 497 2020-09-30 ActiveShares ETF Trust 0001792795 false N-1A 0001792795 2021-01-29 2021-01-29 0001792795 aet:S000067572Member 2021-01-29 2021-01-29 ACTIVESHARES ® ETF TRUST CBOE (TICKER SYMBOL): CFCV SUPPLEMENT DATED JUNE 24, 2021 TO THE SUMMARY PROSPECTUS, PROSPECTUS AND STATEMENT OF ADDITIONAL INFORMATION (THE “SAI”), EACH DATED JANUARY 29, 2021 , AS SUPPLEMENTED, OF CLEARBRIDGE FOCUS VALUE ETF This supplement supersedes and replaces the supplement dated May 6, 2021. On or about July 1, 2021 (the “Effective Date”), ClearBridge Focus Value ETF (the “Fund”) will implement revisions to its name and principal investment strategies to reflect its use of environmental, social and governance (“ESG”) criteria in its security selection process. More detail about these and related changes to the Fund’s Summary Prospectus, Prospectus and SAI are described below. I. Fund Name Change On the Effective Date, the name of the Fund will change from “ClearBridge Focus Value ETF” to “ClearBridge Focus Value ESG ETF.” As a result, on the Effective Date, all references to “ClearBridge Focus Value ETF” in the Fund’s Summary Prospectus, Prospectus and SAI are hereby replaced with “ […] e of company being researched. Methods typically used are discounted cash flow analysis, market implied growth and returns relative to the subadviser’s expectations, multiple comparisons and scenario analysis. The subadviser will sell a security if the issuer no longer meets its financial or ESG criteria. It is also the subadviser’s intention to engage and encourage management to improve in certain ESG areas identified by the subadviser through the sector analysts’ lead engagement. The fund operates in reliance on an exemptive order from the SEC (the “Order”), which limits the types of investments the fund may hold to those listed in the fund’s application for the Order. Under the terms of the Order, the fund is permitted to invest only in exchange-traded funds, exchange-traded notes, exchange listed common stocks, exchange-traded preferred stocks, exchange-traded ADRs, exchange-traded real estate investment trusts, exchange-traded commodity pools, exchange-traded metal trusts, exchange-traded currency trusts and exchange-traded futures that trade on a U.S. exchange contemporaneously with the fund’s shares, as well as cash and cash equivalents (which are short-term U.S. Treasury securities, government money market funds, and repurchase agreements). The fund’s investment strategies and practices, including those listed above, are subject to these limitations. III. Principal Risks Changes On the Effective Date, the ESG investment strategy risk set forth below is hereby added under the heading “Principal risks” in the Fund’s Summary Prospectus and Prospectus and under the heading “More on the fund’s investment strategies, investments and risks – More on risks of investing in the fund” in the Fund’s Prospectus. ESG investment strategy risk. The fund’s ESG investment strategy limits the types and number of investment opportunities available to the fund and, as a result, the fund may underperform other funds that do not have an ESG focus. The fund’s ESG investment strategy may result in the fund investing in securities or industry sectors that underperform the market as a whole, or forgoing opportunities to invest in securities that might otherwise be advantageous to buy. The fund may also underperform other funds that apply different ESG standards. In addition, the subadviser may be unsuccessful in creating a portfolio composed of companies that exhibit positive ESG characteristics. 2 IV. OTHER RELATED DISCLOSURE CHANGES On the Effective Date, the related disclosure changes set forth below are hereby incorporated into the Fund’s Prospectus and SAI, as applicable. • The disclosure below is added as a new section under the heading “More information on the fund’s investment strategies, investments and risks” following the “Investment Objective” section in the Fund’s Prospectus. Principal Investment Strategies Under normal circumstances, the fund seeks to meet its investment objective by investing at least 80% of its net assets in equity securities or other exchange-traded investments with similar economic characteristics in which it is permitted to invest, of companies with large market capitalizations and which meet its financial and environmental, social and governance (“ESG”) criteria. The fund may also invest in companies that the subadviser believes are making substantial progress toward becoming a leader in ESG policies. Determination of a company’s ESG standards is based on the subadviser’s proprietary research approach. The subadviser will exercise judgment to determine ESG best practices based on its over thirty-year history of managing ESG investment strategies through an established proprietary process. The subadviser utilizes a fundamental, bottom-up research approach that emphasizes company analysis, management and stock selection. The ESG evaluation is integrated into a thorough assessment of investment worthiness based on financial criteria as well as ESG considerations including innovative workplace policies, employee benefits and programs; environmental management system strength, eco-efficiency and life-cycle analysis; community involvement, strategic philanthropy and reputation management; and strong corporate governance and independence of the board. The ESG analysis is conducted by the fundamental analyst platform on a sector-specific basis, and a proprietary ESG rating is assigned to each company. The subadviser seeks to invest over the long term in large-capitalization companies that are considered to be 

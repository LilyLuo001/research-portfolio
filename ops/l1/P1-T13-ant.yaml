      497K 1 d480266d497k.htm THRIVENT ETF TRUST Thrivent ETF Trust Exchange Traded Funds October 3, 2022 (as supplemented March 31, 2023) Thrivent Small-Mid Cap ESG ETF NYSE Arca, Inc.: TSME Summary Prospectus This fund is different from traditional ETFs Traditional ETFs tell the public what assets they hold each day. This fund will not. This may create additional risks for your investment. For example: • You may have to pay more money to trade the fund’s shares. This fund will provide less information to traders, who tend to charge more for trades when they have less information. • The price you pay to buy fund shares on an exchange may not match the value of the fund’s portfolio. The same is true when you sell shares. These price differences may be greater for this fund compared to other ETFs because it provides less information to traders. • These additional risks may be even greater in bad or uncertain market conditions. • The fund will publish on its website each day a “Proxy Portfolio” designed to help trading in shares of the fund. While the Proxy Portfolio includes some of the fund’s holdings, it is not the fund’s actual portfolio. The differences between this fund and other ETF […] ny holding that MSCI downgrades to a rating of CCC or B after the Fund purchases it. However, under normal circumstances, the Adviser will dispose of any investment that is downgraded by MSCI to CCC in a manner and time period that it believes is in the Fund’s best interest (including in light of the reason for the downgrade). In addition, the Adviser will re-evaluate whether it remains in the Fund’s best interest to retain an investment in an issuer that MSCI downgrades to B, including in light of the reason for the downgrade. See the section entitled “More About ESG Investing” in the Fund’s prospectus for additional information regarding the Fund’s approach to ESG investing and MSCI’s rating methodologies. The Fund is an actively managed exchange-traded fund (“ETF”) that operates pursuant to an exemptive order (the “Order) from the Securities and Exchange Commission (the “SEC”) and does not publicly disclose its complete portfolio holdings each business date. Instead, the Fund discloses a “Proxy Portfolio,” which is different from the Fund’s actual portfolio holdings (“Actual Portfolio”). The Proxy Portfolio and certain related information about the Actual Portfolio are disclosed in order to keep the market price of the Fund’s shares trading at or close to the net asset value (“NAV") of the Fund’s shares. The Proxy Portfolio is a basket of cash and securities that is designed to closely track the daily performance of the Fund’s Actual Portfolio. It will include some, but not all, of the Fund’s actual holdings and will include only certain securities that trade on a national securities exchange contemporaneously with the Fund’s shares. The Fund will not require a minimum overlap of holdings between the Proxy Portfolio and the Actual Portfolio. Market participants may attempt to use the Proxy Portfolio to identify the Fund’s trading strategy, which could result in market participants engaging in predatory trading practices that could harm the Fund and its shareholders. The Fund is actively managed and does not track an index. The Fund is limited by the Order in the types of securities in which it can invest, which may limit the Fund’s ability to implement its investment strategies. Principal Risks The Fund is subject to the following principal investment risks, which you should review carefully and in entirety. The Fund may not achieve its investment objective and you could lose money by investing in the Fund. Proxy Portfolio Risk. Unlike traditional ETFs that disclose their portfolio holdings on a daily basis, the Fund does not disclose its holdings daily, rather it discloses a Proxy Portfolio. The goal of the Proxy Portfolio, during all market conditions, is to track closely the daily performance of the Actual Portfolio and minimize intra-day misalignment between the performance of the Proxy Portfolio and the performance of the Actual Portfolio. The Proxy Portfolio is designed to reflect the economic exposures and the risk characteristics of the Actual Portfolio on any given trading day. The Proxy Portfolio is intended to provide Authorized Participants (which are members or participants of a clearing agency registered with the SEC, which have a written agreement with the Fund that allows them to place orders for the purchase and redemption of Creation Units) and other market participants with enough information to support an effective arbitrage mechanism that keeps the market price of the Fund at or close to the underlying NAV per share of the Fund. The Adviser has licensed from a third party the right to use a model that will determine the Proxy Portfolio. The Fund’s ability to operate as described herein depends on the quality of that model and the timely and accurate determination of the Proxy Portfolio each day. The Proxy Portfolio methodology is novel, has only been in use for a limited period of time, and is not yet proven as an effective arbitrage mechanism. There can be no assurance that the Proxy Portfolio will function as expected or that it will support an effective arbitrage mechanism, especially under difficult or stressed market conditions, and there can be no assurance that the intellectual property necessary to utilize the Proxy Portfolio will remain available to the Fund. The effectiveness of the Proxy Portfolio as an arbitrage mechanism is contingent upon, among other things, the Proxy Portfolio performing in a manner substantially identical to the performance of the Actual Portfolio and the willingness of Authorized Participants and other market participants to trade based on a Proxy Portfolio. There is no guarantee that this arbitrage mechanism will operate as intended or with the intended effects. The Fund may not function as intended and the market price of its shares may be adversely affected if the licensor of the methodology used to determine the Proxy Portfolio fails to continue to make the intellectual property used to determine the Proxy Portfolio available for use by the Fund. Further, while the Proxy Portfolio may include some of the Fund’s holdings, it is not the Fund’s Actual Portfolio. ETFs trading on the basis of a published Proxy Portfolio may exhibit wider premiums and discounts, bid/ask spreads, and tracking error than other ETFs using the same investment strategies that publish their portfolios on a daily basis, especially during periods of market disruption or volatility. Therefore, shares of the Fund may cost investors more to trade than shares of a traditional ETF. There is 2 also a possibility of additional expenses related to operating the Proxy Portfolio. • Each day the Fund calculates the overlap between the holdings of the prior Business Day’s Proxy Portfolio compared to the Actual Portfolio that formed the basis for the Fund’s calculation of NAV at the end of the prior Business Day (“Proxy Overlap”) and the difference, in percentage terms, between the Proxy Portfolio per share NAV and that of the Actual Portfolio (“Tracking Error”). If the Tracking Error becomes large, there is a risk that the performance of the Proxy Portfolio may deviate from the performance of the Actual Portfolio. • The Fund’s Board of Trustees (the “Board”) monitors its Tracking Error, bid/ask spread and premiums/discounts. If deviations become too large, the Board will consider the continuing viability of the Fund, whether shareholders are being harmed, and what, if any, corrective measures would be appropriate. See the Statement of Additional Information for further discussion of the Board’s monitoring responsibilities. • Although the Fund seeks to benefit from keeping its portfolio information secret, market participants may attempt to use the Proxy Portfolio to identify the Fund’s trading strategy, which if successful, could result in such market participants engaging in certain predatory trading practices that may have the potential to harm the Fund and its shareholders. The Proxy Portfolio and any related disclosures have been designed to minimize the risk of predatory trading practices, but they may not be successful in doing so. Premium/Discount Risk. Publication of the Proxy Portfolio is not the same level of transparency as the publication of the Actual Portfolio by a fully transparent ETF. Although the Proxy Portfolio is intended to provide Authorized Participants and other market participants with enough information to allow for an effective arbitrage mechanism that is intended to keep the market price of the Fund at or close to the underlying NAV per share of the Fund, there is a risk (which may increase during periods of market disruption or volatility) that the market price of the Fund’s shares will vary significantly from the NAV per share of the Fund. This means the price paid to buy shares on an exchange may not match the value of the Fund’s portfolio. The same is true when shares are sold. Equity Security Risk. Equity securities held by the Fund may decline significantly in price, sometimes rapidly or unpredictably, over short or extended periods of time, and such declines may occur because of declines in the equity market as a whole, or because of declines in only a particular country, geographic region, company, industry, or sector of the market. From time to time, the Fund may invest a significant portion of its assets in companies in one particular country or geographic region or one or more related sectors or industries, which would make the Fund more vulnerable to adverse developments affecting such countries, geographic regions, sectors or industries. Equity securities are generally more volatile than most debt securities. Market Risk. Over time, securities markets generally tend to move in cycles with periods when security prices rise and periods when securi […]  at a discount to NAV and possibly face trading halts and/or delisting. This risk may be more pronounced during periods of market volatility or market disruptions. The fact that the Fund is offering a novel and unique structure may result in a fewer number of entities willing to act as authorized participants, particularly during times of market volatility. Trading Halt Risk. If securities representing 10% or more of the Fund’s Actual Portfolio do not have readily available market quotations, the Fund will promptly request that the listing exchange halt trading in the Fund’s shares which means that investors would not be able to trade their shares. Trading halts may have a greater impact on the Fund compared to other ETFs due to the Fund’s semi-transparent structure. If the trading of a security held in the Fund’s Actual Portfolio is halted, or otherwise does not have readily available market quotations, and the Adviser believes that the lack of any such readily available market quotations may affect the reliability of the Proxy Portfolio as an arbitrage vehicle, or otherwise determines it is in the best interest of the Fund, the Adviser will promptly disclose on the Fund’s website the identity and weighting of such security for so 3 long as such security’s trading is halted or otherwise does not have readily available market quotations and remains in the Actual Portfolio. Tracking Error Risk. Although the Proxy Portfolio is designed to reflect the economic exposure and risk characteristics of the Fund’s Actual Portfolio on any given trading day, there is a risk that the performance of the Proxy Portfolio will diverge from the performance of the Actual Portfolio, potentially materially. Mid Cap Risk. Medium-sized companies often have greater price volatility, lower trading volume, and less liquidity than larger, more-established companies. These companies tend to have smaller revenues, narrower product lines, less management depth and experience, smaller shares of their product
      N-1A/A 1 d706092dn1aa.htm THRIVENT ETF TRUST Thrivent ETF Trust As filed with the Securities and Exchange Commission on April 29, 2022. 1933 Act Registration No. 333-261454 1940 Act Registration No. 811-23759 SECURITIES AND EXCHANGE COMMISSION Washington, DC 20549 FORM N-1A REGISTRATION STATEMENT UNDER THE SECURITIES ACT OF 1933 ☒ Pre-Effective Amendment No. 2 ☒ Post-Effective Amendment No. ☐ and/or REGISTRATION STATEMENT UNDER THE INVESTMENT COMPANY ACT OF 1940 ☒ Amendment No. 2 ☒ (Check appropriate box or boxes) THRIVENT ETF TRUST (Exact Name of Registrant as Specified in Declaration of Trust) 901 Marquette Avenue, Suite 2500 Minneapolis, Minnesota 55402-3211 (612) 844-7190 Name and Address of Agent for Service John D. Jackson Secretary Thrivent ETF Trust 901 Marquette Avenue, Suite 2500 Minneapolis, Minnesota 55402-3211 C opies to: Brian D. McCabe Ropes & Gray LLP Prudential Tower 800 Boylston Street Boston, Massachusetts 02199 Jeremy C. Smith Ropes & Gray LLP 1211 Avenue of the Americas New York, New York 11036 Approximate Date of proposed public offering: As soon as practicable after the effective date of this Registration Statement. TO THE SECURITIES AND EXCHANGE COMMISSION:  […] aditional ETFs Traditional ETFs tell the public what assets they hold each day. This fund will not. This may create additional risks for your investment. For example: • You may have to pay more money to trade the fund’s shares. This fund will provide less information to traders, who tend to charge more for trades when they have less information. • The price you pay to buy fund shares on an exchange may not match the value of the fund’s portfolio. The same is true when you sell shares. These price differences may be greater for this fund compared to other ETFs because it provides less information to traders. • These additional risks may be even greater in bad or uncertain market conditions. • The fund will publish on its website each day a “Proxy Portfolio” designed to help trading in shares of the fund. While the Proxy Portfolio includes some of the fund’s holdings, it is not the fund’s actual portfolio. The differences between this fund and other ETFs may also have advantages. By keeping certain information about the fund secret, this fund may face less risk that other traders can predict or copy its investment strategy. This may improve the fund’s performance. If other traders are able to copy or predict the fund’s investment strategy, however, this may hurt the fund’s performance. For additional information regarding the unique attributes and risks of the fund, see the later discussion on “Proxy Portfolio Risk,” “Authorized Participant Concentration Risk,” “Premium/Discount Risk” and “Trading Halt Risk” in the “Principal Risks” and “Glossary of Principal Risks” sections of this prospectus. The Securities and Exchange Commission has not approved or disapproved these securities or determined if this prospectus is truthful or complete. Any representation to the contrary is a criminal offense. Shares of Thrivent ETF Trust are not deposits or other obligations of Thrivent Trust Company or any bank or insured or otherwise protected by the Federal Deposit Insurance Corporation or any other federal agency. Shares of Thrivent ETF Trust are subject to investment risk, including possible loss of the principal amount invested. Table of Contents Page Summary Section Thrivent Small-Mid Cap ESG ETF 2 More About Investment Strategies and Risks 6 Information About Certain Non-Principal Investment Strategies 6 More About ESG Investing 6 Differences Between Investing in an ETF and a Mutual Fund 7 Glossary of Principal Risks 7 Management of the Fund 12 Investment Adviser 12 Management Fees 12 Portfolio Management 12 Other Service Providers 12 Personal Securities Investments 12 Trademarks and Disclaimers 12 Shareholder Information 14 How to Contact Us 14 Buying and Selling Shares 14 Book Entry 14 Share Trading Prices 14 Calculating Net Asset Value 15 Rule 1
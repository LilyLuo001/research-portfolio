igned to help trading in shares of the ETF. While the Proxy Portfolio includes some of the ETF’s holdings, it is not the ETF’s actual portfolio. The differences between this ETF and other ETFs may also have advantages. By keeping certain information about the ETF secret, this ETF may face less risk that other traders can predict or copy its investment strategy. This may improve the ETF’s performance. If other traders are able to copy or predict the ETF’s investment strategy, however, this may hurt the ETF’s performance. For additional information regarding the unique attributes and risks of the ETF, see the later discussion on the Proxy Portfolio and the risks of the Fund below. Beginning on January 1, 2021, as permitted by regulations adopted by the SEC, paper copies of shareholder reports will no longer be sent by mail, unless you specifically request paper copies of the reports from the Fund or from your financial intermediary, such as a broker-dealer or bank. Instead, the reports will be made available on the Fund’s website, and you will be notified by mail each time a report is posted and provided with a website link to access the report. If you wish to continue receiving paper copies of your shareholder reports after January 1, 2021, you can inform the Fund at any time by calling 1-800-458-7452. If you hold your account with a financial intermediary and you wish to continue receiving paper copies after January 1, 2021, you should call your financial intermediary directly. Paper copies are provided free of charge, and your election to receive reports in paper will apply to all funds held with the Natixis Funds complex. If you have already elected to receive shareholder reports electronically, you will not be affected by this change and you need not take any action. You currently may elect to receive shareholder reports and other communications from the Fund or your financial intermediary electronically at www.icsdelivery.com/natixisfunds. The SEC has not approved or disapproved the Fund’s shares or determined whether this Prospectus is truthful or complete. Any representation to the contrary is a  […] out Goals and Strategies 5 Natixis __ ETF 5 Differences Between Investing in an ETF and a Mutual Fund 8 Differences Between the Fund and a Traditional ETF 8 More Information About the Fund's Strategies 9 Management Team 10 Meet the Fund's Investment Adviser and Subadviser 10 Meet the Fund's Portfolio Managers 10 Other Service Providers 10 Additional Information 11 Shareholder Information 12 Buying and Selling Shares 12 Investments by Registered Investment Companies 12 Frequent Purchases and Redemptions of Fund Shares 12 Payment to Broker-Dealers and Other Financial Intermediaries 12 Share Prices 13 Net Asset Value 13 Distributions 14 Book Entry 14 Creations and Redemptions 14 Taxation 15 Other Information 16 Premium/Discount Information 16 Proxy Portfolio and Proxy Overlap 16 Continuous Offering 16 Conflicts of Interest 17 Financial Performance 17 Financial Performance 17 Fund shares are not bank deposits and are not guaranteed, endorsed or insured by the Federal Deposit Insurance Corporation or any other government agency, and are subject to investment risks, including possible loss of the principal invested. Fund Summary Natixis [ ] ETF Investment Goal The Fund seeks long-term capital appreciation. Fund Fees & Expenses The following table describes the fees and expenses that you may pay if you buy, hold, and sell shares of the Fund. You may pay other fees, such as brokerage commissions and other fees to financial intermediaries, which are not reflected in the table. If such expenses were reflected, the expenses set forth below would be higher. Annual Fund Operating Expenses (expenses that you pay each year as a percentage of the value of your investment) ETF Management fees [ ]% Distribution and/or service (12b-1) fees [ ]% Other expenses [ ]% Total annual fund operating expenses [ ]% Fee waiver and/or expense reimbursement 1 [ ]% Total annual fund operating expenses after fee waiver and/or expense reimbursement [ ]% 1 Natixis Advisors, L.P. (“Natixis Advisors” or the “Adviser”) has given a binding contractual undertaking to the Fund to limit the amount of the Fund’s total annual fund operating expenses to ___% of the Fund’s average daily net assets, exclusive of brokerage expenses, interest expense, taxes, a […] pany management ownership. Once [ ] identifies a stock that it believes is selling at a significant discount to [ ] estimate of intrinsic value and that the issuer has one or more of the additional qualities mentioned above, [ ] generally will consider buying that security for the Fund. [ ] usually will sell a security when the price approaches its estimated value or the issuer’s fundamentals change. [ ] monitors each holding and adjusts its price targets as warranted to reflect changes in the issuer’s fundamentals. ETF Structure. The Fund is a type of exchange traded fund (“ETF”). Unlike traditional ETFs, however, which generally publish their portfolio holdings on a daily basis, the Fund discloses a portfolio transparency substitute—the “Proxy Portfolio”—and certain related information about the relative performance of the Proxy Portfolio and the Fund’s actual portfolio holdings (the “Proxy Portfolio Disclosures”), which are intended to help keep the market price of the Fund’s shares trading at or close to the underlying net asset value (“NAV”) per share of the Fund. While the Proxy Portfolio includes some of the Fund’s holdings, it is not the Fund’s actual portfolio. The purpose of disclosing the Proxy Portfolio rather than the Fund’s full portfolio holdings is to protect the Fund and its shareholders against the risk that market participants could use the daily disclosure of the Fund’s portfolio holdings to identify the Fund’s trading strategy and engage in certain predatory trading practices (such as “front-running” or “free riding”). The Fund’s exemptive relief limits the types of securities in which the Fund can invest, which may constrain the Fund’s ability to implement its investment strategies and may disadvantage the Fund. Principal Investment Risks The principal risks of investing in the Fund are summarized below. The Fund does not represent a complete investment program. You may lose money by investing in the Fund. Market/Issuer Risk: The market value of the Fund’s investments will move up and down, sometimes rapidly and unpredictably, based upon overall market and economic conditions, as well as a number of reasons that directly relate to the issuers of the Fund’s investments, such as management performance, financial condition and demand for the issuers’ goods and services. Focused Investment Risk: Because the Fund may invest in a small number of industries or securities, it may have more risk because the impact of a single economic, political or regulatory occurrence may have a greater adverse impact on the Fund’s NAV. Equity Securities Risk: The value of the Fund’s investments in equity securities could be subject to unpredictable declines in the value of individual securities and periods of below-average performance in individual securities or in the equity market as a whole. In the event an issuer is liquidated or declares bankruptcy, the claims of owners of the issuer’s bonds generally take precedence over the claims of those who own preferred stock or common stock. Proxy Portfolio Structure Risk: Unlike traditional ETFs that provide daily disclosure of their portfolio holdings, the Fund discloses a Proxy Portfolio that is designed to reflect the economic exposure and risk characteristics of the Fund’s actual portfolio on any given trading day. Although the Proxy Portfolio and Proxy Portfolio Disclosures are intended to provide Authorized Participants and other market participants with enough information to allow them to engage in effective arbitrage transactions that will keep the market price of the Fund’s shares trading at or close to the underlying NAV per share of the Fund, while at the same time enabling them to establish cost-effective hedging strategies to reduce risk, there is a risk that market prices will vary significantly from the underlying NAV of the Fund. See “Premium/Discount Risk.” Similarly, shares of the Fund may trade at a wider bid/ask spread than shares of traditional ETFs, and may therefore be more costly for investors to trade. See “Trading Issues Risk.” Also, the Proxy Portfolio mechanism may result in additional trading costs and/or higher bid/ask spreads, which could negatively impact returns to shareholders. In addition, although the Proxy Portfolio is designed to protect the Fund, market participants may be able to use the Proxy Portfolio and Proxy Portfolio Disclosures to engage in trading practices that disadvantage the Fund. See “Predatory Trading Practices Risk.” The Fund will monitor on an ongoing basis the premium/discount between the market price and the NAV of the Fund’s shares, but there can be no assurance that the Proxy Portfolio methodology will operate as intended. In the event that the Proxy Portfolio methodology does not result in effective arbitrage opportunities in the Fund shares, the Fund may take appropriate remedial measures, which may include liquidation or conversion to a fully-transparent, active ETF or a mutual fund. Premium/Discount Risk: Shares of the Fund are listed for trading on the NYSE Arca, Inc. (the “NYSE Arca”) and are bought and sold in the secondary market at market prices that may differ from their most recent NAV. The market value of the Fund’s shares will fluctuate, in some cases materially, in response to changes in the Fund’s NAV, the intraday value of the Fund’s holdings, and the relative supply and demand for the Fund’s shares on the exchange. Although the Proxy Portfolio is intended to provide Authorized Participants and other market participants with enough information to allow for an effective arbitrage mechanism that will keep the market price of the Fund at or close to the Fund’s NAV, there is a risk (which may increase during periods of market disruption or volatility) that market prices for Fund shares will vary significantly from the Fund’s NAV. This risk may be greater for the Fund than for traditional ETFs that disclose their full portfolio holdings on a daily basis. Disruptions to creations and redemptions, the existence of extreme market volatility or potential lack of an active trading market for shares may result in shares trading at a significant premium or discount to NAV and/or in a reduced liquidity of your investment. During such periods, you may be unable to sell your shares or may incur significant losses if you sell your shares. These are various methods by which investors can purchase and sell shares and various types of orders that may be placed. Investors should consult their financial intermediary before purchasing or selling shares of the Fund. If a shareholder purchases shares at a time when the market price is at a premium to the NAV or sells shares at a time when the market price is at a discount to the NAV, the shareholder may sustain losses. 2 Back To Table of Contents Fund Summary Authorized Participant Concentration Risk: Only an authorized participant (“Authorized Participant”) may engage in c […] der approval and at a time that may not be favorable for all shareholders. Smaller ETFs will have a lower public float and lower trading volumes, leading to wider bid/ask spreads. Operational Risk: The Fund is exposed to operational risk arising from a number of factors, including but not limited to human error, processing and communication errors, errors of the Fund’s service providers, market makers, listing exchange, Authorized Participants or the issuers of securities in which the Fund invests or with which they do business, failed or inadequate processes and technology or systems failures. Predatory Trading Practices Risk: Although the Fund seeks to protect its portfolio holdings information, market participants may attempt to use the Proxy Portfolio and related Proxy Portfolio Disclosures to identify the Fund’s holdings and trading strategy. If successful, this could result in such market participants engaging in predatory trading practices that could harm the Fund and its shareholders. The Proxy Portfolio and related Proxy Portfolio Disclosures have been designed to minimize the risk that market participants could “reverse engineer” the Fund’s portfolio and investment strategy, but they may not be successful in this regard. Secondary Market Trading Risk: Investors buying or selling shares of the Fund in the secondary market will pay brokerage commissions or other charges imposed by broker-dealers as determined by that broker. Brokerage commissions are often a fixed amount and may be a significant proportional cost for investors seeking to buy or sell relatively small amounts of shares. Trading Issues Risk: Trading in shares on the NYSE Arca may be halted in certain circumstances. There can be no assurance that the requirements of the NYSE Arca necessary to maintain the listing of the Fund will continue to be met. Because the Fund trades on the basis of a published Proxy Portfolio, it may trade at a wider bid/ask spread than traditional ETFs that publish their portfolios on a daily basis, and therefore, may cost investors more to trade. Risk/Return Bar Chart and Table Because the Fund has not yet completed a full calendar year, information related to Fund performance, including a bar chart showing annual 

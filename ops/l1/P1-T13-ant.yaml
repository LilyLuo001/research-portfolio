holding taxes also may apply and errors and delays may occur in the settlement process for foreign securities. Futures Contract Risk. The value of a futures contract tends to increase and decrease in tandem with the value of the underlying instrument. The price of futures can be highly volatile; using them could lower total return, and the potential loss from futures can exceed the Fund’s initial investment in such contracts. In addition, the value of the futures contract may not accurately track the value of the underlying instrument. High-Yield Risk. High-yield securities – commonly known as “junk bonds” – to which the Fund is exposed are considered predominantly speculative with respect to the issuer’s continuing ability to make principal and interest payments. If the issuer of the security is in default with respect to interest or principal payments, the value of the Fund may be negatively affected. High-yield securities generally have a less liquid resale market. Investment Adviser Risk. The Fund is actively managed and the success of its investment strategy depends significantly on the skills of the Adviser in assessing the potential of the investments in which the Fund invests. This assessment of investments may prove incorrect, resulting in losses or poor performance, even in rising markets. There is also no guarantee that the Adviser will be able to effectively implement the Fund’s investment objective. Issuer Risk. Issuer risk  […] otential for higher political and economic risks, lack of reliable information and fluctuations in currency exchange rates where investments are denominated in currencies other than the U.S. dollar. Certain events in foreign markets may adversely affect foreign and domestic issuers, including interruptions in the global supply chain, market closures, war, terrorism, natural disasters and outbreak of infectious diseases. Foreign securities also may be more difficult to resell than comparable U.S. securities because the markets for foreign securities are often less liquid. Even when 14 a foreign security increases in price in its local currency, the appreciation may be diluted by adverse changes in exchange rates when the security’s value is converted to U.S. dollars. Foreign withholding taxes also may apply and errors and delays may occur in the settlement process for foreign securities. Securities of foreign companies in which the Fund invests generally carry more risk than securities of U.S. companies. The economies and financial markets of certain regions—such as Latin America, Asia, Europe and the Mediterranean region—can be highly interdependent and may decline at the same time. Certain European countries in which a Fund may invest have recently experienced significant volatility in financial markets and may continue to do so in the future. The potential departure of one or more countries from the European Union, such as the United Kingdom’s departure from the European Union (“EU”) (commonly known as “Brexit”), may have significant political and financial consequences for global markets and may adversely impact Fund performance. The long-term impact of Brexit is unknown and the risks related to Brexit could be more pronounced if one or more additional EU member states seek to leave the EU. Other risks result from the varying stages of economic and political development of foreign countries; the differing regulatory environments, trading days, and accounting standards of foreign markets; and higher transaction costs. The Fund’s investment in any country could be subject to governmental actions such as capital or currency controls, nationalizing a company or industry, expropriating assets, or imposing punitiv […] ares is a taxable event. This includes redemptions where you are paid in securities. Your sales, redemptions and exchanges of Fund shares, including those paid in securities or other instruments, usually will result in a taxable capital gain or loss to you, equal to the difference between the amount you receive for your shares (or are deemed to have received in the case of exchanges) and your adjusted tax basis in the shares, which is generally the amount you paid (or are deemed to have paid in the case of exchanges) for them. Any such capital gain or loss generally will be long-term capital gain or loss if you have held your Fund shares for more than one year at the time of sale or exchange. In certain circumstances, capital losses may be converted from short-term to long-term; in other circumstances, capital losses may be disallowed under the “wash sale” rules. Back-up Withholding By law, the Funds must withhold 24% of your distributions and proceeds as a prepayment of federal income tax if you have not provided complete, correct taxpayer information. Authorized Participants Purchasing and Redeeming in Creation Units An Authorized Participant that exchanges equity securities for one or more Creation Units will generally recognize a gain or a loss on the exchange. The gain or loss will be equal to the difference between (i) the market value of the Creation Unit(s) at the time and, (ii) the exchanger’s aggregate basis in the securities surrendered plus (or minus) any cash component paid (or received). A person who redeems one or more Creation Units for equity securities will generally recognize a gain or loss equal to the difference between (i) the exchanger’s basis in the Creation Unit(s) and, (ii) the aggregate market value of the securities received plus (or minus) any cash component received (or paid). Any capital gain or loss realized upon a redemption of one or more Creation Units is generally treated as long-term capital gain or loss if the Creation Unit(s) have been held for more than one year and as short-term capital gain or loss if they have been held for one year or less. Authorized Participants exchanging securities for Creation Units or redeeming Creation Units should consult with their own tax ad […] e master demand notes. Variable rate master demand notes are unsecured instruments that permit the indebtedness thereunder to vary and provide for periodic adjustments in the interest rate. These notes are normally not traded, and there is no secondary market for the notes. However, a Fund may demand payment of the principal for such Fund at any time. If an issuer of a variable rate master demand note defaulted on its payment obligation, a Fund might not be able to dispose of the note due to the absence of a secondary market. A Fund might suffer a loss to the extent of the default. 10 Derivatives Derivatives are financial instruments whose value derives from another security, an index, an interest rate or a currency. The Fund may invest in exchange-traded futures and may, but is not required to, use a number of exchange-traded derivative instruments for risk management purposes or to seek to enhance investment returns. Exchange-traded futures are U.S. listed futures contracts where the future contract’s reference asset is an asset that the Fund could invest in directly, or in the case of an index future, is based on an index of a type of asset that the Fund could invest in directly. All future contracts that the Fund may invest in will be traded on a U.S. futures exchange. While hedging can guard against potential risks, using derivatives adds to the Fund’s expenses and can eliminate some opportunities for gains. There is also a risk that a derivative intended as a hedge may not perform as expected. For example, the price or value of the underlying instrument, asset, index, currency or rate may move in a different direction than expected or such movements may be of a magnitude greater or less than expected. Another risk with derivatives is that some types can amplify a gain or loss, thereby creating investment exposure greater than the initial investment. For example, futures contracts can allow the Fund to obtain large investment exposures in return for meeting relatively small margin requirements. As a result, investments in such transactions may be highly leveraged, and the Fund could potentially earn or lose substantially more money than the actual cost (if any) incurred when the derivative is entered into 

      497K 1 tm2319108-11_497k.htm 497K tm2319108-11_497k - none - 2.1250117s ​ To Statutory Prospectus To Statement of Additional Information IndexIQ Active ETF Trust ​ Summary Prospectus August 31, 2023 ​ IQ Winslow Large Cap Growth ETF IWLG This ETF is different from traditional ETFs. Traditional ETFs tell the public what assets they hold each day. This ETF will not. This may create additional risks for your investment. For example: • You may have to pay more money to trade the ETF’s shares. This ETF will provide less information to traders, who tend to charge more for trades when they have less information. ​ • The price you pay to buy ETF shares on an exchange may not match the value of the ETF’s portfolio. The same is true when you sell shares. These price differences may be greater for this ETF compared to other ETFs because it provides less information to traders. ​ • These additional risks may be even greater in bad or uncertain market conditions. ​ • The ETF will publish on its website each day a “Proxy Portfolio” designed to help trading in shares of the ETF. While the Proxy Portfolio includes some of the ETF’s holdings, it is not the ETF’s actual portfolio. ​ The differences  […]  Management, LLC (“Winslow Capital” or the “Subadvisor”) invests substantially all of the Fund’s investable assets in domestic securities. However, the Fund is permitted to invest up to 20% of its net assets in depositary receipts issued by a trust (including American Depositary Receipts (“ADRs”)) of foreign securities and in common stocks listed on a foreign exchange that trade on such exchange contemporaneously with the Shares. Generally, an issuer of a security is considered to be U.S. or foreign-based on the issuer’s “country of risk,” as determined by a third-party service provider such as Bloomberg. The Fund is actively managed and does not intend to track an index. Pursuant to the exemptive relief that allows the Fund to utilize the proxy portfolio structure that is described in greater detail below, the Fund may only invest in securities listed or traded on a national securities exchange that trade contemporaneously with Fund Shares. The Fund is classified as “non-diversified” under the Investment Company Act of 1940 (the “1940 Act”). Investment Process: The Fund invests in those companies that the Subadvisor believes will provide an opportunity for achieving superior portfolio returns (i.e., returns in excess of the returns of the average stock ETF or mutual fund) over the long term. The Subadvisor seeks to invest in companies that have the potential for above-average future earnings and cash flow growth with management focused on shareholder value. 3​ ​ When purchasing stocks for the Fund, the Subadvisor looks for companies typically having some or all of the following attributes: addressing markets with growth opportunities; leads or gains in market share; identifiable and sustainable competitive advantages; managed by a team that can perpetuate the firm’s competitive advantages; high, and preferably rising, returns on invested capital; deploys excess cash flow to enhance shareholder return; and demonstrates sound corporate governance. As part of its qualitative assessment of each potential investment, the Subadvisor evaluates the company’s non-financial performance among certain environmental, social and governance (“ESG”) factors. The Subadvisor then determines which ESG factors may be material to  […] isor based on data provided by independent ESG research vendors. The evaluation of ESG factors is integrated as one of several aspects of the Subadvisor’s investment process and the Subadvisor does not forgo potential investments strictly based on the evaluation of ESG factors. The Subadvisor takes a “bottom-up” investment approach when selecting investments. This means it bases investment decisions on company specific factors, not general economic conditions. Under normal market conditions, the Subadvisor employs a sell discipline pursuant to which it may sell some or all of its position in a stock when a stock becomes fully valued, the fundamental business prospects are deteriorating, or the position exceeds limits set by the Subadvisor. Semi-Transparent ETF with Proxy Portfolio Structure While the Fund is an exchange-traded fund (“ETF”), it has characteristics that distinguish it from other types of ETFs. While most ETFs publish their portfolio holdings on a daily basis, the Fund discloses a portfolio transparency substitute — the “Proxy Portfolio” — and certain related information about the relative performance of the Proxy Portfolio and the Fund’s actual portfolio (“Actual Portfolio”) holdings (the “Proxy Portfolio Disclosures”). The Proxy Portfolio will only include securities listed or traded on a national securities exchange that trade contemporaneously with Fund Shares. While the Proxy Portfolio includes some of the Fund’s holdings, it is not the Fund’s Actual Portfolio, and the Fund will not disclose the daily 4 ​ holdings of the Actual Portfolio. The Proxy Portfolio Disclosures are intended to help keep the market price of the Fund’s Shares trading at or close to the underlying net asset value (“NAV”) per Share of the Fund. Although the Fund seeks to benefit from keeping its portfolio information secret, market participants may attempt to use the Proxy Portfolio to identify the Fund’s trading strategy, which if successful, could result in such market participants engaging in certain predatory trading practices that may have the potential to harm the Fund and its shareholders. The Fund’s exemptive relief limits the types of securities in which the Fund can invest, which may constrain the Fund’s ability to implement its investment strategies. Principal Risks As with all investments, there are certain risks of investing in the Fund. The Fund’s Shares will change in value and you could lose money by investing in the Fund. An investment in the Fund does not represent a complete investment program. An investment in the Fund is not a bank deposit and it is not insured or guaranteed by the Federal Deposit Insurance Corporation or any other government agency, the Advisor or any of its affiliates. You should consider carefully the following risks before investing in the Fund. Authorized Participant Concentration Risk Only certain large institutions may engage in creation or redemption transactions directly with the Fund (each, an “Authorized Participant”). The Fund has a limited number of institutions that may act as Authorized Participants on an agency basis (i.e., on behalf of other market participants). To the extent that those Authorized Participants exit the business or are unable to proceed with creation and/or redemption orders with the Fund and no other Authorized Participant is able to step forward to engage in creatio […]  in the equity securities of an issuer. Depositary receipts may be less liquid than the underlying shares in their primary trading market. Any distributions paid to the holders of depositary receipts are usually subject to a fee charged by the depositary. Holders of depositary receipts may have limited voting rights, and investment restrictions in certain countries may adversely impact the value of depositary receipts. Early Close/Trading Halt Risk If securities representing 10% or more of the Fund’s Actual Portfolio do not have readily available market quotations, the Fund will promptly request that the Exchange halt trading in the Fund’s Shares. Trading halts may have a greater impact on this Fund compared to other ETFs due to the Fund’s semi-transparent structure. If the trading of a security held in the Fund’s Actual Portfolio is halted, or otherwise does not have readily available market quotations, and the Advisor believes that the lack of any such readily available market quotations may affect the reliability of the Proxy Portfolio as an arbitrage vehicle, or otherwise determines it is in the best interest of the Fund, the Advisor promptly will disclose on the Fund’s website the identity and weighting of such security for so long as such security’s trading is halted or otherwise does not have readily available market quotations and remains in the Actual Portfolio. Equity Securities Risk Investments in common stocks and other equity securities are particularly subject to the risk of changes in investors’ perceptions of the financial condition of an issuer, conditions affecting equity markets generally and political and/or economic events. Equity prices may also be particularly sensitive to rising interest rates, as the cost of capital rises and borrowing costs increase. Holders of an issuer’s common stock may be subject to 6 ​ greater risks than holders of its preferred stock and debt securities because common stockholders’ claims are subordinated to those of holders of preferred stocks and debt securities upon the bankruptcy of an issuer. Foreign Securities Risk Investments in the securities of non-U.S. issuers involve risks beyond those associated with investments in U.S. securities. These additional ri

      497K 1 dgx_497k-030126.htm SUMMARY PROSPECTUS SUMMARY Prospectus March 1, 2026 T. ROWE PRICE TDVG Dividend Growth ETF This ETF is different from traditional ETFs. Traditional ETFs tell the public what assets they hold each day. This ETF will not. This may create additional risks for your investment. For example: You may have to pay more money to trade the ETF’s shares. This ETF will provide less information to traders, who tend to charge more for trades when they have less information. The price you pay to buy ETF shares on an exchange may not match the value of the ETF’s portfolio. The same is true when you sell shares. These price differences may be greater for this ETF compared to other ETFs because it provides less information to traders. These additional risks may be even greater in bad or uncertain market conditions. The ETF will publish on its website each day a “Proxy Portfolio” designed to help trading in shares of the ETF. While the Proxy Portfolio includes some of the ETF’s holdings, it is not the ETF’s actual portfolio. The differences between this ETF and other ETFs may also have advantages. By keeping certain information about the ETF secret, this ETF may face less ri […]  indicator of financial health and growth prospects, and that over the long term, income can contribute significantly to total return. Dividends can also help reduce the fund’s volatility during periods of market turbulence and help offset losses when stock prices are falling. The adviser’s research analysts look for stocks with sustainable, above-average growth in earnings and dividends. When appropriate, the portfolio manager may attempt to buy stocks when they are temporarily out of favor or undervalued by the market. Holdings tend to be in large- and mid-cap companies. At times, the fund may have a significant portion of its assets invested in the same economic sector. The fund primarily invests in common stocks, but may also invest in exchange-traded securities that trade synchronously with the fund’s shares, cash, and cash equivalents. The fund may also invest in American Depositary Receipts (ADRs) and common stocks listed on a foreign exchange that trade on such exchange synchronously with the fund’s shares (i.e., during the U.S. listing exchange’s trading hours). In selecting investments, the adviser generally favors companies that it believes possess one or more of the following: ● either a track record of, or the potential for, above-average earnings and dividend growth; ● a competitive current dividend yield; ● a sound balance sheet and solid cash flow to support future dividend increases; ● a sustainable competitive advantage and leading market position; and ● attractive valuations, such as low price/earnings, price/cash flow, or price/sales ratios. The fund is an actively-managed, exchange-traded fund (ETF) that does not disclose portfolio holdings daily. In order to provide market participants with information on the fund’s investments, the fund publishes a “Proxy Portfolio” on its website daily. A Proxy Portfolio is a basket of securities that is designed to closely track the daily performance of the fund’s portfolio holdings. While the Proxy Portfolio includes some of the fund’s holdings, it is not the fund’s actual portfolio. The Proxy Portfolio could be based on a broad-based securities index or the fund’s recently disclosed portfolio holdings. The fund’s Portfolio Overlap is available on the fund’s website daily. The Portfolio Overlap is the percentage weight overlap between the holdings of the prior business day’s Proxy Portfolio compared to the holdings of the fund that formed the basis for the fund’s calculation of net asset value (NAV) at the end of the prior business day. Principal Risks As with any fund, there is no guarantee that the fund will achieve its objective(s). The fund’s share price fluctuates, which means you could lose money by investing in the fund. The principal risks of investing in this fund, which may be even greater in unfavorable or uncertain market conditions, are summarized as follows: Proxy portfolio structure: The fund does not disclose portfolio holdings daily. The fund uses a Proxy Portfolio, which is a basket of securities that is designed to closely track the daily performance of the fund’s portfolio holdings. The fund may not always effectively construct a Proxy Portfolio that closely tracks the daily performance of the fund’s portfolio holdings. Because the fund uses a Proxy Portfolio, there is a risk that the fund’s shares may trade at a wider bid-ask spread than shares of ETFs that disclose their portfolio holdings daily. This risk is heightened during periods of market disruption and volatility, and, therefore, may cost you more to trade. Although the fund seeks to benefit from keeping its portfolio information confidential, other traders may attempt to use the Proxy Portfolio and publicly available information, including intraday net asset value (INAV), to identify the fund’s trading strategy, which, if successful, could result in such traders engaging in certain predatory trading practices that may have the potential to harm the fund and its shareholders. Because the fund’s shares are traded in the secondary market, a broker may charge a commission to execute a transaction in shares, and you may incur the cost of the spread between the price at which a dealer will buy shares and the somewhat higher price at which a dealer will sell shares. Summary 3 Premium/Discount: Although the Proxy Portfolio is intended to provide investors with enough information to allow for an effective arbitrage mechanism that will keep the market price of the fund at or close to the underlying NAV per share of the fund, there is a risk (which may increase during periods of market disruption or volatility) that market prices will vary significantly from the underlying NAV per share of the fund. These price differences may be greater for this fund compared to ETFs that
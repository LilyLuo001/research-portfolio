at of the fund at the end of the trading day). The Proxy Portfolio and these other metrics described are intended to provide investors and traders with enough information to allow for an effective arbitrage mechanism, which keeps the market price of the fund’s shares at or close to the underlying NAV per share of the fund. The premium or discount may be greater for each fund compared to traditional ETFs because it provides less portfolio holdings information to traders. During periods of market disruption or volatility, there may be an increased risk that market prices will vary significantly from the underlying NAV per share of each fund. Each fund’s shares may trade at a wider bid/ask spread than shares of ETFs that publish their portfolios on a daily basis, especially during periods of market disruption or volatility, and, therefore, may cost you more to trade. Although each fund seeks to benefit from keeping its portfolio information confidential, other traders may attempt to use the Proxy Portfolio and other publicly available information to identify the fund’s trading strategy, which, if successful, could result in such traders engaging in certain predatory trading practices that may have the potential to harm such fund and its shareholders. Because each fund’s shares are traded in the secondary market, a broker may charge a commission to execute a transaction in shares, and you may incur the cost of the spread between the price at which a dealer will buy shares and the somewhat higher price at which a dealer will sell shares. Each fund’s website provides additional information about the Proxy Portfolio; the prior business day’s NAV and the closing price or bid/ask price of shares; a calculation of the premium/discount of the closing price or bid/ask price against such NAV; bid-ask spread information; any other information regarding premiums and discounts as may be required for other ETFs under Rule 6c-11 under the 1940 Act; and certain analytical information 
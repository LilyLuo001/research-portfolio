ng in shares of the fund. While the Proxy Portfolio includes some of the fund’s holdings, it is not the fund’s actual portfolio. The differences between this fund and other ETFs may also have advantages. By keeping certain information about the fund secret, this fund may face less risk that other traders can predict or copy its investment strategy. This may improve the fund’s performance. If other traders are able to copy or predict the fund’s investment strategy, however, this may hurt the fund’s performance. For additional information regarding the unique attributes and risks of the fund, see the later discussion on “Proxy Portfolio Risk,” “Authorized Participant Concentration Risk,” “Premium/Discount Risk” and “Trading Halt Risk” in the “Principal Risks” and “Glossary of Principal Risks” sections of this prospectus. The Securities and Exchange Commission has not approved or disapproved these securities or determined if this prospectus is truthful or complete. Any representation to the contrary is a criminal offense. Shares of Thrivent ETF Trust are not deposits or other obligations of Thrivent Trust Company or any bank or insured or otherwise protected by the Federal Deposit Insurance Corporation or any other federal agency. Shares of Thrivent ETF Trust are subject to investment risk, including possible loss of the principal amount invested. Table of Contents Page Summary Section Thrivent Small-Mid Cap ESG ETF 2 More About Investment Strategies and Risks 7 Information About Certain Non-Principal Investment Strategies 7 More About ESG Investing 7 Differences Between Investing in an ETF and a Mutual Fund 8 Glossary of Principal Risks 9 Management of the Fund 13 Investment Adviser 13 Management Fees 13 Portfolio Management 13 Other Service Providers 13 Personal Securities Investments 13 Trademarks and Disclaimers 13 Shareholder Information 15 Buying and Selling Shares 15 Book Entry 15 Share Trading Prices 15 Calculating Net Asset Value 15 Rule 12b-1 Fees 16 Policy R
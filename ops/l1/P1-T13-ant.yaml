ee months of the daily proxy spread (i.e., the difference, in percentage terms, between the Proxy Portfolio’s per share NAV and that of the fund at the end of the trading day). The Proxy Portfolio and these other metrics described are intended to provide investors and traders with enough information to allow for an effective arbitrage mechanism, which keeps the market price of the fund’s shares at or close to the underlying NAV per share of the fund. The premium or discount may be greater for each fund compared to traditional ETFs because it provides less portfolio holdings information to traders. During periods of market disruption or volatility, there may be an increased risk that market prices will vary significantly from the underlying NAV per share of each fund. Each fund’s shares may trade at a wider bid-ask spread than shares of ETFs that publish their portfolios on a daily basis, especially during periods of market disruption or volatility, and, therefore, may cost you more to trade. Although each fund seeks to benefit from keeping its portfolio information confidential, other traders may attempt to use the Proxy Portfolio and other publicly available information to identify the fund’s trading strategy, which, if successful, could result in such traders engaging in certain predatory trading practices that may have the potential to harm such fund and its shareholders. Because each fund’s shares are traded in the secondary market, a broker may charge a commission to execute a transaction in shares, and you may incur the cost of the spread between the price at which a dealer will buy shares and the somewhat higher price at which a dealer will sell shares. Each fund’s website provides additional information about the Proxy Portfolio; the prior business day’s NAV and the closing price or bid-ask price of shares; a calculation of the premium/discount of the closing price or bid-ask price against such NAV; bid-ask spread information; any other information regarding premiums and discounts as may be required for other ETFs under Rule 6c-11 under the 1940 Act; and certain analytical information described above (Portfolio Overlap, Daily Deviation, Empirical Percentiles, and Tracking Error). T. Rowe Price will monitor on an ongoing basis how shares trade, including the level of any market price premium or discount to NAV and the bid-ask spreads on market transactions. T. Rowe Price will promptly call a meeting of a fund’s Board (defined below) (and will present recommendations for appropriate remedial measures) and the Board will promptly meet (1) if the Tracking Error exceeds 1.00%; or (2) if, for 30 or more days in any quarter or 15 days in a row: (a) the absolute difference between either the closing price or the bid-ask price, on the one hand, and the fund’s NAV, on the other, exceeds 2.00%, or (b) the bid-ask spread exceeds 2.00%. In such a circumstance, the Board will consider the continuing viability of the fund, whether shareholders are being harmed, and what, if any, action would be appropriate to, among other things, narrow the 3 premium/discount or spread, as applicable. The Board will then decide whether to take any such action. Such actions may include, but are not limited to, changing lead market makers, listing the fund on a different exchange, changing the size of Creation Units, changing the construction of the Proxy Portfolio, changing the fund’s investment objective or strategy, or liquidating the fund. In addition, to the extent T. Rowe Price determines that a security held in a fund’s portfolio but not in the Proxy Portfolio does not have readily available market quotations and such circumstance may affect the reliability of the Proxy Portfolio as an arbitrage vehicle, that information, along with the identity and weighting of that security in the fund’s portfolio, will be publicly disclosed on the fund’s website. If securities representing 10% or more of a fund’s portfolio do not have readily available market quotations, T. Rowe Price would promptly request the listing exchange to halt trading on the fund. EXCHANGE LISTING AND TRADING A discussion of exchange listing and trading matters associated with an investment in each fund is contained in the Shareholder Information section of each fund’s prospectus. The discussion below supplements, and should be read in conjunction with, that section of the applicable prospectus. Shares of each fund are listed for trading, and trade throughout the day, on the applicable listing exchange and in other secondary markets. Shares of certain funds may also be listed on certain non-U.S. exchanges, although the principal listing exchange is a U.S. exchange. There can be no assurance that the requirements of the listing exchange necessary to maintain the listing of shares of any fund will continue to be met. The exchange may, but is not required to, remove shares from listing if, for example, an event occurs or condition exists that, in the opinion of the exchange, makes further dealings on the exchange inadvisable. The exchange will remove shares from listing and trading upon termination of the fund. The Corporation reserves the right to adjust the share prices of t […] Price; Vice President, T. Rowe Price Group, Inc. and T. Rowe Price Trust Company None (a) All information about the interested directors was current as of December 31, 2023, unless otherwise indicated, except for the number of portfolios overseen, which is current as of the date of this SAI. Term of Office and Length of Time Served The directors serve until retirement, resignation, or election of a successor. The following table shows the year from which each director has served on the fund’s Board. Corporation Number of Portfolios Independent Directors Bazemore Bianchetto Duncan Gerrard McBride Parrell Walker Exchange Traded Funds 17 2019 2023 2019 2019 2019 2023 2021 Corporation Number of Portfolios Interested Directors Oestreicher Veiel Exchange-Traded Funds 17 2019 2
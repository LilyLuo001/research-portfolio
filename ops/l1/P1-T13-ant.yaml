io holdings on a daily basis, the Fund discloses a portfolio transparency substitute—the “ Proxy Portfolio ”— and certain related information about the relative performance of the Proxy Portfolio and the Fund’s actual portfolio (“ Actual Portfolio ”) holdings (the “ Proxy Portfolio Disclosures ”), which are intended to help keep the market price of the Fund’s shares trading at or close to the underlying net asset value (“ NAV ”) per share of the Fund. While the Proxy Portfolio includes some of the Fund’s holdings, it is not the Fund’s Actual Portfolio, and the Fund will not disclose the daily holdings of the Actual Portfolio. Although the Fund seeks to benefit from keeping its portfolio information secret, market participants may attempt to use the Proxy Portfolio to identify the Fund’s trading strategy, which if successful, could result in such market participants engaging in certain predatory trading practices that may have the potential to harm the Fund and its shareholders. The Fund’s exemptive relief limits the types of securities in which the Fund can invest, which may constrain the Fund’s ability to implement its investment strategies. The Fund is actively managed and does not intend to track an index. Principal Risks You could lose money by investing in the Fund. An investment in the Fund is not a deposit of a bank and is not insured or guaranteed by the Federal Deposit Insurance Corporation or any other government agency. Each risk summarized below is considered a “principal risk” of investing in the Fund, regardless of the order in which it appears. Proxy Portfolio Structure Risk —Unlike traditional ETFs that provide daily disclosure of their portfolio holdings, the Fund does not disclose the daily holdings of the Actual Portfolio. Instead, the Fund discloses a Proxy Portfolio that is designed to reflect the economic exposure and risk characteristics of the Fund’s Actual Portfolio on any given trading day. Although the Proxy Portfolio and Proxy Portfolio D
ated risks. Unlike most actively managed ETFs, the Fund does not provide daily disclosure of its -4- portfolio holdings. Instead, the Fund provides a verified intraday indicative value (“ VIIV ”), calculated and disseminated every second throughout the trading day. The VIIV is intended to provide investors with an intraday highly-correlated per share value of the Fund that can be compared to the current market price. The VIIV is designed to provide sufficient information to allow for an effective arbitrage mechanism that will keep the market price of the Fund’s shares trading at or close to the underlying net asset value (“ NAV ”) per share of the Fund. Shares traded on an intraday basis on an exchange, however, will not have a fixed relationship to the previous day’s or the current day’s NAV. There is, however, a risk, which may increase during periods of market disruption or volatility, that market prices will vary significantly from the underlying NAV of the Fund. Similarly, because the Fund’s shares trade with reference to a published VIIV, they may trade at a wider bid/ask spread when compared to shares of ETFs that publish their portfolios on a daily basis, especially during periods of market disruption or volati

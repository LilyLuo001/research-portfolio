s of the Order, the Fund may invest only in ETFs, exchange-traded notes, exchange-traded common stocks, common stocks listed on a foreign exchange that trade on such exchange contemporaneously with the Fund’s shares, exchange-traded preferred stocks, exchange-traded American depositary receipts, exchange-traded real estate investment trusts, exchange-traded commodity pools, exchange-traded metals trusts, exchange-traded currency trusts and exchange-traded futures that trade contemporaneously with Fund shares, as well as cash and cash equivalents. This section provides additional information about some of the securities and other practices in which the Fund may engage, along with their associated risks. Information about Certain Non-Principal Investment Strategies Defensive Investing. In response to market, economic, political or other conditions, the Fund may invest without limitation in cash, preferred stocks, or investment-grade debt securities for temporary defensive purposes that are not part of the Fund’s principal investment strategies. If the Fund does this, different factors could affect the Fund’s performance and it may not achieve its investment objective. Exchange Traded Funds. An ETF is an investment company that trades on a securities exchange and holds a portfolio of investments generally desi

t disclose portfolio holdings daily. In order to provide market participants with information on the fund’s investments, the fund publishes a “Proxy Portfolio” on its website daily. A Proxy Portfolio is a basket of securities that is designed to closely track the daily performance of the fund’s portfolio holdings. While the Proxy Portfolio includes some of the fund’s holdings, it is not the fund’s actual portfolio. The Proxy Portfolio could be based on a broad-based securities index or the fund’s recently disclosed portfolio holdings. The fund’s Portfolio Overlap is available on the fund’s website daily. The Portfolio Overlap is the percentage weight overlap between the holdings of the prior business day’s Proxy Portfolio compared to the holdings of the fund that formed the basis for the fund’s calculation of net asset value (NAV) at the end of the prior business day. Principal Risks As with any fund, there is no guarantee that the fund will achieve its objective(s). The fund’s share price fluctuates, which means you could lose money by investing in the fund. The principal risks of investing in this fund, which may be even greater in unfavorable or uncertain market conditions, are summarized as follows: Proxy portfolio structure: The fund does not disclose portfolio holdings daily. The fund uses a Proxy Portfolio, which is a basket of securities that is designed to closely track the daily performance of the fund’s portfolio holdings. The fund may not always effectively construct a Proxy Portfolio that closely tracks the daily performance of the fund’s portfolio holdings. Because the fund uses a Proxy Portfolio, there is a risk that the fund’s shares may trade at a wider bid-ask spread than shares of ETFs that disclose their portfolio holdings daily. This risk is heightened during periods of market disruption and volatility, and, therefore, may cost you more to trade. Although the fund seeks to benefit from keeping its portfolio information confidential, other traders may attempt to use the Proxy Portfolio and publicly available information, including intraday net asset value (INAV), to identify the fund’s trading strategy, which, if successful, could result in such traders engaging in certain predatory trading practices that may have the potential to harm the fund and its shareholders. Because the fund’s shares are traded in the secondary market, a broker may charge a commission to execute a transaction in shares, and you may incur the cost of the spread between the price at which a dealer will buy shares and the somewhat higher price at which a dealer will sell shares. Premium/Discount: Although the Proxy Portfolio is intended to provide investors with enough information to allow for an effective arbitrage mechanism that will keep the market price of the fund at or close to the underlying NAV per share of the fund, there is a risk (which may increase during periods of market disruption or volatility) that market prices will vary significantly from the underlying NAV per share of the fund. These price differences may be greater for this fund compared to ETFs that disclose portfolio holdings daily because it provides different portfolio holdings information to traders. The adviser will monitor on an ongoing basis how shares trade, including the level of any market price premium or discount to NAV and the bid-ask spreads on market transactions. Each day, the website provides the fund’s Tracking Error, which means the standard deviation over the past three months of the daily proxy spread (i.e., the difference, in percentage terms, between the Proxy Portfolio’s per share NAV and that of the fund at the end of the trading day). SUMMARY 1 Trading halt: It is possible that an active trading market for the shares will not be maintained, or that trading in the shares will be halted for reasons such as market-wide trading halts or the shares no longer meeting the listing requirements of the listing exchange. If securities representing 
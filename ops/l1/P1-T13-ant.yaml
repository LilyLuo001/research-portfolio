      N-1A/A 1 gamco-n1aa_011321.htm FORM N-1A/A Securities Act File No. 333-238109 Investment Company Act File No. 812-15036 As filed with the Securities and Exchange Commission on January 13, 2021 UNITED STATES SECURITIES AND EXCHANGE COMMISSION WASHINGTON, D.C. 20549 FORM N-1A REGISTRATION STATEMENT UNDER THE SECURITIES ACT OF 1933 ☒ Pre-Effective Amendment No. 3 ☐ Post-Effective Amendment No. and/or REGISTRATION STATEMENT UNDER THE INVESTMENT COMPANY ACT OF 1940 ☒ Amendment No. GABELLI ETFs TRUST (Exact Name of Registrant as Specified in Charter) One Corporate Center, Rye, New York 10580-1422 (Address of Principal Executive Offices) Registrant’s Telephone Number, including Area Code: 1-800-422-3554 John C. Ball Gabelli Funds, LLC One Corporate Center Rye, New York 10580-7724 (Name and Address of Agent for Service) Copies to: Peter Goldstein, Esq. Michael R. Rosella, Esq. Vadim Avdeychik, Esq. Gabelli ETFs Trust Paul Hastings LLP One Corporate Center 200 Park Avenue Rye, New York 10580-1422 New York, New York 10166 Approximate Date of Proposed Offering: it is proposed that this filing will become effective as soon as practicable after the effective date of this Registration Statement. […] ctives, Investment Strategies, and Related Risks 39 Management of the Funds 48 Purchase and Sale of Shares 50 Payments to Broker/Dealers and Other Financial Intermediaries 51 Pricing of Fund Shares 51 Dividends and Distributions 52 Tax Information 52 Creations and Redemptions 53 Mailings and E-Delivery to Shareholders 54 Financial Highlights 54 GABELLI ETFS TRUST (the “Trust”) Fund Ticker Symbol Gabelli Growth Innovators ETF GGRW Gabelli Financial Services ETF GABF Gabelli Global Small Cap ETF GABS Gabelli Small & Mid Cap ETF GSMD Gabelli Micro Cap ETF GMRO Gabelli Love Our Planet & People ETF LOPP Gabelli Asset ETF GAST Gabelli Equity Income ETF GABE Gabelli Green Energy ETF GGRE Listing Exchange: NYSE Arca PROSPECTUS DATED [ ], 2021 This Exchange-Traded Fund (“ETF”) is different from traditional ETFs. Unlike traditional ETFs, these ETFs will not tell the public what assets they hold each day. This may create additional risks for your investment. For example: ● You may have to pay more money to trade an ETF’s shares. These ETFs will provide less information to traders, who tend to charge more for trades when they have less information about the underlying holdings. ● The price you pay to buy ETF shares on an exchange may not match the value of an ETF’s portfolio. The same is true when you sell shares. These price differences may be greater for the ETFs offered pursuant to this Prospectus compared to other ETFs because these ETFs provide less information to traders with respect to the underlying portfolio holdings. ● These additional risks may be even greater in bad or uncertain market conditions. The differences between these ETFs and other ETFs may also have advantages. By keeping certain information about an ETF secret, the ETF may face less risk that other traders can predict or copy its investment strategy. This may improve an ETF’s performance. If other traders are able to copy or predict an ETF’s investment strategy, however, this may hurt the ETF’s performance. For additional information regarding the unique attributes and risks of the Funds, see the “Non-Transparent Exchange-Traded Fund (“ETF”) Structure Risk”, “Early Close/Trading Halt Risk” and “Authorized Participant and AP Representative Concentration Risk” in the “Principal Risks” section of this Prospectus below. Beginning on January 1, 2021, as permitted by regulations adopted by the Securities and Exchange Commission, paper copies of the Funds’ annual and semiannual shareholder reports will no longer be sent by mail, unless you specifically request paper copies of the reports. Instead, the reports will be made available on the Funds’ website (https://gabelli.com), and you will be notified by mail each time a report is posted and provided with a website link to access the report. If you already elected to receive shareholder reports electronically, you will not be affected by this change and you need not take any action. To elect to receive all future reports in paper free of charge, please contact your financial intermediary, or, if you invest directly with the Funds, you may call 800-422-3554 or send an email request to info@gabelli.com. Your election to receive reports in paper will apply to all Funds held in your account if you invest through your financial intermediary or all Funds held within the Fund complex if you invest directly with the Funds. The Securities and Exchange Commission has not approved or disapproved the shares described in this prospectus or determined whether this prospectus is accurate or complete. Any representation to the contrary is a criminal offense. […]  to invest in the Fund if: ● you are a long term investor ● you seek both growth of capital and some income ● you believe that the market will favor growth over value stocks over the long term ● you wish to include a growth strategy as a portion of your overall investments The Fund’s share price will fluctuate with changes in the market value of the Fund’s portfolio securities. Your investment in the Fund is not a deposit of the bank and is not insured or guaranteed by the Federal Deposit Insurance Corporation or any other government agency; you may lose money by investing in the Fund. When you sell Fund shares, they may be worth more or less than what you paid for them. Investing in the Fund involves the following risks: ● Non-Transparent Exchange-Traded Fund (“ETF”) Structure Risk. Unlike most actively managed ETFs the Fund does not provide daily disclosure of its portfolio holding. Instead, the Fund provides a verified intraday indicative value (“VIIV”), calculated and disseminated every second throughout the trading day. The VIIV is intended to provide investors and other market participants with a highly correlated per share value of the underlying portfolio that can be compared to the current market price. There is, however, a risk that shares of the Fund may trade at a wider bid/ask spread than ETFs that publish their portfolios on a daily basis, especially during periods of market disruption or volatility, and therefore, may cost investors more to trade. Because the Fund trades on the basis of the VIIV, it may trade at a wider bid/ask spread than traditional ETFs that publish their portfolios on a daily basis. Accordingly, the Adviser or its designee will monitor on an on-going basis how shares of the Fund trade, including the level of any market price premium or discount to NAV and the bid/ask spreads on market transactions. Should there be extended periods of unusually high bid/ask spreads, the Board will consider the continuing viability of the Fund, whether shareholders are being harmed, and what, if any, action would be appropriate to among other things, narrow the premium/discount or spread, as applicable. Potential actions may include, but are not limited to, changing lead market makers, listing  […] intain the listing of the Fund will continue to be met. Performance The Fund has not yet commenced operations, therefore, performance information is not yet available. Performance information will be available after the Fund has been in operation for one calendar year. Management The Adviser. Gabelli Funds, LLC The Portfolio Managers. Mr. Howard F. Ward, CFA, portfolio manager of the Adviser and Chief Investment Officer of Growth Products for GAMCO Investors, Inc., has served as portfolio manager of the Fund since inception. Mr. Christopher D. Ward, CFA, Vice President of GAMCO Investors, Inc., has served as a portfolio manager of the Fund since inception. 5 Other Information Purchase and Sale of Fund Shares The Fund is an actively managed exchange-traded Fund (commonly referred to as an “ETF”). Individual shares of the Fund are listed on a national securities exchange. Most investors will buy and sell shares of the Fund through a broker-dealer. The price of Fund shares is based on market price, and because ETF shares trade at market prices rather than at NAV, shares may trade at a price greater than NAV (a premium) or less than NAV (a discount). The Fund will only issue or redeem shares that have been aggregated into blocks of 5,000 shares or multiples thereof (“Creation Units”) to Authorized Participants who have entered into agreements with the Fund’s distributor. The Fund generally will issue or redeem Creation Units in return for a designated portfolio of securities (and an amount of cash) that the Fund specifies each day. Tax Information The Fund expects that distributions will generally be taxable as ordinary income or long term capital gains, unless you are investing through a tax deferred arrangement, such as a 401(k) plan or an IRA. Payments to Broker-Dealers and Other Financial Intermediaries If you purchase shares of the Fund through a broker-dealer or other financial intermediary (such as a bank), the Fund and its related companies may pay the intermediary for the sale of Fund shares and related services. These payments may create a conflict of interest by influencing the broker-dealer or other intermediary and your salesperson to recommend the Fund over another investment. Ask your salesperson or  […]  or a need to improve the overall risk/reward profile of the Fund. Principal Risks You may want to invest in the Fund if: ● you are a long term investor ● you seek capital appreciation ● you believe that the market will favor financial services companies over the long term The Fund’s share price will fluctuate with changes in the market value of the Fund’s portfolio securities. Your investment in the Fund is not a deposit of the bank and is not insured or guaranteed by the Federal Deposit Insurance Corporation or any other government agency; you may lose money by investing in the Fund. When you sell Fund shares, they may be worth more or less than what y
      497 1 acetft062420esgasupp.htm 497 Document June 5, 2020 (as revised June 24, 2020) American Century Investments Prospectus Ticker: Exchange: American Century Sustainable Equity ETF ESGA NYSE Arca, Inc. This fund is different from traditional ETFs. Traditional ETFs tell the public what assets they hold each day. This fund will not. This may create additional risks for your investment. For example: • You may have to pay more money to trade the fund’s shares. This fund will provide less information to traders, who tend to charge more for trades when they have less information. • The price you pay to buy fund shares on an exchange may not match the value of the fund’s portfolio. The same is true when you sell shares. These price differences may be greater for this fund compared to other ETFs because it provides less information to traders. • These additional risks may be even greater in bad or uncertain market conditions. • The ETF will publish on its website each day a “Proxy Portfolio” designed to help trading in shares of the ETF. While the Proxy Portfolio includes some of the ETF’s holdings, it is not the ETF’s actual portfolio. The differences between this fund and other ETFs may […] ecurities with the strongest scores in their respective sectors. Using this process, the portfolio managers attempt to build a portfolio of stocks that has sustainable competitive advantages, provides better returns without taking on significant additional risk, and maintains a stronger ESG profile than the S&P 500 ® Index. Under normal market conditions, the fund will invest at least 80% of its assets in sustainable equity securities. For this purpose, the advisor defines sustainable securities as those to which the advisor’s proprietary model assigns an ESG score that is in the top three quartiles of the ESG scores the model assigns to all of the securities in the fund’s benchmark, the S&P 500 ® Index. The fund will invest principally in exchange-traded common stocks. The fund defines large capitalization companies as companies with capitalizations in the capitalization range of the S&P 500 ® Index. 2 When determining whether to sell a security, the portfolio managers consider among other things, a security’s price, whether a security’s risk parameters outweigh its return opportunities, general market conditions, and whether the security meets their ESG criteria. The fund is not permitted to invest in securities issued by companies assigned the Global Industry Classification Standard (GICS) or the Bloomberg Industry Classification Standard (BICS) for the tobacco industry. The fund is an actively managed, nontransparent exchange-traded fund (ETF) that does not seek to replicate the performance of a specified index. In lieu of publishing its portfolio contents (Actual Portfolio) daily, the fund publishes a proxy portfolio (Proxy Portfolio) each day and on its website. There is no minimum overlap required between the Actual Portfolio and the Proxy Portfolio. Principal Risks • Proxy Portfolio Risk - The goal of the Proxy Portfolio is, during all market conditions, to track closely the daily performance of the Actual Portfolio and minimize intra-day misalignment between the performance of the Proxy Portfolio and the performance of the Actual Portfolio. The Proxy Portfolio is designed to reflect the economic exposures and the risk characteristics of the Actual Portfolio on any given trading day. ◦ The Proxy Portfolio methodology is novel and not yet proven as an effective arbitrage mechanism. The effectiveness of the Proxy Portfolio as an arbitrage mechanism is contingent upon, among other things, the fund’s factor model analysis creating a proxy portfolio that performs in a manner substantially identical to the performance of the fund’s actual portfolio. While the Proxy Portfolio may include some of the fund’s holdings, it is not the fund’s Actual Portfolio. ETFs trading on the basis of a published Proxy Portfolio may exhibit wider premiums and discounts, bid/ask spreads, and tracking error than other ETFs using the same investment strategies that publish their portfolios on a daily basis, especially during periods of market disruption or volatility. Therefore, shares of the fund may cost investors more to trade than shares of a traditional ETF. ◦ Each day the fund calculates the overlap between the holdings of the prior Business Day’s Proxy Portfolio compared to the Actual Portfolio (Proxy Overlap) and the difference, in percentage terms, between the Proxy Portfolio per share NAV and that of the Actual Portfolio (Tracking Error). If the Tracking Error becomes large, there is a risk that the performance of the Proxy Portfolio may deviate from the performance of the Actual Portfolio. ◦ The fund’s Board of Trustees monitors its Tracking Error and bid/spread. If deviations become too large, the Board will consider the continuing viability of the fund, whether shareholders are being harmed, and what, if any, corrective measures would be appropriate. See the Statement of Additional Information for further discussion of the Board’s monitoring responsibilities. ◦ Although the fund seeks to benefit from keeping its portfolio information secret, market participants may attempt to use the Proxy Portfolio to identify a fund’s trading strategy, which if successful, could result in such market participants engaging in certain predatory trading practices that may have the potential to harm the fund and its shareholders. • Premium/Discount Risk - Publication of the Proxy Portfolio is not the same level of transparency as the publication of the full portfolio by a fully transparent active ETF. Although the Proxy Portfolio is intended to provide investors with enough information to allow for an effective arbitrage mechanism that will keep the market price of the fund at or close to the underlying net asset value (NAV) per share of the fund, there is a risk (which may increase during periods of market disruption or volatility) that market prices will vary significantly from the underlying NAV of the fund. This means the price paid to buy shares on an exchange may not match the value of the fund’s portfolio. The same is true when shares are sold. • Trading Issues Risk - If securities representing 10% or more of the fund’s Actual Portfolio do not have readily available market quotations, the fund will promptly request that the Exchange halt trading in the fund’s shares. Trading halts may have a greater impact on this fund compared to other ETFs due to the fund’s nontransparent structure. If the trading of a security held in the fund’s Actual Portfolio is halted, or otherwise does not have readily available market quotations, and the Advisor believes that the lack of any such readily available market quotations may affect the reliability of the Proxy Portfolio as an arbitrage vehicle, or otherwise determines it is in the best interest of the fund, the Advisor promptly will disclose on the fund’s website the identity and weighting of such security for so long as such security’s trading is halted or otherwise does not have readily available market quotations and remains in the Actual Portfolio. • Authorized Participant Concentration Risk - Only an authorized participant may engage in creation or redemption transactions directly with the fund. The fund may have a limited number of institutions that act as authorized participants. To the extent that these institutions exit the business or are unable to proceed with creation and/or redemption orders with respect to the fund and no other authorized participant is able to step forward to process creation and/or redemption orders, fund shares may trade at a discount to net asset value (NAV) and possibly face trading halts and/or delisting. This risk may be more pronounced in volatile markets, potentially where there are significant redemptions in ETFs generally. The fact that the fund is offering a novel and unique structure may affect the number of entities willing to act as Authorized Participants. During times of market stress, Authorized Participants may be more likely to step away from this type of ETF than a traditional ETF. 3 • ESG Criteria Risk - Because the fund’s ESG criteria may exclude the securities of certain issuers for nonfinancial reasons, the fund may forg […] eve will provide the optimal balance between risk and expected return. Using this process, the portfolio managers attempt to build a portfolio of stocks that has sustainable competitive advantages, provides better returns without taking on significant additional risk, and maintains a stronger ESG profile than the S&P 500 ® Index. Finally, the portfolio managers validate the output of the multi-factor model using additional fundamental analysis. The portfolio managers do not attempt to time the market. Under normal market conditions, the fund will invest at least 80% of its assets in sustainable equity securities. The fund may change this 80% policy only upon 60 days’ prior written notice to shareholders. The fund will invest principally in exchange-traded common stocks. For this purpose, the advisor defines sustainable securities as those to which the advisor’s proprietary model assigns an ESG score that is in the top three quartiles of the ESG scores the model assigns to all of the securities in the fund’s benchmark, the S&P 500 ® Index. The fund generally defines large capitalization companies as those that are in the capitalization range of the S&P 500 ® Index. When determining whether to sell a security, the portfolio managers consider among other things, a security’s price, whether a security’s risk parameters outweigh its return opportunities, general market conditions, and whether the security meets their ESG criteria. The fund is not permitted to invest in securities issued by companies assigned the Global Industry Classification Standard (GICS) or the Bloomberg Industry Classification Standard (BICS) for the tobacco industry. If the issuer of a security purchased by the fund is subsequently found to be classified in the tobacco industry (due to acquisition, merger or otherwise), the fund will sell the security as soon as reasonably possible. Although unlikely, the fund may take temporary defensive positions that are inconsistent with the fund’s principal investment strategies in the event of exceptional market or economic conditions. To the extent the fund assumes a defensive position, it may not achieve its investment objective. The fund is an actively managed, nontransparent exchange-traded fund (ETF) that does not seek to replicate the performance of a specified index. In lieu of publishing its full portfolio contents (Actual Portfolio) daily, the fund publishes a proxy portfolio (Proxy Portfolio). There is no minimum overlap required between the Actual Portfolio and the Proxy Portfolio. For more information see The Proxy Portfolio section, below. A description of the policies and procedures with respect to the disclosure of the fund’s portfolio securities is available in the statement of additional information. What are the principal risks of investing in the fund? • Proxy Portfolio Risk - The goal of the Proxy Portfolio is, during all market conditions, to track closely the daily performance of the Actual Portfolio and minimize intra-day misalignment between the performance of the Proxy Portfolio and the performance of the Actual Portfolio. The Proxy Portfolio is designed to reflect the economic exposures and the risk characteristics of the Actual Portfolio on any given trading day. 6 ◦ The Proxy Portfolio methodology is novel and not yet proven as an effective arbitrage mechanism. The effectiveness of the Proxy Portfolio as an arbitrage mechanism is contingent upon, among other things, the fund’s factor model analysis creating a proxy portfolio that performs in a manner substantially identical to the performance of the fund’s actual portfolio. While the Proxy Portfolio may include some of the fund’s holdings, it is not the fund’s Actual Portfolio. ETFs trading on the basis of a published Proxy Portfolio may exhibit wider premiums and discounts, bid/ask spreads, and tracking error than other ETFs using the same investment strategies that publish their portfolios on a daily basis, especially during periods of market disruption or volatility. Therefore, shares of the fund may cost investors more to trade than shares of a traditional ETF. ◦ Each day the fund calculates the overlap between the holdings of the prior Business Day’s Proxy Portfolio compared to the Actual Portfolio (Proxy Overlap) and the difference, in percentage terms, between the Proxy Portfolio per share NAV and that of the Actual Portfolio (Tracking Error). If the Tracking Error becomes large, there is a risk that the performance of the Proxy Portfolio may deviate from the performance of the Actual Portfolio. ◦ The fund’s Board of Trustees monitors its Tracking Error and bid/spread. If deviations become too large, the Board will consider the continuing viability of the fund, whether shareholders are being harmed, and what, if any, corrective measures would be appropriate. See the Statement of Additional Information for further discussion of the Board’s monitoring responsibilities. ◦ Although the fund seeks to benefit from keeping its portfolio information secret, market participants may attempt to use the Proxy Portfolio to identify a fund’s trading strategy, which if successful, could result in such market participants engaging in certain predatory trading practices that may have the potential to harm the fund and its shareholders. • Premium/Discount Risk - Publication of the Proxy Portfolio is not the same level of transparency as the publication of the full portfolio by a fully transparent active ETF. Although the Proxy Portfolio is intended to provide investors with enough information to allow for an effective arbitrage mechanism that will keep the market price of the fund at or close to the underlying net asset value (NAV) per share of the fund, there is a risk (which may increase during periods of market disruption or volatility) that market prices will vary significantly from the underlying NAV of the fund. This means the price paid to buy shares on an exchange may not match the value of the fund’s portfolio. The same is true when shares are sold. • Trading Issues Risk - If securities representing 10% or more of the fund’s Actual Portfolio do not have readily available market quotations, the fund will promptly request that the Exchange halt trading in the fund’s shares. Trading halts may have a greater impact on this fund compared to other ETFs due to the fund’s nontransparent structure. If the trading of a security held in the fund’s Actual Portfolio is halted, or otherwise does not have readily available market quotations, and the Advisor believes that the lack of any such readily available market quotations may affect the reliability of the Proxy Portfolio as an arbitrage vehicle, or otherwise determines it is in the best interest of the fund, the Advisor promptly will disclose on the fund’s website the identity and weighting of such security for so long as such security’s trading is halted or otherwise does not have readily available market quotations and remains in the Actual Portfolio. • Authorized Participant Concentration Risk - Only an authorized participant may engage in creation or redemption transactions directly with the fund. The fund may have a limited number of institutions that act as authorized participants, none of which are obligated to engage in creation or redemption transactions. To the extent that these institutions exit the business or are unable to proceed with creation and/or redemption orders with respect to the fund and no other authorized participant is able to step forward to process creation and/or redemption orders, fund shares may trade at a discount to net asset value (NAV) and possibly face trading halts and/or delisting. This risk may be more pronounced in volatile markets, potentially where there are significant redemptions in ETFs generally. Authorized participant concentration risks may be heightened in scenarios where authorized participants have limited or diminished access to the capital required to post collateral. The fact that the fund is offering a novel and unique structure may affect the number of entities willing to act as Authorized Participants. During times of ma […] e that dealers who are not “underwriters” but are participating in a distribution (as contrasted to ordinary secondary transactions), and thus dealing with shares that are part of an “unsold allotment” within the meaning of Section 4(a)(3)(C) of the Securities Act, would be unable to take advantage of the prospectus delivery exemption provided by Section 4(a)(3) of the Securities Act. For delivery of prospectuses to exchange members, the prospectus delivery mechanism of Rule 153 under the Securities Act is available only with respect to transactions on a national securities exchange. In addition, certain affiliates of the fund and the advisor may purchase and resell fund shares pursuant to this prospectus. Share Price and Distributions The Proxy Portfolio Unlike traditional ETFs, this fund does not disclose its portfolio holdings (Actual Portfolio) daily. The fund instead posts a Proxy Portfolio on its website each day, including the following information for each portfolio holding in the Proxy Portfolio: (1) ticker symbol; (2) CUSIP or other identifier; (3) description of holding; (4) quantity of each security or other asset held; and (5) percentage weight of the holding in the Proxy Portfolio. The Proxy Portfolio is designed to reflect the economic exposures and risk characteristics of the fund’s actual holdings on each trading day, but it is not the same as the fund’s Actual Portfolio. The fund will disclose its Actual Portfolio quarterly with a 60-day lag via periodic filings with the Securities and Exchange Commission. The Proxy Portfolio disclosures will enable arbitrageurs and market participants to use the component securities and their weightings in the Proxy Portfolio to calculate intraday values that approximate the value of the securities in the Actual Portfolio and, based thereon, assess whether the market price of the shares is higher or lower than the approximate contemporaneous value of the Actual Portfolio and engage in arbitrage and hedging activities. These activities should ensure that fund market prices remain close to the fund’s NAV per share. At the end of each trading day, the fund will calculate the percentage weight overlap between the Proxy Portfolio and the Actual Portfolio (Proxy Ov

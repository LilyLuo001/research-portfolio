ove the Plan. Shareholders of each Target Fund will vote separately on the applicable Reorganization and the adjournment of the special meeting, with the classes of each Target Fund voting together. 1 The Target Funds’ Board of Trustees is sending this document to you for your use in deciding whether to approve the Plan at the special meeting. If the Reorganizations are approved, following consummation of the Reorganizations, shareholders of the Target Funds will become shareholders of the Acquiring Fund. The Acquiring Fund, a semi-transparent actively-managed ETF that is listed and trades on the NYSE Arca, Inc., will continue to operate pursuant to its existing investment strategies following consummation of the Reorganizations. Question 2 : What is a semi-transparent actively-managed ETF with a portfolio reference basket structure? Answer : As noted above, the Acquiring Fund is an actively-managed, semi-transparent ETF. Unlike traditional ETFs, which generally publish their portfolio holdings on a daily basis, the Acquiring Fund discloses a portfolio transparency substitute—the “ Portfolio Reference Basket ”—and certain related information about the Portfolio Reference Basket relative to the Acquiring Fund’s actual portfolio (“ Actual Portfolio ”) holdings (the “ Portfolio Reference Basket Disclosures ”), which are intended to help keep the market price of the Acquiring Fund’s shares trading at or close to the underlying net asset value (“ NAV ”) per share of the Acquiring Fund. While the Portfolio Reference Basket includes all of the Acquiring Fund’s holdings, it is not the Acquiring Fund’s Actual Portfolio because the holdings will be weighted differently, subject to a minimum weightings overlap of 90% with the Acquiring Fund’s Actual Portfolio at the beginning of each trading day. The Acquiring Fund also discloses the maximum deviation between the weightings of the specific securities in the Portfolio Reference Basket and the weightings of those specific securi
in the Fund is not a bank deposit and it is not insured or guaranteed by the Federal Deposit Insurance Corporation or any other government agency, the Advisor or any of its affiliates. You should consider carefully the following risks before investing in the Fund. Authorized Participant Concentration Risk Only certain large institutions may engage in creation or redemption transactions directly with the Fund (each, an “Authorized Participant”). The Fund has a limited number of institutions that may act as Authorized Participants on an agency basis (i.e., on behalf of other market participants). To the extent that those Authorized Participants exit the business or are unable to proceed with creation and/or redemption orders with the Fund and no other Authorized Participant is able to step forward to engage in creatio […] may have limited voting rights, and investment restrictions in certain countries may adversely impact the value of depositary receipts. Early Close/Trading Halt Risk If securities representing 10% or more of the Fund’s Actual Portfolio do not have readily available market quotations, the Fund will promptly request that the Exchange halt trading in the Fund’s Shares. Trading halts may have a greater impact on this Fund compared to other ETFs due to the Fund’s nontransparent structure. If the trading of a security held in the Fund’s Actual Portfolio is halted, or otherwise does not have readily available market quotations, and the Advisor believes that the lack of any such readily available market quotations may affect the reliability of the Proxy Portfolio as an arbitrage vehicle, or otherwise determines it is in the best interest of the Fund, the Advisor promptly will disclose on the Fund’s website the identity and weighting of such security for so long as such security’s trading is halted or otherwise does not have readily available market quotations and remains in the Actual Portfolio. Equity Securities Risk Investments in common stocks and other equity securities are particularly subject to the risk of changes in investors’ perceptions of the financial condition of an issuer, conditions affecting equity markets generally and political and/or economic events. Equity prices may also be particularly sensitive to rising interest rates, as the cost of capital rises and borrowing costs increase. Holders of an issuer’s common stock may be subject to 6 ​ greater risks than holders of its preferred stock and debt securities because common stockholders’ claims are subordinated to those of holders of preferred stocks and debt securities upon the bankruptcy of an issuer. Focused Investment Risk Because performance is dependent on a smaller number of holdings, the Fund may be more adversely impacted by price volatility than funds with a greater number of holdings. To the extent that the Fund invests a large percentage of its assets in securities of issuers within the same industry, group of industries, sector, country or region, an adverse economic, market, political or regulatory development may affect the value of the  […] portfolio management risk because it is an actively managed portfolio. In managing the Fund’s investment portfolio, the portfolio managers will apply investment techniques and risk analyses that may not produce the desired result or, while it may be the desired result, may underperform other types of investment strategies. The application of ESG criteria may result in the Fund (i) having exposure to certain securities or industry sectors that are significantly different than the composition of the Fund’s benchmark; and (ii) performing differently than other funds and strategies in its peer group that do not take into account ESG criteria or the Fund’s benchmark. There can be no guarantee that the Fund will meet its investment objective(s). Proxy Portfolio Risk Unlike traditional ETFs that provide daily disclosure of their portfolio holdings, the Fund does not disclose the daily holdings of the Actual Portfolio. Instead, the Fund discloses a Proxy Portfolio that is designed to reflect the economic exposure and risk characteristics of the Fund’s Actual Portfolio on any given trading day. Although the Proxy Portfolio and Proxy Portfolio Disclosures are intended to provide Authorized Participants and other market participants with enough information to allow them to engage in effective arbitrage transactions that will keep the market price of the Fund’s shares trading at or close to the underlying NAV per share of the Fund, while at the same time enabling them to establish cost-effective hedging strategies to reduce risk, there is a risk that market prices will vary significantly from the underlying NAV of the Fund. Similarly, shares of the Fund may trade at a wider bid/ask spread than shares of traditional ETFs, and may therefore be more costly for investors to trade. The Proxy Portfolio methodology is novel and not yet proven as an effective arbitrage mechanism. The effectiveness of the Proxy Portfolio methodology as an arbitrage mechanism is contingent upon, among other things, the effectiveness of the Fund’s factor model analysis in creating a Proxy Portfolio that performs in a manner substantially identical to the performance of the Fund’s Actual Portfolio and the willingness of Authorized Participants and oth

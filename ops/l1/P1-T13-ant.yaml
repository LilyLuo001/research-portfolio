      N-1A 1 d8933976_n-1a.htm As filed with the Securities and Exchange Commission on September 3, 2021 FILE NOS. 811-23740 333-[____] SECURITIES AND EXCHANGE COMMISSION Washington, D.C. 20549 __________________________________ FORM N-1A REGISTRATION STATEMENT UNDER THE SECURITIES ACT OF 1933 ☒ Pre-Effective Amendment No. Post-Effective Amendment No. and/or REGISTRATION STATEMENT UNDER THE INVESTMENT COMPANY ACT OF 1940 ☒ Amendment No. __________________________________ RCG ETFS, INC. (Exact Name of Registrant As Specified In Charter) 9 West 57 th Street, Suite 5000 New York, NY 10019 (Address of Principal Executive Office) (Zip Code) Registrant's Telephone Number, including Area Code: (212) 832-5280 __________________________________ (Name and address of agent for service) John B. Harris Ruane, Cunniff & Goldfarb L.P. 9 West 57 th Street Suite 5000 New York, New York 10019 Copies of communications to: Paul M. Miller Seward & Kissel LLP 901 K Street, N.W. Suite 800 Washington, D.C. 20001 Approximate Date of Proposed Public Offering: As soon as practicable after the effectiveness of this Registration Statement. It is proposed that this filing will become effective (check appropriate box) […] rom traditional ETFs. Traditional ETFs tell the public what assets they hold each day. This ETF will not. This may create additional risks for your investment. For example: · You may have to pay more money to trade the ETF's shares. This ETF will provide less information to traders, who tend to charge more for trades when they have less information. · The price you pay to buy ETF shares on an exchange may not match the value of the ETF's portfolio. The same is true when you sell shares. These price differences may be greater for this ETF compared to other ETFs because it provides less information to traders. · These additional risks may be even greater in bad or uncertain market conditions. · The ETF will publish on its website each day a "Proxy Portfolio" designed to help trading in shares of the ETF. While the Proxy Portfolio includes some of the ETF's holdings, it is not the ETF's actual portfolio. The differences between this ETF and other ETFs may also have advantages. By keeping certain information about the ETF secret, this ETF may face less risk that other traders can predict or copy its investment strategy. This may improve the ETF's performance. If other traders are able to copy or predict the ETF's investment strategy, however, this may hurt the ETF's performance. For additional information regarding the unique attributes and risks of the ETF, see ["Proxy portfolio structure risks," "Premium/Discount risks," "Trading halt risks," and "Authorized Participant risks."] Principal U.S. Listing Exchange: NYSE Arca, Inc. Exchange-traded fund ("ETF") shares are not individually redeemable. THE SECURITIES AND EXCHANGE COMMISSION HAS NOT APPROVED OR DISAPPROVED THESE SECURITIES OR PASSED UPON THE ADEQUACY OR ACCURACY OF THIS PROSPECTUS. ANY REPRESENTATION TO THE CONTRARY IS A CRIMINAL OFFENSE. Table of Contents TABLE OF CONTENTS Page RCG ETF (the "Fund") 3 Investment Objective 3 Fees and Expenses of the Fund 3 Portfolio Turnover 3 Principal Investment Strategies 3 Principal Risks 4 Bar Chart and Performance Information 6 Investment Adviser 7 Portfolio Managers 7 Purchase and Sale of Fund Shares 7 Tax Information for the Fund 7 Payments to Broker-Dealers and Other Financial Intermediaries 7 ADDITIONAL INFORMATION ABOUT CERTAIN ETF-RELATED RISKS 8 MANAGEMENT OF THE FUND 10 Investment Adviser 10 Portfolio Managers and Investment Committee 10 PURCHASE AND SALE OF SHARES 11 Buying and Selling Shares 11 How the Fund Values Its Shares 11 Book Entry 12 Frequent Trading Practices 12 Investments by Other Investment Companies 13 Creations and Redemptions 13 Premium and Discount Information 13 Proxy Portfolio and Proxy Overlap 13 Continuous Offering 14 DIVIDENDS, DISTRIBUTIONS AND TAXES 15 GENERAL INFORMATION AND DISCLAIMERS 16 FINANCIAL HIGHLIGHTS 17 Table of Contents RCG ETF (the "Fund") Investment Objective The Fund's investment objective is long-term growth of capital. Fees and Expenses of the Fund This table describes the fees and expenses that you may pay if you buy and hold shares of the Fund. You may pay other fees, such as brokerage commissions and other fees to financial intermediaries, which are not reflected in the table and example below. Shareholder Fees (fees paid directly from your investment) The Fund does not impose any sales charges, exchange fees or redemption fees. Annual Fund Operating Expenses (expenses that you pay each year as a percentage of the value of your investment) Management Fees [_]% Other Expenses [_]% Total Annual Fund Operating Expenses [_]% Example This Example is intended to help you compare the cost of investing in the Fund with the cost of investing in other funds. The Example assumes that you invest $10,000 in the Fund for the time periods indicated and then redeem all of your shares at the end of those periods. The Example also assumes that your investment has a 5% return each year and that the Fund's operating expenses remain the same. Although your actual costs may be higher or lower, based on these assumptions your costs would be: 1 Y ear 3 Y ears $[_] $[_] Portfolio Turnover The Fund pays transaction costs, such as com […] issuers traded in the U.S. The Fund may also purchase ADRs issued by a U.S. financial institution ( i.e. , a depositary). The Fund is not required to be fully invested in equity securities and, in fact, usually maintains a portion of its total assets in cash or securities generally considered to be cash equivalents, including, but not limited to, short-term U.S. Government securities. Depending upon market conditions, cash reserves may be a significant percentage of the Fund's net assets. The Fund is classified as non-diversified. The Fund is a type of exchange traded fund ("ETF"). Unlike traditional ETFs, however, which generally publish their portfolio holdings on a daily basis, the Fund discloses a portfolio transparency substitute—the "Proxy Portfolio"—and certain related information about the relative performance of the Proxy Portfolio and the Fund's actual portfolio ("Actual Portfolio") holdings (the "Proxy Portfolio Disclosures"), which are intended to help keep the market price of the Fund's shares trading at or close to the underlying net asset value ("NAV") per share of the Fund. While the Proxy Portfolio includes some of the Fund's holdings, it is not the Fund's Actual Portfolio, and the Fund will not disclose the daily holdings of the Actual Portfolio. The Fund is actively-managed and does not intend to track an index. The Fund publishes each business day on its website the "Proxy Portfolio Overlap," which is the percentage weight overlap between the holdings of the prior business day's Proxy Portfolio and the Actual Portfolio's holdings that formed the basis of the Fund's NAV calculation on the prior business day. The Fund's exemptive relief limits the types of securities in which the Fund can invest, which may constrain the Fund's ability to implement its investment strategies. Principal Risks · Market Risk. This is the risk that the market values of the Fund's investments will decline, perhaps sharply and unpredictably, or fail to rise, for various reasons including changes or potential or perceived changes in U.S. or foreign economies, financial markets, interest rates, the liquidity of investments and other factors including terrorism, war, natural disasters and public health events and crises, including disease/virus outbreaks, epidemics and pandemics. The resulting short term and long term effects and consequences of such events and factors on global and local economies and specific countries, regions, businesses, industries and companies cannot necessarily be foreseen or predicted. You may lose money by investing in the Fund. · Value Investing Risk. Investing in undervalued securities involves the risk that such securities may never reach their expected market value, either because the market fails to recognize a security's intrinsic worth or the expected value was misgauged. Such securities may decline in value even though they are already undervalued. · Non-Diversification Risk. The Fund is "non-diversified," meaning that it invests its assets in a […] issuers. Small-cap and mid-cap companies may be engaged in business within a narrow geographic region, be less well-known to the investment community and have more volatile share prices. These companies often lack management depth and have narrower market penetrations, less diverse product lines and fewer resources than larger companies. Moreover, the securities of such companies often have less market liquidity and, as a result, their stock prices often react more strongly to changes in the marketplace. · Growth Company Risk. The prices of growth securities are often highly sensitive to market fluctuations because of their heavy dependence on future earnings or cash flow expectations, and can be more volatile than the market in general. · Proxy Portfolio Structure Risk. Unlike traditional ETFs that provide daily disclosure of their portfolio holdings, the Fund does not disclose the daily holdings of the Actual Portfolio. The Fund discloses a Proxy Portfolio that is designed to reflect the economic exposure and risk characteristics of the Fund's Actual Portfolio on any given trading day. Because the Fund uses a Proxy Portfolio, there is a risk that the Fund's shares may trade at a wider bid/ask spread than shares of ETFs that publish their portfolios on a daily basis. · Premium/Discount Risk. Shares of the Fund are listed for trading on the NYSE Arca, Inc. (the "NYSE Arca") and are bought and sold in the secondary market at market prices that may differ from their most recent NAV. The market value of the Fund's shares will fluctuate, in some cases materially, in response to changes in the Fund's NAV, the intraday value of the Fund's holdings, and the relative supply and demand for the Fund's shares on the exchange. Although the Proxy Portfolio is intended to provide investors with enough information to allow for an effective arbitrage mechanism that will keep the market price of the Fund at or close to the Fund's NAV, there is a risk (which may increase during periods of market disruption or volatility) that market prices for Fund shares will vary significantly from the Fund's NAV. · Limited Number of Authorized Participants Risk. Only an authorized participant ("Authorized Participant") may engage in creation or redemption transactions directly with the Fund. The Fund has a limited number of institutions that act as Authorized Participants, none of which are or will be obligated to engage in creation or redemption transactions. To the extent that these institutions exit the business or are unable to proceed with creation and/or redemption orders with respect to the Fund and no other Authorized Participant is able to step forward to create or redeem Creation Units, Fund shares may trade at a discount to NAV and possibly face trading halts and/or delisting. The Fund's novel structure may affect the number of entities willing to act as Authorized Participants, and this risk may be exacerbated during times of market stress. 5 Table of Contents · Predatory Trading Practices Risk. Although the Fund seeks to benefit from keeping its portfolio holdings information secret, market participants may attempt to use the Proxy Portfolio and related Proxy Portfolio Disclosures to identify the Fund's holdings and trading strategy. If successful, this could result in such market participants engaging in predatory trading practices that could harm the Fund and its shareholders. · Trading Issues Risk. Trading in Fund shares on the NYSE Arca may be halted in certain circumstances. If 10% or more of the Fund's Actual Portfolio does not have readily available market quotations, the Fund will promptly request that the NYSE Arca halt trading in the Fund's shares. If the trading of a security held in the Fund's Actual Portfolio is halted or otherwise does not have readily available market quotations and the Adviser believes that the lack of any such readily available market quotations may affect the reliability of the Proxy Portfolio as an arbitrage vehicle or otherwise determines it is in the best interest of the Fund, the Adviser promptly will disclose the identity and weighting of such security on the Fund's website. · Tracking Error Risk. Although the Proxy Portfolio is designed to reflect the economic exposure and risk characteristics of the Fund's Actual Portfolio on any given trading day, there is a risk that the performance of the Proxy Portfolio will diverge from the performance of the Actual Portfolio, potentially materially. · Creation and Redemption Transaction Risks. The Fund may be required to sell the in-kind securities received as a result of a purchase of one or more Creation Units from an Authorized Participant to the extent that the securities received from the Authorized Participant differ from the Fund's Actual Portfolio. Any such sales may generate taxable gain or loss. The Fund may also be required to sell securities from the Fund's Actual Portfolio in order to satisfy a redemption request from an Authorized Participant to the extent such request is satisfied in cash, which may also generate taxable gain or loss. · Risks of Investing in a Managed Fund. Performance of individual securities can vary widely. The investment decisions of the Adviser may cause the Fund to underperform other investments or benchmark indices. The Fund may also underperform other mutual funds with similar investment strategies. The Adviser may be incorrect in assessing a particular industry or company, including the anticipated earnings growth of the company. The Adviser may not buy securities at the lowest possible prices or sell securities at the highest possible prices. As with any mutual fund investment, there can be no guarantee that the Fund will achieve its investment goals. · Illiquid Investments Risk. When there is no willing buyer and a security cannot be readily sold at the desired time or price, the F […]  the Fund's website at [______]. Tax Information for the Fund The Fund intends to make distributions that may be taxed as ordinary income or capital gains. Payments to Broker-Dealers and Other Financial Intermediaries If you purchase shares of the Fund through a broker-dealer or other financial intermediary (such as a bank), the Adviser or its affiliates may pay the intermediary for the sale of Fund shares and related services. These payments may create a conflict of interest by influencing the broker-dealer or other intermediary to recommend the Fund over another investment. Ask your salesperson or visit your financial intermediary's website for more information. 7 Table of Contents ADDITIONAL INFORMATION ABOUT CERTAIN ETF-RELATED RISKS · Proxy Portfolio Structure Risk. Unlike traditional ETFs that provide daily disclosure of their portfolio holdings, the Fund does not disclose the daily holdings of the Actual Portfolio. Instead, the Fund discloses a Proxy Portfolio that is designed to reflect the economic exposure and risk characteristics of the Fund's Actual Portfolio on any given trading day. Although the Proxy Portfolio and Proxy Portfolio Disclosures are intended to provide Authorized Participants and other market participants with enough information to allow them to engage in effective arbitrage transactions that will keep the market price of the Fund's shares trading at or close to the underlying NAV per share of the Fund, while at the same time enabling them to establish cost-effective hedging strategies to reduce risk, there is a risk that market prices will vary significantly from the underlying NAV of the Fund. See "Premium/Discount Risk." Similarly, shares of the Fund may trade at a wider bid/ask spread than shares of traditional ETFs, and may therefore be more costly for investors to trade. See "Trading Issues Risk." Also, the Fund will incur expenses to license the Proxy Portfolio mechanism, which may impact shareholder returns. Additionally, the proxy mechanism itself may result in additional trading costs, which also may negatively impact shareholder returns. Although the Fund seeks to benefit from keeping its portfolio information secret, market participants may attempt to use the Proxy Portfo

      497 1 c497.htm PROSPECTUS May 1, 2021 T. ROWE PRICE TSPA U.S. Equity Research ETF This ETF is different from traditional ETFs. Traditional ETFs tell the public what assets they hold each day. This ETF will not. This may create additional risks for your investment. For example: · You may have to pay more money to trade the ETF’s shares. This ETF will provide less information to traders, who tend to charge more for trades when they have less information. · The price you pay to buy ETF shares on an exchange may not match the value of the ETF’s portfolio. The same is true when you sell shares. These price differences may be greater for this ETF compared to other ETFs because it provides less information to traders. · These additional risks may be even greater in bad or uncertain market conditions. · The ETF will publish on its website each day a “Proxy Portfolio” designed to help trading in shares of the ETF. While the Proxy Portfolio includes some of the ETF’s holdings, it is not the ETF’s actual portfolio. The differences between this ETF and other ETFs may also have advantages. By keeping certain information about the ETF secret, this ETF may face less risk that other traders can pr […] ing those stocks that are viewed negatively. The fund may also purchase securities that are not in the Index, but at least 80% of the fund’s total assets will normally be invested in securities that are in the Index at the time of purchase. The fund will generally remain fully invested (less than 5% in cash reserves) and seeks to be sector neutral when compared to the Index. While the majority of assets will be invested in large-capitalization U.S. common stocks, the fund may have small- and mid-capitalization and foreign exposure in keeping with fund objectives. The fund is “nondiversified,” meaning it may invest a greater portion of its assets in fewer issuers than is permissible for a “diversified” fund. The fund is an actively-managed, exchange-traded fund (ETF) that does not disclose portfolio holdings daily. In order to provide market participants with information on the fund’s investments, the fund will publish a “Proxy Portfolio” on its website daily. A Proxy Portfolio is a basket of securities that is designed to closely track the daily performance of the fund’s portfolio holdings. While the Proxy Portfolio includes some of the fund’s holdings, it is not the fund’s actual portfolio. The Proxy Portfolio could be based on a broad-based securities index or the fund’s recently disclosed portfolio holdings. The fund’s Portfolio Overlap is available on the fund’s website daily. The Portfolio Overlap is the percentage weight overlap between the holdings of the prior business day’s Proxy Portfolio compared to the holdings of the fund that formed the basis for the fund’s calculation of NAV at the end of the prior business day. Principal Risks As with any fund, there is no guarantee that the fund will achieve its objective(s). The fund’s share price fluctuates, which means you could lose money by investing in the fund. The principal risks of investing in this fund, which may be even greater in bad or uncertain market conditions, are summarized as follows: Proxy portfolio structure The fund does not disclose portfolio holdings daily. The fund uses a Proxy Portfolio, which is a basket of securities that is designed to closely track the daily performance of the fund’s portfolio holdings. The fund may not always effectively construct a proxy portfolio that closely tracks the daily performance of the fund’s portfolio holdings. Because the fund uses a Proxy Portfolio, there is a risk that the fund’s shares may trade at a wider bid/ask spread than shares of ETFs that publish their portfolios on a daily basis. This risk is heightened during periods of market disruption and volatility, and, therefore, may cost you more to trade. Although the fund seeks to benefit from keeping its portfolio information confidential, other traders may attempt to use the Proxy Portfolio and publicly available information, including intraday net asset value (INAV) to identify the fund’s trading strategy, which, if successful, could result in such traders engaging in certain predatory trading practices SUMMARY 3 that may have the potential to harm the fund and its shareholders. Because the fund’s shares are traded in the secondary market, a broker may charge a commission to execute a transaction in shares, and you may incur the cost of the spread between the price at which a dealer will buy shares and the somewhat higher price at which a dealer will sell shares. Premium/Discount Although the Proxy Portfolio is intended to provide investors with enough information to allow for an effective arbitrage mechanism that will keep the market price of the fund at or close to the underlying net asset value (NAV) per share of the fund, there is a risk (which may increase during periods of market disruption or volatility) that market prices will vary significantly from the underlying NAV per share of the fund. These price differences may be greater for this fund compared to ETFs that disclose holdings daily because it provides different portfolio holdings information to traders. The adviser will monitor on an ongoing basis how shares trade, including the level of any market price premium or discount to NAV and the bid/ask spreads on market transactions. Each day, the website will also provide the fund’s Tracking Error, which means the standard deviation over the past three months of the daily proxy spread (i.e., the difference, in percentage terms, between the Proxy Portfolio’s per share NAV and that of the fund at the end of the trading day). Trading halt It is possible that an active trading market for the shares will not be maintained, or that trading in the shares will be halted for reasons such as market-wide trading halts or the shares no longer meeting the listing requirements of the exchange. If securities representing 10% or more of the fund’s portfolio do not have readily available market quotations, the fund would promptly request the listing exchange to halt trading on the fund. In addition, to the extent T. Rowe Price determines that a security held in a fund’s portfolio but not in the Proxy Portfolio does not have readily available market quotations and such circumstance may affect the reliability of the Proxy Portfolio as an arbitrage vehicle, that information, along with the identity and weighting of that security in the fund’s portfolio, will be publicly disclosed on the fund’s website. Authorized Participant Just like ETFs that disclose holdings daily, at certain times, the fund’s shares may have a limited number of active “Authorized Participants,” which are financial institutions that are able to transact daily with the fund to purchase and redeem a large specified number of shares of the fund. To the extent they cannot or otherwise are unwilling to engage in creation and redemption transactions, and no other Authorized Participant steps in, shares of the fund may trade at a significant discount or premium to NAV and may face trading halts and delisting from the exchange. Additionally, ETFs that do not disclose portfolio holdings daily are novel, which may limit the number of entities willing to act as Authorized Participants during times of market stress. Enhanced index investing Although the fund seeks to match or incrementally exceed the performance of its benchmark index, holdings are generally not reallocated based on changes in market conditions or outlook for a specific security, industry, or market sector in the same manner as other actively managed funds. As a result, the fund’s performance may lag the performance of other actively managed funds. Additionally, because the fund is designed to T. ROWE PRICE 4 have similar characteristics to the Index, there is ex […] f the fund, and ensuring overall compliance by the analysts with the fund’s portfolio construction principles. The portfolio oversight team is responsible for selecting stocks that meet the fund’s investment criteria, but have not yet been assigned to an analyst. The fund will generally remain fully invested (less than 5% in cash reserves) and seeks to be sector neutral when compared to the Index. While the majority of assets will be invested in large-capitalization U.S. common stocks, the fund may have small- and mid-capitalization and foreign exposure in keeping with fund objectives. The fund is an actively-managed ETF that does not disclose portfolio holdings daily, unlike ETFs that disclose holdings daily. The fund invests primarily in exchange-traded securities that trade synchronously with the fund’s shares, cash, and cash equivalents. Daily disclosure of portfolio holdings allows other traders to predict or copy the fund’s investment strategy, which in turn can hurt the fund’s performance. Therefore, the fund discloses portfolio holdings on a quarterly basis, similar to mutual funds. In order to provide market participants with information on the fund’s investments, the fund will publish a “Proxy Portfolio” on its website daily. A Proxy Portfolio is a basket of securities that is designed to closely track the daily performance of the fund’s portfolio holdings. While the Proxy Portfolio includes some of the fund’s holdings, it is not the fund’s actual portfolio. The Proxy Portfolio could be based on a broad-based securities index or the fund’s recently disclosed portfolio holdings. The Proxy Portfolio can change at any time, but is generally expected to change quarterly. To the extent the adviser determines that a security held in the fund’s portfolio but not in the Proxy Portfolio does not have readily available market quotations and such circumstance may affect the reliability of the Proxy Portfolio as an arbitrage vehicle, that information, along with the identity and weighting of that security in the fund’s portfolio, will be publicly disclosed on the fund’s website. The fund will also provide several portfolio statistics. The Portfolio Overlap is the percentage weight overlap between the holdings of the prior business day’s Proxy Portfolio compared to the holdings of the fund that formed the basis for the fund’s calculation of NAV at the end of T. ROWE PRICE 10 the prior business day. The Proxy Portfolio and Portfolio Overlap are available on the fund’s website on a daily basis, along with the fund’s Daily Deviation, Tracking Error, and Empirical Percentiles, each described below. Daily Deviation shows the difference in performance between the NAV of the fund and the NAV of the Proxy Portfolio. Tracking Error is the deviation over the past three months of the daily proxy spread (i.e., the difference, in percentage terms, between the Proxy Portfolio’s per share NAV and that of the fund at the end of the trading day). Empirical Percentiles shows frequency and magnitude of performance differences between the fund and the Proxy Portfolio over time. The Proxy Portfolio and these other metrics described are intended to provide investors and traders with enough information to allow for an effective arbitrage mechanism, which keeps the market price of the fund’s shares at or close to the underlying NAV per share of the fund. The exchange will disseminate an INAV of the fund, which is based on the fund’s portfolio holdings, every fifteen seconds during the regular trading day. Additional information about the INAV, including the methodology for calculation and risks are available in the fund’s SAI. The fund is “nondiversified,” meaning it may invest a greater portion of its assets in fewer issuers than is permissible for a “diversified” fund. In pursuing its investment objective(s), the fund has the discretion to deviate from its normal investment criteria. These situations might arise when the adviser believes a security could increase in value for a variety of reasons, including an extraordinary corporate event, a new product introduction or innovation, a favorable competitive development, or a change in management. In all circumstances, the fund will limit allowable investments to those investments described in the Statement of Additional Information and be consistent with the fund’s investment policies. The fund may sell securities for a variety of reasons, including to realize gains, limit losses, or redeploy assets into more promising opportunities. The fund invests in the following types of securities or assets: Common an […] rofits on a pro-rata basis and profits may be paid out in dividends or reinvested in the company to help it grow. Increases and decreases in earnings are usually reflected in a company’s stock price, so common stocks generally have the greatest appreciation and depreciation potential of all corporate securities. Unlike common stock, preferred stock does not ordinarily carry voting rights. While most preferred stocks pay a dividend, the fund may decide to purchase preferred stock where the issuer has suspended, or is in danger of suspending, payment of its dividend. Principal Risks The principal risks of investing in this fund, which may be even greater in bad or uncertain market conditions, are summarized as follows: MORE ABOUT THE FUND 11 Proxy portfolio structure The fund does not disclose portfolio holdings daily. The fund uses a Proxy Portfolio, which is a basket of securities that is designed to closely track the daily performance of the fund’s portfolio holdings. The fund may not always effectively construct a proxy portfolio that closely tracks the daily performance of the fund’s portfolio holdings. Because the fund uses a Proxy Portfolio, there is a risk that the fund’s shares may trade at a wider bid/ask spread than shares of ETFs that publish their portfolios on a daily basis. This risk is heightened during periods of market disruption and volatility, and, therefore, may cost you more to trade. Although the fund seeks to benefit from keeping its portfolio i
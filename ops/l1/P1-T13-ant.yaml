nt from traditional ETFs. Traditional ETFs tell the public what assets they hold each day. This ETF will not. This may create additional risks for your investment. For example: • You may have to pay more money to trade this ETF’s shares. This ETF will provide less information to traders, who tend to charge more for trades when they have less information. • The price you pay to buy ETF shares on an exchange may not match the value of an ETF’s portfolio. The same is true when you sell shares. These price differences may be greater for this ETF compared to other ETFs because this ETF provide less information to traders. • These additional risks may be even greater in bad or uncertain market conditions. The differences between this ETF and other ETFs may also have advantages. By keeping certain information about an ETF secret, the ETF may face less risk that other traders can predict or copy its investment strategy. This may improve an ETF’s performance. If other traders are able to copy or predict an ETF’s investment strategy, however, this may hurt the ETF’s performance. For additional information regarding the unique attributes and risks of this ETF, see the “Principal Risks” sections, including “ActiveShares ® Non-Transparent Structure Risk,” “Trading in Fund Shares May Be Halted or Fund Shares May Be Delisted Risk,” “Authorized Participant and AP Representative Concentration Risk,” and “Fund Shares May Trade at Prices other than NAV,” beginning on pages 25, 26 and 27 of this prospectus. Table of Contents TABLE OF CONTENTS FUND SUMMARIES 1 DOUBLELINE OPPORTUNISTIC BOND ETF 1 DOUBLELINE SHILLER CAPE ® U.S. EQUITIES ETF 11 Purchase and Sale of Fund Shares 19 Tax Information 19 Payments to Broker-Dealers and Other Financial Intermediaries 19 ADDITIONAL INFORMATION ABOUT PRINCIPAL INVESTMENT STRATEGIES AND PRINCIPAL RISKS 20 OTHER INFORMATION REGARDING PRINCIPAL INVESTMENT STRATEGIES 24 Principal Risks 24 Temporary Defensive Strategies 51 Portfolio Holdings Information 
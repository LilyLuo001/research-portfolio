      497K 1 c497k.htm SUMMARY PROSPECTUS May 1, 2024 T. ROWE PRICE TDVG Dividend Growth ETF This ETF is different from traditional ETFs. Traditional ETFs tell the public what assets they hold each day. This ETF will not. This may create additional risks for your investment. For example: · You may have to pay more money to trade the ETF’s shares. This ETF will provide less information to traders, who tend to charge more for trades when they have less information. · The price you pay to buy ETF shares on an exchange may not match the value of the ETF’s portfolio. The same is true when you sell shares. These price differences may be greater for this ETF compared to other ETFs because it provides less information to traders. · These additional risks may be even greater in bad or uncertain market conditions. · The ETF will publish on its website each day a “Proxy Portfolio” designed to help trading in shares of the ETF. While the Proxy Portfolio includes some of the ETF’s holdings, it is not the ETF’s actual portfolio. The differences between this ETF and other ETFs may also have advantages. By keeping certain information about the ETF secret, this ETF may face less risk that other traders c […] financial health and growth prospects, and that over the long term, income can contribute significantly to total return. Dividends can also help reduce the fund’s volatility during periods of market turbulence and help offset losses when stock prices are falling. T. ROWE PRICE 2 The adviser’s research analysts look for stocks with sustainable, above-average growth in earnings and dividends. When appropriate, the portfolio manager may attempt to buy stocks when they are temporarily out of favor or undervalued by the market. Holdings tend to be in large- to mid-cap companies. At times, the fund may have a significant portion of its assets invested in the same economic sector. The fund primarily invests in common stock, but may also invest in exchange-traded securities that trade synchronously with the fund’s shares, cash, and cash equivalents. The fund may also invest in American Depositary Receipts (ADRs) and common stocks listed on a foreign exchange that trade on such exchange synchronously with the fund’s shares (i.e., during the U.S. listing exchange’s trading hours). In selecting investments, the adviser generally favors companies that it believes possess one or more of the following: · either a track record of, or the potential for, above-average earnings and dividend growth; · a competitive current dividend yield; · a sound balance sheet and solid cash flow to support future dividend increases; · a sustainable competitive advantage and leading market position; and · attractive valuations, such as low price/earnings, price/cash flow, or price/sales ratios. The fund is an actively-managed, exchange-traded fund (ETF) that does not disclose portfolio holdings daily. In order to provide market participants with information on the fund’s investments, the fund publishes a “Proxy Portfolio” on its website daily. A Proxy Portfolio is a basket of securities that is designed to closely track the daily performance of the fund’s portfolio holdings. While the Proxy Portfolio includes some of the fund’s holdings, it is not the fund’s actual portfolio. The Proxy Portfolio could be based on a broad-based securities index or the fund’s recently disclosed portfolio holdings. The fund’s Portfolio Overlap is available on the fund’s website daily. The Portfolio Overlap is the percentage weight overlap between the holdings of the prior business day’s Proxy Portfolio compared to the holdings of the fund that formed the basis for the fund’s calculation of net asset value (NAV) at the end of the prior business day. Principal Risks As with any fund, there is no guarantee that the fund will achieve its objective(s). The fund’s share price fluctuates, which means you could lose money by investing in the fund. The principal risks of investing in this fund, which may be even greater in bad or uncertain market conditions, are summarized as follows: Proxy portfolio structure: The fund does not disclose portfolio holdings daily. The fund uses a Proxy Portfolio, which is a basket of securities that is designed to closely track the daily performance of the fund’s portfolio holdings. The fund may not always effectively construct a proxy portfolio that closely tracks the daily performance of the fund’s portfolio holdings. Because the fund uses a Proxy Portfolio, there is a risk that the fund’s shares may trade at a wider bid-ask spread than shares of ETFs that disclose their portfolio holdings daily. This risk SUMMARY 3 is heightened during periods of market disruption and volatility, and, therefore, may cost you more to trade. Although the fund seeks to benefit from keeping its portfolio information confidential, other traders may attempt to use the Proxy Portfolio and publicly available information, including intraday net asset value (INAV) to identify the fund’s trading strategy, which, if successful, could result in such traders engaging in certain predatory trading practices that may have the potential to harm the fund and its shareholders. Because the fund’s shares are traded in the secondary market, a broker may charge a commission to execute a transaction in shares, and you may incur the cost of the spread between the price at which a dealer will buy shares and the somewhat higher price at which a dealer will sell shares. Premium/Discount: Although the Proxy Portfolio is intended to provide investors with enough information to allow for an effective arbitrage mechanism that will keep the market price of the fund at or close to the underlying NAV per share of the fund, there is a risk (which may increase during periods of market disruption or volatility) that market prices will vary significantly from the underlying NAV per share of the fund. These price differences may be greater for this fund compared to ETFs that disclose portfolio holdings daily because it provides different portfolio holdings information to traders. The adviser will monitor on an ongoing basis how shares trade, including the level of any market price premium or discount to NAV and the bid-ask spreads on market transactions. Each day, the website provides the fund’s Tracking Error, which means the standard deviation over the past three months of the daily proxy spread (i.e., the difference, in percentage terms, between the Proxy Portfolio’s per share NAV and that of the fund at the end of the trading day). Trading halt: It is possible that an active trading market for the shares will not be maintained, or that trading in the shares will be halted for reasons such as market-wide trading halts or the shares no longer meeting the listing requirements of the listing exchange. If securities representing 10% or more of the fund’s portfolio do not have readily available market quotations, the fund would promptly request the listing exchange to halt trading on the fund. In addition, to the extent T. Rowe Price determines that a security held in a fund’s portfolio but not in the Proxy Portfolio does not have readily available market quotations and such circumstance may affect the reliability of the Proxy Portfolio as an arbitrage vehicle, that information, along with the identity and weighting of that security in the fund’s portfolio, will be publicly disclosed on the fund’s website. Authorized Participant: Just like ETFs that disclose portfolio holdings daily, at certain times, the fund’s shares may have a limited number of active “Authorized Participants,” which are financial institutions that are able to transact daily with the fund to purchase and redeem a large specified number of shares of the fund. To the extent they cannot or otherwise are unwilling to engage in creation and redemption transactions, and no other Authorized Participant steps in, shares of the fund may trade at a significant discount or premium to NAV and may face trading halts and delisting from the exchange. Additionally, ETFs that do not disclose portfolio holdings daily are novel, which may limit the number of entities willing to act as Authorized Participants during times of market stress. Dividend-paying stocks: The fund’s investments in dividend-paying stocks could cause the fund to underperform similar funds that invest without consideration of a company’s track T. ROWE PRICE 4 record of paying dividends. Stocks of companies with a history of paying dividends may not participate in a broad market advance to the same degree as most other stocks, and a sharp rise in interest rates or economic downturn could cause a company to unexpectedly reduce or eliminate its dividend. Market conditions: 

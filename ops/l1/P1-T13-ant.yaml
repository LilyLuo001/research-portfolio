      497 1 d445080d497.htm J.P. MORGAN EXCHANGE-TRADED FUND TRUST J.P. Morgan Exchange-Traded Fund Trust Prospectus J.P. Morgan Exchange-Traded Funds March 2, 2023 JPMorgan Active Small Cap Value ETF Ticker: JPSV Listing Exchange: NYSE Arca THIS FUND IS DIFFERENT FROM TRADITIONAL ETFs Traditional exchange-traded funds (ETFs) tell the public what assets they hold each day. This Fund will not. This may create additional risks for your investment. For example: • You may have to pay more money to trade the Fund’s shares. This Fund will provide less information to traders, who tend to charge more for trades when they have less information. • The price you pay to buy fund shares on an exchange may not match the value of the Fund’s portfolio. The same is true when you sell shares. These price differences may be greater for this Fund compared to other ETFs because it provides less information to traders. • These additional risks may be even greater in bad or uncertain market conditions. • The ETF will publish on its website each day a “Proxy Portfolio” designed to help trading in shares of the ETF. While the Proxy Portfolio includes some of the ETF’s holdings, it is not the ETF’s actual portfol […] itively impacted by such factors. March 2, 2023 | 1 JPMorgan Active Small Cap Value ETF (continued) The adviser may sell a security for several reasons. A security may be sold due to a change in the company’s fundamentals or if the adviser believes the security is no longer attractively valued. Investments may also be sold if the adviser identifies a security that it believes offers a better investment opportunity. The Fund is an actively managed ETF that operates pursuant to an exemptive order (the Order) from the Securities and Exchange Commission (the SEC) and is not required to publicly disclose its complete portfolio holdings each business day. In lieu of publishing its portfolio contents (Actual Portfolio) daily, the Fund publishes a proxy portfolio (Proxy Portfolio) each day on its website. The Proxy Portfolio is designed to closely track the daily performance of the Fund but is not the Actual Portfolio. The Fund will also publish certain related information about the Proxy Portfolio and the Actual Portfolio on its website daily. There is no minimum overlap required between the Actual Portfolio and the Proxy Portfolio. The Fund’s Main Investment Risks The Fund is subject to management risk and may not achieve its objective if the adviser’s expectations regarding particular instruments or markets are not met. An investment in this Fund or any other fund may not provide a complete investment program. The suitability of an investment in the Fund should be considered based on the investment objective, strategies and risks described in this prospectus, considered in light of all of the other investments in your portfolio, as well as your risk tolerance, financial goals and time horizons. You may want to consult with a financial advisor to determine if this Fund is suitable for you. The Fund is subject to the main risks noted below, any of which may adversely affect the Fund’s net asset value (NAV), market price, performance and ability to meet its investment objective. Proxy Portfolio Risk. Unlike traditional ETFs that disclose their portfolio holdings on a daily basis, the Fund discloses a Proxy Portfolio. The goal of the Proxy Portfolio, during all market conditions, is to track closely the daily performance of the Actual Portfolio and minimize intra-day misalignment between the performance of the Proxy Portfolio and the performance of the Actual Portfolio. The Proxy Portfolio is designed to reflect the economic exposures and the risk characteristics of the Actual Portfolio on any given trading day. The Proxy Portfolio is intended to provide authorized participants and other market participants with enough information to support an effective arbitrage mechanism that keeps the market price of the Fund at or close to the underlying net asset value (NAV) per share of the Fund. The Proxy Portfolio methodology is novel and not yet proven as an effective arbitrage mechanism. The effectiveness of the Proxy Portfolio as an arbitrage mechanism is contingent upon, among other things, the Fund’s factor model analysis creating a Proxy Portfolio that performs in a manner substantially identical to the performance of the Actual Portfolio and the willingness of authorized participants and other market participants to trade based on a Proxy Portfolio. There is no guarantee that this arbitrage mechanism will operate as intended. Further, while the Proxy Portfolio will include some of the Fund’s holdings, it is not the Actual Portfolio. ETFs trading on the basis of a published Proxy Portfolio may exhibit wider premiums and discounts, bid/ask spreads, and tracking error than other ETFs using the same investment strategies that publish their portfolios on a daily basis, especially during periods of market disruption or volatility. Therefore, Shares of the Fund may cost investors more to trade than shares of a traditional ETF. • Each day the Fund calculates the overlap between the holdings of the prior business day’s Proxy Portfolio compared to the Actual Portfolio (Proxy Overlap) and the difference, in percentage terms, between the Proxy Portfolio per share NAV and that of the Actual Portfolio (Tracking Error). If the Tracking Error becomes large, there is a risk that the performance of the Proxy Portfolio may deviate from the performance of the Actual Portfolio. • The adviser monitors its Tracking Error, bid/ask spread and premiums/discounts on an ongoing basis. If these items reach certain levels outlined by the Order, the adviser will call a meeting of the Fund’s Board of Trustees (the Board) to consider the recommendations regarding the continuing viability of the Fund, whether shareholders are being harmed, and what, if any, corrective measures would be appropriate. See the Statement of Additional Information for further discussion of the Board’s monitoring responsibilities. • Although the Fund seeks to benefit from keeping its portfolio information secret, market participants may attempt to use the Proxy Portfolio to identify the Fund’s trading strategy, which if successful, could result in such market participants engaging in certain predatory trading practices that may have the potential to harm the Fund and its shareholders. The Proxy Portfolio and any related disclosures have been designed to minimize the risk of predatory trading practices, but they may not be successful in doing so. Premium/Discount Risk. Publication of the Proxy Portfolio does not have the same level of transparency as the publication of the Actual Portfolio by a fully transparent ETF. Although the Proxy Portfolio is intended to provide authorized participants and other market participants with enough information to allow for an effective arbitrage mechanism that is intended to keep the market price of the Fund at or close to the underlying NAV per share of the Fund, there is a risk (which may increase during periods of market disruption or volatility) that market prices will vary significantly from NAV per share of the Fund. This means the price paid to buy Shares on an exchange may not match the value of the Fund’s portfolio. The same is true when Shares are sold. Trading Halt Risk. If securities representing 10% or more of the Actual Portfolio do not have readily available market quotations, the Fund will promptly request that the listing exchange 2 | J.P. Morgan Exchange-Traded Funds halt trading in the Fund’s Shares which means that investors would not be able to trade their Shares. Trading halts may have a greater impact on the Fund compared to other ETFs due to the Fund’s structure. If the trading of a security held in the Fund’s Actual Portfolio is halted, or otherwise does not have readily available market quotations, and the investment adviser believes that the lack of any such readily available market quotations may affect the reliability of the Proxy Portfolio as an arbitrage vehicle, or otherwise determines it is in the best interest of the Fund, the investment adviser will promptly disclose on the Fund’s website the identity and weighting of such security for so long as such security’s trading is halted or otherwise does not have readily available market quotations and remains in the Actual Portfolio. Tracking Error Risk. Although the Proxy Portfolio is designed to reflect the economic exposure and risk characteristics of the Actual Portfolio on any given trading day, there is a risk that the performance of the Proxy Portfolio will diverge from the performance of the Actual Portfolio, potentially materially. If the Tracking Error becomes too large, the Fund will disclose its securities on a daily basis until it is able to reduce its Tracking Error. This would result in the Fund losing the protection of the Proxy Portfolio strategy for some period of time or require the Board to consider other actions for the Fund. Equity Market Risk. The price of equity securities may rise or fall because of changes in the broad market or changes in a company’s financial condition, sometimes rapidly or unpredictably. These price movements may result from factors affecting individual companies, sectors or industries selected for the Fund’s portfolio or the securities market as a whole, such as changes in economic or political conditions. When the value of the Fund’s securities goes down, your investment in the Fund decreases in value. General Market Risk. Economies and financial markets throughout the world are becoming increasingly interconnected, which increases the likelihood that events or conditions in one country or region will adversely impact markets or issuers in other countries or regions. Securities in the Fund’s portfolio may underperform in comparison to securities in general financial markets, a particular financial market or other asset classes due to a number of factors, including inflation (or expectations for inflation), deflation (or expectations for deflation), interest rates, global demand for particular products or resources, market instability, debt crises and downgrades, embargoes, tariffs, sanctions and other trade barriers, regulatory events, other governmental trade or market control programs and related geopolitical events. In addition, the value of the Fund’s investm […] at jpmorganfunds.com. Tax Information To the extent the Fund makes distributions, those distributions will be taxed as ordinary income or capital gains, except when your investment is in an IRA, 401(k) plan or other tax-advantaged investment plan, in which case you may be subject to federal income tax upon withdrawal from the tax-advantaged investment plan. Payments to Broker-Dealers and Other Financial Intermediaries If you purchase Shares of the Fund through a broker-dealer or other financial intermediary (such as a bank), the adviser and its related companies may pay the financial intermediary for the sale of Shares and related services. These payments may create a conflict of interest by influencing the broker-dealer or 4 | J.P. Morgan Exchange-Traded Funds financial intermediary and your salesperson to recommend the Fund over another investment. Ask your salesperson or visit your financial intermediary’s website for more information. March 2, 2023 | 5 More About the Fund Additional Information About the Fund’s Investment Strategies The Fund is an ETF, which is a fund that trades like other publicly-traded securities. The Fund is not an index fund. The Fund is actively managed and does not seek to replicate the performance of a specified index. The Fund operates in reliance on the Order, which incorporates by reference the conditions and restrictions of a previous order issued by the SEC, to permit the operation of non-transparent active ETFs (the Prior Order), and limits the types of investments the Fund may hold to those listed in the application for the Prior Order. Under the terms of the Order, the Fund may invest only in the following types of securities: ETFs, exchange-traded notes, exchange-traded common stocks (excluding “penny stocks”), common stocks listed on a foreign exchange that trade on such exchange contemporaneously with the Fund’s Shares, exchange-traded preferred stocks, exchange-traded American Depositary Receipts, exchange-traded REITs, exchange-traded commodity pools, exchange-traded metals trusts, exchange-traded currency trusts and exchange-traded futures that trade contemporaneously with Fund Shares, as well as cash and cash equivalents (which are short-term U.S. Treasury securities, government money market funds, and repurchase agreements). The name, investment objective and policies of the Fund are similar to other funds advised by the adviser or its affiliates. However, the investment results of the Fund may be higher or lower than, and there is no guarantee that the investment results of the Fund will be comparable to, any other of these funds. A new fund or a fund with fewer assets under management may be more significantly affected by purchases and redemptions of its Creation Units (as defined below) than a fund with relatively greater assets under management would be affected by purchases and redemptions of its shares. As compared to a larger fund, a new or smaller fund is more likely to sell a comparatively large portion of its portfolio to meet significant Creation Unit redemptions, or invest a comparatively large amount of cash to facilitate Creation Unit purchases, in each case when the fund otherwise would not seek to do so. Such transactions may cause funds to make investment decisions at inopportune times or prices or miss attractive investment opportunities. Such transactions may also accelerate the realization of taxable income if sales of securities resulted in gains and the fund redeems Creation Units for cash, or otherwise cause a fund to perform differently than intended. While such risks may apply to funds of any size, such risks are heightened in funds with fewer assets under management. In addition, new funds may not be able to fully implement their investment strategy immediately upon commencing investment operations, which could reduce investment performance. The adviser, in its discretion, may make modifications to the Fund’s investment strategy that it believes to be in the best interests of the Fund, including to address capacity or other concerns. Such modifications may include, but are not limited to, the addition of investment sleeves managed by other investment teams or changes to investment methodology, utilization of other investment companies and the conversion of the Fund to a transparent structure. Any such changes may adversely impact the Fund’s performance. Main Investment Strategies Under normal circumstances, the Fund invests at least 80% of its Assets in equity securities of small cap companies. “Assets” means net assets, plus the amount of borrowings for investment purposes. Small cap companies are companies with market capitalizations equal to those within the universe of the Russell 2000 ® Value Index stocks at the time of purchase. As of January 31, 2023, the market capitalizations of the companies in the Russell 2000 ® Value Index ranged from $6.8 million to $7,168.0 million. The small cap companies in which the Fund invests are listed on an exchange that trades contemporaneously with the Fund’s Shares. In implementing its main strategies, the Fund’s equity investments are primarily in common stock and REITs. Investment Process: In reviewing investment opportunities, the adviser implements an investment process that seeks to systematically identify high quality small cap companies at attractive valuations. Specifically, the adviser seeks to invest in attractively valued companies with durable businesses, strong balance sheets and which are led by management teams who have proven their ability to increase the intrinsic value per share of the company. • In making such evaluations, the adviser considers a company to be attractively valued based on characteristics such as the market value that has been added since […] erally generate strong levels of free cash flow with reasonable debt levels. • In considering whether a management team has proven its ability to increase the intrinsic value per share, the adviser looks at whether management has earned and grown economic profits, i.e., generated returns in excess of the cost of capital over time. The adviser also integrates financially material environmental, social and governance (ESG) factors as part of the Fund’s investment process (ESG Integration). ESG Integration is the systematic inclusion of ESG issues in investment analysis and investment decisions. As part of its investment process, the adviser seeks to assess the impact of ESG factors on many issuers in the universe in which the 6 | J.P. Morgan Exchange-Traded Funds Fund may invest. The adviser’s assessment is based on an analysis of key opportunities and risks across industries to identify financially material issues with respect to the Fund’s investments in issuers and ascertain key issues that merit engagement with issuers. These assessments may not be conclusive and securities of issuers that may be negatively impacted by such factors may be purchased and retained by the Fund, while the Fund may divest or not invest in securities of issuers that may be positively impacted by such factors. In particular, ESG Integration does not change the Fund’s investment objective, exclude specific types of industries or companies or limit the Fund’s investable universe. The Fund is not designed for investors who wish to screen out particular types of companies or investments or are looking for Funds that meet specific ESG goals. The adviser may sell a security for several reasons. A security may be sold due to a change in the company’s fundamentals or if the adviser believes the security is no longer attractively valued. Investments may also be sold if the adviser identifies a security that it believes offers a better investment opportunity. The Fund is an actively managed ETF that operates pursuant to the Order and is not required to publicly disclose its complete portfolio holdings each business day. In lieu of publishing its Actual Portfolio daily, the Fund publishes the Proxy Portfolio each day on its website. The Proxy P

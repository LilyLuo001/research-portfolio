      N-1A 1 d270792dn1a.htm THRIVENT ETF TRUST Thrivent ETF Trust Securities Act Registration No. [ ] Investment Company Act Registration No. 811-23759 As filed with the Securities and Exchange Commission on December 1, 2021 SECURITIES AND EXCHANGE COMMISSION Washington, D.C. 20549 FORM N-1A REGISTRATION STATEMENT UNDER THE SECURITIES ACT OF 1933 Pre-Effective Amendment No. Post-Effective Amendment No. and REGISTRATION STATEMENT UNDER THE INVESTMENT COMPANY ACT OF 1940 Amendment No. THRIVENT ETF TRUST (Exact Name of Registrant as Specified in Declaration of Trust) 901 Marquette Avenue, Suite 2500 Minneapolis, Minnesota 55402-3211 (612) 844-7190 Name and Address of Agent for Service John D. Jackson Secretary Thrivent ETF Trust Copies to: Brian D. McCabe Ropes & Gray LLP Prudential Tower 800 Boylston Street, Boston, Massachusetts 02199 Jeremy C. Smith Ropes & Gray LLP 1211 Avenue of the Americas, New York, New York 11036 Approximate Date of proposed public offering: As soon as practicable after the effective date of this Registration Statement. TO THE SECURITIES AND EXCHANGE COMMISSION: Registrant hereby amends this Registration Statement on such date or dates as may be necessary to delay […] raditional ETFs Traditional ETFs tell the public what assets they hold each day. This fund will not. This may create additional risks for your investment. For example: ◾ You may have to pay more money to trade the fund’s shares. This fund will provide less information to traders, who tend to charge more for trades when they have less information. ◾ The price you pay to buy fund shares on an exchange may not match the value of the fund’s portfolio. The same is true when you sell shares. These price differences may be greater for this fund compared to other ETFs because it provides less information to traders. ◾ These additional risks may be even greater in bad or uncertain market conditions. ◾ The ETF will publish on its website each day a “Proxy Portfolio” designed to help trading in shares of the ETF. While the Proxy Portfolio includes some of the ETF’s holdings, it is not the ETF’s actual portfolio. The differences between this fund and other ETFs may also have advantages. By keeping certain information about the fund secret, this fund may face less risk that other traders can predict or copy its investment strategy. This may improve the fund’s performance. If other traders are able to copy or predict the fund’s investment strategy, however, this may hurt the fund’s performance. For additional information regarding the unique attributes and risks of the fund, see the “Principal Risks” section of this prospectus. The Securities and Exchange Commission has not approved or disapproved these securities or determined if this prospectus is truthful or complete. Any representation to the contrary is a criminal offense. Shares of Thrivent ETF Trust are not deposits or other obligations of Thrivent Trust Company or any bank or insured or otherwise protected by the Federal Deposit Insurance Corporation or any other federal agency. Shares of Thrivent ETF Trust are subject to investment risk, including possible loss of the principal amount invested. Table of Contents Summary Section Thrivent Small-Mid Cap ESG ETF 3 More about Investment Strategies and Risks 8 Information about Certain Non-Principal Investment Strategies 8 More About ESG Investing 9 Differences Between Investing in an ETF and a Mutual Fund 9 Glossary of Principal Risks 10 Management of the Fund 15 Investment Adviser 15 Management Fees 15 Portfolio Management 15 Other Service Providers 15 Personal Securities Investments 16 Trademarks and Disclaimers 16 Shareholder Information 18 How to Contact Us 18 Buying and Selling Shares 18 Book Entry 19 Share Trading Prices 19 Calculating Net Asset Value 19 Rule 12b-1 Fees 19 Policy Regarding Short-Term or Excessive Trading 20 Investments by Registered Investment Companies 20 Payment to Broker-Dealers and Other Financial Intermediaries 20 Redeeming Fund Shares 21 Disclosure of Portfolio Holdings 21 Distributions and Taxes 22 Dividends 22 Capital Gains 22 Taxes 22 Back-up Withholding 22 Authorized Participants Purchasing and Redeeming in Creation Units 22 Other Information 24 Premium/Discount Information 24 Proxy Portfolio and Proxy Overlap 24 Continuous Offering 24 Conflicts of Interest 24 2 Thrivent Small-Mid Cap ESG ETF Ticker Symbol: TSME Investment Objective Thrivent Small-Mid Cap ESG ETF (the “Fund”) seeks long-term capital growth. The Fund’s investment objective may be changed without shareholder approval. Fees and Expenses This table describes the fees and expenses you may pay if you buy, hold and sell shares of the Fund. You may pay other fees, such as brokerage commissions and other fees to financial intermediaries, which are not reflected in the table and Example below. Annual Fund Operating Expenses (expenses that you pay each year as a percentage of the value of your investment) Management Fees [ ]% Distribution and Shareholder Service (12b-1) Fees [ ]% Other Expenses 1 [ ]% Total Annual Fund Operating Expenses [ ]% 1 “Other expenses” is an estimate based on the expenses the Fund expects to incur for its first full fiscal year. Example This example is intended to help you compare the cost of investing in the Fund with the cost of investing in other funds. The example assumes that you invest $10,000 in the Fund for the time periods indicated (whether or not shares are sold or redeemed), and also assumes that your investment has a 5% return each year and that the Fund’s operating expenses remain the same. The example does not take into account brokerage commissions and other fees to financial intermediaries that you may pay on your purchases and sales of shares of the […]  area will not necessarily exclude a company as an eligible investment. The ESG factors considered by the Adviser and their relative weights may evolve over time and the determinations made by the Adviser may differ from those made by others, including other investment advisers. While the Adviser may determine how much weight to give to specific ESG factors, the Fund will not invest in companies that the Adviser determines derive revenue primarily from direct involvement with gambling, manufacturing of alcohol or tobacco products, adult entertainment, or abortion. In making this assessment, the Adviser may rely on, among other things, any information provided by third party vendors or by statements by the relevant companies. The Fund is an exchange-traded fund (“ETF”). However, unlike traditional ETFs, which generally publish their portfolio holdings on a daily basis, the Fund discloses a “Proxy Portfolio,” which is different from the Fund’s actual portfolio holdings (“Actual Portfolio”). The Proxy Portfolio and certain related information about the Actual Portfolio are disclosed in order to keep the market price of the Fund’s shares trading at or close to the net asset value (“NAV”) of the Fund’s shares. The Proxy Portfolio will include some, but not all, of the Fund’s actual holdings. Market participants may attempt to use the Proxy Portfolio to identify the Fund’s trading strategy, which could result in market participants engaging in predatory trading practices that could harm the Fund and its shareholders. The Fund is actively managed and does not track an index. The Fund is limited by regulation in the types of securities in which it can invest, which may limit the Fund’s ability to implement its investment strategies. Principal Risks The Fund is subject to the following principal investment risks, which you should review carefully and in entirety. The Fund may not achieve its investment objective and you could lose money by investing in the Fund. Proxy Portfolio Risk. Unlike traditional ETFs that disclose their portfolio holdings on a daily basis, the Fund does not disclose its holdings daily, rather it discloses a Proxy Portfolio. The goal of the Proxy Portfolio, during all market conditions, is to track closely the daily performance of the Actual Portfolio and minimize intra-day misalignment between the performance of the Proxy Portfolio and the performance of the Actual Portfolio. The Proxy Portfolio is designed to reflect the economic exposures and the risk characteristics of the Actual Portfolio on any given trading day. The Proxy Portfolio is intended to provide Authorized Participants (which are members or participants of a clearing agency registered with the SEC, which have a written agreement with the Fund that allows them to place orders for the purchase and redemption of Creation Units) and other market participants with enough information to support an effective arbitrage mechanism that keeps the market price of the Fund at or close to the underlying NAV per share of the Fund. Thrivent Asset Management, LLC (“Thrivent Asset Mgt.” or the “Adviser”) has licensed from a 4 third party the right to use a model that will determine the Proxy Portfolio. The Fund’s ability to operate as described herein depends on the quality of that model and the timely and accurate determination of the Proxy Portfolio each day. The Proxy Portfolio methodology is novel, has only been in use for a limited period of time, and is not yet proven as an effective arbitrage mechanism. There can be no assurance that the Proxy Portfolio will function as expected or that it will support an effective arbitrage mechanism, especially under difficult or stressed market conditions, and there can be no assurance that the intellectual property necessary to utilize the Proxy Portfolio will remain available to the Fund. The effectiveness of the Proxy Portfolio as an arbitrage mechanism is contingent upon, among other things, the Proxy Portfolio performing in a manner substantially identical to the performance of the Actual Portfolio and the willingness of Authorized Participants and other market participants to trade based on a Proxy Portfolio. There is no guarantee that this arbitrage mechanism will operate as intended or with the intended effects. The Fund may not function as intended and the market price of its shares may be adversely affected if the licensor of the methodology used to determine the Proxy Portfolio fails to continue to make the intellectual property used to determine the Proxy Portfolio available for use by the Fund. Further, while the Proxy Portfolio may include some of the Fund’s holdings, it is not the Fund’s Actual Portfolio. ETFs trading on the basis of a published Proxy Portfolio may exhibit wider premiums and discounts, bid/ask spreads, and tracking error than other ETFs using the same investment strategies that publish their portfolios on a daily basis, especially during periods of market disruption or volatility. Therefore, shares of the Fund may cost investors more to trade than shares of a traditional ETF. ◾ Each day the Fund calculates the overlap between the holdings of the prior Business Day’s Proxy Portfolio compared to the Actual Portfolio (“Proxy Overlap”) and the difference, in percentage terms, between the Proxy Portfolio per share NAV and that of the Actual Portfolio (“Tracking Error”). If the Tracking Error becomes large, there is a risk that the performance of the Proxy Portfolio may deviate from the performance of the Actual Portfolio. ◾ The Fund’s Board of Trustees (the “Board”) monitors its Tracking Error, bid/ask spread and premiums/discounts. If deviations become too large, the Board will consider the continuing viability of the Fund, whether shareholders are being harmed, and what, if any, corrective measures would be appropriate. See the Statement of Additional Information for further discussion of the Board’s monitoring responsibilities. ◾ Although the Fund seeks to benefit from keeping its portfolio information secret, market participants may attempt to use the Proxy Portfolio to identify the Fund’s trading strategy, which if successful, could result in such market participants engaging in certain predatory trading practices that may have the potential to harm the Fund and its shareholders. The Proxy Portfolio and any related disclosures have been designed to minimize the risk of predatory trading practices, but they may not be successful in doing so. Premium/Discount Risk . Publication of the Proxy Portfolio is not the same level of transparency as the publication of the Actual Portfolio by a fully transparent ETF. Although the Proxy Portfolio is intended to provide Authorized Participants and other market participants with enough information to allow for an effective arbitrage mechanism that is intended to keep the market price of the Fund at or close to the underlying NAV per share of the Fund, there is a risk (which may increase during periods of market disruption or volatility) that the market price of the Fund’s shares will vary significantly from the NAV per share of the Fund. This means the price paid to buy shares on an exchange may not match the value of the Fund’s portfolio. The same is true when shares are sold. Equity Security Risk. Equity securities held by the Fund may decline significantly in price, sometimes rapidly or unpredictably, over short or extended periods of time, and such declines may occur because of declines in the equity market as a whole, or because of declines in only a particular country, company, industry, or sector of the market. From time to time, the Fund may invest a significant portion of its assets in companies in one or more related sectors or industries which would make the Fund more vulnerable to adverse developments affecting such sectors or industries. Equity securities are generally more volatile than most debt securities. Market Risk. Over time, securities markets generally tend to move in cycles with periods when security prices rise and periods when security prices decline. The value of the Fund’s investments may move with these cycles and, in some ins […] eation and/or redemption orders, Fund shares may trade at a discount to NAV and possibly face trading halts and/or delisting. This risk may be more pronounced during periods of market volatility or market disruptions. The fact that the Fund is offering a novel and unique structure may affect the number of entities willing to act as authorized participants. Trading Halt Risk . If securities representing 10% or more of the Fund’s Actual Portfolio do not have readily available market quotations, the Fund will promptly request that the listing exchange halt trading in the Fund’s shares which means that investors would not be able to trade their shares. Trading halts may have a greater impact on the Fund compared to other ETFs due to the Fund’s semi-transparent structure. If the trading of a security held in the Fund’s Actual Portfolio is halted, or otherwise does not have readily available market quotations, and the Adviser believes that the lack of any such readily available market quotations may affect the reliability of the Proxy Portfolio as an arbitrage vehicle, or otherwise determines it is in the best interest of the Fund, the Adviser will promptly disclose on the Fund’s website the identity and weighting of such security for so long as such security’s trading is halted or otherwise does not have readily available market quotations and remains in the Actual Portfolio. Tracking Error Ris k. Although the Proxy Portfolio is designed to reflect the economic exposure and risk characteristics of the Fund’s Actual Portfolio on any given trading day, there is a risk that the performance of the Proxy Portfolio will diverge from the performance of the Actual Portfolio, potentially materially. Mid Cap Risk. Medium-sized companies often have greater price volatility, lower trading volume, and less liquidity than larger, more-established companies. These companies tend to have smaller revenues, narrower product lines, less management depth and experience, smaller shares of their product or service markets, fewer finan
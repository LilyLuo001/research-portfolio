is subject to the following risks: Authorized Participants Concentration Risk. The Fund has a limited number of financial institutions that may act as Authorized Participants. To the extent they exit the business or are otherwise unable to proceed in creation and redemption transactions with the Fund and no other Authorized Participant is able to step forward to create or redeem, shares of the Fund may be more likely to trade at a premium or discount to net asset value (“NAV”) and possibly face trading halts or delisting. Authorized Participant concentration risk may be heightened for ETFs, such as the Fund, that invest in securities issued by non-U.S. issuers or other securities or instruments that have lower trading volumes. Premium/Discount Risk. There may be times when the market price of the Fund’s shares is more than the NAV intra-day (at a premium) or less than the NAV intra-day (at a discount). As a result, shareholders of the Fund may pay more than NAV when purchasing shares and receive less than NAV when selling Fund shares. This risk is heightened in times of market volatility or periods of steep market declines. In such market conditions, market or stop loss orders to sell Fund shares may be executed at prices well below NAV. Secondary Market Trading Risk. Investors buying or selling shares in the secondary market will normally pay brokerage commissions, which are often a fixed amount and may be a significant proportional cos […] greater risk than larger funds of wider bid-ask spreads for its shares, trading at a greater premium or discount to NAV and/or a stop to trading. Non-Diversified Fund Risk. The Fund is classified as non-diversified. As such, the percentage of the Fund’s assets invested in any single issuer, or a few issuers is not limited as much as it is for a Fund classified as diversified. Investing a higher percentage of its assets in any one or a few issuers could increase the Fund’s risk of loss and its share price volatility, because the value of its shares would be more susceptible to adverse events affecting those issuers. Other Investment Company Risk . To the extent the Fund invests in other investment companies, including money market funds and exchange-traded funds (ETFs), its performance will be affected by the performance of those other investment companies. Investments in other investment companies are subject to the risks of the other investment companies’ investments, as well as to the other investment companies’ expenses. An ETF may trade in the secondary market at a price below the value of its underlying portfolio, may not be liquid and may be halted by the listing exchange. An actively managed ETF’s performance will reflect its adviser’s ability to make investment decisions that are suited to achieving the ETF’s investment objectives. A passively managed ETF may not replicate the performance of the index it intends to track. Recent Market Conditions. Both U.S. and international markets have experienced significant volatility in recent months and years. As a result of such volatility, investment returns may fluctuate significantly. National economies are substantially interconnected, as are global financial markets, which creates the possibility that conditions in one country or region might adversely impact issuers in a different country or region. However, the interconnectedness of economies and/or markets may be diminishing or changing, which may impact such economies and markets in ways that cannot be foreseen at this time. Although interest rates were unusually low in recent years in the U.S. and abroad, recently, the Federal Reserve and certain foreign central banks raised interest rates as part of th […] in the currency exchange rate if, as is often the case, the underlying foreign securities are denominated in foreign currency, and there may be an imperfect correlation between the market value of depositary receipts and the underlying foreign securities. In addition, holders of
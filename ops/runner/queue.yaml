# ============================================================================
# queue.yaml — the single merged task DAG for P1 + E2 + DAX
# ----------------------------------------------------------------------------
# This is the ONE vocabulary that replaces P1 §5, E2 连续性矩阵, and DAX lineage.
# Every task from all three manuals AND the three amendment patches is a node.
#
# Field meaning:
#   id              unique across the portfolio (project prefix keeps it unique)
#   project         p1 | e2 | dax | shared
#   owner_account   which Pro seat is allowed to run the L2 part of this task
#                   (see ops/accounts.yaml). NULL = pure L1/deterministic, no seat.
#   worker          model tier that does the work:
#                     code_pro     = Claude Code prime block (human-driven, official app)
#                     project_pro  = claude.ai Project session (human-driven, official app)
#                     deepseek_r   = DeepSeek reasoning (L1, scripted, own API key)
#                     deepseek     = DeepSeek standard code (L1)
#                     kimi         = Kimi + $web_search (L1)
#                     glm | qwen   = GLM/Qwen second stack / bulk / 中文 (L1)
#                     gemini_free  = Gemini Flash free tier (L1, cross-vendor channel B)
#                     script       = deterministic Python, no LLM at all (L0)
#   depends_on      task ids whose output_contract must PASS before this is ready
#   inputs          files this task reads
#   output_contract name of the schema in ops/contracts/ that its output must pass
#   human_gate      true = a human decision node; branch parks here, portfolio keeps moving
#   channel_of      for dual-channel tasks: the id this is the B-channel of (must be
#                   a DIFFERENT vendor family than the A-channel — enforced by runner)
#   max_attempts    two-strike ladder escalates on this+1
#   notes           amendment provenance etc.
# ============================================================================

meta:
  version: "1.0"
  priority_order: [dax, e2, p1]        # tie-break when seats/L1 budget contended (arch §5)
  vendor_families:                     # for cross-vendor independence checks (arch §3)
    code_pro: anthropic
    project_pro: anthropic
    deepseek_r: deepseek
    deepseek: deepseek
    kimi: moonshot
    glm: zhipu
    qwen: alibaba
    gemini_free: google


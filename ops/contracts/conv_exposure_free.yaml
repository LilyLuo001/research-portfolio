# P1-T2 FREE-PATH output — parallel to conv_exposure.yaml (no WRDS/CRSP).
# Same holdings-based ConvExp, but sourced from EDGAR N-PORT + OpenFIGI + XBRL,
# so every number carries a public locator (meta-rule 1) with zero paid data.
#
# Keyed on the public CUSIP (there is no permno without CRSP). This is a NEW
# contract for the free path — it does NOT modify the frozen conv_exposure.yaml
# (which stays [permno, wave_id]); nothing downstream consumes a 'stock_cusip'
# column, so 'cusip' is the canonical key here. A cusip<->ticker<->cik crosswalk
# ships alongside so a later CRSP merge recovers permno without renaming a column.
#
# NOTE: an earlier revision of this file was merge-corrupted into two concatenated
# YAML documents (a 'cusip' block + a leftover 'stock_cusip' scaffold block). Under
# yaml.safe_load that silently resolved to the stray 'stock_cusip' key and made the
# validator demand a column the parquet never had. This is the repaired single-doc
# version, aligned 1:1 with the columns the pipeline actually emits.
producer: P1-T2-free
primary_key: [cusip, wave_id]
strict_columns: false
columns:
  # ---- crosswalk keys (public) ----
  cusip: {required: true}          # 9-char CUSIP from the N-PORT holding
  ticker: {}                       # resolved symbol (N-PORT field or OpenFIGI)
  stock_cik: {}                    # SEC issuer CIK (company_tickers.json)
  permno: {}                       # empty until a CRSP merge; kept for parallelism
  # ---- ConvExp core ----
  wave_id: {required: true}
  effective_date: {required: true}
  conv_exp: {required: true, min: 0}
  n_funds: {min: 0}
  mcap_decile: {min: 1, max: 10}
  pre_etf_ownership: {min: 0}
  # ---- additive provenance / audit ----
  shares_held: {min: 0}            # Σ fund shares held pre-conversion
  shares_outstanding: {min: 0}     # issuer shares outstanding (XBRL dei)
  source_accessions: {}            # ';'-joined N-PORT accession(s)

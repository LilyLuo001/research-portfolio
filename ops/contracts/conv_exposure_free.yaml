# P1-T2 FREE-PATH output — parallel to conv_exposure.yaml (no WRDS/CRSP).
# Same holdings-based ConvExp, but sourced from EDGAR N-PORT + OpenFIGI + XBRL,
# so every number carries a public locator (meta-rule 1) with zero paid data.
#
# Keyed on the public CUSIP (there is no permno without CRSP). Every frozen
# conv_exposure column is reproduced 1:1 with the SAME name so a later CRSP
# merge on the crosswalk recovers permno WITHOUT renaming a frozen column
# (CLAUDE.md rule 3). The extra columns are additive provenance/crosswalk only.
producer: P1-T2-free
primary_key: [cusip, wave_id]
strict_columns: false
columns:
  # ---- crosswalk keys (public) ----
  cusip: {required: true}          # 9-char CUSIP from N-PORT holding
  ticker: {}                       # resolved symbol (N-PORT field or OpenFIGI)
  stock_cik: {}                    # SEC issuer CIK (company_tickers.json)
  permno: {}                       # empty until a CRSP merge; kept for parallelism
  # ---- frozen conv_exposure columns, reproduced 1:1 ----
  wave_id: {required: true}
  effective_date: {required: true}
  conv_exp: {required: true, min: 0}
  n_funds: {min: 0}
  mcap_decile: {min: 1, max: 10}
  pre_etf_ownership: {min: 0}
  # ---- additive provenance / audit ----
  shares_held: {min: 0}            # Σ fund shares held pre-conversion
  shares_outstanding: {min: 0}     # issuer shares outstanding (XBRL dei)
  source_accessions: {}            # ';'-joined N-PORT accession(s)

name: portfolio-ci

# Gates every pull request. "Done = the contract passes" — enforced by GitHub,
# not by human vigilance. Four things run (all from the repo root, which is now
# the project root):
#   1. selfcheck  — DAG / contract / vendor-independence integrity of the queue
#   2. plan       — the scheduler executes without error
#   3. econlib    — pytest, only once SH-econlib has produced tests (skips before)
#   4. DAX guards — NDA-aggregate grep + pre-registration tag guard (release blockers)

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  backbone:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0          # full history + tags (needed for the pre-registration guard)

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install backbone dependencies
        run: pip install --quiet pyyaml pandas pyarrow pytest requests

      - name: Selfcheck — queue DAG + contracts + vendor independence
        run: python ops/runner/selfcheck.py

      - name: Plan — scheduler runs clean
        run: python ops/runner/runner.py --plan

      - name: Econlib tests (skipped until SH-econlib exists)
        run: |
          if find . -path ./.git -prune -o -name 'test_*.py' -print | grep -q .; then
            echo "tests found — running pytest"
            pytest -q
          else
            echo "no tests yet — skipping"
          fi

      - name: DAX guard — no OpenAI NDA aggregates in the repo
        run: |
          # Markers the DAX pipeline stamps onto NDA-derived files. Tune this list
          # to whatever your first-stage code actually writes. Prose (docs/, *.md)
          # is excluded so COMPLIANCE.md / CLAUDE.md discussing "NDA" don't self-trip.
          markers='NDA-RESTRICTED|openai[_-]nda|nda[_-]usage|usage[_-]nda'
          hits=$(git grep -nIE "$markers" -- \
              ':(exclude)docs/**' \
              ':(exclude)*.md' \
              ':(exclude).github/**' || true)
          if [ -n "$hits" ]; then
            echo "::error::forbidden OpenAI NDA-aggregate marker committed to repo"
            echo "$hits"
            exit 1
          fi
          ndapaths=$(git ls-files 'dax/analysis/outcomes/*nda*' || true)
          if [ -n "$ndapaths" ]; then
            echo "::error::NDA-named file under dax/analysis/outcomes/"
            echo "$ndapaths"
            exit 1
          fi
          echo "NDA check clean"

      - name: DAX guard — built artifacts carry lineage (W0 req 4)
        run: |
          missing=""
          for f in $(git ls-files 'dax/data_built/*' 'dax/capability_panel/*' 'dax/index/*' \
                     | grep -vE '\.lineage\.json$|\.gitkeep$|\.md$'); do
            [ -f "$f.lineage.json" ] || missing="$missing$f\n"
          done
          if [ -n "$missing" ]; then
            echo "::error::DAX artifacts missing .lineage.json:"
            printf "$missing"
            exit 1
          fi
          echo "lineage check clean"

      - name: DAX guard — outcomes stay sealed until pre-registration
        run: |
          if git rev-parse -q --verify refs/tags/v1.0-preregistered >/dev/null 2>&1; then
            echo "v1.0-preregistered present — DAX analysis/outcomes/ unlocked"
          else
            committed=$(git ls-files 'dax/analysis/outcomes/*' || true)
            if [ -n "$committed" ]; then
              echo "::error::dax/analysis/outcomes/ committed before the v1.0-preregistered tag"
              echo "$committed"
              exit 1
            fi
            echo "no pre-registration tag yet, and no outcomes committed — OK"
          fi
